<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WITHDRAW - NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root{
--yellow:#fbff00;
--bg:#03040a;
--neon:0 0 15px rgba(251,255,0,0.9);
}

body{
background:var(--bg);
color:white;
font-family:'Segoe UI',Tahoma,Verdana,sans-serif;
margin:0;
}

/* HEADER */
.header{
padding:20px;
background:#000;
border-bottom:2px solid var(--yellow);
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:100;
}
.btn-back{color:white;font-size:20px;text-decoration:none;}

.container{padding:20px;}

/* BALANCE */
.balance-card{
border:2px solid var(--yellow);
border-radius:15px;
padding:20px;
text-align:center;
margin-bottom:20px;
box-shadow:var(--neon);
}
.bal-value{font-size:24px;font-weight:900;color:var(--yellow);}

/* FORM */
.card{
border:2px solid var(--yellow);
border-radius:15px;
padding:20px;
margin-bottom:20px;
box-shadow:var(--neon);
}
.label{font-size:11px;color:var(--yellow);font-weight:bold;margin-bottom:6px;display:block;}
input{
width:100%;
padding:12px;
background:#000;
border:1px solid var(--yellow);
border-radius:8px;
color:white;
margin-bottom:15px;
}
.btn-withdraw{
width:100%;
padding:15px;
border-radius:50px;
background:var(--yellow);
color:black;
font-weight:900;
border:2px solid var(--yellow);
cursor:pointer;
box-shadow:var(--neon);
}

/* HISTORY */
.history-title{
font-weight:900;
color:var(--yellow);
margin-bottom:10px;
display:flex;
align-items:center;
gap:10px;
}

.history-wrapper{
border:2px solid var(--yellow);
border-radius:15px;
padding:15px;
box-shadow:var(--neon);
max-height:260px;
overflow-y:auto;
}

/* NEON SCROLL */
.history-wrapper::-webkit-scrollbar{width:6px;}
.history-wrapper::-webkit-scrollbar-thumb{
background:var(--yellow);
border-radius:10px;
box-shadow:var(--neon);
}

.history-item{
border:1px solid var(--yellow);
border-radius:8px;
padding:12px;
margin-bottom:10px;
background:rgba(255,255,255,0.05);
position:relative;
}

/* Glow animasi terbaru */
@keyframes glowPulse{
0%{box-shadow:0 0 5px var(--yellow);}
50%{box-shadow:0 0 20px var(--yellow);}
100%{box-shadow:0 0 5px var(--yellow);}
}
.latest{
animation:glowPulse 1.5s infinite;
}

/* Badge BARU */
.badge-new{
position:absolute;
top:-8px;
right:-8px;
background:red;
color:white;
font-size:9px;
padding:4px 6px;
border-radius:10px;
font-weight:bold;
}

.status-badge{
padding:2px 8px;
border-radius:4px;
font-size:9px;
}
.status-proses{background:rgba(251,255,0,0.2);color:var(--yellow);}
.status-sukses{background:rgba(0,255,0,0.2);color:#00ff00;}
.status-gagal{background:rgba(255,0,0,0.2);color:#ff4444;}

.hist-top{display:flex;justify-content:space-between;font-weight:bold;}
.hist-time{font-size:10px;color:#aaa;}

</style>
</head>
<body>

<div class="header">
<a href="game.html" class="btn-back"><i class="fa-solid fa-circle-chevron-left"></i></a>
<div style="font-weight:900;letter-spacing:2px;">PENARIKAN DANA</div>
<div style="width:20px;"></div>
</div>

<div class="container">

<div class="balance-card">
<div>SALDO DAPAT DITARIK</div>
<div class="bal-value" id="wd-balance">IDR 0</div>
</div>

<div class="card">
<span class="label">NOMINAL PENARIKAN (IDR)</span>
<input type="number" id="wd-amount" placeholder="Minimal 50,000">
<button class="btn-withdraw">AJUKAN PENARIKAN</button>
</div>

<div class="history-title">
<i class="fa-solid fa-clock-rotate-left"></i> RIWAYAT PENARIKAN
</div>

<div class="history-wrapper" id="wd-history">
<div style="text-align:center;color:#555;font-size:12px;padding:20px;">
Belum ada riwayat transaksi
</div>
</div>

</div>

<audio id="approveSound">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script src="global.js"></script>
<script>

const API_URL = typeof SCRIPT_URL !== 'undefined' ? SCRIPT_URL : "";
let lastApproveStatus = null;

function updateBalanceDisplay(){
const saldo = Number(localStorage.getItem('user_saldo')||0);
document.getElementById('wd-balance').innerText="IDR "+saldo.toLocaleString();
}

async function loadWithdrawHistory(){
const username=localStorage.getItem('username');
const container=document.getElementById('wd-history');

try{
const response=await fetch(API_URL,{
method:"POST",
body:JSON.stringify({action:"get_wd_history",username:username})
});
const result=await response.json();

if(result.result==="SUCCESS" && result.data.length>0){

container.innerHTML="";
const lastThree=result.data.slice(0,3);

lastThree.forEach((item,index)=>{

const status=item.status.toLowerCase();
const statusClass=
status==='approve'?'status-sukses':
status==='reject'?'status-gagal':'status-proses';

const statusText=status==='pending'?'PROSES':item.status;

let latestClass=index===0?'latest':'';
let badgeNew=index===0?'<div class="badge-new">BARU</div>':'';

if(index===0 && status==='approve' && lastApproveStatus!=='approve'){
document.getElementById("approveSound").play();
alert("🎉 Withdraw kamu telah di APPROVE!");
}
if(index===0){
lastApproveStatus=status;
}

container.innerHTML+=`
<div class="history-item ${latestClass}">
${badgeNew}
<div class="hist-top">
<span>PENARIKAN DANA</span>
<span class="status-badge ${statusClass}">${statusText}</span>
</div>
<div style="color:var(--yellow);font-weight:bold;font-size:14px;margin:4px 0;">
IDR ${Number(item.amount).toLocaleString()}
</div>
<div class="hist-time">${item.timestamp}</div>
</div>
`;
});
}

}catch(e){
console.log("History error",e);
}
}

/* AUTO REFRESH */
setInterval(()=>{
if(localStorage.getItem('username')){
loadWithdrawHistory();
}
},5000);

window.onload=()=>{
if(!localStorage.getItem('username')){
location.href='login.html';
}else{
updateBalanceDisplay();
loadWithdrawHistory();
}
};

</script>

</body>
</html>
