<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WITHDRAW - NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --pink: #ff0077; --blue: #0044ff; --yellow: #fbff00; --white: #ffffff; --bg: #03040a;
            --neon-pink: 0 0 15px rgba(255, 0, 119, 0.7);
            --neon-blue: 0 0 15px rgba(0, 68, 255, 0.7);
        }
        body {
            background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden;
        }

        #neon-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0a0b1e; border: 2px solid var(--pink); border-radius: 15px;
            box-shadow: var(--neon-pink); z-index: 9999; padding: 25px; text-align: center;
            min-width: 280px; animation: modalIn 0.3s ease;
        }
        @keyframes modalIn { from { opacity: 0; scale: 0.8; } to { opacity: 1; scale: 1; } }
        .modal-btn {
            margin-top: 20px; padding: 10px 25px; border-radius: 50px; cursor: pointer;
            border: 1px solid var(--yellow); background: transparent; color: var(--yellow); font-weight: bold;
        }

        .header {
            padding: 20px; background: rgba(0, 0, 0, 0.9); border-bottom: 2px solid var(--blue);
            display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100;
        }
        .btn-back { color: var(--white); font-size: 20px; text-decoration: none; cursor: pointer; }

        .container { padding: 20px; padding-bottom: 40px; }

        .balance-card {
            background: linear-gradient(135deg, rgba(0, 68, 255, 0.2), rgba(255, 0, 119, 0.2));
            border: 1px solid var(--blue); border-radius: 15px; padding: 20px; text-align: center;
            margin-bottom: 20px; box-shadow: var(--neon-blue);
        }
        .bal-label { font-size: 11px; color: var(--white); letter-spacing: 2px; opacity: 0.8; }
        .bal-value { font-size: 24px; font-weight: 900; color: var(--yellow); margin-top: 5px; }

        .card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 0, 119, 0.3);
            border-radius: 15px; padding: 20px; margin-bottom: 20px;
        }

        .label { font-size: 11px; color: var(--pink); font-weight: bold; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        
        input, select {
            width: 100%; padding: 12px; background: #000; border: 1px solid var(--blue);
            border-radius: 8px; color: white; font-size: 14px; box-sizing: border-box; outline: none;
            margin-bottom: 15px; transition: 0.3s;
        }
        input:read-only { opacity: 0.6; border-color: #333; color: #aaa; cursor: not-allowed; }
        input:focus:not(:read-only) { border-color: var(--pink); box-shadow: var(--neon-pink); }

        .btn-withdraw {
            width: 100%; padding: 16px; border-radius: 50px; background: linear-gradient(90deg, #aa0055, #0022aa);
            color: white; font-weight: 900; border: 2px solid var(--yellow); text-transform: uppercase; cursor: pointer;
            box-shadow: var(--neon-pink); margin-top: 5px;
        }

        /* RIWAYAT SECTION */
        .history-title { font-size: 14px; font-weight: 900; color: var(--yellow); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-item {
            background: rgba(255, 255, 255, 0.05); border-left: 3px solid var(--pink);
            padding: 12px; border-radius: 8px; font-size: 12px;
        }
        .hist-top { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 4px; }
        .hist-time { font-size: 10px; color: #888; }
        .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 9px; text-transform: uppercase; }
        .status-proses { background: rgba(251, 255, 0, 0.2); color: var(--yellow); }
        .status-sukses { background: rgba(0, 255, 0, 0.2); color: #00ff00; }
        .status-gagal { background: rgba(255, 0, 0, 0.2); color: #ff4444; }

    </style>
</head>
<body>

    <div id="neon-modal">
        <h3 id="modal-title" style="color: var(--pink); margin: 0;">WITHDRAWAL</h3>
        <p id="modal-msg" style="color: white; font-size: 14px; margin-top: 10px;"></p>
        <button class="modal-btn" onclick="closeModal()">OK</button>
    </div>

    <div class="header">
        <a href="game.html" class="btn-back"><i class="fa-solid fa-circle-chevron-left"></i></a>
        <div style="font-weight: 900; letter-spacing: 2px;">PENARIKAN DANA</div>
        <div style="width: 20px;"></div>
    </div>

    <div class="container">
        <div class="balance-card">
            <div class="bal-label">SALDO DAPAT DITARIK</div>
            <div class="bal-value" id="wd-balance">IDR 0</div>
        </div>

        <div class="card">
            <span class="label">NOMINAL PENARIKAN (IDR)</span>
            <input type="number" id="wd-amount" placeholder="Minimal 50,000">

            <span class="label">BANK / E-WALLET (TERKUNCI)</span>
            <input type="text" id="wd-method" readonly placeholder="Memuat data...">

            <span class="label">NOMOR REKENING (TERKUNCI)</span>
            <input type="text" id="wd-account-num" readonly placeholder="Memuat data...">

            <span class="label">NAMA PEMILIK (TERKUNCI)</span>
            <input type="text" id="wd-account-name" readonly placeholder="Memuat data...">

            <button class="btn-withdraw" id="btn-submit-wd" onclick="processWithdraw()">AJUKAN PENARIKAN</button>
        </div>

        <div class="history-title">
            <i class="fa-solid fa-clock-rotate-left"></i> RIWAYAT PENARIKAN
        </div>
        <div class="history-list" id="wd-history">
            <div style="text-align: center; color: #555; font-size: 12px; padding: 20px;">Belum ada riwayat transaksi</div>
        </div>
    </div>

    <script src="global.js"></script>
    <script>
        const API_URL = typeof SCRIPT_URL !== 'undefined' ? SCRIPT_URL : "";

        function updateBalanceDisplay() {
            const saldo = Number(localStorage.getItem('user_saldo') || 0);
            document.getElementById('wd-balance').innerText = "IDR " + saldo.toLocaleString();
        }

        function showModal(msg, color = 'var(--pink)') {
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('neon-modal').style.borderColor = color;
            document.getElementById('neon-modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('neon-modal').style.display = 'none';
        }

        // FUNGSI MENGAMBIL DATA REKENING DARI SERVER (LOCK DATA)
        async function loadUserPaymentData() {
            const username = localStorage.getItem('username');
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "get_user_data", username: username })
                });
                const result = await response.json();
                if (result.result === "SUCCESS") {
                    document.getElementById('wd-method').value = result.data.bank_name || "-";
                    document.getElementById('wd-account-num').value = result.data.account_number || "-";
                    document.getElementById('wd-account-name').value = result.data.account_name || "-";
                    
                    // Jika data kosong, beri peringatan
                    if(!result.data.account_number || result.data.account_number === "-") {
                        showModal("Data rekening belum diatur. Silahkan hubungi Admin untuk verifikasi data.");
                        document.getElementById('btn-submit-wd').disabled = true;
                        document.getElementById('btn-submit-wd').style.opacity = "0.5";
                    }
                }
            } catch (e) { console.error("Load data error", e); }
        }

        // FUNGSI LOAD RIWAYAT DARI SHEET
        async function loadWithdrawHistory() {
            const username = localStorage.getItem('username');
            const container = document.getElementById('wd-history');
            
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "get_wd_history", username: username })
                });
                const result = await response.json();
                
                if (result.result === "SUCCESS" && result.data.length > 0) {
                    container.innerHTML = "";
                    result.data.forEach(item => {
                        const statusClass = item.status.toLowerCase() === 'approve' ? 'status-sukses' : 
                                            (item.status.toLowerCase() === 'reject' ? 'status-gagal' : 'status-proses');
                        
                        // Menampilkan "PROSES" jika status dari sheet adalah "pending"
                        const statusText = item.status.toLowerCase() === 'pending' ? 'PROSES' : item.status;

                        container.innerHTML += `
                            <div class="history-item">
                                <div class="hist-top">
                                    <span>PENARIKAN DANA</span>
                                    <span class="status-badge ${statusClass}">${statusText}</span>
                                </div>
                                <div style="color:var(--yellow); font-weight:bold; font-size:14px; margin: 4px 0;">
                                    IDR ${Number(item.amount).toLocaleString()}
                                </div>
                                <div class="hist-time">${item.timestamp}</div>
                            </div>
                        `;
                    });
                }
            } catch (e) { console.log("History error", e); }
        }

        async function processWithdraw() {
            const username = localStorage.getItem('username');
            const amount = Number(document.getElementById('wd-amount').value);
            const currentSaldo = Number(localStorage.getItem('user_saldo') || 0);
            
            const method = document.getElementById('wd-method').value;
            const accountNum = document.getElementById('wd-account-num').value;
            const accountName = document.getElementById('wd-account-name').value;

            if (amount < 50000) return showModal("Minimal penarikan IDR 50,000");
            if (amount > currentSaldo) return showModal("Saldo tidak mencukupi!");

            const btn = document.getElementById('btn-submit-wd');
            btn.disabled = true;
            btn.innerText = "MEMPROSES...";

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "withdraw",
                        username: username,
                        amount: amount,
                        method: method,
                        account_num: accountNum,
                        account_name: accountName
                    })
                });

                const result = await response.json();

                if (result.result === "SUCCESS") {
                    localStorage.setItem('user_saldo', result.newSaldo);
                    updateBalanceDisplay();
                    showModal("Withdrawal berhasil diajukan! Status: PROSES", 'var(--blue)');
                    document.getElementById('wd-amount').value = "";
                    loadWithdrawHistory(); 
                } else {
                    showModal(result.message || "Gagal memproses penarikan.");
                }
            } catch (error) {
                showModal("Terjadi kesalahan koneksi ke server.");
            } finally {
                btn.disabled = false;
                btn.innerText = "AJUKAN PENARIKAN";
            }
        }

        window.onload = () => {
            if(!localStorage.getItem('username')) {
                location.href = 'login.html';
            } else {
                updateBalanceDisplay();
                loadUserPaymentData();
                loadWithdrawHistory();
            }
        };
    </script>
</body>
</html>
