<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>WITHDRAW — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root{--pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--bg:#000005;--gp:0 0 20px #ff0077,0 0 50px rgba(255,0,119,.55);--gb:0 0 20px #0022ff,0 0 50px rgba(0,34,255,.55);--gy:0 0 20px #fbff00,0 0 50px rgba(251,255,0,.55);}
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;min-height:100vh;padding-bottom:80px;}
        #particles-js{position:fixed;width:100%;height:100%;z-index:0;background:radial-gradient(circle at 70% 60%,#180005 0%,#000 100%);}

        #neon-alert{position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:88%;max-width:340px;background:rgba(0,0,15,.97);border:2px solid var(--pink);border-top:3px solid var(--yellow);color:#fff;padding:14px 20px;border-radius:14px;text-align:center;font-weight:900;z-index:9000;font-family:'Outfit',sans-serif;font-size:13px;transition:.55s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 0 35px var(--pink),0 0 70px rgba(255,0,119,.3);}
        #neon-alert.show{top:15px;}
        #neon-alert.success{border-color:var(--blue);box-shadow:0 0 35px var(--blue),0 0 70px rgba(0,34,255,.3);}

        .header{height:65px;padding:0 20px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,20,.97);border-bottom:2px solid var(--pink);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);box-shadow:var(--gp);}
        .logo{font-size:15px;font-weight:900;color:var(--pink);text-shadow:var(--gp);letter-spacing:1px;text-transform:uppercase;}

        .container{padding:20px;max-width:500px;margin:auto;position:relative;z-index:10;}

        .saldo-card{background:rgba(0,0,40,.8);border:2px solid var(--yellow);border-radius:22px;padding:24px;text-align:center;margin-bottom:20px;box-shadow:var(--gy);backdrop-filter:blur(10px);}
        .saldo-label{font-size:10px;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
        .saldo-val{font-size:30px;font-weight:900;color:var(--yellow);text-shadow:var(--gy);letter-spacing:1px;}

        .form-box{background:rgba(0,0,40,.8);border:1px solid rgba(0,34,255,.35);padding:25px;border-radius:22px;box-shadow:var(--gb);backdrop-filter:blur(10px);}
        label{display:block;font-size:10px;font-weight:900;color:var(--yellow);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}

        input[type=text],input[type=number]{width:100%;padding:14px 16px;background:#000;border:1px solid rgba(0,34,255,.5);border-radius:12px;color:#fff;font-size:13px;outline:none;margin-bottom:20px;transition:.3s;font-family:'Outfit',sans-serif;}
        input:focus{border-color:var(--pink);box-shadow:var(--gp);}
        input[readonly]{color:rgba(255,255,255,.6);cursor:default;}
        .amount-input{font-size:24px!important;font-weight:900!important;color:var(--yellow)!important;text-align:center;text-shadow:var(--gy);}

        .amt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;}
        .amt-btn{background:rgba(0,34,255,.12);border:1px solid rgba(0,34,255,.45);color:#fff;padding:12px;border-radius:12px;font-size:13px;font-weight:900;cursor:pointer;transition:.2s;font-family:'Outfit',sans-serif;}
        .amt-btn:active{background:var(--blue);box-shadow:var(--gb);}

        .btn-main{width:100%;padding:17px;border-radius:50px;border:none;background:linear-gradient(90deg,var(--pink),#b400dc);color:#fff;font-weight:900;font-size:14px;box-shadow:var(--gp);cursor:pointer;transition:.2s;letter-spacing:1px;text-transform:uppercase;font-family:'Outfit',sans-serif;}
        .btn-main:active{transform:scale(.96);}
        .btn-main:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(1);}

        .history-item{background:rgba(0,0,40,.7);padding:15px;border-radius:14px;margin-bottom:12px;border-left:4px solid var(--pink);display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(5px);}

        #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
        .modal-box{width:88%;max-width:320px;background:rgba(0,0,15,.99);border:2px solid var(--pink);border-top:3px solid var(--yellow);border-radius:22px;padding:28px;text-align:center;box-shadow:var(--gp);animation:zoomIn .3s ease;}
        @keyframes zoomIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
        #m-title{font-size:17px;font-weight:900;color:var(--pink);text-shadow:var(--gp);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;}
        #m-msg{font-size:13px;color:#ccc;line-height:1.6;}

        .nav-bar{position:fixed;bottom:0;left:0;width:100%;height:72px;background:rgba(0,0,15,.99);display:flex;justify-content:space-around;align-items:center;border-top:2px solid var(--blue);backdrop-filter:blur(20px);z-index:1000;padding-bottom:6px;box-shadow:0 -5px 20px rgba(0,34,255,.3);}
        .nav-item{color:rgba(255,255,255,.3);text-decoration:none;text-align:center;font-size:9px;font-weight:900;flex:1;transition:.3s;letter-spacing:.5px;text-transform:uppercase;}
        .nav-item.active{color:var(--pink);text-shadow:var(--gp);}
        .nav-item i{font-size:20px;display:block;margin-bottom:3px;}
    </style>
</head>
<body>
<div id="particles-js"></div>
<div id="neon-alert">NOTIFICATION</div>
<audio id="snd-click" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b417f73c.mp3"></audio>
<audio id="snd-success" src="https://cdn.pixabay.com/audio/2021/08/04/audio_062564a02d.mp3"></audio>
<audio id="snd-error" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c36394595e.mp3"></audio>

<div class="header">
    <a href="game.html" onclick="playSnd('click')" style="color:rgba(255,255,255,.7);font-size:20px;"><i class="fa-solid fa-chevron-left"></i></a>
    <div class="logo"><i class="fas fa-money-bill-transfer" style="margin-right:8px;text-shadow:var(--gp)"></i>WITHDRAW CENTER</div>
    <div style="width:40px;"></div>
</div>

<div class="container">
    <div class="saldo-card">
        <div class="saldo-label"><i class="fas fa-coins" style="margin-right:6px;text-shadow:var(--gy)"></i>SALDO DAPAT DITARIK</div>
        <div class="saldo-val" id="display-saldo-wd">IDR 0</div>
    </div>

    <div class="form-box">
        <label><i class="fas fa-bank" style="margin-right:6px"></i>Tujuan Pencairan (E-Wallet / Bank)</label>
        <input type="text" id="wd-rek-info" readonly placeholder="Mencari data rekening...">
        <label><i class="fas fa-sack-dollar" style="margin-right:6px"></i>Nominal Penarikan (Min 50.000)</label>
        <input type="number" id="input-amount-wd" class="amount-input" placeholder="0">
        <div class="amt-grid">
            <button class="amt-btn" onclick="setWdAmt(50000)">50K</button>
            <button class="amt-btn" onclick="setWdAmt(100000)">100K</button>
            <button class="amt-btn" onclick="setWdAmt(200000)">200K</button>
            <button class="amt-btn" onclick="setWdAmt(500000)">500K</button>
            <button class="amt-btn" onclick="setWdAmt(1000000)">1 JT</button>
            <button class="amt-btn" onclick="setMaxWd()" style="border-color:var(--yellow);color:var(--yellow)">MAX</button>
        </div>
        <button class="btn-main" id="btn-wd-submit" onclick="prosesWithdraw()">
            <i class="fas fa-paper-plane"></i> KONFIRMASI PENARIKAN
        </button>
    </div>

    <div style="margin-top:28px;">
        <label><i class="fas fa-clock-rotate-left"></i> Riwayat Penarikan</label>
        <div id="wd-history-list"></div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-box">
        <h3 id="m-title">NOTIFIKASI</h3>
        <p id="m-msg"></p>
        <button class="btn-main" onclick="closeModal()" style="margin-top:20px;">MENGERTI</button>
    </div>
</div>

<div class="nav-bar">
    <a href="game.html" class="nav-item"><i class="fas fa-gamepad"></i>PLAY</a>
    <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i>DEPO</a>
    <a href="withdraw.html" class="nav-item active"><i class="fas fa-money-bill-transfer"></i>WD</a>
    <a href="reward.html" class="nav-item"><i class="fas fa-gift"></i>REWARD</a>
    <a href="profil.html" class="nav-item"><i class="fas fa-user-shield"></i>PROFIL</a>
</div>

<script>
let isSubmitting=false,currentSaldo=0;
const SUPA_URL="https://bgffnmwrviyqpeevzjsn.supabase.co",SUPA_KEY="sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani";
const _db=supabase.createClient(SUPA_URL,SUPA_KEY);
particlesJS("particles-js",{"particles":{"number":{"value":100},"color":{"value":"#ff0077"},"shape":{"type":"circle"},"opacity":{"value":0.75,"random":true,"anim":{"enable":true,"speed":0.8,"opacity_min":0.3}},"size":{"value":3.5,"random":true},"line_linked":{"enable":true,"distance":140,"color":"#0022ff","opacity":0.55,"width":1.2},"move":{"enable":true,"speed":2.5,"random":true,"out_mode":"out"}},"interactivity":{"events":{"onhover":{"enable":true,"mode":"repulse"},"onclick":{"enable":true,"mode":"push"}},"modes":{"repulse":{"distance":80},"push":{"particles_nb":4}}}});
function playSnd(t){const s=document.getElementById('snd-'+t);if(s){s.currentTime=0;s.play().catch(()=>{});}}
function showNeonAlert(msg,ok=false){const a=document.getElementById('neon-alert');a.innerText=msg;a.className=ok?'show success':'show';setTimeout(()=>a.className='',3000);}
function getUser(){return typeof getUsername==='function'?getUsername():localStorage.getItem('neon_user');}
async function loadWdData(){
    const user=getUser();if(!user)return;
    try{const{data}=await _db.from('profiles').select('*').eq('username',user).single();
    if(data){currentSaldo=Number(data.saldo);document.getElementById('display-saldo-wd').innerText="IDR "+currentSaldo.toLocaleString('id-ID');
    if(data.bank_name&&data.rekening){document.getElementById('wd-rek-info').value=`${data.bank_name.toUpperCase()} — ${data.rekening} (${data.nama_lengkap||''})`;}
    else{document.getElementById('wd-rek-info').value="REKENING BELUM DISET — Lengkapi di Profil";document.getElementById('wd-rek-info').style.color="var(--pink)";}}}catch(err){console.error(err);}
}
function setWdAmt(v){playSnd('click');document.getElementById('input-amount-wd').value=v;}
function setMaxWd(){playSnd('click');document.getElementById('input-amount-wd').value=currentSaldo;}
async function prosesWithdraw(){
    if(isSubmitting)return;
    const amt=parseInt(document.getElementById('input-amount-wd').value)||0;
    const user=getUser();const rek=document.getElementById('wd-rek-info').value;
    if(rek.includes("BELUM DISET")||rek===""){playSnd('error');return showModal("GAGAL","Harap lengkapi nomor rekening di menu Profil sebelum menarik saldo.");}
    if(amt<50000){playSnd('error');return showModal("MINIMAL","Penarikan minimal adalah IDR 50.000");}
    if(amt>currentSaldo){playSnd('error');return showModal("SALDO KURANG","Saldo Anda tidak mencukupi untuk penarikan ini.");}
    isSubmitting=true;const btn=document.getElementById('btn-wd-submit');btn.disabled=true;btn.innerText="MEMPROSES...";
    try{
        const{error:e1}=await _db.from('withdrawals').insert([{username:user,amount:amt,status:'PROSES'}]);if(e1)throw e1;
        const{error:e2}=await _db.from('profiles').update({saldo:currentSaldo-amt}).eq('username',user);if(e2)throw e2;
        playSnd('success');showNeonAlert("PERMINTAAN PENARIKAN TERKIRIM!",true);
        showModal("SUKSES","Permintaan tarik saldo berhasil! Saldo dipotong sementara menunggu persetujuan admin.");
        document.getElementById('input-amount-wd').value="";await loadWdData();await loadWdHistory();
    }catch(err){playSnd('error');showModal("ERROR","Terjadi kesalahan: "+err.message);isSubmitting=false;btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> KONFIRMASI PENARIKAN';}
}
async function loadWdHistory(){
    const user=getUser();
    const{data}=await _db.from('withdrawals').select('*').eq('username',user).order('created_at',{ascending:false}).limit(5);
    let html="";
    if(data&&data.length>0){data.forEach(i=>{let c="var(--yellow)";if(i.status==='SUKSES')c="#00ff88";if(i.status==='GAGAL')c="var(--pink)";html+=`<div class="history-item" style="border-left-color:${c}"><div><div style="font-size:10px;font-weight:800;color:rgba(255,255,255,.4);margin-bottom:3px;">PENARIKAN VIP</div><div style="font-size:17px;font-weight:900;">Rp ${(i.amount||0).toLocaleString()}</div></div><div style="text-align:right;"><div style="font-size:11px;font-weight:900;color:${c};margin-bottom:3px;">${i.status}</div><div style="font-size:9px;opacity:.4;">${new Date(i.created_at).toLocaleDateString('id-ID')}</div></div></div>`;});}
    else html='<p style="text-align:center;opacity:.3;font-size:12px;padding:20px;">Belum ada riwayat penarikan</p>';
    document.getElementById('wd-history-list').innerHTML=html;
}
function showModal(t,m){document.getElementById('m-title').innerText=t;document.getElementById('m-msg').innerText=m;document.getElementById('modal-overlay').style.display='flex';}
function closeModal(){playSnd('click');document.getElementById('modal-overlay').style.display='none';isSubmitting=false;const btn=document.getElementById('btn-wd-submit');btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> KONFIRMASI PENARIKAN';}
window.onload=()=>{loadWdData();loadWdHistory();};
</script>
</body>
</html>
