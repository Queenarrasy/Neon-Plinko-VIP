<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>WITHDRAW - NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff0077; --blue: #0055ff; --yellow: #f5e642; --bg: #02030d;
            --card: rgba(255, 255, 255, .025);
            --gp: 0 0 8px rgba(255, 0, 119, .5), 0 0 22px rgba(255, 0, 119, .15);
            --gb: 0 0 8px rgba(0, 85, 255, .5), 0 0 22px rgba(0, 85, 255, .15);
        }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        h2 { font-family: 'Cinzel Decorative'; text-align: center; color: var(--pink); text-shadow: var(--gp); }
        
        .profile-info { background: var(--card); border: 1px solid rgba(0, 212, 255, 0.2); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9em; }
        .label { opacity: 0.6; }
        .value { color: var(--blue); font-weight: 600; }

        .form-group { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: var(--yellow); }
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--blue); color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 1.1em; }
        
        .btn-withdraw { width: 100%; padding: 15px; background: var(--blue); border: none; color: #fff; font-weight: 700; border-radius: 8px; cursor: pointer; box-shadow: var(--gb); transition: 0.3s; }
        .btn-withdraw:disabled { background: #333; box-shadow: none; cursor: not-allowed; }

        .history-section { margin-top: 30px; }
        .history-item { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--pink); }
        .status-proses { color: var(--yellow); font-weight: bold; }
        .status-berhasil { color: #00ff88; font-weight: bold; }
        .status-gagal { color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>WITHDRAW</h2>

    <div class="profile-info">
        <div class="info-row">
            <span class="label">Nama Lengkap:</span>
            <span class="value" id="wd-fullname">...</span>
        </div>
        <div class="info-row">
            <span class="label">Bank/E-Wallet:</span>
            <span class="value" id="wd-bank">...</span>
        </div>
        <div class="info-row">
            <span class="label">Nomor Rekening:</span>
            <span class="value" id="wd-rekening">...</span>
        </div>
        <div class="info-row" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; margin-top: 8px;">
            <span class="label">Saldo Utama:</span>
            <span class="value" id="wd-saldo" style="color: var(--yellow);">IDR 0</span>
        </div>
    </div>

    <div class="form-group">
        <label>Nominal Penarikan (Min. 50,000)</label>
        <input type="number" id="amount-wd" placeholder="Masukkan jumlah...">
        <p style="font-size: 11px; margin-top: 10px; opacity: 0.6;">*Pastikan saldo Anda mencukupi untuk melakukan penarikan.</p>
    </div>

    <button class="btn-withdraw" id="btn-submit-wd" onclick="handleWithdraw()">AJUKAN PENARIKAN</button>

    <div class="history-section">
        <h4 style="color: var(--pink); border-bottom: 1px solid var(--pink); padding-bottom: 5px;">RIWAYAT PENARIKAN</h4>
        <div id="wd-history">
            </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
let userCache = null;

async function loadWithdrawPage() {
    const user = await getPlayerData(); // Fungsi dari config.js
    if (!user) return;
    
    userCache = user;
    document.getElementById('wd-fullname').innerText = user.fullname;
    document.getElementById('wd-bank').innerText = user.bank_name;
    document.getElementById('wd-rekening').innerText = user.rekening_number;
    document.getElementById('wd-saldo').innerText = "IDR " + user.saldo.toLocaleString('id-ID');
    
    loadHistoryWD(user.username);
}

async function handleWithdraw() {
    const amount = parseInt(document.getElementById('amount-wd').value);
    const btn = document.getElementById('btn-submit-wd');

    // 1. Validasi Minimal & Saldo
    if (isNaN(amount) || amount < 50000) return alert("Minimal penarikan adalah Rp 50.000");
    if (amount > userCache.saldo) return alert("Saldo Anda tidak mencukupi!");

    btn.disabled = true;
    btn.innerText = "MEMPROSES...";

    try {
        // 2. Potong Saldo Langsung di Tabel Profiles (Sinkron Server)
        const newSaldo = userCache.saldo - amount;
        const { error: errorUpdate } = await _supabase
            .from('profiles')
            .update({ saldo: newSaldo })
            .eq('username', userCache.username);

        if (errorUpdate) throw errorUpdate;

        // 3. Masukkan ke Tabel Transactions (Riwayat WD)
        const { error: errorTrans } = await _supabase
            .from('transactions')
            .insert([{
                username: userCache.username,
                fullname: userCache.fullname,
                bank: userCache.bank_name,       // Menyesuaikan kolom di SQL
                rekening: userCache.rekening_number,
                amount: amount,
                type: 'WITHDRAW',
                status: 'PROSES'
            }]);

        if (errorTrans) throw errorTrans;

        alert("Withdraw Berhasil Diajukan! Saldo Anda telah terpotong.");
        location.reload();

    } catch (err) {
        alert("Gagal memproses WD: " + err.message);
        btn.disabled = false;
        btn.innerText = "AJUKAN PENARIKAN";
    }
}

async function loadHistoryWD(username) {
    const { data, error } = await _supabase
        .from('transactions')
        .select('*')
        .eq('username', username)
        .eq('type', 'WITHDRAW')
        .order('tanggal', { ascending: false });

    const container = document.getElementById('wd-history');
    if (data && data.length > 0) {
        container.innerHTML = data.map(item => `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between; font-size:12px;">
                    <span>${new Date(item.tanggal).toLocaleString('id-ID')}</span>
                    <span class="status-${item.status.toLowerCase()}">${item.status}</span>
                </div>
                <div style="margin-top:5px; font-weight:bold; color:var(--yellow);">
                    Rp ${item.amount.toLocaleString('id-ID')}
                </div>
                <div style="font-size:10px; opacity:0.6;">Tujuan: ${item.bank} (${item.rekening})</div>
            </div>
        `).join('');
    } else {
        container.innerHTML = '<div style="text-align:center; opacity:0.3; padding:20px;">Belum ada riwayat withdraw.</div>';
    }
}

window.onload = loadWithdrawPage;
</script>

</body>
</html>
