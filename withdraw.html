<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal History</title>
    <link rel="stylesheet" href="path/to/neon-theme.css">
    <script>
        async function fetchWithdrawalHistory() {
            try {
                const response = await fetch('/api/withdrawals');
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                const data = await response.json();
                displayWithdrawalHistory(data);
            } catch (error) {
                showError(error.message);
            }
        }

        function displayWithdrawalHistory(data) {
            const historyContainer = document.getElementById('history');
            historyContainer.innerHTML = '';
            data.forEach(transaction => {
                const transactionElement = document.createElement('div');
                transactionElement.classList.add('transaction');
                transactionElement.textContent = `Amount: ${transaction.amount} - Status: ${transaction.status}`;
                historyContainer.appendChild(transactionElement);
            });
        }

        function showError(message) {
            const errorContainer = document.getElementById('error');
            errorContainer.textContent = message;
            errorContainer.classList.add('visible');
        }

        function autoRefresh() {
            fetchWithdrawalHistory();
            setTimeout(autoRefresh, 30000); // refresh every 30 seconds
        }

        window.onload = () => {
            fetchWithdrawalHistory();
            autoRefresh();
        };
    </script>
</head>
<body>
    <h1>Withdrawal History</h1>
    <div id="error" class="error"></div>
    <div id="history"></div>
</body>
</html>
