<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>WITHDRAW - NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global.js"></script>
    <style>
        :root{
          --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--bg:#02030d;
          --card:rgba(255,255,255,.025);
          --gp:0 0 8px rgba(255,0,119,.5),0 0 22px rgba(255,0,119,.15);
          --gb:0 0 8px rgba(0,85,255,.5),0 0 22px rgba(0,85,255,.15);
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{
          background:var(--bg); color:#dde0f0; font-family:'Outfit',sans-serif; min-height:100vh;
          background-image: radial-gradient(ellipse 70% 50% at 10% 5%,rgba(0,55,255,.06) 0%,transparent 70%);
        }
        .header{position:sticky;top:0;z-index:200;padding:13px 18px;background:rgba(2,3,13,.93); border-bottom:1px solid var(--blue); display:flex;align-items:center;justify-content:space-between;}
        .btn-back{color:#fff; width:32px;height:32px;border:1px solid var(--blue);border-radius:50%; display:flex;align-items:center;justify-content:center; text-decoration:none;}
        .header-title{font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;letter-spacing:2px; color:var(--pink); text-shadow:var(--gp);}

        .container{padding:16px;max-width:520px;margin:auto;display:flex;flex-direction:column;gap:14px;}
        
        /* Saldo Card */
        .saldo-card{background:var(--card); border:1px solid var(--pink); border-radius:20px; padding:20px; text-align:center; box-shadow:var(--gp);}
        .saldo-val{font-family:'Cinzel Decorative',serif; font-size:24px; font-weight:900; color:var(--yellow); text-shadow: 0 0 10px rgba(245,230,66,0.5);}

        /* Form Styling */
        .form-section{background:var(--card); border-radius:20px; padding:18px; border:1px solid var(--blue); box-shadow:var(--gb);}
        .sec-title{font-family:'Cinzel Decorative',serif; font-size:10px; font-weight:700; letter-spacing:1px; margin-bottom:14px; color:var(--blue);}
        .flbl{font-size:9px; font-weight:600; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:6px; display:block;}
        input{width:100%; padding:13px 15px; background:rgba(0,0,0,.4); border:1px solid rgba(0,85,255,.22); border-radius:12px; color:#fff; outline:none; font-size:14px; margin-bottom:12px;}
        input[readonly]{opacity:0.5; cursor:not-allowed;}

        /* Quick Amount Grid */
        .amt-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px;}
        .amt-item{padding:10px; border:1px solid var(--blue); border-radius:10px; text-align:center; font-size:11px; font-weight:700; color:var(--blue); cursor:pointer;}
        .amt-item:active{background:rgba(0,85,255,0.15);}

        .btn-main{width:100%; padding:15px; border-radius:50px; cursor:pointer; font-weight:700; text-transform:uppercase; border:none; background:linear-gradient(90deg,var(--pink),#b400dc); color:#fff; box-shadow:var(--gp);}
        .btn-main:disabled{opacity:0.5; cursor:not-allowed;}

        /* History */
        #wd-history{display:flex; flex-direction:column; gap:10px;}
        .history-item{background:rgba(255,255,255,0.02); padding:12px; border-radius:12px; border-left:4px solid var(--pink); border-right:1px solid rgba(255,0,119,0.1);}
        
        /* Modal */
        #modal-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000;}
        #neon-modal{display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#0a0b1e; border:2px solid var(--pink); border-radius:20px; padding:25px; text-align:center; z-index:1001; width:85%;}
    </style>
</head>
<body>

<div id="modal-overlay"></div>
<div id="neon-modal">
    <h3 id="modal-title" style="color:var(--pink); font-family:'Cinzel Decorative';">NOTIFIKASI</h3>
    <p id="modal-msg" style="margin: 15px 0; color:#ccc; font-size:13px;"></p>
    <button class="btn-main" onclick="closeModal()" style="padding:10px 20px;">SAYA MENGERTI</button>
</div>

<div class="header">
    <a href="game.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
    <div class="header-title">PENARIKAN DANA</div>
    <div style="width:32px;"></div>
</div>

<div class="container">
    <div class="saldo-card">
        <div style="font-size:10px; color:rgba(255,255,255,0.5); margin-bottom:5px;">SALDO DAPAT DITARIK</div>
        <div class="saldo-val" id="display-saldo-wd">IDR 0</div>
    </div>

    <div class="form-section">
        <div class="sec-title">FORMULIR WITHDRAW</div>
        
        <label class="flbl">Nama Rekening</label>
        <input type="text" id="wd-name" readonly>

        <label class="flbl">Nomor Rekening / E-Wallet</label>
        <input type="text" id="wd-rek" readonly>

        <label class="flbl">Metode</label>
        <input type="text" id="wd-method" readonly>

        <label class="flbl">Nominal Penarikan (IDR)</label>
        <input type="number" id="input-amount-wd" placeholder="Min. 50.000">

        <div class="amt-grid">
            <div class="amt-item" onclick="setWdAmt(50000)">50K</div>
            <div class="amt-item" onclick="setWdAmt(100000)">100K</div>
            <div class="amt-item" onclick="setWdAmt(500000)">500K</div>
        </div>

        <button class="btn-main" id="btn-wd" onclick="prosesWithdraw()">AJUKAN PENARIKAN</button>
    </div>

    <div style="font-family:'Cinzel Decorative'; font-size:10px; color:var(--pink); margin-top:10px;">RIWAYAT TERAKHIR</div>
    <div id="wd-history"></div>
</div>

<script>
    let _saldoUser = 0;

    async function initPage() {
        const user = localStorage.getItem('user_neon');
        if(!user) { location.href='index.html'; return; }

        // Ambil Data Profil & Saldo dari Supabase
        const { data, error } = await _supabase
            .from('users')
            .select('*')
            .eq('username', user)
            .single();

        if (data) {
            _saldoUser = data.saldo;
            document.getElementById('display-saldo-wd').innerText = "IDR " + _saldoUser.toLocaleString('id-ID');
            document.getElementById('wd-name').value = data.nama_lengkap || '-';
            document.getElementById('wd-rek').value = data.nomor_rekening || '-';
            document.getElementById('wd-method').value = data.bank || '-';
        }
        loadWdHistory();
    }

    function setWdAmt(v) { document.getElementById('input-amount-wd').value = v; }

    async function prosesWithdraw() {
        const amt = parseInt(document.getElementById('input-amount-wd').value);
        const user = localStorage.getItem('user_neon');
        const btn = document.getElementById('btn-wd');

        if (!amt || amt < 50000) return showModal("Ditolak", "Minimal penarikan adalah Rp 50.000");
        if (amt > _saldoUser) return showModal("Saldo Kurang", "Saldo Anda tidak mencukupi.");

        btn.disabled = true;
        btn.innerText = "MEMPROSES...";

        try {
            // 1. Catat Transaksi Withdraw
            const { error: errWd } = await _supabase
                .from('withdrawals')
                .insert([{
                    username: user,
                    amount: amt,
                    status: 'PROSES'
                }]);

            if (errWd) throw errWd;

            // 2. Potong Saldo User
            const { error: errUpdate } = await _supabase
                .from('users')
                .update({ saldo: _saldoUser - amt })
                .eq('username', user);

            if (errUpdate) throw errUpdate;

            showModal("Berhasil", "Permintaan penarikan dikirim. Saldo telah dipotong otomatis.");
            initPage(); // Refresh data
        } catch (err) {
            showModal("Gagal", err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "AJUKAN PENARIKAN";
        }
    }

    async function loadWdHistory() {
        const user = localStorage.getItem('user_neon');
        const { data } = await _supabase
            .from('withdrawals')
            .select('*')
            .eq('username', user)
            .order('created_at', { ascending: false })
            .limit(5);

        if(data) {
            const html = data.map(i => `
                <div class="history-item">
                    <div style="display:flex; justify-content:space-between; font-size:11px;">
                        <span style="font-weight:800; color:var(--pink)">WITHDRAW</span>
                        <span style="color:${i.status === 'SUKSES' ? '#00ff00' : 'var(--yellow)'}">${i.status}</span>
                    </div>
                    <div style="font-size:18px; font-weight:900; margin:5px 0;">IDR ${i.amount.toLocaleString()}</div>
                    <div style="font-size:9px; opacity:0.4;">${new Date(i.created_at).toLocaleString('id-ID')}</div>
                </div>
            `).join('');
            document.getElementById('wd-history').innerHTML = html || '<div style="text-align:center; opacity:0.3;">Belum ada riwayat</div>';
        }
    }

    function showModal(t, m) {
        document.getElementById('modal-title').innerText = t;
        document.getElementById('modal-msg').innerText = m;
        document.getElementById('modal-overlay').style.display = 'block';
        document.getElementById('neon-modal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('neon-modal').style.display = 'none';
    }

    window.onload = initPage;
</script>
</body>
</html>
