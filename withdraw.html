<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>WITHDRAW VIP - NEON PLINKO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root {
          --pink: #ff0077; --blue: #0055ff; --cyan: #00f2ff; --yellow: #f5e642; --bg: #02030d;
          --gp: 0 0 10px rgba(255, 0, 119, 0.5), 0 0 20px rgba(255, 0, 119, 0.2);
          --gb: 0 0 10px rgba(0, 85, 255, 0.5), 0 0 20px rgba(0, 85, 255, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
          background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh;
          background-image: radial-gradient(ellipse 70% 50% at 50% 100%, rgba(255,0,119,0.08) 0%, transparent 70%);
          padding-bottom: 30px;
        }

        .header { 
            height: 65px; padding: 0 20px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(2, 3, 13, 0.95); border-bottom: 1px solid var(--pink); 
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }
        .btn-back { color: #fff; font-size: 20px; text-decoration: none; width: 40px; }
        .logo { font-family: 'Cinzel Decorative'; color: var(--pink); font-size: 14px; text-shadow: var(--gp); font-weight: 900; }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* Saldo Card */
        .saldo-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--pink);
            border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 20px;
            box-shadow: var(--gp); position: relative; overflow: hidden;
        }
        .saldo-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); margin-bottom: 8px; letter-spacing: 1px; }
        .saldo-val { font-family: 'Cinzel Decorative'; font-size: 28px; font-weight: 900; color: var(--yellow); text-shadow: 0 0 15px rgba(245,230,66,0.4); }

        /* Form Area */
        .form-box { 
            background: rgba(5,6,20,0.8); border: 1px solid rgba(0,85,255,0.2); 
            padding: 20px; border-radius: 25px; box-shadow: var(--gb);
        }
        label { display: block; font-size: 10px; font-weight: 700; color: var(--cyan); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 18px; }
        input { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,85,255,0.3); 
            border-radius: 12px; color: #fff; font-size: 14px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        input[readonly] { background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.5); border-color: transparent; }
        
        .amount-input { font-size: 24px !important; font-weight: 800 !important; color: var(--yellow) !important; border-color: var(--blue) !important; text-align: center; }

        .amt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .amt-btn { 
            background: rgba(0,85,255,0.1); border: 1px solid var(--blue); color: #fff; 
            padding: 12px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .amt-btn:active { transform: scale(0.9); background: var(--blue); }

        .btn-main { 
            width: 100%; padding: 18px; border-radius: 50px; border: none; 
            background: linear-gradient(90deg, var(--pink), #b400dc); 
            color: #fff; font-family: 'Cinzel Decorative'; font-weight: 900; font-size: 15px; 
            box-shadow: var(--gp); cursor: pointer; transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.96); }
        .btn-main:disabled { opacity: 0.5; filter: grayscale(1); }

        /* History */
        .history-item { 
            background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; 
            margin-bottom: 12px; border-left: 4px solid var(--pink); display: flex; justify-content: space-between; align-items: center;
        }

        /* Modal */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-box { width: 85%; max-width: 320px; background: #0a0b1e; border: 2px solid var(--pink); border-radius: 30px; padding: 30px; text-align: center; box-shadow: var(--gp); }
    </style>
</head>
<body>

    <audio id="snd-click" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b417f73c.mp3"></audio>
    <audio id="snd-success" src="https://cdn.pixabay.com/audio/2021/08/04/audio_062564a02d.mp3"></audio>
    <audio id="snd-error" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c36394595e.mp3"></audio>

    <div class="header">
        <a href="game.html" class="btn-back" onclick="playSnd('click')"><i class="fa-solid fa-chevron-left"></i></a>
        <div class="logo">WITHDRAW VIP</div>
        <div style="width:40px"></div>
    </div>

    <div class="container">
        <div class="saldo-card">
            <div class="saldo-label">SALDO DAPAT DITARIK</div>
            <div class="saldo-val" id="wd-saldo">IDR 0</div>
        </div>

        <div class="form-box">
            <div class="input-group">
                <label>Tujuan Pencairan</label>
                <input type="text" id="wd-rek-info" readonly placeholder="Memuat Rekening...">
            </div>

            <div class="input-group">
                <label>Nominal Penarikan (Min 50.000)</label>
                <input type="number" id="input-amount-wd" class="amount-input" placeholder="0">
            </div>

            <div class="amt-grid">
                <button class="amt-btn" onclick="setWdAmt(50000)">50K</button>
                <button class="amt-btn" onclick="setWdAmt(100000)">100K</button>
                <button class="amt-btn" onclick="setWdAmt(250000)">250K</button>
            </div>

            <button class="btn-main" id="btn-wd" onclick="prosesWithdraw()">KONFIRMASI PENARIKAN</button>
        </div>

        <div style="margin-top:30px;">
            <label>Riwayat Penarikan</label>
            <div id="wd-history"></div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-box">
            <h3 id="m-title" style="color:var(--pink); font-family:'Cinzel Decorative';">INFO</h3>
            <p id="m-msg" style="margin:20px 0; font-size:14px; color:#ccc; line-height:1.5;"></p>
            <button class="btn-main" onclick="closeModal()" style="font-size:14px; padding:12px;">OKE</button>
        </div>
    </div>

    <script>
        function playSnd(type) {
            const s = document.getElementById('snd-' + type);
            if(s) { s.currentTime = 0; s.play(); }
        }

        async function loadProfileData() {
            const user = getUsername();
            if(!user) return;

            try {
                const { data } = await _supabase.from('profiles').select('*').eq('username', user).single();
                if (data) {
                    // Gabungkan info bank dan rekening agar ringkas
                    document.getElementById('wd-rek-info').value = `${data.bank_name} - ${data.rekening} (${data.nama_lengkap})`;
                    if(!data.rekening) {
                        showModal("LENGKAPI DATA", "Mohon lengkapi data rekening di menu profil terlebih dahulu.");
                    }
                }
            } catch (err) { console.error(err); }
        }

        function setWdAmt(v) {
            playSnd('click');
            document.getElementById('input-amount-wd').value = v;
        }

        async function prosesWithdraw() {
            const amt = parseFloat(document.getElementById('input-amount-wd').value) || 0;
            const user = getUsername();
            const cachedSaldo = parseFloat(localStorage.getItem('cached_saldo')) || 0;
            const btn = document.getElementById('btn-wd');

            // VALIDASI MINIMUM & SALDO (TANPA KIRIM KE SERVER)
            if (amt < 50000) {
                playSnd('error');
                return showModal("MINIMAL", "Penarikan minimal IDR 50.000");
            }
            if (amt > cachedSaldo) {
                playSnd('error');
                return showModal("SALDO KURANG", "Saldo Anda tidak mencukupi.");
            }

            btn.disabled = true;
            btn.innerText = "MENGIRIM PERMINTAAN...";

            try {
                // 1. Catat Transaksi di Tabel Withdrawals
                const { error: wdError } = await _supabase.from('withdrawals').insert([{
                    username: user,
                    amount: amt,
                    status: 'PROSES'
                }]);
                if (wdError) throw wdError;

                // 2. Potong Saldo Langsung (Database Profiles)
                const { error: profileError } = await _supabase
                    .from('profiles')
                    .update({ saldo: cachedSaldo - amt })
                    .eq('username', user);
                if (profileError) throw profileError;

                playSnd('success');
                showModal("BERHASIL", "Penarikan sebesar " + amt.toLocaleString() + " sedang diproses. Saldo Anda telah dipotong.");
                document.getElementById('input-amount-wd').value = "";
                
                // Sinkronkan data global & riwayat
                syncNeonData(); 
                loadHistory();

            } catch (err) {
                playSnd('error');
                showModal("ERROR", err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "KONFIRMASI PENARIKAN";
            }
        }

        async function loadHistory() {
            const user = getUsername();
            const { data } = await _supabase.from('withdrawals').select('*').eq('username', user).order('created_at', { ascending: false }).limit(5);
            
            let html = "";
            if (data && data.length > 0) {
                data.forEach(i => {
                    const color = i.status === 'SUKSES' ? '#00ff88' : (i.status === 'PROSES' ? var(--yellow) : '#ff3131');
                    html += `
                        <div class="history-item" style="border-left-color:${color}">
                            <div>
                                <div style="font-size:10px; font-weight:800; color:var(--cyan)">PENARIKAN</div>
                                <div style="font-size:16px; font-weight:900;">IDR ${i.amount.toLocaleString()}</div>
                            </div>
                            <div style="text-align:right;">
                                <div style="font-size:11px; font-weight:800; color:${color}">${i.status}</div>
                                <div style="font-size:9px; opacity:0.4;">${new Date(i.created_at).toLocaleDateString()}</div>
                            </div>
                        </div>
                    `;
                });
            } else {
                html = '<div style="text-align:center; padding:20px; opacity:0.3; font-size:12px;">Belum ada riwayat</div>';
            }
            document.getElementById('wd-history').innerHTML = html;
        }

        function showModal(t, m) {
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-msg').innerText = m;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() { playSnd('click'); document.getElementById('modal-overlay').style.display = 'none'; }

        window.onload = () => {
            loadProfileData();
            loadHistory();
        };
    </script>
</body>
</html>
