<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>WITHDRAW - NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
          --pink: #ff0077; --blue: #0055ff; --cyan: #00f2ff; --yellow: #f5e642; --bg: #02030d;
          --gp: 0 0 10px rgba(255, 0, 119, 0.5), 0 0 20px rgba(255, 0, 119, 0.2);
          --gb: 0 0 10px rgba(0, 85, 255, 0.5), 0 0 20px rgba(0, 85, 255, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
          background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh;
          background-image: radial-gradient(ellipse 70% 50% at 50% 100%, rgba(255,0,119,0.08) 0%, transparent 70%);
          padding-bottom: 30px;
        }

        .header { 
            height: 65px; padding: 0 20px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(2, 3, 13, 0.95); border-bottom: 1px solid var(--pink); 
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }
        .btn-back { color: #fff; font-size: 20px; text-decoration: none; width: 40px; }
        .logo { font-family: 'Cinzel Decorative'; color: var(--pink); font-size: 14px; text-shadow: var(--gp); font-weight: 900; }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* Saldo Display Card */
        .saldo-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--pink);
            border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 20px;
            box-shadow: var(--gp); position: relative; overflow: hidden;
        }
        .saldo-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,0,119,0.1) 0%, transparent 70%);
        }
        .saldo-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); margin-bottom: 8px; letter-spacing: 1px; }
        .saldo-val { font-family: 'Cinzel Decorative'; font-size: 28px; font-weight: 900; color: var(--yellow); text-shadow: 0 0 15px rgba(245,230,66,0.4); }

        /* Form Area */
        .form-box { 
            background: rgba(5,6,20,0.8); border: 1px solid rgba(0,85,255,0.2); 
            padding: 20px; border-radius: 20px; box-shadow: var(--gb);
        }
        label { display: block; font-size: 10px; font-weight: 700; color: var(--blue); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 18px; }
        input { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,85,255,0.3); 
            border-radius: 12px; color: #fff; font-size: 14px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        input[readonly] { background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.5); border-color: transparent; }
        
        .amount-input { font-size: 20px !important; font-weight: 800 !important; color: var(--yellow) !important; border-color: var(--blue) !important; }

        .amt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .amt-btn { 
            background: rgba(0,85,255,0.1); border: 1px solid var(--blue); color: #fff; 
            padding: 12px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer;
        }

        .btn-main { 
            width: 100%; padding: 16px; border-radius: 50px; border: none; 
            background: linear-gradient(90deg, var(--pink), #b400dc); 
            color: #fff; font-family: 'Cinzel Decorative'; font-weight: 900; font-size: 16px; 
            box-shadow: var(--gp); cursor: pointer;
        }
        .btn-main:disabled { opacity: 0.5; filter: grayscale(1); }

        /* History */
        .history-sec { margin-top: 30px; }
        .history-item { 
            background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; 
            margin-bottom: 10px; border-left: 3px solid var(--pink);
        }

        /* Modal */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: #0a0b1e; border: 2px solid var(--pink); border-radius: 25px; padding: 30px; width: 85%; max-width: 320px; text-align: center; box-shadow: var(--gp); }
    </style>
</head>
<body>

    <div class="header">
        <a href="game.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="logo">WITHDRAW CENTER</div>
        <div style="width:40px"></div>
    </div>

    <div class="container">
        <div class="saldo-card">
            <div class="saldo-label">SALDO TERSEDIA</div>
            <div class="saldo-val" id="wd-saldo">IDR 0</div>
        </div>

        <div class="form-box">
            <div class="input-group">
                <label>Nama Penerima</label>
                <input type="text" id="wd-name-field" readonly placeholder="Memuat data...">
            </div>

            <div class="input-group">
                <label>Rekening / E-Wallet</label>
                <input type="text" id="wd-rek-field" readonly placeholder="Memuat data...">
            </div>

            <div class="input-group">
                <label>Bank / Provider</label>
                <input type="text" id="wd-method-field" readonly placeholder="Memuat data...">
            </div>

            <div class="input-group">
                <label>Nominal Penarikan</label>
                <input type="number" id="input-amount-wd" class="amount-input" placeholder="Min. 50.000">
            </div>

            <div class="amt-grid">
                <button class="amt-btn" onclick="setWdAmt(50000)">50K</button>
                <button class="amt-btn" onclick="setWdAmt(100000)">100K</button>
                <button class="amt-btn" onclick="setWdAmt(500000)">500K</button>
            </div>

            <button class="btn-main" id="btn-wd" onclick="prosesWithdraw()">KONFIRMASI PENARIKAN</button>
        </div>

        <div class="history-sec">
            <label>Riwayat Penarikan</label>
            <div id="wd-history">
                <div style="text-align:center; padding:20px; opacity:0.3; font-size:12px;">Memuat riwayat...</div>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-box">
            <h3 id="m-title" style="color:var(--pink); font-family:'Cinzel Decorative'; font-size:18px">INFO</h3>
            <p id="m-msg" style="margin:20px 0; font-size:14px; color:#ccc; line-height:1.5;"></p>
            <button class="btn-main" onclick="closeModal()" style="font-size:14px; padding:12px;">OKE</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        async function loadProfileData() {
            const user = getUsername();
            if(!user) return;

            try {
                const { data, error } = await _supabase
                    .from('profiles')
                    .select('nama_lengkap, rekening, bank_name')
                    .eq('username', user)
                    .single();

                if (data) {
                    document.getElementById('wd-name-field').value = data.nama_lengkap || 'Belum diatur';
                    document.getElementById('wd-rek-field').value = data.rekening || 'Belum diatur';
                    document.getElementById('wd-method-field').value = data.bank_name || 'Belum diatur';
                    
                    // Jika data bank kosong, arahkan ke profil
                    if(!data.rekening) {
                        showModal("LENGKAPI DATA", "Mohon lengkapi data rekening di menu profil terlebih dahulu.");
                    }
                }
            } catch (err) {
                console.error("Gagal load profil:", err);
            }
        }

        function setWdAmt(v) {
            document.getElementById('input-amount-wd').value = v;
        }

        async function prosesWithdraw() {
            const amt = parseFloat(document.getElementById('input-amount-wd').value);
            const user = getUsername();
            const cachedSaldo = parseFloat(localStorage.getItem('cached_saldo')) || 0;
            const btn = document.getElementById('btn-wd');

            if (!amt || amt < 50000) return showModal("MINIMAL", "Penarikan minimal IDR 50.000");
            if (amt > cachedSaldo) return showModal("SALDO KURANG", "Saldo Anda tidak mencukupi untuk penarikan ini.");
            
            // Cek apakah data rekening sudah ada
            if (document.getElementById('wd-rek-field').value === 'Belum diatur') {
                return showModal("DATA KOSONG", "Silahkan atur nomor rekening di menu profil.");
            }

            btn.disabled = true;
            btn.innerText = "MEMPROSES...";

            try {
                // 1. Kirim permintaan WD
                const { error: wdError } = await NeonTransaksi.kirimWithdraw(amt);
                if (wdError) throw wdError;

                // 2. Potong saldo di profiles (Update database)
                const newSaldo = cachedSaldo - amt;
                const { error: profileError } = await _supabase
                    .from('profiles')
                    .update({ saldo: newSaldo })
                    .eq('username', user);

                if (profileError) throw profileError;

                showModal("BERHASIL", "Permintaan withdraw telah dikirim. Saldo Anda telah dipotong dan admin akan memproses dana ke rekening Anda.");
                document.getElementById('input-amount-wd').value = "";
                
                // Update tampilan saldo secara instan
                syncNeonData(); 
                loadHistory();

            } catch (err) {
                showModal("ERROR", err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "KONFIRMASI PENARIKAN";
            }
        }

        async function loadHistory() {
            const user = getUsername();
            const { data } = await _supabase.from('withdrawals').select('*').eq('username', user).order('created_at', { ascending: false }).limit(5);
            
            let html = "";
            if (data && data.length > 0) {
                data.forEach(i => {
                    const statusColor = i.status === 'SUKSES' ? '#00ff00' : (i.status === 'GAGAL' ? '#ff0000' : 'var(--yellow)');
                    html += `
                        <div class="history-item">
                            <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px;">
                                <span style="font-weight:800; color:var(--cyan)">PENARIKAN</span>
                                <span style="color:${statusColor}; font-weight:800">${i.status}</span>
                            </div>
                            <div style="font-size:16px; font-weight:900;">IDR ${i.amount.toLocaleString()}</div>
                            <div style="font-size:10px; opacity:0.5; margin-top:3px;">${new Date(i.created_at).toLocaleString('id-ID')}</div>
                        </div>
                    `;
                });
            } else {
                html = '<div style="text-align:center; padding:20px; opacity:0.3; font-size:12px;">Belum ada riwayat penarikan</div>';
            }
            document.getElementById('wd-history').innerHTML = html;
        }

        function showModal(t, m) {
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-msg').innerText = m;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        window.onload = () => {
            loadProfileData();
            loadHistory();
        };
    </script>
</body>
</html>
