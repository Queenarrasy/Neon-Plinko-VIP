<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>WITHDRAW VIP - NEON PLINKO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root {
          --pink: #ff0077; --blue: #0055ff; --cyan: #00f2ff; --yellow: #f5e642; --bg: #02030d;
          --gp: 0 0 10px rgba(255, 0, 119, 0.5), 0 0 20px rgba(255, 0, 119, 0.2);
          --gb: 0 0 10px rgba(0, 85, 255, 0.5), 0 0 20px rgba(0, 85, 255, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; background-image: radial-gradient(ellipse 70% 50% at 50% 100%, rgba(255,0,119,0.08) 0%, transparent 70%); }

        .header { height: 65px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(2, 3, 13, 0.95); border-bottom: 1px solid var(--pink); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .logo { font-family: 'Cinzel Decorative'; color: var(--pink); font-size: 14px; text-shadow: var(--gp); font-weight: 900; }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        .saldo-card { background: rgba(255,255,255,0.03); border: 1px solid var(--pink); border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 20px; box-shadow: var(--gp); }
        .saldo-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); margin-bottom: 8px; text-transform: uppercase; }
        .saldo-val { font-family: 'Cinzel Decorative'; font-size: 28px; font-weight: 900; color: var(--yellow); text-shadow: 0 0 15px rgba(245,230,66,0.4); }

        .form-box { background: rgba(5,6,20,0.8); border: 1px solid rgba(0,85,255,0.2); padding: 25px; border-radius: 25px; box-shadow: var(--gb); }
        label { display: block; font-size: 10px; font-weight: 800; color: var(--cyan); text-transform: uppercase; margin-bottom: 10px; }
        
        input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--blue); border-radius: 12px; color: #fff; font-size: 14px; outline: none; margin-bottom: 20px; }
        .amount-input { font-size: 24px !important; font-weight: 900 !important; color: var(--yellow) !important; text-align: center; }

        .amt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .amt-btn { background: rgba(0,85,255,0.1); border: 1px solid var(--blue); color: #fff; padding: 12px; border-radius: 12px; font-size: 12px; font-weight: 800; cursor: pointer; }
        
        .btn-main { width: 100%; padding: 18px; border-radius: 50px; border: none; background: linear-gradient(90deg, var(--pink), #b400dc); color: #fff; font-family: 'Cinzel Decorative'; font-weight: 900; font-size: 15px; box-shadow: var(--gp); cursor: pointer; }
        .btn-main:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

        .history-item { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid var(--pink); display: flex; justify-content: space-between; align-items: center; }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-box { width: 85%; max-width: 320px; background: #0a0b1e; border: 2px solid var(--pink); border-radius: 30px; padding: 30px; text-align: center; }
    </style>
</head>
<body>

    <audio id="snd-click" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b417f73c.mp3"></audio>
    <audio id="snd-success" src="https://cdn.pixabay.com/audio/2021/08/04/audio_062564a02d.mp3"></audio>
    <audio id="snd-error" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c36394595e.mp3"></audio>

    <div class="header">
        <a href="game.html" onclick="playSnd('click')" style="color:#fff; font-size:20px;"><i class="fa-solid fa-chevron-left"></i></a>
        <div class="logo">WITHDRAW CENTER</div>
        <div style="width:40px"></div>
    </div>

    <div class="container">
        <div class="saldo-card">
            <div class="saldo-label">SALDO DAPAT DITARIK</div>
            <div class="saldo-val" id="display-saldo-wd">IDR 0</div>
        </div>

        <div class="form-box">
            <label>Tujuan Pencairan (E-Wallet/Bank)</label>
            <input type="text" id="wd-rek-info" readonly placeholder="Mencari data rekening...">

            <label>Nominal Penarikan (Min 50.000)</label>
            <input type="number" id="input-amount-wd" class="amount-input" placeholder="0">

            <div class="amt-grid">
                <button class="amt-btn" onclick="setWdAmt(50000)">50K</button>
                <button class="amt-btn" onclick="setWdAmt(100000)">100K</button>
                <button class="amt-btn" onclick="setWdAmt(500000)">500K</button>
            </div>

            <button class="btn-main" id="btn-wd-submit" onclick="prosesWithdraw()">KONFIRMASI PENARIKAN</button>
        </div>

        <div style="margin-top:30px;">
            <label>Riwayat Penarikan Terakhir</label>
            <div id="wd-history-list"></div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-box">
            <h3 id="m-title" style="color:var(--pink); font-family:'Cinzel Decorative';">NOTIFIKASI</h3>
            <p id="m-msg" style="margin:20px 0; font-size:14px; color:#ccc;"></p>
            <button class="btn-main" onclick="closeModal()">MENGERTI</button>
        </div>
    </div>

    <script>
        let isSubmitting = false;
        let currentSaldo = 0;

        function playSnd(type) {
            const s = document.getElementById('snd-' + type);
            if(s) { s.currentTime = 0; s.play(); }
        }

        // FUNGSI LOAD DATA USER & REKENING
        async function loadWdData() {
            const user = getUsername();
            if(!user) return;

            try {
                // Fetch data terbaru dari Supabase
                const { data, error } = await _supabase.from('profiles').select('*').eq('username', user).single();
                
                if (data) {
                    currentSaldo = Number(data.saldo);
                    document.getElementById('display-saldo-wd').innerText = "IDR " + currentSaldo.toLocaleString('id-ID');
                    
                    // Cek jika rekening ada
                    if(data.bank_name && data.rekening) {
                        document.getElementById('wd-rek-info').value = `${data.bank_name.toUpperCase()} - ${data.rekening} (${data.nama_lengkap})`;
                    } else {
                        document.getElementById('wd-rek-info').value = "REKENING BELUM DISET";
                        document.getElementById('wd-rek-info').style.color = "var(--pink)";
                    }
                }
            } catch (err) {
                console.error("Load Error:", err);
            }
        }

        function setWdAmt(v) {
            playSnd('click');
            document.getElementById('input-amount-wd').value = v;
        }

        async function prosesWithdraw() {
            if(isSubmitting) return;

            const amt = parseInt(document.getElementById('input-amount-wd').value) || 0;
            const user = getUsername();
            const rek = document.getElementById('wd-rek-info').value;

            // VALIDASI AWAL
            if (rek.includes("BELUM DISET") || rek === "") {
                playSnd('error');
                return showModal("GAGAL", "Harap lengkapi nomor rekening di menu Profil sebelum menarik saldo.");
            }
            if (amt < 50000) {
                playSnd('error');
                return showModal("MINIMAL", "Penarikan minimal adalah IDR 50.000");
            }
            if (amt > currentSaldo) {
                playSnd('error');
                return showModal("SALDO KURANG", "Saldo Anda tidak mencukupi untuk melakukan penarikan ini.");
            }

            // LOCK SISTEM & TOMBOL
            isSubmitting = true;
            const btn = document.getElementById('btn-wd-submit');
            btn.disabled = true;
            btn.innerText = "MEMPROSES PENCATATAN...";

            try {
                // 1. Masukkan ke tabel withdrawals
                const { error: errWd } = await _supabase.from('withdrawals').insert([{
                    username: user,
                    amount: amt,
                    status: 'PROSES'
                }]);
                if(errWd) throw errWd;

                // 2. Potong Saldo di Profiles (Deduction on Request)
                const { error: errSaldo } = await _supabase.from('profiles')
                    .update({ saldo: currentSaldo - amt })
                    .eq('username', user);
                if(errSaldo) throw errSaldo;

                playSnd('success');
                showModal("SUKSES", "Permintaan tarik saldo berhasil dikirim! Saldo Anda telah dipotong sementara menunggu persetujuan admin.");
                
                // Reset form & Refresh data
                document.getElementById('input-amount-wd').value = "";
                await loadWdData();
                await loadWdHistory();

            } catch (err) {
                playSnd('error');
                showModal("ERROR", "Terjadi kesalahan: " + err.message);
                // Buka kunci jika gagal sistem (agar bisa coba lagi)
                isSubmitting = false;
                btn.disabled = false;
                btn.innerText = "KONFIRMASI PENARIKAN";
            }
        }

        async function loadWdHistory() {
            const user = getUsername();
            const { data } = await _supabase.from('withdrawals').select('*').eq('username', user).order('created_at', { ascending: false }).limit(5);
            
            let html = "";
            if (data && data.length > 0) {
                data.forEach(i => {
                    let color = "#f5e642"; // PROSES
                    if(i.status === 'SUKSES') color = "#00ff88";
                    if(i.status === 'GAGAL') color = "#ff0077";

                    html += `
                        <div class="history-item" style="border-left-color:${color}">
                            <div>
                                <div style="font-size:10px; font-weight:800; color:var(--cyan)">PENARIKAN VIP</div>
                                <div style="font-size:16px; font-weight:900;">Rp ${i.amount.toLocaleString()}</div>
                            </div>
                            <div style="text-align:right;">
                                <div style="font-size:11px; font-weight:800; color:${color}">${i.status}</div>
                                <div style="font-size:8px; opacity:0.4;">${new Date(i.created_at).toLocaleDateString()}</div>
                            </div>
                        </div>`;
                });
            } else {
                html = '<p style="text-align:center; opacity:0.3; font-size:12px; padding:20px;">Belum ada riwayat penarikan</p>';
            }
            document.getElementById('wd-history-list').innerHTML = html;
        }

        function showModal(t, m) {
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-msg').innerText = m;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() { 
            playSnd('click'); 
            document.getElementById('modal-overlay').style.display = 'none'; 
            // Jika sukses, kembalikan status tombol
            isSubmitting = false;
            document.getElementById('btn-wd-submit').disabled = false;
            document.getElementById('btn-wd-submit').innerText = "KONFIRMASI PENARIKAN";
        }

        window.onload = () => {
            loadWdData();
            loadWdHistory();
        };
    </script>
</body>
</html>
