<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WITHDRAW VIP - NEON</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #070816; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: rgba(255,255,255,0.02); border: 2px solid #ff0077; border-radius: 20px; padding: 20px; max-width: 400px; margin: auto; }
        .wd-balance { background: #000; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; border: 1px solid #ff0077; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #fbff00; background: #000; color: white; margin-bottom: 15px; box-sizing: border-box; }
        .btn-wd { width: 100%; padding: 15px; background: #ff0077; border: none; color: white; font-weight: 900; border-radius: 8px; cursor: pointer; }
        .history-section { margin-top: 20px; text-align: left; }
        .history-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; border-left: 3px solid #fbff00; }
    </style>
</head>
<body>
    <div class="card">
        <h3>WITHDRAW</h3>
        <div class="wd-balance">
            <p style="font-size:10px;margin:0;">SALDO ANDA</p>
            <h2 id="display-saldo">IDR 0</h2>
        </div>
        <input type="number" id="wd-amount" placeholder="Nominal (Min 50.000)">
        <button class="btn-wd" onclick="prosesWD()">AJUKAN WD</button>
        <div class="history-section">
            <p style="font-size:10px;font-weight:bold;">RIWAYAT WD</p>
            <div id="wd-history-list"></div>
        </div>
        <a href="game.html" style="display:block;margin-top:20px;color:white;text-decoration:none;font-size:12px;">KEMBALI</a>
    </div>

    <script src="global.js"></script>
    <script>
        async function prosesWD() {
            const amt = document.getElementById('wd-amount').value;
            if(amt < 50000) return alert("Min 50rb");
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'withdraw', username: user, amount: amt })
                });
                const data = await res.json();
                alert(data.result === "SUCCESS" ? "Berhasil!" : data.message);
                loadWDHistory();
            } catch(e) { alert("Error"); }
        }
        async function loadWDHistory() {
            const container = document.getElementById('wd-history-list');
            try {
                const resp = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "getWDHistory", username: user })
                });
                const data = await resp.json();
                if(data.result === "SUCCESS" && data.history) {
                    container.innerHTML = data.history.map(h => `
                        <div class="history-item">
                            <div><div style="font-size:10px;">WD</div><div style="font-size:8px;">${h.tgl}</div></div>
                            <div style="text-align:right;"><div style="font-size:11px;">IDR ${Number(h.nominal).toLocaleString()}</div><div style="font-size:8px;">${h.status}</div></div>
                        </div>`).join('');
                }
            } catch(e) {}
        }
        loadWDHistory();
    </script>
</body>
</html>
