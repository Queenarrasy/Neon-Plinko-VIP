<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WITHDRAW - NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root{
--pink:#ff0077;
--blue:#0044ff;
--yellow:#fbff00;
--bg:#03040a;

--neon-pink:0 0 15px rgba(255,0,119,0.9);
--neon-blue:0 0 15px rgba(0,68,255,0.9);
--neon-yellow:0 0 15px rgba(251,255,0,0.9);
}

body{
margin:0;
background:linear-gradient(180deg,#02030a,#05071a);
font-family:'Segoe UI',Tahoma;
color:white;
}

/* HEADER */
.header{
padding:20px;
background:rgba(0,0,0,0.9);
border-bottom:2px solid var(--blue);
display:flex;
justify-content:space-between;
align-items:center;
}
.btn-back{color:white;font-size:20px;text-decoration:none;}

/* CONTAINER */
.container{padding:20px;}

/* BALANCE */
.balance-card{
border:2px solid var(--pink);
border-radius:15px;
padding:20px;
text-align:center;
margin-bottom:20px;
box-shadow:var(--neon-pink);
background:rgba(255,0,119,0.05);
}
.bal-value{
font-size:24px;
font-weight:900;
color:var(--yellow);
text-shadow:var(--neon-yellow);
}

/* CARD */
.card{
border:2px solid var(--blue);
border-radius:15px;
padding:20px;
margin-bottom:20px;
box-shadow:var(--neon-blue);
background:rgba(0,68,255,0.05);
}

.label{
font-size:11px;
color:var(--pink);
font-weight:bold;
display:block;
margin-bottom:6px;
letter-spacing:1px;
}

input{
width:100%;
padding:12px;
background:#000;
border:1px solid var(--blue);
border-radius:8px;
color:white;
margin-bottom:15px;
}
input:read-only{
opacity:0.7;
border-color:#333;
}

.btn-withdraw{
width:100%;
padding:15px;
border-radius:50px;
background:linear-gradient(90deg,var(--pink),var(--blue));
color:white;
font-weight:900;
border:2px solid var(--yellow);
cursor:pointer;
box-shadow:var(--neon-pink);
}

/* HISTORY */
.history-title{
font-weight:900;
color:var(--yellow);
margin-bottom:10px;
display:flex;
gap:10px;
align-items:center;
}

.history-wrapper{
border:2px solid var(--yellow);
border-radius:15px;
padding:15px;
box-shadow:var(--neon-yellow);
max-height:260px;
overflow-y:auto;
background:rgba(251,255,0,0.05);
}

.history-wrapper::-webkit-scrollbar{width:6px;}
.history-wrapper::-webkit-scrollbar-thumb{
background:var(--pink);
border-radius:10px;
box-shadow:var(--neon-pink);
}

.history-item{
border:1px solid var(--blue);
border-radius:10px;
padding:12px;
margin-bottom:10px;
background:rgba(0,0,0,0.5);
position:relative;
}

/* Glow terbaru */
@keyframes glowPulse{
0%{box-shadow:0 0 5px var(--pink);}
50%{box-shadow:0 0 20px var(--blue);}
100%{box-shadow:0 0 5px var(--pink);}
}
.latest{
animation:glowPulse 1.5s infinite;
}

.badge-new{
position:absolute;
top:-8px;
right:-8px;
background:var(--pink);
color:white;
font-size:9px;
padding:4px 6px;
border-radius:10px;
font-weight:bold;
box-shadow:var(--neon-pink);
}

.status-badge{
padding:2px 8px;
border-radius:4px;
font-size:9px;
}
.status-proses{background:rgba(251,255,0,0.2);color:var(--yellow);}
.status-sukses{background:rgba(0,255,0,0.2);color:#00ff00;}
.status-gagal{background:rgba(255,0,0,0.2);color:#ff4444;}

.hist-top{display:flex;justify-content:space-between;font-weight:bold;}
.hist-time{font-size:10px;color:#aaa;}

/* NEON MODAL */
#neon-modal{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#0a0b1e;
padding:25px;
border-radius:15px;
z-index:9999;
text-align:center;
min-width:280px;
animation:fadeIn 0.3s ease;
}
@keyframes fadeIn{from{opacity:0;scale:0.8;}to{opacity:1;scale:1;}}

.modal-btn{
margin-top:15px;
padding:10px 25px;
border-radius:50px;
border:2px solid var(--yellow);
background:transparent;
color:var(--yellow);
cursor:pointer;
}

</style>
</head>
<body>

<div id="neon-modal">
<h3 id="modal-title"></h3>
<p id="modal-msg"></p>
<button class="modal-btn" onclick="closeModal()">OK</button>
</div>

<div class="header">
<a href="game.html" class="btn-back"><i class="fa-solid fa-circle-chevron-left"></i></a>
<div style="font-weight:900;letter-spacing:2px;">PENARIKAN DANA</div>
<div style="width:20px;"></div>
</div>

<div class="container">

<div class="balance-card">
<div>SALDO DAPAT DITARIK</div>
<div class="bal-value" id="wd-balance">IDR 0</div>
</div>

<div class="card">
<span class="label">NAMA LENGKAP</span>
<input type="text" id="wd-account-name" readonly>

<span class="label">NOMOR REKENING</span>
<input type="text" id="wd-account-num" readonly>

<span class="label">BANK / E-WALLET</span>
<input type="text" id="wd-method" readonly>

<span class="label">NOMINAL PENARIKAN (IDR)</span>
<input type="number" id="wd-amount" placeholder="Minimal 50,000">

<button class="btn-withdraw" onclick="processWithdraw()">AJUKAN PENARIKAN</button>
</div>

<div class="history-title">
<i class="fa-solid fa-clock-rotate-left"></i> RIWAYAT PENARIKAN
</div>

<div class="history-wrapper" id="wd-history">
<div style="text-align:center;color:#555;padding:20px;">Belum ada riwayat transaksi</div>
</div>

</div>

<script src="global.js"></script>
<script>
/**
 * withdraw.html — semua logika server ditangani global.js (v11.0)
 * File ini HANYA berisi override closeModal agar gaya warna konsisten,
 * dan guard login. Tidak ada fungsi duplikat yang bisa bentrok.
 */

// Override closeModal agar tombol OK di modal ini tetap berfungsi
function closeModal() {
  document.getElementById("neon-modal").style.display = "none";
}

// Guard: pastikan sudah login sebelum halaman dimuat
// (DOMContentLoaded di global.js sudah handle initWithdraw otomatis)
window.addEventListener("load", function() {
  if (!getUsername()) {
    location.href = "index.html";
  }
});
</script>

</body>
</html>
