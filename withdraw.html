<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WITHDRAW - NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root{
--pink:#ff0077;
--blue:#0044ff;
--yellow:#fbff00;
--bg:#03040a;
--neon-pink:0 0 15px rgba(255,0,119,0.9);
--neon-blue:0 0 15px rgba(0,68,255,0.9);
--neon-yellow:0 0 15px rgba(251,255,0,0.9);
}

body{
margin:0;
background:linear-gradient(180deg,#02030a,#05071a);
font-family:'Segoe UI',Tahoma;
color:white;
}

/* HEADER */
.header{
padding:20px;
background:rgba(0,0,0,0.9);
border-bottom:2px solid var(--blue);
display:flex;
justify-content:space-between;
align-items:center;
}
.btn-back{color:white;font-size:20px;text-decoration:none;}

/* CONTAINER */
.container{padding:20px;}

/* BALANCE */
.balance-card{
border:2px solid var(--pink);
border-radius:15px;
padding:20px;
text-align:center;
margin-bottom:20px;
box-shadow:var(--neon-pink);
background:rgba(255,0,119,0.05);
}
.bal-value{
font-size:24px;
font-weight:900;
color:var(--yellow);
text-shadow:var(--neon-yellow);
}

/* CARD */
.card{
border:2px solid var(--blue);
border-radius:15px;
padding:20px;
margin-bottom:20px;
box-shadow:var(--neon-blue);
background:rgba(0,68,255,0.05);
}

.label{
font-size:11px;
color:var(--pink);
font-weight:bold;
display:block;
margin-bottom:6px;
letter-spacing:1px;
}

input{
width:100%;
padding:12px;
background:#000;
border:1px solid var(--blue);
border-radius:8px;
color:white;
margin-bottom:15px;
box-sizing: border-box;
}

.btn-withdraw{
width:100%;
padding:15px;
border-radius:50px;
background:linear-gradient(90deg,var(--pink),var(--blue));
color:white;
font-weight:900;
border:2px solid var(--yellow);
cursor:pointer;
box-shadow:var(--neon-pink);
}

.btn-withdraw:disabled { opacity: 0.5; cursor: not-allowed; }

/* HISTORY */
.history-title{
font-weight:900;
color:var(--yellow);
margin-bottom:10px;
display:flex;
gap:10px;
align-items:center;
}

.history-wrapper{
border:2px solid var(--yellow);
border-radius:15px;
padding:15px;
box-shadow:var(--neon-yellow);
max-height:300px;
overflow-y:auto;
background:rgba(251,255,0,0.05);
}

.history-item{
border:1px solid var(--blue);
border-radius:10px;
padding:12px;
margin-bottom:10px;
background:rgba(0,0,0,0.5);
position:relative;
}

.latest{ animation:glowPulse 1.5s infinite; }
@keyframes glowPulse{
0%{box-shadow:0 0 5px var(--pink);}
50%{box-shadow:0 0 15px var(--blue);}
100%{box-shadow:0 0 5px var(--pink);}
}

.status-badge{ padding:2px 8px; border-radius:4px; font-size:10px; font-weight: bold; text-transform: uppercase;}
.status-proses{background:rgba(251,255,0,0.2);color:var(--yellow);}
.status-sukses{background:rgba(0,255,0,0.2);color:#00ff00;}
.status-gagal{background:rgba(255,0,0,0.2);color:#ff4444;}

.hist-top{display:flex;justify-content:space-between;font-weight:bold;}
.hist-time{font-size:10px;color:#aaa;margin-top:5px;}

/* MODAL */
#neon-modal{
display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
background:#0a0b1e; padding:25px; border-radius:15px; z-index:9999;
text-align:center; min-width:280px; border:2px solid var(--pink);
}
.modal-btn{ margin-top:15px; padding:10px 25px; border-radius:50px; border:2px solid var(--yellow); background:transparent; color:var(--yellow); cursor:pointer;}
</style>
</head>
<body>

<div id="neon-modal">
<h3 id="modal-title"></h3>
<p id="modal-msg"></p>
<button class="modal-btn" onclick="closeModal()">OK</button>
</div>

<div class="header">
<a href="game.html" class="btn-back"><i class="fa-solid fa-circle-chevron-left"></i></a>
<div style="font-weight:900;letter-spacing:2px;">PENARIKAN DANA</div>
<div style="width:20px;"></div>
</div>

<div class="container">
    <div class="balance-card">
        <div>SALDO DAPAT DITARIK</div>
        <div class="bal-value" id="wd-balance">IDR 0</div>
    </div>

    <div class="card">
        <span class="label">NAMA LENGKAP</span>
        <input type="text" id="wd-account-name" readonly placeholder="Memuat...">
        <span class="label">NOMOR REKENING</span>
        <input type="text" id="wd-account-num" readonly placeholder="Memuat...">
        <span class="label">BANK / E-WALLET</span>
        <input type="text" id="wd-method" readonly placeholder="Memuat...">
        <span class="label">NOMINAL PENARIKAN (IDR)</span>
        <input type="number" id="wd-amount" placeholder="Minimal 50,000">
        <button class="btn-withdraw" id="btn-wd" onclick="processWithdraw()">AJUKAN PENARIKAN</button>
    </div>

    <div class="history-title">
        <i class="fa-solid fa-clock-rotate-left"></i> RIWAYAT PENARIKAN
    </div>
    <div class="history-wrapper" id="wd-history">
        <div style="text-align:center;color:#555;padding:20px;">Memuat riwayat...</div>
    </div>
</div>

<script src="global.js"></script>
<script>
let lastApproveStatus = null;

function showModal(title, msg, color = "var(--pink)") {
    document.getElementById("modal-title").innerText = title;
    document.getElementById("modal-msg").innerText = msg;
    document.getElementById("neon-modal").style.border = "2px solid " + color;
    document.getElementById("neon-modal").style.display = "block";
}
function closeModal() { document.getElementById("neon-modal").style.display = "none"; }

async function updateData() {
    const user = localStorage.getItem('username');
    if (!user) return;
    
    // Ambil data profil (Nama, Bank, Rek) dari global.js / Server
    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'getUserData', username: user })
        });
        const res = await response.json();
        if (res.result === "SUCCESS") {
            document.getElementById("wd-account-name").value = res.fullname || "-";
            document.getElementById("wd-account-num").value = res.rekening || "-";
            document.getElementById("wd-method").value = res.bank || "-";
            document.getElementById('wd-balance').innerText = "IDR " + Number(res.saldo).toLocaleString();
            localStorage.setItem('user_saldo', res.saldo);
        }
    } catch (e) { console.error("Gagal sinkron data"); }
}

async function loadWithdrawHistory() {
    const user = localStorage.getItem('username');
    const container = document.getElementById("wd-history");
    
    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'getHistory', sheet: 'Withdraw', username: user })
        });
        const res = await response.json();

        if (res.result === "SUCCESS" && res.data.length > 0) {
            container.innerHTML = "";
            // Urutkan dari yang terbaru (asumsi baris bawah adalah terbaru di Sheet)
            const history = res.data.reverse().slice(0, 10); 

            history.forEach((item, index) => {
                // Indeks kolom berdasarkan App Script Anda (A=0, B=1, ... G=6)
                // item[0]=Tanggal, item[5]=Jumlah, item[6]=Status
                let status = item[6].toLowerCase();
                let statusClass = status.includes('berhasil') || status.includes('approve') ? 'status-sukses' : 
                                 status.includes('gagal') || status.includes('reject') ? 'status-gagal' : 'status-proses';
                
                let latestClass = index === 0 ? 'latest' : '';

                container.innerHTML += `
                    <div class="history-item ${latestClass}">
                        <div class="hist-top">
                            <span>WITHDRAW</span>
                            <span class="status-badge ${statusClass}">${item[6]}</span>
                        </div>
                        <div style="color:var(--yellow);font-weight:bold;font-size:15px;margin:5px 0;">
                            IDR ${Number(item[5]).toLocaleString()}
                        </div>
                        <div class="hist-time">${item[0]}</div>
                    </div>`;
            });
        } else {
            container.innerHTML = '<div style="text-align:center;color:#555;padding:20px;">Belum ada riwayat transaksi</div>';
        }
    } catch (e) {
        container.innerHTML = '<div style="text-align:center;color:red;padding:20px;">Gagal memuat riwayat</div>';
    }
}

async function processWithdraw() {
    const amount = Number(document.getElementById("wd-amount").value);
    const saldo = Number(localStorage.getItem("user_saldo") || 0);
    const btn = document.getElementById("btn-wd");

    if (amount < 50000) return showModal("GAGAL ❌", "Minimal penarikan IDR 50.000");
    if (amount > saldo) return showModal("SALDO KURANG ❌", "Saldo kamu tidak mencukupi");

    btn.disabled = true;
    btn.innerText = "MEMPROSES...";

    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'withdraw',
                username: localStorage.getItem('username'),
                amount: amount
            })
        });
        const res = await response.json();

        if (res.result === "SUCCESS") {
            showModal("BERHASIL ✅", "Permintaan penarikan dikirim!", "var(--blue)");
            document.getElementById("wd-amount").value = "";
            await updateData();
            await loadWithdrawHistory();
        } else {
            showModal("GAGAL ❌", res.message || "Terjadi kesalahan");
        }
    } catch (e) {
        showModal("ERROR ❌", "Koneksi terputus");
    } finally {
        btn.disabled = false;
        btn.innerText = "AJUKAN PENARIKAN";
    }
}

// Sinkronisasi otomatis setiap 10 detik
async function loadWithdrawHistory() {
    const user = localStorage.getItem('username');
    const container = document.getElementById("wd-history");
    
    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ 
                action: 'getHistory', 
                sheet: 'Withdraw', 
                username: user 
            })
        });
        const res = await response.json();

        if (res.result === "SUCCESS" && res.data.length > 0) {
            container.innerHTML = "";
            // Membalikkan data agar yang terbaru di atas
            const history = res.data.reverse(); 

            history.forEach((item) => {
                // SESUAIKAN INDEKS DI BAWAH INI JIKA KOLOM BERBEDA
                let tanggal = item[0]; // Kolom A
                let jumlah  = item[5]; // Kolom F
                let status  = item[6] ? item[6].toLowerCase() : "proses"; // Kolom G
                
                let statusClass = status.includes('berhasil') || status.includes('approve') ? 'status-sukses' : 
                                 status.includes('gagal') || status.includes('reject') ? 'status-gagal' : 'status-proses';

                container.innerHTML += `
                    <div class="history-item">
                        <div class="hist-top">
                            <span>WITHDRAW</span>
                            <span class="status-badge ${statusClass}">${status.toUpperCase()}</span>
                        </div>
                        <div style="color:var(--yellow);font-weight:bold;font-size:15px;margin:5px 0;">
                            IDR ${Number(jumlah).toLocaleString()}
                        </div>
                        <div class="hist-time">${tanggal}</div>
                    </div>`;
            });
        } else {
            container.innerHTML = '<div style="text-align:center;color:#555;padding:20px;">Belum ada riwayat withdraw</div>';
        }
    } catch (e) {
        console.error(e);
        container.innerHTML = '<div style="text-align:center;color:red;padding:20px;">Gagal memuat riwayat</div>';
    }
}


window.onload = () => {
    if (!localStorage.getItem('username')) {
        location.href = "index.html";
    } else {
        updateData();
        loadWithdrawHistory();
    }
};
</script>
</body>
</html>
