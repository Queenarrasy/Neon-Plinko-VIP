<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>WITHDRAW - NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff0077; --blue: #0055ff; --yellow: #f5e642; --bg: #02030d;
            --card: rgba(255, 255, 255, .025);
            --gp: 0 0 8px rgba(255, 0, 119, .5), 0 0 22px rgba(255, 0, 119, .15);
            --gb: 0 0 8px rgba(0, 85, 255, .5), 0 0 22px rgba(0, 85, 255, .15);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; margin: 0; padding: 0; padding-bottom: 100px; }
        
        /* Header */
        .header {
            padding: 15px; text-align: center; border-bottom: 1px solid var(--pink);
            background: rgba(2, 3, 13, 0.95); position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between;
        }
        .btn-back { color: #fff; text-decoration: none; padding: 0 15px; font-size: 1.2rem; }
        .header h2 { 
            margin: 0; font-family: 'Cinzel Decorative'; font-size: 1.1rem; 
            color: var(--pink); text-shadow: var(--gp); flex-grow: 1;
        }

        .container { max-width: 500px; margin: auto; padding: 20px; }
        
        .profile-info { background: var(--card); border: 1px solid rgba(255, 0, 119, 0.2); padding: 18px; border-radius: 16px; margin-bottom: 20px; box-shadow: var(--gp); }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; }
        .label { opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
        .value { color: #fff; font-weight: 600; }

        .form-group { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        label { display: block; margin-bottom: 12px; font-weight: 700; color: var(--yellow); font-size: 0.9rem; letter-spacing: 1px; }
        .input-wrapper { position: relative; }
        .input-wrapper span { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--yellow); font-weight: 700; }
        input { width: 100%; padding: 15px 15px 15px 45px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 10px; font-size: 1.2rem; outline: none; transition: 0.3s; font-family: 'Outfit'; }
        input:focus { border-color: var(--pink); background: rgba(255,0,119,0.05); }
        
        .btn-withdraw { width: 100%; padding: 16px; background: linear-gradient(90deg, var(--pink), #aa0044); border: none; color: #fff; font-weight: 900; border-radius: 12px; cursor: pointer; box-shadow: var(--gp); transition: 0.3s; font-family: 'Cinzel Decorative'; font-size: 1rem; letter-spacing: 2px; }
        .btn-withdraw:active { transform: scale(0.98); }
        .btn-withdraw:disabled { background: #222; box-shadow: none; cursor: not-allowed; opacity: 0.5; }

        .history-section { margin-top: 30px; }
        .history-title { font-family: 'Cinzel Decorative'; font-size: 0.9rem; color: var(--pink); border-bottom: 1px solid rgba(255,0,119,0.3); padding-bottom: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .history-item { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .status-proses { color: var(--yellow); background: rgba(245,230,66,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; }
        .status-berhasil { color: #00ff88; background: rgba(0,255,136,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; }
        .status-gagal { color: #ff4444; background: rgba(255,68,68,0.1); padding: 2px 8px; border-radius: 4px; font-size: 10px; }

        /* Nav Bar Bottom */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(5, 6, 20, 0.95); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); z-index: 1000; }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 0.7rem; flex: 1; }
        .nav-item.active { color: var(--pink); }
        .nav-item i { font-size: 1.2rem; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="header">
    <a href="game.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
    <h2>PENARIKAN VIP</h2>
    <div style="width:45px"></div>
</div>

<div class="container">
    <div class="profile-info">
        <div class="info-row">
            <span class="label">Penerima:</span>
            <span class="value" id="wd-fullname">...</span>
        </div>
        <div class="info-row">
            <span class="label">Bank/Wallet:</span>
            <span class="value" id="wd-bank">...</span>
        </div>
        <div class="info-row">
            <span class="label">No. Rekening:</span>
            <span class="value" id="wd-rekening">...</span>
        </div>
        <div class="info-row" style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; margin-top: 12px;">
            <span class="label" style="color:var(--yellow)">SALDO TERSEDIA:</span>
            <span class="value" id="wd-saldo" style="color: var(--yellow); font-size: 1.1rem;">Rp 0</span>
        </div>
    </div>

    <div class="form-group">
        <label>NOMINAL PENARIKAN</label>
        <div class="input-wrapper">
            <span>Rp</span>
            <input type="number" id="amount-wd" placeholder="Min. 50.000">
        </div>
        <p style="font-size: 10px; margin-top: 12px; opacity: 0.5; line-height: 1.4;">
            * Penarikan akan diproses ke rekening terdaftar di atas.<br>
            * Estimasi waktu proses 5-15 menit.
        </p>
    </div>

    <button class="btn-withdraw" id="btn-submit-wd" onclick="handleWithdraw()">KONFIRMASI WD</button>

    <div class="history-section">
        <div class="history-title"><i class="fas fa-history"></i> RIWAYAT WD TERAKHIR</div>
        <div id="wd-history">
            </div>
    </div>
</div>

<div class="nav-bar">
    <a href="game.html" class="nav-item"><i class="fas fa-gamepad"></i>PLAY</a>
    <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i>DEPO</a>
    <a href="reward.html" class="nav-item"><i class="fas fa-gift"></i>REWARD</a>
    <a href="profil.html" class="nav-item"><i class="fas fa-user"></i>PROFIL</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
const user = localStorage.getItem('user_neon');
let currentSaldo = 0;

async function loadWithdrawPage() {
    if (!user) {
        window.location.href = 'index.html';
        return;
    }
    
    // Ambil data user terbaru
    const { data: profile, error } = await _supabase
        .from('profiles')
        .select('*')
        .eq('username', user)
        .single();

    if (profile) {
        currentSaldo = profile.saldo;
        document.getElementById('wd-fullname').innerText = profile.nama_lengkap;
        document.getElementById('wd-bank').innerText = profile.bank_name;
        document.getElementById('wd-rekening').innerText = profile.rekening;
        document.getElementById('wd-saldo').innerText = "Rp " + profile.saldo.toLocaleString('id-ID');
        
        loadHistoryWD();
    }
}

async function handleWithdraw() {
    const amount = parseInt(document.getElementById('amount-wd').value);
    const btn = document.getElementById('btn-submit-wd');

    if (isNaN(amount) || amount < 50000) return alert("Minimal penarikan adalah Rp 50.000");
    if (amount > currentSaldo) return alert("Saldo Anda tidak mencukupi untuk melakukan penarikan ini.");

    if (!confirm(`Tarik saldo sebesar Rp ${amount.toLocaleString()}?`)) return;

    btn.disabled = true;
    btn.innerText = "MENGIRIM...";

    try {
        // 1. Masukkan ke tabel withdraws (untuk diproses Admin)
        const { error: errorTrans } = await _supabase
            .from('withdraws')
            .insert([{
                username: user,
                nominal: amount,
                status: 'PROSES'
            }]);

        if (errorTrans) throw errorTrans;

        // 2. Potong Saldo Langsung
        const { error: errorUpdate } = await _supabase
            .from('profiles')
            .update({ saldo: currentSaldo - amount })
            .eq('username', user);

        if (errorUpdate) throw errorUpdate;

        alert("Permintaan Withdraw Berhasil! Mohon tunggu tim admin memproses dana Anda.");
        location.reload();

    } catch (err) {
        alert("Gagal: " + err.message);
        btn.disabled = false;
        btn.innerText = "KONFIRMASI WD";
    }
}

async function loadHistoryWD() {
    const { data, error } = await _supabase
        .from('withdraws')
        .select('*')
        .eq('username', user)
        .order('created_at', { ascending: false })
        .limit(10);

    const container = document.getElementById('wd-history');
    if (data && data.length > 0) {
        container.innerHTML = data.map(item => `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <span style="font-size:11px; opacity:0.5;">${new Date(item.created_at).toLocaleString('id-ID')}</span>
                    <span class="status-${item.status.toLowerCase()}">${item.status}</span>
                </div>
                <div style="font-weight:bold; color:var(--pink); font-size:1.1rem;">
                    - Rp ${item.nominal.toLocaleString('id-ID')}
                </div>
            </div>
        `).join('');
    } else {
        container.innerHTML = '<div style="text-align:center; opacity:0.3; padding:20px; font-size:0.8rem;">Belum ada riwayat penarikan.</div>';
    }
}

window.onload = loadWithdrawPage;
</script>

</body>
</html>
