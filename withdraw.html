<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>WITHDRAW — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root{
            --pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--bg:#000005;
            --gp:0 0 8px rgba(255,0,119,.5),0 0 20px rgba(255,0,119,.2);
            --gb:0 0 8px rgba(0,34,255,.5),0 0 20px rgba(0,34,255,.2);
            --gy:0 0 8px rgba(251,255,0,.5),0 0 20px rgba(251,255,0,.2);
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;min-height:100vh;padding-bottom:80px;}
        #particles-js{position:fixed;width:100%;height:100%;z-index:0;pointer-events:none;background:radial-gradient(circle at 70% 60%,#180005 0%,#000 100%);}

        #neon-alert{position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:88%;max-width:340px;background:rgba(0,0,15,.97);border:1.5px solid var(--pink);border-top:2px solid var(--yellow);color:#fff;padding:12px 18px;border-radius:14px;text-align:center;font-weight:900;z-index:9000;font-size:13px;transition:.5s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 0 18px rgba(255,0,119,.35);}
        #neon-alert.show{top:15px;}
        #neon-alert.success{border-color:var(--blue);box-shadow:0 0 18px rgba(0,34,255,.35);}

        .header{height:62px;padding:0 18px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,18,.98);border-bottom:1.5px solid var(--pink);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);box-shadow:0 0 15px rgba(255,0,119,.15);}
        .logo{font-size:14px;font-weight:900;color:var(--pink);text-shadow:0 0 8px rgba(255,0,119,.5);letter-spacing:1px;text-transform:uppercase;}

        .container{padding:18px;max-width:500px;margin:auto;position:relative;z-index:10;}

        .saldo-card{background:rgba(0,0,35,.75);border:1.5px solid var(--yellow);border-radius:20px;padding:22px;text-align:center;margin-bottom:18px;box-shadow:0 0 12px rgba(251,255,0,.15);backdrop-filter:blur(10px);}
        .saldo-label{font-size:10px;font-weight:800;color:rgba(255,255,255,.45);letter-spacing:3px;text-transform:uppercase;margin-bottom:7px;}
        .saldo-val{font-size:28px;font-weight:900;color:var(--yellow);text-shadow:0 0 10px rgba(251,255,0,.4);letter-spacing:1px;}

        .form-box{background:rgba(0,0,35,.75);border:1px solid rgba(0,34,255,.3);padding:22px;border-radius:20px;box-shadow:0 0 15px rgba(0,34,255,.12);backdrop-filter:blur(10px);}
        label{display:block;font-size:10px;font-weight:900;color:var(--yellow);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;}

        input[type=text],input[type=number]{width:100%;padding:13px 15px;background:#000;border:1px solid rgba(0,34,255,.4);border-radius:12px;color:#fff;font-size:13px;outline:none;margin-bottom:18px;transition:.3s;font-family:'Outfit',sans-serif;}
        input:focus{border-color:var(--pink);box-shadow:0 0 10px rgba(255,0,119,.2);}
        input[readonly]{color:rgba(255,255,255,.55);cursor:default;}
        .amount-input{font-size:22px!important;font-weight:900!important;color:var(--yellow)!important;text-align:center;text-shadow:0 0 8px rgba(251,255,0,.3);}

        .amt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
        .amt-btn{background:rgba(0,34,255,.1);border:1px solid rgba(0,34,255,.35);color:#fff;padding:11px;border-radius:10px;font-size:12px;font-weight:900;cursor:pointer;transition:.2s;font-family:'Outfit',sans-serif;}
        .amt-btn:active{background:var(--blue);box-shadow:0 0 10px rgba(0,34,255,.3);}

        .btn-main{width:100%;padding:16px;border-radius:50px;border:none;background:linear-gradient(90deg,var(--pink),#b400dc);color:#fff;font-weight:900;font-size:13px;box-shadow:0 0 12px rgba(255,0,119,.3);cursor:pointer;transition:.2s;letter-spacing:1px;text-transform:uppercase;font-family:'Outfit',sans-serif;}
        .btn-main:active{transform:scale(.96);}
        .btn-main:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(1);}

        /* HISTORY TABLE with own scroll */
        .hist-wrap{background:rgba(0,0,35,.7);border:1px solid rgba(0,34,255,.25);border-radius:18px;overflow:hidden;margin-top:18px;}
        .hist-scroll{max-height:220px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--pink) #000;}
        .hist-scroll::-webkit-scrollbar{width:3px;}
        .hist-scroll::-webkit-scrollbar-track{background:#000;}
        .hist-scroll::-webkit-scrollbar-thumb{background:var(--pink);border-radius:2px;}
        table.ht{width:100%;border-collapse:collapse;}
        table.ht th{padding:9px 12px;font-size:8px;font-weight:900;color:var(--pink);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,0,119,.2);background:rgba(0,0,15,.8);text-align:left;position:sticky;top:0;z-index:5;}
        table.ht td{padding:10px 12px;font-size:11px;border-bottom:1px solid rgba(0,34,255,.08);font-weight:700;}
        table.ht tr:last-child td{border-bottom:none;}
        .empty-row td{text-align:center;padding:22px!important;opacity:.35;font-size:12px;}

        #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
        .modal-box{width:88%;max-width:320px;background:rgba(0,0,15,.99);border:1.5px solid var(--pink);border-top:2px solid var(--yellow);border-radius:22px;padding:26px;text-align:center;box-shadow:0 0 20px rgba(255,0,119,.25);animation:zoomIn .3s ease;}
        @keyframes zoomIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
        #m-title{font-size:16px;font-weight:900;color:var(--pink);text-shadow:0 0 8px rgba(255,0,119,.5);margin-bottom:11px;text-transform:uppercase;letter-spacing:1px;}
        #m-msg{font-size:13px;color:#ccc;line-height:1.6;}

        .nav-bar{position:fixed;bottom:0;left:0;width:100%;height:72px;background:rgba(0,0,15,.99);display:flex;justify-content:space-around;align-items:center;border-top:1.5px solid var(--blue);backdrop-filter:blur(20px);z-index:1000;padding-bottom:6px;box-shadow:0 -4px 16px rgba(0,34,255,.2);}
        .nav-item{color:rgba(255,255,255,.3);text-decoration:none;text-align:center;font-size:9px;font-weight:900;flex:1;transition:.3s;letter-spacing:.5px;text-transform:uppercase;}
        .nav-item.active{color:var(--pink);text-shadow:0 0 8px rgba(255,0,119,.5);}
        .nav-item i{font-size:20px;display:block;margin-bottom:3px;}
    </style>
</head>
<body>
<div id="particles-js"></div>
<div id="neon-alert">NOTIFICATION</div>
<audio id="snd-click"   src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b417f73c.mp3"></audio>
<audio id="snd-success" src="https://cdn.pixabay.com/audio/2021/08/04/audio_062564a02d.mp3"></audio>
<audio id="snd-error"   src="https://cdn.pixabay.com/audio/2022/03/10/audio_c36394595e.mp3"></audio>

<div class="header">
    <a href="game.html" onclick="playSnd('click')" style="color:rgba(255,255,255,.6);font-size:20px;"><i class="fa-solid fa-chevron-left"></i></a>
    <div class="logo"><i class="fas fa-money-bill-transfer" style="margin-right:7px;"></i>WITHDRAW CENTER</div>
    <div style="width:40px;"></div>
</div>

<div class="container">
    <div class="saldo-card">
        <div class="saldo-label"><i class="fas fa-coins" style="margin-right:5px;"></i>SALDO DAPAT DITARIK</div>
        <div class="saldo-val" id="display-saldo-wd">IDR 0</div>
    </div>

    <div class="form-box">
        <label><i class="fas fa-bank" style="margin-right:5px;"></i>Tujuan Pencairan (E-Wallet / Bank)</label>
        <input type="text" id="wd-rek-info" readonly placeholder="Mencari data rekening...">
        <label><i class="fas fa-sack-dollar" style="margin-right:5px;"></i>Nominal Penarikan (Min 50.000)</label>
        <input type="number" id="input-amount-wd" class="amount-input" placeholder="0">
        <div class="amt-grid">
            <button class="amt-btn" onclick="setWdAmt(50000)">50K</button>
            <button class="amt-btn" onclick="setWdAmt(100000)">100K</button>
            <button class="amt-btn" onclick="setWdAmt(200000)">200K</button>
            <button class="amt-btn" onclick="setWdAmt(500000)">500K</button>
            <button class="amt-btn" onclick="setWdAmt(1000000)">1 JT</button>
            <button class="amt-btn" onclick="setMaxWd()" style="border-color:var(--yellow);color:var(--yellow)">MAX</button>
        </div>
        <button class="btn-main" id="btn-wd-submit" onclick="prosesWithdraw()">
            <i class="fas fa-paper-plane"></i> KONFIRMASI PENARIKAN
        </button>
    </div>

    <div style="margin-top:8px;">
        <label style="margin-top:18px;display:block;"><i class="fas fa-clock-rotate-left"></i> Riwayat Penarikan</label>
        <div class="hist-wrap">
            <div class="hist-scroll">
                <table class="ht">
                    <thead><tr><th>Nominal</th><th>Status</th><th>Tanggal</th></tr></thead>
                    <tbody id="wd-history-body"><tr class="empty-row"><td colspan="3"><i class="fas fa-spinner fa-spin"></i> Memuat...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-box">
        <h3 id="m-title">NOTIFIKASI</h3>
        <p id="m-msg"></p>
        <button class="btn-main" onclick="closeModal()" style="margin-top:18px;">MENGERTI</button>
    </div>
</div>

<div class="nav-bar">
    <a href="game.html"     class="nav-item"><i class="fas fa-gamepad"></i>PLAY</a>
    <a href="deposit.html"  class="nav-item"><i class="fas fa-wallet"></i>DEPO</a>
    <a href="withdraw.html" class="nav-item active"><i class="fas fa-money-bill-transfer"></i>WD</a>
    <a href="reward.html"   class="nav-item"><i class="fas fa-gift"></i>REWARD</a>
    <a href="profil.html"   class="nav-item"><i class="fas fa-user-shield"></i>PROFIL</a>
</div>

<script>
let isSubmitting=false,currentSaldo=0;
const SUPA_URL="https://bgffnmwrviyqpeevzjsn.supabase.co",SUPA_KEY="sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani";
const _db=supabase.createClient(SUPA_URL,SUPA_KEY);
particlesJS("particles-js",{"particles":{"number":{"value":70},"color":{"value":"#ff0077"},"shape":{"type":"circle"},"opacity":{"value":0.5,"random":true,"anim":{"enable":true,"speed":0.5,"opacity_min":0.15}},"size":{"value":2.5,"random":true},"line_linked":{"enable":true,"distance":120,"color":"#0022ff","opacity":0.25,"width":0.8},"move":{"enable":true,"speed":1.8,"random":true,"out_mode":"out"}},"interactivity":{"events":{"onhover":{"enable":false},"onclick":{"enable":false}}}});
function playSnd(t){const s=document.getElementById('snd-'+t);if(s){s.currentTime=0;s.play().catch(()=>{});}}
function showNeonAlert(msg,ok=false){const a=document.getElementById('neon-alert');a.innerText=msg;a.className=ok?'show success':'show';setTimeout(()=>a.className='',3000);}
function getUser(){return typeof getUsername==='function'?getUsername():localStorage.getItem('neon_user');}
let pendingWdTotal=0;
async function loadWdData(){
    const user=getUser();if(!user)return;
    try{
        const{data,error}=await _db.from('profiles').select('saldo,bank_name,rekening,nama_lengkap,nomor_telp,nomor_hp').eq('username',user).single();
        if(error)throw error;
        if(data){
            currentSaldo=Number(data.saldo)||0;
            // Kurangi pending WD yang belum diproses
            const{data:pw}=await _db.from('withdrawals').select('amount').eq('username',user).eq('status','PROSES');
            pendingWdTotal=(pw||[]).reduce((s,x)=>s+Number(x.amount||0),0);
            const available=Math.max(0,currentSaldo-pendingWdTotal);
            const pendingTxt=pendingWdTotal>0?' ('+pendingWdTotal.toLocaleString('id-ID')+' pending)':'';
            document.getElementById('display-saldo-wd').innerText="IDR "+available.toLocaleString('id-ID')+pendingTxt;
            const bank=data.bank_name||'';
            const rek=data.rekening||'';
            const nama=data.nama_lengkap||'';
            const hp=data.nomor_hp||data.nomor_telp||'';
            if(bank&&rek){
                document.getElementById('wd-rek-info').value=bank.toUpperCase()+' — '+rek+(nama?' ('+nama+')':'')+(hp?' | '+hp:'');
                document.getElementById('wd-rek-info').style.color='';
            } else {
                document.getElementById('wd-rek-info').value='REKENING BELUM DISET — Lengkapi di Profil';
                document.getElementById('wd-rek-info').style.color='var(--pink)';
            }
        }
    }catch(err){console.error('loadWdData error:',err);}
}
function setWdAmt(v){playSnd('click');document.getElementById('input-amount-wd').value=v;}
function setMaxWd(){playSnd('click');const av=Math.max(0,currentSaldo-pendingWdTotal);document.getElementById('input-amount-wd').value=av;}
async function prosesWithdraw(){
    if(isSubmitting)return;
    const amt=parseInt(document.getElementById('input-amount-wd').value)||0;
    const user=getUser();
    const rek=document.getElementById('wd-rek-info').value;
    if(rek.includes("BELUM DISET")||rek===""){playSnd('error');return showModal("GAGAL","Harap lengkapi nomor rekening di menu Profil sebelum menarik saldo.");}
    if(amt<50000){playSnd('error');return showModal("MINIMAL","Penarikan minimal adalah IDR 50.000");}
    const available=Math.max(0,currentSaldo-pendingWdTotal);
    if(amt>available){playSnd('error');return showModal("SALDO KURANG","Saldo tersedia tidak cukup. Mungkin ada WD yang masih pending.");}
    isSubmitting=true;const btn=document.getElementById('btn-wd-submit');btn.disabled=true;btn.innerText="MEMPROSES...";
    try{
        // Insert request WD — TIDAK potong saldo di sini
        // Saldo dipotong SEKALI saja saat admin APPROVE di master panel
        const{error:e1}=await _db.from('withdrawals').insert([{
            username:user, amount:amt, nominal:amt, status:'PROSES'
        }]);
        if(e1)throw e1;
        playSnd('success');
        showNeonAlert("PERMINTAAN PENARIKAN TERKIRIM!",true);
        showModal("SUKSES","Permintaan WD Rp "+amt.toLocaleString('id-ID')+" berhasil dikirim!\nMenunggu persetujuan admin.\nSaldo akan dipotong setelah disetujui.");
        document.getElementById('input-amount-wd').value='';
        await loadWdData(); await loadWdHistory();
    }catch(err){
        playSnd('error');
        showModal("ERROR","Terjadi kesalahan: "+err.message);
        isSubmitting=false;
        btn.disabled=false;
        btn.innerHTML='<i class="fas fa-paper-plane"></i> KONFIRMASI PENARIKAN';
    }
}
async function loadWdHistory(){
    const user=getUser();
    if(!user)return;
    const body=document.getElementById('wd-history-body');
    if(!body)return;
    try{
        const{data,error}=await _db.from('withdrawals').select('*').eq('username',user).order('created_at',{ascending:false}).limit(20);
        if(error)throw error;
        if(data&&data.length>0){
            body.innerHTML=data.map(i=>{
                let c='var(--yellow)';
                if(i.status==='SUKSES')c='var(--yellow)';
                if(i.status==='GAGAL')c='var(--pink)';
                if(i.status==='PROSES')c='rgba(80,140,255,1)';
                return `<tr>
                    <td style="font-size:15px;font-weight:900;">Rp ${(i.amount||0).toLocaleString()}</td>
                    <td style="font-weight:900;color:${c};">${i.status}</td>
                    <td style="font-size:9px;opacity:.4;">${new Date(i.created_at).toLocaleDateString('id-ID')}</td>
                </tr>`;
            }).join('');
        } else {
            body.innerHTML='<tr class="empty-row"><td colspan="3">Belum ada riwayat penarikan</td></tr>';
        }
    }catch(err){
        console.error('loadWdHistory error:',err);
        body.innerHTML='<tr class="empty-row"><td colspan="3">Gagal memuat riwayat</td></tr>';
    }
}
function showModal(t,m){document.getElementById('m-title').innerText=t;document.getElementById('m-msg').innerText=m;document.getElementById('modal-overlay').style.display='flex';}
function closeModal(){playSnd('click');document.getElementById('modal-overlay').style.display='none';isSubmitting=false;const btn=document.getElementById('btn-wd-submit');btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> KONFIRMASI PENARIKAN';}
window.onload=async function(){
    try{ await loadWdData(); } catch(e){ console.error('loadWdData error:',e); }
    try{ await loadWdHistory(); } catch(e){ console.error('loadWdHistory error:',e); }
};
</script>
</body>
</html>
