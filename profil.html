<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>PROFIL VIP - NEON PLINKO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root{
          --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--green:#26a17b;--bg:#02030d;
          --card:rgba(255,255,255,.025);
          --gp:0 0 12px rgba(255,0,119,.5), 0 0 25px rgba(255,0,119,.2);
          --gb:0 0 12px rgba(0,85,255,.5), 0 0 25px rgba(0,85,255,.2);
          --gy:0 0 12px rgba(245,230,66,.5), 0 0 25px rgba(245,230,66,.2);
        }
        *{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
        body{
          background:var(--bg); color:#dde0f0; font-family:'Outfit',sans-serif; min-height:100vh;
          background-image: radial-gradient(circle at top right, rgba(255,0,119,0.05), transparent 400px);
          padding-bottom: 90px;
        }

        /* Header */
        .header{position:sticky;top:0;z-index:200;padding:15px 20px;background:rgba(2,3,13,.95); border-bottom:1px solid var(--blue); backdrop-filter:blur(15px); display:flex;align-items:center;justify-content:space-between;}
        .btn-back{color:#fff; font-size:18px; text-decoration:none; width:35px; height:35px; border-radius:50%; border:1px solid var(--blue); display:flex; align-items:center; justify-content:center;}
        .header-title{font-family:'Cinzel Decorative',serif; font-size:12px; font-weight:900; letter-spacing:2px; color:var(--pink); text-shadow:var(--gp);}

        .container{padding:20px; max-width:520px; margin:auto; display:flex; flex-direction:column; gap:15px;}

        /* Hero Card */
        .profile-hero{
          background: linear-gradient(135deg, #0a0b1e 0%, #15173a 100%);
          border: 1px solid var(--pink); border-radius: 25px; padding: 25px;
          display: flex; align-items: center; gap: 20px; box-shadow: var(--gp);
          position: relative; overflow: hidden;
        }
        .profile-hero::after { content:''; position:absolute; top:0; right:0; width:100px; height:100px; background:var(--pink); filter:blur(80px); opacity:0.1; }
        
        .avatar-ring{width:70px; height:70px; border-radius:50%; border:2px solid var(--pink); background:rgba(255,0,119,.1); display:flex; align-items:center; justify-content:center; box-shadow: inset 0 0 15px rgba(255,0,119,0.2);}
        .avatar-ring i{font-size:35px; color:var(--pink); text-shadow:var(--gp);}
        
        .profile-info h2{font-family:'Cinzel Decorative',serif; font-size:18px; font-weight:900; color:#fff; margin-bottom:5px; text-shadow: 0 0 10px rgba(255,255,255,0.2);}
        .profile-tier{font-size:10px; font-weight:800; letter-spacing:1px; color:var(--yellow); background:rgba(245,230,66,0.1); border:1px solid var(--yellow); padding:4px 12px; border-radius:50px; text-transform:uppercase;}

        /* Saldo */
        .saldo-card{
          background:rgba(255,255,255,0.03); border:1px solid var(--yellow); border-radius:20px; padding:25px; text-align:center; box-shadow:var(--gy);
        }
        .saldo-val{font-family:'Cinzel Decorative',serif; font-size:30px; font-weight:900; color:var(--yellow); text-shadow: 0 0 15px rgba(245,230,66,0.3);}

        /* Info List */
        .section-label{font-size:11px; font-weight:800; color:var(--blue); letter-spacing:1px; margin-top:10px; text-transform:uppercase;}
        .info-grid{display:flex; flex-direction:column; gap:8px;}
        .info-row{background:rgba(255,255,255,0.03); border:1px solid rgba(0,85,255,0.1); border-radius:15px; padding:15px 18px; display:flex; justify-content:space-between; align-items:center;}
        .info-key{font-size:10px; font-weight:600; color:rgba(255,255,255,0.4); text-transform:uppercase;}
        .info-val{font-size:13px; font-weight:700; color:#fff;}

        /* Stats */
        .stats-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
        .stat-box{background:var(--card); border-radius:18px; padding:18px; text-align:center; border:1px solid rgba(255,255,255,0.05);}
        .stat-val{font-size:15px; font-weight:900; margin-top:8px;}

        /* Buttons */
        .btn-action{width:100%; padding:16px; border-radius:50px; border:none; cursor:pointer; font-weight:800; text-transform:uppercase; font-size:14px; margin-top:10px; transition: 0.3s;}
        .btn-logout{background:linear-gradient(90deg, #ff0077, #aa0044); color:white; box-shadow:var(--gp);}
        .btn-logout:active{transform:scale(0.95); opacity:0.8;}

        /* Nav Bar Bottom */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: rgba(5, 6, 20, 0.98); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--blue); backdrop-filter: blur(20px); z-index: 1000; padding-bottom: 10px; }
        .nav-item { color: #444; text-decoration: none; text-align: center; font-size: 10px; font-weight: 700; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--pink); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="header">
  <a href="game.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
  <div class="header-title">PROFIL VIP</div>
  <div style="width:35px;"></div>
</div>

<div class="container">
  <div class="profile-hero">
    <div class="avatar-ring"><i class="fa-solid fa-crown"></i></div>
    <div class="profile-info">
      <h2 id="display-username">MEMUAT...</h2>
      <div class="profile-tier" id="profile-tier">VIP MEMBER</div>
    </div>
  </div>

  <div class="saldo-card">
    <div style="font-size:10px; opacity:0.6; letter-spacing:2px; margin-bottom:10px;">CREDIT BALANCE</div>
    <div class="saldo-val" id="display-saldo">IDR 0</div>
  </div>

  <div class="section-label">Data Pengiriman Dana</div>
  <div class="info-grid">
    <div class="info-row"><span class="info-key">Penerima</span><span class="info-val" id="profile-fullname">-</span></div>
    <div class="info-row"><span class="info-key">Kontak WA</span><span class="info-val" id="profile-phone">-</span></div>
    <div class="info-row"><span class="info-key">Bank/E-Wallet</span><span class="info-val" id="profile-bank">-</span></div>
    <div class="info-row"><span class="info-key">No Rekening</span><span class="info-val" id="profile-rek">-</span></div>
  </div>

  <div class="section-label">Aktivitas Finansial</div>
  <div class="stats-grid">
    <div class="stat-box">
      <div style="font-size:9px; opacity:0.5; font-weight:700;">TOTAL DEPOSIT</div>
      <div class="stat-val" id="total-depo" style="color:var(--blue);">IDR 0</div>
    </div>
    <div class="stat-box">
      <div style="font-size:9px; opacity:0.5; font-weight:700;">TOTAL WITHDRAW</div>
      <div class="stat-val" id="total-wd" style="color:var(--pink);">IDR 0</div>
    </div>
  </div>

  <button class="btn-action btn-logout" onclick="logout()"><i class="fa-solid fa-power-off"></i> KELUAR DARI SESI</button>
</div>

<div class="nav-bar">
    <a href="game.html" class="nav-item"><i class="fas fa-gamepad"></i>PLAY</a>
    <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i>DEPO</a>
    <a href="withdraw.html" class="nav-item"><i class="fas fa-money-bill-transfer"></i>WD</a>
    <a href="profil.html" class="nav-item active"><i class="fas fa-user-shield"></i>PROFIL</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
async function initProfile() {
    const user = getUsername();
    if (!user) return;

    try {
        // 1. Ambil Data Detail Profil
        const { data: profile, error } = await _supabase
            .from('profiles')
            .select('*')
            .eq('username', user)
            .single();

        if (profile) {
            document.getElementById('profile-fullname').innerText = profile.nama_lengkap || 'Belum diatur';
            document.getElementById('profile-phone').innerText = profile.nomor_hp || '-';
            document.getElementById('profile-bank').innerText = profile.bank_name || 'Belum diatur';
            document.getElementById('profile-rek').innerText = profile.rekening || 'Belum diatur';
            document.getElementById('profile-tier').innerText = profile.role || 'VIP MEMBER';
        }

        // 2. Hitung Statistik Transaksi
        updateStats(user);
    } catch (err) {
        console.error("Gagal memuat profil:", err);
    }
}

async function updateStats(username) {
    // Total Deposit Sukses
    const { data: depoData } = await _supabase
        .from('deposits')
        .select('net_receive')
        .eq('username', username)
        .eq('status', 'SUKSES');
    
    let sumDepo = 0;
    if (depoData) depoData.forEach(d => sumDepo += (d.net_receive || 0));
    document.getElementById('total-depo').innerText = formatIDR(sumDepo);

    // Total Withdraw Sukses
    const { data: wdData } = await _supabase
        .from('withdrawals')
        .select('amount')
        .eq('username', username)
        .eq('status', 'SUKSES');

    let sumWd = 0;
    if (wdData) wdData.forEach(w => sumWd += (w.amount || 0));
    document.getElementById('total-wd').innerText = formatIDR(sumWd);
}

// Jalankan fungsi saat halaman dimuat
window.onload = initProfile;
</script>

</body>
</html>
