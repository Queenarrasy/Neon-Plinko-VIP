<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>PROFIL VIP — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root { --pink:#ff0077; --blue:#0022ff; --yellow:#fbff00; --bg:#000005; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:var(--bg); color:#fff; font-family:'Outfit',sans-serif; min-height:100vh; padding-bottom:100px; overflow-x:hidden; }
        
        #neon-alert { position:fixed; top:-100px; left:50%; transform:translateX(-50%); width:90%; max-width:400px; background:rgba(0,0,20,0.95); border:1px solid var(--pink); padding:15px; border-radius:12px; text-align:center; z-index:10000; transition:0.5s; font-weight:700; box-shadow:0 0 15px rgba(255,0,119,0.3); }
        #neon-alert.show { top:20px; }

        .header { position:sticky; top:0; height:65px; background:rgba(0,0,20,0.9); border-bottom:1px solid var(--blue); display:flex; align-items:center; justify-content:space-between; padding:0 20px; z-index:1000; backdrop-filter:blur(10px); }
        .header-title { color:var(--pink); font-weight:900; letter-spacing:2px; text-transform:uppercase; text-shadow:0 0 10px var(--pink); }

        .container { padding:20px; max-width:500px; margin:auto; display:flex; flex-direction:column; gap:15px; }

        .card-hero { background:rgba(255,0,119,0.05); border:1.5px solid var(--pink); border-radius:20px; padding:20px; display:flex; align-items:center; gap:15px; box-shadow:0 0 15px rgba(255,0,119,0.1); }
        .avatar { width:60px; height:60px; border-radius:50%; border:2px solid var(--pink); display:flex; align-items:center; justify-content:center; background:rgba(255,0,119,0.1); font-size:24px; color:var(--pink); }
        .hero-info h2 { font-size:20px; font-weight:900; }
        .badge { font-size:10px; background:var(--yellow); color:#000; padding:2px 10px; border-radius:50px; font-weight:900; display:inline-block; margin-top:5px; }

        .card-saldo { background:rgba(251,255,0,0.05); border:1.5px solid var(--yellow); border-radius:20px; padding:25px; text-align:center; box-shadow:0 0 15px rgba(251,255,0,0.1); }
        .saldo-label { font-size:11px; opacity:0.6; letter-spacing:2px; margin-bottom:10px; }
        .saldo-val { font-size:32px; font-weight:900; color:var(--yellow); text-shadow:0 0 15px var(--yellow); }

        .section-label { font-size:11px; color:var(--blue); font-weight:900; letter-spacing:1px; margin-top:10px; display:flex; align-items:center; gap:10px; }
        .section-label::after { content:''; flex:1; height:1px; background:linear-gradient(90deg, var(--blue), transparent); }

        .info-item { background:rgba(255,255,255,0.03); border:1px solid rgba(0,34,255,0.2); padding:15px; border-radius:12px; display:flex; justify-content:space-between; align-items:center; }
        .info-label { font-size:11px; opacity:0.5; font-weight:700; text-transform:uppercase; }
        .info-value { font-size:14px; font-weight:700; }

        .stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .stat-box { background:rgba(255,255,255,0.03); padding:15px; border-radius:12px; text-align:center; border:1px solid rgba(255,255,255,0.1); }
        .stat-n { font-size:14px; font-weight:900; margin-top:5px; }

        .btn-logout { background:linear-gradient(90deg, var(--pink), #80003c); border:none; padding:18px; border-radius:50px; color:#fff; font-weight:900; cursor:pointer; margin-top:10px; box-shadow:0 0 15px rgba(255,0,119,0.3); }

        .nav-bar { position:fixed; bottom:0; left:0; width:100%; height:75px; background:#000; border-top:1px solid var(--blue); display:flex; justify-content:space-around; align-items:center; z-index:1000; }
        .nav-item { color:rgba(255,255,255,0.3); text-decoration:none; text-align:center; font-size:10px; font-weight:800; }
        .nav-item.active { color:var(--pink); }
        .nav-item i { display:block; font-size:22px; margin-bottom:4px; }
    </style>
</head>
<body>

<div id="neon-alert">PERINGATAN</div>

<div class="header">
    <a href="game.html" style="color:#fff;"><i class="fas fa-chevron-left"></i></a>
    <div class="header-title">PROFIL VIP</div>
    <div style="width:20px;"></div>
</div>

<div class="container">
    <div class="card-hero">
        <div class="avatar"><i class="fas fa-crown"></i></div>
        <div class="hero-info">
            <h2 id="u-name">LOADING...</h2>
            <div class="badge" id="u-tier">VIP MEMBER</div>
        </div>
    </div>

    <div class="card-saldo">
        <div class="saldo-label">SALDO AKUN SAAT INI</div>
        <div class="saldo-val" id="u-saldo">IDR 0</div>
    </div>

    <div class="section-label">DATA VALIDASI USER</div>
    <div class="info-item">
        <span class="info-label"><i class="fas fa-user"></i> Nama Lengkap</span>
        <span class="info-value" id="u-full">—</span>
    </div>
    <div class="info-item">
        <span class="info-label"><i class="fab fa-whatsapp"></i> WhatsApp</span>
        <span class="info-value" id="u-phone">—</span>
    </div>
    <div class="info-item">
        <span class="info-label"><i class="fas fa-university"></i> Bank / E-Wallet</span>
        <span class="info-value" id="u-bank">—</span>
    </div>
    <div class="info-item">
        <span class="info-label"><i class="fas fa-credit-card"></i> No. Rekening</span>
        <span class="info-value" id="u-rek">—</span>
    </div>
    <div class="info-item" style="border-color:var(--yellow);">
        <span class="info-label"><i class="fas fa-qrcode"></i> Kode Referral</span>
        <span class="info-value" id="u-ref" style="color:var(--yellow);">...</span>
    </div>

    <div class="section-label">RINGKASAN TRANSAKSI</div>
    <div class="stats">
        <div class="stat-box">
            <div class="info-label">TOTAL DEPOSIT</div>
            <div class="stat-n" id="u-depo" style="color:var(--blue);">IDR 0</div>
        </div>
        <div class="stat-box">
            <div class="info-label">TOTAL WITHDRAW</div>
            <div class="stat-n" id="u-wd" style="color:var(--pink);">IDR 0</div>
        </div>
    </div>

    <button class="btn-logout" onclick="handleLogout()">KELUAR DARI SESI</button>
</div>

<div class="nav-bar">
    <a href="game.html" class="nav-item"><i class="fas fa-gamepad"></i>PLAY</a>
    <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i>DEPO</a>
    <a href="withdraw.html" class="nav-item"><i class="fas fa-money-bill-transfer"></i>WD</a>
    <a href="reward.html" class="nav-item"><i class="fas fa-gift"></i>REWARD</a>
    <a href="profil.html" class="nav-item active"><i class="fas fa-user-shield"></i>PROFIL</a>
</div>

<script>
function showAlert(msg) {
    const a = document.getElementById('neon-alert');
    a.innerText = msg;
    a.className = 'show';
    setTimeout(() => a.className = '', 3000);
}

async function initProfile() {
    const user = getUsername();
    if (!user) return;

    document.getElementById('u-name').innerText = user.toUpperCase();

    try {
        // PERBAIKAN UTAMA: Menggunakan maybeSingle agar tidak error JSON
        let { data: p, error } = await _db
            .from('profiles')
            .select('*')
            .eq('username', user)
            .maybeSingle();

        if (error) throw error;

        // Jika data tidak ditemukan (user baru), otomatis buat baris di DB
        if (!p) {
            const { data: newP, error: insError } = await _db
                .from('profiles')
                .insert([{ 
                    username: user, 
                    saldo: 0, 
                    referral_code: 'REF-' + Math.random().toString(36).substring(2,7).toUpperCase() 
                }])
                .select()
                .single();
            if (insError) throw insError;
            p = newP;
        }

        // Tampilkan Data ke UI
        document.getElementById('u-saldo').innerText = formatIDR(p.saldo);
        document.getElementById('u-full').innerText = p.nama_lengkap || '—';
        document.getElementById('u-phone').innerText = p.nomor_hp || p.phone || '—';
        document.getElementById('u-bank').innerText = p.bank_name || '—';
        document.getElementById('u-rek').innerText = p.rekening || '—';
        document.getElementById('u-ref').innerText = p.referral_code || '...';
        document.getElementById('u-tier').innerText = (p.role || 'VIP MEMBER').toUpperCase();

        // Load Statistik Transaksi
        loadStats(user);

    } catch (err) {
        console.error(err);
        showAlert("Gagal memuat profil: " + err.message);
    }
}

async function loadStats(user) {
    // Hitung Total Depo Sukses
    const { data: d } = await _db.from('deposits').select('amount').eq('username', user).eq('status', 'SUKSES');
    let td = 0; if(d) d.forEach(x => td += parseFloat(x.amount || 0));
    document.getElementById('u-depo').innerText = formatIDR(td);

    // Hitung Total WD Sukses
    const { data: w } = await _db.from('withdrawals').select('amount').eq('username', user).eq('status', 'SUKSES');
    let tw = 0; if(w) w.forEach(x => tw += parseFloat(x.amount || 0));
    document.getElementById('u-wd').innerText = formatIDR(tw);
}

function handleLogout() {
    localStorage.clear();
    window.location.href = 'index.html';
}

window.onload = initProfile;
</script>
</body>
</html>
