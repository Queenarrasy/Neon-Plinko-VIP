<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>PROFIL VIP - NEON PLINKO</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--green:#26a17b;--bg:#02030d;
  --card:rgba(255,255,255,.025);
  --gp:0 0 8px rgba(255,0,119,.5),0 0 22px rgba(255,0,119,.15);
  --gb:0 0 8px rgba(0,85,255,.5),0 0 22px rgba(0,85,255,.15);
  --gy:0 0 8px rgba(245,230,66,.5),0 0 22px rgba(245,230,66,.13);
  --bp:rgba(255,0,119,.32);--bb:rgba(0,85,255,.32);--by:rgba(245,230,66,.32);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  background-image:radial-gradient(ellipse 70% 50% at 10% 5%,rgba(0,55,255,.06) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 90% 95%,rgba(255,0,119,.05) 0%,transparent 70%);
  color:#dde0f0;font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;
}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px);}

/* HEADER */
.header{position:sticky;top:0;z-index:200;padding:13px 18px;background:rgba(2,3,13,.93);
  border-bottom:1px solid var(--bb);backdrop-filter:blur(18px);
  display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 20px rgba(0,85,255,.1);}
.btn-back{color:rgba(255,255,255,.6);font-size:15px;text-decoration:none;
  width:32px;height:32px;border:1px solid var(--bb);border-radius:50%;
  display:flex;align-items:center;justify-content:center;transition:.3s;}
.btn-back:hover{color:#fff;border-color:var(--blue);box-shadow:var(--gb);}
.header-title{font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;letter-spacing:2px;
  background:linear-gradient(90deg,var(--pink),#dd66ff 40%,var(--yellow));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(5px);z-index:9998;}
#neon-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(160deg,#07091d,#0b0d24);border-radius:22px;z-index:9999;
  padding:28px 24px;text-align:center;min-width:280px;max-width:320px;width:88%;
  border:1px solid var(--bp);box-shadow:var(--gp);animation:mpop .3s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes mpop{from{opacity:0;transform:translate(-50%,-50%) scale(.7)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
#modal-title{font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;color:var(--yellow);margin-bottom:8px;letter-spacing:1px;}
#modal-msg{font-size:12px;color:rgba(220,220,240,.65);line-height:1.7;}
.modal-btn{margin-top:16px;padding:9px 26px;border-radius:50px;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;
  background:transparent;border:1px solid var(--by);color:var(--yellow);transition:.25s;}
.modal-btn:hover{background:rgba(245,230,66,.1);}

/* LOGOUT MODAL */
#logout-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(5px);z-index:9998;}
#logout-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(160deg,#07091d,#0b0d24);border-radius:22px;z-index:9999;
  padding:28px 24px;text-align:center;min-width:280px;max-width:300px;width:85%;
  border:1px solid var(--bp);box-shadow:var(--gp);}
.logout-btns{display:flex;gap:10px;margin-top:18px;}
.btn-cancel{flex:1;padding:11px;border-radius:50px;border:1px solid var(--bb);
  background:transparent;color:#7799ff;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;}
.btn-confirm{flex:1;padding:11px;border-radius:50px;border:none;
  background:linear-gradient(90deg,rgba(255,0,119,.7),rgba(150,0,50,.6));
  color:#fff;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;}

/* CONTAINER */
.container{padding:16px;max-width:520px;margin:auto;position:relative;z-index:1;display:flex;flex-direction:column;gap:12px;}

/* PROFILE HERO */
.profile-hero{
  background:linear-gradient(135deg,#08021e 0%,#110636 55%,#09021c 100%);
  border:1px solid var(--bp);border-radius:22px;padding:22px 18px;
  box-shadow:var(--gp);display:flex;align-items:center;gap:15px;
  animation:fadeUp .4s ease both;
}
.avatar-ring{width:64px;height:64px;border-radius:50%;border:2px solid var(--bp);
  background:rgba(255,0,119,.08);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;box-shadow:var(--gp);}
.avatar-ring i{font-size:32px;color:var(--pink);}
.profile-name{font-family:'Cinzel Decorative',serif;font-size:15px;font-weight:700;color:#fff;
  text-shadow:var(--gp);margin-bottom:5px;}
.profile-tier{font-size:9px;font-weight:600;letter-spacing:2px;color:var(--yellow);
  background:rgba(245,230,66,.08);border:1px solid rgba(245,230,66,.25);
  padding:3px 10px;border-radius:50px;display:inline-block;}

/* SALDO */
.saldo-card{
  background:var(--card);border:1px solid var(--by);border-radius:20px;padding:20px;
  text-align:center;box-shadow:var(--gy);animation:fadeUp .4s ease both .05s;
}
.saldo-lbl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,.4);margin-bottom:8px;}
.saldo-val{font-family:'Cinzel Decorative',serif;font-size:26px;font-weight:900;color:var(--yellow);
  text-shadow:var(--gy);}

/* INFO GRID */
.info-grid{display:flex;flex-direction:column;gap:10px;animation:fadeUp .4s ease both .1s;}
.info-row{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:14px;
  padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
.info-key{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(255,255,255,.35);}
.info-val{font-size:12px;font-weight:500;color:rgba(255,255,255,.85);text-align:right;max-width:60%;}

/* STATS */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;animation:fadeUp .4s ease both .12s;}
.stat-box{background:var(--card);border-radius:14px;padding:14px;text-align:center;}
.stat-box.dep{border:1px solid var(--bb);}
.stat-box.wd{border:1px solid var(--bp);}
.stat-lbl{font-size:8px;font-weight:600;letter-spacing:1.5px;color:rgba(255,255,255,.35);margin-bottom:5px;}
.stat-val{font-size:13px;font-weight:700;}
.stat-box.dep .stat-val{color:#7799ff;}
.stat-box.wd .stat-val{color:#ff88cc;}

/* REF BOX */
.ref-box{background:var(--card);border:1px solid rgba(245,230,66,.2);border-radius:14px;
  padding:14px 16px;display:flex;justify-content:space-between;align-items:center;
  animation:fadeUp .4s ease both .14s;}
.ref-lbl{font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.35);}
.ref-val{font-size:15px;font-weight:700;letter-spacing:3px;color:var(--yellow);}

/* BUTTONS */
.btn-action{display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:14px;border-radius:50px;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;letter-spacing:.8px;
  text-decoration:none;transition:all .3s;text-transform:uppercase;}
.btn-game{background:linear-gradient(90deg,rgba(0,85,255,.7),rgba(0,30,150,.6));
  color:#fff;border:1px solid var(--bb);box-shadow:var(--gb);animation:fadeUp .4s ease both .16s;}
.btn-game:hover{transform:translateY(-2px);box-shadow:0 0 28px rgba(0,85,255,.45);}
.btn-logout{background:linear-gradient(90deg,rgba(255,0,119,.65),rgba(100,0,40,.5));
  color:#fff;border:1px solid var(--bp);box-shadow:var(--gp);animation:fadeUp .4s ease both .18s;}
.btn-logout:hover{transform:translateY(-2px);box-shadow:0 0 28px rgba(255,0,119,.4);}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.sec-lbl{display:flex;align-items:center;gap:8px;font-size:9px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;opacity:.45;margin-top:4px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,currentColor,transparent);opacity:.4;}
</style>
</head>
<body>

<div id="modal-overlay" onclick="closeModal()"></div>
<div id="neon-modal">
  <div id="modal-title">INFO</div>
  <div id="modal-msg"></div>
  <button class="modal-btn" onclick="closeModal()">Oke</button>
</div>

<div id="logout-overlay" onclick="closeLogout()"></div>
<div id="logout-modal">
  <div style="font-family:'Cinzel Decorative',serif;font-size:12px;color:var(--pink);margin-bottom:10px;">LOGOUT</div>
  <p style="font-size:13px;color:rgba(220,220,240,.65);">Keluar dari sesi VIP?</p>
  <div class="logout-btns">
    <button class="btn-cancel" onclick="closeLogout()">BATAL</button>
    <button class="btn-confirm" onclick="confirmLogout()">KELUAR</button>
  </div>
</div>

<div class="header">
  <a href="game.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
  <div class="header-title">Profil VIP</div>
  <div style="width:32px;"></div>
</div>

<div class="container">

  <div class="profile-hero">
    <div class="avatar-ring"><i class="fa-solid fa-circle-user"></i></div>
    <div>
      <div class="profile-name" id="profile-username">---</div>
      <div class="profile-tier" id="profile-tier">MEMUAT...</div>
    </div>
  </div>

  <div class="saldo-card">
    <div class="saldo-lbl">Saldo Utama</div>
    <div class="saldo-val" id="display-saldo">IDR 0</div>
  </div>

  <div class="sec-lbl" style="color:var(--blue)"><i class="fa-solid fa-id-card"></i> Data Akun</div>
  <div class="info-grid">
    <div class="info-row"><span class="info-key">Nama Lengkap</span><span class="info-val" id="profile-fullname">—</span></div>
    <div class="info-row"><span class="info-key">No. HP</span><span class="info-val" id="profile-phone">—</span></div>
    <div class="info-row"><span class="info-key">Bank / E-Wallet</span><span class="info-val" id="profile-bank">—</span></div>
    <div class="info-row"><span class="info-key">Nomor Rekening</span><span class="info-val" id="profile-rek">—</span></div>
  </div>

  <div class="sec-lbl" style="color:var(--yellow)"><i class="fa-solid fa-chart-bar"></i> Statistik</div>
  <div class="stats-row">
    <div class="stat-box dep">
      <div class="stat-lbl">Total Deposit</div>
      <div class="stat-val" id="total-depo">IDR 0</div>
    </div>
    <div class="stat-box wd">
      <div class="stat-lbl">Total Withdraw</div>
      <div class="stat-val" id="total-wd">IDR 0</div>
    </div>
  </div>

  <div class="sec-lbl" style="color:var(--yellow)"><i class="fa-solid fa-share-nodes"></i> Referral</div>
  <div class="ref-box">
    <div>
      <div class="ref-lbl">KODE REFERRAL KAMU</div>
      <div class="ref-val" id="profile-refcode">—</div>
    </div>
    <button onclick="copyRefCode()" style="background:rgba(245,230,66,.1);border:1px solid rgba(245,230,66,.3);
      color:var(--yellow);padding:8px 14px;border-radius:50px;cursor:pointer;
      font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;">Salin</button>
  </div>

  <a href="game.html" class="btn-action btn-game"><i class="fa-solid fa-gamepad"></i> Kembali ke Game</a>
  <button class="btn-action btn-logout" onclick="showLogoutModal()"><i class="fa-solid fa-right-from-bracket"></i> Logout Akun</button>

</div>

<script src="global.js"></script>
<script>
function closeModal(){
  document.getElementById('neon-modal').style.display='none';
  document.getElementById('modal-overlay').style.display='none';
}
function showLogoutModal(){
  document.getElementById('logout-overlay').style.display='block';
  document.getElementById('logout-modal').style.display='block';
}
function closeLogout(){
  document.getElementById('logout-overlay').style.display='none';
  document.getElementById('logout-modal').style.display='none';
}
function confirmLogout(){
  userLogout();
}
function copyRefCode(){
  const code=document.getElementById('profile-refcode').innerText;
  if(code&&code!=='—'){
    navigator.clipboard.writeText(code).then(()=>{
      showModal('DISALIN ✅','Kode referral berhasil disalin!','#f5e642');
    }).catch(()=>{
      showModal('KODE REFERRAL',code,'#f5e642');
    });
  }
}
function showModal(title,msg,color){
  document.getElementById('modal-title').innerText=title;
  document.getElementById('modal-msg').innerText=msg;
  const m=document.getElementById('neon-modal');
  if(color){m.style.borderColor=color;m.style.boxShadow='0 0 20px '+color;}
  document.getElementById('neon-modal').style.display='block';
  document.getElementById('modal-overlay').style.display='block';
}
window.addEventListener('load',()=>{
  if(!localStorage.getItem('username'))location.href='index.html';
});
</script>
</body>
</html>
