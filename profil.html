<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>PROFIL VIP - NEON PLINKO</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--green:#26a17b;--bg:#02030d;
  --card:rgba(255,255,255,.025);
  --gp:0 0 8px rgba(255,0,119,.5),0 0 22px rgba(255,0,119,.15);
  --gb:0 0 8px rgba(0,85,255,.5),0 0 22px rgba(0,85,255,.15);
  --gy:0 0 8px rgba(245,230,66,.5),0 0 245,230,66,.13;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:#dde0f0;font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;
  padding-bottom: 80px;
}
.header{position:sticky;top:0;z-index:200;padding:13px 18px;background:rgba(2,3,13,.93);
  border-bottom:1px solid var(--blue);backdrop-filter:blur(18px);
  display:flex;align-items:center;justify-content:space-between;}
.btn-back{color:rgba(255,255,255,.6);font-size:15px;text-decoration:none;
  width:32px;height:32px;border:1px solid var(--blue);border-radius:50%;
  display:flex;align-items:center;justify-content:center;}
.header-title{font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;letter-spacing:2px;
  background:linear-gradient(90deg,var(--pink),#dd66ff 40%,var(--yellow));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.container{padding:16px;max-width:520px;margin:auto;display:flex;flex-direction:column;gap:12px;}

/* PROFILE HERO */
.profile-hero{
  background:linear-gradient(135deg,#08021e 0%,#110636 55%,#09021c 100%);
  border:1px solid var(--pink);border-radius:22px;padding:22px 18px;
  display:flex;align-items:center;gap:15px;box-shadow:var(--gp);
}
.avatar-ring{width:64px;height:64px;border-radius:50%;border:2px solid var(--pink);
  background:rgba(255,0,119,.08);display:flex;align-items:center;justify-content:center;}
.avatar-ring i{font-size:32px;color:var(--pink);}
.profile-name{font-family:'Cinzel Decorative',serif;font-size:15px;font-weight:700;color:#fff;}
.profile-tier{font-size:9px;font-weight:600;letter-spacing:2px;color:var(--yellow);
  background:rgba(245,230,66,.08);border:1px solid rgba(245,230,66,.25);
  padding:3px 10px;border-radius:50px;display:inline-block;text-transform: uppercase;}

.saldo-card{
  background:var(--card);border:1px solid var(--yellow);border-radius:20px;padding:20px;
  text-align:center;box-shadow:var(--gy);
}
.saldo-val{font-family:'Cinzel Decorative',serif;font-size:26px;font-weight:900;color:var(--yellow);}

.info-grid{display:flex;flex-direction:column;gap:10px;}
.info-row{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:14px;
  padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
.info-key{font-size:9px;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;}
.info-val{font-size:12px;color:#fff;}

.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-box{background:var(--card);border-radius:14px;padding:14px;text-align:center;border:1px solid rgba(255,255,255,0.1);}
.stat-val{font-size:13px;font-weight:700;margin-top:5px;}

.btn-action{width:100%;padding:14px;border-radius:50px;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;margin-top:5px; transition: 0.3s;}
.btn-logout{background:linear-gradient(90deg, #ff0077, #aa0044); color:white; box-shadow:var(--gp);}

/* Nav Bar Bottom */
.nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: rgba(5, 6, 20, 0.95); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); z-index: 1000; }
.nav-item { color: #555; text-decoration: none; text-align: center; font-size: 0.7rem; flex: 1; }
.nav-item.active { color: var(--blue); }
.nav-item i { font-size: 1.2rem; display: block; margin-bottom: 4px; }
</style>
</head>
<body>

<div class="header">
  <a href="game.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
  <div class="header-title">PROFIL VIP</div>
  <div style="width:32px;"></div>
</div>

<div class="container">
  <div class="profile-hero">
    <div class="avatar-ring"><i class="fa-solid fa-circle-user"></i></div>
    <div>
      <div class="profile-name" id="profile-username">MEMUAT...</div>
      <div class="profile-tier" id="profile-tier">MEMUAT...</div>
    </div>
  </div>

  <div class="saldo-card">
    <div style="font-size:9px; opacity:0.5; letter-spacing:2px;">TOTAL SALDO</div>
    <div class="saldo-val" id="display-saldo">Rp 0</div>
  </div>

  <div style="font-size:10px; color:var(--blue); font-weight:700; margin-top:10px;">DATA REKENING</div>
  <div class="info-grid">
    <div class="info-row"><span class="info-key">Nama Lengkap</span><span class="info-val" id="profile-fullname">-</span></div>
    <div class="info-row"><span class="info-key">No. WhatsApp</span><span class="info-val" id="profile-phone">-</span></div>
    <div class="info-row"><span class="info-key">Bank / E-Wallet</span><span class="info-val" id="profile-bank">-</span></div>
    <div class="info-row"><span class="info-key">Nomor Rekening</span><span class="info-val" id="profile-rek">-</span></div>
  </div>

  <div style="font-size:10px; color:var(--yellow); font-weight:700; margin-top:10px;">RINGKASAN AKTIVITAS</div>
  <div class="stats-row">
    <div class="stat-box">
      <div style="font-size:8px; opacity:0.5;">DEPOSIT BERHASIL</div>
      <div class="stat-val" id="total-depo" style="color:var(--blue);">Rp 0</div>
    </div>
    <div class="stat-box">
      <div style="font-size:8px; opacity:0.5;">WITHDRAW BERHASIL</div>
      <div class="stat-val" id="total-wd" style="color:var(--pink);">Rp 0</div>
    </div>
  </div>

  <button class="btn-action btn-logout" onclick="handleLogout()"><i class="fa-solid fa-power-off"></i> KELUAR SESI VIP</button>
</div>

<div class="nav-bar">
    <a href="game.html" class="nav-item"><i class="fas fa-gamepad"></i>PLAY</a>
    <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i>DEPO</a>
    <a href="reward.html" class="nav-item"><i class="fas fa-gift"></i>REWARD</a>
    <a href="profil.html" class="nav-item active"><i class="fas fa-user"></i>PROFIL</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
const user = localStorage.getItem('user_neon');

async function loadProfile() {
    if (!user) {
        window.location.href = 'index.html';
        return;
    }

    // 1. Ambil data profil dari Supabase
    const { data: profile, error } = await _supabase
        .from('profiles')
        .select('*')
        .eq('username', user)
        .single();

    if (profile) {
        document.getElementById('profile-username').innerText = profile.username.toUpperCase();
        document.getElementById('profile-tier').innerText = profile.role || 'MEMBER';
        document.getElementById('display-saldo').innerText = "Rp " + profile.saldo.toLocaleString('id-ID');
        document.getElementById('profile-fullname').innerText = profile.nama_lengkap || '-';
        document.getElementById('profile-phone').innerText = profile.nomor_hp || '-';
        document.getElementById('profile-bank').innerText = profile.bank_name || '-';
        document.getElementById('profile-rek').innerText = profile.rekening || '-';
        
        // Load statistik transaksi
        loadStats();
    }
}

async function loadStats() {
    // Hitung total deposit berhasil
    const { data: depoData } = await _supabase
        .from('deposits')
        .select('nominal')
        .eq('username', user)
        .eq('status', 'BERHASIL');
    
    let totalDepo = 0;
    if (depoData) depoData.forEach(d => totalDepo += d.nominal);
    document.getElementById('total-depo').innerText = "Rp " + totalDepo.toLocaleString('id-ID');

    // Hitung total withdraw berhasil (asumsi ada tabel withdraws)
    const { data: wdData } = await _supabase
        .from('withdraws')
        .select('nominal')
        .eq('username', user)
        .eq('status', 'BERHASIL');

    let totalWd = 0;
    if (wdData) wdData.forEach(w => totalWd += w.nominal);
    document.getElementById('total-wd').innerText = "Rp " + totalWd.toLocaleString('id-ID');
}

async function handleLogout() {
    if (confirm("Apakah Anda yakin ingin keluar dari sesi VIP?")) {
        // Update status di Supabase jika perlu (opsional)
        await _supabase.from('profiles').update({ status: 'OFFLINE' }).eq('username', user);
        
        localStorage.removeItem('user_neon');
        window.location.href = 'index.html';
    }
}

window.onload = loadProfile;
</script>

</body>
</html>
