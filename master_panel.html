<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>SUPREME OMEGA V15.4 — ULTIMATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --pink: #ff0077; --blue: #0022ff; --yellow: #fbff00; --bg: #000005;
            --gp: 0 0 10px #ff0077; --gb: 0 0 10px #0022ff; --gy: 0 0 10px #fbff00;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--yellow); font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh; }
        
        #canvas-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.3; }
        
        /* Header */
        .header { background: rgba(0,0,10,0.9); padding: 12px 15px; border-bottom: 2px solid var(--blue); position: relative; z-index: 100; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--gb); }
        
        /* Sticky Report Top */
        .top-stats { background: rgba(0,0,0,0.8); padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; border-bottom: 1px solid rgba(0,34,255,0.3); position: relative; z-index: 90; }
        .stat-box { text-align: center; border-right: 1px solid rgba(255,255,255,0.1); }
        .stat-box:last-child { border-right: none; }
        .stat-box small { display: block; font-size: 7px; color: var(--pink); font-weight: 900; }
        .stat-box b { font-size: 10px; color: #fff; }

        /* Alphabet Grid */
        .alpha-nav { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; padding: 10px; background: rgba(0,0,20,0.9); border-bottom: 1px solid var(--blue); }
        .alpha-btn { background: #000; border: 1px solid rgba(0,34,255,0.4); color: #fff; font-size: 10px; padding: 5px 0; text-align: center; cursor: pointer; border-radius: 4px; }
        .alpha-btn.active { border-color: var(--pink); color: var(--pink); box-shadow: var(--gp); }

        /* Main Content */
        .content { height: calc(100vh - 245px); overflow-y: auto; padding: 15px; position: relative; z-index: 10; }
        .card { background: rgba(0,0,30,0.7); border: 1px solid var(--blue); border-radius: 12px; padding: 12px; margin-bottom: 15px; box-shadow: var(--gb); position: relative; overflow: hidden; }
        .card::after { content: ''; position: absolute; top: 0; right: 0; width: 40px; height: 40px; background: linear-gradient(45deg, transparent 50%, rgba(0,34,255,0.1) 50%); }

        /* Labels & Inputs */
        .lbl { font-size: 8px; color: var(--pink); font-weight: 900; margin-bottom: 4px; display: block; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .in-box { background: rgba(0,0,0,0.5); border: 1px solid rgba(0,34,255,0.4); padding: 6px; border-radius: 6px; }
        input { width: 100%; background: transparent; border: none; color: #fff; font-size: 12px; font-weight: 600; outline: none; text-align: center; }
        
        .btn { background: var(--blue); color: #fff; border: none; padding: 10px; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 10px; letter-spacing: 1px; width: 100%; margin-top: 8px; }
        .btn-pink { background: var(--pink); box-shadow: var(--gp); }
        .btn-yellow { background: var(--yellow); color: #000; }

        /* Footer Nav */
        .footer { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; border-top: 1px solid var(--blue); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { color: rgba(255,255,255,0.3); text-align: center; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--pink); text-shadow: var(--gp); }
        .nav-item i { font-size: 18px; }
        .nav-item p { font-size: 8px; margin-top: 4px; font-weight: 900; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 10px; }
    </style>
</head>
<body>
    <canvas id="canvas-bg"></canvas>

    <div class="header">
        <span style="font-family:'Cinzel Decorative'; color:var(--pink); font-size:18px;">SUPREME <span style="color:var(--yellow)">OMEGA</span></span>
        <div id="p-timer" style="font-size:10px; font-weight:900; color:var(--pink)">SYSTEM STABLE</div>
    </div>

    <div class="top-stats">
        <div class="stat-box"><small>DAY DEPO</small><b id="s-dd">0</b></div>
        <div class="stat-box"><small>DAY WD</small><b id="s-dw">0</b></div>
        <div class="stat-box"><small>TOT DEPO</small><b id="s-td">0</b></div>
        <div class="stat-box"><small>TOT WD</small><b id="s-tw">0</b></div>
    </div>

    <div id="alpha-nav-container" class="alpha-nav"></div>

    <div class="content" id="main-content">
        <div id="tab-user" class="page"></div>
        <div id="tab-kasir" class="page" style="display:none;"></div>
        <div id="tab-gift" class="page" style="display:none;"></div>
        <div id="tab-stat" class="page" style="display:none;"></div>
    </div>

    <nav class="footer">
        <div class="nav-item active" onclick="switchTab('user', this)"><i class="fas fa-users"></i><p>PLAYERS</p></div>
        <div class="nav-item" onclick="switchTab('kasir', this)"><i class="fas fa-cash-register"></i><p>CASHIER</p></div>
        <div class="nav-item" onclick="switchTab('gift', this)"><i class="fas fa-gift"></i><p>GIFT</p></div>
        <div class="nav-item" onclick="switchTab('stat', this)"><i class="fas fa-chart-pie"></i><p>REPORT</p></div>
    </nav>

<script>
    const SUPA_URL = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
    const SUPA_KEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani"; 
    const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

    let currentLetter = 'A';
    let allPlayers = [];
    let allDeposits = [];
    let allWithdrawals = [];

    // Initialize Alpha Nav
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789".split("");
    document.getElementById('alpha-nav-container').innerHTML = chars.map(c => 
        `<div class="alpha-btn ${c==='A'?'active':''}" onclick="filterLetter('${c}', this)">${c}</div>`
    ).join('');

    function filterLetter(l, el) {
        currentLetter = l;
        document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        renderPlayers();
    }

    async function fetchData() {
        const { data: p } = await _supa.from('profiles').select('*');
        const { data: d } = await _supa.from('deposits').select('*');
        const { data: w } = await _supa.from('withdrawals').select('*');
        
        allPlayers = p || [];
        allDeposits = d || [];
        allWithdrawals = w || [];

        updateTopStats();
        renderPlayers();
        renderKasir();
        renderGift();
        renderReport();
    }

    function updateTopStats() {
        const today = new Date().toISOString().split('T')[0];
        const sum = (arr, status, date) => arr.filter(x => x.status === 'SUKSES' && (date ? x.created_at.startsWith(date) : true)).reduce((a,b) => a + (Number(b.amount||b.net_receive||b.nominal)||0), 0);
        
        document.getElementById('s-dd').innerText = sum(allDeposits, 'SUKSES', today).toLocaleString();
        document.getElementById('s-dw').innerText = sum(allWithdrawals, 'SUKSES', today).toLocaleString();
        document.getElementById('s-td').innerText = sum(allDeposits, 'SUKSES').toLocaleString();
        document.getElementById('s-tw').innerText = sum(allWithdrawals, 'SUKSES').toLocaleString();
    }

    function renderPlayers() {
        const container = document.getElementById('tab-user');
        const filtered = allPlayers.filter(u => (u.username||"").toUpperCase().startsWith(currentLetter));
        
        container.innerHTML = filtered.map(u => {
            const userDepo = allDeposits.filter(x => x.username === u.username && x.status === 'SUKSES').reduce((a,b)=>a+(Number(b.amount||b.net_receive)||0),0);
            const userWD = allWithdrawals.filter(x => x.username === u.username && x.status === 'SUKSES').reduce((a,b)=>a+(Number(b.nominal||b.amount)||0),0);
            const profitLoss = userDepo - userWD;

            return `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; border-bottom:1px solid rgba(0,34,255,0.2); padding-bottom:8px;">
                    <div>
                        <b style="color:var(--yellow); font-size:14px;">${u.username}</b>
                        <p style="font-size:9px; color:#aaa;">P/L: <span style="color:${profitLoss<0?'#0f0':'#f00'}">${profitLoss.toLocaleString()}</span></p>
                    </div>
                    <div style="text-align:right">
                        <small class="lbl">SALDO LIVE</small>
                        <b style="color:#fff">IDR ${(u.saldo||0).toLocaleString()}</b>
                    </div>
                </div>
                <div class="input-group">
                    <div class="in-box"><small class="lbl">WINRATE %</small><input type="number" id="wr-${u.id}" value="${u.winrate||10}"></div>
                    <div class="in-box"><small class="lbl">MAXWIN LIMIT</small><input type="number" id="mx-${u.id}" value="${u.maxwin_limit||1000000}"></div>
                    <div class="in-box"><small class="lbl">TIMER (MIN)</small><input type="number" id="tm-${u.id}" value="${u.session_timer||0}"></div>
                    <button class="btn btn-yellow" style="margin-top:0" onclick="syncPlayer('${u.id}')">SYNC</button>
                </div>
            </div>`;
        }).join('') || `<p style="text-align:center; padding:20px; font-size:10px; opacity:0.5;">NO PLAYERS IN SECTION ${currentLetter}</p>`;
    }

    async function syncPlayer(id) {
        const wr = document.getElementById('wr-'+id).value;
        const mx = document.getElementById('mx-'+id).value;
        const tm = document.getElementById('tm-'+id).value;
        const { error } = await _supa.from('profiles').update({ winrate: wr, maxwin_limit: mx, session_timer: tm }).eq('id', id);
        if(!error) alert("PLAYER SYNCED");
        fetchData();
    }

    function renderKasir() {
        const ds = allDeposits.filter(x => x.status === 'PROSES');
        const ws = allWithdrawals.filter(x => x.status === 'PROSES');
        let h = '<h2>PENDING REQUESTS</h2>';
        ds.forEach(x => h += `<div class="card" style="border-left:4px solid var(--blue)"><b>${x.username}</b><p>DEPO: IDR ${(x.net_receive||x.amount).toLocaleString()}</p><button class="btn" onclick="appD('${x.id}','${x.username}',${x.net_receive||x.amount})">APPROVE</button></div>`);
        ws.forEach(x => h += `<div class="card" style="border-left:4px solid var(--pink)"><b>${x.username}</b><p>WD: IDR ${(x.nominal||x.amount).toLocaleString()}</p><button class="btn btn-pink" onclick="appW('${x.id}')">RELEASE WD</button></div>`);
        document.getElementById('tab-kasir').innerHTML = h;
    }

    async function appD(id, user, amt) {
        await _supa.from('deposits').update({status:'SUKSES'}).eq('id', id);
        const { data } = await _supa.from('profiles').select('saldo').eq('username', user).single();
        await _supa.from('profiles').update({saldo: (data.saldo||0) + amt}).eq('username', user);
        fetchData();
    }

    async function appW(id) {
        await _supa.from('withdrawals').update({status:'SUKSES'}).eq('id', id);
        fetchData();
    }

    function renderGift() {
        const filtered = allPlayers.filter(u => (u.username||"").toUpperCase().startsWith(currentLetter));
        let h = `
            <div class="card" style="border:1px solid var(--yellow)">
                <small class="lbl">GLOBAL GIFT (ALL PLAYERS)</small>
                <input type="number" id="mass-amt" class="input-dark" style="background:#111; padding:10px; border-radius:5px; margin-bottom:10px;" placeholder="NOMINAL">
                <button class="btn btn-yellow" onclick="giftAll()">SEND TO ALL</button>
            </div>
            <h3>SECTION ${currentLetter}</h3>
        `;
        h += filtered.map(u => `
            <div class="card">
                <b>${u.username}</b>
                <div class="input-group">
                    <input type="number" id="gft-${u.id}" placeholder="NOMINAL">
                    <input type="text" id="msg-${u.id}" placeholder="PESAN">
                </div>
                <button class="btn" onclick="sendGift('${u.id}')">SEND GIFT</button>
            </div>
        `).join('');
        document.getElementById('tab-gift').innerHTML = h;
    }

    async function sendGift(id) {
        const amt = parseInt(document.getElementById('gft-'+id).value);
        if(!amt) return;
        const { data } = await _supa.from('profiles').select('saldo').eq('id', id).single();
        await _supa.from('profiles').update({saldo: (data.saldo||0) + amt}).eq('id', id);
        alert("GIFT SENT");
        fetchData();
    }

    async function giftAll() {
        const amt = parseInt(document.getElementById('mass-amt').value);
        if(!amt) return;
        for(let u of allPlayers) {
            await _supa.from('profiles').update({saldo: (u.saldo||0) + amt}).eq('id', u.id);
        }
        alert("MASS GIFT SUCCESS");
        fetchData();
    }

    function renderReport() {
        const today = new Date().toISOString().split('T')[0];
        const month = new Date().toISOString().slice(0, 7);
        const sum = (arr, status, date) => arr.filter(x => x.status === 'SUKSES' && (date ? x.created_at.startsWith(date) : true)).reduce((a,b) => a + (Number(b.amount||b.net_receive||b.nominal)||0), 0);

        const dD = sum(allDeposits, 'SUKSES', today);
        const dW = sum(allWithdrawals, 'SUKSES', today);
        const mD = sum(allDeposits, 'SUKSES', month);
        const mW = sum(allWithdrawals, 'SUKSES', month);

        document.getElementById('tab-stat').innerHTML = `
            <div class="card">
                <h2 style="color:var(--yellow)">DAILY PROFIT</h2>
                <h1 style="font-size:28px">IDR ${(dD - dW).toLocaleString()}</h1>
                <p>Depo: ${dD.toLocaleString()} | WD: ${dW.toLocaleString()}</p>
            </div>
            <div class="card">
                <h2 style="color:var(--pink)">MONTHLY PROFIT</h2>
                <h1 style="font-size:28px">IDR ${(mD - mW).toLocaleString()}</h1>
                <p>Depo: ${mD.toLocaleString()} | WD: ${mW.toLocaleString()}</p>
            </div>
            <div class="card">
                <h2>NEW PLAYERS</h2>
                <p>Today: ${allPlayers.filter(x=>x.created_at.startsWith(today)).length}</p>
                <p>Month: ${allPlayers.filter(x=>x.created_at.startsWith(month)).length}</p>
            </div>
        `;
    }

    function switchTab(t, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('tab-'+t).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        // Alphabet nav only for player & gift
        document.getElementById('alpha-nav-container').style.display = (t==='user' || t==='gift') ? 'grid' : 'none';
    }

    // Canvas Background
    const c = document.getElementById('canvas-bg'); const x = c.getContext('2d');
    c.width = window.innerWidth; c.height = window.innerHeight;
    let particles = [];
    for(let i=0; i<30; i++) particles.push({x:Math.random()*c.width, y:Math.random()*c.height, r:Math.random()*2, s:Math.random()*0.5});
    function draw() {
        x.clearRect(0,0,c.width,c.height);
        particles.forEach(p => {
            x.beginPath(); x.arc(p.x, p.y, p.r, 0, 7); x.fillStyle = '#0022ff'; x.fill();
            p.y -= p.s; if(p.y < 0) p.y = c.height;
        });
        requestAnimationFrame(draw);
    } draw();

    fetchData();
    setInterval(fetchData, 20000);
</script>
</body>
</html>
