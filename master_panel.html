<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>NEON COMMAND CENTER — GLOBAL ACCESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --gold: #f5e642; --bg: #030510; --green: #00ff88; --red: #ff3131; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }

        #gate-keeper { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .gate-card { width: 90%; max-width: 380px; padding: 40px 30px; border-radius: 30px; background: rgba(255,255,255,0.02); border: 2px solid var(--blue); box-shadow: 0 0 40px rgba(0,212,255,0.2); text-align: center; }

        #main-app { display: none; }
        .nav-top { background: rgba(5,6,20,0.95); padding: 15px 20px; border-bottom: 1px solid rgba(0,212,255,0.2); position: sticky; top: 0; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; height: 70px; background: #050614; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { color: rgba(255,255,255,0.3); font-size: 22px; cursor: pointer; text-align: center; }
        .nav-btn span { display: block; font-size: 9px; margin-top: 4px; font-weight: 800; text-transform: uppercase; }
        .nav-btn.active { color: var(--blue); text-shadow: 0 0 10px var(--blue); }

        .content { padding: 20px; padding-bottom: 100px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .btn-act { padding: 12px; border-radius: 10px; border: none; font-weight: 900; font-size: 11px; cursor: pointer; transition: 0.2s; }
        
        /* Panic Button Style */
        .panic-btn { background: var(--red); color: #fff; font-weight: 900; padding: 10px; border-radius: 8px; border: none; cursor: pointer; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 49, 49, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 49, 49, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 49, 49, 0); } }
        .panic-active { background: #550000; animation: none; border: 1px solid var(--red); }
        
        .input-mini { background: #000; border: 1px solid #333; color: var(--green); padding: 5px; border-radius: 5px; width: 60px; text-align: center; }
        .save-btn { background: var(--green); color: #000; padding: 8px 15px; border-radius: 8px; font-size: 11px; font-weight: 900; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="gate-keeper">
        <div class="gate-card">
            <h1 style="font-family:'Cinzel Decorative'; color:var(--blue); font-size:1.5rem;">ACCESS GATE</h1>
            <input type="text" id="master-user" style="width:100%; padding:15px; border-radius:10px; background:#000; border:1px solid #333; color:#fff; margin:20px 0 10px;" placeholder="Admin Username">
            <input type="password" id="master-pass" style="width:100%; padding:15px; border-radius:10px; background:#000; border:1px solid #333; color:#fff; margin-bottom:20px;" placeholder="Master Password">
            <button onclick="checkAccess()" style="width:100%; padding:15px; border-radius:10px; border:none; background:var(--blue); color:#000; font-weight:900;">DECRYPT & ENTER</button>
        </div>
    </div>

    <div id="main-app">
        <div class="nav-top">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-family:'Cinzel Decorative'; font-weight:900; color:var(--pink);">NEON MASTER</div>
                <button id="panic-btn-global" class="panic-btn" onclick="togglePanicMode()">
                    <i class="fa-solid fa-skull"></i> PANIC MODE: OFF
                </button>
            </div>
            <div id="panic-timer" style="display:none; text-align:center; color:var(--red); font-weight:900; font-size:12px; letter-spacing:2px;">
                MODE KURAS AKTIF: <span id="timer-val">05:00</span>
            </div>
            <div id="online-stats" style="font-size:10px; font-weight:800; color:var(--gold);">SINKRONISASI...</div>
        </div>

        <div class="content">
            <div id="tab-finance" class="page">
                <h2 style="font-size:14px; margin-bottom:15px; color:var(--blue);">ANTREAN TRANSAKSI</h2>
                <div id="finance-list">Memuat...</div>
            </div>

            <div id="tab-users" class="page" style="display:none">
                <input type="text" id="user-search" class="search-box" placeholder="Cari User..." onkeyup="filterUsers()">
                <div id="user-list">Memuat Pemain...</div>
            </div>
        </div>

        <nav class="nav-bottom">
            <div class="nav-btn active" onclick="switchNav('finance', this)"><i class="fa-solid fa-cash-register"></i><span>Keuangan</span></div>
            <div class="nav-btn" onclick="switchNav('users', this)"><i class="fa-solid fa-users-gear"></i><span>Pemain</span></div>
            <div class="nav-btn" onclick="logout()"><i class="fa-solid fa-power-off"></i><span>Exit</span></div>
        </nav>
    </div>

<script>
    const sb_url = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
    const sb_key = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani";
    const _supabase = supabase.createClient(sb_url, sb_key);

    const MASTER_KEY = { u: "admin_neon", p: "master777" };
    let usersData = [];
    let isPanic = false;
    let panicTimer;

    function checkAccess() {
        if(document.getElementById('master-user').value === MASTER_KEY.u && document.getElementById('master-pass').value === MASTER_KEY.p) {
            sessionStorage.setItem('master_auth', 'true');
            document.getElementById('gate-keeper').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            initDashboard();
        } else { alert("AKSES DITOLAK!"); }
    }

    async function initDashboard() {
        loadFinance(); loadUsers();
        setInterval(loadFinance, 10000); 
    }

    async function togglePanicMode() {
        if(isPanic) return; // Mencegah klik ganda saat aktif

        const confirmMode = confirm("AKTIFKAN MODE KURAS? Winrate Global semua pemain akan menjadi 10% selama 5 menit!");
        if(!confirmMode) return;

        isPanic = true;
        const btn = document.getElementById('panic-btn-global');
        const timerDiv = document.getElementById('panic-timer');
        btn.classList.add('panic-active');
        btn.innerHTML = `<i class="fa-solid fa-radiation"></i> MODE KURAS AKTIF`;
        timerDiv.style.display = 'block';

        // EKSEKUSI GLOBAL UPDATE: Winrate 10% untuk SEMUA
        const { error } = await _supabase.from('profiles').update({ winrate: 10 }).neq('username', 'admin_neon');
        
        if(error) {
            alert("Gagal eksekusi Panic Mode!");
            resetPanicUI();
            return;
        }

        let timeLeft = 300; // 5 Menit (300 detik)
        panicTimer = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('timer-val').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;

            if(timeLeft <= 0) {
                stopPanicMode();
            }
        }, 1000);
    }

    async function stopPanicMode() {
        clearInterval(panicTimer);
        // Kembalikan ke Winrate Standar (Misal: 60%)
        await _supabase.from('profiles').update({ winrate: 60 }).neq('username', 'admin_neon');
        resetPanicUI();
        alert("MODE KURAS BERAKHIR. Winrate dikembalikan ke standar (60%).");
        loadUsers();
    }

    function resetPanicUI() {
        isPanic = false;
        const btn = document.getElementById('panic-btn-global');
        btn.classList.remove('panic-active');
        btn.innerHTML = `<i class="fa-solid fa-skull"></i> PANIC MODE: OFF`;
        document.getElementById('panic-timer').style.display = 'none';
    }

    async function loadFinance() {
        const { data: depo } = await _supabase.from('deposits').select('*').eq('status', 'PROSES');
        const { data: wd } = await _supabase.from('withdrawals').select('*').eq('status', 'PROSES');
        let html = '';
        if(depo) depo.forEach(d => {
            html += `<div class="card"><b>${d.username}</b> <span style="color:var(--blue)">+${(d.net_receive || 0).toLocaleString()}</span><br>
            <button class="save-btn" style="margin-top:10px" onclick="approveDepo('${d.id}', '${d.username}', ${d.net_receive})">APPROVE</button></div>`;
        });
        document.getElementById('finance-list').innerHTML = html || '<p style="opacity:0.5; text-align:center;">Antrean Bersih</p>';
    }

    async function loadUsers() {
        const { data } = await _supabase.from('profiles').select('*');
        if(data) {
            usersData = data;
            renderUsers(data);
            document.getElementById('online-stats').innerText = data.length + " PEMAIN TERDAFTAR";
        }
    }

    function renderUsers(list) {
        document.getElementById('user-list').innerHTML = list.map(u => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <b>${u.username}</b>
                    <span style="color:var(--gold)">Rp ${(u.saldo || 0).toLocaleString()}</span>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-size:11px;">
                    <div>WR: <input type="number" class="input-mini" id="wr-${u.id}" value="${u.winrate || 0}"> %</div>
                    <div>MAX: <input type="number" class="input-mini" style="width:70px" id="mx-${u.id}" value="${u.max_win_limit || 0}"></div>
                </div>
                <button class="save-btn" style="width:100%; margin-top:10px;" onclick="updateSetting('${u.id}')">SIMPAN</button>
            </div>
        `).join('');
    }

    async function updateSetting(id) {
        const wr = document.getElementById(`wr-${id}`).value;
        const mx = document.getElementById(`mx-${id}`).value;
        await _supabase.from('profiles').update({ winrate: parseInt(wr), max_win_limit: parseInt(mx) }).eq('id', id);
        alert("Setting Terupdate!");
    }

    function switchNav(tab, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('tab-' + tab).style.display = 'block';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function logout() { sessionStorage.clear(); window.location.reload(); }

    window.onload = () => {
        if(sessionStorage.getItem('master_auth') === 'true') {
            document.getElementById('gate-keeper').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            initDashboard();
        }
    };
</script>
</body>
</html>
