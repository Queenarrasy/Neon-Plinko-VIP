<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON COMMAND — V10.99 ULTIMATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pink: #ff0077; --blue: #0022ff; --cyan: #00d4ff; --yellow: #fbff00; --bg: #02030d; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        #canvas-bg { position: fixed; inset: 0; z-index: 0; opacity: 0.5; }
        
        /* UI Components */
        .nav-top { background: rgba(2,3,13,0.95); padding: 15px 20px; border-bottom: 2px solid var(--blue); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 15px; padding-bottom: 120px; max-width: 650px; margin: auto; position: relative; z-index: 10; }
        
        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: rgba(0,0,0,0.8); border: 1px solid var(--blue); padding: 12px; border-radius: 15px; text-align: center; }
        .stat-box small { font-size: 9px; color: var(--pink); text-transform: uppercase; font-weight: 800; }
        .stat-box span { font-size: 16px; font-weight: 900; color: var(--yellow); display: block; }

        /* Card System */
        .card { background: rgba(5,6,25,0.9); border: 1px solid var(--blue); border-radius: 18px; padding: 18px; margin-bottom: 12px; transition: 0.3s; }
        .card:hover { border-color: var(--cyan); }
        .card h3 { font-size: 14px; color: var(--cyan); margin-bottom: 10px; }
        
        /* Inputs */
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--blue); color: var(--yellow); border-radius: 10px; font-size: 13px; outline: none; margin-top: 5px; }
        input:focus { border-color: var(--pink); box-shadow: 0 0 10px rgba(255,0,119,0.5); }
        
        /* Buttons */
        .btn { background: linear-gradient(90deg, var(--blue), #0000aa); color: #fff; border: none; padding: 12px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; margin-top: 10px; }
        .btn-pink { background: linear-gradient(90deg, var(--pink), #aa0044); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Navigation */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; border-top: 2px solid var(--blue); display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { color: rgba(0,212,255,0.3); font-size: 18px; text-align: center; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-btn.active { color: var(--yellow); text-shadow: 0 0 10px var(--yellow); }
        .nav-btn span { display: block; font-size: 8px; font-weight: 800; margin-top: 4px; }

        /* Modals */
        #gate-keeper { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        #alert-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        .alert-box { width:280px; background:#050619; border:2px solid var(--pink); border-radius:20px; padding:25px; text-align:center; }
        
        .panic-active { background: var(--pink) !important; animation: blink 0.5s infinite; color: white !important; font-weight: 900; }
        @keyframes blink { 0% {opacity:1} 50% {opacity:0.5} 100% {opacity:1} }
    </style>
</head>
<body>
    <canvas id="canvas-bg"></canvas>

    <div id="gate-keeper">
        <div style="text-align:center; width: 80%;">
            <h1 style="font-family:'Cinzel Decorative'; color:var(--pink); margin-bottom:20px;">NEON COMMAND</h1>
            <input type="password" id="adm-pass" placeholder="MASTER KEY" style="text-align:center;">
            <button onclick="login()" class="btn" style="margin-top:15px;">BOOT SYSTEM</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="nav-top">
            <div>
                <span style="font-family:'Cinzel Decorative'; color:var(--pink); font-size:16px;">V10.99</span>
                <small id="signal" style="display:block; font-size:8px; color:var(--cyan);"><i class="fas fa-circle"></i> SYNCED</small>
            </div>
            <div id="panic-btn" onclick="togglePanic()" style="padding:5px 15px; border:1px solid var(--pink); border-radius:20px; font-size:10px; cursor:pointer;">PANIC MODE</div>
        </div>

        <div class="content">
            <div class="stats-grid">
                <div class="stat-box"><small>TOTAL SALDO</small><span id="total-saldo">0</span></div>
                <div class="stat-box"><small>TOTAL NODES</small><span id="total-users">0</span></div>
            </div>

            <div id="tab-kasir" class="page">
                <h2 style="font-size:12px; color:var(--cyan); margin-bottom:15px; letter-spacing:2px;">INCOMING SIGNALS</h2>
                <div id="list-kasir"></div>
            </div>

            <div id="tab-user" class="page" style="display:none;">
                <input type="text" id="user-search" placeholder="SEARCH USERNAME..." oninput="renderUsers()" style="margin-bottom:15px; border-color:var(--cyan);">
                <div id="list-user"></div>
            </div>

            <div id="tab-gift" class="page" style="display:none;">
                <div class="card">
                    <h3>GIFT / INJECT BALANCE</h3>
                    <select id="gift-target" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid var(--blue); border-radius:10px;"></select>
                    <input type="number" id="gift-amt" placeholder="NOMINAL IDR">
                    <button onclick="sendGift()" class="btn">TRANSMIT BALANCE</button>
                </div>
            </div>
        </div>

        <nav class="nav-bottom">
            <div class="nav-btn active" onclick="switchTab('kasir', this)"><i class="fas fa-university"></i><span>KASIR</span></div>
            <div class="nav-btn" onclick="switchTab('user', this)"><i class="fas fa-user-gear"></i><span>PLAYERS</span></div>
            <div class="nav-btn" onclick="switchTab('gift', this)"><i class="fas fa-gift"></i><span>GIFT</span></div>
            <div class="nav-btn" onclick="location.reload()"><i class="fas fa-power-off"></i><span>EXIT</span></div>
        </nav>
    </div>

    <div id="alert-modal"><div class="alert-box"><p id="alert-msg"></p><button onclick="closeAlert()" class="btn btn-pink">CLOSE</button></div></div>

<script>
    const SUPA_URL = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
    const SUPA_KEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani"; 
    const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

    let allUsers = [];
    let focusedId = null;
    let autoRefresh;

    function login() {
        if(document.getElementById('adm-pass').value === "master777") {
            document.getElementById('gate-keeper').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            initEngine();
        } else { alert("ACCESS DENIED"); }
    }

    async function initEngine() {
        fetchData();
        // REALTIME SUBSCRIPTION
        _supa.channel('any').on('postgres_changes', {event:'*', schema:'public'}, () => fetchData()).subscribe();
        // AUTO REFRESH SETIAP 5 DETIK (Aman untuk traffic tinggi)
        autoRefresh = setInterval(() => { if(!focusedId) fetchData(); }, 5000);
    }

    async function fetchData() {
        const { data: profiles } = await _supa.from('profiles').select('*').order('username');
        const { data: deps } = await _supa.from('deposits').select('*').eq('status', 'PROSES');
        const { data: wds } = await _supa.from('withdrawals').select('*').eq('status', 'PROSES');
        const { data: conf } = await _supa.from('system_config').select('*').eq('id', 1).single();

        if(profiles) {
            allUsers = profiles;
            document.getElementById('total-saldo').innerText = profiles.reduce((a,b)=>a+(b.saldo||0),0).toLocaleString();
            document.getElementById('total-users').innerText = profiles.length;
            renderUsers();
        }
        renderKasir(deps, wds);
        updatePanicUI(conf.panic_mode);
    }

    function renderUsers() {
        if(focusedId) return;
        const search = document.getElementById('user-search').value.toLowerCase();
        const container = document.getElementById('list-user');
        const filtered = allUsers.filter(u => u.username.toLowerCase().includes(search));
        
        container.innerHTML = filtered.map(u => `
            <div class="card" style="${u.saldo >= u.maxwin_limit ? 'border-color:var(--pink);' : ''}">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b>${u.username.toUpperCase()}</b>
                    <span style="color:var(--yellow); font-weight:900;">${(u.saldo||0).toLocaleString()}</span>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
                    <div><small>WINRATE %</small><input type="number" id="wr-${u.id}" value="${u.winrate}" onfocus="focusedId='${u.id}'" onblur="focusedId=null"></div>
                    <div><small>MAXWIN LIMIT</small><input type="number" id="mw-${u.id}" value="${u.maxwin_limit}" onfocus="focusedId='${u.id}'" onblur="focusedId=null"></div>
                </div>
                <button class="btn" onclick="updateNode('${u.id}', this)">SYNC PLAYER NODE</button>
            </div>
        `).join('');
    }

    async function updateNode(id, btn) {
        btn.disabled = true; btn.innerText = "SYNCING...";
        const wr = document.getElementById('wr-'+id).value;
        const mw = document.getElementById('mw-'+id).value;
        
        const { error } = await _supa.from('profiles').update({ 
            winrate: wr, maxwin_limit: mw, updated_at: new Date() 
        }).eq('id', id);

        if(!error) { showAlert("SYNC SUCCESS"); fetchData(); }
        else { showAlert("CONNECTION ERROR"); }
        btn.disabled = false; btn.innerText = "SYNC PLAYER NODE";
    }

    function renderKasir(deps, wds) {
        const cont = document.getElementById('list-kasir');
        let html = '';
        
        if(deps) deps.forEach(d => {
            html += `<div class="card" style="border-left:5px solid var(--cyan);">
                <small style="color:var(--cyan)">DEPOSIT REQUEST</small>
                <h3>${d.username}</h3>
                <h2 style="color:var(--yellow)">IDR ${d.net_receive.toLocaleString()}</h2>
                <button class="btn" onclick="approveDepo('${d.id}','${d.username}',${d.net_receive})">APPROVE DEPO</button>
            </div>`;
        });

        if(wds) wds.forEach(w => {
            html += `<div class="card" style="border-left:5px solid var(--pink);">
                <small style="color:var(--pink)">WITHDRAWAL REQUEST</small>
                <h3>${w.username}</h3>
                <h2 style="color:var(--yellow)">IDR ${w.nominal.toLocaleString()}</h2>
                <p style="font-size:10px; margin:5px 0;">${w.bank_name} - ${w.acc_number}</p>
                <button class="btn btn-pink" onclick="approveWD('${w.id}')">COMPLETE WD</button>
            </div>`;
        });

        cont.innerHTML = html || '<p style="text-align:center; opacity:0.3; font-size:10px;">NO ACTIVE REQUESTS</p>';
    }

    async function approveDepo(id, user, amt) {
        await _supa.from('deposits').update({status:'SUKSES'}).eq('id', id);
        const { data } = await _supa.from('profiles').select('saldo').eq('username', user).single();
        await _supa.from('profiles').update({saldo: (data.saldo||0) + amt}).eq('username', user);
        fetchData();
    }

    async function approveWD(id) {
        await _supa.from('withdrawals').update({status:'SUKSES'}).eq('id', id);
        showAlert("WD PROCESSED");
        fetchData();
    }

    async function togglePanic() {
        const { data } = await _supa.from('system_config').select('panic_mode').eq('id', 1).single();
        const next = !data.panic_mode;
        await _supa.from('system_config').update({panic_mode: next}).eq('id', 1);
        await _supa.from('profiles').update({panic_mode: next});
        fetchData();
    }

    function updatePanicUI(isPanic) {
        const btn = document.getElementById('panic-btn');
        if(isPanic) { btn.innerText = "PANIC ON"; btn.classList.add('panic-active'); }
        else { btn.innerText = "PANIC OFF"; btn.classList.remove('panic-active'); }
    }

    function switchTab(t, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('tab-'+t).style.display = 'block';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        if(t === 'gift') {
            document.getElementById('gift-target').innerHTML = allUsers.map(u => `<option value="${u.username}">${u.username}</option>`).join('');
        }
    }

    async function sendGift() {
        const t = document.getElementById('gift-target').value;
        const a = document.getElementById('gift-amt').value;
        await _supa.from('inbox').insert([{ username: t, nominal: Number(a), pesan: "SYSTEM GIFT", status: 'UNCLAIMED' }]);
        showAlert("GIFT TRANSMITTED");
    }

    function showAlert(m) { document.getElementById('alert-msg').innerText = m; document.getElementById('alert-modal').style.display = 'flex'; }
    function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }
    
    // Background Animation
    const c = document.getElementById('canvas-bg'); const x = c.getContext('2d');
    c.width = window.innerWidth; c.height = window.innerHeight;
    let s = []; for(let i=0; i<50; i++) s.push({x:Math.random()*c.width, y:Math.random()*c.height, r:Math.random()*1, sp:Math.random()*0.5});
    function anim() {
        x.clearRect(0,0,c.width,c.height); x.fillStyle = "#00d4ff";
        s.forEach(p => { x.beginPath(); x.arc(p.x, p.y, p.r, 0, 7); x.fill(); p.y += p.sp; if(p.y > c.height) p.y = -5; });
        requestAnimationFrame(anim);
    } anim();
</script>
</body>
</html>
