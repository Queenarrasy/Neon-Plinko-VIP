<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON COMMAND — SUPREME ADMIN V10.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --pink: #ff0077; --blue: #0022ff; --cyan: #00d4ff;
            --yellow: #fbff00; --bg: #02030d;
            --gp: 0 0 20px rgba(255, 0, 119, 0.8);
            --gb: 0 0 25px rgba(0, 34, 255, 0.9);
            --gy: 0 0 20px rgba(251, 255, 0, 0.8);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif;
            min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column;
        }

        #canvas-bg { position: fixed; inset: 0; z-index: 0; }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, transparent, var(--bg) 90%); z-index: 1; pointer-events: none; }

        #gate-keeper { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .gate-card { 
            width: 90%; max-width: 380px; padding: 40px; border-radius: 30px; 
            background: rgba(2, 3, 13, 0.95); border: 2px solid var(--blue); 
            text-align: center; box-shadow: var(--gb); backdrop-filter: blur(20px);
        }
        
        #main-app { display: none; position: relative; z-index: 10; flex: 1; }

        .nav-top { 
            background: rgba(2, 3, 13, 0.9); padding: 15px 20px; 
            border-bottom: 2px solid var(--blue); position: sticky; top: 0; 
            z-index: 100; backdrop-filter: blur(15px); box-shadow: var(--gb);
        }

        .panic-bar { 
            background: var(--pink); padding: 8px; text-align: center; display: none; 
            font-weight: 900; color: #fff; font-size: 11px; text-transform: uppercase; 
            letter-spacing: 2px; box-shadow: var(--gp); border-bottom: 2px solid var(--yellow);
        }
        .panic-active { display: block !important; animation: blink 0.8s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .content { padding: 20px; padding-bottom: 120px; max-width: 600px; margin: auto; width: 100%; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { 
            background: rgba(0,0,0,0.9); border: 1px solid var(--blue); 
            padding: 15px; border-radius: 15px; text-align: center; box-shadow: inset 0 0 15px rgba(0,34,255,0.3);
        }
        .stat-box small { font-size: 9px; color: var(--pink); display: block; margin-bottom: 5px; font-weight: 800; letter-spacing: 1px; }
        .stat-box span { font-size: 16px; font-weight: 900; color: var(--yellow); text-shadow: var(--gy); }

        .card { 
            background: rgba(0,0,0,0.85); border: 1px solid var(--blue); 
            border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.3s;
        }
        .card-label { font-size: 10px; color: var(--cyan); font-weight: 800; text-transform: uppercase; margin-bottom: 12px; display: block; letter-spacing: 1px; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; background: rgba(5, 6, 25, 0.8); border: 1px solid var(--blue); 
            color: var(--yellow); border-radius: 10px; margin-bottom: 10px; 
            font-family: 'Outfit'; font-size: 13px;
        }

        .btn-main { 
            background: linear-gradient(90deg, var(--blue), #001188); color: #fff; 
            padding: 14px; border-radius: 50px; font-weight: 900; border: 1px solid var(--cyan); 
            width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; 
            letter-spacing: 2px; box-shadow: var(--gb);
        }
        .btn-panic { background: var(--pink) !important; border: 1px solid var(--yellow); box-shadow: var(--gp) !important; color: #fff; }
        
        .nav-bottom { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: #000; border-top: 2px solid var(--blue); 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-btn { color: rgba(0, 212, 255, 0.3); font-size: 20px; cursor: pointer; text-align: center; flex: 1; }
        .nav-btn span { display: block; font-size: 8px; margin-top: 5px; font-weight: 800; text-transform: uppercase; }
        .nav-btn.active { color: var(--yellow); text-shadow: var(--gy); transform: translateY(-3px); }

        #alert-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:10000; align-items:center; justify-content:center; backdrop-filter:blur(15px); }
        .alert-box { width:300px; background:#000; border:2px solid var(--pink); border-radius:25px; padding:30px; text-align:center; box-shadow: var(--gp); }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body oncontextmenu="return false;"> 
    <canvas id="canvas-bg"></canvas>
    <div class="overlay"></div>

    <div id="gate-keeper">
        <div class="gate-card">
            <div style="font-family:'Cinzel Decorative'; color:var(--pink); font-size:26px; margin-bottom:5px; text-shadow: var(--gp);">NEON COMMAND</div>
            <p style="font-size:8px; color:var(--blue); letter-spacing:5px; margin-bottom:30px; font-weight:800; text-transform: uppercase;">Classified Access Only</p>
            <input type="text" id="adm-user" placeholder="SECURED ID">
            <input type="password" id="adm-pass" placeholder="ENCRYPTED KEY">
            <button onclick="login()" class="btn-main">INITIALIZE UPLINK</button>
        </div>
    </div>

    <div id="main-app">
        <div id="panic-alert" class="panic-bar">ENC_PROTOCOL: GLOBAL_DRAIN_ACTIVE</div>
        <div class="nav-top">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <span style="font-family:'Cinzel Decorative'; font-weight:900; color:var(--pink); font-size:18px; text-shadow: var(--gp);">SUPREME</span>
                    <span style="font-size:8px; color:var(--cyan); display:block; letter-spacing:3px; font-weight:800;">MONITORING LIVE</span>
                </div>
                <div id="sync-status" style="font-size:9px; color:var(--yellow); font-weight:800; text-shadow: var(--gy);"><i class="fas fa-satellite-dish fa-fade"></i> DATA FEED</div>
            </div>
        </div>

        <div class="content">
            <div class="stats-grid">
                <div class="stat-box">
                    <small>TOTAL LIQUIDITY</small>
                    <span id="stat-total-saldo">0.00</span>
                </div>
                <div class="stat-box">
                    <small>SESSIONS</small>
                    <span id="stat-user-count">0</span>
                </div>
            </div>

            <div id="tab-kasir" class="page">
                <button id="panic-btn-ui" class="btn-main btn-panic" onclick="togglePanicMode()">EXECUTE GLOBAL DRAIN</button>
                <div id="list-kasir" style="margin-top:20px;"></div>
            </div>

            <div id="tab-user" class="page" style="display:none">
                <div id="list-user"></div>
            </div>

            <div id="tab-gift" class="page" style="display:none">
                <div class="card" style="border-color:var(--pink);">
                    <span class="card-label" style="color:var(--yellow)">INTERNAL TRANSFER</span>
                    <select id="gift-target"><option value="">-- TARGET --</option></select>
                    <input type="number" id="gift-amount" placeholder="Value">
                    <textarea id="gift-msg" placeholder="System Note..."></textarea>
                    <button class="btn-main" onclick="sendGift()">TRANSMIT DATA</button>
                </div>
            </div>
        </div>

        <nav class="nav-bottom">
            <div class="nav-btn active" onclick="switchTab('kasir', this)"><i class="fas fa-terminal"></i><span>UPLINK</span></div>
            <div class="nav-btn" onclick="switchTab('user', this)"><i class="fas fa-user-secret"></i><span>NODES</span></div>
            <div class="nav-btn" onclick="switchTab('gift', this)"><i class="fas fa-microchip"></i><span>CORE</span></div>
            <div class="nav-btn" onclick="logout()"><i class="fas fa-ghost"></i><span>WIPE</span></div>
        </nav>
    </div>

    <div id="alert-modal">
        <div class="alert-box">
            <p id="alert-msg"></p>
            <button class="btn-main" onclick="closeAlert()" style="background:var(--pink); border:none; margin-top:20px;">OK</button>
        </div>
    </div>

<script>
    const SUPA_URL = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
    const SUPA_KEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani"; 
    const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

    const AUTH = { u: "admin_neon", p: "master777" };
    let isPanic = false;
    let autoRefreshTimer;

    function login() {
        if(document.getElementById('adm-user').value === AUTH.u && document.getElementById('adm-pass').value === AUTH.p) {
            sessionStorage.setItem('sec_lvl_10', 'true');
            document.getElementById('gate-keeper').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            drawStars();
            startMonitoring(); 
        } else { alert("ACCESS DENIED"); }
    }

    function startMonitoring() {
        refreshAll();
        // BACKUP REFRESH: Setiap 3 detik tarik data paksa (Mencegah saldo berhenti)
        if(autoRefreshTimer) clearInterval(autoRefreshTimer);
        autoRefreshTimer = setInterval(refreshAll, 3000);

        // REALTIME SUBSCRIPTION
        _supa.channel('db-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => {
            refreshAll();
        })
        .subscribe();
    }

    async function refreshAll() {
        updateStats();
        loadUserSmart(); 
        loadKasir();
        checkPanicStatus();
    }

    async function updateStats() {
        const { data } = await _supa.from('profiles').select('saldo');
        if(data) {
            let total = data.reduce((acc, curr) => acc + (curr.saldo || 0), 0);
            document.getElementById('stat-total-saldo').innerText = total.toLocaleString('id-ID');
            document.getElementById('stat-user-count').innerText = data.length;
        }
    }

    async function loadUserSmart() {
        // Jangan refresh UI jika Admin sedang menginput data agar ketikan tidak hilang
        if(document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA") return;

        const { data } = await _supa.from('profiles').select('*').order('username', {ascending:true});
        if(!data) return;

        document.getElementById('list-user').innerHTML = data.map(u => `
            <div class="card" style="${u.saldo > 0 ? 'border-color:var(--yellow); box-shadow:var(--gy);' : ''}">
                <div style="display:flex; justify-content:space-between;">
                    <b style="color:var(--pink);">${u.username.toUpperCase()}</b>
                    <span style="color:var(--yellow); font-weight:800;">${Number(u.saldo).toLocaleString()}</span>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin-top:10px;">
                    <div><small style="font-size:8px;">WR%</small><input type="number" id="wr-${u.id}" value="${u.winrate}"></div>
                    <div><small style="font-size:8px;">MAXW</small><input type="number" id="mw-${u.id}" value="${u.maxwin_limit}"></div>
                    <div><small style="font-size:8px;">TIME</small><input type="number" id="tm-${u.id}" value="${u.session_minutes}"></div>
                </div>
                <button class="btn-main" style="margin-top:8px; height:30px; font-size:9px;" onclick="saveUser('${u.id}')">COMMIT</button>
            </div>`).join('');
    }

    async function saveUser(id) {
        const wr = document.getElementById('wr-'+id).value;
        const mw = document.getElementById('mw-'+id).value;
        const tm = document.getElementById('tm-'+id).value;
        
        await _supa.from('profiles').update({
            winrate: parseInt(wr),
            maxwin_limit: parseInt(mw),
            session_minutes: parseInt(tm)
        }).eq('id', id);
        
        showAlert("CONFIG UPDATED");
        refreshAll();
    }

    async function loadKasir() {
        const { data: depo } = await _supa.from('deposits').select('*').eq('status', 'PROSES');
        let html = '';
        if(depo) depo.forEach(d => {
            html += `<div class="card" style="border-left:4px solid var(--yellow)">
                <span class="card-label">DEP: ${d.username}</span>
                <b>IDR ${Number(d.net_receive).toLocaleString()}</b>
                <button class="btn-main" style="margin-top:10px;" onclick="approveDepo('${d.id}','${d.username}',${d.net_receive})">APPROVE</button>
            </div>`;
        });
        document.getElementById('list-kasir').innerHTML = html || '<p style="text-align:center; opacity:0.3; font-size:10px;">NO INCOMING SIGNALS</p>';
    }

    async function approveDepo(id, user, amt) {
        await _supa.from('deposits').update({ status: 'SUKSES' }).eq('id', id);
        const { data: p } = await _supa.from('profiles').select('saldo').eq('username', user).single();
        await _supa.from('profiles').update({ 
            saldo: (p.saldo || 0) + amt,
            session_start: new Date().toISOString()
        }).eq('username', user);
        refreshAll();
    }

    async function togglePanicMode() {
        const next = !isPanic;
        await _supa.from('system_config').update({ panic_mode: next }).eq('id', 1);
        await _supa.from('profiles').update({ panic_mode: next });
        checkPanicStatus();
    }

    async function checkPanicStatus() {
        const { data } = await _supa.from('system_config').select('panic_mode').eq('id', 1).single();
        if(data) {
            isPanic = data.panic_mode;
            document.getElementById('panic-alert').className = isPanic ? 'panic-bar panic-active' : 'panic-bar';
            document.getElementById('panic-btn-ui').innerText = isPanic ? "ABORT DRAIN" : "EXECUTE GLOBAL DRAIN";
        }
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('tab-' + tab).style.display = 'block';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        if(tab === 'gift') loadGiftTarget();
    }

    async function loadGiftTarget() {
        const { data } = await _supa.from('profiles').select('username');
        if(data) {
            document.getElementById('gift-target').innerHTML = '<option value="">-- TARGET --</option>' + 
                data.map(u => `<option value="${u.username}">${u.username.toUpperCase()}</option>`).join('');
        }
    }

    async function sendGift() {
        const target = document.getElementById('gift-target').value;
        const amount = document.getElementById('gift-amount').value;
        if(!target || !amount) return;
        await _supa.from('inbox').insert([{ username: target, nominal: Number(amount), pesan: document.getElementById('gift-msg').value || "SYS_GIFT", status: 'UNCLAIMED' }]);
        showAlert("TRANSFER SUCCESS");
    }

    function showAlert(m) { document.getElementById('alert-msg').innerText = m; document.getElementById('alert-modal').style.display = 'flex'; }
    function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }
    function logout() { sessionStorage.clear(); window.location.reload(); }

    function drawStars() {
        const c = document.getElementById('canvas-bg'); const x = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let s = [];
        for(let i=0; i<85; i++) s.push({x:Math.random()*c.width, y:Math.random()*c.height, r:Math.random()*2, sp:Math.random()*0.4+0.1, o:Math.random()*0.6+0.4});
        function anim() {
            x.clearRect(0,0,c.width,c.height);
            s.forEach(p => { 
                x.beginPath(); x.fillStyle = `rgba(0, 212, 255, ${p.o})`; x.arc(p.x, p.y, p.r, 0, Math.PI*2); x.fill(); 
                p.y += p.sp; if(p.y > c.height) p.y = -5; 
            });
            requestAnimationFrame(anim);
        }
        anim();
    }

    window.onload = () => { if(sessionStorage.getItem('sec_lvl_10') === 'true') login(); };
</script>
</body>
</html>
