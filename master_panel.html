<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>NEON COMMAND CENTER — V4 FINAL PRE-RELEASE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --pink-neon: #ff0077; --blue-neon: #00d4ff; --deepblue-neon: #0044ff;
            --yellow-neon: #f5e642; --bg: #030510; --red-alert: #ff3131; --green-neon: #00ff88;
            --gp: 0 0 15px rgba(255, 0, 119, 0.4);
            --gb: 0 0 15px rgba(0, 212, 255, 0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        #gate-keeper { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .gate-card { width: 90%; max-width: 380px; padding: 40px; border-radius: 30px; background: rgba(255,255,255,0.02); border: 2px solid var(--blue-neon); text-align: center; box-shadow: var(--gb); }
        
        #main-app { display: none; }
        .nav-top { background: rgba(5,6,20,0.95); padding: 15px 20px; border-bottom: 1px solid rgba(0,212,255,0.2); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; height: 75px; background: #050614; border-top: 1px solid rgba(0,212,255,0.3); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-btn { color: rgba(255,255,255,0.3); font-size: 20px; cursor: pointer; text-align: center; flex: 1; transition: 0.3s; }
        .nav-btn span { display: block; font-size: 8px; margin-top: 4px; font-weight: 800; text-transform: uppercase; }
        .nav-btn.active { color: var(--blue-neon); text-shadow: var(--gb); }

        .content { padding: 20px; padding-bottom: 100px; max-width: 600px; margin: auto; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .card-label { font-size: 10px; color: var(--blue-neon); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; }

        input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 10px; }
        .save-btn { background: linear-gradient(90deg, var(--blue-neon), var(--deepblue-neon)); color: #000; padding: 12px; border-radius: 10px; font-size: 12px; font-weight: 900; border: none; width: 100%; cursor: pointer; text-transform: uppercase; }
        .save-btn:disabled { opacity: 0.5; filter: grayscale(1); }

        .profit { color: var(--green-neon); }
        .loss { color: var(--pink-neon); }

        /* Alert Custom */
        #custom-alert { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .alert-box { width: 85%; max-width: 320px; background: #0a0b1e; border: 2px solid var(--blue-neon); border-radius: 20px; padding: 25px; text-align: center; }
    </style>
</head>
<body>

    <div id="gate-keeper">
        <div class="gate-card">
            <h1 style="font-family:'Cinzel Decorative'; color:var(--blue-neon); font-size:1.5rem;">MASTER NEON</h1>
            <input type="text" id="m-user" placeholder="Admin ID" style="margin-top:20px">
            <input type="password" id="m-pass" placeholder="Master Key">
            <button onclick="loginMaster()" class="save-btn">LOGIN</button>
        </div>
    </div>

    <div id="main-app">
        <div class="nav-top">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-family:'Cinzel Decorative'; font-weight:900; color:var(--pink-neon);">COMMAND CENTER</div>
                <div id="status-sync" style="font-size:10px; color:var(--yellow-neon);"><i class="fa-solid fa-bolt"></i> LIVE</div>
            </div>
        </div>

        <div class="content">
            <div id="tab-kasir" class="page">
                <h2 style="font-size:14px; margin-bottom:15px;">TRANS-QUEUE</h2>
                <div id="list-kasir">Memuat...</div>
            </div>

            <div id="tab-user" class="page" style="display:none">
                <input type="text" id="search-u" placeholder="Cari pemain..." onkeyup="filterU()">
                <div id="list-user">Memuat...</div>
            </div>
        </div>

        <nav class="nav-bottom">
            <div class="nav-btn active" onclick="switchNav('kasir', this)"><i class="fa-solid fa-cash-register"></i><span>Kasir</span></div>
            <div class="nav-btn" onclick="switchNav('user', this)"><i class="fa-solid fa-users-gear"></i><span>User</span></div>
            <div class="nav-btn" onclick="logout()"><i class="fa-solid fa-power-off"></i><span>Exit</span></div>
        </nav>
    </div>

    <div id="custom-alert">
        <div class="alert-box">
            <p id="a-msg" style="margin-bottom:20px"></p>
            <button class="save-btn" onclick="closeAlert()">OKE</button>
        </div>
    </div>

<script>
    // --- KONFIGURASI SUPABASE (TANPA FILE LUAR) ---
    const SB_URL = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
    const SB_KEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani"; 
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    const MASTER_ID = "admin_neon";
    const MASTER_KEY = "master777";

    function showAlert(m) { document.getElementById('a-msg').innerText = m; document.getElementById('custom-alert').style.display = 'flex'; }
    function closeAlert() { document.getElementById('custom-alert').style.display = 'none'; }

    function loginMaster() {
        if(document.getElementById('m-user').value === MASTER_ID && document.getElementById('m-pass').value === MASTER_KEY) {
            sessionStorage.setItem('master_login', 'true');
            document.getElementById('gate-keeper').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadKasir();
        } else { alert("Akses Ditolak!"); }
    }

    // --- LOGIKA UTAMA: APPROVE DEPOSIT (ULTRA PROTECTED) ---
    async function approveDepo(btn, id, user, amt) {
        if(btn.disabled) return;
        const depositAmt = Number(amt);
        if(!confirm(`Approve Rp ${depositAmt.toLocaleString()} untuk ${user}?`)) return;

        btn.disabled = true;
        btn.innerText = "WAIT...";

        try {
            // 1. Kunci Transaksi (Update Status duluan)
            const { data: lock, error: lErr } = await _supabase
                .from('deposits')
                .update({ status: 'SUKSES' })
                .eq('id', id)
                .eq('status', 'PROSES')
                .select();

            if(lErr || !lock || lock.length === 0) throw new Error("Transaksi sudah diproses!");

            // 2. Ambil saldo real-time
            const { data: p } = await _supabase.from('profiles').select('saldo').eq('username', user).single();
            const saldoBaru = Number(p.saldo) + depositAmt;

            // 3. Update Saldo
            await _supabase.from('profiles').update({ saldo: saldoBaru }).eq('username', user);

            showAlert(`SUKSES! Saldo ${user} sekarang: Rp ${saldoBaru.toLocaleString()}`);
            loadKasir();
        } catch(e) {
            showAlert("GAGAL: " + e.message);
            loadKasir();
        }
    }

    async function loadKasir() {
        const { data: d } = await _supabase.from('deposits').select('*').eq('status', 'PROSES');
        let h = '';
        if(d) d.forEach(x => {
            h += `
            <div class="card" style="border-left:4px solid var(--green-neon)">
                <span class="card-label">DEPO REQUEST</span>
                <div style="display:flex; justify-content:space-between">
                    <b>${x.username}</b> <span class="profit">+${Number(x.net_receive).toLocaleString()}</span>
                </div>
                <button class="save-btn" style="margin-top:15px" onclick="approveDepo(this, '${x.id}','${x.username}', ${x.net_receive})">APPROVE</button>
            </div>`;
        });
        document.getElementById('list-kasir').innerHTML = h || '<p style="opacity:0.5;text-align:center">Kosong</p>';
    }

    async function loadUser() {
        const { data: u } = await _supabase.from('profiles').select('*').order('username', {ascending:true});
        let h = '';
        if(u) u.forEach(x => {
            h += `
            <div class="card user-item" data-name="${x.username.toLowerCase()}">
                <div style="display:flex; justify-content:space-between">
                    <b>${x.username}</b> <span class="profit">Rp ${Number(x.saldo).toLocaleString()}</span>
                </div>
                <div style="margin-top:15px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div>
                        <small style="font-size:9px">WINRATE %</small>
                        <input type="number" id="wr-${x.id}" value="${x.winrate || 30}" style="padding:5px">
                    </div>
                    <div>
                        <small style="font-size:9px">ADJUST (±)</small>
                        <input type="number" id="adj-${x.id}" placeholder="+/-" style="padding:5px">
                    </div>
                </div>
                <button class="save-btn" style="background:transparent; border:1px solid var(--blue-neon); color:var(--blue-neon); font-size:10px;" onclick="saveU('${x.id}', '${x.username}')">SAVE USER</button>
            </div>`;
        });
        document.getElementById('list-user').innerHTML = h;
    }

    async function saveU(id, user) {
        const wr = document.getElementById(`wr-${id}`).value;
        const adj = Number(document.getElementById(`adj-${id}`).value);
        try {
            await _supabase.from('profiles').update({ winrate: parseInt(wr) }).eq('id', id);
            if(adj !== 0) {
                const { data: p } = await _supabase.from('profiles').select('saldo').eq('id', id).single();
                await _supabase.from('profiles').update({ saldo: Number(p.saldo) + adj }).eq('id', id);
            }
            showAlert("Berhasil Update " + user);
            loadUser();
        } catch(e) { alert("Gagal!"); }
    }

    function switchNav(t, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('tab-' + t).style.display = 'block';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        if(t === 'user') loadUser();
        else loadKasir();
    }

    function filterU() {
        const q = document.getElementById('search-u').value.toLowerCase();
        document.querySelectorAll('.user-item').forEach(i => i.style.display = i.getAttribute('data-name').includes(q) ? 'block' : 'none');
    }

    function logout() { sessionStorage.clear(); window.location.reload(); }
    
    window.onload = () => { if(sessionStorage.getItem('master_login') === 'true') { loginMaster(); } };
</script>
</body>
</html>
