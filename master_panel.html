<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>NEON COMMAND — SUPREME ADMIN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --pink: #ff0077; --blue: #00d4ff; --deepblue: #0044ff;
            --yellow: #f5e642; --bg: #030510; --green: #00ff88;
            --shadow-b: 0 0 15px rgba(0, 212, 255, 0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        /* Login Screen */
        #gate-keeper { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .gate-card { width: 90%; max-width: 380px; padding: 40px; border-radius: 30px; background: rgba(255,255,255,0.02); border: 2px solid var(--blue); text-align: center; box-shadow: var(--shadow-b); }
        
        #main-app { display: none; }
        .nav-top { background: rgba(5,6,20,0.95); padding: 15px 20px; border-bottom: 1px solid rgba(0,212,255,0.2); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; height: 75px; background: #050614; border-top: 1px solid rgba(0,212,255,0.3); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-btn { color: rgba(255,255,255,0.3); font-size: 20px; cursor: pointer; text-align: center; flex: 1; transition: 0.3s; }
        .nav-btn span { display: block; font-size: 8px; margin-top: 4px; font-weight: 800; text-transform: uppercase; }
        .nav-btn.active { color: var(--blue); text-shadow: var(--shadow-b); }

        .content { padding: 20px; padding-bottom: 100px; max-width: 600px; margin: auto; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .card-label { font-size: 10px; color: var(--blue); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; }

        input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 10px; font-family: 'Outfit'; }
        .input-mini { width: 100%; text-align: center; padding: 5px; color: var(--yellow); background: #000; border: 1px solid #444; border-radius: 5px; }

        .btn-main { background: linear-gradient(90deg, var(--blue), var(--deepblue)); color: #000; padding: 12px; border-radius: 10px; font-size: 12px; font-weight: 900; border: none; width: 100%; cursor: pointer; text-transform: uppercase; }
        .btn-main:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        .btn-red { background: var(--pink); color: #fff; }

        .profit { color: var(--green); }
        .loss { color: var(--pink); }

        /* Custom Alert */
        #custom-alert { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .alert-box { width: 85%; max-width: 320px; background: #0a0b1e; border: 2px solid var(--blue); border-radius: 20px; padding: 25px; text-align: center; box-shadow: var(--shadow-b); }
    </style>
</head>
<body>

    <div id="gate-keeper">
        <div class="gate-card">
            <h1 style="font-family:'Cinzel Decorative'; color:var(--blue); font-size:1.5rem;">MASTER ACCESS</h1>
            <p style="font-size:10px; opacity:0.5; margin-bottom:25px;">NEON PLINKO — V5 SUPREME</p>
            <input type="text" id="adm-user" placeholder="Admin ID">
            <input type="password" id="adm-pass" placeholder="Master Key">
            <button onclick="login()" class="btn-main">DECRYPT ACCESS</button>
        </div>
    </div>

    <div id="main-app">
        <div class="nav-top">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-family:'Cinzel Decorative'; font-weight:900; color:var(--pink);">NEON COMMAND</div>
                <button onclick="refreshData()" style="background:none; border:none; color:var(--yellow); font-size:12px; font-weight:800;"><i class="fa-solid fa-sync"></i> SYNC</button>
            </div>
        </div>

        <div class="content">
            <div id="tab-kasir" class="page">
                <h2 style="font-size:14px; margin-bottom:15px; color:var(--blue);">QUEUE TRANSAKSI</h2>
                <div id="list-kasir">Memuat antrean...</div>
            </div>

            <div id="tab-user" class="page" style="display:none">
                <input type="text" id="search-user" placeholder="Cari username..." onkeyup="filterUser()" style="border-color:var(--blue);">
                <div id="list-user">Memuat data pemain...</div>
            </div>
        </div>

        <nav class="nav-bottom">
            <div class="nav-btn active" onclick="switchTab('kasir', this)"><i class="fa-solid fa-cash-register"></i><span>Kasir</span></div>
            <div class="nav-btn" onclick="switchTab('user', this)"><i class="fa-solid fa-users-gear"></i><span>User</span></div>
            <div class="nav-btn" onclick="logout()"><i class="fa-solid fa-power-off"></i><span>Exit</span></div>
        </nav>
    </div>

    <div id="custom-alert">
        <div class="alert-box">
            <p id="a-msg" style="margin-bottom:20px; font-size:14px;"></p>
            <button class="btn-main" onclick="closeAlert()">CONFIRM</button>
        </div>
    </div>

<script>
    const SUPA_URL = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
    const SUPA_KEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani"; 
    const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

    const AUTH = { u: "admin_neon", p: "master777" };

    function showAlert(m) { document.getElementById('a-msg').innerText = m; document.getElementById('custom-alert').style.display = 'flex'; }
    function closeAlert() { document.getElementById('custom-alert').style.display = 'none'; }

    function login() {
        if(document.getElementById('adm-user').value === AUTH.u && document.getElementById('adm-pass').value === AUTH.p) {
            sessionStorage.setItem('adm_auth', 'true');
            document.getElementById('gate-keeper').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            refreshData();
        } else { alert("AKSES DITOLAK!"); }
    }

    function refreshData() { loadKasir(); loadUser(); }

    // --- LOGIKA KASIR (TRIGGER BASED) ---
    async function loadKasir() {
        const { data: d } = await _supa.from('deposits').select('*').eq('status', 'PROSES');
        let h = '';
        if(d) d.forEach(x => {
            h += `
            <div class="card" style="border-left:4px solid var(--green)">
                <span class="card-label">DEPOSIT REQUEST</span>
                <div style="display:flex; justify-content:space-between">
                    <b>${x.username.toUpperCase()}</b> 
                    <span class="profit" style="font-weight:900;">+${Number(x.net_receive).toLocaleString()}</span>
                </div>
                <div style="margin-top:15px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="btn-main" style="background:var(--green)" onclick="approveAction(this, 'deposits', '${x.id}', '${x.username}')">APPROVE</button>
                    <button class="btn-main btn-red" onclick="rejectAction(this, 'deposits', '${x.id}')">REJECT</button>
                </div>
            </div>`;
        });
        document.getElementById('list-kasir').innerHTML = h || '<div style="text-align:center;padding:40px;opacity:0.5;">Antrean Bersih</div>';
    }

    async function approveAction(btn, table, id, user) {
        if(btn.disabled) return;
        if(!confirm(`Konfirmasi transaksi untuk ${user}?`)) return;

        btn.disabled = true;
        btn.innerText = "LOCKING...";

        try {
            // CUKUP UPDATE STATUS. SQL TRIGGER DI SUPABASE AKAN MENAMBAH SALDO SECARA OTOMATIS & AMAN.
            const { data, error } = await _supa
                .from(table)
                .update({ status: 'SUKSES' })
                .eq('id', id)
                .eq('status', 'PROSES')
                .select();

            if(error || !data || data.length === 0) throw new Error("Transaksi sudah diproses sebelumnya!");

            showAlert("BERHASIL! Status 'SUKSES'. Saldo otomatis diperbarui oleh SQL Trigger.");
            loadKasir();
        } catch(e) {
            showAlert("GAGAL: " + e.message);
            loadKasir();
        }
    }

    async function rejectAction(btn, table, id) {
        if(!confirm("Tolak transaksi ini?")) return;
        btn.disabled = true;
        await _supa.from(table).update({ status: 'GAGAL' }).eq('id', id);
        loadKasir();
    }

    // --- LOGIKA USER MANAGEMENT ---
    async function loadUser() {
        const { data } = await _supa.from('profiles').select('*').order('username', {ascending:true});
        if(data) renderUser(data);
    }

    function renderUser(list) {
        document.getElementById('list-user').innerHTML = list.map(u => `
            <div class="card user-item" data-name="${u.username.toLowerCase()}">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b>${u.username.toUpperCase()}</b>
                    <span class="profit" style="font-weight:800;">Rp ${Number(u.saldo).toLocaleString()}</span>
                </div>
                <div style="margin-top:15px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div>
                        <small style="font-size:9px; color:var(--blue)">WINRATE %</small>
                        <input type="number" class="input-mini" id="wr-${u.id}" value="${u.winrate || 30}">
                    </div>
                    <div>
                        <small style="font-size:9px; color:var(--yellow)">MAX WIN LIMIT</small>
                        <input type="number" class="input-mini" id="mwl-${u.id}" value="${u.max_win_limit || 1000000}">
                    </div>
                </div>
                <button class="btn-main" style="margin-top:10px; background:transparent; border:1px solid var(--blue); color:var(--blue); font-size:10px;" onclick="saveUser('${u.id}', '${u.username}')">UPDATE SETTINGS</button>
            </div>
        `).join('');
    }

    async function saveUser(id, user) {
        const wr = document.getElementById(`wr-${id}`).value;
        const mwl = document.getElementById(`mwl-${id}`).value;
        
        try {
            await _supa.from('profiles').update({ 
                winrate: parseInt(wr), 
                max_win_limit: parseInt(mwl) 
            }).eq('id', id);
            showAlert("PENGATURAN " + user + " DISIMPAN!");
            loadUser();
        } catch(e) { alert("Gagal Update!"); }
    }

    function filterUser() {
        const q = document.getElementById('search-user').value.toLowerCase();
        document.querySelectorAll('.user-item').forEach(i => i.style.display = i.getAttribute('data-name').includes(q) ? 'block' : 'none');
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('tab-' + tab).style.display = 'block';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        if(tab === 'user') loadUser();
    }

    function logout() { sessionStorage.clear(); window.location.reload(); }
    window.onload = () => { if(sessionStorage.getItem('adm_auth') === 'true') { login(); } };
</script>
</body>
</html>
