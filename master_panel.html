<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>NEON COMMAND CENTER — GLOBAL ACCESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --gold: #f5e642; --bg: #030510; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }

        /* Login Security Overlay */
        #gate-keeper {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .gate-card { 
            width: 90%; max-width: 380px; padding: 40px 30px; border-radius: 30px;
            background: rgba(255,255,255,0.02); border: 2px solid var(--blue);
            box-shadow: 0 0 40px rgba(0,212,255,0.2); text-align: center;
        }

        /* Dashboard Layout */
        #main-app { display: none; }
        .nav-top { 
            background: rgba(5,6,20,0.95); padding: 15px 20px; border-bottom: 1px solid rgba(0,212,255,0.2);
            position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center;
        }
        .nav-bottom {
            position: fixed; bottom: 0; width: 100%; height: 70px; background: #050614;
            border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-btn { color: rgba(255,255,255,0.3); font-size: 22px; cursor: pointer; text-align: center; }
        .nav-btn span { display: block; font-size: 9px; margin-top: 4px; font-weight: 800; text-transform: uppercase; }
        .nav-btn.active { color: var(--blue); text-shadow: 0 0 10px var(--blue); }

        /* Content Styles */
        .content { padding: 20px; padding-bottom: 100px; }
        .card { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); 
            border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative;
        }
        .search-box { width: 100%; padding: 14px; border-radius: 12px; background: #000; border: 1px solid var(--blue); color: #fff; margin-bottom: 20px; }

        /* Badges & Text */
        .badge { padding: 3px 10px; border-radius: 6px; font-size: 10px; font-weight: 900; margin-left: 5px; }
        .b-blue { background: var(--blue); color: #000; }
        .b-pink { background: var(--pink); color: #fff; }
        .status-online { color: #00ff88; font-size: 10px; font-weight: 800; }

        /* Action Buttons */
        .btn-act { padding: 12px; border-radius: 10px; border: none; font-weight: 900; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .confirm { background: var(--blue); color: #000; }
        .reject { background: #ff4444; color: #fff; }

        /* Modal Custom */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { width: 100%; max-width: 450px; }
    </style>
</head>
<body>

    <div id="gate-keeper">
        <div class="gate-card">
            <h1 style="font-family:'Cinzel Decorative'; color:var(--blue); font-size:1.5rem;">ACCESS GATE</h1>
            <p style="font-size:10px; opacity:0.5; margin-bottom:30px; letter-spacing:2px;">MASTER COMMAND ONLY</p>
            <input type="text" id="master-user" style="width:100%; padding:15px; border-radius:10px; background:#000; border:1px solid #333; color:#fff; margin-bottom:15px;" placeholder="Admin Username">
            <input type="password" id="master-pass" style="width:100%; padding:15px; border-radius:10px; background:#000; border:1px solid #333; color:#fff; margin-bottom:20px;" placeholder="Master Password">
            <button onclick="checkAccess()" style="width:100%; padding:15px; border-radius:10px; border:none; background:var(--blue); color:#000; font-weight:900; cursor:pointer;">DECRYPT & ENTER</button>
        </div>
    </div>

    <div id="main-app">
        <div class="nav-top">
            <div style="font-family:'Cinzel Decorative'; font-weight:900; color:var(--pink);">NEON MASTER</div>
            <div id="online-stats" style="font-size:10px; font-weight:800; color:var(--gold);">REFRESHING...</div>
        </div>

        <div class="content">
            <div id="tab-finance" class="page">
                <h2 style="font-size:14px; margin-bottom:15px; color:var(--blue);"><i class="fa-solid fa-money-bill-transfer"></i> ANTREAN TRANSAKSI</h2>
                <div id="finance-list"></div>
            </div>

            <div id="tab-users" class="page" style="display:none">
                <input type="text" id="user-search" class="search-box" placeholder="Cari User / No. HP / Bank..." onkeyup="filterUsers()">
                <div id="user-list"></div>
            </div>

            <div id="tab-reward" class="page" style="display:none">
                <h2 style="font-size:14px; margin-bottom:15px; color:var(--blue);"><i class="fa-solid fa-gift"></i> SEND REWARD SYSTEM</h2>
                <div class="card">
                    <input type="text" id="gift-target" class="search-box" style="margin-bottom:10px" placeholder="Username Penerima">
                    <input type="number" id="gift-amt" class="search-box" style="margin-bottom:10px" placeholder="Nominal Hadiah (IDR)">
                    <textarea id="gift-msg" class="search-box" style="height:80px;" placeholder="Pesan untuk pemain...">Bonus Jackpot Master!</textarea>
                    <button class="btn-act confirm" style="width:100%" onclick="sendGift()">KIRIM KE INBOX</button>
                </div>
            </div>
        </div>

        <nav class="nav-bottom">
            <div class="nav-btn active" onclick="switchNav('finance', this)"><i class="fa-solid fa-cash-register"></i><span>Keuangan</span></div>
            <div class="nav-btn" onclick="switchNav('users', this)"><i class="fa-solid fa-users-gear"></i><span>Pemain</span></div>
            <div class="nav-btn" onclick="switchNav('reward', this)"><i class="fa-solid fa-gift"></i><span>Hadiah</span></div>
            <div class="nav-btn" onclick="logout()"><i class="fa-solid fa-power-off"></i><span>Exit</span></div>
        </nav>
    </div>

    <div id="user-modal" class="modal">
        <div class="modal-body card" style="border:1px solid var(--blue)">
            <h3 id="edit-name" style="color:var(--blue); margin-bottom:15px;">USER CONTROL</h3>
            <div style="font-size:12px; margin-bottom:20px; line-height:1.6; color:#ccc;" id="edit-detail"></div>
            
            <label style="font-size:11px; color:var(--gold); font-weight:800;">SET WINRATE (1-100%)</label>
            <input type="number" id="edit-winrate" class="search-box" style="margin:8px 0 20px 0">
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button class="btn-act confirm" onclick="saveUserControl()">SAVE CHANGES</button>
                <button class="btn-act" style="background:#333; color:#fff;" onclick="closeModal()">CLOSE</button>
            </div>
        </div>
    </div>

<script>
    // SECURITY CONFIG
    const MASTER_KEY = { u: "admin_neon", p: "master777" };
    let usersData = [];

    function checkAccess() {
        const u = document.getElementById('master-user').value;
        const p = document.getElementById('master-pass').value;
        if(u === MASTER_KEY.u && p === MASTER_KEY.p) {
            sessionStorage.setItem('master_auth', 'true');
            document.getElementById('gate-keeper').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            initDashboard();
        } else { alert("AKSES DITOLAK!"); }
    }

    async function initDashboard() {
        loadFinance();
        loadUsers();
        setInterval(loadFinance, 10000); // Auto refresh keuangan tiap 10 detik
    }

    // FINANCE LOGIC
    async function loadFinance() {
        const { data: depo } = await _supabase.from('deposits').select('*').eq('status', 'PROSES');
        const { data: wd } = await _supabase.from('withdrawals').select('*').eq('status', 'PROSES');
        
        const container = document.getElementById('finance-list');
        let html = '';

        if(depo) depo.forEach(d => {
            html += `
            <div class="card" style="border-left: 4px solid var(--blue)">
                <div style="font-size:10px; opacity:0.5; margin-bottom:5px;">DEPOSIT REQUEST</div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <b>${d.username}</b>
                    <b style="color:var(--blue)">IDR ${parseFloat(d.net_receive).toLocaleString()}</b>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="btn-act confirm" onclick="approveDepo('${d.id}', '${d.username}', ${d.net_receive})">APPROVE</button>
                    <button class="btn-act reject" onclick="rejectTx('deposits', '${d.id}')">REJECT</button>
                </div>
            </div>`;
        });

        if(wd) wd.forEach(w => {
            html += `
            <div class="card" style="border-left: 4px solid var(--pink)">
                <div style="font-size:10px; opacity:0.5; margin-bottom:5px;">WITHDRAW REQUEST</div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <b>${w.username}</b>
                    <b style="color:var(--pink)">IDR ${parseFloat(w.amount).toLocaleString()}</b>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="btn-act confirm" style="background:var(--pink); color:#fff;" onclick="approveWd('${w.id}')">SUCCESS (PAID)</button>
                    <button class="btn-act reject" onclick="rejectTx('withdrawals', '${w.id}')">REJECT</button>
                </div>
            </div>`;
        });

        container.innerHTML = html || '<p style="text-align:center; opacity:0.3; padding:40px;">Tidak ada antrean transaksi</p>';
    }

    // USER LOGIC
    async function loadUsers() {
        const { data } = await _supabase.from('profiles').select('*').order('total_depo', {ascending: false});
        usersData = data || [];
        renderUsers(usersData);
        
        const onlineCount = usersData.filter(u => (new Date() - new Date(u.last_active)) < 300000).length;
        document.getElementById('online-stats').innerText = onlineCount + " PEMAIN ONLINE";
    }

    function renderUsers(list) {
        const container = document.getElementById('user-list');
        container.innerHTML = list.map(u => {
            const isOnline = (new Date() - new Date(u.last_active)) < 300000;
            const tier = getTier(u.total_depo || 0);
            return `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <div>
                        ${isOnline ? '<span class="status-online">● ONLINE</span>' : '<span style="opacity:0.3; font-size:10px;">OFFLINE</span>'}
                        <div style="font-weight:900; font-size:16px;">${u.username} <span class="badge b-blue">VIP ${tier}</span></div>
                        <div style="font-size:10px; opacity:0.5;">${u.nama_lengkap} | ${u.phone}</div>
                    </div>
                    <div style="text-align:right">
                        <div style="color:var(--gold); font-weight:900;">Rp ${u.saldo.toLocaleString()}</div>
                        <div style="font-size:9px; opacity:0.5;">Winrate: ${u.winrate}%</div>
                    </div>
                </div>
                <button class="btn-act confirm" style="width:100%; margin-top:15px; font-size:10px; padding:8px;" onclick="openControl('${u.username}')">KONTROL AKUN & RTP</button>
            </div>`;
        }).join('');
    }

    function getTier(total) {
        if(total >= 5000000) return 5;
        if(total >= 2000000) return 4;
        if(total >= 1000000) return 3;
        if(total >= 200000) return 2;
        return 1;
    }

    function openControl(user) {
        const u = usersData.find(x => x.username === user);
        document.getElementById('edit-name').innerText = "CONTROL: " + user;
        document.getElementById('edit-winrate').value = u.winrate;
        document.getElementById('edit-detail').innerHTML = `
            <b>Password:</b> ${u.password}<br>
            <b>Bank:</b> ${u.bank_name} - ${u.rekening}<br>
            <b>Total Depo:</b> Rp ${u.total_depo?.toLocaleString() || 0}<br>
            <b>Total WD:</b> Rp ${u.total_wd?.toLocaleString() || 0}
        `;
        document.getElementById('user-modal').style.display = 'flex';
        window.currentEdit = user;
    }

    async function saveUserControl() {
        const wr = document.getElementById('edit-winrate').value;
        await _supabase.from('profiles').update({ winrate: wr }).eq('username', window.currentEdit);
        alert("Update Berhasil!");
        closeModal(); loadUsers();
    }

    // HELPER FUNCTIONS
    function switchNav(tab, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('tab-' + tab).style.display = 'block';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function filterUsers() {
        const q = document.getElementById('user-search').value.toLowerCase();
        const filtered = usersData.filter(u => u.username.toLowerCase().includes(q) || u.nama_lengkap.toLowerCase().includes(q));
        renderUsers(filtered);
    }

    async function approveDepo(id, user, amt) {
        const { data: p } = await _supabase.from('profiles').select('saldo, total_depo').eq('username', user).single();
        await _supabase.from('profiles').update({ 
            saldo: (p.saldo + amt), 
            total_depo: (p.total_depo || 0) + amt 
        }).eq('username', user);
        await _supabase.from('deposits').update({ status: 'SUKSES' }).eq('id', id);
        loadFinance(); loadUsers();
    }

    async function approveWd(id) {
        await _supabase.from('withdrawals').update({ status: 'SUKSES' }).eq('id', id);
        loadFinance();
    }

    async function rejectTx(table, id) {
        if(confirm("Tolak transaksi ini?")) {
            await _supabase.from(table).update({ status: 'REJECT' }).eq('id', id);
            loadFinance();
        }
    }

    async function sendGift() {
        const user = document.getElementById('gift-target').value;
        const amt = document.getElementById('gift-amt').value;
        const msg = document.getElementById('gift-msg').value;
        if(!user || !amt) return alert("Data tidak lengkap");

        await _supabase.from('inbox').insert([{ username: user, title: "BONUS MASTER", message: msg, reward_amount: amt, status: 'UNREAD' }]);
        alert("Reward dikirim ke inbox user!");
        document.getElementById('gift-amt').value = "";
    }

    function closeModal() { document.getElementById('user-modal').style.display = 'none'; }
    function logout() { sessionStorage.clear(); window.location.reload(); }

    window.onload = () => {
        if(sessionStorage.getItem('master_auth') === 'true') {
            document.getElementById('gate-keeper').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            initDashboard();
        }
    };
</script>
</body>
</html>
