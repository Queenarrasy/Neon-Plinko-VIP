    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
    const SUPABASE_URL = "https://jcxgankdwfwfnbwlkkpz.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjeGdhbmtkd2Z3Zm5id2xra3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDU0MjMsImV4cCI6MjA5MDgyMTQyM30.qBNQNZxeHLfG7U-HZDSkYg1Y4awPKcJ7J2XjnkiJ6PI";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const _db = _supabase;

    // ══════════════════════════════════════════════════
    //  GANTI PASSWORD ADMIN DI SINI
    const ADMIN_PASSWORD = 'OMEGA18';
    // ══════════════════════════════════════════════════

    function showNeonAlertGlobal(msg, type='') {
        const a = document.getElementById('neon-alert');
        if(!a) return;
        a.innerText = msg;
        a.className = type==='ok' ? 'show ok' : 'show';
        clearTimeout(a._t);

    function formatIDR(v){ return "IDR "+Math.floor(v||0).toLocaleString('id-ID'); }
    </script>
    <style>
        :root{
            --pink:#ff0077; --blue:#0022ff; --yellow:#fbff00; --bg:#000005;
            --gp:0 0 8px rgba(255,0,119,.7),0 0 22px rgba(255,0,119,.25);
            --gb:0 0 8px rgba(0,34,255,.7),0 0 22px rgba(0,34,255,.25);
            --gy:0 0 8px rgba(251,255,0,.7),0 0 22px rgba(251,255,0,.25);
            --green:#00ff88;
            --card:rgba(0,0,40,.72); --border:rgba(0,34,255,.32);
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;height:100svh;overflow:hidden;position:fixed;width:100%;top:0;left:0;}
        #particles-js{position:fixed;width:100%;height:100%;z-index:0;background:radial-gradient(circle at center,#000022,#000);pointer-events:none !important;}

        #neon-alert{position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:86%;max-width:340px;background:rgba(0,0,15,.97);border:1.5px solid var(--pink);border-top:2px solid var(--yellow);color:#fff;padding:14px 20px;border-radius:14px;text-align:center;font-weight:900;z-index:9999;font-size:13px;transition:.55s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 0 16px rgba(255,0,119,.4);}
        #neon-alert.show{top:12px;}
        #neon-alert.ok{border-color:var(--blue);box-shadow:0 0 16px rgba(0,34,255,.4);}

        #gate-overlay{position:fixed;inset:0;background:#000005;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;}
        .gate-box{position:relative;background:rgba(0,0,20,.98);border:2px solid var(--pink);border-top:3px solid var(--yellow);border-radius:24px;padding:34px 28px;width:88%;max-width:340px;text-align:center;box-shadow:0 0 50px rgba(255,0,119,.3);}
        .gate-logo{font-family:'Cinzel Decorative',serif;color:var(--pink);font-size:24px;text-shadow:var(--gp);margin-bottom:4px;}
        .gate-logo span{color:var(--yellow);text-shadow:var(--gy);}
        .gate-input{width:100%;background:#000;border:1.5px solid rgba(255,0,119,.4);border-radius:10px;color:var(--yellow);font-size:24px;font-weight:900;padding:13px;text-align:center;outline:none;letter-spacing:6px;margin-bottom:16px;}
        .gate-btn{width:100%;padding:14px;background:linear-gradient(90deg,var(--pink),#aa0044);color:#fff;border:none;border-radius:10px;font-weight:900;cursor:pointer;text-transform:uppercase;}

        .header{background:rgba(0,0,22,.97);padding:10px 16px;border-bottom:1.5px solid var(--blue);display:flex;justify-content:space-between;align-items:center;position:relative;z-index:100;}
        .logo-text{font-family:'Cinzel Decorative',serif;color:var(--pink);font-size:16px;text-shadow:var(--gp);}
        .logo-text span{color:var(--yellow);text-shadow:var(--gy);}

        #stats-bar{display:flex;background:rgba(0,0,10,.95);border-bottom:1px solid rgba(0,34,255,.2);position:relative;z-index:99;}
        .stat-pill{flex:1;padding:6px 4px;text-align:center;border-right:1px solid rgba(0,34,255,.12);}
        .stat-pill .sp-val{font-size:11px;font-weight:900;color:var(--yellow);display:block;}
        .stat-pill .sp-lbl{font-size:7px;color:rgba(255,255,255,.3);text-transform:uppercase;}

        .nav-tabs{display:flex;background:rgba(0,0,0,.92);border-bottom:1px solid rgba(0,34,255,.28);overflow-x:auto;position:relative;z-index:100;}
        .tab-link{flex:1;padding:11px 6px;text-align:center;color:rgba(255,255,255,.3);cursor:pointer;font-size:9px;font-weight:900;text-transform:uppercase;transition:.3s;min-width:60px;}
        .tab-link.active{color:var(--yellow);border-bottom:2px solid var(--yellow);background:rgba(251,255,0,.03);}
        .tab-link i{display:block;font-size:15px;margin-bottom:3px;}

        .main-container{height:calc(100svh - 160px);overflow-y:auto;padding:12px;position:relative;z-index:10;}
        .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;backdrop-filter:blur(6px);}
        .sec-title{font-size:9px;font-weight:900;color:var(--pink);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
        
        .monitor-table{width:100%;border-collapse:collapse;font-size:11px;}
        .monitor-table th{color:var(--pink);text-align:left;padding:9px 7px;border-bottom:1px solid rgba(255,0,119,.25);font-size:8px;text-transform:uppercase;}
        .monitor-table td{padding:9px 7px;border-bottom:1px solid rgba(0,34,255,.1);}

        .btn-approve{background:linear-gradient(90deg,#00ff88,#00cc66);color:#000;font-weight:900;border:none;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:9px;}
        .btn-reject{background:linear-gradient(90deg,#ff0055,#cc0044);color:#fff;font-weight:900;border:none;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:9px;margin-left:4px;}
        .btn-approve:disabled{opacity:0.5;cursor:not-allowed;filter:grayscale(1);}

        .input-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
        .field{background:rgba(0,0,0,.75);border:1px solid rgba(0,34,255,.28);padding:8px;border-radius:8px;}
        .field label{font-size:7px;color:var(--yellow);display:block;margin-bottom:4px;font-weight:900;text-transform:uppercase;}
        .field input{width:100%;background:transparent;border:none;color:#fff;font-size:14px;font-weight:900;outline:none;text-align:center;}
        .btn-save{width:100%;padding:12px;background:var(--yellow);color:#000;border:none;border-radius:8px;font-weight:900;margin-top:10px;cursor:pointer;}
    </style>
</head>
<body>

<div id="particles-js"></div>
<div id="neon-alert"></div>

<div id="gate-overlay">
    <div class="gate-box">
        <div class="gate-logo">OMEGA<span>V18</span></div>
        <div style="font-size:8px;color:rgba(255,255,255,.3);margin-bottom:20px;letter-spacing:2px;">MASTER COMMAND CENTER</div>
        <input type="password" id="gate-pass" class="gate-input" placeholder="••••••">
        <button onclick="checkGate()" class="gate-btn">ACCESS SYSTEM</button>
        <div id="gate-err" style="color:var(--pink);font-size:10px;margin-top:10px;display:none;">INVALID ACCESS KEY</div>
    </div>
</div>

<div class="header">
    <div class="logo-text">OMEGA<span>V18</span> <span style="font-size:8px;opacity:.5;">ADMIN</span></div>
    <div id="header-clock" style="font-size:10px;opacity:.6;">00:00:00</div>
</div>

<div id="stats-bar">
    <div class="stat-pill"><span id="stat-depo" class="sp-val">IDR 0</span><span class="sp-lbl">TOTAL DEPO</span></div>
    <div class="stat-pill"><span id="stat-wd" class="sp-val">IDR 0</span><span class="sp-lbl">TOTAL WD</span></div>
    <div class="stat-pill"><span id="stat-players" class="sp-val">0</span><span class="sp-lbl">PLAYERS</span></div>
</div>

<div class="nav-tabs">
    <div class="tab-link active" onclick="switchTab('depo', this)"><i class="fas fa-arrow-down"></i>DEPO</div>
    <div class="tab-link" onclick="switchTab('wd', this)"><i class="fas fa-arrow-up"></i>WD</div>
    <div class="tab-link" onclick="switchTab('players', this)"><i class="fas fa-users"></i>USERS</div>
    <div class="tab-link" onclick="switchTab('config', this)"><i class="fas fa-cogs"></i>CONFIG</div>
</div>

<div class="main-container">
    
    <div id="view-depo" class="tab-content">
        <div class="card">
            <div class="sec-title"><i class="fas fa-clock"></i> PENDING DEPOSITS</div>
            <table class="monitor-table">
                <thead><tr><th>USER</th><th>NOMINAL</th><th>AKSI</th></tr></thead>
                <tbody id="list-depo"></tbody>
            </table>
        </div>
    </div>

    <div id="view-wd" class="tab-content" style="display:none;">
        <div class="card">
            <div class="sec-title"><i class="fas fa-clock"></i> PENDING WITHDRAWALS</div>
            <table class="monitor-table">
                <thead><tr><th>USER</th><th>NOMINAL</th><th>AKSI</th></tr></thead>
                <tbody id="list-wd"></tbody>
            </table>
        </div>
    </div>

    <div id="view-players" class="tab-content" style="display:none;">
        <div id="list-players"></div>
    </div>

    <div id="view-config" class="tab-content" style="display:none;">
        <div class="card">
            <div class="sec-title"><i class="fas fa-tools"></i> SYSTEM CONFIG</div>
            <div class="input-group">
                <div class="field"><label>MIN DEPO</label><input type="number" id="cfg-min-depo"></div>
                <div class="field"><label>MIN WD</label><input type="number" id="cfg-min-wd"></div>
            </div>
            <button class="btn-save" onclick="saveConfig()">SAVE CHANGES</button>
        </div>
    </div>

</div>

<script>
// ── GATE LOGIC ────────────────────────────────────────────────
function checkGate() {
    const p = document.getElementById('gate-pass').value;
    if(p === ADMIN_PASSWORD) {
        document.getElementById('gate-overlay').style.display = 'none';
        init();
    } else {
        document.getElementById('gate-err').style.display = 'block';
    }
}

// ── CORE LOGIC ────────────────────────────────────────────────
async function init() {
    particlesJS('particles-js', {
        particles: { number: { value: 40 }, color: { value: '#0022ff' }, opacity: { value: 0.2 }, move: { speed: 1 } }
    });
    setInterval(() => {
        document.getElementById('header-clock').innerText = new Date().toLocaleTimeString('id-ID');
    }, 1000);
    
    fetchAll();
    // Realtime Listener
    _db.channel('any').on('postgres_changes',{event:'*',schema:'public'},()=>fetchAll()).subscribe();
}

async function fetchAll() {
    // Ambil hanya yang statusnya PROSES agar daftar selalu bersih
    const {data:depo} = await _db.from('deposits').select('*').eq('status','PROSES').order('created_at',{ascending:false});
    const {data:wd} = await _db.from('withdrawals').select('*').eq('status','PROSES').order('created_at',{ascending:false});
    const {data:users} = await _db.from('profiles').select('*').order('created_at',{ascending:false});
    const {data:cfg} = await _db.from('system_config').select('*').single();

    renderDeposits(depo);
    renderWithdrawals(wd);
    renderPlayers(users);
    
    if(cfg) {
        document.getElementById('cfg-min-depo').value = cfg.min_deposit;
        document.getElementById('cfg-min-wd').value = cfg.min_withdraw;
    }

    // Stats
    const {data:dAll} = await _db.from('deposits').select('amount').eq('status','APPROVE');
    const {data:wAll} = await _db.from('withdrawals').select('amount').eq('status','APPROVE');
    document.getElementById('stat-depo').innerText = formatIDR(dAll.reduce((a,b)=>a+b.amount,0));
    document.getElementById('stat-wd').innerText = formatIDR(wAll.reduce((a,b)=>a+b.amount,0));
    document.getElementById('stat-players').innerText = users.length;
}

// ── TRANSAKSI FIX (ANTI-DOUBLE & AUTO-HIDE) ───────────────────
async function approveDeposit(id, username, amount, btn) {
    if(!confirm(`Approve ${formatIDR(amount)} untuk ${username}?`)) return;

    // 1. Kunci tombol agar tidak bisa diklik lagi
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

    try {
        // 2. Gunakan filter status='PROSES' untuk memastikan hanya satu eksekusi yang berhasil
        const { data: updateRes, error: updError } = await _db
            .from('deposits')
            .update({ status: 'APPROVE', updated_at: new Date() })
            .eq('id', id)
            .eq('status', 'PROSES') // KUNCI UTAMA
            .select();

        if (updError || !updateRes || updateRes.length === 0) {
            throw new Error("Transaksi sudah diproses atau gagal.");
        }

        // 3. Update Saldo Player
        const { data: p } = await _db.from('profiles').select('saldo').eq('username', username).single();
        const newSaldo = Number(p.saldo) + Number(amount);
        await _db.from('profiles').update({ saldo: newSaldo }).eq('username', username);

        showNeonAlertGlobal("DEPOSIT APPROVED!", "ok");
        fetchAll(); // Re-fetch akan otomatis menghilangkan baris ini karena status bukan PROSES lagi
    } catch (err) {
        alert(err.message);
        btn.disabled = false;
        btn.innerText = "APPROVE";
    }
}

async function rejectDeposit(id, btn) {
    if(!confirm("Reject deposit ini?")) return;
    btn.disabled = true;
    await _db.from('deposits').update({status:'REJECT'}).eq('id',id).eq('status','PROSES');
    fetchAll();
}

async function approveWithdraw(id, username, amount, btn) {
    if(!confirm(`Approve WD ${formatIDR(amount)} untuk ${username}?`)) return;
    btn.disabled = true;
    const {data} = await _db.from('withdrawals').update({status:'APPROVE'}).eq('id',id).eq('status','PROSES').select();
    if(data && data.length > 0) {
        showNeonAlertGlobal("WITHDRAW BERHASIL!", "ok");
    }
    fetchAll();
}

// ── RENDERING ─────────────────────────────────────────────────
function renderDeposits(list) {
    const container = document.getElementById('list-depo');
    if(!list || list.length === 0) {
        container.innerHTML = '<tr><td colspan="3" style="text-align:center;opacity:0.3;padding:20px;">No Pending Data</td></tr>';
        return;
    }
    container.innerHTML = list.map(item => `
        <tr>
            <td style="color:var(--yellow);font-weight:900;">${item.username}</td>
            <td>${formatIDR(item.amount)}</td>
            <td>
                <button class="btn-approve" onclick="approveDeposit('${item.id}','${item.username}',${item.amount}, this)">APPROVE</button>
                <button class="btn-reject" onclick="rejectDeposit('${item.id}', this)">REJECT</button>
            </td>
        </tr>
    `).join('');
}

function renderWithdrawals(list) {
    const container = document.getElementById('list-wd');
    if(!list || list.length === 0) {
        container.innerHTML = '<tr><td colspan="3" style="text-align:center;opacity:0.3;padding:20px;">No Pending Data</td></tr>';
        return;
    }
    container.innerHTML = list.map(item => `
        <tr>
            <td style="color:var(--pink);font-weight:900;">${item.username}</td>
            <td>${formatIDR(item.amount)}</td>
            <td>
                <button class="btn-approve" onclick="approveWithdraw('${item.id}','${item.username}',${item.amount}, this)">APPROVE</button>
            </td>
        </tr>
    `).join('');
}

function renderPlayers(list) {
    const container = document.getElementById('list-players');
    container.innerHTML = list.map(p => `
        <div class="card" style="border-color:rgba(255,255,255,0.1)">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div style="font-weight:900;color:var(--yellow);">${p.username}</div>
                <div style="font-size:12px;color:var(--green);font-weight:900;">${formatIDR(p.saldo)}</div>
            </div>
            <div style="font-size:8px;opacity:0.4;margin-top:5px;">JOINED: ${new Date(p.created_at).toLocaleDateString()}</div>
        </div>
    `).join('');
}

// ── NAVIGATION ────────────────────────────────────────────────
function switchTab(tab, el) {
    document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    document.getElementById('view-' + tab).style.display = 'block';
}

async function saveConfig() {
    const minD = document.getElementById('cfg-min-depo').value;
    const minW = document.getElementById('cfg-min-wd').value;
    await _db.from('system_config').update({min_deposit:minD, min_withdraw:minW}).eq('id',1);
    showNeonAlertGlobal("CONFIG SAVED!", "ok");
}
</script>
</body>
</html>
