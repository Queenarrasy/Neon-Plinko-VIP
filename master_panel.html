<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>NEON COMMAND CENTER — GLOBAL ACCESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --gold: #f5e642; --bg: #030510; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }

        #gate-keeper { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .gate-card { width: 90%; max-width: 380px; padding: 40px 30px; border-radius: 30px; background: rgba(255,255,255,0.02); border: 2px solid var(--blue); box-shadow: 0 0 40px rgba(0,212,255,0.2); text-align: center; }

        #main-app { display: none; }
        .nav-top { background: rgba(5,6,20,0.95); padding: 15px 20px; border-bottom: 1px solid rgba(0,212,255,0.2); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; height: 70px; background: #050614; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { color: rgba(255,255,255,0.3); font-size: 22px; cursor: pointer; text-align: center; }
        .nav-btn span { display: block; font-size: 9px; margin-top: 4px; font-weight: 800; text-transform: uppercase; }
        .nav-btn.active { color: var(--blue); text-shadow: 0 0 10px var(--blue); }

        .content { padding: 20px; padding-bottom: 100px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .search-box { width: 100%; padding: 14px; border-radius: 12px; background: #000; border: 1px solid var(--blue); color: #fff; margin-bottom: 20px; }
        
        .btn-act { padding: 12px; border-radius: 10px; border: none; font-weight: 900; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .confirm { background: var(--blue); color: #000; }
        .reject { background: #ff4444; color: #fff; }
    </style>
</head>
<body>

    <div id="gate-keeper">
        <div class="gate-card">
            <h1 style="font-family:'Cinzel Decorative'; color:var(--blue); font-size:1.5rem;">ACCESS GATE</h1>
            <p style="font-size:10px; opacity:0.5; margin-bottom:30px; letter-spacing:2px;">MASTER COMMAND ONLY</p>
            <input type="text" id="master-user" style="width:100%; padding:15px; border-radius:10px; background:#000; border:1px solid #333; color:#fff; margin-bottom:15px;" placeholder="Admin Username">
            <input type="password" id="master-pass" style="width:100%; padding:15px; border-radius:10px; background:#000; border:1px solid #333; color:#fff; margin-bottom:20px;" placeholder="Master Password">
            <button onclick="checkAccess()" style="width:100%; padding:15px; border-radius:10px; border:none; background:var(--blue); color:#000; font-weight:900; cursor:pointer;">DECRYPT & ENTER</button>
        </div>
    </div>

    <div id="main-app">
        <div class="nav-top">
            <div style="font-family:'Cinzel Decorative'; font-weight:900; color:var(--pink);">NEON MASTER</div>
            <div id="online-stats" style="font-size:10px; font-weight:800; color:var(--gold);">SINKRONISASI...</div>
        </div>

        <div class="content">
            <div id="tab-finance" class="page">
                <h2 style="font-size:14px; margin-bottom:15px; color:var(--blue);"><i class="fa-solid fa-money-bill-transfer"></i> ANTREAN TRANSAKSI</h2>
                <div id="finance-list">Menunggu data...</div>
            </div>

            <div id="tab-users" class="page" style="display:none">
                <input type="text" id="user-search" class="search-box" placeholder="Cari Username Pemain..." onkeyup="filterUsers()">
                <div id="user-list">Memuat daftar pemain...</div>
            </div>

            <div id="tab-reward" class="page" style="display:none">
                <h2 style="font-size:14px; margin-bottom:15px; color:var(--blue);"><i class="fa-solid fa-gift"></i> KIRIM HADIAH</h2>
                <div class="card">
                    <p style="font-size: 11px; color: var(--pink); margin-bottom: 15px;" id="inbox-status"></p>
                    <input type="text" id="gift-target" class="search-box" placeholder="Username Penerima">
                    <input type="number" id="gift-amt" class="search-box" placeholder="Nominal IDR">
                    <textarea id="gift-msg" class="search-box" style="height:80px;">Bonus Loyalty Master!</textarea>
                    <button class="btn-act confirm" style="width:100%" onclick="sendGift()">KIRIM SEKARANG</button>
                </div>
            </div>
        </div>

        <nav class="nav-bottom">
            <div class="nav-btn active" onclick="switchNav('finance', this)"><i class="fa-solid fa-cash-register"></i><span>Keuangan</span></div>
            <div class="nav-btn" onclick="switchNav('users', this)"><i class="fa-solid fa-users-gear"></i><span>Pemain</span></div>
            <div class="nav-btn" onclick="switchNav('reward', this)"><i class="fa-solid fa-gift"></i><span>Hadiah</span></div>
            <div class="nav-btn" onclick="logout()"><i class="fa-solid fa-power-off"></i><span>Exit</span></div>
        </nav>
    </div>

<script>
    const sb_url = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
    const sb_key = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani";
    const _supabase = supabase.createClient(sb_url, sb_key);

    const MASTER_KEY = { u: "admin_neon", p: "master777" };
    let usersData = [];

    function checkAccess() {
        const u = document.getElementById('master-user').value;
        const p = document.getElementById('master-pass').value;
        if(u === MASTER_KEY.u && p === MASTER_KEY.p) {
            sessionStorage.setItem('master_auth', 'true');
            document.getElementById('gate-keeper').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            initDashboard();
        } else { alert("AKSES DITOLAK!"); }
    }

    async function initDashboard() {
        loadFinance();
        loadUsers();
        setInterval(loadFinance, 10000); 
        setInterval(loadUsers, 30000); 
    }

    async function loadFinance() {
        try {
            const { data: depo, error: errD } = await _supabase.from('deposits').select('*').eq('status', 'PROSES');
            const { data: wd, error: errW } = await _supabase.from('withdrawals').select('*').eq('status', 'PROSES');
            
            const container = document.getElementById('finance-list');
            let html = '';

            if (depo && depo.length > 0) {
                depo.forEach(d => {
                    html += `<div class="card" style="border-left: 4px solid var(--blue)">
                        <div style="font-size:10px; opacity:0.5; margin-bottom:5px;">DEPOSIT REQUEST</div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <b>${d.username}</b>
                            <b style="color:var(--blue)">Rp ${parseFloat(d.net_receive || 0).toLocaleString()}</b>
                        </div>
                        <div style="margin-top:15px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                            <button class="btn-act confirm" onclick="approveDepo('${d.id}', '${d.username}', ${d.net_receive})">APPROVE</button>
                            <button class="btn-act reject" onclick="rejectTx('deposits', '${d.id}')">REJECT</button>
                        </div>
                    </div>`;
                });
            }

            if (wd && wd.length > 0) {
                wd.forEach(w => {
                    html += `<div class="card" style="border-left: 4px solid var(--pink)">
                        <div style="font-size:10px; opacity:0.5; margin-bottom:5px;">WITHDRAW REQUEST</div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <b>${w.username}</b>
                            <b style="color:var(--pink)">Rp ${parseFloat(w.amount || 0).toLocaleString()}</b>
                        </div>
                        <div style="margin-top:15px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                            <button class="btn-act confirm" style="background:var(--pink); color:#fff;" onclick="approveWd('${w.id}')">SUCCESS</button>
                            <button class="btn-act reject" onclick="rejectTx('withdrawals', '${w.id}')">REJECT</button>
                        </div>
                    </div>`;
                });
            }
            container.innerHTML = html || '<p style="text-align:center; opacity:0.3; padding:40px;">Antrean Kosong</p>';
        } catch (e) { container.innerHTML = "Error koneksi tabel keuangan."; }
    }

    async function loadUsers() {
        try {
            const { data, error } = await _supabase.from('profiles').select('*');
            if(error) throw error;
            usersData = data || [];
            renderUsers(usersData);
            document.getElementById('online-stats').innerText = usersData.length + " PEMAIN TERDAFTAR";
        } catch (e) { document.getElementById('online-stats').innerText = "DATABASE OFFLINE"; }
    }

    function renderUsers(list) {
        const container = document.getElementById('user-list');
        if(list.length === 0) {
            container.innerHTML = '<p style="text-align:center; opacity:0.3; padding:40px;">Belum ada pemain.</p>';
            return;
        }
        container.innerHTML = list.map(u => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <div>
                        <div style="font-weight:900; font-size:15px;">${u.username}</div>
                        <div style="font-size:10px; opacity:0.5;">No: ${u.phone || '-'} | RTP: ${u.winrate || 0}%</div>
                    </div>
                    <div style="text-align:right">
                        <div style="color:var(--gold); font-weight:800;">Rp ${(u.saldo || 0).toLocaleString()}</div>
                        <button style="background:none; border:none; color:var(--blue); font-size:10px; font-weight:900; margin-top:5px;" onclick="alert('Password: ${u.password}')">INTIP PASSWORD</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function switchNav(tab, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('tab-' + tab).style.display = 'block';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function filterUsers() {
        const q = document.getElementById('user-search').value.toLowerCase();
        renderUsers(usersData.filter(u => u.username.toLowerCase().includes(q)));
    }

    async function approveDepo(id, user, amt) {
        try {
            const { data: p } = await _supabase.from('profiles').select('saldo').eq('username', user).single();
            await _supabase.from('profiles').update({ saldo: (p.saldo + amt) }).eq('username', user);
            await _supabase.from('deposits').update({ status: 'SUKSES' }).eq('id', id);
            alert("Deposit Berhasil!"); 
            loadFinance(); loadUsers();
        } catch(e) { alert("Gagal approve. Cek saldo user."); }
    }

    async function approveWd(id) {
        await _supabase.from('withdrawals').update({ status: 'SUKSES' }).eq('id', id);
        alert("WD Sukses!"); loadFinance();
    }

    async function rejectTx(table, id) {
        if(confirm("Tolak transaksi?")) {
            await _supabase.from(table).update({ status: 'REJECT' }).eq('id', id);
            loadFinance();
        }
    }

    async function sendGift() {
        const user = document.getElementById('gift-target').value;
        const amt = document.getElementById('gift-amt').value;
        const msg = document.getElementById('gift-msg').value;
        
        const { error } = await _supabase.from('inbox').insert([{ 
            username: user, title: "BONUS MASTER", message: msg, reward_amount: amt, status: 'UNREAD' 
        }]);
        
        if(error) {
            document.getElementById('inbox-status').innerText = "⚠️ TABEL 'INBOX' BELUM DIBUAT DI SUPABASE!";
            alert("Gagal: Tabel 'inbox' tidak ditemukan di database.");
        } else {
            alert("Hadiah terkirim!");
        }
    }

    function logout() { sessionStorage.clear(); window.location.reload(); }

    window.onload = () => {
        if(sessionStorage.getItem('master_auth') === 'true') {
            document.getElementById('gate-keeper').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            initDashboard();
        }
    };
</script>
</body>
</html>
