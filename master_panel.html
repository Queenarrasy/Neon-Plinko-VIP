<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>NEON COMMAND — SUPREME ADMIN V10</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --pink: #ff0077; --blue: #0022ff; --cyan: #00d4ff;
            --yellow: #fbff00; --bg: #02030d; --green: #00ff88;
            --shadow-p: 0 0 20px rgba(255, 0, 119, 0.6);
            --shadow-b: 0 0 20px rgba(0, 34, 255, 0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; 
            min-height: 100vh; overflow-x: hidden; 
            background-image: radial-gradient(circle at top right, #050a30 0%, var(--bg) 70%);
        }

        #gate-keeper { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .gate-card { 
            width: 90%; max-width: 380px; padding: 40px; border-radius: 30px; 
            background: rgba(5, 10, 48, 0.5); border: 2px solid var(--blue); 
            text-align: center; box-shadow: var(--shadow-b); backdrop-filter: blur(10px);
        }
        
        #main-app { display: none; }

        .nav-top { 
            background: rgba(2, 3, 13, 0.9); padding: 15px 20px; 
            border-bottom: 2px solid var(--blue); position: sticky; top: 0; 
            z-index: 100; backdrop-filter: blur(15px); box-shadow: var(--shadow-b);
        }

        .panic-bar { 
            background: #ff0000; padding: 8px; text-align: center; 
            display: none; font-weight: 900; color: #fff; font-size: 11px; 
            text-transform: uppercase; letter-spacing: 2px;
        }
        .panic-active { display: block !important; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: rgba(0,0,0,0.5); border: 1px solid var(--blue); padding: 15px; border-radius: 15px; text-align: center; }
        .stat-box small { font-size: 9px; color: var(--cyan); display: block; margin-bottom: 5px; }
        .stat-box span { font-size: 16px; font-weight: 900; color: var(--yellow); }

        .content { padding: 20px; padding-bottom: 100px; max-width: 600px; margin: auto; }
        
        .card { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 34, 255, 0.2); 
            border-radius: 20px; padding: 20px; margin-bottom: 15px; 
            position: relative; transition: 0.3s;
        }
        .card:hover { border-color: var(--blue); background: rgba(0, 34, 255, 0.05); }
        .card-label { font-size: 10px; color: var(--cyan); font-weight: 800; text-transform: uppercase; margin-bottom: 12px; display: block; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; background: #000; border: 1px solid #1a1b3a; 
            color: var(--green); border-radius: 10px; margin-bottom: 10px; 
            font-family: 'Outfit'; font-size: 13px;
        }
        input:focus { border-color: var(--blue); box-shadow: var(--shadow-b); }

        .btn-main { 
            background: linear-gradient(90deg, var(--blue), #0044ff); color: #fff; 
            padding: 14px; border-radius: 12px; font-weight: 900; border: none; 
            width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; 
            letter-spacing: 1px; transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.98); }
        
        .btn-panic { background: var(--pink) !important; margin-bottom: 20px; box-shadow: var(--shadow-p); }

        .nav-bottom { 
            position: fixed; bottom: 0; width: 100%; height: 75px; 
            background: rgba(2, 3, 13, 0.98); border-top: 2px solid var(--blue); 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000; 
        }
        .nav-btn { color: rgba(255,255,255,0.2); font-size: 20px; cursor: pointer; text-align: center; flex: 1; transition: 0.3s; }
        .nav-btn span { display: block; font-size: 8px; margin-top: 5px; font-weight: 800; }
        .nav-btn.active { color: var(--cyan); text-shadow: var(--shadow-b); }

        .profit { color: var(--green); text-shadow: 0 0 5px var(--green); }
        .loss { color: var(--pink); text-shadow: 0 0 5px var(--pink); }

        #neon-alert { 
            display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); 
            z-index:10000; align-items:center; justify-content:center; 
        }
        .alert-box { 
            width:300px; background:#050614; border:2px solid var(--blue); 
            border-radius:25px; padding:30px; text-align:center; box-shadow: var(--shadow-b);
        }
    </style>
</head>
<body>

    <div id="gate-keeper">
        <div class="gate-card">
            <div style="font-family:'Cinzel Decorative'; color:var(--pink); font-size:24px; margin-bottom:10px;">NEON COMMAND</div>
            <p style="font-size:10px; color:var(--cyan); letter-spacing:3px; margin-bottom:30px;">V10 SUPREME ACCESS</p>
            <input type="text" id="adm-user" placeholder="ADMIN ID">
            <input type="password" id="adm-pass" placeholder="MASTER KEY">
            <button onclick="login()" class="btn-main">DECRYPT ACCESS</button>
        </div>
    </div>

    <div id="main-app">
        <div id="panic-alert" class="panic-bar">⚠️ GLOBAL KURAS MODE ACTIVE (WR 5%) ⚠️</div>
        
        <div class="nav-top">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <span style="font-family:'Cinzel Decorative'; font-weight:900; color:var(--pink); font-size:18px;">MASTER</span>
                    <span style="font-size:8px; color:var(--cyan); display:block; letter-spacing:2px;">V10 SYSTEM CONTROL</span>
                </div>
                <div id="sync-status" style="font-size:9px; color:var(--green);"><i class="fas fa-circle-dot fa-fade"></i> LIVE FEED</div>
            </div>
        </div>

        <div class="content">
            <div class="stats-grid">
                <div class="stat-box">
                    <small>TOTAL SALDO USER</small>
                    <span id="stat-total-saldo">Rp 0</span>
                </div>
                <div class="stat-box">
                    <small>PEMAIN AKTIF</small>
                    <span id="stat-user-count">0</span>
                </div>
            </div>

            <div id="tab-kasir" class="page">
                <button id="panic-btn-ui" class="btn-main btn-panic" onclick="togglePanicMode()">AKTIFKAN MODE KURAS (GLOBAL)</button>
                <h3 style="font-size:12px; color:var(--yellow); margin-bottom:15px;"><i class="fas fa-clock-rotate-left"></i> PENDING REQUEST</h3>
                <div id="list-kasir"></div>
            </div>

            <div id="tab-user" class="page" style="display:none">
                <div style="position:relative; margin-bottom:20px;">
                    <i class="fas fa-search" style="position:absolute; left:15px; top:13px; color:var(--blue);"></i>
                    <input type="text" id="search-user" placeholder="Cari pemain..." onkeyup="filterUser()" style="padding-left:40px;">
                </div>
                <div id="list-user"></div>
            </div>

            <div id="tab-gift" class="page" style="display:none">
                <div class="card" style="border-color:var(--pink); background: rgba(255,0,119,0.05);">
                    <span class="card-label" style="color:var(--pink)"><i class="fas fa-gift"></i> SEND GIFT / BONUS</span>
                    <select id="gift-target"></select>
                    <input type="number" id="gift-amount" placeholder="Nominal Rp">
                    <textarea id="gift-msg" rows="3" placeholder="Pesan Inbox..."></textarea>
                    <button id="btn-gift-exec" class="btn-main" style="background:var(--pink)" onclick="sendGift()">KIRIM HADIAH</button>
                </div>
                <h3 style="font-size:12px; color:var(--cyan); margin:20px 0 10px;"><i class="fas fa-history"></i> LOG GIFT TERAKHIR</h3>
                <div id="log-gift" style="font-size:10px;"></div>
            </div>
        </div>

        <nav class="nav-bottom">
            <div class="nav-btn active" onclick="switchTab('kasir', this)"><i class="fas fa-cash-register"></i><span>KASIR</span></div>
            <div class="nav-btn" onclick="switchTab('user', this)"><i class="fas fa-headset"></i><span>SESSIONS</span></div>
            <div class="nav-btn" onclick="switchTab('gift', this)"><i class="fas fa-gift"></i><span>GIFT</span></div>
            <div class="nav-btn" onclick="logout()"><i class="fas fa-power-off"></i><span>EXIT</span></div>
        </nav>
    </div>

    <div id="neon-alert">
        <div class="alert-box">
            <i class="fas fa-shield-halved" style="font-size:40px; color:var(--cyan); margin-bottom:15px;"></i>
            <p id="a-msg" style="font-weight:700; color:#fff; margin-bottom:20px; font-size:14px;"></p>
            <button onclick="closeAlert()" class="btn-main">MENGERTI</button>
        </div>
    </div>

<script>
    const SUPA_URL = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
    const SUPA_KEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani"; 
    const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

    const AUTH = { u: "admin_neon", p: "master777" };
    let isPanic = false;
    let lastUserHash = ""; 

    function login() {
        if(document.getElementById('adm-user').value === AUTH.u && document.getElementById('adm-pass').value === AUTH.p) {
            sessionStorage.setItem('adm_auth', 'true');
            document.getElementById('gate-keeper').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            refreshAll();
            setInterval(refreshAll, 5000); 
        } else { showPopup("ACCESS DENIED!"); }
    }

    async function refreshAll() {
        updateStats();
        loadKasir();
        loadUserSmart(); 
        checkPanicStatus();
        if(document.getElementById('tab-gift').style.display !== 'none') {
            loadGiftTarget();
            loadGiftLogs();
        }
    }

    async function updateStats() {
        const { data } = await _supa.from('profiles').select('saldo');
        if(data) {
            let total = data.reduce((acc, curr) => acc + (curr.saldo || 0), 0);
            document.getElementById('stat-total-saldo').innerText = "Rp " + total.toLocaleString();
            document.getElementById('stat-user-count').innerText = data.length;
        }
    }

    async function loadKasir() {
        let html = '';
        const { data: depo } = await _supa.from('deposits').select('*').eq('status', 'PROSES');
        const { data: wd } = await _supa.from('withdrawals').select('*').eq('status', 'PROSES');

        if(depo) depo.forEach(d => {
            html += `<div class="card" style="border-left:4px solid var(--green)">
                <span class="card-label">DEPO: ${d.username}</span>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b style="color:var(--green)">Rp ${Number(d.net_receive).toLocaleString()}</b>
                    <button class="btn-main" style="background:var(--green); width:100px; height:30px; font-size:9px;" onclick="approveDepo('${d.id}','${d.username}',${d.net_receive})">APPROVE</button>
                </div>
            </div>`;
        });

        if(wd) wd.forEach(w => {
            html += `<div class="card" style="border-left:4px solid var(--pink)">
                <span class="card-label">WD: ${w.username}</span>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b style="color:var(--pink)">Rp ${Number(w.amount).toLocaleString()}</b>
                    <div style="display:flex; gap:5px;">
                        <button class="btn-main" style="width:70px; height:30px; font-size:9px;" onclick="updateStatus('withdrawals','${w.id}','SUKSES')">ACC</button>
                        <button class="btn-main" style="background:#444; width:70px; height:30px; font-size:9px;" onclick="updateStatus('withdrawals','${w.id}','DITOLAK')">REJECT</button>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById('list-kasir').innerHTML = html || '<p style="text-align:center; opacity:0.3; padding:20px; font-size:10px;">ANTREAN BERSIH</p>';
    }

    async function loadUserSmart() {
        const { data } = await _supa.from('profiles').select('*').order('username', {ascending:true});
        if(!data) return;

        const currentHash = JSON.stringify(data.map(u => [u.username, u.saldo]));
        if(currentHash === lastUserHash) return; 
        
        if(document.activeElement.tagName === "INPUT" && document.activeElement.id !== "search-user") return;

        lastUserHash = currentHash;
        document.getElementById('list-user').innerHTML = data.map(u => {
            return `
            <div class="card user-item" data-name="${u.username.toLowerCase()}">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <b style="color:var(--yellow)">${u.username.toUpperCase()}</b>
                    <span class="profit">Rp ${Number(u.saldo).toLocaleString()}</span>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px;">
                    <div><small style="font-size:7px;">WINRATE</small><input type="number" id="wr-${u.id}" value="${u.winrate}"></div>
                    <div><small style="font-size:7px;">LIMIT</small><input type="number" id="mw-${u.id}" value="${u.maxwin_limit}"></div>
                    <div><small style="font-size:7px;">MENIT</small><input type="number" id="tm-${u.id}" value="${u.session_minutes}"></div>
                </div>
                <button class="btn-main" style="margin-top:10px; height:30px; font-size:9px;" onclick="saveUser('${u.id}')">SAVE SETTINGS</button>
            </div>
        `;}).join('');
    }

    async function saveUser(id) {
        const updateData = {
            winrate: parseInt(document.getElementById('wr-'+id).value),
            maxwin_limit: parseInt(document.getElementById('mw-'+id).value),
            session_minutes: parseInt(document.getElementById('tm-'+id).value)
        };
        await _supa.from('profiles').update(updateData).eq('id', id);
        showPopup("SETTING DISIMPAN!");
    }

    async function checkPanicStatus() {
        const { data } = await _supa.from('system_config').select('panic_mode').eq('id', 1).single();
        if(data) {
            isPanic = data.panic_mode;
            document.getElementById('panic-alert').className = isPanic ? 'panic-bar panic-active' : 'panic-bar';
            document.getElementById('panic-btn-ui').innerText = isPanic ? "MATIKAN MODE KURAS" : "AKTIFKAN MODE KURAS (GLOBAL)";
        }
    }

    async function togglePanicMode() {
        const nextState = !isPanic;
        await _supa.from('system_config').update({ panic_mode: nextState }).eq('id', 1);
        await _supa.from('profiles').update({ panic_mode: nextState });
        showPopup(nextState ? "MODE KURAS AKTIF!" : "MODE NORMAL");
        refreshAll();
    }

    async function approveDepo(id, user, amt) {
        const { data } = await _supa.from('profiles').select('saldo').eq('username', user).single();
        await _supa.from('profiles').update({ saldo: data.saldo + amt, session_start: new Date() }).eq('username', user);
        await _supa.from('deposits').update({ status: 'SUKSES' }).eq('id', id);
        showPopup("DEPO BERHASIL!");
        refreshAll();
    }

    async function updateStatus(table, id, status) {
        await _supa.from(table).update({ status: status }).eq('id', id);
        showPopup("BERHASIL!");
        refreshAll();
    }

    // FUNGSI PERBAIKAN UTAMA: SEND GIFT
    async function sendGift() {
        const target = document.getElementById('gift-target').value;
        const amount = document.getElementById('gift-amount').value;
        const msg = document.getElementById('gift-msg').value;
        const btn = document.getElementById('btn-gift-exec');

        if(!target || !amount) return showPopup("DATA TIDAK LENGKAP!");
        
        btn.disabled = true;
        btn.innerText = "PROSES...";

        // Pastikan nominal dikirim sebagai NUMBER murni dan menyertakan timestamp
        const { error } = await _supa.from('inbox').insert([{ 
            username: target, 
            nominal: Number(amount), 
            pesan: msg || "Bonus dari Admin", 
            status: 'UNCLAIMED',
            created_at: new Date().toISOString()
        }]);

        if(error) {
            showPopup("ERROR: " + error.message);
        } else {
            showPopup("HADIAH BERHASIL MASUK KE " + target);
            document.getElementById('gift-amount').value = "";
            document.getElementById('gift-msg').value = "";
            loadGiftLogs();
        }
        
        btn.disabled = false;
        btn.innerText = "KIRIM HADIAH";
    }

    async function loadGiftLogs() {
        const { data } = await _supa.from('inbox').select('*').order('id', {ascending:false}).limit(5);
        if(data) {
            document.getElementById('log-gift').innerHTML = data.map(l => `
                <div style="background:rgba(255,255,255,0.05); padding:8px; border-radius:10px; margin-bottom:5px; border-left:2px solid var(--pink);">
                    <b>${l.username}</b> - Rp ${Number(l.nominal).toLocaleString()} 
                    <span style="float:right; color:${l.status === 'CLAIMED' ? 'var(--green)' : 'var(--yellow)'}">${l.status}</span>
                </div>
            `).join('');
        }
    }

    async function loadGiftTarget() {
        const { data } = await _supa.from('profiles').select('username').order('username', {ascending:true});
        if(data) {
            const currentVal = document.getElementById('gift-target').value;
            document.getElementById('gift-target').innerHTML = data.map(u => `<option value="${u.username}" ${u.username === currentVal ? 'selected':''}>${u.username}</option>`).join('');
        }
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('tab-' + tab).style.display = 'block';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        if(tab === 'gift') { loadGiftTarget(); loadGiftLogs(); }
    }

    function filterUser() {
        const q = document.getElementById('search-user').value.toLowerCase();
        document.querySelectorAll('.user-item').forEach(i => {
            i.style.display = i.getAttribute('data-name').includes(q) ? 'block' : 'none';
        });
    }

    function showPopup(m) { document.getElementById('a-msg').innerText = m; document.getElementById('neon-alert').style.display = 'flex'; }
    function closeAlert() { document.getElementById('neon-alert').style.display = 'none'; }
    function logout() { sessionStorage.clear(); window.location.reload(); }
    
    window.onload = () => { if(sessionStorage.getItem('adm_auth') === 'true') login(); };
</script>
</body>
</html>
