<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON COMMAND — SUPREME ADMIN V10</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --pink: #ff0077; --blue: #0022ff; --cyan: #00d4ff;
            --yellow: #fbff00; --bg: #02030d; --green: #00ff88;
            --gp: 0 0 20px rgba(255, 0, 119, 0.8);
            --gb: 0 0 25px rgba(0, 34, 255, 0.9);
            --gy: 0 0 20px rgba(251, 255, 0, 0.8);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif;
            min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column;
        }

        #canvas-bg { position: fixed; inset: 0; z-index: 0; }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, transparent, var(--bg) 95%); z-index: 1; pointer-events: none; }

        /* Login Screen */
        #gate-keeper { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .gate-card { 
            width: 90%; max-width: 380px; padding: 40px; border-radius: 30px; 
            background: rgba(5, 6, 25, 0.85); border: 2px solid var(--blue); 
            text-align: center; box-shadow: var(--gb); backdrop-filter: blur(15px);
        }
        
        #main-app { display: none; position: relative; z-index: 10; flex: 1; }

        .nav-top { 
            background: rgba(5, 6, 25, 0.9); padding: 15px 20px; 
            border-bottom: 2px solid var(--blue); position: sticky; top: 0; 
            z-index: 100; backdrop-filter: blur(15px); box-shadow: var(--gb);
        }

        .panic-bar { 
            background: var(--pink); padding: 8px; text-align: center; display: none; 
            font-weight: 900; color: #fff; font-size: 11px; text-transform: uppercase; 
            letter-spacing: 2px; box-shadow: var(--gp);
        }
        .panic-active { display: block !important; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .content { padding: 20px; padding-bottom: 120px; max-width: 600px; margin: auto; width: 100%; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { 
            background: rgba(0,0,0,0.8); border: 1px solid var(--blue); 
            padding: 15px; border-radius: 15px; text-align: center; box-shadow: inset 0 0 10px rgba(0,34,255,0.2);
        }
        .stat-box small { font-size: 9px; color: var(--cyan); display: block; margin-bottom: 5px; font-weight: 800; }
        .stat-box span { font-size: 16px; font-weight: 900; color: var(--yellow); text-shadow: var(--gy); }

        .card { 
            background: rgba(0,0,0,0.8); border: 1px solid rgba(0, 34, 255, 0.3); 
            border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative;
        }
        .card-label { font-size: 10px; color: var(--cyan); font-weight: 800; text-transform: uppercase; margin-bottom: 12px; display: block; letter-spacing: 1px; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; background: #000; border: 1px solid #1a1b3a; 
            color: var(--green); border-radius: 10px; margin-bottom: 10px; 
            font-family: 'Outfit'; font-size: 13px; transition: 0.3s;
        }
        input:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }

        .btn-main { 
            background: linear-gradient(90deg, var(--blue), #0044ff); color: #fff; 
            padding: 14px; border-radius: 50px; font-weight: 900; border: none; 
            width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; 
            letter-spacing: 1px; box-shadow: var(--gb); transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.95); }
        .btn-panic { background: var(--pink) !important; margin-bottom: 20px; box-shadow: var(--gp) !important; }
        
        .nav-bottom { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: #000; border-top: 2px solid var(--blue); 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-btn { color: rgba(255,255,255,0.3); font-size: 20px; cursor: pointer; text-align: center; flex: 1; transition: 0.3s; }
        .nav-btn span { display: block; font-size: 8px; margin-top: 5px; font-weight: 800; text-transform: uppercase; }
        .nav-btn.active { color: var(--cyan); text-shadow: var(--gb); transform: translateY(-5px); }

        /* Alert Modal Theme Match */
        #alert-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
        .alert-box { 
            width:280px; background:#050614; border:2px solid var(--yellow); border-radius:25px; 
            padding:30px; text-align:center; box-shadow: var(--gy); 
        }
        #alert-msg { font-weight:800; color:var(--yellow); margin-bottom:20px; text-transform: uppercase; font-size: 13px; }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="overlay"></div>

    <div id="gate-keeper">
        <div class="gate-card">
            <div style="font-family:'Cinzel Decorative'; color:var(--pink); font-size:24px; margin-bottom:5px; text-shadow: var(--gp);">NEON COMMAND</div>
            <p style="font-size:9px; color:var(--cyan); letter-spacing:4px; margin-bottom:30px; font-weight:800;">SUPREME ACCESS V10</p>
            <input type="text" id="adm-user" placeholder="ADMIN ID">
            <input type="password" id="adm-pass" placeholder="MASTER KEY">
            <button onclick="login()" class="btn-main">DECRYPT ACCESS</button>
        </div>
    </div>

    <div id="main-app">
        <div id="panic-alert" class="panic-bar">⚠️ GLOBAL KURAS MODE ACTIVE (WR 5%) ⚠️</div>
        <div class="nav-top">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <span style="font-family:'Cinzel Decorative'; font-weight:900; color:var(--pink); font-size:18px; text-shadow: var(--gp);">MASTER</span>
                    <span style="font-size:8px; color:var(--cyan); display:block; letter-spacing:2px; font-weight:800;">COMMAND CENTER</span>
                </div>
                <div id="sync-status" style="font-size:9px; color:var(--green); font-weight:800;"><i class="fas fa-circle-dot fa-fade"></i> LIVE FEED</div>
            </div>
        </div>

        <div class="content">
            <div class="stats-grid">
                <div class="stat-box">
                    <small>TOTAL SALDO USER</small>
                    <span id="stat-total-saldo">IDR 0</span>
                </div>
                <div class="stat-box">
                    <small>PEMAIN AKTIF</small>
                    <span id="stat-user-count">0</span>
                </div>
            </div>

            <div id="tab-kasir" class="page">
                <button id="panic-btn-ui" class="btn-main btn-panic" onclick="togglePanicMode()">AKTIFKAN MODE KURAS (GLOBAL)</button>
                <div id="list-kasir"></div>
            </div>

            <div id="tab-user" class="page" style="display:none">
                <input type="text" id="search-user" placeholder="Cari username..." onkeyup="filterUser()">
                <div id="list-user"></div>
            </div>

            <div id="tab-gift" class="page" style="display:none">
                <div class="card" style="border-color:var(--pink);">
                    <span class="card-label" style="color:var(--pink)"><i class="fas fa-gift"></i> SEND VIP GIFT</span>
                    <select id="gift-target"></select>
                    <input type="number" id="gift-amount" placeholder="Nominal IDR">
                    <textarea id="gift-msg" placeholder="Pesan Inbox..."></textarea>
                    <button class="btn-main" style="background:var(--pink); box-shadow: var(--gp);" onclick="sendGift()">KIRIM HADIAH</button>
                </div>
                <div id="log-gift"></div>
            </div>
        </div>

        <nav class="nav-bottom">
            <div class="nav-btn active" onclick="switchTab('kasir', this)"><i class="fas fa-cash-register"></i><span>KASIR</span></div>
            <div class="nav-btn" onclick="switchTab('user', this)"><i class="fas fa-users-gear"></i><span>SESSIONS</span></div>
            <div class="nav-btn" onclick="switchTab('gift', this)"><i class="fas fa-gift"></i><span>GIFT</span></div>
            <div class="nav-btn" onclick="logout()"><i class="fas fa-power-off"></i><span>EXIT</span></div>
        </nav>
    </div>

    <div id="alert-modal">
        <div class="alert-box">
            <i class="fas fa-shield-halved" style="font-size:30px; color:var(--yellow); margin-bottom:15px; filter:drop-shadow(var(--gy));"></i>
            <p id="alert-msg"></p>
            <button class="btn-main" onclick="closeAlert()" style="background:var(--yellow); color:#000; box-shadow: var(--gy);">CONFIRM</button>
        </div>
    </div>

<script>
    const SUPA_URL = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
    const SUPA_KEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani"; 
    const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

    const AUTH = { u: "admin_neon", p: "master777" };
    let isPanic = false;
    let lastUserHash = ""; 

    // Sound System
    const aCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(f, d, v=0.1) {
        try {
            const o = aCtx.createOscillator(); const g = aCtx.createGain();
            o.type = 'sine'; o.frequency.value = f; g.gain.setValueAtTime(v, aCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.00001, aCtx.currentTime + d);
            o.connect(g); g.connect(aCtx.destination); o.start(); o.stop(aCtx.currentTime + d);
        } catch(e) {}
    }

    function login() {
        if(document.getElementById('adm-user').value === AUTH.u && document.getElementById('adm-pass').value === AUTH.p) {
            beep(800, 0.2);
            sessionStorage.setItem('adm_auth', 'true');
            document.getElementById('gate-keeper').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            drawStars();
            refreshAll();
            setInterval(refreshAll, 5000); 
        } else { beep(200, 0.5); showAlert("ACCESS DENIED!"); }
    }

    async function refreshAll() {
        updateStats();
        loadKasir();
        loadUserSmart(); 
        checkPanicStatus();
    }

    async function updateStats() {
        const { data } = await _supa.from('profiles').select('saldo');
        if(data) {
            let total = data.reduce((acc, curr) => acc + (curr.saldo || 0), 0);
            document.getElementById('stat-total-saldo').innerText = "IDR " + total.toLocaleString();
            document.getElementById('stat-user-count').innerText = data.length;
        }
    }

    async function loadKasir() {
        let html = '';
        const { data: depo } = await _supa.from('deposits').select('*').eq('status', 'PROSES');
        if(depo && depo.length > 0) beep(1000, 0.1, 0.05); // Sound notification for new queue
        
        if(depo) depo.forEach(d => {
            html += `<div class="card" style="border-left:4px solid var(--green)">
                <span class="card-label">DEPO QUEUE: ${d.username}</span>
                <b style="color:var(--green); font-size:16px;">IDR ${Number(d.net_receive).toLocaleString()}</b>
                <button class="btn-main" style="margin-top:10px;" onclick="approveDepo('${d.id}','${d.username}',${d.net_receive})">APPROVE & SET LOGIC</button>
            </div>`;
        });
        document.getElementById('list-kasir').innerHTML = html || '<p style="text-align:center; opacity:0.3; font-size:11px; margin-top:20px;">SYSTEM CLEAR - NO QUEUE</p>';
    }

    async function approveDepo(id, user, amt) {
        beep(1200, 0.2);
        await _supa.from('deposits').update({ status: 'SUKSES' }).eq('id', id);
        const { data: p } = await _supa.from('profiles').select('saldo').eq('username', user).single();
        const newSaldo = (p.saldo || 0) + amt;
        
        await _supa.from('profiles').update({ 
            saldo: newSaldo,
            last_deposit_amount: amt,
            winrate: 50,
            maxwin_limit: 50000,
            session_minutes: 2,
            session_start: new Date().toISOString()
        }).eq('username', user);
        
        showAlert(`DEPO ${user} APPROVED! LOGIC INITIALIZED.`);
        refreshAll();
    }

    async function loadUserSmart() {
        const { data } = await _supa.from('profiles').select('*').order('username', {ascending:true});
        if(!data) return;
        
        const currentHash = JSON.stringify(data.map(u => [u.username, u.saldo, u.winrate]));
        if(currentHash === lastUserHash) return; 
        if(document.activeElement.tagName === "INPUT") return;
        
        lastUserHash = currentHash;
        document.getElementById('list-user').innerHTML = data.map(u => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b style="color:var(--cyan); letter-spacing:1px;">${u.username.toUpperCase()}</b>
                    <span style="color:var(--green); font-weight:800;">IDR ${Number(u.saldo).toLocaleString()}</span>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:15px;">
                    <div>
                        <small style="font-size:8px; color:rgba(255,255,255,0.5)">WR %</small>
                        <input type="number" id="wr-${u.id}" value="${u.winrate || 50}">
                    </div>
                    <div>
                        <small style="font-size:8px; color:rgba(255,255,255,0.5)">LIMIT</small>
                        <input type="number" id="mw-${u.id}" value="${u.maxwin_limit || 50000}">
                    </div>
                    <div>
                        <small style="font-size:8px; color:rgba(255,255,255,0.5)">MINS</small>
                        <input type="number" id="tm-${u.id}" value="${u.session_minutes || 2}">
                    </div>
                </div>
                <div style="display:flex; gap:8px; margin-top:5px;">
                    <button class="btn-main" style="flex:3" onclick="saveUser('${u.id}')">UPDATE SESSION</button>
                    <button class="btn-main" style="flex:1; background:var(--pink); box-shadow:var(--gp);" onclick="resetSession('${u.id}')"><i class="fas fa-sync-alt"></i></button>
                </div>
            </div>`).join('');
    }

    async function saveUser(id) {
        beep(1000, 0.1);
        const { error } = await _supa.from('profiles').update({
            winrate: parseInt(document.getElementById('wr-'+id).value),
            maxwin_limit: parseInt(document.getElementById('mw-'+id).value),
            session_minutes: parseInt(document.getElementById('tm-'+id).value)
        }).eq('id', id);
        if(!error) showAlert("USER DATA SYNCED!");
    }

    async function resetSession(id) {
        beep(1500, 0.1);
        await _supa.from('profiles').update({ session_start: new Date().toISOString() }).eq('id', id);
        showAlert("SESSION TIMER RESTARTED!");
    }

    async function togglePanicMode() {
        beep(isPanic ? 400 : 200, 0.3);
        const next = !isPanic;
        await _supa.from('system_config').update({ panic_mode: next }).eq('id', 1);
        await _supa.from('profiles').update({ panic_mode: next });
        showAlert(next ? "GLOBAL KURAS ACTIVE!" : "NORMAL MODE RESTORED");
        checkPanicStatus();
    }

    async function checkPanicStatus() {
        const { data } = await _supa.from('system_config').select('panic_mode').eq('id', 1).single();
        if(data) {
            isPanic = data.panic_mode;
            document.getElementById('panic-alert').className = isPanic ? 'panic-bar panic-active' : 'panic-bar';
            document.getElementById('panic-btn-ui').innerText = isPanic ? "DISABLE GLOBAL KURAS" : "ENABLE GLOBAL KURAS";
        }
    }

    function switchTab(tab, el) {
        beep(600, 0.05);
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('tab-' + tab).style.display = 'block';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function showAlert(m) { 
        document.getElementById('alert-msg').innerText = m; 
        document.getElementById('alert-modal').style.display = 'flex'; 
    }
    function closeAlert() { beep(500, 0.1); document.getElementById('alert-modal').style.display = 'none'; }
    function logout() { beep(300, 0.5); sessionStorage.clear(); window.location.reload(); }

    function drawStars() {
        const c = document.getElementById('canvas-bg'); if(!c) return;
        const x = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let s = [];
        for(let i=0; i<80; i++) s.push({x:Math.random()*c.width, y:Math.random()*c.height, r:Math.random()*1.2, sp:Math.random()*0.5+0.2});
        function anim() {
            x.clearRect(0,0,c.width,c.height); x.fillStyle="rgba(255,255,255,0.8)";
            s.forEach(p => { 
                x.beginPath(); x.arc(p.x, p.y, p.r, 0, Math.PI*2); x.fill(); 
                p.y += p.sp; if(p.y > c.height) p.y = -5; 
            });
            requestAnimationFrame(anim);
        }
        anim();
    }

    window.onload = () => { 
        if(sessionStorage.getItem('adm_auth') === 'true') {
            document.getElementById('gate-keeper').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            drawStars();
            refreshAll();
            setInterval(refreshAll, 5000); 
        }
    };
</script>
</body>
</html>
