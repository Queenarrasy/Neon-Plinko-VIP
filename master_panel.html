<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>OMEGA V18 — ELITE COMMAND CENTER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root{
            --pink:#ff0077; --blue:#0022ff; --yellow:#fbff00; --bg:#000005;
            --gp:0 0 8px rgba(255,0,119,.7),0 0 22px rgba(255,0,119,.25);
            --gb:0 0 8px rgba(0,34,255,.7),0 0 22px rgba(0,34,255,.25);
            --gy:0 0 8px rgba(251,255,0,.7),0 0 22px rgba(251,255,0,.25);
            --card:rgba(0,0,40,.72); --border:rgba(0,34,255,.32);
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;height:100vh;overflow:hidden;}
        #particles-js{position:fixed;width:100%;height:100%;z-index:0;background:radial-gradient(circle at center,#000022,#000);}

        /* ALERT */
        #neon-alert{position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:86%;max-width:340px;background:rgba(0,0,15,.97);border:1.5px solid var(--pink);border-top:2px solid var(--yellow);color:#fff;padding:14px 20px;border-radius:14px;text-align:center;font-weight:900;z-index:9999;font-family:'Outfit',sans-serif;font-size:13px;letter-spacing:.5px;transition:.55s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 0 16px rgba(255,0,119,.4);}
        #neon-alert.show{top:12px;}
        #neon-alert.ok{border-color:var(--blue);box-shadow:0 0 16px rgba(0,34,255,.4);}

        /* HEADER */
        .header{background:rgba(0,0,22,.97);padding:12px 18px;border-bottom:1.5px solid var(--blue);display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);position:relative;z-index:100;box-shadow:0 0 12px rgba(0,34,255,.25);}
        .logo-text{font-family:'Cinzel Decorative',serif;color:var(--pink);font-size:17px;text-shadow:var(--gp);}
        .logo-text span{color:var(--yellow);text-shadow:var(--gy);}
        .logo-sub{font-size:9px;color:rgba(255,255,255,.3);font-family:'Outfit',sans-serif;margin-left:6px;letter-spacing:1px;text-transform:uppercase;}

        /* PANIC BUTTON */
        .panic-btn{background:rgba(0,0,0,.8);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.2);padding:8px 16px;border-radius:8px;font-weight:900;cursor:pointer;transition:.3s;font-size:11px;letter-spacing:1px;font-family:'Outfit',sans-serif;text-transform:uppercase;}
        .panic-active{background:var(--pink)!important;box-shadow:0 0 14px rgba(255,0,119,.7)!important;border-color:#fff!important;color:#fff!important;animation:panicPulse 1s infinite;}
        @keyframes panicPulse{0%{transform:scale(1);box-shadow:0 0 10px rgba(255,0,119,.7)}50%{transform:scale(1.05);box-shadow:0 0 28px rgba(255,0,119,.9)}100%{transform:scale(1);box-shadow:0 0 10px rgba(255,0,119,.7)}}

        /* TABS */
        .nav-tabs{display:flex;background:rgba(0,0,0,.92);border-bottom:1px solid rgba(0,34,255,.28);overflow-x:auto;scrollbar-width:none;position:relative;z-index:100;}
        .nav-tabs::-webkit-scrollbar{display:none;}
        .tab-link{flex:1;padding:13px 8px;text-align:center;color:rgba(255,255,255,.3);cursor:pointer;font-size:9px;font-weight:900;text-transform:uppercase;white-space:nowrap;transition:.3s;letter-spacing:.5px;min-width:60px;font-family:'Outfit',sans-serif;}
        .tab-link.active{color:var(--yellow);border-bottom:2px solid var(--yellow);text-shadow:var(--gy);background:rgba(251,255,0,.03);}
        .tab-link i{display:block;font-size:16px;margin-bottom:3px;}

        /* ALPHA */
        .alpha-bar{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;padding:8px 10px;background:#000;border-bottom:1px solid rgba(0,34,255,.18);position:relative;z-index:100;}
        .alpha-btn{background:rgba(0,0,28,.85);border:1px solid rgba(0,34,255,.18);color:rgba(255,255,255,.45);font-size:9px;padding:5px 0;border-radius:4px;cursor:pointer;text-align:center;transition:.2s;line-height:1.3;font-family:'Outfit',sans-serif;}
        .alpha-btn:hover{border-color:rgba(0,34,255,.5);color:var(--blue);}
        .alpha-btn.active{border-color:var(--pink);color:var(--pink);background:rgba(255,0,119,.08);box-shadow:0 0 7px rgba(255,0,119,.3);}

        /* MAIN */
        .main-container{height:calc(100vh - 175px);overflow-y:auto;padding:14px;padding-bottom:25px;position:relative;z-index:10;scrollbar-width:thin;scrollbar-color:var(--blue) #000;}
        .main-container::-webkit-scrollbar{width:4px;}
        .main-container::-webkit-scrollbar-track{background:#000;}
        .main-container::-webkit-scrollbar-thumb{background:var(--blue);border-radius:2px;}

        /* CARDS */
        .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:13px;backdrop-filter:blur(6px);}
        .card-pink{border-color:rgba(255,0,119,.3);}

        /* SEC TITLE */
        .sec-title{font-size:9px;font-weight:900;color:var(--pink);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:6px;font-family:'Outfit',sans-serif;text-shadow:var(--gp);}
        .sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,0,119,.28),transparent);}

        /* PLAYER */
        .player-name{color:var(--yellow);font-size:15px;font-weight:900;text-shadow:var(--gy);}

        /* INPUT GROUP */
        .input-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0 0;}
        .field{background:rgba(0,0,0,.75);border:1px solid rgba(0,34,255,.28);padding:8px 10px;border-radius:8px;}
        .field label{font-size:7px;color:var(--yellow);display:block;margin-bottom:4px;font-weight:900;letter-spacing:1px;text-transform:uppercase;text-shadow:var(--gy);}
        .field input{width:100%;background:transparent;border:none;color:#fff;font-size:14px;font-weight:900;outline:none;text-align:center;font-family:'Outfit',sans-serif;}
        .field-full{grid-column:span 2;}

        /* BUTTONS */
        .btn-action{width:100%;padding:11px;border-radius:8px;border:none;font-weight:900;margin-top:10px;cursor:pointer;transition:.2s;text-transform:uppercase;font-size:9px;letter-spacing:1px;font-family:'Outfit',sans-serif;}
        .btn-save{background:var(--yellow);color:#000;box-shadow:0 0 8px rgba(251,255,0,.3);}
        .btn-gift{background:linear-gradient(90deg,var(--pink),#b400dc);color:#fff;box-shadow:0 0 10px rgba(255,0,119,.35);}
        .btn-approve{background:linear-gradient(90deg,var(--blue),#0055ff);color:#fff;box-shadow:0 0 10px rgba(0,34,255,.35);}
        .btn-reject{background:linear-gradient(90deg,#2a2a2a,#444);color:#fff;}
        .btn-action:active{transform:scale(.97);}

        /* TABLE */
        .monitor-table{width:100%;border-collapse:collapse;font-size:11px;}
        .monitor-table th{color:var(--pink);text-align:left;padding:10px 8px;border-bottom:1px solid rgba(255,0,119,.25);font-size:9px;letter-spacing:1px;text-transform:uppercase;text-shadow:var(--gp);}
        .monitor-table td{padding:10px 8px;border-bottom:1px solid rgba(0,34,255,.1);font-size:12px;}
        .monitor-table tr:hover td{background:rgba(0,34,255,.05);}
        .status-up{color:#00ff88;font-weight:900;text-shadow:0 0 6px rgba(0,255,136,.5);}
        .status-down{color:var(--pink);font-weight:900;text-shadow:var(--gp);}
        .status-zero{color:rgba(255,255,255,.25);}

        /* REPORT */
        .report-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
        .report-box{background:rgba(0,0,0,.65);border:1px solid var(--border);border-radius:12px;padding:15px;text-align:center;}
        .report-val{font-size:16px;font-weight:900;margin-top:8px;}

        /* MASS GIFT */
        .mass-gift-box{background:rgba(255,0,119,.06);border:1px solid rgba(255,0,119,.35);border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 0 10px rgba(255,0,119,.1);}
        .mass-input{width:100%;background:#000;border:1px solid rgba(0,34,255,.4);border-radius:8px;color:var(--yellow);font-size:20px;font-weight:900;padding:12px;text-align:center;outline:none;margin:10px 0;font-family:'Outfit',sans-serif;}

        /* BADGE */
        .pending-badge{display:inline-block;background:var(--pink);color:#fff;font-size:8px;font-weight:900;padding:2px 8px;border-radius:50px;margin-left:6px;animation:panicPulse 2s infinite;box-shadow:0 0 8px rgba(255,0,119,.5);}
        .btn-flex{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

        /* CONFIRM MODAL */
        #confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:9998;align-items:center;justify-content:center;backdrop-filter:blur(12px);}
        .confirm-box{background:rgba(0,0,15,.99);border:1.5px solid var(--pink);border-top:2px solid var(--yellow);border-radius:22px;padding:28px;width:88%;max-width:300px;text-align:center;box-shadow:0 0 18px rgba(255,0,119,.3);animation:zoomIn .3s ease;}
        @keyframes zoomIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
        #confirm-title{font-size:16px;font-weight:900;color:var(--pink);text-shadow:var(--gp);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;}
        #confirm-msg{font-size:13px;color:#ddd;margin:0 0 20px;line-height:1.65;font-weight:600;white-space:pre-line;}
        .confirm-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        .btn-no{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.15);padding:12px;border-radius:8px;cursor:pointer;font-weight:900;font-family:'Outfit',sans-serif;text-transform:uppercase;font-size:11px;}
        .btn-yes{background:linear-gradient(90deg,var(--pink),#aa0044);color:#fff;border:none;padding:12px;border-radius:8px;cursor:pointer;font-weight:900;box-shadow:0 0 10px rgba(255,0,119,.4);font-family:'Outfit',sans-serif;text-transform:uppercase;font-size:11px;}

        /* PANIC INDICATOR BAR */
        #panic-bar{display:none;background:rgba(255,0,119,.12);border-bottom:1px solid rgba(255,0,119,.4);padding:6px 18px;text-align:center;font-size:10px;font-weight:900;color:var(--pink);letter-spacing:2px;text-shadow:var(--gp);animation:panicPulse 1s infinite;position:relative;z-index:100;}

        /* LIVE refresh info */
        .refresh-info{font-size:9px;opacity:.3;text-align:right;margin-top:5px;letter-spacing:1px;}
    </style>
</head>
<body>

<div id="particles-js"></div>
<div id="neon-alert">SYSTEM NOTIFICATION</div>

<div id="confirm-overlay">
    <div class="confirm-box">
        <h3 id="confirm-title">KONFIRMASI</h3>
        <p id="confirm-msg"></p>
        <div class="confirm-btns">
            <button class="btn-no" onclick="closeConfirm()">BATAL</button>
            <button class="btn-yes" id="btn-confirm-yes">YA, LANJUT</button>
        </div>
    </div>
</div>

<div class="header">
    <div>
        <span class="logo-text">OMEGA <span>V18</span></span>
        <span class="logo-sub">CONTROL</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
        <div id="panic-indicator" style="display:none;width:10px;height:10px;border-radius:50%;background:var(--pink);box-shadow:0 0 10px rgba(255,0,119,.8);animation:panicPulse .8s infinite;"></div>
        <button id="panic-master" class="panic-btn" onclick="togglePanicGlobal()">
            <i class="fas fa-skull"></i> PANIC
        </button>
    </div>
</div>

<!-- Bar pemberitahuan panic aktif, selalu terlihat -->
<div id="panic-bar"><i class="fas fa-skull fa-shake" style="margin-right:6px;"></i>⚠️ PANIC MODE AKTIF — SEMUA WINRATE 1%</div>

<div class="nav-tabs">
    <div class="tab-link active" onclick="switchTab('players',this)"><i class="fas fa-users"></i>PLAYERS</div>
    <div class="tab-link" onclick="switchTab('live',this)"><i class="fas fa-satellite-dish"></i>LIVE</div>
    <div class="tab-link" onclick="switchTab('cashier',this)">
        <i class="fas fa-vault"></i>KASIR
        <span id="pending-count" class="pending-badge" style="display:none;">0</span>
    </div>
    <div class="tab-link" onclick="switchTab('gift',this)"><i class="fas fa-gift"></i>GIFT</div>
    <div class="tab-link" onclick="switchTab('report',this)"><i class="fas fa-chart-pie"></i>REPORT</div>
</div>

<div id="alpha-nav" class="alpha-bar"></div>

<div class="main-container">
    <div id="view-players" class="tab-content"></div>

    <div id="view-live" class="tab-content" style="display:none;">
        <div class="sec-title">
            <i class="fas fa-circle" style="color:var(--pink);animation:panicPulse 1.5s infinite;"></i>
            Live Player Monitor
        </div>
        <div class="card" style="padding:0;overflow:hidden;border-radius:14px;">
            <table class="monitor-table">
                <thead>
                    <tr>
                        <th><i class="fas fa-user"></i> USERNAME</th>
                        <th>SALDO AWAL</th>
                        <th>LIVE SALDO</th>
                        <th>PNL</th>
                    </tr>
                </thead>
                <tbody id="live-body">
                    <tr><td colspan="4" style="text-align:center;padding:30px;opacity:.4;font-size:11px;">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="refresh-info" id="live-last-refresh">Refresh otomatis setiap 3 detik</div>
    </div>

    <div id="view-cashier" class="tab-content" style="display:none;"></div>
    <div id="view-gift"    class="tab-content" style="display:none;"></div>
    <div id="view-report"  class="tab-content" style="display:none;"></div>
</div>

<script>
// ── SUPABASE ──────────────────────────────────────────────────
const SURL = "https://bgffnmwrviyqpeevzjsn.supabase.co";
const SKEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani";
const _db  = supabase.createClient(SURL, SKEY);

let currentTab = 'players', activeAlpha = 'A';
let allData = { p: [], d: [], w: [] };

// Timer intervals berbeda per tab
let timerLive     = null;   // 3 detik — sangat cepat untuk live monitor
let timerCashier  = null;   // poll setiap 8 detik untuk kasir, + realtime channel
let timerPlayers  = null;   // 30 detik untuk data player
let timerReport   = null;   // 30 detik untuk report
let realtimeChannel = null;

// ── KEY HELPER ────────────────────────────────────────────────
function safeKey(username) {
    return btoa(unescape(encodeURIComponent(username))).replace(/[^a-zA-Z0-9]/g, '_');
}

// ── PARTICLES ─────────────────────────────────────────────────
particlesJS("particles-js",{
    "particles":{
        "number":{"value":80},
        "color":{"value":["#ff0077","#0044ff","#ffffff"]},
        "shape":{"type":"circle"},
        "opacity":{"value":0.9,"random":true,"anim":{"enable":true,"speed":1,"opacity_min":0.5}},
        "size":{"value":2.5,"random":true},
        "line_linked":{"enable":true,"distance":140,"color":"#0033ff","opacity":0.28,"width":0.7},
        "move":{"enable":true,"speed":2,"random":true,"out_mode":"out"}
    },
    "interactivity":{"events":{"onhover":{"enable":false},"onclick":{"enable":true,"mode":"push"}},"modes":{"push":{"particles_nb":3}}}
});

// ── FETCH HELPERS — per data type ─────────────────────────────
async function fetchProfiles() {
    const r = await _db.from('profiles').select('*');
    if(r.data) allData.p = r.data;
}
async function fetchDeposits() {
    const r = await _db.from('deposits').select('*');
    if(r.data) allData.d = r.data;
}
async function fetchWithdrawals() {
    const r = await _db.from('withdrawals').select('*');
    if(r.data) allData.w = r.data;
}
async function fetchAll() {
    await Promise.all([fetchProfiles(), fetchDeposits(), fetchWithdrawals()]);
}

// ── INIT ──────────────────────────────────────────────────────
async function init() {
    try {
        await fetchAll();
        updatePanicUI();
        renderAlpha();
        renderActiveView();
        updatePendingBadge();
        setupSmartRefresh();
        setupRealtimeCashier();
    } catch(e) {
        showAlert('Gagal memuat data: ' + e.message);
    }
}

// ── SMART REFRESH — setiap tab punya interval berbeda ────────
function setupSmartRefresh() {
    // Bersihkan semua timer lama
    clearAllTimers();

    if(currentTab === 'live') {
        // LIVE: Refresh sangat cepat — 3 detik, hanya fetch profiles
        timerLive = setInterval(async () => {
            await fetchProfiles();
            renderLive();
            const el = document.getElementById('live-last-refresh');
            if(el) el.innerText = 'Update: ' + new Date().toLocaleTimeString('id-ID');
        }, 3000);

    } else if(currentTab === 'cashier') {
        // KASIR: Refresh setiap 8 detik + Realtime sudah dihandle terpisah
        timerCashier = setInterval(async () => {
            await fetchDeposits();
            await fetchWithdrawals();
            renderCashier();
            updatePendingBadge();
        }, 8000);

    } else if(currentTab === 'players' || currentTab === 'gift') {
        // PLAYERS/GIFT: Refresh 30 detik
        timerPlayers = setInterval(async () => {
            await fetchProfiles();
            renderActiveView();
        }, 30000);

    } else if(currentTab === 'report') {
        // REPORT: Refresh 30 detik
        timerReport = setInterval(async () => {
            await fetchAll();
            renderReport();
        }, 30000);
    }
}

function clearAllTimers() {
    if(timerLive)    { clearInterval(timerLive);    timerLive    = null; }
    if(timerCashier) { clearInterval(timerCashier); timerCashier = null; }
    if(timerPlayers) { clearInterval(timerPlayers); timerPlayers = null; }
    if(timerReport)  { clearInterval(timerReport);  timerReport  = null; }
}

// ── REALTIME CHANNEL untuk KASIR ────────────────────────────
function setupRealtimeCashier() {
    if(realtimeChannel) {
        _db.removeChannel(realtimeChannel);
        realtimeChannel = null;
    }
    realtimeChannel = _db
        .channel('kasir-realtime')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'deposits' }, async () => {
            await fetchDeposits();
            updatePendingBadge();
            if(currentTab === 'cashier') renderCashier();
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'withdrawals' }, async () => {
            await fetchWithdrawals();
            updatePendingBadge();
            if(currentTab === 'cashier') renderCashier();
        })
        .subscribe();
}

// ── ALPHA ─────────────────────────────────────────────────────
function renderAlpha() {
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789".split('');
    document.getElementById('alpha-nav').innerHTML = letters.map(l => {
        const count = allData.p.filter(u => (u.username || '').toUpperCase().startsWith(l)).length;
        return `<button class="alpha-btn ${l===activeAlpha?'active':''}" onclick="setAlpha('${l}')">${l}<br><span style="font-size:8px;opacity:.6;">${count}</span></button>`;
    }).join('');
}
function setAlpha(l) { activeAlpha = l; renderActiveView(); }

function renderActiveView() {
    if(currentTab==='players') renderPlayers();
    if(currentTab==='live')    renderLive();
    if(currentTab==='cashier') renderCashier();
    if(currentTab==='gift')    renderGift();
    if(currentTab==='report')  renderReport();
    renderAlpha();
}

// ── 1. PLAYERS ────────────────────────────────────────────────
function renderPlayers() {
    const filtered = allData.p.filter(u => (u.username||'').toUpperCase().startsWith(activeAlpha));
    if (filtered.length === 0) {
        document.getElementById('view-players').innerHTML =
            '<div style="text-align:center;padding:40px;opacity:.3;font-size:12px;"><i class="fas fa-user-slash" style="font-size:30px;display:block;margin-bottom:10px;"></i>Tidak ada player dengan huruf ini</div>';
        return;
    }

    document.getElementById('view-players').innerHTML = filtered.map(u => {
        const totD = allData.d
            .filter(x => x.username === u.username && x.status === 'SUKSES')
            .reduce((s,x) => s + (parseFloat(x.net_receive)||0), 0);
        const totW = allData.w
            .filter(x => x.username === u.username && x.status === 'SUKSES')
            .reduce((s,x) => s + (parseFloat(x.amount)||0), 0);
        const pnl = totD - totW;
        const pc  = pnl >= 0 ? '#00ff88' : 'var(--pink)';
        const pl  = (pnl >= 0 ? '+' : '') + pnl.toLocaleString('id-ID');
        const k   = safeKey(u.username);
        const wr  = u.winrate  ?? 30;
        const mx  = u.maxwin_limit ?? u.maxwin ?? 1000000;
        const sm  = u.session_minutes ?? u.session_timer ?? 0;
        const bal = Number(u.saldo || 0);
        // Tampilkan status panic per player
        const isPanicPlayer = u.panic_mode === true;

        return `<div class="card" style="${isPanicPlayer?'border-color:rgba(255,0,119,.6);':''}">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;">
                <div>
                    <div class="player-name">${u.username}${isPanicPlayer?' <span style="font-size:8px;color:var(--pink);margin-left:4px;">⚠ PANIC</span>':''}</div>
                    <div style="font-size:9px;opacity:.4;margin-top:2px;">${u.nama_lengkap||''} &bull; ${u.bank_name||''}</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:14px;font-weight:900;color:var(--yellow);text-shadow:var(--gy)">${bal.toLocaleString('id-ID')}</div>
                    <div style="font-size:9px;color:${pc};font-weight:900;">PNL: ${pl}</div>
                </div>
            </div>
            <div class="input-group">
                <div class="field">
                    <label><i class="fas fa-percent"></i> WINRATE %</label>
                    <input type="number" id="wr-${k}" value="${wr}" min="1" max="100">
                </div>
                <div class="field">
                    <label><i class="fas fa-trophy"></i> MAXWIN</label>
                    <input type="number" id="mx-${k}" value="${mx}">
                </div>
                <div class="field field-full">
                    <label><i class="fas fa-hourglass-half"></i> SESSION (MENIT)</label>
                    <input type="number" id="sm-${k}" value="${sm}">
                </div>
            </div>
            <button class="btn-action btn-save" onclick="updateUser('${u.username}','${k}')">
                <i class="fas fa-floppy-disk"></i> UPDATE PLAYER
            </button>
        </div>`;
    }).join('');
}

// ── 2. LIVE MONITOR ───────────────────────────────────────────
function renderLive() {
    const body   = document.getElementById('live-body');
    const sorted = [...allData.p].sort((a,b) => (b.saldo||0) - (a.saldo||0));
    if (sorted.length === 0) {
        body.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:25px;opacity:.4;font-size:11px;">Tidak ada data player</td></tr>';
        return;
    }
    body.innerHTML = sorted.map(u => {
        const start = u.initial_balance_session || 0;
        const live  = u.saldo || 0;
        const diff  = live - start;
        const dc    = diff > 0 ? 'status-up' : (diff < 0 ? 'status-down' : 'status-zero');
        const wr    = u.winrate ?? '?';
        const panicBadge = u.panic_mode ? ' <span style="color:var(--pink);font-size:8px;">⚠</span>' : '';
        return `<tr>
            <td>
                <b style="color:var(--yellow);text-shadow:var(--gy)">${u.username}${panicBadge}</b>
                <br><span style="font-size:9px;opacity:.35;">WR: ${wr}% &bull; ${u.bank_name||''}</span>
            </td>
            <td style="color:rgba(255,255,255,.5);">${start.toLocaleString('id-ID')}</td>
            <td style="font-weight:900;">${live.toLocaleString('id-ID')}</td>
            <td class="${dc}">${diff >= 0 ? '+' : ''}${diff.toLocaleString('id-ID')}</td>
        </tr>`;
    }).join('');
}

// ── 3. KASIR ──────────────────────────────────────────────────
function renderCashier() {
    const pD = allData.d.filter(x => x.status === 'PROSES');
    const pW = allData.w.filter(x => x.status === 'PROSES');
    let html = '';

    if (pD.length === 0 && pW.length === 0) {
        document.getElementById('view-cashier').innerHTML =
            '<div style="text-align:center;padding:60px 20px;opacity:.3;font-size:13px;"><i class="fas fa-check-circle" style="font-size:40px;display:block;margin-bottom:15px;color:var(--blue);text-shadow:var(--gb)"></i>SEMUA TRANSAKSI BERSIH<br>Tidak ada pending</div>';
        return;
    }

    if (pD.length > 0) {
        html += '<div class="sec-title"><i class="fas fa-arrow-down" style="color:var(--blue);text-shadow:var(--gb)"></i> PENDING DEPOSIT (' + pD.length + ')</div>';
        pD.forEach(x => {
            const net = x.net_receive || x.amount || 0;
            html += `<div class="card" style="border-left:4px solid var(--blue);padding-left:14px;">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <div style="font-weight:900;color:var(--yellow);font-size:14px;text-shadow:var(--gy)">${x.username}</div>
                        <div style="font-size:10px;opacity:.5;margin-top:2px;">${x.method||'QRIS'} &bull; ${new Date(x.created_at).toLocaleString('id-ID')}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-size:16px;font-weight:900;color:var(--blue);text-shadow:var(--gb)">+${Number(net).toLocaleString('id-ID')}</div>
                        <div style="font-size:9px;color:var(--yellow);">Input: ${Number(x.amount||0).toLocaleString('id-ID')}</div>
                    </div>
                </div>
                <div class="btn-flex" style="margin-top:10px;">
                    <button class="btn-action btn-approve" onclick="procD(${x.id},'${x.username}',${net})">
                        <i class="fas fa-check"></i> APPROVE
                    </button>
                    <button class="btn-action btn-reject" onclick="rejectDepo(${x.id},'${x.username}')">
                        <i class="fas fa-xmark"></i> REJECT
                    </button>
                </div>
            </div>`;
        });
    }

    if (pW.length > 0) {
        html += '<div class="sec-title" style="margin-top:15px;"><i class="fas fa-arrow-up" style="color:var(--pink);text-shadow:var(--gp)"></i> PENDING WITHDRAW (' + pW.length + ')</div>';
        pW.forEach(x => {
            const amt = x.nominal || x.amount || 0;
            html += `<div class="card card-pink" style="border-left:4px solid var(--pink);padding-left:14px;">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <div style="font-weight:900;color:var(--yellow);font-size:14px;text-shadow:var(--gy)">${x.username}</div>
                        <div style="font-size:10px;opacity:.5;margin-top:2px;">${new Date(x.created_at).toLocaleString('id-ID')}</div>
                    </div>
                    <div style="font-size:16px;font-weight:900;color:var(--pink);text-shadow:var(--gp)">-${Number(amt).toLocaleString('id-ID')}</div>
                </div>
                <div class="btn-flex" style="margin-top:10px;">
                    <button class="btn-action btn-gift" onclick="procW(${x.id})">
                        <i class="fas fa-check"></i> APPROVE WD
                    </button>
                    <button class="btn-action btn-reject" onclick="rejectWd(${x.id},'${x.username}',${amt})">
                        <i class="fas fa-rotate-left"></i> KEMBALIKAN
                    </button>
                </div>
            </div>`;
        });
    }
    document.getElementById('view-cashier').innerHTML = html;
}

function updatePendingBadge() {
    const count = allData.d.filter(x => x.status==='PROSES').length
                + allData.w.filter(x => x.status==='PROSES').length;
    const badge = document.getElementById('pending-count');
    if (count > 0) { badge.style.display = 'inline-block'; badge.innerText = count; }
    else badge.style.display = 'none';
}

// ── ACTIONS ───────────────────────────────────────────────────

async function updateUser(username, k) {
    const wr = parseFloat(document.getElementById('wr-' + k)?.value) || 30;
    const mx = parseFloat(document.getElementById('mx-' + k)?.value) || 1000000;
    const sm = parseInt(document.getElementById('sm-' + k)?.value)  || 0;

    const { error } = await _db.from('profiles').update({
        winrate        : wr,
        maxwin_limit   : mx,
        session_minutes: sm,
        session_timer  : sm,
        panic_mode     : false   // reset panic untuk player ini
    }).eq('username', username);

    if (!error) {
        showAlert('✓ ' + username + ' BERHASIL DIUPDATE', 'ok');
        await fetchProfiles();
        renderActiveView();
    } else {
        showAlert('ERROR: ' + error.message);
    }
}

async function sendGift(username, k) {
    const amt = parseInt(document.getElementById('g-' + k)?.value) || 0;
    const msg = document.getElementById('gm-' + k)?.value?.trim() || 'Hadiah Admin';
    if (!amt || amt <= 0) return showAlert('MASUKKAN NOMINAL GIFT!');
    try {
        const { data: prof, error: e1 } = await _db.from('profiles').select('saldo').eq('username', username).single();
        if (e1 || !prof) return showAlert('USER TIDAK DITEMUKAN!');
        const { error: e2 } = await _db.from('profiles').update({ saldo: (prof.saldo || 0) + amt }).eq('username', username);
        if (e2) return showAlert('ERROR UPDATE SALDO: ' + e2.message);
        const { error: e3 } = await _db.from('inbox').insert([{ username, nominal: amt, pesan: msg, status: 'UNCLAIMED' }]);
        if (e3) return showAlert('ERROR INBOX: ' + e3.message);
        if (document.getElementById('g-' + k))  document.getElementById('g-' + k).value  = '';
        if (document.getElementById('gm-' + k)) document.getElementById('gm-' + k).value = '';
        showAlert('GIFT Rp ' + amt.toLocaleString('id-ID') + ' → ' + username + ' ✓', 'ok');
        await fetchProfiles();
        renderActiveView();
    } catch(e) { showAlert('ERROR: ' + e.message); }
}

async function sendMass() {
    const amt = parseInt(document.getElementById('mass-amt')?.value) || 0;
    if (!amt || amt <= 0) return showAlert('MASUKKAN NOMINAL GIFT!');
    askConfirm(
        `Kirim Rp ${amt.toLocaleString('id-ID')} ke SEMUA ${allData.p.length} player?`,
        async () => {
            let ok = 0;
            for (const u of allData.p) {
                const { error } = await _db.from('profiles').update({ saldo: (u.saldo || 0) + amt }).eq('username', u.username);
                if (!error) {
                    await _db.from('inbox').insert([{ username: u.username, nominal: amt, pesan: 'Mass Gift dari Admin', status: 'UNCLAIMED' }]);
                    ok++;
                }
            }
            document.getElementById('mass-amt').value = '';
            showAlert(`MASS GIFT TERKIRIM KE ${ok} PLAYER ✓`, 'ok');
            await fetchProfiles();
            renderActiveView();
        }
    );
}

async function procD(txId, username, net) {
    askConfirm(
        `Approve DEPOSIT +${Number(net).toLocaleString('id-ID')}\nuntuk ${username}?`,
        async () => {
            const { data: prof } = await _db.from('profiles').select('saldo,total_deposit_current').eq('username', username).single();
            await _db.from('profiles').update({
                saldo                : (prof?.saldo || 0) + Number(net),
                last_deposit_amount  : Number(net),
                total_deposit_current: (prof?.total_deposit_current || 0) + Number(net)
            }).eq('username', username);
            await _db.from('deposits').update({ status: 'SUKSES' }).eq('id', txId);
            showAlert(`DEPOSIT ${Number(net).toLocaleString('id-ID')} → ${username} ✓`, 'ok');
            await fetchAll();
            renderActiveView();
            updatePendingBadge();
        }
    );
}

async function procW(txId) {
    askConfirm('Approve WITHDRAW ini?\nSaldo sudah dipotong dari user.', async () => {
        await _db.from('withdrawals').update({ status: 'SUKSES' }).eq('id', txId);
        showAlert('WITHDRAW APPROVED ✓', 'ok');
        await fetchWithdrawals();
        renderCashier();
        updatePendingBadge();
    });
}

async function rejectDepo(txId, username) {
    askConfirm(`Reject DEPOSIT ${username}?`, async () => {
        await _db.from('deposits').update({ status: 'GAGAL' }).eq('id', txId);
        showAlert('DEPOSIT DITOLAK', '');
        await fetchDeposits();
        renderCashier();
        updatePendingBadge();
    });
}

async function rejectWd(txId, username, amt) {
    askConfirm(
        `Tolak WD dan kembalikan\nRp ${Number(amt).toLocaleString('id-ID')} ke ${username}?`,
        async () => {
            const { data: prof } = await _db.from('profiles').select('saldo').eq('username', username).single();
            await _db.from('profiles').update({ saldo: (prof?.saldo || 0) + Number(amt) }).eq('username', username);
            await _db.from('withdrawals').update({ status: 'GAGAL' }).eq('id', txId);
            showAlert(`WD DITOLAK — Saldo Rp ${Number(amt).toLocaleString('id-ID')} dikembalikan ✓`, 'ok');
            await fetchAll();
            renderCashier();
            updatePendingBadge();
        }
    );
}

// ── PANIC MODE — DIPERBAIKI ────────────────────────────────────
// Cek status panic dari DB langsung, bukan dari allData lokal
async function togglePanicGlobal() {
    // Selalu ambil status terbaru dari DB
    const { data: freshData } = await _db.from('profiles').select('panic_mode').limit(10);
    const isPanic = freshData && freshData.some(u => u.panic_mode === true);

    askConfirm(
        isPanic
            ? 'Matikan PANIC MODE?\nWinrate semua player kembali ke setting normal.'
            : '⚠️ AKTIFKAN PANIC MODE?\nSemua winrate → 1% SEKARANG!',
        async () => {
            if (isPanic) {
                // MATIKAN: kembalikan winrate ke default 30, panic_mode false
                const { error } = await _db.from('profiles').update({ panic_mode: false });
                if(error){ showAlert('ERROR: '+error.message); return; }
                showAlert('✅ PANIC MODE DIMATIKAN — Sistem Aman', 'ok');
            } else {
                // AKTIFKAN: set winrate 1% dan panic_mode true untuk SEMUA
                const { error } = await _db.from('profiles').update({ winrate: 1, panic_mode: true });
                if(error){ showAlert('ERROR: '+error.message); return; }
                showAlert('⚠️ PANIC MODE AKTIF! Semua Winrate → 1%', '');
            }
            // Refresh data dan UI
            await fetchProfiles();
            updatePanicUI();
            renderActiveView();
        }
    );
}

function updatePanicUI() {
    const isPanic = allData.p.some(u => u.panic_mode === true);
    const btn = document.getElementById('panic-master');
    const ind = document.getElementById('panic-indicator');
    const bar = document.getElementById('panic-bar');

    if (isPanic) {
        btn.className = 'panic-btn panic-active';
        btn.innerHTML = '<i class="fas fa-skull fa-shake"></i> PANIC ON';
        if(ind) ind.style.display = 'block';
        if(bar) bar.style.display = 'block';
    } else {
        btn.className = 'panic-btn';
        btn.innerHTML = '<i class="fas fa-skull"></i> PANIC';
        if(ind) ind.style.display = 'none';
        if(bar) bar.style.display = 'none';
    }
}

// ── UI HELPERS ────────────────────────────────────────────────
function showAlert(msg, type = '') {
    const a = document.getElementById('neon-alert');
    a.innerText = msg;
    a.className = type === 'ok' ? 'show ok' : 'show';
    setTimeout(() => { a.className = ''; }, 3500);
}

function askConfirm(msg, cb) {
    document.getElementById('confirm-msg').innerText = msg;
    document.getElementById('confirm-overlay').style.display = 'flex';
    document.getElementById('btn-confirm-yes').onclick = () => { closeConfirm(); cb(); };
}

function closeConfirm() {
    document.getElementById('confirm-overlay').style.display = 'none';
}

function switchTab(t, el) {
    currentTab = t;
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    document.getElementById('view-' + t).style.display = 'block';
    document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('alpha-nav').style.display = (t==='players'||t==='gift') ? 'grid' : 'none';
    // Reset & setup ulang interval sesuai tab aktif
    clearAllTimers();
    setupSmartRefresh();
    renderActiveView();
}

// ── START ─────────────────────────────────────────────────────
init();
</script>
