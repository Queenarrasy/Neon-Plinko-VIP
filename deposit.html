<!DOCTYPE html>
<html lang="en" class="neon-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit History</title>
    <link rel="stylesheet" href="styles/neon-theme.css">
    <script src="scripts/depositHistory.js" defer></script>
</head>
<body>
    <h1>Deposit History</h1>
    <div id="errorMsg" class="error-message" style="display: none;"></div>
    <table id="depositTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <!-- Deposit history records will be inserted here -->
        </tbody>
    </table>
    
    <script>
        async function fetchDepositHistory() {
            try {
                const response = await fetch('/api/deposit-history'); // Update with actual endpoint
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                const data = await response.json();
                const tableBody = document.getElementById('depositTable').querySelector('tbody');
                tableBody.innerHTML = ''; // Clear existing records
                data.forEach(record => {
                    const row = document.createElement('tr');
                    row.innerHTML = `<td>${record.date}</td><td>${record.amount}</td><td>${record.status}</td>`;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                document.getElementById('errorMsg').innerText = 'Failed to load deposit history: ' + error.message;
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        function autoRefresh() {
            fetchDepositHistory();
            setTimeout(autoRefresh, 30000); // Refresh every 30 seconds
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            fetchDepositHistory();
            autoRefresh();
        });
    </script>
</body>
</html>
