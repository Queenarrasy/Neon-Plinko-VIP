<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>DEPOSIT — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --pink: #ff0077;
            --blue: #0022ff;
            --yellow: #fbff00;
            --bg: #000005;
            /* Efek Neon Tipis */
            --neon-pink: 0 0 6px rgba(255, 0, 119, 0.4);
            --neon-blue: 0 0 6px rgba(0, 34, 255, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg) url('33266.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 5, 0.93); z-index: -1;
        }

        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* Container ditingkatkan z-index agar bisa diklik */
        .container { position: relative; z-index: 10; padding: 20px; max-width: 500px; margin: 0 auto; }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn-back {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--pink);
            color: #fff; padding: 10px 15px; border-radius: 12px; text-decoration: none;
            font-size: 11px; font-weight: 800; box-shadow: var(--neon-pink);
        }

        .header h1 {
            font-family: 'Cinzel Decorative', cursive; font-size: 22px;
            text-align: center; color: var(--pink); text-shadow: var(--neon-pink);
        }

        .saldo-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 0, 119, 0.2);
            border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 20px;
            backdrop-filter: blur(10px); box-shadow: var(--neon-pink);
        }
        .saldo-label { font-size: 10px; color: var(--pink); font-weight: 800; text-transform: uppercase; }
        .saldo-val { font-size: 26px; font-weight: 900; color: #fff; }

        .card {
            background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(15px);
        }

        .label { display: block; font-size: 11px; font-weight: 800; color: var(--pink); margin-bottom: 15px; text-transform: uppercase; }

        .method-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .method-box {
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px;
            text-align: center; cursor: pointer; transition: 0.3s; background: rgba(0,0,0,0.5);
            z-index: 20; position: relative;
        }
        .method-box.active { border-color: var(--pink); background: rgba(255, 0, 119, 0.1); box-shadow: var(--neon-pink); }
        .method-box i { font-size: 24px; margin-bottom: 8px; display: block; }
        .method-box span { font-size: 10px; font-weight: 900; }

        .input-group input {
            width: 100%; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            padding: 18px; border-radius: 12px; color: #fff; font-family: 'Outfit';
            font-size: 22px; font-weight: 900; text-align: center;
        }
        .input-group input:focus { outline: none; border-color: var(--pink); box-shadow: var(--neon-pink); }

        /* QRIS Area Fix */
        .qris-area { text-align: center; margin: 20px 0; display: block; }
        .qris-frame {
            background: #fff; padding: 10px; border-radius: 12px; display: inline-block;
            box-shadow: 0 0 15px rgba(255,255,255,0.1); line-height: 0;
        }
        .qris-frame img { 
            width: 100%; max-width: 220px; border-radius: 5px;
            image-rendering: -webkit-optimize-contrast; /* Fix gambar pecah */
            image-rendering: crisp-edges;
        }

        /* USDT Area */
        .usdt-area {
            background: rgba(0, 34, 255, 0.05); border: 1px dashed var(--blue);
            padding: 15px; border-radius: 15px; margin-bottom: 20px; display: none;
        }
        .wallet-box {
            background: #000; padding: 12px; border-radius: 10px; font-family: monospace;
            font-size: 11px; color: var(--yellow); word-break: break-all; 
            border: 1px solid rgba(0, 34, 255, 0.3); margin: 10px 0;
        }

        .btn-main {
            width: 100%; background: var(--pink); color: #fff; border: none; padding: 18px;
            border-radius: 12px; font-weight: 900; font-size: 15px; cursor: pointer;
            text-transform: uppercase; box-shadow: var(--neon-pink);
        }

        /* History Table */
        .h-wrap { overflow-x: auto; margin-top: 10px; }
        .h-table { width: 100%; border-collapse: collapse; min-width: 450px; }
        .h-table th { text-align: left; font-size: 10px; color: rgba(255,255,255,0.4); padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .h-table td { padding: 15px 10px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .badge { padding: 4px 8px; border-radius: 5px; font-size: 10px; font-weight: 900; }
        .st-PROSES { background: var(--blue); box-shadow: var(--neon-blue); }
        .st-SUKSES { background: #00ff88; color: #000; }
        .st-GAGAL { background: var(--pink); }

        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal { background: #050505; border: 1px solid var(--pink); padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <div class="container">
        <div class="nav-bar">
            <a href="game.html" class="btn-back" onclick="playSnd()"><i class="fas fa-chevron-left"></i> KEMBALI</a>
            <div class="header"><h1>TOPUP</h1></div>
            <div style="width: 50px;"></div>
        </div>

        <div class="saldo-card">
            <span class="saldo-label">SALDO AKUN</span>
            <div class="saldo-val" id="display-saldo">Rp 0</div>
        </div>

        <div class="card">
            <span class="label">Metode Pembayaran</span>
            <div class="method-grid">
                <div class="method-box active" id="m-qris" onclick="setMethod('QRIS')">
                    <i class="fas fa-qrcode" style="color: var(--pink);"></i>
                    <span>QRIS (AUTO)</span>
                </div>
                <div class="method-box" id="m-usdt" onclick="setMethod('USDT')">
                    <i class="fab fa-ethereum" style="color: var(--blue);"></i>
                    <span>USDT CRYPTO</span>
                </div>
            </div>

            <div class="input-group">
                <input type="number" id="inp-amt" placeholder="0" oninput="updateConvert()">
            </div>

            <div id="qris-box" class="qris-area">
                <div class="qris-frame">
                    <img src="25989.png" alt="QRIS NEON" onerror="this.src='https://via.placeholder.com/200?text=QRIS+ERROR'">
                </div>
                <p style="font-size:9px; margin-top:10px; opacity:0.6; font-weight:700;">SILAKAN SCAN & BAYAR</p>
            </div>

            <div id="usdt-box" class="usdt-area">
                <div style="display:flex; justify-content:space-between; font-size:12px;">
                    <span>Rate: 16.200</span>
                    <span id="usdt-res" style="color:var(--yellow); font-weight:900;">Rp 0</span>
                </div>
                <div class="wallet-box">0x71dE983697e066eBe53018e698887eDAb6377777</div>
                <p style="font-size:9px; color:var(--blue); font-weight:800; text-align:center;">JARINGAN BEP20 (BNB SMART CHAIN)</p>
            </div>

            <button class="btn-main" id="btn-depo" onclick="prosesDepo()">
                <i class="fas fa-check-circle"></i> KONFIRMASI PEMBAYARAN
            </button>
        </div>

        <div class="card" style="padding: 15px;">
            <span class="label"><i class="fas fa-history"></i> Riwayat Deposit</span>
            <div class="h-wrap">
                <table class="h-table">
                    <thead>
                        <tr>
                            <th>METODE</th>
                            <th>NOMINAL</th>
                            <th>STATUS</th>
                            <th>WAKTU</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h3 id="m-title" style="color:var(--pink); margin-bottom:12px; font-family:'Cinzel Decorative';">INFO</h3>
            <p id="m-msg" style="font-size:14px; opacity:0.8; margin-bottom:20px;"></p>
            <button class="btn-main" onclick="closeModal()">OKAY</button>
        </div>
    </div>

    <script>
        // Gunakan URL Supabase Anda
        const SUPA_URL = "https://jcxgankdwfwfnbwlkkpz.supabase.co";
        const SUPA_KEY = CONFIG.SUPABASE_ANON_KEY; 
        const supa = supabase.createClient(SUPA_URL, SUPA_KEY);
        
        let activeMethod = 'QRIS';

        particlesJS("particles-js", {"particles":{"number":{"value":30},"color":{"value":"#ff0077"},"opacity":{"value":0.2},"size":{"value":2},"move":{"speed":1}}});

        function playSnd(){ const a=document.getElementById('snd-click'); a.currentTime=0; a.play(); }

        function setMethod(m){
            playSnd();
            activeMethod = m;
            document.getElementById('m-qris').classList.toggle('active', m==='QRIS');
            document.getElementById('m-usdt').classList.toggle('active', m==='USDT');
            document.getElementById('qris-box').style.display = (m==='QRIS' ? 'block' : 'none');
            document.getElementById('usdt-box').style.display = (m==='USDT' ? 'block' : 'none');
            document.getElementById('inp-amt').placeholder = (m==='USDT' ? 'Jumlah USDT' : 'Min. 20.000');
            document.getElementById('inp-amt').value = '';
            updateConvert();
        }

        function updateConvert(){
            const val = parseFloat(document.getElementById('inp-amt').value) || 0;
            if(activeMethod === 'USDT'){
                document.getElementById('usdt-res').innerText = "Rp " + (val * 16200).toLocaleString('id-ID');
            }
        }

        async function prosesDepo(){
            playSnd();
            const user = localStorage.getItem('p_user');
            const amt = parseFloat(document.getElementById('inp-amt').value);

            if(!user) return showModal("ERROR", "Silakan login ulang.");
            if(!amt || amt <= 0) return showModal("INFO", "Masukkan nominal yang valid.");

            const finalIDR = (activeMethod === 'USDT' ? amt * 16200 : amt);
            
            try {
                const btn = document.getElementById('btn-depo');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> MEMPROSES...';

                const { error } = await supa.from('deposits').insert([{
                    username: user,
                    amount: amt,
                    net_receive: finalIDR,
                    method: activeMethod,
                    status: 'PROSES',
                    created_at: new Date().toISOString()
                }]);

                if(error) throw error;
                showModal("SUKSES", "Konfirmasi deposit terkirim! Saldo akan masuk setelah divalidasi Admin.");
                document.getElementById('inp-amt').value = '';
                loadHistory();
            } catch (err) {
                showModal("GAGAL", "Terjadi kesalahan database.");
            } finally {
                const btn = document.getElementById('btn-depo');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check-circle"></i> KONFIRMASI PEMBAYARAN';
            }
        }

        async function loadHistory(){
            const user = localStorage.getItem('p_user');
            if(!user) return;

            // Load Saldo
            const { data: profile } = await supa.from('profiles').select('saldo').eq('username', user).single();
            if(profile) document.getElementById('display-saldo').innerText = 'Rp ' + (profile.saldo || 0).toLocaleString('id-ID');

            // Load History dari tabel deposits
            const { data } = await supa.from('deposits').select('*').eq('username', user).order('created_at', {ascending:false}).limit(5);
            const body = document.getElementById('history-body');
            
            if(data && data.length > 0){
                body.innerHTML = data.map(d => `
                    <tr>
                        <td style="color:var(--pink); font-weight:800;">${d.method}</td>
                        <td style="font-weight:900;">${d.method==='USDT'?'$':''} ${d.amount.toLocaleString('id-ID')}</td>
                        <td><span class="badge st-${d.status}">${d.status}</span></td>
                        <td style="font-size:9px; opacity:0.4;">${new Date(d.created_at).toLocaleTimeString()}</td>
                    </tr>
                `).join('');
            } else {
                body.innerHTML = '<tr><td colspan="4" style="text-align:center; opacity:0.3; padding:20px;">Belum ada riwayat</td></tr>';
            }
        }

        function showModal(t,m){ document.getElementById('m-title').innerText=t; document.getElementById('m-msg').innerText=m; document.getElementById('modal-overlay').style.display='flex'; }
        function closeModal(){ playSnd(); document.getElementById('modal-overlay').style.display='none'; }

        window.onload = loadHistory;
    </script>
</body>
</html>
