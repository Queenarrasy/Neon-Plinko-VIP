<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>DEPOSIT — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --pink: #ff0077;
            --blue: #0022ff;
            --yellow: #fbff00;
            --bg: #000005;
            --gp: 0 0 15px rgba(255, 0, 119, 0.7), 0 0 30px rgba(255, 0, 119, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg) url('33266.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            min-height: 100vh;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 5, 0.92); z-index: -1;
        }

        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        .container { position: relative; z-index: 10; padding: 20px; max-width: 500px; margin: 0 auto; }

        /* Header & Nav */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back {
            background: rgba(255,255,255,0.05); border: 1px solid var(--pink);
            color: #fff; padding: 10px 15px; border-radius: 12px; text-decoration: none;
            font-size: 11px; font-weight: 800; box-shadow: var(--gp);
        }
        .header h1 { font-family: 'Cinzel Decorative'; font-size: 22px; text-shadow: var(--gp); }

        /* Saldo Box */
        .saldo-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 0, 119, 0.3);
            border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px;
            backdrop-filter: blur(10px); box-shadow: var(--gp);
        }
        .saldo-label { font-size: 10px; color: var(--pink); font-weight: 800; text-transform: uppercase; }
        .saldo-val { font-size: 28px; font-weight: 900; margin-top: 5px; }

        /* Form Card */
        .card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(15px);
        }

        .label { display: block; font-size: 11px; font-weight: 800; color: var(--pink); margin: 15px 0 10px; text-transform: uppercase; }

        /* Metode Grid */
        .method-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .method-box {
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px;
            text-align: center; cursor: pointer; transition: 0.3s; background: rgba(0,0,0,0.4);
        }
        .method-box.active { border-color: var(--pink); background: rgba(255, 0, 119, 0.15); box-shadow: var(--gp); }
        .method-box i { font-size: 24px; margin-bottom: 5px; display: block; }
        .method-box span { font-size: 10px; font-weight: 900; }

        /* Input & Presets */
        .amount-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .amt-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 12px 5px; border-radius: 10px; font-size: 12px; font-weight: 800; cursor: pointer;
        }
        .amt-btn:active { background: var(--pink); box-shadow: var(--gp); }

        .input-group input {
            width: 100%; background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.1);
            padding: 18px; border-radius: 15px; color: #fff; font-size: 22px; font-weight: 900; text-align: center;
        }
        .input-group input:focus { outline: none; border-color: var(--pink); box-shadow: var(--gp); }

        /* QRIS AREA - PERBAIKAN DI SINI */
        .qris-container { text-align: center; margin: 20px 0; display: block; }
        .qris-box {
            background: #ffffff; 
            padding: 15px; 
            border-radius: 15px; 
            display: inline-block;
            box-shadow: 0 0 25px rgba(255,255,255,0.15);
            line-height: 0;
        }
        .qris-box img { 
            width: 100%; 
            max-width: 240px; 
            height: auto; 
            display: block; 
            border-radius: 5px;
            /* Menjaga agar QR Code tidak blur saat diperbesar */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated; 
        }

        /* USDT AREA */
        .usdt-box {
            background: rgba(0, 34, 255, 0.1); border: 1px dashed var(--blue);
            padding: 15px; border-radius: 15px; margin-bottom: 15px; display: none;
        }
        .wallet-addr {
            background: #000; padding: 12px; border-radius: 10px; font-family: monospace;
            font-size: 11px; color: var(--yellow); word-break: break-all; margin: 10px 0; border: 1px solid var(--blue);
        }

        .btn-main {
            width: 100%; background: var(--pink); color: #fff; border: none; padding: 20px;
            border-radius: 15px; font-weight: 900; font-size: 16px; cursor: pointer; box-shadow: var(--gp);
        }

        /* History Table */
        .history-wrap { overflow-x: auto; margin-top: 10px; }
        .h-table { width: 100%; border-collapse: collapse; min-width: 400px; }
        .h-table th { text-align: left; font-size: 10px; color: rgba(255,255,255,0.4); padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .h-table td { padding: 15px 10px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .badge { padding: 4px 8px; border-radius: 5px; font-size: 10px; font-weight: 900; }
        .st-PROSES { background: var(--blue); }
        .st-SUKSES { background: #00ff88; color: #000; }
        .st-GAGAL { background: var(--pink); }

        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal { background: #0a0a0a; border: 2px solid var(--pink); padding: 30px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <div class="container">
        <div class="nav-bar">
            <a href="game.html" class="btn-back" onclick="playSnd()"><i class="fas fa-arrow-left"></i></a>
            <div class="header"><h1>TOPUP</h1></div>
            <div style="width: 45px;"></div>
        </div>

        <div class="saldo-card">
            <span class="saldo-label">SALDO SAAT INI</span>
            <div class="saldo-val" id="display-saldo">Rp 0</div>
        </div>

        <div class="card">
            <span class="label">Pilih Metode</span>
            <div class="method-grid">
                <div class="method-box active" id="m-qris" onclick="setMethod('QRIS')">
                    <i class="fas fa-qrcode" style="color: var(--pink);"></i>
                    <span>QRIS (AUTO)</span>
                </div>
                <div class="method-box" id="m-usdt" onclick="setMethod('USDT')">
                    <i class="fab fa-ethereum" style="color: var(--blue);"></i>
                    <span>USDT CRYPTO</span>
                </div>
            </div>

            <span class="label">Nominal</span>
            <div class="amount-grid" id="qris-presets">
                <button class="amt-btn" onclick="setAmt(20000)">20K</button>
                <button class="amt-btn" onclick="setAmt(50000)">50K</button>
                <button class="amt-btn" onclick="setAmt(100000)">100K</button>
            </div>

            <div class="input-group">
                <input type="number" id="inp-amt" placeholder="0" oninput="updateCalc()">
            </div>

            <div id="qris-view" class="qris-container">
                <div class="qris-box">
                    <img src="25989.png" alt="QRIS PAY" onerror="this.src='https://via.placeholder.com/240?text=QRIS+TIDAK+ADA'">
                </div>
                <p style="font-size:9px; margin-top:10px; opacity:0.5; font-weight:800;">SCAN & BAYAR SESUAI NOMINAL</p>
            </div>

            <div id="usdt-view" class="usdt-box">
                <div style="display:flex; justify-content:space-between; font-size:12px;">
                    <span>Rate: 16.200</span>
                    <span id="usdt-res" style="color:var(--yellow); font-weight:900;">Rp 0</span>
                </div>
                <div class="wallet-addr">0x71dE983697e066eBe53018e698887eDAb6377777</div>
                <a href="https://wa.me/628123456789" class="btn-main" style="display:block; text-decoration:none; text-align:center; padding:10px; background:#25d366; font-size:12px;">HUBUNGI ADMIN</a>
            </div>

            <button class="btn-main" id="btn-submit" onclick="submitDepo()">
                <i class="fas fa-check-circle"></i> KONFIRMASI DEPOSIT
            </button>
        </div>

        <div class="card" style="padding: 15px;">
            <span class="label"><i class="fas fa-history"></i> Riwayat Deposit</span>
            <div class="history-wrap">
                <table class="h-table">
                    <thead>
                        <tr>
                            <th>METODE</th>
                            <th>NOMINAL</th>
                            <th>STATUS</th>
                            <th>WAKTU</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h3 id="m-title" style="color:var(--pink); margin-bottom:15px; font-family:'Cinzel Decorative';">INFO</h3>
            <p id="m-msg" style="font-size:14px; opacity:0.8; margin-bottom:20px;"></p>
            <button class="btn-main" onclick="closeModal()">OKAY</button>
        </div>
    </div>

    <script>
        const supa = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let method = 'QRIS';

        particlesJS("particles-js", {"particles":{"number":{"value":40},"color":{"value":"#ff0077"},"opacity":{"value":0.2},"size":{"value":2},"move":{"speed":1}}});

        function playSnd(){ const a=document.getElementById('snd-click'); a.currentTime=0; a.play(); }

        function setMethod(m){
            playSnd();
            method = m;
            document.getElementById('m-qris').classList.toggle('active', m==='QRIS');
            document.getElementById('m-usdt').classList.toggle('active', m==='USDT');
            document.getElementById('qris-view').style.display = (m==='QRIS' ? 'block' : 'none');
            document.getElementById('qris-presets').style.display = (m==='QRIS' ? 'grid' : 'none');
            document.getElementById('usdt-view').style.display = (m==='USDT' ? 'block' : 'none');
            document.getElementById('inp-amt').value = '';
            updateCalc();
        }

        function setAmt(v){ playSnd(); document.getElementById('inp-amt').value = v; updateCalc(); }

        function updateCalc(){
            const v = parseFloat(document.getElementById('inp-amt').value) || 0;
            if(method === 'USDT') document.getElementById('usdt-res').innerText = "Rp " + (v * 16200).toLocaleString('id-ID');
        }

        async function submitDepo(){
            playSnd();
            const user = localStorage.getItem('p_user');
            const amt = parseFloat(document.getElementById('inp-amt').value);

            if(!user || !amt) return showModal("ERROR", "Data tidak lengkap.");

            const { error } = await supa.from('deposits').insert([{
                username: user,
                amount: amt,
                net_receive: (method==='USDT' ? amt*16200 : amt),
                method: method,
                status: 'PROSES',
                created_at: new Date().toISOString()
            }]);

            if(!error){
                showModal("SUKSES", "Konfirmasi terkirim. Admin akan memproses segera.");
                loadData();
            }
        }

        async function loadData(){
            const user = localStorage.getItem('p_user');
            if(!user) return;

            // Load Saldo
            const { data: prof } = await supa.from('profiles').select('saldo').eq('username', user).single();
            if(prof) document.getElementById('display-saldo').innerText = 'Rp ' + (prof.saldo||0).toLocaleString('id-ID');

            // Load History
            const { data } = await supa.from('deposits').select('*').eq('username', user).order('created_at', {ascending:false}).limit(5);
            const body = document.getElementById('history-body');
            if(data) {
                body.innerHTML = data.map(d => `
                    <tr>
                        <td style="color:var(--pink); font-weight:800;">${d.method}</td>
                        <td style="font-weight:900;">${d.method==='USDT'?'$':''}${d.amount.toLocaleString('id-ID')}</td>
                        <td><span class="badge st-${d.status}">${d.status}</span></td>
                        <td style="font-size:9px; opacity:0.5;">${new Date(d.created_at).toLocaleTimeString()}</td>
                    </tr>
                `).join('');
            }
        }

        function showModal(t,m){ document.getElementById('m-title').innerText=t; document.getElementById('m-msg').innerText=m; document.getElementById('modal-overlay').style.display='flex'; }
        function closeModal(){ playSnd(); document.getElementById('modal-overlay').style.display='none'; }

        window.onload = loadData;
    </script>
</body>
</html>
