<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEPOSIT VIP - NEON PLINKO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon-pink: #ff0077; 
            --neon-blue: #0044ff; 
            --neon-gold: #fbff00; 
            --bg-dark: #070816; 
            --pink-bias: 0 0 10px rgba(255, 0, 119, 0.5);
            --blue-bias: 0 0 10px rgba(0, 68, 255, 0.5);
            --gold-bias: 0 0 10px rgba(251, 255, 0, 0.5);
        }
        
        body, html { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        .container { padding: 20px; max-width: 400px; margin: auto; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 2px solid var(--neon-blue); border-radius: 25px; padding: 25px; box-shadow: var(--blue-bias); backdrop-filter: blur(10px); }
        .neon-title { color: var(--neon-gold); font-size: 22px; font-weight: 900; text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; text-shadow: var(--gold-bias); }
        
        label { font-size: 11px; color: var(--neon-blue); display: block; margin-bottom: 10px; font-weight: 900; text-align: left; text-transform: uppercase; text-shadow: var(--blue-bias); }
        input[type="number"] { width: 100%; padding: 15px; background: #000; border: 2px solid var(--neon-gold); border-radius: 12px; color: #ffffff; font-size: 20px; font-weight: 900; outline: none; text-align: center; box-sizing: border-box; box-shadow: var(--gold-bias); }
        
        .converter-badge { font-size: 10px; color: var(--neon-gold); margin-top: 8px; text-align: center; display: none; font-weight: bold; background: rgba(251, 255, 0, 0.1); padding: 8px; border-radius: 8px; border: 1px solid var(--neon-gold); line-height: 1.4; }

        .method-tabs { display: flex; gap: 10px; margin: 20px 0; }
        .btn-tab { flex: 1; padding: 12px; background: #000; border-radius: 10px; color: white; cursor: pointer; font-size: 11px; font-weight: 900; transition: 0.3s; border: 1px solid #333; }
        .btn-tab.active { background: rgba(255,255,255,0.1); }
        #tab-qris.active { border: 2px solid var(--neon-pink); box-shadow: var(--pink-bias); }
        #tab-crypto.active { border: 2px solid var(--neon-blue); box-shadow: var(--blue-bias); }

        .instruksi-box { background: #000; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; min-height: 240px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid transparent; }
        .box-pink { border-color: var(--neon-pink); box-shadow: var(--pink-bias); }
        .box-blue { border-color: var(--neon-blue); box-shadow: var(--blue-bias); }

        /* USDT Vertikal Layout */
        .crypto-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 12px; }
        .wallet-card { background: rgba(255,255,255,0.02); border: 1.5px solid var(--neon-gold); border-radius: 12px; padding: 12px; width: 100%; box-shadow: var(--gold-bias); }
        .network-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 8px; }
        .net-tag { font-size: 8px; background: #000; color: #fff; padding: 4px; border-radius: 5px; border: 1px solid var(--neon-gold); font-weight: bold; }
        .btn-wa { display: flex; align-items: center; justify-content: center; width: 45px; height: 45px; background: #25d366; color: white; text-decoration: none; border-radius: 50%; font-size: 22px; box-shadow: 0 0 10px rgba(37, 211, 102, 0.4); }

        /* Riwayat Styling */
        .history-section { margin-top: 30px; background: rgba(0,0,0,0.6); border-radius: 15px; padding: 15px; border: 2px solid var(--neon-gold); box-shadow: var(--gold-bias); }
        .history-title { font-size: 12px; color: #ffffff; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; text-align: left; }
        .table-scroll { max-height: 250px; overflow-y: auto; }
        .history-item { background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 10px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        /* WARNA METODE DEEP BLUE */
        .method-blue { color: var(--neon-blue) !important; font-weight: 900; text-shadow: var(--blue-bias); font-size: 10px; text-transform: uppercase; }

        .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, #fff 0%, var(--neon-pink) 25%, #cc0061 100%); border: none; border-radius: 12px; color: white; font-weight: 900; text-transform: uppercase; cursor: pointer; box-shadow: var(--pink-bias); transition: 0.2s; }
        .btn-primary:active { transform: scale(0.97); }
        .btn-back { display: block; margin-top: 25px; padding: 12px; text-decoration: none; background: linear-gradient(135deg, #fff -20%, var(--neon-blue) 40%, #002288 100%); color: white; border-radius: 12px; text-align: center; font-size: 11px; font-weight: 900; box-shadow: var(--blue-bias); }
        
        #neon-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 300px; background: #070816; border: 2px solid var(--neon-pink); border-radius: 20px; padding: 20px; z-index: 10000; text-align: center; box-shadow: var(--pink-bias); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000000; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(0, 68, 255, 0.1); border-top: 3px solid var(--neon-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2577/2577-preview.mp3"></audio>
    <audio id="snd-success" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <div id="loading-overlay"><div class="spinner"></div></div>
    <div class="overlay" id="overlay"></div>
    <div id="neon-popup">
        <div id="popup-msg" style="margin-bottom:15px; font-size:13px; color:white; font-weight:bold;"></div>
        <button onclick="closePopup()" style="background:var(--neon-blue); border:none; padding:10px 25px; border-radius:8px; color:white; font-weight:900; cursor:pointer;">MENGERTI</button>
    </div>

    <div class="container">
        <div class="glass-card">
            <h2 class="neon-title">DEPOSIT</h2>
            <p id="min-deposit-text" style="color:var(--neon-pink);font-size:10px;text-align:center;margin-bottom:15px;font-weight:bold;">⚠️ MINIMAL DEPOSIT: IDR 20,000</p>
            
            <label id="input-label">NOMINAL DEPOSIT (IDR)</label>
            <input type="number" id="input-nominal" placeholder="0" oninput="hitungKurs()">
            
            <div id="crypto-kurs" class="converter-badge">
                <span id="kurs-text">Estimasi Saldo: Rp 0</span>
            </div>

            <div class="method-tabs">
                <button id="tab-qris" onclick="pilihMetode('QRIS')" class="btn-tab active">QRIS RUPIAH</button>
                <button id="tab-crypto" onclick="pilihMetode('CRYPTO')" class="btn-tab">USDT CRYPTO</button>
            </div>

            <div id="main-box" class="instruksi-box box-pink">
                <div id="konten-qris">
                    <h4 style="font-size:11px;margin-bottom:10px;">SCAN QRIS RUPIAH</h4>
                    <div style="padding: 10px; background: white; border-radius: 12px; width: fit-content; margin: 0 auto; box-shadow: var(--pink-bias);">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=ID1024357689073" style="width:130px; display:block;">
                    </div>
                    <p style="font-size:9px;margin-top:10px;font-weight:bold; color:#fff;">ARRASHY STORE / SAXOPONE</p>
                </div>

                <div id="konten-crypto" style="display:none; width:100%;">
                    <div class="crypto-wrapper">
                        <h4 style="color:var(--neon-gold);font-size:11px;text-transform:uppercase; text-shadow: var(--gold-bias);">Konfirmasi Wallet Address</h4>
                        <div class="wallet-card">
                            <p style="font-size:8px; font-weight:bold; color:#fff; margin-bottom:5px;">Jaringan Tersedia:</p>
                            <div class="network-list">
                                <span class="net-tag">TRC-20</span>
                                <span class="net-tag">BEP-20</span>
                                <span class="net-tag">SOLANA</span>
                            </div>
                        </div>
                        <p style="font-size:9px; font-weight:bold; color:#fff;">HUBUNGI ADMIN VIA WHATSAPP:</p>
                        <a href="https://wa.me/6289510249551" target="_blank" class="btn-wa">
                            <i class="fa-brands fa-whatsapp"></i>
                        </a>
                    </div>
                </div>
            </div>

            <button onclick="prosesDeposit()" class="btn-primary">KONFIRMASI TRANSFER</button>

            <div class="history-section">
                <div class="history-title"><i class="fa-solid fa-clock-rotate-left"></i> RIWAYAT DEPOSIT</div>
                <div id="history-list" class="table-scroll">
                    <div id="status-riwayat" style="text-align:center; padding:20px; color:#666; font-size:10px;">MEMUAT DATA...</div>
                </div>
            </div>
            <a href="game.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> KEMBALI KE GAME</a>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYTC11njbEBtAsdpbaRLJRt13j7iEKCkANV1SgxxguV_zFUyZ6Z7FAj0SKuw4d5ThmKw/exec";
        let metodeTerpilih = "QRIS";
        let hargaUSDT = 15800; 

        function playClick() { document.getElementById('snd-click').currentTime = 0; document.getElementById('snd-click').play(); }
        function showPopup(msg) { document.getElementById('snd-pop').play(); document.getElementById('popup-msg').innerText = msg; document.getElementById('neon-popup').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
        function closePopup() { document.getElementById('neon-popup').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }

        function hitungKurs() {
            const nom = parseFloat(document.getElementById('input-nominal').value) || 0;
            const badge = document.getElementById('crypto-kurs');
            if(metodeTerpilih === 'CRYPTO' && nom > 0) {
                const totalIDR = (nom - 2) * hargaUSDT;
                document.getElementById('kurs-text').innerText = `Estimasi Saldo: Rp ${totalIDR.toLocaleString('id-ID')}`;
                badge.style.display = 'block';
            } else { badge.style.display = 'none'; }
        }

        function pilihMetode(tipe) {
            playClick();
            metodeTerpilih = tipe;
            document.getElementById('tab-qris').classList.toggle('active', tipe === 'QRIS');
            document.getElementById('tab-crypto').classList.toggle('active', tipe === 'CRYPTO');
            document.getElementById('konten-qris').style.display = tipe === 'QRIS' ? 'block' : 'none';
            document.getElementById('konten-crypto').style.display = tipe === 'CRYPTO' ? 'block' : 'none';
            document.getElementById('main-box').className = tipe === 'QRIS' ? 'instruksi-box box-pink' : 'instruksi-box box-blue';
            document.getElementById('input-nominal').value = "";
            hitungKurs();
            if(tipe === 'QRIS') {
                document.getElementById('min-deposit-text').innerText = "⚠️ MINIMAL DEPOSIT: IDR 20,000";
                document.getElementById('input-label').innerText = "NOMINAL DEPOSIT (IDR)";
            } else {
                document.getElementById('min-deposit-text').innerText = "⚠️ MINIMAL DEPOSIT: $10 (Net $8)";
                document.getElementById('input-label').innerText = "NOMINAL DEPOSIT (USDT)";
            }
        }

        async function muatRiwayatCloud() {
            const user = localStorage.getItem('user_session');
            const listArea = document.getElementById('history-list');
            
            if(!user) {
                listArea.innerHTML = '<div style="text-align:center; padding:20px; color:#ff0077; font-size:10px;">SESI HABIS, LOGIN ULANG</div>';
                return;
            }

            try {
                // Gunakan cache-buster agar data selalu fresh
                const response = await fetch(`${SCRIPT_URL}?action=getRiwayat&username=${user}&type=deposit&t=${new Date().getTime()}`);
                const res = await response.json();

                if (res.result === "SUCCESS" && res.data) {
                    if (res.data.length === 0) {
                        listArea.innerHTML = '<div style="text-align:center; padding:20px; color:#666; font-size:10px;">BELUM ADA TRANSAKSI</div>';
                    } else {
                        listArea.innerHTML = ''; 
                        res.data.forEach(item => {
                            const status = item.status.toLowerCase();
                            const isDone = status.includes('success') || status.includes('berhasil') || status.includes('approve');
                            const sColor = isDone ? '#00ff88' : 'var(--neon-gold)';
                            const sText = isDone ? 'BERHASIL' : 'PROSES';
                            
                            const card = document.createElement('div');
                            card.className = 'history-item';
                            card.innerHTML = `
                                <div>
                                    <div style="font-size:8px; color:#aaa; margin-bottom:2px;">${item.tanggal}</div>
                                    <div class="method-blue">${item.metode || 'QRIS'}</div>
                                </div>
                                <div style="text-align:right;">
                                    <div style="font-size:13px; font-weight:900; color:#fff;">Rp ${Number(item.jumlah).toLocaleString('id-ID')}</div>
                                    <div style="font-size:9px; font-weight:900; color:${sColor};">● ${sText}</div>
                                </div>`;
                            listArea.appendChild(card);
                        });
                    }
                } else {
                    listArea.innerHTML = '<div style="text-align:center; padding:20px; color:#666; font-size:10px;">BELUM ADA DATA</div>';
                }
            } catch (e) {
                listArea.innerHTML = '<div style="text-align:center; padding:20px; color:#666; font-size:10px;">MENCARI DATA...</div>';
            }
        }

        async function prosesDeposit() {
            playClick();
            const inputVal = parseFloat(document.getElementById('input-nominal').value);
            const user = localStorage.getItem('user_session');
            const full = localStorage.getItem('user_fullname') || "User VIP";

            if (metodeTerpilih === 'QRIS' && (!inputVal || inputVal < 20000)) return showPopup("Minimal Deposit Rp 20.000");
            if (metodeTerpilih === 'CRYPTO' && (!inputVal || inputVal < 10)) return showPopup("Minimal Deposit $10");
            
            document.getElementById('loading-overlay').style.display = 'flex';
            let finalAmount = metodeTerpilih === 'CRYPTO' ? (inputVal - 2) * hargaUSDT : inputVal;

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "deposit",
                        username: user,
                        fullname: full,
                        amount: finalAmount,
                        method: metodeTerpilih
                    })
                });
                const res = await response.json();
                if(res.result === "SUCCESS") {
                    document.getElementById('snd-success').play();
                    showPopup("PERMINTAAN TERKIRIM!");
                    document.getElementById('input-nominal').value = "";
                    muatRiwayatCloud();
                } else {
                    showPopup("GAGAL MENGIRIM");
                }
            } catch (e) { showPopup("KONEKSI ERROR"); }
            document.getElementById('loading-overlay').style.display = 'none';
        }

        window.onload = () => { 
            muatRiwayatCloud(); 
            // Cek data setiap 15 detik
            setInterval(muatRiwayatCloud, 15000); 
        };
    </script>
</body>
</html>
