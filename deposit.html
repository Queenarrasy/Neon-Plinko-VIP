<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>DEPOSIT — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root{--pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--bg:#000005;--gp:0 0 8px rgba(255,0,119,.5),0 0 20px rgba(255,0,119,.2);}
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{
            background:var(--bg) url('33266.jpg') no-repeat center center fixed;
            background-size:cover;
            font-family:'Outfit',sans-serif;
            color:#fff;
            overflow-x:hidden;
            min-height:100vh;
        }
        body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,5,0.85);z-index:-1;}
        #particles-js{position:fixed;width:100%;height:100%;z-index:0;pointer-events:none;}
        
        .container{position:relative;z-index:1;padding:20px;max-width:500px;margin:0 auto;}
        .header{text-align:center;margin-bottom:20px;}
        .header h1{font-family:'Cinzel Decorative',cursive;font-size:26px;text-shadow:var(--gp);letter-spacing:2px;}
        
        .saldo-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,0,119,0.3);border-radius:12px;padding:15px;text-align:center;margin-bottom:20px;backdrop-filter:blur(10px);}
        .saldo-label{font-size:10px;text-transform:uppercase;color:var(--pink);font-weight:800;margin-bottom:5px;display:block;}
        .saldo-val{font-size:22px;font-weight:900;color:#fff;text-shadow:0 0 10px rgba(255,255,255,0.3);}

        .card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:15px;padding:20px;margin-bottom:20px;backdrop-filter:blur(10px);}
        .label{display:block;font-size:11px;font-weight:800;color:var(--pink);margin-bottom:10px;text-transform:uppercase;}

        .method-selector{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px;}
        .method-item{border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:0.3s;background:rgba(255,255,255,0.02);}
        .method-item.active{border-color:var(--pink);background:rgba(255,0,119,0.1);box-shadow:var(--gp);}
        .method-item i{font-size:20px;margin-bottom:5px;display:block;}
        .method-item span{font-size:10px;font-weight:800;}

        .input-group{position:relative;margin-bottom:15px;}
        .input-group input{
            width:100%;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);
            padding:15px;border-radius:10px;color:#fff;font-family:'Outfit';font-size:18px;font-weight:800;text-align:center;
        }
        .input-group input:focus{outline:none;border-color:var(--pink);}

        /* Konversi USDT UI */
        .usdt-calc{background:rgba(0,34,255,0.1);border:1px dashed var(--blue);padding:10px;border-radius:8px;font-size:12px;margin-bottom:15px;display:none;}
        .usdt-calc div{display:flex;justify-content:space-between;margin:2px 0;}

        .qris-area{text-align:center;margin:15px 0;}
        .qris-frame{
            background:#fff;padding:12px;border-radius:12px;display:inline-block;
            max-width:100%;box-shadow:0 0 25px rgba(255,255,255,0.1);
        }
        .qris-frame img{width:100%;max-width:260px;height:auto;display:block;}

        .btn-submit{
            width:100%;background:var(--pink);color:#fff;border:none;padding:16px;
            border-radius:10px;font-family:'Outfit';font-weight:900;font-size:14px;
            cursor:pointer;text-transform:uppercase;box-shadow:var(--gp);transition:0.3s;
        }
        .btn-submit:disabled{background:#444;box-shadow:none;opacity:0.6;}

        .history-card{background:rgba(0,0,0,0.4);border-radius:15px;padding:15px;overflow-x:auto;}
        .history-table{width:100%;border-collapse:collapse;min-width:400px;}
        .history-table th{text-align:left;font-size:10px;color:rgba(255,255,255,0.5);padding:10px;border-bottom:1px solid rgba(255,255,255,0.1);}
        .history-table td{padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:11px;}
        
        .badge-status{padding:4px 8px;border-radius:5px;font-size:9px;font-weight:900;text-transform:uppercase;display:inline-flex;align-items:center;gap:4px;}
        .bc-proses{background:var(--blue);color:#fff;}
        .bc-sukses{background:#00ff88;color:#000;}
        .bc-gagal{background:var(--pink);color:#fff;}

        #modal-overlay{
            position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);
            backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;z-index:1000;
        }
        .modal{background:#0a0a0a;border:1px solid var(--pink);padding:25px;border-radius:20px;width:85%;max-width:350px;text-align:center;}
        .empty-row{text-align:center;padding:30px !important;opacity:0.4;}
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <div class="container">
        <div class="header">
            <h1>TOPUP SALDO</h1>
        </div>

        <div class="saldo-box">
            <span class="saldo-label">Saldo Saat Ini</span>
            <div class="saldo-val" id="display-saldo">IDR 0</div>
        </div>

        <div class="card">
            <span class="label">Pilih Pembayaran</span>
            <div class="method-selector">
                <div class="method-item active" onclick="playSnd();setMethod('QRIS')">
                    <i class="fas fa-qrcode"></i>
                    <span>QRIS BANK/E-WALLET</span>
                </div>
                <div class="method-item" onclick="playSnd();setMethod('USDT')">
                    <i class="fab fa-ethereum"></i>
                    <span>USDT (BEP20/TRC20)</span>
                </div>
            </div>

            <span class="label">Nominal Deposit</span>
            <div class="input-group">
                <input type="number" id="input-amt" placeholder="Min. 10.000" oninput="updateConversion()">
            </div>

            <div id="usdt-info" class="usdt-calc">
                <div><span>Rate USDT:</span><span id="rate-val">Rp 16.200</span></div>
                <div style="color:var(--yellow);font-weight:900;"><span>Terima Rupiah:</span><span id="receive-val">Rp 0</span></div>
            </div>

            <div class="qris-area" id="qris-display">
                <div class="qris-frame">
                    <img src="25989.png" alt="QRIS">
                </div>
                <p style="font-size:9px;margin-top:10px;opacity:0.5;letter-spacing:1px;">SCAN QRIS UNTUK PEMBAYARAN OTOMATIS</p>
            </div>

            <button class="btn-submit" id="btn-depo" onclick="submitDeposit()">
                <i class="fas fa-paper-plane"></i> KONFIRMASI BAYAR
            </button>
        </div>

        <div class="history-card">
            <span class="label" style="margin-bottom:15px;display:block;"><i class="fas fa-history"></i> Riwayat Terakhir</span>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>METODE</th>
                        <th>JUMLAH</th>
                        <th>TERIMA</th>
                        <th>STATUS</th>
                        <th>WAKTU</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    <tr class="empty-row"><td colspan="5">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h3 id="m-title" style="color:var(--pink);margin-bottom:10px;font-family:'Cinzel Decorative';">INFO</h3>
            <p id="m-msg" style="font-size:13px;line-height:1.6;margin-bottom:20px;opacity:0.8;"></p>
            <button class="btn-submit" onclick="closeModal()">TUTUP</button>
        </div>
    </div>

    <script>
        const SUPA_URL = CONFIG.SUPABASE_URL;
        const SUPA_KEY = CONFIG.SUPABASE_ANON_KEY;
        const supabaseClient = supabase.createClient(SUPA_URL, SUPA_KEY);
        
        const RATE_USDT = 16200; // Anda bisa sesuaikan rate ini
        let currentMethod = 'QRIS';
        let isSubmitting = false;

        particlesJS("particles-js",{"particles":{"number":{"value":40},"color":{"value":"#ff0077"},"shape":{"type":"circle"},"opacity":{"value":0.2},"size":{"value":2},"move":{"enable":true,"speed":1}}});

        function playSnd(){const a=document.getElementById('snd-click');a.currentTime=0;a.play();}

        function setMethod(m){
            currentMethod = m;
            document.querySelectorAll('.method-item').forEach(i=>i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            const uInfo = document.getElementById('usdt-info');
            const qArea = document.getElementById('qris-display');
            const inp = document.getElementById('input-amt');

            if(m === 'USDT'){
                uInfo.style.display = 'block';
                qArea.style.display = 'none';
                inp.placeholder = "Jumlah USDT";
            } else {
                uInfo.style.display = 'none';
                qArea.style.display = 'block';
                inp.placeholder = "Min. 10.000";
            }
            updateConversion();
        }

        function updateConversion(){
            const val = parseFloat(document.getElementById('input-amt').value) || 0;
            if(currentMethod === 'USDT'){
                const result = val * RATE_USDT;
                document.getElementById('receive-val').innerText = "Rp " + result.toLocaleString('id-ID');
            }
        }

        async function submitDeposit(){
            playSnd();
            const user = localStorage.getItem('p_user');
            const val = parseFloat(document.getElementById('input-amt').value);

            if(!user) return showModal("ERROR", "Sesi login tidak ditemukan.");
            if(!val || val <= 0) return showModal("INFO", "Masukkan jumlah deposit yang valid.");

            let amountIDR = val;
            if(currentMethod === 'USDT'){
                amountIDR = val * RATE_USDT;
                if(amountIDR < 10000) return showModal("INFO", "Minimal deposit adalah setara Rp 10.000");
            } else {
                if(val < 10000) return showModal("INFO", "Minimal deposit adalah Rp 10.000");
            }

            try {
                isSubmitting = true;
                const btn = document.getElementById('btn-depo');
                btn.disabled = true;
                btn.innerText = "MENGIRIM...";

                // Mengirim data ke tabel 'deposits' dengan status PROSES
                const { error } = await supabaseClient.from('deposits').insert([{
                    username: user,
                    amount: val, // Nominal asli yang diinput
                    net_receive: amountIDR, // Nominal dalam Rupiah
                    method: currentMethod,
                    status: 'PROSES',
                    created_at: new Date().toISOString()
                }]);

                if(error) throw error;

                showModal("SUKSES", "Konfirmasi berhasil! Permintaan Anda sedang diproses oleh Admin. Saldo akan otomatis bertambah setelah disetujui.");
                document.getElementById('input-amt').value = '';
                loadHistory();

            } catch (err) {
                console.error(err);
                showModal("GAGAL", "Gagal menghubungi server. Pastikan koneksi stabil.");
            } finally {
                isSubmitting = false;
                const btn = document.getElementById('btn-depo');
                btn.disabled = false;
                btn.innerText = "KONFIRMASI BAYAR";
            }
        }

        async function loadHistory(){
            const user = localStorage.getItem('p_user');
            if(!user) return;
            const body = document.getElementById('history-body');

            try {
                const { data, error } = await supabaseClient.from('deposits')
                    .select('*').eq('username', user).order('created_at', {ascending:false}).limit(5);

                if(error) throw error;

                if(data && data.length > 0){
                    body.innerHTML = data.map(d => {
                        const st = d.status;
                        const bc = st==='SUKSES'?'bc-sukses':st==='GAGAL'?'bc-gagal':'bc-proses';
                        const ic = st==='SUKSES'?'fa-check-circle':st==='GAGAL'?'fa-times-circle':'fa-clock';
                        const date = new Date(d.created_at).toLocaleDateString('id-ID',{day:'2-digit',month:'short'});
                        const time = new Date(d.created_at).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
                        
                        return `<tr>
                            <td><b>${d.method}</b></td>
                            <td>${d.method==='USDT' ? d.amount+' USDT' : 'Rp '+d.amount.toLocaleString('id-ID')}</td>
                            <td style="color:var(--yellow);font-weight:700;">Rp ${d.net_receive.toLocaleString('id-ID')}</td>
                            <td><span class="badge-status ${bc}"><i class="fas ${ic}"></i> ${st}</span></td>
                            <td style="opacity:0.6;font-size:9px;">${date}<br>${time}</td>
                        </tr>`;
                    }).join('');
                } else {
                    body.innerHTML = '<tr class="empty-row"><td colspan="5">Belum ada riwayat transaksi</td></tr>';
                }

                // Update saldo display dari profiles
                const { data: prof } = await supabaseClient.from('profiles').select('saldo').eq('username', user).single();
                if(prof) document.getElementById('display-saldo').innerText = 'IDR ' + (prof.saldo || 0).toLocaleString('id-ID');

            } catch (err) { console.error("History Error:", err); }
        }

        function showModal(t,m){document.getElementById('m-title').innerText=t;document.getElementById('m-msg').innerText=m;document.getElementById('modal-overlay').style.display='flex';}
        function closeModal(){playSnd();document.getElementById('modal-overlay').style.display='none';}

        window.onload = loadHistory;
    </script>
</body>
</html>
