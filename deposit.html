<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>DEPOSIT — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root{
            --pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--bg:#000005;
            --gp:0 0 8px rgba(255,0,119,.5),0 0 20px rgba(255,0,119,.2);
            --gb:0 0 8px rgba(0,34,255,.5),0 0 20px rgba(0,34,255,.2);
            --gy:0 0 8px rgba(251,255,0,.5),0 0 20px rgba(251,255,0,.2);
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;min-height:100vh;padding-bottom:80px;}
        #particles-js{position:fixed;width:100%;height:100%;z-index:0;pointer-events:none;background:radial-gradient(circle at 60% 30%,#000018 0%,#000 100%);}

        #neon-alert{position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:88%;max-width:340px;background:rgba(0,0,15,.97);border:1.5px solid var(--pink);border-top:2px solid var(--yellow);color:#fff;padding:12px 18px;border-radius:14px;text-align:center;font-weight:900;z-index:9000;font-size:13px;transition:.5s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 0 18px rgba(255,0,119,.35);}
        #neon-alert.show{top:15px;}
        #neon-alert.success{border-color:var(--blue);box-shadow:0 0 18px rgba(0,34,255,.35);}

        .header{height:62px;padding:0 18px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,18,.98);border-bottom:1.5px solid var(--blue);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);box-shadow:0 0 15px rgba(0,34,255,.2);}
        .logo{font-size:14px;font-weight:900;color:var(--pink);text-shadow:0 0 8px rgba(255,0,119,.5);letter-spacing:1px;text-transform:uppercase;}
        .saldo-badge{background:rgba(0,0,0,.7);border:1.5px solid var(--yellow);padding:5px 13px;border-radius:50px;font-size:11px;font-weight:900;color:var(--yellow);text-shadow:0 0 6px rgba(251,255,0,.5);box-shadow:0 0 8px rgba(251,255,0,.2);}

        .container{padding:18px;max-width:500px;margin:auto;position:relative;z-index:10;}

        .method-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
        .method-item{background:rgba(0,0,35,.75);border:1px solid rgba(0,34,255,.3);padding:16px 12px;border-radius:18px;text-align:center;cursor:pointer;transition:.3s;backdrop-filter:blur(5px);}
        .method-item.active{border-color:var(--pink);border-width:1.5px;background:rgba(255,0,119,.1);box-shadow:0 0 12px rgba(255,0,119,.2);transform:scale(1.02);}
        .method-item i{font-size:26px;margin-bottom:7px;display:block;}
        .method-item .m-label{font-size:12px;font-weight:900;letter-spacing:.5px;}

        .form-box{background:rgba(0,0,35,.75);border:1px solid rgba(0,34,255,.3);padding:22px;border-radius:20px;box-shadow:0 0 15px rgba(0,34,255,.12);backdrop-filter:blur(10px);}
        label{font-size:10px;font-weight:900;color:var(--yellow);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;display:block;}

        input[type=number]{width:100%;padding:14px;background:#000;border:1px solid rgba(0,34,255,.4);border-radius:12px;color:#fff;font-size:22px;font-weight:900;outline:none;margin-bottom:18px;text-align:center;transition:.3s;font-family:'Outfit',sans-serif;}
        input:focus{border-color:var(--pink);box-shadow:0 0 10px rgba(255,0,119,.25);}

        .calc-card{background:rgba(0,0,0,.5);padding:13px;border-radius:12px;border-left:2.5px solid var(--yellow);box-shadow:0 0 8px rgba(251,255,0,.08);margin-bottom:18px;}
        .calc-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;font-weight:700;}
        .calc-row span:last-child{color:var(--yellow);font-weight:900;text-shadow:0 0 6px rgba(251,255,0,.4);}
        .net-receive{margin-top:9px;padding-top:9px;border-top:1px dashed rgba(255,255,255,.1);font-size:15px;font-weight:900;}

        #qr-display{text-align:center;margin-bottom:18px;}
        #img-qris{width:155px;border-radius:14px;border:1.5px solid var(--blue);box-shadow:0 0 12px rgba(0,34,255,.2);}

        .btn-main{width:100%;padding:16px;border-radius:50px;border:none;background:linear-gradient(90deg,var(--blue),var(--pink));color:#fff;font-weight:900;font-size:13px;cursor:pointer;box-shadow:0 0 12px rgba(255,0,119,.3);transition:.2s;letter-spacing:1px;text-transform:uppercase;font-family:'Outfit',sans-serif;}
        .btn-main:active{transform:scale(.96);}
        .btn-main:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(1);}

        /* HISTORY TABLE with own scroll */
        .hist-wrap{background:rgba(0,0,35,.7);border:1px solid rgba(0,34,255,.25);border-radius:18px;overflow:hidden;margin-top:18px;}
        .hist-scroll{max-height:220px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--blue) #000;}
        .hist-scroll::-webkit-scrollbar{width:3px;}
        .hist-scroll::-webkit-scrollbar-track{background:#000;}
        .hist-scroll::-webkit-scrollbar-thumb{background:var(--blue);border-radius:2px;}
        table.ht{width:100%;border-collapse:collapse;}
        table.ht th{padding:9px 12px;font-size:8px;font-weight:900;color:var(--pink);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,0,119,.2);background:rgba(0,0,15,.8);text-align:left;position:sticky;top:0;z-index:5;}
        table.ht td{padding:10px 12px;font-size:11px;border-bottom:1px solid rgba(0,34,255,.08);font-weight:700;}
        table.ht tr:last-child td{border-bottom:none;}
        .empty-row td{text-align:center;padding:22px!important;opacity:.35;font-size:12px;}

        #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
        .modal-box{width:88%;max-width:320px;background:rgba(0,0,15,.99);border:1.5px solid var(--pink);border-top:2px solid var(--yellow);border-radius:22px;padding:26px;text-align:center;box-shadow:0 0 20px rgba(255,0,119,.25);animation:zoomIn .3s ease;}
        @keyframes zoomIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
        #modal-title{font-size:16px;font-weight:900;color:var(--pink);text-shadow:0 0 8px rgba(255,0,119,.5);margin-bottom:11px;text-transform:uppercase;letter-spacing:1px;}
        #modal-msg{font-size:13px;color:#ccc;line-height:1.6;}

        .nav-bar{position:fixed;bottom:0;left:0;width:100%;height:72px;background:rgba(0,0,15,.99);display:flex;justify-content:space-around;align-items:center;border-top:1.5px solid var(--blue);backdrop-filter:blur(20px);z-index:1000;padding-bottom:6px;box-shadow:0 -4px 16px rgba(0,34,255,.2);}
        .nav-item{color:rgba(255,255,255,.3);text-decoration:none;text-align:center;font-size:9px;font-weight:900;flex:1;transition:.3s;letter-spacing:.5px;text-transform:uppercase;}
        .nav-item.active{color:var(--pink);text-shadow:0 0 8px rgba(255,0,119,.5);}
        .nav-item i{font-size:20px;display:block;margin-bottom:3px;}
    </style>
</head>
<body>
<div id="particles-js"></div>
<div id="neon-alert">NOTIFICATION</div>
<audio id="snd-click"   src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b417f73c.mp3"></audio>
<audio id="snd-success" src="https://cdn.pixabay.com/audio/2021/08/04/audio_062564a02d.mp3"></audio>
<audio id="snd-error"   src="https://cdn.pixabay.com/audio/2022/03/10/audio_c36394595e.mp3"></audio>

<div class="header">
    <a href="game.html" onclick="playSnd('click')" style="color:rgba(255,255,255,.6);font-size:20px;"><i class="fa-solid fa-chevron-left"></i></a>
    <div class="logo"><i class="fas fa-vault" style="margin-right:7px;"></i>DEPOSIT CENTER</div>
    <div class="saldo-badge" id="display-saldo">IDR 0</div>
</div>

<div class="container">
    <div class="method-grid">
        <div class="method-item active" id="m-qris" onclick="selectMethod('QRIS')">
            <i class="fa-solid fa-qrcode" style="color:var(--yellow);text-shadow:0 0 8px rgba(251,255,0,.5)"></i>
            <div class="m-label" style="color:var(--yellow)">QRIS ALL</div>
            <div style="font-size:9px;opacity:.45;margin-top:3px;">Semua Bank & Wallet</div>
        </div>
        <div class="method-item" id="m-usdt" onclick="selectMethod('USDT')">
            <i class="fa-brands fa-ethereum" style="color:var(--blue);text-shadow:0 0 8px rgba(0,34,255,.5)"></i>
            <div class="m-label" style="color:var(--blue)">USDT TRC20</div>
            <div style="font-size:9px;opacity:.45;margin-top:3px;">Crypto Transfer</div>
        </div>
    </div>

    <div class="form-box">
        <label id="input-label"><i class="fas fa-coins"></i> Nominal Rupiah (Min 20.000)</label>
        <input type="number" id="amount-val" placeholder="0" oninput="calculate()">
        <div class="calc-card">
            <div class="calc-row"><span style="opacity:.6">Kurs Rate:</span><span id="rate-text">1 : 1</span></div>
            <div class="calc-row" id="fee-row" style="display:none;"><span style="opacity:.6">Network Fee:</span><span>-$2.00</span></div>
            <div class="calc-row net-receive">
                <span style="opacity:.7">SALDO DITERIMA:</span>
                <span id="net-text" style="color:var(--yellow)">IDR 0</span>
            </div>
        </div>
        <div id="qr-display">
            <img id="img-qris" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=NEONPLINKO_DEPOSIT" alt="QR">
            <p style="font-size:10px;color:var(--yellow);margin-top:9px;font-weight:900;letter-spacing:1px;text-shadow:0 0 6px rgba(251,255,0,.4)">SCAN & BAYAR SESUAI NOMINAL</p>
        </div>
        <button class="btn-main" id="btn-konfirmasi" onclick="submitDeposit()">
            <i class="fas fa-paper-plane"></i> KONFIRMASI PEMBAYARAN
        </button>
    </div>

    <!-- RIWAYAT dengan tabel scroll sendiri -->
    <div style="margin-top:8px;">
        <label style="margin-top:18px;display:block;"><i class="fas fa-clock-rotate-left"></i> Riwayat Deposit</label>
        <div class="hist-wrap">
            <div class="hist-scroll">
                <table class="ht">
                    <thead><tr><th>Metode</th><th>Nominal</th><th>Diterima</th><th>Status</th><th>Tanggal</th></tr></thead>
                    <tbody id="history-body"><tr class="empty-row"><td colspan="5"><i class="fas fa-spinner fa-spin"></i> Memuat...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-box">
        <h3 id="modal-title">NOTIFIKASI</h3>
        <p id="modal-msg"></p>
        <button class="btn-main" onclick="closeModal()" style="margin-top:18px;">MENGERTI</button>
    </div>
</div>

<div class="nav-bar">
    <a href="game.html"     class="nav-item"><i class="fas fa-gamepad"></i>PLAY</a>
    <a href="deposit.html"  class="nav-item active"><i class="fas fa-wallet"></i>DEPO</a>
    <a href="withdraw.html" class="nav-item"><i class="fas fa-money-bill-transfer"></i>WD</a>
    <a href="reward.html"   class="nav-item"><i class="fas fa-gift"></i>REWARD</a>
    <a href="profil.html"   class="nav-item"><i class="fas fa-user-shield"></i>PROFIL</a>
</div>

<script>
let curMethod='QRIS',KURS=16800,FEE_USDT=2,isSubmitting=false;
particlesJS("particles-js",{"particles":{"number":{"value":70},"color":{"value":"#0022ff"},"shape":{"type":"circle"},"opacity":{"value":0.55,"random":true,"anim":{"enable":true,"speed":0.5,"opacity_min":0.15}},"size":{"value":2.5,"random":true},"line_linked":{"enable":true,"distance":130,"color":"#0022ff","opacity":0.3,"width":0.8},"move":{"enable":true,"speed":1.8,"random":true,"out_mode":"out"}},"interactivity":{"events":{"onhover":{"enable":false},"onclick":{"enable":true,"mode":"push"}},"modes":{"push":{"particles_nb":2}}}});
function playSnd(t){const s=document.getElementById('snd-'+t);if(s){s.currentTime=0;s.play().catch(()=>{});}}
function showNeonAlert(msg,ok=false){const a=document.getElementById('neon-alert');a.innerText=msg;a.className=ok?'show success':'show';setTimeout(()=>a.className='',3000);}
function selectMethod(m){
    if(isSubmitting)return;playSnd('click');curMethod=m;
    document.getElementById('m-qris').classList.toggle('active',m==='QRIS');
    document.getElementById('m-usdt').classList.toggle('active',m==='USDT');
    document.getElementById('input-label').innerHTML=m==='QRIS'?'<i class="fas fa-coins"></i> Nominal Rupiah (Min 20.000)':'<i class="fas fa-ethereum"></i> Jumlah USDT (Min $10)';
    document.getElementById('fee-row').style.display=(m==='USDT')?'flex':'none';
    document.getElementById('qr-display').style.display=(m==='QRIS')?'block':'none';
    calculate();
}
function calculate(){
    const input=parseFloat(document.getElementById('amount-val').value)||0;
    let net=0;
    if(curMethod==='QRIS'){document.getElementById('rate-text').innerText="1 : 1";net=input;}
    else{document.getElementById('rate-text').innerText="IDR "+KURS.toLocaleString();net=input>FEE_USDT?(input-FEE_USDT)*KURS:0;}
    document.getElementById('net-text').innerText="IDR "+Math.floor(net).toLocaleString('id-ID');
    return Math.floor(net);
}
async function submitDeposit(){
    if(isSubmitting)return;
    const amount=parseFloat(document.getElementById('amount-val').value)||0;
    const net=calculate();
    const user=typeof getUsername==='function'?getUsername():localStorage.getItem('neon_user');
    if(!user)return showModal("ERROR","Sesi login hilang. Harap login kembali.");
    if(curMethod==='QRIS'&&amount<20000){playSnd('error');return showModal("GAGAL","Minimal deposit QRIS adalah IDR 20.000");}
    if(curMethod==='USDT'&&amount<10){playSnd('error');return showModal("GAGAL","Minimal deposit USDT adalah $10.00");}
    isSubmitting=true;const btn=document.getElementById('btn-konfirmasi');
    btn.innerText="MEMPROSES...";btn.disabled=true;
    try{
        const db=supabase.createClient("https://jcxgankdwfwfnbwlkkpz.supabase.co","sb_publishable_CaQyWYa_F3LDYEo8BDWAlQ_d0SscfCL");
        const{error}=await db.from('deposits').insert([{username:user,amount:amount,method:curMethod,net_receive:net,status:'PROSES'}]);
        if(error)throw error;
        playSnd('success');showNeonAlert("DEPOSIT TERKIRIM — MENUNGGU KONFIRMASI ADMIN",true);
        showModal("BERHASIL","Permintaan deposit terkirim! Silakan tunggu konfirmasi admin.");
        document.getElementById('amount-val').value="";loadHistory();
    }catch(err){playSnd('error');showModal("ERROR","Gagal: "+err.message);isSubmitting=false;btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> KONFIRMASI PEMBAYARAN';}
}
async function loadHistory(){
    const user=typeof getUsername==='function'?getUsername():localStorage.getItem('neon_user');
    if(!user)return;
    const db=supabase.createClient("https://jcxgankdwfwfnbwlkkpz.supabase.co","sb_publishable_CaQyWYa_F3LDYEo8BDWAlQ_d0SscfCL");
    const{data}=await db.from('deposits').select('*').eq('username',user).order('created_at',{ascending:false}).limit(20);
    const body=document.getElementById('history-body');
    if(data&&data.length>0){
        body.innerHTML=data.map(d=>{
            const c=d.status==='SUKSES'?'#00ff88':(d.status==='PROSES'?'var(--yellow)':'var(--pink)');
            return `<tr>
                <td style="font-size:10px;font-weight:800;color:rgba(255,255,255,.5);">${d.method||'QRIS'}</td>
                <td style="font-weight:900;">Rp ${(d.amount||0).toLocaleString()}</td>
                <td style="color:var(--yellow);font-weight:900;">Rp ${(d.net_receive||d.amount||0).toLocaleString()}</td>
                <td style="font-weight:900;color:${c};">${d.status}</td>
                <td style="font-size:9px;opacity:.45;">${new Date(d.created_at).toLocaleDateString('id-ID')}</td>
            </tr>`;
        }).join('');
    } else {
        body.innerHTML='<tr class="empty-row"><td colspan="5">Belum ada transaksi</td></tr>';
    }
    // Load saldo
    const{data:prof}=await db.from('profiles').select('saldo').eq('username',user).single();
    if(prof)document.getElementById('display-saldo').innerText='IDR '+(prof.saldo||0).toLocaleString('id-ID');
}
function showModal(t,m){document.getElementById('modal-title').innerText=t;document.getElementById('modal-msg').innerText=m;document.getElementById('modal-overlay').style.display='flex';}
function closeModal(){playSnd('click');document.getElementById('modal-overlay').style.display='none';const btn=document.getElementById('btn-konfirmasi');isSubmitting=false;btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> KONFIRMASI PEMBAYARAN';}
window.onload=()=>{loadHistory();if(typeof syncNeonData==="function")syncNeonData();};
</script>
</body>
</html>
