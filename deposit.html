<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEPOSIT - NEON PLINKO VIP</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--pink:#ff0077;
--blue:#003cff;
--yellow:#fbff00;
--bg:#02030a;

--neon-pink:0 0 15px rgba(255,0,119,0.9);
--neon-blue:0 0 20px rgba(0,60,255,0.9);
--neon-yellow:0 0 20px rgba(251,255,0,0.9);
}

body{
margin:0;
background:linear-gradient(180deg,#01020a,#060824);
font-family:'Poppins',sans-serif;
color:white;
}

/* HEADER */
.header{
padding:20px;
background:black;
border-bottom:2px solid var(--blue);
display:flex;
justify-content:space-between;
align-items:center;
}

.btn-back{
color:white;
font-size:20px;
text-decoration:none;
}

.title{
font-family:'Cinzel',serif;
font-weight:800;
letter-spacing:2px;
color:var(--yellow);
text-shadow:var(--neon-yellow);
}

.container{padding:20px;}

/* METHOD BUTTONS */
.method-switch{
display:flex;
gap:10px;
margin-bottom:20px;
}

.switch-btn{
flex:1;
padding:12px;
border-radius:50px;
border:2px solid var(--pink);
background:transparent;
color:white;
font-weight:700;
cursor:pointer;
}

.switch-btn.active{
background:linear-gradient(90deg,var(--pink),var(--blue));
box-shadow:var(--neon-pink);
border-color:var(--yellow);
}

/* CARD */
.card{
border:2px solid var(--blue);
border-radius:15px;
padding:20px;
margin-bottom:20px;
box-shadow:var(--neon-blue);
background:rgba(0,60,255,0.05);
}

.label{
font-size:12px;
color:var(--pink);
font-weight:700;
margin-bottom:6px;
display:block;
}

input{
width:100%;
padding:12px;
background:#000;
border:1px solid var(--yellow);
border-radius:8px;
color:white;
margin-bottom:15px;
}

.btn-submit{
width:100%;
padding:15px;
border-radius:50px;
background:linear-gradient(90deg,var(--pink),var(--blue));
color:white;
font-weight:900;
border:2px solid var(--yellow);
cursor:pointer;
box-shadow:var(--neon-pink);
}

/* WHATSAPP */
.btn-wa{
width:100%;
padding:15px;
border-radius:50px;
background:linear-gradient(90deg,#00ff88,#00cc66);
color:black;
font-weight:900;
border:none;
cursor:pointer;
box-shadow:0 0 20px #00ff88;
}

/* HISTORY SAME AS WITHDRAW */
.history-title{
font-weight:900;
color:var(--yellow);
margin-bottom:10px;
display:flex;
gap:10px;
align-items:center;
}

.history-wrapper{
border:2px solid var(--yellow);
border-radius:15px;
padding:15px;
box-shadow:var(--neon-yellow);
max-height:260px;
overflow-y:auto;
background:rgba(251,255,0,0.05);
}

.history-item{
border:1px solid var(--blue);
border-radius:10px;
padding:12px;
margin-bottom:10px;
background:rgba(0,0,0,0.5);
position:relative;
}

.hist-top{
display:flex;
justify-content:space-between;
font-weight:bold;
}

.hist-time{
font-size:10px;
color:#aaa;
}

.status-proses{color:var(--yellow);}
.status-sukses{color:#00ff00;}
.status-gagal{color:#ff4444;}
</style>
</head>
<body>

<div class="header">
<a href="game.html" class="btn-back"><i class="fa-solid fa-circle-chevron-left"></i></a>
<div class="title">DEPOSIT SALDO</div>
<div></div>
</div>

<div class="container">

<div class="method-switch">
<button class="switch-btn active" onclick="switchMethod('qris')">QRIS</button>
<button class="switch-btn" onclick="switchMethod('usdt')">USDT</button>
</div>

<!-- QRIS SECTION -->
<div id="qris-section" class="card">
<span class="label">NOMINAL DEPOSIT (MIN 20.000)</span>
<input type="number" id="qrisAmount" placeholder="Masukkan nominal">

<button class="btn-submit" onclick="submitQRIS()">AJUKAN DEPOSIT QRIS</button>
</div>

<!-- USDT SECTION -->
<div id="usdt-section" class="card" style="display:none;">
<span class="label">JUMLAH USDT (MIN $10)</span>
<input type="number" id="usdtAmount" placeholder="Masukkan jumlah USDT">

<button class="btn-wa" onclick="waAdmin()">
<i class="fa-brands fa-whatsapp"></i> HUBUNGI ADMIN WHATSAPP
</button>
</div>

<div class="history-title">
<i class="fa-solid fa-clock-rotate-left"></i> RIWAYAT DEPOSIT
</div>

<div class="history-wrapper" id="historyBox">
<div style="text-align:center;color:#555;padding:20px;">Belum ada riwayat transaksi</div>
</div>

</div>

<script>
function switchMethod(type){
document.querySelectorAll(".switch-btn").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

if(type==="qris"){
document.getElementById("qris-section").style.display="block";
document.getElementById("usdt-section").style.display="none";
}else{
document.getElementById("qris-section").style.display="none";
document.getElementById("usdt-section").style.display="block";
}
}

function submitQRIS(){
let val=document.getElementById("qrisAmount").value;
if(val<20000){
alert("Minimal deposit 20.000");
return;
}
addHistory("QRIS",val,"PROSES");
alert("Deposit QRIS diproses admin");
}

function waAdmin(){
window.open("https://wa.me/6289510249551","_blank");
}

function addHistory(method,amount,status){
let box=document.getElementById("historyBox");
let time=new Date().toLocaleString("id-ID");

let item=`
<div class="history-item">
<div class="hist-top">
<span>IDR ${Number(amount).toLocaleString("id-ID")}</span>
<span class="status-${status.toLowerCase()}">${status}</span>
</div>
<div class="hist-time">${method} • ${time}</div>
</div>
`;

if(box.innerHTML.includes("Belum ada")){
box.innerHTML="";
}

box.innerHTML=item+box.innerHTML;
}
</script>

</body>
</html>
