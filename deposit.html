<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>DEPOSIT — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root{--pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--bg:#000005;--gp:0 0 20px #ff0077,0 0 50px rgba(255,0,119,.55);--gb:0 0 20px #0022ff,0 0 50px rgba(0,34,255,.55);--gy:0 0 20px #fbff00,0 0 50px rgba(251,255,0,.55);}
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;min-height:100vh;padding-bottom:80px;}
        #particles-js{position:fixed;width:100%;height:100%;z-index:0;background:radial-gradient(circle at 60% 30%,#000018 0%,#000 100%);}

        #neon-alert{position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:88%;max-width:340px;background:rgba(0,0,15,.97);border:2px solid var(--pink);border-top:3px solid var(--yellow);color:#fff;padding:14px 20px;border-radius:14px;text-align:center;font-weight:900;z-index:9000;font-family:'Outfit',sans-serif;font-size:13px;transition:.55s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 0 35px var(--pink),0 0 70px rgba(255,0,119,.3);}
        #neon-alert.show{top:15px;}
        #neon-alert.success{border-color:var(--blue);box-shadow:0 0 35px var(--blue),0 0 70px rgba(0,34,255,.3);}

        .header{height:65px;padding:0 20px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,20,.97);border-bottom:2px solid var(--blue);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);box-shadow:var(--gb);}
        .logo{font-size:15px;font-weight:900;color:var(--pink);text-shadow:var(--gp);letter-spacing:1px;text-transform:uppercase;}
        .saldo-badge{background:rgba(0,0,0,.8);border:1px solid var(--yellow);padding:6px 14px;border-radius:50px;font-size:11px;font-weight:900;color:var(--yellow);text-shadow:var(--gy);box-shadow:var(--gy);}

        .container{padding:20px;max-width:500px;margin:auto;position:relative;z-index:10;}

        .method-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
        .method-item{background:rgba(0,0,40,.8);border:1px solid rgba(0,34,255,.35);padding:18px 15px;border-radius:20px;text-align:center;cursor:pointer;transition:.3s;backdrop-filter:blur(5px);}
        .method-item.active{border-color:var(--pink);border-width:2px;background:rgba(255,0,119,.15);box-shadow:var(--gp);transform:scale(1.02);}
        .method-item i{font-size:28px;margin-bottom:8px;display:block;}
        .method-item .m-label{font-size:12px;font-weight:900;letter-spacing:.5px;}

        .form-box{background:rgba(0,0,40,.8);border:1px solid rgba(0,34,255,.35);padding:25px;border-radius:22px;box-shadow:var(--gb);backdrop-filter:blur(10px);}
        label{font-size:10px;font-weight:900;color:var(--yellow);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:block;}

        input[type=number]{width:100%;padding:16px;background:#000;border:1px solid rgba(0,34,255,.5);border-radius:14px;color:#fff;font-size:22px;font-weight:900;outline:none;margin-bottom:20px;text-align:center;transition:.3s;font-family:'Outfit',sans-serif;}
        input:focus{border-color:var(--pink);box-shadow:var(--gp);}

        .calc-card{background:rgba(0,0,0,.55);padding:15px;border-radius:14px;border-left:3px solid var(--yellow);box-shadow:0 0 15px rgba(251,255,0,.15);margin-bottom:20px;}
        .calc-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;font-weight:700;}
        .calc-row span:last-child{color:var(--yellow);font-weight:900;text-shadow:var(--gy);}
        .net-receive{margin-top:10px;padding-top:10px;border-top:1px dashed rgba(255,255,255,.1);font-size:16px;font-weight:900;}

        .btn-main{width:100%;padding:17px;border-radius:50px;border:none;background:linear-gradient(90deg,var(--blue),var(--pink));color:#fff;font-weight:900;font-size:14px;cursor:pointer;box-shadow:var(--gp);transition:.2s;letter-spacing:1px;text-transform:uppercase;font-family:'Outfit',sans-serif;}
        .btn-main:active{transform:scale(.96);}
        .btn-main:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(1);}

        .history-item{background:rgba(0,0,40,.7);padding:15px;border-radius:14px;margin-bottom:12px;border-left:4px solid var(--blue);display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(5px);}

        #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
        .modal-box{width:88%;max-width:320px;background:rgba(0,0,15,.99);border:2px solid var(--pink);border-top:3px solid var(--yellow);border-radius:22px;padding:28px;text-align:center;box-shadow:var(--gp);animation:zoomIn .3s ease;}
        @keyframes zoomIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
        #modal-title{font-size:17px;font-weight:900;color:var(--pink);text-shadow:var(--gp);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;}
        #modal-msg{font-size:13px;color:#ccc;line-height:1.6;margin-bottom:5px;}

        .nav-bar{position:fixed;bottom:0;left:0;width:100%;height:72px;background:rgba(0,0,15,.99);display:flex;justify-content:space-around;align-items:center;border-top:2px solid var(--blue);backdrop-filter:blur(20px);z-index:1000;padding-bottom:6px;box-shadow:0 -5px 20px rgba(0,34,255,.3);}
        .nav-item{color:rgba(255,255,255,.3);text-decoration:none;text-align:center;font-size:9px;font-weight:900;flex:1;transition:.3s;letter-spacing:.5px;text-transform:uppercase;}
        .nav-item.active{color:var(--pink);text-shadow:var(--gp);}
        .nav-item i{font-size:20px;display:block;margin-bottom:3px;}
    </style>
</head>
<body>
<div id="particles-js"></div>
<div id="neon-alert">NOTIFICATION</div>
<audio id="snd-click" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b417f73c.mp3"></audio>
<audio id="snd-success" src="https://cdn.pixabay.com/audio/2021/08/04/audio_062564a02d.mp3"></audio>
<audio id="snd-error" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c36394595e.mp3"></audio>

<div class="header">
    <a href="game.html" onclick="playSnd('click')" style="color:rgba(255,255,255,.7);font-size:20px;"><i class="fa-solid fa-chevron-left"></i></a>
    <div class="logo"><i class="fas fa-vault" style="margin-right:8px;text-shadow:var(--gp)"></i>DEPOSIT CENTER</div>
    <div class="saldo-badge" id="display-saldo">IDR 0</div>
</div>

<div class="container">
    <div class="method-grid">
        <div class="method-item active" id="m-qris" onclick="selectMethod('QRIS')">
            <i class="fa-solid fa-qrcode" style="color:var(--yellow);text-shadow:var(--gy)"></i>
            <div class="m-label" style="color:var(--yellow)">QRIS ALL</div>
            <div style="font-size:9px;opacity:.5;margin-top:3px;">Semua Bank & Wallet</div>
        </div>
        <div class="method-item" id="m-usdt" onclick="selectMethod('USDT')">
            <i class="fa-brands fa-ethereum" style="color:var(--blue);text-shadow:var(--gb)"></i>
            <div class="m-label" style="color:var(--blue)">USDT TRC20</div>
            <div style="font-size:9px;opacity:.5;margin-top:3px;">Crypto Transfer</div>
        </div>
    </div>

    <div class="form-box">
        <label id="input-label"><i class="fas fa-coins"></i> Nominal Rupiah (Min 20.000)</label>
        <input type="number" id="amount-val" placeholder="0" oninput="calculate()">
        <div class="calc-card">
            <div class="calc-row"><span style="opacity:.6">Kurs Rate:</span><span id="rate-text">1 : 1</span></div>
            <div class="calc-row" id="fee-row" style="display:none;"><span style="opacity:.6">Network Fee:</span><span>-$2.00</span></div>
            <div class="calc-row net-receive">
                <span style="opacity:.7">SALDO DITERIMA:</span>
                <span id="net-text" style="color:var(--yellow)">IDR 0</span>
            </div>
        </div>
        <div id="qr-display" style="text-align:center;margin-bottom:20px;">
            <img id="img-qris" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=OMEGA_V18_DEPOSIT" style="width:170px;border-radius:15px;border:2px solid var(--blue);box-shadow:var(--gb);">
            <p style="font-size:10px;color:var(--yellow);margin-top:10px;font-weight:900;letter-spacing:1px;text-shadow:var(--gy)">SCAN & BAYAR SESUAI NOMINAL</p>
        </div>
        <button class="btn-main" id="btn-konfirmasi" onclick="submitDeposit()">
            <i class="fas fa-paper-plane"></i> KONFIRMASI PEMBAYARAN
        </button>
    </div>

    <div style="margin-top:28px;">
        <label><i class="fas fa-clock-rotate-left"></i> Riwayat Deposit</label>
        <div id="history-list"></div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-box">
        <h3 id="modal-title">NOTIFIKASI</h3>
        <p id="modal-msg"></p>
        <button class="btn-main" onclick="closeModal()" style="margin-top:20px;">MENGERTI</button>
    </div>
</div>

<div class="nav-bar">
    <a href="game.html" class="nav-item"><i class="fas fa-gamepad"></i>PLAY</a>
    <a href="deposit.html" class="nav-item active"><i class="fas fa-wallet"></i>DEPO</a>
    <a href="withdraw.html" class="nav-item"><i class="fas fa-money-bill-transfer"></i>WD</a>
    <a href="reward.html" class="nav-item"><i class="fas fa-gift"></i>REWARD</a>
    <a href="profil.html" class="nav-item"><i class="fas fa-user-shield"></i>PROFIL</a>
</div>

<script>
let curMethod='QRIS',KURS=16800,FEE_USDT=2,isSubmitting=false;
particlesJS("particles-js",{"particles":{"number":{"value":100},"color":{"value":"#0022ff"},"shape":{"type":"circle"},"opacity":{"value":0.75,"random":true,"anim":{"enable":true,"speed":0.8,"opacity_min":0.3}},"size":{"value":3.5,"random":true},"line_linked":{"enable":true,"distance":140,"color":"#ff0077","opacity":0.55,"width":1.2},"move":{"enable":true,"speed":2.5,"random":true,"out_mode":"out"}},"interactivity":{"events":{"onhover":{"enable":true,"mode":"repulse"},"onclick":{"enable":true,"mode":"push"}},"modes":{"repulse":{"distance":80},"push":{"particles_nb":4}}}});
function playSnd(t){const s=document.getElementById('snd-'+t);if(s){s.currentTime=0;s.play().catch(()=>{});}}
function showNeonAlert(msg,ok=false){const a=document.getElementById('neon-alert');a.innerText=msg;a.className=ok?'show success':'show';setTimeout(()=>a.className='',3000);}
function selectMethod(m){if(isSubmitting)return;playSnd('click');curMethod=m;document.getElementById('m-qris').classList.toggle('active',m==='QRIS');document.getElementById('m-usdt').classList.toggle('active',m==='USDT');document.getElementById('input-label').innerHTML=m==='QRIS'?'<i class="fas fa-coins"></i> Nominal Rupiah (Min 20.000)':'<i class="fas fa-ethereum"></i> Jumlah USDT (Min $10)';document.getElementById('fee-row').style.display=(m==='USDT')?'flex':'none';document.getElementById('qr-display').style.display=(m==='QRIS')?'block':'none';calculate();}
function calculate(){const input=parseFloat(document.getElementById('amount-val').value)||0;let net=0;if(curMethod==='QRIS'){document.getElementById('rate-text').innerText="1 : 1";net=input;}else{document.getElementById('rate-text').innerText="IDR "+KURS.toLocaleString();net=input>FEE_USDT?(input-FEE_USDT)*KURS:0;}document.getElementById('net-text').innerText="IDR "+Math.floor(net).toLocaleString('id-ID');return Math.floor(net);}
async function submitDeposit(){
    if(isSubmitting)return;
    const amount=parseFloat(document.getElementById('amount-val').value)||0;
    const net=calculate();
    const user=typeof getUsername==='function'?getUsername():localStorage.getItem('neon_user');
    if(!user)return showModal("ERROR","Sesi login hilang. Harap login kembali.");
    if(curMethod==='QRIS'&&amount<20000){playSnd('error');return showModal("GAGAL","Minimal deposit QRIS adalah IDR 20.000");}
    if(curMethod==='USDT'&&amount<10){playSnd('error');return showModal("GAGAL","Minimal deposit USDT adalah $10.00");}
    isSubmitting=true;const btn=document.getElementById('btn-konfirmasi');
    btn.innerText="MEMPROSES...";btn.disabled=true;
    try{
        const db=supabase.createClient("https://bgffnmwrviyqpeevzjsn.supabase.co","sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani");
        const{error}=await db.from('deposits').insert([{username:user,amount:amount,method:curMethod,net_receive:net,status:'PROSES'}]);
        if(error)throw error;
        playSnd('success');showNeonAlert("DEPOSIT TERKIRIM — MENUNGGU KONFIRMASI ADMIN",true);
        showModal("BERHASIL","Permintaan deposit terkirim! Silakan tunggu konfirmasi admin.");
        document.getElementById('amount-val').value="";loadHistory();
    }catch(err){playSnd('error');showModal("ERROR","Gagal: "+err.message);isSubmitting=false;btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> KONFIRMASI PEMBAYARAN';}
}
async function loadHistory(){
    const user=typeof getUsername==='function'?getUsername():localStorage.getItem('neon_user');
    if(!user)return;
    const db=supabase.createClient("https://bgffnmwrviyqpeevzjsn.supabase.co","sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani");
    const{data}=await db.from('deposits').select('*').eq('username',user).order('created_at',{ascending:false}).limit(5);
    let html="";
    if(data&&data.length>0){data.forEach(d=>{const c=d.status==='SUKSES'?'#00ff88':(d.status==='PROSES'?'var(--yellow)':'var(--pink)');html+=`<div class="history-item" style="border-left-color:${c}"><div><div style="font-size:10px;font-weight:800;color:rgba(255,255,255,.4);margin-bottom:3px;">${d.method||'QRIS'}</div><div style="font-size:16px;font-weight:900;">Rp ${(d.amount||0).toLocaleString()}</div></div><div style="text-align:right;"><div style="font-size:11px;font-weight:900;color:${c};margin-bottom:3px;">${d.status}</div><div style="font-size:9px;opacity:.4;">${new Date(d.created_at).toLocaleDateString('id-ID')}</div></div></div>`;});}
    else html="<p style='text-align:center;opacity:.3;font-size:12px;padding:20px;'>Belum ada transaksi</p>";
    document.getElementById('history-list').innerHTML=html;
}
function showModal(t,m){document.getElementById('modal-title').innerText=t;document.getElementById('modal-msg').innerText=m;document.getElementById('modal-overlay').style.display='flex';}
function closeModal(){playSnd('click');document.getElementById('modal-overlay').style.display='none';const btn=document.getElementById('btn-konfirmasi');isSubmitting=false;btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> KONFIRMASI PEMBAYARAN';}
window.onload=()=>{loadHistory();if(typeof syncNeonData==="function")syncNeonData();};
</script>
</body>
</html>
