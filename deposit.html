<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEPOSIT VIP - NEON PLINKO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon-pink: #ff0077; --neon-blue: #0044ff; --neon-gold: #fbff00; --bg-dark: #070816; 
            --pink-bias: 0 0 8px rgba(255, 0, 119, 0.4); --blue-bias: 0 0 8px rgba(0, 68, 255, 0.4); --gold-bias: 0 0 8px rgba(251, 255, 0, 0.4);
        }
        body, html { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        .container { padding: 20px; max-width: 400px; margin: auto; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 2px solid var(--neon-blue); border-radius: 25px; padding: 25px; box-shadow: var(--blue-bias); backdrop-filter: blur(10px); }
        .neon-title { color: var(--neon-gold); font-size: 22px; font-weight: 900; text-align: center; text-transform: uppercase; margin-bottom: 20px; text-shadow: var(--gold-bias); }
        label { font-size: 11px; color: var(--neon-blue); display: block; margin-bottom: 10px; font-weight: 900; }
        input[type="number"] { width: 100%; padding: 15px; background: #000; border: 2px solid var(--neon-gold); border-radius: 12px; color: #ffffff; font-size: 20px; font-weight: 900; text-align: center; box-sizing: border-box; }
        .converter-badge { font-size: 10px; color: var(--neon-gold); margin-top: 8px; text-align: center; display: none; background: rgba(251, 255, 0, 0.1); padding: 8px; border-radius: 8px; border: 1px solid var(--neon-gold); }
        .method-tabs { display: flex; gap: 10px; margin: 20px 0; }
        .btn-tab { flex: 1; padding: 12px; background: #000; border-radius: 10px; color: white; cursor: pointer; font-size: 11px; font-weight: 900; border: 1px solid #333; }
        .btn-tab.active { background: rgba(255,255,255,0.1); border-color: var(--neon-pink); box-shadow: var(--pink-bias); }
        .instruksi-box { background: #000; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid #333; }
        .history-section { margin-top: 30px; background: rgba(0,0,0,0.6); border-radius: 15px; padding: 15px; border: 2px solid var(--neon-gold); }
        .history-item { background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 10px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--neon-pink), #cc0061); border: none; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>
    <div id="loading-overlay"><p style="color:var(--neon-blue);">MENGIRIM PERMINTAAN...</p></div>
    <div class="container">
        <div class="glass-card">
            <h2 class="neon-title">DEPOSIT</h2>
            <p id="min-deposit-text" style="color:var(--neon-pink);font-size:10px;text-align:center;font-weight:bold;">⚠️ MINIMAL DEPOSIT: IDR 20,000</p>
            <input type="number" id="input-nominal" placeholder="0" oninput="hitungKurs()">
            <div id="crypto-kurs" class="converter-badge"><span id="kurs-text">Estimasi Saldo: Rp 0</span></div>
            <div class="method-tabs">
                <button id="tab-qris" onclick="pilihMetode('QRIS')" class="btn-tab active">QRIS</button>
                <button id="tab-crypto" onclick="pilihMetode('CRYPTO')" class="btn-tab">USDT</button>
            </div>
            <div id="main-box" class="instruksi-box">
                <div id="konten-qris">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=ID1024357689073" style="width:140px;">
                    <p style="font-size:10px;margin-top:10px;">ARRASHY STORE / SAXOPONE</p>
                </div>
                <div id="konten-crypto" style="display:none;">
                    <p style="font-size:11px;">KONFIRMASI WALLET VIA ADMIN</p>
                    <a href="https://wa.me/6289510249551" style="color:#25d366;font-size:30px;"><i class="fa-brands fa-whatsapp"></i></a>
                </div>
            </div>
            <button onclick="prosesDeposit()" class="btn-primary">KONFIRMASI TRANSFER</button>
            <div class="history-section">
                <div style="font-size:11px;font-weight:900;margin-bottom:10px;">RIWAYAT DEPOSIT</div>
                <div id="history-list"></div>
            </div>
            <a href="game.html" style="display:block;text-align:center;color:white;margin-top:20px;text-decoration:none;font-size:12px;">KEMBALI</a>
        </div>
    </div>

    <script src="global.js"></script>
    <script>
        let metodeTerpilih = "QRIS";
        function hitungKurs() {
            const nom = parseFloat(document.getElementById('input-nominal').value) || 0;
            const badge = document.getElementById('crypto-kurs');
            if(metodeTerpilih === 'CRYPTO' && nom > 0) {
                badge.style.display = 'block';
                document.getElementById('kurs-text').innerText = `Estimasi: Rp ${(nom * 15800).toLocaleString()}`;
            } else badge.style.display = 'none';
        }
        function pilihMetode(tipe) {
            metodeTerpilih = tipe;
            document.getElementById('tab-qris').classList.toggle('active', tipe === 'QRIS');
            document.getElementById('tab-crypto').classList.toggle('active', tipe === 'CRYPTO');
            document.getElementById('konten-qris').style.display = tipe === 'QRIS' ? 'block' : 'none';
            document.getElementById('konten-crypto').style.display = tipe === 'CRYPTO' ? 'block' : 'none';
            hitungKurs();
        }
        async function prosesDeposit() {
            const nom = document.getElementById('input-nominal').value;
            if(!nom) return alert("Isi Nominal!");
            document.getElementById('loading-overlay').style.display = 'flex';
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'deposit', username: user, amount: nom, method: metodeTerpilih })
                });
                const data = await res.json();
                alert(data.result === "SUCCESS" ? "Berhasil diajukan!" : "Gagal!");
                muatRiwayatCloud();
            } catch(e) { alert("Error"); }
            document.getElementById('loading-overlay').style.display = 'none';
        }
        async function muatRiwayatCloud() {
            const container = document.getElementById('history-list');
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "getDepoHistory", username: user })
                });
                const res = await response.json();
                if (res.result === "SUCCESS" && res.history) {
                    container.innerHTML = res.history.map(item => `
                        <div class="history-item">
                            <div><div style="font-size:10px;color:var(--neon-blue);">${item.metode}</div><div style="font-size:9px;">${item.tgl}</div></div>
                            <div style="text-align:right;"><div style="font-size:12px;color:var(--neon-pink);">Rp ${Number(item.nominal).toLocaleString()}</div><div style="font-size:9px;">${item.status}</div></div>
                        </div>`).join('');
                }
            } catch (e) { container.innerHTML = "Gagal memuat"; }
        }
        muatRiwayatCloud();
    </script>
</body>
</html>
