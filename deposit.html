<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit History</title>
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: 'Arial', sans-serif;
        }
        .neon {
            text-shadow: 0 0 5px #35f, 0 0 10px #35f, 0 0 20px #35f;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <h1 class="neon">Deposit History</h1>
    <div id="deposit-history">
        <p>Loading deposit history...</p>
        <div id="error-message" class="error" style="display: none;"></div>
    </div>

    <script>
        async function loadDepositHistory() {
            try {
                const response = await fetch('/api/deposit-history');
                if (!response.ok) {
                    throw new Error('Failed to load deposit history');
                }
                const data = await response.json();
                // Render deposit history
                // Assuming data is an array of deposits
                const historyDiv = document.getElementById('deposit-history');
                historyDiv.innerHTML = data.map(deposit => `<p>${deposit.date}: $${deposit.amount}</p>`).join('');
            } catch (error) {
                const errorMessageDiv = document.getElementById('error-message');
                errorMessageDiv.innerText = error.message;
                errorMessageDiv.style.display = 'block';
            }
        }

        window.onload = loadDepositHistory;
    </script>
</body>
</html>
