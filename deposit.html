<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>DEPOSIT - NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global.js"></script>
    <style>
        :root{
          --pink:#ff0077;--blue:#00d4ff;--yellow:#fbff00;--bg:#02030d;
          --card:rgba(255,255,255,.03);
          --gp:0 0 15px rgba(255,0,119,.3);
          --gb:0 0 15px rgba(0,212,255,.3);
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{
          background:var(--bg); color:#fff; font-family:'Outfit',sans-serif; min-height:100vh;
          background-image: radial-gradient(circle at top right, rgba(0,212,255,0.05), transparent);
          display: flex; flex-direction: column;
        }
        
        /* Header */
        .header {
            height: 65px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--blue); position: sticky; top: 0; z-index: 100;
        }
        .btn-back { color: #fff; text-decoration: none; font-size: 20px; width: 40px; }
        .header-title { font-family: 'Cinzel Decorative'; font-size: 14px; letter-spacing: 2px; color: var(--pink); text-shadow: var(--gp); }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; flex: 1; }
        
        .section-label { font-size: 10px; font-weight: 800; letter-spacing: 2px; margin-bottom: 12px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 8px; }

        /* Method Selector */
        .method-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .method-card {
            background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px;
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .method-card.active { border-color: var(--pink); background: rgba(255,0,119,0.1); box-shadow: var(--gp); }
        .method-card i { font-size: 24px; margin-bottom: 8px; display: block; }
        .method-card span { font-size: 12px; font-weight: 700; }

        /* Form Deposit */
        .deposit-box { background: var(--card); border-radius: 20px; border: 1px solid rgba(0,212,255,0.2); padding: 20px; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { font-size: 11px; display: block; margin-bottom: 8px; opacity: 0.7; }
        input {
            width: 100%; padding: 15px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #fff; font-size: 16px; font-weight: 700; outline: none;
        }
        input:focus { border-color: var(--blue); }

        .quick-amounts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .amt-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px; 
            border-radius: 8px; font-size: 12px; font-weight: 700; color: var(--blue); cursor: pointer; text-align: center;
        }

        .qris-area { text-align: center; margin: 20px 0; display: none; }
        .qris-area img { width: 200px; border-radius: 10px; border: 3px solid #fff; margin-bottom: 10px; }

        .btn-confirm {
            width: 100%; padding: 16px; border-radius: 50px; border: none;
            background: linear-gradient(90deg, var(--pink), #b30054);
            color: #fff; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: var(--gp);
        }
        .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

        /* History */
        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-item {
            background: rgba(255,255,255,0.02); border-radius: 12px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--blue);
        }
        .hist-info div:first-child { font-weight: 800; font-size: 14px; }
        .hist-info div:last-child { font-size: 10px; opacity: 0.5; margin-top: 4px; }
        .status-badge { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 20px; background: rgba(251,255,0,0.1); color: var(--yellow); }
        .status-sukses { background: rgba(0,255,0,0.1); color: #00ff00; }

        /* Modal Custom */
        #modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(5px); }
        .modal-box { background:#0a0b1e; border:2px solid var(--pink); border-radius:25px; padding:30px; width:85%; max-width:320px; text-align:center; box-shadow: var(--gp); }
    </style>
</head>
<body>

<div class="header">
    <a href="game.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="header-title">TOP UP BALANCE</div>
    <div style="width:40px"></div>
</div>

<div class="container">
    <div class="section-label"><i class="fa-solid fa-wallet"></i> PILIH METODE PEMBAYARAN</div>
    <div class="method-grid">
        <div class="method-card active" onclick="setMethod('QRIS', this)">
            <i class="fa-solid fa-qrcode" style="color:var(--pink)"></i>
            <span>QRIS PAY</span>
        </div>
        <div class="method-card" onclick="setMethod('USDT', this)">
            <i class="fa-brands fa-ethereum" style="color:var(--blue)"></i>
            <span>USDT TRC20</span>
        </div>
    </div>

    <div class="deposit-box">
        <div class="input-group">
            <label id="label-amount">NOMINAL DEPOSIT (MIN 20.000)</label>
            <input type="number" id="in-amount" placeholder="0">
            <div class="quick-amounts" id="quick-idr">
                <div class="amt-btn" onclick="fillAmt(20000)">20K</div>
                <div class="amt-btn" onclick="fillAmt(50000)">50K</div>
                <div class="amt-btn" onclick="fillAmt(100000)">100K</div>
            </div>
        </div>

        <div class="qris-area" id="qris-display">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=MAYA_PAYMENT" alt="QRIS">
            <div style="font-size:11px; font-weight:700; color:var(--yellow)">SCAN & TRANSFER SESUAI NOMINAL</div>
        </div>

        <button class="btn-confirm" id="btn-submit" onclick="submitDeposit()">KONFIRMASI PEMBAYARAN</button>
    </div>

    <div class="section-label"><i class="fa-solid fa-clock-rotate-left"></i> RIWAYAT TERAKHIR</div>
    <div class="history-list" id="history-container">
        <div style="text-align:center; opacity:0.3; font-size:12px; padding:20px;">Belum ada riwayat deposit</div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-box">
        <h3 id="m-title" style="color:var(--pink); font-family:'Cinzel Decorative'; margin-bottom:10px;">NOTIFIKASI</h3>
        <p id="m-msg" style="font-size:13px; color:#ccc; margin-bottom:20px;"></p>
        <button onclick="closeModal()" class="btn-confirm" style="padding:10px;">OK</button>
    </div>
</div>

<script>
    let currentMethod = 'QRIS';

    async function init() {
        const user = localStorage.getItem('user_neon');
        if(!user) window.location.href = 'index.html';
        
        // Cek koneksi Supabase di global.js
        if(typeof _supabase === 'undefined') {
            console.error("Supabase client belum terinisialisasi. Cek global.js Master!");
        }

        loadHistory();
        setMethod('QRIS', document.querySelector('.method-card'));
    }

    function setMethod(m, el) {
        currentMethod = m;
        document.querySelectorAll('.method-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        
        const qris = document.getElementById('qris-display');
        const quick = document.getElementById('quick-idr');
        const label = document.getElementById('label-amount');
        
        if(m === 'QRIS') {
            qris.style.display = 'block';
            quick.style.display = 'grid';
            label.innerText = "NOMINAL DEPOSIT (MIN 20.000)";
        } else {
            qris.style.display = 'none';
            quick.style.display = 'none';
            label.innerText = "NOMINAL USDT (MIN 10 USDT)";
        }
    }

    function fillAmt(v) { document.getElementById('in-amount').value = v; }

    async function submitDeposit() {
        const user = localStorage.getItem('user_neon');
        const amt = document.getElementById('in-amount').value;
        const btn = document.getElementById('btn-submit');

        // Validasi
        if(!amt || amt <= 0) return showModal("Masukkan nominal yang valid!");
        if(currentMethod === 'QRIS' && amt < 20000) return showModal("Minimal deposit QRIS Rp 20.000");
        if(currentMethod === 'USDT' && amt < 10) return showModal("Minimal deposit 10 USDT");

        btn.disabled = true;
        btn.innerText = "MENGIRIM...";

        try {
            // KIRIM KE SUPABASE
            const { data, error } = await _supabase
                .from('deposits')
                .insert([
                    { 
                        username: user, 
                        method: currentMethod, 
                        amount: parseFloat(amt), 
                        status: 'PROSES' 
                    }
                ]);

            if (error) throw error;

            showModal("Permintaan Terkirim! Saldo akan bertambah otomatis setelah dikonfirmasi admin.");
            document.getElementById('in-amount').value = "";
            loadHistory();

        } catch (err) {
            console.error(err);
            showModal("Gagal: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "KONFIRMASI PEMBAYARAN";
        }
    }

    async function loadHistory() {
        const user = localStorage.getItem('user_neon');
        const container = document.getElementById('history-container');

        const { data, error } = await _supabase
            .from('deposits')
            .select('*')
            .eq('username', user)
            .order('created_at', { ascending: false })
            .limit(5);

        if(data && data.length > 0) {
            container.innerHTML = data.map(item => `
                <div class="history-item">
                    <div class="hist-info">
                        <div>${item.method === 'QRIS' ? 'IDR' : 'USDT'} ${parseFloat(item.amount).toLocaleString()}</div>
                        <div>${new Date(item.created_at).toLocaleString('id-ID')}</div>
                    </div>
                    <div class="status-badge ${item.status === 'SUKSES' ? 'status-sukses' : ''}">
                        ${item.status}
                    </div>
                </div>
            `).join('');
        }
    }

    function showModal(msg) {
        document.getElementById('m-msg').innerText = msg;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }

    init();
</script>

</body>
</html>
