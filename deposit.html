<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>DEPOSIT — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --pink: #ff0077;
            --blue: #0022ff;
            --yellow: #fbff00;
            --bg: #000005;
            --gp: 0 0 8px rgba(255,0,119,.5), 0 0 20px rgba(255,0,119,.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg) url('33266.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Overlay gelap agar teks terbaca */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 5, 0.85);
            z-index: -1;
        }

        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        .container { position: relative; z-index: 1; padding: 20px; max-width: 500px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-family: 'Cinzel Decorative', cursive; font-size: 28px; text-shadow: var(--gp); letter-spacing: 2px; }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 119, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .label { display: block; font-size: 12px; font-weight: 700; color: var(--pink); margin-bottom: 8px; text-transform: uppercase; }

        .method-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .method-item {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.02);
        }
        .method-item.active { border-color: var(--pink); background: rgba(255, 0, 119, 0.1); box-shadow: var(--gp); }
        .method-item i { font-size: 20px; margin-bottom: 5px; display: block; }
        .method-item span { font-size: 11px; font-weight: 700; }

        .input-group { position: relative; margin-bottom: 15px; }
        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px;
            border-radius: 8px;
            color: #fff;
            font-family: 'Outfit';
            font-size: 16px;
            font-weight: 700;
        }
        .input-group input:focus { outline: none; border-color: var(--pink); }

        .usdt-info {
            background: rgba(0, 34, 255, 0.1);
            border: 1px dashed var(--blue);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none; /* Muncul hanya jika USDT dipilih */
        }

        /* Tampilan QRIS - DIPASTIKAN TERLIHAT FULL */
        .qris-section { text-align: center; margin: 15px 0; }
        .qris-container {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            max-width: 100%;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        .qris-container img {
            width: 100%;
            max-width: 280px; /* Ukuran pas untuk hp */
            height: auto;
            display: block;
        }

        .btn-confirm {
            width: 100%;
            background: var(--pink);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Outfit';
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: var(--gp);
            transition: 0.3s;
        }
        .btn-confirm:disabled { background: #333; box-shadow: none; opacity: 0.5; }

        /* Table History */
        .history-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        .history-table th { text-align: left; padding: 10px; color: rgba(255,255,255,0.5); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .history-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .badge-status { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; }
        .bg-proses { background: var(--blue); }
        .bg-sukses { background: #00ff88; color: #000; }
        .bg-gagal { background: var(--pink); }

        #modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display:none; align-items:center; justify-content:center; z-index:1000;
        }
        .modal { background: #111; border: 1px solid var(--pink); padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="container">
        <div class="header">
            <h1>TOPUP SALDO</h1>
            <p style="font-size: 11px; opacity: 0.6;">Sistem Otomatis & Aman</p>
        </div>

        <div class="card">
            <span class="label">Pilih Metode</span>
            <div class="method-selector">
                <div class="method-item active" onclick="setMethod('QRIS')">
                    <i class="fas fa-qrcode"></i>
                    <span>QRIS SEMUA BANK</span>
                </div>
                <div class="method-item" onclick="setMethod('USDT')">
                    <i class="fab fa-ethereum"></i>
                    <span>USDT (CRYPTO)</span>
                </div>
            </div>

            <span class="label">Jumlah Deposit</span>
            <div class="input-group">
                <input type="number" id="depo-amount" placeholder="Min. 10.000" oninput="calculateReceive()">
            </div>

            <div id="usdt-area" class="usdt-info">
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span>Kurs USDT:</span>
                    <span id="usdt-rate">Rp 16.200</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-weight: 900; color: var(--yellow);">
                    <span>Estimasi Terima:</span>
                    <span id="idr-receive">Rp 0</span>
                </div>
            </div>

            <div class="qris-section" id="qris-box">
                <div class="qris-container">
                    <img src="25989.png" alt="QRIS PAY" id="qris-img">
                </div>
                <p style="font-size: 10px; margin-top: 10px; opacity: 0.5;">Silakan Scan QRIS Diatas</p>
            </div>

            <button class="btn-confirm" id="btn-submit" onclick="submitDeposit()">
                <i class="fas fa-paper-plane"></i> KONFIRMASI BAYAR
            </button>
        </div>

        <div class="card">
            <span class="label"><i class="fas fa-history"></i> Riwayat Deposit</span>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>METODE</th>
                        <th>JUMLAH</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h3 id="m-title" style="color:var(--pink); margin-bottom:10px;">INFO</h3>
            <p id="m-msg" style="font-size:14px; line-height:1.5; margin-bottom:20px;"></p>
            <button class="btn-confirm" onclick="closeModal()">MENGERTI</button>
        </div>
    </div>

    <script>
        // CONFIGURASI
        const USDT_RATE = 16200; // Ubah kurs di sini
        let currentMethod = 'QRIS';
        let isSubmitting = false;

        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 40 },
                "color": { "value": "#ff0077" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.3 },
                "size": { "value": 2 },
                "move": { "enable": true, "speed": 1 }
            }
        });

        function setMethod(m) {
            currentMethod = m;
            document.querySelectorAll('.method-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            const usdtArea = document.getElementById('usdt-area');
            const qrisBox = document.getElementById('qris-box');
            const input = document.getElementById('depo-amount');

            if(m === 'USDT') {
                usdtArea.style.display = 'block';
                qrisBox.style.display = 'none';
                input.placeholder = "Masukkan Jumlah USDT (Contoh: 10)";
            } else {
                usdtArea.style.display = 'none';
                qrisBox.style.display = 'block';
                input.placeholder = "Min. 10.000";
            }
            calculateReceive();
        }

        function calculateReceive() {
            const amt = parseFloat(document.getElementById('depo-amount').value) || 0;
            const display = document.getElementById('idr-receive');
            
            if(currentMethod === 'USDT') {
                const total = amt * USDT_RATE;
                display.innerText = "Rp " + total.toLocaleString('id-ID');
            }
        }

        // FUNGSI UTAMA: KIRIM DATA KE SUPABASE
        async function submitDeposit() {
            const amountInput = document.getElementById('depo-amount').value;
            const user = localStorage.getItem('p_user'); // Ambil username yang login

            if(!user) return showModal("ERROR", "Sesi berakhir, silakan login kembali.");
            if(!amountInput || amountInput <= 0) return showModal("INFO", "Masukkan jumlah deposit yang valid.");

            let finalAmountIDR = parseFloat(amountInput);
            if(currentMethod === 'USDT') {
                finalAmountIDR = finalAmountIDR * USDT_RATE;
                if(finalAmountIDR < 10000) return showModal("INFO", "Minimal deposit Rp 10.000");
            } else {
                if(finalAmountIDR < 10000) return showModal("INFO", "Minimal deposit Rp 10.000");
            }

            try {
                isSubmitting = true;
                document.getElementById('btn-submit').disabled = true;
                document.getElementById('btn-submit').innerText = "MEMPROSES...";

                // Insert ke tabel deposits (Sesuaikan nama tabel Anda di supabase)
                const { error } = await supabase.from('deposits').insert([{
                    username: user,
                    amount: finalAmountIDR,
                    method: currentMethod,
                    status: 'PROSES',
                    created_at: new Date().toISOString()
                }]);

                if(error) throw error;

                showModal("SUKSES", "Permintaan deposit berhasil dikirim! Saldo akan masuk otomatis setelah admin melakukan verifikasi pembayaran Anda.");
                document.getElementById('depo-amount').value = '';
                loadHistory();

            } catch (err) {
                console.error(err);
                showModal("GAGAL", "Gagal mengirim data. Coba lagi nanti.");
            } finally {
                isSubmitting = false;
                document.getElementById('btn-submit').disabled = false;
                document.getElementById('btn-submit').innerText = "KONFIRMASI BAYAR";
            }
        }

        async function loadHistory() {
            const user = localStorage.getItem('p_user');
            if(!user) return;

            try {
                const { data, error } = await supabase
                    .from('deposits')
                    .select('*')
                    .eq('username', user)
                    .order('created_at', { ascending: false })
                    .limit(5);

                if(error) throw error;

                const body = document.getElementById('history-body');
                if(data && data.length > 0) {
                    body.innerHTML = data.map(d => {
                        const stClass = d.status === 'SUKSES' ? 'bg-sukses' : d.status === 'GAGAL' ? 'bg-gagal' : 'bg-proses';
                        return `
                            <tr>
                                <td style="font-weight:700;">${d.method}</td>
                                <td style="color:var(--yellow); font-weight:700;">Rp ${parseInt(d.amount).toLocaleString('id-ID')}</td>
                                <td><span class="badge-status ${stClass}">${d.status}</span></td>
                            </tr>
                        `;
                    }).join('');
                } else {
                    body.innerHTML = '<tr><td colspan="3" style="text-align:center; opacity:0.5; padding:20px;">Belum ada riwayat</td></tr>';
                }
            } catch (err) {
                console.error(err);
            }
        }

        function showModal(t, m) {
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-msg').innerText = m;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        window.onload = loadHistory;
    </script>
</body>
</html>
