<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DEPOSIT - NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--bg:#02030d;
  --card:rgba(255,255,255,.025);
  --gp:0 0 8px rgba(255,0,119,.5),0 0 22px rgba(255,0,119,.15);
  --gb:0 0 8px rgba(0,85,255,.5),0 0 22px rgba(0,85,255,.15);
  --gy:0 0 8px rgba(245,230,66,.5),0 0 22px rgba(245,230,66,.13);
  --bp:rgba(255,0,119,.32);--bb:rgba(0,85,255,.32);--by:rgba(245,230,66,.32);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 70% 50% at 10% 5%,rgba(0,55,255,.06) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 90% 95%,rgba(255,0,119,.05) 0%,transparent 70%);
  color:#dde0f0;font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;
}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px);}

/* HEADER */
.header{position:sticky;top:0;z-index:200;padding:13px 18px;background:rgba(2,3,13,.93);
  border-bottom:1px solid var(--bb);backdrop-filter:blur(18px);
  display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 20px rgba(0,85,255,.1);}
.btn-back{color:rgba(255,255,255,.6);font-size:15px;text-decoration:none;
  width:32px;height:32px;border:1px solid var(--bb);border-radius:50%;
  display:flex;align-items:center;justify-content:center;transition:.3s;}
.btn-back:hover{color:#fff;border-color:var(--blue);box-shadow:var(--gb);}
.header-title{font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;letter-spacing:2px;
  background:linear-gradient(90deg,var(--pink),#dd66ff 40%,var(--yellow));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:9998;}
#neon-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(160deg,#07091d,#0b0d24);border-radius:22px;z-index:9999;
  padding:28px 24px;text-align:center;min-width:280px;max-width:320px;width:88%;
  animation:mpop .32s cubic-bezier(.34,1.56,.64,1) both;}
#neon-modal.m-success{border:1px solid var(--by);box-shadow:var(--gy);}
#neon-modal.m-error{border:1px solid var(--bp);box-shadow:var(--gp);}
#neon-modal.m-info{border:1px solid var(--bb);box-shadow:var(--gb);}
@keyframes mpop{from{opacity:0;transform:translate(-50%,-50%) scale(.7)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.modal-ico-ring{width:52px;height:52px;border-radius:50%;margin:0 auto 12px;
  display:flex;align-items:center;justify-content:center;font-size:26px;}
.m-success #modal-title{color:var(--yellow);}
.m-error #modal-title{color:#ff4499;}
.m-info #modal-title{color:#7799ff;}
#modal-msg{font-size:12px;color:rgba(220,220,240,.65);line-height:1.7;white-space:pre-line;}
.modal-btn{margin-top:16px;padding:9px 26px;border-radius:50px;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;background:transparent;transition:.25s;}
.m-success .modal-btn{border:1px solid var(--by);color:var(--yellow);}
.m-error .modal-btn{border:1px solid var(--bp);color:#ff4499;}
.m-info .modal-btn{border:1px solid var(--bb);color:#7799ff;}

/* CONTAINER & LAYOUT */
.container{padding:16px;max-width:520px;margin:auto;position:relative;z-index:1;display:flex;flex-direction:column;gap:14px;}
.sec-lbl{display:flex;align-items:center;gap:8px;font-size:9px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;opacity:.45;margin-top:4px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,currentColor,transparent);opacity:.4;}

/* METHOD CARD */
.method-card{background:var(--card);border:1px solid var(--bb);border-radius:20px;
  padding:16px;box-shadow:var(--gb);animation:fadeUp .4s ease both;}
.method-item{display:flex;align-items:center;gap:13px;padding:13px 14px;
  border-radius:14px;cursor:pointer;margin-bottom:10px;transition:.3s;
  border:1px solid rgba(255,0,119,.2);background:rgba(255,0,119,.04);}
.method-item:last-child{margin-bottom:0;}
.method-item.active{background:rgba(255,0,119,.15);border-color:var(--pink);box-shadow:var(--gp);}
.method-item.usdt-m{border-color:rgba(245,230,66,.2);background:rgba(245,230,66,.03);}
.method-item.usdt-m.active{background:rgba(245,230,66,.12);border-color:var(--yellow);box-shadow:var(--gy);}
.method-ico{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;border:1px solid rgba(255,255,255,.1);}
.method-title{font-size:13px;font-weight:700;color:rgba(255,255,255,.9);}
.method-desc{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;}

/* FORM SECTION */
.form-section{background:var(--card);border-radius:20px;padding:18px;animation:fadeUp .4s ease both .05s;}
.form-section.qris-s{border:1px solid var(--bp);box-shadow:var(--gp);}
.form-section.usdt-s{border:1px solid var(--by);box-shadow:var(--gy);}
.sec-title{font-family:'Cinzel Decorative',serif;font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:14px;}
.qris-s .sec-title{color:var(--pink);}
.usdt-s .sec-title{color:var(--yellow);}

.flbl{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(255,255,255,.4);display:block;margin-bottom:6px;margin-top:14px;}
input[type=number]{width:100%;padding:13px 15px;background:rgba(0,0,0,.4);
  border:1px solid rgba(0,85,255,.22);border-radius:12px;color:#fff;
  font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:.3s;}
input[type=number]:focus{border-color:var(--bp);box-shadow:var(--gp);}

/* AMOUNT GRID */
.amount-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0 14px;}
.amount-item{padding:11px 4px;border-radius:11px;text-align:center;font-size:11px;font-weight:700;
  cursor:pointer;transition:.2s;letter-spacing:.5px;}
.qris-s .amount-item{border:1px solid var(--bp);color:var(--pink);background:rgba(255,0,119,.04);}
.qris-s .amount-item:hover{background:rgba(255,0,119,.16);box-shadow:var(--gp);transform:scale(1.04);}

/* QRIS BOX */
.qris-display{text-align:center;margin:16px 0;}
.qris-display img{width:200px;height:200px;object-fit:cover;border-radius:16px;
  border:2px solid var(--bp);box-shadow:var(--gp);}
.qris-name{margin-top:10px;font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;color:var(--pink);}

/* BUTTONS */
.btn-main{width:100%;padding:14px;border-radius:50px;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;border:none;transition:.3s;margin-top:6px;}
.btn-submit-qris{background:linear-gradient(90deg,rgba(255,0,119,.75),rgba(180,0,220,.55));
  color:#fff;border:1px solid var(--bp);box-shadow:var(--gp);}
.btn-submit-usdt{background:linear-gradient(90deg,rgba(245,230,66,.65),rgba(200,170,0,.5));
  color:#000;border:1px solid var(--by);box-shadow:var(--gy);}

/* HISTORY */
.history-card{background:var(--card);border:1px solid var(--by);border-radius:20px;
  padding:18px;box-shadow:var(--gy);animation:fadeUp .45s ease both .1s;}
#depo-history{display:flex;flex-direction:column;gap:10px;}
.history-item{border-radius:14px;padding:14px;background:linear-gradient(135deg,#08001a 0%,#120030 55%,#07001a 100%);
  border:1px solid rgba(255,0,119,.3);position:relative;}
.history-item.latest{animation:blinkPink 1.4s ease-in-out infinite;}
@keyframes blinkPink{ 0%,100%{border-color:rgba(255,0,119,.3);} 50%{border-color:var(--pink);box-shadow:0 0 24px rgba(255,0,119,.7);} }
.hist-amount{font-size:20px;font-weight:800;color:var(--yellow);}
.status-badge{font-size:8.5px;font-weight:800;padding:4px 10px;border-radius:50px;}
.status-proses{background:rgba(245,230,66,.12);color:var(--yellow);border:1px solid var(--by);}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="modal-overlay" onclick="closeModal()"></div>
<div id="neon-modal">
  <div class="modal-ico-ring"><span id="modal-icon">✨</span></div>
  <div id="modal-title">INFO</div>
  <div id="modal-msg"></div>
  <button class="modal-btn" onclick="closeModal()">Oke</button>
</div>

<div class="header">
  <a href="game.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
  <div class="header-title">Sistem Deposit</div>
  <div style="width:32px;"></div>
</div>

<div class="container">
  <div class="sec-lbl" style="color:var(--pink)"><i class="fa-solid fa-credit-card"></i> Metode Pembayaran</div>
  <div class="method-card">
    <div class="method-item active" id="method-qris" onclick="selectMethod('QRIS')">
      <div class="method-ico"><i class="fa-solid fa-qrcode" style="color:var(--pink);"></i></div>
      <div>
        <div class="method-title">QRIS ALL PAYMENT</div>
        <div class="method-desc">Min. IDR 20.000</div>
      </div>
    </div>
    <div class="method-item usdt-m" id="method-usdt" onclick="selectMethod('USDT')">
      <div class="method-ico"><i class="fa-brands fa-ethereum" style="color:var(--yellow);"></i></div>
      <div>
        <div class="method-title">USDT (TRC20)</div>
        <div class="method-desc">Min. $10 · Fee $2</div>
      </div>
    </div>
  </div>

  <div class="form-section qris-s" id="qrisSection">
    <div class="sec-title">Deposit via QRIS</div>
    <label class="flbl">Nominal (IDR)</label>
    <input type="number" id="depo-amount" placeholder="Min. 20.000">
    <div class="amount-grid">
      <div class="amount-item" onclick="setAmount(20000)">20K</div>
      <div class="amount-item" onclick="setAmount(50000)">50K</div>
      <div class="amount-item" onclick="setAmount(100000)">100K</div>
    </div>
    <div class="qris-display">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=CONTOH_QRIS" alt="QRIS">
      <div class="qris-name">NEON PLINKO VIP</div>
    </div>
    <button class="btn-main btn-submit-qris" onclick="submitDeposit()">Konfirmasi QRIS</button>
  </div>

  <div class="form-section usdt-s" id="usdtSection" style="display:none;">
    <div class="sec-title">Deposit via USDT</div>
    <label class="flbl">Nominal (USDT)</label>
    <input type="number" id="usdt-amount" placeholder="Min. 10">
    <div style="margin:10px 0; font-size:11px; color:var(--yellow);" id="rate-display">Estimasi: $0 + Fee $2 = Rp 0</div>
    <button class="btn-main btn-submit-usdt" onclick="submitDeposit()">Konfirmasi USDT</button>
  </div>

  <div class="history-card">
    <div class="sec-title">Riwayat Terakhir</div>
    <div id="depo-history"></div>
  </div>
</div>

<script>
const KURS_USDT = 15500;
const FEE_USDT = 2;
let currentMethod = 'QRIS';

function selectMethod(m) {
  currentMethod = m;
  document.getElementById('method-qris').classList.toggle('active', m === 'QRIS');
  document.getElementById('method-usdt').classList.toggle('active', m === 'USDT');
  document.getElementById('qrisSection').style.display = m === 'QRIS' ? 'block' : 'none';
  document.getElementById('usdtSection').style.display = m === 'USDT' ? 'block' : 'none';
}

function setAmount(v) { document.getElementById('depo-amount').value = v; }

function showModal(title, msg, type) {
  const m = document.getElementById('neon-modal');
  m.className = 'm-' + type;
  document.getElementById('modal-title').innerText = title;
  document.getElementById('modal-msg').innerText = msg;
  document.getElementById('modal-overlay').style.display = 'block';
  m.style.display = 'block';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.getElementById('neon-modal').style.display = 'none';
}

function submitDeposit() {
  const amt = currentMethod === 'QRIS' ? document.getElementById('depo-amount').value : document.getElementById('usdt-amount').value;
  if(!amt || amt <= 0) return showModal('ERROR', 'Masukkan nominal!', 'error');

  const history = JSON.parse(localStorage.getItem('depo_history') || '[]');
  history.unshift({ method: currentMethod, nominal: amt, status: 'PROSES', tanggal: new Date().toLocaleString() });
  localStorage.setItem('depo_history', JSON.stringify(history.slice(0, 5)));
  
  showModal('SUKSES', 'Deposit diproses!', 'success');
  loadDepoHistory();
}

function loadDepoHistory() {
  const h = JSON.parse(localStorage.getItem('depo_history') || '[]');
  document.getElementById('depo-history').innerHTML = h.map((i, idx) => `
    <div class="history-item ${idx === 0 ? 'latest' : ''}">
      <div style="display:flex; justify-content:space-between;">
        <span>${i.method}</span>
        <span class="status-badge status-proses">${i.status}</span>
      </div>
      <div class="hist-amount">${i.method === 'QRIS' ? 'Rp ' + parseInt(i.nominal).toLocaleString() : '$' + i.nominal}</div>
      <div style="font-size:10px; opacity:0.4;">${i.tanggal}</div>
    </div>
  `).join('') || '<div style="text-align:center; opacity:0.3;">Belum ada riwayat</div>';
}

document.getElementById('usdt-amount').oninput = function() {
  const v = parseFloat(this.value) || 0;
  document.getElementById('rate-display').innerText = `Estimasi: $${v} + Fee $2 = Rp ${((v + FEE_USDT) * KURS_USDT).toLocaleString()}`;
};

window.onload = loadDepoHistory;
</script>
</body>
</html>
