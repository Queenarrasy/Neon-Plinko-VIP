<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>DEPOSIT — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --pink: #ff0077;
            --blue: #0022ff;
            --yellow: #fbff00;
            --bg: #000005;
            --neon-p: 0 0 10px rgba(255, 0, 119, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg) url('33266.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            min-height: 100vh;
            position: relative;
        }

        /* Overlay Gelap */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 5, 0.9); z-index: 1;
        }

        .container { position: relative; z-index: 10; padding: 20px; max-width: 450px; margin: 0 auto; }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back {
            background: rgba(255,255,255,0.05); border: 1px solid var(--pink);
            color: #fff; padding: 10px 15px; border-radius: 12px; text-decoration: none;
            font-size: 11px; font-weight: 800; box-shadow: var(--neon-p);
        }

        .card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 20px; backdrop-filter: blur(15px); margin-bottom: 20px;
        }

        .label-neon { font-size: 11px; color: var(--pink); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; }

        /* QRIS FRAME - Perbaikan Utama */
        .qris-wrapper { 
            background: #fff; 
            padding: 15px; 
            border-radius: 15px; 
            display: block; 
            margin: 20px auto;
            width: 230px; /* Ukuran tetap agar tidak hilang */
            height: 230px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            position: relative;
            overflow: visible; /* Pastikan tidak terpotong */
        }

        .qris-wrapper img {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated; /* Agar QR Code Tajam */
            object-fit: contain;
        }

        .input-depo {
            width: 100%; background: #000; border: 1px solid var(--pink);
            padding: 15px; border-radius: 12px; color: #fff; font-size: 22px;
            font-weight: 900; text-align: center; margin-bottom: 20px;
            box-shadow: var(--neon-p);
        }

        .btn-main {
            width: 100%; background: var(--pink); color: #fff; border: none;
            padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; box-shadow: var(--neon-p);
        }

        /* USDT Style */
        .usdt-box { 
            display: none; border: 1px dashed var(--blue); padding: 15px; 
            border-radius: 12px; background: rgba(0,34,255,0.05); margin-bottom: 20px; 
        }

        .method-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px; cursor: pointer; text-align: center;
        }
        .method-btn.active { border-color: var(--pink); background: rgba(255,0,119,0.1); box-shadow: var(--neon-p); }

        .tbl-history { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        .tbl-history th { color: var(--pink); text-align: left; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tbl-history td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <a href="game.html" class="btn-back"><i class="fas fa-arrow-left"></i> KEMBALI</a>
        <h1 style="font-family:'Cinzel Decorative'; color:var(--pink); font-size:20px;">TOPUP</h1>
        <div style="width:50px"></div>
    </div>

    <div class="card">
        <span class="label-neon">METODE PEMBAYARAN</span>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
            <div id="tab-qris" class="method-btn active" onclick="switchMethod('QRIS')">
                <i class="fas fa-qrcode"></i><br><span style="font-size:9px;font-weight:900;">QRIS</span>
            </div>
            <div id="tab-usdt" class="method-btn" onclick="switchMethod('USDT')">
                <i class="fab fa-ethereum"></i><br><span style="font-size:9px;font-weight:900;">USDT</span>
            </div>
        </div>

        <div id="area-qris">
            <div class="qris-wrapper">
                <img src="25989.png" id="img-qris" alt="QRIS PAY">
            </div>
            <p style="text-align:center; font-size:10px; color:var(--yellow); font-weight:800;">TOTAL BAYAR SESUAI NOMINAL INPUT</p>
        </div>

        <div id="area-usdt" class="usdt-box">
            <p style="font-size:10px; color:var(--blue); font-weight:900;">ADDRESS BEP20:</p>
            <p style="font-family:monospace; background:#000; padding:10px; border-radius:5px; font-size:10px; word-break:break-all; margin:5px 0; border:1px solid var(--blue);">0x71dE983697e066eBe53018e698887eDAb6377777</p>
            <p style="font-size:10px; text-align:right; color:var(--yellow);">RATE: 16.200</p>
        </div>

        <span class="label-neon">NOMINAL DEPOSIT</span>
        <input type="number" id="in-amount" class="input-depo" placeholder="0">

        <button class="btn-main" onclick="sendDeposit()">KONFIRMASI DEPOSIT</button>
    </div>

    <div class="card">
        <span class="label-neon"><i class="fas fa-history"></i> RIWAYAT</span>
        <table class="tbl-history">
            <thead><tr><th>STATUS</th><th>JUMLAH</th><th>WAKTU</th></tr></thead>
            <tbody id="hist-body"></tbody>
        </table>
    </div>
</div>

<script>
    const supa = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    let currentM = 'QRIS';

    function switchMethod(m) {
        currentM = m;
        document.getElementById('tab-qris').classList.toggle('active', m==='QRIS');
        document.getElementById('tab-usdt').classList.toggle('active', m==='USDT');
        document.getElementById('area-qris').style.display = (m==='QRIS' ? 'block' : 'none');
        document.getElementById('area-usdt').style.display = (m==='USDT' ? 'block' : 'none');
    }

    async function sendDeposit() {
        const user = localStorage.getItem('p_user');
        const amt = document.getElementById('in-amount').value;
        if(!user || !amt) return alert("Isi nominal!");

        const { error } = await supa.from('deposits').insert([{
            username: user,
            amount: parseFloat(amt),
            method: currentM,
            status: 'PROSES'
        }]);

        if(!error) {
            alert("Deposit Terkirim!");
            loadHistory();
        }
    }

    async function loadHistory() {
        const user = localStorage.getItem('p_user');
        const { data } = await supa.from('deposits').select('*').eq('username', user).order('created_at', {ascending:false});
        if(data) {
            document.getElementById('hist-body').innerHTML = data.map(d => `
                <tr>
                    <td style="font-weight:800; color:${d.status==='SUKSES'?'#0f8':(d.status==='GAGAL'?'#f07':'#0af')}">${d.status}</td>
                    <td style="font-weight:900;">Rp ${d.amount.toLocaleString()}</td>
                    <td style="opacity:0.5; font-size:10px;">${new Date(d.created_at).toLocaleTimeString()}</td>
                </tr>
            `).join('');
        }
    }

    // Cek apakah file gambar ada
    window.onload = () => {
        loadHistory();
        const img = document.getElementById('img-qris');
        img.onerror = () => {
            console.error("File 25989.png tidak ditemukan di server!");
            img.parentElement.style.border = "2px solid red";
            img.parentElement.innerHTML = "<p style='color:black; font-size:12px; font-weight:bold; padding:20px; text-align:center;'>FILE GAMBAR 25989.png TIDAK DITEMUKAN</p>";
        };
    };
</script>
</body>
</html>
