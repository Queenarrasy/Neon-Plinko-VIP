<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>DEPOSIT - NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global.js"></script>
    <style>
        :root{
          --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--bg:#02030d;
          --card:rgba(255,255,255,.025);
          --gp:0 0 8px rgba(255,0,119,.5),0 0 22px rgba(255,0,119,.15);
          --gb:0 0 8px rgba(0,85,255,.5),0 0 22px rgba(0,85,255,.15);
          --gy:0 0 8px rgba(245,230,66,.5),0 0 22px rgba(245,230,66,.13);
          --bp:rgba(255,0,119,.32);--bb:rgba(0,85,255,.32);--by:rgba(245,230,66,.32);
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{
          background:var(--bg); color:#dde0f0; font-family:'Outfit',sans-serif; min-height:100vh; overflow-x:hidden;
          background-image: radial-gradient(ellipse 70% 50% at 10% 5%,rgba(0,55,255,.06) 0%,transparent 70%);
        }
        .header{position:sticky;top:0;z-index:200;padding:13px 18px;background:rgba(2,3,13,.93); border-bottom:1px solid var(--bb); display:flex;align-items:center;justify-content:space-between;}
        .btn-back{color:rgba(255,255,255,.6); width:32px;height:32px;border:1px solid var(--bb);border-radius:50%; display:flex;align-items:center;justify-content:center; text-decoration:none;}
        .header-title{font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;letter-spacing:2px; background:linear-gradient(90deg,var(--pink),#dd66ff,var(--yellow)); -webkit-background-clip:text;-webkit-text-fill-color:transparent;}

        .container{padding:16px;max-width:520px;margin:auto;display:flex;flex-direction:column;gap:14px;}
        .sec-lbl{display:flex;align-items:center;gap:8px;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;opacity:.45;}
        
        .method-card{background:var(--card);border:1px solid var(--bb);border-radius:20px;padding:16px;box-shadow:var(--gb);}
        .method-item{display:flex;align-items:center;gap:13px;padding:13px 14px;border-radius:14px;cursor:pointer;margin-bottom:10px; border:1px solid rgba(255,0,119,.2); transition:.3s;}
        .method-item.active{background:rgba(255,0,119,.15);border-color:var(--pink);box-shadow:var(--gp);}
        
        .form-section{background:var(--card);border-radius:20px;padding:18px; border:1px solid var(--bp); box-shadow:var(--gp);}
        .sec-title{font-family:'Cinzel Decorative',serif;font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:14px; color:var(--pink);}
        input[type=number]{width:100%;padding:13px 15px;background:rgba(0,0,0,.4);border:1px solid rgba(0,85,255,.22);border-radius:12px;color:#fff;outline:none;}
        
        .amount-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0;}
        .amount-item{padding:10px; border:1px solid var(--bp); border-radius:10px; text-align:center; font-size:11px; font-weight:700; color:var(--pink); cursor:pointer;}
        
        .qris-display{text-align:center;margin:15px 0;}
        .qris-display img{width:180px; height:180px; border-radius:15px; border:2px solid var(--pink); box-shadow:var(--gp);}

        .btn-main{width:100%;padding:14px;border-radius:50px;cursor:pointer;font-weight:700;text-transform:uppercase;border:none; transition:.3s; background:linear-gradient(90deg,var(--pink),#b400dc); color:#fff; box-shadow:var(--gp);}

        .history-card{background:var(--card); border:1px solid var(--by); border-radius:20px; padding:18px;}
        .history-item{padding:12px; background:rgba(0,0,0,0.3); border-radius:12px; margin-bottom:8px; border-left:4px solid var(--yellow);}
        
        /* Modal */
        #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;}
        #neon-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%); background:#0a0b1e; border:2px solid var(--pink); border-radius:20px; padding:25px; text-align:center; z-index:1001; width:85%;}
    </style>
</head>
<body>

<div id="modal-overlay"></div>
<div id="neon-modal">
    <h3 id="modal-title" style="color:var(--pink)">NOTIFIKASI</h3>
    <p id="modal-msg" style="margin: 15px 0; color:#ccc; font-size:13px;"></p>
    <button class="btn-main" onclick="closeModal()">SAYA MENGERTI</button>
</div>

<div class="header">
    <a href="game.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
    <div class="header-title">SISTEM DEPOSIT</div>
    <div style="width:32px;"></div>
</div>

<div class="container">
    <div class="sec-lbl" style="color:var(--pink)"><i class="fa-solid fa-credit-card"></i> Pilih Metode</div>
    <div class="method-card">
        <div class="method-item active" onclick="selectMethod('QRIS', this)">
            <i class="fa-solid fa-qrcode" style="color:var(--pink)"></i>
            <div><div style="font-size:13px; font-weight:700">QRIS ALL PAYMENT</div><div style="font-size:10px; opacity:0.5">Otomatis / Manual</div></div>
        </div>
        <div class="method-item" onclick="selectMethod('USDT', this)">
            <i class="fa-brands fa-ethereum" style="color:var(--yellow)"></i>
            <div><div style="font-size:13px; font-weight:700">USDT (TRC20)</div><div style="font-size:10px; opacity:0.5">Rate Rp 15.500</div></div>
        </div>
    </div>

    <div class="form-section">
        <div class="sec-title" id="form-title">DEPOSIT VIA QRIS</div>
        <label style="font-size:10px; opacity:0.6; margin-bottom:5px; display:block;">NOMINAL (IDR / USDT)</label>
        <input type="number" id="input-amount" placeholder="Contoh: 50000">
        
        <div class="amount-grid" id="grid-idr">
            <div class="amount-item" onclick="setAmt(20000)">20K</div>
            <div class="amount-item" onclick="setAmt(50000)">50K</div>
            <div class="amount-item" onclick="setAmt(100000)">100K</div>
        </div>

        <div class="qris-display" id="qris-area">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=MAYA_DEPOSIT_NEON" alt="QRIS">
            <div style="margin-top:10px; color:var(--pink); font-size:12px; font-weight:700;">SCAN QRIS DI ATAS</div>
        </div>

        <button class="btn-main" onclick="prosesDeposit()">KONFIRMASI DEPOSIT</button>
    </div>

    <div class="sec-lbl" style="color:var(--yellow)"><i class="fa-solid fa-clock-rotate-left"></i> Riwayat Anda</div>
    <div class="history-card" id="hist-list">
        <div style="text-align:center; opacity:0.4; font-size:12px;">Memuat riwayat...</div>
    </div>
</div>

<script>
    let currentMethod = 'QRIS';

    function selectMethod(m, el) {
        currentMethod = m;
        document.querySelectorAll('.method-item').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('form-title').innerText = `DEPOSIT VIA ${m}`;
        document.getElementById('qris-area').style.display = (m === 'QRIS') ? 'block' : 'none';
        document.getElementById('grid-idr').style.display = (m === 'QRIS') ? 'grid' : 'none';
        document.getElementById('input-amount').placeholder = (m === 'QRIS') ? "Minimal 20.000" : "Minimal 10 (USDT)";
    }

    function setAmt(v) { document.getElementById('input-amount').value = v; }

    async function prosesDeposit() {
        const amt = document.getElementById('input-amount').value;
        const user = getUsername();

        if(!amt || amt <= 0) return showModal("Jumlah tidak valid!");
        
        // Simpan ke Supabase
        const { data, error } = await _supabase.from('deposits').insert([
            { username: user, method: currentMethod, amount: parseFloat(amt), status: 'PROSES' }
        ]);

        if(error) {
            console.error(error);
            showModal("Gagal mengirim permintaan deposit.");
        } else {
            showModal("Permintaan dikirim! Silahkan transfer dan tunggu konfirmasi admin.");
            loadHistory();
        }
    }

    async function loadHistory() {
        const user = getUsername();
        const { data, error } = await _supabase
            .from('deposits')
            .select('*')
            .eq('username', user)
            .order('created_at', { ascending: false })
            .limit(5);

        if(data) {
            const html = data.map(i => `
                <div class="history-item">
                    <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;">
                        <span style="font-weight:700">${i.method}</span>
                        <span style="color:${i.status === 'PROSES' ? 'var(--yellow)' : '#00ff00'}">${i.status}</span>
                    </div>
                    <div style="font-size:16px; font-weight:800; color:#fff">${currentMethod === 'QRIS' ? 'Rp' : '$'} ${parseFloat(i.amount).toLocaleString()}</div>
                    <div style="font-size:9px; opacity:0.4">${new Date(i.created_at).toLocaleString()}</div>
                </div>
            `).join('');
            document.getElementById('hist-list').innerHTML = html || '<div style="text-align:center; opacity:0.4;">Belum ada riwayat</div>';
        }
    }

    function showModal(m) {
        document.getElementById('modal-msg').innerText = m;
        document.getElementById('modal-overlay').style.display = 'block';
        document.getElementById('neon-modal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('neon-modal').style.display = 'none';
    }

    window.onload = loadHistory;
</script>
</body>
</html>
