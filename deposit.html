<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>DEPOSIT - NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
          --pink: #ff0077; --blue: #0055ff; --cyan: #00f2ff; --bg: #02030d;
          --gp: 0 0 10px rgba(255, 0, 119, 0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
          background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh;
          background-image: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(0,85,255,0.08) 0%, transparent 70%);
          padding-bottom: 30px;
        }

        .header { 
            height: 65px; padding: 0 20px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(2, 3, 13, 0.95); border-bottom: 1px solid var(--blue); 
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }
        .btn-back { color: #fff; font-size: 20px; text-decoration: none; }
        .logo { font-family: 'Cinzel Decorative'; color: var(--pink); font-size: 14px; font-weight: 900; }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        .form-box { 
            background: rgba(5,6,20,0.8); border: 1px solid rgba(255,255,255,0.05); 
            padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        label { display: block; font-size: 11px; font-weight: 600; color: var(--blue); margin-bottom: 8px; text-transform: uppercase; }
        
        input[type=number] { 
            width: 100%; padding: 15px; background: #000; border: 1px solid var(--blue); 
            border-radius: 12px; color: #fff; font-size: 18px; font-weight: 800; outline: none; margin-bottom: 15px;
        }
        
        .amt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .amt-btn { background: rgba(0,85,255,0.1); border: 1px solid var(--blue); color: #fff; padding: 10px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; }

        .pay-info { text-align: center; margin-bottom: 20px; padding: 15px; border: 1px dashed rgba(0,212,255,0.3); border-radius: 15px; }
        .qris-img { width: 170px; height: 170px; border-radius: 10px; border: 2px solid #fff; }

        .btn-main { 
            width: 100%; padding: 16px; border-radius: 50px; border: none; 
            background: linear-gradient(90deg, var(--pink), #b400dc); 
            color: #fff; font-family: 'Cinzel Decorative'; font-weight: 900; font-size: 16px; 
            box-shadow: var(--gp); cursor: pointer;
        }

        .history-sec { margin-top: 30px; }
        .history-item { 
            background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; 
            margin-bottom: 10px; border-left: 3px solid var(--blue);
        }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: #0a0b1e; border: 2px solid var(--pink); border-radius: 25px; padding: 30px; width: 85%; max-width: 320px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <a href="game.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="logo">NEON DEPOSIT</div>
        <div id="user-display" style="font-size: 10px; color: var(--cyan); font-weight: 800;">CHECKING...</div>
    </div>

    <div class="container">
        <div class="form-box">
            <label>Nominal Top-Up (IDR)</label>
            <input type="number" id="input-amount" placeholder="Contoh: 50000">

            <div class="amt-grid">
                <button class="amt-btn" onclick="setAmt(20000)">20K</button>
                <button class="amt-btn" onclick="setAmt(50000)">50K</button>
                <button class="amt-btn" onclick="setAmt(100000)">100K</button>
            </div>

            <div class="pay-info">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=MAYA_DEPOSIT_NEON" class="qris-img">
                <div style="font-size:10px; color:var(--cyan); font-weight:700; margin-top:10px;">SILAHKAN SCAN UNTUK MEMBAYAR</div>
            </div>

            <button class="btn-main" id="btn-submit" onclick="prosesDeposit()">KONFIRMASI PEMBAYARAN</button>
        </div>

        <div class="history-sec">
            <label>RIWAYAT TRANSAKSI ANDA</label>
            <div id="depo-history">
                <div style="text-align:center; padding:20px; opacity:0.3; font-size:12px;">Menghubungkan ke server...</div>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-box">
            <h3 id="m-title" style="color:var(--pink); font-family:'Cinzel Decorative';">SERVER INFO</h3>
            <p id="m-msg" style="margin:20px 0; font-size:14px; color:#ccc;"></p>
            <button class="btn-main" onclick="closeModal()">OKE</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- KONFIGURASI SERVER CENTRAL ---
        const sb_url = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
        const sb_key = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani";
        const _supabase = supabase.createClient(sb_url, sb_key);

        // Ambil user dari LocalStorage (Session Token)
        const currentUser = localStorage.getItem('neon_user');

        async function checkSession() {
            if (!currentUser) {
                window.location.href = "index.html"; // Jika tidak ada login, lempar ke depan
                return;
            }
            document.getElementById('user-display').innerText = currentUser.toUpperCase();
            loadHistory();
        }

        function setAmt(v) { document.getElementById('input-amount').value = v; }

        async function prosesDeposit() {
            const amt = parseFloat(document.getElementById('input-amount').value);
            const btn = document.getElementById('btn-submit');

            if (!amt || amt < 10000) return showModal("GAGAL", "Minimal deposit adalah IDR 10.000");

            btn.disabled = true;
            btn.innerText = "MENYAMBUNG KE SERVER...";

            // INSERT LANGSUNG KE TABEL CENTRAL 'deposits'
            const { error } = await _supabase.from('deposits').insert([{ 
                username: currentUser, 
                amount: amt, 
                method: 'QRIS', 
                net_receive: amt, 
                status: 'PROSES' 
            }]);

            if (error) {
                showModal("SERVER ERROR", error.message);
            } else {
                showModal("BERHASIL", "Data telah masuk ke antrean Admin. Mohon tunggu proses verifikasi.");
                document.getElementById('input-amount').value = "";
                loadHistory(); // Refresh riwayat otomatis dari server
            }
            btn.disabled = false;
            btn.innerText = "KONFIRMASI PEMBAYARAN";
        }

        async function loadHistory() {
            // MENARIK RIWAYAT TERBARU DARI SERVER (BUKAN DARI MEMORI HP)
            const { data, error } = await _supabase
                .from('deposits')
                .select('*')
                .eq('username', currentUser)
                .order('created_at', { ascending: false })
                .limit(8);
            
            let html = "";
            if (data && data.length > 0) {
                data.forEach(i => {
                    const statusColor = i.status === 'SUKSES' ? '#00ff88' : (i.status === 'PROSES' ? '#f5e642' : '#ff3131');
                    html += `
                        <div class="history-item" style="border-left: 4px solid ${statusColor}">
                            <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px;">
                                <span style="font-weight:800; color:var(--cyan)">QRIS ALL</span>
                                <span style="color:${statusColor}; font-weight:800">${i.status}</span>
                            </div>
                            <div style="font-size:16px; font-weight:900;">Rp ${i.amount.toLocaleString('id-ID')}</div>
                            <div style="font-size:9px; opacity:0.5; margin-top:3px;">ID: ${i.id.substring(0,8)}...</div>
                        </div>
                    `;
                });
            } else {
                html = '<div style="text-align:center; padding:20px; opacity:0.3; font-size:11px;">Belum ada riwayat di server ini.</div>';
            }
            document.getElementById('depo-history').innerHTML = html;
        }

        function showModal(t, m) {
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-msg').innerText = m;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        // Inisialisasi setiap kali halaman dibuka
        window.onload = checkSession;
    </script>
</body>
</html>
