<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>DEPOSIT - NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global.js"></script>
    <style>
        :root{
          --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--bg:#02030d;
          --card:rgba(255,255,255,.025);
          --gp:0 0 8px rgba(255,0,119,.5),0 0 22px rgba(255,0,119,.15);
          --gb:0 0 8px rgba(0,85,255,.5),0 0 22px rgba(0,85,255,.15);
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{
          background:var(--bg); color:#dde0f0; font-family:'Outfit',sans-serif; min-height:100vh;
          background-image: radial-gradient(ellipse 70% 50% at 10% 5%,rgba(0,55,255,.06) 0%,transparent 70%);
        }
        .header{position:sticky;top:0;z-index:200;padding:13px 18px;background:rgba(2,3,13,.93); border-bottom:1px solid var(--blue); display:flex;align-items:center;justify-content:space-between;}
        .btn-back{color:#fff; width:32px;height:32px;border:1px solid var(--blue);border-radius:50%; display:flex;align-items:center;justify-content:center; text-decoration:none;}
        .header-title{font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;letter-spacing:2px; color:var(--pink); text-shadow:var(--gp);}

        .container{padding:16px;max-width:520px;margin:auto;display:flex;flex-direction:column;gap:14px;}
        .method-card{background:var(--card);border:1px solid var(--blue);border-radius:20px;padding:16px;box-shadow:var(--gb);}
        .method-item{display:flex;align-items:center;gap:13px;padding:13px 14px;border-radius:14px;cursor:pointer;margin-bottom:10px; border:1px solid rgba(255,0,119,.2); transition:.3s;}
        .method-item.active{background:rgba(255,0,119,0.15);border-color:var(--pink);box-shadow:var(--gp);}
        
        .form-section{background:var(--card);border-radius:20px;padding:18px; border:1px solid var(--pink); box-shadow:var(--gp);}
        .sec-title{font-family:'Cinzel Decorative',serif;font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:14px; color:var(--pink);}
        input[type=number]{width:100%;padding:13px 15px;background:rgba(0,0,0,.4);border:1px solid rgba(0,85,255,.22);border-radius:12px;color:#fff;outline:none;font-size:16px;}
        
        .amount-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0;}
        .amount-item{padding:10px; border:1px solid var(--pink); border-radius:10px; text-align:center; font-size:11px; font-weight:700; color:var(--pink); cursor:pointer;}
        
        .calc-info { background: rgba(0,212,255,0.1); padding: 12px; border-radius: 12px; margin: 15px 0; font-size: 12px; border: 1px dashed var(--blue); }
        .calc-info div { display: flex; justify-content: space-between; margin-bottom: 5px; }

        .qris-display{text-align:center;margin:15px 0;}
        .qris-display img{width:180px; height:180px; border-radius:15px; border:2px solid #fff;}

        .btn-main{width:100%;padding:15px;border-radius:50px;cursor:pointer;font-weight:700;text-transform:uppercase;border:none; background:linear-gradient(90deg,var(--pink),#b400dc); color:#fff; box-shadow:var(--gp);}
        .btn-main:disabled{opacity:0.5; cursor:not-allowed;}

        #depo-history { display:flex; flex-direction:column; gap:10px; }
        .history-item { background:rgba(255,255,255,0.02); padding:12px; border-radius:12px; border-left:4px solid var(--yellow); }
        
        /* Modal */
        #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;}
        #neon-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%); background:#0a0b1e; border:2px solid var(--pink); border-radius:20px; padding:25px; text-align:center; z-index:1001; width:85%;}
    </style>
</head>
<body>

<div id="modal-overlay"></div>
<div id="neon-modal">
    <h3 id="modal-title" style="color:var(--pink); font-family:'Cinzel Decorative';">NOTIFIKASI</h3>
    <p id="modal-msg" style="margin: 15px 0; color:#ccc; font-size:13px;"></p>
    <button class="btn-main" onclick="closeModal()" style="padding:10px 20px;">SAYA MENGERTI</button>
</div>

<div class="header">
    <a href="game.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
    <div class="header-title">SISTEM DEPOSIT</div>
    <div style="width:32px;"></div>
</div>

<div class="container">
    <div class="method-card">
        <div class="method-item active" id="m-qris" onclick="selectMethod('QRIS')">
            <i class="fa-solid fa-qrcode" style="color:var(--pink)"></i>
            <div><div style="font-size:13px; font-weight:700">QRIS ALL PAYMENT</div><div style="font-size:10px; opacity:0.5">Minimal IDR 20.000</div></div>
        </div>
        <div class="method-item" id="m-usdt" onclick="selectMethod('USDT')">
            <i class="fa-brands fa-ethereum" style="color:var(--yellow)"></i>
            <div><div style="font-size:13px; font-weight:700">USDT (TRC20)</div><div style="font-size:10px; opacity:0.5">Minimal $10</div></div>
        </div>
    </div>

    <div class="form-section">
        <div class="sec-title" id="form-title">DEPOSIT VIA QRIS</div>
        <input type="number" id="input-amount" placeholder="Masukkan Nominal..." oninput="calculateNet()">
        
        <div class="amount-grid" id="grid-idr">
            <div class="amount-item" onclick="setAmt(20000)">20K</div>
            <div class="amount-item" onclick="setAmt(50000)">50K</div>
            <div class="amount-item" onclick="setAmt(100000)">100K</div>
        </div>

        <div class="calc-info" id="calc-info">
            <div><span>Rate Kurs:</span> <span id="info-rate">Rp 1</span></div>
            <div><span>Biaya (Fee):</span> <span id="info-fee">Rp 0</span></div>
            <hr style="margin:8px 0; border:0; border-top:1px solid rgba(255,255,255,0.1)">
            <div style="font-weight:800; color:var(--yellow)">
                <span>Terima di Saldo:</span>
                <span id="info-net">IDR 0</span>
            </div>
        </div>

        <div class="qris-display" id="qris-area">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=MAYA_DEPOSIT_NEON" alt="QRIS">
            <div style="margin-top:10px; color:var(--yellow); font-size:11px; font-weight:700;">SCAN QRIS & TRANSFER</div>
        </div>

        <button class="btn-main" id="btn-submit" onclick="prosesDeposit()">KONFIRMASI DEPOSIT</button>
    </div>

    <div class="sec-title" style="margin-top:20px;">Riwayat Terakhir</div>
    <div id="depo-history"></div>
</div>

<script>
    let currentMethod = 'QRIS';
    const KURS_USDT = 16800;
    const FEE_USDT = 2; // dalam Dollar

    function selectMethod(m) {
        currentMethod = m;
        document.getElementById('m-qris').classList.toggle('active', m === 'QRIS');
        document.getElementById('m-usdt').classList.toggle('active', m === 'USDT');
        document.getElementById('form-title').innerText = `DEPOSIT VIA ${m}`;
        document.getElementById('qris-area').style.display = (m === 'QRIS') ? 'block' : 'none';
        document.getElementById('grid-idr').style.display = (m === 'QRIS') ? 'grid' : 'none';
        document.getElementById('input-amount').placeholder = (m === 'QRIS') ? "Masukkan Rupiah..." : "Masukkan Jumlah USDT...";
        document.getElementById('input-amount').value = "";
        calculateNet();
    }

    function setAmt(v) { 
        document.getElementById('input-amount').value = v; 
        calculateNet();
    }

    function calculateNet() {
        const val = parseFloat(document.getElementById('input-amount').value) || 0;
        let rate = 1;
        let fee = 0;
        let net = 0;

        if (currentMethod === 'QRIS') {
            rate = 1;
            fee = 0;
            net = val;
            document.getElementById('info-rate').innerText = "Normal";
            document.getElementById('info-fee').innerText = "Rp 0";
        } else {
            rate = KURS_USDT;
            fee = FEE_USDT * KURS_USDT;
            // Saldo diterima = (Jumlah USDT - Fee $2) * Kurs
            net = (val > FEE_USDT) ? (val - FEE_USDT) * KURS_USDT : 0;
            
            document.getElementById('info-rate').innerText = "Rp " + KURS_USDT.toLocaleString();
            document.getElementById('info-fee').innerText = "Rp " + fee.toLocaleString();
        }

        document.getElementById('info-net').innerText = "IDR " + Math.floor(net).toLocaleString('id-ID');
        return net;
    }

    async function prosesDeposit() {
        const val = parseFloat(document.getElementById('input-amount').value);
        const user = localStorage.getItem('user_neon');
        const btn = document.getElementById('btn-submit');
        const netAmount = calculateNet();

        // Validasi Minimum
        if (currentMethod === 'QRIS' && val < 20000) {
            return showModal("Minimal Kurang", "Deposit QRIS minimal Rp 20.000");
        }
        if (currentMethod === 'USDT' && val < 10) {
            return showModal("Minimal Kurang", "Deposit USDT minimal $10");
        }
        if (!user) return showModal("Sesi Berakhir", "Silahkan login kembali.");
        if (!val || val <= 0) return showModal("Gagal", "Masukkan nominal yang benar.");

        btn.disabled = true;
        btn.innerText = "MENGIRIM...";

        try {
            // Kita simpan netAmount (hasil konversi) agar Admin tahu berapa saldo yang harus ditambah
            const { error } = await _supabase
                .from('deposits')
                .insert([{ 
                    username: user, 
                    method: currentMethod, 
                    amount: val, // Nominal asli (Rp atau $)
                    net_receive: Math.floor(netAmount), // Nominal yang akan diterima di saldo (Rp)
                    status: 'PROSES' 
                }]);

            if (error) throw error;

            showModal("Berhasil", "Permintaan deposit terkirim! Saldo akan masuk otomatis setelah Admin melakukan konfirmasi.");
            document.getElementById('input-amount').value = "";
            calculateNet();
            loadHistory();
        } catch (err) {
            showModal("Gagal", err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "KONFIRMASI DEPOSIT";
        }
    }

    async function loadHistory() {
        const user = localStorage.getItem('user_neon');
        const { data } = await _supabase
            .from('deposits')
            .select('*')
            .eq('username', user)
            .order('created_at', { ascending: false })
            .limit(5);

        if(data) {
            const html = data.map(i => `
                <div class="history-item">
                    <div style="display:flex; justify-content:space-between; font-size:12px;">
                        <span style="font-weight:800">${i.method}</span>
                        <span style="color:${i.status === 'SUKSES' ? '#00ff00' : 'var(--yellow)'}">${i.status}</span>
                    </div>
                    <div style="font-size:18px; font-weight:900; margin:5px 0;">
                        ${i.method === 'QRIS' ? 'Rp' : '$'} ${parseFloat(i.amount).toLocaleString()}
                    </div>
                    <div style="font-size:10px; opacity:0.4;">Est. Terima: IDR ${parseFloat(i.net_receive || 0).toLocaleString()}</div>
                </div>
            `).join('');
            document.getElementById('depo-history').innerHTML = html || '<div style="text-align:center; opacity:0.3;">Belum ada riwayat</div>';
        }
    }

    function showModal(t, m) {
        document.getElementById('modal-title').innerText = t;
        document.getElementById('modal-msg').innerText = m;
        document.getElementById('modal-overlay').style.display = 'block';
        document.getElementById('neon-modal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('neon-modal').style.display = 'none';
    }

    window.onload = () => {
        loadHistory();
        calculateNet();
    };
</script>
</body>
</html>
