<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>DEPOSIT — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root{
            --pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--bg:#000005;
            --gp:0 0 8px rgba(255,0,119,.5),0 0 20px rgba(255,0,119,.2);
            --gb:0 0 8px rgba(0,34,255,.5),0 0 20px rgba(0,34,255,.2);
            --gy:0 0 8px rgba(251,255,0,.5),0 0 20px rgba(251,255,0,.2);
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;min-height:100vh;padding-bottom:80px;overflow-x:hidden;}
        #particles-js{position:fixed;width:100%;height:100%;z-index:0;pointer-events:none;background:radial-gradient(circle at 60% 30%,#000018 0%,#000 100%);}

        #neon-alert{position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:88%;max-width:340px;background:rgba(0,0,15,.98);border:2px solid var(--pink);border-top:3px solid var(--yellow);color:#fff;padding:14px 20px;border-radius:16px;text-align:center;font-weight:900;z-index:9000;font-size:13px;transition:.5s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 0 25px rgba(255,0,119,.45),0 0 50px rgba(0,34,255,.2);}
        #neon-alert.show{top:15px;}
        #neon-alert.success{border-color:var(--blue);box-shadow:0 0 25px rgba(0,34,255,.45),0 0 50px rgba(255,0,119,.2);}

        .header{height:62px;padding:0 18px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,18,.98);border-bottom:1.5px solid var(--blue);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);box-shadow:0 0 15px rgba(0,34,255,.2);}
        .logo{font-size:14px;font-weight:900;color:var(--pink);text-shadow:0 0 8px rgba(255,0,119,.5);letter-spacing:1px;text-transform:uppercase;}
        .saldo-badge{background:rgba(0,0,0,.7);border:1.5px solid var(--yellow);padding:5px 13px;border-radius:50px;font-size:11px;font-weight:900;color:var(--yellow);text-shadow:0 0 6px rgba(251,255,0,.5);box-shadow:0 0 8px rgba(251,255,0,.2);}

        .container{padding:18px;max-width:500px;margin:auto;position:relative;z-index:10;}

        .method-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
        .method-item{background:rgba(0,0,35,.75);border:1px solid rgba(0,34,255,.3);padding:16px 12px;border-radius:18px;text-align:center;cursor:pointer;transition:.3s;backdrop-filter:blur(5px);}
        .method-item.active{border-color:var(--pink);border-width:1.5px;background:rgba(255,0,119,.1);box-shadow:0 0 12px rgba(255,0,119,.2);transform:scale(1.02);}
        .method-item i{font-size:26px;margin-bottom:7px;display:block;}
        .method-item .m-label{font-size:12px;font-weight:900;letter-spacing:.5px;}

        .form-box{background:rgba(0,0,35,.75);border:1px solid rgba(0,34,255,.3);padding:22px;border-radius:20px;box-shadow:0 0 15px rgba(0,34,255,.12);backdrop-filter:blur(10px);}
        label{font-size:10px;font-weight:900;color:var(--yellow);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;display:block;}

        input[type=number]{width:100%;padding:14px;background:#000;border:1px solid rgba(0,34,255,.4);border-radius:12px;color:#fff;font-size:22px;font-weight:900;outline:none;margin-bottom:18px;text-align:center;transition:.3s;font-family:'Outfit',sans-serif;}
        input:focus{border-color:var(--pink);box-shadow:0 0 10px rgba(255,0,119,.25);}

        .calc-card{background:rgba(0,0,0,.5);padding:13px;border-radius:12px;border-left:2.5px solid var(--yellow);box-shadow:0 0 8px rgba(251,255,0,.08);margin-bottom:18px;}
        .calc-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;font-weight:700;}
        .calc-row span:last-child{color:var(--yellow);font-weight:900;text-shadow:0 0 6px rgba(251,255,0,.4);}
        .net-receive{margin-top:9px;padding-top:9px;border-top:1px dashed rgba(255,255,255,.1);font-size:15px;font-weight:900;}

        /* ── QRIS DISPLAY ── */
        #qr-display{text-align:center;margin-bottom:18px;}
        .qris-frame{
            background:#fff;
            border-radius:18px;
            padding:12px;
            box-shadow:0 0 24px rgba(255,0,119,.3),0 0 50px rgba(0,34,255,.2);
            border:2.5px solid var(--pink);
            display:block;
            width:100%;
            max-width:320px;
            margin: 0 auto;
        }
        #img-qris{
            width:100%;
            height:auto;
            display:block;
            border-radius:8px;
            object-fit:contain;
        }
        .qris-label{
            font-size:11px;color:var(--yellow);
            margin-top:12px;font-weight:900;
            letter-spacing:1px;text-shadow:0 0 6px rgba(251,255,0,.4);
            text-transform:uppercase;
        }

        .wa-confirm-box{
            background:rgba(37,211,102,.08);
            border:1.5px solid rgba(37,211,102,.35);
            border-radius:16px;
            padding:16px;
            margin-bottom:18px;
            text-align:center;
            display:none;
        }
        .wa-confirm-box.show{display:block;}
        .wa-btn{
            display:inline-flex;
            align-items:center;
            gap:8px;
            background:rgba(37,211,102,.2);
            border:1.5px solid rgba(37,211,102,.5);
            padding:12px 20px;
            border-radius:25px;
            color:#25d366;
            font-weight:900;
            cursor:pointer;
            transition:.3s;
            text-decoration:none;
            font-size:12px;
            box-shadow:0 0 12px rgba(37,211,102,.2);
            letter-spacing:0.5px;
            text-transform:uppercase;
        }
        .wa-btn:hover{background:rgba(37,211,102,.3);transform:scale(1.03);}

        .btn-main{width:100%;padding:16px;border-radius:50px;border:none;background:linear-gradient(90deg,var(--blue),var(--pink));color:#fff;font-weight:900;font-size:13px;cursor:pointer;box-shadow:0 0 12px rgba(255,0,119,.3);transition:.2s;letter-spacing:1px;text-transform:uppercase;font-family:'Outfit',sans-serif;}
        .btn-main:active{transform:scale(.96);}
        .btn-main:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(1);}

        .hist-wrap{background:rgba(0,0,35,.7);border:1px solid rgba(0,34,255,.25);border-radius:18px;overflow:hidden;margin-top:18px;}
        .hist-scroll{max-height:220px;overflow-y:auto;}
        table.ht{width:100%;border-collapse:collapse;}
        table.ht th{padding:9px 12px;font-size:8px;font-weight:900;color:var(--pink);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,0,119,.2);background:rgba(0,0,15,.8);text-align:left;}
        table.ht td{padding:10px 12px;font-size:11px;border-bottom:1px solid rgba(0,34,255,.08);font-weight:700;}
        .empty-row td{text-align:center;padding:22px!important;opacity:.35;}

        #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
        .modal-box{width:88%;max-width:320px;background:rgba(0,0,15,.99);border:2px solid var(--pink);border-top:3px solid var(--yellow);border-radius:22px;padding:28px;text-align:center;box-shadow:0 0 30px rgba(255,0,119,.35);animation:zoomIn .3s ease;}
        #modal-title{font-size:17px;font-weight:900;color:var(--pink);margin-bottom:13px;text-transform:uppercase;letter-spacing:1.5px;}

        .nav-bar{position:fixed;bottom:0;left:0;width:100%;height:72px;background:rgba(0,0,15,.99);display:flex;justify-content:space-around;align-items:center;border-top:1.5px solid var(--blue);backdrop-filter:blur(20px);z-index:1000;padding-bottom:6px;box-shadow:0 -4px 16px rgba(0,34,255,.2);}
        .nav-item{color:rgba(255,255,255,.3);text-decoration:none;text-align:center;font-size:9px;font-weight:900;flex:1;transition:.3s;text-transform:uppercase;}
        .nav-item.active{color:var(--pink);text-shadow:0 0 8px rgba(255,0,119,.5);}
        .nav-item i{font-size:20px;display:block;margin-bottom:3px;}
    </style>
</head>
<body>
<div id="particles-js"></div>
<div id="neon-alert">NOTIFICATION</div>
<audio id="snd-click"   src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b417f73c.mp3"></audio>
<audio id="snd-success" src="https://cdn.pixabay.com/audio/2021/08/04/audio_062564a02d.mp3"></audio>
<audio id="snd-error"   src="https://cdn.pixabay.com/audio/2022/03/10/audio_c36394595e.mp3"></audio>

<div class="header">
    <div class="logo"><i class="fas fa-gem" style="margin-right:7px;"></i>NEON PLINKO</div>
    <div class="saldo-badge" id="display-saldo">IDR 0</div>
</div>

<div class="container">
    <div class="method-grid">
        <div class="method-item active" id="m-qris" onclick="selectMethod('QRIS')">
            <i class="fas fa-qrcode" style="color:var(--pink);text-shadow:0 0 10px var(--pink)"></i>
            <div class="m-label">QRIS / BANK</div>
        </div>
        <div class="method-item" id="m-usdt" onclick="selectMethod('USDT')">
            <i class="fa-brands fa-ethereum" style="color:var(--blue);text-shadow:0 0 10px var(--blue)"></i>
            <div class="m-label">USDT CRYPTO</div>
        </div>
    </div>

    <div class="form-box">
        <label id="input-label"><i class="fas fa-coins"></i> Nominal Rupiah (Min 20.000)</label>
        <input type="number" id="amount-val" placeholder="0" oninput="calculate()">

        <div class="calc-card">
            <div class="calc-row"><span>Rate:</span><span id="rate-text">1 : 1</span></div>
            <div class="calc-row" id="fee-row" style="display:none"><span>Fee:</span><span>$2 USDT</span></div>
            <div class="calc-row net-receive"><span>Diterima:</span><span id="net-text">IDR 0</span></div>
        </div>

        <div id="qr-display">
            <div class="qris-frame">
                <img id="img-qris" src="https://static.wikia.nocookie.net/logos/images/0/0b/QRIS_logo.png">
            </div>
            <div class="qris-label">Scan QRIS Diatas</div>
        </div>

        <div class="wa-confirm-box" id="wa-box">
            <div class="wa-label">Konfirmasi via WhatsApp</div>
            <a href="#" id="wa-link" target="_blank" class="wa-btn">
                <i class="fab fa-whatsapp"></i> Chat Admin USDT
            </a>
        </div>

        <button class="btn-main" id="btn-konfirmasi" onclick="submitDeposit()">Konfirmasi Deposit</button>
    </div>

    <div class="section-title" style="margin-top:25px; font-size:11px; font-weight:900; color:var(--pink); text-transform:uppercase;">
        <i class="fas fa-history"></i> Riwayat Deposit
    </div>
    <div class="hist-wrap">
        <div class="hist-scroll">
            <table class="ht">
                <thead>
                    <tr>
                        <th>Metode</th>
                        <th>Nominal</th>
                        <th>Net</th>
                        <th>Status</th>
                        <th>Tanggal</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    <tr class="empty-row"><td colspan="5">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-box">
        <div id="modal-title">INFO</div>
        <div id="modal-msg" style="font-size:13px; color:#ddd; margin:15px 0;">Pesan</div>
        <button class="btn-main" onclick="closeModal()">OK</button>
    </div>
</div>

<nav class="nav-bar">
    <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
    <a href="deposit.html" class="nav-item active"><i class="fas fa-wallet"></i>Deposit</a>
    <a href="withdraw.html" class="nav-item"><i class="fas fa-money-bill-wave"></i>WD</a>
    <a href="reward.html" class="nav-item"><i class="fas fa-gift"></i>Reward</a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i>Profil</a>
</nav>

<script>
const db = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
let user = localStorage.getItem('neon_user');
let method = 'QRIS';
let isSubmitting = false;

if(!user) location.href='login.html';

particlesJS('particles-js', {
    particles:{number:{value:40},color:{value:'#ff0077'},shape:{type:'circle'},opacity:{value:0.2},size:{value:2},move:{speed:1}}
});

function playSnd(s){ document.getElementById('snd-'+s).play().catch(()=>{}); }

function selectMethod(m){
    method = m;
    playSnd('click');
    document.querySelectorAll('.method-item').forEach(el => el.classList.remove('active'));
    document.getElementById('m-'+m.toLowerCase()).classList.add('active');
    
    const qrDisp = document.getElementById('qr-display');
    const waBox = document.getElementById('wa-box');
    const lbl = document.getElementById('input-label');
    
    if(m==='QRIS'){
        qrDisp.style.display='block';
        waBox.classList.remove('show');
        lbl.innerHTML = '<i class="fas fa-coins"></i> Nominal Rupiah (Min 20.000)';
        document.getElementById('fee-row').style.display='none';
    } else {
        qrDisp.style.display='none';
        waBox.classList.add('show');
        lbl.innerHTML = '<i class="fa-brands fa-ethereum"></i> Nominal USDT (Min $5)';
        document.getElementById('fee-row').style.display='flex';
    }
    calculate();
}

function calculate(){
    const val = parseFloat(document.getElementById('amount-val').value) || 0;
    const netTxt = document.getElementById('net-text');
    const rateTxt = document.getElementById('rate-text');
    
    if(method === 'QRIS'){
        rateTxt.innerText = '1 : 1';
        netTxt.innerText = 'IDR ' + val.toLocaleString('id-ID');
    } else {
        rateTxt.innerText = '1 USDT : 15.500';
        const net = Math.max(0, (val - 2) * 15500);
        netTxt.innerText = 'IDR ' + net.toLocaleString('id-ID');
    }
}

async function loadHistory(){
    // Perbaikan query riwayat deposit agar terbaca
    const {data, error} = await db.from('deposits')
        .select('*')
        .eq('username', user)
        .order('created_at', {ascending: false})
        .limit(20);

    const body = document.getElementById('history-body');
    if(data && data.length > 0){
        body.innerHTML = data.map(d => {
            const c = d.status === 'SUKSES' ? '#00ff88' : (d.status === 'PROSES' ? 'var(--yellow)' : 'var(--pink)');
            return `<tr>
                <td>${d.method || 'QRIS'}</td>
                <td>Rp ${(d.amount || 0).toLocaleString('id-ID')}</td>
                <td>Rp ${(d.net_receive || d.amount || 0).toLocaleString('id-ID')}</td>
                <td style="color:${c};">${d.status}</td>
                <td style="font-size:9px;opacity:.45;">${new Date(d.created_at).toLocaleDateString('id-ID')}</td>
            </tr>`;
        }).join('');
    } else {
        body.innerHTML = '<tr class="empty-row"><td colspan="5">Belum ada transaksi</td></tr>';
    }
    
    const {data:prof} = await db.from('profiles').select('saldo').eq('username', user).single();
    if(prof) document.getElementById('display-saldo').innerText = 'IDR ' + (prof.saldo || 0).toLocaleString('id-ID');
}

async function submitDeposit(){
    if(isSubmitting) return;
    const amount = parseFloat(document.getElementById('amount-val').value);
    
    if(!amount || (method==='QRIS' && amount < 20000) || (method==='USDT' && amount < 5)){
        showModal("GAGAL", "Nominal tidak valid atau kurang dari minimal.");
        return;
    }

    isSubmitting = true;
    document.getElementById('btn-konfirmasi').disabled = true;

    const net = method === 'QRIS' ? amount : (amount - 2) * 15500;
    
    const {error} = await db.from('deposits').insert([{
        username: user,
        amount: amount,
        method: method,
        status: 'PROSES',
        net_receive: net
    }]);

    if(error){
        showModal("ERROR", error.message);
    } else {
        playSnd('success');
        showModal("BERHASIL", "Permintaan deposit Anda sedang diproses. Mohon tunggu.");
        loadHistory();
    }
    isSubmitting = false;
    document.getElementById('btn-konfirmasi').disabled = false;
}

function showModal(t, m){
    document.getElementById('modal-title').innerText = t;
    document.getElementById('modal-msg').innerText = m;
    document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal(){
    document.getElementById('modal-overlay').style.display = 'none';
}

window.onload = loadHistory;
</script>
</body>
</html>
