<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>DEPOSIT - NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff0077; --blue: #0055ff; --yellow: #f5e642; --bg: #02030d;
            --card: rgba(255, 255, 255, .025);
            --gp: 0 0 8px rgba(255, 0, 119, .5), 0 0 22px rgba(255, 0, 119, .15);
            --gb: 0 0 8px rgba(0, 85, 255, .5), 0 0 22px rgba(0, 85, 255, .15);
        }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        h2 { font-family: 'Cinzel Decorative'; text-align: center; color: var(--blue); text-shadow: var(--gb); }
        
        .method-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-method { flex: 1; padding: 15px; border: 1px solid var(--blue); background: var(--card); color: #fff; cursor: pointer; border-radius: 8px; }
        .btn-method.active { background: var(--blue); box-shadow: var(--gb); }

        .form-group { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: var(--yellow); }
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--blue); color: #fff; border-radius: 6px; box-sizing: border-box; }
        
        .info-box { font-size: 13px; background: rgba(0,85,255,0.1); padding: 10px; border-radius: 6px; margin-top: 10px; border-left: 3px solid var(--blue); }
        
        .btn-deposit { width: 100%; padding: 15px; background: var(--pink); border: none; color: #fff; font-weight: 700; border-radius: 8px; cursor: pointer; box-shadow: var(--gp); margin-top: 10px; }
        
        .history-section { margin-top: 30px; }
        .history-item { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--yellow); }
        .status-proses { color: var(--yellow); font-weight: bold; }
        .status-berhasil { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>TOP UP SALDO</h2>

    <div class="method-selector">
        <button class="btn-method active" onclick="switchMethod('QRIS')"><i class="fa-solid fa-qrcode"></i> QRIS</button>
        <button class="btn-method" onclick="switchMethod('USDT')"><i class="fa-brands fa-bitcoin"></i> USDT</button>
    </div>

    <div class="form-group" id="qris-form">
        <label>Nominal Deposit (Min. 20,000)</label>
        <input type="number" id="amount-qris" placeholder="Contoh: 50000">
        <div class="info-box">Saldo akan masuk otomatis setelah admin melakukan verifikasi.</div>
    </div>

    <div class="form-group" id="usdt-form" style="display:none;">
        <label>Nominal USDT (Min. $10)</label>
        <input type="number" id="amount-usdt" placeholder="Contoh: 10" oninput="calculateUSDT()">
        <div id="usdt-calc" class="info-box" style="color: var(--yellow);">
            Estimasi: Rp 0 (Setelah potong fee $2)
        </div>
        <p style="font-size: 11px; margin-top: 10px; opacity: 0.7;">*Kurs USDT saat ini: Rp 16.000. Biaya admin $2 per transaksi.</p>
    </div>

    <button class="btn-deposit" onclick="handleDeposit()">KONFIRMASI DEPOSIT</button>

    <div class="history-section">
        <h4 style="color: var(--blue); border-bottom: 1px solid var(--blue); padding-bottom: 5px;">RIWAYAT TERAKHIR</h4>
        <div id="depo-history">
            </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
let currentMethod = 'QRIS';
const KURS_USDT = 16000;
const ADMIN_WA = "6281234567890"; // GANTI DENGAN NOMOR WA ANDA

function switchMethod(m) {
    currentMethod = m;
    document.querySelectorAll('.btn-method').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('qris-form').style.display = m === 'QRIS' ? 'block' : 'none';
    document.getElementById('usdt-form').style.display = m === 'USDT' ? 'block' : 'none';
}

function calculateUSDT() {
    const amt = document.getElementById('amount-usdt').value;
    if (amt >= 10) {
        const net = amt - 2;
        const idr = net * KURS_USDT;
        document.getElementById('usdt-calc').innerText = `Diterima: Rp ${idr.toLocaleString()} (${net} USDT)`;
    } else {
        document.getElementById('usdt-calc').innerText = "Minimal $10";
    }
}

async function handleDeposit() {
    const user = await getPlayerData(); // Fungsi dari config.js
    if (!user) return alert("Silakan login kembali.");

    let amount = 0;
    let nominalIDR = 0;
    let nominalCrypto = "-";

    if (currentMethod === 'QRIS') {
        amount = parseInt(document.getElementById('amount-qris').value);
        if (isNaN(amount) || amount < 20000) return alert("Minimal Deposit QRIS Rp 20.000");
        nominalIDR = amount;
    } else {
        const usdtAmount = parseFloat(document.getElementById('amount-usdt').value);
        if (isNaN(usdtAmount) || usdtAmount < 10) return alert("Minimal Deposit USDT $10");
        
        const netUSDT = usdtAmount - 2;
        nominalIDR = netUSDT * KURS_USDT;
        nominalCrypto = `${nominalIDR} (${netUSDT})`;
        amount = nominalIDR;

        // Buka WhatsApp Otomatis
        const msg = `Halo Admin, saya mau konfirmasi deposit USDT.\nUsername: ${user.username}\nJumlah: $${usdtAmount}\nTerima Bersih: $${netUSDT}`;
        window.open(`https://wa.me/${ADMIN_WA}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    // KIRIM KE SUPABASE (Tabel transactions)
    const { error } = await _supabase.from('transactions').insert([{
        username: user.username,
        fullname: user.fullname,
        type: 'DEPOSIT',
        method: currentMethod,
        nominal_idr: nominalIDR,
        nominal_crypto: nominalCrypto,
        amount: amount,
        status: 'PROSES'
    }]);

    if (!error) {
        alert("Permintaan deposit berhasil dikirim! Menunggu persetujuan admin.");
        location.reload();
    } else {
        alert("Gagal mengirim data: " + error.message);
    }
}

async function loadHistory() {
    const user = localStorage.getItem('user_session');
    const { data, error } = await _supabase
        .from('transactions')
        .select('*')
        .eq('username', user)
        .eq('type', 'DEPOSIT')
        .order('tanggal', { ascending: false })
        .limit(5);

    if (data) {
        const container = document.getElementById('depo-history');
        container.innerHTML = data.map(item => `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between; font-size:12px;">
                    <span>${new Date(item.tanggal).toLocaleString()}</span>
                    <span class="status-${item.status.toLowerCase()}">${item.status}</span>
                </div>
                <div style="margin-top:5px; font-weight:bold;">
                    ${item.method === 'USDT' ? '$' + item.nominal_crypto.split('(')[1].replace(')','') : 'Rp ' + item.nominal_idr.toLocaleString()}
                </div>
                <div style="font-size:10px; opacity:0.6;">Metode: ${item.method}</div>
            </div>
        `).join('');
    }
}

window.onload = loadHistory;
</script>

</body>
</html>
