<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>DEPOSIT - NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --pink: #ff0077; --blue: #0055ff; --bg: #02030d; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; padding: 20px; text-align: center; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--blue); padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--pink); color: #fff; border-radius: 8px; text-align: center; }
        .btn-depo { width: 100%; padding: 15px; background: var(--blue); border: none; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; box-shadow: 0 0 15px var(--blue); }
        .qris-img { width: 200px; height: 200px; background: #fff; margin: 15px auto; border-radius: 10px; padding: 10px; }
    </style>
</head>
<body>

    <h2>TOP UP SALDO</h2>
    <div class="card">
        <p style="font-size: 12px; opacity: 0.7;">Silahkan scan QRIS di bawah dan isi form konfirmasi.</p>
        
        <div class="qris-img">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=NEON-PLINKO-VIP" alt="QRIS" width="100%">
        </div>

        <label>Nominal Deposit (IDR)</label>
        <input type="number" id="depo-amount" placeholder="Contoh: 50000">
        
        <select id="depo-method" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--blue);">
            <option value="QRIS">QRIS ALL PAYMENT</option>
            <option value="DANA">TRANSFER DANA</option>
            <option value="BANK">TRANSFER BANK</option>
        </select>

        <button class="btn-depo" onclick="kirimDeposit()">KONFIRMASI PEMBAYARAN</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        async function kirimDeposit() {
            const amt = document.getElementById('depo-amount').value;
            const met = document.getElementById('depo-method').value;
            
            if(amt < 10000) return alert("Minimal deposit Rp 10.000");

            const { success, message } = await TransaksiAPI.submitDeposit(amt, met);
            
            if(success) {
                alert("Deposit diajukan! Saldo akan masuk setelah admin memverifikasi.");
                window.location.href = 'game.html';
            } else {
                alert("Gagal: " + message);
            }
        }
    </script>
</body>
</html>
