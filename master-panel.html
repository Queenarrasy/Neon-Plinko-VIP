<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PANEL - NEON PLINKO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { background: #05060f; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #101223; border: 1px solid #00d4ff; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        th { background: #00d4ff; color: black; }
        .btn { padding: 5px 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-approve { background: #00ff88; color: black; }
    </style>
</head>
<body>
    <h1>NEON MASTER PANEL</h1>
    
    <div class="card">
        <h3>ANTREAN DEPOSIT</h3>
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Nominal</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="depo-list"></tbody>
        </table>
    </div>

    <script>
        async function loadDashboard() {
            // Cek apakah benar Admin
            const user = getUsername();
            const { data: profile } = await _supabase.from('profiles').select('role').eq('username', user).single();
            
            if (!profile || profile.role !== 'ADMIN') {
                alert("Bukan Admin!"); window.location.href = "game.html";
                return;
            }

            // Ambil data deposit PROSES
            const { data: depos } = await _supabase.from('deposits').select('*').eq('status', 'PROSES');
            const list = document.getElementById('depo-list');
            list.innerHTML = "";
            depos.forEach(d => {
                list.innerHTML += `<tr>
                    <td>${d.username}</td>
                    <td>Rp ${d.nominal.toLocaleString()}</td>
                    <td><button class="btn btn-approve" onclick="approve('${d.id}', '${d.username}', ${d.nominal})">APPROVE</button></td>
                </tr>`;
            });
        }

        async function approve(id, user, amt) {
            const { error } = await _supabase.rpc('approve_deposit_logic', { row_id: id, target_user: user, amount: amt });
            if (!error) { alert("Berhasil!"); loadDashboard(); }
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
