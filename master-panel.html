<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON MASTER - SUPABASE ADMIN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; 
            --bg: #05060f; --green: #00ff88; --orange: #ff8800; --red: #ff0000;
            --neon-pink: 0 0 15px var(--pink);
            --neon-blue: 0 0 15px var(--blue);
            --neon-yellow: 0 0 15px var(--yellow);
        }

        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; 
            padding: 20px; margin: 0; overflow-x: hidden;
        }

        .header { 
            text-align: center; padding: 15px; border: 2px solid var(--blue); 
            box-shadow: var(--neon-blue); border-radius: 15px; margin-bottom: 20px; 
        }

        /* PANIC AREA */
        .panic-container {
            background: rgba(255, 0, 0, 0.05); border: 2px dashed var(--pink);
            padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 20px;
        }
        .btn-panic {
            background: #000; color: white; border: 2px solid var(--pink);
            padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px;
        }
        .btn-panic:hover { background: var(--pink); box-shadow: var(--neon-pink); }

        /* DEPOSIT PANEL */
        .depo-panel {
            border: 1px solid var(--green); background: rgba(0, 255, 136, 0.03);
            border-radius: 12px; padding: 10px; margin-bottom: 20px;
        }
        .depo-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .depo-table th { color: var(--green); text-align: left; padding: 8px; border-bottom: 1px solid #333; }
        .depo-table td { padding: 8px; border-bottom: 1px solid #222; }

        /* USER MONITOR */
        .user-box { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--blue); 
            padding: 12px; margin-top: 10px; border-radius: 12px;
        }
        .username { color: var(--blue); font-size: 14px; font-weight: bold; text-shadow: var(--neon-blue); }
        .balance-val { font-weight: bold; font-size: 16px; color: var(--green); }
        
        .status-online { color: var(--green); font-size: 9px; border: 1px solid var(--green); padding: 1px 4px; border-radius: 3px; }
        .status-offline { color: #555; font-size: 9px; border: 1px solid #333; padding: 1px 4px; border-radius: 3px; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .select-wr { background: #000; color: var(--yellow); border: 1px solid var(--yellow); padding: 5px; border-radius: 5px; grid-column: span 2; }
        .btn-action { background: #111; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 5px; cursor: pointer; font-size: 10px; }

        #toast { 
            visibility: hidden; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: var(--blue); color: #000; padding: 10px 20px; border-radius: 8px; font-weight: bold; z-index: 2000;
        }
        #toast.show { visibility: visible; }
        
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0b1a; border: 2px solid var(--blue); padding: 20px; z-index: 1000; border-radius: 10px; text-align: center; width: 280px;}
    </style>
</head>
<body>

    <div class="panic-container">
        <h3 style="color:var(--pink); font-size:12px; margin-bottom:10px;">GLOBAL SYSTEM CONTROL</h3>
        <button class="btn-panic" onclick="globalPanic(10)">ACTIVATE PANIC (WR 10%)</button>
        <button class="btn-panic" style="border-color:var(--blue)" onclick="globalPanic(50)">RESTORE NORMAL (WR 50%)</button>
        <div id="panic-status" style="font-size:10px; color:var(--yellow); margin-top:10px;">SYSTEM STATUS: STABLE</div>
    </div>

    <div class="depo-panel">
        <h3 style="color:var(--green); font-size:12px; margin:0 0 10px 0;">PENDING DEPOSITS</h3>
        <div id="depo-list">Memuat antrean deposit...</div>
    </div>

    <div class="header">
        <h2 style="margin:0; font-size:16px; color:var(--pink);">LIVE MONITOR</h2>
        <div id="clock" style="font-size:10px; color:var(--yellow);"></div>
    </div>

    <div id="user-display"></div>

    <div class="overlay" id="overlay"></div>
    <div class="modal" id="modal">
        <h4 id="modal-title" style="color:var(--blue)">ADJUST</h4>
        <input type="number" id="modal-input" style="width:100%; padding:10px; margin:10px 0; background:#000; border:1px solid var(--blue); color:#fff;">
        <button id="modal-confirm" style="background:var(--blue); padding:10px; border:none; width:100%; font-weight:bold;">CONFIRM</button>
        <button onclick="closeModal()" style="background:none; color:#555; border:none; margin-top:10px;">Cancel</button>
    </div>

    <div id="toast">ACTION SUCCESS</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        // Memastikan hanya admin yang bisa akses (Opsional: Tambahkan login admin)
        
        async function fetchAllData() {
            // 1. Fetch Users
            const { data: users, error: errU } = await _supabase
                .from('profiles')
                .select('*')
                .order('last_active', { ascending: false });
            
            if(users) renderUsers(users);

            // 2. Fetch Pending Deposits
            // Kita asumsikan ada tabel 'deposits' dengan kolom 'status'
            const { data: depos, error: errD } = await _supabase
                .from('deposits')
                .select('*')
                .eq('status', 'PROSES');
            
            if(depos) renderDeposits(depos);
        }

        function renderDeposits(depos) {
            const container = document.getElementById('depo-list');
            if(depos.length === 0) {
                container.innerHTML = '<p style="font-size:10px; color:#444; text-align:center;">Tidak ada deposit pending.</p>';
                return;
            }

            let html = '<table class="depo-table"><tr><th>USER</th><th>JUMLAH</th><th>AKSI</th></tr>';
            depos.forEach(d => {
                html += `
                    <tr>
                        <td>${d.username}</td>
                        <td style="color:var(--green)">IDR ${d.nominal.toLocaleString()}</td>
                        <td><button onclick="approveDepo('${d.id}', '${d.username}', ${d.nominal})" style="background:var(--green); border:none; font-size:9px; padding:3px 7px; border-radius:3px; font-weight:bold;">APPROVE</button></td>
                    </tr>
                `;
            });
            container.innerHTML = html + '</table>';
        }

        function renderUsers(users) {
            const container = document.getElementById('user-display');
            container.innerHTML = '';

            users.forEach(u => {
                const isOnline = (new Date() - new Date(u.last_active)) < 60000; // Aktif dalam 1 menit terakhir
                const div = document.createElement('div');
                div.className = 'user-box';
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <span class="username">${u.username.toUpperCase()}</span>
                            <span class="${isOnline ? 'status-online' : 'status-offline'}">${isOnline ? 'ONLINE' : 'OFFLINE'}</span>
                            <div style="font-size:9px; color:#666;">Tier: ${u.tier || 'MEMBER'}</div>
                        </div>
                        <div style="text-align:right">
                            <div class="balance-val">IDR ${u.saldo.toLocaleString()}</div>
                            <div style="font-size:10px; color:var(--yellow)">WR: ${u.winrate}% | Limit: ${u.max_win_limit || 0}</div>
                        </div>
                    </div>
                    <div class="controls">
                        <select class="select-wr" onchange="updateWinrate('${u.username}', this.value)">
                            <option value="">-- GANTI WINRATE --</option>
                            <option value="5">5% (KURAS TOTAL)</option>
                            <option value="25">25% (KETAT)</option>
                            <option value="50">50% (NORMAL)</option>
                            <option value="80">80% (GACOR)</option>
                            <option value="100">100% (JP PASTI)</option>
                        </select>
                        <button class="btn-action" onclick="openAdjust('${u.username}', 'saldo')"><i class="fas fa-coins"></i> INJECT SALDO</button>
                        <button class="btn-action" onclick="openAdjust('${u.username}', 'limit')"><i class="fas fa-shield"></i> SET MAXWIN</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // --- ACTIONS ---

        async function approveDepo(depoId, username, amount) {
            if(!confirm(`Approve IDR ${amount.toLocaleString()} untuk ${username}?`)) return;

            // 1. Update status deposit
            await _supabase.from('deposits').update({ status: 'BERHASIL' }).eq('id', depoId);
            
            // 2. Tambah saldo user (Menggunakan RPC agar aman)
            const { error } = await _supabase.rpc('admin_add_saldo', { 
                target_user: username, 
                amount_to_add: amount 
            });

            if(!error) {
                showToast("DEPOSIT APPROVED ✅");
                fetchAllData();
            }
        }

        async function updateWinrate(username, newRate) {
            const { error } = await _supabase
                .from('profiles')
                .update({ winrate: parseInt(newRate) })
                .eq('username', username);
            
            if(!error) showToast(`WR ${username} -> ${newRate}%`);
        }

        async function globalPanic(rate) {
            const label = rate < 20 ? "AKTIF" : "NORMAL";
            if(!confirm(`Set SEMUA User ke WR ${rate}%?`)) return;

            const { error } = await _supabase
                .from('profiles')
                .update({ winrate: rate })
                .not('username', 'eq', 'admin'); // Jangan ubah admin

            if(!error) {
                document.getElementById('panic-status').innerText = `SYSTEM STATUS: ${label} (${rate}%)`;
                showToast("GLOBAL WR UPDATED");
                fetchAllData();
            }
        }

        // --- UI & MODALS ---

        function openAdjust(username, type) {
            document.getElementById('modal-title').innerText = `ADJUST ${type.toUpperCase()}: ${username}`;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            
            document.getElementById('modal-confirm').onclick = async () => {
                const val = parseInt(document.getElementById('modal-input').value);
                if(type === 'saldo') {
                    await _supabase.rpc('admin_set_saldo', { target_user: username, new_amount: val });
                } else {
                    await _supabase.from('profiles').update({ max_win_limit: val }).eq('username', username);
                }
                closeModal();
                showToast("UPDATE SUCCESS");
                fetchAllData();
            };
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('modal').style.display = 'none';
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = 'show';
            setTimeout(() => t.className = '', 3000);
        }

        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleString(); 
        }, 1000);

        window.onload = () => {
            fetchAllData();
            setInterval(fetchAllData, 5000); // Auto sync per 5 detik
        };
    </script>
</body>
</html>
