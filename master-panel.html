<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON MASTER CONTROL - V4.6 ULTIMATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; 
            --bg: #05060f; --green: #00ff88; --orange: #ff8800; --red: #ff0000;
            --neon-pink: 0 0 15px var(--pink);
            --neon-blue: 0 0 15px var(--blue);
            --neon-yellow: 0 0 15px var(--yellow);
            --neon-green: 0 0 15px var(--green);
        }

        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; 
            padding: 20px; margin: 0; overflow-x: hidden;
        }

        /* --- UI COMPONENTS --- */
        .header { 
            text-align: center; padding: 15px; border: 2px solid var(--blue); 
            box-shadow: var(--neon-blue), inset 0 0 10px var(--blue); 
            border-radius: 15px; background: rgba(0, 212, 255, 0.05); margin-bottom: 20px; 
        }
        .header h2 { margin: 0; color: var(--pink); text-shadow: var(--neon-pink); text-transform: uppercase; letter-spacing: 2px; font-size: 18px; }

        /* PANIC AREA - SESSION TIMER */
        .panic-container {
            background: rgba(255, 0, 0, 0.05); border: 2px dashed var(--pink);
            padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 20px;
            box-shadow: inset 0 0 15px rgba(255, 0, 119, 0.2);
        }
        .panic-grid { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .btn-panic-timer {
            background: #000; color: white; border: 2px solid var(--pink);
            padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: 0.3s; font-size: 12px;
        }
        .btn-panic-timer:hover { background: var(--pink); box-shadow: var(--neon-pink); }
        .panic-status { font-size: 11px; margin-top: 10px; color: var(--yellow); font-weight: bold; text-transform: uppercase; }

        /* DEPOSIT PANEL */
        .depo-panel {
            border: 1px solid var(--green); background: rgba(0, 255, 136, 0.03);
            border-radius: 12px; padding: 10px; margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0,255,136,0.1);
        }
        .depo-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .depo-table th { color: var(--green); text-align: left; padding: 8px; border-bottom: 1px solid #333; }
        .depo-table td { padding: 8px; border-bottom: 1px solid #222; }
        .btn-approve {
            background: var(--green); color: black; border: none; padding: 5px 10px;
            border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 10px;
        }

        /* USER MONITOR */
        .user-box { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--blue); 
            padding: 12px; margin-top: 10px; border-radius: 12px; transition: 0.4s;
        }
        .user-info { display: flex; justify-content: space-between; align-items: center; }
        .username { color: var(--blue); font-size: 14px; font-weight: bold; text-shadow: var(--neon-blue); }
        .balance-val { font-weight: bold; font-size: 16px; transition: 0.5s; }
        .balance-up { color: var(--green); text-shadow: 0 0 10px var(--green); }
        .balance-down { color: var(--pink); text-shadow: 0 0 10px var(--pink); }
        
        .status-badge { font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 5px; }
        .status-online { color: var(--green); border: 1px solid var(--green); }
        .status-offline { color: #555; border: 1px solid #333; }

        /* CONTROLS */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .select-strategy {
            background: #000; color: var(--yellow); border: 1px solid var(--yellow); 
            padding: 8px; border-radius: 6px; font-size: 10px; grid-column: span 2;
        }
        .btn-action { 
            background: #000; color: white; border: 1px solid #444; 
            padding: 8px; border-radius: 6px; font-size: 9px; cursor: pointer; font-weight: bold;
        }

        /* MODALS & TOAST */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; backdrop-filter: blur(5px); }
        .neon-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 80%; max-width: 320px; background: #0a0b1a; border: 2px solid var(--yellow); 
            box-shadow: var(--neon-yellow); border-radius: 15px; padding: 20px; z-index: 1000; text-align: center;
        }
        #toast { 
            visibility: hidden; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: var(--blue); color: black; padding: 10px 20px; border-radius: 8px; font-weight: bold; z-index: 2000;
        }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

    <div class="panic-container">
        <h3 style="color:var(--pink); text-shadow: var(--neon-pink); font-size:11px; margin:0;">
            <i class="fas fa-radiation"></i> GLOBAL PANIC SESSION (WR 10%)
        </h3>
        <div class="panic-grid">
            <button class="btn-panic-timer" onclick="startPanicSession(3)">3 MIN</button>
            <button class="btn-panic-timer" onclick="startPanicSession(5)">5 MIN</button>
            <button class="btn-panic-timer" style="border-color:var(--blue)" onclick="stopPanicSession()">OFF</button>
        </div>
        <div id="panic-timer-display" class="panic-status">STATUS: SYSTEM SECURE</div>
    </div>

    <div class="depo-panel">
        <h3 style="color:var(--green); font-size:12px; margin:0 0 10px 0; text-transform: uppercase;">
            <i class="fas fa-wallet"></i> Pending Deposits
        </h3>
        <div id="depo-list">
            <p style="font-size:10px; color:#666; text-align:center;">Checking for requests...</p>
        </div>
    </div>

    <div class="header">
        <h2>LIVE PLAYER MONITOR</h2>
        <div id="clock" style="font-size:10px; color:var(--yellow); margin-top:5px;"></div>
    </div>

    <div id="display-area">
        </div>

    <div class="overlay" id="common-overlay"></div>
    <div class="neon-modal" id="common-modal">
        <h3 id="modal-title" style="color:var(--blue); font-size:16px;">TITLE</h3>
        <input type="number" id="modal-input" style="width:80%; padding:10px; margin:15px 0; background:#000; border:1px solid var(--blue); color:#fff; text-align:center;">
        <div style="display:flex; gap:10px; justify-content:center;">
            <button id="modal-ok-btn" style="background:var(--blue); border:none; padding:10px 15px; border-radius:5px; font-weight:bold;">CONFIRM</button>
            <button onclick="closeModal()" style="background:#333; color:#fff; border:none; padding:10px 15px; border-radius:5px;">CANCEL</button>
        </div>
    </div>

    <div id="toast">SYSTEM UPDATED</div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzYTC11njbEBtAsdpbaRLJRt13j7iEKCkANV1SgxxguV_zFUyZ6Z7FAj0SKuw4d5ThmKw/exec";
        let isProcessing = false;
        let lastBalances = {};

        // --- FETCH SEMUA DATA (USER & DEPO) ---
        async function fetchMasterData() {
            if (isProcessing) return;
            try {
                // Fetch Users
                const resUser = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getAllUsers" }) });
                const users = await resUser.json();
                renderUsers(users);

                // Fetch Deposits
                const resDepo = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "get_pending_deposits" }) });
                const deposits = await resDepo.json();
                renderDeposits(deposits);

            } catch(e) { console.error("Sync Error"); }
        }

        // --- RENDER DEPOSITS ---
        function renderDeposits(data) {
            const container = document.getElementById('depo-list');
            if (!data || data.length === 0) {
                container.innerHTML = `<p style="font-size:10px; color:#444; text-align:center;">No pending deposits.</p>`;
                return;
            }

            let html = `<table class="depo-table">
                <tr><th>USER</th><th>NOMINAL</th><th>AKSI</th></tr>`;
            
            data.forEach(d => {
                html += `
                <tr>
                    <td>${d.username}</td>
                    <td style="color:var(--green)">${Number(d.nominal).toLocaleString()}</td>
                    <td><button class="btn-approve" onclick="approveDeposit(${d.row})">OK</button></td>
                </tr>`;
            });
            container.innerHTML = html + `</table>`;
        }

        // --- RENDER USERS ---
        function renderUsers(users) {
            const area = document.getElementById('display-area');
            users.forEach(u => {
                let userDiv = document.getElementById(`user-${u.username}`);
                const currentSaldo = Number(u.saldo);
                const oldSaldo = lastBalances[u.username] || currentSaldo;
                
                let balanceClass = "";
                if (currentSaldo > oldSaldo) balanceClass = "balance-up";
                else if (currentSaldo < oldSaldo) balanceClass = "balance-down";
                
                lastBalances[u.username] = currentSaldo;

                if (!userDiv) {
                    userDiv = document.createElement('div');
                    userDiv.id = `user-${u.username}`;
                    userDiv.className = 'user-box';
                    area.appendChild(userDiv);
                }

                const isOnline = u.status.toLowerCase() === 'online' || u.status.toLowerCase() === 'active';

                userDiv.innerHTML = `
                    <div class="user-info">
                        <div>
                            <span class="username">${u.username.toUpperCase()}</span>
                            <span class="status-badge ${isOnline ? 'status-online' : 'status-offline'}">${u.status}</span>
                        </div>
                        <div class="balance-val ${balanceClass}">IDR ${currentSaldo.toLocaleString()}</div>
                    </div>
                    <div class="controls">
                        <select class="select-strategy" onchange="updateWR('${u.username}', this.value)">
                            <option value="">WR SEKARANG: ${u.winrate}%</option>
                            <option value="3">3% - KURAS TOTAL</option>
                            <option value="40">40% - KURAS HALUS</option>
                            <option value="50">50% - FAIR PLAY</option>
                            <option value="75">75% - GACOR</option>
                            <option value="100">100% - PASTI JP</option>
                        </select>
                        <button class="btn-action btn-inject" onclick="prepareInject('${u.username}')">ADJUST CREDIT</button>
                        <button class="btn-action btn-maxwin" onclick="prepareMaxwin('${u.username}')">SET MAXWIN</button>
                    </div>
                `;
            });
        }

        // --- ACTIONS ---
        async function startPanicSession(min) {
            if(!confirm(`Aktifkan Panic ${min} menit? WR semua pemain jadi 10%.`)) return;
            showToast("INITIATING PANIC...");
            await callAPI({ action: "set_global_panic", minutes: min });
            document.getElementById('panic-timer-display').innerText = `STATUS: PANIC ACTIVE (${min} MIN)`;
        }

        async function stopPanicSession() {
            await callAPI({ action: "set_global_panic", minutes: 0 });
            document.getElementById('panic-timer-display').innerText = `STATUS: SYSTEM SECURE`;
            showToast("PANIC DEACTIVATED");
        }

        async function approveDeposit(row) {
            if(!confirm("Setujui deposit ini? Saldo akan masuk otomatis.")) return;
            showToast("PROCESSING DEPO...");
            const res = await callAPI({ action: "approve_deposit", row: row });
            if(res.result === "SUCCESS") showToast("DEPOSIT BERHASIL!");
            fetchMasterData();
        }

        async function updateWR(user, rate) {
            if(!rate) return;
            await callAPI({ action: "updateWinrate", targetUser: user, newRate: rate });
            showToast(`WR ${user} -> ${rate}%`);
        }

        function prepareInject(user) {
            showModal(`ADJUST SALDO: ${user}`, (val) => {
                callAPI({ action: "adminUpdateSaldo", targetUser: user, amount: val }).then(() => fetchMasterData());
            });
        }

        function prepareMaxwin(user) {
            showModal(`SET LIMIT JP: ${user}`, (val) => {
                callAPI({ action: "setMaxwinLimit", targetUser: user, maxwin: val }).then(() => fetchMasterData());
            });
        }

        // --- HELPERS ---
        async function callAPI(payload) {
            isProcessing = true;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const json = await res.json();
                isProcessing = false;
                return json;
            } catch(e) { isProcessing = false; return {result: "ERROR"}; }
        }

        function showModal(title, cb) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-input').value = "";
            document.getElementById('common-overlay').style.display = "block";
            document.getElementById('common-modal').style.display = "block";
            document.getElementById('modal-ok-btn').onclick = () => { cb(document.getElementById('modal-input').value); closeModal(); };
        }

        function closeModal() {
            document.getElementById('common-overlay').style.display = "none";
            document.getElementById('common-modal').style.display = "none";
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        // --- LOOP ---
        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleString('id-ID'); 
        }, 1000);
        
        window.onload = () => {
            fetchMasterData();
            setInterval(fetchMasterData, 4000); // Sync setiap 4 detik
        };
    </script>
</body>
</html>
