<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER PANEL - NEON VIP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { background: #02030d; color: white; font-family: 'Outfit', sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .header { border-bottom: 2px solid #ff0077; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .card { background: #050614; border: 1px solid #0044ff; padding: 20px; border-radius: 15px; box-shadow: 0 0 15px rgba(0,68,255,0.2); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #1a1b2e; }
        th { color: #0044ff; text-transform: uppercase; font-size: 12px; }
        .btn-logout { background: #ff0077; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .btn-approve { background: #00ff88; color: black; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>NEON <span style="color:#ff0077">MASTER</span> PANEL</h2>
            <button class="btn-logout" onclick="logout()">LOGOUT</button>
        </div>

        <div class="card">
            <h3>ANTREAN DEPOSIT</h3>
            <table id="table-depo">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Nominal</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="list-depo">
                    <tr><td colspan="3" style="text-align:center;">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadData() {
            const user = getUsername();
            // Validasi Admin
            const { data: profile } = await _supabase.from('profiles').select('role').eq('username', user).single();
            if (!profile || profile.role !== 'ADMIN') {
                alert("Akses Ditolak!"); window.location.href = 'index.html';
                return;
            }

            // Ambil List Deposit
            const { data: depos } = await _supabase.from('deposits').select('*').eq('status', 'PROSES');
            const tbody = document.getElementById('list-depo');
            tbody.innerHTML = depos.length === 0 ? '<tr><td colspan="3" style="text-align:center;">Tidak ada deposit pending.</td></tr>' : '';
            
            depos.forEach(d => {
                tbody.innerHTML += `
                    <tr>
                        <td>${d.username}</td>
                        <td style="color:#00ff88">IDR ${d.nominal.toLocaleString()}</td>
                        <td><button class="btn-approve" onclick="approve('${d.id}', '${d.username}', ${d.nominal})">APPROVE</button></td>
                    </tr>
                `;
            });
        }

        async function approve(id, user, amt) {
            const { error } = await _supabase.rpc('approve_deposit_logic', { row_id: id, target_user: user, amount: amt });
            if (!error) {
                alert("Deposit Berhasil Disetujui!");
                loadData();
            } else {
                alert("Error: " + error.message);
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
