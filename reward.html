<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>REWARD — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        /* ── ROOT VARIABLES ── */
        :root {
            --pink:   #ff0077;
            --blue:   #0022ff;
            --yellow: #fbff00;
            --bg:     #000005;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            padding-bottom: 90px;
        }

        /* ── PARTICLES BG ── */
        #particles-js {
            position: fixed; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
            background: radial-gradient(circle at 50% 20%, #0a0015 0%, #000 100%);
        }

        /* ── ALERT ── */
        #neon-alert {
            position: fixed; top: -120px; left: 50%; transform: translateX(-50%);
            width: 88%; max-width: 340px;
            background: rgba(0,0,15,.97);
            border: 1.5px solid var(--pink); border-top: 2px solid var(--yellow);
            color: #fff; padding: 12px 18px; border-radius: 14px;
            text-align: center; font-weight: 900; z-index: 9000; font-size: 13px;
            transition: .5s cubic-bezier(.175,.885,.32,1.275);
            box-shadow: 0 0 18px rgba(255,0,119,.35);
        }
        #neon-alert.show { top: 15px; }

        /* ── HEADER ── */
        .header {
            height: 62px; padding: 0 18px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,18,.98);
            border-bottom: 1.5px solid var(--pink);
            position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 15px rgba(255,0,119,.15);
        }
        .logo {
            font-size: 14px; font-weight: 900; color: var(--pink);
            text-shadow: 0 0 8px rgba(255,0,119,.5);
            letter-spacing: 1px; text-transform: uppercase;
        }
        .saldo-badge {
            background: rgba(0,0,0,.7);
            border: 1.5px solid var(--yellow);
            padding: 5px 13px; border-radius: 50px;
            font-size: 11px; font-weight: 900; color: var(--yellow);
        }

        /* ── CONTAINER ── */
        .container { padding: 18px; max-width: 500px; margin: auto; position: relative; z-index: 10; }

        /* ── DEBUG PANEL ── */
        #debug-panel {
            background: rgba(255,150,0,.08);
            border: 1.5px solid rgba(255,150,0,.4);
            border-radius: 16px; padding: 14px; margin-bottom: 14px;
            font-size: 10px; color: rgba(255,200,100,.85);
            word-break: break-all; line-height: 1.8; display: none;
        }
        #debug-panel.show { display: block; }
        #debug-panel .debug-title { font-size: 11px; font-weight: 900; color: #ffaa00; margin-bottom: 8px; letter-spacing: 1px; }
        #debug-panel .debug-line { padding: 2px 0; border-bottom: 1px solid rgba(255,150,0,.1); }

        /* ── MANUAL LOGIN PANEL ── */
        #manual-login-panel {
            background: rgba(0,34,255,.08);
            border: 1.5px solid rgba(0,34,255,.4);
            border-radius: 16px; padding: 18px; margin-bottom: 14px; display: none;
        }
        #manual-login-panel.show { display: block; }
        .ml-title {
            font-size: 11px; font-weight: 900; color: var(--yellow);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 12px; text-align: center;
        }
        .ml-subtitle {
            font-size: 10px; color: rgba(255,255,255,.5);
            text-align: center; margin-bottom: 12px; line-height: 1.5;
        }
        .ml-input {
            width: 100%; background: rgba(0,0,0,.6);
            border: 1.5px solid rgba(0,34,255,.5);
            border-radius: 12px; padding: 12px 16px;
            color: #fff; font-size: 13px; font-weight: 700;
            font-family: 'Outfit', sans-serif; outline: none; margin-bottom: 10px;
        }

        /* ── USER INFO BAR ── */
        .user-info-bar {
            background: rgba(0,255,136,.06);
            border: 1px solid rgba(0,255,136,.25);
            border-radius: 12px; padding: 8px 14px; margin-bottom: 14px;
            display: flex; align-items: center; justify-content: space-between; font-size: 10px;
        }
        .user-info-bar .u-val   { color: #00ff88; font-weight: 900; }
        .btn-logout {
            background: rgba(255,0,119,.15); border: 1px solid rgba(255,0,119,.3);
            color: var(--pink); border-radius: 20px; padding: 4px 10px;
            font-size: 9px; font-weight: 900; cursor: pointer;
        }

        /* ── STATS & CARDS ── */
        .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
        .stat-card {
            background: rgba(0,0,35,.75);
            border: 1px solid rgba(0,34,255,.35);
            border-radius: 16px; padding: 12px 8px; text-align: center; backdrop-filter: blur(10px);
        }
        .stat-card small { display: block; font-size: 8px; color: var(--yellow); margin-bottom: 6px; font-weight: 900; }
        .stat-card span  { font-weight: 900; color: #fff; font-size: 1.2rem; }

        .ref-code-card {
            background: rgba(0,0,35,.75);
            border: 1.5px solid rgba(251,255,0,.3);
            border-radius: 20px; padding: 18px; margin-bottom: 16px;
            text-align: center; backdrop-filter: blur(10px);
        }
        .ref-code-display {
            background: rgba(0,0,0,.7); border: 2px dashed rgba(251,255,0,.5);
            border-radius: 14px; padding: 16px; margin: 12px 0; cursor: pointer;
        }
        #ref-code { font-size: 1.6rem; font-weight: 900; color: var(--yellow); letter-spacing: 6px; }

        .btn-main {
            width: 100%; padding: 14px; border: none; border-radius: 50px;
            color: #fff; font-weight: 900; font-size: 13px; cursor: pointer;
            text-transform: uppercase; transition: .3s; font-family: 'Outfit', sans-serif;
        }
        .btn-pink   { background: linear-gradient(90deg,var(--pink),#b400dc); }
        .btn-blue   { background: linear-gradient(90deg,var(--blue),#0044ff); }
        .btn-yellow { background: linear-gradient(90deg,#b8a000,var(--yellow)); color: #000; }
        .btn-green  { background: linear-gradient(90deg,#00aa44,#00ff88); color: #000; }

        /* ── TABLE ── */
        .hist-outer {
            background: rgba(0,0,25,.85); border: 1.5px solid rgba(0,34,255,.5);
            border-radius: 18px; overflow: hidden;
        }
        .hist-scroll-body { max-height: 250px; overflow-y: auto; }
        table.ht { width: 100%; border-collapse: collapse; table-layout: fixed; }
        table.ht th { padding: 12px 6px; font-size: 8px; font-weight: 900; background: rgba(255,255,255,.05); color: var(--yellow); text-align: center; }
        table.ht td { padding: 10px 4px; text-align: center; border-bottom: 1px solid rgba(255,255,255,.05); font-size: 10px; }
        .h-empty { padding: 30px; opacity: 0.5; font-size: 11px; }

        /* ── MODAL ── */
        #modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.9); z-index: 9999;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .modal-box { width: 88%; max-width: 320px; background: #000; border: 2px solid var(--pink); border-radius: 20px; padding: 25px; text-align: center; }

        /* ── NAV ── */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 72px;
            background: rgba(0,0,15,.99); display: flex; border-top: 1.5px solid var(--blue); z-index: 1000;
        }
        .nav-item { flex: 1; color: rgba(255,255,255,.3); text-decoration: none; text-align: center; font-size: 9px; font-weight: 900; padding-top: 15px; }
        .nav-item.active { color: var(--yellow); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="neon-alert"></div>
<div id="particles-js"></div>

<div class="header">
    <a href="game.html" style="color:rgba(255,255,255,.6);font-size:20px;"><i class="fa-solid fa-chevron-left"></i></a>
    <div class="logo">REWARD CENTER</div>
    <div class="saldo-badge">IDR <span id="display-saldo">0</span></div>
</div>

<div class="container">
    <div class="user-info-bar" id="user-info-bar" style="display:none;">
        <div>Login: <span class="u-val" id="user-info-name">—</span></div>
        <button class="btn-logout" onclick="logoutUser()">Logout</button>
    </div>

    <div id="manual-login-panel">
        <div class="ml-title">LOGIN USERNAME</div>
        <input type="text" class="ml-input" id="manual-username-input" placeholder="Masukkan username game anda">
        <button class="btn-main btn-green" onclick="submitManualLogin()">MULAI AKSES</button>
    </div>

    <div id="debug-panel">
        <div class="debug-title">DEBUG SYSTEM</div>
        <div id="debug-lines"></div>
    </div>

    <div class="stats-row">
        <div class="stat-card"><small>TOTAL UNDANGAN</small><span id="total-ref">0</span></div>
        <div class="stat-card"><small>AKTIF</small><span id="active-ref">0</span></div>
        <div class="stat-card"><small>KOMISI (IDR)</small><span id="total-komisi">0</span></div>
    </div>

    <div class="ref-code-card">
        <div class="ref-code-title">KODE REFERRAL ANDA</div>
        <div class="ref-code-display" onclick="copyRefCode()">
            <div id="ref-code">LOAD...</div>
        </div>
        <button class="btn-main btn-blue" onclick="shareWA()" style="margin-bottom:10px;"><i class="fab fa-whatsapp"></i> BAGIKAN WA</button>
        <div id="ref-link" style="font-size:9px; color:#5599ff; word-break:break-all;"></div>
    </div>

    <div class="hist-outer">
        <table class="ht">
            <thead>
                <tr>
                    <th>USER</th>
                    <th>STATUS</th>
                    <th>KOMISI</th>
                </tr>
            </thead>
            <tbody id="history-body">
                <tr><td colspan="3"><div class="h-empty">Silakan Login...</div></td></tr>
            </tbody>
        </table>
    </div>

    <div style="margin-top:20px;">
        <h4 style="font-size:12px; color:var(--pink); margin-bottom:10px;">KOTAK MASUK</h4>
        <div id="inbox-container">
            <div class="h-empty">Tidak ada pesan.</div>
        </div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-box">
        <h3 id="m-title" style="color:var(--yellow); margin-bottom:10px;">NOTIFIKASI</h3>
        <p id="m-msg" style="font-size:13px; line-height:1.5;"></p>
        <button class="btn-main btn-pink" onclick="closeModal()" style="margin-top:15px;">OK</button>
    </div>
</div>

<div class="nav-bar">
    <a href="game.html" class="nav-item"><i class="fas fa-gamepad"></i>PLAY</a>
    <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i>DEPO</a>
    <a href="withdraw.html" class="nav-item"><i class="fas fa-money-bill-transfer"></i>WD</a>
    <a href="reward.html" class="nav-item active"><i class="fas fa-gift"></i>REWARD</a>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG & CLIENT
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://jcxgankdwfwfnbwlkkpz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjeGdhbmtkd2Z3Zm5id2xra3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDU0MjMsImV4cCI6MjA5MDgyMTQyM30.qBNQNZxeHLfG7U-HZDSkYg1Y4awPKcJ7J2XjnkiJ6PI';
const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUsername = '';
let userData = { saldo: 0, refCode: '', totalReferral: 0 };

// ═══════════════════════════════════════════════════════════════
// CORE LOGIC
// ═══════════════════════════════════════════════════════════════

function debugLog(msg, type='info') {
    const lines = document.getElementById('debug-lines');
    const color = type === 'error' ? '#ff4444' : '#00ff88';
    lines.innerHTML += `<div class="debug-line" style="color:${color}">> ${msg}</div>`;
    document.getElementById('debug-panel').classList.add('show');
}

function showAlert(msg) {
    const el = document.getElementById('neon-alert');
    el.innerText = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
}

function getLocalUsername() {
    const keys = ['neon_user', 'username', 'user_session', 'loggedUser'];
    for (let k of keys) {
        let v = localStorage.getItem(k);
        if (v) return v.trim().toLowerCase();
    }
    return null;
}

async function init() {
    debugLog('System Booting...');
    let user = getLocalUsername();
    
    // Cek param URL
    const urlParams = new URLSearchParams(window.location.search);
    const urlUser = urlParams.get('user');
    if (urlUser) user = urlUser.toLowerCase();

    if (!user) {
        debugLog('Session not found. Manual login required.', 'error');
        document.getElementById('manual-login-panel').style.display = 'block';
        return;
    }
    
    await initWithUsername(user);
}

async function initWithUsername(username) {
    currentUsername = username;
    localStorage.setItem('neon_user', username);
    
    document.getElementById('manual-login-panel').style.display = 'none';
    document.getElementById('user-info-bar').style.display = 'flex';
    document.getElementById('user-info-name').innerText = username;

    try {
        debugLog(`Connecting for ${username}...`);
        
        let { data: prof, error } = await _sb.from('profiles').select('*').eq('username', username).maybeSingle();

        if (error) throw error;

        if (!prof) {
            debugLog('User not in DB. Creating profile...', 'info');
            const code = 'VIP' + Math.random().toString(36).substring(2, 7).toUpperCase();
            const { data: neu, error: err2 } = await _sb.from('profiles').insert({
                username: username, referral_code: code, saldo: 0
            }).select().single();
            if (err2) throw err2;
            prof = neu;
        }

        userData = prof;
        updateUI();
        loadReferralHistory();
        loadInbox();
        debugLog('Sync Complete.', 'ok');

    } catch (e) {
        debugLog('Error: ' + e.message, 'error');
    }
}

function updateUI() {
    document.getElementById('display-saldo').innerText = new Intl.NumberFormat().format(userData.saldo);
    document.getElementById('ref-code').innerText = userData.referral_code || '---';
    document.getElementById('total-ref').innerText = userData.total_referral || 0;
    document.getElementById('active-ref').innerText = userData.active_referral || 0;
    document.getElementById('total-komisi').innerText = new Intl.NumberFormat().format(userData.total_komisi || 0);
    
    const link = window.location.origin + '/register.html?ref=' + userData.referral_code;
    document.getElementById('ref-link').innerText = link;
}

async function loadReferralHistory() {
    const tbody = document.getElementById('history-body');
    const { data, error } = await _sb.from('profiles').select('username, created_at, total_deposit_current').eq('referred_by', userData.referral_code);

    if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3"><div class="h-empty">Belum ada undangan.</div></td></tr>';
        return;
    }

    tbody.innerHTML = data.map(r => {
        const isAktif = (r.total_deposit_current >= 20000);
        return `<tr>
            <td>${r.username}</td>
            <td style="color:${isAktif ? '#00ff88' : '#ffaa00'}">${isAktif ? 'AKTIF' : 'PENDING'}</td>
            <td>${isAktif ? '5,000' : '0'}</td>
        </tr>`;
    }).join('');
}

async function loadInbox() {
    const box = document.getElementById('inbox-container');
    const { data } = await _sb.from('inbox').select('*').eq('username', currentUsername).eq('status', 'pending');

    if (!data || data.length === 0) return;

    box.innerHTML = data.map(m => `
        <div style="background:rgba(255,0,119,0.1); border:1px solid var(--pink); padding:10px; border-radius:10px; margin-bottom:10px;">
            <div style="font-size:10px; color:var(--yellow);">${m.pesan}</div>
            <div style="font-weight:900; margin:5px 0;">IDR ${new Intl.NumberFormat().format(m.nominal)}</div>
            <button onclick="claimInbox('${m.id}', ${m.nominal})" class="btn-main btn-pink" style="padding:5px; font-size:10px;">KLAIM</button>
        </div>
    `).join('');
}

async function claimInbox(id, nominal) {
    await _sb.from('inbox').update({ status: 'claimed' }).eq('id', id);
    const newSaldo = userData.saldo + nominal;
    await _sb.from('profiles').update({ saldo: newSaldo }).eq('username', currentUsername);
    showAlert('Bonus diklaim!');
    location.reload();
}

function submitManualLogin() {
    const val = document.getElementById('manual-username-input').value;
    if (val.length < 3) return showAlert('Username terlalu pendek');
    initWithUsername(val.trim().toLowerCase());
}

function logoutUser() {
    localStorage.clear();
    location.reload();
}

function copyRefCode() {
    navigator.clipboard.writeText(userData.referral_code);
    showAlert('Kode disalin!');
}

function shareWA() {
    const link = document.getElementById('ref-link').innerText;
    window.open(`https://wa.me/?text=Main bareng di NEON PLINKO! Daftar sini: ${link}`);
}

function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

// START
init();
</script>
</body>
</html>
