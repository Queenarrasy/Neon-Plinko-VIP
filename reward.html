<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>REWARDS & MAIL - NEON PLINKO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root {
          --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --green: #00ff88; --bg: #02030d;
          --gp: 0 0 15px rgba(255, 0, 119, 0.4);
          --gb: 0 0 15px rgba(0, 212, 255, 0.4);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; padding-bottom: 90px; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(0, 212, 255, 0.2); background: rgba(2, 3, 13, 0.95); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px); }
        .header h1 { margin: 0; font-family: 'Cinzel Decorative'; font-size: 1.1rem; color: var(--blue); }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .reward-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .btn-claim { width: 100%; padding: 14px; border: none; border-radius: 50px; background: linear-gradient(90deg, var(--blue), #0044ff); color: #fff; font-weight: 900; text-transform: uppercase; cursor: pointer; box-shadow: var(--gb); }
        .btn-claim:disabled { opacity: 0.4 !important; filter: grayscale(1); cursor: not-allowed; background: #333 !important; box-shadow: none !important; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(5, 6, 20, 0.98); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--blue); z-index: 1000; }
        .nav-item { color: #444; text-decoration: none; text-align: center; font-size: 10px; flex:1; }
        .nav-item.active { color: var(--blue); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 5px; }
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .modal { background: #0a0b1a; border: 2px solid var(--blue); border-radius: 30px; padding: 30px; width: 85%; text-align: center; }
    </style>
</head>
<body>

<div class="header"><h1>MISSIONS & REWARDS</h1></div>

<div class="container">
    <div class="reward-card">
        <div style="font-size:35px; color:var(--yellow); margin-bottom:10px;"><i class="fas fa-calendar-check"></i></div>
        <h2 style="font-size:1rem; font-family:'Cinzel Decorative';">Daily Check-in</h2>
        <p style="font-size:11px; opacity:0.6; margin-bottom:15px;">Ambil Rp 1.000 gratis setiap hari.</p>
        <button id="btn-daily" class="btn-claim" onclick="handleDailyClaim()">KLAIM Rp 1.000</button>
    </div>

    <div id="mail-list"></div>
</div>

<div id="modal-overlay"><div class="modal"><h3 id="m-title"></h3><p id="m-msg"></p><button class="btn-claim" onclick="closeModal()">OK</button></div></div>

<div class="nav-bar">
    <a href="game.html" class="nav-item"><i class="fas fa-gamepad"></i>PLAY</a>
    <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i>DEPO</a>
    <a href="reward.html" class="nav-item active"><i class="fas fa-gift"></i>REWARD</a>
    <a href="profil.html" class="nav-item"><i class="fas fa-user-shield"></i>PROFIL</a>
</div>

<script>
const USERNAME = getUsername();

async function init() {
    if(!USERNAME) return;
    await checkDailyStatus(); 
    // Fungsi lain tetap berjalan
}

// --- LOGIKA ANTI-REPEAT DAILY CHECKIN ---
async function checkDailyStatus() {
    const btn = document.getElementById('btn-daily');
    const todayStr = new Date().toDateString(); // Format: "Mon Mar 16 2026"

    // 1. Cek LOCAL STORAGE dulu (Instan saat pindah halaman)
    if (localStorage.getItem('last_claim_' + USERNAME) === todayStr) {
        lockButton(btn);
        return;
    }

    // 2. Cek DATABASE (Validasi Final)
    const startOfDay = new Date();
    startOfDay.setHours(0,0,0,0);
    
    const { data, error } = await _supabase.from('deposits')
        .select('id')
        .eq('username', USERNAME)
        .eq('keterangan', 'DAILY_BONUS')
        .gte('created_at', startOfDay.toISOString());

    if (data && data.length > 0) {
        localStorage.setItem('last_claim_' + USERNAME, todayStr); // Sinkronkan local storage
        lockButton(btn);
    }
}

function lockButton(btn) {
    btn.disabled = true;
    btn.innerText = "SUDAH KLAIM HARI INI";
    btn.style.opacity = "0.4";
}

async function handleDailyClaim() {
    const btn = document.getElementById('btn-daily');
    if(btn.disabled) return;
    
    btn.disabled = true;
    btn.innerText = "PROSES...";

    try {
        const startOfDay = new Date();
        startOfDay.setHours(0,0,0,0);

        // Cek database lagi sebelum tambah saldo
        const { data: check } = await _supabase.from('deposits')
            .select('id')
            .eq('username', USERNAME)
            .eq('keterangan', 'DAILY_BONUS')
            .gte('created_at', startOfDay.toISOString());

        if (check && check.length > 0) {
            lockButton(btn);
            showModal("INFO", "Master sudah klaim hari ini!");
            return;
        }

        const { data: p } = await _supabase.from('profiles').select('saldo').eq('username', USERNAME).single();
        const bonus = 1000;

        // Tambah Saldo
        await _supabase.from('profiles').update({ saldo: (p.saldo || 0) + bonus }).eq('username', USERNAME);
        
        // Catat Transaksi
        await _supabase.from('deposits').insert([{
            username: USERNAME, amount: bonus, method: 'SYSTEM', status: 'SUKSES',
            net_receive: bonus, keterangan: 'DAILY_BONUS'
        }]);

        // Simpan ke Local Storage agar saat pindah halaman langsung terkunci
        localStorage.setItem('last_claim_' + USERNAME, new Date().toDateString());
        
        lockButton(btn);
        showModal("SUKSES", "Rp 1.000 telah ditambahkan ke saldo Master!");

    } catch (e) { 
        btn.disabled = false; 
        btn.innerText = "KLAIM Rp 1.000";
    }
}

function showModal(t, m) {
    document.getElementById('m-title').innerText = t;
    document.getElementById('m-msg').innerText = m;
    document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
window.onload = init;
</script>
</body>
</html>
