<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>REWARD — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root{
            --pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--bg:#000005;
            --gp:0 0 15px rgba(255,0,119,0.6);
            --gb:0 0 15px rgba(0,34,255,0.6);
            --gy:0 0 15px rgba(251,255,0,0.6);
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family: Arial, Helvetica, sans-serif; -webkit-tap-highlight-color:transparent}
        body{background:var(--bg);color:#fff;overflow-x:hidden;padding-bottom:50px}
        #particles-js{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
        
        .container{position:relative;z-index:2;padding:15px;max-width:500px;margin:0 auto}

        /* Tombol Kembali */
        .nav-top { display: flex; align-items: center; margin-bottom: 15px; }
        .btn-back {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 15px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Banner Design - Font diperjelas */
        .event-banner{
            background: linear-gradient(135deg, rgba(255,0,119,0.3) 0%, rgba(0,34,255,0.3) 100%);
            border: 2px solid var(--pink);
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: var(--gp);
        }
        .banner-title{
            font-size: 22px;
            font-weight: 900;
            color: var(--yellow);
            text-shadow: 2px 2px #000;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .banner-sub { font-size: 11px; font-weight: bold; opacity: 0.9; margin-bottom: 15px; color: #fff; }
        
        .prize-grid{display: flex; justify-content: center; gap: 8px;}
        .prize-card{
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 5px;
            border-radius: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .prize-card.gold{ border-color: gold; box-shadow: 0 0 10px rgba(255,215,0,0.5); transform: scale(1.05); }
        .prize-card i{ font-size: 20px; margin-bottom: 5px; }
        .prize-val{ font-weight: 900; font-size: 18px; color: #fff; }
        .prize-rank{ font-size: 10px; font-weight: bold; text-transform: uppercase; margin-top: 2px; opacity: 0.8; }

        /* Card System */
        .card{background:rgba(255,255,255,.05);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:20px;margin-bottom:20px;}
        .section-title{font-size:13px;font-weight:bold;color:var(--yellow);margin-bottom:15px;display:flex;align-items:center;gap:10px;text-transform:uppercase}

        .ref-box{background:rgba(0,34,255,.1);border:1px dashed var(--blue);border-radius:15px;padding:15px;text-align:center}
        .ref-code{font-size:26px;font-weight:900;color:var(--yellow);letter-spacing:3px;margin:8px 0;}
        
        .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
        .stat-card{background:rgba(0,0,0,.3);padding:12px;border-radius:12px;text-align:center;border:1px solid rgba(255,255,255,.05)}
        .stat-val{display:block;font-size:18px;font-weight:900;color:var(--pink)}
        .stat-lbl{font-size:10px;opacity:.6;text-transform:uppercase;margin-top:3px}

        .mail-list{display:flex;flex-direction:column;gap:10px}
        .mail-item{background:linear-gradient(45deg, rgba(255,0,119,0.15), rgba(0,34,255,0.15)); border-radius:15px;padding:15px;border:1px solid rgba(255,255,255,0.1);text-align:center}

        /* Table Scroll */
        .table-wrapper{
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
        }
        table{width:100%; font-size:12px; border-collapse: collapse;}
        th{text-align:left; padding:10px; opacity:.5; font-size:10px; position: sticky; top: 0; background: #111; z-index: 5;}
        td{padding:10px; border-bottom:1px solid rgba(255,255,255,.05)}

        .btn-main{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(45deg,var(--pink),var(--blue));color:#fff;font-weight:900;font-size:13px;cursor:pointer; transition: 0.2s;}
        .btn-main:active{transform: scale(0.97);}
        .btn-main:disabled{filter:grayscale(1); opacity: 0.5; cursor:not-allowed}

        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px}
        .modal{background:#000;border:1px solid var(--pink);border-radius:20px;padding:25px;width:100%;max-width:300px;text-align:center;}
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="container">
        
        <div class="nav-top">
            <a href="game.html" class="btn-back">
                <i class="fas fa-arrow-left"></i> KEMBALI KE GAME
            </a>
        </div>

        <div class="event-banner">
            <div class="banner-title">TOP REFERRAL EVENT</div>
            <div class="banner-sub">HADIAH TUNAI SETIAP BULAN</div>
            <div class="prize-grid">
                <div class="prize-card">
                    <i class="fas fa-medal" style="color: #C0C0C0;"></i>
                    <div class="prize-val">$50</div>
                    <div class="prize-rank">JUARA 2</div>
                </div>
                <div class="prize-card gold">
                    <i class="fas fa-crown" style="color: gold;"></i>
                    <div class="prize-val">$100</div>
                    <div class="prize-rank">JUARA 1</div>
                </div>
                <div class="prize-card">
                    <i class="fas fa-medal" style="color: #CD7F32;"></i>
                    <div class="prize-val">$25</div>
                    <div class="prize-rank">JUARA 3</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title"><i class="fas fa-gift"></i> VIP Inbox & Gift</div>
            <div id="mail-list" class="mail-list">
                <div style="text-align:center;opacity:.3;font-size:12px;padding:10px">Mencari hadiah...</div>
            </div>
        </div>

        <div class="card">
            <div class="section-title"><i class="fas fa-link"></i> Program Referral</div>
            <div class="ref-box">
                <div style="font-size:10px;opacity:.7">KODE UNIK ANDA</div>
                <div class="ref-code" id="ref-code">...</div>
                <button class="btn-main" onclick="copyRef()" style="padding:6px 15px;font-size:11px;width:auto">SALIN KODE</button>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-val" id="total-ref">0</span><span class="stat-lbl">Teman</span></div>
                <div class="stat-card"><span class="stat-val" id="valid-ref">0</span><span class="stat-lbl">Valid Depo</span></div>
            </div>
            <div style="margin-top:20px">
                <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:10px">
                    <span>Bonus Klaim:</span>
                    <span id="claim-status" style="color:var(--yellow);font-weight:bold">Rp 0</span>
                </div>
                <button class="btn-main" id="btn-claim-ref" onclick="processRefClaim()" disabled>KLAIM BONUS</button>
                <div id="sunday-info" style="font-size: 10px; text-align: center; margin-top: 10px; color: var(--pink); font-weight: bold;"></div>
            </div>
        </div>

        <div class="card">
            <div class="section-title"><i class="fas fa-history"></i> Riwayat Undangan</div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>USER</th><th>STATUS</th><th>TGL</th></tr></thead>
                    <tbody id="ref-table-body">
                        <tr><td colspan="3" style="text-align:center;opacity:.3;padding:20px">Data kosong</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h3 id="m-title" style="color:var(--yellow);margin-bottom:12px;font-size:18px"></h3>
            <p id="m-msg" style="font-size:14px;opacity:0.9;margin-bottom:20px;"></p>
            <button class="btn-main" onclick="closeModal()">TUTUP</button>
        </div>
    </div>

    <script>
        const USERNAME = localStorage.getItem('neon_user');
        particlesJS("particles-js",{"particles":{"number":{"value":40},"color":{"value":"#fbff00"},"shape":{"type":"circle"},"opacity":{"value":0.2},"size":{"value":2},"line_linked":{"enable":true,"distance":120,"color":"#ff0077","opacity":0.15},"move":{"enable":true,"speed":1}}});

        async function initReward(){
            if(!USERNAME){ window.location.href='index.html'; return; }
            loadReferralStats();
            loadInbox();
            checkClaimDay();
        }

        function checkClaimDay() {
            const day = new Date().getDay(); // 0 = Minggu
            const info = document.getElementById('sunday-info');
            if(day !== 0) {
                info.innerHTML = "JADWAL KLAIM: SETIAP HARI MINGGU";
            } else {
                info.innerHTML = "HARI MINGGU: KLAIM AKTIF!";
                info.style.color = "var(--yellow)";
            }
        }

        async function loadReferralStats(){
            try {
                const {data:me} = await _supabase.from('profiles').select('referral_code').eq('username', USERNAME).single();
                if(!me) return;
                document.getElementById('ref-code').innerText = me.referral_code;

                const {data:friends} = await _supabase.from('profiles').select('username,created_at').eq('referred_by', me.referral_code);
                const total = friends ? friends.length : 0;
                document.getElementById('total-ref').innerText = total;

                if(!friends || total === 0) return;

                const uNames = friends.map(f => f.username);
                const {data:deposits} = await _supabase.from('deposits').select('username').in('username', uNames).eq('status', 'SUKSES').gte('amount', 20000);
                const valids = new Set((deposits || []).map(d => d.username));
                document.getElementById('valid-ref').innerText = valids.size;

                const {data:claimed} = await _supabase.from('deposits').select('amount').eq('username', USERNAME).eq('method', 'REFERRAL_BONUS');
                const totalAlreadyClaimed = (claimed || []).reduce((s, x) => s + Number(x.amount), 0);
                
                const available = (valids.size * 5000) - totalAlreadyClaimed;
                document.getElementById('claim-status').innerText = "Rp " + Math.max(0, available).toLocaleString('id-ID');
                
                const btn = document.getElementById('btn-claim-ref');
                const isSunday = new Date().getDay() === 0;

                if(available > 0) {
                    btn.disabled = !isSunday;
                    btn.innerText = isSunday ? "KLAIM RP " + available.toLocaleString('id-ID') : "HANYA HARI MINGGU";
                } else {
                    btn.disabled = true;
                    btn.innerText = "KLAIM BONUS";
                }

                document.getElementById('ref-table-body').innerHTML = friends.map(f => {
                    const isV = valids.has(f.username);
                    return `<tr><td>${f.username}</td><td style="color:${isV?'#00ff88':'var(--yellow)'};font-weight:bold">${isV?'VALID':'PENDING'}</td><td style="opacity:.5;font-size:10px">${new Date(f.created_at).toLocaleDateString('id-ID')}</td></tr>`;
                }).join('');

            } catch(e) { console.error(e); }
        }

        async function processRefClaim(){
            if(new Date().getDay() !== 0) return showModal("INFO", "Klaim hanya di hari Minggu!");
            const btn = document.getElementById('btn-claim-ref');
            btn.disabled = true;
            try {
                const {data:me} = await _supabase.from('profiles').select('saldo, referral_code').eq('username', USERNAME).single();
                const {data:friends} = await _supabase.from('profiles').select('username').eq('referred_by', me.referral_code);
                const uNames = (friends || []).map(f => f.username);
                const {data:deposits} = await _supabase.from('deposits').select('username').in('username', uNames).eq('status', 'SUKSES').gte('amount', 20000);
                const validsCount = [...new Set((deposits || []).map(d => d.username))].length;
                
                const {data:claimed} = await _supabase.from('deposits').select('amount').eq('username', USERNAME).eq('method', 'REFERRAL_BONUS');
                const totalAlreadyClaimed = (claimed || []).reduce((s, x) => s + Number(x.amount), 0);
                const amount = (validsCount * 5000) - totalAlreadyClaimed;

                if(amount > 0){
                    await _supabase.from('profiles').update({ saldo: me.saldo + amount }).eq('username', USERNAME);
                    await _supabase.from('deposits').insert([{ username: USERNAME, amount: amount, net_receive: amount, method: 'REFERRAL_BONUS', status: 'SUKSES' }]);
                    showModal("BERHASIL", "Bonus Rp " + amount.toLocaleString('id-ID') + " ditambahkan ke saldo!");
                    loadReferralStats();
                }
            } catch(e) { showModal("ERROR", "Gagal klaim"); btn.disabled=false; }
        }

        async function loadInbox(){
            try {
                const {data} = await _supabase.from('inbox').select('*').eq('username', USERNAME).eq('status', 'UNCLAIMED');
                const list = document.getElementById('mail-list');
                if(data && data.length > 0){
                    list.innerHTML = data.map(m => `
                        <div class="mail-item">
                            <div style="font-size:10px;color:var(--pink);font-weight:bold;margin-bottom:5px">ADMIN GIFT</div>
                            <div style="font-size:13px;margin-bottom:10px">${m.pesan}</div>
                            <div style="font-size:20px;color:var(--yellow);font-weight:900;margin-bottom:12px">Rp ${Number(m.nominal).toLocaleString('id-ID')}</div>
                            <button class="btn-main" onclick="claimInbox('${m.id}', ${m.nominal})">KLAIM SEKARANG</button>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<div style="text-align:center;opacity:0.4;font-size:12px;padding:15px">Tidak ada hadiah baru</div>';
                }
            } catch(e) {}
        }

        async function claimInbox(id, amt){
            try {
                const {data:p} = await _supabase.from('profiles').select('saldo').eq('username', USERNAME).single();
                await _supabase.from('inbox').update({ status: 'CLAIMED' }).eq('id', id);
                await _supabase.from('profiles').update({ saldo: p.saldo + amt }).eq('username', USERNAME);
                showModal("SUKSES", "Hadiah Rp " + amt.toLocaleString('id-ID') + " berhasil diklaim!");
                loadInbox();
            } catch(e) { showModal("ERROR", "Gagal klaim hadiah"); }
        }

        function copyRef(){
            const c = document.getElementById('ref-code').innerText;
            navigator.clipboard.writeText(c);
            alert("Kode disalin: " + c);
        }

        function showModal(t, m){ 
            document.getElementById('m-title').innerText=t; 
            document.getElementById('m-msg').innerText=m; 
            document.getElementById('modal-overlay').style.display='flex'; 
        }
        function closeModal(){ document.getElementById('modal-overlay').style.display='none'; }
        
        window.onload = initReward;
    </script>
</body>
</html>
