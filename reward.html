<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>REWARD — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="config.js"></script> <style>
        :root {
            --pink: #ff0077;
            --blue: #0022ff;
            --yellow: #fbff00;
            --green: #00ff88;
            --bg: #000005;
            --gp: 0 0 8px rgba(255,0,119,.5), 0 0 20px rgba(255,0,119,.2);
            --gy: 0 0 8px rgba(251,255,0,.5), 0 0 20px rgba(251,255,0,.2);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            /* Anda bisa menggunakan 33267.jpg sebagai background keseluruhan jika ingin */
            background-image: url('33267.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        /* Overlay untuk menggelapkan background gambar agar teks tetap terbaca */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 5, 0.85); /* Ubah opacity ini untuk menyesuaikan gelap/terang */
            z-index: -1;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header Image Adjustments */
        .header-image {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: var(--gp);
            border: 2px solid var(--pink);
            object-fit: cover;
        }

        .title-neon {
            font-family: 'Cinzel Decorative', cursive;
            text-align: center;
            color: #fff;
            text-shadow: var(--gp);
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: var(--yellow);
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* Box untuk Kode dan Link Referral */
        .ref-container {
            background: rgba(20, 20, 30, 0.7);
            border: 1px solid rgba(0, 255, 136, 0.4);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .ref-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ref-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--green);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: var(--green);
            margin-bottom: 15px;
            word-wrap: break-word;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        /* Tombol Aksi */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-neon {
            background: transparent;
            color: #fff;
            border: 1px solid var(--pink);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-shadow: var(--gp);
            box-shadow: inset 0 0 10px rgba(255,0,119,0.2);
        }

        .btn-neon:active {
            transform: scale(0.95);
        }

        .btn-wa { border-color: var(--green); color: var(--green); text-shadow: none; box-shadow: inset 0 0 10px rgba(0,255,136,0.2); }
        .btn-share { border-color: var(--yellow); color: var(--yellow); text-shadow: none; box-shadow: inset 0 0 10px rgba(251,255,0,0.2); }

        /* Riwayat Container - DIPERBAIKI UNTUK VISUAL YANG JELAS */
        .riwayat-wrapper {
            background: rgba(10, 10, 15, 0.85); /* Warna gelap yang pekat agar text jelas */
            border: 1px solid var(--pink);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(255, 0, 119, 0.15);
            backdrop-filter: blur(8px);
        }

        .riwayat-title {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .riwayat-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .riwayat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .riwayat-item:last-child {
            border-bottom: none;
        }

        .r-user { font-weight: 600; color: #fff; display: flex; align-items: center; gap: 8px; }
        .r-date { font-size: 12px; color: var(--yellow); }

        /* Tampilan Kosong - SESUAI PERMINTAAN */
        .riwayat-kosong {
            text-align: center;
            padding: 30px 10px;
        }
        
        .riwayat-kosong i {
            font-size: 40px;
            color: var(--pink);
            margin-bottom: 15px;
            text-shadow: var(--gp);
        }
        
        .riwayat-kosong h4 {
            margin: 0 0 5px 0;
            font-size: 16px;
            color: #fff;
        }
        
        .riwayat-kosong p {
            margin: 0;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Notifikasi Alert */
        .neon-alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--green);
            color: var(--green);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(0,255,136,0.3);
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div id="particles-js"></div>

    <div class="container">
        <img src="IMG_20260406_171437.png" alt="Neon Banner" class="header-image" onerror="this.style.display='none'">

        <h1 class="title-neon">REWARD CENTER</h1>
        <p class="subtitle">Undang teman & dapatkan bonus saldo VIP!</p>

        <div class="ref-container">
            <div class="ref-label">Kode Referral Anda</div>
            <div class="ref-box" id="refCodeDisplay">MEMUAT...</div>

            <div class="ref-label">Link Undangan Anda</div>
            <div class="ref-box" id="refLinkDisplay" style="font-size: 14px; color: var(--yellow); border-color: var(--yellow);">Memuat link...</div>
        </div>

        <div class="action-grid">
            <button class="btn-neon" onclick="copyRefCode()">
                <i class="fas fa-copy"></i> Salin Kode
            </button>
            <button class="btn-neon" onclick="copyRefLink()">
                <i class="fas fa-link"></i> Salin Link
            </button>
            <button class="btn-neon btn-wa" onclick="shareWhatsapp()">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </button>
            <button class="btn-neon btn-share" onclick="shareLink()">
                <i class="fas fa-share-nodes"></i> Bagikan
            </button>
        </div>

        <div class="riwayat-wrapper">
            <div class="riwayat-title">
                <i class="fas fa-users" style="color: var(--pink);"></i> Riwayat Undangan
            </div>
            <div class="riwayat-list" id="riwayatBox">
                <div style="text-align:center; padding: 20px; color: #aaa;">Memuat data...</div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <button onclick="window.history.back()" style="background: transparent; border: none; color: #fff; opacity: 0.7; font-family: 'Outfit'; cursor: pointer; text-decoration: underline;">
                <i class="fas fa-arrow-left"></i> Kembali
            </button>
        </div>
    </div>

    <div id="customAlert" class="neon-alert"></div>

    <script>
        // INISIALISASI PARTICLES BACKGROUND
        if(typeof particlesJS !== 'undefined') {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 50 },
                    "color": { "value": ["#ff0077", "#0022ff", "#fbff00", "#00ff88"] },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.5 },
                    "size": { "value": 3 },
                    "move": { "enable": true, "speed": 1, "direction": "none", "random": true, "out_mode": "out" }
                },
                "interactivity": { "events": { "onhover": { "enable": false }, "onclick": { "enable": false } } }
            });
        }

        // VARIABEL GLOBAL
        let _myRefCode = '';
        let _myRefLink = '';

        // JALANKAN SAAT HALAMAN DIMUAT
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // 1. Cek Sesi User dari Supabase
                const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                
                if (sessionError || !session) {
                    console.log("Tidak ada sesi, arahkan ke login.");
                    // window.location.href = 'index.html'; // Hilangkan komentar jika ingin redirect paksa
                    return;
                }

                // 2. Ambil data user dari tabel 'users' berdasarkan ID Auth
                const { data: userData, error: userError } = await supabase
                    .from('users')
                    .select('ref_code')
                    .eq('id', session.user.id)
                    .single();

                if (userData && userData.ref_code) {
                    _myRefCode = userData.ref_code;
                    // Bikin link berdasarkan domain situs yang sedang aktif
                    _myRefLink = window.location.origin + '/?ref=' + _myRefCode;

                    // Tampilkan ke layar
                    document.getElementById('refCodeDisplay').innerText = _myRefCode;
                    document.getElementById('refLinkDisplay').innerText = _myRefLink;

                    // 3. Panggil Fungsi Riwayat
                    loadRiwayatUndangan(_myRefCode);
                } else {
                    document.getElementById('refCodeDisplay').innerText = "KODE TIDAK DITEMUKAN";
                    document.getElementById('refLinkDisplay').innerText = "LINK TIDAK TERSEDIA";
                }

            } catch (error) {
                console.error("Terjadi kesalahan sistem:", error);
            }
        });

        // FUNGSI MEMUAT RIWAYAT UNDANGAN
        async function loadRiwayatUndangan(refCode) {
            const riwayatBox = document.getElementById('riwayatBox');
            
            try {
                // Cari data di tabel users yang punya referred_by sama dengan kode user ini
                const { data, error } = await supabase
                    .from('users')
                    .select('username, created_at')
                    .eq('referred_by', refCode)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                // LOGIKA JIKA BELUM ADA UNDANGAN
                if (!data || data.length === 0) {
                    riwayatBox.innerHTML = `
                        <div class="riwayat-kosong">
                            <i class="fas fa-user-plus"></i>
                            <h4>Belum ada teman yang diundang</h4>
                            <p>Bagikan link referral di atas untuk mulai mengundang dan dapatkan bonus!</p>
                        </div>
                    `;
                    return;
                }

                // LOGIKA JIKA ADA UNDANGAN (Tampilkan Daftar)
                let htmlContent = '';
                data.forEach((user, index) => {
                    // Format tanggal
                    const dateObj = new Date(user.created_at);
                    const formattedDate = dateObj.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
                    
                    htmlContent += `
                        <div class="riwayat-item">
                            <div class="r-user">
                                <i class="fas fa-check-circle" style="color: var(--green);"></i>
                                ${user.username || 'Player ' + (index+1)}
                            </div>
                            <div class="r-date">${formattedDate}</div>
                        </div>
                    `;
                });
                
                riwayatBox.innerHTML = htmlContent;

            } catch (err) {
                console.error("Gagal memuat riwayat:", err);
                riwayatBox.innerHTML = '<div style="text-align:center; padding:20px; color: var(--pink);">Gagal memuat data riwayat.</div>';
            }
        }

        // --- FUNGSI COPY DAN SHARE ASLI ANDA ---

        function showNeonAlert(msg, isSuccess = true) {
            const alertBox = document.getElementById('customAlert');
            alertBox.innerText = msg;
            alertBox.style.borderColor = isSuccess ? 'var(--green)' : 'var(--pink)';
            alertBox.style.color = isSuccess ? 'var(--green)' : 'var(--pink)';
            alertBox.style.opacity = '1';
            
            setTimeout(() => { alertBox.style.opacity = '0'; }, 3000);
        }

        function copyRefCode(){
            if(!_myRefCode || _myRefCode === 'MEMUAT...') return;
            navigator.clipboard.writeText(_myRefCode).then(() => {
                showNeonAlert("✅ KODE DISALIN: " + _myRefCode, true);
            }).catch(()=>{
                // Fallback
                const el = document.createElement('textarea');
                el.value = _myRefCode; document.body.appendChild(el);
                el.select(); document.execCommand('copy'); document.body.removeChild(el);
                showNeonAlert("✅ KODE DISALIN: " + _myRefCode, true);
            });
        }

        function copyRefLink(){
            if(!_myRefLink || _myRefLink === 'Memuat link...') return;
            navigator.clipboard.writeText(_myRefLink).then(() => {
                showNeonAlert("✅ LINK UNDANGAN DISALIN!", true);
            }).catch(()=>{
                const el = document.createElement('textarea');
                el.value = _myRefLink; document.body.appendChild(el);
                el.select(); document.execCommand('copy'); document.body.removeChild(el);
                showNeonAlert("✅ LINK UNDANGAN DISALIN!", true);
            });
        }

        function shareWhatsapp(){
            if(!_myRefLink) return;
            const msg = encodeURIComponent(`🎮 Main NEON PLINKO VIP sekarang!\n\nDaftar pakai link ini dan kita berdua dapat bonus:\n${_myRefLink}\n\nKode referral: ${_myRefCode}`);
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        }

        function shareLink(){
            if(navigator.share && _myRefLink){
                navigator.share({
                    title: 'NEON PLINKO VIP',
                    text: `Daftar NEON PLINKO VIP pakai kode referral: ${_myRefCode}`,
                    url: _myRefLink
                }).catch((err) => console.log('Share error:', err));
            } else {
                copyRefLink(); // Fallback jika browser tidak support fitur share native
            }
        }
    </script>
</body>
</html>
