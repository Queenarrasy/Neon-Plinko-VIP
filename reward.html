<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>REWARD — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root{
            --pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--bg:#000005;
            --gp:0 0 8px rgba(255,0,119,.5),0 0 20px rgba(255,0,119,.2);
            --gb:0 0 8px rgba(0,34,255,.5),0 0 20px rgba(0,34,255,.2);
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent}
        body{background:var(--bg);color:#fff;overflow-x:hidden;padding-bottom:100px}
        #particles-js{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
        
        .container{position:relative;z-index:2;padding:20px;max-width:500px;margin:0 auto}
        .header-box{text-align:center;margin:30px 0}
        .logo-text{font-family:'Cinzel Decorative',cursive;font-size:26px;color:var(--pink);text-shadow:var(--gp);letter-spacing:2px}

        .card{background:rgba(255,255,255,.03);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:22px;margin-bottom:20px;box-shadow:0 15px 35px rgba(0,0,0,.3)}
        .section-title{font-size:14px;font-weight:900;color:var(--yellow);margin-bottom:18px;display:flex;align-items:center;gap:10px;letter-spacing:1px;text-transform:uppercase}

        /* Top Referral */
        .top-list{display:flex;flex-direction:column;gap:12px}
        .top-item{display:flex;align-items:center;background:rgba(255,255,255,.03);padding:12px 15px;border-radius:15px;border:1px solid rgba(255,255,255,.05)}
        .rank{width:30px;font-weight:900;color:var(--pink);font-size:18px}
        .rank-info{flex:1}
        .rank-name{font-weight:700;font-size:14px}
        .rank-count{font-size:11px;opacity:.5}

        /* Referral Dashboard */
        .ref-box{background:rgba(0,34,255,.05);border:1px dashed var(--blue);border-radius:18px;padding:20px;text-align:center}
        .ref-code{font-size:28px;font-weight:900;color:var(--yellow);letter-spacing:4px;margin:10px 0;text-shadow:0 0 15px rgba(251,255,0,.3)}
        
        .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:15px}
        .stat-card{background:rgba(255,255,255,.03);padding:12px;border-radius:15px;text-align:center;border:1px solid rgba(255,255,255,.05)}
        .stat-val{display:block;font-size:18px;font-weight:900;color:var(--pink)}
        .stat-lbl{font-size:9px;opacity:.5;text-transform:uppercase}

        /* Inbox Hadiah */
        .mail-list{display:flex;flex-direction:column;gap:12px}
        .mail-item{background:linear-gradient(135deg,rgba(255,0,119,.1),rgba(0,34,255,.1));border-radius:18px;padding:18px;border:1px solid rgba(255,255,255,.1);text-align:center}

        .btn-main{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(45deg,var(--pink),var(--blue));color:#fff;font-weight:900;font-size:14px;cursor:pointer;box-shadow:var(--gp)}
        .btn-main:disabled{filter:grayscale(1);cursor:not-allowed}

        table{width:100%;margin-top:10px;font-size:13px}
        th{text-align:left;padding:8px;opacity:.4;font-size:11px}
        td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.03)}

        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px}
        .modal{background:var(--bg);border:2px solid var(--pink);border-radius:25px;padding:30px;width:100%;max-width:320px;text-align:center;box-shadow:var(--gp)}
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="container">
        <div class="header-box"><div class="logo-text">VIP REWARDS</div></div>

        <div class="card">
            <div class="section-title"><i class="fas fa-share-nodes"></i> Program Referral</div>
            <div class="ref-box">
                <div style="font-size:11px;opacity:.6">KODE REFERRAL ANDA</div>
                <div class="ref-code" id="ref-code">MEMUAT...</div>
                <button class="btn-main" onclick="copyRef()" style="padding:8px 20px;font-size:11px;width:auto">SALIN KODE</button>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-val" id="total-ref">0</span><span class="stat-lbl">Teman</span></div>
                <div class="stat-card"><span class="stat-val" id="valid-ref">0</span><span class="stat-lbl">Valid Depo</span></div>
            </div>
            <div style="margin-top:20px">
                <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px">
                    <span>Bonus Tersedia:</span>
                    <span id="claim-status" style="color:var(--yellow);font-weight:900">Rp 0</span>
                </div>
                <button class="btn-main" id="btn-claim-ref" onclick="processRefClaim()" disabled>KLAIM BONUS</button>
            </div>
        </div>

        <div class="card">
            <div class="section-title"><i class="fas fa-envelope-open-text"></i> VIP Inbox & Gift</div>
            <div id="mail-list" class="mail-list">
                <div style="text-align:center;opacity:.3;font-size:12px;padding:20px">Mencari hadiah...</div>
            </div>
        </div>

        <div class="card">
            <div class="section-title"><i class="fas fa-crown"></i> Top Referral</div>
            <div class="top-list">
                <div class="top-item"><div class="rank">1</div><div class="rank-info"><div class="rank-name" id="lb-name-1">—</div><div class="rank-count" id="lb-cnt-1">0 referral</div></div><i class="fas fa-medal" style="color:gold"></i></div>
                <div class="top-item"><div class="rank">2</div><div class="rank-info"><div class="rank-name" id="lb-name-2">—</div><div class="rank-count" id="lb-cnt-2">0 referral</div></div><i class="fas fa-medal" style="color:silver"></i></div>
                <div class="top-item"><div class="rank">3</div><div class="rank-info"><div class="rank-name" id="lb-name-3">—</div><div class="rank-count" id="lb-cnt-3">0 referral</div></div><i class="fas fa-medal" style="color:#cd7f32"></i></div>
            </div>
        </div>

        <div class="card">
            <div class="section-title"><i class="fas fa-users"></i> Daftar Teman</div>
            <table>
                <thead><tr><th>USERNAME</th><th>STATUS</th><th>TANGGAL</th></tr></thead>
                <tbody id="ref-table-body">
                    <tr><td colspan="3" style="text-align:center;opacity:.3;padding:20px">Belum ada data</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h3 id="m-title" style="color:var(--yellow);margin-bottom:12px;font-size:18px"></h3>
            <p id="m-msg" style="font-size:14px;opacity:.8;margin-bottom:22px;line-height:1.5"></p>
            <button class="btn-main" onclick="closeModal()">TUTUP</button>
        </div>
    </div>

    <script>
        const USERNAME = localStorage.getItem('neon_user');
        particlesJS("particles-js",{"particles":{"number":{"value":50},"color":{"value":"#fbff00"},"shape":{"type":"circle"},"opacity":{"value":0.3},"size":{"value":2},"line_linked":{"enable":true,"distance":140,"color":"#ff0077","opacity":0.2},"move":{"enable":true,"speed":1.5}}});

        async function initReward(){
            if(!USERNAME){ window.location.href='index.html'; return; }
            loadTopReferral();
            loadReferralStats();
            loadInbox();
        }

        async function loadTopReferral(){
            try {
                const {data:allRefs} = await _supabase.from('profiles').select('referred_by');
                const counts = {};
                allRefs.forEach(r => {
                    const code = (r.referred_by || '').trim();
                    if(code && code !== 'DIRECT') counts[code] = (counts[code] || 0) + 1;
                });
                const top = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0,3);
                for(let i=0; i<3; i++){
                    if(top[i]){
                        const {data:p} = await _supabase.from('profiles').select('username').eq('referral_code', top[i][0]).single();
                        document.getElementById('lb-name-'+(i+1)).textContent = p ? p.username : top[i][0];
                        document.getElementById('lb-cnt-'+(i+1)).textContent = top[i][1] + ' referral';
                    }
                }
            } catch(e) {}
        }

        async function loadReferralStats(){
            try {
                // 1. Dapatkan kode referral sendiri
                const {data:me} = await _supabase.from('profiles').select('referral_code').eq('username', USERNAME).single();
                if(!me) return;
                
                document.getElementById('ref-code').innerText = me.referral_code;

                // 2. Cari teman berdasarkan kolom referred_by = kode saya
                const {data:friends} = await _supabase.from('profiles').select('username,created_at').eq('referred_by', me.referral_code);
                const total = friends ? friends.length : 0;
                document.getElementById('total-ref').innerText = total;

                if(!friends || total === 0) return;

                // 3. Cek Deposit Valid (SUKSES & >= 20.000)
                const uNames = friends.map(f => f.username);
                const {data:deposits} = await _supabase.from('deposits').select('username').in('username', uNames).eq('status', 'SUKSES').gte('amount', 20000);
                const valids = new Set((deposits || []).map(d => d.username));
                document.getElementById('valid-ref').innerText = valids.size;

                // 4. Hitung Bonus yang sudah diklaim
                const {data:claimed} = await _supabase.from('deposits').select('amount').eq('username', USERNAME).eq('method', 'REFERRAL_BONUS');
                const totalAlreadyClaimed = (claimed || []).reduce((s, x) => s + Number(x.amount), 0);
                
                const totalPossible = valids.size * 5000;
                const available = totalPossible - totalAlreadyClaimed;

                document.getElementById('claim-status').innerText = "Rp " + available.toLocaleString('id-ID');
                const btn = document.getElementById('btn-claim-ref');
                if(available > 0) {
                    btn.disabled = false;
                    btn.innerText = "KLAIM RP " + available.toLocaleString('id-ID');
                } else {
                    btn.disabled = true;
                    btn.innerText = "KLAIM BONUS";
                }

                // Render Tabel
                document.getElementById('ref-table-body').innerHTML = friends.map(f => {
                    const isV = valids.has(f.username);
                    return `<tr><td>${f.username}</td><td style="color:${isV?'#00ff88':'var(--yellow)'};font-weight:800">${isV?'VALID':'PENDING'}</td><td style="opacity:.4;font-size:10px">${new Date(f.created_at).toLocaleDateString('id-ID')}</td></tr>`;
                }).join('');

            } catch(e) { console.error(e); }
        }

        async function processRefClaim(){
            const btn = document.getElementById('btn-claim-ref');
            btn.disabled = true;
            try {
                const {data:me} = await _supabase.from('profiles').select('saldo, referral_code').eq('username', USERNAME).single();
                const {data:friends} = await _supabase.from('profiles').select('username').eq('referred_by', me.referral_code);
                const uNames = (friends || []).map(f => f.username);
                const {data:deposits} = await _supabase.from('deposits').select('username').in('username', uNames).eq('status', 'SUKSES').gte('amount', 20000);
                const validsCount = [...new Set((deposits || []).map(d => d.username))].length;
                
                const {data:claimed} = await _supabase.from('deposits').select('amount').eq('username', USERNAME).eq('method', 'REFERRAL_BONUS');
                const totalClaimed = (claimed || []).reduce((s, x) => s + Number(x.amount), 0);
                
                const amount = (validsCount * 5000) - totalClaimed;

                if(amount > 0){
                    await _supabase.from('profiles').update({ saldo: me.saldo + amount }).eq('username', USERNAME);
                    await _supabase.from('deposits').insert([{ username: USERNAME, amount: amount, net_receive: amount, method: 'REFERRAL_BONUS', status: 'SUKSES' }]);
                    showModal("SUKSES 🎉", "Bonus Rp " + amount.toLocaleString('id-ID') + " berhasil masuk ke saldo!");
                    loadReferralStats();
                }
            } catch(e) { showModal("ERROR", "Gagal klaim: "+e.message); btn.disabled=false; }
        }

        async function loadInbox(){
            try {
                const {data} = await _supabase.from('inbox').select('*').eq('username', USERNAME).eq('status', 'UNCLAIMED');
                const list = document.getElementById('mail-list');
                if(data && data.length > 0){
                    list.innerHTML = data.map(m => `
                        <div class="mail-item">
                            <div style="font-size:10px;color:var(--pink);font-weight:900;margin-bottom:5px">VIP GIFT FROM ADMIN</div>
                            <div style="font-size:13px;margin-bottom:10px">${m.pesan}</div>
                            <div style="font-size:22px;color:var(--yellow);font-weight:900;margin-bottom:15px">Rp ${Number(m.nominal).toLocaleString('id-ID')}</div>
                            <button class="btn-main" onclick="claimInbox('${m.id}', ${m.nominal})">KLAIM SEKARANG</button>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<div style="text-align:center;opacity:.3;font-size:12px;padding:20px">Belum ada hadiah hari ini</div>';
                }
            } catch(e) {}
        }

        async function claimInbox(id, amt){
            try {
                const {data:p} = await _supabase.from('profiles').select('saldo').eq('username', USERNAME).single();
                await _supabase.from('inbox').update({ status: 'CLAIMED' }).eq('id', id);
                await _supabase.from('profiles').update({ saldo: p.saldo + amt }).eq('username', USERNAME);
                showModal("SUKSES!", "Hadiah Rp " + amt.toLocaleString('id-ID') + " berhasil diklaim!");
                loadInbox();
            } catch(e) { showModal("ERROR", "Gagal klaim hadiah"); }
        }

        function copyRef(){
            const c = document.getElementById('ref-code').innerText;
            navigator.clipboard.writeText(c);
            alert("KODE REFERRAL DISALIN: " + c);
        }

        function showModal(t, m){ document.getElementById('m-title').innerText=t; document.getElementById('m-msg').innerText=m; document.getElementById('modal-overlay').style.display='flex'; }
        function closeModal(){ document.getElementById('modal-overlay').style.display='none'; }
        
        window.onload = initReward;
    </script>
</body>
</html>
