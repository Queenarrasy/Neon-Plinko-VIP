<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REWARD & REFERRAL - NEON PLINKO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --pink: #ff0077; 
            --blue: #0044ff; 
            --yellow: #fbff00; 
            --bg: #070816; 
            --pink-bias: 0 0 6px rgba(255, 0, 119, 0.3);
            --blue-bias: 0 0 6px rgba(0, 68, 255, 0.3);
            --yellow-bias: 0 0 6px rgba(251, 255, 0, 0.3);
        }
        
        * { box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px; overflow-x: hidden; }
        
        .btn-back { 
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 20px; text-decoration: none; 
            background: linear-gradient(135deg, #ffffff -20%, var(--blue) 40%, #002288 100%);
            color: white; border-radius: 12px; font-weight: 900; font-size: 11px;
            text-transform: uppercase; box-shadow: var(--blue-bias); margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5); border: none; transition: 0.3s;
        }

        .neon-card { 
            background: rgba(255, 255, 255, 0.03);
            border: 2.5px solid var(--blue); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 25px;
            box-shadow: var(--blue-bias); position: relative; overflow: hidden;
        }

        .promo-card { border-color: var(--pink); box-shadow: var(--pink-bias); }
        .promo-card h2 { color: var(--pink); margin: 0; font-size: 20px; text-transform: uppercase; text-shadow: var(--pink-bias); }
        .promo-card p { font-size: 13px; color: #eee; line-height: 1.5; margin: 10px 0; }
        .highlight { color: var(--yellow); font-weight: bold; }

        .leader-card {
            background: #000;
            border: 2.5px solid var(--blue); border-radius: 20px; padding: 15px; margin-bottom: 25px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: var(--blue-bias);
        }
        .leader-logo { font-size: 35px; color: #ffffff; text-shadow: var(--blue-bias); }
        .leader-text h3 { margin: 0; font-size: 12px; color: var(--pink); text-transform: uppercase; font-weight: 900; text-shadow: var(--pink-bias); }
        .leader-text span { font-size: 20px; font-weight: 900; color: white; text-shadow: 0 0 5px var(--blue); }

        .referral-container { text-align: center; margin-bottom: 25px; }
        .code-box {
            background: #000; border: 2.5px dashed var(--blue); color: var(--yellow);
            padding: 15px; font-size: 22px; font-family: 'Courier New', monospace; font-weight: 900;
            letter-spacing: 3px; margin: 10px 0; border-radius: 12px; cursor: pointer;
            box-shadow: var(--blue-bias);
        }

        .neon-btn {
            border: none; border-radius: 12px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; transition: 0.3s; width: 100%; padding: 15px;
            margin-top: 10px; font-size: 13px;
        }
        .btn-yellow { background: var(--yellow); color: #000; box-shadow: var(--yellow-bias); }
        .btn-blue { background: var(--blue); color: #fff; box-shadow: var(--blue-bias); }
        .btn-pink { background: var(--pink); color: #fff; box-shadow: var(--pink-bias); }
        .neon-btn:active { transform: scale(0.97); }
        .neon-btn:disabled { background: #1a1a1a !important; color: #444 !important; box-shadow: none !important; cursor: not-allowed; border-color: #333; }

        .inbox-section { border: 2.5px solid var(--yellow); border-radius: 20px; padding: 15px; background: rgba(0, 0, 0, 0.3); margin-bottom: 25px; box-shadow: var(--yellow-bias); }
        .inbox-title { color: var(--yellow); font-weight: 900; font-size: 13px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; text-shadow: var(--yellow-bias); }
        .msg-card { 
            background: rgba(255, 255, 255, 0.05); border-left: 4px solid var(--yellow);
            padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
        }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .stat-card stat-invite { border: 2.5px solid var(--pink); box-shadow: var(--pink-bias); }
        .stat-card { background: #000; border: 2.5px solid var(--blue); padding: 15px; border-radius: 15px; text-align: center; box-shadow: var(--blue-bias); }
        .stat-card small { font-size: 10px; color: #aaa; text-transform: uppercase; font-weight: bold; }

        .history-section { border: 2.5px solid var(--yellow); border-radius: 20px; padding: 15px; background: #000; box-shadow: var(--yellow-bias); }
        .history-title { font-size:13px; color:var(--pink); margin-bottom:15px; text-transform:uppercase; font-weight: 900; text-shadow: var(--pink-bias); }
        
        .scroll-list { max-height: 200px; overflow-y: auto; padding-right: 5px; }
        .friend-item { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #222; font-size:12px; }

        #neon-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 20000;
        }
        .neon-modal {
            background: #0d0f26; border: 2.5px solid var(--blue); border-radius: 25px;
            padding: 30px; text-align: center; width: 85%; max-width: 320px;
            box-shadow: var(--blue-bias);
        }
        .neon-modal.success { border-color: var(--yellow); box-shadow: var(--yellow-bias); }
        .neon-modal.error { border-color: var(--pink); box-shadow: var(--pink-bias); }
        
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 30000; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--blue); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-success" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="snd-error" src="https://assets.mixkit.co/active_storage/sfx/253/253-preview.mp3"></audio>

    <div id="loading-overlay"><div class="spinner"></div></div>

    <div id="neon-modal-overlay">
        <div id="modal-card" class="neon-modal">
            <h3 id="modal-title">INFO SYSTEM</h3>
            <p id="modal-msg"></p>
            <div class="modal-btn-container">
                <button class="neon-btn btn-blue" onclick="closeModal()">OK</button>
            </div>
        </div>
    </div>

    <a href="game.html" class="btn-back">
        <i class="fa-solid fa-arrow-left"></i> KEMBALI
    </a>

    <div class="leader-card">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="leader-logo"><i class="fa-solid fa-trophy" style="color:var(--yellow)"></i></div>
            <div class="leader-text">
                <h3>Best Reward Top Referral</h3>
                <span>$100.00 <small style="font-size:10px; color:var(--yellow)">USDT</small></span>
            </div>
        </div>
        <i class="fa-solid fa-crown" style="color:var(--yellow); font-size: 20px;"></i>
    </div>

    <div class="neon-card promo-card">
        <h2>Bagikan Keseruan!</h2>
        <p>Bonus <span class="highlight">IDR 5.000</span> untuk setiap teman yang deposit pertama.</p>
    </div>

    <div class="referral-container">
        <small style="color: var(--pink); font-weight: 900;">KODE REFERRAL ANDA</small>
        <div class="code-box" id="my-referral-code" onclick="copyCode()">--------</div>
    </div>

    <div class="neon-card" style="border-color: var(--yellow); box-shadow: var(--yellow-bias);">
        <div style="display:flex; flex-direction: column; gap: 10px;">
            <div>
                <small style="color:var(--yellow); font-weight: bold;">BONUS HARIAN</small>
                <button id="btn-daily" class="neon-btn btn-yellow" onclick="claimDaily()">AMBIL JATAH HARIAN (2.000)</button>
            </div>
            <div style="margin-top: 10px; border-top: 1px solid #333; padding-top: 10px;">
                <small style="color:var(--pink); font-weight: bold;">REWARD REFERRAL</small>
                <button id="btn-claim-ref" class="neon-btn btn-pink" onclick="claimReferral()">KLAIM KOMISI</button>
            </div>
        </div>
    </div>

    <div class="inbox-section">
        <div class="inbox-title"><i class="fa-solid fa-gift"></i> HADIAH & PESAN</div>
        <div id="inbox-list">
            <div style="text-align:center; font-size:11px; color:#555; padding: 10px;">Mengecek...</div>
        </div>
    </div>

    <div class="stat-grid">
        <div class="stat-card">
            <small>Total Undangan</small>
            <div id="total-invite" style="color: var(--pink); font-size: 18px; font-weight: 900;">0</div>
        </div>
        <div class="stat-card">
            <small>Komisi Tersedia</small>
            <div id="total-reward" style="color: var(--yellow); font-size: 18px; font-weight: 900;">IDR 0</div>
        </div>
    </div>

    <div class="history-section">
        <h3 class="history-title"><i class="fa-solid fa-users"></i> Teman Anda</h3>
        <div id="referral-list" class="scroll-list">
            <p style='text-align:center; font-size:11px; color:#444;'>Tidak ada data.</p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYTC11njbEBtAsdpbaRLJRt13j7iEKCkANV1SgxxguV_zFUyZ6Z7FAj0SKuw4d5ThmKw/exec";
        const USERNAME = localStorage.getItem('user_session');

        function playClick() { document.getElementById('snd-click').currentTime = 0; document.getElementById('snd-click').play().catch(()=>{}); }
        function playSuccess() { document.getElementById('snd-success').currentTime = 0; document.getElementById('snd-success').play().catch(()=>{}); }
        function playError() { document.getElementById('snd-error').currentTime = 0; document.getElementById('snd-error').play().catch(()=>{}); }

        function showModal(msg, type = "info", title = "INFO SYSTEM") {
            const card = document.getElementById('modal-card');
            card.className = "neon-modal " + type;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('neon-modal-overlay').style.display = 'flex';
        }
        function closeModal() { document.getElementById('neon-modal-overlay').style.display = 'none'; }

        async function initPage() {
            if (!USERNAME) { window.location.href = 'index.html'; return; }
            document.getElementById('loading-overlay').style.display = 'flex';
            
            try {
                // 1. Ambil Data Profil & Status Klaim Terakhir dari Server
                const resp = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "getUserData", username: USERNAME })
                });
                const user = await resp.json();

                if(user.result === "SUCCESS") {
                    document.getElementById('my-referral-code').innerText = user.refCode || "NOCODE";
                    
                    // CEK APAKAH SUDAH KLAIM HARI INI (Dari Kolom O di Sheet)
                    const today = new Date().toLocaleDateString('en-CA'); // Format YYYY-MM-DD
                    if (user.lastClaim === today) {
                        lockDailyButton();
                    }
                }

                // 2. Ambil Inbox
                const inboxResp = await fetch(SCRIPT_URL + "?action=getInbox&username=" + USERNAME);
                const inboxData = await inboxResp.json();
                
                if(Array.isArray(inboxData) && inboxData.length > 0) {
                    const inboxHtml = inboxData.map(m => `
                        <div class="msg-card" id="msg-${m.id}">
                            <div style="flex:1">
                                <b style="color:var(--yellow); font-size:12px;">HADIAH ADMIN</b><br>
                                <small style="font-size:11px; color:#ccc;">${m.pesan}</small>
                            </div>
                            <button onclick="claimInbox('${m.id}')" style="background:var(--pink); border:none; color:white; padding:6px 12px; border-radius:6px; font-size:10px; font-weight:bold; cursor:pointer;">CLAIM</button>
                        </div>
                    `).join('');
                    document.getElementById('inbox-list').innerHTML = inboxHtml;
                } else {
                    document.getElementById('inbox-list').innerHTML = "<p style='text-align:center; font-size:10px; color:#555;'>Tidak ada hadiah.</p>";
                }

            } catch (e) { 
                console.error(e);
                showModal("Gagal memuat data.", "error", "ERROR"); 
            }
            document.getElementById('loading-overlay').style.display = 'none';
        }

        function lockDailyButton() {
            const btn = document.getElementById('btn-daily');
            btn.disabled = true;
            btn.innerText = "SUDAH KLAIM HARI INI";
            btn.style.opacity = "0.5";
        }

        async function claimDaily() {
            playClick();
            const btn = document.getElementById('btn-daily');
            btn.disabled = true; // Mencegah klik ganda saat proses loading

            document.getElementById('loading-overlay').style.display = 'flex';
            try {
                const resp = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "claimDaily", username: USERNAME })
                });
                const res = await resp.json();
                
                if(res.result === "SUCCESS") {
                    playSuccess();
                    showModal("Bonus IDR 2.000 masuk ke saldo!", "success", "BERHASIL");
                    lockDailyButton();
                } else { 
                    playError(); 
                    showModal(res.message || "Gagal klaim.", "error");
                    // Jika gagal karena sudah klaim, pastikan tombol terkunci
                    if(res.message && res.message.includes("SUDAH")) lockDailyButton();
                    else btn.disabled = false;
                }
            } catch (e) { 
                btn.disabled = false;
                playError(); 
            }
            document.getElementById('loading-overlay').style.display = 'none';
        }

        async function claimInbox(msgId) {
            playClick();
            document.getElementById('loading-overlay').style.display = 'flex';
            try {
                const resp = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "claimInbox", username: USERNAME, id: msgId })
                });
                const res = await resp.json();
                if(res.result === "SUCCESS") {
                    playSuccess();
                    showModal("Hadiah berhasil diklaim!", "success");
                    initPage();
                }
            } catch (e) { playError(); }
            document.getElementById('loading-overlay').style.display = 'none';
        }

        function claimReferral() {
            playClick();
            const now = new Date();
            if (now.getDay() !== 0) {
                showModal("Komisi hanya bisa dicairkan hari MINGGU.", "error", "LOCKED");
            } else {
                showModal("Fitur sedang disiapkan.", "info");
            }
        }

        function copyCode() {
            playClick();
            const code = document.getElementById('my-referral-code').innerText;
            if(code === "--------") return;
            navigator.clipboard.writeText(code).then(() => {
                alert("Salin Berhasil!");
            });
        }

        window.onload = initPage;
    </script>
</body>
</html>
