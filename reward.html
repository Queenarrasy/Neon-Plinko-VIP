<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON REWARDS — VIP ACCESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root {
          --pink: #ff0077; --blue: #0022ff; --cyan: #00d4ff;
          --yellow: #fbff00; --green: #00ff88; --bg: #02030d;
          --shadow-p: 0 0 20px rgba(255, 0, 119, 0.7);
          --shadow-b: 0 0 25px rgba(0, 34, 255, 0.8);
          --shadow-y: 0 0 15px rgba(251, 255, 0, 0.6);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
          margin: 0; background: var(--bg); color: #fff;
          font-family: 'Outfit', sans-serif; padding-bottom: 90px;
          min-height: 100vh; overflow-x: hidden;
        }

        /* Latar Belakang Bergerak */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.4; pointer-events: none;
        }

        .header {
          padding: 20px; text-align: center; border-bottom: 2px solid var(--blue);
          background: rgba(2, 3, 13, 0.9); position: sticky; top: 0; z-index: 100; 
          backdrop-filter: blur(15px); box-shadow: var(--shadow-b);
        }
        .header h1 { 
            margin: 0; font-family: 'Cinzel Decorative'; font-size: 1.1rem; 
            letter-spacing: 4px; color: var(--pink); text-shadow: var(--shadow-p); 
        }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; position: relative; z-index: 10; }

        /* Banner Event */
        .promo-banner {
            background: rgba(5, 10, 48, 0.7);
            border: 2px solid var(--pink); border-radius: 25px; padding: 25px;
            text-align: center; margin-bottom: 25px; box-shadow: var(--shadow-p);
            position: relative; overflow: hidden; backdrop-filter: blur(10px);
        }
        .promo-banner::before { 
            content: 'TOP EVENT'; position: absolute; top: 12px; left: -35px; 
            background: var(--pink); color: #fff; font-size: 8px; font-weight: 900; 
            padding: 5px 45px; transform: rotate(-45deg); box-shadow: 0 0 10px var(--pink);
        }
        .promo-title { font-family: 'Cinzel Decorative'; font-size: 1.2rem; color: var(--yellow); text-shadow: var(--shadow-y); }
        
        .prizes { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .prize-item { font-size: 10px; font-weight: 800; color: var(--cyan); }
        .prize-item b { display: block; font-size: 20px; color: var(--green); margin-top: 5px; text-shadow: 0 0 10px var(--green); }

        /* Reward Cards */
        .card {
          background: rgba(0, 34, 255, 0.08); border: 2px solid var(--blue);
          border-radius: 25px; padding: 25px; text-align: center; margin-bottom: 20px;
          box-shadow: var(--shadow-b); backdrop-filter: blur(5px);
        }
        .reward-icon { font-size: 40px; color: var(--yellow); margin-bottom: 15px; text-shadow: var(--shadow-y); }
        
        .ref-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-box { 
            background: #000; padding: 15px; border-radius: 15px; 
            border: 1px solid var(--blue); box-shadow: inset 0 0 10px rgba(0,34,255,0.3);
        }
        .stat-box small { display: block; font-size: 9px; color: var(--cyan); text-transform: uppercase; margin-bottom: 5px; }
        .stat-box span { font-weight: 900; color: #fff; font-size: 1.1rem; }

        .ref-box {
          background: rgba(0, 0, 0, 0.8); border: 1px dashed var(--cyan);
          border-radius: 15px; padding: 15px; margin-top: 10px;
        }
        .ref-code-area { display: flex; justify-content: space-between; align-items: center; }
        #ref-code { font-size: 1.2rem; font-weight: 900; color: var(--yellow); letter-spacing: 3px; text-shadow: var(--shadow-y); }

        .mailbox-title { 
            font-family: 'Cinzel Decorative'; font-size: 1rem; color: var(--pink); 
            margin: 35px 0 20px; display: flex; align-items: center; gap: 15px; 
            text-shadow: var(--shadow-p);
        }
        
        .mail-list { display: flex; flex-direction: column; gap: 15px; }
        .mail-item {
          background: rgba(5, 10, 48, 0.8); border: 1px solid var(--pink); 
          border-radius: 20px; padding: 20px; box-shadow: var(--shadow-p);
        }

        .btn-main {
          width: 100%; padding: 16px; border: none; border-radius: 15px;
          background: linear-gradient(90deg, var(--blue), #0044ff);
          color: #fff; font-weight: 900; font-size: 0.9rem; cursor: pointer; text-transform: uppercase;
          box-shadow: var(--shadow-b); transition: 0.3s; letter-spacing: 1px;
        }
        .btn-main:active { transform: scale(0.95); }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); box-shadow: none; }
        
        .btn-pink { background: linear-gradient(90deg, var(--pink), #cc005f); box-shadow: var(--shadow-p); }

        /* Modal / Alert Theme */
        #modal-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(10px); 
        }
        .modal { 
            background: #050614; border: 2px solid var(--blue); border-radius: 30px; 
            padding: 35px; width: 85%; max-width: 320px; text-align: center; box-shadow: var(--shadow-b); 
        }

        /* Navbar */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 75px; 
            background: rgba(2, 3, 13, 0.98); display: flex; justify-content: space-around; 
            align-items: center; border-top: 2px solid var(--blue); backdrop-filter: blur(15px); z-index: 1000; 
        }
        .nav-item { color: rgba(255,255,255,0.2); text-decoration: none; text-align: center; font-size: 10px; font-weight: 800; flex:1; }
        .nav-item.active { color: var(--cyan); text-shadow: var(--shadow-b); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="snd-success" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<div class="header"><h1>NEON REWARDS</h1></div>

<div class="container">
    <div class="promo-banner">
        <div class="promo-title">BEST TOP REFERRAL</div>
        <div class="prizes">
            <div class="prize-item">🥈 RANK 2<b>$50</b></div>
            <div class="prize-item" style="transform: scale(1.2); color:var(--yellow);">🥇 RANK 1<b>$100</b></div>
            <div class="prize-item">🥉 RANK 3<b>$25</b></div>
        </div>
    </div>

    <div class="card">
        <div class="reward-icon"><i class="fas fa-calendar-star"></i></div>
        <h2 style="font-family:'Cinzel Decorative'; color:var(--cyan); font-size:1.1rem;">Daily Login</h2>
        <p style="font-size:12px; opacity:0.7; margin-bottom:20px;">Bonus harian Rp 1.000 otomatis masuk.</p>
        <button id="btn-daily" class="btn-main" onclick="handleDailyClaim()">KLAIM RP 1.000</button>
    </div>

    <div class="card" style="border-color: var(--pink); box-shadow: var(--shadow-p);">
        <div class="reward-icon" style="color:var(--pink)"><i class="fas fa-users-crown"></i></div>
        <h2 style="font-family:'Cinzel Decorative'; color:var(--pink); font-size:1.1rem;">Referral VIP</h2>
        <div class="ref-stats">
            <div class="stat-box"><small>Valid</small><span id="valid-ref">0</span></div>
            <div class="stat-box"><small>Bonus</small><span id="bonus-ref">Rp 0</span></div>
        </div>
        <div class="ref-box">
            <div class="ref-code-area">
                <span id="ref-code">REFRESHING...</span>
                <button style="background:none; border:none; color:var(--cyan); cursor:pointer;" onclick="copyRef()">
                    <i class="far fa-copy fa-lg"></i>
                </button>
            </div>
        </div>
        <button id="btn-claim-ref" class="btn-main btn-pink" style="margin-top:20px;" disabled onclick="processRefClaim()">KLAIM MINGGUAN</button>
    </div>

    <div class="mailbox-title"><i class="fas fa-gift fa-fade"></i> INCOMING GIFTS</div>
    <div id="mail-list" class="mail-list"></div>
</div>

<div id="modal-overlay">
    <div class="modal">
        <i class="fas fa-shield-check" style="font-size:45px; color:var(--cyan); margin-bottom:20px;"></i>
        <h3 id="m-title" style="color:#fff; font-family:'Cinzel Decorative';"></h3>
        <p id="m-msg" style="margin:20px 0; color:rgba(255,255,255,0.9); font-size:14px;"></p>
        <button class="btn-main" onclick="closeModal()">CONFIRM</button>
    </div>
</div>

<div class="nav-bar">
    <a href="game.html" class="nav-item"><i class="fas fa-gamepad"></i>PLAY</a>
    <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i>DEPO</a>
    <a href="reward.html" class="nav-item active"><i class="fas fa-gift"></i>REWARD</a>
    <a href="profil.html" class="nav-item"><i class="fas fa-user-shield"></i>PROFIL</a>
</div>

<script>
const USERNAME = localStorage.getItem('neon_user');
let isClaiming = false; // Memori lock agar tidak bisa spam klik

// --- BACKGROUND ANIMATION ---
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
function initCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    particles = [];
    for(let i=0; i<30; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 1,
            speed: Math.random() * 0.5 + 0.2,
            color: Math.random() > 0.5 ? '#ff0077' : '#0022ff'
        });
    }
}
function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
        p.y -= p.speed;
        if(p.y < 0) p.y = canvas.height;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fillStyle = p.color;
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
window.onresize = initCanvas;
initCanvas();
animate();

// --- LOGIC SYSTEMS ---
function playSnd(id) { 
    const s = document.getElementById(id); 
    if(s) { s.currentTime = 0; s.play().catch(()=>{}); } 
}

async function init() {
    if(!USERNAME) { window.location.href = 'index.html'; return; }
    
    // Perbaikan: Ambil Referral Code Langsung dari DB
    const { data: profile } = await _supabase.from('profiles').select('*').eq('username', USERNAME).single();
    if(profile) {
        document.getElementById('ref-code').innerText = profile.referral_code || "MISSING";
    }
    
    await checkDailyStatus();
    loadReferralStats();
    loadInbox();
}

// --- ANTI SPAM DAILY SYSTEM ---
async function checkDailyStatus() {
    const btn = document.getElementById('btn-daily');
    const today = new Date().toDateString();

    // 1. Cek LocalStorage
    if(localStorage.getItem('daily_done_' + USERNAME) === today) {
        lockButton(btn);
        return;
    }

    // 2. Cek Database (Validasi Lintas Device)
    const start = new Date(); start.setHours(0,0,0,0);
    const { data } = await _supabase.from('deposits')
        .select('id').eq('username', USERNAME)
        .eq('keterangan', 'DAILY_BONUS')
        .gte('created_at', start.toISOString());

    if(data && data.length > 0) {
        localStorage.setItem('daily_done_' + USERNAME, today);
        lockButton(btn);
    }
}

function lockButton(btn) {
    btn.disabled = true;
    btn.innerText = "SUDAH KLAIM";
    btn.style.opacity = "0.3";
}

async function handleDailyClaim() {
    if(isClaiming) return; // Kunci jika sedang proses
    isClaiming = true;
    
    playSnd('snd-click');
    const btn = document.getElementById('btn-daily');
    btn.innerText = "CHECKING...";
    btn.disabled = true;

    // Validasi ulang hari ini di database sebelum inject saldo
    const todayStr = new Date().toDateString();
    const start = new Date(); start.setHours(0,0,0,0);
    
    const { data: verify } = await _supabase.from('deposits')
        .select('id').eq('username', USERNAME)
        .eq('keterangan', 'DAILY_BONUS')
        .gte('created_at', start.toISOString());

    if(verify && verify.length > 0) {
        showModal("FAILED", "Anda sudah mengambil jatah hari ini!");
        lockButton(btn);
        isClaiming = false;
        return;
    }

    // Proses Klaim
    try {
        const { data: p } = await _supabase.from('profiles').select('saldo').eq('username', USERNAME).single();
        const bonus = 1000;
        
        await _supabase.from('profiles').update({ saldo: (p.saldo || 0) + bonus }).eq('username', USERNAME);
        await _supabase.from('deposits').insert([{ 
            username: USERNAME, amount: bonus, method: 'SYSTEM', 
            status: 'SUKSES', net_receive: bonus, keterangan: 'DAILY_BONUS' 
        }]);

        localStorage.setItem('daily_done_' + USERNAME, todayStr);
        playSnd('snd-success');
        showModal("SUCCESS", "Bonus Rp 1.000 telah masuk ke saldo!");
        lockButton(btn);
    } catch (err) {
        btn.disabled = false;
        btn.innerText = "KLAIM RP 1.000";
    } finally {
        isClaiming = false;
    }
}

async function loadReferralStats() {
    const { data: friends } = await _supabase.from('profiles').select('username').eq('invited_by', USERNAME);
    if(friends && friends.length > 0) {
        const friendUsernames = friends.map(f => f.username);
        const { data: deposits } = await _supabase.from('deposits')
            .select('username').in('username', friendUsernames)
            .eq('status', 'SUKSES').gte('amount', 20000);

        const uniqueValids = [...new Set(deposits.map(d => d.username))];
        const count = uniqueValids.length;
        document.getElementById('valid-ref').innerText = count;
        const bonus = count * 5000;
        document.getElementById('bonus-ref').innerText = "Rp " + bonus.toLocaleString();

        const isSunday = new Date().getDay() === 0;
        const claimBtn = document.getElementById('btn-claim-ref');
        if(isSunday && bonus > 0) {
            claimBtn.disabled = false;
            claimBtn.innerText = "CAIRKAN Rp " + bonus.toLocaleString();
        }
    }
}

async function processRefClaim() {
    playSnd('snd-click');
    const { data: friends } = await _supabase.from('profiles').select('username').eq('invited_by', USERNAME);
    const uNames = friends.map(f => f.username);
    const { data: vDepo } = await _supabase.from('deposits').select('username').in('username', uNames).eq('status', 'SUKSES').gte('amount', 20000);
    const validCount = [...new Set(vDepo.map(d => d.username))].length;
    
    const bonus = validCount * 5000;
    const { data: p } = await _supabase.from('profiles').select('saldo').eq('username', USERNAME).single();
    
    await _supabase.from('profiles').update({ saldo: p.saldo + bonus }).eq('username', USERNAME);
    await _supabase.from('deposits').insert([{ 
        username: USERNAME, amount: bonus, method: 'REFERRAL', 
        status: 'SUKSES', net_receive: bonus, keterangan: 'WEEKLY_REF_CLAIM' 
    }]);

    playSnd('snd-success');
    showModal("PAID", "Bonus referral masuk ke saldo utama!");
    loadReferralStats();
}

async function loadInbox() {
    const list = document.getElementById('mail-list');
    const { data } = await _supabase.from('inbox').select('*').eq('username', USERNAME).eq('status', 'UNCLAIMED');
    if(data && data.length > 0) {
        list.innerHTML = data.map(m => `
            <div class="mail-item">
                <div style="font-size:10px; color:var(--cyan); letter-spacing:1px; margin-bottom:5px;">SYSTEM ALERT</div>
                <div style="font-size:14px; margin-bottom:10px;">${m.pesan}</div>
                <div style="color:var(--green); font-weight:900; font-size:18px; margin-bottom:15px;">+ Rp ${m.nominal.toLocaleString()}</div>
                <button class="btn-main" style="background:var(--pink);" onclick="claimMail(${m.id}, ${m.nominal})">REDEEM GIFT</button>
            </div>
        `).join('');
    } else {
        list.innerHTML = '<div style="text-align:center; opacity:0.3; padding:20px; font-size:12px;">No incoming gifts.</div>';
    }
}

async function claimMail(id, amt) {
    playSnd('snd-click');
    const { data: p } = await _supabase.from('profiles').select('saldo').eq('username', USERNAME).single();
    await _supabase.from('profiles').update({ saldo: p.saldo + amt }).eq('username', USERNAME);
    await _supabase.from('inbox').update({ status: 'CLAIMED' }).eq('id', id);
    playSnd('snd-success');
    showModal("REDEEMED", "Hadiah admin telah dicairkan!");
    loadInbox();
}

function copyRef() {
    playSnd('snd-click');
    const code = document.getElementById('ref-code').innerText;
    navigator.clipboard.writeText(code);
    showModal("COPIED", "Kode Referral berhasil disalin!");
}

function showModal(t, m) {
    document.getElementById('m-title').innerText = t;
    document.getElementById('m-msg').innerText = m;
    document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() {
    playSnd('snd-click');
    document.getElementById('modal-overlay').style.display = 'none';
}

window.onload = init;
</script>
</body>
</html>
