<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>REWARDS & MAIL - NEON PLINKO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root {
          --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --green: #00ff88; --bg: #02030d;
          --gp: 0 0 15px rgba(255, 0, 119, 0.4);
          --gb: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
          margin: 0; background: var(--bg); color: #fff;
          font-family: 'Outfit', sans-serif; padding-bottom: 90px;
          background-image: radial-gradient(circle at top, rgba(0,212,255,0.05) 0%, transparent 70%);
        }

        .header {
          padding: 20px; text-align: center; border-bottom: 1px solid rgba(0, 212, 255, 0.2);
          background: rgba(2, 3, 13, 0.95); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px);
        }
        .header h1 { margin: 0; font-family: 'Cinzel Decorative'; font-size: 1.1rem; letter-spacing: 2px; color: var(--blue); text-shadow: var(--gb); }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }

        /* Reward Card */
        .reward-card {
          background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .reward-icon { font-size: 40px; color: var(--yellow); margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(251, 255, 0, 0.3)); }
        .reward-card h2 { margin: 0; font-family: 'Cinzel Decorative'; font-size: 1.1rem; }
        .reward-card p { opacity: 0.6; font-size: 0.8rem; margin: 8px 0 15px; }

        /* Referral Box */
        .ref-box {
          background: rgba(0, 212, 255, 0.05); border: 1px dashed var(--blue);
          border-radius: 15px; padding: 15px; margin-top: 10px;
        }
        .ref-code-area { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px 15px; border-radius: 10px; }
        #ref-code { font-size: 1.1rem; font-weight: 900; color: var(--yellow); letter-spacing: 2px; }

        /* Inbox/Mailbox Section */
        .mailbox-title { font-family: 'Cinzel Decorative'; font-size: 0.9rem; color: var(--pink); margin: 25px 0 15px; display: flex; align-items: center; gap: 10px; }
        .mailbox-title i { text-shadow: var(--gp); }
        
        .mail-list { display: flex; flex-direction: column; gap: 12px; }
        .mail-item {
          background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
          border: 1px solid rgba(255, 0, 119, 0.2); border-radius: 15px; padding: 15px;
          display: flex; flex-direction: column; gap: 10px; position: relative;
          animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .mail-header { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--pink); font-weight: 700; }
        .mail-body { font-size: 0.85rem; line-height: 1.4; color: #ddd; }
        .mail-amount { color: var(--green); font-weight: 800; font-size: 1rem; }

        .btn-claim {
          width: 100%; padding: 12px; border: none; border-radius: 50px;
          background: linear-gradient(90deg, var(--blue), #0044ff);
          color: #fff; font-weight: 800; font-size: 0.85rem; cursor: pointer; text-transform: uppercase;
          box-shadow: var(--gb); transition: 0.3s;
        }
        .btn-claim:active { transform: scale(0.95); }
        .btn-claim:disabled { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }
        .btn-mail-claim { background: linear-gradient(90deg, var(--pink), #b400dc); box-shadow: var(--gp); margin-top: 5px; }

        /* Nav Bar */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(5, 6, 20, 0.98); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--blue); backdrop-filter: blur(20px); z-index: 1000; }
        .nav-item { color: #444; text-decoration: none; text-align: center; font-size: 10px; font-weight: 700; flex:1; }
        .nav-item.active { color: var(--blue); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 5px; }

        /* Modal */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal { background: #0a0b1a; border: 2px solid var(--blue); border-radius: 20px; padding: 25px; width: 85%; max-width: 300px; text-align: center; box-shadow: var(--gb); }
    </style>
</head>
<body>

<audio id="snd-click" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b417f73c.mp3"></audio>
<audio id="snd-success" src="https://cdn.pixabay.com/audio/2021/08/04/audio_062564a02d.mp3"></audio>

<div class="header">
  <h1>MISSIONS & REWARDS</h1>
</div>

<div class="container">
    <div class="reward-card">
        <div class="reward-icon"><i class="fas fa-calendar-check"></i></div>
        <h2>Daily Check-in</h2>
        <p>Login hari ini dan klaim hadiah harian Anda.</p>
        <button id="btn-daily" class="btn-claim" onclick="handleDailyClaim()">KLAIM Rp 1.000</button>
    </div>

    <div class="reward-card">
        <div class="reward-icon" style="color:var(--pink)"><i class="fas fa-user-plus"></i></div>
        <h2>Referral Code</h2>
        <p>Gunakan kode unik Anda untuk mengundang pemain baru.</p>
        <div class="ref-box">
            <div class="ref-code-area">
                <span id="ref-code">MEMUAT...</span>
                <button style="background:none; border:none; color:var(--blue); font-size:1.2rem;" onclick="copyRef()"><i class="far fa-copy"></i></button>
            </div>
        </div>
    </div>

    <div class="mailbox-title"><i class="fas fa-envelope-open-text"></i> KOTAK HADIAH (INBOX)</div>
    <div id="mail-list" class="mail-list">
        </div>
</div>

<div id="modal-overlay">
    <div class="modal">
        <h3 id="m-title" style="color:var(--blue); font-family:'Cinzel Decorative';">INFO</h3>
        <p id="m-msg" style="margin:15px 0; font-size:0.9rem; color:#ccc;"></p>
        <button class="btn-claim" onclick="closeModal()">SAYA MENGERTI</button>
    </div>
</div>

<div class="nav-bar">
    <a href="game.html" class="nav-item"><i class="fas fa-gamepad"></i>PLAY</a>
    <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i>DEPO</a>
    <a href="reward.html" class="nav-item active"><i class="fas fa-gift"></i>REWARD</a>
    <a href="profil.html" class="nav-item"><i class="fas fa-user-shield"></i>PROFIL</a>
</div>

<script>
const user = getUsername();

function playSnd(type) {
    const s = document.getElementById('snd-' + type);
    if(s) { s.currentTime = 0; s.play(); }
}

async function initReward() {
    if (!user) return;

    // Load Referral dari DB via config.js data
    const { data: prof } = await _supabase.from('profiles').select('referral_code').eq('username', user).single();
    document.getElementById('ref-code').innerText = prof?.referral_code || "NEON-USER";

    checkTodayClaim();
    loadInbox();
}

// --- FIX CORE: LOAD INBOX ---
async function loadInbox() {
    const mailContainer = document.getElementById('mail-list');
    mailContainer.innerHTML = '<div style="text-align:center; padding:20px; opacity:0.3; font-size:12px;">Mencari hadiah...</div>';

    try {
        // Kita gunakan .or untuk menangkap status 'UNCLAIMED' atau yang masih NULL (kosong)
        const { data, error } = await _supabase
            .from('inbox')
            .select('*')
            .eq('username', user)
            .or('status.eq.UNCLAIMED,status.is.null') 
            .order('created_at', { ascending: false });

        if (error) throw error;

        if (data && data.length > 0) {
            let html = "";
            data.forEach(item => {
                html += `
                    <div class="mail-item" id="mail-${item.id}">
                        <div class="mail-header">
                            <span>FROM: ADMIN NEON</span>
                            <span>${new Date(item.created_at).toLocaleDateString()}</span>
                        </div>
                        <div class="mail-body">${item.pesan || 'Hadiah Spesial Untukmu!'}</div>
                        <div class="mail-amount">IDR ${(item.nominal || 0).toLocaleString()}</div>
                        <button class="btn-claim btn-mail-claim" onclick="claimMail(${item.id}, ${item.nominal})">KLAIM SEKARANG</button>
                    </div>
                `;
            });
            mailContainer.innerHTML = html;
        } else {
            mailContainer.innerHTML = '<div style="text-align:center; padding:40px; opacity:0.3; font-size:12px;"><i class="fas fa-box-open" style="font-size:30px; display:block; margin-bottom:10px;"></i>Kotak hadiah kosong.</div>';
        }
    } catch (err) {
        mailContainer.innerHTML = '<div style="text-align:center; color:red; font-size:12px;">Gagal memuat data inbox.</div>';
    }
}

async function claimMail(mailId, amount) {
    playSnd('click');
    const btn = document.querySelector(`#mail-${mailId} button`);
    btn.disabled = true;
    btn.innerText = "PROCESSING...";

    try {
        // Ambil saldo terbaru dari DB (Jangan pakai localStorage agar akurat)
        const { data: p } = await _supabase.from('profiles').select('saldo').eq('username', user).single();
        const newSaldo = (p.saldo || 0) + amount;

        // 1. Update Saldo
        await _supabase.from('profiles').update({ saldo: newSaldo }).eq('username', user);
        
        // 2. Tandai Pesan sebagai CLAIMED
        await _supabase.from('inbox').update({ status: 'CLAIMED' }).eq('id', mailId);

        // 3. Masukkan ke Riwayat agar pemain tidak bingung saldo nambah dari mana
        await _supabase.from('deposits').insert([{
            username: user,
            amount: amount,
            method: 'REWARD',
            status: 'SUKSES',
            net_receive: amount
        }]);

        playSnd('success');
        showModal("HADIAH DITERIMA", `Selamat! Saldo Rp ${amount.toLocaleString()} telah ditambahkan ke akun Master.`);
        
        syncNeonData(); // Update display saldo di header jika ada
        loadInbox(); // Refresh list agar yang sudah diklaim hilang

    } catch (err) {
        btn.disabled = false;
        btn.innerText = "KLAIM ULANG";
        showModal("GAGAL", "Terjadi gangguan koneksi.");
    }
}

async function handleDailyClaim() {
    playSnd('click');
    const btn = document.getElementById('btn-daily');
    btn.disabled = true;

    try {
        const { data: p } = await _supabase.from('profiles').select('saldo').eq('username', user).single();
        const bonus = 1000;

        await _supabase.from('profiles').update({ saldo: (p.saldo || 0) + bonus }).eq('username', user);
        await _supabase.from('deposits').insert([{
            username: user,
            amount: bonus,
            method: 'SYSTEM',
            status: 'SUKSES',
            net_receive: bonus,
            keterangan: 'DAILY_BONUS'
        }]);

        playSnd('success');
        showModal("CHECK-IN BERHASIL", "Bonus harian Rp 1.000 masuk ke saldo!");
        syncNeonData();
        checkTodayClaim();
    } catch (e) { btn.disabled = false; }
}

async function checkTodayClaim() {
    const today = new Date().toISOString().split('T')[0];
    const { data } = await _supabase.from('deposits')
        .select('id')
        .eq('username', user)
        .eq('keterangan', 'DAILY_BONUS')
        .filter('created_at', 'gte', today + ' 00:00:00');
        
    if (data && data.length > 0) {
        const btn = document.getElementById('btn-daily');
        btn.disabled = true;
        btn.innerText = "SUDAH KLAIM HARI INI";
    }
}

function copyRef() {
    playSnd('click');
    const code = document.getElementById('ref-code').innerText;
    navigator.clipboard.writeText(code);
    showModal("COPY SUCCESS", "Kode referral Master berhasil disalin.");
}

function showModal(t, m) {
    document.getElementById('m-title').innerText = t;
    document.getElementById('m-msg').innerText = m;
    document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() { playSnd('click'); document.getElementById('modal-overlay').style.display = 'none'; }

window.onload = initReward;
</script>
</body>
</html>
