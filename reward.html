<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>REWARDS - NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --green: #00ff88; --bg: #02030d;
  --card: rgba(255, 255, 255, 0.03);
  --neon-blue: 0 0 15px rgba(0, 212, 255, 0.4);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; background: var(--bg); color: #fff;
  font-family: 'Outfit', sans-serif; overflow-x: hidden;
}

/* Header & Nav */
.header {
  padding: 20px; text-align: center; border-bottom: 1px solid rgba(0, 212, 255, 0.2);
  background: rgba(2, 3, 13, 0.9); position: sticky; top: 0; z-index: 100;
}
.header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; color: var(--blue); text-shadow: var(--neon-blue); }

.container { padding: 20px; max-width: 500px; margin: 0 auto; padding-bottom: 100px; }

/* Reward Card */
.reward-card {
  background: var(--card); border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 20px;
  backdrop-filter: blur(10px);
}
.reward-icon { font-size: 50px; color: var(--yellow); margin-bottom: 15px; }
.reward-card h2 { margin: 0; font-size: 1.4rem; color: #fff; }
.reward-card p { opacity: 0.6; font-size: 0.9rem; margin: 10px 0 20px; }

.btn-claim {
  width: 100%; padding: 15px; border: none; border-radius: 12px;
  background: linear-gradient(45deg, var(--blue), #0044ff);
  color: #fff; font-weight: 700; font-size: 1rem; cursor: pointer;
  transition: 0.3s; box-shadow: var(--neon-blue);
}
.btn-claim:disabled { background: #333; box-shadow: none; cursor: not-allowed; opacity: 0.5; }

/* Referral Section */
.ref-box {
  background: rgba(0, 212, 255, 0.05); border: 1px dashed var(--blue);
  border-radius: 15px; padding: 15px; margin-top: 20px;
}
.ref-label { font-size: 0.8rem; color: var(--blue); margin-bottom: 8px; font-weight: 600; }
.ref-code-area { display: flex; justify-content: space-between; align-items: center; }
#ref-code { font-size: 1.2rem; font-weight: 700; color: var(--yellow); letter-spacing: 1px; }
.btn-copy { background: none; border: none; color: #fff; font-size: 1.1rem; cursor: pointer; }

/* Modal */
#modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  backdrop-filter: blur(5px); z-index: 1000;
}
.modal {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 85%; max-width: 320px; background: #0a0b1a; border: 2px solid var(--blue);
  border-radius: 20px; padding: 30px; text-align: center; z-index: 1001;
}

/* Bottom Nav */
.nav-bar {
  position: fixed; bottom: 0; width: 100%; height: 70px;
  background: rgba(5, 6, 20, 0.95); display: flex; justify-content: space-around;
  align-items: center; border-top: 1px solid rgba(255,255,255,0.05);
}
.nav-item { color: #555; text-decoration: none; text-align: center; font-size: 0.7rem; }
.nav-item.active { color: var(--blue); }
.nav-item i { font-size: 1.2rem; display: block; margin-bottom: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>MISSION & REWARDS</h1>
</div>

<div class="container">
  <div class="reward-card">
    <div class="reward-icon"><i class="fas fa-calendar-check"></i></div>
    <h2>Daily Check-in</h2>
    <p>Ambil hadiah harian gratis Anda sebesar Rp 1.000 setiap hari.</p>
    <button id="btn-daily" class="btn-claim" onclick="claimDaily()">AMBIL HADIAH</button>
  </div>

  <div class="reward-card">
    <div class="reward-icon" style="color:var(--pink)"><i class="fas fa-users"></i></div>
    <h2>Undang Teman</h2>
    <p>Dapatkan komisi setiap teman yang mendaftar dan bermain menggunakan kode Anda.</p>
    
    <div class="ref-box">
      <div class="ref-label">KODE REFERRAL ANDA</div>
      <div class="ref-code-area">
        <span id="ref-code">LOADING...</span>
        <button class="btn-copy" onclick="copyRef()"><i class="far fa-copy"></i></button>
      </div>
    </div>
  </div>
</div>

<div id="modal-overlay" onclick="closeModal()"></div>
<div id="modal" class="modal" style="display:none;">
  <div id="modal-icon" style="font-size:40px; margin-bottom:15px;"></div>
  <h3 id="modal-title"></h3>
  <p id="modal-msg" style="font-size:0.9rem; opacity:0.7;"></p>
  <button class="btn-claim" onclick="closeModal()" style="margin-top:10px;">OKE</button>
</div>

<div class="nav-bar">
  <a href="game.html" class="nav-item"><i class="fas fa-gamepad"></i>PLAY</a>
  <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i>DEPO</a>
  <a href="reward.html" class="nav-item active"><i class="fas fa-gift"></i>REWARD</a>
  <a href="profil.html" class="nav-item"><i class="fas fa-user"></i>PROFIL</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
// Ambil username dari session
const user = localStorage.getItem('user_neon');

async function initReward() {
  if (!user) {
    window.location.href = 'index.html';
    return;
  }

  try {
    // 1. Ambil data profil (untuk Kode Referral)
    const { data: profile } = await _supabase
      .from('profiles')
      .select('username') // Kode ref biasanya username atau kolom khusus
      .eq('username', user)
      .single();

    if (profile) {
      document.getElementById('ref-code').innerText = profile.username.toUpperCase();
    }

    // 2. Cek status klaim hari ini
    const today = new Date().toISOString().split('T')[0];
    const { data: check } = await _supabase
      .from('daily_claims')
      .select('*')
      .eq('username', user)
      .eq('claimed_at', today);

    if (check && check.length > 0) {
      const btn = document.getElementById('btn-daily');
      btn.disabled = true;
      btn.innerText = "SUDAH DIKLAIM HARI INI";
    }

  } catch (e) { console.error(e); }
}

async function claimDaily() {
  const btn = document.getElementById('btn-daily');
  btn.disabled = true;
  btn.innerText = "PROSES...";

  try {
    const today = new Date().toISOString().split('T')[0];
    const bonus = 1000;

    // Memanggil RPC dari SQL Master yang kita buat tadi
    const { error } = await _supabase.rpc('claim_daily_bonus', { 
      u_name: user, 
      amount: bonus,
      today_date: today
    });

    if (error) {
        if (error.code === '23505') { // Error unik (sudah klaim)
             showModal('❌', 'GAGAL', 'Anda sudah mengambil bonus hari ini!', 'var(--pink)');
        } else {
             throw error;
        }
    } else {
        showModal('🎁', 'BERHASIL', `Bonus harian Rp ${bonus.toLocaleString()} masuk ke saldo!`, 'var(--green)');
        btn.innerText = "SUDAH DIKLAIM";
    }

  } catch (err) {
    console.error(err);
    showModal('❌', 'ERROR', 'Gagal memproses reward.', 'var(--pink)');
    btn.disabled = false;
    btn.innerText = "COBA LAGI";
  }
}

function copyRef() {
  const code = document.getElementById('ref-code').innerText;
  navigator.clipboard.writeText(code).then(() => {
    alert("Kode Referral berhasil disalin!");
  });
}

function showModal(icon, title, msg, color) {
  document.getElementById('modal-icon').innerText = icon;
  document.getElementById('modal-title').innerText = title;
  document.getElementById('modal-msg').innerText = msg;
  document.getElementById('modal').style.borderColor = color;
  document.getElementById('modal').style.display = 'block';
  document.getElementById('modal-overlay').style.display = 'block';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  document.getElementById('modal-overlay').style.display = 'none';
}

window.onload = initReward;
</script>

</body>
</html>
