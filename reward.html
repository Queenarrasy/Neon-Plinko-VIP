<html>
<head>
    <title>Reward</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
        }
        .neon {
            text-shadow: 0 0 5px #0ff, 0 0 10px #0ff;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <h1 class="neon">Claim Your Daily Bonus</h1>
    <button id="claimButton">Claim Bonus</button>
    <div id="alert" class="neon" style="display: none;"></div>

    <script>
      document.getElementById('claimButton').onclick = function() {
          try {
              // Simulate bonus claiming logic
              throw new Error('Bonus already claimed today!');  // Placeholder for error handling
          } catch (e) {
              showAlert(e.message, 'error');
          }
      }

      function showAlert(message, type) {
          var alertDiv = document.getElementById('alert');
          alertDiv.className = type === 'error' ? 'neon error' : 'neon';
          alertDiv.innerText = message;
          alertDiv.style.display = 'block';
          setTimeout(() => { alertDiv.style.display = 'none'; }, 3000);
      }
    </script>
</body>
</html>
