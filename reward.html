<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="global.js"></script>
    <title>Neon Plinko VIP - Daily Bonus</title>
</head>
<body>
    <div class="container">
        <h1>Claim Your Daily Bonus!</h1>
        <div id="inbox-display"></div>
        <button id="claim-bonus">Claim Bonus</button>
    </div>

    <script>
        const claimButton = document.getElementById('claim-bonus');
        const inboxDisplay = document.getElementById('inbox-display');
        const SCRIPT_URL = window.SCRIPT_URL;
        let lastClaimTime = localStorage.getItem('lastClaimTime') || 0;

        claimButton.addEventListener('click', async () => {
            const currentTime = new Date().getTime();
            const cooldownPeriod = 24 * 60 * 60 * 1000; // 24 hours in milliseconds

            if (currentTime - lastClaimTime < cooldownPeriod) {
                AlertUser('You can only claim once every 24 hours!', 'error');
                return;
            }

            try {
                const response = await fetch(SCRIPT_URL + '/claim-bonus');
                const data = await response.json();
                if (data.success) {
                    lastClaimTime = currentTime;
                    localStorage.setItem('lastClaimTime', lastClaimTime);
                    AlertUser('Bonus claimed successfully!', 'success');
                    UpdateInboxDisplay(data.message);
                } else {
                    AlertUser(data.message || 'Failed to claim bonus.', 'error');
                }
            } catch (error) {
                AlertUser('An error occurred while claiming bonus.', 'error');
            }
        });

        function AlertUser(message, type) {
            const alertBox = document.createElement('div');
            alertBox.className = `alert ${type}`;
            alertBox.innerText = message;
            document.body.appendChild(alertBox);
            setTimeout(() => alertBox.remove(), 3000);
        }

        function UpdateInboxDisplay(message) {
            inboxDisplay.innerHTML = `<p>${message}</p>`;
        }
    </script>
</body>
</html>
