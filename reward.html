<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>REWARDS - NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--green:#26a17b;--bg:#02030d;
  --card:rgba(255,255,255,.025);
  --gp:0 0 8px rgba(255,0,119,.5),0 0 22px rgba(255,0,119,.15);
  --gb:0 0 8px rgba(0,85,255,.5),0 0 22px rgba(0,85,255,.15);
  --gy:0 0 8px rgba(245,230,66,.5),0 0 22px rgba(245,230,66,.13);
  --bp:rgba(255,0,119,.32);--bb:rgba(0,85,255,.32);--by:rgba(245,230,66,.32);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg); color:#dde0f0; font-family:'Outfit',sans-serif; min-height:100vh;
  background-image: radial-gradient(ellipse 70% 50% at 10% 5%,rgba(0,55,255,.06) 0%,transparent 70%);
}

/* HEADER */
.header{position:sticky;top:0;z-index:200;padding:13px 18px;background:rgba(2,3,13,.93);
  border-bottom:1px solid var(--bb);backdrop-filter:blur(18px);
  display:flex;align-items:center;justify-content:space-between;}
.btn-back{color:rgba(255,255,255,.6); text-decoration:none; width:32px; height:32px; border:1px solid var(--bb); border-radius:50%; display:flex; align-items:center; justify-content:center;}

.header-title{font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;letter-spacing:2px;
  background:linear-gradient(90deg,var(--pink),#dd66ff 40%,var(--yellow));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* CONTAINER */
.container{padding:16px;max-width:520px;margin:auto;display:flex;flex-direction:column;gap:14px;}
.sec-lbl{display:flex;align-items:center;gap:8px;font-size:9px;font-weight:600;letter-spacing:2px; text-transform:uppercase;opacity:.45;}

/* CARDS */
.reward-card{background:var(--card); border:1px solid var(--bb); border-radius:20px; padding:18px; box-shadow:var(--gb);}
.daily-card{border-color:var(--pink); box-shadow:var(--gp); text-align:center;}

.ev-prize{font-family:'Cinzel Decorative'; font-size:38px; color:var(--yellow); text-shadow:var(--gy); margin:10px 0;}

.btn-claim{width:100%; padding:14px; border-radius:50px; border:none; background:linear-gradient(90deg, var(--blue), var(--pink)); color:#fff; font-weight:700; cursor:pointer; margin-top:10px;}
.btn-claim:disabled{opacity:0.4; cursor:not-allowed;}

.ref-box{background:rgba(245,230,66,0.05); border:1px dashed var(--yellow); padding:15px; border-radius:15px; text-align:center; margin-bottom:10px;}
.ref-code{font-size:24px; font-weight:900; color:var(--yellow); letter-spacing:4px;}

.list-item{display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:13px;}
.status-v{color:#00ff88; font-weight:bold;}
.status-p{color:var(--yellow); opacity:0.7;}

#loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div id="loading-overlay"><i class="fa-solid fa-spinner fa-spin fa-2x"></i></div>

<div class="header">
  <a href="game.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i></a>
  <div class="header-title">REWARDS & GIFT</div>
  <div style="width:32px;"></div>
</div>

<div class="container">
  
  <div class="sec-lbl" style="color:var(--pink)">Daily Reward</div>
  <div class="reward-card daily-card">
    <div style="font-size:12px; opacity:0.6;">BONUS LOGIN HARIAN</div>
    <div class="ev-prize">IDR 1.000</div>
    <button id="btn-daily" class="btn-claim" onclick="claimDaily()">KLAIM SEKARANG</button>
    <p id="daily-status" style="font-size:10px; margin-top:10px; color:var(--pink);"></p>
  </div>

  <div class="sec-lbl" style="color:var(--yellow)">Referral System</div>
  <div class="reward-card">
    <div class="ref-box">
      <div style="font-size:10px; opacity:0.6; margin-bottom:5px;">KODE REFERRAL ANDA</div>
      <div class="ref-code" id="my-ref-code">LOADING...</div>
      <button onclick="copyRef()" style="background:none; border:none; color:var(--blue); font-size:11px; cursor:pointer; margin-top:5px;">
        <i class="fa-solid fa-copy"></i> Salin Link Undangan
      </button>
    </div>

    <div style="display:flex; justify-content:space-between; margin:15px 0; padding:10px; background:rgba(255,255,255,0.03); border-radius:10px;">
        <div style="text-align:center; flex:1;">
            <div style="font-size:9px; opacity:0.5;">TOTAL UNDANGAN</div>
            <div id="count-total" style="font-weight:bold;">0</div>
        </div>
        <div style="text-align:center; flex:1; border-left:1px solid rgba(255,255,255,0.1);">
            <div style="font-size:9px; opacity:0.5;">TEMAN VALID</div>
            <div id="count-valid" style="font-weight:bold; color:#00ff88;">0</div>
        </div>
    </div>

    <div class="sec-lbl">Daftar Teman (Terbaru)</div>
    <div id="ref-list" style="margin-top:10px; max-height:200px; overflow-y:auto;">
        </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
const USERNAME = localStorage.getItem('user_session');
const DAILY_AMT = 1000;

if(!USERNAME) window.location.href = 'index.html';

async function initReward() {
    showLoading(true);
    
    // 1. Ambil data profil user
    const { data: user, error } = await _supabase
        .from('profiles')
        .select('*')
        .eq('username', USERNAME)
        .single();

    if(user) {
        document.getElementById('my-ref-code').innerText = user.referral_code;
        checkDailyStatus(user.last_daily_claim);
        loadReferralData(user.referral_code);
    }
    
    showLoading(false);
}

function checkDailyStatus(lastClaim) {
    const btn = document.getElementById('btn-daily');
    const status = document.getElementById('daily-status');
    
    if(!lastClaim) return;

    const lastDate = new Date(lastClaim).toDateString();
    const today = new Date().toDateString();

    if(lastDate === today) {
        btn.disabled = true;
        btn.innerText = "SUDAH DIKLAIM";
        status.innerText = "* Bonus akan tersedia kembali besok.";
    }
}

async function claimDaily() {
    showLoading(true);
    const today = new Date().toISOString();

    // Update saldo dan tanggal klaim di database
    const { data, error } = await _supabase.rpc('claim_daily_bonus', { 
        u_name: USERNAME,
        amount: DAILY_AMT,
        claim_time: today
    });

    showLoading(false);

    if(error) {
        alert("Gagal klaim: " + error.message);
    } else {
        alert("Selamat! IDR 1.000 telah ditambahkan ke saldo Anda.");
        location.reload();
    }
}

async function loadReferralData(myCode) {
    // Ambil data teman yang mendaftar menggunakan kode kita
    // Diasumsikan di tabel profiles ada kolom 'referred_by'
    const { data: friends, error } = await _supabase
        .from('profiles')
        .select('username, created_at, saldo')
        .eq('referred_by', myCode)
        .order('created_at', { ascending: false });

    if(friends) {
        const list = document.getElementById('ref-list');
        const countTotal = document.getElementById('count-total');
        const countValid = document.getElementById('count-valid');
        
        countTotal.innerText = friends.length;
        
        let valid = 0;
        list.innerHTML = friends.map(f => {
            // Syarat VALID: misalnya sudah pernah deposit/punya saldo > 0
            const isValid = f.saldo > 0;
            if(isValid) valid++;

            return `
                <div class="list-item">
                    <span><i class="fa-solid fa-user-circle"></i> ${f.username}</span>
                    <span class="${isValid ? 'status-v' : 'status-p'}">
                        ${isValid ? 'VALID' : 'PENDING'}
                    </span>
                </div>
            `;
        }).join('');
        
        countValid.innerText = valid;
        if(friends.length === 0) list.innerHTML = '<div style="text-align:center; opacity:0.3; font-size:11px;">Belum ada teman yang bergabung.</div>';
    }
}

function copyRef() {
    const code = document.getElementById('my-ref-code').innerText;
    const link = window.location.origin + "/index.html?ref=" + code;
    navigator.clipboard.writeText(link);
    alert("Link referral disalin!");
}

function showLoading(show) {
    document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
}

initReward();
</script>

</body>
</html>
