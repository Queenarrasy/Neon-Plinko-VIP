<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>REWARD — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root{--pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--bg:#000005;--gp:0 0 15px rgba(255,0,119,.6);--gb:0 0 15px rgba(0,34,255,.6)}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
        body{background:var(--bg);color:#fff;overflow-x:hidden}
        #particles-js{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
        .container{position:relative;z-index:2;padding:20px;max-width:600px;margin:0 auto}
        
        .header{text-align:center;margin:30px 0}
        .title{font-family:'Cinzel Decorative',cursive;font-size:28px;text-shadow:var(--gp);color:var(--pink)}
        
        .card{background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:20px;margin-bottom:20px}
        .ref-box{text-align:center;padding:20px;border:2px dashed var(--blue);border-radius:15px;background:rgba(0,34,255,.05)}
        .ref-code{font-size:32px;font-weight:900;letter-spacing:5px;color:var(--yellow);text-shadow:0 0 10px rgba(251,255,0,.3);margin:10px 0}
        
        .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:20px}
        .stat-item{background:rgba(255,255,255,.03);padding:15px;border-radius:12px;text-align:center}
        .stat-val{display:block;font-size:20px;font-weight:800;color:var(--pink)}
        .stat-lbl{font-size:11px;opacity:.6;text-transform:uppercase}
        
        table{width:100%;border-collapse:collapse;margin-top:15px}
        th{text-align:left;font-size:12px;opacity:.5;padding:10px}
        td{padding:12px 10px;font-size:14px;border-bottom:1px solid rgba(255,255,255,.05)}
        
        .btn-claim{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(to right,var(--pink),var(--blue));color:#fff;font-weight:900;cursor:pointer;margin-top:15px;box-shadow:var(--gp)}
        .btn-claim:disabled{filter:grayscale(1);cursor:not-allowed}

        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:1000}
        .modal{background:#000;border:2px solid var(--pink);padding:30px;border-radius:20px;width:90%;max-width:350px;text-align:center}
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="container">
        <div class="header">
            <div class="title">REFERRAL REWARDS</div>
            <p style="font-size:12px;opacity:.7;margin-top:5px">Dapatkan Rp 5.000 per teman yang deposit!</p>
        </div>

        <div class="card">
            <div class="ref-box">
                <div style="font-size:12px;font-weight:700">KODE REFERRAL ANDA</div>
                <div class="ref-code" id="ref-code">LOADING...</div>
                <button onclick="copyRef()" style="background:none;border:1px solid var(--blue);color:#fff;padding:5px 15px;border-radius:20px;font-size:11px;cursor:pointer">SALIN LINK</button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-item"><span class="stat-val" id="total-ref">0</span><span class="stat-lbl">Teman</span></div>
                <div class="stat-item"><span class="stat-val" id="valid-ref">0</span><span class="stat-lbl">Valid</span></div>
            </div>
        </div>

        <div class="card">
            <h3 style="font-size:15px;margin-bottom:15px"><i class="fas fa-gift" style="color:var(--pink)"></i> TOTAL BONUS: <span id="bonus-total" style="color:var(--yellow)">Rp 0</span></h3>
            <button class="btn-claim" id="btn-claim" onclick="processClaim()" disabled>KLAIM HADIAH</button>
            <p id="claim-note" style="font-size:10px;text-align:center;margin-top:10px;opacity:.5"></p>
        </div>

        <div class="card">
            <h3 style="font-size:14px;margin-bottom:10px">DAFTAR TEMAN</h3>
            <table>
                <thead><tr><th>USER</th><th>STATUS</th><th>TANGGAL</th></tr></thead>
                <tbody id="ref-table-body">
                    <tr><td colspan="3" style="text-align:center;opacity:.3">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="m-title" style="color:var(--yellow);margin-bottom:10px"></h2>
            <p id="m-msg" style="font-size:14px;line-height:1.5;margin-bottom:20px"></p>
            <button class="btn-claim" onclick="closeModal()">TUTUP</button>
        </div>
    </div>

    <script>
        const SUPA_URL="https://jcxgankdwfwfnbwlkkpz.supabase.co", SUPA_KEY="sb_publishable_CaQyWYa_F3LDYEo8BDWAlQ_d0SscfCL";
        const _supabase = supabase.createClient(SUPA_URL, SUPA_KEY);
        const USERNAME = localStorage.getItem('neon_user');

        async function init(){
            if(!USERNAME) return location.href='index.html';
            loadData();
            particlesJS("particles-js", {"particles":{"number":{"value":50},"color":{"value":"#fbff00"},"opacity":{"value":0.3},"size":{"value":2},"line_linked":{"enable":true,"distance":150,"color":"#ff0077","opacity":0.2},"move":{"enable":true,"speed":1}}});
        }

        async function loadData(){
            try {
                // 1. Ambil info diri sendiri (terutama referral_code)
                const {data:me} = await _supabase.from('profiles').select('*').eq('username', USERNAME).single();
                if(!me) return;
                
                document.getElementById('ref-code').innerText = me.referral_code;
                const refLink = window.location.origin + "/index.html?ref=" + me.referral_code;
                window.currentRefLink = refLink;

                // 2. Cari teman yang kolom 'referred_by' nya berisi 'referral_code' milik saya
                const {data:friends} = await _supabase.from('profiles').select('username, created_at')
                    .eq('referred_by', me.referral_code).order('created_at', {ascending:false});
                
                const total = friends ? friends.length : 0;
                document.getElementById('total-ref').innerText = total;

                if(total === 0) {
                    document.getElementById('ref-table-body').innerHTML = '<tr><td colspan="3" style="text-align:center;opacity:.5">Belum ada teman yang bergabung</td></tr>';
                    return;
                }

                // 3. Cek siapa yang sudah deposit minimal 20.000 dan status SUKSES
                const uNames = friends.map(f => f.username);
                const {data:deposits} = await _supabase.from('deposits')
                    .select('username')
                    .in('username', uNames)
                    .eq('status', 'SUKSES')
                    .gte('amount', 20000);

                const validUsers = new Set((deposits || []).map(d => d.username));
                const validCount = validUsers.size;
                document.getElementById('valid-ref').innerText = validCount;

                // 4. Hitung bonus (Valid * 5000) dikurangi yang sudah pernah diklaim
                const {data:history} = await _supabase.from('deposits').select('amount').eq('username', USERNAME).eq('method', 'REFERRAL_BONUS');
                const alreadyClaimed = (history || []).reduce((acc, curr) => acc + Number(curr.amount), 0);
                
                const totalBonusPossible = validCount * 5000;
                const claimable = totalBonusPossible - alreadyClaimed;

                document.getElementById('bonus-total').innerText = "Rp " + totalBonusPossible.toLocaleString('id-ID');
                
                const btn = document.getElementById('btn-claim');
                if(claimable > 0) {
                    btn.disabled = false;
                    btn.innerText = `KLAIM RP ${claimable.toLocaleString('id-ID')}`;
                    document.getElementById('claim-note').innerText = "Saldo akan langsung bertambah";
                } else {
                    btn.disabled = true;
                    btn.innerText = validCount > 0 ? "SUDAH DIKLAIM" : "KLAIM HADIAH";
                    document.getElementById('claim-note').innerText = "Minimal 1 teman deposit 20rb untuk klaim";
                }

                // 5. Render Tabel
                document.getElementById('ref-table-body').innerHTML = friends.map(f => {
                    const isValid = validUsers.has(f.username);
                    return `<tr>
                        <td>${f.username}</td>
                        <td style="color:${isValid?'#00ff88':'var(--yellow)'};font-weight:800">${isValid?'VALID':'PENDING'}</td>
                        <td style="font-size:10px;opacity:.5">${new Date(f.created_at).toLocaleDateString('id-ID')}</td>
                    </tr>`;
                }).join('');

            } catch (e) { console.error(e); }
        }

        async function processClaim(){
            const btn = document.getElementById('btn-claim');
            btn.disabled = true;
            btn.innerText = "PROCESSING...";

            try {
                // Ambil ulang data untuk validasi server-side sederhana
                const {data:me} = await _supabase.from('profiles').select('saldo, referral_code').eq('username', USERNAME).single();
                const {data:friends} = await _supabase.from('profiles').select('username').eq('referred_by', me.referral_code);
                const uNames = (friends || []).map(f => f.username);
                
                const {data:deposits} = await _supabase.from('deposits').select('username').in('username', uNames).eq('status', 'SUKSES').gte('amount', 20000);
                const validCount = [...new Set((deposits || []).map(d => d.username))].length;

                const {data:history} = await _supabase.from('deposits').select('amount').eq('username', USERNAME).eq('method', 'REFERRAL_BONUS');
                const alreadyClaimed = (history || []).reduce((acc, curr) => acc + Number(curr.amount), 0);

                const amountToClaim = (validCount * 5000) - alreadyClaimed;

                if(amountToClaim <= 0) throw new Error("Tidak ada saldo yang bisa diklaim.");

                // Eksekusi Klaim
                await _supabase.from('profiles').update({ saldo: me.saldo + amountToClaim }).eq('username', USERNAME);
                await _supabase.from('deposits').insert([{
                    username: USERNAME, amount: amountToClaim, net_receive: amountToClaim,
                    method: 'REFERRAL_BONUS', status: 'SUKSES'
                }]);

                showModal("SUKSES!", `Bonus sebesar Rp ${amountToClaim.toLocaleString('id-ID')} telah ditambahkan ke saldo Anda.`);
                loadData();
            } catch (e) {
                showModal("GAGAL", e.message);
                btn.disabled = false;
            }
        }

        function copyRef(){
            navigator.clipboard.writeText(window.currentRefLink || '');
            alert("Link Referral disalin!");
        }

        function showModal(t, m){ 
            document.getElementById('m-title').innerText = t; 
            document.getElementById('m-msg').innerText = m; 
            document.getElementById('modal-overlay').style.display = 'flex'; 
        }
        function closeModal(){ document.getElementById('modal-overlay').style.display = 'none'; }
        
        window.onload = init;
    </script>
</body>
</html>
