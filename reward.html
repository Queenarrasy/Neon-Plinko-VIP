<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON REWARDS — VIP ACCESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root {
          --pink: #ff0077; 
          --blue: #0022ff; 
          --yellow: #fbff00;
          --bg: #02030d;
          --shadow-p: 0 0 25px rgba(255, 0, 119, 0.7);
          --shadow-b: 0 0 30px rgba(0, 34, 255, 0.7);
          --shadow-y: 0 0 20px rgba(251, 255, 0, 0.6);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
          margin: 0; background: var(--bg); color: #fff;
          font-family: 'Outfit', sans-serif; padding-bottom: 90px;
          min-height: 100vh; overflow-x: hidden;
        }

        /* Latar belakang partikel menembus kotak transparan */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.5; pointer-events: none;
        }

        .header {
          padding: 20px; text-align: center; border-bottom: 3px solid var(--blue);
          background: rgba(2, 3, 13, 0.9); position: sticky; top: 0; z-index: 100; 
          backdrop-filter: blur(15px); box-shadow: var(--shadow-b);
        }
        .header h1 { 
            margin: 0; font-family: 'Cinzel Decorative'; font-size: 1.2rem; 
            letter-spacing: 4px; color: var(--pink); text-shadow: var(--shadow-p); 
        }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; position: relative; z-index: 10; }

        .promo-banner {
            background: rgba(0, 34, 255, 0.1);
            border: 3px solid var(--pink); border-radius: 25px; padding: 25px;
            text-align: center; margin-bottom: 25px; box-shadow: var(--shadow-p);
            position: relative; overflow: hidden; backdrop-filter: blur(5px);
        }
        .promo-banner::before { 
            content: 'TOP EVENT'; position: absolute; top: 12px; left: -35px; 
            background: var(--pink); color: #fff; font-size: 8px; font-weight: 900; 
            padding: 5px 45px; transform: rotate(-45deg);
        }
        .promo-title { font-family: 'Cinzel Decorative'; font-size: 1.2rem; color: var(--yellow); text-shadow: var(--shadow-y); }
        
        .prizes { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .prize-item { font-size: 10px; font-weight: 800; color: #fff; }
        .prize-item b { display: block; font-size: 20px; color: var(--yellow); margin-top: 5px; text-shadow: var(--shadow-y); }

        /* BINGKAI INCOMING GIFT TEBAL KUNING NEON */
        .mail-list { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .mail-item {
          background: rgba(251, 255, 0, 0.05); 
          border: 4px solid var(--yellow); /* TEBAL */
          border-radius: 20px; padding: 18px; 
          box-shadow: var(--shadow-y), inset 0 0 15px rgba(251, 255, 0, 0.1);
          backdrop-filter: blur(6px);
        }

        /* Card Styles */
        .card {
          background: rgba(0, 34, 255, 0.08); border: 3px solid var(--blue);
          border-radius: 25px; padding: 20px; text-align: center; margin-bottom: 20px;
          box-shadow: var(--shadow-b); backdrop-filter: blur(6px);
        }

        .ref-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 15px 0; }
        .stat-box { 
            background: rgba(0, 0, 0, 0.7); padding: 12px; border-radius: 15px; 
            border: 1px solid var(--blue);
        }
        .stat-box small { display: block; font-size: 9px; color: var(--yellow); text-transform: uppercase; margin-bottom: 5px; }
        .stat-box span { font-weight: 900; color: #fff; font-size: 1.1rem; }

        .ref-box {
          background: rgba(0, 0, 0, 0.8); border: 2px dashed var(--yellow);
          border-radius: 15px; padding: 15px; margin-top: 10px;
        }
        #ref-code { font-size: 1.2rem; font-weight: 900; color: var(--yellow); letter-spacing: 3px; text-shadow: var(--shadow-y); }

        .section-title { 
            font-family: 'Cinzel Decorative'; font-size: 1rem; color: var(--pink); 
            margin: 25px 0 15px; display: flex; align-items: center; gap: 10px; 
            text-shadow: var(--shadow-p);
        }

        /* History List Styles */
        .history-card {
            background: rgba(0, 34, 255, 0.05); border: 2px solid var(--blue);
            border-radius: 20px; padding: 15px; max-height: 200px; overflow-y: auto;
            scrollbar-width: none; backdrop-filter: blur(5px);
        }
        .history-card::-webkit-scrollbar { display: none; }
        
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(0, 34, 255, 0.2);
        }
        .h-user { font-size: 14px; font-weight: 600; color: #fff; }
        .h-status { font-size: 10px; padding: 4px 10px; border-radius: 6px; font-weight: 900; }
        .status-valid { border: 1px solid var(--yellow); color: var(--yellow); box-shadow: var(--shadow-y); }
        .status-pending { border: 1px solid var(--pink); color: var(--pink); box-shadow: var(--shadow-p); }

        /* Buttons */
        .btn-main {
          width: 100%; padding: 15px; border: none; border-radius: 14px;
          background: var(--blue); color: #fff; font-weight: 900; 
          font-size: 0.9rem; cursor: pointer; text-transform: uppercase;
          box-shadow: var(--shadow-b); transition: 0.3s;
        }
        .btn-pink { background: var(--pink); box-shadow: var(--shadow-p); }
        .btn-main:active { transform: scale(0.96); }
        .btn-main:disabled { opacity: 0.3; filter: grayscale(1); }

        /* Modal */
        #modal-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); 
            z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(10px); 
        }
        .modal { 
            background: #050614; border: 3px solid var(--blue); border-radius: 30px; 
            padding: 30px; width: 85%; max-width: 320px; text-align: center; box-shadow: var(--shadow-b); 
        }

        /* Navbar */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: rgba(2, 3, 13, 0.95); display: flex; justify-content: space-around; 
            align-items: center; border-top: 3px solid var(--blue); backdrop-filter: blur(15px); z-index: 1000; 
        }
        .nav-item { color: rgba(255,255,255,0.3); text-decoration: none; text-align: center; font-size: 10px; font-weight: 800; flex:1; }
        .nav-item.active { color: var(--yellow); text-shadow: var(--shadow-y); }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 6px; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="snd-success" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<div class="header"><h1>NEON REWARDS</h1></div>

<div class="container">
    <div class="promo-banner">
        <div class="promo-title">BEST TOP REFERRAL</div>
        <div class="prizes">
            <div class="prize-item">🥈 RANK 2<b>$50</b></div>
            <div class="prize-item" style="transform: scale(1.15); color:var(--yellow);">🥇 RANK 1<b>$100</b></div>
            <div class="prize-item">🥉 RANK 3<b>$25</b></div>
        </div>
    </div>

    <div class="section-title"><i class="fas fa-gift fa-fade"></i> INCOMING GIFTS</div>
    <div id="mail-list" class="mail-list">
        <div style="text-align:center; opacity:0.5; padding:20px; color:var(--yellow);">Checking Gifts...</div>
    </div>

    <div class="card" style="border-color: var(--pink); box-shadow: var(--shadow-p);">
        <div style="font-size: 35px; color:var(--pink); margin-bottom:12px;"><i class="fas fa-users-crown"></i></div>
        <h2 style="font-family:'Cinzel Decorative'; color:var(--pink); font-size:1.1rem; margin:0;">Referral VIP</h2>
        <div class="ref-stats">
            <div class="stat-box"><small>Valid</small><span id="valid-ref">0</span></div>
            <div class="stat-box"><small>Bonus</small><span id="bonus-ref">Rp 0</span></div>
        </div>
        <div class="ref-box">
            <div class="ref-code-area" style="display:flex; justify-content:space-between; align-items:center;">
                <span id="ref-code">REFRESHING...</span>
                <button style="background:none; border:none; color:var(--yellow); cursor:pointer;" onclick="copyRef()">
                    <i class="far fa-copy fa-lg"></i>
                </button>
            </div>
        </div>
        <button id="btn-claim-ref" class="btn-main btn-pink" style="margin-top:20px;" disabled onclick="processRefClaim()">KLAIM MINGGUAN</button>
    </div>

    <div class="section-title"><i class="fas fa-history"></i> LAST INVITED</div>
    <div class="history-card" id="history-list">
        <div style="text-align:center; padding:20px; opacity:0.5; font-size:12px; color:var(--yellow);">Loading...</div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal">
        <i class="fas fa-bolt" style="font-size:45px; color:var(--yellow); margin-bottom:20px;"></i>
        <h3 id="m-title" style="color:var(--pink); font-family:'Cinzel Decorative';"></h3>
        <p id="m-msg" style="margin:20px 0; font-size:15px; color:#fff;"></p>
        <button class="btn-main" onclick="closeModal()">OK</button>
    </div>
</div>

<nav class="nav-bar">
    <a href="game.html" class="nav-item"><i class="fas fa-gamepad"></i>PLAY</a>
    <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i>DEPO</a>
    <a href="reward.html" class="nav-item active"><i class="fas fa-gift"></i>REWARD</a>
    <a href="profil.html" class="nav-item"><i class="fas fa-user-shield"></i>PROFIL</a>
</nav>

<script>
// Mengambil username yang konsisten dengan config.js
const USERNAME = getUsername();

// --- ANIMASI BACKGROUND ---
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
function initCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    particles = [];
    for(let i=0; i<40; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 0.5,
            speed: Math.random() * 0.5 + 0.1,
            color: Math.random() > 0.5 ? '#ff0077' : '#0022ff'
        });
    }
}
function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
        p.y -= p.speed;
        if(p.y < 0) p.y = canvas.height;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fillStyle = p.color;
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
window.onresize = initCanvas;
initCanvas();
animate();

function playSnd(id) { 
    const s = document.getElementById(id); 
    if(s) { s.currentTime = 0; s.play().catch(()=>{}); } 
}

// --- FUNGSI REWARD (INTEGRASI SUPABASE) ---
async function initReward() {
    if(!USERNAME) return;

    // Load Data Referal & Inbox
    loadReferralStats();
    loadInbox();
}

async function loadReferralStats() {
    const histContainer = document.getElementById('history-list');
    try {
        const { data: friends } = await _supabase.from('profiles').select('username, created_at').eq('invited_by', USERNAME).order('created_at', { ascending: false });
        
        if(!friends || friends.length === 0) {
            histContainer.innerHTML = '<div style="text-align:center; opacity:0.4; padding:20px; color:var(--yellow);">No referrals yet</div>';
            return;
        }

        const uNames = friends.map(f => f.username);
        const { data: vDepo } = await _supabase.from('deposits').select('username').in('username', uNames).eq('status', 'SUKSES').gte('amount', 20000);
        const valids = new Set(vDepo.map(d => d.username));

        document.getElementById('valid-ref').innerText = valids.size;
        const bonus = valids.size * 5000;
        document.getElementById('bonus-ref').innerText = "Rp " + bonus.toLocaleString();

        // Klaim Mingguan Aktif di Hari Minggu
        if(new Date().getDay() === 0 && bonus > 0) {
            const b = document.getElementById('btn-claim-ref');
            b.disabled = false; 
            b.innerText = "KLAIM Rp " + bonus.toLocaleString();
        }

        histContainer.innerHTML = friends.map(f => {
            const isValid = valids.has(f.username);
            return `
                <div class="history-item">
                    <div class="h-user"><i class="fas fa-user-astronaut" style="margin-right:10px; color:var(--pink)"></i>${f.username}</div>
                    <div class="h-status ${isValid ? 'status-valid' : 'status-pending'}">
                        ${isValid ? 'VALID' : 'PENDING'}
                    </div>
                </div>
            `;
        }).join('');
    } catch (e) { console.error(e); }
}

async function loadInbox() {
    const list = document.getElementById('mail-list');
    try {
        const { data } = await _supabase.from('inbox').select('*').eq('username', USERNAME).eq('status', 'UNCLAIMED');
        if(data && data.length > 0) {
            list.innerHTML = data.map(m => `
                <div class="mail-item">
                    <div style="font-size:11px; color:var(--pink); margin-bottom:6px; font-weight:900;">VIP NEON GIFT</div>
                    <div style="font-size:14px; margin-bottom:12px; color:#fff;">${m.pesan}</div>
                    <div style="color:var(--yellow); font-weight:900; font-size:20px; margin-bottom:15px; text-shadow:var(--shadow-y);">Rp ${m.nominal.toLocaleString()}</div>
                    <button class="btn-main" onclick="claimMail(${m.id}, ${m.nominal})">REDEEM NOW</button>
                </div>
            `).join('');
        } else {
            list.innerHTML = '<div style="text-align:center; opacity:0.4; padding:25px; font-size:12px; border:2px dashed var(--yellow); border-radius:20px; color:var(--yellow);">Inbox Kosong</div>';
        }
    } catch (e) { console.error(e); }
}

async function claimMail(id, amt) {
    playSnd('snd-click');
    try {
        const { data: p } = await _supabase.from('profiles').select('saldo').eq('username', USERNAME).single();
        await _supabase.from('profiles').update({ saldo: p.saldo + amt }).eq('username', USERNAME);
        await _supabase.from('inbox').update({ status: 'CLAIMED' }).eq('id', id);
        playSnd('snd-success');
        showModal("REDEEMED", "Bonus Rp " + amt.toLocaleString() + " telah ditambahkan ke saldo!");
        syncNeonData(); // Sinkron ulang saldo
        loadInbox();
    } catch (e) { alert("Redeem Gagal"); }
}

async function processRefClaim() {
    playSnd('snd-click');
    try {
        const { data: friends } = await _supabase.from('profiles').select('username').eq('invited_by', USERNAME);
        const uList = friends.map(f => f.username);
        const { data: vDepo } = await _supabase.from('deposits').select('username').in('username', uList).eq('status', 'SUKSES').gte('amount', 20000);
        const validCount = [...new Set(vDepo.map(d => d.username))].length;
        const bonus = validCount * 5000;
        
        const { data: p } = await _supabase.from('profiles').select('saldo').eq('username', USERNAME).single();
        await _supabase.from('profiles').update({ saldo: p.saldo + bonus }).eq('username', USERNAME);
        await _supabase.from('deposits').insert([{ username: USERNAME, amount: bonus, method: 'REFERRAL', status: 'SUKSES', net_receive: bonus, keterangan: 'REF_WEEKLY' }]);
        
        playSnd('snd-success');
        showModal("SUCCESS", "Bonus Referral Mingguan Rp " + bonus.toLocaleString() + " Berhasil Dicairkan!");
        syncNeonData();
        loadReferralStats();
    } catch (e) { alert("Klaim Gagal"); }
}

function copyRef() { 
    playSnd('snd-click'); 
    const code = document.getElementById('ref-code').innerText;
    if(code !== "REFRESHING...") {
        navigator.clipboard.writeText(code); 
        showModal("COPIED", "Kode Referral disalin ke clipboard!"); 
    }
}

function showModal(t, m) { document.getElementById('m-title').innerText = t; document.getElementById('m-msg').innerText = m; document.getElementById('modal-overlay').style.display = 'flex'; }
function closeModal() { playSnd('snd-click'); document.getElementById('modal-overlay').style.display = 'none'; }

// Jalankan inisialisasi reward
window.addEventListener('load', initReward);
</script>
</body>
</html>
