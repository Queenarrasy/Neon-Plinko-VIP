<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>REWARD — NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root{
            --pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--bg:#000005;
            --gp:0 0 8px rgba(255,0,119,.5),0 0 20px rgba(255,0,119,.2);
            --gb:0 0 8px rgba(0,34,255,.5),0 0 20px rgba(0,34,255,.2);
            --gy:0 0 8px rgba(251,255,0,.5),0 0 20px rgba(251,255,0,.2);
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;outline:none;}
        body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;padding-bottom:90px;min-height:100vh;}
        #particles-js{position:fixed;width:100%;height:100%;z-index:0;pointer-events:none;background:radial-gradient(circle at 50% 20%,#0a0a00 0%,#000 100%);}

        .header{padding:0 18px;height:62px;display:flex;align-items:center;justify-content:center;border-bottom:1.5px solid var(--blue);background:rgba(0,0,18,.98);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
        .header h1{font-size:15px;font-weight:900;letter-spacing:2px;color:var(--pink);text-transform:uppercase;}

        .container{padding:18px;max-width:500px;margin:0 auto;position:relative;z-index:10;}

        .section-title{font-size:11px;font-weight:900;color:var(--pink);margin:18px 0 13px;display:flex;align-items:center;gap:9px;text-transform:uppercase;letter-spacing:1px;}
        .section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,0,119,.4),transparent);}

        /* ── STATS BOX ── */
        .ref-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
        .stat-box{background:rgba(0,0,35,.75);padding:12px;border-radius:18px;border:1.5px solid rgba(0,34,255,.3);text-align:center;backdrop-filter:blur(10px);}
        .stat-box small{display:block;font-size:9px;color:var(--yellow);text-transform:uppercase;margin-bottom:5px;font-weight:900;}
        .stat-box span{font-weight:900;color:#fff;font-size:1.1rem;}

        /* ── CLAIM BOX & CODE ── */
        .card{background:rgba(0,0,35,.75);border:1px solid rgba(0,34,255,.35);border-radius:20px;padding:20px;text-align:center;margin-bottom:18px;}
        .ref-box{background:rgba(0,0,0,.7);border:1.5px dashed rgba(251,255,0,.4);border-radius:14px;padding:14px;margin-top:15px;cursor:pointer;transition:.3s;}
        #ref-code{font-size:1.15rem;font-weight:900;color:var(--yellow);letter-spacing:4px;}

        .btn-main{width:100%;padding:14px;border:none;border-radius:50px;background:linear-gradient(90deg,var(--blue),#0044ff);color:#fff;font-weight:900;font-size:13px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;font-family:'Outfit',sans-serif;}
        .btn-pink{background:linear-gradient(90deg,var(--pink),#b400dc);}

        /* ── MAIL/INBOX ── */
        .mail-list{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
        .mail-item{background:rgba(251,255,0,.07);border:1.5px solid rgba(251,255,0,.35);border-radius:18px;padding:18px;backdrop-filter:blur(8px);}

        /* ── TABLE ── */
        .hist-wrap{background:rgba(0,0,35,.7);border:1px solid rgba(0,34,255,.25);border-radius:18px;overflow:hidden;margin-bottom:18px;}
        .hist-scroll{max-height:220px;overflow-y:auto;}
        table.ht{width:100%;border-collapse:collapse;}
        table.ht th{padding:9px 12px;font-size:8px;font-weight:900;color:var(--pink);text-transform:uppercase;background:rgba(0,0,15,.8);text-align:left;}
        table.ht td{padding:10px 12px;font-size:11px;border-bottom:1px solid rgba(0,34,255,.08);font-weight:700;}

        /* ── MODAL ── */
        #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
        .modal{background:rgba(0,0,15,.99);border:2px solid var(--pink);border-top:3px solid var(--yellow);border-radius:22px;padding:28px;width:88%;max-width:320px;text-align:center;}

        .nav-bar{position:fixed;bottom:0;width:100%;height:72px;background:rgba(0,0,15,.99);display:flex;justify-content:space-around;align-items:center;border-top:1.5px solid var(--blue);z-index:1000;padding-bottom:6px;}
        .nav-item{color:rgba(255,255,255,.3);text-decoration:none;text-align:center;font-size:9px;font-weight:900;flex:1;text-transform:uppercase;}
        .nav-item.active{color:var(--yellow);}
        .nav-item i{font-size:20px;display:block;margin-bottom:3px;}
    </style>
</head>
<body>
<div id="particles-js"></div>
<audio id="snd-click" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b417f73c.mp3"></audio>
<audio id="snd-success" src="https://cdn.pixabay.com/audio/2021/08/04/audio_062564a02d.mp3"></audio>

<div class="header"><h1>PROGRAM REWARD</h1></div>

<div class="container">
    <div class="section-title"><i class="fas fa-chart-line"></i> Statistik Referral</div>
    <div class="ref-stats">
        <div class="stat-box">
            <small>Total Undangan</small>
            <span id="stat-total">0</span>
        </div>
        <div class="stat-box">
            <small>Valid Deposit</small>
            <span id="stat-valid">0</span>
        </div>
    </div>

    <div class="card">
        <button class="btn-main btn-pink" id="btn-klaim" onclick="claimReferralBonus()">KLAIM BONUS SEKARANG</button>
        <div class="ref-box" onclick="copyRef()">
            <small style="font-size:9px; color:rgba(255,255,255,0.5);">KETUK UNTUK SALIN KODE</small>
            <div id="ref-code">MEMUAT...</div>
        </div>
    </div>

    <div class="section-title"><i class="fas fa-envelope"></i> Kotak Masuk</div>
    <div class="mail-list" id="mail-container">
        <div class="mail-item">Belum ada pesan.</div>
    </div>

    <div class="section-title"><i class="fas fa-users"></i> Riwayat Undangan</div>
    <div class="hist-wrap">
        <div class="hist-scroll">
            <table class="ht">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Status Depo</th>
                        <th>Tanggal Gabung</th>
                    </tr>
                </thead>
                <tbody id="ref-history-body">
                    <tr class="empty-row"><td colspan="3">Belum ada rujukan.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal">
        <div id="m-title">INFO</div>
        <div id="m-msg">Pesan</div>
        <button class="btn-main" onclick="closeModal()">TUTUP</button>
    </div>
</div>

<nav class="nav-bar">
    <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
    <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i>Deposit</a>
    <a href="withdraw.html" class="nav-item"><i class="fas fa-money-bill-wave"></i>WD</a>
    <a href="reward.html" class="nav-item active"><i class="fas fa-gift"></i>Reward</a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i>Profil</a>
</nav>

<script>
const _supabase = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
const USERNAME = localStorage.getItem('neon_user');

if(!USERNAME) location.href='login.html';

particlesJS('particles-js', {
    particles:{number:{value:30},color:{value:'#fbff00'},opacity:{value:0.2},size:{value:2},move:{speed:1}}
});

function playSnd(s){ document.getElementById('snd-'+s).play().catch(()=>{}); }

async function loadReferralStats(){
    try {
        // Ambil data user
        const {data:user} = await _supabase.from('profiles').select('referral_code').eq('username', USERNAME).single();
        if(user) document.getElementById('ref-code').innerText = user.referral_code;

        // Ambil daftar yang diundang
        const {data:downlines} = await _supabase.from('profiles').select('username, created_at').eq('referred_by', USERNAME);
        
        if(downlines){
            document.getElementById('stat-total').innerText = downlines.length;
            
            // Hitung yang sudah deposit (Valid)
            const usernames = downlines.map(d => d.username);
            const {data:deposits} = await _supabase.from('deposits').select('username').in('username', usernames).eq('status', 'SUKSES');
            
            const validUsernames = [...new Set(deposits.map(dep => dep.username))];
            document.getElementById('stat-valid').innerText = validUsernames.length;

            // Render Tabel Riwayat
            const body = document.getElementById('ref-history-body');
            if(downlines.length > 0){
                body.innerHTML = downlines.map(d => {
                    const isValid = validUsernames.includes(d.username);
                    return `<tr>
                        <td>${d.username}</td>
                        <td style="color:${isValid ? '#00ff88' : '#ff0077'}">${isValid ? 'VALID' : 'BELUM DEPO'}</td>
                        <td style="opacity:0.5; font-size:9px;">${new Date(d.created_at).toLocaleDateString('id-ID')}</td>
                    </tr>`;
                }).join('');
            }
        }
    } catch (e) { console.error(e); }
}

async function claimReferralBonus(){
    const btn = document.getElementById('btn-klaim');
    btn.disabled = true;
    playSnd('click');
    
    try {
        const validCount = parseInt(document.getElementById('stat-valid').innerText);
        const bonusPerRef = 5000;
        const totalBonus = validCount * bonusPerRef;

        const {data:claimedData} = await _supabase.from('deposits').select('amount').eq('username', USERNAME).eq('method', 'REFERRAL_BONUS');
        const totalClaimed = claimedData.reduce((sum, item) => sum + item.amount, 0);
        
        const bonusTersedia = totalBonus - totalClaimed;

        if(bonusTersedia <= 0){
            showModal("INFO", "Tidak ada bonus baru untuk diklaim. Pastikan teman yang Anda undang sudah melakukan deposit.");
            btn.disabled = false;
            return;
        }

        const {data:p} = await _supabase.from('profiles').select('saldo').eq('username', USERNAME).single();
        await _supabase.from('profiles').update({saldo: (p.saldo || 0) + bonusTersedia}).eq('username', USERNAME);
        
        await _supabase.from('deposits').insert([{
            username: USERNAME, amount: bonusTersedia, net_receive: bonusTersedia,
            method: 'REFERRAL_BONUS', status: 'SUKSES'
        }]);

        playSnd('success');
        showModal("SUKSES", "Bonus Referral Rp " + bonusTersedia.toLocaleString('id-ID') + " telah masuk ke saldo!");
        loadReferralStats();
    } catch(e){
        showModal("GAGAL", "Terjadi kesalahan saat klaim.");
    }
    btn.disabled = false;
}

function copyRef(){
    playSnd('click');
    const c = document.getElementById('ref-code').innerText;
    navigator.clipboard.writeText(c);
    showModal("INFO", "Kode Referral " + c + " berhasil disalin!");
}

function showModal(t, m){
    document.getElementById('m-title').innerText = t;
    document.getElementById('m-msg').innerText = m;
    document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal(){ document.getElementById('modal-overlay').style.display = 'none'; }

window.onload = loadReferralStats;
</script>
</body>
</html>
