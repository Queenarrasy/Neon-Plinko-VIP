<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>REWARDS - NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --green: #00ff88; --bg: #02030d;
  --card: rgba(255, 255, 255, 0.03);
  --neon-blue: 0 0 15px rgba(0, 212, 255, 0.4);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; background: var(--bg); color: #fff;
  font-family: 'Outfit', sans-serif; overflow-x: hidden;
  padding-bottom: 80px;
}

/* Header */
.header {
  padding: 15px; text-align: center; border-bottom: 1px solid rgba(0, 212, 255, 0.2);
  background: rgba(2, 3, 13, 0.95); position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(10px);
}
.header h1 { 
    margin: 0; font-family: 'Cinzel Decorative'; font-size: 1.1rem; 
    letter-spacing: 2px; color: var(--blue); text-shadow: var(--neon-blue); 
}

.container { padding: 20px; max-width: 500px; margin: 0 auto; }

/* Reward Card */
.reward-card {
  background: var(--card); border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 20px;
  backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.reward-icon { font-size: 45px; color: var(--yellow); margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(251, 255, 0, 0.3)); }
.reward-card h2 { margin: 0; font-family: 'Cinzel Decorative'; font-size: 1.2rem; color: #fff; }
.reward-card p { opacity: 0.6; font-size: 0.85rem; margin: 10px 0 20px; line-height: 1.4; }

.btn-claim {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  background: linear-gradient(45deg, var(--blue), #0044ff);
  color: #fff; font-weight: 700; font-size: 0.9rem; cursor: pointer;
  transition: 0.3s; box-shadow: var(--neon-blue); text-transform: uppercase;
}
.btn-claim:active { transform: scale(0.98); }
.btn-claim:disabled { background: #222; box-shadow: none; cursor: not-allowed; opacity: 0.5; color: #555; }

/* Referral Section */
.ref-box {
  background: rgba(0, 212, 255, 0.05); border: 1px dashed rgba(0, 212, 255, 0.4);
  border-radius: 15px; padding: 15px; margin-top: 15px;
}
.ref-label { font-size: 0.75rem; color: var(--blue); margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; }
.ref-code-area { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 10px 15px; border-radius: 10px; }
#ref-code { font-size: 1.1rem; font-weight: 700; color: var(--yellow); letter-spacing: 2px; }
.btn-copy { background: none; border: none; color: var(--blue); font-size: 1.2rem; cursor: pointer; }

/* Modal */
#modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
  backdrop-filter: blur(8px); z-index: 1000;
}
.modal {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 85%; max-width: 320px; background: #0a0b1a; border: 1px solid var(--blue);
  border-radius: 20px; padding: 30px; text-align: center; z-index: 1001; box-shadow: var(--neon-blue);
}

/* Nav Bar Bottom */
.nav-bar {
  position: fixed; bottom: 0; width: 100%; height: 70px;
  background: rgba(5, 6, 20, 0.95); display: flex; justify-content: space-around;
  align-items: center; border-top: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px);
}
.nav-item { color: #555; text-decoration: none; text-align: center; font-size: 0.7rem; flex:1; }
.nav-item.active { color: var(--blue); }
.nav-item i { font-size: 1.2rem; display: block; margin-bottom: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>MISSIONS & REWARDS</h1>
</div>

<div class="container">
  <div class="reward-card">
    <div class="reward-icon"><i class="fas fa-calendar-check"></i></div>
    <h2>Daily Check-in</h2>
    <p>Dapatkan bonus saldo <b>Rp 1.000</b> gratis setiap hari hanya dengan login.</p>
    <button id="btn-daily" class="btn-claim" onclick="handleDailyClaim()">AMBIL HADIAH</button>
  </div>

  <div class="reward-card">
    <div class="reward-icon" style="color:var(--pink)"><i class="fas fa-users"></i></div>
    <h2>Undang Teman</h2>
    <p>Bagikan kode referral Anda dan dapatkan komisi saldo dari setiap teman yang bermain.</p>
    
    <div class="ref-box">
      <div class="ref-label">KODE REFERRAL ANDA</div>
      <div class="ref-code-area">
        <span id="ref-code">MEMUAT...</span>
        <button class="btn-copy" onclick="copyRef()"><i class="far fa-copy"></i></button>
      </div>
    </div>
  </div>
</div>

<div id="modal-overlay" onclick="closeModal()"></div>
<div id="modal" class="modal" style="display:none;">
  <div id="modal-icon" style="font-size:50px; margin-bottom:15px;"></div>
  <h3 id="modal-title" style="font-family:'Cinzel Decorative'; color:var(--blue);"></h3>
  <p id="modal-msg" style="font-size:0.9rem; opacity:0.8; margin-bottom:20px;"></p>
  <button class="btn-claim" onclick="closeModal()">TUTUP</button>
</div>

<div class="nav-bar">
  <a href="game.html" class="nav-item"><i class="fas fa-gamepad"></i>PLAY</a>
  <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i>DEPO</a>
  <a href="reward.html" class="nav-item active"><i class="fas fa-gift"></i>REWARD</a>
  <a href="profil.html" class="nav-item"><i class="fas fa-user"></i>PROFIL</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
const user = localStorage.getItem('user_neon');

async function initReward() {
  if (!user) {
    window.location.href = 'index.html';
    return;
  }

  // Tampilkan Kode Referral (Gunakan Username)
  document.getElementById('ref-code').innerText = user.toUpperCase();

  // Cek apakah sudah klaim hari ini
  checkTodayClaim();
}

async function checkTodayClaim() {
  const today = new Date().toISOString().split('T')[0];
  
  const { data, error } = await _supabase
    .from('deposits') // Kita bisa pakai tabel deposits dengan kriteria khusus atau tabel 'history_bonus'
    .select('*')
    .eq('username', user)
    .eq('keterangan', 'BONUS HARIAN')
    .filter('created_at', 'gte', today + ' 00:00:00')
    .limit(1);

  if (data && data.length > 0) {
    const btn = document.getElementById('btn-daily');
    btn.disabled = true;
    btn.innerText = "SUDAH DIKLAIM HARI INI";
  }
}

async function handleDailyClaim() {
  const btn = document.getElementById('btn-daily');
  btn.disabled = true;
  btn.innerText = "PROSES...";

  try {
    const amount = 1000;
    
    // Gunakan RPC admin_add_saldo yang sudah kita buat sebelumnya
    // Ini lebih aman karena proses di server
    const { data, error } = await _supabase.rpc('admin_add_saldo', { 
      target_user: user, 
      amount_to_add: amount 
    });

    if (error) throw error;

    // Catat log klaim di tabel history (menggunakan tabel deposits agar muncul di profil)
    await _supabase.from('deposits').insert([{
        username: user,
        nominal: amount,
        metode: 'SISTEM',
        status: 'BERHASIL',
        keterangan: 'BONUS HARIAN'
    }]);

    showModal('🎁', 'BERHASIL!', 'Bonus harian Rp 1.000 telah ditambahkan ke saldo Anda.', var(--green));
    btn.innerText = "KLAIM BERHASIL";

  } catch (err) {
    console.error(err);
    alert("Gagal mengambil bonus. Coba lagi nanti.");
    btn.disabled = false;
    btn.innerText = "AMBIL HADIAH";
  }
}

function copyRef() {
  const code = document.getElementById('ref-code').innerText;
  navigator.clipboard.writeText(code).then(() => {
    alert("Kode Referral: " + code + " berhasil disalin!");
  });
}

function showModal(icon, title, msg, color) {
  document.getElementById('modal-icon').innerText = icon;
  document.getElementById('modal-title').innerText = title;
  document.getElementById('modal-msg').innerText = msg;
  document.getElementById('modal').style.display = 'block';
  document.getElementById('modal-overlay').style.display = 'block';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  document.getElementById('modal-overlay').style.display = 'none';
}

window.onload = initReward;
</script>

</body>
</html>
