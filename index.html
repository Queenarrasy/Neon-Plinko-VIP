<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON PLINKO VIP — Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #ff0077; --blue: #0044ff; --yellow: #f5e642;
  --bg: #02030d; --dark: #050614;
  --gp: 0 0 15px rgba(255,0,119,0.7);
  --gb: 0 0 20px rgba(0,68,255,0.8);
  --gy: 0 0 15px rgba(245,230,66,0.7);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  min-height: 100vh; background: var(--bg);
  color: #fff; font-family: 'Outfit', sans-serif;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 20px;
  background-image: radial-gradient(circle at 50% 20%, rgba(0,68,255,0.12) 0%, transparent 60%);
}

#loading { display: none; position: fixed; inset: 0; background: rgba(2,3,13,0.85); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
.spin { width: 48px; height: 48px; border: 4px solid rgba(0,68,255,0.2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.logo { font-family: 'Cinzel Decorative', serif; font-size: 22px; font-weight: 900; background: linear-gradient(90deg, var(--blue), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(0,68,255,0.5)); }
.logo-sub { font-size: 10px; color: var(--yellow); letter-spacing: 3px; margin-bottom: 28px; text-shadow: var(--gy); }

.card { width: 100%; max-width: 400px; background: rgba(5,6,20,0.95); border: 1px solid var(--blue); border-radius: 16px; padding: 28px 24px; box-shadow: var(--gb); }
.tabs { display: flex; margin-bottom: 24px; border-radius: 8px; overflow: hidden; border: 1px solid var(--blue); }
.tab-btn { flex: 1; padding: 10px; background: transparent; border: none; color: rgba(255,255,255,0.5); font-weight: 700; cursor: pointer; font-family: 'Outfit'; }
.tab-btn.active { background: var(--blue); color: #fff; }

.form-group { margin-bottom: 14px; }
.form-label { font-size: 10px; color: var(--blue); letter-spacing: 1px; margin-bottom: 5px; display: block; }
.form-input { width: 100%; padding: 12px 14px; background: rgba(0,68,255,0.06); border: 1px solid rgba(0,68,255,0.4); border-radius: 8px; color: #fff; outline: none; }
.input-icon { position: relative; }
.input-icon .form-input { padding-left: 40px; }
.input-icon i { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--blue); }

.btn-submit { width: 100%; padding: 15px; background: linear-gradient(90deg, var(--blue), var(--pink)); border: none; border-radius: 10px; font-family: 'Cinzel Decorative'; font-weight: 900; color: #fff; cursor: pointer; box-shadow: var(--gb); margin-top: 10px; }
.btn-submit:disabled { opacity: 0.5; }

.ref-info { margin-top: 16px; padding: 12px; background: rgba(245,230,66,0.07); border: 1px solid rgba(245,230,66,0.3); border-radius: 8px; font-size: 11px; color: var(--yellow); text-align: center; display: none; }
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><p>MEMPROSES...</p></div>

<div class="logo">⬡ NEON PLINKO</div>
<div class="logo-sub">V I P &nbsp; S Y S T E M</div>

<div class="card">
  <div class="tabs">
    <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">LOGIN</button>
    <button class="tab-btn" id="tab-register" onclick="switchTab('register')">DAFTAR</button>
  </div>

  <div id="panel-login">
    <div class="form-group">
      <label class="form-label">USERNAME</label>
      <div class="input-icon"><i class="fa-solid fa-user"></i><input type="text" id="l-username" class="form-input" placeholder="Username"></div>
    </div>
    <div class="form-group">
      <label class="form-label">PASSWORD</label>
      <div class="input-icon"><i class="fa-solid fa-lock"></i><input type="password" id="l-password" class="form-input" placeholder="Password"></div>
    </div>
    <button class="btn-submit" id="btn-login" onclick="handleLogin()">MASUK</button>
  </div>

  <div id="panel-register" style="display:none">
    <div class="form-group"><label class="form-label">USERNAME</label><input type="text" id="r-username" class="form-input"></div>
    <div class="form-group"><label class="form-label">PASSWORD</label><input type="password" id="r-password" class="form-input"></div>
    <div class="form-group"><label class="form-label">NAMA LENGKAP</label><input type="text" id="r-fullname" class="form-input"></div>
    <div class="form-group"><label class="form-label">NOMOR WHATSAPP</label><input type="tel" id="r-phone" class="form-input"></div>
    <div class="form-group"><label class="form-label">BANK / E-WALLET</label><input type="text" id="r-bank" class="form-input" placeholder="Contoh: BCA / DANA"></div>
    <div class="form-group"><label class="form-label">NOMOR REKENING</label><input type="text" id="r-rek" class="form-input"></div>
    <button class="btn-submit" id="btn-register" onclick="handleRegister()">DAFTAR SEKARANG</button>
    
    <div class="ref-info" id="ref-result">
      Pendaftaran Berhasil!<br>Username Anda: <strong id="reg-user"></strong>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
function switchTab(tab) {
  document.getElementById('panel-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('panel-register').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

async function handleLogin() {
    const u = document.getElementById('l-username').value;
    const p = document.getElementById('l-password').value;
    const loader = document.getElementById('loading');

    if(!u || !p) return alert("Isi username & password!");
    
    loader.style.display = 'flex';
    
    // Cari user di Supabase
    const { data, error } = await _supabase
        .from('profiles')
        .select('*')
        .eq('username', u)
        .eq('password', p)
        .single();

    if (error || !data) {
        loader.style.display = 'none';
        alert("Username atau Password salah!");
    } else {
        // Set Status ke ONLINE
        await _supabase.from('profiles').update({ status: 'ONLINE' }).eq('username', u);
        
        // Simpan Sesi
        localStorage.setItem('user_session', u);
        window.location.href = 'game.html';
    }
}

async function handleRegister() {
    const u = document.getElementById('r-username').value;
    const p = document.getElementById('r-password').value;
    const fn = document.getElementById('r-fullname').value;
    const ph = document.getElementById('r-phone').value;
    const bk = document.getElementById('r-bank').value;
    const rk = document.getElementById('r-rek').value;

    if(!u || !p || !fn || !bk || !rk) return alert("Mohon lengkapi semua data!");

    const loader = document.getElementById('loading');
    loader.style.display = 'flex';

    // 1. Cek apakah username sudah ada
    const { data: exist } = await _supabase.from('profiles').select('username').eq('username', u).single();
    if(exist) {
        loader.style.display = 'none';
        return alert("Username sudah digunakan!");
    }

    // 2. Buat Kode Referral Acak
    const refCode = "REF" + Math.floor(1000 + Math.random() * 9000);

    // 3. Masukkan ke database
    const { error } = await _supabase.from('profiles').insert([{
        username: u,
        password: p,
        fullname: fn,
        phone: ph,
        bank_name: bk,
        rekening_number: rk,
        saldo: 0,
        tier: 'BRONZE',
        referral_code: refCode,
        status: 'OFFLINE'
    }]);

    loader.style.display = 'none';

    if(error) {
        alert("Pendaftaran gagal: " + error.message);
    } else {
        alert("Pendaftaran Berhasil! Silakan Login.");
        switchTab('login');
    }
}
</script>
</body>
</html>
