<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO VIP — System Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff0077; --blue: #0044ff; --yellow: #f5e642;
            --bg: #02030d; --dark: #050614;
            --gb: 0 0 20px rgba(0,68,255,0.8);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            min-height: 100vh; background: var(--bg);
            color: #fff; font-family: 'Outfit', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 20px;
            background-image: radial-gradient(circle at 50% 20%, rgba(0,68,255,0.12) 0%, transparent 60%);
        }

        #loading { display: none; position: fixed; inset: 0; background: rgba(2,3,13,0.95); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 14px; backdrop-filter: blur(5px); }
        .spin { width: 48px; height: 48px; border: 4px solid rgba(0,68,255,0.2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .logo { font-family: 'Cinzel Decorative', serif; font-size: 26px; font-weight: 900; background: linear-gradient(90deg, var(--blue), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(0,68,255,0.5)); }
        .logo-sub { font-size: 10px; color: var(--yellow); letter-spacing: 4px; margin-bottom: 30px; font-weight: 700; }

        .card { width: 100%; max-width: 400px; background: rgba(5,6,20,0.95); border: 1px solid rgba(0, 68, 255, 0.3); border-radius: 20px; padding: 30px 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .tabs { display: flex; margin-bottom: 24px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(0, 68, 255, 0.5); }
        .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: rgba(255,255,255,0.4); font-weight: 700; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--blue); color: #fff; box-shadow: var(--gb); }

        .form-group { margin-bottom: 15px; }
        .form-label { font-size: 11px; color: var(--blue); letter-spacing: 1px; margin-bottom: 6px; display: block; font-weight: 700; }
        .form-input { width: 100%; padding: 12px 16px; background: rgba(0,68,255,0.08); border: 1px solid rgba(0,68,255,0.2); border-radius: 10px; color: #fff; outline: none; transition: 0.3s; }
        .form-input:focus { border-color: var(--blue); background: rgba(0,68,255,0.15); }
        
        .btn-submit { width: 100%; padding: 16px; background: linear-gradient(90deg, var(--blue), var(--pink)); border: none; border-radius: 12px; font-family: 'Cinzel Decorative'; font-weight: 900; color: #fff; cursor: pointer; box-shadow: var(--gb); margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .btn-submit:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div id="loading"><div class="spin"></div><p style="color:var(--blue);">AUTHENTICATING...</p></div>

<div class="logo">NEON PLINKO</div>
<div class="logo-sub">V I P &nbsp; S Y S T E M</div>

<div class="card">
    <div class="tabs">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">LOGIN</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">DAFTAR</button>
    </div>

    <div id="panel-login">
        <div class="form-group">
            <label class="form-label">USERNAME</label>
            <input type="text" id="l-username" class="form-input" placeholder="Username">
        </div>
        <div class="form-group">
            <label class="form-label">PASSWORD</label>
            <input type="password" id="l-password" class="form-input" placeholder="Password">
        </div>
        <button class="btn-submit" onclick="handleLogin()">MASUK KE SISTEM</button>
    </div>

    <div id="panel-register" style="display:none">
        <div class="form-group"><label class="form-label">USERNAME</label><input type="text" id="r-username" class="form-input"></div>
        <div class="form-group"><label class="form-label">PASSWORD</label><input type="password" id="r-password" class="form-input"></div>
        <div class="form-group"><label class="form-label">NAMA LENGKAP</label><input type="text" id="r-fullname" class="form-input"></div>
        <div class="form-group"><label class="form-label">BANK/E-WALLET</label><input type="text" id="r-bank" class="form-input" placeholder="BCA / DANA / OVO"></div>
        <div class="form-group"><label class="form-label">NO. REKENING</label><input type="text" id="r-rek" class="form-input"></div>
        <button class="btn-submit" onclick="handleRegister()">DAFTAR SEKARANG</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
    // CEK SESI SAAT HALAMAN DIBUKA
    async function checkSessi() {
        const u = localStorage.getItem('user_neon');
        if(u) {
            const { data } = await _supabase.from('profiles').select('role').eq('username', u).single();
            if(data) window.location.href = (data.role === 'ADMIN') ? 'master_panel.html' : 'game.html';
        }
    }
    checkSessi();

    function switchTab(tab) {
        document.getElementById('panel-login').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('panel-register').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('tab-login').classList.toggle('active', tab === 'login');
        document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    }

    async function handleLogin() {
        const u = document.getElementById('l-username').value.trim().toLowerCase();
        const p = document.getElementById('l-password').value;
        if(!u || !p) return alert("Isi semua bidang!");
        
        document.getElementById('loading').style.display = 'flex';
        try {
            const { data, error } = await _supabase.from('profiles').select('*').eq('username', u).single();
            if (error || !data || data.password !== p) throw new Error("Gagal login!");

            localStorage.setItem('user_neon', u);
            window.location.href = (data.role === 'ADMIN') ? 'master_panel.html' : 'game.html';
        } catch (err) { alert(err.message); }
        finally { document.getElementById('loading').style.display = 'none'; }
    }

    async function handleRegister() {
        const u = document.getElementById('r-username').value.trim().toLowerCase();
        const p = document.getElementById('r-password').value;
        const fn = document.getElementById('r-fullname').value;
        const bk = document.getElementById('r-bank').value;
        const rk = document.getElementById('r-rek').value;

        if(!u || !p || !fn || !bk || !rk) return alert("Lengkapi data!");
        document.getElementById('loading').style.display = 'flex';
        
        try {
            const { error } = await _supabase.from('profiles').insert([{
                username: u, password: p, nama_lengkap: fn, bank_name: bk, rekening: rk, role: 'USER'
            }]);
            if(error) throw error;
            alert("Berhasil! Silakan Login.");
            switchTab('login');
        } catch (err) { alert("Error: " + err.message); }
        finally { document.getElementById('loading').style.display = 'none'; }
    }
</script>
</body>
</html>
