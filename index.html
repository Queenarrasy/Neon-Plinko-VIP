<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON PLINKO VIP — Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #ff0077; --blue: #0044ff; --yellow: #f5e642;
  --bg: #02030d; --dark: #050614;
  --gp: 0 0 15px rgba(255,0,119,0.7);
  --gb: 0 0 20px rgba(0,68,255,0.8);
  --gy: 0 0 15px rgba(245,230,66,0.7);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  min-height: 100vh; background: var(--bg);
  color: #fff; font-family: 'Outfit', sans-serif;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 20px;
  background-image: radial-gradient(circle at 50% 20%, rgba(0,68,255,0.12) 0%, transparent 60%);
}

/* ── LOADING ── */
#loading {
  display: none; position: fixed; inset: 0;
  background: rgba(2,3,13,0.85); z-index: 9999;
  align-items: center; justify-content: center; flex-direction: column; gap: 14px;
}
.spin {
  width: 48px; height: 48px; border: 4px solid rgba(0,68,255,0.2);
  border-top-color: var(--blue); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { font-size: 13px; color: var(--blue); letter-spacing: 2px; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  padding: 12px 28px; border-radius: 10px; font-weight: bold;
  color: #fff; z-index: 9998; font-size: 14px;
  transition: opacity 0.4s; pointer-events: none;
  text-align: center; max-width: 90vw;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4); opacity: 0;
}

/* ── LOGO ── */
.logo {
  font-family: 'Cinzel Decorative', serif;
  font-size: 22px; font-weight: 900;
  background: linear-gradient(90deg, var(--blue), var(--pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-align: center; margin-bottom: 6px;
  text-shadow: none; filter: drop-shadow(0 0 10px rgba(0,68,255,0.5));
}
.logo-sub {
  font-size: 10px; color: var(--yellow); letter-spacing: 3px;
  text-align: center; margin-bottom: 28px; text-shadow: var(--gy);
}

/* ── CARD ── */
.card {
  width: 100%; max-width: 400px;
  background: rgba(5,6,20,0.95);
  border: 1px solid var(--blue);
  border-radius: 16px; padding: 28px 24px;
  box-shadow: var(--gb), inset 0 0 40px rgba(0,68,255,0.05);
}

/* ── TABS ── */
.tabs { display: flex; gap: 0; margin-bottom: 24px; border-radius: 8px; overflow: hidden; border: 1px solid var(--blue); }
.tab-btn {
  flex: 1; padding: 10px; background: transparent;
  border: none; color: rgba(255,255,255,0.5); font-weight: 700;
  font-size: 13px; cursor: pointer; transition: 0.2s; font-family: 'Outfit', sans-serif;
  letter-spacing: 1px;
}
.tab-btn.active { background: var(--blue); color: #fff; box-shadow: var(--gb); }

/* ── FORM ── */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 10px; color: var(--blue); letter-spacing: 1px; margin-bottom: 5px; display: block; }
.form-input {
  width: 100%; padding: 12px 14px;
  background: rgba(0,68,255,0.06);
  border: 1px solid rgba(0,68,255,0.4);
  border-radius: 8px; color: #fff;
  font-family: 'Outfit', sans-serif; font-size: 14px;
  outline: none; transition: 0.2s;
  -webkit-appearance: none;
}
.form-input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(0,68,255,0.2); }
.form-input::placeholder { color: rgba(255,255,255,0.2); }

.input-icon { position: relative; }
.input-icon .form-input { padding-left: 40px; }
.input-icon i { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--blue); font-size: 14px; }

.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }

/* ── BTN SUBMIT ── */
.btn-submit {
  width: 100%; padding: 15px;
  background: linear-gradient(90deg, var(--blue), var(--pink));
  border: none; border-radius: 10px;
  font-family: 'Cinzel Decorative', serif;
  font-weight: 900; font-size: 15px;
  color: #fff; cursor: pointer;
  box-shadow: var(--gb); transition: 0.2s;
  margin-top: 6px; letter-spacing: 1px;
}
.btn-submit:active { transform: scale(0.98); filter: brightness(1.1); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── REF INFO ── */
.ref-info {
  margin-top: 16px; padding: 12px;
  background: rgba(245,230,66,0.07);
  border: 1px solid rgba(245,230,66,0.3);
  border-radius: 8px; font-size: 11px;
  color: var(--yellow); text-align: center;
  display: none;
}

/* ── DIVIDER ── */
.divider {
  text-align: center; font-size: 10px; color: rgba(255,255,255,0.2);
  margin: 16px 0; letter-spacing: 2px;
}

.version { margin-top: 20px; font-size: 9px; color: rgba(255,255,255,0.15); text-align: center; letter-spacing: 2px; }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading"><div class="spin"></div><p>MEMPROSES...</p></div>
<!-- TOAST -->
<div id="toast"></div>

<div class="logo">⬡ NEON PLINKO</div>
<div class="logo-sub">V I P &nbsp; S Y S T E M</div>

<div class="card">
  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">
      <i class="fa-solid fa-right-to-bracket"></i> LOGIN
    </button>
    <button class="tab-btn" id="tab-register" onclick="switchTab('register')">
      <i class="fa-solid fa-user-plus"></i> DAFTAR
    </button>
  </div>

  <!-- ── FORM LOGIN ── -->
  <div id="panel-login">
    <div class="form-group">
      <label class="form-label">USERNAME</label>
      <div class="input-icon">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="l-username" class="form-input" placeholder="Masukkan username" autocomplete="username" autocapitalize="none">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">PASSWORD</label>
      <div class="input-icon">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="l-password" class="form-input" placeholder="Masukkan password" autocomplete="current-password">
      </div>
    </div>
    <button class="btn-submit" id="btn-login" onclick="doLogin()">
      <i class="fa-solid fa-meteor"></i> MASUK
    </button>
  </div>

  <!-- ── FORM REGISTER ── -->
  <div id="panel-register" style="display:none">
    <div class="form-group">
      <label class="form-label">USERNAME</label>
      <div class="input-icon">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="r-username" class="form-input" placeholder="Buat username unik" autocapitalize="none">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">PASSWORD</label>
      <div class="input-icon">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="r-password" class="form-input" placeholder="Buat password">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">NAMA LENGKAP</label>
      <div class="input-icon">
        <i class="fa-solid fa-id-card"></i>
        <input type="text" id="r-fullname" class="form-input" placeholder="Nama sesuai rekening">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">NOMOR HP</label>
      <div class="input-icon">
        <i class="fa-solid fa-phone"></i>
        <input type="tel" id="r-phone" class="form-input" placeholder="08xxxxxxxxxx">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">BANK</label>
        <div class="input-icon">
          <i class="fa-solid fa-building-columns"></i>
          <input type="text" id="r-bank" class="form-input" placeholder="BCA / BRI / dsb">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">NO. REKENING</label>
        <div class="input-icon">
          <i class="fa-solid fa-credit-card"></i>
          <input type="tel" id="r-rekening" class="form-input" placeholder="Nomor rekening">
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">KODE REFERRAL (OPSIONAL)</label>
      <div class="input-icon">
        <i class="fa-solid fa-gift"></i>
        <input type="text" id="r-refby" class="form-input" placeholder="Kode referral teman" autocapitalize="characters">
      </div>
    </div>

    <button class="btn-submit" id="btn-register" onclick="doRegister()">
      <i class="fa-solid fa-user-plus"></i> DAFTAR SEKARANG
    </button>

    <!-- Info kode referral setelah register berhasil -->
    <div class="ref-info" id="ref-result">
      <i class="fa-solid fa-gift"></i> Kode Referral Anda:<br>
      <strong id="ref-code-display" style="font-size:18px; color:var(--yellow); letter-spacing:3px;"></strong><br>
      <small>Bagikan ke teman untuk bonus mingguan!</small>
    </div>
  </div>

  <div class="divider">─── NEON PLINKO VIP ───</div>
</div>

<div class="version">V 4.0 &nbsp;|&nbsp; POWERED BY GAS</div>

<!-- GLOBAL.JS wajib di-load sebelum script ini -->
<script src="global.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  index.html — Login & Register
//  Logika redirect yang benar:
//  1. apiLogin() → saveSession() selesai SYNCHRONOUS ke localStorage
//  2. Baru redirect ke game.html
//  Tidak ada setTimeout antara saveSession dan redirect.
// ═══════════════════════════════════════════════════════════

// ── CEK SESSION — jika sudah login langsung ke game ─────────
(function checkExistingSession() {
  // Pakai loadSession() dari global.js v5.0 (_session bukan currentUser)
  const sess = loadSession();
  if (sess && sess.username) {
    window.location.replace('game.html');
  }
})();

// ── TAB SWITCH ───────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('panel-login').style.display    = tab === 'login'    ? 'block' : 'none';
  document.getElementById('panel-register').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

// ── LOGIN ─────────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('l-username').value.trim();
  const password = document.getElementById('l-password').value.trim();

  if (!username || !password) {
    showToast('Username dan password wajib diisi.', 'error');
    return;
  }

  // Disable tombol agar tidak double-click
  const btn = document.getElementById('btn-login');
  btn.disabled = true;

  try {
    // apiLogin dari global.js:
    // - Kirim ke GAS action=login
    // - Jika SUCCESS → saveSession({ username, fullname, saldo, ... })
    // - saveSession adalah SYNCHRONOUS ke localStorage
    const res = await apiLogin(username, password);

    if (res.result === 'SUCCESS') {
      // ✅ Session sudah tersimpan ke localStorage sebelum baris ini
      // Langsung redirect — TIDAK perlu setTimeout
      window.location.replace('game.html');
      // (replace agar tidak bisa back ke halaman login)
    } else {
      btn.disabled = false;
    }
  } catch(err) {
    showToast('Terjadi kesalahan. Coba lagi.', 'error');
    btn.disabled = false;
  }
}

// ── REGISTER ──────────────────────────────────────────────────
async function doRegister() {
  const username  = document.getElementById('r-username').value.trim();
  const password  = document.getElementById('r-password').value.trim();
  const fullname  = document.getElementById('r-fullname').value.trim();
  const phone     = document.getElementById('r-phone').value.trim();
  const bank      = document.getElementById('r-bank').value.trim();
  const rekening  = document.getElementById('r-rekening').value.trim();
  const refBy     = document.getElementById('r-refby').value.trim().toUpperCase();

  // Validasi dasar
  if (!username || !password || !fullname || !phone || !bank || !rekening) {
    showToast('Semua field wajib diisi.', 'error');
    return;
  }
  if (username.length < 4) {
    showToast('Username minimal 4 karakter.', 'error');
    return;
  }
  if (password.length < 6) {
    showToast('Password minimal 6 karakter.', 'error');
    return;
  }

  const btn = document.getElementById('btn-register');
  btn.disabled = true;

  try {
    // apiRegister dari global.js
    const res = await apiRegister({ username, password, fullname, phone, bank, rekening, refBy });

    if (res.result === 'SUCCESS') {
      // Tampilkan kode referral
      document.getElementById('ref-code-display').textContent = res.refCode || '-';
      document.getElementById('ref-result').style.display = 'block';

      // Langsung login otomatis
      showToast('Registrasi berhasil! Masuk otomatis...', 'success');

      // Login otomatis setelah register
      setTimeout(async () => {
        const loginRes = await apiLogin(username, password);
        if (loginRes.result === 'SUCCESS') {
          window.location.replace('game.html');
        } else {
          // Jika auto-login gagal, arahkan ke tab login
          showToast('Silakan login manual.', 'info');
          switchTab('login');
          document.getElementById('l-username').value = username;
          btn.disabled = false;
        }
      }, 1200);

    } else {
      btn.disabled = false;
    }
  } catch(err) {
    showToast('Terjadi kesalahan. Coba lagi.', 'error');
    btn.disabled = false;
  }
}

// ── ENTER KEY SUPPORT ─────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const loginPanel = document.getElementById('panel-login');
  const regPanel   = document.getElementById('panel-register');
  if (loginPanel.style.display !== 'none') doLogin();
  else if (regPanel.style.display !== 'none') doRegister();
});
</script>
</body>
</html>
