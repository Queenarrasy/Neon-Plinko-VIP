<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>NEON PLINKO — VIP ACCESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --pink: #ff0077; --blue: #0022ff; --yellow: #fbff00; --bg: #02030d;
            --gp: 0 0 20px rgba(255, 0, 119, 0.8);
            --gb: 0 0 20px rgba(0, 34, 255, 0.8);
            --gy: 0 0 20px rgba(251, 255, 0, 0.8);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif;
            height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        #canvas-bg { position: absolute; inset: 0; z-index: 0; }
        .overlay { position: absolute; inset: 0; background: radial-gradient(circle at center, transparent, var(--bg) 95%); z-index: 1; }

        .login-card {
            width: 92%; max-width: 400px; padding: 30px;
            background: rgba(5, 6, 25, 0.7); backdrop-filter: blur(25px);
            border: 2px solid var(--blue); border-radius: 40px;
            text-align: center; z-index: 10; position: relative;
            box-shadow: var(--gb), inset 0 0 30px rgba(0, 34, 255, 0.2);
            animation: float 4s ease-in-out infinite;
            max-height: 95vh; overflow-y: auto;
        }
        .login-card::-webkit-scrollbar { display: none; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        .logo-area { margin-bottom: 25px; }
        .logo-area h1 { font-family: 'Cinzel Decorative'; font-size: 28px; color: var(--pink); text-shadow: var(--gp); letter-spacing: 2px; }
        .logo-area p { font-size: 10px; letter-spacing: 5px; color: var(--yellow); font-weight: 900; text-shadow: var(--gy); }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.6); padding: 6px; border-radius: 50px; border: 1px solid var(--blue); }
        .tab { flex: 1; padding: 12px; border-radius: 50px; cursor: pointer; font-size: 12px; font-weight: 800; transition: 0.3s; color: rgba(255,255,255,0.3); }
        .tab.active { background: linear-gradient(135deg, var(--blue), #001188); color: #fff; box-shadow: var(--gb); }

        .input-group { position: relative; margin-bottom: 12px; }
        .input-group i { position: absolute; left: 18px; top: 15px; color: var(--yellow); font-size: 16px; text-shadow: var(--gy); }
        
        input, select {
            width: 100%; padding: 14px 15px 14px 50px; background: rgba(0,0,0,0.8);
            border: 1px solid rgba(0, 212, 255, 0.4); border-radius: 18px;
            color: #fff; font-family: 'Outfit'; transition: 0.3s; font-size: 14px;
        }
        input:focus { border-color: var(--pink); box-shadow: var(--gp); }

        .btn-glow {
            width: 100%; padding: 18px; border-radius: 50px; border: none;
            background: linear-gradient(90deg, var(--blue), var(--pink));
            color: #fff; font-weight: 900; font-size: 15px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 3px; margin-top: 15px;
            box-shadow: var(--gp); transition: 0.3s; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .btn-glow:active { transform: scale(0.96); }

        /* Custom Neon Modal */
        #neon-modal { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { width: 85%; max-width: 320px; background: #050614; border: 2px solid var(--pink); border-radius: 30px; padding: 30px; text-align: center; box-shadow: var(--gp); animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-icon { font-size: 50px; color: var(--yellow); margin-bottom: 15px; text-shadow: var(--gy); }
        .modal-btn { width: 100%; padding: 12px; background: var(--pink); border: none; color: #fff; border-radius: 50px; font-weight: 900; margin-top: 20px; cursor: pointer; box-shadow: var(--gp); }

        .footer-links { margin-top: 25px; font-size: 11px; font-weight: 700; }
        .footer-links a { color: var(--yellow); text-decoration: none; text-shadow: var(--gy); }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="overlay"></div>

    <div class="login-card">
        <div class="logo-area">
            <h1>NEON PLINKO</h1>
            <p>PREMIUM VIP</p>
        </div>

        <div class="tabs">
            <div class="tab active" id="t-login" onclick="switchTab('login')">LOGIN</div>
            <div class="tab" id="t-daftar" onclick="switchTab('daftar')">DAFTAR</div>
        </div>

        <div id="form-container">
            <div class="input-group">
                <i class="fas fa-user-astronaut"></i>
                <input type="text" id="user" placeholder="USERNAME" autocomplete="off">
            </div>

            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="password" id="pass" placeholder="PASSWORD">
            </div>

            <div id="daftar-fields" style="display: none;">
                <div class="input-group">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="nama" placeholder="NAMA SESUAI REKENING">
                </div>
                <div class="input-group">
                    <i class="fas fa-university"></i>
                    <select id="bank">
                        <option value="" disabled selected>PILIH BANK / WALLET</option>
                        <option value="DANA">DANA</option>
                        <option value="GOPAY">GOPAY</option>
                        <option value="OVO">OVO</option>
                        <option value="BCA">BANK BCA</option>
                        <option value="BRI">BANK BRI</option>
                        <option value="MANDIRI">BANK MANDIRI</option>
                    </select>
                </div>
                <div class="input-group">
                    <i class="fas fa-credit-card"></i>
                    <input type="number" id="norek" placeholder="NOMOR REKENING / HP">
                </div>
                <div class="input-group">
                    <i class="fas fa-users-rays"></i>
                    <input type="text" id="ref" placeholder="KODE REFERRAL (OPSIONAL)">
                </div>
            </div>

            <button class="btn-glow" id="btn-action" onclick="handleAuth()">INITIALIZE ACCESS</button>
        </div>
        
        <div class="footer-links">
            <a href="https://wa.me/6289510249551" target="_blank"><i class="fab fa-whatsapp"></i> HUBUNGI ADMIN NEON VIP</a>
        </div>
    </div>

    <div id="neon-modal">
        <div class="modal-box">
            <i class="fas fa-bolt-lightning modal-icon" id="m-icon"></i>
            <p id="m-text" style="font-weight: 600; line-height: 1.5;"></p>
            <button class="modal-btn" onclick="closeModal()">CONFIRM</button>
        </div>
    </div>

<script>
    const SUPA_URL = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
    const SUPA_KEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani"; 
    const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

    let currentMode = 'login';

    // --- SOUND ENGINE ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSnd(freq, type, dur) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function switchTab(mode) {
        playSnd(440, 'sine', 0.1);
        currentMode = mode;
        document.getElementById('t-login').classList.toggle('active', mode === 'login');
        document.getElementById('t-daftar').classList.toggle('active', mode === 'daftar');
        document.getElementById('daftar-fields').style.display = mode === 'daftar' ? 'block' : 'none';
        document.getElementById('btn-action').innerText = mode === 'login' ? 'INITIALIZE ACCESS' : 'CREATE VIP ACCOUNT';
    }

    function showNeonAlert(msg, isError = false) {
        if(isError) playSnd(150, 'sawtooth', 0.3); else playSnd(880, 'sine', 0.2);
        document.getElementById('m-text').innerText = msg;
        document.getElementById('m-icon').style.color = isError ? '#ff0077' : '#fbff00';
        document.getElementById('neon-modal').style.display = 'flex';
    }

    function closeModal() {
        playSnd(600, 'sine', 0.1);
        document.getElementById('neon-modal').style.display = 'none';
    }

    async function handleAuth() {
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pass').value.trim();
        const btn = document.getElementById('btn-action');

        if(!u || !p) return showNeonAlert("DATA TIDAK LENGKAP!", true);

        btn.disabled = true;
        btn.innerText = "CONNECTING...";

        if(currentMode === 'login') {
            const { data, error } = await _supa.from('profiles').select('*').eq('username', u).eq('password', p).single();

            if (error || !data) {
                showNeonAlert("USERNAME / PASSWORD SALAH!", true);
                btn.disabled = false; btn.innerText = "INITIALIZE ACCESS";
            } else {
                playSnd(1200, 'sine', 0.2);
                const sid = Math.random().toString(36).substring(2);
                localStorage.setItem('user_session', u);
                localStorage.setItem('local_sid', sid);
                await _supa.from('profiles').update({ last_session_id: sid }).eq('username', u);
                
                btn.innerText = "ACCESS GRANTED!";
                setTimeout(() => { location.href = 'game.html'; }, 1000);
            }
        } else {
            const nama = document.getElementById('nama').value.toUpperCase().trim();
            const bank = document.getElementById('bank').value;
            const norek = document.getElementById('norek').value.trim();
            const ref = document.getElementById('ref').value.trim() || 'DIRECT';

            if(!nama || !bank || !norek) {
                btn.disabled = false; btn.innerText = "CREATE VIP ACCOUNT";
                return showNeonAlert("DATA REKENING WAJIB ISI!", true);
            }

            const { data: exist } = await _supa.from('profiles').select('username').eq('username', u).single();
            if(exist) {
                btn.disabled = false; btn.innerText = "CREATE VIP ACCOUNT";
                return showNeonAlert("USERNAME SUDAH TERPAKAI!", true);
            }

            const { error: insErr } = await _supa.from('profiles').insert([{
                username: u, password: p, nama_lengkap: nama,
                bank_name: bank, rekening: norek, referred_by: ref,
                saldo: 0, winrate: 30, maxwin_limit: 100000 
            }]);

            if(insErr) {
                showNeonAlert("GAGAL DAFTAR: " + insErr.message, true);
                btn.disabled = false;
            } else {
                showNeonAlert("REGISTRASI BERHASIL! SILAHKAN LOGIN.");
                setTimeout(() => { switchTab('login'); }, 1500);
                btn.disabled = false;
            }
        }
    }

    // --- BACKGROUND STARFIELD ---
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function initCanvas() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<150; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5, d: Math.random()*0.5 });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        stars.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
            s.y += s.d; if(s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(draw);
    }

    window.onresize = initCanvas;
    initCanvas(); draw();
</script>
</body>
</html>
