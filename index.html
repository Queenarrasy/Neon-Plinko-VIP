<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000005">
    <title>NEON PLINKO — ULTRA VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="lang.js"></script>
    <style>
        :root {
            --pink: #ff0077; --blue: #0022ff; --yellow: #fbff00; --bg: #000005;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; -webkit-tap-highlight-color:transparent; }
        html { height: 100%; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
        body { background: var(--bg); color: #fff; overflow: hidden; min-height: 100vh; min-height: -webkit-fill-available; display: flex; align-items: center; justify-content: center; }

        #particles-js, #particles-splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* ── LUXURY SPLASH SCREEN ── */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #000020 0%, #000 90%);
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.5s ease-in-out, visibility 1.5s;
        }

        .logo-container { position: relative; margin-bottom: 100px; text-align: center; z-index: 10001; }
        .splash-logo {
            font-family: 'Cinzel Decorative', cursive; font-size: clamp(24px, 6vw, 45px);
            background: linear-gradient(to bottom, #fff 30%, var(--pink), var(--blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--pink));
            letter-spacing: clamp(1px, 1vw, 4px);
            animation: logoFloat 4s infinite ease-in-out;
        }
        @keyframes logoFloat { 0%, 100% { transform: translateY(0) scale(1); filter: brightness(1); } 50% { transform: translateY(-15px) scale(1.05); filter: brightness(1.2); } }

        /* ── ROCKET & LOADING VISUAL ── */
        .loading-wrapper { width: 280px; position: relative; padding-top: 60px; z-index: 10001; }
        
        .rocket-container {
            position: absolute; bottom: 30px; left: 0;
            width: 50px; height: 50px;
            transition: left 0.1s linear;
            transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center;
        }

        .rocket-container i {
            font-size: 35px; color: #fff;
            filter: drop-shadow(0 0 15px var(--blue));
            transform: rotate(-45deg);
            animation: rocketVibe 0.15s infinite;
        }

        .rocket-container::after {
            content: ''; position: absolute; bottom: 0; left: 5px;
            width: 12px; height: 25px;
            background: linear-gradient(to top, transparent, var(--pink), var(--yellow));
            filter: blur(4px); border-radius: 50%;
            transform: rotate(135deg); animation: flameFlow 0.1s infinite;
        }

        @keyframes rocketVibe { 0%, 100% { transform: rotate(-45deg) translate(0,0); } 50% { transform: rotate(-45deg) translate(1px, 1px); } }
        @keyframes flameFlow { 0% { opacity: 0.6; height: 20px; } 50% { opacity: 1; height: 35px; } 100% { opacity: 0.6; height: 20px; } }

        .luxury-loader {
            width: 100%; height: 6px; background: rgba(255,255,255,0.05);
            border-radius: 20px; overflow: visible; border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .luxury-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--pink), var(--yellow));
            box-shadow: 0 0 20px var(--pink), 0 0 10px var(--blue);
            transition: width 0.1s linear; border-radius: 20px;
        }

        .load-status { margin-top: 25px; font-size: 9px; letter-spacing: 5px; color: var(--yellow); font-weight: 900; text-align: center; text-transform: uppercase; opacity: 0.8; }

        /* ── AUTH CARD ── */
        .auth-card {
            position: relative; z-index: 2; width: 92%; max-width: 400px;
            background: rgba(0, 0, 10, 0.8); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px;
            padding: clamp(25px, 5vw, 45px) clamp(18px, 4vw, 30px); box-shadow: 0 0 30px rgba(255,0,119,0.2);
            text-align: center; opacity: 0; transform: translateY(30px);
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1); pointer-events: none;
            max-height: calc(100vh - var(--safe-top) - var(--safe-bottom) - 20px);
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        .auth-card.active { opacity: 1; transform: translateY(0); pointer-events: all; }

        .login-logo { font-family: 'Cinzel Decorative', cursive; font-size: clamp(20px, 5vw, 32px); background: linear-gradient(45deg, #fff, var(--pink), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 35px; filter: drop-shadow(0 0 10px var(--pink)); }

        .tab-nav { display: flex; gap: 8px; margin-bottom: 25px; background: rgba(255,255,255,0.03); padding: 6px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: rgba(255,255,255,0.3); font-weight: 800; cursor: pointer; border-radius: 15px; transition: 0.4s; font-size: 11px; letter-spacing: 1.5px; }
        .tab-btn.active { background: linear-gradient(45deg, var(--pink), var(--blue)); color: #fff; box-shadow: 0 5px 15px rgba(255,0,119,0.4); }

        .input-group { position: relative; margin-bottom: 18px; }
        .input-group i.icon-left { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--pink); font-size: 16px; opacity: 0.8; }
        .toggle-pass { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--yellow); cursor: pointer; z-index: 10; padding: 5px; opacity: 0.7; }

        input, select { width: 100%; padding: 15px 50px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 15px; color: #fff; outline: none; transition: 0.3s; font-size: 16px; -webkit-appearance: none; appearance: none; }
        input:focus { border-color: var(--pink); background: rgba(255,255,255,0.05); }

        .btn-main { width: 100%; padding: 16px; border: none; border-radius: 16px; background: linear-gradient(45deg, var(--pink), var(--blue)); color: #fff; font-weight: 900; font-size: 13px; letter-spacing: 3px; cursor: pointer; transition: 0.4s; box-shadow: 0 8px 25px rgba(255,0,119,0.3); text-transform: uppercase; margin-top: 10px; -webkit-tap-highlight-color: transparent; }
        .btn-main:active { transform: scale(0.97); }

        .wa-btn { display: inline-flex; align-items: center; gap: 8px; background: rgba(37,211,102,0.05); border: 1px solid rgba(37,211,102,0.2); padding: 10px 20px; border-radius: 50px; color: #25d366; font-weight: 700; text-decoration: none; font-size: 10px; margin-top: 25px; }

        .neon-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 20px; }
        .modal-content { background: #000; border: 1px solid var(--pink); padding: clamp(20px, 5vw, 40px); border-radius: 30px; text-align: center; width: 100%; max-width: 320px; box-shadow: 0 0 40px var(--pink); }

        /* ── LANGUAGE SWITCHER ── */
        .lang-switcher { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 20px; }
        .lang-flag-btn {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.1);
            padding: 7px 14px; border-radius: 50px; cursor: pointer;
            font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.45);
            transition: 0.3s; letter-spacing: 1px; -webkit-tap-highlight-color: transparent;
        }
        .lang-flag-btn .flag-emoji { font-size: 18px; line-height: 1; }
        .lang-flag-btn:active { transform: scale(0.95); }
        .lang-flag-btn.lang-active {
            border-color: var(--pink); color: #fff;
            background: rgba(255,0,119,0.1);
            box-shadow: 0 0 10px rgba(255,0,119,0.3);
        }
        .lang-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }

        /* ── RESPONSIVE MEDIA QUERIES ── */
        @media screen and (max-width:360px){
            .auth-card { padding: 20px 15px; border-radius:28px; }
            .login-logo { font-size:18px; margin-bottom:20px; }
            .tab-btn { font-size:10px; padding:10px; }
            input, select { padding:13px 44px; }
            .btn-main { padding:14px; font-size:12px; }
        }
        @media screen and (max-height:640px){
            .auth-card { padding:18px 15px; }
            .login-logo { margin-bottom:15px; }
            .input-group { margin-bottom:12px; }
        }
        @media screen and (max-height:500px) and (orientation:landscape){
            body { align-items:flex-start; padding:10px 0; overflow:auto; }
            .auth-card { margin:10px auto; max-height:none; }
        }
    </style>
</head>
<body>

    <audio id="snd-loading" src="https://assets.mixkit.co/active_storage/sfx/2567/2567-preview.mp3" loop></audio>
    <audio id="snd-transition" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-success" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <div id="particles-js"></div>

    <div id="splash-screen">
        <div id="particles-splash"></div>
        <div class="logo-container">
            <div class="splash-logo">NEON PLINKO VIP</div>
        </div>
        
        <div class="loading-wrapper">
            <div class="rocket-container" id="rocket-box">
                <i class="fas fa-rocket"></i>
            </div>
            <div class="luxury-loader">
                <div class="luxury-bar" id="l-bar"></div>
            </div>
            <div class="load-status" id="l-status" data-lang="load_init">INITIALIZING...</div>
        </div>
    </div>

    <div class="auth-card" id="main-card">
        <div class="login-logo">NEON PLINKO VIP</div>

        <!-- ── LANGUAGE SWITCHER ── -->
        <div class="lang-switcher">
            <button class="lang-flag-btn lang-active" data-lang-code="id" onclick="setLang('id')">
                <span class="flag-emoji">🇮🇩</span> INDONESIA
            </button>
            <div class="lang-divider"></div>
            <button class="lang-flag-btn" data-lang-code="en" onclick="setLang('en')">
                <span class="flag-emoji">🇬🇧</span> ENGLISH
            </button>
        </div>
        
        <div class="tab-nav">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login', this)" data-lang="tab_login">LOGIN</button>
            <button class="tab-btn" id="tab-daftar" onclick="switchTab('daftar', this)" data-lang="tab_daftar">DAFTAR</button>
        </div>

        <div id="form-container"></div>
        <button class="btn-main" id="btn-action" onclick="handleAuth()" data-lang="btn_auth">DAFTAR/LOGIN</button>
        
        <div id="forgot-section" style="display:none">
            <a href="https://wa.me/6289510249551?text=Halo%20Admin" class="wa-btn" target="_blank">
                <i class="fab fa-whatsapp"></i> <span data-lang="btn_contact">HUBUNGI ADMIN</span>
            </a>
        </div>
    </div>

    <div class="neon-modal" id="neon-modal">
        <div class="modal-content">
            <i class="fas fa-shield-halved" style="font-size:40px;color:var(--yellow);margin-bottom:20px;"></i>
            <div id="modal-text" style="font-size:14px; font-weight:700;line-height:1.6;margin-bottom:25px; letter-spacing:1px;"></div>
            <button class="btn-main" onclick="closeModal()" style="padding:10px;" data-lang="btn_continue">CONTINUE</button>
        </div>
    </div>

    <script>
        const SUPA_URL="https://jcxgankdwfwfnbwlkkpz.supabase.co", SUPA_KEY="sb_publishable_CaQyWYa_F3LDYEo8BDWAlQ_d0SscfCL";
        const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);
        let currentMode = 'login';

        // ── ANIMASI SPLASH HANYA SEKALI PER SESI ──
        function runLoader() {
            const bar = document.getElementById('l-bar');
            const rocket = document.getElementById('rocket-box');
            const status = document.getElementById('l-status');
            const splash = document.getElementById('splash-screen');
            const card = document.getElementById('main-card');
            const sndLoad = document.getElementById('snd-loading');
            
            try { sndLoad.volume = 0.3; sndLoad.play(); } catch(e){}

            let progress = 0;
            const timer = setInterval(() => {
                progress += Math.random() * 1.5;
                if(progress > 100) progress = 100;
                bar.style.width = progress + '%';
                rocket.style.left = progress + '%';

                if(progress > 30) status.innerText = t('load_by');
                if(progress > 70) status.innerText = t('load_loading');
                if(progress > 95) status.innerText = t('load_done');

                if(progress === 100) {
                    clearInterval(timer);
                    setTimeout(() => {
                        sndLoad.pause();
                        try { document.getElementById('snd-transition').play(); } catch(e){}
                        splash.style.opacity = '0';
                        splash.style.visibility = 'hidden';
                        card.classList.add('active');
                        // Tandai bahwa splash sudah ditampilkan di sesi ini
                        sessionStorage.setItem('splashDone', '1');
                    }, 800);
                }
            }, 50);
        }

        function skipSplash() {
            // Langsung tampilkan card tanpa animasi loader
            const splash = document.getElementById('splash-screen');
            const card = document.getElementById('main-card');
            splash.style.opacity = '0';
            splash.style.visibility = 'hidden';
            splash.style.transition = 'none';
            card.classList.add('active');
        }

        function buildForms() {
            return {
                login: `<div class="input-group"><i class="fas fa-user icon-left"></i><input type="text" id="user" placeholder="${t('ph_username')}" style="padding-left:50px;"></div><div class="input-group"><i class="fas fa-lock icon-left"></i><input type="password" id="pass" placeholder="${t('ph_password')}" style="padding-left:50px;"><i class="fas fa-eye toggle-pass" onclick="togglePassword(this)"></i></div>`,
                daftar: `<div class="input-group"><i class="fas fa-user-plus icon-left"></i><input type="text" id="user" placeholder="${t('ph_username')}" style="padding-left:50px;"></div><div class="input-group"><i class="fas fa-key icon-left"></i><input type="password" id="pass" placeholder="${t('ph_pass_min')}" style="padding-left:50px;"><i class="fas fa-eye toggle-pass" onclick="togglePassword(this)"></i></div><div class="input-group"><i class="fas fa-id-card icon-left"></i><input type="text" id="nama" placeholder="${t('ph_nama')}" style="padding-left:50px;"></div><div class="input-group"><i class="fas fa-phone-alt icon-left"></i><input type="number" id="hp" placeholder="${t('ph_whatsapp')}" style="padding-left:50px;"></div><div class="input-group"><i class="fas fa-university icon-left"></i><select id="bank" onchange="checkBank()" style="padding-left:50px; background:#050510; color:#fff;"><option value="">${t('ph_bank_pick')}</option><option value="DANA">DANA</option><option value="OVO">OVO</option><option value="GOPAY">GOPAY</option><option value="BCA">BCA</option><option value="BNI">BNI</option><option value="BRI">BRI</option><option value="MANDIRI">MANDIRI</option><option value="LAINNYA">${t('lbl_bank_lain')}</option></select></div><div id="kustom-bank-area"></div><div class="input-group"><i class="fas fa-credit-card icon-left"></i><input type="number" id="norek" placeholder="${t('ph_norek')}" style="padding-left:50px;"></div><div class="input-group"><i class="fas fa-users icon-left"></i><input type="text" id="ref" placeholder="${t('ph_ref')}" style="padding-left:50px;"></div>`
            };
        }
        // Keep original forms for backwards compat — will be rebuilt on switchTab
        const forms = { login: '', daftar: '' };

        function switchTab(m, btn) {
            try { document.getElementById('snd-click').play(); } catch(e){}
            currentMode = m;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const builtForms = buildForms();
            document.getElementById('form-container').innerHTML = builtForms[m];
            const btnAction = document.getElementById('btn-action');
            btnAction.innerText = m==='login' ? t('btn_auth') : t('btn_create');
            btnAction.setAttribute('data-lang', m==='login' ? 'btn_auth' : 'btn_create');
            document.getElementById('forgot-section').style.display = m==='login' ? 'block' : 'none';

            // Jika mode daftar & ada ?ref di URL, isi otomatis kode referral
            if(m === 'daftar') {
                const urlRef = new URLSearchParams(window.location.search).get('ref');
                if(urlRef) {
                    const refInput = document.getElementById('ref');
                    if(refInput) {
                        refInput.value = urlRef.toUpperCase();
                        refInput.readOnly = true;
                        refInput.style.color = 'var(--yellow)';
                        refInput.style.borderColor = 'rgba(251,255,0,0.5)';
                    }
                }
            }
        }

        function togglePassword(btn) {
            const input = btn.parentElement.querySelector('input');
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.classList.toggle('fa-eye'); btn.classList.toggle('fa-eye-slash');
        }

        function checkBank(){
            const v = document.getElementById('bank').value;
            document.getElementById('kustom-bank-area').innerHTML = v==='LAINNYA' ? `<div class="input-group"><i class="fas fa-pen icon-left"></i><input type="text" id="bank_kustom" placeholder="${t('ph_nama')}" style="padding-left:50px;"></div>` : '';
        }

        async function handleAuth() {
            try { document.getElementById('snd-click').play(); } catch(e){}
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.trim();
            const btn = document.getElementById('btn-action');
            if(!u || !p) return showNeonModal(t('err_fill_all'));
            btn.disabled = true; btn.innerText = "AUTHENTICATING...";

            if(currentMode === 'login'){
                const {data, error} = await _supa.from('profiles').select('*').eq('username',u).eq('password',p).maybeSingle();
                if(error || !data){
                    showNeonModal(t('err_access'));
                    btn.disabled = false; btn.innerText = t('btn_auth');
                } else {
                    try { document.getElementById('snd-success').play(); } catch(e){}
                    localStorage.setItem('neon_user', u);
                    setTimeout(() => location.href = 'game.html', 500);
                }
            } else {
                const nama = document.getElementById('nama').value.toUpperCase().trim();
                const hp = document.getElementById('hp').value.trim();
                const bankVal = document.getElementById('bank').value;
                let bank = bankVal === 'LAINNYA' ? (document.getElementById('bank_kustom')||{value:''}).value.toUpperCase() : bankVal;
                const norek = document.getElementById('norek').value.trim();
                const ref = document.getElementById('ref').value.trim() || 'DIRECT';
                const myRef = "VIP" + Math.random().toString(36).substring(2,7).toUpperCase();
                if(!nama || !hp || !bank || !norek) { btn.disabled = false; return showNeonModal(t('err_incomplete')); }
                const {error:insErr} = await _supa.from('profiles').insert([{ username:u, password:p, nama_lengkap:nama, nomor_hp:hp, bank_name:bank, rekening:norek, referred_by:ref, referral_code:myRef, saldo:0 }]);
                if(insErr){ showNeonModal(insErr.message); btn.disabled = false; }
                else { 
                    try { document.getElementById('snd-success').play(); } catch(e){}
                    showNeonModal(t('ok_created')); 
                    setTimeout(()=>location.reload(), 2000); 
                }
            }
        }

        function showNeonModal(t) { document.getElementById('modal-text').innerText = t; document.getElementById('neon-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('neon-modal').style.display = 'none'; }

        window.onload = () => {
            // Apply saved language on load
            applyLang();
            updateLangFlags();
            // ── CEK APAKAH SPLASH SUDAH PERNAH DITAMPILKAN DI SESI INI ──
            const splashDone = sessionStorage.getItem('splashDone');

            // Cek apakah ada ?ref= di URL (link undangan referral)
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');

            if(splashDone) {
                // Sudah pernah lihat splash → langsung tampilkan card
                skipSplash();
            } else {
                // Pertama kali → jalankan animasi splash
                runLoader();
            }

            // Inisialisasi particles
            particlesJS("particles-js", { "particles": { "number": { "value": 40 }, "color": { "value": "#ff0077" }, "opacity": { "value": 0.2 }, "size": { "value": 2 }, "line_linked": { "enable": true, "distance": 150, "color": "#0022ff", "opacity": 0.1 }, "move": { "enable": true, "speed": 1 } } });
            
            if(!splashDone) {
                particlesJS("particles-splash", { "particles": { "number": { "value": 100 }, "color": { "value": "#fff" }, "opacity": { "value": 0.4 }, "size": { "value": 1.2 }, "move": { "enable": true, "speed": 0.8, "direction": "top" } } });
            }

            // Jika ada ?ref= di URL → otomatis buka tab REGISTER & isi kode referral
            if(refCode) {
                const daftarBtn = document.getElementById('tab-daftar');
                // Tunggu card aktif dulu (setelah splash atau langsung)
                const openRegister = () => {
                    switchTab('daftar', daftarBtn);
                    // Set kode referral setelah form render
                    setTimeout(() => {
                        const refInput = document.getElementById('ref');
                        if(refInput) {
                            refInput.value = refCode.toUpperCase();
                            refInput.readOnly = true;
                            refInput.style.color = 'var(--yellow)';
                            refInput.style.borderColor = 'rgba(251,255,0,0.5)';
                        }
                    }, 100);
                };

                if(splashDone) {
                    // Langsung buka
                    setTimeout(openRegister, 300);
                } else {
                    // Tunggu setelah splash selesai (~5 detik estimasi)
                    // Monitor sampai card aktif
                    const checkCard = setInterval(() => {
                        const card = document.getElementById('main-card');
                        if(card.classList.contains('active')) {
                            clearInterval(checkCard);
                            setTimeout(openRegister, 200);
                        }
                    }, 200);
                }
            } else {
                // Tidak ada ref → default tab login
                switchTab('login', document.getElementById('tab-login'));
            }
        };
    </script>
</body>
</html>
