<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO VIP — Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff0077; --blue: #0044ff; --yellow: #f5e642;
            --bg: #02030d; --dark: #050614;
            --gp: 0 0 15px rgba(255,0,119,0.7);
            --gb: 0 0 20px rgba(0,68,255,0.8);
            --gy: 0 0 15px rgba(245,230,66,0.7);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            min-height: 100vh; background: var(--bg);
            color: #fff; font-family: 'Outfit', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 20px;
            background-image: radial-gradient(circle at 50% 20%, rgba(0,68,255,0.12) 0%, transparent 60%);
        }

        #loading { display: none; position: fixed; inset: 0; background: rgba(2,3,13,0.95); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 14px; backdrop-filter: blur(5px); }
        .spin { width: 48px; height: 48px; border: 4px solid rgba(0,68,255,0.2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .logo { font-family: 'Cinzel Decorative', serif; font-size: 26px; font-weight: 900; background: linear-gradient(90deg, var(--blue), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(0,68,255,0.5)); }
        .logo-sub { font-size: 10px; color: var(--yellow); letter-spacing: 4px; margin-bottom: 30px; text-shadow: var(--gy); font-weight: 700; }

        .card { width: 100%; max-width: 400px; background: rgba(5,6,20,0.95); border: 1px solid rgba(0, 68, 255, 0.3); border-radius: 20px; padding: 30px 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .tabs { display: flex; margin-bottom: 24px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(0, 68, 255, 0.5); background: rgba(255,255,255,0.02); }
        .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: rgba(255,255,255,0.4); font-weight: 700; cursor: pointer; font-family: 'Outfit'; transition: 0.3s; font-size: 14px; }
        .tab-btn.active { background: var(--blue); color: #fff; box-shadow: var(--gb); }

        .form-group { margin-bottom: 18px; }
        .form-label { font-size: 11px; color: var(--blue); letter-spacing: 1px; margin-bottom: 8px; display: block; font-weight: 700; }
        .form-input { width: 100%; padding: 14px 16px; background: rgba(0,68,255,0.08); border: 1px solid rgba(0,68,255,0.2); border-radius: 10px; color: #fff; outline: none; transition: 0.3s; font-family: 'Outfit'; }
        .form-input:focus { border-color: var(--blue); background: rgba(0,68,255,0.15); box-shadow: 0 0 10px rgba(0,68,255,0.1); }
        
        .input-icon { position: relative; }
        .input-icon .form-input { padding-left: 45px; }
        .input-icon i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--blue); font-size: 18px; }

        .btn-submit { width: 100%; padding: 16px; background: linear-gradient(90deg, var(--blue), var(--pink)); border: none; border-radius: 12px; font-family: 'Cinzel Decorative'; font-weight: 900; color: #fff; cursor: pointer; box-shadow: var(--gb); margin-top: 10px; font-size: 16px; letter-spacing: 1px; transition: 0.3s; }
        .btn-submit:active { transform: scale(0.97); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        ::placeholder { color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div id="loading"><div class="spin"></div><p style="margin-top:10px; font-weight:700; letter-spacing:2px; color:var(--blue);">AUTHENTICATING...</p></div>

<div class="logo">NEON PLINKO</div>
<div class="logo-sub">V I P &nbsp; S Y S T E M</div>

<div class="card">
    <div class="tabs">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">LOGIN</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">DAFTAR</button>
    </div>

    <div id="panel-login">
        <div class="form-group">
            <label class="form-label">USERNAME</label>
            <div class="input-icon">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="l-username" class="form-input" placeholder="Masukkan username">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">PASSWORD</label>
            <div class="input-icon">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="l-password" class="form-input" placeholder="Masukkan password">
            </div>
        </div>
        <button class="btn-submit" id="btn-login" onclick="handleLogin()">MASUK KE SISTEM</button>
    </div>

    <div id="panel-register" style="display:none">
        <div class="form-group">
            <label class="form-label">USERNAME</label>
            <input type="text" id="r-username" class="form-input" placeholder="Contoh: neonplayer77">
        </div>
        <div class="form-group">
            <label class="form-label">PASSWORD</label>
            <input type="password" id="r-password" class="form-input" placeholder="Min. 6 karakter">
        </div>
        <div class="form-group">
            <label class="form-label">NAMA LENGKAP (Sesuai Rekening)</label>
            <input type="text" id="r-fullname" class="form-input" placeholder="Nama lengkap Anda">
        </div>
        <div class="form-group">
            <label class="form-label">NOMOR WHATSAPP</label>
            <input type="tel" id="r-phone" class="form-input" placeholder="0812xxxx">
        </div>
        <div class="form-group">
            <label class="form-label">METODE PENARIKAN (Bank/E-Wallet)</label>
            <input type="text" id="r-bank" class="form-input" placeholder="Contoh: BCA / DANA / OVO">
        </div>
        <div class="form-group">
            <label class="form-label">NOMOR REKENING / DOMPET</label>
            <input type="text" id="r-rek" class="form-input" placeholder="Nomor rekening Anda">
        </div>
        <button class="btn-submit" id="btn-register" onclick="handleRegister()">DAFTAR SEKARANG</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
    // Pastikan user langsung diarahkan jika sudah login
    if (localStorage.getItem('user_neon')) {
        window.location.href = 'game.html';
    }

    function switchTab(tab) {
        document.getElementById('panel-login').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('panel-register').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('tab-login').classList.toggle('active', tab === 'login');
        document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    }

    async function handleLogin() {
        const u = document.getElementById('l-username').value.trim().toLowerCase();
        const p = document.getElementById('l-password').value;
        const loader = document.getElementById('loading');

        if(!u || !p) return alert("Silakan isi Username dan Password!");
        
        loader.style.display = 'flex';
        
        try {
            // Cari user di tabel 'profiles'
            const { data, error } = await _supabase
                .from('profiles')
                .select('*')
                .eq('username', u)
                .single();

            if (error || !data || data.password !== p) {
                throw new Error("Username atau Password salah!");
            }

            // Simpan sesi ke localStorage sesuai standar config.js kita
            localStorage.setItem('user_neon', u);
            window.location.href = 'game.html';

        } catch (err) {
            alert(err.message);
        } finally {
            loader.style.display = 'none';
        }
    }

    async function handleRegister() {
        const u = document.getElementById('r-username').value.trim().toLowerCase();
        const p = document.getElementById('r-password').value;
        const fn = document.getElementById('r-fullname').value.trim();
        const ph = document.getElementById('r-phone').value.trim();
        const bk = document.getElementById('r-bank').value.trim();
        const rk = document.getElementById('r-rek').value.trim();

        if(!u || !p || !fn || !bk || !rk) return alert("Mohon lengkapi semua data pendaftaran!");
        if(u.length < 4) return alert("Username minimal 4 karakter!");
        if(p.length < 6) return alert("Password minimal 6 karakter!");

        const loader = document.getElementById('loading');
        loader.style.display = 'flex';

        try {
            // 1. Cek apakah username sudah terpakai
            const { data: exist } = await _supabase
                .from('profiles')
                .select('username')
                .eq('username', u)
                .single();

            if(exist) throw new Error("Username sudah digunakan orang lain!");

            // 2. Insert ke database (Sesuai kolom SQL Master Anda)
            const { error } = await _supabase.from('profiles').insert([{
                username: u,
                password: p,
                nama_lengkap: fn,
                nomor_hp: ph,
                bank_name: bk,
                rekening: rk,
                saldo: 0,
                winrate: 50, // Default winrate 50%
                role: 'MEMBER'
            }]);

            if(error) throw error;

            alert("Pendaftaran Berhasil! Silakan Login menggunakan akun Anda.");
            switchTab('login');
            
            // Bersihkan form
            document.querySelectorAll('#panel-register input').forEach(i => i.value = '');

        } catch (err) {
            alert("Pendaftaran Gagal: " + err.message);
        } finally {
            loader.style.display = 'none';
        }
    }
</script>
</body>
</html>
