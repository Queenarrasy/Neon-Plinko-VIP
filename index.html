<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO — ULTRA VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root {
            --pink: #ff0077; --blue: #0022ff; --yellow: #fbff00; --bg: #000005;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; -webkit-tap-highlight-color:transparent; }
        body { background: var(--bg); color: #fff; overflow: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* ── LUXURY SPLASH SCREEN ── */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #000020 0%, #000 80%);
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease-in-out, visibility 1s;
        }

        .logo-container { position: relative; margin-bottom: 100px; text-align: center; }
        .splash-logo {
            font-family: 'Cinzel Decorative', cursive; font-size: 50px;
            background: linear-gradient(to bottom, #fff, var(--pink), var(--blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--pink));
            letter-spacing: 2px;
            animation: logoFloat 3s infinite ease-in-out;
        }
        @keyframes logoFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* ── ROCKET ENGINE (FIXED & THEMED) ── */
        .loading-wrapper { width: 300px; position: relative; padding-top: 50px; }
        
        .rocket-container {
            position: absolute; bottom: 25px; left: 0;
            width: 60px; height: 60px;
            transition: left 0.1s linear;
            transform: translateX(-50%);
            z-index: 10;
            display: flex; flex-direction: column; align-items: center;
        }

        .rocket-container i {
            font-size: 45px;
            color: #fff;
            filter: drop-shadow(0 0 10px var(--blue)) drop-shadow(0 0 20px var(--pink));
            transform: rotate(-45deg); /* Membuat roket mengarah ke kanan atas */
            animation: rocketPower 0.1s infinite;
        }

        /* Efek Api Roket */
        .rocket-container::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 5px;
            width: 15px;
            height: 30px;
            background: linear-gradient(to top, transparent, var(--yellow), var(--pink));
            filter: blur(3px);
            border-radius: 50%;
            transform: rotate(135deg);
            animation: flame 0.2s infinite;
        }

        @keyframes rocketPower { 
            0% { transform: rotate(-45deg) translate(0,0); } 
            50% { transform: rotate(-45deg) translate(1px, 1px); } 
            100% { transform: rotate(-45deg) translate(0,0); }
        }

        @keyframes flame { 0% { height: 20px; opacity: 0.7; } 50% { height: 40px; opacity: 1; } 100% { height: 20px; opacity: 0.7; } }

        .luxury-loader {
            width: 100%; height: 10px; background: rgba(255,255,255,0.05);
            border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .luxury-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--pink), var(--yellow));
            box-shadow: 0 0 20px var(--pink);
            transition: width 0.1s linear;
        }

        .load-status { margin-top: 25px; font-size: 10px; letter-spacing: 4px; color: var(--yellow); font-weight: 900; text-align: center; text-transform: uppercase; }

        /* ── AUTH CARD ── */
        .auth-card {
            position: relative; z-index: 2; width: 90%; max-width: 420px;
            background: rgba(0, 0, 15, 0.9); backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.05); border-radius: 40px;
            padding: 50px 35px; box-shadow: 0 0 50px rgba(255,0,119,0.3);
            text-align: center; opacity: 0; transform: scale(0.8);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none;
        }
        .auth-card.active { opacity: 1; transform: scale(1); pointer-events: all; }

        .login-logo { font-family: 'Cinzel Decorative', cursive; font-size: 38px; background: linear-gradient(45deg, #fff, var(--pink), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; filter: drop-shadow(0 0 10px var(--pink)); }

        .tab-nav { display: flex; gap: 10px; margin-bottom: 30px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 20px; }
        .tab-btn { flex: 1; padding: 14px; border: none; background: transparent; color: rgba(255,255,255,0.4); font-weight: 800; cursor: pointer; border-radius: 15px; transition: 0.4s; font-size: 12px; letter-spacing: 2px; }
        .tab-btn.active { background: var(--pink); color: #fff; box-shadow: 0 5px 20px rgba(255,0,119,0.5); }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i.icon-left { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--pink); font-size: 18px; }
        .toggle-pass { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--yellow); cursor: pointer; z-index: 10; padding: 5px; }

        input, select { width: 100%; padding: 16px 50px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: #fff; outline: none; transition: 0.4s; }
        input:focus { border-color: var(--pink); background: rgba(255,255,255,0.07); box-shadow: 0 0 15px rgba(255,0,119,0.1); }

        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 18px; background: linear-gradient(45deg, var(--pink), var(--blue)); color: #fff; font-weight: 900; font-size: 14px; letter-spacing: 3px; cursor: pointer; transition: 0.4s; box-shadow: 0 10px 30px rgba(255,0,119,0.3); text-transform: uppercase; }
        .btn-main:active { transform: scale(0.96); }

        .wa-btn { display: inline-flex; align-items: center; gap: 8px; background: rgba(37,211,102,0.1); border: 1px solid rgba(37,211,102,0.3); padding: 10px 20px; border-radius: 50px; color: #25d366; font-weight: 800; text-decoration: none; font-size: 11px; margin-top: 20px; }

        .neon-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #000; border: 2px solid var(--pink); padding: 40px; border-radius: 35px; text-align: center; max-width: 350px; box-shadow: 0 0 50px var(--pink); }
    </style>
</head>
<body>

    <audio id="snd-intro" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <audio id="snd-ok" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>

    <div id="particles-js"></div>

    <div id="splash-screen">
        <div class="logo-container">
            <div class="splash-logo">NEON PLINKO VIP</div>
        </div>
        
        <div class="loading-wrapper">
            <div class="rocket-container" id="rocket-box">
                <i class="fas fa-rocket"></i>
            </div>
            
            <div class="luxury-loader">
                <div class="luxury-bar" id="l-bar"></div>
            </div>
            <div class="load-status" id="l-status">SECURE CONNECTION INITIALIZING...</div>
        </div>
    </div>

    <div class="auth-card" id="main-card">
        <div class="login-logo">NEON PLINKO VIP</div>
        
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('login', this)">LOGIN</button>
            <button class="tab-btn" onclick="switchTab('daftar', this)">VIP REGISTER</button>
        </div>

        <div id="form-container"></div>
        <button class="btn-main" id="btn-action" onclick="handleAuth()">INITIALIZE ACCESS</button>
        
        <div id="forgot-section" style="display:none">
            <a href="https://wa.me/6289510249551?text=Halo%20Admin" class="wa-btn" target="_blank">
                <i class="fab fa-whatsapp"></i> RECOVER ACCESS
            </a>
        </div>
    </div>

    <div class="neon-modal" id="neon-modal">
        <div class="modal-content">
            <i class="fas fa-shield-alt" style="font-size:50px;color:var(--yellow);margin-bottom:20px;"></i>
            <div id="modal-text" style="font-weight:800;line-height:1.6;margin-bottom:30px;"></div>
            <button class="btn-main" onclick="closeModal()" style="padding:12px;">UNDERSTOOD</button>
        </div>
    </div>

    <script>
        const SUPA_URL="https://jcxgankdwfwfnbwlkkpz.supabase.co", SUPA_KEY="sb_publishable_CaQyWYa_F3LDYEo8BDWAlQ_d0SscfCL";
        const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);
        let currentMode = 'login';

        function runLoader() {
            const bar = document.getElementById('l-bar');
            const rocket = document.getElementById('rocket-box');
            const status = document.getElementById('l-status');
            const splash = document.getElementById('splash-screen');
            const card = document.getElementById('main-card');
            
            let progress = 0;
            const timer = setInterval(() => {
                progress += Math.random() * 2;
                if(progress > 100) progress = 100;
                bar.style.width = progress + '%';
                rocket.style.left = progress + '%';

                if(progress > 40) status.innerText = "ESTABLISHING ENCRYPTED LINK...";
                if(progress > 80) status.innerText = "AUTHENTICATION READY...";

                if(progress === 100) {
                    clearInterval(timer);
                    setTimeout(() => {
                        try { document.getElementById('snd-intro').play(); } catch(e){}
                        splash.style.opacity = '0';
                        splash.style.visibility = 'hidden';
                        card.classList.add('active');
                    }, 800);
                }
            }, 60);
        }

        const forms = {
            login: `<div class="input-group"><i class="fas fa-user icon-left"></i><input type="text" id="user" placeholder="USERNAME" style="padding-left:50px;"></div><div class="input-group"><i class="fas fa-lock icon-left"></i><input type="password" id="pass" placeholder="PASSWORD" style="padding-left:50px;"><i class="fas fa-eye toggle-pass" onclick="togglePassword(this)"></i></div>`,
            daftar: `<div class="input-group"><i class="fas fa-user-plus icon-left"></i><input type="text" id="user" placeholder="CHOOSE USERNAME" style="padding-left:50px;"></div><div class="input-group"><i class="fas fa-key icon-left"></i><input type="password" id="pass" placeholder="PASSWORD (MIN 6)" style="padding-left:50px;"><i class="fas fa-eye toggle-pass" onclick="togglePassword(this)"></i></div><div class="input-group"><i class="fas fa-id-card icon-left"></i><input type="text" id="nama" placeholder="FULL NAME (REKENING)" style="padding-left:50px;"></div><div class="input-group"><i class="fas fa-phone-alt icon-left"></i><input type="number" id="hp" placeholder="WHATSAPP NO" style="padding-left:50px;"></div><div class="input-group"><i class="fas fa-university icon-left"></i><select id="bank" onchange="checkBank()" style="padding-left:50px; background:#050510; color:#fff;"><option value="">SELECT BANK / WALLET</option><option value="DANA">DANA</option><option value="OVO">OVO</option><option value="GOPAY">GOPAY</option><option value="BCA">BCA</option><option value="BNI">BNI</option><option value="BRI">BRI</option><option value="MANDIRI">MANDIRI</option><option value="LAINNYA">OTHER...</option></select></div><div id="kustom-bank-area"></div><div class="input-group"><i class="fas fa-credit-card icon-left"></i><input type="number" id="norek" placeholder="ACCOUNT NUMBER" style="padding-left:50px;"></div><div class="input-group"><i class="fas fa-users icon-left"></i><input type="text" id="ref" placeholder="REFERRAL CODE (OPTIONAL)" style="padding-left:50px;"></div>`
        };

        function switchTab(m, btn) {
            try { document.getElementById('snd-click').play(); } catch(e){}
            currentMode = m;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('form-container').innerHTML = forms[m];
            document.getElementById('btn-action').innerText = m==='login' ? 'INITIALIZE ACCESS' : 'CREATE VIP ACCOUNT';
            document.getElementById('forgot-section').style.display = m==='login' ? 'block' : 'none';
        }

        function togglePassword(btn) {
            const input = btn.parentElement.querySelector('input');
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.classList.toggle('fa-eye'); btn.classList.toggle('fa-eye-slash');
        }

        function checkBank(){
            const v = document.getElementById('bank').value;
            document.getElementById('kustom-bank-area').innerHTML = v==='LAINNYA' ? `<div class="input-group"><i class="fas fa-pen icon-left"></i><input type="text" id="bank_kustom" placeholder="BANK NAME" style="padding-left:50px;"></div>` : '';
        }

        async function handleAuth() {
            try { document.getElementById('snd-click').play(); } catch(e){}
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.trim();
            const btn = document.getElementById('btn-action');
            if(!u || !p) return showNeonModal("ALL FIELDS ARE REQUIRED!");
            btn.disabled = true; btn.innerText = "AUTHENTICATING...";

            if(currentMode === 'login'){
                const {data, error} = await _supa.from('profiles').select('*').eq('username',u).eq('password',p).maybeSingle();
                if(error || !data){
                    showNeonModal("ACCESS DENIED! WRONG CREDENTIALS.");
                    btn.disabled = false; btn.innerText = "INITIALIZE ACCESS";
                } else {
                    try { document.getElementById('snd-ok').play(); } catch(e){}
                    localStorage.setItem('neon_user', u);
                    setTimeout(() => location.href = 'game.html', 500);
                }
            } else {
                const nama = document.getElementById('nama').value.toUpperCase().trim();
                const hp = document.getElementById('hp').value.trim();
                const bankVal = document.getElementById('bank').value;
                let bank = bankVal === 'LAINNYA' ? (document.getElementById('bank_kustom')||{value:''}).value.toUpperCase() : bankVal;
                const norek = document.getElementById('norek').value.trim();
                const ref = document.getElementById('ref').value.trim() || 'DIRECT';
                const myRef = "VIP" + Math.random().toString(36).substring(2,7).toUpperCase();
                if(!nama || !hp || !bank || !norek) { btn.disabled = false; return showNeonModal("COMPLETE YOUR DATA!"); }
                const {error:insErr} = await _supa.from('profiles').insert([{ username:u, password:p, nama_lengkap:nama, nomor_hp:hp, bank_name:bank, rekening:norek, referred_by:ref, referral_code:myRef, saldo:0 }]);
                if(insErr){ showNeonModal(insErr.message); btn.disabled = false; }
                else { showNeonModal("✅ VIP ACCOUNT CREATED!"); setTimeout(()=>location.reload(), 2000); }
            }
        }

        function showNeonModal(t) { document.getElementById('modal-text').innerText = t; document.getElementById('neon-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('neon-modal').style.display = 'none'; }

        window.onload = () => {
            runLoader();
            switchTab('login', document.querySelectorAll('.tab-btn')[0]);
            particlesJS("particles-js", { "particles": { "number": { "value": 60 }, "color": { "value": "#ff0077" }, "shape": { "type": "circle" }, "opacity": { "value": 0.4 }, "size": { "value": 2 }, "line_linked": { "enable": true, "distance": 150, "color": "#0022ff", "opacity": 0.2, "width": 1 }, "move": { "enable": true, "speed": 1.5 } } });
        };
    </script>
</body>
</html>
