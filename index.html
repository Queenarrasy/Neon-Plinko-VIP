<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO — VIP ACCESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root{--pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--bg:#000005;--gp:0 0 20px #ff0077,0 0 50px rgba(255,0,119,.55);--gb:0 0 20px #0022ff,0 0 50px rgba(0,34,255,.55);--gy:0 0 20px #fbff00,0 0 50px rgba(251,255,0,.55)}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent}
        body{background:var(--bg);color:#fff;overflow-x:hidden;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        #particles-js{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
        .auth-card{position:relative;z-index:2;width:100%;max-width:420px;background:rgba(255,255,255,.03);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.1);border-radius:30px;padding:40px 30px;box-shadow:0 25px 50px rgba(0,0,0,.5);text-align:center}
        .logo-area{margin-bottom:35px}
        .logo-text{font-family:'Cinzel Decorative',cursive;font-size:32px;background:linear-gradient(to right,#fff,var(--pink),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:var(--gp);animation:neonPulse 2s infinite alternate}
        @keyframes neonPulse{from{filter:brightness(1) contrast(1)}to{filter:brightness(1.3) contrast(1.1)}}
        .tab-nav{display:flex;gap:10px;margin-bottom:30px;background:rgba(255,255,255,.05);padding:6px;border-radius:15px;border:1px solid rgba(255,255,255,.1)}
        .tab-btn{flex:1;padding:12px;border:none;background:transparent;color:rgba(255,255,255,.5);font-weight:700;cursor:pointer;border-radius:10px;transition:.3s;font-size:13px;letter-spacing:1px}
        .tab-btn.active{background:var(--pink);color:#fff;box-shadow:var(--gp)}
        .input-group{position:relative;margin-bottom:18px;text-align:left}
        .input-group i{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--pink);font-size:16px;text-shadow:0 0 10px var(--pink)}
        input,select{width:100%;padding:14px 15px 14px 45px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:14px;outline:none;transition:.3s;letter-spacing:0.5px}
        input:focus{border-color:var(--pink);background:rgba(255,255,255,.1);box-shadow:0 0 15px rgba(255,0,119,.2)}
        .btn-main{width:100%;padding:16px;border:none;border-radius:15px;background:linear-gradient(45deg,var(--pink),var(--blue));color:#fff;font-weight:900;font-size:15px;letter-spacing:2px;cursor:pointer;transition:.4s;box-shadow:var(--gp);margin-top:10px;text-transform:uppercase}
        .btn-main:active{transform:scale(0.96)}
        .neon-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(5px)}
        .modal-content{background:var(--bg);border:2px solid var(--pink);padding:35px 25px;border-radius:25px;text-align:center;max-width:340px;box-shadow:var(--gp);animation:modalIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)}
        @keyframes modalIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="auth-card">
        <div class="logo-area">
            <div class="logo-text">NEON PLINKO</div>
            <div style="font-size:9px;letter-spacing:5px;color:var(--yellow);margin-top:8px;font-weight:800;text-shadow:0 0 10px var(--yellow)">VIP ACCESS ONLY</div>
        </div>
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('login')">LOGIN</button>
            <button class="tab-btn" onclick="switchTab('daftar')">DAFTAR VIP</button>
        </div>
        <div id="form-container"></div>
        <button class="btn-main" id="btn-action" onclick="handleAuth()">INITIALIZE ACCESS</button>
    </div>

    <div class="neon-modal" id="neon-modal">
        <div class="modal-content">
            <div id="modal-icon"><i class="fas fa-shield-virus" style="font-size:45px;color:var(--yellow);margin-bottom:20px;text-shadow:var(--gy)"></i></div>
            <div id="modal-text" style="font-weight:800;margin-bottom:25px;font-size:16px;line-height:1.4"></div>
            <button class="btn-main" onclick="closeModal()" style="padding:12px;margin:0">UNDERSTOOD</button>
        </div>
    </div>

    <script>
        const SUPA_URL="https://jcxgankdwfwfnbwlkkpz.supabase.co", SUPA_KEY="sb_publishable_CaQyWYa_F3LDYEo8BDWAlQ_d0SscfCL";
        const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);
        let currentMode = 'login';

        const forms = {
            login: `<div class="input-group"><i class="fas fa-user-astronaut"></i><input type="text" id="user" placeholder="USERNAME"></div>
                    <div class="input-group"><i class="fas fa-fingerprint"></i><input type="password" id="pass" placeholder="PASSWORD"></div>`,
            daftar: `<div class="input-group"><i class="fas fa-user-plus"></i><input type="text" id="user" placeholder="USERNAME (MIN 5)"></div>
                    <div class="input-group"><i class="fas fa-key"></i><input type="password" id="pass" placeholder="PASSWORD (MIN 6)"></div>
                    <div class="input-group"><i class="fas fa-id-badge"></i><input type="text" id="nama" placeholder="NAMA SESUAI REKENING"></div>
                    <div class="input-group"><i class="fas fa-phone-alt"></i><input type="number" id="hp" placeholder="NOMOR WHATSAPP"></div>
                    <div class="input-group"><i class="fas fa-university"></i>
                        <select id="bank" onchange="checkBank()">
                            <option value="">PILIH BANK / E-WALLET</option>
                            <option value="DANA">DANA</option><option value="OVO">OVO</option><option value="GOPAY">GOPAY</option>
                            <option value="BCA">BCA</option><option value="BNI">BNI</option><option value="BRI">BRI</option>
                            <option value="MANDIRI">MANDIRI</option><option value="LAINNYA">LAINNYA...</option>
                        </select>
                    </div>
                    <div id="kustom-bank-area"></div>
                    <div class="input-group"><i class="fas fa-credit-card"></i><input type="number" id="norek" placeholder="NOMOR REKENING / DOMPET"></div>
                    <div class="input-group"><i class="fas fa-users"></i><input type="text" id="ref" placeholder="KODE REFERRAL (OPSIONAL)"></div>`
        };

        function switchTab(m){
            currentMode=m;
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('form-container').innerHTML=forms[m];
            document.getElementById('btn-action').innerText=m==='login'?'INITIALIZE ACCESS':'CREATE VIP ACCOUNT';
            if(m==='daftar'){
                const p=localStorage.getItem('pending_ref');
                if(p) document.getElementById('ref').value=p;
            }
        }

        function checkBank(){
            const v=document.getElementById('bank').value;
            document.getElementById('kustom-bank-area').innerHTML=v==='LAINNYA'?
                `<div class="input-group"><i class="fas fa-pen"></i><input type="text" id="bank_kustom" placeholder="NAMA BANK"></div>`:'';
        }

        function validatePass(s){return s.length>=6 && /\d/.test(s) && /[a-zA-Z]/.test(s);}

        async function handleAuth(){
            const u=document.getElementById('user').value.toLowerCase().trim();
            const p=document.getElementById('pass').value.trim();
            const btn=document.getElementById('btn-action');
            if(!u||!p) return showNeonModal("DATA TIDAK LENGKAP!");
            btn.disabled=true; btn.innerText="PROCESSING...";

            if(currentMode==='login'){
                const {data,error}=await _supa.from('profiles').select('*').eq('username',u).eq('password',p).single();
                if(error||!data){
                    showNeonModal("ACCESS DENIED! CHECK CREDENTIALS.");
                    btn.disabled=false; btn.innerText="INITIALIZE ACCESS";
                } else {
                    localStorage.setItem('neon_user',u);
                    location.href='game.html';
                }
            } else {
                const nama=document.getElementById('nama').value.toUpperCase().trim();
                const hp=document.getElementById('hp').value.trim();
                const bank=document.getElementById('bank').value==='LAINNYA'?document.getElementById('bank_kustom').value.toUpperCase():document.getElementById('bank').value;
                const norek=document.getElementById('norek').value.trim();
                const ref=document.getElementById('ref').value.trim()||'DIRECT';
                const myRef="NEON"+Math.random().toString(36).substring(2,7).toUpperCase();

                if(!nama||!hp||!bank||!norek) { btn.disabled=false; return showNeonModal("LENGKAPI SEMUA DATA!"); }
                if(!validatePass(p)) { btn.disabled=false; return showNeonModal("PASSWORD HARUS 6+ KARAKTER (HURUF & ANGKA)!"); }

                const {data:uE}=await _supa.from('profiles').select('username').eq('username',u).single();
                if(uE){ btn.disabled=false; return showNeonModal("USERNAME SUDAH TERDAFTAR!"); }
                
                const {data:rE}=await _supa.from('profiles').select('rekening').eq('rekening',norek).single();
                if(rE){ btn.disabled=false; return showNeonModal("NOMOR REKENING SUDAH TERDAFTAR!"); }

                const {error:insErr}=await _supa.from('profiles').insert([{
                    username:u, password:p, nama_lengkap:nama, nomor_hp:hp, bank_name:bank,
                    rekening:norek, referred_by:ref, referral_code:myRef, saldo:0, winrate:30, maxwin_limit:100000
                }]);

                if(insErr){ showNeonModal("ERROR: "+insErr.message); btn.disabled=false; }
                else {
                    localStorage.removeItem('pending_ref');
                    showNeonModal("VIP ACCOUNT CREATED! PLEASE LOGIN.");
                    setTimeout(()=>location.reload(),2000);
                }
            }
        }

        function showNeonModal(t){ document.getElementById('modal-text').innerText=t; document.getElementById('neon-modal').style.display='flex'; }
        function closeModal(){ document.getElementById('neon-modal').style.display='none'; }
        
        window.onload=()=>{
            switchTab('login');
            const params=new URLSearchParams(window.location.search);
            const r=params.get('ref');
            if(r){ localStorage.setItem('pending_ref',r); switchTab('daftar'); }
            particlesJS("particles-js",{"particles":{"number":{"value":60},"color":{"value":"#ff0077"},"shape":{"type":"circle"},"opacity":{"value":0.4},"size":{"value":3},"line_linked":{"enable":true,"distance":150,"color":"#0022ff","opacity":0.3,"width":1},"move":{"enable":true,"speed":2}}});
        };
    </script>
</body>
</html>
