<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO — VIP ACCESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root{--pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--bg:#000005;--gp:0 0 20px #ff0077,0 0 50px rgba(255,0,119,.55);--gb:0 0 20px #0022ff,0 0 50px rgba(0,34,255,.55);--gy:0 0 20px #fbff00;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}
        body{background:var(--bg);color:#fff;overflow:hidden;height:100vh;display:flex;justify-content:center;align-items:center;}
        #particles-js{position:fixed;width:100%;height:100%;z-index:1;}
        
        .container{position:relative;z-index:10;width:90%;max-width:400px;background:rgba(0,0,10,.8);padding:30px;border-radius:20px;border:1px solid var(--pink);box-shadow:var(--gp);backdrop-filter:blur(10px);}
        h1{font-family:'Cinzel Decorative',cursive;text-align:center;color:var(--pink);text-shadow:var(--gp);margin-bottom:20px;font-size:24px;}
        
        .tab-box{display:flex;gap:10px;margin-bottom:20px;}
        .tab-box button{flex:1;padding:10px;background:transparent;border:1px solid var(--blue);color:#fff;border-radius:10px;cursor:pointer;font-weight:800;}
        .tab-box button.active{background:var(--blue);box-shadow:var(--gb);}

        .input-group{margin-bottom:15px;position:relative;}
        .input-group i:not(.toggle-password){position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--blue);}
        .input-group input{width:100%;padding:12px 45px;background:rgba(255,255,255,.05);border:1px solid rgba(0,34,255,.3);border-radius:12px;color:#fff;font-weight:600;outline:none;transition:.3s;}
        .input-group input:focus{border-color:var(--pink);box-shadow:0 0 10px rgba(255,0,119,.3);}
        
        .toggle-password{position:absolute;right:15px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--blue);z-index:11;}

        .btn-main{width:100%;padding:15px;background:var(--pink);border:none;border-radius:12px;color:#fff;font-weight:900;letter-spacing:1px;cursor:pointer;box-shadow:var(--gp);transition:.3s;}
        .btn-main:disabled{opacity:.5;cursor:not-allowed;}
        
        .forgot-wa{display:block;text-align:center;margin-top:15px;color:var(--yellow);text-decoration:none;font-size:12px;font-weight:700;}
        .forgot-wa i{margin-right:5px;}

        /* Alert PopUp Custom */
        #neon-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:100;display:none;justify-content:center;align-items:center;padding:20px;}
        .modal-content{background:var(--bg);border:2px solid var(--pink);padding:25px;border-radius:15px;text-align:center;box-shadow:var(--gp);max-width:320px;width:100%;}
        .modal-content p{font-weight:800;margin-bottom:20px;line-height:1.5;}
        .btn-close{padding:10px 20px;background:var(--blue);border:none;color:#fff;border-radius:8px;font-weight:900;cursor:pointer;box-shadow:var(--gb);}
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="container">
        <h1>NEON PLINKO</h1>
        <div class="tab-box">
            <button id="t-login" class="active" onclick="switchTab('login')">LOGIN</button>
            <button id="t-daftar" onclick="switchTab('daftar')">DAFTAR</button>
        </div>

        <div id="form-area">
            </div>
        
        <a href="https://wa.me/6289510249551?text=Halo%20Admin,%20saya%20lupa%20password%20akun%20Neon%20Plinko" class="forgot-wa" target="_blank">
            <i class="fab fa-whatsapp"></i> LUPA PASSWORD? HUBUNGI ADMIN
        </a>
    </div>

    <div id="neon-modal">
        <div class="modal-content">
            <p id="modal-text"></p>
            <button class="btn-close" onclick="closeModal()">OK</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let mode = 'login';
        const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

        function switchTab(m){
            mode = m;
            document.getElementById('t-login').className = m==='login'?'active':'';
            document.getElementById('t-daftar').className = m==='daftar'?'active':'';
            renderForm();
        }

        function renderForm(){
            const area = document.getElementById('form-area');
            if(mode === 'login'){
                area.innerHTML = `
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="user" placeholder="Username">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="pass" placeholder="Password">
                        <i class="fas fa-eye toggle-password" onclick="togglePass('pass')"></i>
                    </div>
                    <button class="btn-main" id="btn-action" onclick="handleAuth()">MASUK</button>
                `;
            } else {
                area.innerHTML = `
                    <div class="input-group"><i class="fas fa-user"></i><input type="text" id="u" placeholder="Username Baru"></div>
                    <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="p" placeholder="Password"> <i class="fas fa-eye toggle-password" onclick="togglePass('p')"></i></div>
                    <div class="input-group"><i class="fas fa-id-card"></i><input type="text" id="nama" placeholder="Nama Lengkap"></div>
                    <div class="input-group"><i class="fas fa-phone"></i><input type="number" id="hp" placeholder="Nomor HP/WA"></div>
                    <div class="input-group"><i class="fas fa-university"></i><input type="text" id="bank" placeholder="Nama Bank/E-Wallet"></div>
                    <div class="input-group"><i class="fas fa-credit-card"></i><input type="number" id="norek" placeholder="Nomor Rekening"></div>
                    <button class="btn-main" id="btn-action" onclick="handleAuth()">DAFTAR SEKARANG</button>
                `;
            }
        }

        function togglePass(id){
            const el = document.getElementById(id);
            const icon = el.nextElementSibling;
            if(el.type === 'password'){
                el.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                el.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        async function handleAuth(){
            const btn = document.getElementById('btn-action');
            btn.disabled = true;
            
            if(mode === 'login'){
                const u = document.getElementById('user').value;
                const p = document.getElementById('pass').value;
                const {data, error} = await _supa.from('profiles').select('*').eq('username', u).eq('password', p).single();
                
                if(error || !data){ showNeonModal("LOGIN GAGAL: Akun tidak ditemukan!"); btn.disabled=false; }
                else { localStorage.setItem('neon_user', u); location.href='game.html'; }
            } else {
                // Register logic (Pertahankan fungsi asli)
                const u=document.getElementById('u').value, p=document.getElementById('p').value, nama=document.getElementById('nama').value;
                const hp=document.getElementById('hp').value, bank=document.getElementById('bank').value, norek=document.getElementById('norek').value;
                const ref = localStorage.getItem('pending_ref') || 'ADMIN';
                const myRef = Math.random().toString(36).substring(2,8).toUpperCase();

                if(!u||!p||!nama||!hp){ showNeonModal("LENGKAPI DATA!"); btn.disabled=false; return; }

                const {error:insErr}=await _supa.from('profiles').insert([{
                    username:u, password:p, nama_lengkap:nama, nomor_hp:hp, bank_name:bank,
                    rekening:norek, referred_by:ref, referral_code:myRef, saldo:0, winrate:30, maxwin_limit:100000
                }]);

                if(insErr){ showNeonModal("ERROR: "+insErr.message); btn.disabled=false; }
                else {
                    localStorage.removeItem('pending_ref');
                    showNeonModal("AKUN VIP BERHASIL DIBUAT! SILAHKAN LOGIN.");
                    switchTab('login');
                }
            }
        }

        function showNeonModal(t){ document.getElementById('modal-text').innerText=t; document.getElementById('neon-modal').style.display='flex'; }
        function closeModal(){ document.getElementById('neon-modal').style.display='none'; }
        
        window.onload=()=>{
            switchTab('login');
            particlesJS("particles-js",{"particles":{"number":{"value":60},"color":{"value":"#ff0077"},"shape":{"type":"circle"},"opacity":{"value":0.4},"size":{"value":3},"line_linked":{"enable":true,"distance":150,"color":"#0022ff","opacity":0.3,"width":1},"move":{"enable":true,"speed":2}}});
        }
    </script>
</body>
</html>
