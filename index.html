<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO — VIP ACCESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root{--pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--bg:#000005;--gp:0 0 20px #ff0077,0 0 50px rgba(255,0,119,.55);--gb:0 0 20px #0022ff,0 0 50px rgba(0,34,255,.55);--gy:0 0 20px #fbff00,0 0 50px rgba(251,255,0,.55);}
        *{box-sizing:border-box;margin:0;padding:0;outline:none;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}
        #particles-js{position:fixed;width:100%;height:100%;z-index:0;background:radial-gradient(circle at center,#000015 0%,#000 100%);}

        #neon-alert{position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:88%;max-width:340px;background:rgba(0,0,15,.97);border:2px solid var(--pink);border-top:3px solid var(--yellow);color:#fff;padding:14px 20px;border-radius:14px;text-align:center;font-weight:900;z-index:9000;font-family:'Outfit',sans-serif;font-size:13px;transition:.55s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 0 35px var(--pink),0 0 70px rgba(255,0,119,.3);}
        #neon-alert.show{top:15px;}
        #neon-alert.success{border-color:var(--blue);box-shadow:0 0 35px var(--blue),0 0 70px rgba(0,34,255,.3);}

        .login-card{width:92%;max-width:420px;padding:32px 28px;background:rgba(0,0,20,.88);backdrop-filter:blur(30px);border:2px solid var(--blue);border-radius:28px;text-align:center;z-index:10;position:relative;box-shadow:var(--gb),inset 0 0 40px rgba(0,34,255,.08);max-height:95vh;overflow-y:auto;}
        .login-card::-webkit-scrollbar{display:none;}

        .logo-area{margin-bottom:26px;}
        .logo-area h1{font-family:'Cinzel Decorative',serif;font-size:30px;color:var(--pink);text-shadow:var(--gp);letter-spacing:3px;line-height:1;}
        .logo-area h1 span{color:var(--yellow);text-shadow:var(--gy);}
        .logo-area .sub{font-size:9px;letter-spacing:6px;color:var(--yellow);font-weight:900;text-shadow:var(--gy);margin-top:6px;text-transform:uppercase;}
        .logo-area .tagline{font-size:9px;color:rgba(255,255,255,.25);margin-top:4px;letter-spacing:2px;text-transform:uppercase;}

        .tabs{display:flex;gap:8px;margin-bottom:22px;background:rgba(0,0,0,.7);padding:5px;border-radius:50px;border:1px solid rgba(0,34,255,.4);}
        .tab{flex:1;padding:12px;border-radius:50px;cursor:pointer;font-size:11px;font-weight:900;transition:.3s;color:rgba(255,255,255,.3);letter-spacing:1px;text-transform:uppercase;}
        .tab.active{background:linear-gradient(135deg,var(--blue),#001188);color:#fff;box-shadow:var(--gb);}

        .input-group{position:relative;margin-bottom:12px;}
        .input-group i.main-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--yellow);font-size:15px;z-index:2;text-shadow:var(--gy);}
        .input-group .eye-btn{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--blue);cursor:pointer;z-index:5;text-shadow:var(--gb);}
        input,select{width:100%;padding:14px 15px 14px 48px;background:rgba(0,0,0,.8);border:1px solid rgba(0,34,255,.4);border-radius:15px;color:#fff;font-family:'Outfit',sans-serif;transition:.3s;font-size:13px;font-weight:600;}
        select{padding-left:48px;appearance:none;}
        input:focus,select:focus{border-color:var(--pink);box-shadow:var(--gp);background:rgba(0,0,10,.95);}
        input::placeholder{color:rgba(255,255,255,.2);}

        .btn-glow{width:100%;padding:17px;border-radius:50px;border:none;background:linear-gradient(90deg,var(--blue),var(--pink));color:#fff;font-weight:900;font-size:14px;cursor:pointer;text-transform:uppercase;letter-spacing:2px;margin-top:15px;box-shadow:var(--gp);transition:.3s;font-family:'Outfit',sans-serif;}
        .btn-glow:active{transform:scale(.96);}
        .btn-glow:disabled{opacity:.5;filter:grayscale(1);cursor:not-allowed;}

        .pass-hint{font-size:9px;color:var(--pink);text-align:left;margin:-8px 0 12px 10px;font-weight:900;text-shadow:var(--gp);}
        .footer-links{margin-top:22px;font-size:11px;font-weight:800;}
        .footer-links a{color:var(--yellow);text-decoration:none;text-shadow:var(--gy);}

        #neon-modal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.95);align-items:center;justify-content:center;backdrop-filter:blur(12px);}
        .modal-box{width:88%;max-width:320px;background:rgba(0,0,15,.99);border:2px solid var(--pink);border-top:3px solid var(--yellow);border-radius:22px;padding:28px;text-align:center;box-shadow:var(--gp);animation:zoomIn .3s ease;}
        @keyframes zoomIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
        .modal-icon{font-size:44px;color:var(--yellow);margin-bottom:14px;text-shadow:var(--gy);}
        #m-text{font-weight:700;line-height:1.6;font-size:14px;color:#eee;}
        .modal-btn{width:100%;padding:13px;background:var(--pink);border:none;color:#fff;border-radius:50px;font-weight:900;margin-top:20px;cursor:pointer;box-shadow:var(--gp);letter-spacing:1px;font-size:13px;text-transform:uppercase;font-family:'Outfit',sans-serif;}
    </style>
</head>
<body>
<div id="particles-js"></div>
<div id="neon-alert">SYSTEM NOTIFICATION</div>

<div class="login-card">
    <div class="logo-area">
        <h1>NEON<span>PLINKO</span></h1>
        <div class="sub">VIP</div>
        <div class="tagline">PREMIUM by AR GAMING</div>
    </div>

    <div class="tabs">
        <div class="tab active" id="t-login" onclick="switchTab('login')"><i class="fas fa-unlock-keyhole"></i> LOGIN</div>
        <div class="tab" id="t-daftar" onclick="switchTab('daftar')"><i class="fas fa-user-plus"></i> DAFTAR</div>
    </div>

    <div id="form-container">
        <div class="input-group">
            <i class="fas fa-user-astronaut main-icon"></i>
            <input type="text" id="user" placeholder="USERNAME" autocomplete="off">
        </div>
        <div class="input-group">
            <i class="fas fa-key main-icon"></i>
            <input type="password" id="pass" placeholder="PASSWORD">
            <i class="fas fa-eye eye-btn" id="togglePass" onclick="togglePassword()"></i>
        </div>
        <div id="daftar-fields" style="display:none;">
            <p class="pass-hint"><i class="fas fa-shield"></i> PASSWORD MIN. 6 KARAKTER (HURUF & ANGKA)</p>
            <div class="input-group"><i class="fas fa-id-card main-icon"></i><input type="text" id="nama" placeholder="NAMA SESUAI REKENING"></div>
            <div class="input-group"><i class="fas fa-phone main-icon"></i><input type="number" id="hp" placeholder="NOMOR HANDPHONE / WA"></div>
            <div class="input-group">
                <i class="fas fa-university main-icon"></i>
                <select id="bank" onchange="checkBank()">
                    <option value="" disabled selected>PILIH BANK / WALLET</option>
                    <option value="DANA">DANA</option><option value="GOPAY">GOPAY</option>
                    <option value="OVO">OVO</option><option value="BCA">BANK BCA</option>
                    <option value="BRI">BANK BRI</option><option value="MANDIRI">BANK MANDIRI</option>
                    <option value="LAINNYA">BANK LAINNYA</option>
                </select>
            </div>
            <div class="input-group" id="bank-kustom-box" style="display:none;"><i class="fas fa-edit main-icon"></i><input type="text" id="bank_kustom" placeholder="MASUKKAN NAMA BANK"></div>
            <div class="input-group"><i class="fas fa-credit-card main-icon"></i><input type="number" id="norek" placeholder="NOMOR REKENING / E-WALLET"></div>
            <div class="input-group"><i class="fas fa-users-rays main-icon"></i><input type="text" id="ref" placeholder="KODE REFERRAL (OPSIONAL)"></div>
        </div>
        <button class="btn-glow" id="btn-action" onclick="handleAuth()">DAFTAR/LOGIN</button>
    </div>
    <div class="footer-links">
        <a href="https://wa.me/6289510249551" target="_blank"><i class="fab fa-whatsapp"></i> HUBUNGI ADMIN NEON VIP</a>
    </div>
</div>

<div id="neon-modal">
    <div class="modal-box">
        <i class="fas fa-bolt-lightning modal-icon" id="m-icon"></i>
        <p id="m-text"></p>
        <button class="modal-btn" onclick="closeModal()">CONFIRM</button>
    </div>
</div>

<script>
const SUPA_URL="https://jcxgankdwfwfnbwlkkpz.supabase.co",SUPA_KEY="sb_publishable_CaQyWYa_F3LDYEo8BDWAlQ_d0SscfCL";
const _supa=supabase.createClient(SUPA_URL,SUPA_KEY);
let currentMode='login';
particlesJS("particles-js",{"particles":{"number":{"value":100},"color":{"value":"#ff0077"},"shape":{"type":"circle"},"opacity":{"value":0.75,"random":true,"anim":{"enable":true,"speed":0.8,"opacity_min":0.3}},"size":{"value":3.5,"random":true},"line_linked":{"enable":true,"distance":140,"color":"#0022ff","opacity":0.55,"width":1.2},"move":{"enable":true,"speed":2.5,"random":true,"out_mode":"out"}},"interactivity":{"events":{"onhover":{"enable":true,"mode":"repulse"},"onclick":{"enable":true,"mode":"push"}},"modes":{"repulse":{"distance":80},"push":{"particles_nb":4}}}});
function showNeonAlert(msg,ok=false){const a=document.getElementById('neon-alert');a.innerText=msg;a.className=ok?'show success':'show';setTimeout(()=>a.className='',3000);}
function togglePassword(){const p=document.getElementById('pass'),icon=document.getElementById('togglePass');p.type=p.type==="password"?"text":"password";icon.classList.toggle('fa-eye',p.type==='password');icon.classList.toggle('fa-eye-slash',p.type==='text');}
function checkBank(){document.getElementById('bank-kustom-box').style.display=document.getElementById('bank').value==='LAINNYA'?'block':'none';}
function switchTab(mode){currentMode=mode;document.getElementById('t-login').classList.toggle('active',mode==='login');document.getElementById('t-daftar').classList.toggle('active',mode==='daftar');document.getElementById('daftar-fields').style.display=mode==='daftar'?'block':'none';document.getElementById('btn-action').innerText=mode==='login'?'INITIALIZE ACCESS':'CREATE VIP ACCOUNT';if(mode==='daftar'){const s=localStorage.getItem('pending_ref');if(s)document.getElementById('ref').value=s;}}
function showNeonModal(msg,isError=false){document.getElementById('m-text').innerText=msg;document.getElementById('m-icon').style.color=isError?'#ff0077':'#fbff00';document.getElementById('neon-modal').style.display='flex';}
function closeModal(){document.getElementById('neon-modal').style.display='none';}
function validatePass(p){return /^(?=.*[a-zA-Z])(?=.*[0-9]).{6,}$/.test(p);}
function captureReferral(){const params=new URLSearchParams(window.location.search);const ref=params.get('ref');if(ref){localStorage.setItem('pending_ref',ref);switchTab('daftar');}}
async function handleAuth(){
    const u=document.getElementById('user').value.toLowerCase().trim();
    const p=document.getElementById('pass').value.trim();
    const btn=document.getElementById('btn-action');
    if(!u||!p)return showNeonModal("DATA TIDAK LENGKAP!",true);
    btn.disabled=true;btn.innerText="PROCESSING...";
    if(currentMode==='login'){
        const{data,error}=await _supa.from('profiles').select('*').eq('username',u).eq('password',p).single();
        if(error||!data){showNeonModal("USERNAME / PASSWORD SALAH!",true);btn.disabled=false;btn.innerText="INITIALIZE ACCESS";}
        else{showNeonAlert("ACCESS GRANTED — ENTERING SYSTEM",true);const sid=Math.random().toString(36).substring(2);localStorage.setItem('neon_user',u);localStorage.setItem('user_session',u);await _supa.from('profiles').update({last_session_id:sid}).eq('username',u);setTimeout(()=>location.href='game.html',1200);}
    }else{
        const nama=document.getElementById('nama').value.toUpperCase().trim();
        const hp=document.getElementById('hp').value.trim();
        const bankInit=document.getElementById('bank').value;
        const bankFinal=bankInit==='LAINNYA'?document.getElementById('bank_kustom').value.toUpperCase():bankInit;
        const norek=document.getElementById('norek').value.trim();
        const refFinal=document.getElementById('ref').value.trim()||'DIRECT';
        const myNewRef="NEON"+Math.random().toString(36).substring(2,7).toUpperCase();
        if(!nama||!hp||!bankFinal||!norek){btn.disabled=false;btn.innerText="CREATE VIP ACCOUNT";return showNeonModal("LENGKAPI SEMUA DATA!",true);}
        if(!validatePass(p)){btn.disabled=false;btn.innerText="CREATE VIP ACCOUNT";return showNeonModal("PASSWORD WAJIB 6 KARAKTER (HURUF & ANGKA)!",true);}
        const{data:uE}=await _supa.from('profiles').select('username').eq('username',u).single();
        if(uE){btn.disabled=false;btn.innerText="CREATE VIP ACCOUNT";return showNeonModal("USERNAME SUDAH TERDAFTAR!",true);}
        const{data:rE}=await _supa.from('profiles').select('rekening').eq('rekening',norek).single();
        if(rE){btn.disabled=false;btn.innerText="CREATE VIP ACCOUNT";return showNeonModal("NOMOR REKENING SUDAH TERDAFTAR!",true);}
        const{error:insErr}=await _supa.from('profiles').insert([{username:u,password:p,nama_lengkap:nama,nomor_hp:hp,bank_name:bankFinal,rekening:norek,referred_by:refFinal,referral_code:myNewRef,saldo:0,winrate:30,maxwin_limit:100000}]);
        if(insErr){showNeonModal("SYSTEM BUSY: "+insErr.message,true);btn.disabled=false;btn.innerText="CREATE VIP ACCOUNT";}
        else{localStorage.removeItem('pending_ref');showNeonModal("REGISTRASI BERHASIL! SILAHKAN LOGIN.");setTimeout(()=>location.reload(),2000);}
    }
}
window.onload=captureReferral;
</script>
</body>
</html>
