<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>NEON VIP — AUTH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #02030d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at top right, #0a0b2e, #02030d);
        }
        .auth-card {
            width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 30px;
            padding: 30px; backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .tabs { display: flex; background: rgba(0,0,0,0.4); border-radius: 15px; margin-bottom: 25px; padding: 5px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 12px; font-weight: 800; transition: 0.3s; color: rgba(255,255,255,0.4); }
        .tab.active { background: linear-gradient(90deg, var(--blue), var(--pink)); color: #fff; box-shadow: 0 0 15px rgba(255,0,119,0.3); }
        
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--blue); }
        input { 
            width: 100%; padding: 15px 15px 15px 45px; background: rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: #fff;
            outline: none; transition: 0.3s; font-family: 'Outfit';
        }
        input:focus { border-color: var(--blue); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }
        
        .btn-auth {
            width: 100%; padding: 18px; border-radius: 50px; border: none;
            background: linear-gradient(90deg, var(--blue), var(--pink));
            color: #fff; font-family: 'Cinzel Decorative'; font-weight: 900;
            font-size: 16px; cursor: pointer; margin-top: 10px;
            box-shadow: 0 10px 20px rgba(255,0,119,0.3);
        }
        .logo-text { font-family: 'Cinzel Decorative'; text-align: center; font-size: 24px; margin-bottom: 20px; color: var(--pink); text-shadow: 0 0 10px var(--pink); }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo-text">NEON PLINKO</div>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">LOGIN</div>
        <div class="tab" onclick="switchTab('daftar')">DAFTAR</div>
    </div>

    <div id="auth-form">
        <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="user" placeholder="Username">
        </div>
        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="pass" placeholder="Password">
        </div>
        
        <div id="extra-fields" style="display:none">
            <div class="input-group">
                <i class="fa-solid fa-id-card"></i>
                <input type="text" id="full_name" placeholder="Nama Lengkap Sesuai Rekening">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-bank"></i>
                <input type="text" id="bank" placeholder="Bank / E-Wallet (Contoh: DANA)">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-hashtag"></i>
                <input type="number" id="acc_no" placeholder="Nomor Rekening / HP">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-gift"></i>
                <input type="text" id="ref" placeholder="Kode Referral (Opsional)">
            </div>
        </div>

        <button class="btn-auth" id="main-btn" onclick="processAuth()">LOGIN IDENTITY</button>
    </div>
</div>

<script>
    let mode = 'login';
    function switchTab(t) {
        mode = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('extra-fields').style.display = (t === 'daftar') ? 'block' : 'none';
        document.getElementById('main-btn').innerText = (t === 'daftar') ? 'CREATE IDENTITY' : 'LOGIN IDENTITY';
    }

    async function processAuth() {
        const username = document.getElementById('user').value.toLowerCase();
        const password = document.getElementById('pass').value;

        if(mode === 'login') {
            const { data, error } = await _supabase.from('profiles').select('*').eq('username', username).eq('password', password).single();
            if(data) {
                localStorage.setItem('user_neon', username);
                window.location.href = 'game.html';
            } else {
                alert("Username/Password Salah!");
            }
        } else {
            // Proses Daftar
            const { error } = await _supabase.from('profiles').insert([{
                username: username,
                password: password,
                nama_rekening: document.getElementById('full_name').value,
                bank_name: document.getElementById('bank').value,
                nomor_rekening: document.getElementById('acc_no').value,
                referral_kode: document.getElementById('ref').value,
                saldo: 0,
                winrate: 50
            }]);

            if(error) {
                alert("Gagal Daftar: " + error.message);
            } else {
                alert("Berhasil! Silahkan Login.");
                location.reload();
            }
        }
    }
</script>
</body>
</html>
