<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO VVIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-blue: #0012ff;
            --neon-cyan: #00f2ff;
            --neon-pink: #ff0077;
            --neon-yellow: #f5e642;
            --dark-space: #010412;
            --glass-blue: rgba(0, 18, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            width: 100vw; height: 100vh; overflow: hidden; 
            background: var(--dark-space); color: #fff; 
            font-family: 'Outfit', sans-serif; display: flex; flex-direction: column;
        }

        /* BG VORTEX */
        .bg-vortex {
            position: fixed; top: 50%; left: 50%; width: 150vw; height: 150vw;
            background: radial-gradient(circle, rgba(0, 18, 255, 0.1) 0%, transparent 70%);
            transform: translate(-50%, -50%); z-index: -1; animation: pulse 8s infinite;
        }

        /* HEADER */
        .header {
            height: 75px; background: rgba(1, 4, 18, 0.95);
            border-bottom: 3px solid var(--deep-blue); display: flex;
            align-items: center; padding: 0 15px; justify-content: space-between;
            box-shadow: 0 5px 25px rgba(0, 18, 255, 0.4); z-index: 100;
        }

        .balance-container {
            background: linear-gradient(180deg, #050a2e, #010412);
            border: 1px solid var(--deep-blue); border-radius: 12px;
            padding: 5px 15px; text-align: right; min-width: 140px;
        }
        #display-saldo { 
            font-family: 'Orbitron', sans-serif; color: var(--neon-yellow); 
            font-weight: 900; font-size: 16px;
        }

        /* FLOATING SCORE BOARD */
        .floating-score {
            position: absolute; top: 90px; left: 15px; width: 110px;
            background: rgba(0, 18, 255, 0.1); backdrop-filter: blur(5px);
            border: 1px solid var(--deep-blue); border-radius: 10px;
            padding: 8px; z-index: 10; pointer-events: none;
        }
        .score-row { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px; }
        .score-val { color: var(--neon-cyan); font-family: 'Orbitron'; }

        /* GAME AREA */
        #game-area { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        #plinko-canvas { flex: 1; width: 100%; filter: drop-shadow(0 0 10px var(--deep-blue)); }

        /* SLOTS (KOTAK MULTIPLAYER) */
        .slot-container { display: flex; height: 45px; gap: 3px; padding: 0 5px; margin-bottom: 10px; }
        .slot {
            flex: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 10px;
            border: 1px solid rgba(0, 242, 255, 0.2); background: rgba(0, 18, 255, 0.05);
            color: var(--neon-cyan); transition: 0.1s;
        }
        
        /* EFEK BERKEDIP */
        @keyframes neonBlink {
            0% { background: var(--neon-pink); box-shadow: 0 0 20px var(--neon-pink); color: #fff; }
            50% { background: var(--deep-blue); box-shadow: 0 0 40px var(--neon-cyan); color: #fff; }
            100% { background: transparent; box-shadow: none; }
        }
        .slot.blink { animation: neonBlink 0.6s ease-out; border-color: #fff; transform: scale(1.1); z-index: 2; }

        /* CUSTOM ALERT BOX */
        #custom-alert {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 300px; background: #02061a; border: 2px solid var(--neon-pink);
            border-radius: 20px; padding: 20px; z-index: 1000; text-align: center;
            box-shadow: 0 0 50px rgba(255, 0, 119, 0.4); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        #alert-msg { color: #fff; margin-bottom: 20px; font-weight: 600; }
        .btn-alert {
            background: var(--neon-pink); color: #fff; border: none; padding: 10px 30px;
            border-radius: 10px; font-family: 'Orbitron'; font-weight: 700; cursor: pointer;
            box-shadow: 0 0 15px var(--neon-pink);
        }

        /* CONTROLS */
        .controls-panel {
            background: #02061a; padding: 15px; border-top: 2px solid var(--deep-blue);
            display: flex; flex-direction: column; gap: 12px; border-radius: 20px 20px 0 0;
        }
        .btn-main-drop {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: linear-gradient(135deg, var(--deep-blue), var(--electric-blue));
            color: #fff; font-family: 'Orbitron'; font-weight: 900; font-size: 20px;
            text-transform: uppercase; box-shadow: 0 5px 20px var(--deep-blue);
        }

        .nav-link {
            flex: 1; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--deep-blue);
            border-radius: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: #fff; text-decoration: none; font-size: 10px;
        }
        .nav-link i { font-size: 18px; color: var(--neon-cyan); }
    </style>
</head>
<body>

<div class="bg-vortex"></div>

<div id="custom-alert">
    <div style="color: var(--neon-yellow); font-family: 'Orbitron'; margin-bottom: 10px;">SYSTEM ALERT</div>
    <div id="alert-msg">Pesan Alert</div>
    <button class="btn-alert" onclick="closeAlert()">CONFIRM</button>
</div>

<header class="header">
    <div class="user-info">
        <div class="user-icon" onclick="location.href='profil.html'"><i class="fa-solid fa-user-shield"></i></div>
        <div>
            <div style="font-size: 8px; color: var(--neon-cyan);" id="tier-name">MEMBER</div>
            <div id="user-display-name" style="font-size: 12px; font-weight: 800;">PLAYER</div>
        </div>
    </div>
    <div class="balance-container" onclick="syncSaldo()">
        <div id="display-saldo">IDR 0</div>
    </div>
</header>

<div class="floating-score">
    <div class="score-row"><span>WIN TOT</span> <span class="score-val" id="score-win">0</span></div>
    <div class="score-row"><span>BALLS</span> <span class="score-val" id="score-count">0</span></div>
</div>

<main id="game-area">
    <canvas id="plinko-canvas"></canvas>
    <div id="history-bar"></div>
</main>

<div class="slot-container" id="slots-ui"></div>

<section class="controls-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px;">
        <i class="fa-solid fa-circle-minus" style="font-size: 24px; color: var(--neon-pink);" onclick="changeBet(-1)"></i>
        <div style="text-align: center;">
            <div style="font-size: 9px; color: #888;">STAKE</div>
            <b id="bet-text" style="font-family: 'Orbitron'; font-size: 18px;">400</b>
        </div>
        <i class="fa-solid fa-circle-plus" style="font-size: 24px; color: var(--neon-cyan);" onclick="changeBet(1)"></i>
    </div>

    <button class="btn-main-drop" id="btn-drop" onclick="dropBall()">DROP BALL</button>

    <nav style="display: flex; gap: 8px;">
        <a href="deposit.html" class="nav-link"><i class="fa-solid fa-plus"></i>DEPO</a>
        <a href="reward.html" class="nav-link" style="border-color: var(--neon-pink);"><i class="fa-solid fa-gift" style="color: var(--neon-pink);"></i>REWARD</a>
        <a href="withdraw.html" class="nav-link"><i class="fa-solid fa-wallet"></i>WD</a>
    </nav>
</section>

<script src="global.js"></script>
<script>
    const canvas = document.getElementById('plinko-canvas');
    const ctx = canvas.getContext('2d');
    const ROWS = 10;
    const MULTIPLIERS = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
    const BETS = [400, 800, 1000, 2000, 5000, 10000, 25000, 50000];
    
    let balls = [], pegs = [], _saldo = 0, _username = "", currentBetIdx = 0;
    let totalWinSession = 0, ballCount = 0;

    window.onload = async () => {
        const user = requireLogin('index.html');
        if(!user) return;
        _username = user.username; _saldo = parseFloat(user.saldo);
        document.getElementById('user-display-name').innerText = _username.toUpperCase();
        updateSaldoUI(); initCanvas(); createSlots(); animate();
    };

    function showAlert(msg) {
        document.getElementById('alert-msg').innerText = msg;
        document.getElementById('custom-alert').style.display = 'block';
    }
    function closeAlert() { document.getElementById('custom-alert').style.display = 'none'; }

    function initCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        pegs = [];
        const spacingX = rect.width / (ROWS + 2);
        const spacingY = rect.height / (ROWS + 1.2);
        for (let i = 0; i < ROWS; i++) {
            const rowPegs = i + 2;
            const startX = (rect.width - (rowPegs - 1) * spacingX) / 2;
            for (let j = 0; j < rowPegs; j++) {
                pegs.push({ x: startstartX + j * spacingX, y: 40 + i * spacingY, r: 3, glow: 0 });
            }
        }
    }
    
    // Fallback if typo in logic
    let startstartX = 0; 

    function createSlots() {
        const ui = document.getElementById('slots-ui');
        ui.innerHTML = '';
        MULTIPLIERS.forEach((m, i) => {
            const d = document.createElement('div');
            d.className = 'slot';
            d.id = `pocket-${i}`;
            d.innerText = m + 'x';
            ui.appendChild(d);
        });
    }

    async function dropBall() {
        const bet = BETS[currentBetIdx];
        if(_saldo < bet) {
            showAlert("SALDO TIDAK CUKUP!");
            return;
        }
        const initialSaldo = _saldo; _saldo -= bet; updateSaldoUI();
        
        const ball = {
            x: canvas.offsetWidth / (window.devicePixelRatio || 1) / 2,
            y: -10, vx: (Math.random()-0.5)*2, vy: 2, r: 6,
            bet: bet, status: 'WAITING'
        };
        balls.push(ball);

        try {
            const res = await apiGamePlay(_username, bet, initialSaldo);
            if(res && res.result === 'SUCCESS') {
                ball.targetIdx = findSlotIndex(res.target_multiplier);
                ball.finalSaldo = res.newSaldo;
                ball.targetMult = res.target_multiplier;
                ball.status = 'READY';
            }
        } catch(e) { ball.status = 'ERROR'; }
    }

    function findSlotIndex(mult) {
        const matches = [];
        MULTIPLIERS.forEach((m, i) => { if(m === mult) matches.push(i); });
        return matches[Math.floor(Math.random() * matches.length)];
    }

    function animate() {
        const w = canvas.offsetWidth / (window.devicePixelRatio || 1);
        const h = canvas.offsetHeight / (window.devicePixelRatio || 1);
        ctx.clearRect(0, 0, w, h);

        pegs.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.glow > 0 ? `rgba(245, 230, 66, ${p.glow})` : 'rgba(0, 18, 255, 0.3)';
            ctx.fill(); if(p.glow > 0) p.glow -= 0.05;
        });

        for (let i = balls.length - 1; i >= 0; i--) {
            const b = balls[i]; b.vy += 0.35; b.x += b.vx; b.y += b.vy;

            if (b.status === 'READY' && b.y > h * 0.4) {
                const targetX = (b.targetIdx * (w / MULTIPLIERS.length)) + (w / MULTIPLIERS.length / 2);
                b.vx += (targetX - b.x) * 0.025;
            }

            pegs.forEach(p => {
                const dist = Math.hypot(b.x - p.x, b.y - p.y);
                if (dist < b.r + p.r) {
                    p.glow = 1; b.vx = (b.x - p.x) * 0.5; b.vy = Math.abs(b.y - p.y) * 0.5 + 1.5;
                }
            });

            ctx.shadowBlur = 10; ctx.shadowColor = varColor(b.status);
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.fill(); ctx.shadowBlur = 0;

            if (b.y > h) {
                if(b.status === 'READY') handleLand(b);
                balls.splice(i, 1);
            }
        }
        requestAnimationFrame(animate);
    }

    function varColor(s) { return s === 'READY' ? '#00f2ff' : '#ff0077'; }

    function handleLand(ball) {
        _saldo = ball.finalSaldo; updateSaldoUI();
        const pocket = document.getElementById(`pocket-${ball.targetIdx}`);
        pocket.classList.add('blink');
        setTimeout(() => pocket.classList.remove('blink'), 600);

        totalWinSession += (ball.bet * ball.targetMult);
        ballCount++;
        document.getElementById('score-win').innerText = Math.round(totalWinSession).toLocaleString();
        document.getElementById('score-count').innerText = ballCount;
    }

    function updateSaldoUI() { document.getElementById('display-saldo').innerText = 'IDR ' + Math.floor(_saldo).toLocaleString('id-ID'); }
    function changeBet(dir) {
        currentBetIdx = Math.max(0, Math.min(BETS.length - 1, currentBetIdx + dir));
        document.getElementById('bet-text').innerText = BETS[currentBetIdx].toLocaleString();
    }
    async function syncSaldo() {
        const res = await apiGetSaldo(_username);
        if(res && res.result === 'SUCCESS') { _saldo = parseFloat(res.saldo); updateSaldoUI(); }
    }
</script>

</body>
</html>
