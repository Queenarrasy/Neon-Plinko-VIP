<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --pink:#ff0077; --blue:#00d4ff; --yellow:#fbff00; --bg:#02030d; --header-h:65px; }
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { width:100vw; height:100vh; overflow:hidden; background:var(--bg); color:#fff; font-family:'Outfit',sans-serif; display:flex; flex-direction:column; }

.header { height:var(--header-h); background:rgba(2,3,13,0.95); border-bottom:2px solid var(--blue); display:flex; align-items:center; padding:0 15px; justify-content:space-between; z-index:100; box-shadow:0 0 10px var(--blue); }
.balance-box { background:rgba(0,0,0,0.8); border:2px solid var(--blue); border-radius:20px; padding:5px 20px; min-width:170px; text-align:center; }
#display-saldo { font-family:'Cinzel Decorative'; font-size:18px; color:var(--yellow); text-shadow:0 0 5px var(--yellow); font-weight:900; }

#board-wrapper { flex:1; position:relative; background:radial-gradient(circle at center,#070a24 0%,#02030d 100%); overflow:hidden; }
#plinko-canvas { display:block; width:100%; height:100%; }

.multiplier-row { height:45px; display:flex; width:100%; padding:0 2px; gap:2px; background:#050614; }
.slot { flex:1; height:35px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:900; border-radius:4px; border:1px solid rgba(255,255,255,0.1); transition:0.2s; }
.s-high { background:var(--pink); box-shadow:0 0 8px var(--pink); }
.s-mid { background:var(--yellow); color:#000; }
.s-low { background:var(--blue); }
.slot.active { transform:scale(1.1) translateY(-3px); filter:brightness(1.5); border:2px solid #fff; }

.f-score { position:absolute; font-weight:900; color:var(--yellow); animation:flyUp 1s forwards; z-index:50; pointer-events:none; }
@keyframes flyUp { 0%{opacity:1;transform:translateY(0);} 100%{opacity:0;transform:translateY(-60px);} }

.controls { padding:15px; background:#050614; border-top:2px solid var(--blue); display:flex; flex-direction:column; gap:10px; }
.btn-main { width:100%; padding:16px; border-radius:50px; border:none; font-family:'Cinzel Decorative'; font-weight:900; font-size:18px; color:#fff; background:linear-gradient(90deg,var(--blue),var(--pink)); cursor:pointer; }
.nav-bottom { display:flex; gap:5px; }
.nav-btn { flex:1; padding:8px; text-align:center; border-radius:10px; border:1px solid var(--blue); color:#fff; text-decoration:none; font-size:10px; display:flex; flex-direction:column; align-items:center; }

#modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; }
#neon-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#0a0b1e; border:2px solid var(--pink); border-radius:20px; padding:25px; text-align:center; z-index:1001; width:85%; }
</style>
</head>
<body>

<audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
<audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>

<div id="modal-overlay"></div>
<div id="neon-modal">
    <h3 style="color:var(--pink); font-family:'Cinzel Decorative';">SYSTEM MESSAGE</h3>
    <p id="modal-msg" style="margin:15px 0; color:#ccc;"></p>
    <button class="btn-main" onclick="closeModal()" style="padding:10px; font-size:14px;">OK</button>
</div>

<div class="header">
    <div onclick="location.href='profil.html'"><i class="fa-solid fa-circle-user fa-2x" style="color:var(--blue)"></i></div>
    <div class="balance-box"><div id="display-saldo">SYNC...</div></div>
    <div onclick="location.href='settings.html'"><i class="fa-solid fa-bolt fa-lg" style="color:var(--yellow)"></i></div>
</div>

<div id="board-wrapper"><canvas id="plinko-canvas"></canvas></div>
<div class="multiplier-row" id="slot-row"></div>

<div class="controls">
    <div style="display:flex; gap:8px;">
        <button class="btn-main" id="m-auto" onclick="toggleAuto()" style="font-size:12px; padding:12px;">AUTO PLAY</button>
        <button class="btn-main" id="m-turbo" onclick="setSpeedMode('turbo')" style="font-size:12px; padding:12px; background:rgba(255,255,255,0.05); border:1px solid var(--blue);">TURBO</button>
    </div>
    <div style="display:flex; align-items:center; justify-content:space-between; background:rgba(255,255,255,0.05); padding:10px; border-radius:15px;">
        <button onclick="changeBet(-1)" style="background:none; border:none; color:var(--pink); font-size:25px; font-weight:bold; width:40px;">-</button>
        <div id="current-bet" style="font-family:'Cinzel Decorative'; font-size:18px; color:var(--yellow)">1,000</div>
        <button onclick="changeBet(1)" style="background:none; border:none; color:var(--pink); font-size:25px; font-weight:bold; width:40px;">+</button>
    </div>
    <button class="btn-main" id="main-btn" onclick="spawnBall()">DROP BALL</button>
    <div class="nav-bottom">
        <a href="withdraw.html" class="nav-btn"><i class="fa-solid fa-wallet"></i> WD</a>
        <a href="deposit.html" class="nav-btn"><i class="fa-solid fa-plus-circle"></i> DEPO</a>
        <a href="reward.html" class="nav-btn"><i class="fa-solid fa-gift"></i> GIFT</a>
    </div>
</div>

<script src="global.js"></script>
<script>
const ROWS = 10;
const MULTS = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
const BETS = [200, 500, 1000, 2000, 5000, 10000, 25000, 50000];
const BALL_R = 7, PEG_R = 3;

let canvas, ctx, BW, BH, pegs = [], balls = [], slotW, lastDrop = 0;
let speedMode = 'normal', isAuto = false, autoTimer = null, betIdx = 2, _saldo = -1;

function init() {
    canvas = document.getElementById('plinko-canvas'); ctx = canvas.getContext('2d');
    window.addEventListener('resize', resize); resize(); buildSlots();
    ProfileAPI.sync().then(data => { if(data){ _saldo = data.saldo; _renderS(); } });
    loop();
}

function resize() {
    const wrap = document.getElementById('board-wrapper');
    BW = wrap.offsetWidth; BH = wrap.offsetHeight;
    const DPR = window.devicePixelRatio || 1;
    canvas.width = BW * DPR; canvas.height = BH * DPR;
    ctx.scale(DPR, DPR); slotW = BW / MULTS.length;
    buildPegs();
}

function buildPegs() {
    pegs = [];
    const spX = (BW * 0.95) / (ROWS + 1);
    const spY = (BH * 0.85) / ROWS;
    for (let r = 0; r < ROWS; r++) {
        const count = r + 2;
        const startX = (BW - (count - 1) * spX) / 2;
        for (let c = 0; c < count; c++) {
            pegs.push({ x: startX + c * spX, y: 60 + r * spY, glow: 0 });
        }
    }
}

function buildSlots() {
    const row = document.getElementById('slot-row'); row.innerHTML = '';
    MULTS.forEach((m, i) => {
        const s = document.createElement('div');
        s.className = `slot ${m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low'}`;
        s.id = `slot-${i}`; s.innerHTML = m + 'x';
        row.appendChild(s);
    });
}

function loop() {
    ctx.clearRect(0, 0, BW, BH);
    const grav = speedMode === 'turbo' ? 0.8 : 0.4;
    pegs.forEach(p => {
        p.glow *= 0.9;
        ctx.fillStyle = p.glow > 0.1 ? `rgba(0, 212, 255, ${0.3+p.glow})` : 'rgba(255,255,255,0.15)';
        ctx.beginPath(); ctx.arc(p.x, p.y, PEG_R, 0, Math.PI*2); ctx.fill();
    });

    for (let i = balls.length - 1; i >= 0; i--) {
        const b = balls[i]; b.vy += grav; b.x += b.vx; b.y += b.vy;

        // DINDING LEBAR (Agar bisa ke x10)
        if (b.x < BALL_R) { b.x = BALL_R; b.vx *= -0.4; }
        if (b.x > BW - BALL_R) { b.x = BW - BALL_R; b.vx *= -0.4; }

        // MAGNET KUAT KE TARGET
        if (b.targetIdx !== undefined && b.y > BH * 0.35) {
            const tx = (b.targetIdx * slotW) + (slotW / 2);
            b.vx += (tx - b.x) * 0.05; b.vx *= 0.93;
        }

        pegs.forEach(p => {
            const dx = b.x - p.x, dy = b.y - p.y;
            const dist = Math.sqrt(dx*dx+dy*dy);
            if (dist < BALL_R + PEG_R) {
                p.glow = 1.2; snd('hit');
                b.vy *= -0.4; b.vx += (b.x - p.x) * 0.25 + (Math.random()-0.5);
                b.y = p.y - (BALL_R + PEG_R);
            }
        });

        ctx.save();
        ctx.shadowBlur = 10; ctx.shadowColor = "#ff0077"; ctx.fillStyle = "#ff0077";
        ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        if (b.y > BH + 5) { onLand(b); balls.splice(i, 1); }
    }
    requestAnimationFrame(loop);
}

async function spawnBall() {
    const now = Date.now();
    if (now - lastDrop < 400) return; // ANTI SISTEM RAMAI (Cooldown 0.4 detik)
    if (_saldo < 0) return;
    
    const bet = BETS[betIdx];
    if (_saldo < bet) { showModal("SALDO KURANG!"); stopAuto(); return; }

    lastDrop = now;
    _saldo -= bet; _renderS();

    const b = { x: BW/2 + (Math.random()-5), y: -10, vx: (Math.random()-0.5), vy: 2, targetIdx: undefined };
    balls.push(b);

    try {
        const res = await callApiSilent("game_play", { username: getUsername(), bet: bet });
        if (res && res.result === "SUCCESS") {
            b.serverWin = res.win; b.newSaldo = res.newSaldo;
            const targets = [];
            MULTS.forEach((m, idx) => { if(Math.abs(m - res.target_multiplier) < 0.1) targets.push(idx); });
            b.targetIdx = targets[Math.floor(Math.random()*targets.length)];
        } else { _saldo += bet; _renderS(); balls.pop(); }
    } catch(e) { _saldo += bet; _renderS(); balls.pop(); }
}

function onLand(b) {
    if (b.newSaldo !== undefined) {
        _saldo = b.newSaldo; _renderS();
        const slot = document.getElementById(`slot-${b.targetIdx}`);
        if (slot) {
            slot.classList.add('active'); setTimeout(() => slot.classList.remove('active'), 500);
            if (b.serverWin > 0) { createPopText(b.x, b.serverWin); snd('win'); }
        }
    }
}

function createPopText(x, win) {
    const div = document.createElement('div');
    div.className = 'f-score'; div.style.left = (x-20)+'px'; div.style.bottom = '20px';
    div.innerText = '+' + Math.floor(win).toLocaleString();
    document.getElementById('board-wrapper').appendChild(div);
    setTimeout(() => div.remove(), 1000);
}

function _renderS() {
    document.getElementById('display-saldo').innerText = 'IDR ' + Math.floor(_saldo).toLocaleString('id-ID');
    syncSaldoUI(_saldo);
}

function changeBet(v) { if(isAuto) return; betIdx = Math.max(0, Math.min(BETS.length-1, betIdx + v)); document.getElementById('current-bet').innerText = BETS[betIdx].toLocaleString(); }

function setSpeedMode(m) {
    speedMode = (speedMode === 'normal' && m === 'turbo') ? 'turbo' : 'normal';
    document.getElementById('m-turbo').style.background = speedMode === 'turbo' ? 'var(--pink)' : '';
}

function toggleAuto() {
    isAuto = !isAuto;
    const btn = document.getElementById('m-auto');
    if(isAuto) {
        btn.innerText = "STOP"; btn.style.background = "var(--yellow)"; btn.style.color = "#000";
        spawnBall(); autoTimer = setInterval(spawnBall, 1000); // Jeda aman 1 detik
    } else { stopAuto(); }
}

function stopAuto() { isAuto = false; clearInterval(autoTimer); document.getElementById('m-auto').innerText = "AUTO PLAY"; document.getElementById('m-auto').style.background = ""; document.getElementById('m-auto').style.color = "#fff"; }
function showModal(m) { document.getElementById('modal-msg').innerText = m; document.getElementById('modal-overlay').style.display='block'; document.getElementById('neon-modal').style.display='block'; }
function closeModal() { document.getElementById('modal-overlay').style.display='none'; document.getElementById('neon-modal').style.display='none'; }
function snd(t) { try { const a=document.getElementById('snd-'+t); a.currentTime=0; a.play(); } catch(e){} }

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
