<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { 
    --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #02030d; 
    --pink-neon: 0 0 10px var(--pink);
    --blue-neon: 0 0 10px var(--blue);
    --header-h: 65px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; }

/* Header & Saldo */
.header { height: var(--header-h); background: rgba(2, 3, 13, 0.95); border-bottom: 2px solid var(--blue); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; z-index: 100; box-shadow: var(--blue-neon); }
.balance-box { background: rgba(0, 0, 0, 0.8); border: 2px solid var(--blue); border-radius: 20px; padding: 5px 20px; text-align: center; min-width: 170px; }
#display-saldo { font-family: 'Cinzel Decorative', serif; font-size: 18px; color: var(--yellow); text-shadow: 0 0 5px var(--yellow); font-weight: 900; }

#board-wrapper { flex: 1; position: relative; background: radial-gradient(circle at center, #070a24 0%, #02030d 100%); overflow: hidden; }
#plinko-canvas { display: block; width: 100%; height: 100%; }

/* Multiplier Slots */
.multiplier-row { height: 45px; display: flex; width: 100%; padding: 0 5px; gap: 4px; z-index: 10; background: #050614; }
.slot { flex: 1; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; border-radius: 6px; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); }
.s-high { background: var(--pink); color: white; box-shadow: 0 0 8px var(--pink); }
.s-mid { background: var(--yellow); color: #000; }
.s-low { background: var(--blue); color: white; }
.slot.active { transform: scale(1.15) translateY(-5px); filter: brightness(1.5); border: 2px solid #fff; box-shadow: 0 0 20px #fff; }

/* Floating Win Text */
.f-score { position: absolute; font-weight: 900; font-family: 'Cinzel Decorative'; color: var(--yellow); pointer-events: none; animation: flyUp 1s forwards; z-index: 50; text-shadow: 0 0 10px #000; }
@keyframes flyUp { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-70px); } }

/* Controls */
.controls { padding: 15px; background: #050614; border-top: 2px solid var(--blue); display: flex; flex-direction: column; gap: 10px; }
.btn-main { width: 100%; padding: 16px; border-radius: 50px; border: none; font-family: 'Cinzel Decorative'; font-weight: 900; font-size: 18px; color: #fff; cursor: pointer; background: linear-gradient(90deg, var(--blue), var(--pink)); box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }
.btn-main:active { transform: scale(0.96); }

.nav-bottom { display: flex; gap: 5px; }
.nav-btn { flex: 1; padding: 10px; text-align: center; border-radius: 10px; text-decoration: none; font-size: 10px; border: 1px solid var(--blue); color: #fff; background: rgba(0, 212, 255, 0.1); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; }

#modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; }
#neon-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background: #0a0b1e; border: 2px solid var(--pink); border-radius: 20px; padding: 25px; text-align: center; z-index:1001; width: 85%; }
</style>
</head>
<body>

<audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
<audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>

<div id="modal-overlay"></div>
<div id="neon-modal">
    <h3 style="color:var(--pink); font-family:'Cinzel Decorative';">SYSTEM ALERT</h3>
    <p id="modal-msg" style="margin: 15px 0; font-size:14px; color:#ccc;"></p>
    <button class="btn-main" onclick="closeModal()" style="padding:10px; font-size: 14px;">CONFIRM</button>
</div>

<div class="header">
    <div onclick="location.href='profil.html'"><i class="fa-solid fa-circle-user fa-2x" style="color:var(--blue)"></i></div>
    <div class="balance-box">
        <div id="display-saldo">SYNCING...</div>
    </div>
    <div onclick="location.href='settings.html'"><i class="fa-solid fa-bolt fa-lg" style="color:var(--yellow)"></i></div>
</div>

<div id="board-wrapper">
    <canvas id="plinko-canvas"></canvas>
</div>

<div class="multiplier-row" id="slot-row"></div>

<div class="controls">
    <div style="display:flex; gap:8px;">
        <button class="btn-main" id="m-auto" onclick="toggleAuto()" style="font-size:11px; padding:12px;">AUTO</button>
        <button class="btn-main" id="m-turbo" onclick="setSpeedMode('turbo')" style="font-size:11px; padding:12px; background:rgba(255,255,255,0.05); border:1px solid var(--blue);">TURBO</button>
    </div>
    <div style="display:flex; align-items:center; justify-content:space-between; background:rgba(255,255,255,0.05); padding:10px; border-radius:15px; border: 1px solid rgba(0,212,255,0.2);">
        <button onclick="changeBet(-1)" style="background:none; border:none; color:var(--pink); font-size:26px; font-weight:bold; width:50px;">-</button>
        <div style="text-align:center;">
            <div id="current-bet" style="font-family:'Cinzel Decorative'; font-size:20px; color:var(--yellow)">1,000</div>
        </div>
        <button onclick="changeBet(1)" style="background:none; border:none; color:var(--pink); font-size:26px; font-weight:bold; width:50px;">+</button>
    </div>
    <button class="btn-main" id="main-btn" onclick="spawnBall()">DROP NEON BALL</button>
    <div class="nav-bottom">
        <a href="withdraw.html" class="nav-btn"><i class="fa-solid fa-wallet"></i> WD</a>
        <a href="deposit.html" class="nav-btn"><i class="fa-solid fa-plus-circle"></i> DEPO</a>
        <a href="reward.html" class="nav-btn"><i class="fa-solid fa-gift"></i> GIFT</a>
    </div>
</div>

<script src="global.js"></script>
<script>
const ROWS = 10;
const MULTS = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
const BETS = [200, 500, 1000, 2000, 5000, 10000, 25000, 50000];
const BALL_R = 7, PEG_R = 3;

let canvas, ctx, BW, BH, pegs = [], balls = [], slotW;
let speedMode = 'normal', isAuto = false, autoTimer = null, betIdx = 2;
let _saldo = -1; 

function init() {
    canvas = document.getElementById('plinko-canvas');
    ctx = canvas.getContext('2d');
    window.addEventListener('resize', resize);
    resize();
    buildSlots();
    
    // Sinkronisasi saldo awal dari server
    ProfileAPI.sync().then(data => { if(data) { _saldo = data.saldo; _renderS(); } });
    loop();
}

function resize() {
    const wrap = document.getElementById('board-wrapper');
    BW = wrap.offsetWidth; BH = wrap.offsetHeight;
    const DPR = window.devicePixelRatio || 1;
    canvas.width = BW * DPR; canvas.height = BH * DPR;
    ctx.scale(DPR, DPR);
    slotW = BW / MULTS.length;
    buildPegs();
}

function buildPegs() {
    pegs = [];
    const spX = (BW * 0.94) / (ROWS + 1);
    const spY = (BH * 0.82) / ROWS;
    for (let r = 0; r < ROWS; r++) {
        const count = r + 2;
        const startX = (BW - (count - 1) * spX) / 2;
        for (let c = 0; c < count; c++) {
            pegs.push({ x: startX + c * spX, y: 50 + r * spY, glow: 0 });
        }
    }
}

function buildSlots() {
    const row = document.getElementById('slot-row');
    row.innerHTML = '';
    MULTS.forEach((m, i) => {
        const s = document.createElement('div');
        s.className = 'slot ' + (m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low');
        s.id = 'slot-' + i; s.innerHTML = m + 'x';
        row.appendChild(s);
    });
}

function loop() {
    ctx.clearRect(0, 0, BW, BH);
    const grav = speedMode === 'turbo' ? 0.9 : 0.45;

    pegs.forEach(p => {
        p.glow *= 0.9;
        ctx.fillStyle = p.glow > 0.1 ? `rgba(0, 212, 255, ${0.3+p.glow})` : 'rgba(255,255,255,0.15)';
        ctx.beginPath(); ctx.arc(p.x, p.y, PEG_R, 0, Math.PI*2); ctx.fill();
    });

    for (let i = balls.length - 1; i >= 0; i--) {
        const b = balls[i];
        b.vy += grav; b.x += b.vx; b.y += b.vy;

        // --- 1. DINDING PANTUL (ANTI KELUAR ARENA) ---
        if (b.x < BALL_R) { b.x = BALL_R; b.vx *= -0.5; }
        if (b.x > BW - BALL_R) { b.x = BW - BALL_R; b.vx *= -0.5; }

        // --- 2. MAGNET TARGET (AGAR MASUK KOTAK SERVER) ---
        if (b.targetIdx !== undefined && b.y > BH * 0.4) {
            const tx = (b.targetIdx * slotW) + (slotW / 2);
            b.vx += (tx - b.x) * 0.04;
            b.vx *= 0.94;
        }

        pegs.forEach(p => {
            const dx = b.x - p.x, dy = b.y - p.y;
            const dist = Math.sqrt(dx*dx+dy*dy);
            if (dist < BALL_R + PEG_R) {
                p.glow = 1.5; snd('hit');
                b.vy *= -0.4;
                b.vx += (b.x - p.x) * 0.2 + (Math.random()-0.5);
                b.y = p.y - (BALL_R + PEG_R);
            }
        });

        // Gambar Bola Neon
        ctx.save();
        ctx.shadowBlur = 15; ctx.shadowColor = "#ff0077";
        ctx.fillStyle = "#ff0077";
        ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        // Cek jika bola sampai dasar
        if (b.y > BH + 5) { onLand(b); balls.splice(i, 1); }
    }
    requestAnimationFrame(loop);
}

// --- 3. LOGIKA PERHITUNGAN SALDO (FIXED) ---
async function spawnBall() {
    if (_saldo < 0) return;
    const bet = BETS[betIdx];
    
    // Cek saldo cukup
    if (_saldo < bet) { 
        showModal("SALDO TIDAK CUKUP!"); 
        stopAuto(); 
        return; 
    }

    // A. Potong saldo lokal dulu (Feedback Visual)
    _saldo -= bet; 
    _renderS();

    const b = { 
        x: BW/2 + (Math.random()-0.5)*10, 
        y: -10, 
        vx: (Math.random()-0.5)*2, 
        vy: 2, 
        targetIdx: undefined 
    };
    balls.push(b);

    try {
        // B. Kirim request ke App Script
        const res = await callApiSilent("game_play", { username: getUsername(), bet: bet });
        
        if (res && res.result === "SUCCESS") {
            // C. Simpan saldo eksak dari server
            b.serverWin = res.win;
            b.newSaldo = res.newSaldo; 
            
            // Tentukan target visual
            const targets = [];
            MULTS.forEach((m, idx) => { 
                if(Math.abs(m - res.target_multiplier) < 0.1) targets.push(idx); 
            });
            b.targetIdx = targets[Math.floor(Math.random()*targets.length)];
        } else {
            // Gagal di server, balikkan saldo
            _saldo += bet; _renderS(); balls.pop();
            showModal(res.message || "Error Server");
        }
    } catch(e) { 
        // Gagal koneksi, balikkan saldo
        _saldo += bet; _renderS(); balls.pop(); 
    }
}

function onLand(b) {
    if (b.newSaldo !== undefined) {
        // D. SINKRONISASI TOTAL: Gunakan saldo final dari server
        _saldo = b.newSaldo; 
        _renderS();
        
        const slot = document.getElementById('slot-' + b.targetIdx);
        if (slot) {
            slot.classList.add('active');
            setTimeout(() => slot.classList.remove('active'), 600);
            if (b.serverWin > 0) { 
                createPopText(b.x, b.serverWin); 
                snd('win'); 
            }
        }
    }
}

function createPopText(x, win) {
    const wrap = document.getElementById('board-wrapper');
    const div = document.createElement('div');
    div.className = 'f-score';
    div.style.left = (x - 20) + 'px';
    div.style.bottom = '20px';
    div.innerText = '+' + Math.floor(win).toLocaleString();
    wrap.appendChild(div);
    setTimeout(() => div.remove(), 1000);
}

function _renderS() {
    // Tampilkan saldo bulat (IDR)
    document.getElementById('display-saldo').innerText = 'IDR ' + Math.floor(_saldo).toLocaleString('id-ID');
    syncSaldoUI(_saldo);
}

function changeBet(v) { 
    if(isAuto) return;
    betIdx = Math.max(0, Math.min(BETS.length-1, betIdx + v)); 
    document.getElementById('current-bet').innerText = BETS[betIdx].toLocaleString(); 
}

function setSpeedMode(m) {
    speedMode = (speedMode === 'normal' && m === 'turbo') ? 'turbo' : 'normal';
    document.getElementById('m-turbo').style.background = speedMode === 'turbo' ? 'var(--pink)' : 'rgba(255,255,255,0.05)';
}

function toggleAuto() {
    isAuto = !isAuto;
    const btn = document.getElementById('m-auto');
    if(isAuto) {
        btn.innerText = "STOP"; btn.style.background = "var(--yellow)";
        spawnBall(); autoTimer = setInterval(spawnBall, speedMode === 'turbo' ? 700 : 1300);
    } else { stopAuto(); }
}

function stopAuto() {
    isAuto = false; clearInterval(autoTimer);
    document.getElementById('m-auto').innerText = "AUTO"; 
    document.getElementById('m-auto').style.background = "linear-gradient(90deg, var(--blue), var(--pink))";
}

function showModal(m) { 
    document.getElementById('modal-msg').innerText = m; 
    document.getElementById('modal-overlay').style.display='block'; 
    document.getElementById('neon-modal').style.display='block'; 
}
function closeModal() { 
    document.getElementById('modal-overlay').style.display='none'; 
    document.getElementById('neon-modal').style.display='none'; 
}
function snd(t) { try { const a=document.getElementById('snd-'+t); a.currentTime=0; a.play(); } catch(e){} }

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
