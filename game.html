<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NEON PLINKO VIP - v9.0</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--green:#00ff88;--bg:#02030d;
  --gp:0 0 15px rgba(255,0,119,.6),0 0 30px rgba(255,0,119,.2);
  --gb:0 0 15px rgba(0,85,255,.6),0 0 30px rgba(0,85,255,.2);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  width:100%;height:100vh;overflow:hidden;display:flex;flex-direction:column;
  background:var(--bg);color:#dde0f0;font-family:'Outfit',sans-serif;
  background-image:radial-gradient(circle at 50% -20%,#1a1b3a 0%,transparent 70%);
}

/* ── HEADER ── */
.header{
  padding:10px 15px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,0,0,0.5);border-bottom:1px solid rgba(0,85,255,0.25);
}
.balance-box{
  flex:1;margin:0 12px;background:rgba(0,0,0,0.6);
  border:1px solid var(--pink);border-radius:30px;padding:4px 14px;text-align:center;
}
#game-display-saldo{font-family:'Cinzel Decorative',serif;font-size:15px;font-weight:900;color:#fff;}

/* ── CANVAS & SLOTS ── */
#board-wrapper{flex:1;position:relative;width:100%;overflow:hidden;margin-top:5px;}
#plinko-canvas{display:block;width:100%;height:100%;}

.multiplier-container{position:relative;height:35px;margin-bottom:10px;width:100%;padding:0 5px;}
.multiplier-row{display:flex;height:100%;width:100%;gap:2px;justify-content:center;}
.slot{
  flex:1;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;border-radius:4px;transition:all 0.15s ease;
  border:1px solid rgba(255,255,255,0.1);
}
.slot.active{transform:scale(1.1) translateY(-5px);filter:brightness(2);box-shadow:0 0 15px #fff;z-index:10;}
.s-high{background:linear-gradient(var(--pink),#80003c);box-shadow:var(--gp);}
.s-mid{background:linear-gradient(var(--yellow),#807700);color:#000;}
.s-low{background:linear-gradient(#334,#223);}

/* ── CONTROLS ── */
.controls{
  padding:15px;background:rgba(5,7,25,0.95);border-top:1px solid rgba(0,85,255,0.2);
  display:flex;flex-direction:column;gap:10px;
}
.mode-row{display:flex;gap:5px;}
.btn-mode{
  flex:1;padding:10px;border-radius:12px;font-size:10px;font-weight:700;
  border:1px solid #333;background:rgba(255,255,255,0.04);color:#666;
}
.btn-mode.active{border-color:var(--blue);color:#fff;box-shadow:var(--gb);background:rgba(0,85,255,0.15);}
#btn-auto.on{border-color:var(--green);color:var(--green);box-shadow:0 0 10px var(--green);}

.bet-row{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,0,0,0.5);border:1px solid rgba(0,85,255,0.25);
  border-radius:50px;padding:5px 15px;
}
.bet-btn{font-size:24px;color:var(--pink);background:none;border:none;}
#current-bet{font-family:'Cinzel Decorative',serif;font-size:18px;font-weight:900;color:var(--yellow);}

.btn-play{
  width:100%;padding:16px;border-radius:50px;
  font-family:'Cinzel Decorative',serif;font-size:15px;font-weight:900;
  background:linear-gradient(90deg,var(--pink),var(--blue));color:#fff;border:none;
}
.btn-play:disabled{opacity:0.5;}
.btn-play.stop{background:var(--yellow);color:#000;}

/* ── MODAL ── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9998;}
#neon-modal{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#0b0d24;border:1px solid var(--pink);padding:20px;border-radius:15px;
  text-align:center;z-index:9999;width:80%;
}
</style>
</head>
<body>

<div id="modal-overlay" onclick="closeModal()"></div>
<div id="neon-modal">
  <div id="modal-title" style="color:var(--pink);font-weight:bold;margin-bottom:10px;">INFO</div>
  <div id="modal-msg" style="margin-bottom:15px;"></div>
  <button onclick="closeModal()" style="background:var(--pink);border:none;color:#fff;padding:8px 20px;border-radius:20px;">OK</button>
</div>

<div class="header">
  <div style="text-align:center;">
    <i class="fa-solid fa-circle-user" style="color:var(--yellow);font-size:20px;"></i>
    <span id="display-username" style="font-size:8px;display:block;color:var(--yellow);">GUEST</span>
  </div>
  <div class="balance-box">
    <div id="game-display-saldo">IDR 0</div>
  </div>
  <div onclick="location.reload()" style="color:var(--pink);"><i class="fa-solid fa-sync"></i></div>
</div>

<div id="board-wrapper">
  <canvas id="plinko-canvas"></canvas>
</div>

<div class="multiplier-container">
  <div class="multiplier-row" id="slot-row"></div>
</div>

<div class="controls">
  <div class="mode-row">
    <button class="btn-mode active" id="m-normal" onclick="setSpeed('normal')">NORMAL</button>
    <button class="btn-mode" id="m-turbo" onclick="setSpeed('turbo')">TURBO</button>
    <button class="btn-mode" id="btn-auto" onclick="toggleAuto()">AUTO: OFF</button>
  </div>
  <div class="bet-row">
    <button class="bet-btn" onclick="changeBet(-1)"><i class="fa-solid fa-minus-circle"></i></button>
    <div id="current-bet">400</div>
    <button class="bet-btn" onclick="changeBet(1)" style="color:var(--blue)"><i class="fa-solid fa-plus-circle"></i></button>
  </div>
  <button class="btn-play" id="main-btn" onclick="handlePlay()">PLAY BALL</button>
</div>

<script src="global.js"></script>
<script>
/**
 * NEON PLINKO VIP v9.0 — FULL FIXED
 */

const CONFIG = {
    ROWS: 9,
    MULTS: [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10],
    BETS: [400, 800, 1000, 2000, 5000, 10000, 25000, 50000],
    PHYSICS: {
        normal: { grav: 0.25, bounce: 0.45, steer: 0.12 },
        turbo: { grav: 0.5, bounce: 0.4, steer: 0.22 }
    }
};

let G = {
    canvas: null, ctx: null, BW: 0, BH: 0,
    pegs: [], balls: [], floaters: [],
    betIdx: 0, speed: 'normal', isAuto: false, autoTimer: null,
    busy: false, slotsData: []
};

function initGame() {
    G.canvas = document.getElementById('plinko-canvas');
    G.ctx = G.canvas.getContext('2d');
    const wrap = document.getElementById('board-wrapper');
    G.BW = wrap.offsetWidth; G.BH = wrap.offsetHeight;

    const dpr = window.devicePixelRatio || 1;
    G.canvas.width = G.BW * dpr; G.canvas.height = G.BH * dpr;
    G.ctx.scale(dpr, dpr);

    // Build Pegs
    G.pegs = [];
    const spacingY = (G.BH - 40) / CONFIG.ROWS;
    const spacingX = G.BW / (CONFIG.ROWS + 2);

    for (let r = 0; r < CONFIG.ROWS; r++) {
        let count = r + 3;
        let startX = (G.BW - (count - 1) * spacingX) / 2;
        for (let c = 0; c < count; c++) {
            G.pegs.push({ x: startX + (c * spacingX), y: 40 + (r * spacingY), glow: 0 });
        }
    }

    // Build Slot UI
    const row = document.getElementById('slot-row');
    row.innerHTML = '';
    CONFIG.MULTS.forEach((m, i) => {
        const div = document.createElement('div');
        div.id = `slot-${i}`;
        div.className = `slot ${m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low'}`;
        div.innerHTML = m + 'x';
        row.appendChild(div);
    });
    
    // Sinkronisasi koordinat slot untuk physics
    setTimeout(syncSlots, 100);
}

function syncSlots() {
    G.slotsData = [];
    const containerRect = document.getElementById('slot-row').getBoundingClientRect();
    const wrapperRect = document.getElementById('board-wrapper').getBoundingClientRect();
    
    CONFIG.MULTS.forEach((m, i) => {
        const el = document.getElementById(`slot-${i}`);
        const rect = el.getBoundingClientRect();
        G.slotsData.push({
            x: (rect.left - wrapperRect.left) + (rect.width / 2),
            width: rect.width,
            id: i
        });
    });
}

async function handlePlay() {
    if (G.busy && !G.isAuto) return;
    
    const bet = CONFIG.BETS[G.betIdx];
    const saldo = typeof getSaldo === 'function' ? getSaldo() : 0;

    if (saldo < bet) {
        showModal("Saldo Kurang!", "Peringatan");
        stopAuto(); return;
    }

    G.busy = true;
    updateSaldoUI(saldo - bet);

    const ball = {
        x: G.BW / 2 + (Math.random() * 10 - 5),
        y: 0, vx: 0, vy: 2,
        status: 'wait', targetIdx: null, isDone: false
    };
    G.balls.push(ball);

    try {
        // Admin control via Code.gs
        const res = await GameEngine.processPlay(bet);
        if (res && res.result === 'SUCCESS') {
            // Cari index slot berdasarkan multiplier server
            let targets = [];
            CONFIG.MULTS.forEach((m, i) => { if(Math.abs(m - res.multiplier) < 0.1) targets.push(i); });
            ball.targetIdx = targets[Math.floor(Math.random() * targets.length)];
            ball.status = 'ready';
            ball.mult = res.multiplier;
        } else {
            ball.isDone = true;
            updateSaldoUI(getSaldo());
        }
    } catch(e) { ball.isDone = true; }
}

function updatePhysics() {
    const p = CONFIG.PHYSICS[G.speed];
    G.balls.forEach(b => {
        if(b.isDone) return;
        b.vy += p.grav;
        b.x += b.vx; b.y += b.vy;

        // Peg collision
        G.pegs.forEach(pg => {
            const dx = b.x - pg.x, dy = b.y - pg.y;
            if (Math.sqrt(dx*dx + dy*dy) < 10) {
                const ang = Math.atan2(dy, dx);
                const speed = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
                b.vx = Math.cos(ang) * speed * p.bounce + (Math.random()-0.5);
                b.vy = Math.abs(Math.sin(ang) * speed * p.bounce) + 0.5;
                pg.glow = 1.0;
            }
        });

        // Magnetizing ke slot target (Admin Control)
        if (b.status === 'ready' && b.y > G.BH * 0.4) {
            const tx = G.slotsData[b.targetIdx].x;
            b.vx += (tx - b.x) * p.steer * (b.y / G.BH);
        }

        // Hit Bottom
        if (b.y > G.BH - 5) {
            b.isDone = true;
            onLand(b);
        }
    });
    G.balls = G.balls.filter(b => !b.isDone);
}

function onLand(b) {
    if (typeof syncSaldoUI === 'function') syncSaldoUI(getSaldo());
    
    // Flash Slot
    const el = document.getElementById(`slot-${b.targetIdx}`);
    if(el) {
        el.classList.add('active');
        setTimeout(() => el.classList.remove('active'), 300);
    }

    // Papan Score Melayang (Floater)
    G.floaters.push({
        x: G.slotsData[b.targetIdx].x,
        y: G.BH - 20,
        text: b.mult + "x",
        op: 1.0,
        color: b.mult >= 1 ? '#0f0' : '#f00'
    });

    G.busy = false;
}

function draw() {
    G.ctx.clearRect(0, 0, G.BW, G.BH);

    // Pegs
    G.pegs.forEach(p => {
        G.ctx.beginPath();
        G.ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
        G.ctx.fillStyle = p.glow > 0 ? `rgba(255,255,255,${p.glow})` : '#222944';
        G.ctx.fill();
        if(p.glow > 0) p.glow -= 0.05;
    });

    // Balls
    G.balls.forEach(b => {
        G.ctx.beginPath();
        G.ctx.arc(b.x, b.y, 6, 0, Math.PI*2);
        G.ctx.fillStyle = b.status === 'ready' ? varColor('--pink') : varColor('--blue');
        G.ctx.shadowBlur = 10; G.ctx.shadowColor = G.ctx.fillStyle;
        G.ctx.fill();
        G.ctx.shadowBlur = 0;
    });

    // Papan Score Melayang
    G.floaters.forEach((f, i) => {
        f.y -= 1.5; f.op -= 0.02;
        G.ctx.globalAlpha = f.op;
        G.ctx.font = "bold 14px Outfit";
        G.ctx.fillStyle = f.color;
        G.ctx.textAlign = "center";
        G.ctx.fillText(f.text, f.x, f.y);
        if(f.op <= 0) G.floaters.splice(i, 1);
    });
    G.ctx.globalAlpha = 1.0;

    updatePhysics();
    requestAnimationFrame(draw);
}

// --- Kontrol ---
function toggleAuto() {
    G.isAuto = !G.isAuto;
    const btn = document.getElementById('btn-auto');
    const main = document.getElementById('main-btn');
    if (G.isAuto) {
        btn.classList.add('on'); btn.textContent = "AUTO: ON";
        main.textContent = "STOP AUTO"; main.classList.add('stop');
        runAuto();
    } else {
        stopAuto();
    }
}

function runAuto() {
    if(!G.isAuto) return;
    handlePlay();
    G.autoTimer = setTimeout(runAuto, G.speed === 'turbo' ? 600 : 1300);
}

function stopAuto() {
    G.isAuto = false; clearTimeout(G.autoTimer);
    document.getElementById('btn-auto').classList.remove('on');
    document.getElementById('btn-auto').textContent = "AUTO: OFF";
    document.getElementById('main-btn').textContent = "PLAY BALL";
    document.getElementById('main-btn').classList.remove('stop');
}

function setSpeed(s) {
    G.speed = s;
    document.getElementById('m-normal').classList.toggle('active', s === 'normal');
    document.getElementById('m-turbo').classList.toggle('active', s === 'turbo');
}

function changeBet(d) {
    G.betIdx = Math.max(0, Math.min(CONFIG.BETS.length - 1, G.betIdx + d));
    document.getElementById('current-bet').textContent = CONFIG.BETS[G.betIdx].toLocaleString();
}

function updateSaldoUI(v) {
    document.getElementById('game-display-saldo').textContent = "IDR " + Math.floor(v).toLocaleString('id-ID');
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
function showModal(m, t) {
    document.getElementById('modal-title').textContent = t;
    document.getElementById('modal-msg').textContent = m;
    document.getElementById('modal-overlay').style.display = 'block';
    document.getElementById('neon-modal').style.display = 'block';
}
function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('neon-modal').style.display = 'none';
}

window.onload = () => {
    initGame();
    if(typeof getSaldo === 'function') updateSaldoUI(getSaldo());
    if(typeof getUsername === 'function') document.getElementById('display-username').textContent = getUsername().toUpperCase();
    draw();
};
window.onresize = () => { initGame(); };
</script>
</body>
</html>
