<style>
:root{
  --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--bg:#02030d;
  --gp:0 0 15px rgba(255,0,119,.6),0 0 30px rgba(255,0,119,.2);
  --gb:0 0 15px rgba(0,85,255,.6),0 0 30px rgba(0,85,255,.2);
  --gy:0 0 15px rgba(245,230,66,.6),0 0 30px rgba(245,230,66,.2);
  --bp:rgba(255,0,119,.3);--bb:rgba(0,85,255,.3);--by:rgba(245,230,66,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  width:100%;height:100vh;overflow:hidden;display:flex;flex-direction:column;
  background:var(--bg);color:#dde0f0;font-family:'Outfit',sans-serif;
  background-image: radial-gradient(circle at 50% -20%, #1a1b3a 0%, transparent 70%);
}

#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(5px);z-index:9998;}
#neon-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(160deg,#07091d,#0b0d24);border-radius:20px;z-index:9999;
  padding:25px;text-align:center;width:85%;max-width:320px;border:1px solid var(--bp);box-shadow:var(--gp);
  animation:mpop .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes mpop{from{opacity:0;transform:translate(-50%,-50%) scale(.8)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

.header{padding:12px 15px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.4);border-bottom:1px solid rgba(0,85,255,0.2);}
.balance-box{flex:1;margin:0 15px;background:rgba(0,0,0,0.5);border:1px solid var(--bp);border-radius:30px;padding:5px 15px;text-align:center;box-shadow:var(--gp);}
#game-display-saldo{font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:900;color:#fff;text-shadow:var(--gp);}
.header-user{text-align:center;cursor:pointer;transition:0.2s;}
.header-user:hover{opacity:0.8;}

#board-wrapper{flex:1;position:relative;width:100%;max-height:50vh;overflow:hidden;margin-top:10px;}
#plinko-canvas{display:block;width:100%;height:100%;}

.multiplier-container{position:relative;height:34px;margin-bottom:10px;width:100%;padding:0;}
.multiplier-row{display:flex;position:absolute;height:100%;top:0;}
.slot{height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;border-radius:4px;margin:0 1px;transition:0.1s ease-out;}
.slot.active{transform:scale(1.15);filter:brightness(2.5);box-shadow:0 0 25px #fff, inset 0 0 10px #fff;z-index:10;animation:slotFlash 0.4s;}
@keyframes slotFlash{0%{transform:scale(1.2);}50%{transform:scale(1.1);}100%{transform:scale(1.15);}}
.s-high{background:linear-gradient(to bottom, var(--pink), #80003c);color:#fff;}
.s-mid{background:linear-gradient(to bottom, var(--yellow), #807700);color:#000;}
.s-low{background:linear-gradient(to bottom, var(--blue), #002266);color:#fff;}

.controls{padding:15px;background:rgba(5,7,25,0.9);border-top:1px solid rgba(0,85,255,0.2);display:flex;flex-direction:column;gap:12px;max-height:250px;overflow-y:auto;}
.mode-row{display:flex;gap:8px;}
.btn-mode{flex:1;padding:10px;border-radius:12px;font-size:10px;font-weight:700;border:1px solid #333;background:rgba(255,255,255,0.05);color:#888;cursor:pointer;}
.btn-mode.active{border-color:var(--blue);color:#fff;box-shadow:var(--gb);background:rgba(0,85,255,0.1);}

.bet-row{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.4);border:1px solid rgba(0,85,255,0.2);border-radius:50px;padding:5px 15px;}
.bet-btn{font-size:24px;color:var(--pink);background:none;border:none;cursor:pointer;padding:5px;}
.bet-btn:disabled{opacity:0.3;}
#current-bet{font-family:'Cinzel Decorative',serif;font-size:18px;font-weight:900;color:var(--yellow);}

.btn-play{width:100%;padding:16px;border-radius:50px;font-family:'Cinzel Decorative',serif;font-size:14px;font-weight:900;background:linear-gradient(90deg,var(--pink),var(--blue));color:#fff;border:none;box-shadow:var(--gp);cursor:pointer;transition:all 0.3s;}
.btn-play:disabled{opacity:0.5;cursor:not-allowed;}
.btn-play.stop-mode{background:var(--yellow);color:#000;box-shadow:var(--gy);}

.nav-bottom{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.nav-btn{display:flex;flex-direction:column;align-items:center;padding:10px;border-radius:15px;text-decoration:none;font-size:10px;border:1px solid #222;color:#fff;cursor:pointer;background:none;}
.nav-btn i{font-size:18px;margin-bottom:4px;}

#info-box{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.95);color:#0f0;padding:10px 16px;border-radius:5px;font-size:12px;max-width:90%;text-align:center;z-index:100;display:none;border:1px solid rgba(15,255,0,0.5);font-weight:bold;}

/* Status indicator */
.status-indicator{position:fixed;top:10px;right:10px;font-size:12px;padding:5px 12px;border-radius:20px;background:rgba(0,0,0,0.7);border:1px solid #0f0;color:#0f0;z-index:50;}
.status-indicator.error{background:rgba(200,0,0,0.3);border-color:#f00;color:#f00;}
</style>

    </div>
</div>

<div id="info-box"></div>
<div class="status-indicator" id="status-indicator">🟢 ONLINE</div>

<script src="global.js"></script>
<script>
/**
 * ════════════════════════════════════════════════════════════════
 * PLINKO GAME v6.1 PRODUCTION READY
 * 
 * FIXES:
 * [1] Ball landing accuracy - proper LAND_Y & slot mapping
 * [2] Physics gravity reduced - slower di mode normal
 * [3] Multiple balls support - spawn immediately tanpa tunggu
 * [4] Bet array lengkap - 400,600,800,...,10000
 * [5] Saldo sync real-time - terhubung ke _session user
 * [6] Multi-user optimization - better lock, retry, timeout
 * [7] Multi-device support - responsive & stable
 * [8] Production logging - untuk debug & monitoring
 * ════════════════════════════════════════════════════════════════
 */

// ════════════════════════════════════════════════════════════════
// PRODUCTION CONFIG
// ════════════════════════════════════════════════════════════════

const GAME_CONFIG = {
    // Physics (OPTIMIZED untuk smooth gameplay)
    ROWS: 9,
    BALL_R: 6,
    PEG_R: 3.5,
    LAND_Y_RATIO: 0.92,  // INCREASED untuk accuracy
    
    // Bet array (SESUAI REQUEST)
    BETS: [400, 600, 800, 1000, 1200, 1400, 1600, 1800, 2000, 4000, 6000, 8000, 10000],
    DEFAULT_BET_IDX: 0, // Start dengan 400
    
    // Multipliers
    MULTS: [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10],
    
    // Physics (REDUCED untuk smooth gameplay)
    PHYSICS: {
        normal: { grav: 0.25, bounce: 0.45, friction: 0.99 },  // Lebih lambat
        turbo:  { grav: 0.50, bounce: 0.42, friction: 0.98 }   // Medium cepat
    },
    
    // Timeouts & Retry
    API_TIMEOUT: 8000,  // 8 detik max
    RETRY_COUNT: 3,
    RETRY_DELAY: 500,   // 500ms antara retry
    
    // Multi-user
    SYNC_INTERVAL: 15000  // Sync saldo setiap 15 detik
};

// ════════════════════════════════════════════════════════════════
// STATE MANAGEMENT
// ════════════════════════════════════════════════════════════════

var STATE = {
    canvas: null,
    ctx: null,
    BW: 0,
    BH: 0,
    pegs: [],
    balls: [],
    floaters: [],
    
    speedMode: 'normal',
    isAuto: false,
    autoTimer: null,
    betIdx: GAME_CONFIG.DEFAULT_BET_IDX,
    
    isPlaying: false,
    activePlayCount: 0,  // Track concurrent plays
    
    slotStartX: 0,
    slotItemW: 0,
    
    lastSaldoSync: 0,
    lastErrorTime: 0
};

// ════════════════════════════════════════════════════════════════
// SETUP CANVAS & PEGS
// ════════════════════════════════════════════════════════════════

function setupCanvas() {
    STATE.canvas = document.getElementById('plinko-canvas');
    STATE.ctx = STATE.canvas.getContext('2d');
    var wrap = document.getElementById('board-wrapper');
    STATE.BW = wrap.offsetWidth;
    STATE.BH = wrap.offsetHeight;

    var dpr = window.devicePixelRatio || 1;
    STATE.canvas.width = STATE.BW * dpr;
    STATE.canvas.height = STATE.BH * dpr;
    STATE.canvas.style.width = STATE.BW + 'px';
    STATE.canvas.style.height = STATE.BH + 'px';
    STATE.ctx.scale(dpr, dpr);

    // Generate pegs
    STATE.pegs = [];
    var spY = (STATE.BH - 40) / GAME_CONFIG.ROWS;
    var spX = STATE.BW / (GAME_CONFIG.ROWS + 2.5);
    var lastRowPegs = [];

    for (var r = 0; r < GAME_CONFIG.ROWS; r++) {
        var cnt = r + 3;
        var startX = (STATE.BW - (cnt - 1) * spX) / 2;
        for (var c = 0; c < cnt; c++) {
            var px = startX + c * spX;
            var py = 30 + r * spY;
            STATE.pegs.push({ x: px, y: py, glow: 0 });
            if (r === GAME_CONFIG.ROWS - 1) lastRowPegs.push(px);
        }
    }

    // Setup slots
    STATE.slotStartX = lastRowPegs[0];
    var slotEndX = lastRowPegs[lastRowPegs.length - 1];
    var totalW = slotEndX - STATE.slotStartX;
    STATE.slotItemW = totalW / GAME_CONFIG.MULTS.length;

    var slotRow = document.getElementById('slot-row');
    slotRow.innerHTML = '';
    slotRow.style.left = STATE.slotStartX + 'px';
    slotRow.style.width = totalW + 'px';

    GAME_CONFIG.MULTS.forEach(function(m, i) {
        var s = document.createElement('div');
        s.id = 'slot-' + i;
        s.className = 'slot ' + (m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low');
        s.style.width = (100 / GAME_CONFIG.MULTS.length) + '%';
        s.textContent = m + 'x';
        slotRow.appendChild(s);
    });
    
    logDebug('Canvas setup completed: ' + STATE.BW + 'x' + STATE.BH);
}

function slotCenterX(i) {
    return STATE.slotStartX + (i + 0.5) * STATE.slotItemW;
}

// ════════════════════════════════════════════════════════════════
// SPAWN & PLAY - MULTIPLE BALLS SUPPORT
// ════════════════════════════════════════════════════════════════

async function spawnBall() {
    // Allow multiple balls - tidak perlu tunggu ball sebelumnya
    var bet = GAME_CONFIG.BETS[STATE.betIdx];
    var saldo = getSaldo();
    
    if (saldo < bet) {
        showModal('Saldo tidak cukup! Butuh IDR ' + formatIDR(bet), 'SALDO KURANG');
        stopAuto();
        return;
    }

    STATE.isPlaying = true;
    STATE.activePlayCount++;
    updatePlayButton();
    showInfo('⏳ Processing...');

    var ball = {
        x: STATE.BW / 2 + (Math.random() - 0.5) * 20,
        y: -15,
        vx: (Math.random() - 0.5) * 2,
        vy: 2,
        bet: bet,
        status: 'falling',
        targetSlotIdx: null,
        targetMult: null,
        winAmount: 0,
        landed: false,
        isDone: false,
        startTime: Date.now()
    };

    STATE.balls.push(ball);
    logDebug('Ball spawned. Active balls: ' + STATE.balls.length);

    try {
        // Call dengan timeout & retry
        var result = await callGamePlayWithRetry(bet, 3);

        if (!result || result.result !== 'SUCCESS') {
            ball.isDone = true;
            showModal(result.message || 'Transaksi gagal', 'ERROR');
            STATE.activePlayCount--;
            hideInfo();
            updatePlayButton();
            return;
        }

        // Set target dari server response
        var slotIdx = findSlotByMultiplier(result.multiplier);
        ball.targetSlotIdx = slotIdx;
        ball.targetMult = result.multiplier;
        ball.winAmount = result.winAmount || 0;
        ball.status = 'ready';

        // Update saldo dari server response
        if (result.newSaldo !== undefined) {
            syncSaldoUI(result.newSaldo);
        }

        logDebug('Play success: ' + result.multiplier + 'x, win: ' + result.winAmount);
        hideInfo();

    } catch (err) {
        console.error('Play error:', err);
        ball.isDone = true;
        showModal('Error: ' + err.message, 'ERROR');
        STATE.activePlayCount--;
        hideInfo();
    } finally {
        STATE.isPlaying = false;
        updatePlayButton();
    }
}

async function callGamePlayWithRetry(bet, retries) {
    for (var i = 0; i < retries; i++) {
        try {
            var timeoutPromise = new Promise(function(_, reject) {
                setTimeout(function() {
                    reject(new Error('Request timeout'));
                }, GAME_CONFIG.API_TIMEOUT);
            });

            var apiPromise = GameEngine.processPlay(bet);
            var result = await Promise.race([apiPromise, timeoutPromise]);
            
            if (result && result.result === 'SUCCESS') {
                return result;
            }
            
            if (i < retries - 1) {
                await sleep(GAME_CONFIG.RETRY_DELAY);
            }
        } catch (err) {
            console.warn('Retry attempt ' + (i+1) + ' failed:', err.message);
            if (i === retries - 1) throw err;
            await sleep(GAME_CONFIG.RETRY_DELAY);
        }
    }
}

function findSlotByMultiplier(mult) {
    mult = parseFloat(mult) || 1;
    var closest = 0;
    var minDiff = Math.abs(GAME_CONFIG.MULTS[0] - mult);
    
    for (var i = 1; i < GAME_CONFIG.MULTS.length; i++) {
        var diff = Math.abs(GAME_CONFIG.MULTS[i] - mult);
        if (diff < minDiff) {
            minDiff = diff;
            closest = i;
        }
    }
    return closest;
}

// ════════════════════════════════════════════════════════════════
// PHYSICS & COLLISION
// ════════════════════════════════════════════════════════════════

function updatePhysics() {
    var ph = GAME_CONFIG.PHYSICS[STATE.speedMode];
    var LAND_Y = STATE.BH * GAME_CONFIG.LAND_Y_RATIO;

    for (var bi = STATE.balls.length - 1; bi >= 0; bi--) {
        var b = STATE.balls[bi];
        if (b.isDone) {
            STATE.balls.splice(bi, 1);
            continue;
        }

        var progY = b.y / STATE.BH;

        // HARD LOCK ZONE (progY > 0.80)
        if (b.status === 'ready' && progY > 0.80) {
            var tx = slotCenterX(b.targetSlotIdx);
            var diff = tx - b.x;
            var lockStr = progY > 0.90 ? 0.65 : (progY > 0.85 ? 0.50 : 0.25);
            b.x += diff * lockStr;
            b.vx = diff * (lockStr * 0.5);
        }
        // STEERING ZONE (progY 0.45 - 0.80)
        else if (b.status === 'ready' && progY > 0.45) {
            var tx2 = slotCenterX(b.targetSlotIdx);
            var diff2 = tx2 - b.x;
            var prog = (progY - 0.45) / (0.80 - 0.45);
            b.vx += diff2 * 0.15 * prog;
            var maxVx = Math.abs(diff2) * 0.4 + 1.5;
            b.vx = Math.max(-maxVx, Math.min(maxVx, b.vx));
        }

        // CHECK LANDING - ACCURATE
        if (!b.landed && b.y >= LAND_Y && b.status === 'ready') {
            b.landed = true;
            onBallLand(b);
            b.isDone = true;
            STATE.activePlayCount--;
            continue;
        }

        // Physics calculation
        b.vy += ph.grav;
        b.vx *= ph.friction;
        b.x += b.vx;
        b.y += b.vy;

        // Peg collision
        for (var pi = 0; pi < STATE.pegs.length; pi++) {
            var p = STATE.pegs[pi];
            var dx = b.x - p.x;
            var dy = b.y - p.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < GAME_CONFIG.BALL_R + GAME_CONFIG.PEG_R) {
                var ang = Math.atan2(dy, dx);
                var spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
                b.vx = Math.cos(ang) * spd * ph.bounce + (Math.random() - 0.5) * 0.2;
                b.vy = Math.abs(Math.sin(ang) * spd * ph.bounce) + 0.3;
                b.x = p.x + Math.cos(ang) * (GAME_CONFIG.BALL_R + GAME_CONFIG.PEG_R + 1);
                b.y = p.y + Math.sin(ang) * (GAME_CONFIG.BALL_R + GAME_CONFIG.PEG_R + 1);
                p.glow = 1.0;
                playSound('snd-hit', 0.08);
                break;
            }
        }

        // Boundaries
        if (b.x < GAME_CONFIG.BALL_R) {
            b.x = GAME_CONFIG.BALL_R;
            b.vx = Math.abs(b.vx) * 0.4;
        }
        if (b.x > STATE.BW - GAME_CONFIG.BALL_R) {
            b.x = STATE.BW - GAME_CONFIG.BALL_R;
            b.vx = -Math.abs(b.vx) * 0.4;
        }

        // Timeout check - prevent stuck balls
        if (Date.now() - b.startTime > 15000) {
            logDebug('Ball timeout - forcing land');
            b.landed = true;
            onBallLand(b);
            b.isDone = true;
            STATE.activePlayCount--;
        }
    }
}

// ════════════════════════════════════════════════════════════════
// ON BALL LAND
// ════════════════════════════════════════════════════════════════

function onBallLand(b) {
    // Flash slot dengan animation
    var slotEl = document.getElementById('slot-' + b.targetSlotIdx);
    if (slotEl) {
        slotEl.classList.add('active');
        setTimeout(function() {
            slotEl.classList.remove('active');
        }, 400);
    }

    // Sound
    if (b.targetMult >= 1) {
        playSound('snd-win', 0.25);
    }

    // Floating score
    var fx = slotCenterX(b.targetSlotIdx) + (Math.random() - 0.5) * 15;
    var fy = STATE.BH * GAME_CONFIG.LAND_Y_RATIO - 10;
    var fc = b.targetMult >= 3 ? '#ff0077' : b.targetMult >= 1 ? '#f5e642' : '#4488ff';
    var fsize = b.targetMult >= 3 ? 20 : 14;
    
    var netWin = b.winAmount - b.bet;
    var winText = netWin >= 0 ? 
        '+' + formatIDR(netWin) : 
        formatIDR(netWin);

    STATE.floaters.push({
        x: fx, y: fy,
        text: winText,
        color: fc,
        opacity: 1,
        velY: 1.2 + Math.random() * 0.6,
        fontSize: fsize
    });

    updatePlayButton();
}

// ════════════════════════════════════════════════════════════════
// DRAW LOOP
// ════════════════════════════════════════════════════════════════

function draw() {
    STATE.ctx.clearRect(0, 0, STATE.BW, STATE.BH);

    // Pegs
    STATE.pegs.forEach(function(p) {
        STATE.ctx.beginPath();
        STATE.ctx.arc(p.x, p.y, GAME_CONFIG.PEG_R, 0, Math.PI * 2);
        if (p.glow > 0) {
            STATE.ctx.shadowBlur = 10 * p.glow;
            STATE.ctx.shadowColor = '#fff';
            STATE.ctx.fillStyle = 'rgba(255,255,255,' + (0.25 + p.glow * 0.75) + ')';
            p.glow -= 0.08;
        } else {
            STATE.ctx.shadowBlur = 0;
            STATE.ctx.fillStyle = '#1a2040';
        }
        STATE.ctx.fill();
    });

    // Balls
    STATE.balls.forEach(function(b) {
        STATE.ctx.save();
        STATE.ctx.shadowBlur = 15;
        STATE.ctx.shadowColor = b.status === 'ready' ? '#ff0077' : '#0055ff';
        
        var grad = STATE.ctx.createRadialGradient(b.x - 2, b.y - 2, 1, b.x, b.y, GAME_CONFIG.BALL_R);
        if (b.status === 'ready') {
            grad.addColorStop(0, '#ffccee');
            grad.addColorStop(0.5, '#ff0077');
            grad.addColorStop(1, '#550022');
        } else {
            grad.addColorStop(0, '#ccddff');
            grad.addColorStop(0.5, '#0055ff');
            grad.addColorStop(1, '#000044');
        }
        
        STATE.ctx.beginPath();
        STATE.ctx.arc(b.x, b.y, GAME_CONFIG.BALL_R, 0, Math.PI * 2);
        STATE.ctx.fillStyle = grad;
        STATE.ctx.fill();
        STATE.ctx.restore();
    });

    // Floating scores
    for (var fi = STATE.floaters.length - 1; fi >= 0; fi--) {
        var f = STATE.floaters[fi];
        f.y -= f.velY;
        f.opacity -= 0.018;
        
        if (f.opacity <= 0) {
            STATE.floaters.splice(fi, 1);
            continue;
        }
        
        STATE.ctx.save();
        STATE.ctx.globalAlpha = f.opacity;
        STATE.ctx.font = '900 ' + f.fontSize + "px 'Outfit',sans-serif";
        STATE.ctx.fillStyle = f.color;
        STATE.ctx.textAlign = 'center';
        STATE.ctx.shadowBlur = 8;
        STATE.ctx.shadowColor = 'rgba(0,0,0,0.95)';
        STATE.ctx.fillText(f.text, f.x, f.y);
        STATE.ctx.restore();
    }

    updatePhysics();
    requestAnimationFrame(draw);
}

// ════════════════════════════════════════════════════════════════
// UI CONTROLS
// ════════════════════════════════════════════════════════════════

function playSound(id, vol) {
    try {
        var s = document.getElementById(id).cloneNode();
        s.volume = vol;
        s.play().catch(function(){});
    } catch(e) {}
}

function setSpeed(m) {
    if (STATE.activePlayCount > 0) return;
    STATE.speedMode = m;
    document.getElementById('m-normal').classList.toggle('active', m === 'normal');
    document.getElementById('m-turbo').classList.toggle('active', m === 'turbo');
    
    if (STATE.isAuto) {
        clearInterval(STATE.autoTimer);
        var interval = m === 'turbo' ? 400 : 800;
        STATE.autoTimer = setInterval(spawnBall, interval);
    }
}

function toggleAuto() {
    if (STATE.isAuto) {
        stopAuto();
        return;
    }
    
    STATE.isAuto = true;
    document.getElementById('m-auto').classList.add('active');
    document.getElementById('m-auto').textContent = 'AUTO: ON';
    document.getElementById('main-btn').textContent = 'STOP AUTO';
    document.getElementById('main-btn').classList.add('stop-mode');
    
    spawnBall();
    var interval = STATE.speedMode === 'turbo' ? 400 : 800;
    STATE.autoTimer = setInterval(spawnBall, interval);
}

function stopAuto() {
    STATE.isAuto = false;
    clearInterval(STATE.autoTimer);
    STATE.autoTimer = null;
    document.getElementById('m-auto').classList.remove('active');
    document.getElementById('m-auto').textContent = 'AUTO: OFF';
    document.getElementById('main-btn').textContent = 'PLAY BALL';
    document.getElementById('main-btn').classList.remove('stop-mode');
}

function handlePlay() {
    if (STATE.isAuto) {
        stopAuto();
    } else {
        spawnBall();
    }
}

function changeBet(d) {
    if (STATE.isAuto || STATE.activePlayCount > 0) return;
    
    STATE.betIdx = Math.max(0, Math.min(GAME_CONFIG.BETS.length - 1, STATE.betIdx + d));
    document.getElementById('current-bet').textContent = formatIDR(GAME_CONFIG.BETS[STATE.betIdx]);
    
    // Update button states
    document.getElementById('bet-minus').disabled = STATE.betIdx === 0;
    document.getElementById('bet-plus').disabled = STATE.betIdx === GAME_CONFIG.BETS.length - 1;
}

function updatePlayButton() {
    var btn = document.getElementById('main-btn');
    btn.disabled = STATE.activePlayCount > 0 && !STATE.isAuto;
}

function showModal(msg, title) {
    document.getElementById('modal-title').textContent = title || 'INFO';
    document.getElementById('modal-msg').textContent = msg;
    document.getElementById('modal-overlay').style.display = 'block';
    document.getElementById('neon-modal').style.display = 'block';
}

function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('neon-modal').style.display = 'none';
}

function showInfo(msg) {
    var el = document.getElementById('info-box');
    el.textContent = msg;
    el.style.display = 'block';
}

function hideInfo() {
    document.getElementById('info-box').style.display = 'none';
}

function showStatus(msg, isError) {
    var el = document.getElementById('status-indicator');
    el.textContent = msg;
    el.classList.toggle('error', isError);
}

function openProfileMenu() {
    var msg = '👤 ' + (getUsername() || 'Guest').toUpperCase() +
              '\n\nTier: ' + (_session ? _session.tier : 'MEMBER') +
              '\n\nWinrate: ' + (_session ? _session.winrate : '50') + '%' +
              '\n\nSaldo: ' + formatIDR(getSaldo());
    showModal(msg, 'PROFIL SAYA');
}

function showLogout() {
    if (confirm('Logout?')) {
        AuthAPI.logout();
    }
}

function goTo(url) {
    window.location.href = url;
}

// LOGGING & DEBUG

function logDebug(msg) {
    console.log('[PLINKO] ' + new Date().toLocaleTimeString() + ' - ' + msg);
}

// ════════════════════════════════════════════════════════════════
// SALDO SYNC - REAL-TIME CONNECTION
// ════════════════════════════════════════════════════════════════

async function syncSaldoWithServer() {
    try {
        var u = getUsername();
        if (!u) return;
        
        var data = await callApiSilent('get_saldo', { username: u });
        if (data && data.result === 'SUCCESS') {
            syncSaldoUI(data.saldo);
            logDebug('Saldo synced: ' + data.saldo);
        }
    } catch(e) {
        logDebug('Saldo sync error: ' + e.message);
    }
}

// ════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════

window.addEventListener('DOMContentLoaded', function() {
    if (!requireLogin('login.html')) return;

    setupCanvas();
    
    var user = getUsername();
    if (user) {
        document.getElementById('display-username').textContent = user.substring(0, 10).toUpperCase();
    }

    var saldo = getSaldo();
    syncSaldoUI(saldo);
    
    document.getElementById('current-bet').textContent = formatIDR(GAME_CONFIG.BETS[STATE.betIdx]);
    document.getElementById('bet-minus').disabled = true;
    
    logDebug('Game initialized for user: ' + user);
    logDebug('Initial balance: ' + saldo);
    
    // Auto sync saldo setiap interval
    setInterval(syncSaldoWithServer, GAME_CONFIG.SYNC_INTERVAL);
    
    // Draw loop
    draw();
    
    showStatus('🟢 ONLINE', false);
});

window.addEventListener('beforeunload', function() {
    stopAuto();
});

window.addEventListener('resize', setupCanvas);

// Utility
function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// Pastikan formatIDR ada
if (typeof formatIDR === 'undefined') {
    window.formatIDR = function(num) {
        return new Intl.NumberFormat("id-ID", {
            style: "currency", currency: "IDR", maximumFractionDigits: 0
        }).format(num || 0);
    };
}
