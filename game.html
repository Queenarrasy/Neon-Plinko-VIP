<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP - GAME</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff0077;
            --neon-yellow: #f5e642;
            --bg-dark: #0a0b1e;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* UI Header */
        .game-header {
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        .balance-box {
            background: #000;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
            font-weight: bold;
            color: var(--neon-yellow);
        }

        /* Canvas Container */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 60vh;
            margin-top: 10px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Multiplier Slots UI */
        .multiplier-bar {
            display: flex;
            justify-content: center;
            gap: 4px;
            width: 100%;
            max-width: 480px;
            padding: 0 10px;
            box-sizing: border-box;
            margin-top: -10px;
        }

        .m-slot {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            font-size: 12px;
            font-weight: 900;
            border-radius: 4px;
            background: #1a1b3a;
            border-bottom: 3px solid rgba(0,0,0,0.5);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .m-10 { color: #ff0077; border-color: #ff0077; box-shadow: 0 0 5px #ff007733; }
        .m-3  { color: #00d2ff; border-color: #00d2ff; box-shadow: 0 0 5px #00d2ff33; }
        .m-15 { color: #f5e642; border-color: #f5e642; box-shadow: 0 0 5px #f5e64233; }
        .m-05 { color: #aaa; border-color: #555; }
        .m-02 { color: #666; border-color: #333; }

        /* Animation for hit */
        .hit-flash {
            transform: scale(1.15);
            filter: brightness(1.5);
            box-shadow: 0 0 20px currentColor !important;
        }

        /* Controls */
        .controls {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            margin-top: 20px;
        }

        .input-group {
            display: flex;
            background: #000;
            border-radius: 10px;
            padding: 5px;
            border: 1px solid #333;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        .btn-play {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, var(--neon-pink), #ff00cc);
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 119, 0.4);
            transition: 0.2s;
        }

        .btn-play:active { transform: scale(0.98); }
        .btn-play:disabled { background: #444; box-shadow: none; cursor: not-allowed; }

        .back-link {
            margin-top: 15px;
            color: #777;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <div onclick="location.href='profil.html'"><i class="fa-solid fa-circle-user"></i> <span id="username-display">User</span></div>
        <div class="balance-box" id="display-saldo">IDR 0</div>
    </div>

    <div id="game-container"></div>

    <div class="multiplier-bar">
        <div class="m-slot m-10" id="slot-0">10x</div>
        <div class="m-slot m-3" id="slot-1">3x</div>
        <div class="m-slot m-15" id="slot-2">1.5x</div>
        <div class="m-slot m-05" id="slot-3">0.5x</div>
        <div class="m-slot m-02" id="slot-4">0.2x</div>
        <div class="m-slot m-05" id="slot-5">0.5x</div>
        <div class="m-slot m-15" id="slot-6">1.5x</div>
        <div class="m-slot m-3" id="slot-7">3x</div>
        <div class="m-slot m-10" id="slot-8">10x</div>
    </div>

    <div class="controls">
        <div class="input-group">
            <button style="background:none; border:none; color:var(--neon-blue); padding:0 15px;" onclick="adjustBet(-1000)">-</button>
            <input type="number" id="bet-amount" value="800" min="100">
            <button style="background:none; border:none; color:var(--neon-blue); padding:0 15px;" onclick="adjustBet(1000)">+</button>
        </div>
        <button class="btn-play" id="btn-drop" onclick="dropBall()">LEPAS BOLA</button>
    </div>

    <a href="profil.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Kembali ke Menu</a>

    <script src="global.js"></script>

    <script>
        // Matter.js Setup
        const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;
        const engine = Engine.create();
        const container = document.getElementById('game-container');
        
        const worldWidth = 500;
        const worldHeight = 600;

        const render = Render.create({
            element: container,
            engine: engine,
            options: {
                width: worldWidth,
                height: worldHeight,
                wireframes: false,
                background: 'transparent'
            }
        });

        // Config Permainan
        const ROWS = 8;
        const PEGS = [];
        const MULTS = [10, 3, 1.5, 0.5, 0.2, 0.5, 1.5, 3, 10];
        
        // Buat Papan Paku Piramida
        function createGrid() {
            const spacing = 45;
            const startY = 80;
            
            for (let i = 0; i < ROWS; i++) {
                const rowPegeCount = i + 3;
                const rowWidth = (rowPegeCount - 1) * spacing;
                const startX = (worldWidth - rowWidth) / 2;

                for (let j = 0; j < rowPegeCount; j++) {
                    const x = startX + j * spacing;
                    const y = startY + i * spacing;
                    const peg = Bodies.circle(x, y, 4, {
                        isStatic: true,
                        render: { fillStyle: '#ffffff', strokeStyle: '#ffffff', lineWidth: 2 }
                    });
                    peg.label = 'peg';
                    PEGS.push(peg);
                }
            }
            Composite.add(engine.world, PEGS);
        }

        // Sensor untuk Multiplier
        const sensors = [];
        function createSensors() {
            const sensorCount = 9;
            const width = 45;
            const startX = (worldWidth - (sensorCount * width)) / 2;
            
            for (let i = 0; i < sensorCount; i++) {
                const x = startX + (i * width) + width/2;
                const sensor = Bodies.rectangle(x, worldHeight - 20, width - 5, 40, {
                    isStatic: true,
                    isSensor: true,
                    render: { fillStyle: 'transparent' }
                });
                sensor.multiplierIndex = i;
                sensors.push(sensor);
            }
            Composite.add(engine.world, sensors);
        }

        // Efek Pantulan Paku
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                if (pair.bodyA.label === 'peg' || pair.bodyB.label === 'peg') {
                    const peg = pair.bodyA.label === 'peg' ? pair.bodyA : pair.bodyB;
                    peg.render.fillStyle = '#f5e642'; // Kuning saat kena
                    peg.render.shadowBlur = 10;
                    setTimeout(() => {
                        peg.render.fillStyle = '#ffffff'; // Kembali Putih
                    }, 100);
                }
                
                // Cek Sensor Multiplier
                sensors.forEach((sensor, idx) => {
                    if (pair.bodyA === sensor || pair.bodyB === sensor) {
                        const ball = pair.bodyA === sensor ? pair.bodyB : pair.bodyA;
                        if (ball.label === 'ball' && !ball.processed) {
                            ball.processed = true;
                            handleBallLand(idx, ball);
                        }
                    }
                });
            });
        });

        async function dropBall() {
            const bet = parseInt(document.getElementById('bet-amount').value);
            const currentSaldo = getSaldo();

            if (currentSaldo < bet) {
                showModal('❌', 'SALDO KURANG', 'Silakan deposit terlebih dahulu.', 'error');
                return;
            }

            // Kurangi saldo di UI secara optimis
            const saldoAwalSnapshot = currentSaldo; 
            setSaldo(saldoAwalSnapshot - bet);

            // Buat Bola Fisik
            const ball = Bodies.circle(worldWidth/2 + (Math.random() * 10 - 5), 20, 8, {
                restitution: 0.5,
                friction: 0.001,
                label: 'ball',
                render: { fillStyle: '#ff0077' }
            });
            Composite.add(engine.world, ball);

            // Request ke Server Apps Script
            try {
                const res = await apiCall({
                    action: 'game_play',
                    username: getUsername(),
                    bet: bet,
                    saldoAwal: saldoAwalSnapshot // Kirim saldo awal sebelum bet untuk sinkronisasi server
                });

                if (res.result === 'SUCCESS') {
                    ball.targetMult = res.target_multiplier;
                    ball.serverNewSaldo = res.newSaldo;
                } else {
                    // Jika gagal (misal koneksi), hapus bola dan kembalikan saldo
                    Composite.remove(engine.world, ball);
                    setSaldo(saldoAwalSnapshot);
                    alert(res.message);
                }
            } catch (e) {
                console.error(e);
            }
        }

        function handleBallLand(index, ballBody) {
            const slot = document.getElementById(`slot-${index}`);
            
            // Visual feedback: Berkedip
            slot.classList.add('hit-flash');
            setTimeout(() => slot.classList.remove('hit-flash'), 400);

            // Update Saldo Final dari data server
            if (ballBody.serverNewSaldo) {
                setSaldo(ballBody.serverNewSaldo);
            }

            // Hapus bola setelah masuk
            setTimeout(() => {
                Composite.remove(engine.world, ballBody);
            }, 500);
        }

        function adjustBet(val) {
            const inp = document.getElementById('bet-amount');
            let v = parseInt(inp.value) + val;
            if (v < 200) v = 200;
            inp.value = v;
        }

        // Inisialisasi
        window.onload = async () => {
            await initGame();
            document.getElementById('username-display').textContent = getUsername();
            
            createGrid();
            createSensors();
            
            Render.run(render);
            const runner = Runner.create();
            Runner.run(runner, engine);
        };
    </script>
</body>
</html>
