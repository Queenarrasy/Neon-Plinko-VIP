<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO — VIP PREMIUM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --pink: #ff0077; 
            --blue: #0022ff; 
            --deep-blue: #0044ff; 
            --yellow: #fbff00; 
            --bg: #02030d;
            --gp: 0 0 20px rgba(255, 0, 119, 0.8);
            --gb: 0 0 25px rgba(0, 34, 255, 0.9);
            --gy: 0 0 20px rgba(251, 255, 0, 0.8);
            --gdb: 0 0 20px rgba(0, 68, 255, 0.8);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        #canvas-bg { position: absolute; inset: 0; z-index: 0; }
        .overlay { position: absolute; inset: 0; background: radial-gradient(circle at center, transparent, var(--bg) 95%); z-index: 1; }

        .header { 
            height: 80px; padding: 0 15px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(5, 6, 25, 0.85); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--deep-blue); z-index: 100; box-shadow: var(--gb);
        }
        
        .header-left { display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 60px; }
        .header-left i { font-size: 24px; color: var(--deep-blue); filter: drop-shadow(var(--gdb)); }
        .header-left span { font-size: 8px; font-weight: 900; color: #fff; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

        .balance-box { 
            background: rgba(0,0,0,0.8); border: 1px solid var(--yellow); 
            padding: 5px 12px; border-radius: 50px; box-shadow: var(--gy); text-align: center;
        }
        .balance-label { display: block; font-size: 7px; font-weight: 900; color: var(--yellow); letter-spacing: 1px; }
        #saldo-text { color: #fff; font-weight: 800; font-size: 13px; text-shadow: 0 0 5px #fff; }

        .logo-area-mini { text-align: right; }
        .logo-area-mini h1 { font-family: 'Cinzel Decorative'; font-size: 14px; color: var(--pink); text-shadow: var(--gp); margin: 0; line-height: 1; }
        .logo-area-mini p { font-size: 7px; letter-spacing: 1px; color: var(--deep-blue); font-weight: 900; text-transform: uppercase; }

        #game-area { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; }
        canvas#plinko-canvas { max-height: 52vh; width: 100%; filter: drop-shadow(0 0 15px rgba(0, 34, 255, 0.2)); }

        .multiplier-bar { width: 98%; display: flex; gap: 2px; margin-top: 5px; }
        .m-slot { 
            flex: 1; height: 35px; border-radius: 4px; font-size: 10px; font-weight: 900; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #fff; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s;
        }
        .hit-win { transform: scale(1.2) translateY(-5px); filter: brightness(1.5); box-shadow: var(--gy); z-index: 10; border: 1px solid #fff; }

        .win-notif { 
            margin: 10px 0; height: 40px; width: 85%;
            background: rgba(0,0,0,0.7); border: 1px solid var(--deep-blue); border-radius: 50px;
            display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 10px var(--deep-blue);
        }
        #win-display { font-size: 16px; font-weight: 900; color: rgba(255,255,255,0.1); transition: 0.2s; letter-spacing: 1px; }
        #win-display.active { color: var(--yellow); text-shadow: var(--gy); transform: scale(1.05); }

        .controls { 
            background: rgba(5, 6, 25, 0.95); padding: 15px 20px; border-top: 2px solid var(--deep-blue); 
            border-radius: 25px 25px 0 0; z-index: 100; width: 100%; box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }
        .bet-control { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 12px; }
        .bet-btn { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--deep-blue); background: #000; color: var(--deep-blue); cursor: pointer; box-shadow: var(--gdb); display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.2s; }
        .bet-btn:active { background: var(--deep-blue); color: #fff; }
        .bet-display { font-size: 18px; font-weight: 900; color: var(--yellow); min-width: 110px; text-align: center; text-shadow: var(--gy); }

        .mode-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .m-btn { padding: 10px; border-radius: 10px; border: 1px solid #1a1b3a; background: #000; color: #fff; font-size: 9px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .m-btn.active { border-color: var(--deep-blue); color: var(--deep-blue); box-shadow: inset 0 0 10px rgba(0, 68, 255, 0.3); }
        .m-btn.auto-on { background: var(--pink); border-color: #fff; box-shadow: var(--gp); animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.97); } 100% { transform: scale(1); } }

        .drop-btn { 
            width: 100%; padding: 16px; border-radius: 50px; border: none;
            background: linear-gradient(90deg, var(--deep-blue), var(--pink));
            color: #fff; font-weight: 900; font-size: 15px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; box-shadow: var(--gp);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .stop-btn { background: #ff0000 !important; box-shadow: 0 0 20px #ff0000 !important; }

        .nav-bottom { height: 75px; background: #000; display: flex; border-top: 2px solid var(--deep-blue); padding-bottom: env(safe-area-inset-bottom); }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; gap: 4px; transition: 0.3s; }
        .nav-link i { font-size: 20px; margin-bottom: 2px; }
        .nav-link span { font-size: 9px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
        
        .n-depo { color: var(--yellow); } .n-depo:active { text-shadow: var(--gy); transform: translateY(-3px); }
        .n-wd { color: var(--pink); } .n-wd:active { text-shadow: var(--gp); transform: translateY(-3px); }
        .n-msg { color: var(--deep-blue); } .n-msg:active { text-shadow: var(--gdb); transform: translateY(-3px); }

        #alert-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; backdrop-filter:blur(5px); }
        .alert-box { width:280px; background:#050614; border:2px solid var(--pink); border-radius:25px; padding:30px; text-align:center; box-shadow: var(--gp); }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="overlay"></div>

    <div class="header">
        <div class="header-left" onclick="location.href='profil.html'">
            <i class="fas fa-user-astronaut"></i>
            <span>PROFIL</span>
        </div>
        <div class="header-center">
            <div class="balance-box">
                <span class="balance-label">CREDIT BALANCE</span>
                <span id="saldo-text">IDR 0</span>
            </div>
        </div>
        <div class="logo-area-mini">
            <h1>NEON</h1>
            <p>PLINKO VIP</p>
        </div>
    </div>

    <div id="game-area">
        <canvas id="plinko-canvas"></canvas>
        <div class="multiplier-bar" id="m-bar"></div>
        
        <div class="win-notif">
            <div id="win-display">SYSTEM READY</div>
        </div>
    </div>

    <div class="controls">
        <div class="bet-control">
            <div class="bet-btn" onclick="adjustBet(-1)"><i class="fas fa-minus"></i></div>
            <div class="bet-display" id="bet-amt">400</div>
            <div class="bet-btn" onclick="adjustBet(1)"><i class="fas fa-plus"></i></div>
        </div>
        
        <div class="mode-grid">
            <button class="m-btn active" id="m-norm" onclick="setSpeed('normal')">NORMAL</button>
            <button class="m-btn" id="m-turbo" onclick="setSpeed('turbo')">TURBO</button>
            <button class="m-btn" id="m-auto" onclick="toggleAuto()">AUTO</button>
        </div>

        <button class="drop-btn" id="main-action" onclick="handleMainAction()">DROP NEON BALL</button>
    </div>

    <div class="nav-bottom">
        <a href="deposit.html" class="nav-link n-depo"><i class="fas fa-wallet"></i><span>DEPOSIT</span></a>
        <a href="withdraw.html" class="nav-link n-wd"><i class="fas fa-money-bill-transfer"></i><span>WITHDRAW</span></a>
        <a href="inbox.html" class="nav-link n-msg"><i class="fas fa-gift"></i><span>REWARD</span></a>
    </div>

    <div id="alert-modal">
        <div class="alert-box">
            <i class="fas fa-triangle-exclamation" style="font-size:40px; color:var(--yellow); margin-bottom:15px;"></i>
            <p id="alert-msg" style="font-weight:700; color:#fff; margin-bottom:20px;"></p>
            <button onclick="closeAlert()" style="width:100%; padding:12px; background:var(--pink); border:none; color:#fff; border-radius:50px; font-weight:900;">CONFIRM</button>
        </div>
    </div>

<script>
    const SUPA_URL = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
    const SUPA_KEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani"; 
    const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

    const user = localStorage.getItem('user_session');
    const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;
    
    const engine = Engine.create({ gravity: { y: 1.5 } });
    
    const BETS = [400, 800, 1000, 1200, 1600, 1800, 2000, 4000, 6000, 8000, 10000, 12000, 16000, 18000, 20000];
    
    let bIdx = 0, balance = 0, sessionWin = 0;
    let autoMode = false, turboMode = false, timer = null;

    const multis = [10, 5, 2, 0.5, 0.2, 0.2, 0.5, 2, 5, 10];
    const mColors = ['#ff0077', '#ff0077', '#0022ff', '#0044ff', '#050614', '#050614', '#0044ff', '#0022ff', '#ff0077', '#ff0077'];

    const aCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(f, d) {
        const o = aCtx.createOscillator(); const g = aCtx.createGain();
        o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.01, aCtx.currentTime + d);
        o.connect(g); g.connect(aCtx.destination); o.start(); o.stop(aCtx.currentTime + d);
    }

    async function init() {
        if(!user) return location.href='index.html';
        const { data } = await _supa.from('profiles').select('saldo').eq('username', user).single();
        if(data) { balance = data.saldo; refreshUI(); }
        setupPlinko();
        drawStars();
        updateMultiplierLabels();
    }

    function refreshUI() { 
        document.getElementById('saldo-text').innerText = "IDR " + Math.floor(balance).toLocaleString(); 
    }

    function updateMultiplierLabels() {
        const bar = document.getElementById('m-bar');
        bar.innerHTML = "";
        multis.forEach((v, i) => {
            const slot = document.createElement('div');
            slot.className = 'm-slot'; slot.id = 's-' + i; 
            slot.style.background = mColors[i];
            slot.innerHTML = `X${v}`;
            bar.appendChild(slot);
        });
    }

    function setupPlinko() {
        const cvs = document.getElementById('plinko-canvas');
        const render = Render.create({ canvas: cvs, engine: engine, options: { width: 400, height: 500, wireframes: false, background: 'transparent' } });

        for (let r = 0; r < 9; r++) {
            let pCount = r + 3;
            for (let c = 0; c < pCount; c++) {
                let x = 200 + (c - pCount / 2 + 0.5) * 36;
                let y = 80 + r * 42;
                Composite.add(engine.world, Bodies.circle(x, y, 3.5, { isStatic: true, render: { fillStyle: '#fff' }, label: 'pin' }));
            }
        }

        multis.forEach((v, i) => {
            const sensor = Bodies.rectangle(38 + i * 36, 485, 30, 40, { isStatic: true, isSensor: true, label: `win_${v}_${i}`, render: { visible: false } });
            Composite.add(engine.world, sensor);
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);

        Events.on(engine, 'collisionStart', (e) => {
            e.pairs.forEach(p => {
                if(p.bodyA.label === 'pin' || p.bodyB.label === 'pin') beep(400, 0.05);
                if(p.bodyA.label === 'ball' && p.bodyB.label.startsWith('win_')) calcWin(p.bodyA, p.bodyB.label);
                else if(p.bodyB.label === 'ball' && p.bodyA.label.startsWith('win_')) calcWin(p.bodyB, p.bodyA.label);
            });
        });
    }

    async function dropBall() {
        const bet = BETS[bIdx];
        if(balance < bet) { stopAuto(); return showAlert("SALDO TIDAK CUKUP!"); }

        const { data: p } = await _supa.from('profiles').select('*').eq('username', user).single();
        let wr = p.winrate || 30;
        let limit = p.maxwin_limit || 100000;
        if(p.panic_mode === true) wr = 5; 
        if(sessionWin >= limit || balance >= limit) wr = 5; 

        balance -= bet;
        refreshUI();
        await _supa.from('profiles').update({ saldo: balance }).eq('username', user);

        const ball = Bodies.circle(200 + (Math.random()*6-3), 20, 8, { 
            label: 'ball', restitution: 0.5, friction: 0.01,
            render: { fillStyle: '#ff0077', strokeStyle: '#fff', lineWidth: 2 } 
        });

        let xForce = (Math.random() - 0.5) * 2;
        if(Math.random() * 100 < wr) xForce = (Math.random() > 0.5 ? 3.5 : -3.5);

        Body.setVelocity(ball, { x: xForce, y: 0 });
        Composite.add(engine.world, ball);
        beep(800, 0.1);

        setTimeout(() => { if(Composite.allBodies(engine.world).includes(ball)) Composite.remove(engine.world, ball); }, 7000);
    }

    async function calcWin(ball, label) {
        if(ball.used) return; ball.used = true;
        const info = label.split('_');
        const m = parseFloat(info[1]);
        const idx = info[2];
        const win = Math.floor(BETS[bIdx] * m);

        balance += win;
        sessionWin += (win - BETS[bIdx]);
        refreshUI();

        const disp = document.getElementById('win-display');
        disp.innerText = `(X${m}) ${win.toLocaleString()}`;
        disp.className = 'active';
        
        const s = document.getElementById('s-' + idx);
        if(s) {
            s.classList.add('hit-win');
            setTimeout(() => { s.classList.remove('hit-win'); disp.className = ''; }, 600);
        }

        if(m >= 1) beep(1200, 0.2);
        Composite.remove(engine.world, ball);
        await _supa.from('profiles').update({ saldo: balance }).eq('username', user);
    }

    function adjustBet(d) { 
        if(autoMode) return; 
        beep(600, 0.05); 
        bIdx = Math.max(0, Math.min(BETS.length-1, bIdx+d)); 
        document.getElementById('bet-amt').innerText = BETS[bIdx].toLocaleString(); 
    }
    
    function setSpeed(s) {
        beep(500, 0.05);
        turboMode = (s === 'turbo');
        document.getElementById('m-norm').classList.toggle('active', s === 'normal');
        document.getElementById('m-turbo').classList.toggle('active', s === 'turbo');
        if(autoMode) { clearInterval(timer); timer = setInterval(dropBall, turboMode ? 400 : 1000); }
    }

    function toggleAuto() {
        beep(700, 0.1);
        autoMode = !autoMode;
        const btn = document.getElementById('m-auto');
        const main = document.getElementById('main-action');
        if(autoMode) {
            btn.classList.add('auto-on');
            main.innerText = "STOP AUTO DROP";
            main.classList.add('stop-btn');
            timer = setInterval(dropBall, turboMode ? 400 : 1000);
        } else stopAuto();
    }

    function stopAuto() {
        autoMode = false; clearInterval(timer);
        document.getElementById('m-auto').classList.remove('auto-on');
        document.getElementById('main-action').innerText = "DROP NEON BALL";
        document.getElementById('main-action').classList.remove('stop-btn');
    }

    function handleMainAction() { if(autoMode) stopAuto(); else dropBall(); }
    function showAlert(m) { document.getElementById('alert-msg').innerText = m; document.getElementById('alert-modal').style.display = 'flex'; }
    function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }

    function drawStars() {
        const c = document.getElementById('canvas-bg'); const x = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let s = [];
        for(let i=0; i<100; i++) s.push({x:Math.random()*c.width, y:Math.random()*c.height, r:Math.random()*1.5});
        function anim() {
            x.clearRect(0,0,c.width,c.height); x.fillStyle="#fff";
            s.forEach(p => { x.beginPath(); x.arc(p.x, p.y, p.r, 0, Math.PI*2); x.fill(); p.y+=0.5; if(p.y>c.height) p.y=0; });
            requestAnimationFrame(anim);
        }
        anim();
    }

    window.onload = init;
</script>
</body>
</html>
