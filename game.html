<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO — AR PREMIUM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --pink: #ff0077; --blue: #0022ff; --yellow: #fbff00; --bg: #02030d;
            --gp: 0 0 20px rgba(255, 0, 119, 0.8);
            --gy: 0 0 15px rgba(251, 255, 0, 0.6);
            --gb: 0 0 15px rgba(0, 34, 255, 0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Header Re-Layout */
        .header { 
            height: 90px; padding: 10px 15px; display: flex; align-items: center; 
            background: linear-gradient(180deg, rgba(5,6,20,1) 0%, transparent 100%);
            border-bottom: 1px solid rgba(0, 34, 255, 0.2); z-index: 100;
        }
        .header-left { flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .header-center { flex: 2; display: flex; flex-direction: column; align-items: center; }
        .header-right { flex: 1; display: flex; justify-content: flex-end; }

        .header-left i { font-size: 28px; color: var(--pink); filter: drop-shadow(var(--gp)); }
        .header-left span { font-size: 10px; font-weight: 800; color: var(--pink); margin-top: 4px; letter-spacing: 1px; }

        .saldo-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.6); margin-bottom: 4px; letter-spacing: 1px; }
        .balance-box { 
            background: rgba(0,0,0,0.8); border: 1px solid var(--yellow); 
            padding: 8px 15px; border-radius: 15px; box-shadow: var(--gy);
            min-width: 150px; text-align: center;
        }
        #saldo-text { color: var(--yellow); font-weight: 800; font-size: 15px; text-shadow: var(--gy); }
        
        .logo-main { font-family: 'Cinzel Decorative'; color: var(--blue); font-size: 18px; font-weight: 900; text-shadow: var(--gb); line-height: 1; text-align: right; }
        .logo-main span { color: var(--pink); text-shadow: var(--gp); font-size: 22px; }

        /* Game Area */
        #game-area { flex: 1; position: relative; display: flex; justify-content: center; overflow: hidden; margin-top: -10px; }
        #board-wrapper { position: relative; width: 100%; max-width: 380px; height: 100%; display: flex; flex-direction: column; align-items: center; }
        canvas { max-height: 85%; }
        
        /* Multiplier Slots */
        .m-bar { width: 95%; display: flex; justify-content: center; gap: 3px; padding-bottom: 20px; }
        .m-slot { 
            flex: 1; height: 32px; border-radius: 5px; font-size: 9px; font-weight: 900; 
            display: flex; align-items: center; justify-content: center; color: #fff;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* Controls Area */
        .controls { background: #050614; padding: 15px; border-top: 1px solid var(--blue); border-radius: 25px 25px 0 0; }
        .bet-row { display: flex; justify-content: center; align-items: center; margin-bottom: 12px; gap: 20px; }
        .bet-val { font-size: 26px; font-weight: 900; color: var(--yellow); font-family: 'Cinzel Decorative'; text-shadow: var(--gy); min-width: 100px; text-align: center; }
        .bet-btn-circ { 
            width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--blue);
            display: flex; align-items: center; justify-content: center; color: var(--blue); 
            font-size: 16px; background: rgba(0,34,255,0.05); cursor: pointer; box-shadow: var(--gb);
        }

        .mode-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .mode-btn { 
            flex: 1; padding: 10px; border-radius: 12px; border: 1px solid rgba(0, 34, 255, 0.4); 
            background: transparent; color: #fff; font-size: 10px; font-weight: 800; letter-spacing: 1px;
        }
        .mode-btn.active { background: var(--blue); box-shadow: var(--gb); border-color: var(--blue); }
        .mode-btn.auto-active { background: var(--pink); border-color: #fff; animation: glow-p 1s infinite alternate; }

        .btn-drop { 
            width: 100%; padding: 15px; border-radius: 50px; border: none; 
            background: linear-gradient(90deg, var(--blue), var(--pink)); 
            color: #fff; font-family: 'Cinzel Decorative'; font-weight: 900; 
            font-size: 18px; box-shadow: var(--gp); cursor: pointer;
        }

        /* Bottom Navigation */
        .nav-bar { height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { text-decoration: none; text-align: center; font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.4); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 5px; }
        
        .nav-item.n-depo i { color: var(--yellow); }
        .nav-item.n-wd i { color: var(--pink); }
        .nav-item.n-play i { color: var(--blue); }
        .nav-item.n-reward i { color: #f5a623; } /* Orange/Gold Hadiah */
        
        .nav-item.active { color: #fff; }
        .nav-item.active i { filter: drop-shadow(0 0 5px currentColor); transform: scale(1.1); }

        @keyframes glow-p { from { box-shadow: 0 0 5px var(--pink); } to { box-shadow: 0 0 15px var(--pink); } }
        .f-score { position: absolute; font-weight: 900; font-size: 22px; animation: floatUp 0.8s ease-out forwards; pointer-events: none; z-index: 100; text-shadow: 0 2px 10px #000; }
        @keyframes floatUp { from { transform: translateY(0) scale(1); opacity: 1; } to { transform: translateY(-100px) scale(1.3); opacity: 0; } }

        /* Alert */
        #custom-alert { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .alert-box { width: 80%; max-width: 300px; background: #050614; border: 2px solid var(--pink); border-radius: 20px; padding: 25px; text-align: center; box-shadow: var(--gp); }
        .alert-btn { width: 100%; background: var(--blue); border: none; color: #fff; padding: 12px; border-radius: 50px; margin-top: 20px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="snd-click" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b417f73c.mp3"></audio>
    <audio id="snd-drop" src="https://cdn.pixabay.com/audio/2022/03/10/audio_5072782f94.mp3"></audio>
    <audio id="snd-win" src="https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3"></audio>

    <div id="custom-alert">
        <div class="alert-box">
            <i class="fas fa-exclamation-circle" style="font-size: 40px; color: var(--yellow); margin-bottom: 15px;"></i>
            <div id="a-msg" style="color: #fff; font-size: 14px;"></div>
            <button class="alert-btn" onclick="closeAlert()">MENGERTI</button>
        </div>
    </div>

    <div class="header">
        <div class="header-left" onclick="location.href='profil.html'">
            <i class="fas fa-user-circle"></i>
            <span>PROFIL</span>
        </div>
        <div class="header-center">
            <span class="saldo-label">SALDO UTAMA</span>
            <div class="balance-box">
                <span id="saldo-text">IDR 0</span>
            </div>
        </div>
        <div class="header-right">
            <div class="logo-main">NEON<br><span>PLINKO</span></div>
        </div>
    </div>

    <div id="game-area">
        <div id="board-wrapper">
            <canvas id="canvas"></canvas>
            <div class="m-bar" id="m-bar"></div>
        </div>
    </div>

    <div class="controls">
        <div class="bet-row">
            <div class="bet-btn-circ" onclick="changeBet(-1)"><i class="fas fa-minus"></i></div>
            <div class="bet-val" id="bet-display">400</div>
            <div class="bet-btn-circ" onclick="changeBet(1)"><i class="fas fa-plus"></i></div>
        </div>
        <div class="mode-row">
            <button class="mode-btn active" id="btn-normal" onclick="setMode('normal')">NORMAL</button>
            <button class="mode-btn" id="btn-turbo" onclick="setMode('turbo')">TURBO</button>
            <button class="mode-btn" id="btn-auto" onclick="toggleAuto()">AUTO</button>
        </div>
        <button class="btn-drop" id="btn-action" onclick="handleAction()">DROP BALL</button>
    </div>

    <div class="nav-bar">
        <a href="deposit.html" class="nav-item n-depo"><i class="fas fa-wallet"></i>DEPOSIT</a>
        <a href="withdraw.html" class="nav-item n-wd"><i class="fas fa-university"></i>WITHDRAW</a>
        <a href="game.html" class="nav-item n-play active"><i class="fas fa-play-circle"></i>PLAY</a>
        <a href="reward.html" class="nav-item n-reward"><i class="fas fa-box-open"></i>REWARD</a>
    </div>

<script>
    const SUPA_URL = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
    const SUPA_KEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani"; 
    const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

    const username = localStorage.getItem('user_session');
    const { Engine, Render, Runner, Bodies, Composite, Body } = Matter;
    
    const engine = Engine.create({ gravity: { y: 1.6 } });
    const BET_LIST = [400, 800, 1000, 1200, 1400, 1600, 1800, 2000, 4000, 6000, 8000, 10000];
    let betIdx = 0, balance = 0, winrate = 30, maxWinLimit = 1000000;
    let isAuto = false, isTurbo = false, autoTimer = null;

    const multis = [10, 5, 2, 0.5, 0.2, 0.2, 0.5, 2, 5, 10];
    const colors = ['#ff0077', '#0022ff', '#0044ff', '#1a1b3a', '#050614', '#050614', '#1a1b3a', '#0044ff', '#0022ff', '#ff0077'];

    function playSound(id) {
        const s = document.getElementById(id);
        if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
    }

    async function checkUser() {
        if(!username) { location.href='index.html'; return; }
        const { data } = await _supa.from('profiles').select('*').eq('username', username).single();
        if(data) {
            balance = data.saldo;
            winrate = data.winrate;
            maxWinLimit = data.max_win_limit;
            document.getElementById('saldo-text').innerText = "IDR " + balance.toLocaleString();
        }
    }

    function setupBoard() {
        const canvas = document.getElementById('canvas');
        const render = Render.create({
            canvas: canvas, engine: engine,
            options: { width: 380, height: 460, wireframes: false, background: 'transparent' }
        });

        // Pegs (Piramida Presisi)
        for (let r = 0; r < 9; r++) {
            let pins = r + 3;
            for (let c = 0; c < pins; c++) {
                let x = 190 + (c - pins / 2 + 0.5) * 34;
                let y = 60 + r * 40;
                Composite.add(engine.world, Bodies.circle(x, y, 3.5, { 
                    isStatic: true, restitution: 0.8, friction: 0.05,
                    render: { fillStyle: '#fff' } 
                }));
            }
        }

        // Multiplier Sensors
        multis.forEach((v, i) => {
            const slot = document.createElement('div');
            slot.className = 'm-slot';
            slot.style.background = colors[i];
            slot.style.boxShadow = `inset 0 0 10px ${colors[i]}`;
            slot.innerText = 'x' + v;
            document.getElementById('m-bar').appendChild(slot);
            
            const sensor = Bodies.rectangle(35 + i * 34.5, 450, 30, 20, { 
                isStatic: true, isSensor: true, label: 'm_'+v, render: { visible: false } 
            });
            Composite.add(engine.world, sensor);
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    }

    async function spawnBall() {
        const currentBet = BET_LIST[betIdx];
        if(balance < currentBet) { stopAuto(); showAlert("Saldo tidak mencukupi!"); return; }

        playSound('snd-drop');
        balance -= currentBet;
        document.getElementById('saldo-text').innerText = "IDR " + balance.toLocaleString();

        let startX = 190 + (Math.random() * 4 - 2);
        const ball = Bodies.circle(startX, 15, 7.5, {
            restitution: 0.5, friction: 0.01, frictionAir: 0.025,
            render: { fillStyle: 'var(--yellow)', shadowBlur: 10, shadowColor: 'var(--yellow)' }
        });
        
        Body.setVelocity(ball, { x: (Math.random() - 0.5) * 1.5, y: 0 });
        Composite.add(engine.world, ball);

        const check = setInterval(async () => {
            if(ball.position.y > 440) {
                clearInterval(check);
                const sensors = Composite.allBodies(engine.world).filter(b => b.label?.startsWith('m_'));
                let nearest = sensors[0], minD = 1000;
                sensors.forEach(s => {
                    let d = Math.abs(s.position.x - ball.position.x);
                    if(d < minD) { minD = d; nearest = s; }
                });

                let m = parseFloat(nearest.label.split('_')[1]);
                let win = Math.floor(currentBet * m);
                
                if(win > maxWinLimit) win = Math.floor(currentBet * 0.2); 
                if(win > 0) playSound('snd-win');

                balance += win;
                Composite.remove(engine.world, ball);
                showScore(ball.position.x, win, m);
                await _supa.from('profiles').update({ saldo: balance }).eq('username', username);
            }
        }, 100);
    }

    function showScore(x, amt, m) {
        const el = document.createElement('div');
        el.className = 'f-score';
        el.style.left = x + 'px'; el.style.bottom = '100px';
        el.style.color = m >= 1 ? 'var(--yellow)' : 'var(--pink)';
        el.innerText = (m >= 1 ? "+" : "") + amt.toLocaleString();
        document.getElementById('board-wrapper').appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    function changeBet(d) {
        playSound('snd-click');
        betIdx = Math.max(0, Math.min(BET_LIST.length - 1, betIdx + d));
        document.getElementById('bet-display').innerText = BET_LIST[betIdx].toLocaleString();
    }

    function setMode(m) {
        playSound('snd-click');
        isTurbo = (m === 'turbo');
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+m).classList.add('active');
    }

    function toggleAuto() {
        playSound('snd-click');
        isAuto = !isAuto;
        const btn = document.getElementById('btn-auto');
        if(isAuto) {
            btn.classList.add('auto-active');
            autoTimer = setInterval(spawnBall, isTurbo ? 400 : 900);
        } else stopAuto();
    }

    function stopAuto() { 
        isAuto = false; clearInterval(autoTimer); 
        document.getElementById('btn-auto').classList.remove('auto-active'); 
    }

    function handleAction() { if(isAuto) stopAuto(); else spawnBall(); }
    function showAlert(m) { document.getElementById('a-msg').innerText = m; document.getElementById('custom-alert').style.display = 'flex'; }
    function closeAlert() { playSound('snd-click'); document.getElementById('custom-alert').style.display = 'none'; }

    window.onload = () => { setupBoard(); checkUser(); };
</script>
</body>
</html>
