<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP — 3D ENGINE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&family=Cinzel+Decorative:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        :root { 
            --pink: #ff0077; --blue: #00d4ff; --yellow: #f5e642; --bg: #02030d;
            --shadow-blue: 0 0 20px rgba(0, 212, 255, 0.6), inset 0 0 10px rgba(0, 212, 255, 0.4);
            --shadow-pink: 0 0 20px rgba(255, 0, 119, 0.6), inset 0 0 10px rgba(255, 0, 119, 0.4);
        }

        body { 
            background: var(--bg); color: white; font-family: 'Outfit', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh;
            background: radial-gradient(circle at center, #0a0c1f 0%, #02030d 100%);
        }

        /* --- 3D PERSPECTIVE CONTAINER --- */
        #main-stage {
            perspective: 1000px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- TOP BAR (GLASS) --- */
        .top-bar {
            width: 90%; margin-top: 15px; padding: 12px 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- 3D GAME BOARD --- */
        #game-container {
            position: relative;
            width: 100%; max-width: 500px;
            height: 65vh;
            margin-top: 20px;
            transform: rotateX(15deg); /* Efek miring 3D */
            background: rgba(0, 212, 255, 0.02);
            border-radius: 30px;
            border: 2px solid rgba(0, 212, 255, 0.1);
            box-shadow: inset 0 0 50px rgba(0, 212, 255, 0.05);
        }

        #game-canvas { width: 100%; height: 100%; }

        /* --- MULTIPLIER SLOTS (3D LOOK) --- */
        .slot-container {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: center; gap: 5px; padding: 0 10px;
        }
        .slot {
            flex: 1; height: 35px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800;
            text-shadow: 0 0 5px black;
            transform: translateZ(20px);
            border-bottom: 4px solid rgba(0,0,0,0.5); /* Shadow bawah biar 3D */
        }

        /* --- CONTROLS --- */
        .controls {
            position: fixed; bottom: 85px; width: 100%;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .bet-card {
            background: #050614; padding: 10px 25px; border-radius: 50px;
            border: 1px solid var(--blue); box-shadow: var(--shadow-blue);
            display: flex; align-items: center; gap: 20px;
        }
        .bet-card input {
            background: none; border: none; color: white; font-size: 20px;
            font-weight: 800; width: 80px; text-align: center; outline: none;
        }

        .drop-btn {
            background: linear-gradient(180deg, var(--pink) 0%, #b30054 100%);
            border: none; padding: 18px 60px; color: white; font-weight: 900;
            border-radius: 20px; cursor: pointer; font-size: 18px;
            box-shadow: 0 8px 0 #7a003a, 0 15px 25px rgba(255, 0, 119, 0.4);
            transition: 0.1s; transform: translateY(0);
        }
        .drop-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #7a003a, 0 10px 15px rgba(255, 0, 119, 0.4);
        }

        /* --- NAV BAR --- */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: rgba(5,6,20,0.9); border-top: 1px solid rgba(255,255,255,0.05);
            display: grid; grid-template-columns: repeat(5, 1fr); align-items: center;
            backdrop-filter: blur(20px);
        }
        .nav-item { text-align: center; color: rgba(255,255,255,0.3); text-decoration: none; font-size: 11px; font-weight: 600; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--blue); }

        /* --- POPUP WIN --- */
        #win-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .win-box {
            background: #050614; padding: 40px; border-radius: 30px;
            border: 2px solid var(--yellow); box-shadow: 0 0 50px rgba(245, 230, 66, 0.2);
            text-align: center;
        }
    </style>
</head>
<body>

<div id="main-stage">
    <div class="top-bar">
        <div style="font-family:'Cinzel Decorative'; color:var(--pink); font-size:20px; text-shadow:0 0 10px var(--pink)">NEON</div>
        <div style="background:rgba(0,0,0,0.5); padding:8px 20px; border-radius:30px; border:1px solid var(--blue)">
            <span style="font-size:10px; color:var(--blue); display:block; line-height:1">BALANCE</span>
            <span id="display-saldo" style="font-weight:800; font-size:16px">IDR 0</span>
        </div>
    </div>

    <div id="game-container">
        <canvas id="game-canvas"></canvas>
    </div>
</div>

<div class="controls">
    <div class="bet-card">
        <i class="fa-solid fa-minus" style="color:var(--blue)" onclick="adjBet(-5000)"></i>
        <input type="number" id="bet-amt" value="5000" readonly>
        <i class="fa-solid fa-plus" style="color:var(--blue)" onclick="adjBet(5000)"></i>
    </div>
    <button class="drop-btn" onclick="dropBall()">DROP BALL</button>
</div>

<nav class="nav-bar">
    <a href="deposit.html" class="nav-item"><i class="fa-solid fa-plus-circle"></i>Deposit</a>
    <a href="withdraw.html" class="nav-item"><i class="fa-solid fa-hand-holding-dollar"></i>WD</a>
    <a href="game.html" class="nav-item active"><i class="fa-solid fa-gamepad"></i>Play</a>
    <a href="reward.html" class="nav-item"><i class="fa-solid fa-trophy"></i>Reward</a>
    <a href="profil.html" class="nav-item"><i class="fa-solid fa-user"></i>Profil</a>
</nav>

<div id="win-modal">
    <div class="win-box">
        <i class="fa-solid fa-crown" style="font-size:60px; color:var(--yellow); margin-bottom:20px"></i>
        <h3 style="color:var(--yellow); letter-spacing:5px">BIG WIN</h3>
        <h1 id="win-total" style="font-size:40px; margin:10px 0">IDR 0</h1>
        <button onclick="closeWin()" class="drop-btn" style="padding:10px 40px">COLLECT</button>
    </div>
</div>

<audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    const engine = Engine.create();
    const world = engine.world;
    let isDropping = false;

    async function init() {
        const user = localStorage.getItem('user_neon');
        const { data } = await _supabase.from('profiles').select('*').eq('username', user).single();
        document.getElementById('display-saldo').innerText = "IDR " + data.saldo.toLocaleString();
        
        const canvas = document.getElementById('game-canvas');
        const render = Render.create({
            canvas: canvas, engine: engine,
            options: { width: 500, height: 600, wireframes: false, background: 'transparent' }
        });

        // 3D EFFECT PINS (Glossy Circles)
        const rows = 10;
        for (let r = 0; r < rows; r++) {
            let pins = r + 3;
            for (let c = 0; c < pins; c++) {
                let x = 250 + (c - pins / 2 + 0.5) * 45;
                let y = 80 + r * 45;
                let pin = Bodies.circle(x, y, 6, { 
                    isStatic: true,
                    render: { 
                        fillStyle: '#ffffff',
                        strokeStyle: '#00d4ff',
                        lineWidth: 2
                    }
                });
                Composite.add(world, pin);
            }
        }

        // MULTIPLIERS
        const multipliers = [10, 5, 2, 0.5, 0.2, 0.5, 2, 5, 10];
        multipliers.forEach((val, i) => {
            let x = 50 + i * 50;
            let sensor = Bodies.rectangle(x, 560, 40, 30, {
                isStatic: true, isSensor: true, label: 'm_' + val,
                render: { fillStyle: val >= 1 ? '#ff0077' : '#1a1b2e' }
            });
            Composite.add(world, sensor);
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    }

    async function dropBall() {
        if(isDropping) return;
        const bet = parseInt(document.getElementById('bet-amt').value);
        const user = localStorage.getItem('user_neon');
        
        const { data } = await _supabase.from('profiles').select('*').eq('username', user).single();
        if(data.saldo < bet) return alert("Saldo Kurang!");

        isDropping = true;
        await _supabase.from('profiles').update({ saldo: data.saldo - bet }).eq('username', user);
        updateUI();

        // LOGIC WINRATE MASTER (Silent Bias)
        let wr = data.winrate;
        let startX = 250 + (Math.random() * 10 - 5);
        if(wr > 75) startX = (Math.random() > 0.5) ? 200 : 300; // Arahkan ke pinggir (x10)

        const ball = Bodies.circle(startX, 20, 10, {
            restitution: 0.5, friction: 0.02,
            render: { 
                fillStyle: '#f5e642',
                strokeStyle: '#fff',
                lineWidth: 3
            }
        });
        Composite.add(world, ball);

        Events.on(engine, 'collisionStart', (e) => {
            e.pairs.forEach(p => {
                if(p.bodyA === ball || p.bodyB === ball) {
                    document.getElementById('snd-hit').currentTime = 0;
                    document.getElementById('snd-hit').play().catch(()=>{});
                }
            });
        });

        const check = setInterval(async () => {
            if(ball.position.y > 540) {
                clearInterval(check);
                const bodies = Composite.allBodies(world);
                const sensors = bodies.filter(b => b.label?.startsWith('m_'));
                let target = sensors[0];
                let min = 1000;
                sensors.forEach(s => {
                    let d = Math.abs(s.position.x - ball.position.x);
                    if(d < min) { min = d; target = s; }
                });

                const mult = parseFloat(target.label.split('_')[1]);
                const win = Math.floor(bet * mult);
                Composite.remove(world, ball);
                
                const { data: p } = await _supabase.from('profiles').select('saldo').eq('username', user).single();
                await _supabase.from('profiles').update({ saldo: p.saldo + win }).eq('username', user);
                
                if(win > 0) {
                    document.getElementById('win-total').innerText = "IDR " + win.toLocaleString();
                    document.getElementById('win-modal').style.display = 'flex';
                } else {
                    isDropping = false;
                }
                updateUI();
            }
        }, 100);
    }

    async function updateUI() {
        const user = localStorage.getItem('user_neon');
        const { data } = await _supabase.from('profiles').select('saldo').eq('username', user).single();
        document.getElementById('display-saldo').innerText = "IDR " + data.saldo.toLocaleString();
    }

    function closeWin() { 
        document.getElementById('win-modal').style.display = 'none'; 
        isDropping = false;
    }

    function adjBet(n) {
        let b = document.getElementById('bet-amt');
        let v = parseInt(b.value) + n;
        if(v < 5000) v = 5000;
        b.value = v;
    }

    init();
</script>

</body>
</html>
