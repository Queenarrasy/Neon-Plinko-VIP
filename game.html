<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --pink: #ff0077; --blue: #0044ff; --yellow: #f5e642; --dark-blue: #050614; --bg: #02030d; --gp: 0 0 15px rgba(255, 0, 119, 0.7); --gb: 0 0 20px rgba(0, 68, 255, 0.8); --gy: 0 0 15px rgba(245, 230, 66, 0.7); --header-h: 60px; --slot-h: 42px; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; }

/* Header */
.header { height: var(--header-h); background: rgba(2, 3, 13, 0.95); border-bottom: 2px solid var(--blue); box-shadow: var(--gb); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; z-index: 100; }
.profile-btn { color: var(--blue); font-size: 24px; text-shadow: var(--gb); cursor: pointer; }
.balance-container { background: rgba(0, 0, 0, 0.6); border: 1px solid var(--pink); border-radius: 12px; padding: 5px 20px; text-align: center; box-shadow: inset 0 0 10px rgba(255, 0, 119, 0.3); }
#display-saldo { font-family: 'Cinzel Decorative', serif; font-size: 18px; color: var(--yellow); text-shadow: var(--gy); font-weight: 900; }

/* Game Board */
#board-wrapper { flex: 1; position: relative; background: radial-gradient(circle at center, #070a24 0%, #02030d 100%); overflow: hidden; display: flex; flex-direction: column; }
#plinko-canvas { flex: 1; display: block; width: 100%; }
#floating-score { position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--blue); border-radius: 8px; padding: 5px; width: 95px; box-shadow: var(--gb); z-index: 20; }
.score-entry { font-size: 10px; border-bottom: 1px solid rgba(0, 68, 255, 0.3); padding: 3px 0; text-align: center; color: var(--pink); animation: slideIn 0.3s ease-out; }

/* Slot Row Fix */
.multiplier-row { height: var(--slot-h); display: flex; width: 100%; padding: 0 2px; margin-top: -5px; z-index: 10; gap: 2px; }
.slot { flex: 1; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; transition: all 0.15s ease; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
.s-high { background: var(--pink); color: #fff; }
.s-mid { background: var(--yellow); color: #000; }
.s-low { background: var(--blue); color: #fff; }
.slot.active { transform: translateY(-8px) scale(1.1); filter: brightness(1.8); box-shadow: 0 0 25px #fff; border: 2px solid #fff; }

/* Controls */
.controls { padding: 15px 15px 35px 15px; background: linear-gradient(to top, #02030d 20%, #0a0b1e 100%); border-top: 2px solid var(--blue); display: flex; flex-direction: column; gap: 10px; box-shadow: 0 -10px 20px rgba(0, 68, 255, 0.2); }
.mode-row { display: flex; gap: 8px; }
.btn-mode { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--blue); background: rgba(0, 68, 255, 0.1); color: var(--blue); font-size: 10px; font-weight: bold; cursor: pointer; }
.btn-mode.active { background: var(--blue); color: #fff; box-shadow: var(--gb); }
.bet-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0, 68, 255, 0.08); border-radius: 12px; padding: 6px 15px; border: 1px solid var(--blue); }
.bet-btn { background: none; border: none; color: var(--pink); font-size: 26px; cursor: pointer; text-shadow: var(--gp); }
#current-bet { font-family: 'Cinzel Decorative'; font-size: 20px; color: var(--yellow); text-shadow: var(--gy); }
.btn-play { width: 100%; padding: 16px; border-radius: 12px; border: none; font-family: 'Cinzel Decorative'; font-weight: 900; font-size: 18px; color: #fff; cursor: pointer; background: linear-gradient(90deg, var(--blue), var(--pink)); box-shadow: var(--gb); transition: 0.3s; }
.nav-bottom { display: flex; gap: 8px; }
.nav-btn { flex: 1; padding: 8px; text-align: center; border-radius: 8px; text-decoration: none; font-size: 9px; font-weight: bold; border: 1px solid var(--blue); color: #fff; background: rgba(0, 68, 255, 0.15); display: flex; flex-direction: column; align-items: center; gap: 4px; }
.nav-btn i { font-size: 12px; color: var(--blue); }

#modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; backdrop-filter: blur(3px); }
#neon-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background: #050614; border: 2px solid var(--blue); border-radius: 15px; padding: 25px; text-align: center; z-index:1001; box-shadow: var(--gb); width: 85%; }

@keyframes slideIn { from { opacity:0; transform:translateX(10px); } to { opacity:1; transform:translateX(0); } }
</style>
</head>
<body>

<audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
<audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>
<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

<div id="modal-overlay"></div>
<div id="neon-modal">
  <div class="modal-title" style="font-family:'Cinzel Decorative'; color:var(--blue); margin-bottom:15px;"><i class="fa-solid fa-triangle-exclamation"></i> SYSTEM ALERT</div>
  <p id="modal-msg" style="color:#ddeeff; margin-bottom:20px; font-size:14px;"></p>
  <button class="btn-mode active" onclick="closeModal()" style="width:120px; margin: 0 auto;">OK</button>
</div>

<div class="header">
  <div class="profile-btn" onclick="location.href='profil.html'"><i class="fa-solid fa-user-shield"></i></div>
  <div class="balance-container">
    <div style="font-size:8px; color:var(--blue); letter-spacing: 1px;">VAULT BALANCE</div>
    <div id="display-saldo">IDR 0</div>
  </div>
  <div class="profile-btn" style="color:var(--yellow)" onclick="syncSaldoFromServer()"><i class="fa-solid fa-rotate"></i></div>
</div>

<div id="board-wrapper">
  <canvas id="plinko-canvas"></canvas>
  <div id="floating-score"><div id="score-list"></div></div>
</div>

<div class="multiplier-row" id="slot-row"></div>

<div class="controls">
  <div class="mode-row">
    <button class="btn-mode active" id="m-normal" onclick="setSpeedMode('normal')"><i class="fa-solid fa-gauge-high"></i> NORMAL</button>
    <button class="btn-mode" id="m-turbo" onclick="setSpeedMode('turbo')"><i class="fa-solid fa-bolt-lightning"></i> TURBO</button>
    <button class="btn-mode" id="m-auto" onclick="toggleAuto()"><i class="fa-solid fa-rotate"></i> AUTO</button>
  </div>
  <div class="bet-row">
    <button class="bet-btn" onclick="changeBet(-1)"><i class="fa-solid fa-square-minus"></i></button>
    <div style="text-align:center">
      <div style="font-size:9px; color:var(--blue); opacity: 0.8;">BET AMOUNT</div>
      <div id="current-bet">400</div>
    </div>
    <button class="bet-btn" onclick="changeBet(1)"><i class="fa-solid fa-square-plus"></i></button>
  </div>
  <button class="btn-play" id="main-btn" onclick="spawnBall()"><i class="fa-solid fa-meteor"></i> DROP BALL</button>
  <div class="nav-bottom">
    <a href="withdraw.html" class="nav-btn"><i class="fa-solid fa-money-bill-transfer"></i> WITHDRAW</a>
    <a href="deposit.html" class="nav-btn"><i class="fa-solid fa-building-columns"></i> DEPOSIT</a>
    <a href="reward.html" class="nav-btn"><i class="fa-solid fa-trophy"></i> REWARD</a>
  </div>
</div>

<script src="global.js"></script>

<script>
const ROWS   = 10;
const MULTS  = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
const BETS   = [400, 800, 1000, 1200, 1600, 2000, 4000, 8000, 10000, 20000];
const BALL_R = 6, PEG_R = 3;

let canvas, ctx, BW, BH, pegs = [], balls = [], slotW, particles = [];
let speedMode = 'normal', isAuto = false, autoTimer = null, betIdx = 0;

// PERBAIKAN: Ambil saldo langsung dari global.js Session
function getLocalSaldo() {
    if (typeof getSaldo === 'function') return getSaldo();
    return 0;
}

let _saldo = getLocalSaldo();

const PH = {
  normal: { grav: 0.42, fric: 0.99, bounce: 0.55, autoMs: 600 },
  turbo:  { grav: 0.95, fric: 0.98, bounce: 0.40, autoMs: 150 }
};

const BALL_WAITING = 'waiting';
const BALL_READY   = 'ready';
const BALL_ERROR   = 'error';

// Sinkronisasi saldo dari server (Apps Script)
async function syncSaldoFromServer() {
    if (typeof ProfileAPI !== 'undefined' && ProfileAPI.sync) {
        const data = await ProfileAPI.sync();
        if (data) {
            _saldo = parseFloat(data.saldo);
            _renderS();
        }
    }
}

async function init() {
  if (typeof requireLogin === 'function' && !requireLogin()) return;
  
  canvas = document.getElementById('plinko-canvas');
  ctx    = canvas.getContext('2d');
  
  resize();
  buildSlots();
  
  // Ambil data terbaru sebelum main
  await syncSaldoFromServer();
  
  _renderS();
  loop();
}

function resize() {
  const wrap = document.getElementById('board-wrapper');
  BW = wrap.offsetWidth;
  BH = wrap.offsetHeight;
  const DPR = window.devicePixelRatio || 1;
  canvas.width  = BW * DPR;
  canvas.height = BH * DPR;
  canvas.style.width  = BW + 'px';
  canvas.style.height = BH + 'px';
  ctx.scale(DPR, DPR);
  slotW = BW / MULTS.length;
  buildPegs();
}

function buildPegs() {
  pegs = [];
  const spacingX = (BW * 0.92) / (ROWS + 1);
  const spacingY = (BH * 0.82) / ROWS;
  for (let r = 0; r < ROWS; r++) {
    const count  = r + 2;
    const startX = (BW - (count - 1) * spacingX) / 2;
    for (let c = 0; c < count; c++) {
      pegs.push({ x: startX + c * spacingX, y: 50 + r * spacingY, glow: 0 });
    }
  }
}

function buildSlots() {
  const row = document.getElementById('slot-row');
  row.innerHTML = '';
  MULTS.forEach((m, i) => {
    const s = document.createElement('div');
    s.className = 'slot ' + (m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low');
    s.id = 'slot-' + i;
    s.innerHTML = m + 'x';
    row.appendChild(s);
  });
}

function loop() {
  ctx.clearRect(0, 0, BW, BH);
  const ph = PH[speedMode];
  const lastPeg = pegs.length > 0 ? pegs[pegs.length - 1] : { y: BH * 0.85 };
  const LAST_PEG_Y = lastPeg.y + PEG_R + BALL_R + 2;

  pegs.forEach(p => {
    p.glow *= 0.85;
    ctx.fillStyle = p.glow > 0.1 ? `rgba(255, 255, 255, ${0.3 + p.glow})` : 'rgba(0, 68, 255, 0.3)';
    ctx.beginPath();
    ctx.arc(p.x, p.y, PEG_R + (p.glow * 2), 0, Math.PI * 2);
    ctx.fill();
  });

  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    if (b.serverStatus === BALL_ERROR) { balls.splice(i, 1); continue; }

    if (b.serverStatus === BALL_WAITING) {
      const brakeY = BH * 0.80;
      if (b.y > brakeY) {
        const t = Math.min(1, (b.y - brakeY) / (BH * 0.18));
        b.vy *= (1 - t * 0.75);
        if (b.vy < 0.08) b.vy = 0.08;
      }
    }

    b.vy += ph.grav;
    if (b.vy > 14) b.vy = 14;

    if (b.y < LAST_PEG_Y) {
      b.vx *= ph.fric;
      if (Math.abs(b.vy) < 0.3 && b.y < BH * 0.8) { b.vx += (Math.random() - 0.5) * 0.4; b.vy += 0.4; }
      if (b.serverStatus === BALL_READY && b.targetIdx !== undefined) {
        const tx = (b.targetIdx * slotW) + (slotW / 2);
        const prog = Math.max(0, (b.y - BH * 0.4) / (BH * 0.6));
        b.vx += (tx - b.x) * 0.006 * prog * prog;
      }
      b.x += b.vx;
      b.y += b.vy;
      if (b.x < BALL_R) { b.x = BALL_R; b.vx = Math.abs(b.vx) * 0.4; }
      else if (b.x > BW-BALL_R) { b.x = BW - BALL_R; b.vx = -Math.abs(b.vx) * 0.4; }

      for (let pi = 0; pi < pegs.length; pi++) {
        const p = pegs[pi];
        if (Math.abs(p.y - b.y) > BALL_R + PEG_R + 2) continue;
        const dx = b.x - p.x, dy = b.y - p.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const mD = BALL_R + PEG_R;
        if (dist < mD && dist > 0.001) {
          const ov = mD - dist, nx = dx/dist, ny = dy/dist;
          b.x += nx * ov; b.y += ny * ov;
          const dot = b.vx*nx + b.vy*ny;
          if (dot < 0) {
            b.vx = (b.vx - 2*dot*nx) * ph.bounce + (Math.random()-0.5)*0.5;
            b.vy = (b.vy - 2*dot*ny) * ph.bounce;
            if (b.vy < 0.8) b.vy = 0.8;
          }
          p.glow = 1.0; snd('hit'); break;
        }
      }
    } else {
      b.vx *= 0.78;
      if (b.serverStatus === BALL_READY && b.targetIdx !== undefined) {
        const tx = (b.targetIdx * slotW) + (slotW / 2);
        b.vx += (tx - b.x) * 0.012;
      }
      b.x += b.vx; b.y += b.vy;
    }

    const gr = ctx.createRadialGradient(b.x - b.vx, b.y - b.vy, 0.5, b.x, b.y, BALL_R);
    gr.addColorStop(0, '#ffffff'); gr.addColorStop(1, '#990033');
    ctx.beginPath(); ctx.fillStyle = gr; ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2); ctx.fill();

    if (b.y > BH + BALL_R && b.serverStatus === BALL_READY) {
      onLand(b); balls.splice(i, 1);
    }
  }
  requestAnimationFrame(loop);
}

// PERBAIKAN: Fungsi spawn ball sekarang mengambil saldo fresh
async function spawnBall() {
  const bet = BETS[betIdx];
  _saldo = getLocalSaldo(); // Ambil dari session global.js

  if (_saldo < bet) {
    showModal('SALDO TIDAK CUKUP. SILAHKAN DEPOSIT.');
    stopAuto();
    return;
  }

  const user = typeof getUsername === 'function' ? getUsername() : null;
  const saldoAwal = _saldo;
  
  // Optimis update di UI
  _saldo -= bet;
  if (typeof syncSaldoUI === 'function') syncSaldoUI(_saldo);
  else _renderS();
  
  snd('click');

  const newBall = {
    x: BW/2 + (Math.random()-0.5)*15, y: -10, vx: (Math.random()-0.5)*2, vy: 2,
    bet, serverStatus: BALL_WAITING, targetIdx: undefined, serverMult: 0, serverWin: 0, serverNewSaldo: undefined
  };
  balls.push(newBall);

  // Panggil GameEngine dari global.js
  if (typeof GameEngine !== 'undefined' && GameEngine.processPlay) {
      const res = await GameEngine.processPlay(bet);
      if (res && res.result === 'SUCCESS') {
          const tm = parseFloat(res.multiplier);
          const win = parseFloat(res.winAmount);
          const newSaldo = parseFloat(res.newSaldo);

          const possible = [];
          MULTS.forEach((m, idx) => { if (Math.abs(m - tm) < 0.01) possible.push(idx); });

          newBall.targetIdx = possible.length > 0 ? possible[Math.floor(Math.random() * possible.length)] : 5;
          newBall.serverMult = tm;
          newBall.serverWin = win;
          newBall.serverNewSaldo = newSaldo;
          newBall.serverStatus = BALL_READY;
      } else {
          newBall.serverStatus = BALL_ERROR;
          _saldo = saldoAwal;
          if (typeof syncSaldoUI === 'function') syncSaldoUI(_saldo);
          showModal(res ? res.message : "Koneksi Terputus");
          stopAuto();
      }
  }
}

function onLand(b) {
  if (b.serverStatus !== BALL_READY) return;
  if (b.serverNewSaldo !== undefined) {
    _saldo = b.serverNewSaldo;
    if (typeof syncSaldoUI === 'function') syncSaldoUI(_saldo);
    else _renderS();
  }

  const idx = b.targetIdx !== undefined ? b.targetIdx : Math.floor(b.x / slotW);
  const slotEl = document.getElementById('slot-' + idx);
  if (slotEl) {
    slotEl.classList.add('active');
    setTimeout(() => slotEl.classList.remove('active'), 400);
  }

  if (b.serverMult >= 1) snd('win');

  const list = document.getElementById('score-list');
  const div  = document.createElement('div');
  div.className = 'score-entry';
  div.innerHTML = `<b>${b.serverMult}x</b> | +${Math.floor(b.serverWin).toLocaleString('id-ID')}`;
  list.prepend(div);
  if (list.children.length > 5) list.lastChild.remove();
}

function _renderS() {
  const el = document.getElementById('display-saldo');
  if (el) el.textContent = 'IDR ' + Math.floor(_saldo).toLocaleString('id-ID');
}

function setSpeedMode(m) {
  speedMode = m; snd('click');
  document.getElementById('m-normal').classList.toggle('active', m === 'normal');
  document.getElementById('m-turbo').classList.toggle('active', m === 'turbo');
}

function toggleAuto() {
  isAuto = !isAuto;
  document.getElementById('m-auto').classList.toggle('active', isAuto);
  if (isAuto) { spawnBall(); autoTimer = setInterval(spawnBall, PH[speedMode].autoMs); }
  else clearInterval(autoTimer);
}

function stopAuto() { isAuto = false; clearInterval(autoTimer); document.getElementById('m-auto').classList.remove('active'); }

function changeBet(d) {
  if (isAuto) return;
  betIdx = Math.max(0, Math.min(BETS.length - 1, betIdx + d));
  document.getElementById('current-bet').textContent = BETS[betIdx].toLocaleString('id-ID');
  snd('click');
}

function showModal(m) {
  document.getElementById('modal-msg').textContent = m;
  document.getElementById('modal-overlay').style.display = 'block';
  document.getElementById('neon-modal').style.display = 'block';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.getElementById('neon-modal').style.display = 'none';
}

function snd(t) {
  try { const a = document.getElementById('snd-' + t); if (a) { a.currentTime = 0; a.play(); } } catch(e) {}
}

window.addEventListener('resize', resize);
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
