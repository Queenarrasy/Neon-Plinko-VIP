<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON PLINKO VIP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --bg: #02030d; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* TOP BAR */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--blue); position: sticky; top:0; z-index: 100; }
        .saldo-box { background: rgba(0, 212, 255, 0.1); padding: 8px 15px; border-radius: 50px; border: 1px solid var(--blue); color: var(--blue); font-weight: bold; }
        
        /* DEPOSIT MODAL */
        .btn-depo { background: var(--pink); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px var(--pink); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #050614; padding: 30px; border-radius: 20px; border: 1px solid var(--pink); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 15px 0; background: #111; border: 1px solid #333; color: white; border-radius: 10px; }

        /* GAME AREA */
        .game-container { height: 70vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #0a0c20 0%, #02030d 100%); position: relative; }
        .placeholder-text { color: rgba(255,255,255,0.1); font-size: 40px; font-weight: 900; text-transform: uppercase; letter-spacing: 10px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div style="font-weight: 900; color: var(--pink);">NEON VIP</div>
    <div class="saldo-box">IDR <span id="display-saldo">0</span></div>
    <button class="btn-depo" onclick="openDepo()">DEPOSIT</button>
</div>

<div class="game-container">
    <div class="placeholder-text">PLINKO ENGINE</div>
    </div>

<div id="modal-depo" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--pink)">ISI SALDO</h2>
        <p style="font-size: 12px; color: #888;">Masukkan nominal deposit (Min. 10.000)</p>
        <input type="number" id="depo-amount" placeholder="Contoh: 50000">
        <select id="depo-method" style="width:100%; padding:10px; background:#111; color:white; border-radius:10px; border:1px solid #333;">
            <option value="DANA">DANA</option>
            <option value="OVO">OVO</option>
            <option value="BCA">BCA</option>
        </select>
        <button class="btn-depo" style="width:100%; margin-top:20px;" onclick="submitDepo()">KIRIM PERMINTAAN</button>
        <button onclick="closeDepo()" style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer;">Batal</button>
    </div>
</div>

<script>
    async function initGame() {
        const user = getUsername();
        if(!user) window.location.href = 'index.html';
        updateUISaldo();
        // Cek Winrate secara diam-diam (untuk engine game)
        const { data } = await _supabase.from('profiles').select('winrate').eq('username', user).single();
        console.log("Current Winrate:", data.winrate + "%");
    }

    function openDepo() { document.getElementById('modal-depo').style.display = 'flex'; }
    function closeDepo() { document.getElementById('modal-depo').style.display = 'none'; }

    async function submitDepo() {
        const amt = document.getElementById('depo-amount').value;
        const method = document.getElementById('depo-method').value;
        const user = getUsername();

        if(amt < 10000) return alert("Minimal deposit IDR 10.000");

        const { error } = await _supabase.from('deposits').insert([
            { username: user, nominal: amt, metode: method, status: 'PROSES' }
        ]);

        if(!error) {
            alert("Permintaan Deposit Terkirim! Silakan tunggu konfirmasi Admin.");
            closeDepo();
        } else {
            alert("Gagal mengirim deposit.");
        }
    }

    window.onload = initGame;
</script>
</body>
</html>
