<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--bg:#02030d;
  --gp:0 0 8px rgba(255,0,119,.65),0 0 24px rgba(255,0,119,.22);
  --gb:0 0 8px rgba(0,85,255,.65),0 0 24px rgba(0,85,255,.22);
  --gy:0 0 8px rgba(245,230,66,.65),0 0 24px rgba(245,230,66,.22);
  --bp:rgba(255,0,119,.35);--bb:rgba(0,85,255,.35);--by:rgba(245,230,66,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;overflow:hidden;
  display:flex;flex-direction:column;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 70% 40% at 15% 0%,rgba(0,55,255,.09) 0%,transparent 65%),
    radial-gradient(ellipse 55% 45% at 85% 100%,rgba(255,0,119,.08) 0%,transparent 65%);
  color:#dde0f0;font-family:'Outfit',sans-serif;
}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:9998;}
#neon-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(160deg,#07091d,#0b0d24);border-radius:22px;z-index:9999;
  padding:26px 22px;text-align:center;min-width:270px;max-width:310px;width:86%;
  animation:mpop .3s cubic-bezier(.34,1.56,.64,1) both;}
#neon-modal.m-pink{border:1px solid var(--bp);box-shadow:var(--gp);}
@keyframes mpop{from{opacity:0;transform:translate(-50%,-50%) scale(.7)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.header{
  flex-shrink:0;z-index:10;padding:9px 14px;
  background:rgba(2,3,13,.96);border-bottom:1px solid rgba(0,85,255,.28);
  display:flex;align-items:center;justify-content:space-between;
}
.balance-box{flex:1;margin:0 10px;background:rgba(0,0,0,.55);
  border:1px solid var(--bp);border-radius:20px;padding:5px 16px;text-align:center;box-shadow:var(--gp);}
#display-saldo{font-family:'Cinzel Decorative',serif;font-size:15px;font-weight:900;color:#fff;text-shadow:var(--gp);}
#board-wrapper{flex:0 0 45vh;height:45vh;position:relative;overflow:hidden;background:#02030d;}
#plinko-canvas{display:block;width:100%;height:100%;touch-action:none;}
#floating-score{
  position:absolute;top:6px;right:7px;
  background:rgba(2,3,13,.9);border:1px solid var(--bb);
  border-radius:11px;padding:5px 9px;z-index:50;min-width:88px;
}
.score-entry{font-size:9.5px;font-weight:700;color:var(--yellow);padding:3px 0;text-align:center;}
.multiplier-row{flex-shrink:0;display:flex;justify-content:center;gap:4px;padding:0 12px;margin:5px 0 3px;}
.slot{flex:1;height:30px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;border-radius:8px;transition:.2s;}
.slot.active{transform:translateY(-8px);filter:brightness(2);box-shadow:0 0 20px #fff;}
.s-high{background:linear-gradient(135deg,var(--pink),#cc0044);color:#fff;}
.s-mid{background:linear-gradient(135deg,var(--yellow),#b8a800);color:#000;}
.s-low{background:linear-gradient(135deg,var(--blue),#0022bb);color:#fff;}
.controls{flex:1;padding:10px 16px 0;background:rgba(2,3,13,.97);border-top:1px solid rgba(0,85,255,.28);display:flex;flex-direction:column;gap:8px;}
.mode-row{display:flex;gap:8px;}
.btn-mode{flex:1;padding:9px 4px;border-radius:12px;font-size:10px;font-weight:700;cursor:pointer;background:transparent;border:1px solid #333;color:#888;font-family:'Outfit',sans-serif;}
.btn-mode.active{border-color:var(--blue);color:#fff;box-shadow:var(--gb);}
.bet-row{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.35);border:1px solid rgba(0,85,255,.2);border-radius:50px;padding:5px 10px;}
.bet-btn{font-size:22px;cursor:pointer;background:transparent;border:none;color:var(--pink);}
#current-bet{font-family:'Cinzel Decorative',serif;font-size:18px;font-weight:900;color:var(--yellow);}
.btn-play{width:100%;padding:15px;border-radius:50px;cursor:pointer;font-family:'Cinzel Decorative',serif;font-size:13px;font-weight:900;background:linear-gradient(90deg,var(--pink),var(--blue));color:#fff;border:1px solid var(--by);}
.btn-play.stop-mode{background:var(--yellow);color:#000;}
.nav-bottom{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:8px;}
.nav-btn{display:flex;flex-direction:column;align-items:center;padding:9px 0;border-radius:14px;text-decoration:none;font-size:10px;font-weight:700;border:1px solid #222;transition:.2s;}
.nav-btn i{font-size:16px;margin-bottom:4px;}
.nav-btn:active{transform:scale(0.95);}
</style>
</head>
<body>

<div id="modal-overlay" onclick="closeModal()"></div>

  <div id="modal-title" style="color:var(--pink);font-family:'Cinzel Decorative',serif;font-size:12px;font-weight:700;letter-spacing:1px;">SYSTEM</div>

<div class="header">

  <div class="mode-row">
    <button class="btn-mode active" id="m-normal" onclick="setSpeed('normal')">&#127919; NORMAL</button>

    <button class="bet-btn" onclick="changeBet(-1)"><i class="fa-solid fa-circle-minus"></i></button>

    <button class="bet-btn" onclick="changeBet(1)" style="color:var(--blue)"><i class="fa-solid fa-circle-plus"></i></button>
  </div>
  <button class="btn-play" id="main-btn" onclick="handlePlay()">PLAY BALL</button>
  <div class="nav-bottom">
    <a href="withdraw.html" class="nav-btn" style="color:var(--yellow);border-color:var(--by);">
      <i class="fa-solid fa-money-bill-transfer"></i><span>WITHDRAW</span>
    </a>
    <a href="deposit.html" class="nav-btn" style="color:var(--pink);border-color:var(--bp);">
      <i class="fa-solid fa-wallet"></i><span>DEPOSIT</span>
    </a>
    <a href="reward.html" class="nav-btn" style="color:var(--blue);border-color:var(--bb);">
      <i class="fa-solid fa-gift"></i><span>REWARD</span>
    </a>
  </div>
</div>

<script src="global.js"></script>
<script>
/**
 * ================================================================
 * GAME.HTML v6.0 — Neon Plinko VIP
 * ARSITEKTUR: Multi-ball paralel, ZERO blocking
 *
 * Cara kerja:
 * [1] Tekan PLAY → bola LANGSUNG dibuat & mulai jatuh
 * [2] Request ke server dikirim PARALEL (async, tidak blocking)
 * [3] Saat server reply → status bola berubah ST_WAIT → ST_READY
 *     → bola mulai di-steer ke slot target
 * [4] Jika server belum reply saat bola hampir mendarat →
 *     bola di-rem lembut sampai data tiba
 * [5] Saldo FINAL = dari server (100% server-authoritative)
 *     Winrate & MaxWinLimit diatur sepenuhnya oleh admin
 * ================================================================
 */

// ── KONSTANTA ────────────────────────────────────────────────
var ROWS   = 9;
var MULTS  = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
var BETS   = [400, 800, 1000, 2000, 5000, 10000, 20000];
var BALL_R = 7;
var PEG_R  = 4;

// Status bola
var ST_WAIT  = 'wait';   // Server belum reply — bola berjalan bebas
var ST_READY = 'ready';  // Server sudah reply — bola di-steer ke target

// Parameter physics per mode
var PHYSICS = {
    normal: {
        grav:       0.28,
        bounce:     0.45,
        initVy:     2.5,
        steerStart: 0.50,   // Mulai steer di 50% tinggi board
        steerMax:   0.22,   // Kuat — 4x lebih besar dari sebelumnya
        lockY:      0.82,   // Di 82% board ke bawah: hard-lock X ke target slot
        brakeY:     0.75,
        brakeFric:  0.88,
        minVy:      0.35
    },
    turbo: {
        grav:       0.60,
        bounce:     0.42,
        initVy:     5.0,
        steerStart: 0.50,
        steerMax:   0.24,
        lockY:      0.82,
        brakeY:     0.75,
        brakeFric:  0.84,
        minVy:      0.55
    }
};

// Interval auto mode (ms) — jarak antar spawn
var AUTO_MS = { normal: 950, turbo: 440 };

// Batas bola di layar bersamaan saat auto (agar tidak terlalu rapat)
var MAX_AUTO_BALLS = 3;

// ── STATE ────────────────────────────────────────────────────
var canvas, ctx, BW, BH, slotW;
var pegs      = [];
var balls     = [];
var speedMode = 'normal';
var isAuto    = false;
var autoTimer = null;
var betIdx    = 0;

// _displaySaldo: saldo yang ditampilkan ke user.
// Hanya turun saat spawn (dikurangi bet), naik saat ball land (ditambah winAmount).
// Tidak pernah set langsung dari server di tengah permainan agar tidak loncat naik.
var _displaySaldo = 0;

// ── CANVAS SETUP ─────────────────────────────────────────────
function setupCanvas() {
    canvas = document.getElementById('plinko-canvas');
    ctx    = canvas.getContext('2d');
    var wrap = document.getElementById('board-wrapper');
    BW = wrap.offsetWidth;
    BH = wrap.offsetHeight;

    var dpr = window.devicePixelRatio || 1;
    canvas.width  = BW * dpr;
    canvas.height = BH * dpr;
    canvas.style.width  = BW + 'px';
    canvas.style.height = BH + 'px';
    ctx.scale(dpr, dpr);

    // Build pegs
    pegs = [];
    var spX = BW / (ROWS + 2);
    var spY = (BH - 40) / ROWS;
    for (var r = 0; r < ROWS; r++) {
        var cnt    = r + 3;
        var startX = (BW - (cnt - 1) * spX) / 2;
        for (var c = 0; c < cnt; c++) {
            pegs.push({ x: startX + c * spX, y: 30 + r * spY, glow: 0 });
        }
    }

    // Build slot row
    var row = document.getElementById('slot-row');
    row.innerHTML = '';
    slotW = BW / MULTS.length;
    MULTS.forEach(function(m, i) {
        var s = document.createElement('div');
        s.id = 'slot-' + i;
        s.className = 'slot ' + (m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low');
        s.textContent = m + 'x';
        row.appendChild(s);
    });
}

// ── SPAWN BALL — TIDAK BLOCKING ──────────────────────────────
function spawnBall() {
    var bet      = BETS[betIdx];

    // Saldo tersedia = saldo session - semua bet yang masih pending
    if (_displaySaldo < bet) {
        showModal('Saldo tidak cukup!\nDeposit dulu untuk terus bermain.', 'SALDO HABIS');
        stopAuto();
        return;
    }

    // Auto mode: jaga jarak — skip kalau bola terlalu banyak
    if (isAuto && balls.length >= MAX_AUTO_BALLS) return;

    var ph = PHYSICS[speedMode];

    // Tambah ke pending — UI akan tampilkan saldo dikurangi ini
    // Kurangi display saldo LANGSUNG saat spawn (responsif)
    _displaySaldo = Math.max(0, _displaySaldo - bet);
    updateSaldoDisplay();

    // Buat bola langsung — status WAIT
    var ball = {
        x:               BW / 2 + (Math.random() - 0.5) * 24,
        y:               -BALL_R,
        vx:              (Math.random() - 0.5) * 2.0,
        vy:              ph.initVy,
        bet:             bet,
        status:          ST_WAIT,
        targetMult:      null,
        targetSlotIdx:   null,
        targetX:         BW / 2,
        serverNewSaldo:  null,
        serverWinAmount: null,
        isDone:          false
    };

    balls.push(ball);

    // Kirim ke server PARALEL — tidak memblokir spawn berikutnya
    GameEngine.processPlay(bet)
        .then(function(res) {
            if (ball.isDone) {
                // Bola sudah buang sebelum server reply — tidak perlu update display
                return;
            }

            if (!res || res.result !== 'SUCCESS') {
                // Gagal — kembalikan pending, saldo tidak berubah
                // Error/gagal — kembalikan display saldo
                _displaySaldo += bet;
                updateSaldoDisplay();
                ball.isDone = true;
                return;
            }

            // Tentukan slot target dari multiplier server
            var slots = [];
            MULTS.forEach(function(m, i) {
                if (m === res.multiplier) slots.push(i);
            });
            var tIdx = slots.length
                ? slots[Math.floor(Math.random() * slots.length)]
                : Math.floor(MULTS.length / 2);

            // Update bola dengan hasil server
            ball.targetMult      = res.multiplier;
            ball.targetSlotIdx   = tIdx;
            ball.targetX         = (tIdx + 0.5) * slotW;
            ball.serverNewSaldo  = res.newSaldo;
            ball.serverWinAmount = res.winAmount;
            ball.status          = ST_READY;
        })
        .catch(function() {
            if (!ball.isDone) {
                // Network error — kembalikan display saldo
                _displaySaldo += bet;
                updateSaldoDisplay();
                ball.isDone = true;
            }
        });
}

// ── PHYSICS UPDATE ───────────────────────────────────────────
function updatePhysics() {
    var ph = PHYSICS[speedMode];

    balls.forEach(function(b) {
        if (b.isDone) return;

        // ── Gravitasi & gerak ──
        b.vy += ph.grav;
        b.x  += b.vx;
        b.y  += b.vy;

        // ── Peg collision ──
        for (var pi = 0; pi < pegs.length; pi++) {
            var p    = pegs[pi];
            var dx   = b.x - p.x;
            var dy   = b.y - p.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < BALL_R + PEG_R) {
                var ang = Math.atan2(dy, dx);
                var spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
                b.vx  = Math.cos(ang) * spd * ph.bounce + (Math.random() - 0.5) * 0.9;
                b.vy  = Math.abs(Math.sin(ang) * spd * ph.bounce) + 0.2;
                b.x   = p.x + Math.cos(ang) * (BALL_R + PEG_R + 1);
                b.y   = p.y + Math.sin(ang) * (BALL_R + PEG_R + 1);
                p.glow = 1.5;
                try {
                    var s = document.getElementById('snd-hit').cloneNode();
                    s.volume = 0.3;
                    s.play();
                } catch(e) {}
                break;
            }
        }

        var progY = b.y / BH;

        // ── Steer & Lock ke target — hanya kalau ST_READY ──
        if (b.status === ST_READY) {
            var dx2target = b.targetX - b.x;

            if (progY > ph.lockY) {
                // ZONA LOCK (82%+ board):
                // Hard-lock posisi X langsung ke target slot.
                // Pastikan bola secara visual memang masuk ke slot yang benar.
                b.x  += dx2target * 0.35;  // Tarik X langsung ke target
                b.vx  = dx2target * 0.4;   // Override vx agar tidak lari lagi
            } else if (progY > ph.steerStart) {
                // ZONA STEER (50%–82% board):
                // Force proporsional — makin ke bawah makin kuat
                var prog  = (progY - ph.steerStart) / (ph.lockY - ph.steerStart);
                var steer = ph.steerMax * prog;
                b.vx += dx2target * steer;
                // Batasi vx agar tidak overshoot
                var maxVx = Math.abs(dx2target) * 0.6 + 1.5;
                if (b.vx >  maxVx) b.vx =  maxVx;
                if (b.vx < -maxVx) b.vx = -maxVx;
            }
        }

        // ── Rem zona bawah ──
        if (progY > ph.brakeY) {
            var brakeMult = (b.status === ST_WAIT) ? ph.brakeFric : (ph.brakeFric + 0.06);
            b.vx *= brakeMult;
            b.vy *= brakeMult;
            if (b.vy < ph.minVy) b.vy = ph.minVy;
        }

        // ── Batas kiri-kanan ──
        if (b.x < BALL_R)      { b.x = BALL_R;      b.vx =  Math.abs(b.vx) * 0.6; }
        if (b.x > BW - BALL_R) { b.x = BW - BALL_R; b.vx = -Math.abs(b.vx) * 0.6; }

        // ── Keluar dari bawah canvas → landing ──
        // Bola dianggap "masuk slot" saat melewati batas bawah canvas.
        // Tidak ada bounce — bola selalu turun dan keluar.
        if (b.y >= BH + BALL_R) {
            if (b.status === ST_READY) {
                // Normal landing — semua data sudah ada
                b.isDone = true;
                onBallLand(b);
            } else {
                // Server belum reply — tunggu di tepi bawah canvas
                // (bola sudah tidak terlihat, tapi proses tetap jalan)
                b.y  = BH + BALL_R;
                b.vy = 0;
                b.vx = 0;
                // Cek terus setiap frame — begitu ST_READY, langsung landing
                if (b.status === ST_READY) {
                    b.isDone = true;
                    onBallLand(b);
                }
            }
        }
    });

    // Cek bola yang sudah di luar canvas dan menunggu server
    balls.forEach(function(b) {
        if (!b.isDone && b.y >= BH + BALL_R && b.status === ST_READY) {
            b.isDone = true;
            onBallLand(b);
        }
    });

    balls = balls.filter(function(b) { return !b.isDone; });
}

// ── LANDING ──────────────────────────────────────────────────
function onBallLand(b) {
    // Kurangi pendingBets — bet ini sudah selesai
    // Tambah winAmount ke display saldo (tidak pernah loncat dari server value)
    var winAmt2 = (b.serverWinAmount !== null && b.serverWinAmount !== undefined)
        ? b.serverWinAmount
        : Math.floor(b.bet * (b.targetMult || 0));
    _displaySaldo += winAmt2;

    // Simpan saldo server ke session (dipakai untuk re-sync saat tidak ada bola aktif)
    if (b.serverNewSaldo !== null && b.serverNewSaldo !== undefined) {
        if (typeof _session !== 'undefined' && _session) {
            _session.saldo = b.serverNewSaldo;
            try { localStorage.setItem('plinko_session', JSON.stringify(_session)); } catch(e) {}
        }
    }

    updateSaldoDisplay();

    // Highlight slot target
    var el = document.getElementById('slot-' + b.targetSlotIdx);
    if (el) {
        el.classList.add('active');
        setTimeout(function() { el.classList.remove('active'); }, 450);
    }

    // Score list
    var mult   = b.targetMult   !== null ? b.targetMult : 0;
    var winAmt = (b.serverWinAmount !== null && b.serverWinAmount !== undefined)
        ? b.serverWinAmount
        : Math.floor(b.bet * mult);

    var list  = document.getElementById('score-list');
    var entry = document.createElement('div');
    entry.className = 'score-entry';
    var color = mult >= 3 ? 'var(--pink)' : mult >= 1 ? 'var(--yellow)' : '#7799ff';
    entry.innerHTML = '<span style="color:' + color + '">' + mult + 'x</span> &nbsp;<span style="color:#fff">IDR ' + winAmt.toLocaleString('id-ID') + '</span>';
    list.prepend(entry);
    if (list.children.length > 5) list.removeChild(list.lastChild);

    // Sound
    if (mult >= 1) {
        try { document.getElementById('snd-win').play(); } catch(e) {}
    }
}

// ── DRAW LOOP ────────────────────────────────────────────────
function draw() {
    if (!ctx) return;
    ctx.clearRect(0, 0, BW, BH);

    // Draw pegs
    pegs.forEach(function(p) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, PEG_R, 0, Math.PI * 2);
        if (p.glow > 0) {
            ctx.shadowBlur  = 12 * p.glow;
            ctx.shadowColor = '#f5e642';
            ctx.fillStyle   = 'rgba(245,230,66,' + (0.25 + p.glow * 0.55) + ')';
        } else {
            ctx.shadowBlur = 0;
            ctx.fillStyle  = '#444';
        }
        ctx.fill();
        ctx.shadowBlur = 0;
        if (p.glow > 0) p.glow -= 0.08;
    });

    // Draw balls
    balls.forEach(function(b) {
        ctx.save();

        // Glow: biru = menunggu server, pink = sudah siap
        var glowColor = b.status === ST_READY ? '#ff0077' : '#4466ff';
        ctx.shadowBlur  = 18;
        ctx.shadowColor = glowColor;

        // Gradient bola
        var grad = ctx.createRadialGradient(b.x - 2.5, b.y - 2.5, 1, b.x, b.y, BALL_R);
        if (b.status === ST_READY) {
            grad.addColorStop(0,   '#ffffff');
            grad.addColorStop(0.3, '#ff0077');
            grad.addColorStop(1,   '#660022');
        } else {
            grad.addColorStop(0,   '#ffffff');
            grad.addColorStop(0.3, '#6688ff');
            grad.addColorStop(1,   '#220066');
        }

        ctx.beginPath();
        ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        // Highlight spekuler
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(b.x - 2.5, b.y - 2.5, 2.2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.fill();

        ctx.restore();
    });

    updatePhysics();
    requestAnimationFrame(draw);
}

// ── CONTROLS ─────────────────────────────────────────────────
function changeBet(d) {
    if (isAuto) return;
    betIdx = Math.max(0, Math.min(BETS.length - 1, betIdx + d));
    document.getElementById('current-bet').textContent = BETS[betIdx].toLocaleString('id-ID');
}

function setSpeed(m) {
    speedMode = m;
    document.getElementById('m-normal').classList.toggle('active', m === 'normal');
    document.getElementById('m-turbo').classList.toggle('active',  m === 'turbo');
    if (isAuto) {
        clearInterval(autoTimer);
        autoTimer = setInterval(tryAutoSpawn, AUTO_MS[speedMode]);
    }
}

// Auto spawn dengan cek batas bola
function tryAutoSpawn() {
    if (!isAuto) return;
    // Hanya spawn kalau jumlah bola aktif di bawah batas
    var activeBalls = balls.filter(function(b) { return !b.isDone; }).length;
    if (activeBalls < MAX_AUTO_BALLS) spawnBall();
}

function toggleAuto() {
    if (isAuto) { stopAuto(); return; }
    isAuto = true;
    document.getElementById('m-auto').classList.add('active');
    document.getElementById('m-auto').textContent   = '\uD83D\uDD04 AUTO: ON';
    document.getElementById('main-btn').textContent = 'STOP AUTO';
    document.getElementById('main-btn').classList.add('stop-mode');
    spawnBall();
    autoTimer = setInterval(tryAutoSpawn, AUTO_MS[speedMode]);
}

function stopAuto() {
    isAuto = false;
    clearInterval(autoTimer); autoTimer = null;
    document.getElementById('m-auto').classList.remove('active');
    document.getElementById('m-auto').textContent   = '\uD83D\uDD04 AUTO: OFF';
    document.getElementById('main-btn').textContent = 'PLAY BALL';
    document.getElementById('main-btn').classList.remove('stop-mode');
}

function handlePlay() {
    if (isAuto) { stopAuto(); return; }
    // Manual: langsung spawn — bisa ditekan berkali-kali
    spawnBall();
}

// ── MODAL ────────────────────────────────────────────────────
function showModal(msg, title) {
    document.getElementById('modal-title').textContent = title || 'INFO';
    document.getElementById('modal-msg').textContent   = msg;
    document.getElementById('modal-overlay').style.display = 'block';
    document.getElementById('neon-modal').style.display    = 'block';
}
function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('neon-modal').style.display    = 'none';
}

// ── SALDO DISPLAY ─────────────────────────────────────────────
// Tampilkan saldo = saldo session (dari server) - pending bets
// Tidak pernah "naik" di tengah permainan, selalu konsisten
function updateSaldoDisplay() {
    var el = document.getElementById('display-saldo');
    if (el) el.textContent = 'IDR ' + Math.floor(Math.max(0, _displaySaldo)).toLocaleString('id-ID');
}

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
    var sess = requireLogin('index.html');
    if (!sess) return;

    setupCanvas();

    // Inisialisasi _displaySaldo dari session cache
    _displaySaldo = sess.saldo || 0;
    if (typeof _session !== 'undefined' && _session) {
        _session.saldo = _displaySaldo;
    }
    updateSaldoDisplay();

    document.getElementById('current-bet').textContent = BETS[betIdx].toLocaleString('id-ID');

    var u = getUsername();
    callApiSilent('set_session_start', { username: u }).catch(function(){});
    callApiSilent('set_status', { username: u, status: 'ONLINE' }).catch(function(){});

    // Sync saldo terbaru dari server — hanya update display jika tidak ada bola aktif
    ProfileAPI.sync().then(function() {
        if (balls.length === 0) {
            _displaySaldo = getSaldo();
            updateSaldoDisplay();
        }
    }).catch(function(){});

    draw();
});

window.addEventListener('resize', setupCanvas);
</script>
