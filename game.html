<style>
:root{
  --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--bg:#02030d;
  --gp:0 0 8px rgba(255,0,119,.65),0 0 24px rgba(255,0,119,.22);
  --gb:0 0 8px rgba(0,85,255,.65),0 0 24px rgba(0,85,255,.22);
  --gy:0 0 8px rgba(245,230,66,.65),0 0 24px rgba(245,230,66,.22);
  --bp:rgba(255,0,119,.35);--bb:rgba(0,85,255,.35);--by:rgba(245,230,66,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;overflow:hidden;
  display:flex;flex-direction:column;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 70% 40% at 15% 0%,rgba(0,55,255,.09) 0%,transparent 65%),
    radial-gradient(ellipse 55% 45% at 85% 100%,rgba(255,0,119,.08) 0%,transparent 65%);
  color:#dde0f0;font-family:'Outfit',sans-serif;
}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.014) 3px,rgba(0,0,0,.014) 4px);}

/* ── MODAL ─────────────────────────────────────────────── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:9998;}
#neon-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(160deg,#07091d,#0b0d24);border-radius:22px;z-index:9999;
  padding:26px 22px;text-align:center;min-width:270px;max-width:310px;width:86%;
  animation:mpop .3s cubic-bezier(.34,1.56,.64,1) both;}
#neon-modal.m-pink  {border:1px solid var(--bp);box-shadow:var(--gp);}
#neon-modal.m-blue  {border:1px solid var(--bb);box-shadow:var(--gb);}
#neon-modal.m-yellow{border:1px solid var(--by);box-shadow:var(--gy);}
@keyframes mpop{from{opacity:0;transform:translate(-50%,-50%) scale(.7)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
#modal-title{font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;letter-spacing:1.5px;margin-bottom:8px;}
.m-pink #modal-title{color:var(--pink);}
.m-blue #modal-title{color:#7799ff;}
.m-yellow #modal-title{color:var(--yellow);}
#modal-msg{font-size:12px;color:rgba(220,220,240,.65);line-height:1.65;}
.modal-btn{margin-top:15px;padding:9px 24px;border-radius:50px;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;background:transparent;transition:.25s;}
.m-pink .modal-btn{border:1px solid var(--bp);color:var(--pink);}
.m-blue .modal-btn{border:1px solid var(--bb);color:#7799ff;}
.m-yellow .modal-btn{border:1px solid var(--by);color:var(--yellow);}

/* ── HEADER ─────────────────────────────────────────────── */
.header{
  flex-shrink:0;z-index:10;
  padding:9px 14px;
  background:rgba(2,3,13,.96);
  border-bottom:1px solid rgba(0,85,255,.28);
  backdrop-filter:blur(20px);

  box-shadow:0 2px 20px rgba(0,85,255,.1);
}
.header-item{display:flex;flex-direction:column;align-items:center;
  cursor:pointer;min-width:50px;transition:.2s;text-decoration:none;}
.header-item:active{transform:scale(.86);}
.header-item i{font-size:22px;display:block;margin-bottom:2px;}
.header-item span{font-size:8.5px;font-weight:700;letter-spacing:1px;}
.balance-box{flex:1;margin:0 10px;background:rgba(0,0,0,.55);
  border:1px solid var(--bp);border-radius:20px;
  padding:5px 16px;text-align:center;box-shadow:var(--gp);}
.saldo-label{font-size:7.5px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,.38);margin-bottom:1px;}

  flex:0 0 42vh;

  position:relative;

}
#plinko-canvas{display:block;width:100%;height:100%;touch-action:none;}

/* FLOATING SCORE */
#floating-score{
  position:absolute;top:6px;right:7px;
  background:rgba(2,3,13,.9);border:1px solid var(--bb);
  border-radius:11px;padding:5px 9px;z-index:50;

}
.score-entry{font-size:9.5px;font-weight:700;color:var(--yellow);

/* ── SLOT ROW ───────────────────────────────────────────── */
.multiplier-row{
  flex-shrink:0;display:flex;justify-content:center;
  gap:4px;padding:0 12px;margin:5px 0 3px;

}
.slot{
  flex:1;height:30px;display:flex;align-items:center;justify-content:center;

  transition:.28s cubic-bezier(.175,.885,.32,1.275);letter-spacing:.5px;
}
.slot.active{transform:translateY(-12px);filter:brightness(3);box-shadow:0 0 30px #fff;z-index:100;}
.s-high{background:linear-gradient(135deg,var(--pink),#cc0044);color:#fff;}
.s-mid {background:linear-gradient(135deg,var(--yellow),#b8a800);color:#000;}
.s-low {background:linear-gradient(135deg,var(--blue),#0022bb);color:rgba(255,255,255,.95);}

/* ── CONTROLS ───────────────────────────────────────────── */
.controls{

  font-family:'Cinzel Decorative',serif;

}

.btn-play{
  flex-shrink:0;

  font-family:'Cinzel Decorative',serif;font-size:13px;font-weight:900;
  letter-spacing:2px;text-transform:uppercase;transition:.18s;

  color:#fff;border:1px solid var(--by);

.nav-bottom{

.nav-btn{

.nav-btn:active{transform:scale(.91);}
.nav-btn i{font-size:19px;margin-bottom:3px;}
.nav-btn span{font-size:8.5px;letter-spacing:.4px;}
.btn-withdraw{border:1px solid var(--by);color:var(--yellow);background:rgba(245,230,66,.04);}
.btn-withdraw:hover{background:rgba(245,230,66,.1);box-shadow:var(--gy);}
.btn-deposit {border:1px solid var(--bp);color:var(--pink);background:rgba(255,0,119,.04);}
.btn-deposit:hover {background:rgba(255,0,119,.1);box-shadow:var(--gp);}
.btn-reward  {border:1px solid var(--bb);color:#7799ff;background:rgba(0,85,255,.04);}
.btn-reward:hover  {background:rgba(0,85,255,.1);box-shadow:var(--gb);}
</style>

<script src="global.js"></script>
<script>
// ── CONFIG & PHYSICS ────────────────────────────────────
const ROWS   = 10;
const MULTS  = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
const BETS   = [400,800,1000,1200,1600,2000,4000,8000,10000,20000];
const BALL_R = 6.8;
const PEG_R  = 5.2;
const PH = {
  normal:{ grav:0.26, fric:0.992, bounce:0.46, pegF:2.0, randV:0.28, autoMs:800 },
  turbo: { grav:0.40, fric:0.985, bounce:0.42, pegF:3.0, randV:0.38, autoMs:220 }
};

let canvas, ctx, DPR=1, BW=0, BH=0;
let pegs=[], balls=[], slotW=0;
let speedMode='normal', isAuto=false, autoTimer=null;
let betIdx=0;
let holdActive=false, holdRepeat=null, holdTimeout=null;

// ── SALDO QUEUE SYSTEM (Mencegah Salah Hitung) ──────────
// Memastikan transaksi saldo diproses satu per satu
let saldoQueue = Promise.resolve();
function updateSaldoSafe(amountChange) {
  saldoQueue = saldoQueue.then(() => {
    const cur = getSaldo();
    setSaldo(cur + amountChange);
  });
}

const snd = t => { try{ const a=document.getElementById('snd-'+t); a.currentTime=0; a.play().catch(()=>{}); }catch(e){} };

// ── CORE GAMEPLAY ──────────────────────────────────────
async function spawnBall(){
  const bet = BETS[betIdx];
  const currentSaldo = getSaldo();

  if(currentSaldo < bet){
    snd('error');
    if(isAuto) stopAuto();
    else { holdActive=false; clearInterval(holdRepeat); }
    showModal('Saldo tidak cukup!','pink');
    return;
  }

  // 1. Kurangi Saldo Taruhan dengan sistem antri
  updateSaldoSafe(-bet);

  const ball = {
    x: BW/2 + (Math.random()-0.5)*12,
    y: -BALL_R*2,
    vx: (Math.random()-0.5)*1.5,
    vy: 0.5,
    bet: bet,
    spd: speedMode,
    done: false,
    serverSlotIdx: null,
    targetX: null,
    serverNewSaldo: null,
    isResolved: false
  };
  balls.push(ball);

  try {
    const r = await apiCall({
      action:'game_play', 
      username:getUsername(), 
      bet: bet, 
      saldoAwal: currentSaldo 
    });

    if(r && r.result==='SUCCESS'){
        ball.serverNewSaldo = r.newSaldo;
        // Tentukan index slot server
        const matchingIndices = [];
        MULTS.forEach((m, i) => { if(m === r.target_multiplier) matchingIndices.push(i); });
        
        // Pilih slot terdekat dari posisi bola saat ini agar gerakan terlihat alami
        matchingIndices.sort((a,b) => Math.abs(a - (ball.x/slotW)) - Math.abs(b - (ball.x/slotW)));
        ball.serverSlotIdx = matchingIndices[0];
        ball.targetX = (ball.serverSlotIdx + 0.5) * slotW;
    } else {
        ball.isError = true;
        updateSaldoSafe(bet); // Kembalikan taruhan jika server gagal
    }
  } catch(e) {
    ball.isError = true;
    updateSaldoSafe(bet);
  }
}

function physics(){
  balls.forEach(b => {
    if(b.done) return;
    const ph = PH[speedMode] || PH.normal;
    
    // Anti-stuck: Jika bola berhenti horizontal, beri dorongan
    if(Math.abs(b.vx) < 0.05) b.vx += (Math.random()-0.5)*0.15;

    b.vy += ph.grav;
    b.vx *= ph.fric;
    b.x += b.vx;
    b.y += b.vy;

    // Magnetisme Halus ke Target Server (hanya aktif setelah melewati tengah papan)
    if(b.targetX !== null && b.y > BH * 0.35){
        const pull = (b.y / BH) * 0.18;
        b.vx += (b.targetX - b.x) * pull;
    }

    // Deteksi Tabrakan Paku (Pyramid Pegs)
    pegs.forEach(p => {
        const dx = b.x - p.x;
        const dy = b.y - p.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const minDist = BALL_R + PEG_R;

        if(dist < minDist){
            const nx = dx / dist;
            const ny = dy / dist;
            
            // Reposisi Paksa (Anti-Nyangkut)
            b.x = p.x + nx * minDist;
            b.y = p.y + ny * minDist;

            const dot = b.vx * nx + b.vy * ny;
            b.vx = (b.vx - 2 * dot * nx) * ph.bounce + (Math.random()-0.5)*ph.randV;
            b.vy = (b.vy - 2 * dot * ny) * ph.bounce;
            
            p.glow = 1.0;
            snd('hit');
        }
    });

    // Batas Dinding Samping
    if(b.x < BALL_R) { b.x = BALL_R; b.vx *= -0.5; }
    if(b.x > BW - BALL_R) { b.x = BW - BALL_R; b.vx *= -0.5; }

    // Landing Logic
    if(b.y > BH - 8){
        b.done = true;
        onBallLand(b);
    }
  });
  // Bersihkan bola yang sudah keluar layar
  balls = balls.filter(b => b.y < BH + 60);
}

function onBallLand(b){
  if(b.isError || b.isResolved) return;
  b.isResolved = true;
  
  // Ambil index slot akhir (prioritas data server)
  let idx = (b.serverSlotIdx !== null) ? b.serverSlotIdx : Math.floor(b.x / slotW);
  idx = Math.max(0, Math.min(MULTS.length-1, idx));
  
  const mult = MULTS[idx];
  const winAmount = Math.floor(b.bet * mult);

  // Update Saldo dengan sistem antri
  if(b.serverNewSaldo !== null) {
      // Gunakan saldo absolut dari server untuk akurasi 100%
      saldoQueue = saldoQueue.then(() => {
          setSaldo(b.serverNewSaldo);
      });
  } else {
      updateSaldoSafe(winAmount);
  }

  // Efek Kedip Kotak (Highlight)
  const slotEl = document.getElementById('slot-'+idx);
  if(slotEl){
      slotEl.classList.add('active');
      setTimeout(() => slotEl.classList.remove('active'), 600);
  }

  // Record Win List
  const list = document.getElementById('score-list');
  const entry = document.createElement('div');
  entry.className = 'score-entry';
  entry.style.color = mult >= 1.5 ? 'var(--pink)' : 'var(--yellow)';
  entry.innerHTML = `${mult}x · IDR ${winAmount.toLocaleString()}`;
  list.prepend(entry);
  if(list.children.length > 5) list.removeChild(list.lastChild);

  if(mult >= 1.5) snd('win');
}

// ── RENDERING ───────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,BW,BH);
  
  // Paku Putih Terang
  pegs.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, PEG_R, 0, Math.PI*2);
    ctx.fillStyle = p.glow > 0 ? `rgba(245,230,66,${0.2 + p.glow*0.8})` : '#fff';
    ctx.shadowBlur = p.glow > 0 ? 18 : 4;
    ctx.shadowColor = p.glow > 0 ? '#f5e642' : 'rgba(255,255,255,0.4)';
    ctx.fill();
    if(p.glow > 0) p.glow -= 0.08;
  });

  // Bola Neon Pink
  balls.forEach(b => {
    ctx.save();
    const grad = ctx.createRadialGradient(b.x-2, b.y-2, 1, b.x, b.y, BALL_R);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.4, '#ff0077');
    grad.addColorStop(1, '#330011');
    ctx.beginPath();
    ctx.arc(b.x, b.y, BALL_R, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ff0077';
    ctx.fill();
    ctx.restore();
  });

  requestAnimationFrame(draw);
}

function setupCanvas(){
  const wrap = document.getElementById('board-wrapper');
  canvas = document.getElementById('plinko-canvas');
  ctx = canvas.getContext('2d');
  DPR = window.devicePixelRatio || 1;
  BW = wrap.clientWidth; BH = wrap.clientHeight;
  canvas.width = BW*DPR; canvas.height = BH*DPR;
  canvas.style.width = BW+'px'; canvas.style.height = BH+'px';
  ctx.scale(DPR, DPR);
  
  // Re-build pyramid pegs
  pegs = [];
  const usableW = BW - 40;
  const spacingX = usableW / ROWS;
  const spacingY = (BH - 60) / ROWS;
  for(let r=0; r<ROWS; r++){
    const count = r+2;
    const rowW = (count-1) * spacingX;
    const startX = (BW - rowW)/2;
    for(let c=0; c<count; c++){
        pegs.push({ x: startX + c*spacingX, y: 45 + r*spacingY, glow: 0 });
    }
  }

  // Build Slots
  const row = document.getElementById('slot-row');
  row.innerHTML = '';
  slotW = BW / MULTS.length;
  MULTS.forEach((m, i) => {
    const s = document.createElement('div');
    s.id = 'slot-'+i;
    s.className = `slot ${m>=3?'s-high':m>=1?'s-mid':'s-low'}`;
    s.textContent = m+'x';
    row.appendChild(s);
  });
}

// ── EVENT LISTENERS ─────────────────────────────────────
function changeBet(d){
  if(isAuto) return; snd('click');
  betIdx = Math.max(0, Math.min(BETS.length-1, betIdx+d));
  document.getElementById('current-bet').textContent = BETS[betIdx].toLocaleString('id-ID');
}

function setSpeedMode(m){
  snd('click'); speedMode = m;
  document.getElementById('m-normal').classList.toggle('active', m==='normal');
  document.getElementById('m-turbo').classList.toggle('active', m==='turbo');
  if(isAuto) { clearInterval(autoTimer); autoTimer = setInterval(spawnBall, PH[speedMode].autoMs); }
}

function toggleAuto(){
  snd('click');
  if(isAuto) stopAuto(); else startAuto();
}
function startAuto(){
  isAuto = true;
  document.getElementById('m-auto').textContent = '🔄 AUTO: ON';
  document.getElementById('m-auto').classList.add('active');
  document.getElementById('main-btn').classList.add('stop-mode');
  document.getElementById('play-icon').className = 'fa-solid fa-stop';
  document.getElementById('btn-minus').classList.add('locked');
  document.getElementById('btn-plus').classList.add('locked');
  document.getElementById('bet-lock-hint').style.display = 'block';
  spawnBall();
  autoTimer = setInterval(spawnBall, PH[speedMode].autoMs);
}
function stopAuto(){
  isAuto = false; clearInterval(autoTimer);
  document.getElementById('m-auto').textContent = '🔄 AUTO: OFF';
  document.getElementById('m-auto').classList.remove('active');
  document.getElementById('main-btn').classList.remove('stop-mode');
  document.getElementById('play-icon').className = 'fa-solid fa-play';
  document.getElementById('btn-minus').classList.remove('locked');
  document.getElementById('btn-plus').classList.remove('locked');
  document.getElementById('bet-lock-hint').style.display = 'none';
}

function onPlayDown(e){
  e.preventDefault(); if(isAuto){ stopAuto(); return; }
  spawnBall();
  holdTimeout = setTimeout(() => { 
    holdRepeat = setInterval(spawnBall, speedMode==='turbo'?250:600); 
  }, 350);
}
function onPlayUp(){ clearTimeout(holdTimeout); clearInterval(holdRepeat); }

function showModal(msg, type='pink'){
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('neon-modal').className = 'm-'+type;
  document.getElementById('modal-overlay').style.display = 'block';
  document.getElementById('neon-modal').style.display = 'block';
}
function closeModal(){
  document.getElementById('modal-overlay').style.display = 'none';
  document.getElementById('neon-modal').style.display = 'none';
}

window.addEventListener('load', () => {
  setupCanvas();
  setInterval(physics, 16); // 60 FPS physics
  draw();
  // Sync saldo tampilan awal
  document.getElementById('display-saldo').textContent = fmtIDR(getSaldo());
});
window.addEventListener('resize', setupCanvas);
</script>
