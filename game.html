<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON PLINKO VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00d4ff;
            --neon-yellow: #fde047;
            --deep-blue: #050a30;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: var(--deep-blue);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #101844 0%, #050a30 100%);
        }

        /* Header & Saldo */
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .balance-box {
            background: var(--glass);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--neon-yellow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #header-saldo {
            color: var(--neon-yellow);
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Game Layout */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 20px;
        }

        #plinko-canvas {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 2px solid var(--glass);
            box-shadow: inset 0 0 50px rgba(0, 212, 255, 0.1);
        }

        /* Sidebar / Controls */
        .controls {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label { display: block; margin-bottom: 5px; color: var(--neon-blue); }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-pink);
            color: #fff;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Orbitron';
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .btn-play { background: var(--neon-pink); color: white; grid-column: span 2; font-size: 1.2rem; }
        .btn-play:hover { box-shadow: 0 0 20px var(--neon-pink); transform: scale(1.02); }
        .btn-play:disabled { background: #555; cursor: not-allowed; }

        .btn-nav { background: var(--glass); border: 1px solid var(--neon-blue); color: var(--neon-blue); }
        .btn-nav:hover { background: var(--neon-blue); color: #000; }

        /* Pop Up Neon Custom */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center;
            z-index: 10000;
        }

        .neon-modal {
            background: var(--deep-blue);
            border: 3px solid var(--neon-pink);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 30px var(--neon-pink);
            animation: modalPop 0.3s ease-out;
        }

        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .neon-modal h2 { color: var(--neon-yellow); margin-top: 0; }
        .btn-close { 
            margin-top: 20px; 
            background: transparent; 
            border: 1px solid var(--neon-yellow); 
            color: var(--neon-yellow); 
            padding: 8px 20px;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 600px) {
            #plinko-canvas { width: 100% !important; height: auto !important; }
        }
    </style>
</head>
<body>

    <div id="loading" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:99999; justify-content:center; align-items:center;">
        <div style="color:var(--neon-blue); font-family:'Orbitron';">LOADING SESSION...</div>
    </div>

    <div class="header-nav">
        <div class="logo">ARGLOW</div>
        <div class="balance-box">
            <i class="fas fa-wallet" style="color:var(--neon-yellow)"></i>
            <span id="header-saldo">Rp 0</span>
        </div>
    </div>

    <div class="main-container">
        <canvas id="plinko-canvas" width="450" height="550"></canvas>

        <div class="controls">
            <div class="input-group">
                <label><i class="fas fa-coins"></i> JUMLAH BET (IDR)</label>
                <input type="number" id="bet-amount" value="10000" min="5000">
            </div>

            <button class="btn btn-play" id="btn-play-trigger">
                <i class="fas fa-play"></i> DROP BALL
            </button>

            <div class="btn-grid">
                <button class="btn btn-nav" onclick="location.href='profile.html'"><i class="fas fa-user"></i> Profil</button>
                <button class="btn btn-nav" onclick="location.href='deposit.html'"><i class="fas fa-plus"></i> Depo</button>
                <button class="btn btn-nav" onclick="location.href='withdraw.html'"><i class="fas fa-minus"></i> WD</button>
                <button class="btn btn-nav" onclick="location.href='reward.html'"><i class="fas fa-gift"></i> Reward</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="neon-modal-overlay">
        <div class="neon-modal">
            <h2 id="modal-title">BIG WIN!</h2>
            <p id="modal-msg">Selamat anda memenangkan sesuatu.</p>
            <button class="btn-close" onclick="closeNeonModal()">CLOSE</button>
        </div>
    </div>

    <audio id="snd-drop" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2004/2004-preview.mp3"></audio>
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="snd-fail" src="https://assets.mixkit.co/active_storage/sfx/2513/2513-preview.mp3"></audio>

    <script src="global.js"></script>
    <script>
        // Logika Game Plinko dengan Physics Sederhana
        const canvas = document.getElementById('plinko-canvas');
        const ctx = canvas.getContext('2d');
        const btnPlay = document.getElementById('btn-play-trigger');
        
        // Config Physics
        const ROWS = 8;
        const PIN_RADIUS = 3;
        const BALL_RADIUS = 8;
        const pins = [];
        const balls = [];
        const buckets = [10, 3, 1.5, 0.5, 0.2, 0.5, 1.5, 3, 10]; // Multiplier visual

        // Suara
        const sounds = {
            drop: document.getElementById('snd-drop'),
            hit: document.getElementById('snd-hit'),
            win: document.getElementById('snd-win'),
            fail: document.getElementById('snd-fail')
        };

        function playSnd(name) {
            try { sounds[name].currentTime = 0; sounds[name].play(); } catch(e) {}
        }

        // Init Pins
        for (let i = 2; i <= ROWS + 1; i++) {
            for (let j = 0; j < i; j++) {
                pins.push({
                    x: canvas.width / 2 + (j - (i - 1) / 2) * 45,
                    y: i * 50
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Pins
            ctx.fillStyle = "#00d4ff";
            pins.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, PIN_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                // Glow pins
                ctx.shadowBlur = 5;
                ctx.shadowColor = "#00d4ff";
            });

            // Draw Buckets (Visual Multiplier)
            const bucketW = canvas.width / buckets.length;
            buckets.forEach((m, i) => {
                ctx.strokeStyle = i % 2 === 0 ? "#ff007f" : "#fde047";
                ctx.lineWidth = 2;
                ctx.strokeRect(i * bucketW + 5, canvas.height - 40, bucketW - 10, 30);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 12px Orbitron";
                ctx.textAlign = "center";
                ctx.fillText("x"+m, i * bucketW + bucketW/2, canvas.height - 20);
            });

            // Draw Balls
            balls.forEach((b, index) => {
                b.y += b.vy;
                b.x += b.vx;
                b.vy += 0.2; // Gravity

                // Collision with pins
                pins.forEach(p => {
                    const dist = Math.hypot(b.x - p.x, b.y - p.y);
                    if (dist < BALL_RADIUS + PIN_RADIUS) {
                        playSnd('hit');
                        b.vy *= -0.4;
                        b.vx += (Math.random() - 0.5) * 4;
                        b.y -= 2;
                    }
                });

                // Draw Ball
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#ff007f";
                ctx.fillStyle = "#ff007f";
                ctx.beginPath();
                ctx.arc(b.x, b.y, BALL_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Check Bottom
                if (b.y > canvas.height - 50) {
                    finishPlay(b.targetMult, b.winAmount);
                    balls.splice(index, 1);
                }
            });

            requestAnimationFrame(draw);
        }

        async function handleDropBall() {
            const amount = parseFloat(document.getElementById('bet-amount').value);
            if (amount < 5000) return showToast("Minimal bet IDR 5.000", "warning");
            if (getSaldo() < amount) return showToast("Saldo tidak cukup!", "error");

            btnPlay.disabled = true;
            playSnd('drop');

            // Panggil API dari Global JS v5.0
            const res = await GameEngine.processPlay(amount);
            
            if (res && res.result === "SUCCESS") {
                // Tambahkan bola ke canvas
                balls.push({
                    x: canvas.width / 2 + (Math.random() - 0.5) * 10,
                    y: 20,
                    vx: 0,
                    vy: 2,
                    targetMult: res.multiplier,
                    winAmount: res.winAmount
                });
            } else {
                btnPlay.disabled = false;
                showToast("Gagal memproses game.", "error");
            }
        }

        function finishPlay(mult, win) {
            btnPlay.disabled = false;
            if (mult >= 1.5) {
                playSnd('win');
                openNeonModal("BIG WIN!", `Anda mendapatkan multiplier x${mult}\nKemenangan: ${formatIDR(win)}`);
            } else {
                playSnd('fail');
                showToast(`Multiplier x${mult}. Coba lagi!`, "info");
            }
        }

        // Custom Modal Logic
        function openNeonModal(title, msg) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-msg').textContent = msg;
            document.getElementById('neon-modal-overlay').style.display = 'flex';
        }

        function closeNeonModal() {
            document.getElementById('neon-modal-overlay').style.display = 'none';
        }

        btnPlay.addEventListener('click', handleDropBall);
        draw();
    </script>
</body>
</html>
