<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --pink:#ff0077; --blue:#0022ff; --yellow:#fbff00; --green:#00ff88; --bg:#000008;
            --gp:0 0 10px rgba(255,0,119,.55),0 0 25px rgba(255,0,119,.2);
            --gb:0 0 10px rgba(0,34,255,.55),0 0 25px rgba(0,34,255,.2);
            --gy:0 0 10px rgba(251,255,0,.55),0 0 25px rgba(251,255,0,.2);
        }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body {
            background:var(--bg); color:#fff; font-family:'Outfit',sans-serif;
            min-height:100vh; overflow-x:hidden; padding-bottom:82px;
        }
        #particles-js {
            position:fixed; top:0; left:0; width:100%; height:100%;
            z-index:0; pointer-events:none;
            background:radial-gradient(ellipse at 50% 20%, #00001e 0%, #000008 100%);
        }

        /* ── NEON ALERT ── */
        #neon-alert {
            position:fixed; top:-110px; left:50%; transform:translateX(-50%);
            width:90%; max-width:340px; background:rgba(0,0,18,.98);
            border:1.5px solid var(--pink); border-top:2px solid var(--yellow);
            color:#fff; padding:12px 18px; border-radius:14px;
            text-align:center; font-weight:900; font-size:13px; z-index:9100;
            transition:.5s cubic-bezier(.175,.885,.32,1.275);
            box-shadow:0 0 18px rgba(255,0,119,.4);
        }
        #neon-alert.show { top:12px; }
        #neon-alert.ok   { border-color:var(--green); box-shadow:0 0 18px rgba(0,255,136,.4); }
        #neon-alert.warn { border-color:var(--yellow); box-shadow:0 0 18px rgba(251,255,0,.4); }

        /* ── HEADER ── */
        .header {
            height:58px; padding:0 14px;
            display:flex; justify-content:space-between; align-items:center;
            background:rgba(0,0,20,.99);
            border-bottom:1.5px solid rgba(0,34,255,.65);
            position:sticky; top:0; z-index:300;
            backdrop-filter:blur(20px);
            box-shadow:0 2px 18px rgba(0,34,255,.2);
        }
        .logo { font-family:'Cinzel Decorative',serif; font-size:13px; color:var(--pink); text-shadow:var(--gp); letter-spacing:1px; }
        .logo span { color:var(--yellow); text-shadow:var(--gy); }
        .saldo-chip {
            background:rgba(0,0,0,.8); border:1.5px solid var(--yellow);
            padding:5px 13px; border-radius:50px;
            font-size:11px; font-weight:900; color:var(--yellow);
            text-shadow:0 0 8px rgba(251,255,0,.5);
            box-shadow:0 0 8px rgba(251,255,0,.2);
            cursor:pointer; white-space:nowrap;
        }

        /* ── PANIC BAR ── */
        #panic-bar {
            display:none; background:rgba(255,0,20,.12);
            border-bottom:1px solid rgba(255,0,119,.4);
            padding:5px; text-align:center; font-size:9px; font-weight:900;
            color:var(--pink); letter-spacing:2px; position:relative; z-index:299;
            animation:panicFlash 1.2s infinite;
        }
        @keyframes panicFlash { 0%,100%{opacity:1} 50%{opacity:.3} }

        /* ── MAIN WRAP ── */
        .wrap { position:relative; z-index:10; padding:10px 10px 4px; max-width:480px; margin:0 auto; }

        /* ── CANVAS BOX ── */
        .canvas-box {
            width:100%; border-radius:18px; overflow:hidden;
            border:1.5px solid rgba(0,34,255,.45);
            box-shadow:0 0 30px rgba(0,34,255,.18), inset 0 0 40px rgba(0,0,30,.95);
            background:#00000f; margin-bottom:12px; position:relative;
        }
        #board { display:block; width:100%; height:auto; }

        /* ── SALDO LINE ── */
        .saldo-line {
            display:flex; justify-content:space-between; align-items:center;
            background:rgba(0,0,0,.55); border:1px solid rgba(0,34,255,.22);
            border-radius:10px; padding:8px 14px; margin-bottom:9px;
        }
        .sl-lbl { font-size:9px; color:rgba(255,255,255,.38); text-transform:uppercase; letter-spacing:1px; font-weight:900; }
        .sl-val { font-size:16px; font-weight:900; color:var(--yellow); text-shadow:0 0 8px rgba(251,255,0,.4); }

        /* ── BET ROW ── */
        .bet-row { display:flex; gap:6px; align-items:center; margin-bottom:8px; }
        .bet-inp {
            flex:1; background:#000; border:1.5px solid rgba(0,34,255,.5); border-radius:10px;
            color:var(--yellow); font-size:18px; font-weight:900;
            padding:11px 10px; outline:none; font-family:'Outfit',sans-serif; text-align:center; transition:.25s;
        }
        .bet-inp:focus { border-color:var(--yellow); box-shadow:0 0 10px rgba(251,255,0,.18); }
        .bb {
            background:rgba(0,34,255,.14); border:1px solid rgba(0,34,255,.38);
            color:#fff; padding:11px 12px; border-radius:10px;
            font-weight:900; font-size:12px; cursor:pointer; transition:.2s;
            font-family:'Outfit',sans-serif; min-width:42px; text-align:center;
        }
        .bb:active { background:var(--blue); }

        /* ── QUICK BET ── */
        .qb-row { display:grid; grid-template-columns:repeat(6,1fr); gap:5px; margin-bottom:9px; }
        .qb {
            background:rgba(0,0,38,.82); border:1px solid rgba(0,34,255,.28); border-radius:8px;
            color:rgba(255,255,255,.72); padding:8px 2px; text-align:center;
            font-size:10px; font-weight:900; cursor:pointer; transition:.2s; font-family:'Outfit',sans-serif;
        }
        .qb:active { background:var(--blue); border-color:var(--blue); color:#fff; }

        /* ── RISK ROW ── */
        .risk-row { display:flex; gap:6px; margin-bottom:11px; }
        .rb {
            flex:1; padding:9px 4px; border-radius:9px; border:1px solid rgba(0,34,255,.28);
            background:rgba(0,0,38,.82); color:rgba(255,255,255,.42); font-weight:900;
            font-size:10px; cursor:pointer; transition:.3s; text-align:center;
            font-family:'Outfit',sans-serif; text-transform:uppercase; letter-spacing:.5px;
        }
        .rb.ar {
            border-color:var(--yellow); color:var(--yellow);
            background:rgba(251,255,0,.09); box-shadow:0 0 8px rgba(251,255,0,.12);
        }

        /* ── DROP BUTTON ── */
        .drop-btn {
            width:100%; padding:17px; border-radius:50px; border:none;
            background:linear-gradient(90deg,#cc0055,#ff0077,#0022ff,#0044dd,#ff0077,#cc0055);
            background-size:300%; color:#fff; font-weight:900; font-size:15px; cursor:pointer;
            box-shadow:0 0 16px rgba(255,0,119,.35), 0 0 36px rgba(0,34,255,.18);
            transition:.25s; letter-spacing:2px; text-transform:uppercase;
            font-family:'Outfit',sans-serif; animation:btnFlow 4s linear infinite; margin-bottom:14px;
        }
        @keyframes btnFlow { 0%{background-position:0%} 100%{background-position:300%} }
        .drop-btn:active   { transform:scale(.97); }
        .drop-btn:disabled { opacity:.35; cursor:not-allowed; animation:none; filter:grayscale(1); }

        /* ── WIN POP ── */
        @keyframes winFloat {
            0%   { opacity:0; transform:translateY(0) scale(.5); }
            30%  { opacity:1; transform:translateY(-14px) scale(1.3); }
            100% { opacity:0; transform:translateY(-70px) scale(1); }
        }
        .win-pop {
            position:fixed; pointer-events:none; font-family:'Outfit',sans-serif;
            font-weight:900; font-size:22px; color:var(--yellow);
            text-shadow:0 0 16px rgba(251,255,0,.9); z-index:700;
            animation:winFloat 1.4s ease forwards;
        }

        /* ── HISTORY ── */
        .hist-sec { padding:0 1px 14px; }
        .hist-lbl {
            font-size:10px; font-weight:900; color:var(--pink); text-transform:uppercase;
            letter-spacing:1px; margin-bottom:9px; display:flex; align-items:center; gap:8px;
        }
        .hist-lbl::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(255,0,119,.4),transparent); }
        .hist-box { background:rgba(0,0,22,.82); border:1px solid rgba(0,34,255,.28); border-radius:14px; overflow:hidden; }
        .hist-scroll {
            max-height:185px; overflow-y:auto;
            scrollbar-width:thin; scrollbar-color:var(--blue) #000;
        }
        .hist-scroll::-webkit-scrollbar { width:3px; }
        .hist-scroll::-webkit-scrollbar-track { background:#000; }
        .hist-scroll::-webkit-scrollbar-thumb { background:var(--blue); border-radius:2px; }
        table.ht { width:100%; border-collapse:collapse; }
        table.ht th {
            padding:9px 10px; font-size:8px; font-weight:900; color:var(--pink);
            text-transform:uppercase; letter-spacing:1px;
            border-bottom:1px solid rgba(255,0,119,.2); background:rgba(0,0,16,.92);
            text-align:left; position:sticky; top:0; z-index:5;
        }
        table.ht td { padding:9px 10px; font-size:11px; font-weight:700; border-bottom:1px solid rgba(0,34,255,.07); }
        table.ht tr:last-child td { border-bottom:none; }
        .rw td { color:var(--green); }
        .rl td { color:rgba(255,255,255,.36); }
        .re td { text-align:center; padding:22px!important; opacity:.3; font-size:12px; }

        /* ── MAXWIN OVERLAY ── */
        #mw-ov {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,.96);
            z-index:9600; flex-direction:column; align-items:center; justify-content:center;
            text-align:center; padding:28px;
        }
        #mw-ov.on { display:flex; }
        .mw-icon { font-size:70px; margin-bottom:18px; animation:mwSpin 2s ease-in-out infinite; }
        @keyframes mwSpin { 0%,100%{transform:rotate(-8deg) scale(1)} 50%{transform:rotate(8deg) scale(1.08)} }
        .mw-title { font-family:'Cinzel Decorative',serif; font-size:21px; color:var(--yellow); text-shadow:var(--gy); margin-bottom:11px; line-height:1.3; }
        .mw-sub   { font-size:12px; color:rgba(255,255,255,.52); margin-bottom:26px; line-height:1.65; white-space:pre-line; }
        .mw-btn   { width:100%; max-width:280px; padding:14px; border-radius:50px; border:none; font-weight:900; font-size:13px; cursor:pointer; font-family:'Outfit',sans-serif; text-transform:uppercase; letter-spacing:1px; margin-bottom:9px; }
        .mw-wd    { background:linear-gradient(90deg,var(--pink),#b400dc); color:#fff; box-shadow:var(--gp); }
        .mw-cont  { background:rgba(255,255,255,.07); color:rgba(255,255,255,.55); border:1px solid rgba(255,255,255,.14); }

        /* ── MODAL ── */
        #modal-ov {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,.93);
            z-index:9999; align-items:center; justify-content:center; backdrop-filter:blur(10px);
        }
        .modal-box {
            width:88%; max-width:320px; background:rgba(0,0,18,.99);
            border:1.5px solid var(--pink); border-top:2px solid var(--yellow);
            border-radius:20px; padding:26px; text-align:center;
            box-shadow:0 0 18px rgba(255,0,119,.22); animation:zIn .3s ease;
        }
        @keyframes zIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
        .modal-box h3 { font-size:16px; font-weight:900; color:var(--pink); text-shadow:var(--gp); margin-bottom:10px; text-transform:uppercase; letter-spacing:1px; }
        .modal-box p  { font-size:13px; color:#ccc; line-height:1.6; }
        .btn-modal {
            width:100%; padding:13px; border-radius:50px; border:none;
            background:linear-gradient(90deg,var(--blue),var(--pink)); color:#fff;
            font-weight:900; font-size:13px; cursor:pointer; margin-top:18px;
            font-family:'Outfit',sans-serif; text-transform:uppercase; letter-spacing:1px;
        }

        /* ── NAV BAR ── */
        .nav-bar {
            position:fixed; bottom:0; left:0; width:100%; height:70px;
            background:rgba(0,0,18,.99); display:flex; justify-content:space-around;
            align-items:center; border-top:1.5px solid rgba(0,34,255,.55);
            backdrop-filter:blur(20px); z-index:1000; padding-bottom:4px;
            box-shadow:0 -3px 16px rgba(0,34,255,.18);
        }
        .ni { color:rgba(255,255,255,.28); text-decoration:none; text-align:center; font-size:9px; font-weight:900; flex:1; transition:.3s; letter-spacing:.5px; text-transform:uppercase; }
        .ni.ac { color:var(--pink); text-shadow:0 0 8px rgba(255,0,119,.5); }
        .ni i  { font-size:19px; display:block; margin-bottom:3px; }
    </style>
</head>

<script>
/* ================================================================
   STATE
================================================================ */
var USERNAME     = null;
var userProf     = {};
var currentSaldo = 0;
var dropping     = false;
var riskMode     = 'low';
var sessionPnl   = 0;
var histRows     = [];

/* ================================================================
   MULTIPLIERS  (13 slots = 12 peg rows hasil)
================================================================ */
var MULTS = {
    low:    [8.5, 3, 1.5, 1.2, 1.1, 0.7, 0.5, 0.7, 1.1, 1.2, 1.5, 3, 8.5],
    medium: [24,  8, 3,   1.8, 1.2, 0.7, 0.4, 0.7, 1.2, 1.8, 3,   8, 24 ],
    high:   [76, 22, 9,   4,   2,   0.6, 0.2, 0.6, 2,   4,   9,  22, 76 ]
};

/* ================================================================
   CANVAS & PHYSICS CONFIG
================================================================ */
var canvas  = document.getElementById('board');
var ctx     = canvas.getContext('2d');

var ROWS    = 12;          /* jumlah baris paku */
var SLOTS   = 13;          /* ROWS + 1 */
var GRAVITY = 0.32;
var BOUNCE  = 0.42;        /* restitusi pantulan */
var FRICTION= 0.985;
var PEG_R;                 /* radius paku — dihitung saat resize */
var BALL_R;                /* radius bola */

/* Posisi paku [{ x, y }] */
var pegs = [];
/* Slot rects [{ x, y, w, h, m }] */
var slots = [];

/* Bola aktif { x, y, vx, vy, trail:[] } */
var ball = null;
var animId = null;

/* ================================================================
   HELPERS
================================================================ */
function snd(id) {
    var a = document.getElementById('a-' + id);
    if (a) { a.currentTime = 0; a.play().catch(function(){}); }
}
function fmtRp(n) { return 'Rp ' + (Math.abs(n) || 0).toLocaleString('id-ID'); }
function getBet()  { return parseInt(document.getElementById('bet-inp').value) || 0; }
function setBet(v) { document.getElementById('bet-inp').value = v; }
function halveBet()  { setBet(Math.max(1000, Math.floor(getBet() / 2))); }
function doubleBet() { setBet(Math.min(currentSaldo || 999999999, getBet() * 2)); }
function maxBet()    { setBet(currentSaldo || 0); }

function showAlert(msg, t) {
    var a = document.getElementById('neon-alert');
    a.textContent = msg;
    a.className   = t ? 'show ' + t : 'show';
    clearTimeout(a._t);
    a._t = setTimeout(function(){ a.className = ''; }, 3500);
}
function showModal(t, m) {
    document.getElementById('m-title').textContent = t;
    document.getElementById('m-msg').textContent   = m;
    document.getElementById('modal-ov').style.display = 'flex';
}
function closeModal() { document.getElementById('modal-ov').style.display = 'none'; }

function updateSaldoUI() {
    var s = 'IDR ' + currentSaldo.toLocaleString('id-ID');
    document.getElementById('saldo-chip').innerHTML =
        '<i class="fas fa-coins" style="margin-right:5px;font-size:10px;"></i>' + s;
    document.getElementById('saldo-val').textContent = s;
}

/* ================================================================
   RISK
================================================================ */
function setRisk(r) {
    riskMode = r;
    ['low','medium','high'].forEach(function(x) {
        var el = document.getElementById('rb-' + x);
        if (el) el.className = 'rb' + (x === r ? ' ar' : '');
    });
    buildLayout();
    drawStatic();
}

/* ================================================================
   BUILD LAYOUT  — paku diamond + slot
================================================================ */
function buildLayout() {
    var W  = canvas.width;
    var H  = canvas.height;

    PEG_R  = Math.max(4, W * 0.014);
    BALL_R = Math.max(6, W * 0.020);

    /* Area paku: top padding, bottom reserved for slots */
    var slotH   = Math.max(32, H * 0.10);
    var padTop  = H * 0.05;
    var pegAreaH= H - padTop - slotH - PEG_R * 2;

    /* Jarak antar baris */
    var rowGap  = pegAreaH / (ROWS - 1);

    pegs = [];
    for (var r = 0; r < ROWS; r++) {
        var cols   = r + 2;                   /* baris 0 → 2 paku, baris 11 → 13 paku */
        var totalW = (cols - 1) * rowGap;     /* pakai rowGap sebagai spasi horizontal */
        var xStart = (W - totalW) / 2;
        var y      = padTop + r * rowGap;
        for (var c = 0; c < cols; c++) {
            pegs.push({ x: xStart + c * rowGap, y: y });
        }
    }

    /* Slot multiplier — 13 kotak di baris paling bawah canvas */
    var mults   = MULTS[riskMode];
    var slotW   = W / mults.length;
    var slotY   = H - slotH;
    slots = [];
    for (var i = 0; i < mults.length; i++) {
        slots.push({ x: i * slotW, y: slotY, w: slotW, h: slotH, m: mults[i], lit: false });
    }
}

/* ================================================================
   DRAW
================================================================ */
function slotColor(m) {
    if (m >= 20) return { fill:'rgba(255,0,80,.75)',   stroke:'rgba(255,0,80,1)',   text:'#ff2266' };
    if (m >= 5)  return { fill:'rgba(255,100,0,.65)',  stroke:'rgba(255,130,0,1)',  text:'#ff8800' };
    if (m >= 1)  return { fill:'rgba(251,255,0,.55)',  stroke:'rgba(251,255,0,1)',  text:'#fbff00' };
               return { fill:'rgba(0,255,136,.45)', stroke:'rgba(0,255,136,1)', text:'#00ff88' };
}

function drawStatic(litIdx) {
    if (litIdx === undefined) litIdx = -1;
    var W = canvas.width, H = canvas.height;
    if (!W || !H) return;

    /* ── Background ── */
    var bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0,   '#000018');
    bg.addColorStop(0.6, '#00000f');
    bg.addColorStop(1,   '#000008');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    /* ── Grid faint ── */
    ctx.strokeStyle = 'rgba(0,34,255,0.03)';
    ctx.lineWidth   = 1;
    var step = W / 20;
    for (var gx = 0; gx < W; gx += step) {
        ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
    }

    /* ── Connector lines between pegs (same row) ── */
    ctx.strokeStyle = 'rgba(0,60,255,0.08)';
    ctx.lineWidth   = 0.8;
    var row = 0, idx = 0;
    while (idx < pegs.length) {
        var cols = row + 2;
        for (var ci = 0; ci < cols - 1; ci++) {
            var p1 = pegs[idx + ci];
            var p2 = pegs[idx + ci + 1];
            if (p1 && p2) {
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            }
        }
        idx += cols; row++;
    }

    /* ── Pegs — diamond shape (rotated square) ── */
    for (var pi = 0; pi < pegs.length; pi++) {
        var p = pegs[pi];
        var s = PEG_R * 1.35;   /* half-size of diamond */

        /* Outer glow */
        ctx.save();
        ctx.shadowColor = 'rgba(0,120,255,0.7)';
        ctx.shadowBlur  = PEG_R * 2.5;

        /* Diamond path */
        ctx.beginPath();
        ctx.moveTo(p.x,     p.y - s);   /* top */
        ctx.lineTo(p.x + s, p.y    );   /* right */
        ctx.lineTo(p.x,     p.y + s);   /* bottom */
        ctx.lineTo(p.x - s, p.y    );   /* left */
        ctx.closePath();

        /* Gradient fill */
        var dg = ctx.createRadialGradient(p.x - s*.25, p.y - s*.25, 0, p.x, p.y, s * 1.2);
        dg.addColorStop(0,   'rgba(200,230,255,1)');
        dg.addColorStop(0.4, 'rgba(60,140,255,.95)');
        dg.addColorStop(1,   'rgba(0,30,200,.6)');
        ctx.fillStyle = dg;
        ctx.fill();

        ctx.strokeStyle = 'rgba(100,180,255,0.5)';
        ctx.lineWidth   = 0.8;
        ctx.stroke();

        ctx.restore();
    }

    /* ── Slot separator line ── */
    if (slots.length) {
        ctx.strokeStyle = 'rgba(0,34,255,0.35)';
        ctx.lineWidth   = 1;
        ctx.beginPath();
        ctx.moveTo(0, slots[0].y);
        ctx.lineTo(W, slots[0].y);
        ctx.stroke();
    }

    /* ── Slots ── */
    var fontSize = Math.max(8, Math.min(12, W * 0.025));
    ctx.font = 'bold ' + fontSize + 'px Outfit,sans-serif';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    for (var si = 0; si < slots.length; si++) {
        var sl  = slots[si];
        var lit = (si === litIdx) || sl.lit;
        var col = slotColor(sl.m);

        /* Fill */
        ctx.fillStyle = lit
            ? col.fill.replace(/[\d.]+\)$/, '0.92)')
            : col.fill;
        ctx.fillRect(sl.x + 1, sl.y, sl.w - 2, sl.h);

        /* Border */
        ctx.strokeStyle = lit ? col.stroke : col.stroke.replace('1)', '0.38)');
        ctx.lineWidth   = lit ? 1.5 : 0.8;
        ctx.strokeRect(sl.x + 1, sl.y, sl.w - 2, sl.h);

        /* Glow on lit */
        if (lit) {
            ctx.shadowColor = col.stroke;
            ctx.shadowBlur  = 18;
            ctx.strokeRect(sl.x + 1, sl.y, sl.w - 2, sl.h);
            ctx.shadowBlur  = 0;
        }

        /* Label */
        ctx.fillStyle = lit ? '#fff' : col.text;
        ctx.fillText(sl.m + 'x', sl.x + sl.w / 2, sl.y + sl.h / 2);
    }
}

function drawFrame() {
    drawStatic();
    if (!ball) return;

    /* Trail */
    for (var ti = 0; ti < ball.trail.length; ti++) {
        var tr = ball.trail[ti];
        var a  = (ti / ball.trail.length) * 0.35;
        ctx.beginPath();
        ctx.arc(tr.x, tr.y, BALL_R * 0.6, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,200,0,' + a + ')';
        ctx.fill();
    }

    /* Ball */
    var bg2 = ctx.createRadialGradient(
        ball.x - BALL_R * .35, ball.y - BALL_R * .35, 0,
        ball.x, ball.y, BALL_R * 1.3
    );
    bg2.addColorStop(0,   'rgba(255,255,200,1)');
    bg2.addColorStop(0.55,'rgba(255,190,0,.95)');
    bg2.addColorStop(1,   'rgba(200,80,0,.6)');

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
    ctx.fillStyle   = bg2;
    ctx.shadowColor = 'rgba(255,200,0,.9)';
    ctx.shadowBlur  = BALL_R * 3;
    ctx.fill();
    ctx.shadowBlur  = 0;
}

/* ================================================================
   PHYSICS LOOP
================================================================ */
function physicsTick(targetSlot, onLand) {
    if (!ball) return;

    var W = canvas.width;
    var H = canvas.height;

    /* Apply gravity */
    ball.vy += GRAVITY;
    ball.vx *= FRICTION;

    /* Move */
    ball.x += ball.vx;
    ball.y += ball.vy;

    /* Trail */
    ball.trail.push({ x: ball.x, y: ball.y });
    if (ball.trail.length > 12) ball.trail.shift();

    /* Wall bounce */
    if (ball.x - BALL_R < 0)   { ball.x = BALL_R;      ball.vx = Math.abs(ball.vx) * BOUNCE; }
    if (ball.x + BALL_R > W)   { ball.x = W - BALL_R;  ball.vx = -Math.abs(ball.vx) * BOUNCE; }

    /* Peg collision — real circle vs diamond (use circle hitbox = PEG_R * 1.1) */
    var pegHit = PEG_R * 1.15;
    for (var pi = 0; pi < pegs.length; pi++) {
        var p  = pegs[pi];
        var dx = ball.x - p.x;
        var dy = ball.y - p.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var minD = BALL_R + pegHit;

        if (dist < minD && dist > 0.01) {
            /* Push ball out */
            var nx   = dx / dist;
            var ny   = dy / dist;
            var overlap = minD - dist;
            ball.x += nx * overlap;
            ball.y += ny * overlap;

            /* Reflect velocity */
            var dot  = ball.vx * nx + ball.vy * ny;
            ball.vx  = (ball.vx - 2 * dot * nx) * BOUNCE;
            ball.vy  = (ball.vy - 2 * dot * ny) * BOUNCE;

            /* Small random nudge for variety */
            ball.vx += (Math.random() - 0.5) * 0.5;
        }
    }

    /* Slot detection */
    if (slots.length && ball.y + BALL_R >= slots[0].y) {
        /* Find which slot the ball center is in */
        var landedSlot = targetSlot;
        for (var si = 0; si < slots.length; si++) {
            if (ball.x >= slots[si].x && ball.x < slots[si].x + slots[si].w) {
                landedSlot = si;
                break;
            }
        }

        /* Stop physics */
        cancelAnimationFrame(animId);
        ball = null;

        /* Light up slot */
        if (slots[landedSlot]) slots[landedSlot].lit = true;
        drawStatic();
        setTimeout(function() {
            if (slots[landedSlot]) slots[landedSlot].lit = false;
            drawStatic();
            onLand(landedSlot);
        }, 600);
        return;
    }

    drawFrame();
    animId = requestAnimationFrame(function(){ physicsTick(targetSlot, onLand); });
}

/* ================================================================
   OUTCOME LOGIC  (winrate / maxwin dari DB)
================================================================ */
function computeOutcome() {
    var mults = MULTS[riskMode];
    var wr    = userProf.panic_mode
        ? Math.min(userProf.winrate || 30, 5)
        : (userProf.winrate || 30);

    var mwl = userProf.maxwin_limit || 0;
    if (mwl > 0 && sessionPnl >= mwl) {
        /* force loss */
        var lArr = [];
        for (var i = 0; i < mults.length; i++) { if (mults[i] < 1) lArr.push(i); }
        var li = lArr[Math.floor(Math.random() * lArr.length)];
        if (li === undefined) li = Math.floor(mults.length / 2);
        return { slot: li, mult: mults[li], win: false, forced: true };
    }

    var win = Math.random() * 100 < wr;
    if (win) {
        var wArr = [];
        for (var j = 0; j < mults.length; j++) { if (mults[j] >= 1) wArr.push(j); }
        var wi = wArr[Math.floor(Math.random() * wArr.length)];
        if (wi === undefined) wi = Math.floor(mults.length / 2);
        return { slot: wi, mult: mults[wi], win: true };
    } else {
        var lArr2 = [];
        for (var k = 0; k < mults.length; k++) { if (mults[k] < 1) lArr2.push(k); }
        var li2 = lArr2[Math.floor(Math.random() * lArr2.length)];
        if (li2 === undefined) li2 = Math.floor(mults.length / 2);
        return { slot: li2, mult: mults[li2], win: false };
    }
}

/* ================================================================
   DROP BALL  — spawn bola dengan fisika nyata
================================================================ */
function dropBall() {
    if (dropping) return;
    if (!USERNAME) { showModal('LOGIN DULU', 'Silakan login untuk bermain.'); return; }

    var bet = getBet();
    if (!bet || bet < 1000)   { showAlert('Minimal bet Rp 1.000', 'warn'); return; }
    if (bet > currentSaldo)   { showAlert('Saldo tidak cukup!', '');       return; }

    dropping = true;
    var btn = document.getElementById('drop-btn');
    btn.disabled  = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>&nbsp;DROPPING...';

    snd('drop');
    currentSaldo -= bet;
    updateSaldoUI();

    var outcome = computeOutcome();

    /* Compute target X center (lure the ball toward target slot) */
    var targetSlot = outcome.slot;
    var targetX    = slots[targetSlot]
        ? slots[targetSlot].x + slots[targetSlot].w / 2
        : canvas.width / 2;

    /* Spawn ball at top center with slight random horizontal */
    var spawnX = canvas.width / 2 + (Math.random() - 0.5) * PEG_R * 2;
    /* Initial vx biased toward target */
    var bias   = (targetX - spawnX) * 0.008;
    ball = {
        x     : spawnX,
        y     : BALL_R + 4,
        vx    : bias + (Math.random() - 0.5) * 0.6,
        vy    : 1.5,
        trail : []
    };

    var payout = Math.floor(bet * outcome.mult);
    var profit = payout - bet;

    /* Start physics */
    animId = requestAnimationFrame(function(){
        physicsTick(targetSlot, function(landedSlot) {
            /* Use landed slot's actual multiplier */
            var actualMult = slots[landedSlot] ? slots[landedSlot].m : outcome.mult;
            var actualPay  = Math.floor(bet * actualMult);
            var actualProf = actualPay - bet;

            currentSaldo += actualPay;
            sessionPnl   += actualProf;
            updateSaldoUI();

            if (actualProf > 0) {
                snd('win');
                showAlert('WIN! +' + fmtRp(actualProf) + ' (' + actualMult + 'x)', 'ok');
                spawnWinPop('+' + fmtRp(actualProf));
            } else {
                snd('lose');
                showAlert(fmtRp(actualProf) + ' (' + actualMult + 'x)', '');
            }

            addHistRow(bet, actualMult, actualPay, actualProf);

            /* Save saldo */
            try {
                if (typeof _db !== 'undefined') {
                    _db.from('profiles')
                       .update({ saldo: currentSaldo, updated_at: new Date().toISOString() })
                       .eq('username', USERNAME)
                       .then(function(){}).catch(function(e){ console.warn('DB:', e); });
                }
            } catch(e) { console.warn('DB update:', e); }

            /* MaxWin check */
            var mwl = userProf.maxwin_limit || 0;
            if (mwl > 0 && sessionPnl >= mwl) {
                snd('win');
                document.getElementById('mw-sub').textContent =
                    'Kemenangan sesi: ' + fmtRp(sessionPnl) + '\nLimit: ' + fmtRp(mwl);
                document.getElementById('mw-ov').classList.add('on');
            }

            dropping = false;
            btn.disabled  = false;
            btn.innerHTML = '<i class="fas fa-circle-dot"></i>&nbsp;&nbsp;DROP BALL';
        });
    });
}

/* ================================================================
   WIN POP
================================================================ */
function spawnWinPop(txt) {
    var el = document.createElement('div');
    el.className   = 'win-pop';
    el.textContent = txt;
    el.style.left  = (15 + Math.random() * 60) + '%';
    el.style.top   = '38%';
    document.body.appendChild(el);
    setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 1500);
}

/* ================================================================
   HISTORY
================================================================ */
function addHistRow(bet, mult, payout, profit) {
    var now = new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    histRows.unshift({ bet:bet, mult:mult, payout:payout, profit:profit, now:now });
    if (histRows.length > 30) histRows = histRows.slice(0, 30);
    renderHist();
}
function renderHist() {
    var body = document.getElementById('hist-body');
    if (!histRows.length) {
        body.innerHTML = '<tr class="re"><td colspan="4">Belum ada permainan</td></tr>';
        return;
    }
    var html = '';
    for (var i = 0; i < histRows.length; i++) {
        var r   = histRows[i];
        var cls = r.profit > 0 ? 'rw' : 'rl';
        var col = r.profit > 0 ? 'var(--green)' : 'var(--pink)';
        var sgn = r.profit > 0 ? '+' : '';
        html += '<tr class="' + cls + '">'
              + '<td>' + fmtRp(r.bet) + '</td>'
              + '<td style="font-weight:900">' + r.mult + 'x</td>'
              + '<td style="font-weight:900;color:' + col + '">' + sgn + fmtRp(r.profit) + '</td>'
              + '<td style="font-size:9px;opacity:.4">' + r.now + '</td>'
              + '</tr>';
    }
    body.innerHTML = html;
}

/* ================================================================
   LOAD PROFILE
================================================================ */
function loadProfile() {
    var user = (typeof getUsername === 'function') ? getUsername() : localStorage.getItem('neon_user');
    if (!user) {
        showModal('LOGIN', 'Sesi tidak ditemukan. Harap login kembali.');
        return;
    }
    USERNAME = user;

    if (typeof _db === 'undefined') {
        showAlert('Mode offline', 'warn');
        return;
    }

    _db.from('profiles').select('*').eq('username', USERNAME).single()
       .then(function(res) {
           var data = res.data, error = res.error;
           if (error || !data) {
               showModal('ERROR', 'Gagal memuat profil: ' + (error ? error.message : 'not found'));
               return;
           }
           userProf     = data;
           currentSaldo = Number(data.saldo) || 0;
           updateSaldoUI();

           if (data.panic_mode) document.getElementById('panic-bar').style.display = 'block';

           /* Save session start for master panel */
           _db.from('profiles').update({
               initial_balance_session : currentSaldo,
               session_start           : new Date().toISOString()
           }).eq('username', USERNAME).then(function(){}).catch(function(){});

           /* Realtime */
           _db.channel('game-' + USERNAME)
              .on('postgres_changes', {
                  event  : 'UPDATE',
                  schema : 'public',
                  table  : 'profiles',
                  filter : 'username=eq.' + USERNAME
              }, function(payload) {
                  if (!payload.new) return;
                  currentSaldo = Number(payload.new.saldo) || 0;
                  userProf     = Object.assign({}, userProf, payload.new);
                  updateSaldoUI();
                  document.getElementById('panic-bar').style.display =
                      payload.new.panic_mode ? 'block' : 'none';
              })
              .subscribe();
       })
       .catch(function(e){ showModal('ERROR', 'Gagal: ' + (e.message || e)); });
}

/* ================================================================
   CANVAS RESIZE
================================================================ */
function resizeCanvas() {
    var box = canvas.parentElement;
    var W   = (box && box.clientWidth > 10) ? box.clientWidth : (window.innerWidth - 20);
    var H   = Math.round(W * 1.0);  /* 1:1 ratio — papan lebih tinggi untuk fisika */
    if (canvas.width !== W || canvas.height !== H) {
        canvas.width  = W;
        canvas.height = H;
    }
}

/* ================================================================
   PARTICLES
================================================================ */
function initParticles() {
    if (typeof particlesJS === 'undefined') return;
    particlesJS('particles-js', {
        particles: {
            number  : { value: 50 },
            color   : { value: ['#0022ff','#ff0077','#fbff00'] },
            shape   : { type: 'circle' },
            opacity : { value:.4, random:true, anim:{ enable:true, speed:.5, opacity_min:.1 } },
            size    : { value:2, random:true },
            line_linked:{ enable:true, distance:110, color:'#0022ff', opacity:.18, width:.6 },
            move    : { enable:true, speed:1.3, random:true, out_mode:'out' }
        },
        interactivity: { events:{ onhover:{enable:false}, onclick:{enable:false} } }
    });
}

/* ================================================================
   INIT
================================================================ */
function init() {
    /* Two rAF to ensure layout is settled before measuring */
    requestAnimationFrame(function() {
        requestAnimationFrame(function() {
            resizeCanvas();
            buildLayout();
            drawStatic();
        });
    });

    initParticles();
    loadProfile();

    window.addEventListener('resize', function() {
        resizeCanvas();
        buildLayout();
        drawStatic();
    });
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
