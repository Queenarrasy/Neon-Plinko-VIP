<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP - ULTIMATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --pink: #ff0077; --blue: #0044ff; --yellow: #fbff00; --white: #ffffff; --bg: #03040a;
            --neon-pink: 0 0 12px rgba(255, 0, 119, 0.7);
            --neon-blue: 0 0 12px rgba(0, 68, 255, 0.7);
            --neon-white: 0 0 8px rgba(255, 255, 255, 0.4);
            --neon-yellow: 0 0 12px rgba(251, 255, 0, 0.7);
        }
        body {
            background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column;
        }

        #neon-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0a0b1e; border: 2px solid var(--pink); border-radius: 15px;
            box-shadow: var(--neon-pink); z-index: 9999; padding: 20px; text-align: center;
            min-width: 280px; animation: modalIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalIn { from { opacity: 0; transform: translate(-50%, -60%) scale(0.8); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        
        .modal-btn {
            margin-top: 15px; padding: 10px 25px; border-radius: 8px; cursor: pointer;
            border: 1px solid var(--yellow); background: transparent; color: var(--yellow); font-weight: bold; text-transform: uppercase;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; background: rgba(0, 0, 0, 0.95); border-bottom: 2px solid var(--blue);
        }
        .header-item { text-align: center; cursor: pointer; min-width: 60px; transition: 0.2s; }
        .header-item:active { transform: scale(0.9); }
        .header-item i { font-size: 28px; display: block; margin-bottom: 2px; }
        .header-item span { font-size: 10px; font-weight: 900; letter-spacing: 1px; }

        .balance-box {
            background: #000; border: 2px solid var(--pink); border-radius: 20px;
            padding: 6px 20px; box-shadow: var(--neon-pink); text-align: center;
            flex-grow: 1; margin: 0 15px;
        }
        .saldo-label { font-size: 9px; color: var(--white); opacity: 0.8; font-weight: bold; margin-bottom: 2px; }
        #display-saldo { font-size: 18px; font-weight: bold; color: var(--white); font-family: monospace; }

        #game-board { position: relative; width: 100%; height: 380px; overflow: visible; margin-top: 15px; }
        .peg {
            position: absolute; width: 6px; height: 6px; background: var(--white);
            border-radius: 50%; box-shadow: var(--neon-white); transform: translate(-50%, -50%);
            transition: background 0.1s, transform 0.1s;
        }
        .peg.hit { background: var(--yellow); box-shadow: var(--neon-yellow); transform: translate(-50%, -50%) scale(1.8); }
        
        .ball {
            position: absolute; width: 12px; height: 12px; background: radial-gradient(circle at 30% 30%, var(--pink), #600);
            border-radius: 50%; box-shadow: var(--neon-pink); transform: translate(-50%, -50%); z-index: 10;
            will-change: transform;
        }
        
        .multiplier-row { display: flex; justify-content: center; gap: 4px; padding: 0 10px; margin: 10px 0; }
        .slot {
            flex: 1; height: 35px; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 900; border-radius: 6px; color: #000; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .slot.active { transform: translateY(-8px); filter: brightness(1.5); box-shadow: 0 0 20px var(--white); }
        .s-high { background: var(--pink); } .s-mid { background: var(--yellow); } .s-low { background: var(--blue); color: white !important; }

        #floating-score {
            position: fixed; top: 110px; right: 10px; background: rgba(0,0,0,0.8);
            border: 1px solid var(--blue); border-radius: 10px; padding: 10px;
            z-index: 1000; box-shadow: var(--neon-blue); min-width: 110px;
        }
        .score-entry { font-size: 12px; font-weight: bold; color: var(--yellow); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 4px 0; }

        .controls { padding: 15px; background: #050714; border-top: 2px solid var(--blue); }
        .mode-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .btn-mode { background: transparent; padding: 10px 18px; border-radius: 12px; font-size: 11px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        
        #m-normal { border: 1px solid var(--pink); color: var(--pink); }
        #m-normal.active { background: var(--pink); color: white; box-shadow: var(--neon-pink); }
        #m-turbo { border: 1px solid var(--blue); color: var(--blue); }
        #m-turbo.active { background: var(--blue); color: white; box-shadow: var(--neon-blue); }
        #m-auto { border: 1px solid var(--yellow); color: var(--yellow); }
        #m-auto.active { background: var(--yellow); color: black; box-shadow: var(--neon-yellow); }

        .btn-play {
            width: 100%; padding: 18px; border-radius: 50px; background: linear-gradient(135deg, #ff0077, #0044ff);
            color: white; font-weight: 900; border: 2px solid var(--yellow); text-transform: uppercase; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn-play:active { transform: scale(0.96); }
        .btn-play:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .nav-bottom { display: grid; grid-template-columns: repeat(3, 1fr); background: #000; padding: 12px 5px; gap: 10px; border-top: 2px solid var(--blue); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 0; border-radius: 12px; text-decoration: none; border: 1px solid; font-weight: 900; }
        .nav-btn i { font-size: 22px; margin-bottom: 4px; }
        .nav-btn span { font-size: 10px; }

        .btn-withdraw { border-color: var(--yellow); color: var(--yellow); }
        .btn-deposit { border-color: var(--pink); color: var(--pink); }
        .btn-reward { border-color: var(--blue); color: var(--blue); }
    </style>
</head>
<body>

    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="snd-error" src="https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3"></audio>

    <div id="neon-modal">
        <h3 id="modal-title" style="margin: 0;">NOTIFIKASI</h3>
        <p id="modal-msg" style="color: white; font-size: 14px; margin: 15px 0;"></p>
        <button class="modal-btn" onclick="closeModal()">OK</button>
    </div>

    <div id="floating-score">
        <div id="score-list">
            <div class="score-entry" style="opacity:0.3">Ready...</div>
        </div>
    </div>

    <div class="header">
        <div class="header-item" onclick="playSound('click'); location.href='profil.html'">
            <i class="fa-solid fa-circle-user" style="color: var(--yellow); text-shadow: var(--neon-yellow);"></i>
            <span style="color: var(--yellow);">PROFIL</span>
        </div>
        <div class="balance-box">
            <div class="saldo-label">SALDO UTAMA</div>
            <div id="display-saldo">IDR 0</div>
        </div>
        <div class="header-item" style="visibility: hidden;"></div>
    </div>

    <div id="game-board"></div>
    <div class="multiplier-row" id="slot-row"></div>

    <div class="controls">
        <div class="mode-row">
            <button class="btn-mode active" id="m-normal" onclick="setSpeed('normal')">NORMAL</button>
            <button class="btn-mode" id="m-turbo" onclick="setSpeed('turbo')">TURBO</button>
            <button class="btn-mode" id="m-auto" onclick="toggleAuto()">AUTO: OFF</button>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; padding: 0 10px;">
            <i class="fa-solid fa-circle-minus" onclick="changeBet(-1)" id="minus-bet" style="color:var(--pink); font-size: 32px; cursor:pointer;"></i>
            <div style="text-align: center;">
                <div style="font-size: 10px; color: #888; font-weight: bold; margin-bottom: 4px;">TARUHAN</div>
                <span id="current-bet" style="color:var(--yellow); font-size:24px; font-weight:bold; letter-spacing:1px;">400</span>
            </div>
            <i class="fa-solid fa-circle-plus" onclick="changeBet(1)" id="plus-bet" style="color:var(--blue); font-size: 32px; cursor:pointer;"></i>
        </div>
        <button class="btn-play" id="main-btn-play" onclick="handlePlay()">PLAY BALL</button>
    </div>

    <div class="nav-bottom">
        <a href="withdraw.html" class="nav-btn btn-withdraw" onclick="playSound('click')">
            <i class="fa-solid fa-money-bill-transfer"></i><span>WITHDRAW</span>
        </a>
        <a href="deposit.html" class="nav-btn btn-deposit" onclick="playSound('click')">
            <i class="fa-solid fa-wallet"></i><span>DEPOSIT</span>
        </a>
        <a href="reward.html" class="nav-btn btn-reward" onclick="playSound('click')">
            <i class="fa-solid fa-gift"></i><span>REWARD</span>
        </a>
    </div>

    <script src="global.js"></script>
    <script>
        const board = document.getElementById('game-board');
        const betList = [400, 800, 1000, 1200, 1600, 1800, 2000, 4000, 8000, 10000, 12000, 16000, 18000, 20000];
        const multipliers = [5, 2, 1.2, 0.5, 0.2, 0.5, 1.2, 2, 5];
        let betIdx = 0, pegLocs = [], speed = 'normal', isAuto = false, autoInt;
        
        const API_URL = typeof SCRIPT_URL !== 'undefined' ? SCRIPT_URL : "";

        function playSound(type) {
            const s = document.getElementById('snd-' + type);
            if(s) { s.currentTime = 0; s.play().catch(e => {}); }
        }

        function showModal(msg, color = 'var(--pink)') {
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('neon-modal').style.borderColor = color;
            document.getElementById('modal-title').style.color = color;
            document.getElementById('neon-modal').style.display = 'block';
        }

        function closeModal() {
            playSound('click');
            document.getElementById('neon-modal').style.display = 'none';
        }

        function init() {
            board.innerHTML = ''; pegLocs = [];
            const rows = 9, centerX = board.offsetWidth / 2;
            if(centerX === 0) return setTimeout(init, 100);
            
            for (let r = 2; r <= rows; r++) {
                for (let i = 0; i < r; i++) {
                    const x = centerX + (i - (r - 1) / 2) * 38;
                    const y = r * 35;
                    const p = document.createElement('div');
                    p.className = 'peg'; p.style.left = x + 'px'; p.style.top = y + 'px';
                    board.appendChild(p); pegLocs.push({ x, y, el: p });
                }
            }
            const row = document.getElementById('slot-row'); row.innerHTML = '';
            multipliers.forEach(m => {
                const s = document.createElement('div');
                s.className = `slot ${m >= 2 ? 's-high' : m >= 1 ? 's-mid' : 's-low'}`;
                s.innerText = m + 'x'; row.appendChild(s);
            });
        }

        function setSpeed(m) {
            playSound('click');
            speed = m;
            document.getElementById('m-normal').classList.toggle('active', m === 'normal');
            document.getElementById('m-turbo').classList.toggle('active', m === 'turbo');
            if(isAuto) { 
                clearInterval(autoInt); 
                let interval = speed === 'turbo' ? 300 : 800;
                autoInt = setInterval(handlePlay, interval); 
            }
        }

        function toggleAuto() {
            playSound('click');
            isAuto = !isAuto;
            document.getElementById('m-auto').innerText = isAuto ? "AUTO: ON" : "AUTO: OFF";
            document.getElementById('m-auto').classList.toggle('active', isAuto);
            
            if(isAuto) {
                let interval = speed === 'turbo' ? 300 : 800;
                autoInt = setInterval(handlePlay, interval);
            } else {
                clearInterval(autoInt);
            }
        }

        function changeBet(d) {
            if(isAuto) return;
            playSound('click');
            betIdx = Math.max(0, Math.min(betList.length - 1, betIdx + d));
            document.getElementById('current-bet').innerText = betList[betIdx].toLocaleString();
        }

        // Logic Play yang diperbaiki (INSTANT BALL)
        async function handlePlay() {
            const bet = betList[betIdx];
            let saldoLokal = Number(localStorage.getItem('user_saldo') || 0);

            if (saldoLokal < bet) { 
                playSound('error');
                if(isAuto) toggleAuto(); 
                return showModal("Saldo Tidak Cukup!", 'var(--pink)'); 
            }

            // 1. POTONG SALDO INSTAN DI UI
            saldoLokal -= bet;
            localStorage.setItem('user_saldo', saldoLokal);
            if (window.updateUI) updateUI({saldo: saldoLokal});
            else document.getElementById('display-saldo').innerText = "IDR " + saldoLokal.toLocaleString();

            // 2. MUNCULKAN BOLA INSTAN (Predictive animation)
            // Kita gunakan multiplier random dulu untuk animasi awal jika server lambat
            const fallbackMult = multipliers[Math.floor(Math.random() * multipliers.length)];
            
            // 3. KIRIM DATA KE SERVER (ASYNC)
            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "game_play",
                    username: localStorage.getItem('username'),
                    bet: bet
                })
            }).then(res => res.json()).then(result => {
                if (result.result === "SUCCESS") {
                    localStorage.setItem('user_saldo', result.newSaldo);
                    if (window.updateUI) updateUI({saldo: result.newSaldo});
                    // Jalankan bola dengan hasil asli dari server
                    dropBall(bet, result.target_multiplier);
                } else {
                    if(isAuto) toggleAuto();
                    showModal(result.message);
                }
            }).catch(e => {
                // Jika koneksi putus, tetap jalankan bola dengan fallback agar tidak kaku
                dropBall(bet, fallbackMult);
            });
        }

        function dropBall(bet, targetMult) {
            const ball = document.createElement('div');
            ball.className = 'ball';
            board.appendChild(ball);
            
            let px = (board.offsetWidth / 2) + (Math.random() * 4 - 2);
            let py = 10;
            let vx = (Math.random() - 0.5) * 2; 
            let vy = 0; 
            
            const targetIdx = multipliers.indexOf(targetMult);
            const slotWidth = board.offsetWidth / multipliers.length;
            const targetX = (targetIdx * slotWidth) + (slotWidth / 2);

            // Pengaturan Fisika per Mode
            const config = {
                normal: { gravity: 0.25, bounce: 0.4, friction: 0.99, speedMod: 1 },
                turbo: { gravity: 0.45, bounce: 0.3, friction: 0.98, speedMod: 1.4 }
            }[speed];

            function animate() {
                vy += config.gravity;
                vx *= config.friction;
                px += vx;
                py += vy;

                // Tabrakan Peg (Fisika Realistik)
                pegLocs.forEach(p => {
                    const dx = px - p.x;
                    const dy = py - p.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist < 10) { 
                        playSound('hit');
                        const angle = Math.atan2(dy, dx);
                        const force = 3.5 * config.speedMod;
                        
                        vx = Math.cos(angle) * force + (Math.random() - 0.5);
                        vy = Math.abs(Math.sin(angle) * force * 0.6); 

                        // Koreksi lintasan halus menuju targetX (terutama di bagian bawah)
                        let influence = py / 450; 
                        vx += (targetX - px) * (influence * 0.15);

                        p.el.classList.add('hit'); 
                        setTimeout(() => p.el.classList.remove('hit'), 70);
                    }
                });

                // Dinding
                if (px < 10 || px > board.offsetWidth - 10) {
                    vx *= -0.5;
                    px = px < 10 ? 10 : board.offsetWidth - 10;
                }

                ball.style.transform = `translate(${px}px, ${py}px)`;

                if (py < 375) {
                    requestAnimationFrame(animate);
                } else {
                    ball.remove();
                    finish(bet, targetMult, targetIdx);
                }
            }
            requestAnimationFrame(animate);
        }

        function finish(bet, targetMult, targetIdx) {
            const win = Math.floor(bet * targetMult);
            if(targetMult >= 1.2) playSound('win');
            
            const slots = document.querySelectorAll('.slot');
            if(slots[targetIdx]) {
                slots[targetIdx].classList.add('active'); 
                setTimeout(() => slots[targetIdx].classList.remove('active'), 500);
            }

            const list = document.getElementById('score-list');
            const entry = document.createElement('div');
            entry.className = 'score-entry';
            entry.style.animation = "modalIn 0.3s ease forwards";
            entry.innerHTML = `<span style="color:var(--yellow)">${targetMult}x</span> | <small>IDR</small> ${win.toLocaleString()}`;
            list.prepend(entry);
            if(list.children.length > 5) list.removeChild(list.lastChild);
        }

        window.onload = init;
        window.onresize = init;
    </script>
</body>
</html>
