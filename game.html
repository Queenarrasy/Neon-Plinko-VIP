<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { 
    --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #02030d; 
    --pink-neon: 0 0 5px var(--pink), 0 0 10px var(--pink);
    --blue-neon: 0 0 5px var(--blue), 0 0 10px var(--blue);
    --yellow-neon: 0 0 5px var(--yellow), 0 0 10px var(--yellow);
    --gb: 0 0 15px rgba(0, 212, 255, 0.5);
    --header-h: 65px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; }

/* Header */
.header { height: var(--header-h); background: rgba(2, 3, 13, 0.95); border-bottom: 2px solid var(--blue); box-shadow: var(--gb); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; z-index: 100; }
.profile-btn { color: var(--blue); font-size: 24px; text-shadow: var(--blue-neon); cursor: pointer; }
.balance-box { background: rgba(0, 0, 0, 0.6); border: 2px solid var(--blue); border-radius: 20px; padding: 5px 20px; text-align: center; min-width: 160px; box-shadow: var(--blue-neon); }
#display-saldo { font-family: 'Cinzel Decorative', serif; font-size: 18px; color: var(--yellow); text-shadow: var(--yellow-neon); font-weight: 900; }
#display-username { font-size: 9px; color: var(--blue); display: block; letter-spacing: 1px; text-transform: uppercase; }

/* Game Board */
#board-wrapper { flex: 1; position: relative; background: radial-gradient(circle at center, #070a24 0%, #02030d 100%); overflow: hidden; display: flex; flex-direction: column; }
#plinko-canvas { flex: 1; display: block; width: 100%; }
#floating-score { position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--blue); border-radius: 8px; padding: 5px; width: 100px; box-shadow: var(--gb); z-index: 20; }
.score-entry { font-size: 10px; border-bottom: 1px solid rgba(0, 212, 255, 0.2); padding: 4px 0; text-align: center; color: var(--pink); animation: slideIn 0.3s ease-out; }

/* Multipliers Slots */
.multiplier-row { height: 38px; display: flex; width: 100%; padding: 0 2px; gap: 2px; z-index: 10; margin-top: -5px; }
.slot { flex: 1; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
.s-high { background: var(--pink); box-shadow: 0 0 10px var(--pink); color: white; }
.s-mid { background: var(--yellow); color: black; box-shadow: 0 0 10px var(--yellow); }
.s-low { background: var(--blue); color: white; box-shadow: 0 0 10px var(--blue); }
.slot.active { transform: scale(1.2); filter: brightness(1.5); box-shadow: 0 0 20px #fff; border: 2px solid #fff; z-index: 11; }

/* Controls */
.controls { padding: 15px 15px 30px 15px; background: #050614; border-top: 2px solid var(--blue); display: flex; flex-direction: column; gap: 12px; }
.mode-row { display: flex; gap: 8px; }
.btn-mode { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--blue); background: rgba(0, 212, 255, 0.1); color: var(--blue); font-size: 11px; font-weight: bold; cursor: pointer; }
.btn-mode.active { background: var(--blue); color: #fff; box-shadow: var(--blue-neon); }

.bet-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.5); border-radius: 50px; padding: 8px 25px; border: 1px solid var(--blue); }
.bet-btn { background: none; border: none; color: var(--pink); font-size: 28px; cursor: pointer; font-weight: 900; }
#current-bet { font-family: 'Cinzel Decorative'; font-size: 22px; color: var(--yellow); text-shadow: var(--yellow-neon); }

.btn-main { width: 100%; padding: 16px; border-radius: 50px; border: none; font-family: 'Cinzel Decorative'; font-weight: 900; font-size: 18px; color: #fff; cursor: pointer; background: linear-gradient(90deg, var(--blue), var(--pink)); box-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
.btn-main:disabled { opacity: 0.5; }

.nav-bottom { display: flex; gap: 8px; }
.nav-btn { flex: 1; padding: 10px; text-align: center; border-radius: 10px; text-decoration: none; font-size: 9px; font-weight: bold; border: 1px solid rgba(0, 212, 255, 0.3); color: #fff; background: rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; align-items: center; gap: 4px; }
.nav-btn i { font-size: 14px; color: var(--blue); }

/* Modals */
#modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; backdrop-filter: blur(5px); }
#neon-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background: #02030d; border: 2px solid var(--pink); border-radius: 20px; padding: 25px; text-align: center; z-index:1001; box-shadow: var(--pink-neon); width: 85%; max-width: 320px; }

@keyframes slideIn { from { opacity:0; transform:translateX(10px); } to { opacity:1; transform:translateX(0); } }
</style>
</head>
<body>

<audio id="snd-hit" src="https://www.soundjay.com/buttons/button-16.mp3" preload="auto"></audio>
<audio id="snd-win" src="https://www.soundjay.com/buttons/button-3.mp3" preload="auto"></audio>
<audio id="snd-ball" src="https://www.soundjay.com/interface/button-21.mp3" preload="auto"></audio>

<div id="modal-overlay" onclick="closeModal()"></div>
<div id="neon-modal">
  <div style="font-family:'Cinzel Decorative'; color:var(--pink); margin-bottom:15px; font-size:18px;">SYSTEM ALERT</div>
  <p id="modal-msg" style="color:#ccc; margin-bottom:20px; font-size:14px;"></p>
  <button class="btn-main" onclick="closeModal()" style="padding:10px 30px; font-size:14px;">UNDERSTOOD</button>
</div>

<div class="header">
  <div class="profile-btn" onclick="location.href='profil.html'"><i class="fa-solid fa-user-astronaut"></i></div>
  <div class="balance-box">
    <span id="display-username">GUEST</span>
    <span id="display-saldo">IDR 0</span>
  </div>
  <div class="profile-btn" onclick="location.href='settings.html'"><i class="fa-solid fa-sliders"></i></div>
</div>

<div id="board-wrapper">
  <canvas id="plinko-canvas"></canvas>
  <div id="floating-score"><div id="score-list"></div></div>
</div>

<div class="multiplier-row" id="slot-row"></div>

<div class="controls">
  <div class="mode-row">
    <button class="btn-mode active" id="m-normal" onclick="setSpeedMode('normal')">NORMAL</button>
    <button class="btn-mode" id="m-turbo" onclick="setSpeedMode('turbo')">TURBO</button>
    <button class="btn-mode" id="m-auto" onclick="toggleAuto()">AUTO PLAY</button>
  </div>
  <div class="bet-row">
    <button class="bet-btn" onclick="changeBet(-1)">-</button>
    <div style="text-align:center">
      <div id="current-bet">1,000</div>
    </div>
    <button class="bet-btn" onclick="changeBet(1)">+</button>
  </div>
  <button class="btn-main" id="main-btn" onclick="spawnBall()">DROP NEON BALL</button>
  <div class="nav-bottom">
    <a href="withdraw.html" class="nav-btn"><i class="fa-solid fa-money-bill-transfer"></i> WITHDRAW</a>
    <a href="deposit.html" class="nav-btn"><i class="fa-solid fa-building-columns"></i> DEPOSIT</a>
    <a href="reward.html" class="nav-btn"><i class="fa-solid fa-trophy"></i> REWARD</a>
  </div>
</div>

<script src="global.js"></script>
<script>
/**
 * NEON PLINKO VIP v8.0 — FULL UNIFIED SCRIPT
 * Menggabungkan Visual Modern dengan Logika Server-Side Presisi.
 */

const ROWS = 10;
const MULTS = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
const BETS = [200, 500, 1000, 2000, 5000, 10000, 25000, 50000, 100000];
const BALL_R = 7, PEG_R = 3;

let canvas, ctx, BW, BH, pegs = [], balls = [], slotW, particles = [];
let speedMode = 'normal', isAuto = false, autoTimer = null, betIdx = 2;
let _saldo = 0;

const PH = {
  normal: { grav: 0.45, fric: 0.99, bounce: 0.5, autoMs: 800 },
  turbo:  { grav: 1.0, fric: 0.98, bounce: 0.35, autoMs: 200 }
};

// ── INIT ─────────────────────────────────────────────────────
function init() {
  canvas = document.getElementById('plinko-canvas');
  ctx = canvas.getContext('2d');
  resize();
  buildSlots();
  
  const user = getUsername();
  if (!user) { location.href = 'index.html'; return; }
  document.getElementById('display-username').innerText = user;

  // Initial Sync Saldo
  ProfileAPI.sync().then(data => {
    if(data) {
        _saldo = data.saldo;
        _renderS();
    }
  });

  loop();
}

function resize() {
  const wrap = document.getElementById('board-wrapper');
  BW = wrap.offsetWidth;
  BH = wrap.offsetHeight;
  const DPR = window.devicePixelRatio || 1;
  canvas.width = BW * DPR;
  canvas.height = BH * DPR;
  canvas.style.width = BW + 'px';
  canvas.style.height = BH + 'px';
  ctx.scale(DPR, DPR);
  slotW = BW / MULTS.length;
  buildPegs();
}

function buildPegs() {
  pegs = [];
  const spacingX = (BW * 0.9) / (ROWS + 1);
  const spacingY = (BH * 0.8) / ROWS;
  for (let r = 0; r < ROWS; r++) {
    const count = r + 2;
    const startX = (BW - (count - 1) * spacingX) / 2;
    for (let c = 0; c < count; c++) {
      pegs.push({ x: startX + c * spacingX, y: 40 + r * spacingY, glow: 0 });
    }
  }
}

function buildSlots() {
  const row = document.getElementById('slot-row');
  row.innerHTML = '';
  MULTS.forEach((m, i) => {
    const s = document.createElement('div');
    s.className = 'slot ' + (m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low');
    s.id = 'slot-' + i;
    s.innerHTML = m + 'x';
    row.appendChild(s);
  });
}

// ── GAME LOOP ────────────────────────────────────────────────
function loop() {
  ctx.clearRect(0, 0, BW, BH);
  const ph = PH[speedMode];

  pegs.forEach(p => {
    p.glow *= 0.9;
    ctx.fillStyle = p.glow > 0.1 ? `rgba(255, 255, 255, ${0.4 + p.glow})` : 'rgba(0, 212, 255, 0.2)';
    ctx.beginPath();
    ctx.arc(p.x, p.y, PEG_R + (p.glow * 2), 0, Math.PI * 2);
    ctx.fill();
  });

  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    b.vy += ph.grav;
    b.vx *= ph.fric;
    
    // Magnetic force towards targetIdx when ball is in lower half
    if (b.targetIdx !== undefined && b.y > BH * 0.4) {
        const tx = (b.targetIdx * slotW) + (slotW / 2);
        const strength = (b.y / BH) * 0.015; 
        b.vx += (tx - b.x) * strength;
    }

    b.x += b.vx;
    b.y += b.vy;

    // Wall Collision
    if (b.x < BALL_R || b.x > BW - BALL_R) b.vx *= -0.5;

    // Peg Collision
    pegs.forEach(p => {
      const dx = b.x - p.x, dy = b.y - p.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < BALL_R + PEG_R) {
        p.glow = 1.0;
        snd('hit');
        const angle = Math.atan2(dy, dx);
        b.vx += Math.cos(angle) * 1.5;
        b.vy = Math.abs(Math.sin(angle) * 2.5);
      }
    });

    // Render Ball
    const gr = ctx.createRadialGradient(b.x-2, b.y-2, 1, b.x, b.y, BALL_R);
    gr.addColorStop(0, '#fff');
    gr.addColorStop(1, '#ff0077');
    ctx.fillStyle = gr;
    ctx.shadowBlur = 10; ctx.shadowColor = '#ff0077';
    ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    // Landed
    if (b.y > BH + BALL_R) {
        onLand(b);
        balls.splice(i, 1);
    }
  }

  requestAnimationFrame(loop);
}

// ── CORE LOGIC ───────────────────────────────────────────────
async function spawnBall() {
  const bet = BETS[betIdx];
  if (_saldo < bet) { 
      showModal("SALDO TIDAK CUKUP. SILAKAN DEPOSIT."); 
      stopAuto(); 
      return; 
  }

  _saldo -= bet;
  _renderS();
  snd('ball');

  const b = {
    x: BW/2 + (Math.random()-0.5)*20,
    y: -10, vx: (Math.random()-0.5)*2, vy: 2,
    bet: bet,
    targetIdx: undefined,
    serverWin: 0,
    serverMult: 0,
    serverNewSaldo: undefined
  };
  balls.push(b);

  try {
      const res = await callApiSilent("game_play", {
          username: getUsername(),
          bet: bet
      });

      if (res.result === "SUCCESS") {
          const tm = parseFloat(res.target_multiplier);
          b.serverWin = res.win;
          b.serverMult = tm;
          b.serverNewSaldo = res.newSaldo;

          // Find appropriate targetIdx from MULTS array
          const possible = [];
          MULTS.forEach((m, idx) => { if(Math.abs(m - tm) < 0.01) possible.push(idx); });
          b.targetIdx = possible.length > 0 ? possible[Math.floor(Math.random()*possible.length)] : 4;
      } else {
          showModal(res.message);
          stopAuto();
      }
  } catch (e) {
      console.error(e);
      stopAuto();
  }
}

function onLand(b) {
    if (b.serverNewSaldo !== undefined) {
        _saldo = b.serverNewSaldo;
    }
    _renderS();

    const idx = b.targetIdx !== undefined ? b.targetIdx : Math.floor(b.x / slotW);
    const slotEl = document.getElementById('slot-' + idx);
    if (slotEl) {
        slotEl.classList.add('active');
        setTimeout(() => slotEl.classList.remove('active'), 400);
    }

    if (b.serverMult >= 1) {
        snd('win');
        const list = document.getElementById('score-list');
        const div = document.createElement('div');
        div.className = 'score-entry';
        div.innerHTML = `<b>${b.serverMult}x</b> | +${Math.floor(b.serverWin).toLocaleString()}`;
        list.prepend(div);
        if (list.children.length > 5) list.lastChild.remove();
    }
}

// ── UI HELPERS ───────────────────────────────────────────────
function _renderS() {
  document.getElementById('display-saldo').textContent = 'IDR ' + Math.floor(_saldo).toLocaleString('id-ID');
  syncSaldoUI(_saldo);
}

function setSpeedMode(m) {
  speedMode = m; snd('hit');
  document.getElementById('m-normal').classList.toggle('active', m === 'normal');
  document.getElementById('m-turbo').classList.toggle('active', m === 'turbo');
}

function toggleAuto() {
  isAuto = !isAuto;
  document.getElementById('m-auto').classList.toggle('active', isAuto);
  if (isAuto) { 
      spawnBall(); 
      autoTimer = setInterval(spawnBall, PH[speedMode].autoMs); 
  } else {
      clearInterval(autoTimer);
  }
}

function stopAuto() {
  isAuto = false; 
  clearInterval(autoTimer);
  document.getElementById('m-auto').classList.remove('active');
}

function changeBet(d) {
  if (isAuto) return;
  betIdx = Math.max(0, Math.min(BETS.length - 1, betIdx + d));
  document.getElementById('current-bet').textContent = BETS[betIdx].toLocaleString('id-ID');
  snd('hit');
}

function showModal(m) {
  document.getElementById('modal-msg').textContent = m;
  document.getElementById('modal-overlay').style.display = 'block';
  document.getElementById('neon-modal').style.display = 'block';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.getElementById('neon-modal').style.display = 'none';
}

function snd(t) {
  try { document.getElementById('snd-' + t).currentTime = 0; document.getElementById('snd-' + t).play(); } catch(e){}
}

window.addEventListener('resize', resize);
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
