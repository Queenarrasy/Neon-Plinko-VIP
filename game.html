<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--bg:#02030d;
  --gp:0 0 15px rgba(255,0,119,.6),0 0 30px rgba(255,0,119,.2);
  --gb:0 0 15px rgba(0,85,255,.6),0 0 30px rgba(0,85,255,.2);
  --gy:0 0 15px rgba(245,230,66,.6),0 0 30px rgba(245,230,66,.2);
  --bp:rgba(255,0,119,.3);--bb:rgba(0,85,255,.3);--by:rgba(245,230,66,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  width:100%;height:100vh;overflow:hidden;display:flex;flex-direction:column;
  background:var(--bg);color:#dde0f0;font-family:'Outfit',sans-serif;
  background-image: radial-gradient(circle at 50% -20%, #1a1b3a 0%, transparent 70%);
}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(5px);z-index:9998;}
#neon-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(160deg,#07091d,#0b0d24);border-radius:20px;z-index:9999;
  padding:25px;text-align:center;width:85%;max-width:320px;border:1px solid var(--bp);box-shadow:var(--gp);
  animation:mpop .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes mpop{from{opacity:0;transform:translate(-50%,-50%) scale(.8)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.header{padding:12px 15px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.4);border-bottom:1px solid rgba(0,85,255,0.2);}
.balance-box{flex:1;margin:0 15px;background:rgba(0,0,0,0.5);border:1px solid var(--bp);border-radius:30px;padding:5px 15px;text-align:center;box-shadow:var(--gp);}
#game-display-saldo{font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:900;color:#fff;text-shadow:var(--gp);}
#board-wrapper{flex:1;position:relative;width:100%;max-height:50vh;overflow:hidden;margin-top:10px;}
#plinko-canvas{display:block;width:100%;height:100%;}
.multiplier-container{position:relative;height:34px;margin-bottom:10px;width:100%;padding:0;}
.multiplier-row{display:flex;position:absolute;height:100%;top:0;}
.slot{height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;border-radius:4px;margin:0 1px;transition:0.1s ease-out;}
.slot.active{transform:translateY(-5px);filter:brightness(2.5);box-shadow:0 0 20px #fff;z-index:10;}
.s-high{background:linear-gradient(to bottom, var(--pink), #80003c);color:#fff;}
.s-mid{background:linear-gradient(to bottom, var(--yellow), #807700);color:#000;}
.s-low{background:linear-gradient(to bottom, var(--blue), #002266);color:#fff;}
.controls{padding:15px;background:rgba(5,7,25,0.9);border-top:1px solid rgba(0,85,255,0.2);display:flex;flex-direction:column;gap:12px;}
.mode-row{display:flex;gap:8px;}
.btn-mode{flex:1;padding:10px;border-radius:12px;font-size:10px;font-weight:700;border:1px solid #333;background:rgba(255,255,255,0.05);color:#888;cursor:pointer;}
.btn-mode.active{border-color:var(--blue);color:#fff;box-shadow:var(--gb);background:rgba(0,85,255,0.1);}
.bet-row{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.4);border:1px solid rgba(0,85,255,0.2);border-radius:50px;padding:5px 15px;}
.bet-btn{font-size:24px;color:var(--pink);background:none;border:none;cursor:pointer;}
#current-bet{font-family:'Cinzel Decorative',serif;font-size:18px;font-weight:900;color:var(--yellow);}
.btn-play{width:100%;padding:16px;border-radius:50px;font-family:'Cinzel Decorative',serif;font-size:14px;font-weight:900;background:linear-gradient(90deg,var(--pink),var(--blue));color:#fff;border:none;box-shadow:var(--gp);cursor:pointer;}
.btn-play.stop-mode{background:var(--yellow);color:#000;box-shadow:var(--gy);}
.nav-bottom{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.nav-btn{display:flex;flex-direction:column;align-items:center;padding:10px;border-radius:15px;text-decoration:none;font-size:10px;border:1px solid #222;color:#fff;}
.nav-btn i{font-size:18px;margin-bottom:4px;}
</style>
</head>
<body>

<audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
<audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>

<div id="modal-overlay" onclick="closeModal()"></div>
<div id="neon-modal">
    <div id="modal-title" style="color:var(--pink);font-size:14px;font-weight:bold;">INFO</div>
    <div id="modal-msg" style="margin:15px 0; font-size:13px;"></div>
    <button onclick="closeModal()" style="padding:8px 25px;border-radius:20px;border:1px solid var(--pink);color:var(--pink);background:none;font-weight:bold;">OK</button>
</div>

<div class="header">
    <div onclick="location.href='profil.html'" style="text-align:center;cursor:pointer;">
        <i class="fa-solid fa-circle-user" style="color:var(--yellow);font-size:22px;"></i>
        <span style="font-size:8px;display:block;color:var(--yellow)">PROFIL</span>
    </div>
    <div class="balance-box">
        <div style="font-size:8px;color:#aaa">SALDO UTAMA</div>
        <div id="game-display-saldo">IDR 0</div>
    </div>
    <div style="width:40px"></div>
</div>

<div id="board-wrapper">
    <canvas id="plinko-canvas"></canvas>
</div>

<div class="multiplier-container">
    <div class="multiplier-row" id="slot-row"></div>
</div>

<div class="controls">
    <div class="mode-row">
        <button class="btn-mode active" id="m-normal" onclick="setSpeed('normal')">NORMAL</button>
        <button class="btn-mode" id="m-turbo" onclick="setSpeed('turbo')">TURBO</button>
        <button class="btn-mode" id="m-auto" onclick="toggleAuto()">AUTO: OFF</button>
    </div>
    <div class="bet-row">
        <button class="bet-btn" onclick="changeBet(-1)"><i class="fa-solid fa-circle-minus"></i></button>
        <div id="current-bet">400</div>
        <button class="bet-btn" onclick="changeBet(1)" style="color:var(--blue)"><i class="fa-solid fa-circle-plus"></i></button>
    </div>
    <button class="btn-play" id="main-btn" onclick="handlePlay()">PLAY BALL</button>
    <div class="nav-bottom">
        <a href="withdraw.html" class="nav-btn" style="color:var(--yellow);border-color:var(--by);"><i class="fa-solid fa-money-bill-transfer"></i><span>WITHDRAW</span></a>
        <a href="deposit.html" class="nav-btn" style="color:var(--pink);border-color:var(--bp);"><i class="fa-solid fa-wallet"></i><span>DEPOSIT</span></a>
        <a href="reward.html" class="nav-btn" style="color:var(--blue);border-color:var(--bb);"><i class="fa-solid fa-gift"></i><span>REWARD</span></a>
    </div>
</div>

<script src="global.js"></script>
<script>
/**
 * NEON PLINKO VIP — v7.0 FINAL
 *
 * FIX UTAMA:
 * [1] Slot berkedip TEPAT saat bola menyentuh zona slot (bukan setelah keluar canvas)
 *     → Trigger onBallLand di b.y >= LAND_Y (80% board), bukan BH-2
 * [2] Hard-lock X di zona bawah — bola DIPAKSA masuk ke tengah slot target
 *     → Tidak bisa meleset, tidak ada delay visual
 * [3] _pendingLand tetap ada untuk kasus server lambat (jarang)
 */

var ROWS   = 9;
var MULTS  = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
var BETS   = [400, 800, 1000, 2000, 5000, 10000, 20000];
var BALL_R = 6;
var PEG_R  = 3.5;

var canvas, ctx, BW, BH;
var pegs = [], balls = [], _pendingLand = [], floaters = [];
var speedMode = 'normal', isAuto = false, autoTimer = null;
var betIdx = 0, _displaySaldo = 0;
var slotStartX = 0, slotItemW = 0;

// LAND_Y: % tinggi board di mana bola dianggap "masuk slot"
// Harus sinkron dengan posisi visual slot row (di bawah canvas)
var LAND_Y_RATIO = 0.88;

var PHYSICS = {
    normal: { grav: 0.35, bounce: 0.5, friction: 0.98 },
    turbo:  { grav: 0.65, bounce: 0.45, friction: 0.97 }
};

// ── SETUP ────────────────────────────────────────────────────
function setupCanvas() {
    canvas = document.getElementById('plinko-canvas');
    ctx    = canvas.getContext('2d');
    var wrap = document.getElementById('board-wrapper');
    BW = wrap.offsetWidth;
    BH = wrap.offsetHeight;

    var dpr = window.devicePixelRatio || 1;
    canvas.width  = BW * dpr;
    canvas.height = BH * dpr;
    canvas.style.width  = BW + 'px';
    canvas.style.height = BH + 'px';
    ctx.scale(dpr, dpr);

    pegs = [];
    var spY = (BH - 40) / ROWS;
    var spX = BW / (ROWS + 2.5);
    var lastRowPegs = [];

    for (var r = 0; r < ROWS; r++) {
        var cnt    = r + 3;
        var startX = (BW - (cnt - 1) * spX) / 2;
        for (var c = 0; c < cnt; c++) {
            var px = startX + c * spX;
            var py = 30 + r * spY;
            pegs.push({ x: px, y: py, glow: 0 });
            if (r === ROWS - 1) lastRowPegs.push(px);
        }
    }

    // Posisi slot sejajar dengan deretan peg bawah
    slotStartX = lastRowPegs[0];
    var slotEndX   = lastRowPegs[lastRowPegs.length - 1];
    var totalW     = slotEndX - slotStartX;
    slotItemW      = totalW / MULTS.length;

    var slotRow = document.getElementById('slot-row');
    slotRow.innerHTML = '';
    slotRow.style.left  = slotStartX + 'px';
    slotRow.style.width = totalW + 'px';

    MULTS.forEach(function(m, i) {
        var s = document.createElement('div');
        s.id = 'slot-' + i;
        s.className = 'slot ' + (m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low');
        s.style.width = (100 / MULTS.length) + '%';
        s.textContent = m + 'x';
        slotRow.appendChild(s);
    });
}

// Hitung posisi X tengah slot i (dalam koordinat canvas)
function slotCenterX(i) {
    return slotStartX + (i + 0.5) * slotItemW;
}

// ── SPAWN ────────────────────────────────────────────────────
function spawnBall() {
    var bet = BETS[betIdx];
    if (_displaySaldo < bet) {
        showModal('Saldo tidak cukup!', 'WARNING');
        stopAuto(); return;
    }

    _displaySaldo -= bet;
    updateSaldoDisplay();

    var ball = {
        x:             BW / 2 + (Math.random() - 0.5) * 15,
        y:             -15,
        vx:            (Math.random() - 0.5) * 2,
        vy:            2,
        bet:           bet,
        status:        'wait',
        targetSlotIdx: null,
        targetMult:    null,
        winAmount:     0,
        landed:        false, // [FIX 1] cegah double-land
        isDone:        false
    };

    balls.push(ball);

    if (typeof GameEngine !== 'undefined') {
        GameEngine.processPlay(bet)
            .then(function(res) {
                if (!res || res.result !== 'SUCCESS') {
                    _displaySaldo += bet;
                    updateSaldoDisplay();
                    ball.isDone = true;
                    _pendingLand = _pendingLand.filter(function(b){ return b !== ball; });
                    return;
                }

                var slots = [];
                MULTS.forEach(function(m, i) { if (m === res.multiplier) slots.push(i); });
                var tIdx = slots.length ? slots[Math.floor(Math.random() * slots.length)] : Math.floor(MULTS.length / 2);

                ball.targetSlotIdx = tIdx;
                ball.targetMult    = res.multiplier;
                ball.winAmount     = res.winAmount || 0;
                ball.status        = 'ready';

                // [FIX 3] Bola sudah keluar canvas sebelum server reply
                var pi = _pendingLand.indexOf(ball);
                if (pi >= 0) {
                    _pendingLand.splice(pi, 1);
                    if (!ball.landed) onBallLand(ball);
                }
            })
            .catch(function() {
                _displaySaldo += bet;
                updateSaldoDisplay();
                ball.isDone = true;
                _pendingLand = _pendingLand.filter(function(b){ return b !== ball; });
            });
    }
}

// ── PHYSICS ──────────────────────────────────────────────────
function updatePhysics() {
    var ph    = PHYSICS[speedMode];
    var LAND_Y = BH * LAND_Y_RATIO; // Y di mana bola dianggap masuk slot

    balls.forEach(function(b) {
        if (b.isDone) return;

        var progY = b.y / BH;

        // ═══ ZONA LOCK (progY > 0.78) ═══
        // Hard-lock X ke tengah slot target agar tidak meleset
        // [FIX 2] Override penuh — bola tidak bisa lari ke slot lain
        if (b.status === 'ready' && progY > 0.78) {
            var tx   = slotCenterX(b.targetSlotIdx);
            var diff = tx - b.x;
            // Makin ke bawah, makin kuat lock-nya
            var lockStr = progY > 0.85 ? 0.55 : 0.30;
            b.x  += diff * lockStr;
            b.vx  = diff * (lockStr * 0.6);
        }
        // ═══ ZONA STEER (progY 0.45 - 0.78) ═══
        else if (b.status === 'ready' && progY > 0.45) {
            var tx2   = slotCenterX(b.targetSlotIdx);
            var diff2 = tx2 - b.x;
            var prog  = (progY - 0.45) / (0.78 - 0.45);
            b.vx += diff2 * 0.18 * prog;
            // Batasi vx agar tidak overshoot
            var maxVx = Math.abs(diff2) * 0.5 + 2;
            if (b.vx >  maxVx) b.vx =  maxVx;
            if (b.vx < -maxVx) b.vx = -maxVx;
        }

        // [FIX 1] CEK LANDING sebelum physics bergerak
        // Trigger saat bola mencapai LAND_Y — tepat saat menyentuh slot secara visual
        if (!b.landed && b.y >= LAND_Y) {
            b.landed = true;
            b.isDone = true;

            if (b.status === 'ready') {
                // Data server sudah ada → flash slot sekarang
                onBallLand(b);
            } else {
                // Server belum reply → simpan, flash saat reply datang
                _pendingLand.push(b);
            }
            return; // Stop physics untuk bola ini
        }

        // Gravitasi & gerak
        b.vy += ph.grav;
        b.vx *= ph.friction;
        b.x  += b.vx;
        b.y  += b.vy;

        // Peg collision
        for (var pi = 0; pi < pegs.length; pi++) {
            var p    = pegs[pi];
            var dx   = b.x - p.x;
            var dy   = b.y - p.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < BALL_R + PEG_R) {
                var ang = Math.atan2(dy, dx);
                var spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
                b.vx = Math.cos(ang) * spd * ph.bounce + (Math.random() - 0.5) * 0.3;
                b.vy = Math.abs(Math.sin(ang) * spd * ph.bounce) + 0.4;
                b.x  = p.x + Math.cos(ang) * (BALL_R + PEG_R + 1);
                b.y  = p.y + Math.sin(ang) * (BALL_R + PEG_R + 1);
                p.glow = 1.0;
                playSound('snd-hit', 0.12);
                break;
            }
        }

        // Batas kiri-kanan
        if (b.x < BALL_R)      { b.x = BALL_R;      b.vx = Math.abs(b.vx) * 0.5; }
        if (b.x > BW - BALL_R) { b.x = BW - BALL_R; b.vx = -Math.abs(b.vx) * 0.5; }
    });

    balls = balls.filter(function(b) { return !b.isDone; });
}

// ── LANDING ──────────────────────────────────────────────────
function onBallLand(b) {
    // Saldo
    _displaySaldo += b.winAmount;
    updateSaldoDisplay();

    // [FIX 1] Slot berkedip TEPAT saat bola masuk — tidak terlambat
    var slotEl = document.getElementById('slot-' + b.targetSlotIdx);
    if (slotEl) {
        slotEl.classList.add('active');
        setTimeout(function() { slotEl.classList.remove('active'); }, 300);
    }

    if (b.targetMult >= 1) playSound('snd-win', 0.3);

    // Floating score
    var fx = slotCenterX(b.targetSlotIdx) + (Math.random() - 0.5) * 12;
    var fy = BH * LAND_Y_RATIO - 5;
    var fc = b.targetMult >= 3 ? '#ff0077' : b.targetMult >= 1 ? '#f5e642' : '#4488ff';
    var fsize = b.targetMult >= 3 ? 18 : 14;
    floaters.push({
        x: fx, y: fy,
        text: b.winAmount > 0 ? '+' + Math.floor(b.winAmount).toLocaleString('id-ID') : '-' + b.bet.toLocaleString('id-ID'),
        color: fc, opacity: 1, velY: 0.9 + Math.random() * 0.4, fontSize: fsize
    });

    // Score list (opsional, bisa dihapus jika pakai floaters saja)
    // tidak ditambahkan di sini agar tidak duplikat dengan versi sebelumnya
}

// ── DRAW ─────────────────────────────────────────────────────
function draw() {
    ctx.clearRect(0, 0, BW, BH);

    // Pegs
    pegs.forEach(function(p) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, PEG_R, 0, Math.PI * 2);
        if (p.glow > 0) {
            ctx.shadowBlur  = 10 * p.glow;
            ctx.shadowColor = '#fff';
            ctx.fillStyle   = 'rgba(255,255,255,' + (0.3 + p.glow * 0.7) + ')';
            p.glow -= 0.05;
        } else {
            ctx.shadowBlur = 0;
            ctx.fillStyle  = '#222533';
        }
        ctx.fill();
        ctx.shadowBlur = 0;
    });

    // Balls
    balls.forEach(function(b) {
        ctx.save();
        ctx.shadowBlur  = 12;
        ctx.shadowColor = b.status === 'ready' ? '#ff0077' : '#0055ff';
        var grad = ctx.createRadialGradient(b.x - 2, b.y - 2, 1, b.x, b.y, BALL_R);
        if (b.status === 'ready') {
            grad.addColorStop(0, '#fff');
            grad.addColorStop(0.6, '#ff0077');
            grad.addColorStop(1, '#440022');
        } else {
            grad.addColorStop(0, '#fff');
            grad.addColorStop(0.6, '#0055ff');
            grad.addColorStop(1, '#000822');
        }
        ctx.beginPath();
        ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.restore();
    });

    // Floating scores
    for (var fi = floaters.length - 1; fi >= 0; fi--) {
        var f = floaters[fi];
        f.y       -= f.velY;
        f.opacity -= 0.016;
        if (f.opacity <= 0) { floaters.splice(fi, 1); continue; }
        ctx.save();
        ctx.globalAlpha = f.opacity;
        ctx.font        = '900 ' + f.fontSize + "px 'Outfit',sans-serif";
        ctx.fillStyle   = f.color;
        ctx.textAlign   = 'center';
        ctx.shadowBlur  = 6;
        ctx.shadowColor = 'rgba(0,0,0,0.9)';
        ctx.fillText(f.text, f.x, f.y);
        ctx.restore();
    }

    updatePhysics();
    requestAnimationFrame(draw);
}

// ── CONTROLS ─────────────────────────────────────────────────
function playSound(id, vol) {
    try {
        var s = document.getElementById(id).cloneNode();
        s.volume = vol;
        s.play().catch(function(){});
    } catch(e) {}
}

function setSpeed(m) {
    speedMode = m;
    document.getElementById('m-normal').classList.toggle('active', m === 'normal');
    document.getElementById('m-turbo').classList.toggle('active',  m === 'turbo');
    if (isAuto) {
        clearInterval(autoTimer);
        autoTimer = setInterval(spawnBall, m === 'turbo' ? 450 : 900);
    }
}

function toggleAuto() {
    if (isAuto) { stopAuto(); return; }
    isAuto = true;
    document.getElementById('m-auto').classList.add('active');
    document.getElementById('m-auto').textContent   = 'AUTO: ON';
    document.getElementById('main-btn').textContent = 'STOP AUTO';
    document.getElementById('main-btn').classList.add('stop-mode');
    spawnBall();
    autoTimer = setInterval(spawnBall, speedMode === 'turbo' ? 450 : 900);
}

function stopAuto() {
    isAuto = false;
    clearInterval(autoTimer); autoTimer = null;
    document.getElementById('m-auto').classList.remove('active');
    document.getElementById('m-auto').textContent   = 'AUTO: OFF';
    document.getElementById('main-btn').textContent = 'PLAY BALL';
    document.getElementById('main-btn').classList.remove('stop-mode');
}

function handlePlay() { if (isAuto) stopAuto(); else spawnBall(); }

function changeBet(d) {
    if (isAuto) return;
    betIdx = Math.max(0, Math.min(BETS.length - 1, betIdx + d));
    document.getElementById('current-bet').textContent = BETS[betIdx].toLocaleString('id-ID');
}

function updateSaldoDisplay() {
    var el = document.getElementById('game-display-saldo');
    if (el) el.textContent = 'IDR ' + Math.floor(Math.max(0, _displaySaldo)).toLocaleString('id-ID');
}

function showModal(msg, title) {
    document.getElementById('modal-title').textContent = title || 'INFO';
    document.getElementById('modal-msg').textContent   = msg;
    document.getElementById('modal-overlay').style.display = 'block';
    document.getElementById('neon-modal').style.display    = 'block';
}
function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('neon-modal').style.display    = 'none';
}

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
    if (typeof requireLogin === 'function') {
        var sess = requireLogin('index.html');
        if (!sess) return;
        _displaySaldo = sess.saldo || 0;
    } else if (typeof getSaldo === 'function') {
        _displaySaldo = getSaldo();
    } else if (typeof _session !== 'undefined' && _session) {
        _displaySaldo = _session.saldo || 0;
    }

    setupCanvas();
    updateSaldoDisplay();
    document.getElementById('current-bet').textContent = BETS[betIdx].toLocaleString('id-ID');

    if (typeof getUsername === 'function' && typeof callApiSilent === 'function') {
        var u = getUsername();
        callApiSilent('set_session_start', { username: u }).catch(function(){});
        callApiSilent('set_status', { username: u, status: 'ONLINE' }).catch(function(){});
    }

    if (typeof ProfileAPI !== 'undefined' && ProfileAPI.sync) {
        ProfileAPI.sync().then(function() {
            if (balls.length === 0 && _pendingLand.length === 0) {
                if (typeof getSaldo === 'function') _displaySaldo = getSaldo();
                updateSaldoDisplay();
            }
        }).catch(function(){});
    }

    draw();
});
