<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO — VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root{--pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--bg:#000005;
            --gp:0 0 8px rgba(255,0,119,.7),0 0 22px rgba(255,0,119,.25);
            --gb:0 0 8px rgba(0,34,255,.7),0 0 22px rgba(0,34,255,.25);
            --gy:0 0 8px rgba(251,255,0,.7),0 0 22px rgba(251,255,0,.25);}
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
        #particles-js{position:fixed;width:100%;height:100%;z-index:0;background:radial-gradient(circle at center,#000020 0%,#000 100%);pointer-events:none;}

        #neon-alert{position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:88%;max-width:320px;background:rgba(0,0,15,.97);border:1.5px solid var(--pink);border-top:2px solid var(--yellow);color:#fff;padding:13px 18px;border-radius:14px;text-align:center;font-weight:900;z-index:9000;font-family:'Outfit',sans-serif;font-size:12px;transition:.55s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 0 16px rgba(255,0,119,.35);}
        #neon-alert.show{top:82px;}
        #neon-alert.win{border-color:var(--yellow);box-shadow:0 0 16px rgba(251,255,0,.35);}

        .header{height:72px;padding:0 15px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,20,.97);backdrop-filter:blur(20px);border-bottom:1.5px solid var(--blue);z-index:100;box-shadow:0 0 12px rgba(0,34,255,.25);position:relative;}
        .header-left{display:flex;flex-direction:column;align-items:center;cursor:pointer;min-width:55px;}
        .header-left i{font-size:22px;color:var(--blue);text-shadow:var(--gb);}
        .header-left span{font-size:8px;font-weight:900;color:var(--blue);margin-top:3px;letter-spacing:1px;text-shadow:var(--gb);text-transform:uppercase;}
        .balance-box{background:rgba(0,0,0,.85);border:1.5px solid var(--yellow);padding:6px 18px;border-radius:50px;box-shadow:0 0 10px rgba(251,255,0,.2);text-align:center;}
        .balance-label{display:block;font-size:7px;font-weight:900;color:var(--yellow);letter-spacing:1px;text-transform:uppercase;}
        #saldo-text{color:#fff;font-weight:900;font-size:15px;text-shadow:0 0 5px #fff;}
        .logo-area-mini h1{font-family:'Cinzel Decorative',serif;font-size:13px;line-height:1.2;display:flex;flex-direction:column;text-align:right;}
        .n1{color:var(--pink);text-shadow:var(--gp);} .n2{color:var(--yellow);text-shadow:var(--gy);font-size:10px;} .n3{color:rgba(0,100,255,.7);font-size:7px;letter-spacing:1px;}

        #panic-strip{display:none;position:relative;z-index:98;background:rgba(255,0,119,.13);border-bottom:1px solid rgba(255,0,119,.35);padding:5px;text-align:center;font-size:9px;font-weight:900;color:var(--pink);letter-spacing:2px;animation:ps .9s infinite;}
        @keyframes ps{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}

        #game-area{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;}
        canvas#plinko-canvas{max-height:51vh;width:100%;filter:drop-shadow(0 0 8px rgba(0,34,255,.3));}
        .multiplier-bar{width:98%;display:flex;gap:2px;margin-top:5px;}
        .m-slot{flex:1;height:34px;border-radius:4px;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;color:#fff;border:1px solid rgba(255,255,255,.1);transition:.2s;}
        .hit-win{transform:scale(1.2) translateY(-5px);filter:brightness(1.8);box-shadow:var(--gy);z-index:10;border-color:var(--yellow);}
        .hit-lose{transform:scale(1.05);filter:brightness(1.2);box-shadow:0 0 8px rgba(255,0,119,.5);}

        .win-notif{margin:6px 0;height:36px;width:88%;background:rgba(0,0,0,.75);border:1.5px solid var(--blue);border-radius:50px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 8px rgba(0,34,255,.2);}
        #win-display{font-size:13px;font-weight:900;color:rgba(255,255,255,.15);transition:.15s;letter-spacing:1px;}
        #win-display.active{color:var(--yellow);text-shadow:var(--gy);}
        #win-display.miss{color:rgba(255,0,119,.7);}

        .controls{background:rgba(0,0,20,.98);padding:11px 18px;border-top:1.5px solid var(--blue);border-radius:22px 22px 0 0;z-index:100;width:100%;box-shadow:0 -6px 20px rgba(0,34,255,.16);}
        .bet-control{display:flex;justify-content:center;align-items:center;gap:18px;margin-bottom:10px;}
        .bet-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--blue);background:#000;color:var(--blue);cursor:pointer;box-shadow:0 0 8px rgba(0,34,255,.25);display:flex;align-items:center;justify-content:center;font-size:16px;transition:.2s;}
        .bet-btn:active{background:var(--blue);color:#fff;}
        .bet-display{font-size:18px;font-weight:900;color:var(--yellow);min-width:115px;text-align:center;text-shadow:var(--gy);}
        .mode-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
        .m-btn{padding:9px;border-radius:10px;border:1px solid rgba(0,34,255,.28);background:rgba(0,0,0,.85);color:rgba(255,255,255,.45);font-size:9px;font-weight:900;cursor:pointer;text-transform:uppercase;transition:.2s;letter-spacing:.5px;font-family:'Outfit',sans-serif;}
        .m-btn.active{border-color:var(--blue);color:var(--blue);box-shadow:inset 0 0 10px rgba(0,34,255,.18);}
        .m-btn.auto-on{background:var(--pink);border-color:#fff;color:#fff;box-shadow:0 0 12px rgba(255,0,119,.45);animation:pulse 1s infinite;}
        @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(.97)}100%{transform:scale(1)}}
        .drop-btn{width:100%;padding:15px;border-radius:50px;border:none;background:linear-gradient(90deg,var(--blue),var(--pink));color:#fff;font-weight:900;font-size:14px;cursor:pointer;text-transform:uppercase;letter-spacing:2px;box-shadow:0 0 14px rgba(255,0,119,.3);font-family:'Outfit',sans-serif;transition:.2s;}
        .drop-btn:active{transform:scale(.98);}
        .stop-btn{background:linear-gradient(90deg,var(--pink),#aa0000)!important;}

        .nav-bottom{height:70px;background:rgba(0,0,15,.99);display:flex;border-top:1.5px solid rgba(0,34,255,.38);padding-bottom:env(safe-area-inset-bottom);position:relative;z-index:1000;box-shadow:0 -3px 12px rgba(0,34,255,.16);}
        .nav-link{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;gap:3px;transition:.3s;}
        .nav-link i{font-size:21px;}
        .nav-link span{font-size:9px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;}
        .n-depo{color:var(--yellow);text-shadow:var(--gy);}
        .n-wd{color:var(--pink);text-shadow:var(--gp);}
        .n-reward{color:var(--blue);text-shadow:var(--gb);}

        #alert-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(12px);}
        .alert-box{width:285px;background:rgba(0,0,15,.99);border:1.5px solid var(--yellow);border-top:2px solid var(--pink);border-radius:22px;padding:28px;text-align:center;box-shadow:0 0 18px rgba(251,255,0,.22);animation:zoomIn .3s ease;}
        @keyframes zoomIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
        #alert-msg{font-weight:900;color:var(--yellow);margin-bottom:20px;text-transform:uppercase;font-size:14px;line-height:1.5;text-shadow:var(--gy);}
        .alert-btn{width:100%;padding:13px;background:linear-gradient(90deg,var(--blue),var(--pink));border:none;color:#fff;border-radius:50px;font-weight:900;cursor:pointer;font-family:'Outfit',sans-serif;letter-spacing:1px;text-transform:uppercase;}
    </style>
</head>
<body>
<div id="particles-js"></div>
<div id="neon-alert">SYSTEM NOTIFICATION</div>

<div class="header">
    <div class="header-left" onclick="navTo('profil.html')">
        <i class="fas fa-user-astronaut"></i><span>PROFIL</span>
    </div>
    <div>
        <div class="balance-box">
            <span class="balance-label">SALDO UTAMA</span>
            <span id="saldo-text">IDR 0</span>
        </div>
    </div>
    <div class="logo-area-mini">
        <h1><span class="n1">NEON</span><span class="n2">PLINKO</span><span class="n3">VIP</span></h1>
    </div>
</div>

<!-- Strip merah muncul saat panic aktif -->
<div id="panic-strip">⚠&nbsp; SISTEM DALAM PENGAWASAN &nbsp;⚠</div>

<div id="game-area">
    <canvas id="plinko-canvas"></canvas>
    <div class="multiplier-bar" id="m-bar"></div>

    <div class="alert-box">
        <p id="alert-msg"></p>
        <button class="alert-btn" onclick="closeAlert()">CONFIRM</button>

<script>
// ═══════════════════════════════════════════════════════════════
//  NEON PLINKO — GAME ENGINE
//  Winrate dikendalikan via Supabase Realtime:
//  Admin ubah winrate di master panel → event UPDATE diterima
//  INSTAN di sini tanpa polling → wr_cache diperbarui → berlaku
//  mulai drop bola berikutnya.
// ═══════════════════════════════════════════════════════════════

const SUPA_URL = "https://bgffnmwrviyqpeevzjsn.supabase.co";
const SUPA_KEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani";
const _supa    = supabase.createClient(SUPA_URL, SUPA_KEY);
const user     = localStorage.getItem('user_session') || localStorage.getItem('neon_user');

const {Engine,Render,Runner,Bodies,Composite,Body,Events} = Matter;
const engine = Engine.create({gravity:{y:1.5}});

const BETS   = [400,800,1000,1200,1600,1800,2000,4000,6000,8000,10000,12000,16000,18000,20000];
const multis = [10,5,2,0.5,0.2,0.2,0.5,2,5,10];
const mColors= ['#ff0077','#ff0077','#0022ff','#001a88','#030314','#030314','#001a88','#0022ff','#ff0077','#ff0077'];

let bIdx=0, balance=0, autoMode=false, turboMode=false, timer=null;

// ── WINRATE CACHE ─────────────────────────────────────────────
// Sumber kebenaran tunggal winrate selama bermain.
// Diisi saat init() via fetch DB.
// Diperbarui HANYA saat admin ubah setting via Realtime —
// dengan cara FETCH ULANG ke DB, bukan pakai payload event
// (payload.new dari Supabase sering tidak lengkap/partial).
let WR = {
    winrate:50, maxwin_limit:5000000, panic_mode:false,
    session_minutes:0, last_deposit_amount:200000,
    session_start:null, initial_balance_session:0
};
let profileChannel = null;
let lastWinrate = 50; // snapshot untuk deteksi perubahan

// ── AUDIO ─────────────────────────────────────────────────────
const aCtx = new (window.AudioContext||window.webkitAudioContext)();
function beep(f,d,v=0.1){
    try{
        const o=aCtx.createOscillator(),g=aCtx.createGain();
        o.type='sine'; o.frequency.value=f;
        g.gain.setValueAtTime(v,aCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.00001,aCtx.currentTime+d);
        o.connect(g);g.connect(aCtx.destination);
        o.start();o.stop(aCtx.currentTime+d);
    }catch(e){}
}

// ── PARTICLES ─────────────────────────────────────────────────
particlesJS("particles-js",{"particles":{"number":{"value":70},"color":{"value":["#0044ff","#ff0077","#ffffff"]},"shape":{"type":"circle"},"opacity":{"value":0.9,"random":true,"anim":{"enable":true,"speed":1,"opacity_min":0.5}},"size":{"value":2.5,"random":true},"line_linked":{"enable":true,"distance":120,"color":"#ff0077","opacity":0.25,"width":0.7},"move":{"enable":true,"speed":1.8,"random":true,"out_mode":"out"}},"interactivity":{"events":{"onhover":{"enable":false},"onclick":{"enable":true,"mode":"push"}},"modes":{"push":{"particles_nb":3}}}});

function showNeonAlert(msg,type=''){
    const a=document.getElementById('neon-alert');
    a.innerText=msg; a.className=type==='win'?'show win':'show';
    setTimeout(()=>a.className='',2500);
}

// ── INIT ──────────────────────────────────────────────────────
async function init(){
    if(!user) return location.href='index.html';
    const {data} = await _supa.from('profiles').select('*').eq('username',user).single();
    if(data){
        balance = Math.round(data.saldo||0);
        refreshUI();
        loadCache(data);
        await _supa.from('profiles').update({initial_balance_session:balance}).eq('username',user);
    }
    setupPlinko();
    updateMultiplierLabels();
    startRealtime();   // <-- Mulai listen perubahan dari admin
}

// ── LOAD CACHE dari row profil ────────────────────────────────
// p harus row lengkap dari DB (bukan payload Realtime yang partial).
// Dipanggil dari init() dan dari fetchAndApplyWR().
function loadCache(p){
    // WAJIB: hanya proses jika winrate ada dan valid (bukan undefined/null)
    if(p.winrate == null) return;
    WR.winrate             = parseFloat(p.winrate);
    WR.maxwin_limit        = (p.maxwin_limit   != null) ? parseFloat(p.maxwin_limit)   : 5000000;
    WR.panic_mode          = (p.panic_mode === true);
    WR.session_minutes     = parseFloat(p.session_minutes || p.session_timer || 0) || 0;
    WR.last_deposit_amount = (p.last_deposit_amount != null) ? parseFloat(p.last_deposit_amount) : 200000;
    WR.session_start       = p.session_start || p.created_at || null;
    WR.initial_balance_session = (p.initial_balance_session != null) ? parseFloat(p.initial_balance_session) : balance;
    lastWinrate = WR.winrate;
    const strip = document.getElementById('panic-strip');
    if(strip) strip.style.display = WR.panic_mode ? 'block' : 'none';
}

// ── FETCH ULANG WINRATE DARI DB ────────────────────────────────
// Dipanggil saat Realtime mendeteksi ada update kolom kontrol.
// Fetch ulang memastikan kita dapat data LENGKAP dan BENAR dari DB,
// bukan payload partial yang bisa merusak WR cache.
async function fetchAndApplyWR(){
    const {data:p} = await _supa
        .from('profiles')
        .select('winrate,maxwin_limit,panic_mode,session_minutes,session_timer,last_deposit_amount,session_start,created_at,initial_balance_session')
        .eq('username', user)
        .single();
    if(p) loadCache(p);
}

// ── REALTIME SUBSCRIPTION ─────────────────────────────────────
// Strategi: saat ada event UPDATE pada baris profil user ini,
// bandingkan winrate & panic_mode di payload.new dengan cache saat ini.
// Jika BERBEDA → fetch ulang baris lengkap dari DB → update WR cache.
// Jika SAMA (hanya saldo berubah) → abaikan, WR cache tidak disentuh.
function startRealtime(){
    if(profileChannel) _supa.removeChannel(profileChannel);
    profileChannel = _supa
        .channel('wr-ctrl-' + user)
        .on('postgres_changes',{
            event:'UPDATE', schema:'public', table:'profiles',
            filter:'username=eq.' + user
        }, payload => {
            if(!payload.new) return;
            const n = payload.new;

            // Deteksi: apakah kolom kontrol benar-benar berubah?
            const wrChanged     = (n.winrate    != null) && (parseFloat(n.winrate)    !== WR.winrate);
            const panicChanged  = (n.panic_mode != null) && (n.panic_mode             !== WR.panic_mode);
            const mxChanged     = (n.maxwin_limit != null) && (parseFloat(n.maxwin_limit) !== WR.maxwin_limit);

            if(wrChanged || panicChanged || mxChanged){
                // Ada perubahan nyata dari admin → update WR cache langsung dari payload
                // (tidak perlu fetch ulang — payload.new sudah berisi semua kolom)
                loadCache(n);
            }
            // Jika hanya saldo berubah → tidak ada satupun kondisi di atas true → diabaikan
        })
        .subscribe();
}

function navTo(url){ beep(1000,0.1); setTimeout(()=>location.href=url,150); }

function refreshUI(){
    const el=document.getElementById('saldo-text');
    if(el) el.innerText="IDR "+Math.round(balance).toLocaleString('id-ID');
}

function updateMultiplierLabels(){
    const bar=document.getElementById('m-bar');if(!bar)return;
    bar.innerHTML="";
    multis.forEach((v,i)=>{
        const s=document.createElement('div');
        s.className='m-slot';s.id='s-'+i;
        s.style.background=mColors[i];s.innerHTML=`X${v}`;
        bar.appendChild(s);
    });
}

// ── PHYSICS SETUP ─────────────────────────────────────────────
function setupPlinko(){
    const cvs=document.getElementById('plinko-canvas');if(!cvs)return;
    const render=Render.create({canvas:cvs,engine:engine,options:{width:400,height:500,wireframes:false,background:'transparent'}});
    for(let r=0;r<9;r++){
        let pc=r+3;
        for(let c=0;c<pc;c++){
            let x=200+(c-pc/2+0.5)*36,y=80+r*42;
            Composite.add(engine.world,Bodies.circle(x,y,3.5,{isStatic:true,render:{fillStyle:'#ffffff'},label:'pin'}));
        }
    }
    multis.forEach((v,i)=>{
        const s=Bodies.rectangle(38+i*36,485,30,40,{isStatic:true,isSensor:true,label:`win_${v}_${i}`,render:{visible:false}});
        Composite.add(engine.world,s);
    });
    Render.run(render);Runner.run(Runner.create(),engine);
    Events.on(engine,'collisionStart',(e)=>{
        e.pairs.forEach(p=>{
            if(p.bodyA.label==='pin'||p.bodyB.label==='pin') beep(600,0.05,0.05);
            if(p.bodyA.label==='ball'&&p.bodyB.label.startsWith('win_')) calcWin(p.bodyA,p.bodyB.label);
            else if(p.bodyB.label==='ball'&&p.bodyA.label.startsWith('win_')) calcWin(p.bodyB,p.bodyA.label);
        });
    });
}

// ── HITUNG WINRATE EFEKTIF ────────────────────────────────────
// Aturan sederhana dan jelas:
//   1. Panic mode aktif  → paksa kalah (1%)
//   2. Maxwin tercapai   → paksa kalah (1%)
//   3. Selain itu        → PAKAI PERSIS nilai winrate yang admin set
// TIDAK ada override otomatis berbasis saldo — admin kontrol segalanya.
function getEffectiveWR(){
    // Panic mode: override semua, paksa kalah
    if(WR.panic_mode === true) return 1;

    // Maxwin limit tercapai: paksa kalah
    if(WR.maxwin_limit > 0 && balance >= WR.maxwin_limit) return 1;

    // Pakai winrate persis seperti yang admin set — tidak ada pengurangan otomatis
    // Pastikan dalam range 1–100
    return Math.max(1, Math.min(100, WR.winrate));
}

// ── DROP BALL ─────────────────────────────────────────────────
async function dropBall(){
    const bet=BETS[bIdx];
    if(balance<bet){ stopAuto();beep(200,0.5);return showAlert("SALDO TIDAK CUKUP!"); }

    // Gunakan WR dari cache (sudah fresh via realtime)
    const finalWR  = getEffectiveWR();
    // ── KEPUTUSAN MENANG/KALAH DIBUAT DI SINI, FINAL ──────────
    // calcWin akan membaca isHoki dari objek bola — tidak bisa berubah
    const isHoki   = Math.random()*100 < finalWR;

    // Potong saldo
    balance=Math.round(balance-bet);
    refreshUI();
    await _supa.from('profiles').update({saldo:balance}).eq('username',user);

    // Arah awal bola (visual steering hint)
    const sx = isHoki
        ? (Math.random()>0.5 ? 3.6 : -3.6)   // dorong ke tepi → slot besar
        : (Math.random()*0.5-0.25);             // ke tengah → slot kecil

    const ball=Bodies.circle(200+(Math.random()*4-2),18,8,{
        label:'ball', restitution:0.45, friction:0.01, frictionAir:0.009,
        render:{fillStyle:'#ff0077',strokeStyle:'rgba(255,255,255,.5)',lineWidth:1.5}
    });
    // ── SIMPAN KEPUTUSAN DI BOLA — calcWin HARUS HORMAT INI ───
    ball.isHoki = isHoki;
    Body.setVelocity(ball,{x:sx,y:0});
    Composite.add(engine.world,ball);
    beep(800,0.1);

    // ── ACTIVE STEERING ───────────────────────────────────────
    // Mendorong bola pelan-pelan ke zona yang benar.
    // Pemain melihat bola memantul alami — tidak terasa dicurangi.
    let ticks=0;
    const steer=setInterval(()=>{
        if(!Composite.allBodies(engine.world).includes(ball)){clearInterval(steer);return;}
        const {x:bx,y:by}=ball.position;
        ticks++;
        if(by>295||ticks>28){clearInterval(steer);return;}
        if(isHoki){
            // MENANG → jika terlalu ke tengah, dorong keluar
            if(bx>170&&bx<230){
                const d=bx<200?-1:1;
                Body.applyForce(ball,ball.position,{x:d*0.0055,y:0});
            }
        } else {
            // KALAH → jika terlalu ke pinggir, tarik ke tengah
            if(bx<152||bx>248){
                const d=bx<200?1:-1;
                Body.applyForce(ball,ball.position,{x:d*0.0072,y:0});
            }
        }
    },75);

    setTimeout(()=>{
        clearInterval(steer);
        if(Composite.allBodies(engine.world).includes(ball)) Composite.remove(engine.world,ball);
    },7000);
}

// ── CALC WIN — HARD ENFORCE isHoki ───────────────────────────
// Tidak peduli slot mana yang kena secara fisik:
//   isHoki=true  → bayar sesuai slot
//   isHoki=false → TIDAK ADA BAYARAN (MISS), saldo tidak naik
async function calcWin(ball,label){
    if(ball.used)return; ball.used=true;
    const info=label.split('_');
    const mHit=parseFloat(info[1]);
    const idx =parseInt(info[2]);
    const disp=document.getElementById('win-display');
    const slot=document.getElementById('s-'+idx);

    if(!ball.isHoki){
        // ── KALAH KERAS: tidak ada bayaran ────────────────────
        if(slot){slot.classList.add('hit-lose');setTimeout(()=>slot.classList.remove('hit-lose'),500);}
        if(disp){disp.innerText='MISS  —';disp.className='miss';setTimeout(()=>{disp.innerText='— SIAP BERMAIN —';disp.className='';},900);}
        beep(220,0.12,0.07);
        Composite.remove(engine.world,ball);
        // Saldo sudah dipotong di dropBall. Tidak ada yang ditambah.
        return;
    }

    // ── MENANG: bayar sesuai slot fisik ───────────────────────
    const win=Math.floor(BETS[bIdx]*mHit);
    balance=Math.round(balance+win);
    refreshUI();

    if(disp){disp.innerText=`X${mHit}  +${win.toLocaleString('id-ID')}`;disp.className='active';}
    if(slot){slot.classList.add('hit-win');setTimeout(()=>{slot.classList.remove('hit-win');if(disp)disp.className='';},700);}

    if(mHit>=5)      {beep(1200,0.35,0.22);showNeonAlert(`✦ X${mHit} JACKPOT! +${win.toLocaleString('id-ID')}`,'win');}
    else if(mHit>=2) beep(1000,0.2,0.15);
    else if(mHit>=1) beep(800,0.15,0.1);
    else             beep(500,0.1,0.06);

    Composite.remove(engine.world,ball);
    await _supa.from('profiles').update({saldo:balance}).eq('username',user);
}

// ── CONTROLS ──────────────────────────────────────────────────
function adjustBet(d){if(autoMode)return;beep(500,0.05);bIdx=Math.max(0,Math.min(BETS.length-1,bIdx+d));document.getElementById('bet-amt').innerText=BETS[bIdx].toLocaleString('id-ID');}
function setSpeed(s){beep(700,0.05);turboMode=(s==='turbo');document.getElementById('m-norm').classList.toggle('active',s==='normal');document.getElementById('m-turbo').classList.toggle('active',s==='turbo');if(autoMode){clearInterval(timer);timer=setInterval(dropBall,turboMode?500:1200);}}
function toggleAuto(){autoMode=!autoMode;beep(autoMode?1000:400,0.1);const btn=document.getElementById('m-auto'),main=document.getElementById('main-action');if(autoMode){btn.classList.add('auto-on');main.innerHTML='<i class="fas fa-stop-circle"></i> STOP AUTO DROP';main.classList.add('stop-btn');timer=setInterval(dropBall,turboMode?500:1200);}else stopAuto();}
function stopAuto(){autoMode=false;clearInterval(timer);document.getElementById('m-auto').classList.remove('auto-on');const main=document.getElementById('main-action');main.innerHTML='<i class="fas fa-circle-dot"></i> DROP NEON BALL';main.classList.remove('stop-btn');}
function handleMainAction(){if(autoMode)stopAuto();else dropBall();}
function showAlert(m){beep(300,0.3);document.getElementById('alert-msg').innerText=m;document.getElementById('alert-modal').style.display='flex';}
function closeAlert(){beep(600,0.1);document.getElementById('alert-modal').style.display='none';}

window.onload=init;
</script>
