<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO — EXCLUSIVE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #02030d; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; 
            height: 100vh; height: 100dvh; /* Mengikuti tinggi layar HP terbaru */
            overflow: hidden; display: flex; flex-direction: column; 
            background: radial-gradient(circle at center, #0a0c1f 0%, #02030d 100%); 
        }

        /* Header - Tinggi Tetap */
        .header { 
            height: 60px; padding: 0 20px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--blue); 
            flex-shrink: 0; z-index: 100;
        }
        .logo { font-family: 'Cinzel Decorative'; color: var(--pink); font-size: 16px; text-shadow: 0 0 10px var(--pink); }
        .balance-box { background: rgba(0,212,255,0.1); border: 1px solid var(--blue); padding: 5px 12px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }

        /* Game Board Area - Dinamis mengikuti sisa layar */
        #game-area { 
            flex: 1; position: relative; display: flex; justify-content: center; 
            align-items: center; overflow: hidden; min-height: 0; 
        }
        #board-wrapper { position: relative; width: 100%; max-width: 400px; height: 100%; max-height: 480px; }
        canvas { width: 100%; height: 100%; object-fit: contain; }

        .m-bar { position: absolute; bottom: 5px; width: 100%; display: flex; justify-content: center; gap: 3px; padding: 0 10px; }
        .m-slot { flex: 1; height: 30px; border-radius: 4px; font-size: 9px; font-weight: 800; display: flex; align-items: center; justify-content: center; color: #000; border: 1px solid rgba(255,255,255,0.1); }

        /* Kontrol Game - Compact */
        .controls { 
            background: rgba(5,6,20,0.95); padding: 15px 20px 10px 20px; 
            border-top: 1px solid rgba(0,212,255,0.3); flex-shrink: 0;
        }
        .bet-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 15px; }
        .mode-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: #fff; font-size: 11px; font-weight: 800; cursor: pointer; }
        .mode-btn.active { background: var(--blue); color: #000; box-shadow: 0 0 10px var(--blue); }
        .mode-btn.auto-active { background: var(--yellow); color: #000; border-color: var(--yellow); }

        .btn-main { width: 100%; padding: 15px; border-radius: 50px; border: none; background: linear-gradient(180deg, var(--pink) 0%, #b30054 100%); color: #fff; font-family: 'Cinzel Decorative'; font-weight: 900; font-size: 18px; box-shadow: 0 4px 0 #7a003a; cursor: pointer; }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 #7a003a; }
        .btn-stop { background: linear-gradient(180deg, #555 0%, #222 100%); box-shadow: 0 4px 0 #000; }

        /* Navigation Bar - Tetap di Bawah */
        .nav-bar {
            height: 70px; background: #000; border-top: 1px solid rgba(255,255,255,0.1);
            display: grid; grid-template-columns: repeat(5, 1fr); align-items: center;
            padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0;
        }
        .nav-item { text-align: center; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 10px; font-weight: 600; }
        .nav-item i { display: block; font-size: 18px; margin-bottom: 4px; }
        .nav-item.active { color: var(--blue); text-shadow: 0 0 10px var(--blue); }

        /* Floating Score */
        .f-score { position: absolute; font-weight: 900; font-size: 18px; pointer-events: none; z-index: 1000; animation: floatUp 0.8s ease-out forwards; }
        @keyframes floatUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-60px); opacity: 0; } }

        /* Modal Overlay */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; }
        .modal-box { background: #050614; border: 2px solid var(--pink); border-radius: 25px; padding: 25px; width: 80%; max-width: 300px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">NEON PLINKO VIP</div>
        <div class="balance-box">
            <i class="fa-solid fa-wallet" style="color:var(--blue)"></i>
            <span id="saldo-text" style="font-weight:800; font-size:14px;">IDR 0</span>
        </div>
    </div>

    <div id="game-area">
        <div id="board-wrapper">
            <canvas id="canvas"></canvas>
            <div class="m-bar" id="m-bar"></div>
        </div>
    </div>

    <div class="controls">
        <div class="bet-row">
            <i class="fa-solid fa-minus-square" style="color:var(--blue); font-size:24px" onclick="changeBet(-1)"></i>
            <div style="text-align:center">
                <div style="font-size:16px; font-weight:800; color:var(--yellow)" id="bet-display">400</div>
            </div>
            <i class="fa-solid fa-plus-square" style="color:var(--blue); font-size:24px" onclick="changeBet(1)"></i>
        </div>

        <div class="mode-row">
            <button class="mode-btn active" id="btn-normal" onclick="setMode('normal')">NORMAL</button>
            <button class="mode-btn" id="btn-turbo" onclick="setMode('turbo')">TURBO</button>
            <button class="mode-btn" id="btn-auto" onclick="toggleAuto()">AUTO</button>
        </div>

        <button class="btn-main" id="btn-action" onclick="handleAction()">DROP BALL</button>
    </div>

    <nav class="nav-bar">
        <a href="deposit.html" class="nav-item"><i class="fa-solid fa-wallet"></i>Deposit</a>
        <a href="withdraw.html" class="nav-item"><i class="fa-solid fa-money-bill-transfer"></i>WD</a>
        <a href="game.html" class="nav-item active"><i class="fa-solid fa-gamepad"></i>Play</a>
        <a href="reward.html" class="nav-item"><i class="fa-solid fa-gift"></i>Reward</a>
        <a href="profil.html" class="nav-item"><i class="fa-solid fa-user-gear"></i>Profil</a>
    </nav>

    <div id="modal-overlay">
        <div class="modal-box">
            <h2 id="m-title" style="color:var(--yellow); font-family:'Cinzel Decorative'; font-size:18px">INFO</h2>
            <p id="m-msg" style="margin:15px 0; font-size:13px; color:#ccc"></p>
            <button onclick="closeModal()" style="background:var(--pink); border:none; color:white; padding:10px 25px; border-radius:50px; font-weight:800;">OK</button>
        </div>
    </div>

    <audio id="s-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="s-hit" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="s-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    const engine = Engine.create({ gravity: { y: 1.8 } });
    const world = engine.world;
    
    const BETS = [400, 800, 1000, 1200, 1400, 1600, 1800, 2000, 4000, 6000, 8000, 10000, 12000, 16000, 18000, 20000];
    let betIdx = 0;
    let isTurbo = false;
    let isAuto = false;
    let autoTimer = null;
    let currentSaldo = 0;
    let adminWinrate = 50;
    const multiValues = [15, 8, 3, 0.5, 0.2, 0.5, 3, 8, 15];
    const multiColors = ['#ff0077', '#ff4d94', '#00d4ff', '#1a1b2e', '#1a1b2e', '#1a1b2e', '#00d4ff', '#ff4d94', '#ff0077'];

    async function init() {
        const user = localStorage.getItem('user_neon');
        if(!user) window.location.href = 'index.html';
        setupPhysics();
        fetchData();
        setInterval(fetchData, 5000);
    }

    async function fetchData() {
        const user = localStorage.getItem('user_neon');
        const { data } = await _supabase.from('profiles').select('*').eq('username', user).single();
        if(data) {
            currentSaldo = data.saldo;
            adminWinrate = data.winrate || 50;
            document.getElementById('saldo-text').innerText = "IDR " + currentSaldo.toLocaleString('id-ID');
        }
    }

    function setupPhysics() {
        const canvas = document.getElementById('canvas');
        const render = Render.create({
            canvas: canvas, engine: engine,
            options: { width: 400, height: 480, wireframes: false, background: 'transparent' }
        });

        for (let r = 0; r < 9; r++) {
            let pins = r + 3;
            for (let c = 0; c < pins; c++) {
                let x = 200 + (c - pins / 2 + 0.5) * 40;
                let y = 50 + r * 40;
                Composite.add(world, Bodies.circle(x, y, 3.5, { isStatic: true, render: { fillStyle: '#fff' } }));
            }
        }

        const mBar = document.getElementById('m-bar');
        multiValues.forEach((v, i) => {
            const div = document.createElement('div');
            div.className = 'm-slot';
            div.style.background = multiColors[i];
            div.style.color = (i >= 3 && i <= 5) ? '#fff' : '#000';
            div.innerText = 'x'+v;
            mBar.appendChild(div);

            let x = 40 + i * 40;
            Composite.add(world, Bodies.rectangle(x, 470, 35, 20, { isStatic: true, isSensor: true, label: 'm_'+v, render: { visible: false } }));
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    }

    function spawnBall() {
        if(currentSaldo < BETS[betIdx]) { stopAuto(); return showModal("SALDO KURANG", "Silahkan deposit terlebih dahulu."); }
        
        playS('s-click');
        const user = localStorage.getItem('user_neon');
        currentSaldo -= BETS[betIdx];
        document.getElementById('saldo-text').innerText = "IDR " + currentSaldo.toLocaleString('id-ID');

        let startX = 200 + (Math.random() * 10 - 5);
        if(Math.random()*100 > adminWinrate) startX = 200 + (Math.random() * 30 - 15);
        else startX = (Math.random() > 0.5) ? 120 : 280;

        const ball = Bodies.circle(startX, 10, 8.5, {
            restitution: 0.5, friction: 0.005, render: { fillStyle: '#fbff00' }
        });
        Composite.add(world, ball);

        Events.on(engine, 'collisionStart', (e) => {
            e.pairs.forEach(p => { if(p.bodyA === ball || p.bodyB === ball) playS('s-hit'); });
        });

        const check = setInterval(async () => {
            if(ball.position.y > 460) {
                clearInterval(check);
                const sensors = Composite.allBodies(world).filter(b => b.label?.startsWith('m_'));
                let nearest = sensors[0]; let minD = 1000;
                sensors.forEach(s => { let d = Math.abs(s.position.x - ball.position.x); if(d < minD) { minD = d; nearest = s; } });

                const mult = parseFloat(nearest.label.split('_')[1]);
                const winAmt = Math.floor(BETS[betIdx] * mult);
                
                Composite.remove(world, ball);
                showScore(ball.position.x, winAmt, mult);
                
                await _supabase.rpc('handle_plinko_win', { u_name: user, bet: BETS[betIdx], win: winAmt });
                if(mult >= 2) playS('s-win');
                fetchData();
            }
        }, 50);
    }

    function showScore(x, amt, mult) {
        const el = document.createElement('div');
        el.className = 'f-score';
        el.style.left = (x - 10) + 'px';
        el.style.bottom = '80px';
        el.style.color = mult < 1 ? '#ff4d4d' : 'var(--yellow)';
        el.innerText = (mult < 1 ? "" : "+") + amt.toLocaleString('id-ID');
        document.getElementById('board-wrapper').appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    function handleAction() { if(isAuto) stopAuto(); else spawnBall(); }

    function toggleAuto() {
        isAuto = !isAuto;
        const btn = document.getElementById('btn-auto');
        const actionBtn = document.getElementById('btn-action');
        if(isAuto) {
            btn.classList.add('auto-active');
            actionBtn.innerText = "STOP AUTO";
            actionBtn.classList.add('btn-stop');
            autoTimer = setInterval(spawnBall, isTurbo ? 400 : 1000);
        } else stopAuto();
    }

    function stopAuto() {
        isAuto = false; clearInterval(autoTimer);
        document.getElementById('btn-auto').classList.remove('auto-active');
        const actionBtn = document.getElementById('btn-action');
        actionBtn.innerText = "DROP BALL";
        actionBtn.classList.remove('btn-stop');
    }

    function setMode(m) {
        playS('s-click');
        isTurbo = (m === 'turbo');
        document.getElementById('btn-normal').classList.toggle('active', !isTurbo);
        document.getElementById('btn-turbo').classList.toggle('active', isTurbo);
        if(isAuto) { stopAuto(); toggleAuto(); }
    }

    function changeBet(dir) {
        playS('s-click');
        betIdx = Math.max(0, Math.min(BETS.length - 1, betIdx + dir));
        document.getElementById('bet-display').innerText = BETS[betIdx].toLocaleString('id-ID');
    }

    function playS(id) { const s = document.getElementById(id); s.currentTime = 0; s.play().catch(()=>{}); }
    function showModal(t, m) { document.getElementById('m-title').innerText = t; document.getElementById('m-msg').innerText = m; document.getElementById('modal-overlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    init();
</script>
</body>
</html>
