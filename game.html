<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>NEON PLINKO PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pink: #ff0077; --blue: #00d4ff; --yellow: #f5e642; --bg: #030510;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Outfit', sans-serif; 
            overflow: hidden;
            height: 100vh;
        }

        /* HEADER RE-ARRANGED */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(0,212,255,0.2);
        }
        .header-item { flex: 1; font-size: 12px; font-weight: 800; }
        #user-profile { text-align: left; color: var(--blue); cursor: pointer; }
        #balance-center { text-align: center; color: var(--yellow); font-size: 14px; text-shadow: 0 0 10px rgba(245,230,66,0.5); }
        #game-title { text-align: right; font-family: 'Cinzel Decorative'; color: var(--pink); }

        /* FLOATING SCORE BOARD (TOP SIDE) */
        #score-board {
            position: absolute;
            top: 80px;
            left: 10px;
            width: 120px;
            z-index: 10;
        }
        .score-entry {
            background: rgba(0,212,255,0.1);
            border-left: 3px solid var(--blue);
            padding: 5px 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-size: 10px;
            animation: slideIn 0.3s ease-out;
            white-space: nowrap;
        }

        @keyframes slideIn { from { opacity:0; transform: translateX(-10px); } to { opacity:1; transform: translateX(0); } }

        /* CANVAS AREA - CALIBRATED */
        #game-container { 
            position: relative; 
            width: 100%; 
            height: 60vh; 
            margin-top: 10px;
        }
        canvas { display: block; margin: 0 auto; }

        /* CONTROLS */
        .controls {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(0deg, #030510 80%, transparent);
        }
        .bet-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        .btn-circle {
            width: 40px; height: 40px; border-radius: 50%;
            border: none; background: var(--blue); color: #000;
            font-weight: 900; font-size: 20px; cursor: pointer;
        }
        #bet-amount { font-size: 24px; font-weight: 800; color: var(--yellow); min-width: 80px; text-align: center; }

        .btn-drop {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(45deg, var(--pink), #b400dc);
            color: #fff;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255, 0, 119, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-item" id="user-profile" onclick="location.href='profile.html'">PROFIL</div>
        <div class="header-item" id="balance-center">IDR 0</div>
        <div class="header-item" id="game-title">NEON PLINKO</div>
    </div>

    <div id="score-board"></div>

    <div id="game-container"></div>

    <div class="controls">
        <div class="bet-box">
            <button class="btn-circle" onclick="adjustBet(-100)">-</button>
            <div id="bet-amount">200</div>
            <button class="btn-circle" onclick="adjustBet(100)">+</button>
        </div>
        <button class="btn-drop" onclick="dropBall()">DROP BALL</button>
    </div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    const engine = Engine.create();
    const container = document.getElementById('game-container');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const render = Render.create({
        element: container,
        engine: engine,
        options: {
            width: width,
            height: height,
            wireframes: false,
            background: 'transparent'
        }
    });

    // Piramida Settings - Diturunkan sedikit agar tidak mentok atas
    const rows = 10;
    const pinGap = width / 12;
    const startX = width / 2;
    const startY = 50;

    for (let i = 2; i <= rows; i++) {
        for (let j = 0; j < i; j++) {
            const x = startX - (i - 1) * pinGap / 2 + j * pinGap;
            const y = startY + (i - 1) * pinGap;
            const pin = Bodies.circle(x, y, 3, { 
                isStatic: true, 
                render: { fillStyle: '#fff' },
                label: 'pin'
            });
            Composite.add(engine.world, pin);
        }
    }

    // Kotak Multiplier - Diletakkan paling bawah piramida
    const multis = [10, 5, 2, 0.5, 0.2, 0.2, 0.5, 2, 5, 10];
    const bucketWidth = width / multis.length;
    const bucketY = startY + rows * pinGap + 20;

    multis.forEach((m, i) => {
        const x = (i * bucketWidth) + bucketWidth / 2;
        // Sensor deteksi bola
        const sensor = Bodies.rectangle(x, bucketY, bucketWidth - 5, 30, {
            isStatic: true,
            isSensor: true,
            label: 'bucket_' + m,
            render: { fillStyle: 'transparent' }
        });
        
        // Visual Box (Glow)
        const box = Bodies.rectangle(x, bucketY + 10, bucketWidth - 10, 5, {
            isStatic: true,
            render: { fillStyle: m >= 1 ? '#00ff88' : '#ff0077' }
        });

        Composite.add(engine.world, [sensor, box]);
    });

    // Papan skor mengambang (3 baris saja)
    let recentWins = [];
    function updateScoreBoard(winAmt) {
        const board = document.getElementById('score-board');
        recentWins.unshift(`+Rp ${winAmt.toLocaleString()}`);
        if(recentWins.length > 3) recentWins.pop();
        
        board.innerHTML = recentWins.map(w => `<div class="score-entry">${w}</div>`).join('');
    }

    let balance = 243600; // Contoh saldo sesuai video Master
    let bet = 200;

    function adjustBet(val) {
        if(bet + val >= 100) { bet += val; document.getElementById('bet-amount').innerText = bet; }
    }

    function dropBall() {
        if(balance < bet) return alert("Saldo Kurang!");
        balance -= bet;
        updateUI();

        const ball = Bodies.circle(width/2 + (Math.random()*10 - 5), 10, 6, {
            restitution: 0.5,
            friction: 0.001,
            label: 'ball',
            render: { fillStyle: '#f5e642' }
        });
        Composite.add(engine.world, ball);
    }

    Events.on(engine, 'collisionStart', (event) => {
        event.pairs.forEach(pair => {
            if (pair.bodyA.label.startsWith('bucket_') && pair.bodyB.label === 'ball') {
                const multiplier = parseFloat(pair.bodyA.label.split('_')[1]);
                const win = bet * multiplier;
                balance += win;
                updateUI();
                updateScoreBoard(win);
                Composite.remove(engine.world, pair.bodyB); // Hapus bola agar tidak menumpuk
            }
        });
    });

    function updateUI() {
        document.getElementById('balance-center').innerText = `IDR ${balance.toLocaleString()}`;
    }

    updateUI();
    Render.run(render);
    Runner.run(Runner.create(), engine);
</script>
</body>
</html>
