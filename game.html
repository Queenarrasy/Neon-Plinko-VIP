<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NEON PLINKO VIP - v8.0</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--green:#00ff88;--bg:#02030d;
  --gp:0 0 15px rgba(255,0,119,.6),0 0 30px rgba(255,0,119,.2);
  --gb:0 0 15px rgba(0,85,255,.6),0 0 30px rgba(0,85,255,.2);
  --gy:0 0 15px rgba(245,230,66,.6),0 0 30px rgba(245,230,66,.2);
  --gg:0 0 15px rgba(0,255,136,.6),0 0 30px rgba(0,255,136,.2);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  width:100%;height:100vh;overflow:hidden;display:flex;flex-direction:column;
  background:var(--bg);color:#dde0f0;font-family:'Outfit',sans-serif;
  background-image:radial-gradient(circle at 50% -20%,#1a1b3a 0%,transparent 70%);
}

/* ── MODAL ── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(5px);z-index:9998;}
#neon-modal{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(160deg,#07091d,#0b0d24);border-radius:20px;z-index:9999;
  padding:25px;text-align:center;width:85%;max-width:320px;
  border:1px solid var(--pink);box-shadow:var(--gp);
}

/* ── HEADER ── */
.header{
  padding:10px 15px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,0,0,0.5);border-bottom:1px solid rgba(0,85,255,0.25);
}
.balance-box{
  flex:1;margin:0 12px;background:rgba(0,0,0,0.6);
  border:1px solid var(--pink);border-radius:30px;
  padding:4px 14px;text-align:center;box-shadow:var(--gp);
}
#game-display-saldo{
  font-family:'Cinzel Decorative',serif;font-size:15px;font-weight:900;color:#fff;
}

/* ── CANVAS ── */
#board-wrapper{flex:1;position:relative;width:100%;overflow:hidden;margin-top:8px;}
#plinko-canvas{display:block;width:100%;height:100%;}

/* ── SLOTS ── */
.multiplier-container{position:relative;height:32px;margin:0 0 8px;width:100%;}
.multiplier-row{display:flex;position:absolute;height:100%;top:0;justify-content:center;}
.slot{
  height:100%;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:900;border-radius:5px;margin:0 1px;
  transition:all 0.1s ease;
}
.slot.active{
  transform:scale(1.2) translateY(-3px);
  filter:brightness(2.5);box-shadow:0 0 15px #fff;z-index:10;
}
.s-high{background:linear-gradient(var(--pink),#80003c);color:#fff;}
.s-mid{background:linear-gradient(var(--yellow),#807700);color:#000;}
.s-low{background:linear-gradient(#334,#223);color:#fff;}

/* ── CONTROLS ── */
.controls{
  padding:12px 15px;background:rgba(5,7,25,0.95);
  border-top:1px solid rgba(0,85,255,0.2);display:flex;flex-direction:column;gap:10px;
}
.mode-row{display:flex;gap:5px;}
.btn-mode{
  flex:1;padding:9px;border-radius:12px;font-size:10px;font-weight:700;
  border:1px solid #333;background:rgba(255,255,255,0.04);color:#666;cursor:pointer;
}
.btn-mode.active{border-color:var(--blue);color:#fff;box-shadow:var(--gb);background:rgba(0,85,255,0.15);}
#m-auto.active{border-color:var(--green);color:var(--green);box-shadow:var(--gg);}

.bet-row{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,0,0,0.5);border:1px solid rgba(0,85,255,0.25);
  border-radius:50px;padding:4px 14px;
}
.bet-btn{font-size:22px;color:var(--pink);background:none;border:none;cursor:pointer;}
#current-bet{font-family:'Cinzel Decorative',serif;font-size:17px;font-weight:900;color:var(--yellow);}

.btn-play{
  width:100%;padding:15px;border-radius:50px;
  font-family:'Cinzel Decorative',serif;font-size:14px;font-weight:900;
  background:linear-gradient(90deg,var(--pink),var(--blue));
  color:#fff;border:none;cursor:pointer;box-shadow:var(--gp);
}
.btn-play.stop-mode{background:var(--yellow);color:#000;box-shadow:var(--gy);}

.nav-bottom{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;padding:9px;
  border-radius:14px;font-size:9px;font-weight:600;
  border:1px solid #1a1f35;color:#fff;background:rgba(255,255,255,.03);
}

#info-box{
  position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.9);color:#0f0;padding:6px 12px;border-radius:4px;
  font-size:10px;z-index:200;display:none;border:1px solid #0f0;
}
</style>
</head>
<body>

<div id="modal-overlay" onclick="closeModal()"></div>
<div id="neon-modal">
  <div id="modal-title">INFO</div>
  <div id="modal-msg"></div>
  <button style="padding:8px 20px; border-radius:20px; border:1px solid var(--pink); color:var(--pink); background:none;" onclick="closeModal()">OK</button>
</div>

<div class="header">
  <div style="text-align:center;min-width:40px;">
    <i class="fa-solid fa-circle-user" style="color:var(--yellow);font-size:20px;"></i>
    <span id="display-username" style="color:var(--yellow);font-size:8px;display:block;">GUEST</span>
  </div>
  <div class="balance-box">
    <div id="game-display-saldo">IDR 0</div>
  </div>
  <div onclick="location.reload()" style="width:40px;text-align:center;color:var(--pink);"><i class="fa-solid fa-rotate"></i></div>
</div>

<div id="board-wrapper">
  <canvas id="plinko-canvas"></canvas>
</div>

<div class="multiplier-container">
  <div class="multiplier-row" id="slot-row"></div>
</div>

<div class="controls">
  <div class="mode-row">
    <button class="btn-mode active" id="m-normal" onclick="setSpeed('normal')">NORMAL</button>
    <button class="btn-mode" id="m-turbo" onclick="setSpeed('turbo')">TURBO</button>
    <button class="btn-mode" id="m-auto" onclick="toggleAuto()">AUTO: OFF</button>
  </div>
  <div class="bet-row">
    <button class="bet-btn" onclick="changeBet(-1)"><i class="fa-solid fa-circle-minus"></i></button>
    <div id="current-bet">400</div>
    <button class="bet-btn" onclick="changeBet(1)" style="color:var(--blue)"><i class="fa-solid fa-circle-plus"></i></button>
  </div>
  <button class="btn-play" id="main-btn" onclick="handlePlay()">PLAY BALL</button>
  <div class="nav-bottom">
    <div class="nav-btn" style="color:var(--yellow);" onclick="location.href='withdraw.html'"><i class="fa-solid fa-money-bill-transfer"></i><span>WD</span></div>
    <div class="nav-btn" style="color:var(--pink);" onclick="location.href='deposit.html'"><i class="fa-solid fa-wallet"></i><span>DEP</span></div>
    <div class="nav-btn" style="color:var(--blue);" onclick="location.href='reward.html'"><i class="fa-solid fa-gift"></i><span>GIFT</span></div>
  </div>
</div>

<div id="info-box"></div>

<script src="global.js"></script>
<script>
/**
 * NEON PLINKO VIP v8.0 - FINAL STABLE
 */

const CONFIG = {
    ROWS: 9,
    BETS: [400, 800, 1000, 2000, 5000, 10000, 20000],
    MULTS: [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10],
    PHYSICS: {
        normal: { grav: 0.28, bounce: 0.45, friction: 0.99, steer: 0.15 },
        turbo:  { grav: 0.55, bounce: 0.42, friction: 0.98, steer: 0.25 }
    }
};

let G = {
    canvas: null, ctx: null, BW: 0, BH: 0,
    pegs: [], balls: [], floaters: [],
    speed: 'normal', isAuto: false, autoTimer: null,
    betIdx: 0, busy: false,
    slotX: 0, slotW: 0
};

function setupCanvas() {
    G.canvas = document.getElementById('plinko-canvas');
    G.ctx = G.canvas.getContext('2d');
    const wrap = document.getElementById('board-wrapper');
    G.BW = wrap.offsetWidth;
    G.BH = wrap.offsetHeight;

    const dpr = window.devicePixelRatio || 1;
    G.canvas.width = G.BW * dpr; G.canvas.height = G.BH * dpr;
    G.ctx.scale(dpr, dpr);

    // Build Pegs
    G.pegs = [];
    const spY = (G.BH - 40) / CONFIG.ROWS;
    const spX = G.BW / (CONFIG.ROWS + 2.5);
    let lastRowX = [];

    for (let r = 0; r < CONFIG.ROWS; r++) {
        let cnt = r + 3;
        let startX = (G.BW - (cnt - 1) * spX) / 2;
        for (let c = 0; c < cnt; c++) {
            let px = startX + c * spX;
            let py = 35 + r * spY;
            G.pegs.push({ x: px, y: py, glow: 0 });
            if (r === CONFIG.ROWS - 1) lastRowX.push(px);
        }
    }

    // Align Slot DOM dengan Pegs Akhir
    G.slotX = lastRowX[0];
    G.slotW = (lastRowX[lastRowX.length - 1] - G.slotX) / CONFIG.MULTS.length;
    
    const sRow = document.getElementById('slot-row');
    sRow.style.left = G.slotX + "px";
    sRow.style.width = (lastRowX[lastRowX.length - 1] - G.slotX) + "px";
    sRow.innerHTML = '';
    CONFIG.MULTS.forEach((m, i) => {
        const s = document.createElement('div');
        s.id = `slot-${i}`;
        s.className = `slot ${m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low'}`;
        s.style.width = `${100 / CONFIG.MULTS.length}%`;
        s.innerHTML = `<span>${m}x</span>`;
        sRow.appendChild(s);
    });
}

// Menemukan slot yang tepat berdasarkan multiplier server
function findSlotIdx(mult) {
    let targets = [];
    CONFIG.MULTS.forEach((m, i) => { if(Math.abs(m - mult) < 0.1) targets.push(i); });
    return targets.length > 0 ? targets[Math.floor(Math.random() * targets.length)] : 4;
}

async function handlePlay() {
    if (G.busy && !G.isAuto) return;
    
    const bet = CONFIG.BETS[G.betIdx];
    const saldo = typeof getSaldo === 'function' ? getSaldo() : 0;

    if (saldo < bet) {
        showModal("Saldo tidak cukup!", "WARNING");
        stopAuto(); return;
    }

    // Visual start
    G.busy = true;
    updateSaldoUI(saldo - bet);

    const ball = {
        x: G.BW / 2 + (Math.random() - 0.5) * 10,
        y: -10, vx: 0, vy: 2,
        status: 'wait', targetIdx: null, isDone: false, bet: bet
    };
    G.balls.push(ball);

    try {
        const res = await GameEngine.processPlay(bet);
        if (res && res.result === 'SUCCESS') {
            ball.targetIdx = findSlotIdx(res.multiplier);
            ball.winAmount = res.winAmount;
            ball.mult = res.multiplier;
            ball.status = 'ready';
        } else {
            ball.isDone = true;
            updateSaldoUI(getSaldo());
        }
    } catch(e) { ball.isDone = true; }
}

function updatePhysics() {
    const ph = CONFIG.PHYSICS[G.speed];
    G.balls.forEach(b => {
        if (b.isDone) return;
        b.vy += ph.grav;
        b.x += b.vx; b.y += b.vy;

        // Collision Pegs
        G.pegs.forEach(p => {
            let dx = b.x - p.x, dy = b.y - p.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 10) {
                let ang = Math.atan2(dy, dx);
                let s = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
                b.vx = Math.cos(ang) * s * ph.bounce + (Math.random()-0.5)*0.5;
                b.vy = Math.abs(Math.sin(ang) * s * ph.bounce) + 0.5;
                p.glow = 1.0;
            }
        });

        // Snapping Logic (Kunci Masuk Kotak)
        if (b.status === 'ready' && b.y > G.BH * 0.5) {
            let tx = G.slotX + (b.targetIdx + 0.5) * G.slotW;
            let diff = tx - b.x;
            b.vx += diff * ph.steer * (b.y / G.BH);
        }

        // Landing
        if (b.y > G.BH - 5) {
            b.isDone = true;
            if (b.status === 'ready') onBallLand(b);
        }
    });
    G.balls = G.balls.filter(b => !b.isDone);
}

function onBallLand(b) {
    // Sync Saldo ke Server & UI
    if(typeof syncSaldoUI === 'function') syncSaldoUI(getSaldo());

    // Animasi Slot
    const el = document.getElementById(`slot-${b.targetIdx}`);
    if (el) {
        el.classList.add('active');
        setTimeout(() => el.classList.remove('active'), 300);
    }

    // Floating Score (Tidak Ganggu Layar)
    let color = b.mult >= 3 ? '#ff0077' : (b.mult >= 1 ? '#f5e642' : '#0055ff');
    G.floaters.push({
        x: G.slotX + (b.targetIdx + 0.5) * G.slotW,
        y: G.BH - 20,
        txt: b.mult + "x",
        color: color,
        op: 1.0
    });

    G.busy = false;
}

function draw() {
    G.ctx.clearRect(0, 0, G.BW, G.BH);

    // Draw Pegs
    G.pegs.forEach(p => {
        G.ctx.beginPath();
        G.ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
        G.ctx.fillStyle = p.glow > 0 ? `rgba(255,255,255,${p.glow})` : '#333b5a';
        if(p.glow > 0) { G.ctx.shadowBlur = 10; G.ctx.shadowColor = "#fff"; p.glow -= 0.05; }
        else G.ctx.shadowBlur = 0;
        G.ctx.fill();
    });

    // Draw Balls
    G.balls.forEach(b => {
        G.ctx.beginPath();
        G.ctx.arc(b.x, b.y, 6, 0, Math.PI*2);
        G.ctx.fillStyle = b.status === 'ready' ? '#ff0077' : '#0055ff';
        G.ctx.shadowBlur = 15; G.ctx.shadowColor = G.ctx.fillStyle;
        G.ctx.fill();
    });

    // Draw Floaters
    G.floaters.forEach((f, i) => {
        f.y -= 1; f.op -= 0.02;
        G.ctx.globalAlpha = f.op;
        G.ctx.font = "bold 12px Outfit";
        G.ctx.fillStyle = f.color;
        G.ctx.textAlign = "center";
        G.ctx.fillText(f.txt, f.x, f.y);
        if(f.op <= 0) G.floaters.splice(i, 1);
    });
    G.ctx.globalAlpha = 1.0;

    updatePhysics();
    requestAnimationFrame(draw);
}

// --- Mode & Auto Functions ---
function setSpeed(s) {
    G.speed = s;
    document.getElementById('m-normal').classList.toggle('active', s === 'normal');
    document.getElementById('m-turbo').classList.toggle('active', s === 'turbo');
}

function toggleAuto() {
    G.isAuto = !G.isAuto;
    const btn = document.getElementById('m-auto');
    const mainBtn = document.getElementById('main-btn');
    if (G.isAuto) {
        btn.classList.add('active'); btn.textContent = "AUTO: ON";
        mainBtn.textContent = "STOP AUTO"; mainBtn.classList.add('stop-mode');
        autoCycle();
    } else {
        stopAuto();
    }
}

function autoCycle() {
    if (!G.isAuto) return;
    handlePlay();
    let delay = G.speed === 'turbo' ? 600 : 1200;
    G.autoTimer = setTimeout(autoCycle, delay);
}

function stopAuto() {
    G.isAuto = false; clearTimeout(G.autoTimer);
    document.getElementById('m-auto').classList.remove('active');
    document.getElementById('m-auto').textContent = "AUTO: OFF";
    document.getElementById('main-btn').textContent = "PLAY BALL";
    document.getElementById('main-btn').classList.remove('stop-mode');
}

function changeBet(d) {
    if(G.isAuto) return;
    G.betIdx = Math.max(0, Math.min(CONFIG.BETS.length - 1, G.betIdx + d));
    document.getElementById('current-bet').textContent = CONFIG.BETS[G.betIdx].toLocaleString();
}

function updateSaldoUI(val) {
    const el = document.getElementById('game-display-saldo');
    if(el) el.textContent = "IDR " + Math.floor(val).toLocaleString('id-ID');
}

function showModal(m, t) {
    document.getElementById('modal-title').textContent = t;
    document.getElementById('modal-msg').textContent = m;
    document.getElementById('modal-overlay').style.display = 'block';
    document.getElementById('neon-modal').style.display = 'block';
}

function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('neon-modal').style.display = 'none';
}

window.onload = () => {
    setupCanvas();
    if(typeof getSaldo === 'function') updateSaldoUI(getSaldo());
    if(typeof getUsername === 'function') document.getElementById('display-username').textContent = getUsername().toUpperCase();
    draw();
};
window.onresize = setupCanvas;
</script>
</body>
</html>
