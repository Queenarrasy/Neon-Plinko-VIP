<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP - ULTIMATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --pink: #ff0077; --blue: #0044ff; --yellow: #fbff00; --white: #ffffff; --bg: #03040a;
            --neon-pink: 0 0 8px rgba(255, 0, 119, 0.5);
            --neon-blue: 0 0 8px rgba(0, 68, 255, 0.5);
            --neon-white: 0 0 5px rgba(255, 255, 255, 0.3);
            --neon-yellow: 0 0 8px rgba(251, 255, 0, 0.5);
        }
        body {
            background: var(--bg); color: white; font-family: sans-serif;
            margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column;
        }
        #neon-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0a0b1e; border: 2px solid var(--pink); border-radius: 15px;
            box-shadow: var(--neon-pink); z-index: 9999; padding: 20px; text-align: center; min-width: 250px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--blue); }
        .balance-box { background: #000; border: 2px solid var(--pink); border-radius: 20px; padding: 5px 20px; box-shadow: var(--neon-pink); text-align: center; }
        #display-saldo { font-size: 18px; font-weight: bold; color: var(--white); }
        #game-board { position: relative; width: 100%; height: 360px; overflow: visible; }
        .peg { position: absolute; width: 6px; height: 6px; background: var(--white); border-radius: 50%; transform: translate(-50%, -50%); }
        .peg.hit { background: var(--yellow); box-shadow: var(--neon-yellow); transform: translate(-50%, -50%) scale(1.5); }
        .ball { position: absolute; width: 14px; height: 14px; background: var(--pink); border-radius: 50%; box-shadow: var(--neon-pink); transform: translate(-50%, -50%); z-index: 10; will-change: left, top; }
        .multiplier-row { display: flex; justify-content: center; gap: 4px; padding: 0 10px; margin: 10px 0; }
        .slot { flex: 1; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; border-radius: 5px; color: #000; transition: 0.2s; }
        .slot.active { transform: translateY(-10px) scale(1.1); box-shadow: 0 0 15px white; filter: brightness(1.3); }
        .s-high { background: var(--pink); } .s-mid { background: var(--yellow); } .s-low { background: var(--blue); color: white !important; }
        .controls { padding: 15px; background: #050714; border-top: 2px solid var(--blue); }
        .btn-mode { background: transparent; padding: 10px 15px; border-radius: 10px; font-size: 10px; font-weight: 900; cursor: pointer; border: 1px solid gray; color: white; }
        .btn-mode.active { background: var(--pink); border-color: var(--pink); box-shadow: var(--neon-pink); }
        #m-auto.active { background: var(--blue); border-color: var(--blue); box-shadow: var(--neon-blue); }
        .btn-play { width: 100%; padding: 16px; border-radius: 50px; background: linear-gradient(90deg, #aa0055, #0022aa); color: white; font-weight: 900; border: 2px solid var(--yellow); cursor: pointer; }
        .nav-bottom { display: grid; grid-template-columns: repeat(3, 1fr); background: #000; padding: 12px 5px; border-top: 2px solid var(--blue); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: white; font-size: 10px; font-weight: bold; border: 1px solid #333; padding: 5px; border-radius: 10px; }
        #floating-score { position: fixed; top: 100px; right: 10px; background: rgba(0,0,0,0.8); border: 1px solid var(--yellow); padding: 8px; border-radius: 8px; min-width: 90px; z-index: 1000; }
        .score-entry { font-size: 11px; color: var(--yellow); border-bottom: 1px solid #333; margin-bottom: 2px; }
    </style>
</head>
<body>

    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <div id="neon-modal">
        <h3 id="modal-title" style="color: var(--pink); margin: 0;">NOTIFIKASI</h3>
        <p id="modal-msg" style="color: white; font-size: 14px;"></p>
        <button style="margin-top:10px; padding:5px 15px;" onclick="closeModal()">OK</button>
    </div>

    <div id="floating-score"><div id="score-list"></div></div>

    <div class="header">
        <div onclick="location.href='profil.html'"><i class="fa-solid fa-user"></i><span> PROFIL</span></div>
        <div class="balance-box">
            <div style="font-size: 9px;">SALDO</div>
            <div id="display-saldo">IDR 0</div>
        </div>
        <div onclick="location.href='settings.html'"><i class="fa-solid fa-gear"></i><span> SETTING</span></div>
    </div>

    <div id="game-board"></div>
    <div class="multiplier-row" id="slot-row"></div>

    <div class="controls">
        <div style="display:flex; justify-content:center; gap:10px; margin-bottom:10px;">
            <button class="btn-mode active" id="m-normal" onclick="setSpeed('normal')">NORMAL</button>
            <button class="btn-mode" id="m-turbo" onclick="setSpeed('turbo')">TURBO</button>
            <button class="btn-mode" id="m-auto" onclick="toggleAuto()">AUTO: OFF</button>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <i class="fa-solid fa-circle-minus btn-bet-ctrl" onclick="changeBet(-1)" style="font-size:25px; color:var(--pink);"></i>
            <div style="text-align:center;">
                <span id="current-bet" style="font-size:22px; color:var(--yellow); font-weight:bold;">400</span>
            </div>
            <i class="fa-solid fa-circle-plus btn-bet-ctrl" onclick="changeBet(1)" style="font-size:25px; color:var(--blue);"></i>
        </div>
        <button class="btn-play" onclick="handlePlay()">PLAY BALL</button>
    </div>

    <div class="nav-bottom">
        <a href="withdraw.html" class="nav-btn">WITHDRAW</a>
        <a href="deposit.html" class="nav-btn">DEPOSIT</a>
        <a href="reward.html" class="nav-btn">REWARD</a>
    </div>

    <script src="global.js"></script>
    <script>
        const betList = [400, 800, 1000, 1200, 1600, 1800, 2000, 4000, 8000, 10000, 12000, 16000, 18000, 20000];
        const multipliers = [5, 2, 1.2, 0.5, 0.2, 0.5, 1.2, 2, 5];
        let betIdx = 0, speed = 'normal', isAuto = false, autoInt = null, isPlaying = false, ballActiveCount = 0, pegLocs = [];

        function playSound(t){ const s=document.getElementById('snd-'+t); if(s){s.currentTime=0; s.play().catch(()=>{});}}
        function showModal(m,c='var(--pink)'){ document.getElementById('modal-msg').innerText=m; document.getElementById('neon-modal').style.display='block'; }
        function closeModal(){ document.getElementById('neon-modal').style.display='none'; }

        function init() {
            board.innerHTML = ''; pegLocs = [];
            const rows = 9, centerX = board.offsetWidth / 2;
            for (let r = 2; r <= rows; r++) {
                for (let i = 0; i < r; i++) {
                    const x = centerX + (i - (r - 1) / 2) * 38, y = r * 35;
                    const p = document.createElement('div'); p.className = 'peg'; p.style.left = x + 'px'; p.style.top = y + 'px';
                    board.appendChild(p); pegLocs.push({ x, y, el: p });
                }
            }
            const row = document.getElementById('slot-row'); row.innerHTML = '';
            multipliers.forEach(m => {
                const s = document.createElement('div'); s.className = `slot ${m >= 2 ? 's-high' : m >= 1 ? 's-mid' : 's-low'}`;
                s.innerText = m + 'x'; row.appendChild(s);
            });
        }

        function changeBet(d) {
            if (isPlaying || isAuto) return;
            playSound('click');
            betIdx = Math.max(0, Math.min(betList.length - 1, betIdx + d));
            document.getElementById('current-bet').innerText = betList[betIdx].toLocaleString();
        }

        function setSpeed(m) {
            if (isAuto) return;
            playSound('click'); speed = m;
            document.getElementById('m-normal').classList.toggle('active', m === 'normal');
            document.getElementById('m-turbo').classList.toggle('active', m === 'turbo');
        }

        function toggleAuto() {
            if (!isPlaying && !isAuto) { showModal("Klik PLAY dulu!", "var(--yellow)"); return; }
            isAuto = !isAuto;
            const btnA = document.getElementById('m-auto'), btnP = document.querySelector('.btn-play');
            if (isAuto) {
                btnA.innerText = "AUTO: ON"; btnA.classList.add('active'); btnP.innerText = "STOP AUTO";
                autoInt = setInterval(executeDrop, speed === 'turbo' ? 500 : 1300);
            } else {
                btnA.innerText = "AUTO: OFF"; btnA.classList.remove('active'); btnP.innerText = "PLAY BALL";
                clearInterval(autoInt);
            }
        }

        async function handlePlay() { if (isAuto) { toggleAuto(); return; } executeDrop(); }

        async function executeDrop() {
            const bet = betList[betIdx];
            if (Number(localStorage.getItem('user_saldo')) < bet) { showModal("Saldo Habis!"); if(isAuto) toggleAuto(); return; }
            isPlaying = true;
            document.querySelectorAll('.btn-bet-ctrl').forEach(i => i.style.opacity = "0.3");
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'game_play', username: user, bet: bet })
                });
                const res = await response.json();
                if (res.result === "SUCCESS") {
                    localStorage.setItem('user_saldo', res.newSaldo);
                    updateSaldoUI();
                    dropBall(bet, res.target_multiplier);
                }
            } catch (e) { console.log("Error"); }
        }

        function dropBall(bet, targetMult) {
            ballActiveCount++;
            const ball = document.createElement('div'); ball.className = 'ball'; board.appendChild(ball);
            let px = board.offsetWidth / 2, py = 10, vx = (Math.random() - 0.5) * 1.5, vy = 0;
            const targetX = (multipliers.indexOf(targetMult) + 0.5) * (board.offsetWidth / multipliers.length);

            function animate() {
                vy += (speed === 'turbo' ? 0.9 : 0.65); px += vx; py += vy;
                pegLocs.forEach(p => {
                    const dx = px - p.x, dy = py - p.y, dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 11) {
                        playSound('hit'); vx = (dx / dist) * (speed === 'turbo' ? 3.5 : 2.2); vy = (dy / dist) * 1.5;
                        if (py > 150) vx += (targetX - px) * 0.12;
                        p.el.classList.add('hit'); setTimeout(() => p.el.classList.remove('hit'), 80);
                    }
                });
                vx *= 0.99;
                if (px < 15 || px > board.offsetWidth - 15) vx *= -0.7;
                ball.style.left = px + 'px'; ball.style.top = py + 'px';
                if (py < 375) requestAnimationFrame(animate);
                else {
                    ball.remove(); ballActiveCount--;
                    if (ballActiveCount <= 0 && !isAuto) { isPlaying = false; document.querySelectorAll('.btn-bet-ctrl').forEach(i => i.style.opacity = "1"); }
                    finish(bet, targetMult);
                }
            }
            requestAnimationFrame(animate);
        }

        function finish(bet, mult) {
            const win = Math.floor(bet * mult);
            const list = document.getElementById('score-list');
            const entry = document.createElement('div'); entry.className = 'score-entry';
            entry.innerHTML = `<span>${mult}x</span> | IDR ${win.toLocaleString()}`;
            list.prepend(entry);
            if(list.children.length > 5) list.removeChild(list.lastChild);
            updateSaldoUI();
        }

        window.onload = () => { init(); updateSaldoUI(); };
    </script>
</body>
</html>
