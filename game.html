<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO — EXCLUSIVE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #02030d; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; background: radial-gradient(circle at center, #0a0c1f 0%, #02030d 100%); }

        /* Header */
        .header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--blue); z-index: 100; }
        .logo { font-family: 'Cinzel Decorative'; color: var(--pink); font-size: 18px; text-shadow: 0 0 10px var(--pink); }
        .balance-box { background: rgba(0,212,255,0.1); border: 1px solid var(--blue); padding: 5px 15px; border-radius: 50px; display: flex; align-items: center; gap: 8px; box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); }

        /* Game Board Area */
        #game-area { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; padding-top: 20px; }
        #board-wrapper { position: relative; width: 100%; max-width: 450px; height: 500px; }
        canvas { width: 100%; height: 100%; }

        /* Multiplier Slots */
        .m-bar { position: absolute; bottom: -5px; width: 100%; display: flex; justify-content: center; gap: 4px; padding: 0 10px; }
        .m-slot { flex: 1; height: 35px; border-radius: 6px; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; color: #000; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 0 rgba(0,0,0,0.5); text-shadow: 0 1px 0 rgba(255,255,255,0.3); }

        /* Floating Score */
        .f-score { position: absolute; font-weight: 900; font-size: 20px; pointer-events: none; z-index: 1000; animation: floatUp 1s ease-out forwards; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
        @keyframes floatUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-80px); opacity: 0; } }

        /* Controls */
        .controls { background: rgba(5,6,20,0.9); padding: 20px; border-radius: 30px 30px 0 0; border-top: 1px solid var(--blue); }
        .bet-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 50px; }
        .bet-nav { color: var(--blue); font-size: 24px; cursor: pointer; }
        .mode-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: #fff; font-weight: 600; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .mode-btn.active { background: var(--blue); color: #000; box-shadow: 0 0 15px var(--blue); }
        .mode-btn.auto-active { background: var(--yellow); color: #000; box-shadow: 0 0 15px var(--yellow); border-color: var(--yellow); }

        .btn-main { width: 100%; padding: 18px; border-radius: 50px; border: none; background: linear-gradient(180deg, var(--pink) 0%, #b30054 100%); color: #fff; font-family: 'Cinzel Decorative'; font-weight: 900; font-size: 20px; box-shadow: 0 6px 0 #7a003a; cursor: pointer; transition: 0.1s; }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 3px 0 #7a003a; }
        .btn-stop { background: linear-gradient(180deg, #555 0%, #222 100%); box-shadow: 0 6px 0 #000; }

        /* Modal Custom */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-box { background: #050614; border: 2px solid var(--pink); border-radius: 30px; padding: 30px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 0 30px var(--pink); }
        .modal-box h2 { color: var(--yellow); font-family: 'Cinzel Decorative'; margin-bottom: 10px; }
        .modal-btn { background: var(--pink); border: none; color: #fff; padding: 12px 30px; border-radius: 50px; font-weight: 800; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">NEON PLINKO VIP</div>
        <div class="balance-box">
            <i class="fa-solid fa-wallet" style="color:var(--blue)"></i>
            <span id="saldo-text">IDR 0</span>
        </div>
    </div>

    <div id="game-area">
        <div id="board-wrapper">
            <canvas id="canvas"></canvas>
            <div class="m-bar" id="m-bar"></div>
        </div>
    </div>

    <div class="controls">
        <div class="bet-row">
            <i class="fa-solid fa-square-minus bet-nav" onclick="changeBet(-1)"></i>
            <div style="text-align:center">
                <div style="font-size:10px; opacity:0.6; letter-spacing:1px">BET AMOUNT</div>
                <div style="font-size:20px; font-weight:800; color:var(--yellow)" id="bet-display">400</div>
            </div>
            <i class="fa-solid fa-square-plus bet-nav" onclick="changeBet(1)"></i>
        </div>

        <div class="mode-row">
            <button class="mode-btn active" id="btn-normal" onclick="setMode('normal')">NORMAL</button>
            <button class="mode-btn" id="btn-turbo" onclick="setMode('turbo')">TURBO</button>
            <button class="mode-btn" id="btn-auto" onclick="toggleAuto()">AUTO: OFF</button>
        </div>

        <button class="btn-main" id="btn-action" onclick="handleAction()">DROP BALL</button>
    </div>

    <div id="modal-overlay">
        <div class="modal-box">
            <h2 id="m-title">ALERT</h2>
            <p id="m-msg" style="font-size:14px; color:#ccc"></p>
            <button class="modal-btn" onclick="closeModal()">UNDERSTOOD</button>
        </div>
    </div>

    <audio id="s-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="s-hit" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="s-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    const engine = Engine.create({ gravity: { y: 1.5 } }); // Gravitas lebih berat agar bola mantap
    const world = engine.world;
    
    const BETS = [400, 800, 1000, 1200, 1400, 1600, 1800, 2000, 4000, 6000, 8000, 10000, 12000, 16000, 18000, 20000];
    let betIdx = 0;
    let isTurbo = false;
    let isAuto = false;
    let autoTimer = null;
    let currentSaldo = 0;
    let adminWinrate = 50;
    let adminMaxWin = 1000000;
    const multiValues = [15, 8, 3, 0.5, 0.2, 0.5, 3, 8, 15];
    const multiColors = ['#ff0077', '#ff4d94', '#00d4ff', '#1a1b2e', '#1a1b2e', '#1a1b2e', '#00d4ff', '#ff4d94', '#ff0077'];

    async function init() {
        const user = localStorage.getItem('user_neon');
        if(!user) window.location.href = 'index.html';

        setupBoard();
        fetchData();
        setInterval(fetchData, 5000); // Sync saldo berkala
    }

    async function fetchData() {
        const user = localStorage.getItem('user_neon');
        const { data } = await _supabase.from('profiles').select('*').eq('username', user).single();
        if(data) {
            currentSaldo = data.saldo;
            adminWinrate = data.winrate || 50;
            adminMaxWin = data.max_win_limit || 1000000;
            document.getElementById('saldo-text').innerText = "IDR " + currentSaldo.toLocaleString('id-ID');
        }
    }

    function setupBoard() {
        const canvas = document.getElementById('canvas');
        const render = Render.create({
            canvas: canvas, engine: engine,
            options: { width: 450, height: 500, wireframes: false, background: 'transparent' }
        });

        // Pins (Grid Plinko)
        for (let r = 0; r < 9; r++) {
            let pins = r + 3;
            for (let c = 0; c < pins; c++) {
                let x = 225 + (c - pins / 2 + 0.5) * 45;
                let y = 60 + r * 45;
                Composite.add(world, Bodies.circle(x, y, 4, { isStatic: true, render: { fillStyle: '#fff' } }));
            }
        }

        // Multiplayer Visual
        const mBar = document.getElementById('m-bar');
        multiValues.forEach((v, i) => {
            const div = document.createElement('div');
            div.className = 'm-slot';
            div.style.background = multiColors[i];
            div.style.color = (i >= 3 && i <= 5) ? '#fff' : '#000';
            div.innerText = 'x'+v;
            mBar.appendChild(div);

            // Sensor area
            let x = 45 + i * 45;
            let sensor = Bodies.rectangle(x, 485, 38, 20, { 
                isStatic: true, isSensor: true, label: 'm_'+v, render: { visible: false } 
            });
            Composite.add(world, sensor);
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    }

    function spawnBall() {
        if(currentSaldo < BETS[betIdx]) {
            stopAuto();
            return showModal("ALERT", "Insufficient balance for this bet.");
        }

        playS('s-click');
        const user = localStorage.getItem('user_neon');
        currentSaldo -= BETS[betIdx];
        document.getElementById('saldo-text').innerText = "IDR " + currentSaldo.toLocaleString('id-ID');

        // Admin Winrate Logic
        let startX = 225 + (Math.random() * 20 - 10);
        const winChance = Math.random() * 100;
        if(winChance > adminWinrate) {
            // Paksa ke tengah (x0.2 / x0.5)
            startX = 225 + (Math.random() * 40 - 20);
        } else {
            // Beri kesempatan ke pinggir
            startX = (Math.random() > 0.5) ? 140 : 310;
        }

        const ball = Bodies.circle(startX, 10, 10, {
            restitution: 0.5, friction: 0.005, density: 0.01,
            render: { fillStyle: '#fbff00', strokeStyle: '#fff', lineWidth: 2 }
        });
        Composite.add(world, ball);

        // Sound on hit
        Events.on(engine, 'collisionStart', (e) => {
            e.pairs.forEach(p => {
                if(p.bodyA === ball || p.bodyB === ball) playS('s-hit');
            });
        });

        // Tracker ball
        const check = setInterval(async () => {
            if(ball.position.y > 475) {
                clearInterval(check);
                const bodies = Composite.allBodies(world);
                const sensors = bodies.filter(b => b.label?.startsWith('m_'));
                let nearest = sensors[0];
                let minD = 1000;
                sensors.forEach(s => {
                    let d = Math.abs(s.position.x - ball.position.x);
                    if(d < minD) { minD = d; nearest = s; }
                });

                const mult = parseFloat(nearest.label.split('_')[1]);
                let winAmt = Math.floor(BETS[betIdx] * mult);
                
                // Max Win Limit Check
                if(winAmt > adminMaxWin) winAmt = adminMaxWin;

                Composite.remove(world, ball);
                showFloatingScore(ball.position.x, winAmt, mult);
                
                // Sync Database
                const { data } = await _supabase.rpc('handle_plinko_win', {
                    u_name: user,
                    bet: BETS[betIdx],
                    win: winAmt
                });
                
                if(mult >= 2) playS('s-win');
                fetchData();
            }
        }, 50);
    }

    function showFloatingScore(x, amt, mult) {
        const el = document.createElement('div');
        el.className = 'f-score';
        el.style.left = (x - 20) + 'px';
        el.style.bottom = '80px';
        el.style.color = mult < 1 ? '#ff4d4d' : 'var(--yellow)';
        el.innerText = (mult < 1 ? "" : "+") + amt.toLocaleString('id-ID');
        document.getElementById('board-wrapper').appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }

    function handleAction() {
        if(isAuto) {
            stopAuto();
        } else {
            spawnBall();
        }
    }

    function toggleAuto() {
        isAuto = !isAuto;
        const btn = document.getElementById('btn-auto');
        const actionBtn = document.getElementById('btn-action');
        
        if(isAuto) {
            btn.classList.add('auto-active');
            btn.innerText = "AUTO: ON";
            actionBtn.innerText = "STOP AUTO";
            actionBtn.classList.add('btn-stop');
            
            const speed = isTurbo ? 400 : 1000;
            autoTimer = setInterval(spawnBall, speed);
        } else {
            stopAuto();
        }
    }

    function stopAuto() {
        isAuto = false;
        clearInterval(autoTimer);
        const btn = document.getElementById('btn-auto');
        const actionBtn = document.getElementById('btn-action');
        btn.classList.remove('auto-active');
        btn.innerText = "AUTO: OFF";
        actionBtn.innerText = "DROP BALL";
        actionBtn.classList.remove('btn-stop');
    }

    function setMode(m) {
        playS('s-click');
        isTurbo = (m === 'turbo');
        document.getElementById('btn-normal').classList.toggle('active', m === 'normal');
        document.getElementById('btn-turbo').classList.toggle('active', m === 'turbo');
        if(isAuto) { stopAuto(); toggleAuto(); } // Restart auto with new speed
    }

    function changeBet(dir) {
        playS('s-click');
        betIdx = Math.max(0, Math.min(BETS.length - 1, betIdx + dir));
        document.getElementById('bet-display').innerText = BETS[betIdx].toLocaleString('id-ID');
    }

    function playS(id) {
        const s = document.getElementById(id);
        s.currentTime = 0;
        s.play().catch(()=>{});
    }

    function showModal(title, msg) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-msg').innerText = msg;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }

    init();
</script>
</body>
</html>
