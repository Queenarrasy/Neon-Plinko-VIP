<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--bg:#02030d;
  --gp:0 0 8px rgba(255,0,119,.65),0 0 24px rgba(255,0,119,.22);
  --gb:0 0 8px rgba(0,85,255,.65),0 0 24px rgba(0,85,255,.22);
  --gy:0 0 8px rgba(245,230,66,.65),0 0 24px rgba(245,230,66,.22);
  --bp:rgba(255,0,119,.35);--bb:rgba(0,85,255,.35);--by:rgba(245,230,66,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;overflow:hidden;
  display:flex;flex-direction:column;
  background:var(--bg);
  color:#dde0f0;font-family:'Outfit',sans-serif;
}

/* ── MODAL ── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:9998;}
#neon-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#0b0d24;border-radius:22px;z-index:9999;
  padding:26px 22px;text-align:center;width:86%;max-width:310px;
  animation:mpop .3s cubic-bezier(.34,1.56,.64,1) both;border:1px solid var(--bp);box-shadow:var(--gp);}
@keyframes mpop{from{opacity:0;transform:translate(-50%,-50%) scale(.7)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* ── HEADER ── */
.header{
  flex-shrink:0;z-index:10;padding:10px 14px;
  background:rgba(2,3,13,.96);border-bottom:1px solid rgba(0,85,255,.28);
  display:flex;align-items:center;justify-content:space-between;
}
.balance-box{flex:1;margin:0 15px;background:rgba(0,0,0,.55);
  border:1px solid var(--bp);border-radius:20px;padding:5px 10px;text-align:center;box-shadow:var(--gp);}
#display-saldo{font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:900;color:#fff;text-shadow:var(--gp);}

/* ── BOARD ── */
#board-wrapper{flex:1;position:relative;background:#02030d;overflow:hidden;}
#plinko-canvas{display:block;width:100%;height:100%;touch-action:none;}

/* ── SLOT ROW ── */
.multiplier-row{
  display:flex;justify-content:center;gap:3px;padding:5px 10px;background:rgba(0,0,0,0.5);
}
.slot{
  flex:1;height:28px;display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:900;border-radius:5px;transition:0.2s;
}
.slot.active{transform:scale(1.2);filter:brightness(2);box-shadow:0 0 15px #fff;}
.s-high{background:var(--pink);color:#fff;}
.s-mid {background:var(--yellow);color:#000;}
.s-low {background:var(--blue);color:#fff;}

/* ── CONTROLS ── */
.controls{padding:12px;background:#07091d;border-top:1px solid rgba(0,85,255,.3);display:flex;flex-direction:column;gap:10px;}
.mode-row{display:flex;gap:8px;}
.btn-mode{flex:1;padding:10px;border-radius:10px;font-size:10px;font-weight:700;cursor:pointer;background:transparent;border:1px solid #333;color:#888;}
.btn-mode.active{border-color:var(--blue);color:#fff;box-shadow:var(--gb);}

.bet-row{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.4);padding:8px 15px;border-radius:50px;border:1px solid #222;}
.bet-btn{font-size:24px;cursor:pointer;color:var(--pink);}
#current-bet{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--yellow);font-weight:900;}

.btn-play{
  width:100%;padding:16px;border-radius:50px;cursor:pointer;
  font-family:'Cinzel Decorative',serif;font-size:14px;font-weight:900;
  background:linear-gradient(90deg, var(--pink), var(--blue));
  color:#fff;border:none;box-shadow:var(--gp);
}
.btn-play:active{transform:scale(0.96);}
.btn-play.stop-mode{background:var(--yellow);color:#000;box-shadow:var(--gy);}

.nav-bottom{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:5px;}
.nav-btn{text-align:center;text-decoration:none;color:#888;font-size:10px;padding:8px;border:1px solid #222;border-radius:10px;}
</style>
</head>
<body>

<div id="modal-overlay" onclick="closeModal()"></div>
<div id="neon-modal">
  <div style="color:var(--pink);font-weight:900;margin-bottom:10px;">SYSTEM ALERT</div>
  <div id="modal-msg" style="font-size:13px;"></div>
  <button style="margin-top:15px;padding:8px 20px;background:var(--pink);border:none;color:#fff;border-radius:5px;" onclick="closeModal()">OK</button>
</div>

<div class="header">
  <div onclick="location.href='profil.html'"><i class="fa-solid fa-user" style="color:var(--yellow)"></i></div>
  <div class="balance-box">
    <div style="font-size:8px;color:#666;">SALDO</div>
    <div id="display-saldo">IDR 0</div>
  </div>
  <div style="width:20px;"></div>
</div>

<div id="board-wrapper">
  <canvas id="plinko-canvas"></canvas>
</div>

<div class="multiplier-row" id="slot-row"></div>

<div class="controls">
  <div class="mode-row">
    <button class="btn-mode active" id="m-normal" onclick="setSpeed('normal')">NORMAL</button>
    <button class="btn-mode" id="m-turbo" onclick="setSpeed('turbo')">TURBO</button>
    <button class="btn-mode" id="m-auto" onclick="toggleAuto()">AUTO: OFF</button>
  </div>

  <div class="bet-row">
    <i class="fa-solid fa-circle-minus bet-btn" onclick="changeBet(-1)"></i>
    <div style="text-align:center;">
      <div id="current-bet">400</div>
    </div>
    <i class="fa-solid fa-circle-plus bet-btn" style="color:var(--blue)" onclick="changeBet(1)"></i>
  </div>

  <button class="btn-play" id="main-btn" onclick="handleMainAction()">PLAY BALL</button>

  <div class="nav-bottom">
    <a href="withdraw.html" class="nav-btn">WITHDRAW</a>
    <a href="deposit.html" class="nav-btn">DEPOSIT</a>
    <a href="reward.html" class="nav-btn">REWARD</a>
  </div>
</div>

<script src="global.js"></script>
<script>
// ── CONFIG ──
const ROWS = 10;
const MULTS = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
const BETS = [400, 800, 1000, 2000, 5000, 10000, 25000, 50000];
const PEG_R = 4;
const BALL_R = 6;

let canvas, ctx, BW, BH, slotW;
let pegs = [], balls = [];
let betIdx = 0;
let speedMode = 'normal';
let isAuto = false;
let autoInterval = null;

// ── PHYSICS ENGINE ──
function setupBoard() {
    canvas = document.getElementById('plinko-canvas');
    ctx = canvas.getContext('2d');
    const wrap = document.getElementById('board-wrapper');
    BW = wrap.clientWidth;
    BH = wrap.clientHeight;
    canvas.width = BW * window.devicePixelRatio;
    canvas.height = BH * window.devicePixelRatio;
    canvas.style.width = BW + 'px';
    canvas.style.height = BH + 'px';
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

    pegs = [];
    const spacingX = BW / (ROWS + 2);
    const spacingY = BH / (ROWS + 1);

    for (let r = 0; r < ROWS; r++) {
        const count = r + 3;
        const rowW = (count - 1) * spacingX;
        const startX = (BW - rowW) / 2;
        for (let c = 0; c < count; c++) {
            pegs.push({ x: startX + c * spacingX, y: 50 + r * spacingY, glow: 0 });
        }
    }

    const sRow = document.getElementById('slot-row');
    sRow.innerHTML = '';
    slotW = BW / MULTS.length;
    MULTS.forEach((m, i) => {
        const div = document.createElement('div');
        div.id = 'slot-' + i;
        div.className = `slot ${m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low'}`;
        div.textContent = m + 'x';
        sRow.appendChild(div);
    });
}

async function spawnBall() {
    const bet = BETS[betIdx];
    if (UserSession.saldo < bet) {
        showModal("Saldo tidak mencukupi!");
        stopAuto();
        return;
    }

    // Panggil API dulu untuk mendapatkan hasil (Agar tidak bisa dicurangin)
    const playData = await GameEngine.processPlay(bet);
    if (!playData) return;

    const ball = {
        x: BW / 2 + (Math.random() - 0.5) * 10,
        y: 10,
        vx: (Math.random() - 0.5) * 2,
        vy: 0,
        bet: bet,
        targetSlot: null,
        targetMult: playData.multiplier,
        isDone: false
    };

    // Cari index slot yang sesuai dengan multiplier dari server
    const possibleSlots = [];
    MULTS.forEach((m, i) => { if(m === ball.targetMult) possibleSlots.push(i); });
    ball.targetSlot = possibleSlots[Math.floor(Math.random() * possibleSlots.length)];
    ball.targetX = (ball.targetSlot + 0.5) * slotW;

    balls.push(ball);
}

function update() {
    const gravity = speedMode === 'turbo' ? 0.45 : 0.25;
    const friction = 0.99;

    balls.forEach(b => {
        if (b.isDone) return;

        b.vy += gravity;
        b.vx *= friction;
        b.x += b.vx;
        b.y += b.vy;

        // Fisika Tabrakan Paku
        pegs.forEach(p => {
            const dx = b.x - p.x;
            const dy = b.y - p.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < BALL_R + PEG_R) {
                const angle = Math.atan2(dy, dx);
                const force = speedMode === 'turbo' ? 3 : 1.5;
                b.vx = Math.cos(angle) * force + (Math.random() - 0.5);
                b.vy = Math.abs(Math.sin(angle) * force);
                p.glow = 1.0;
            }
        });

        // Magnetisme ke target server agar hasil 100% akurat
        if (b.y > BH * 0.5) {
            const pull = (b.targetX - b.x) * 0.05;
            b.vx += pull;
        }

        // Pantulan Dinding
        if (b.x < BALL_R || b.x > BW - BALL_R) b.vx *= -0.6;

        // Cek Landing
        if (b.y > BH - 5) {
            b.isDone = true;
            finishBall(b);
        }
    });
    balls = balls.filter(b => !b.isDone);
}

function finishBall(b) {
    const win = Math.floor(b.bet * b.targetMult);
    GameEngine.updateBalanceAfterWin(win);
    
    const slotEl = document.getElementById('slot-' + b.targetSlot);
    if (slotEl) {
        slotEl.classList.add('active');
        setTimeout(() => slotEl.classList.remove('active'), 300);
    }
}

function draw() {
    ctx.clearRect(0, 0, BW, BH);

    // Draw Pegs
    pegs.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, PEG_R, 0, Math.PI * 2);
        ctx.fillStyle = p.glow > 0 ? `rgba(255,255,255,${p.glow})` : '#333';
        ctx.fill();
        if (p.glow > 0) p.glow -= 0.05;
    });

    // Draw Balls
    balls.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2);
        ctx.fillStyle = varColor('--pink');
        ctx.shadowBlur = 10;
        ctx.shadowColor = varColor('--pink');
        ctx.fill();
        ctx.shadowBlur = 0;
    });

    update();
    requestAnimationFrame(draw);
}

// ── UI HELPERS ──
function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

function changeBet(dir) {
    if (isAuto) return;
    betIdx = (betIdx + dir + BETS.length) % BETS.length;
    document.getElementById('current-bet').textContent = BETS[betIdx].toLocaleString();
}

function setSpeed(s) {
    speedMode = s;
    document.getElementById('m-normal').classList.toggle('active', s === 'normal');
    document.getElementById('m-turbo').classList.toggle('active', s === 'turbo');
}

function handleMainAction() {
    if (isAuto) stopAuto();
    else spawnBall();
}

function toggleAuto() {
    if (isAuto) stopAuto();
    else {
        isAuto = true;
        document.getElementById('m-auto').classList.add('active');
        document.getElementById('m-auto').textContent = "AUTO: ON";
        document.getElementById('main-btn').textContent = "STOP AUTO";
        document.getElementById('main-btn').classList.add('stop-mode');
        spawnBall();
        autoInterval = setInterval(spawnBall, speedMode === 'turbo' ? 300 : 800);
    }
}

function stopAuto() {
    isAuto = false;
    clearInterval(autoInterval);
    document.getElementById('m-auto').classList.remove('active');
    document.getElementById('m-auto').textContent = "AUTO: OFF";
    document.getElementById('main-btn').textContent = "PLAY BALL";
    document.getElementById('main-btn').classList.remove('stop-mode');
}

function showModal(msg) {
    document.getElementById('modal-msg').textContent = msg;
    document.getElementById('modal-overlay').style.display = 'block';
    document.getElementById('neon-modal').style.display = 'block';
}

function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('neon-modal').style.display = 'none';
}

window.onload = () => {
    setupBoard();
    draw();
    syncSaldoUI(UserSession.saldo);
};
</script>
</body>
</html>
