<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="config.js"></script>
<style>
:root{--pk:#ff0077;--bl:#0033ff;--yl:#fbff00;--bg:#02000e;
  --gp:0 0 10px #ff0077,0 0 28px rgba(255,0,119,.35);
  --gb:0 0 10px #0033ff,0 0 28px rgba(0,51,255,.35);
  --gy:0 0 10px #fbff00,0 0 28px rgba(251,255,0,.35);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:74px}
#ptjs{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 150% 80% at 50% 0%,#090030 0%,#04000f 50%,#010009 100%)}
#na{position:fixed;top:-110px;left:50%;transform:translateX(-50%);width:90%;max-width:340px;
  background:rgba(3,0,24,.98);border:1.5px solid var(--pk);border-top:2.5px solid var(--yl);
  color:#fff;padding:12px 18px;border-radius:16px;text-align:center;font-weight:900;font-size:13px;
  z-index:9200;letter-spacing:.4px;transition:.5s cubic-bezier(.175,.885,.32,1.275);
  box-shadow:var(--gp),0 0 55px rgba(255,0,119,.15)}
#na.show{top:88px}#na.ok{border-color:var(--yl);box-shadow:var(--gy),0 0 55px rgba(251,255,0,.12)}
#na.warn{border-color:var(--bl);box-shadow:var(--gb)}
.hdr{height:76px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:rgba(3,0,22,.99);border-bottom:1.5px solid rgba(0,51,255,.5);
  position:sticky;top:0;z-index:300;backdrop-filter:blur(24px);box-shadow:0 2px 22px rgba(0,51,255,.22)}
.logo{font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:900;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  line-height:1.2;letter-spacing:1px;flex-shrink:0}
.logo span:nth-child(1){color:var(--pk);text-shadow:var(--gp)}
.logo span:nth-child(2){color:var(--bl);text-shadow:var(--gb)}
.logo span:nth-child(3){color:var(--yl);text-shadow:var(--gy)}
.hdr-saldo{position:absolute;left:50%;transform:translateX(-50%);background:rgba(3,0,22,.85);
  border:1.5px solid var(--bl);border-top:2px solid var(--pk);border-bottom:2px solid var(--yl);
  border-radius:12px;padding:6px 16px;text-align:center;min-width:130px;
  box-shadow:0 0 15px rgba(0,51,255,.25),inset 0 0 10px rgba(255,0,119,.15)}
.hdr-sal-lbl{font-size:8px;color:rgba(255,255,255,.45);letter-spacing:1.5px;text-transform:uppercase;
  font-weight:900;display:block;line-height:1;margin-bottom:3px}
.hdr-sal-val{font-size:16px;font-weight:900;color:var(--yl);text-shadow:var(--gy);
  letter-spacing:.5px;display:block;line-height:1.1}
.hist-btn{flex-shrink:0;width:38px;height:38px;border-radius:10px;background:rgba(0,51,255,.15);
  border:1.5px solid rgba(0,51,255,.4);color:rgba(0,153,255,.9);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.2s;position:relative}
.hist-btn:active{background:rgba(0,51,255,.35);box-shadow:var(--gb)}
#hist-badge{position:absolute;top:-4px;right:-4px;background:var(--pk);color:#fff;font-size:8px;
  font-weight:900;line-height:1;padding:2px 4px;border-radius:50px;display:none;box-shadow:var(--gp)}
#hist-drawer{display:none;position:fixed;top:76px;right:10px;width:min(340px,calc(100vw - 20px));
  background:rgba(3,0,22,.98);border:1.5px solid rgba(0,51,255,.5);border-top:2px solid var(--pk);
  border-radius:0 0 16px 16px;z-index:800;box-shadow:0 8px 30px rgba(0,51,255,.3),0 0 60px rgba(255,0,119,.1);
  animation:drawerIn .25s ease;overflow:hidden}
#hist-drawer.open{display:block}
@keyframes drawerIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.hd-header{padding:10px 14px 6px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,0,119,.2)}
.hd-title{font-size:11px;font-weight:900;color:var(--pk);text-shadow:var(--gp);text-transform:uppercase;letter-spacing:1px}
.hd-close{background:none;border:none;color:rgba(255,255,255,.45);font-size:16px;cursor:pointer;padding:2px 6px}
.hd-scroll{max-height:240px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--pk) rgba(0,0,0,.5)}
.hd-scroll::-webkit-scrollbar{width:3px}
.hd-scroll::-webkit-scrollbar-track{background:rgba(0,0,0,.5)}
.hd-scroll::-webkit-scrollbar-thumb{background:var(--pk);border-radius:2px}
table.ht{width:100%;border-collapse:collapse}
table.ht th{padding:7px 12px;font-size:8px;font-weight:900;color:var(--pk);text-transform:uppercase;
  letter-spacing:1px;border-bottom:1px solid rgba(255,0,119,.18);background:rgba(3,0,16,.95);
  text-align:left;position:sticky;top:0;z-index:5}
table.ht td{padding:8px 12px;font-size:11px;font-weight:700;border-bottom:1px solid rgba(0,51,255,.08)}
table.ht tr:last-child td{border-bottom:none}
.rw td{color:var(--yl);text-shadow:0 0 6px rgba(251,255,0,.3)}
.rl td{color:rgba(255,0,119,.7)}
.re td{text-align:center;padding:18px!important;opacity:.3;font-size:12px}
.wrap{position:relative;z-index:10;padding:4px 6px 2px;max-width:480px;margin:0 auto}
.cbox{width:100%;border-radius:18px;overflow:hidden;border:1.5px solid rgba(0,51,255,.42);
  box-shadow:0 0 40px rgba(0,40,255,.18),0 0 80px rgba(0,20,255,.08),inset 0 0 55px rgba(0,0,50,.98);
  background:#010012;margin-bottom:0}
#cv{display:block;width:100%;height:auto}
.score-bar{display:flex;align-items:center;background:rgba(3,0,18,.88);
  border:1.5px solid rgba(0,51,255,.25);border-top:none;border-radius:0 0 14px 14px;
  margin-bottom:6px;overflow:hidden;padding:4px 0}
.sb-item{flex:1;text-align:center;padding:3px 8px}
.sb-item+.sb-item{border-left:1px solid rgba(0,51,255,.15)}
.sb-lbl{font-size:7px;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:.8px;font-weight:900;display:block;margin-bottom:1px}
.sb-val{font-size:12px;font-weight:900;display:block;line-height:1.1}
.sb-val.yl{color:var(--yl);text-shadow:var(--gy)}.sb-val.pk{color:var(--pk);text-shadow:var(--gp)}
.sb-val.bl{color:rgba(80,140,255,1);text-shadow:var(--gb)}.sb-val.gr{color:rgba(80,255,140,1);text-shadow:0 0 8px rgba(80,255,140,.45)}
.ctrl{background:rgba(3,0,18,.8);border:1.5px solid rgba(0,51,255,.22);border-radius:12px;
  padding:8px;margin-bottom:4px;box-shadow:inset 0 0 24px rgba(0,0,50,.55)}
.mode-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px}
.mb{padding:5px 2px;border-radius:8px;border:1.5px solid rgba(0,51,255,.28);background:rgba(0,0,40,.85);
  color:rgba(255,255,255,.35);font-weight:900;font-size:9px;cursor:pointer;transition:.22s;
  text-align:center;font-family:'Outfit',sans-serif;text-transform:uppercase;letter-spacing:.5px;line-height:1.2}
.mb i{display:block;font-size:12px;margin-bottom:2px;opacity:.55}
.mb.on-normal{border-color:var(--pk);color:var(--pk);background:rgba(255,0,119,.12);
  box-shadow:0 0 12px rgba(255,0,119,.2),inset 0 0 10px rgba(255,0,119,.06)}.mb.on-normal i{opacity:1}
.mb.on-auto{border-color:var(--bl);color:rgba(100,160,255,1);background:rgba(0,51,255,.14);
  box-shadow:0 0 12px rgba(0,51,255,.28),inset 0 0 10px rgba(0,51,255,.08)}.mb.on-auto i{opacity:1}
.mb.on-turbo{border-color:var(--yl);color:var(--yl);background:rgba(251,255,0,.1);
  box-shadow:0 0 12px rgba(251,255,0,.22),inset 0 0 10px rgba(251,255,0,.05)}.mb.on-turbo i{opacity:1}
.brow{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.bstep{width:38px;height:38px;border-radius:8px;flex-shrink:0;border:1.5px solid rgba(255,0,119,.4);
  background:rgba(255,0,119,.1);color:var(--pk);font-size:20px;font-weight:900;cursor:pointer;
  transition:.18s;display:flex;align-items:center;justify-content:center;box-shadow:0 0 8px rgba(255,0,119,.1)}
.bstep:active{background:rgba(255,0,119,.28);box-shadow:var(--gp)}
.bstep:disabled{opacity:.22;cursor:not-allowed;background:rgba(0,0,0,.3)}
.bet-disp{flex:1;background:rgba(0,0,0,.65);border:1.5px solid rgba(251,255,0,.32);border-radius:8px;
  color:var(--yl);font-size:16px;font-weight:900;padding:4px 8px;text-align:center;
  font-family:'Outfit',sans-serif;text-shadow:var(--gy);cursor:default;user-select:none;
  min-height:36px;display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 0 14px rgba(251,255,0,.05)}
.dbtn{width:100%;padding:12px;border-radius:40px;border:none;
  background:linear-gradient(90deg,#aa0033,var(--pk),var(--bl),#0055ee,var(--pk),#aa0033);
  background-size:300%;color:#fff;font-weight:900;font-size:13px;cursor:pointer;
  box-shadow:0 0 18px rgba(255,0,119,.42),0 0 40px rgba(0,51,255,.2);
  letter-spacing:2px;text-transform:uppercase;font-family:'Outfit',sans-serif;
  animation:btnfl 3.5s linear infinite;transition:.2s}
@keyframes btnfl{0%{background-position:0%}100%{background-position:300%}}
.dbtn:active{transform:scale(.97)}.dbtn:disabled{opacity:.3;cursor:not-allowed;animation:none;filter:grayscale(1)}
.dbtn.stopping{background:linear-gradient(90deg,#550011,var(--pk),#550011);background-size:200%;
  animation:btnfl2 1.5s linear infinite;box-shadow:0 0 18px rgba(255,0,119,.55)}
@keyframes btnfl2{0%{background-position:0%}100%{background-position:200%}}
#mdo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;
  align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.mdb{width:88%;max-width:320px;background:rgba(3,0,22,.99);border:1.5px solid var(--pk);
  border-top:2.5px solid var(--yl);border-radius:20px;padding:24px;text-align:center;
  box-shadow:var(--gp);animation:zin .3s ease}
@keyframes zin{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.mdb h3{font-size:15px;font-weight:900;color:var(--pk);text-shadow:var(--gp);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.mdb p{font-size:13px;color:rgba(255,255,255,.7);line-height:1.6}
.mbtn{width:100%;padding:13px;border-radius:50px;border:none;background:linear-gradient(90deg,var(--bl),var(--pk));
  color:#fff;font-weight:900;font-size:13px;cursor:pointer;margin-top:16px;
  font-family:'Outfit',sans-serif;text-transform:uppercase;letter-spacing:1px;box-shadow:0 0 14px rgba(255,0,119,.3)}
.nav{position:fixed;bottom:0;left:0;width:100%;height:68px;background:rgba(3,0,20,.99);
  display:flex;justify-content:space-around;align-items:center;
  border-top:1.5px solid rgba(0,51,255,.45);backdrop-filter:blur(20px);
  z-index:1000;padding-bottom:4px;box-shadow:0 -3px 20px rgba(0,51,255,.18)}
.ni{color:rgba(255,255,255,.28);text-decoration:none;text-align:center;font-size:9px;font-weight:900;
  flex:1;transition:.3s;letter-spacing:.5px;text-transform:uppercase}
.ni.ac{color:var(--pk);text-shadow:var(--gp)}.ni i{font-size:18px;display:block;margin-bottom:3px}
</style>
</head>
<body>
<div id="ptjs"></div>
<div id="na">—</div>
<audio id="au-drop" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c36394595e.mp3" preload="auto"></audio>
<audio id="au-win"  src="https://cdn.pixabay.com/audio/2021/08/04/audio_062564a02d.mp3" preload="auto"></audio>
<audio id="au-lose" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b417f73c.mp3" preload="auto"></audio>
<div class="hdr">
  <div class="logo"><span>NEON</span><span>PLINKO</span><span>VIP</span></div>
  <div class="hdr-saldo">
    <span class="hdr-sal-lbl">SALDO AKTIF</span>
    <span class="hdr-sal-val" id="hdr-sal">IDR 0</span>
  </div>
  <button class="hist-btn" id="hist-icon-btn" onclick="toggleHistDrawer()" title="Riwayat Permainan">
    <i class="fas fa-clock-rotate-left"></i><span id="hist-badge">●</span>
  </button>
</div>
<div id="hist-drawer">
  <div class="hd-header">
    <span class="hd-title"><i class="fas fa-clock-rotate-left" style="margin-right:6px"></i>Riwayat Permainan</span>
    <button class="hd-close" onclick="toggleHistDrawer()"><i class="fas fa-xmark"></i></button>
  </div>
  <div class="hd-scroll">
    <table class="ht">
      <thead><tr><th>BET</th><th>MULT</th><th>HASIL</th><th>JAM</th></tr></thead>
      <tbody id="hb"><tr class="re"><td colspan="4">Belum ada permainan</td></tr></tbody>
    </table>
  </div>
</div>
<div class="wrap">
  <div class="cbox"><canvas id="cv"></canvas></div>
  <div class="score-bar">
    <div class="sb-item">
      <span class="sb-lbl"><i class="fas fa-trophy" style="margin-right:3px"></i>LAST WIN</span>
      <span class="sb-val yl" id="sb-win">—</span>
    </div>
    <div class="sb-item">
      <span class="sb-lbl"><i class="fas fa-fire" style="margin-right:3px"></i>MODE</span>
      <span class="sb-val pk" id="sb-mode">NORMAL</span>
    </div>
  </div>
  <div class="ctrl">
    <div class="mode-row">
      <button class="mb on-normal" id="mb-normal" onclick="toggleMode('normal')"><i class="fas fa-hand-pointer"></i>NORMAL</button>
      <button class="mb" id="mb-auto" onclick="toggleMode('auto')"><i class="fas fa-play-circle"></i>AUTO</button>
      <button class="mb" id="mb-turbo" onclick="toggleMode('turbo')"><i class="fas fa-bolt"></i>TURBO</button>
    </div>
    <div class="brow">
      <button class="bstep" id="btn-m" onclick="stepBet(-1)">−</button>
      <div class="bet-disp" id="bet-disp">Rp 1.000</div>
      <button class="bstep" id="btn-p" onclick="stepBet(+1)">+</button>
    </div>
    <button class="dbtn" id="db" onclick="handleAction()">
      <i class="fas fa-circle-dot"></i>&nbsp;&nbsp;DROP BALL
    </button>
  </div>
</div>
<div id="mdo">
  <div class="mdb"><h3 id="mt2">INFO</h3><p id="mm"></p>
    <button class="mbtn" onclick="closeMd()">MENGERTI</button>
  </div>
</div>
<div class="nav">
  <a href="game.html"     class="ni ac"><i class="fas fa-gamepad"></i>PLAY</a>
  <a href="deposit.html"  class="ni"><i class="fas fa-wallet"></i>DEPO</a>
  <a href="withdraw.html" class="ni"><i class="fas fa-money-bill-transfer"></i>WD</a>
  <a href="reward.html"   class="ni"><i class="fas fa-gift"></i>REWARD</a>
  <a href="profil.html"   class="ni"><i class="fas fa-user-shield"></i>PROFIL</a>
</div>
<script>
/* ═══════════════════════════════════════════════════════
   STATE GLOBAL
═══════════════════════════════════════════════════════ */
var U=null,PROF={},SAL=0,SPNL=0,HIST=[];
var F_NORMAL=true,F_AUTO=false,F_TURBO=false;
var AUTO_TID=null,HIST_OPEN=false,NEW_RESULT=0;
var INT_AUTO=1400,INT_TURBO=700;
var MAX_BALLS_NORMAL=3,MAX_BALLS_TURBO=5;
var BSTEPS=[400,600,800,1000,1200,1600,1800,2000,4000,6000,8000,
            10000,12000,16000,18000,20000,25000,30000];
var BIDX=3;
var MUL=[16,9,3,2,0.5,0.3,0.3,0.3,0.3,0.5,2,3,9,16];

/* ═══════════════════════════════════════════════════════
   CANVAS & KONSTANTA PHYSICS
   
   Prinsip physics Plinko asli:
   - Gravitasi murni, tidak teredam (FRIC hanya untuk vx)
   - Bounce di peg cukup untuk lanjut jatuh, tidak terlalu tinggi
   - Setiap tumbukan peg selalu menghasilkan komponen vy ke bawah
   - Bola tidak pernah berhenti di tengah udara
═══════════════════════════════════════════════════════ */
var cv=document.getElementById('cv');
var cx=cv.getContext('2d');
var ROWS=12;

/* Physics constants — tuned untuk Plinko natural:
   GR       : gravitasi cukup kuat agar cepat turun
   BOUNCE_X : pantulan horizontal di peg — tidak terlalu tinggi
   BOUNCE_Y : pantulan vertikal di peg — sangat rendah agar tidak mental ke atas
   FRIC_X   : gesekan HANYA untuk vx, bukan vy
   SPEED_CAP: batas kecepatan total */
var GR        = 0.45;
var BOUNCE_X  = 0.35;
var BOUNCE_Y  = 0.20;
var FRIC_X    = 0.985;
var SPEED_CAP = 12.0;
var SUBSTEPS  = 4;

var PR,BR,RG,SLOT_H,SLOT_Y,PAD_TOP;
var PEGS=[],SLOTS_D=[],BALLS=[];
var pegPulse=[];
var RAF=null;

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
function snd(id){var a=document.getElementById('au-'+id);if(a){a.currentTime=0;a.play().catch(function(){});}}
function rp(n){return 'Rp '+(Math.abs(n)||0).toLocaleString('id-ID');}
function curBet(){return BSTEPS[BIDX]||1000;}
function updBetUI(){document.getElementById('bet-disp').textContent=rp(curBet());}
function updSaldo(){var e=document.getElementById('hdr-sal');if(e)e.textContent='IDR '+SAL.toLocaleString('id-ID');}
function setLastWin(v){
  var e=document.getElementById('sb-win');if(!e)return;
  if(v>0){e.textContent='+'+rp(v);e.className='sb-val yl';}
  else if(v<0){e.textContent='-'+rp(Math.abs(v));e.className='sb-val pk';}
  else{e.textContent='—';e.className='sb-val yl';}
}
var _alertLast=0;
function alert2(msg,t){
  var now=Date.now();
  if((F_TURBO||F_AUTO)&&(now-_alertLast)<600)return;
  _alertLast=now;
  var a=document.getElementById('na');
  a.textContent=msg;a.className=t?'show '+t:'show';
  clearTimeout(a._t);a._t=setTimeout(function(){a.className='';},2500);
}
function showMd(t,m){document.getElementById('mt2').textContent=t;document.getElementById('mm').textContent=m;document.getElementById('mdo').style.display='flex';}
function closeMd(){document.getElementById('mdo').style.display='none';}

/* ═══════════════════════════════════════════════════════
   HISTORY DRAWER
═══════════════════════════════════════════════════════ */
function toggleHistDrawer(){
  HIST_OPEN=!HIST_OPEN;
  var d=document.getElementById('hist-drawer');
  if(HIST_OPEN){d.classList.add('open');NEW_RESULT=0;var b=document.getElementById('hist-badge');if(b)b.style.display='none';}
  else d.classList.remove('open');
}
document.addEventListener('click',function(e){
  if(!HIST_OPEN)return;
  var d=document.getElementById('hist-drawer'),btn=document.getElementById('hist-icon-btn');
  if(d&&!d.contains(e.target)&&btn&&!btn.contains(e.target)){HIST_OPEN=false;d.classList.remove('open');}
},true);

/* ═══════════════════════════════════════════════════════
   BET & MODE
═══════════════════════════════════════════════════════ */
function stepBet(d){if(F_AUTO){alert2('Stop AUTO dulu untuk ganti bet','warn');return;}BIDX=Math.max(0,Math.min(BSTEPS.length-1,BIDX+d));updBetUI();}
function updModeLabel(){
  var e=document.getElementById('sb-mode');if(!e)return;
  var parts=[];if(F_NORMAL)parts.push('NORMAL');if(F_AUTO)parts.push('AUTO');if(F_TURBO)parts.push('TURBO');
  e.textContent=parts.length?parts.join('+'):'—';
  if(F_TURBO)e.className='sb-val yl';else if(F_AUTO)e.className='sb-val bl';else e.className='sb-val pk';
}
function toggleMode(m){
  if(m==='normal'){
    if(F_TURBO){F_TURBO=false;paintModeBtn('mb-turbo',false,'on-turbo');}
    F_NORMAL=!F_NORMAL;paintModeBtn('mb-normal',F_NORMAL,'on-normal');updDropBtn();updModeLabel();
  }else if(m==='auto'){
    F_AUTO=!F_AUTO;paintModeBtn('mb-auto',F_AUTO,'on-auto');
    if(F_AUTO){startAutoLoop();}else{stopAutoLoop();if(F_TURBO){F_TURBO=false;paintModeBtn('mb-turbo',false,'on-turbo');F_NORMAL=true;paintModeBtn('mb-normal',true,'on-normal');}}
    updDropBtn();updModeLabel();
  }else if(m==='turbo'){
    if(!F_AUTO&&!F_TURBO){alert2('Aktifkan AUTO terlebih dahulu','warn');return;}
    F_TURBO=!F_TURBO;paintModeBtn('mb-turbo',F_TURBO,'on-turbo');

/* ═══════════════════════════════════════════════════════
   BUILD WORLD
═══════════════════════════════════════════════════════ */
function buildWorld(){
  var W=cv.width,H=cv.height;
  SLOT_H=Math.max(26,H*0.09);SLOT_Y=H-SLOT_H;PAD_TOP=H*0.055;
  var pegAreaH=SLOT_Y-PAD_TOP-H*0.08;
  RG=pegAreaH/(ROWS-1);
  PR=Math.min(Math.max(3.5,W*0.012),RG*0.26);
  BR=Math.min(Math.max(4.5,W*0.015),(RG-2*PR)*0.42);
  PEGS=[];
  for(var r=0;r<ROWS;r++){
    var cols=r+2,span=(cols-1)*RG,x0=(W-span)/2,y=PAD_TOP+r*RG;
    for(var c=0;c<cols;c++)PEGS.push({x:x0+c*RG,y:y});
  }
  pegPulse=new Array(PEGS.length).fill(0);
  var sw=W/MUL.length;SLOTS_D=[];
  for(var i=0;i<MUL.length;i++)SLOTS_D.push({x:i*sw,y:SLOT_Y,w:sw,h:SLOT_H,m:MUL[i],glow:0});
}

  if(m>=2) return{f:'rgba(0,51,255', s:'#0033ff',t:'rgba(180,200,255,1)'};
  if(m>=1) return{f:'rgba(251,255,0',s:'#fbff00',t:'rgba(255,255,180,1)'};
  return        {f:'rgba(140,0,0',   s:'#8b0000',t:'rgba(255,80,80,0.85)'};
}

/* ═══════════════════════════════════════════════════════
   PHYSICS — PLINKO NATURAL (TANPA STUCK)

   Root cause bola tersangkut yang sudah diperbaiki:
   
   1. FRIC sebelumnya berlaku pada VY juga → vy teredam
      → bola melambat vertikal → tersangkut di celah peg.
      FIX: FRIC_X hanya berlaku pada vx, vy murni gravitasi.
   
   2. Setelah tumbukan peg, komponen vy bisa jadi 0 atau negatif
      (ke atas) karena perkalian dengan BOUNCE.
      FIX: Setelah tumbukan, vy SELALU positif (ke bawah)
      dengan nilai minimum = kecepatan turun saat menabrak.
   
   3. Steering terlalu kuat di dekat peg → bola tertahan.
      FIX: Steering hanya saat tidak sedang overlap peg,
      dan besarnya proporsional jarak ke target (bukan Math.sign).
   
   4. Anti-stuck threshold 30 frame terlalu lambat.
      FIX: Dikurangi ke 10 frame (~160ms) dan tendangan lebih kuat.
═══════════════════════════════════════════════════════ */
function physStep(b){
  var W=cv.width;
  var subDt=1.0/SUBSTEPS;
  var hitPeg=false; // flag untuk menonaktifkan steering saat collision frame ini

  for(var s=0;s<SUBSTEPS;s++){
    /* GRAVITASI: hanya berlaku pada vy, tidak teredam */
    b.vy+=GR*subDt;

    /* FRICTION: HANYA pada vx — ini kunci agar vy tidak teredam */
    b.vx*=Math.pow(FRIC_X,subDt);
    /* vy TIDAK dikalikan friction — gravitasi murni */

    /* STEERING MAGNET ke targetSlot
       - Hanya aktif jika tidak sedang frame tumbukan peg
       - Kekuatan proporsional (dx * faktor) bukan Math.sign
         agar gerakan halus, tidak tersentak
       - Progress 0=atas, 1=bawah — makin bawah makin kuat */
    if(!hitPeg && typeof b.targetSlot==='number' && SLOTS_D.length>0){
      var tS=SLOTS_D[b.targetSlot];
      var tX=tS.x+tS.w/2;
      var dxT=tX-b.x;
      var progress=Math.max(0,Math.min(1,(b.y-PAD_TOP)/(SLOT_Y-PAD_TOP)));
      /* pull: 0.0002 di atas, 0.0012 di bawah
         Lebih halus dari versi sebelumnya agar tidak terlalu menarik */
      var pull=0.0002+(progress*0.0010);
      b.vx+=dxT*pull;
      /* Redam sedikit jika bola berjalan berlawanan arah target */
      if((b.vx>0&&dxT<0)||(b.vx<0&&dxT>0)) b.vx*=0.97;
    }

    /* SPEED CAP */
    var sp=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    if(sp>SPEED_CAP){b.vx*=SPEED_CAP/sp;b.vy*=SPEED_CAP/sp;}

    /* MINIMUM VY — bola selalu bergerak ke bawah */
    if(b.vy<0.3) b.vy=0.3;

    /* UPDATE POSISI */
    b.x+=b.vx;b.y+=b.vy;

    /* DINDING */
    if(b.x-BR<2){b.x=BR+2;b.vx=Math.abs(b.vx)*BOUNCE_X;}
    if(b.x+BR>W-2){b.x=W-2-BR;b.vx=-Math.abs(b.vx)*BOUNCE_X;}

    /* TUMBUKAN PEG */
    for(var pi=0;pi<PEGS.length;pi++){
      var p=PEGS[pi],ddx=b.x-p.x,ddy=b.y-p.y;
      var dist=Math.sqrt(ddx*ddx+ddy*ddy);
      var minD=BR+PR+0.5;
      if(dist<minD&&dist>0.001){
        hitPeg=true; // nonaktifkan steering frame ini

        var nx=ddx/dist,ny=ddy/dist;
        /* Dorong bola keluar dari peg — jarak cukup agar tidak overlap lagi */
        var overlap=minD-dist;
        b.x+=nx*(overlap+1.0);
        b.y+=ny*(overlap+1.0);

        /* Clamp ke dinding */
        if(b.x-BR<2)b.x=BR+2;
        if(b.x+BR>W-2)b.x=W-2-BR;

        var dot=b.vx*nx+b.vy*ny;
        if(dot<0){
          /* Refleksi vektor kecepatan */
          b.vx=(b.vx-2*dot*nx)*BOUNCE_X;
          b.vy=(b.vy-2*dot*ny)*BOUNCE_Y;

          /* KUNCI UTAMA ANTI-STUCK:
             Setelah tumbukan, vy HARUS positif (ke bawah).
             Nilai minimum = kecepatan sebelum tumbukan * faktor,
             sehingga bola selalu melanjutkan jatuh. */
          var vyMin=Math.abs(dot)*0.3+0.5;
          if(b.vy<vyMin) b.vy=vyMin;

          /* Random kecil pada vx untuk variasi lintasan natural */
          b.vx+=(Math.random()-0.5)*0.4;

          pegPulse[pi]=1.0;
        }
      }
    }

    /* CEK LANDING */
    if(SLOTS_D.length&&b.y+BR>=SLOT_Y){
      /* SNAP: kunci x dalam batas slot target */
      if(typeof b.targetSlot==='number'&&SLOTS_D[b.targetSlot]){
        var ts=SLOTS_D[b.targetSlot];
        var pad=BR+1;
        if(b.x<ts.x+pad)b.x=ts.x+pad;
        if(b.x>ts.x+ts.w-pad)b.x=ts.x+ts.w-pad;
      }
      return true;
    }
  }

  /* ANTI-STUCK: jika bola tidak turun dalam 10 frame (~160ms) → tendang */
  if(!b._lastY)b._lastY=b.y;
  if(!b._stuckCnt)b._stuckCnt=0;
  if(b.y-b._lastY<0.2){ /* bergerak <0.2px ke bawah per frame = stuck */
    b._stuckCnt++;
    if(b._stuckCnt>=10){
      /* Tendang kuat ke bawah + random horizontal */
      b.vy=Math.max(b.vy,1.5)+Math.random()*0.5;
      b.vx=(Math.random()-0.5)*2.0;
      b._stuckCnt=0;
    }
  }else{
    b._stuckCnt=0;
    b._lastY=b.y;
  }
  return false;
}

/* ═══════════════════════════════════════════════════════
   MAIN LOOP
═══════════════════════════════════════════════════════ */
function mainLoop(){
  for(var pi=0;pi<pegPulse.length;pi++)
    if(pegPulse[pi]>0)pegPulse[pi]=Math.max(0,pegPulse[pi]-.045);
  for(var si=0;si<SLOTS_D.length;si++)
    if(SLOTS_D[si].glow>0)SLOTS_D[si].glow=Math.max(0,SLOTS_D[si].glow-.028);

  if(BALLS.length===0){
    var t=Date.now()/1300;
    for(var pi2=0;pi2<PEGS.length;pi2++){
      var w=Math.sin(t+PEGS[pi2].x*.017+PEGS[pi2].y*.011);
      pegPulse[pi2]=Math.max(pegPulse[pi2],Math.max(0,w*.13));
    }
    for(var si2=0;si2<SLOTS_D.length;si2++)
      SLOTS_D[si2].glow=Math.max(SLOTS_D[si2].glow,Math.max(0,Math.sin(t*.6+si2*.46)*.08));
  }

  var landed=[];
  for(var bi=0;bi<BALLS.length;bi++){
    var hit=physStep(BALLS[bi]);
    BALLS[bi].tr.push({x:BALLS[bi].x,y:BALLS[bi].y});
    if(BALLS[bi].tr.length>14)BALLS[bi].tr.shift();
    if(hit)landed.push(bi);
  }
  redrawFull();
  for(var bi2=0;bi2<BALLS.length;bi2++)drawBall(BALLS[bi2]);

  /* ═══════════════════════════════════════════════════
     LANDING — PAY DARI lockedPay (WINRATE ENGINE)
     
     lockedPay & targetSlot dikunci oleh computePayout()
     saat bola di-spawn. Physics hanya mengarahkan bola
     ke slot yang tepat secara visual (LANDING SNAP).
     Saldo menggunakan lockedPay, bukan posisi fisik.
     
     Ini memastikan:
     WR 80% → slot 9x dikunci → bola diarahkan ke 9x
     → bola mendarat di 9x → pay = bet × 9 ✓
  ═══════════════════════════════════════════════════ */
  for(var li=landed.length-1;li>=0;li--){
    var bidx=landed[li];
    var bl=BALLS[bidx];
    BALLS.splice(bidx,1);

    var bet=bl.bet;
    var lockedSlot=(typeof bl.targetSlot==='number')?bl.targetSlot:0;
    var multiplier=MUL[lockedSlot];
    var pay=(typeof bl.lockedPay==='number')?bl.lockedPay:Math.floor(bet*multiplier);
    var prof=pay-bet;

    /* ══════════════════════════════════════════════════
       MAXWIN HARD CEILING — LANDING ENFORCER v2
       
       Lapis pertahanan terakhir setelah computePayout.
       Basis: saldo aktual pemain TIDAK BOLEH melebihi
       initial_balance_session + maxwin_limit.
       
       Ini menangkap edge case:
       - Bola dikunci SEBELUM maxwin, tapi SPNL sudah
         berubah dari bola lain yang landing lebih dulu
       - Multi-drop di AUTO/TURBO
    ══════════════════════════════════════════════════ */
    var mxL=Number(PROF.maxwin_limit)||0;
    var initBal=Number(PROF.initial_balance_session)||0;

    /* -- Proteksi berbasis SPNL (legacy, tetap dipertahankan) -- */
    if(mxL>0&&(SPNL+prof)>mxL){
      var allowed=mxL-SPNL;
      if(allowed<=0){
        var fs=[5,6,7,8][Math.floor(Math.random()*4)];
        lockedSlot=fs;multiplier=MUL[fs];pay=Math.floor(bet*multiplier);prof=pay-bet;
      }else if(prof>allowed){
        var bst2=5,bstD=Infinity;
        for(var mxi=0;mxi<MUL.length;mxi++){
          var tp=Math.floor(bet*MUL[mxi]),tpProf=tp-bet,td=Math.abs(tpProf-allowed);
          if(tpProf<=allowed&&td<bstD){bstD=td;bst2=mxi;}
        }
        lockedSlot=bst2;multiplier=MUL[bst2];pay=Math.floor(bet*multiplier);prof=pay-bet;
      }
    }

    /* -- HARD CEILING berbasis saldo aktual (NEW: double protection) -- */
    if(mxL>0&&initBal>0){
      var maxAllowedSaldo=initBal+mxL;
      /* SAL sudah dikurangi bet saat spawn, jadi proyeksi = SAL + pay */
      var projectedSaldo=SAL+pay;
      if(projectedSaldo>maxAllowedSaldo){
        /* Hitung pay maksimum yang diizinkan agar tidak melewati ceiling */
        var maxPayAllowed=Math.max(0,maxAllowedSaldo-SAL);
        /* Cari slot yang paynya paling mendekati tapi tidak melebihi */
        var bestSlot=[5,6,7,8][Math.floor(Math.random()*4)];
        var bestPay=Math.floor(bet*MUL[bestSlot]);
        var bestDiff=Infinity;
        for(var ci=0;ci<MUL.length;ci++){
          var cp=Math.floor(bet*MUL[ci]);
          if(cp<=maxPayAllowed){
            var cd=Math.abs(cp-maxPayAllowed);
            if(cd<bestDiff){bestDiff=cd;bestSlot=ci;bestPay=cp;}
          }
        }
        lockedSlot=bestSlot;multiplier=MUL[bestSlot];pay=bestPay;prof=pay-bet;
      }
    }

    SAL+=pay;SPNL+=prof;updSaldo();setLastWin(prof);

    /* Glow dari posisi fisik bola (biasanya sama dengan lockedSlot) */
    var visualSlot=lockedSlot;
    if(SLOTS_D.length>0){
      var landX=bl.x;
      for(var vs=0;vs<SLOTS_D.length;vs++){
        var sd=SLOTS_D[vs];if(landX>=sd.x&&landX<sd.x+sd.w){visualSlot=vs;break;}
      }
      if(landX<SLOTS_D[0].x)visualSlot=0;
      if(landX>=SLOTS_D[SLOTS_D.length-1].x+SLOTS_D[SLOTS_D.length-1].w)visualSlot=SLOTS_D.length-1;
    }
    if(SLOTS_D[visualSlot])SLOTS_D[visualSlot].glow=1.0;

    if(pay>bet)snd('win');else if(pay<bet)snd('lose');else snd('drop');
    addHist(bet,multiplier,pay,prof);

    clearTimeout(mainLoop._dbTid);
    (function(salSnap){
      mainLoop._dbTid=setTimeout(function(){
        try{if(typeof _db!=='undefined'&&U)_db.from('profiles').update({saldo:salSnap,updated_at:new Date().toISOString()}).eq('username',U).then(function(){}).catch(function(){});}catch(e){}
      },F_TURBO?150:60);
    })(SAL);
  }
  RAF=requestAnimationFrame(mainLoop);
}

/* ═══════════════════════════════════════════════════════
   SPAWN BALL
═══════════════════════════════════════════════════════ */
function spawnBall(){
  var bet=curBet();
  if(SAL<bet){
    if(F_AUTO){F_AUTO=false;stopAutoLoop();paintModeBtn('mb-auto',false,'on-auto');updDropBtn();}
    alert2('Saldo tidak cukup!','warn');return;
  }
  if(!SESSION_STARTED&&SESSION_MINUTES>0){SESSION_STARTED=true;startSessionTimer(SESSION_MINUTES);}
  SAL-=bet;updSaldo();snd('drop');

  /* Projected SPNL termasuk bola terbang untuk proteksi maxwin multi-drop */
  var projSPNL=SPNL;
  for(var i=0;i<BALLS.length;i++){
    if(typeof BALLS[i].lockedPay==='number')projSPNL+=(BALLS[i].lockedPay-BALLS[i].bet);
  }

  /* Projected saldo aktual setelah semua bola terbang mendarat */
  /* Ini digunakan oleh computePayout (via SAL) untuk hard ceiling */
  /* SAL sudah dikurangi bet di atas, jadi perlu diperhitungkan */

  var out=computePayout(bet,projSPNL);
  var spX=cv.width/2+(Math.random()-0.5)*RG*0.5;

  BALLS.push({
    x:spX,y:BR+2,
    vx:(Math.random()-0.5)*0.6,
    vy:2.0+Math.random()*0.8,
    tr:[],bet:bet,
    lockedPay:out.pay,
    targetSlot:out.slot,
    isWin:(out.pay>bet),
    _lastY:BR+2,_stuckCnt:0
  });
}

/* ═══════════════════════════════════════════════════════
   COMPUTE PAYOUT — WINRATE ENGINE v2 (MAXWIN HARD LOCK)
   
   WR 1–10%   💀 KURAS    : 80% slot 0.3x
   WR 11–30%  🔴 KETAT    : 58% slot 0.3x
   WR 31–50%  ⚖️ SEIMBANG : naik-turun natural
   WR 51–70%  🟢 KECIL    : sering 2x–3x
   WR 71–89%  🚀 BESAR    : sering 9x, sesekali 16x
   WR 90–100% 💎 JACKPOT  : 20% → 16x, 30% → 9x

   MAXWIN SYSTEM v2:
   - Saldo TIDAK AKAN PERNAH melampaui initial_balance + maxwin_limit
   - Setelah maxwin tercapai, masuk POST-MAXWIN mode:
     * WR turun perlahan seiring waktu sesi habis
     * Penurunan gradual & tidak kentara (camouflaged decline)
     * Makin sedikit sisa waktu → makin besar kekalahan
     * Saldo naik-turun kecil agar terkesan natural
═══════════════════════════════════════════════════════ */

/* Hitung saldo aktual pemain (modal + profit) */
function getActualBalance(){
  return SAL;
}

/* Hitung saldo maksimum yang diizinkan */
function getMaxAllowedBalance(){
  var maxwinLim=Number(PROF.maxwin_limit)||0;
  var initBal=Number(PROF.initial_balance_session)||0;
  if(maxwinLim<=0||initBal<=0) return Infinity;
  return initBal+maxwinLim;
}

/* Cek apakah sudah menyentuh atau melewati maxwin */
function isMaxwinReached(){
  var maxwinLim=Number(PROF.maxwin_limit)||0;
  if(maxwinLim<=0) return false;
  return SPNL>=maxwinLim;
}

/* Hitung effective WR post-maxwin berdasar sisa waktu sesi.
   Semakin habis waktu → WR semakin rendah → saldo perlahan turun.
   Range: dari WR normal perlahan turun ke WR sangat rendah.
   Penurunan dibuat tidak linear agar tidak terasa tiba-tiba. */
function getPostMaxwinWR(){
  var adminWR=Math.max(1,Math.min(100,Number(PROF.winrate)||30));
  if(!SESSION_STARTED||SESSION_MINUTES<=0){
    /* Tidak ada sesi aktif: langsung pakai WR sangat rendah */
    return Math.max(5,adminWR-50);
  }
  var elapsed=(Date.now()-SESSION_START_TIME)/1000;
  var totalSec=SESSION_MINUTES*60;
  var timeRatio=Math.min(1.0,elapsed/totalSec);

  /* Fase decline:
     0–30% sesi habis : WR turun ringan (pemain masih naik-turun kecil)
     30–60% sesi habis: WR turun moderat (mulai terasa kalah)
     60–85% sesi habis: WR turun lebih dalam
     85–100% sesi habis: WR sangat rendah (kekalahan nyata) */
  var declineStrength;
  if(timeRatio<0.30)       declineStrength=0.15;  /* -15% dari adminWR */
  else if(timeRatio<0.60)  declineStrength=0.35;  /* -35% */
  else if(timeRatio<0.85)  declineStrength=0.58;  /* -58% */
  else                     declineStrength=0.80;  /* -80% */

  /* Tambahkan noise kecil agar tidak terasa robot (±3%) */
  var noise=(Math.random()-0.5)*0.06;
  declineStrength=Math.min(0.88,Math.max(0.05,declineStrength+noise));

  var postWR=adminWR*(1.0-declineStrength);

  /* Sesekali beri "kemenangan kecil" palsu agar tidak curiga (15% chance) */
  if(Math.random()<0.15) postWR=Math.min(adminWR,postWR+15);

  return Math.max(4,Math.round(postWR));
}

function computePayout(betAmount,currentSpnl){
  var adminWR=Math.max(1,Math.min(100,Number(PROF.winrate)||30));
  var maxwinLim=Number(PROF.maxwin_limit)||0;
  var initBal=Number(PROF.initial_balance_session)||0;
  var isPanic=PROF.panic_mode===true;

  var jackpotSlots=[0,13],bigSlots=[1,12],mediumSlots=[2,11];
  var smallSlots=[3,10],microSlots=[4,9],tinySlots=[5,6,7,8];

  /* ── HARD CEILING: saldo tidak boleh melebihi initBal + maxwinLim ── */
  /* Hitung proyeksi saldo setelah bet ini berdasarkan pay yang mungkin */
  /* fitsMaxwin sekarang berbasis SALDO AKTUAL bukan hanya SPNL */
  function fitsMaxwin(mult){
    if(maxwinLim<=0) return true;
    if(initBal<=0) return (currentSpnl+(Math.floor(betAmount*mult)-betAmount))<=maxwinLim;
    /* Proyeksikan saldo setelah mendapat pay */
    var projectedSaldo=(SAL-betAmount)+Math.floor(betAmount*mult);
    var maxAllowed=initBal+maxwinLim;
    return projectedSaldo<=maxAllowed;
  }

  /* ── PAKSA KALAH: panic / session expired ── */
  if(isPanic||SESSION_EXPIRED){
    var ls=tinySlots[Math.floor(Math.random()*tinySlots.length)];
    return{slot:ls,pay:Math.floor(betAmount*MUL[ls]),multiplier:MUL[ls]};
  }

  /* ── POST-MAXWIN MODE: sudah menyentuh maxwin → decline bertahap ── */
  var maxwinReached=(maxwinLim>0&&currentSpnl>=maxwinLim);
  /* Cek juga basis saldo aktual untuk double-protection */
  var salMaxReached=(maxwinLim>0&&initBal>0&&SAL>=(initBal+maxwinLim));
  if(maxwinReached||salMaxReached){
    var postWR=getPostMaxwinWR();
    /* Gunakan distribusi sesuai postWR, tapi SEMUA slot harus di bawah ceiling */
    var effectiveWR=postWR;
    var roll2=Math.random()*100,chosenGroupPost;
    if(effectiveWR>=51){
      if(roll2<3)chosenGroupPost=mediumSlots;else if(roll2<18)chosenGroupPost=smallSlots;
      else if(roll2<42)chosenGroupPost=microSlots;else chosenGroupPost=tinySlots;
    }else if(effectiveWR>=31){
      if(roll2<1)chosenGroupPost=mediumSlots;else if(roll2<8)chosenGroupPost=smallSlots;
      else if(roll2<28)chosenGroupPost=microSlots;else chosenGroupPost=tinySlots;
    }else if(effectiveWR>=15){
      if(roll2<3)chosenGroupPost=smallSlots;else if(roll2<18)chosenGroupPost=microSlots;
      else chosenGroupPost=tinySlots;
    }else{
      if(roll2<8)chosenGroupPost=microSlots;else chosenGroupPost=tinySlots;
    }
    var psIdx=chosenGroupPost[Math.floor(Math.random()*chosenGroupPost.length)];
    var psMult=MUL[psIdx],psPay=Math.floor(betAmount*psMult);
    /* Clamp agar tidak melewati ceiling sama sekali */
    var maxAllowedSaldo=(initBal>0)?(initBal+maxwinLim):Infinity;
    if(initBal>0&&(SAL-betAmount+psPay)>maxAllowedSaldo){
      /* Paksa loss slot */
      psIdx=tinySlots[Math.floor(Math.random()*tinySlots.length)];
      psMult=MUL[psIdx];psPay=Math.floor(betAmount*psMult);
    }
    return{slot:psIdx,pay:psPay,multiplier:psMult};
  }

  /* ── SESSION NATURAL: modifikasi WR berdasar progress menuju maxwin ── */
  var effectiveWR=adminWR;
  if(SESSION_STARTED&&SESSION_MINUTES>0&&maxwinLim>0){
    var elapsed=(Date.now()-SESSION_START_TIME)/1000;
    var totalSec=SESSION_MINUTES*60;
    var timeRatio=Math.min(1.0,elapsed/totalSec);
    var salRatio=(initBal>0)?(currentSpnl/maxwinLim):0;
    /* Rem mendekati maxwin agar tidak melonjak sekaligus */
    if(salRatio>=0.90&&timeRatio<0.55)      effectiveWR=Math.max(8,adminWR-55);
    else if(salRatio>=0.75&&timeRatio<0.40) effectiveWR=Math.max(12,adminWR-35);
    else if(salRatio>=0.80&&timeRatio>=0.70)effectiveWR=Math.max(15,adminWR-30);
    else if(salRatio<0.20&&timeRatio>=0.70) effectiveWR=Math.min(93,adminWR+30);
    else if(salRatio<0.40&&timeRatio>=0.85) effectiveWR=Math.min(96,adminWR+40);
    else if(salRatio<0.0)                   effectiveWR=Math.min(90,adminWR+15);
    /* Proteksi tambahan: jika salRatio > 0.95 rem keras */
    if(salRatio>=0.95)                      effectiveWR=Math.max(6,adminWR-65);
  }

  /* ── DISTRIBUSI SLOT ── */
  var roll=Math.random()*100,chosenGroup;
  if(effectiveWR>=90){
    if(roll<20)chosenGroup=jackpotSlots;else if(roll<50)chosenGroup=bigSlots;
    else if(roll<70)chosenGroup=mediumSlots;else if(roll<82)chosenGroup=smallSlots;
    else if(roll<91)chosenGroup=microSlots;else chosenGroup=tinySlots;
  }else if(effectiveWR>=71){
    if(roll<10)chosenGroup=jackpotSlots;else if(roll<32)chosenGroup=bigSlots;
    else if(roll<55)chosenGroup=mediumSlots;else if(roll<72)chosenGroup=smallSlots;
    else if(roll<86)chosenGroup=microSlots;else chosenGroup=tinySlots;
  }else if(effectiveWR>=51){
    if(roll<4)chosenGroup=jackpotSlots;else if(roll<14)chosenGroup=bigSlots;
    else if(roll<36)chosenGroup=mediumSlots;else if(roll<58)chosenGroup=smallSlots;
    else if(roll<76)chosenGroup=microSlots;else chosenGroup=tinySlots;
  }else if(effectiveWR>=31){
    if(roll<2)chosenGroup=jackpotSlots;else if(roll<7)chosenGroup=bigSlots;
    else if(roll<20)chosenGroup=mediumSlots;else if(roll<40)chosenGroup=smallSlots;
    else if(roll<62)chosenGroup=microSlots;else chosenGroup=tinySlots;
  }else if(effectiveWR>=11){
    if(roll<1)chosenGroup=jackpotSlots;else if(roll<4)chosenGroup=bigSlots;
    else if(roll<11)chosenGroup=mediumSlots;else if(roll<22)chosenGroup=smallSlots;
    else if(roll<42)chosenGroup=microSlots;else chosenGroup=tinySlots;
  }else{
    if(roll<0.5)chosenGroup=jackpotSlots;else if(roll<1.5)chosenGroup=bigSlots;
    else if(roll<4)chosenGroup=mediumSlots;else if(roll<8)chosenGroup=smallSlots;
    else if(roll<20)chosenGroup=microSlots;else chosenGroup=tinySlots;
  }

  var slotIdx=chosenGroup[Math.floor(Math.random()*chosenGroup.length)];
  var multiplier=MUL[slotIdx],rawPay=Math.floor(betAmount*multiplier);

  /* ── MAXWIN FALLBACK: cari slot yang tidak melewati ceiling ── */
  if(maxwinLim>0&&!fitsMaxwin(multiplier)){
    var fbG=[tinySlots,microSlots,smallSlots,mediumSlots],found=false;
    for(var fg=0;fg<fbG.length;fg++){
      var fgr=fbG[fg].slice().sort(function(){return Math.random()-0.5;});
      for(var fi=0;fi<fgr.length;fi++){
        if(fitsMaxwin(MUL[fgr[fi]])){slotIdx=fgr[fi];multiplier=MUL[slotIdx];rawPay=Math.floor(betAmount*multiplier);found=true;break;}
      }
      if(found)break;
    }
    if(!found){slotIdx=tinySlots[Math.floor(Math.random()*tinySlots.length)];multiplier=MUL[slotIdx];rawPay=Math.floor(betAmount*multiplier);}
  }
  return{slot:slotIdx,pay:rawPay,multiplier:multiplier};
}

/* ═══════════════════════════════════════════════════════
   HISTORY
═══════════════════════════════════════════════════════ */
function addHist(bet,mult,pay,prof){
  var now=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  HIST.unshift({bet:bet,mult:mult,pay:pay,prof:prof,now:now});
  if(HIST.length>50)HIST=HIST.slice(0,50);
  renderHist();
  if(!HIST_OPEN){NEW_RESULT++;var b=document.getElementById('hist-badge');if(b){b.style.display='block';b.textContent=NEW_RESULT>9?'9+':NEW_RESULT;}}
}
function renderHist(){
  var b=document.getElementById('hb');
  if(!HIST.length){b.innerHTML='<tr class="re"><td colspan="4">Belum ada permainan</td></tr>';return;}
  var h='';
  HIST.forEach(function(r){
    var cls=(r.prof>=0)?'rw':'rl',col=(r.prof>=0)?'var(--yl)':'var(--pk)';
    var ml=(r.mult%1===0)?r.mult+'x':r.mult.toFixed(1)+'x';
    h+='<tr class="'+cls+'"><td>'+rp(r.bet)+'</td><td style="font-weight:900">'+ml+'</td>'
      +'<td style="color:'+col+';font-weight:900">'+rp(r.pay)+'</td>'
      +'<td style="font-size:9px;opacity:.4">'+r.now+'</td></tr>';
  });
  b.innerHTML=h;
}

/* ═══════════════════════════════════════════════════════
   SESSION TIMER
═══════════════════════════════════════════════════════ */
var SESSION_TID=null,SESSION_EXPIRED=false,SESSION_STARTED=false;
var SESSION_MINUTES=0,SESSION_START_TIME=0;
function startSessionTimer(minutes){
  if(SESSION_TID)clearTimeout(SESSION_TID);
  SESSION_EXPIRED=false;SESSION_START_TIME=Date.now();
  if(!minutes||minutes<=0)return;
  SESSION_TID=setTimeout(function(){SESSION_EXPIRED=true;},minutes*60*1000);
}
function stopSessionTimer(){
  if(SESSION_TID)clearTimeout(SESSION_TID);
  SESSION_TID=null;SESSION_EXPIRED=false;SESSION_STARTED=false;SESSION_START_TIME=0;
}

/* ═══════════════════════════════════════════════════════
   LOAD PROFILE & REALTIME SUPABASE
═══════════════════════════════════════════════════════ */
function loadProfile(){
  var user=(typeof getUsername==='function')?getUsername():localStorage.getItem('neon_user');
  if(!user){showMd('LOGIN','Sesi tidak ditemukan.');return;}
  U=user;
  if(typeof _db==='undefined'){alert2('Mode offline','warn');return;}
  _db.from('profiles').select('*').eq('username',U).single()
    .then(function(res){
      if(res.error||!res.data){showMd('ERROR','Gagal memuat profil.');return;}
      PROF=res.data;
      SAL=Number(PROF.saldo)||0;
      var initBal=Number(PROF.initial_balance_session)||0;
      SPNL=(initBal>0)?(SAL-initBal):0;
      updSaldo();updBetUI();
      SESSION_MINUTES=Number(PROF.session_minutes||PROF.session_timer||0);
      SESSION_STARTED=false;SESSION_EXPIRED=false;

      _db.channel('gm-'+U)
        .on('postgres_changes',{event:'UPDATE',schema:'public',table:'profiles',filter:'username=eq.'+U},function(pl){
          if(!pl.new)return;
          var n=pl.new,prevSM=SESSION_MINUTES;
          PROF=Object.assign({},PROF,n);

          /* Update saldo dari DB hanya jika tidak ada bola terbang
             dan ada selisih besar (admin edit dari panel) */
          if('saldo' in n&&BALLS.length===0){
            var dbS=Number(n.saldo)||0;
            if(Math.abs(dbS-SAL)>100)SAL=dbS;
            var ib=Number(PROF.initial_balance_session)||0;
            SPNL=ib>0?(SAL-ib):0;
            updSaldo();
          }

          /* Recalculate semua bola terbang saat admin ubah winrate/maxwin/panic */
          if('winrate' in n||'panic_mode' in n||'maxwin_limit' in n){
            var tempSPNL=SPNL;
            /* Juga reset bola terbang jika maxwin sudah terlampaui */
            var newMxL=Number(n.maxwin_limit)||0;
            var newInitBal=Number(PROF.initial_balance_session)||0;
            for(var bi2=0;bi2<BALLS.length;bi2++){
              var b2=BALLS[bi2];
              var nOut=computePayout(b2.bet,tempSPNL);
              /* Hard ceiling: jika bola ini akan melampaui ceiling, paksa tiny slot */
              if(newMxL>0&&newInitBal>0){
                var projS2=(SAL-b2.bet)+nOut.pay;
                if(projS2>(newInitBal+newMxL)){
                  var ts2=[5,6,7,8][Math.floor(Math.random()*4)];
                  nOut={slot:ts2,pay:Math.floor(b2.bet*MUL[ts2]),multiplier:MUL[ts2]};
                }
              }
              b2.lockedPay=nOut.pay;b2.targetSlot=nOut.slot;b2.isWin=(nOut.pay>b2.bet);
              tempSPNL+=(nOut.pay-b2.bet);
            }
          }

          /* Reset session timer saat admin ubah durasi */
          var newSM=Number(n.session_minutes||n.session_timer||0);
          if(newSM!==prevSM){SESSION_MINUTES=newSM;stopSessionTimer();}

          /* Update baseline SPNL saat sesi direset dari panel */
          if('initial_balance_session' in n){
            var newIB=Number(n.initial_balance_session)||0;
            SPNL=newIB>0?(SAL-newIB):0;
          }
        }).subscribe();
    }).catch(function(e){console.error(e);});
}

function resize(){
  var box=cv.parentElement;
  var W=box&&box.clientWidth>10?box.clientWidth:window.innerWidth-20;
  var H=Math.round(W*1.08);
  if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
}
function init(){
  requestAnimationFrame(function(){
    resize();buildWorld();updBetUI();updSaldo();updModeLabel();
    paintModeBtn('mb-normal',true,'on-normal');
    if(typeof particlesJS!=='undefined')particlesJS('ptjs',{particles:{number:{value:30},color:{value:'#0033ff'},shape:{type:'circle'},opacity:{value:0.2},size:{value:2},move:{enable:true,speed:1}}});
    loadProfile();
    if(RAF)cancelAnimationFrame(RAF);
    RAF=requestAnimationFrame(mainLoop);
  });
  window.addEventListener('resize',function(){resize();buildWorld();});
}
init();
