<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { 
    --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #02030d; 
    --pink-neon: 0 0 10px var(--pink);
    --blue-neon: 0 0 10px var(--blue);
    --header-h: 65px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; }

/* UI Elements */
.header { height: var(--header-h); background: rgba(2, 3, 13, 0.95); border-bottom: 2px solid var(--blue); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; z-index: 100; box-shadow: var(--blue-neon); }
.balance-box { background: rgba(0, 0, 0, 0.8); border: 2px solid var(--blue); border-radius: 20px; padding: 5px 20px; text-align: center; min-width: 160px; }
#display-saldo { font-family: 'Cinzel Decorative', serif; font-size: 18px; color: var(--yellow); text-shadow: 0 0 5px var(--yellow); font-weight: 900; }

#board-wrapper { flex: 1; position: relative; background: radial-gradient(circle at center, #070a24 0%, #02030d 100%); overflow: hidden; }
#plinko-canvas { display: block; width: 100%; height: 100%; }

/* Multiplier Slots */
.multiplier-row { height: 40px; display: flex; width: 100%; padding: 0 5px; gap: 4px; margin-top: -10px; z-index: 10; }
.slot { flex: 1; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; border-radius: 6px; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
.s-high { background: var(--pink); box-shadow: 0 0 10px var(--pink); }
.s-mid { background: var(--yellow); color: #000; }
.s-low { background: var(--blue); }
.slot.active { transform: scale(1.3) translateY(-5px); filter: brightness(1.8); box-shadow: 0 0 25px white; z-index: 20; border: 2px solid #fff; }

/* Controls */
.controls { padding: 15px; background: #050614; border-top: 2px solid var(--blue); display: flex; flex-direction: column; gap: 10px; }
.btn-main { width: 100%; padding: 16px; border-radius: 50px; border: none; font-family: 'Cinzel Decorative'; font-weight: 900; font-size: 18px; color: #fff; cursor: pointer; background: linear-gradient(90deg, var(--blue), var(--pink)); box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }
.nav-bottom { display: flex; gap: 5px; }
.nav-btn { flex: 1; padding: 10px; text-align: center; border-radius: 10px; text-decoration: none; font-size: 10px; border: 1px solid var(--blue); color: #fff; background: rgba(0, 212, 255, 0.1); display: flex; flex-direction: column; align-items: center; }

#modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; }
#neon-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background: #0a0b1e; border: 2px solid var(--pink); border-radius: 20px; padding: 25px; text-align: center; z-index:1001; width: 80%; }
</style>
</head>
<body>

<audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
<audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>

<div id="modal-overlay"></div>
<div id="neon-modal">
    <h3 style="color:var(--pink); font-family:'Cinzel Decorative'; margin-bottom:10px;">SYSTEM ALERT</h3>
    <p id="modal-msg" style="font-size:14px; margin-bottom:20px;"></p>
    <button class="btn-main" onclick="closeModal()">OK</button>
</div>

<div class="header">
    <div onclick="location.href='profil.html'"><i class="fa-solid fa-circle-user fa-2x" style="color:var(--blue)"></i></div>
    <div class="balance-box">
        <div style="font-size:9px; color:var(--blue)">VAULT BALANCE</div>
        <div id="display-saldo">IDR 0</div>
    </div>
    <i class="fa-solid fa-bolt" style="color:var(--yellow)"></i>
</div>

<div id="board-wrapper">
    <canvas id="plinko-canvas"></canvas>
</div>

<div class="multiplier-row" id="slot-row"></div>

<div class="controls">
    <div style="display:flex; gap:10px;">
        <button class="btn-main" id="m-auto" onclick="toggleAuto()" style="font-size:12px; padding:10px;">AUTO PLAY</button>
        <button class="btn-main" onclick="setSpeedMode('turbo')" id="btn-turbo" style="font-size:12px; padding:10px; background:var(--dark-blue); border:1px solid var(--blue);">TURBO</button>
    </div>
    <div style="display:flex; align-items:center; justify-content:space-between; background:rgba(255,255,255,0.05); padding:10px; border-radius:15px;">
        <button onclick="changeBet(-1)" style="background:none; border:none; color:var(--pink); font-size:24px;">-</button>
        <span id="current-bet" style="font-family:'Cinzel Decorative'; font-size:20px; color:var(--yellow)">1,000</span>
        <button onclick="changeBet(1)" style="background:none; border:none; color:var(--pink); font-size:24px;">+</button>
    </div>
    <button class="btn-main" id="main-btn" onclick="spawnBall()">DROP BALL</button>
    <div class="nav-bottom">
        <a href="withdraw.html" class="nav-btn"><i class="fa-solid fa-wallet"></i> WITHDRAW</a>
        <a href="deposit.html" class="nav-btn"><i class="fa-solid fa-plus"></i> DEPOSIT</a>
        <a href="reward.html" class="nav-btn"><i class="fa-solid fa-gift"></i> REWARD</a>
    </div>
</div>

<script src="global.js"></script>
<script>
const ROWS = 10;
const MULTS = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
const BETS = [200, 500, 1000, 2000, 5000, 10000, 25000, 50000];
const BALL_R = 7, PEG_R = 3;

let canvas, ctx, BW, BH, pegs = [], balls = [], slotW;
let speedMode = 'normal', isAuto = false, autoTimer = null, betIdx = 2;
let _saldo = 0;

function init() {
    canvas = document.getElementById('plinko-canvas');
    ctx = canvas.getContext('2d');
    window.addEventListener('resize', resize);
    resize();
    buildSlots();
    
    // Sync Awal
    ProfileAPI.sync().then(data => {
        if(data) { _saldo = data.saldo; _renderS(); }
    });
    loop();
}

function resize() {
    const wrap = document.getElementById('board-wrapper');
    BW = wrap.offsetWidth; BH = wrap.offsetHeight;
    const DPR = window.devicePixelRatio || 1;
    canvas.width = BW * DPR; canvas.height = BH * DPR;
    ctx.scale(DPR, DPR);
    slotW = BW / MULTS.length;
    buildPegs();
}

function buildPegs() {
    pegs = [];
    const spX = (BW * 0.9) / (ROWS + 1);
    const spY = (BH * 0.75) / ROWS;
    for (let r = 0; r < ROWS; r++) {
        const count = r + 2;
        const startX = (BW - (count - 1) * spX) / 2;
        for (let c = 0; c < count; c++) {
            pegs.push({ x: startX + c * spX, y: 50 + r * spY, glow: 0 });
        }
    }
}

function buildSlots() {
    const row = document.getElementById('slot-row');
    row.innerHTML = '';
    MULTS.forEach((m, i) => {
        const s = document.createElement('div');
        s.className = 'slot ' + (m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low');
        s.id = 'slot-' + i; s.innerHTML = m + 'x';
        row.appendChild(s);
    });
}

function loop() {
    ctx.clearRect(0, 0, BW, BH);
    const grav = speedMode === 'turbo' ? 0.8 : 0.4;

    pegs.forEach(p => {
        p.glow *= 0.9;
        ctx.fillStyle = p.glow > 0.1 ? `rgba(0, 212, 255, ${0.2+p.glow})` : 'rgba(255,255,255,0.1)';
        ctx.beginPath(); ctx.arc(p.x, p.y, PEG_R, 0, Math.PI*2); ctx.fill();
    });

    for (let i = balls.length - 1; i >= 0; i--) {
        const b = balls[i];
        b.vy += grav; b.x += b.vx; b.y += b.vy;

        // Magnetis ke arah targetIdx agar visual akurat
        if (b.targetIdx !== undefined && b.y > BH * 0.5) {
            const tx = (b.targetIdx * slotW) + (slotW / 2);
            b.vx += (tx - b.x) * 0.02;
        }

        // Tabrakan Paku
        pegs.forEach(p => {
            const dx = b.x - p.x, dy = b.y - p.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < BALL_R + PEG_R) {
                p.glow = 1; snd('hit');
                b.vy *= -0.4; b.vx += (b.x - p.x) * 0.1;
                b.y = p.y - (BALL_R + PEG_R);
            }
        });

        // Gambar Bola
        ctx.fillStyle = varColor('--pink');
        ctx.shadowBlur = 10; ctx.shadowColor = varColor('--pink');
        ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        if (b.y > BH + 10) { onLand(b); balls.splice(i, 1); }
    }
    requestAnimationFrame(loop);
}

async function spawnBall() {
    const bet = BETS[betIdx];
    if (_saldo < bet) { showModal("Saldo Menipis!"); stopAuto(); return; }

    _saldo -= bet; _renderS();
    const b = { x: BW/2 + (Math.random()-0.5)*10, y: 0, vx: 0, vy: 2, targetIdx: undefined };
    balls.push(b);

    const res = await callApiSilent("game_play", { username: getUsername(), bet: bet });
    if (res && res.result === "SUCCESS") {
        b.serverMult = res.target_multiplier;
        b.serverWin = res.win;
        b.serverNewSaldo = res.newSaldo;
        // Cari index kotak yang sesuai multiplier
        const targets = [];
        MULTS.forEach((m, idx) => { if(Math.abs(m - res.target_multiplier) < 0.1) targets.push(idx); });
        b.targetIdx = targets[Math.floor(Math.random()*targets.length)];
    }
}

function onLand(b) {
    if (b.serverNewSaldo !== undefined) {
        _saldo = b.serverNewSaldo; _renderS();
        const slot = document.getElementById('slot-' + b.targetIdx);
        if (slot) {
            slot.classList.add('active');
            setTimeout(() => slot.classList.remove('active'), 500);
        }
        if (b.serverMult >= 1) snd('win');
    }
}

function _renderS() {
    document.getElementById('display-saldo').innerText = 'IDR ' + Math.floor(_saldo).toLocaleString();
    syncSaldoUI(_saldo);
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
function changeBet(v) { betIdx = Math.max(0, Math.min(BETS.length-1, betIdx + v)); document.getElementById('current-bet').innerText = BETS[betIdx].toLocaleString(); }
function showModal(m) { document.getElementById('modal-msg').innerText = m; document.getElementById('modal-overlay').style.display = 'block'; document.getElementById('neon-modal').style.display = 'block'; }
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; document.getElementById('neon-modal').style.display = 'none'; }
function setSpeedMode(m) { speedMode = m; document.getElementById('btn-turbo').style.borderColor = m === 'turbo' ? 'var(--pink)' : 'var(--blue)'; }
function toggleAuto() { isAuto = !isAuto; if(isAuto) autoTimer = setInterval(spawnBall, 1000); else clearInterval(autoTimer); }
function snd(t) { try { const a = document.getElementById('snd-'+t); a.currentTime=0; a.play(); } catch(e){} }

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
