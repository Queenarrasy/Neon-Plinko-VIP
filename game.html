<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON PLINKO VIP - FIXED PAYOUT</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="config.js"></script>
<style>
:root{
  --pk:#ff0077; --bl:#0033ff; --yl:#fbff00;
  --bg:#02000e;
  --gp:0 0 10px #ff0077,0 0 28px rgba(255,0,119,.35);
  --gb:0 0 10px #0033ff,0 0 28px rgba(0,51,255,.35);
  --gy:0 0 10px #fbff00,0 0 28px rgba(251,255,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;
  min-height:100vh;overflow-x:hidden;padding-bottom:74px}

#ptjs{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 150% 80% at 50% 0%,#090030 0%,#04000f 50%,#010009 100%)}

#na{position:fixed;top:-110px;left:50%;transform:translateX(-50%);
  width:90%;max-width:340px;background:rgba(3,0,24,.98);
  border:1.5px solid var(--pk);border-top:2.5px solid var(--yl);
  color:#fff;padding:12px 18px;border-radius:16px;text-align:center;
  font-weight:900;font-size:13px;z-index:9200;letter-spacing:.4px;
  transition:.5s cubic-bezier(.175,.885,.32,1.275);
  box-shadow:var(--gp),0 0 55px rgba(255,0,119,.15)}
#na.show{top:88px}
#na.ok{border-color:var(--yl);box-shadow:var(--gy),0 0 55px rgba(251,255,0,.12)}
#na.warn{border-color:var(--bl);box-shadow:var(--gb)}

.hdr{
  height:76px;padding:0 14px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:rgba(3,0,22,.99);
  border-bottom:1.5px solid rgba(0,51,255,.5);
  position:sticky;top:0;z-index:300;
  backdrop-filter:blur(24px);
  box-shadow:0 2px 22px rgba(0,51,255,.22)
}
.logo{
  font-family:'Cinzel Decorative',serif;
  font-size:11px;font-weight:900;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  line-height:1.2;letter-spacing:1px;flex-shrink:0;
}
.logo span:nth-child(1){color:var(--pk);text-shadow:var(--gp);}
.logo span:nth-child(2){color:var(--bl);text-shadow:var(--gb);}
.logo span:nth-child(3){color:var(--yl);text-shadow:var(--gy);}

.hdr-saldo{
  position:absolute;left:50%;transform:translateX(-50%);
  background:rgba(3,0,22,.85);
  border:1.5px solid var(--bl);
  border-top:2px solid var(--pk);
  border-bottom:2px solid var(--yl);
  border-radius:12px;
  padding:6px 16px;
  text-align:center;
  min-width:130px;
  box-shadow:0 0 15px rgba(0,51,255,.25),inset 0 0 10px rgba(255,0,119,.15);
}
.hdr-sal-lbl{font-size:8px;color:rgba(255,255,255,.45);letter-spacing:1.5px;
  text-transform:uppercase;font-weight:900;display:block;line-height:1;margin-bottom:3px}
.hdr-sal-val{font-size:16px;font-weight:900;color:var(--yl);
  text-shadow:var(--gy);letter-spacing:.5px;display:block;line-height:1.1}

.hist-btn{
  flex-shrink:0;width:38px;height:38px;border-radius:10px;
  background:rgba(0,51,255,.15);border:1.5px solid rgba(0,51,255,.4);
  color:rgba(0,153,255,.9);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.2s;position:relative
}
.hist-btn:active{background:rgba(0,51,255,.35);box-shadow:var(--gb)}
#hist-badge{
  position:absolute;top:-4px;right:-4px;
  background:var(--pk);color:#fff;
  font-size:8px;font-weight:900;line-height:1;
  padding:2px 4px;border-radius:50px;
  display:none;box-shadow:var(--gp)
}

#hist-drawer{
  display:none;position:fixed;top:76px;right:10px;
  width:min(340px, calc(100vw - 20px));
  background:rgba(3,0,22,.98);
  border:1.5px solid rgba(0,51,255,.5);
  border-top:2px solid var(--pk);
  border-radius:0 0 16px 16px;
  z-index:800;
  box-shadow:0 8px 30px rgba(0,51,255,.3),0 0 60px rgba(255,0,119,.1);
  animation:drawerIn .25s ease;
  overflow:hidden;
}
#hist-drawer.open{display:block}
@keyframes drawerIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.hd-header{
  padding:10px 14px 6px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,0,119,.2);
}
.hd-title{font-size:11px;font-weight:900;color:var(--pk);text-shadow:var(--gp);
  text-transform:uppercase;letter-spacing:1px}
.hd-close{background:none;border:none;color:rgba(255,255,255,.45);
  font-size:16px;cursor:pointer;padding:2px 6px}
.hd-scroll{max-height:240px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--pk) rgba(0,0,0,.5)}
.hd-scroll::-webkit-scrollbar{width:3px}
.hd-scroll::-webkit-scrollbar-track{background:rgba(0,0,0,.5)}
.hd-scroll::-webkit-scrollbar-thumb{background:var(--pk);border-radius:2px}
table.ht{width:100%;border-collapse:collapse}
table.ht th{padding:7px 12px;font-size:8px;font-weight:900;color:var(--pk);
  text-transform:uppercase;letter-spacing:1px;
  border-bottom:1px solid rgba(255,0,119,.18);background:rgba(3,0,16,.95);
  text-align:left;position:sticky;top:0;z-index:5}
table.ht td{padding:8px 12px;font-size:11px;font-weight:700;
  border-bottom:1px solid rgba(0,51,255,.08)}
table.ht tr:last-child td{border-bottom:none}
.rw td{color:var(--yl);text-shadow:0 0 6px rgba(251,255,0,.3)}
.rl td{color:rgba(255,0,119,.7)}
.re td{text-align:center;padding:18px!important;opacity:.3;font-size:12px}

.wrap{position:relative;z-index:10;padding:4px 6px 2px;max-width:480px;margin:0 auto}

.cbox{width:100%;border-radius:18px;overflow:hidden;
  border:1.5px solid rgba(0,51,255,.42);
  box-shadow:0 0 40px rgba(0,40,255,.18),0 0 80px rgba(0,20,255,.08),
             inset 0 0 55px rgba(0,0,50,.98);
  background:#010012;margin-bottom:0}
#cv{display:block;width:100%;height:auto}

.score-bar{
  display:flex;align-items:center;
  background:rgba(3,0,18,.88);
  border:1.5px solid rgba(0,51,255,.25);
  border-top:none;border-radius:0 0 14px 14px;
  margin-bottom:6px;overflow:hidden;padding:4px 0;
}
.sb-item{flex:1;text-align:center;padding:3px 8px}
.sb-item+.sb-item{border-left:1px solid rgba(0,51,255,.15)}
.sb-lbl{font-size:7px;color:rgba(255,255,255,.28);text-transform:uppercase;
  letter-spacing:.8px;font-weight:900;display:block;margin-bottom:1px}
.sb-val{font-size:12px;font-weight:900;display:block;line-height:1.1}
.sb-val.yl{color:var(--yl);text-shadow:var(--gy)}
.sb-val.pk{color:var(--pk);text-shadow:var(--gp)}
.sb-val.bl{color:rgba(80,140,255,1);text-shadow:var(--gb)}
.sb-val.gr{color:rgba(80,255,140,1);text-shadow:0 0 8px rgba(80,255,140,.45)}

.ctrl{
  background:rgba(3,0,18,.8);
  border:1.5px solid rgba(0,51,255,.22);
  border-radius:12px;padding:8px;margin-bottom:4px;
  box-shadow:inset 0 0 24px rgba(0,0,50,.55)
}

.mode-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px}
.mb{
  padding:5px 2px;border-radius:8px;
  border:1.5px solid rgba(0,51,255,.28);
  background:rgba(0,0,40,.85);
  color:rgba(255,255,255,.35);
  font-weight:900;font-size:9px;cursor:pointer;transition:.22s;
  text-align:center;font-family:'Outfit',sans-serif;
  text-transform:uppercase;letter-spacing:.5px;line-height:1.2
}
.mb i{display:block;font-size:12px;margin-bottom:2px;opacity:.55}
.mb.on-normal{border-color:var(--pk);color:var(--pk);background:rgba(255,0,119,.12);
  box-shadow:0 0 12px rgba(255,0,119,.2),inset 0 0 10px rgba(255,0,119,.06)}
.mb.on-normal i{opacity:1}
.mb.on-auto{border-color:var(--bl);color:rgba(100,160,255,1);background:rgba(0,51,255,.14);
  box-shadow:0 0 12px rgba(0,51,255,.28),inset 0 0 10px rgba(0,51,255,.08)}
.mb.on-auto i{opacity:1}
.mb.on-turbo{border-color:var(--yl);color:var(--yl);background:rgba(251,255,0,.1);
  box-shadow:0 0 12px rgba(251,255,0,.22),inset 0 0 10px rgba(251,255,0,.05)}
.mb.on-turbo i{opacity:1}

.brow{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.bstep{
  width:38px;height:38px;border-radius:8px;flex-shrink:0;
  border:1.5px solid rgba(255,0,119,.4);
  background:rgba(255,0,119,.1);
  color:var(--pk);font-size:20px;font-weight:900;
  cursor:pointer;transition:.18s;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 8px rgba(255,0,119,.1)
}
.bstep:active{background:rgba(255,0,119,.28);box-shadow:var(--gp)}
.bstep:disabled{opacity:.22;cursor:not-allowed;background:rgba(0,0,0,.3)}
.bet-disp{
  flex:1;background:rgba(0,0,0,.65);
  border:1.5px solid rgba(251,255,0,.32);border-radius:8px;
  color:var(--yl);font-size:16px;font-weight:900;
  padding:4px 8px;text-align:center;
  font-family:'Outfit',sans-serif;text-shadow:var(--gy);
  cursor:default;user-select:none;min-height:36px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 0 14px rgba(251,255,0,.05)
}

.dbtn{
  width:100%;padding:12px;border-radius:40px;border:none;
  background:linear-gradient(90deg,#aa0033,var(--pk),var(--bl),#0055ee,var(--pk),#aa0033);
  background-size:300%;
  color:#fff;font-weight:900;font-size:13px;cursor:pointer;
  box-shadow:0 0 18px rgba(255,0,119,.42),0 0 40px rgba(0,51,255,.2);
  letter-spacing:2px;text-transform:uppercase;font-family:'Outfit',sans-serif;
  animation:btnfl 3.5s linear infinite;transition:.2s
}
@keyframes btnfl{0%{background-position:0%}100%{background-position:300%}}
.dbtn:active{transform:scale(.97)}
.dbtn:disabled{opacity:.3;cursor:not-allowed;animation:none;filter:grayscale(1)}
.dbtn.stopping{
  background:linear-gradient(90deg,#550011,var(--pk),#550011);
  background-size:200%;animation:btnfl2 1.5s linear infinite;
  box-shadow:0 0 18px rgba(255,0,119,.55)
}
@keyframes btnfl2{0%{background-position:0%}100%{background-position:200%}}

#mdo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);
  z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.mdb{width:88%;max-width:320px;background:rgba(3,0,22,.99);
  border:1.5px solid var(--pk);border-top:2.5px solid var(--yl);
  border-radius:20px;padding:24px;text-align:center;
  box-shadow:var(--gp);animation:zin .3s ease}
@keyframes zin{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.mdb h3{font-size:15px;font-weight:900;color:var(--pk);text-shadow:var(--gp);
  margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.mdb p{font-size:13px;color:rgba(255,255,255,.7);line-height:1.6}
.mbtn{width:100%;padding:13px;border-radius:50px;border:none;
  background:linear-gradient(90deg,var(--bl),var(--pk));
  color:#fff;font-weight:900;font-size:13px;cursor:pointer;
  margin-top:16px;font-family:'Outfit',sans-serif;
  text-transform:uppercase;letter-spacing:1px;
  box-shadow:0 0 14px rgba(255,0,119,.3)}

.nav{position:fixed;bottom:0;left:0;width:100%;height:68px;
  background:rgba(3,0,20,.99);display:flex;justify-content:space-around;
  align-items:center;border-top:1.5px solid rgba(0,51,255,.45);
  backdrop-filter:blur(20px);z-index:1000;padding-bottom:4px;
  box-shadow:0 -3px 20px rgba(0,51,255,.18)}
.ni{color:rgba(255,255,255,.28);text-decoration:none;text-align:center;
  font-size:9px;font-weight:900;flex:1;transition:.3s;
  letter-spacing:.5px;text-transform:uppercase}
.ni.ac{color:var(--pk);text-shadow:var(--gp)}
.ni i{font-size:18px;display:block;margin-bottom:3px}
</style>
</head>
<body>

<div id="ptjs"></div>
<div id="na">—</div>

<audio id="au-drop" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c36394595e.mp3" preload="auto"></audio>
<audio id="au-win"  src="https://cdn.pixabay.com/audio/2021/08/04/audio_062564a02d.mp3" preload="auto"></audio>
<audio id="au-lose" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b417f73c.mp3" preload="auto"></audio>

<div class="hdr">
  <div class="logo">
    <span>NEON</span><span>PLINKO</span><span>VIP</span>
  </div>
  <div class="hdr-saldo">
    <span class="hdr-sal-lbl">SALDO AKTIF</span>
    <span class="hdr-sal-val" id="hdr-sal">IDR 0</span>
  </div>
  <button class="hist-btn" id="hist-icon-btn" onclick="toggleHistDrawer()" title="Riwayat Permainan">
    <i class="fas fa-clock-rotate-left"></i>
    <span id="hist-badge">●</span>
  </button>
</div>

<div id="hist-drawer">
  <div class="hd-header">
    <span class="hd-title"><i class="fas fa-clock-rotate-left" style="margin-right:6px"></i>Riwayat Permainan</span>
    <button class="hd-close" onclick="toggleHistDrawer()"><i class="fas fa-xmark"></i></button>
  </div>
  <div class="hd-scroll">
    <table class="ht">
      <thead><tr><th>BET</th><th>MULT</th><th>HASIL</th><th>JAM</th></tr></thead>
      <tbody id="hb"><tr class="re"><td colspan="4">Belum ada permainan</td></tr></tbody>
    </table>
  </div>
</div>

<div class="wrap">
  <div class="cbox"><canvas id="cv"></canvas></div>
  <div class="score-bar">
    <div class="sb-item">
      <span class="sb-lbl"><i class="fas fa-trophy" style="margin-right:3px"></i>LAST WIN</span>
      <span class="sb-val yl" id="sb-win">—</span>
    </div>
    <div class="sb-item">
      <span class="sb-lbl"><i class="fas fa-fire" style="margin-right:3px"></i>MODE</span>
      <span class="sb-val pk" id="sb-mode">NORMAL</span>
    </div>
  </div>
  <div class="ctrl">
    <div class="mode-row">
      <button class="mb on-normal" id="mb-normal" onclick="toggleMode('normal')">
        <i class="fas fa-hand-pointer"></i>NORMAL
      </button>
      <button class="mb" id="mb-auto" onclick="toggleMode('auto')">
        <i class="fas fa-play-circle"></i>AUTO
      </button>
      <button class="mb" id="mb-turbo" onclick="toggleMode('turbo')">
        <i class="fas fa-bolt"></i>TURBO
      </button>
    </div>
    <div class="brow">
      <button class="bstep" id="btn-m" onclick="stepBet(-1)">−</button>
      <div class="bet-disp" id="bet-disp">Rp 1.000</div>
      <button class="bstep" id="btn-p" onclick="stepBet(+1)">+</button>
    </div>
    <button class="dbtn" id="db" onclick="handleAction()">
      <i class="fas fa-circle-dot"></i>&nbsp;&nbsp;DROP BALL
    </button>
  </div>
</div>

<div id="mdo">
  <div class="mdb">
    <h3 id="mt2">INFO</h3><p id="mm"></p>
    <button class="mbtn" onclick="closeMd()">MENGERTI</button>
  </div>
</div>

<div class="nav">
  <a href="game.html"     class="ni ac"><i class="fas fa-gamepad"></i>PLAY</a>
  <a href="deposit.html"  class="ni"><i class="fas fa-wallet"></i>DEPO</a>
  <a href="withdraw.html" class="ni"><i class="fas fa-money-bill-transfer"></i>WD</a>
  <a href="reward.html"   class="ni"><i class="fas fa-gift"></i>REWARD</a>
  <a href="profil.html"   class="ni"><i class="fas fa-user-shield"></i>PROFIL</a>
</div>

<script>
/* ════════════════════════════════════════════════════════
   STATE GLOBAL
════════════════════════════════════════════════════════ */
var U=null, PROF={}, SAL=0, SPNL=0, HIST=[];
var F_NORMAL=true, F_AUTO=false, F_TURBO=false;
var AUTO_TID=null, HIST_OPEN=false, NEW_RESULT=0;

var INT_AUTO  = 1400;
var INT_TURBO = 700;
var MAX_BALLS_NORMAL = 3;
var MAX_BALLS_TURBO  = 5;

var BSTEPS=[400,600,800,1000,1200,1600,1800,2000,4000,6000,8000,
            10000,12000,16000,18000,20000,25000,30000];
var BIDX=3;

// MUL: [16, 9, 3, 2, 0.5, 0.3, 0.3, 0.3, 0.3, 0.5, 2, 3, 9, 16]
var MUL=[16, 9, 3, 2, 0.5, 0.3, 0.3, 0.3, 0.3, 0.5, 2, 3, 9, 16];

/* ════════════════════════════════════════════════════════
   CANVAS & PHYSICS
════════════════════════════════════════════════════════ */
var cv=document.getElementById('cv');
var cx=cv.getContext('2d');
var ROWS=12;

/* PERBAIKAN POINT 5: Physics lebih cepat & natural
   - GR dinaikkan agar bola jatuh lebih natural (tidak slow-mo)
   - SUBSTEPS dinaikkan untuk akurasi tabrakan lebih baik
   - SPEED_CAP dinaikkan agar bola tidak terlalu lambat */
var GR        = 0.22;   // gravitasi lebih kuat → bola jatuh natural
var BOUNCE    = 0.40;
var FRIC      = 0.994;
var SUBSTEPS  = 4;      // lebih sedikit substep → lebih cepat per frame
var SPEED_CAP = 10.0;   // cap lebih tinggi → bola tidak terlambat

var PR,BR,RG,SLOT_H,SLOT_Y,PAD_TOP;
var PEGS=[],SLOTS_D=[],BALLS=[];
var pegPulse=[];
var RAF=null;

/* ════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════ */
function snd(id){
  var a=document.getElementById('au-'+id);
  if(a){a.currentTime=0;a.play().catch(function(){});}
}
function rp(n){return 'Rp '+(Math.abs(n)||0).toLocaleString('id-ID');}
function curBet(){return BSTEPS[BIDX]||1000;}
function updBetUI(){document.getElementById('bet-disp').textContent=rp(curBet());}
function updSaldo(){ var e=document.getElementById('hdr-sal'); if(e) e.textContent='IDR '+SAL.toLocaleString('id-ID'); }
function setLastWin(v){
  var e=document.getElementById('sb-win');
  if(!e) return;
  if(v>0){e.textContent='+'+rp(v);e.className='sb-val yl';}
  else if(v<0){e.textContent='-'+rp(Math.abs(v));e.className='sb-val pk';}
  else{e.textContent='—';e.className='sb-val yl';}
}

var _alertLast=0;
function alert2(msg,t){
  var now=Date.now();
  if((F_TURBO||F_AUTO)&&(now-_alertLast)<600) return;
  _alertLast=now;
  var a=document.getElementById('na');
  a.textContent=msg;
  a.className=t?'show '+t:'show';
  clearTimeout(a._t);
  a._t=setTimeout(function(){a.className='';},2500);
}
function showMd(t,m){
  document.getElementById('mt2').textContent=t;
  document.getElementById('mm').textContent=m;
  document.getElementById('mdo').style.display='flex';
}
function closeMd(){document.getElementById('mdo').style.display='none';}

/* ════════════════════════════════════════════════════════
   HISTORY DRAWER
════════════════════════════════════════════════════════ */
function toggleHistDrawer(){
  HIST_OPEN=!HIST_OPEN;
  var d=document.getElementById('hist-drawer');
  if(HIST_OPEN){
    d.classList.add('open');
    NEW_RESULT=0;
    var b=document.getElementById('hist-badge');
    if(b) b.style.display='none';
  } else {
    d.classList.remove('open');
  }
}
document.addEventListener('click',function(e){
  if(!HIST_OPEN) return;
  var d=document.getElementById('hist-drawer');
  var btn=document.getElementById('hist-icon-btn');
  if(d&&!d.contains(e.target)&&btn&&!btn.contains(e.target)){
    HIST_OPEN=false;
    d.classList.remove('open');
  }
},true);

/* ════════════════════════════════════════════════════════
   BET STEP
════════════════════════════════════════════════════════ */
function stepBet(d){
  if(F_AUTO){alert2('Stop AUTO dulu untuk ganti bet','warn');return;}
  BIDX=Math.max(0,Math.min(BSTEPS.length-1,BIDX+d));
  updBetUI();
}

/* ════════════════════════════════════════════════════════
   MODE TOGGLE
════════════════════════════════════════════════════════ */
function updModeLabel(){
  var e=document.getElementById('sb-mode');
  if(!e) return;
  var parts=[];
  if(F_NORMAL) parts.push('NORMAL');
  if(F_AUTO)   parts.push('AUTO');
  if(F_TURBO)  parts.push('TURBO');
  e.textContent=parts.length?parts.join('+'):'—';
  if(F_TURBO)       e.className='sb-val yl';
  else if(F_AUTO)   e.className='sb-val bl';
  else              e.className='sb-val pk';
}

function toggleMode(m){
  if(m==='normal'){
    if(F_TURBO){
      F_TURBO=false;
      paintModeBtn('mb-turbo',false,'on-turbo');
    }
    F_NORMAL=!F_NORMAL;
    paintModeBtn('mb-normal',F_NORMAL,'on-normal');
    updDropBtn(); updModeLabel();
  } else if(m==='auto'){
    F_AUTO=!F_AUTO;
    paintModeBtn('mb-auto',F_AUTO,'on-auto');
    if(F_AUTO){
      startAutoLoop();
    } else {
      stopAutoLoop();
      if(F_TURBO){
        F_TURBO=false;
        paintModeBtn('mb-turbo',false,'on-turbo');
        F_NORMAL=true;
        paintModeBtn('mb-normal',true,'on-normal');
      }
    }
    updDropBtn(); updModeLabel();
  } else if(m==='turbo'){
    if(!F_AUTO && !F_TURBO){
      alert2('Aktifkan AUTO terlebih dahulu','warn');
      return;
    }
    F_TURBO=!F_TURBO;
    paintModeBtn('mb-turbo',F_TURBO,'on-turbo');
    if(F_TURBO){
      F_NORMAL=false;
      paintModeBtn('mb-normal',false,'on-normal');
    } else {
      F_NORMAL=true;
      paintModeBtn('mb-normal',true,'on-normal');
    }
    if(F_AUTO){ stopAutoLoop(); startAutoLoop(); }
    updModeLabel();
  }
}

function paintModeBtn(id,active,activeClass){
  var el=document.getElementById(id);
  if(!el) return;
  el.className='mb'+(active?' '+activeClass:'');
}
function updDropBtn(){
  var btn=document.getElementById('db');
  if(F_AUTO){
    btn.className='dbtn stopping';

/* ════════════════════════════════════════════════════════
   AUTO LOOP
════════════════════════════════════════════════════════ */
function startAutoLoop(){
  stopAutoLoop();
  var interval = F_TURBO ? INT_TURBO : INT_AUTO;
  var maxB     = F_TURBO ? MAX_BALLS_TURBO : MAX_BALLS_NORMAL;

  function tick(){
    if(!F_AUTO){ stopAutoLoop(); return; }
    if(SAL < curBet()){
      F_AUTO=false; stopAutoLoop();
      if(F_TURBO){
        F_TURBO=false;
        paintModeBtn('mb-turbo',false,'on-turbo');
        F_NORMAL=true;
        paintModeBtn('mb-normal',true,'on-normal');
      }
      paintModeBtn('mb-auto',false,'on-auto');
      updDropBtn(); updModeLabel();
      alert2('Saldo tidak cukup — AUTO berhenti','warn');
      return;
    }
    if(BALLS.length < maxB) spawnBall();
    AUTO_TID = setTimeout(tick, interval);
  }
  tick();
}
function stopAutoLoop(){ clearTimeout(AUTO_TID); AUTO_TID=null; }

function handleAction(){
  if(!U){showMd('LOGIN','Silakan login untuk bermain.');return;}
  if(F_AUTO){

    if(F_TURBO){
      F_TURBO=false;
      paintModeBtn('mb-turbo',false,'on-turbo');

      paintModeBtn('mb-normal',true,'on-normal');

    updDropBtn(); updModeLabel();

  }

}

/* ════════════════════════════════════════════════════════
   BUILD WORLD
════════════════════════════════════════════════════════ */
function buildWorld(){
  var W=cv.width, H=cv.height;
  SLOT_H  = Math.max(26,H*0.09);
  SLOT_Y  = H-SLOT_H;
  PAD_TOP = H*0.055;
  var pegAreaH=SLOT_Y-PAD_TOP-H*0.08;
  RG=pegAreaH/(ROWS-1);
  PR=Math.min(Math.max(3.5,W*0.012),RG*0.26);
  BR=Math.min(Math.max(4.5,W*0.015),(RG-2*PR)*0.42);
  PEGS=[];
  for(var r=0;r<ROWS;r++){
    var cols=r+2, span=(cols-1)*RG, x0=(W-span)/2, y=PAD_TOP+r*RG;
    for(var c=0;c<cols;c++) PEGS.push({x:x0+c*RG,y:y});
  }
  pegPulse=new Array(PEGS.length).fill(0);
  var sw=W/MUL.length;
  SLOTS_D=[];
  for(var i=0;i<MUL.length;i++)
    SLOTS_D.push({x:i*sw,y:SLOT_Y,w:sw,h:SLOT_H,m:MUL[i],glow:0});
}

function slotPal(m){
  if(m>=9)  return{f:'rgba(255,0,119',  s:'#ff0077',t:'rgba(255,180,220,1)'};
  if(m>=2)  return{f:'rgba(0,51,255',   s:'#0033ff',t:'rgba(180,200,255,1)'};
  if(m>=1)  return{f:'rgba(251,255,0',  s:'#fbff00',t:'rgba(255,255,180,1)'};
  return    {f:'rgba(140,0,0',          s:'#8b0000',t:'rgba(255,80,80,0.85)'};
}

function drawPeg(x,y,gv){
  if(gv>0.04){
    var og=cx.createRadialGradient(x,y,PR*.4,x,y,PR+gv*8);
    og.addColorStop(0,'rgba(0,80,255,0)');
    og.addColorStop(.5,'rgba(0,80,255,'+(gv*.22)+')');
    og.addColorStop(1,'rgba(0,40,255,0)');
    cx.beginPath();cx.arc(x,y,PR+gv*8,0,Math.PI*2);cx.fillStyle=og;cx.fill();
  }
  var g=cx.createRadialGradient(x-PR*.3,y-PR*.32,0,x,y,PR*1.4);
  g.addColorStop(0,'rgba(210,235,255,1)');
  g.addColorStop(.32,'rgba(70,148,255,.95)');
  g.addColorStop(.68,'rgba(14,68,220,.85)');
  g.addColorStop(1,'rgba(0,14,160,.36)');
  cx.beginPath();cx.arc(x,y,PR,0,Math.PI*2);cx.fillStyle=g;
  cx.shadowColor='rgba(40,120,255,'+(0.4+gv*.65)+')';
  cx.shadowBlur=PR*(1.7+gv*3.8);cx.fill();cx.shadowBlur=0;
  cx.beginPath();cx.arc(x-PR*.27,y-PR*.28,PR*.185,0,Math.PI*2);
  cx.fillStyle='rgba(255,255,255,'+(0.46+gv*.38)+')';cx.fill();
}

function redrawFull(){
  var W=cv.width, H=cv.height;
  if(!W||!H) return;
  var bg=cx.createRadialGradient(W*.5,H*.1,0,W*.5,H*.55,H*.95);
  bg.addColorStop(0,'#090035');bg.addColorStop(.36,'#05001c');
  bg.addColorStop(.74,'#020010');bg.addColorStop(1,'#010009');
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);
  [{x:W*.18,y:H*.15,r:W*.42,c:'rgba(0,20,200,.075)'},
   {x:W*.82,y:H*.35,r:W*.36,c:'rgba(200,0,120,.055)'},
   {x:W*.5, y:H*.72,r:W*.46,c:'rgba(0,60,255,.045)'},
   {x:W*.05,y:H*.65,r:W*.28,c:'rgba(255,0,80,.028)'}
  ].forEach(function(n){
    var ng=cx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    ng.addColorStop(0,n.c);ng.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=ng;cx.fillRect(0,0,W,H);
  });
  cx.save();cx.strokeStyle='rgba(0,40,200,.035)';cx.lineWidth=.6;
  var gs=W/16;
  for(var gx=-gs;gx<W+gs;gx+=gs){
    cx.beginPath();cx.moveTo(gx,0);cx.lineTo(gx+gs*.5,H);cx.stroke();
    cx.beginPath();cx.moveTo(gx,0);cx.lineTo(gx-gs*.5,H);cx.stroke();
  }
  cx.restore();
  cx.save();
  var ri=0,idx=0;
  while(idx<PEGS.length){
    var cols2=ri+2;
    for(var ci=0;ci<cols2-1;ci++){
      var pa=PEGS[idx+ci],pb=PEGS[idx+ci+1];
      if(pa&&pb){
        var lg=cx.createLinearGradient(pa.x,pa.y,pb.x,pb.y);
        lg.addColorStop(0,'rgba(0,60,255,.09)');
        lg.addColorStop(.5,'rgba(0,90,255,.15)');
        lg.addColorStop(1,'rgba(0,60,255,.09)');
        cx.strokeStyle=lg;cx.lineWidth=.7;
        cx.beginPath();cx.moveTo(pa.x,pa.y);cx.lineTo(pb.x,pb.y);cx.stroke();
      }
    }
    if(ri<ROWS-1){
      var nxt=idx+cols2;
      cx.strokeStyle='rgba(0,45,200,.06)';cx.lineWidth=.4;
      for(var ci2=0;ci2<cols2;ci2++){
        var pc=PEGS[idx+ci2],pd=PEGS[nxt+ci2],pe=PEGS[nxt+ci2+1];
        if(pc&&pd){cx.beginPath();cx.moveTo(pc.x,pc.y);cx.lineTo(pd.x,pd.y);cx.stroke();}
        if(pc&&pe){cx.beginPath();cx.moveTo(pc.x,pc.y);cx.lineTo(pe.x,pe.y);cx.stroke();}
      }
    }
    idx+=cols2;ri++;
  }
  cx.restore();
  for(var pi=0;pi<PEGS.length;pi++)
    drawPeg(PEGS[pi].x,PEGS[pi].y,pegPulse[pi]||0);
  if(SLOTS_D.length){
    var sx=cx.createLinearGradient(0,SLOT_Y,W,SLOT_Y);
    sx.addColorStop(0,'rgba(255,0,119,0)');
    sx.addColorStop(.15,'rgba(255,0,119,.28)');
    sx.addColorStop(.85,'rgba(0,51,255,.28)');
    sx.addColorStop(1,'rgba(0,51,255,0)');
    cx.strokeStyle=sx;cx.lineWidth=1;
    cx.beginPath();cx.moveTo(0,SLOT_Y);cx.lineTo(W,SLOT_Y);cx.stroke();
  }
  var fsz=Math.max(7,Math.min(10,W*.021));
  cx.font='900 '+fsz+'px Outfit,sans-serif';
  cx.textAlign='center';cx.textBaseline='middle';
  for(var si=0;si<SLOTS_D.length;si++){
    var s=SLOTS_D[si],pal=slotPal(s.m),gl=s.glow||0,al=0.14+gl*.52;
    var sg=cx.createLinearGradient(s.x,s.y,s.x,s.y+s.h);
    sg.addColorStop(0,pal.f+','+(al+.06)+')');
    sg.addColorStop(1,pal.f+','+(al*.38)+')');
    cx.fillStyle=sg;cx.fillRect(s.x+1,s.y,s.w-2,s.h);
    cx.strokeStyle=pal.f+','+(0.24+gl*.76)+')';
    cx.lineWidth=gl>0?1.5:.6;
    cx.strokeRect(s.x+1,s.y,s.w-2,s.h);
    if(gl>0){
      cx.shadowColor=pal.s;cx.shadowBlur=10+gl*26;
      cx.strokeRect(s.x+1,s.y,s.w-2,s.h);cx.shadowBlur=0;
    }
    cx.fillStyle=pal.t;
    cx.shadowColor=gl>0?pal.s:'transparent';
    cx.shadowBlur=gl>0?9:0;
    var mLabel=(s.m%1===0)?s.m+'x':s.m.toFixed(1)+'x';
    cx.fillText(mLabel, s.x+s.w/2, s.y+s.h*.52);
    cx.shadowBlur=0;
  }
}

function drawBall(b){
  for(var ti=0;ti<b.tr.length;ti++){
    var t=b.tr[ti],p=ti/b.tr.length,a=p*p*.55,r2=BR*(.22+p*.48),hue=320+ti*2;
    cx.beginPath();cx.arc(t.x,t.y,r2,0,Math.PI*2);
    cx.fillStyle='hsla('+hue+',100%,65%,'+a+')';
    cx.shadowColor='hsla('+hue+',100%,65%,.42)';
    cx.shadowBlur=r2*2.2;cx.fill();cx.shadowBlur=0;
  }
  var ga=cx.createRadialGradient(b.x,b.y,BR*.45,b.x,b.y,BR*2.8);
  ga.addColorStop(0,'rgba(255,0,119,.28)');
  ga.addColorStop(.5,'rgba(200,0,100,.1)');
  ga.addColorStop(1,'rgba(255,0,119,0)');
  cx.beginPath();cx.arc(b.x,b.y,BR*2.8,0,Math.PI*2);cx.fillStyle=ga;cx.fill();
  var gb=cx.createRadialGradient(b.x-BR*.28,b.y-BR*.3,0,b.x,b.y,BR*1.18);
  gb.addColorStop(0,'rgba(255,200,220,1)');
  gb.addColorStop(.25,'rgba(255,50,140,.98)');
  gb.addColorStop(.58,'rgba(220,0,100,.92)');
  gb.addColorStop(1,'rgba(140,0,60,.62)');
  cx.beginPath();cx.arc(b.x,b.y,BR,0,Math.PI*2);cx.fillStyle=gb;
  cx.shadowColor='rgba(255,0,119,.95)';cx.shadowBlur=BR*3.6;cx.fill();cx.shadowBlur=0;
  cx.beginPath();cx.arc(b.x-BR*.26,b.y-BR*.27,BR*.17,0,Math.PI*2);
  cx.fillStyle='rgba(255,255,255,.82)';cx.fill();
}

/* ════════════════════════════════════════════════════════
   PHYSICS — NATURAL & CEPAT (POINT 5)
   Steering dikurangi agar bola tidak melayang/robot
════════════════════════════════════════════════════════ */
function physStep(b){
  var W=cv.width;
  var subDt = 1 / SUBSTEPS;
  for(var s=0;s<SUBSTEPS;s++){
    b.vy += GR * subDt;
    /* PERBAIKAN POINT 5: Steering sangat halus — hanya mengarahkan
       bola pelan-pelan, bukan memaksa. Bola terlihat natural karena
       gravitasi & bounce mendominasi, steering hanya "nudge" kecil. */
    if(b.targetX !== undefined){
      var distToTarget = b.targetX - b.x;
      // Steering sangat kecil: bola tetap terlihat random & natural
      var steer = distToTarget * 0.00045 * subDt;
      b.vx += steer;
    }
    b.vx *= Math.pow(FRIC, subDt);
    b.vy *= Math.pow(FRIC, subDt);
    var sp=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    if(sp>SPEED_CAP){b.vx*=SPEED_CAP/sp;b.vy*=SPEED_CAP/sp;}
    // Min vertical speed agar tidak stuck
    if(b.vy < 0.15) b.vy = 0.15;
    b.x+=b.vx; b.y+=b.vy;
    if(b.x-BR<2){b.x=BR+2;b.vx=Math.abs(b.vx)*BOUNCE;}
    if(b.x+BR>W-2){b.x=W-2-BR;b.vx=-Math.abs(b.vx)*BOUNCE;}

    for(var pi=0;pi<PEGS.length;pi++){
      var p=PEGS[pi],dx=b.x-p.x,dy=b.y-p.y;
      var dist=Math.sqrt(dx*dx+dy*dy),mn=BR+PR+0.5;
      if(dist<mn&&dist>0.001){
        var nx=dx/dist,ny=dy/dist,sep=mn-dist+1.0;
        b.x+=nx*sep; b.y+=ny*sep;
        if(b.x-BR<2) b.x=BR+2;
        if(b.x+BR>W-2) b.x=W-2-BR;
        var dot=b.vx*nx+b.vy*ny;
        if(dot<0){
          b.vx=(b.vx-2*dot*nx)*BOUNCE;
          b.vy=(b.vy-2*dot*ny)*BOUNCE;
          b.vx+=(Math.random()-0.5)*0.6;
          if(b.vy<0.25) b.vy=0.25+Math.random()*0.3;
          pegPulse[pi]=1.0;
        }
      }
    }
    if(SLOTS_D.length && b.y+BR >= SLOT_Y) return true;
  }
  // Anti-stuck
  if(!b._lastY) b._lastY = b.y;
  if(!b._stuckCnt) b._stuckCnt = 0;
  if(Math.abs(b.y - b._lastY) < 0.5){
    b._stuckCnt++;
    if(b._stuckCnt > 40){
      b.vy += 0.7;
      b.vx += (Math.random()-0.5)*1.0;
      b._stuckCnt = 0;
    }
  } else {
    b._stuckCnt = 0;
    b._lastY = b.y;
  }
  return false;
}

/* ════════════════════════════════════════════════════════
   MAIN RENDER LOOP
   POINT 4: Saldo berubah HANYA saat bola landing di kotak
════════════════════════════════════════════════════════ */
function mainLoop(){
  for(var pi=0;pi<pegPulse.length;pi++)
    if(pegPulse[pi]>0) pegPulse[pi]=Math.max(0,pegPulse[pi]-.045);
  for(var si=0;si<SLOTS_D.length;si++)
    if(SLOTS_D[si].glow>0) SLOTS_D[si].glow=Math.max(0,SLOTS_D[si].glow-.028);

  if(BALLS.length===0){
    var t=Date.now()/1300;
    for(var pi2=0;pi2<PEGS.length;pi2++){
      var w=Math.sin(t+PEGS[pi2].x*.017+PEGS[pi2].y*.011);
      pegPulse[pi2]=Math.max(pegPulse[pi2],Math.max(0,w*.13));
    }
    for(var si2=0;si2<SLOTS_D.length;si2++)
      SLOTS_D[si2].glow=Math.max(SLOTS_D[si2].glow,Math.max(0,Math.sin(t*.6+si2*.46)*.08));
  }

  var landed=[];
  for(var bi=0;bi<BALLS.length;bi++){
    var hit=physStep(BALLS[bi]);
    BALLS[bi].tr.push({x:BALLS[bi].x,y:BALLS[bi].y});
    if(BALLS[bi].tr.length>14) BALLS[bi].tr.shift();
    if(hit) landed.push(bi);
  }
  redrawFull();
  for(var bi2=0;bi2<BALLS.length;bi2++) drawBall(BALLS[bi2]);

  /* ── PROSES LANDING BOLA ───────────────────────────────
     POINT 4: SAL += pay terjadi di sini (saat bola masuk kotak)
     Bukan saat spawn. Saldo hanya berubah 2x per bola:
     1. Saat drop: SAL -= bet (ditampilkan)
     2. Saat landing: SAL += pay (ditampilkan)
  ────────────────────────────────────────────────────── */
  for(var li=landed.length-1;li>=0;li--){
    var bidx=landed[li];
    var bl=BALLS[bidx];
    BALLS.splice(bidx,1);

    var bet        = bl.bet;
    var lockedSlot = (typeof bl.targetSlot === 'number') ? bl.targetSlot : 0;
    var multiplier = MUL[lockedSlot];
    var pay        = (typeof bl.lockedPay === 'number') ? bl.lockedPay : Math.floor(bet * multiplier);
    var prof       = pay - bet;

    // POINT 4: Saldo bertambah HANYA di sini (saat bola masuk kotak)
    SAL  += pay;
    SPNL += prof;
    updSaldo();
    setLastWin(prof);

    if(pay > bet){ snd('win'); } else if(pay < bet){ snd('lose'); } else { snd('drop'); }

    addHist(bet, multiplier, pay, prof);

    if(SLOTS_D[lockedSlot]) SLOTS_D[lockedSlot].glow = 1.0;

    // Simpan ke Supabase (debounce)
    clearTimeout(mainLoop._dbTid);
    (function(salSnap){
      mainLoop._dbTid=setTimeout(function(){
        try{
          if(typeof _db!=='undefined'&&U){
            _db.from('profiles')
               .update({saldo:salSnap, updated_at:new Date().toISOString()})
               .eq('username',U)
               .then(function(){}).catch(function(){});
          }
        }catch(e){}
      }, F_TURBO?300:80);
    })(SAL);
  }

  RAF=requestAnimationFrame(mainLoop);
}

/* ════════════════════════════════════════════════════════
   SPAWN BALL
   POINT 4: Saldo dipotong saat bola di-drop, lalu TIDAK
   berubah lagi hingga bola landing di kotak.
════════════════════════════════════════════════════════ */
function spawnBall(){
  var bet=curBet();
  if(SAL<bet){
    if(F_AUTO){
      F_AUTO=false; stopAutoLoop();
      paintModeBtn('mb-auto',false,'on-auto');
      updDropBtn();
    }
    alert2('Saldo tidak cukup!','warn');
    return;
  }

  // POINT 3: Mulai session timer saat bola pertama di-drop
  if(!SESSION_STARTED && SESSION_MINUTES > 0){
    SESSION_STARTED = true;
    startSessionTimer(SESSION_MINUTES);
  }

  // POINT 4: Potong bet dari saldo — saldo HANYA berubah di sini dan saat landing
  SAL -= bet;
  updSaldo();
  snd('drop');

  var out           = computePayout(bet);
  var lPay          = out.pay;
  var targetSlotIdx = out.slot;

  var targetX = SLOTS_D[targetSlotIdx]
    ? SLOTS_D[targetSlotIdx].x + SLOTS_D[targetSlotIdx].w / 2
    : cv.width / 2;

  var spX = cv.width/2 + (Math.random()-0.5)*PR*1.4;

  BALLS.push({
    x          : spX,
    y          : BR+3,
    vx         : (Math.random()-0.5)*0.35,
    vy         : 1.1 + Math.random()*0.5,  // kecepatan awal lebih besar
    tr         : [],
    bet        : bet,
    lockedPay  : lPay,
    targetSlot : targetSlotIdx,
    targetX    : targetX,
    isWin      : (lPay > bet),
    _lastY     : BR+3,
    _stuckCnt  : 0
  });
}

/* ════════════════════════════════════════════════════════
   COMPUTE PAYOUT — WINRATE ENGINE
   POINT 1 & 2 & 3: Winrate, maxwin, session natural
════════════════════════════════════════════════════════ */
function computePayout(betAmount){
  var adminWR   = Math.max(1, Math.min(100, Number(PROF.winrate) || 30));
  var maxwinLim = Number(PROF.maxwin_limit) || 0;
  var isPanic   = PROF.panic_mode === true;

  // Hitung efektif SPNL termasuk bola melayang
  var pendingProfit = 0;
  for(var bi = 0; bi < BALLS.length; bi++){
    var b = BALLS[bi];
    if(typeof b.lockedPay === 'number'){
      pendingProfit += b.lockedPay - b.bet;
    }
  }
  var effectiveSPNL = SPNL + pendingProfit;

  /* ── POINT 2: MAXWIN LIMIT ──────────────────────────────
     Jika profit sesi sudah >= maxwin_limit,
     paksa kalah (slot 0.3x) hingga saldo tidak naik lagi
  ────────────────────────────────────────────────────── */
  var isMaxwinHit = (maxwinLim > 0) && (effectiveSPNL >= maxwinLim);

  if(isPanic || SESSION_EXPIRED || isMaxwinHit){
    var lossSlots = [5,6,7,8]; // slot 0.3x
    var ls = lossSlots[Math.floor(Math.random() * lossSlots.length)];
    var lossMult = MUL[ls];
    var lossPay  = Math.floor(betAmount * lossMult);
    return { slot: ls, pay: lossPay, multiplier: lossMult };
  }

  /* ── POINT 3: SESSION NATURAL — WINRATE DINAMIS ─────────
     Jika session_minutes aktif, winrate disesuaikan
     berdasarkan waktu tersisa agar saldo naik-turun
     dan mencapai maxwin secara natural di akhir sesi.
  ────────────────────────────────────────────────────── */
  var effectiveWR = adminWR;
  if(SESSION_STARTED && SESSION_MINUTES > 0 && maxwinLim > 0){
    var elapsed  = (Date.now() - SESSION_START_TIME) / 1000; // detik
    var totalSec = SESSION_MINUTES * 60;
    var progress = Math.min(1, elapsed / totalSec); // 0..1
    // progress mendekati 1 → dekati maxwin → kurangi WR
    // Di awal sesi: WR penuh, di akhir sesi: WR dikurangi
    var remaining = maxwinLim - effectiveSPNL;
    if(remaining <= 0){
      // Sudah di maxwin, paksa kalah
      var lss=[5,6,7,8]; var ls2=lss[Math.floor(Math.random()*lss.length)];
      var lm=MUL[ls2]; return{slot:ls2,pay:Math.floor(betAmount*lm),multiplier:lm};
    }
    // Semakin dekat batas waktu DAN saldo mendekati maxwin → kurangi WR agar natural
    var salRatio   = Math.min(1, effectiveSPNL / maxwinLim); // seberapa jauh sudah ke maxwin
    var timeRatio  = progress; // 0..1
    // Natural adjustment: kalau sudah 80% maxwin DAN sudah >70% waktu, kurangi WR
    if(salRatio > 0.85 && timeRatio > 0.7){
      // Mendekati target, paksa kalah/rugi kecil agar naik-turun
      effectiveWR = Math.max(10, adminWR - 50);
    } else if(salRatio > 0.7 && timeRatio > 0.5){
      effectiveWR = Math.max(20, adminWR - 30);
    } else if(salRatio < 0.3 && timeRatio > 0.6){
      // Saldo masih rendah tapi waktu sudah >60% → boost WR sedikit agar naik
      effectiveWR = Math.min(95, adminWR + 20);
    }
  }

  /* ── SLOT GROUPS ───────────────────────────────────────── */
  var jackpotSlots = [0,13];    // 16x
  var bigSlots     = [1,12];    // 9x
  var mediumSlots  = [2,11];    // 3x
  var smallSlots   = [3,10];    // 2x
  var microSlots   = [4,9];     // 0.5x
  var tinySlots    = [5,6,7,8]; // 0.3x

  function fitsCap(mult){
    if(maxwinLim <= 0) return true;
    var projProfit = Math.floor(betAmount * mult) - betAmount;
    return (effectiveSPNL + projProfit) <= maxwinLim;
  }

  /* ── POINT 1: WINRATE → DISTRIBUSI SLOT ────────────────
     WR  1–10%  : MODE KURAS  — hampir selalu slot kecil (0.3x–0.5x)
     WR 11–30%  : KETAT       — dominan kalah kecil, sesekali medium
     WR 31–50%  : SEIMBANG    — naik-turun, tidak ada kemenangan besar
     WR 51–70%  : MENANG KECIL— sering 2x–3x, sesekali 9x
     WR 71–89%  : MENANG BESAR— sering 9x, sesekali 16x
     WR 90–100% : JACKPOT     — sangat sering 9x–16x
  ────────────────────────────────────────────────────── */
  var roll = Math.random() * 100;
  var chosenGroup = null;

  if(effectiveWR >= 90){
    // JACKPOT MODE: sangat sering menang besar
    if(roll < 20)       chosenGroup = jackpotSlots;  // 20% → 16x
    else if(roll < 50)  chosenGroup = bigSlots;      // 30% → 9x
    else if(roll < 70)  chosenGroup = mediumSlots;   // 20% → 3x
    else if(roll < 82)  chosenGroup = smallSlots;    // 12% → 2x
    else if(roll < 91)  chosenGroup = microSlots;    //  9% → 0.5x
    else                chosenGroup = tinySlots;     //  9% → 0.3x
  } else if(effectiveWR >= 71){
    // MENANG BESAR: sering 9x–16x
    if(roll < 10)       chosenGroup = jackpotSlots;  // 10% → 16x
    else if(roll < 32)  chosenGroup = bigSlots;      // 22% → 9x
    else if(roll < 55)  chosenGroup = mediumSlots;   // 23% → 3x
    else if(roll < 72)  chosenGroup = smallSlots;    // 17% → 2x
    else if(roll < 86)  chosenGroup = microSlots;    // 14% → 0.5x
    else                chosenGroup = tinySlots;     // 14% → 0.3x
  } else if(effectiveWR >= 51){
    // MENANG KECIL: sering 2x–3x
    if(roll < 4)        chosenGroup = jackpotSlots;  //  4% → 16x
    else if(roll < 14)  chosenGroup = bigSlots;      // 10% → 9x
    else if(roll < 36)  chosenGroup = mediumSlots;   // 22% → 3x
    else if(roll < 58)  chosenGroup = smallSlots;    // 22% → 2x
    else if(roll < 76)  chosenGroup = microSlots;    // 18% → 0.5x
    else                chosenGroup = tinySlots;     // 24% → 0.3x
  } else if(effectiveWR >= 31){
    // SEIMBANG: naik-turun natural
    if(roll < 2)        chosenGroup = jackpotSlots;  //  2% → 16x
    else if(roll < 7)   chosenGroup = bigSlots;      //  5% → 9x
    else if(roll < 20)  chosenGroup = mediumSlots;   // 13% → 3x
    else if(roll < 40)  chosenGroup = smallSlots;    // 20% → 2x
    else if(roll < 62)  chosenGroup = microSlots;    // 22% → 0.5x
    else                chosenGroup = tinySlots;     // 38% → 0.3x
  } else if(effectiveWR >= 11){
    // KETAT: dominan kalah kecil
    if(roll < 1)        chosenGroup = jackpotSlots;  //  1% → 16x
    else if(roll < 4)   chosenGroup = bigSlots;      //  3% → 9x
    else if(roll < 11)  chosenGroup = mediumSlots;   //  7% → 3x
    else if(roll < 22)  chosenGroup = smallSlots;    // 11% → 2x
    else if(roll < 42)  chosenGroup = microSlots;    // 20% → 0.5x
    else                chosenGroup = tinySlots;     // 58% → 0.3x
  } else {
    // KURAS (WR 1–10%): hampir selalu 0.3x, sesekali 0.5x
    if(roll < 0.5)      chosenGroup = jackpotSlots;  // 0.5% → 16x (sangat jarang)
    else if(roll < 1.5) chosenGroup = bigSlots;      //  1% → 9x
    else if(roll < 4)   chosenGroup = mediumSlots;   // 2.5% → 3x
    else if(roll < 8)   chosenGroup = smallSlots;    //  4% → 2x
    else if(roll < 20)  chosenGroup = microSlots;    // 12% → 0.5x
    else                chosenGroup = tinySlots;     // 80% → 0.3x
  }

  // Pilih slot acak dari group
  var slotIdx    = chosenGroup[Math.floor(Math.random() * chosenGroup.length)];
  var multiplier = MUL[slotIdx];
  var rawPay     = Math.floor(betAmount * multiplier);

  // Jika melebihi maxwin cap, turunkan ke multiplier lebih kecil
  if(!fitsCap(multiplier)){
    var fallbackGroups = [tinySlots, microSlots, smallSlots, mediumSlots];
    var found = false;
    for(var fg=0; fg<fallbackGroups.length; fg++){
      var group = fallbackGroups[fg];
      for(var g=0; g<group.length; g++){
        var trySlot = group[g];
        var tryMult = MUL[trySlot];
        if(fitsCap(tryMult)){
          slotIdx    = trySlot;
          multiplier = tryMult;
          rawPay     = Math.floor(betAmount * multiplier);
          found      = true;
          break;
        }
      }
      if(found) break;
    }
    if(!found){
      var zeroSlot = tinySlots[Math.floor(Math.random() * tinySlots.length)];
      var zeroMult = MUL[zeroSlot];
      return { slot: zeroSlot, pay: Math.floor(betAmount*zeroMult), multiplier: zeroMult };
    }
  }

  return { slot: slotIdx, pay: rawPay, multiplier: multiplier };
}

/* ════════════════════════════════════════════════════════
   HISTORY
════════════════════════════════════════════════════════ */
function addHist(bet, mult, pay, prof){
  var now=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  HIST.unshift({bet:bet, mult:mult, pay:pay, prof:prof, now:now});
  if(HIST.length>50) HIST=HIST.slice(0,50);
  renderHist();
  if(!HIST_OPEN){
    NEW_RESULT++;
    var b=document.getElementById('hist-badge');
    if(b){b.style.display='block';b.textContent=NEW_RESULT>9?'9+':NEW_RESULT;}
  }
}
function renderHist(){
  var b=document.getElementById('hb');
  if(!HIST.length){
    b.innerHTML='<tr class="re"><td colspan="4">Belum ada permainan</td></tr>';
    return;
  }
  var h='';
  HIST.forEach(function(r){
    var cls = (r.prof >= 0) ? 'rw' : 'rl';
    var col = (r.prof >= 0) ? 'var(--yl)' : 'var(--pk)';
    var multLabel = (r.mult % 1 === 0) ? r.mult+'x' : r.mult.toFixed(1)+'x';
    h+='<tr class="'+cls+'">'
      +'<td>'+rp(r.bet)+'</td>'
      +'<td style="font-weight:900">'+multLabel+'</td>'
      +'<td style="color:'+col+';font-weight:900">'+rp(r.pay)+'</td>'
      +'<td style="font-size:9px;opacity:.4">'+r.now+'</td>'
      +'</tr>';
  });
  b.innerHTML=h;
}

/* ════════════════════════════════════════════════════════
   SESSION TIMER — POINT 3
   Timer mulai SAAT BOLA PERTAMA DI-DROP, bukan saat load.
   Sesi expired → winrate turun otomatis (paksa kalah)
════════════════════════════════════════════════════════ */
var SESSION_TID      = null;
var SESSION_EXPIRED  = false;
var SESSION_STARTED  = false;   // flag: sudah mulai belum
var SESSION_MINUTES  = 0;       // durasi dari PROF
var SESSION_START_TIME = 0;     // timestamp saat pertama drop

function startSessionTimer(minutes){
  if(SESSION_TID) clearTimeout(SESSION_TID);
  SESSION_EXPIRED    = false;
  SESSION_START_TIME = Date.now();
  if(!minutes || minutes <= 0) return;
  SESSION_TID = setTimeout(function(){
    SESSION_EXPIRED = true;
  }, minutes * 60 * 1000);
}
function stopSessionTimer(){
  if(SESSION_TID) clearTimeout(SESSION_TID);
  SESSION_TID         = null;
  SESSION_EXPIRED     = false;
  SESSION_STARTED     = false;
  SESSION_START_TIME  = 0;
}

/* ════════════════════════════════════════════════════════
   LOAD PROFILE & REALTIME
════════════════════════════════════════════════════════ */
function loadProfile(){
  var user=(typeof getUsername==='function') ? getUsername() : localStorage.getItem('neon_user');
  if(!user){showMd('LOGIN','Sesi tidak ditemukan.');return;}
  U=user;
  if(typeof _db==='undefined'){alert2('Mode offline','warn');return;}

  _db.from('profiles').select('*').eq('username',U).single()
    .then(function(res){
      if(res.error||!res.data){showMd('ERROR','Gagal memuat profil.');return;}
      PROF = res.data;
      SAL  = Number(PROF.saldo) || 0;
      var initBal = Number(PROF.initial_balance_session) || 0;
      SPNL = (initBal > 0) ? (SAL - initBal) : 0;
      updSaldo(); updBetUI();

      // POINT 3: Simpan durasi sesi, timer TIDAK dimulai di sini
      // Timer hanya mulai saat bola pertama di-drop (spawnBall)
      SESSION_MINUTES = Number(PROF.session_minutes||PROF.session_timer||0);
      SESSION_STARTED = false;
      SESSION_EXPIRED = false;

      _db.channel('gm-'+U)
        .on('postgres_changes',{event:'UPDATE',schema:'public',table:'profiles',filter:'username=eq.'+U},function(pl){
          if(!pl.new) return;
          var n = pl.new;
          var prevSM = SESSION_MINUTES;
          PROF = Object.assign({}, PROF, n);
          if('saldo' in n){
            SAL = Number(n.saldo) || 0;
            var ib = Number(PROF.initial_balance_session) || 0;
            SPNL = ib > 0 ? (SAL - ib) : 0;
            updSaldo();
          }
          // POINT 1: Re-roll bola melayang saat winrate berubah
          if('winrate' in n || 'panic_mode' in n){
            for(var bi=0; bi<BALLS.length; bi++){
              var b2 = BALLS[bi];
              var newOut = computePayout(b2.bet);
              b2.lockedPay  = newOut.pay;
              b2.targetSlot = newOut.slot;
              b2.isWin      = (newOut.pay > b2.bet);
              b2.targetX    = SLOTS_D[newOut.slot]
                ? SLOTS_D[newOut.slot].x + SLOTS_D[newOut.slot].w / 2
                : cv.width / 2;
            }
          }
          // POINT 3: Update session duration jika admin ubah
          var newSM = Number(n.session_minutes||n.session_timer||0);
          if(newSM !== prevSM){
            SESSION_MINUTES = newSM;
            if(!SESSION_STARTED){
              // Belum mulai, update saja durasi
            } else {
              // Sudah mulai, restart timer dengan durasi baru
              stopSessionTimer();
              SESSION_STARTED = false;
              SESSION_EXPIRED = false;
              if(newSM > 0){
                SESSION_STARTED = true;
                startSessionTimer(newSM);
              }
            }
          }
          // Update maxwin limit realtime
          if('maxwin_limit' in n){
            // Re-roll bola melayang agar sesuai limit baru
            for(var bi3=0; bi3<BALLS.length; bi3++){
              var b3 = BALLS[bi3];
              var newOut3 = computePayout(b3.bet);
              b3.lockedPay  = newOut3.pay;
              b3.targetSlot = newOut3.slot;
              b3.isWin      = (newOut3.pay > b3.bet);
              b3.targetX    = SLOTS_D[newOut3.slot]
                ? SLOTS_D[newOut3.slot].x + SLOTS_D[newOut3.slot].w / 2
                : cv.width / 2;
            }
          }
        })
        .subscribe();
    })
    .catch(function(e){console.error(e);});
}

function resize(){
  var box=cv.parentElement;
  var W=box&&box.clientWidth>10?box.clientWidth:window.innerWidth-20;
  var H=Math.round(W*1.08);
  if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
}

function init(){
  requestAnimationFrame(function(){
    resize();buildWorld();
    updBetUI();updSaldo();updModeLabel();
    paintModeBtn('mb-normal',true,'on-normal');
    if(typeof particlesJS!=='undefined') particlesJS('ptjs',{particles:{number:{value:30},color:{value:'#0033ff'},shape:{type:'circle'},opacity:{value:0.2},size:{value:2},move:{enable:true,speed:1}}});
    loadProfile();
    if(RAF) cancelAnimationFrame(RAF);
    RAF=requestAnimationFrame(mainLoop);
  });
  window.addEventListener('resize',function(){resize();buildWorld();});
}
init();
</script>
