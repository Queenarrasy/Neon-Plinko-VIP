<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP — ENGINE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        :root { 
            --pink: #ff0077; --blue: #00d4ff; --yellow: #f5e642; --bg: #02030d;
            --glass: rgba(255, 255, 255, 0.03);
            --neon-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: white; font-family: 'Outfit', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(255, 0, 119, 0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(0, 212, 255, 0.1), transparent);
        }

        /* --- TOP BAR --- */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(5, 6, 20, 0.9);
            border-bottom: 1px solid rgba(0, 212, 255, 0.3); backdrop-filter: blur(10px);
            position: fixed; top: 0; width: 100%; z-index: 100;
        }
        .logo { font-family: 'Cinzel Decorative', serif; font-weight: 900; color: var(--pink); font-size: 18px; text-shadow: 0 0 10px var(--pink); }
        .saldo-container { background: var(--glass); border: 1px solid var(--blue); padding: 5px 15px; border-radius: 50px; display: flex; align-items: center; gap: 8px; box-shadow: var(--neon-shadow); }
        .saldo-label { font-size: 10px; color: var(--blue); text-transform: uppercase; font-weight: 800; }
        #display-saldo { color: #fff; font-weight: 700; font-size: 14px; }

        /* --- GAME AREA --- */
        #game-area { width: 100%; height: calc(100vh - 180px); margin-top: 60px; display: flex; align-items: center; justify-content: center; position: relative; }
        #game-canvas { width: 100%; max-width: 500px; max-height: 100%; filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.1)); }

        /* --- CONTROLS --- */
        .controls {
            position: fixed; bottom: 70px; width: 100%; padding: 15px 20px;
            background: linear-gradient(to top, var(--bg), transparent);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .bet-box { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 15px; display: flex; align-items: center; gap: 15px; }
        .bet-input { background: transparent; border: none; color: var(--yellow); font-size: 18px; font-weight: 800; width: 100px; text-align: center; outline: none; }
        .drop-btn {
            background: linear-gradient(45deg, var(--blue), var(--pink));
            border: none; padding: 15px 50px; color: white; font-weight: 900;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; box-shadow: 0 0 20px rgba(255, 0, 119, 0.4);
            transition: 0.3s; font-family: 'Cinzel Decorative';
        }
        .drop-btn:active { transform: scale(0.95); filter: brightness(1.3); }

        /* --- VIP NAV BAR --- */
        .vip-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(5, 6, 20, 0.95); border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: grid; grid-template-columns: repeat(5, 1fr); align-items: center;
            backdrop-filter: blur(15px); padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: rgba(255,255,255,0.4); text-decoration: none; transition: 0.3s; font-size: 20px; }
        .nav-item.active { color: var(--cyan); text-shadow: 0 0 10px var(--blue); }
        .nav-item span { font-size: 9px; font-weight: 700; margin-top: 5px; text-transform: uppercase; }
        .nav-center { width: 50px; height: 50px; background: var(--pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; margin-top: -30px; border: 4px solid var(--bg); box-shadow: 0 0 15px var(--pink); }

        /* --- NOTIFICATION POPUP --- */
        #win-popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2000; background: rgba(5, 6, 20, 0.98); border: 2px solid var(--yellow);
            padding: 30px; border-radius: 20px; text-align: center; width: 280px;
            box-shadow: 0 0 50px rgba(245, 230, 66, 0.3); animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">NEON PLINKO</div>
    <div class="saldo-container">
        <div class="saldo-label">Wallet</div>
        <div id="display-saldo">IDR 0</div>
    </div>
</div>

<div id="game-area">
    <canvas id="game-canvas"></canvas>
</div>

<div class="controls">
    <div class="bet-box">
        <i class="fa-solid fa-minus" style="color:var(--blue)" onclick="adjustBet(-1000)"></i>
        <input type="number" id="bet-amount" class="bet-input" value="1000" readonly>
        <i class="fa-solid fa-plus" style="color:var(--pink)" onclick="adjustBet(1000)"></i>
    </div>
    <button class="drop-btn" id="btn-drop" onclick="dropBall()">DROP BALL</button>
</div>

<nav class="vip-nav">
    <a href="deposit.html" class="nav-item">
        <i class="fa-solid fa-wallet"></i>
        <span>Deposit</span>
    </a>
    <a href="withdraw.html" class="nav-item">
        <i class="fa-solid fa-money-bill-transfer"></i>
        <span>Withdraw</span>
    </a>
    <a href="game.html" class="nav-item active">
        <div class="nav-center"><i class="fa-solid fa-play"></i></div>
    </a>
    <a href="reward.html" class="nav-item">
        <i class="fa-solid fa-gift"></i>
        <span>Reward</span>
    </a>
    <a href="profil.html" class="nav-item">
        <i class="fa-solid fa-user-gear"></i>
        <span>Profile</span>
    </a>
</nav>

<div id="win-popup">
    <i class="fa-solid fa-trophy" style="font-size: 50px; color: var(--yellow); margin-bottom: 15px;"></i>
    <h2 style="margin: 0; font-size: 14px; opacity: 0.7;">BIG WIN!</h2>
    <div id="win-amt" style="font-size: 28px; font-weight: 800; color: #fff; margin: 10px 0;">IDR 0</div>
    <button onclick="closeWin()" class="drop-btn" style="padding: 10px 30px; font-size: 12px;">CLAIM</button>
</div>

<audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;
    const engine = Engine.create();
    const world = engine.world;
    let currentWinrate = 50;
    let isDropping = false;

    async function init() {
        const user = localStorage.getItem('user_neon');
        if(!user) window.location.href = 'index.html';
        
        // Fetch Real Data from Supabase
        const { data, error } = await _supabase.from('profiles').select('*').eq('username', user).single();
        if(data) {
            document.getElementById('display-saldo').innerText = "IDR " + data.saldo.toLocaleString();
            currentWinrate = data.winrate;
        }

        setupCanvas();
    }

    function setupCanvas() {
        const canvas = document.getElementById('game-canvas');
        const render = Render.create({
            canvas: canvas, engine: engine,
            options: { width: 600, height: 650, wireframes: false, background: 'transparent' }
        });

        // Pins Generation (Cyber Style)
        const rows = 9;
        for (let row = 0; row < rows; row++) {
            const y = 100 + row * 45;
            const pinsInRow = row + 3;
            for (let col = 0; col < pinsInRow; col++) {
                const x = 300 + (col - pinsInRow / 2 + 0.5) * 45;
                const pin = Bodies.circle(x, y, 5, { 
                    isStatic: true, 
                    render: { fillStyle: '#ffffff', glow: true } 
                });
                Composite.add(world, pin);
            }
        }

        // Multipliers (Visual Only for UI)
        const mults = [5, 2, 1.2, 0.5, 0.2, 0.5, 1.2, 2, 5];
        mults.forEach((m, i) => {
            const x = 75 + i * 56;
            const sensor = Bodies.rectangle(x, 580, 45, 30, {
                isStatic: true, isSensor: true, label: 'm_' + m,
                render: { fillStyle: m >= 1 ? '#ff0077' : '#333' }
            });
            Composite.add(world, sensor);
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    }

    function adjustBet(amt) {
        const input = document.getElementById('bet-amount');
        let val = parseInt(input.value) + amt;
        if(val < 1000) val = 1000;
        input.value = val;
        document.getElementById('snd-hit').play();
    }

    async function dropBall() {
        if(isDropping) return;
        const bet = parseInt(document.getElementById('bet-amount').value);
        const user = localStorage.getItem('user_neon');

        // Check Saldo Terbaru
        const { data: p } = await _supabase.from('profiles').select('saldo').eq('username', user).single();
        if(p.saldo < bet) return alert("Saldo tidak cukup!");

        isDropping = true;
        document.getElementById('btn-drop').style.opacity = '0.5';

        // Update Saldo (Potong Bet)
        await _supabase.from('profiles').update({ saldo: p.saldo - bet }).eq('username', user);
        updateUISaldo();

        // Logic Manipulasi Winrate Master
        let offset = (Math.random() * 20 - 10);
        if(currentWinrate > 70) offset = (Math.random() > 0.5) ? -40 : 40; 
        if(currentWinrate < 30) offset = 0;

        const ball = Bodies.circle(300 + offset, 30, 10, {
            restitution: 0.6, friction: 0.05,
            render: { fillStyle: '#f5e642' }
        });
        
        Composite.add(world, ball);

        // Sound on Hit
        Events.on(engine, 'collisionStart', (e) => {
            e.pairs.forEach(pair => {
                if(pair.bodyA === ball || pair.bodyB === ball) {
                    document.getElementById('snd-hit').currentTime = 0;
                    document.getElementById('snd-hit').play();
                }
            });
        });

        // Result Detection
        const checkResult = setInterval(async () => {
            if(ball.position.y > 550) {
                clearInterval(checkResult);
                
                // Cari sensor terdekat
                const bodies = Composite.allBodies(world);
                const sensors = bodies.filter(b => b.label && b.label.startsWith('m_'));
                let closest = sensors[0];
                let minDist = 1000;
                
                sensors.forEach(s => {
                    const d = Math.abs(s.position.x - ball.position.x);
                    if(d < minDist) { minDist = d; closest = s; }
                });

                const mult = parseFloat(closest.label.split('_')[1]);
                const win = Math.floor(bet * mult);
                
                Composite.remove(world, ball);
                await finishRound(win);
            }
        }, 100);
    }

    async function finishRound(win) {
        const user = localStorage.getItem('user_neon');
        const { data } = await _supabase.from('profiles').select('saldo').eq('username', user).single();
        await _supabase.from('profiles').update({ saldo: data.saldo + win }).eq('username', user);
        
        if(win > 0) {
            document.getElementById('win-amt').innerText = "IDR " + win.toLocaleString();
            document.getElementById('win-popup').style.display = 'block';
            document.getElementById('snd-win').play();
        } else {
            isDropping = false;
            document.getElementById('btn-drop').style.opacity = '1';
        }
        updateUISaldo();
    }

    async function updateUISaldo() {
        const user = localStorage.getItem('user_neon');
        const { data } = await _supabase.from('profiles').select('saldo').eq('username', user).single();
        document.getElementById('display-saldo').innerText = "IDR " + data.saldo.toLocaleString();
    }

    function closeWin() {
        document.getElementById('win-popup').style.display = 'none';
        isDropping = false;
        document.getElementById('btn-drop').style.opacity = '1';
    }

    window.onload = init;
</script>
</body>
</html>
