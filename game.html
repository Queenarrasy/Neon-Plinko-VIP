<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root{
            --pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--green:#00ff88;--bg:#000005;
            --gp:0 0 12px #ff0077,0 0 30px rgba(255,0,119,.4);
            --gb:0 0 12px #0022ff,0 0 30px rgba(0,34,255,.4);
            --gy:0 0 12px #fbff00,0 0 30px rgba(251,255,0,.4);
            --gg:0 0 12px #00ff88,0 0 30px rgba(0,255,136,.4);
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:72px;}
        #particles-js{position:fixed;width:100%;height:100%;z-index:0;pointer-events:none;background:radial-gradient(circle at 50% 40%,#000018 0%,#000 100%);}

        /* ALERT */
        #neon-alert{position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:88%;max-width:340px;background:rgba(0,0,15,.97);border:2px solid var(--pink);border-top:3px solid var(--yellow);color:#fff;padding:14px 20px;border-radius:14px;text-align:center;font-weight:900;z-index:9000;font-family:'Outfit',sans-serif;font-size:13px;transition:.55s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 0 35px var(--pink);}
        #neon-alert.show{top:15px;}
        #neon-alert.ok{border-color:var(--green);box-shadow:0 0 35px var(--green);}
        #neon-alert.warn{border-color:var(--yellow);box-shadow:0 0 35px var(--yellow);}

        /* HEADER */
        .header{height:60px;padding:0 16px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,20,.98);border-bottom:2px solid var(--blue);position:sticky;top:0;z-index:200;backdrop-filter:blur(20px);box-shadow:var(--gb);}
        .logo{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--pink);text-shadow:var(--gp);letter-spacing:1px;}
        .logo span{color:var(--yellow);text-shadow:var(--gy);}
        .saldo-chip{background:linear-gradient(135deg,rgba(0,0,40,.9),rgba(0,0,20,.9));border:1.5px solid var(--yellow);padding:6px 14px;border-radius:50px;font-size:12px;font-weight:900;color:var(--yellow);text-shadow:var(--gy);box-shadow:0 0 10px rgba(251,255,0,.3);cursor:pointer;}

        /* SESSION TIMER */
        #session-bar{display:none;background:rgba(255,0,119,.1);border-bottom:1px solid rgba(255,0,119,.3);padding:4px;text-align:center;font-size:9px;font-weight:900;color:var(--pink);letter-spacing:2px;text-transform:uppercase;position:relative;z-index:199;}
        #session-bar.active{display:block;}

        /* PANIC BAR */
        #panic-bar{display:none;background:rgba(255,0,119,.15);border-bottom:1px solid rgba(255,0,119,.5);padding:5px;text-align:center;font-size:9px;font-weight:900;color:var(--pink);letter-spacing:2px;animation:panicFlash 1s infinite;position:relative;z-index:199;}
        @keyframes panicFlash{0%,100%{opacity:1}50%{opacity:.4}}

        /* MAXWIN BANNER */
        #maxwin-banner{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.96);z-index:9500;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;}
        #maxwin-banner.show{display:flex;}
        .maxwin-trophy{font-size:80px;margin-bottom:20px;animation:trophySpin 2s ease infinite;}
        @keyframes trophySpin{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.1) rotate(5deg)}}
        .maxwin-title{font-family:'Cinzel Decorative',serif;font-size:24px;color:var(--yellow);text-shadow:var(--gy);margin-bottom:15px;line-height:1.3;}
        .maxwin-sub{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:30px;line-height:1.6;}

        /* GAME AREA */
        .game-wrapper{position:relative;z-index:10;padding:14px 14px 0;}
        canvas#plinko-canvas{display:block;width:100%;max-width:500px;margin:0 auto;border-radius:18px;border:1.5px solid rgba(0,34,255,.4);box-shadow:0 0 30px rgba(0,34,255,.2),inset 0 0 40px rgba(0,0,30,.8);background:rgba(0,0,20,.9);}

        /* MULTIPLIER SLOTS */
        .mult-row{display:flex;justify-content:center;gap:3px;max-width:500px;margin:0 auto;padding:6px 14px 0;}
        .mult-slot{flex:1;padding:5px 2px;border-radius:6px;text-align:center;font-size:10px;font-weight:900;transition:.2s;border:1px solid transparent;cursor:default;}
        .m-red{background:rgba(255,0,119,.2);border-color:rgba(255,0,119,.4);color:var(--pink);}
        .m-orange{background:rgba(255,100,0,.2);border-color:rgba(255,100,0,.4);color:#ff6400;}
        .m-yellow{background:rgba(251,255,0,.2);border-color:rgba(251,255,0,.4);color:var(--yellow);}
        .m-green{background:rgba(0,255,136,.2);border-color:rgba(0,255,136,.4);color:var(--green);}
        .mult-slot.lit{transform:scale(1.15);box-shadow:0 0 14px currentColor;filter:brightness(1.5);}

        /* CONTROLS */
        .controls{max-width:500px;margin:14px auto 0;padding:0 14px;}
        .bet-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
        .bet-input{flex:1;background:#000;border:1.5px solid rgba(0,34,255,.5);border-radius:12px;color:var(--yellow);font-size:20px;font-weight:900;padding:12px 14px;outline:none;font-family:'Outfit',sans-serif;text-align:center;transition:.3s;}
        .bet-input:focus{border-color:var(--yellow);box-shadow:var(--gy);}
        .bet-btn{background:rgba(0,34,255,.15);border:1px solid rgba(0,34,255,.4);color:#fff;padding:12px 14px;border-radius:10px;font-weight:900;font-size:12px;cursor:pointer;transition:.2s;font-family:'Outfit',sans-serif;}
        .bet-btn:active{background:var(--blue);box-shadow:var(--gb);}

        .quick-bets{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
        .qb{flex:1;min-width:56px;background:rgba(0,0,40,.8);border:1px solid rgba(0,34,255,.3);border-radius:10px;color:rgba(255,255,255,.7);padding:9px 4px;text-align:center;font-size:10px;font-weight:900;cursor:pointer;transition:.2s;font-family:'Outfit',sans-serif;}
        .qb:active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:var(--gb);}

        .risk-row{display:flex;gap:8px;margin-bottom:14px;}
        .risk-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid rgba(0,34,255,.3);background:rgba(0,0,40,.8);color:rgba(255,255,255,.5);font-weight:900;font-size:10px;cursor:pointer;transition:.3s;text-align:center;font-family:'Outfit',sans-serif;text-transform:uppercase;letter-spacing:.5px;}
        .risk-btn.active-risk{border-color:var(--yellow);color:var(--yellow);background:rgba(251,255,0,.1);box-shadow:0 0 10px rgba(251,255,0,.2);}

        .drop-btn{width:100%;padding:18px;border-radius:50px;border:none;background:linear-gradient(90deg,var(--blue),var(--pink),var(--blue));background-size:200%;color:#fff;font-weight:900;font-size:16px;cursor:pointer;box-shadow:var(--gp);transition:.3s;letter-spacing:2px;text-transform:uppercase;font-family:'Outfit',sans-serif;position:relative;overflow:hidden;animation:btnShimmer 3s linear infinite;}
        @keyframes btnShimmer{0%{background-position:0%}100%{background-position:200%}}
        .drop-btn:active{transform:scale(.97);}
        .drop-btn:disabled{opacity:.4;cursor:not-allowed;animation:none;filter:grayscale(1);}

        /* WIN FLASH */
        @keyframes winFlash{0%{opacity:0;transform:scale(.5)}40%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(1) translateY(-40px)}}
        .win-popup{position:fixed;pointer-events:none;font-family:'Outfit',sans-serif;font-weight:900;font-size:18px;color:var(--yellow);text-shadow:var(--gy);z-index:500;animation:winFlash 1.2s ease forwards;}

        /* HISTORY TABLE */
        .hist-section{max-width:500px;margin:16px auto 0;padding:0 14px 14px;}
        .hist-label{font-size:10px;font-weight:900;color:var(--pink);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
        .hist-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,0,119,.4),transparent);}
        .hist-table-wrap{background:rgba(0,0,30,.8);border:1px solid rgba(0,34,255,.3);border-radius:16px;overflow:hidden;}
        .hist-table-scroll{max-height:180px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--blue) #000;}
        .hist-table-scroll::-webkit-scrollbar{width:3px;}
        .hist-table-scroll::-webkit-scrollbar-track{background:#000;}
        .hist-table-scroll::-webkit-scrollbar-thumb{background:var(--blue);border-radius:2px;}
        table.ht{width:100%;border-collapse:collapse;}
        table.ht th{padding:9px 10px;font-size:8px;font-weight:900;color:var(--pink);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,0,119,.2);background:rgba(0,0,20,.8);text-align:left;}
        table.ht td{padding:9px 10px;font-size:11px;border-bottom:1px solid rgba(0,34,255,.08);font-weight:700;}
        table.ht tr:last-child td{border-bottom:none;}
        .win-row td{color:var(--green);}
        .lose-row td{color:rgba(255,255,255,.4);}

        /* NAV */
        .nav-bar{position:fixed;bottom:0;left:0;width:100%;height:72px;background:rgba(0,0,15,.99);display:flex;justify-content:space-around;align-items:center;border-top:2px solid var(--blue);backdrop-filter:blur(20px);z-index:1000;padding-bottom:6px;box-shadow:0 -5px 20px rgba(0,34,255,.3);}
        .nav-item{color:rgba(255,255,255,.3);text-decoration:none;text-align:center;font-size:9px;font-weight:900;flex:1;transition:.3s;letter-spacing:.5px;text-transform:uppercase;}
        .nav-item.active,.nav-item:hover{color:var(--pink);text-shadow:var(--gp);}
        .nav-item i{font-size:20px;display:block;margin-bottom:3px;}

        /* MODAL */
        #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
        .modal-box{width:88%;max-width:320px;background:rgba(0,0,15,.99);border:2px solid var(--pink);border-top:3px solid var(--yellow);border-radius:22px;padding:28px;text-align:center;box-shadow:var(--gp);animation:zoomIn .3s ease;}
        @keyframes zoomIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
        #modal-title{font-size:17px;font-weight:900;color:var(--pink);text-shadow:var(--gp);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;}
        #modal-msg{font-size:13px;color:#ccc;line-height:1.6;margin-bottom:5px;}
        .btn-modal{width:100%;padding:14px;border-radius:50px;border:none;background:linear-gradient(90deg,var(--blue),var(--pink));color:#fff;font-weight:900;font-size:13px;cursor:pointer;margin-top:18px;font-family:'Outfit',sans-serif;text-transform:uppercase;letter-spacing:1px;}
    </style>
</head>

<script>
// ═══════════════════════════════════════════════════════
//  NEON PLINKO VIP — GAME ENGINE
// ═══════════════════════════════════════════════════════
const SURL = "https://bgffnmwrviyqpeevzjsn.supabase.co";
const SKEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani";
const _db  = supabase.createClient(SURL, SKEY);

let USERNAME = null;
let userProfile = null;
let currentSaldo = 0;
let isDropping = false;
let historyRows = [];

// Session tracking
let sessionStart    = null;
let sessionTimer    = null;
let sessionMinutes  = 0;
let sessionPnl      = 0;
let sessionStartBal = 0;

// Plinko config
const ROWS     = 14;
const COLS_MULT = 15; // 15 slots at bottom for 14 rows
let   riskMode  = 'low';

// Multipliers per risk
const MULTS = {
    low:    [2.5,1.5,1.2,1.1,1,0.8,0.5,0.8,1,1.1,1.2,1.5,2.5,3,5],
    medium: [5,3,2,1.5,1.2,0.8,0.4,0.8,1.2,1.5,2,3,5,8,12],
    high:   [15,8,4,2.5,1.5,0.8,0.3,0.8,1.5,2.5,4,8,15,25,50]
};

// Canvas
const canvas = document.getElementById('plinko-canvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Particles
particlesJS("particles-js",{
    "particles":{"number":{"value":60},"color":{"value":["#0022ff","#ff0077","#fbff00"]},"shape":{"type":"circle"},"opacity":{"value":0.5,"random":true,"anim":{"enable":true,"speed":0.6,"opacity_min":0.2}},"size":{"value":2.5,"random":true},"line_linked":{"enable":true,"distance":120,"color":"#0022ff","opacity":0.3,"width":0.8},"move":{"enable":true,"speed":1.8,"random":true,"out_mode":"out"}},
    "interactivity":{"events":{"onhover":{"enable":false},"onclick":{"enable":false}}}
});

// ── HELPERS ──────────────────────────────────────────
function playSnd(id){const s=document.getElementById('snd-'+id);if(s){s.currentTime=0;s.play().catch(()=>{});}}
function showAlert(msg,type=''){const a=document.getElementById('neon-alert');a.innerText=msg;a.className=type?'show '+type:'show';setTimeout(()=>a.className='',3000);}
function showModal(t,m){document.getElementById('modal-title').innerText=t;document.getElementById('modal-msg').innerText=m;document.getElementById('modal-overlay').style.display='flex';}
function closeModal(){document.getElementById('modal-overlay').style.display='none';}
function fmtRp(n){return 'Rp '+Math.abs(n).toLocaleString('id-ID');}
function getBet(){return parseInt(document.getElementById('bet-input').value)||0;}
function setBet(v){document.getElementById('bet-input').value=v;}
function halveBet(){const b=getBet();setBet(Math.max(1000,Math.floor(b/2)));}
function doubleBet(){const b=getBet();setBet(Math.min(currentSaldo,b*2));}
function maxBet(){setBet(currentSaldo);}

// ── RISK ──────────────────────────────────────────────
function setRisk(r){
    riskMode=r;
    ['low','medium','high'].forEach(x=>{
        const el=document.getElementById('risk-'+x);
        if(el)el.className='risk-btn'+(x===r?' active-risk':'');
    });
    renderMultRow();
}

// ── MULTIPLIER ROW ───────────────────────────────────
function renderMultRow(){
    const mults=MULTS[riskMode];
    const row=document.getElementById('mult-row');
    row.innerHTML=mults.map((m,i)=>{
        let cls='m-red';
        if(m>=5)cls='m-red';
        else if(m>=2)cls='m-orange';
        else if(m>=1)cls='m-yellow';
        else cls='m-green';
        return `<div class="mult-slot ${cls}" id="ms-${i}">${m}x</div>`;
    }).join('');
}

// ── CANVAS DRAW ──────────────────────────────────────
const PEG_ROWS = 14;
const PEG_COLOR_BASE = 'rgba(0,100,255,0.85)';
const PEG_GLOW  = 'rgba(0,80,255,0.5)';

function getPegPositions(){
    const pegs=[];
    const yStart=28, yEnd=H-50, yStep=(yEnd-yStart)/(PEG_ROWS-1);
    for(let r=0;r<PEG_ROWS;r++){
        const cols=r+2;
        const xStep=W/(cols+1);
        for(let c=0;c<cols;c++){
            pegs.push({x:(c+1)*xStep,y:yStart+r*yStep,r:r});
        }
    }
    return pegs;
}

const PEGS=getPegPositions();

function drawCanvas(ball=null,litSlot=-1){
    ctx.clearRect(0,0,W,H);

    // Background gradient
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'rgba(0,0,25,1)');
    bg.addColorStop(1,'rgba(0,0,8,1)');
    ctx.fillStyle=bg;
    ctx.fillRect(0,0,W,H);

    // Grid lines subtle
    ctx.strokeStyle='rgba(0,34,255,0.04)';
    ctx.lineWidth=1;
    for(let x=0;x<W;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}

    // Pegs
    PEGS.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,4.5,0,Math.PI*2);
        const grad=ctx.createRadialGradient(p.x-1,p.y-1,0,p.x,p.y,5);
        grad.addColorStop(0,'rgba(120,180,255,1)');
        grad.addColorStop(1,'rgba(0,50,200,0.8)');
        ctx.fillStyle=grad;
        ctx.shadowColor=PEG_GLOW;
        ctx.shadowBlur=8;
        ctx.fill();
        ctx.shadowBlur=0;
    });

    // Slot zones at bottom
    const mults=MULTS[riskMode];
    const slotW=W/mults.length;
    mults.forEach((m,i)=>{
        const x=i*slotW;
        let col='rgba(255,0,119,.18)';
        if(m>=5)col='rgba(255,0,119,.18)';
        else if(m>=2)col='rgba(255,100,0,.15)';
        else if(m>=1)col='rgba(251,255,0,.12)';
        else col='rgba(0,255,136,.1)';
        if(i===litSlot){col=col.replace(/[\d.]+\)$/,'0.6)');}
        ctx.fillStyle=col;
        ctx.fillRect(x+1,H-38,slotW-2,36);
        if(i===litSlot){
            ctx.strokeStyle='rgba(255,255,100,.9)';
            ctx.lineWidth=1.5;
            ctx.strokeRect(x+1,H-38,slotW-2,36);
            ctx.strokeStyle='transparent';
        }
    });

    // Ball
    if(ball){
        ctx.beginPath();
        ctx.arc(ball.x,ball.y,7,0,Math.PI*2);
        const bg2=ctx.createRadialGradient(ball.x-2,ball.y-2,0,ball.x,ball.y,8);
        bg2.addColorStop(0,'rgba(255,255,150,1)');
        bg2.addColorStop(0.6,'rgba(255,200,0,.9)');
        bg2.addColorStop(1,'rgba(200,100,0,.6)');
        ctx.fillStyle=bg2;
        ctx.shadowColor='rgba(255,200,0,.9)';
        ctx.shadowBlur=18;
        ctx.fill();
        ctx.shadowBlur=0;
    }
}
drawCanvas();

// ── BALL ANIMATION ────────────────────────────────────
function animateBall(targetSlot, onDone){
    const mults=MULTS[riskMode];
    const slotW=W/mults.length;
    const targetX=(targetSlot+0.5)*slotW;

    // Build path through pegs
    const yStart=20, yEnd=H-54;
    const yStep=(yEnd-yStart)/(PEG_ROWS-1);
    let x=W/2, y=0;

    // Determine random path with bias toward target
    const path=[{x:W/2,y:8}];
    let currX=W/2;
    for(let r=0;r<PEG_ROWS;r++){
        const cols=r+2;
        const xStep=W/(cols+1);
        const py=yStart+r*yStep;
        // bias toward target
        const bias=(targetX-currX)*0.06;
        const rand=(Math.random()-0.4+bias/50)*xStep*0.9;
        currX=Math.max(xStep,Math.min(W-xStep,currX+rand));
        path.push({x:currX,y:py});
    }
    path.push({x:targetX,y:H-40});

    let step=0;
    const TOTAL=path.length-1;
    let subStep=0, SUBSTEPS=12;

    function tick(){
        if(step>=TOTAL){drawCanvas(null,targetSlot);setTimeout(()=>{drawCanvas(null,-1);onDone();},500);return;}
        subStep++;
        if(subStep>SUBSTEPS){subStep=0;step++;}
        if(step>=TOTAL){drawCanvas(null,targetSlot);setTimeout(()=>{drawCanvas(null,-1);onDone();},500);return;}
        const t=subStep/SUBSTEPS;
        const p1=path[step], p2=path[step+1];
        const bx=p1.x+(p2.x-p1.x)*t;
        const by=p1.y+(p2.y-p1.y)*t;
        drawCanvas({x:bx,y:by}, step===TOTAL-1?targetSlot:-1);
        requestAnimationFrame(tick);
    }
    tick();
}

// ── WINRATE LOGIC ─────────────────────────────────────
function computeOutcome(bet, winrate, maxwinLimit, panicMode){
    const mults=MULTS[riskMode];
    const effectiveWR = panicMode ? Math.min(winrate,5) : winrate;
    const roll = Math.random()*100;
    const wins = roll < effectiveWR;

    // Check maxwin
    if(maxwinLimit > 0 && sessionPnl >= maxwinLimit){
        // Force small return only
        const loseSlots=mults.map((m,i)=>({m,i})).filter(x=>x.m<1);
        const pick=loseSlots[Math.floor(Math.random()*loseSlots.length)]||{m:0.3,i:6};
        return {slot:pick.i, mult:pick.m, win:false, forced:'maxwin'};
    }

    if(wins){
        // Pick a winning multiplier
        const winSlots=mults.map((m,i)=>({m,i})).filter(x=>x.m>=1);
        const pick=winSlots[Math.floor(Math.random()*winSlots.length)]||{m:1,i:7};
        return {slot:pick.i, mult:pick.m, win:true};
    } else {
        // Pick a losing slot
        const loseSlots=mults.map((m,i)=>({m,i})).filter(x=>x.m<1);
        const pick=loseSlots[Math.floor(Math.random()*loseSlots.length)]||{m:0.5,i:6};
        return {slot:pick.i, mult:pick.m, win:false};
    }
}

// ── DROP BALL ─────────────────────────────────────────
async function dropBall(){
    if(isDropping)return;
    if(!USERNAME){showModal('LOGIN DULU','Silakan login untuk bermain.');return;}

    const bet=getBet();
    if(!bet||bet<1000){showAlert('Minimal bet Rp 1.000','warn');return;}
    if(bet>currentSaldo){showAlert('Saldo tidak cukup!','');return;}

    isDropping=true;
    const btn=document.getElementById('drop-btn');
    btn.disabled=true;
    btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> DROPPING...';

    playSnd('drop');

    // Deduct bet immediately (optimistic)
    currentSaldo-=bet;
    updateSaldoDisplay();

    const outcome=computeOutcome(bet, userProfile?.winrate??30, userProfile?.maxwin_limit??0, userProfile?.panic_mode??false);
    const payout=Math.floor(bet*outcome.mult);
    const profit=payout-bet;

    // Animate
    animateBall(outcome.slot, async ()=>{
        // Light up mult slot
        const slotEl=document.getElementById('ms-'+outcome.slot);
        if(slotEl){slotEl.classList.add('lit');setTimeout(()=>slotEl.classList.remove('lit'),800);}

        currentSaldo+=payout;
        sessionPnl+=profit;
        updateSaldoDisplay();
        updateSessionBar();

        if(profit>0){
            playSnd('win');
            showAlert(`WIN! +${fmtRp(profit)} (${outcome.mult}x)`,'ok');
            spawnWinPop(`+${fmtRp(profit)}`);
        } else {
            playSnd('lose');
            showAlert(`${fmtRp(profit)} (${outcome.mult}x)`,'');
        }

        addHistoryRow(bet, outcome.slot+1, outcome.mult, payout);

        // Save to DB
        try{
            await _db.from('profiles').update({
                saldo          : currentSaldo,
                updated_at     : new Date().toISOString()
            }).eq('username',USERNAME);
        }catch(e){console.error('DB update error',e);}

        // MaxWin check
        const mwl=userProfile?.maxwin_limit??0;
        if(mwl>0 && sessionPnl>=mwl){
            playSnd('maxwin');
            document.getElementById('maxwin-sub-text').innerText=
                `Kemenangan sesi: ${fmtRp(sessionPnl)}\nBatas maksimum: ${fmtRp(mwl)}\nSilakan withdraw atau lanjut bermain.`;
            document.getElementById('maxwin-banner').classList.add('show');
        }

        isDropping=false;
        btn.disabled=false;
        btn.innerHTML='<i class="fas fa-circle-dot"></i> DROP BALL';
    });
}

// ── WIN POP ───────────────────────────────────────────
function spawnWinPop(txt){
    const el=document.createElement('div');
    el.className='win-popup';
    el.innerText=txt;
    el.style.left=(20+Math.random()*60)+'%';
    el.style.top='35%';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1300);
}

// ── HISTORY ───────────────────────────────────────────
function addHistoryRow(bet,slot,mult,payout){
    const profit=payout-bet;
    historyRows.unshift({bet,slot,mult,payout,profit});
    if(historyRows.length>20)historyRows=historyRows.slice(0,20);
    renderHistory();
}
function renderHistory(){
    const body=document.getElementById('hist-body');
    if(!historyRows.length){body.innerHTML='<tr><td colspan="4" style="text-align:center;padding:20px;opacity:.3;">Belum ada permainan</td></tr>';return;}
    body.innerHTML=historyRows.map(r=>`<tr class="${r.profit>0?'win-row':'lose-row'}">
        <td>${fmtRp(r.bet)}</td>
        <td>#${r.slot}</td>
        <td>${r.mult}x</td>
        <td style="font-weight:900;color:${r.profit>0?'var(--green)':'var(--pink)'}">${r.profit>0?'+':''}${fmtRp(r.profit)}</td>
    </tr>`).join('');
}

// ── SALDO DISPLAY ─────────────────────────────────────
function updateSaldoDisplay(){
    document.getElementById('saldo-display').innerHTML=
        '<i class="fas fa-coins" style="margin-right:5px;font-size:10px;"></i>IDR '+currentSaldo.toLocaleString('id-ID');
}

// ── SESSION TIMER ─────────────────────────────────────
function startSessionTimer(){
    const el=document.getElementById('session-bar');
    el.classList.add('active');
    sessionStart=Date.now();
    if(sessionTimer)clearInterval(sessionTimer);
    sessionTimer=setInterval(()=>{
        const elapsed=Math.floor((Date.now()-sessionStart)/1000);
        const m=Math.floor(elapsed/60).toString().padStart(2,'0');
        const s=(elapsed%60).toString().padStart(2,'0');
        const timeEl=document.getElementById('session-timer-txt');
        if(timeEl)timeEl.innerText=m+':'+s;
        updateSessionBar();

        // Session expired
        if(sessionMinutes>0){
            const limitSec=sessionMinutes*60;
            if(elapsed>=limitSec){
                clearInterval(sessionTimer);
                showModal('SESI BERAKHIR','Waktu bermain sesi ini telah habis. Silakan logout atau hubungi admin.');
                const btn=document.getElementById('drop-btn');
                if(btn){btn.disabled=true;btn.innerHTML='<i class="fas fa-lock"></i> SESI HABIS';}
            }
        }
    },1000);
}
function updateSessionBar(){
    const el=document.getElementById('session-pnl');
    if(el){
        el.style.color=sessionPnl>=0?'var(--green)':'var(--pink)';
        el.innerText=(sessionPnl>=0?'+':'')+fmtRp(sessionPnl);
    }
}

// ── LOAD PROFILE ──────────────────────────────────────
async function loadProfile(){
    try{
        const user=typeof getUsername==='function'?getUsername():localStorage.getItem('neon_user');
        if(!user){showModal('LOGIN','Sesi login tidak ditemukan. Harap login kembali.');return;}
        USERNAME=user;

        const{data,error}=await _db.from('profiles').select('*').eq('username',USERNAME).single();
        if(error||!data){showModal('ERROR','Gagal memuat profil. Periksa koneksi.');return;}

        userProfile=data;
        currentSaldo=Number(data.saldo)||0;
        sessionMinutes=Number(data.session_minutes||data.session_timer||0);
        sessionStartBal=currentSaldo;

        // Update initial_balance_session if first load or new session
        await _db.from('profiles').update({
            initial_balance_session : currentSaldo,
            session_start           : new Date().toISOString()
        }).eq('username',USERNAME);

        updateSaldoDisplay();

        // Panic check
        if(data.panic_mode){
            document.getElementById('panic-bar').style.display='block';
        }

        // Session timer
        if(sessionMinutes>0) startSessionTimer();

        // Subscribe to profile changes (live saldo from admin)
        _db.channel('profile-'+USERNAME)
            .on('postgres_changes',{event:'UPDATE',schema:'public',table:'profiles',filter:`username=eq.${USERNAME}`},payload=>{
                if(payload.new){
                    currentSaldo=Number(payload.new.saldo)||0;
                    userProfile={...userProfile,...payload.new};
                    updateSaldoDisplay();
                    if(payload.new.panic_mode){
                        document.getElementById('panic-bar').style.display='block';
                    } else {
                        document.getElementById('panic-bar').style.display='none';
                    }
                }
            })
            .subscribe();

    }catch(e){showModal('ERROR','Gagal inisialisasi: '+e.message);}
}

// ── INIT ──────────────────────────────────────────────
function init(){
    renderMultRow();
    drawCanvas();
    loadProfile();
}
init();
</script>
