<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════
   ROOT VARIABLES & THEME
══════════════════════════════════════════════════════ */
:root {
  --pink: #ff0077; 
  --blue: #00e5ff; /* Cyan/Deep Blue Neon */
  --yellow: #f5e642; 
  --dark-blue: #0a0b1e;
  --bg: #02030d;
  
  /* Neon Glows */
  --gp: 0 0 15px rgba(255, 0, 119, 0.7);
  --gb: 0 0 15px rgba(0, 229, 255, 0.7);
  --gy: 0 0 15px rgba(245, 230, 66, 0.7);
  
  --header-h: 65px;
  --slot-h: 45px;
  --ctrl-h: 240px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  width: 100vw; height: 100vh; overflow: hidden;
  background: var(--bg);
  color: #fff;
  font-family: 'Outfit', sans-serif;
  display: flex;
  flex-direction: column;
}

/* Background Scanline Effect */
body::before {
  content: ""; position: fixed; inset: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
              linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
  background-size: 100% 4px, 3px 100%; z-index: 100; pointer-events: none;
}

/* ══════════════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════════════ */
.header {
  height: var(--header-h);
  background: rgba(2, 3, 13, 0.9);
  border-bottom: 2px solid var(--blue);
  box-shadow: var(--gb);
  display: flex; align-items: center; padding: 0 15px; justify-content: space-between;
  z-index: 100;
}

.profile-btn {
  color: var(--pink); font-size: 24px; text-shadow: var(--gp); cursor: pointer;
}

.balance-container {
  background: rgba(0, 0, 0, 0.6);
  border: 1px solid var(--pink);
  border-radius: 12px;
  padding: 5px 20px;
  text-align: center;
  box-shadow: inset var(--gp);
}

#display-saldo {
  font-family: 'Cinzel Decorative', serif;
  font-size: 18px; color: var(--yellow); text-shadow: var(--gy); font-weight: 900;
}

/* ══════════════════════════════════════════════════════
   GAME BOARD (Piramida Diatur Agar Tidak Terlalu Tinggi)
══════════════════════════════════════════════════════ */
#board-wrapper {
  flex: 1; /* Mengambil sisa ruang secara proporsional */
  position: relative;
  background: radial-gradient(circle at center, #0f122d 0%, #02030d 100%);
  overflow: hidden;
}

#plinko-canvas { display: block; width: 100%; height: 100%; }

#floating-score {
  position: absolute; top: 10px; right: 10px;
  background: rgba(0, 0, 0, 0.7);
  border: 1px solid var(--blue);
  border-radius: 8px; padding: 5px; width: 90px;
}

.score-entry {
  font-size: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);
  padding: 2px 0; text-align: center; color: var(--pink);
}

/* ══════════════════════════════════════════════════════
   MULTIPLIER SLOTS
══════════════════════════════════════════════════════ */
.multiplier-row {
  height: var(--slot-h);
  display: flex; gap: 4px; padding: 0 10px;
  align-items: center; background: #010209;
}

.slot {
  flex: 1; height: 32px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 900; transition: all 0.2s;
  border: 1px solid transparent;
}

.s-high { background: var(--pink); color: #fff; box-shadow: 0 0 5px var(--pink); }
.s-mid { background: var(--yellow); color: #000; box-shadow: 0 0 5px var(--yellow); }
.s-low { background: var(--blue); color: #000; box-shadow: 0 0 5px var(--blue); }

.slot.active {
  transform: scale(1.2) translateY(-5px);
  filter: brightness(1.5);
  box-shadow: 0 0 20px #fff;
  z-index: 2;
}

/* ══════════════════════════════════════════════════════
   CONTROLS (Posisinya Diperbaiki agar Ergonomis)
══════════════════════════════════════════════════════ */
.controls {
  padding: 15px;
  background: linear-gradient(to top, #02030d, #0a0b1e);
  border-top: 2px solid var(--pink);
  display: flex; flex-direction: column; gap: 12px;
}

.mode-row { display: flex; gap: 10px; }
.btn-mode {
  flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--blue);
  background: transparent; color: var(--blue); font-size: 11px; font-weight: bold;
}
.btn-mode.active {
  background: var(--blue); color: #000; box-shadow: var(--gb);
}

.bet-row {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.05); border-radius: 15px; padding: 5px 15px;
  border: 1px solid rgba(0, 229, 255, 0.3);
}

.bet-btn { 
  background: none; border: none; color: var(--yellow); 
  font-size: 28px; cursor: pointer; text-shadow: var(--gy);
}

#current-bet { font-family: 'Cinzel Decorative'; font-size: 20px; color: #fff; }

.btn-play {
  width: 100%; padding: 15px; border-radius: 12px;
  border: none; font-family: 'Cinzel Decorative'; font-weight: 900;
  font-size: 16px; color: #fff; cursor: pointer;
  background: linear-gradient(45deg, var(--pink), var(--blue));
  box-shadow: var(--gp); transition: 0.3s;
}
.btn-play:active { transform: scale(0.95); }

.nav-bottom { display: flex; gap: 10px; }
.nav-btn {
  flex: 1; padding: 10px; text-align: center; border-radius: 10px;
  text-decoration: none; font-size: 10px; font-weight: bold;
  border: 1px solid var(--pink); color: var(--pink);
}

/* ══════════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════════ */
#modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; }
#neon-modal {
  display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background: #0a0b1e; border: 2px solid var(--pink); border-radius: 20px;
  padding: 30px; text-align: center; z-index:1001; box-shadow: var(--gp); width: 80%;
}
</style>
</head>
<body>

<audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
<audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>
<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

<div id="modal-overlay"></div>
<div id="neon-modal">
  <h2 style="color:var(--pink); margin-bottom:15px">NOTIFICATION</h2>
  <p id="modal-msg" style="color:#fff; margin-bottom:20px"></p>
  <button class="nav-btn" onclick="closeModal()" style="width:100px">CLOSE</button>
</div>

<div class="header">
  <div class="profile-btn" onclick="location.href='profil.html'">
    <i class="fa-solid fa-user-astronaut"></i>
  </div>
  <div class="balance-container">
    <div style="font-size:9px; color:var(--blue)">TOTAL BALANCE</div>
    <div id="display-saldo">IDR 0</div>
  </div>
  <div class="profile-btn" style="color:var(--yellow)">
    <i class="fa-solid fa-crown"></i>
  </div>
</div>

<div id="board-wrapper">
  <canvas id="plinko-canvas"></canvas>
  <div id="floating-score"><div id="score-list"></div></div>
</div>

<div class="multiplier-row" id="slot-row"></div>

<div class="controls">
  <div class="mode-row">
    <button class="btn-mode active" id="m-normal" onclick="setSpeedMode('normal')">
      <i class="fa-solid fa-crosshairs"></i> NORMAL
    </button>
    <button class="btn-mode" id="m-turbo" onclick="setSpeedMode('turbo')">
      <i class="fa-solid fa-bolt"></i> TURBO
    </button>
    <button class="btn-mode" id="m-auto" onclick="toggleAuto()">
      <i class="fa-solid fa-sync"></i> AUTO: OFF
    </button>
  </div>

  <div class="bet-row">
    <button class="bet-btn" onclick="changeBet(-1)"><i class="fa-solid fa-minus-circle"></i></button>
    <div style="text-align:center">
      <div style="font-size:9px; color:var(--blue)">CURRENT STAKE</div>
      <div id="current-bet">400</div>
    </div>
    <button class="bet-btn" onclick="changeBet(1)"><i class="fa-solid fa-plus-circle"></i></button>
  </div>

  <button class="btn-play" id="main-btn" onclick="spawnBall()">
    <i class="fa-solid fa-play"></i> PLAY BALL
  </button>

  <div class="nav-bottom">
    <a href="withdraw.html" class="nav-btn"><i class="fa-solid fa-wallet"></i> WITHDRAW</a>
    <a href="deposit.html" class="nav-btn"><i class="fa-solid fa-coins"></i> DEPOSIT</a>
    <a href="reward.html" class="nav-btn"><i class="fa-solid fa-gift"></i> REWARD</a>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   LOGIC ENGINE
══════════════════════════════════════════════════════ */
const ROWS = 10;
const MULTS = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
const BETS = [400, 800, 1000, 1200, 1600, 2000, 4000, 8000, 10000, 20000];
const BALL_R = 7;
const PEG_R = 3.5;

let canvas, ctx, BW, BH, pegs = [], balls = [], slotW;
let speedMode = 'normal', isAuto = false, autoTimer = null, betIdx = 0;
let _saldo = Math.max(0, parseFloat(localStorage.getItem('user_saldo') || 100000));

const PH = {
  normal: { grav: 0.28, fric: 0.99, bounce: 0.5, autoMs: 600 },
  turbo: { grav: 0.5, fric: 0.98, bounce: 0.4, autoMs: 200 }
};

function init() {
  canvas = document.getElementById('plinko-canvas');
  ctx = canvas.getContext('2d');
  resize();
  _renderS();
  loop();
}

function resize() {
  const wrap = document.getElementById('board-wrapper');
  BW = wrap.offsetWidth;
  BH = wrap.offsetHeight;
  const DPR = window.devicePixelRatio || 1;
  canvas.width = BW * DPR;
  canvas.height = BH * DPR;
  canvas.style.width = BW + 'px';
  canvas.style.height = BH + 'px';
  ctx.scale(DPR, DPR);
  
  // Rebuild components
  buildPegs();
  buildSlots();
}

function buildPegs() {
  pegs = [];
  const spacingX = (BW * 0.8) / (ROWS);
  const spacingY = (BH * 0.75) / (ROWS);
  for(let r = 0; r < ROWS; r++) {
    const count = r + 2;
    const startX = (BW - (count - 1) * spacingX) / 2;
    for(let c = 0; c < count; c++) {
      pegs.push({ x: startX + c * spacingX, y: 40 + r * spacingY, glow: 0 });
    }
  }
}

function buildSlots() {
  const row = document.getElementById('slot-row');
  row.innerHTML = '';
  slotW = BW / MULTS.length;
  MULTS.forEach((m, i) => {
    const s = document.createElement('div');
    s.className = `slot ${m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low'}`;
    s.id = 'slot-' + i;
    s.innerHTML = `<span>${m}x</span>`;
    row.appendChild(s);
  });
}

function loop() {
  ctx.clearRect(0, 0, BW, BH);
  const ph = PH[speedMode];

  // Draw Pegs with Glow Effect
  pegs.forEach(p => {
    p.glow *= 0.9;
    ctx.shadowBlur = p.glow * 15;
    ctx.shadowColor = varToHex(p.glow > 0.1 ? '--pink' : '--blue');
    ctx.fillStyle = p.glow > 0.2 ? '#fff' : 'rgba(0, 229, 255, 0.4)';
    ctx.beginPath();
    ctx.arc(p.x, p.y, PEG_R + (p.glow * 2), 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.shadowBlur = 0;

  // Update Balls
  for (let i = balls.length - 1; i >= 0; i--) {
    let b = balls[i];
    b.vy += ph.grav;
    b.x += b.vx;
    b.y += b.vy;

    // Wall bounce
    if (b.x < BALL_R || b.x > BW - BALL_R) b.vx *= -0.6;

    // Peg collisions
    pegs.forEach(p => {
      let dx = b.x - p.x, dy = b.y - p.y, d = Math.sqrt(dx*dx + dy*dy);
      if (d < BALL_R + PEG_R) {
        p.glow = 1.5;
        snd('hit');
        let nx = dx/d, ny = dy/d;
        let dot = b.vx * nx + b.vy * ny;
        b.vx = (b.vx - 2 * dot * nx) * ph.bounce + (Math.random() - 0.5);
        b.vy = Math.abs(b.vy - 2 * dot * ny) * ph.bounce;
        if (b.vy < 1.5) b.vy = 1.5;
      }
    });

    // Draw Ball
    ctx.beginPath();
    ctx.fillStyle = '#ff0077';
    ctx.shadowBlur = 15; ctx.shadowColor = '#ff0077';
    ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    if (b.y > BH) {
      onLand(b);
      balls.splice(i, 1);
    }
  }
  requestAnimationFrame(loop);
}

function onLand(b) {
  let idx = Math.floor(b.x / slotW);
  idx = Math.max(0, Math.min(MULTS.length - 1, idx));
  const mult = MULTS[idx];
  const win = Math.floor(b.bet * mult);
  
  _saldo += win;
  _renderS();

  const slotEl = document.getElementById('slot-' + idx);
  slotEl.classList.add('active');
  setTimeout(() => slotEl.classList.remove('active'), 400);

  if (mult >= 1) snd('win');
  
  const list = document.getElementById('score-list');
  const div = document.createElement('div');
  div.className = 'score-entry';
  div.innerHTML = `<b>${mult}x</b> | +${win}`;
  list.prepend(div);
  if(list.children.length > 5) list.lastChild.remove();
}

function spawnBall() {
  const bet = BETS[betIdx];
  if (_saldo < bet) {
    showModal("INSUFFICIENT BALANCE!");
    stopAuto();
    return;
  }
  _saldo -= bet;
  _renderS();
  snd('click');
  balls.push({ x: BW/2 + (Math.random()-0.5)*15, y: -10, vx: (Math.random()-0.5)*2, vy: 2, bet: bet });
}

function setSpeedMode(m) {
  speedMode = m;
  snd('click');
  document.getElementById('m-normal').classList.toggle('active', m === 'normal');
  document.getElementById('m-turbo').classList.toggle('active', m === 'turbo');
}

function toggleAuto() {
  isAuto = !isAuto;
  const btn = document.getElementById('m-auto');
  btn.classList.toggle('active', isAuto);
  btn.innerHTML = isAuto ? '<i class="fa-solid fa-sync fa-spin"></i> AUTO: ON' : '<i class="fa-solid fa-sync"></i> AUTO: OFF';
  if (isAuto) {
    spawnBall();
    autoTimer = setInterval(spawnBall, PH[speedMode].autoMs);
  } else {
    clearInterval(autoTimer);
  }
}

function stopAuto() { isAuto = false; clearInterval(autoTimer); document.getElementById('m-auto').classList.remove('active'); document.getElementById('m-auto').textContent = '🔄 AUTO: OFF'; }

function changeBet(d) {
  if (isAuto) return;
  betIdx = Math.max(0, Math.min(BETS.length - 1, betIdx + d));
  document.getElementById('current-bet').textContent = BETS[betIdx].toLocaleString('id-ID');
  snd('click');
}

function _renderS() {
  document.getElementById('display-saldo').textContent = 'IDR ' + Math.floor(_saldo).toLocaleString('id-ID');
  localStorage.setItem('user_saldo', _saldo);
}

function showModal(m) {
  document.getElementById('modal-msg').textContent = m;
  document.getElementById('modal-overlay').style.display = 'block';
  document.getElementById('neon-modal').style.display = 'block';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.getElementById('neon-modal').style.display = 'none';
}

function snd(t) {
  try {
    const a = document.getElementById('snd-' + t);
    a.currentTime = 0;
    a.play();
  } catch(e) {}
}

function varToHex(v) {
  return v === '--pink' ? '#ff0077' : '#00e5ff';
}

window.addEventListener('resize', resize);
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
