<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO — AR GAMING ENGINE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --pink: #ff0077; --blue: #0055ff; --cyan: #00f2ff; --yellow: #f5e642; --bg: #02030d;
            --gp: 0 0 15px rgba(255, 0, 119, 0.7);
            --gb: 0 0 15px rgba(0, 85, 255, 0.7);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Overlay Force Logout */
        #kick-overlay { 
            position: fixed; inset: 0; background: rgba(2, 3, 13, 0.98); z-index: 9999; 
            display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
        .kick-box { border: 2px solid var(--pink); padding: 30px; border-radius: 20px; box-shadow: var(--gp); background: #050614; }

        /* Header */
        .header { height: 65px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(5, 6, 20, 0.95); border-bottom: 2px solid var(--blue); z-index: 100; }
        .logo { font-family: 'Cinzel Decorative'; color: var(--pink); font-size: 14px; letter-spacing: 1px; text-shadow: var(--gp); font-weight: 900; }
        .balance-box { background: rgba(0,0,0,0.7); border: 2px solid var(--pink); padding: 8px 15px; border-radius: 50px; box-shadow: var(--gp); min-width: 140px; text-align: center; }
        #saldo-text { color: var(--yellow); font-weight: 800; font-size: 14px; text-shadow: 0 0 5px var(--yellow); }

        /* Game Area */
        #game-area { flex: 1; position: relative; overflow: hidden; display: flex; justify-content: center; background: radial-gradient(circle at center, #0a0b1e 0%, #02030d 100%); }
        #board-wrapper { position: relative; width: 100%; max-width: 400px; height: 100%; }
        
        .m-bar { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 4px; padding: 0 10px; }
        .m-slot { flex: 1; height: 32px; border-radius: 6px; font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; color: #fff; border: 1px solid rgba(255,255,255,0.1); }

        /* Controls */
        .controls { background: #050614; padding: 15px; border-top: 2px solid var(--blue); box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
        .bet-row { display: flex; justify-content: space-around; align-items: center; margin-bottom: 12px; }
        .bet-val { font-size: 24px; font-weight: 900; color: var(--yellow); font-family: 'Cinzel Decorative'; text-shadow: 0 0 10px rgba(245,230,66,0.3); }
        .bet-btn { font-size: 32px; color: var(--blue); cursor: pointer; filter: drop-shadow(0 0 5px var(--blue)); }

        .mode-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--blue); background: rgba(0,85,255,0.1); color: #fff; font-size: 10px; font-weight: 800; letter-spacing: 1px; }
        .mode-btn.active { background: var(--blue); box-shadow: var(--gb); }
        .mode-btn.auto-active { background: var(--pink); border-color: #fff; box-shadow: var(--gp); animation: pulse 1s infinite; }

        .btn-main { width: 100%; padding: 16px; border-radius: 50px; border: none; background: linear-gradient(90deg, var(--blue), var(--pink)); color: #fff; font-family: 'Cinzel Decorative'; font-weight: 900; font-size: 18px; box-shadow: var(--gp); cursor: pointer; }

        /* Navigation */
        .nav-bar { height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--blue); }
        .nav-item { color: rgba(255,255,255,0.3); text-decoration: none; text-align: center; font-size: 9px; flex:1; font-weight: 700; }
        .nav-item.active { color: var(--cyan); text-shadow: var(--gb); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .f-score { position: absolute; font-weight: 900; font-size: 22px; animation: floatUp 1s forwards; pointer-events: none; z-index: 100; text-shadow: 0 2px 5px #000; }
        @keyframes floatUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-80px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="kick-overlay">
        <div class="kick-box">
            <i class="fas fa-user-slash" style="font-size: 50px; color: var(--pink); margin-bottom: 20px;"></i>
            <h2 style="color: #fff; margin-bottom: 10px;">SESSION EXPIRED</h2>
            <p style="color: #ccc; font-size: 14px; margin-bottom: 25px;">Akun Anda terdeteksi login di perangkat lain.</p>
            <button onclick="location.href='index.html'" class="btn-main" style="padding: 10px 40px; font-size: 14px;">RE-LOGIN</button>
        </div>
    </div>

    <div class="header">
        <div class="logo">NEON PLINKO</div>
        <div class="balance-box">
            <span id="saldo-text">IDR 0</span>
        </div>
    </div>

    <div id="game-area">
        <div id="board-wrapper">
            <canvas id="canvas"></canvas>
            <div class="m-bar" id="m-bar"></div>
        </div>
    </div>

    <div class="controls">
        <div class="bet-row">
            <i class="fa-solid fa-square-minus bet-btn" onclick="changeBet(-1)"></i>
            <div class="bet-val" id="bet-display">400</div>
            <i class="fa-solid fa-square-plus bet-btn" onclick="changeBet(1)"></i>
        </div>
        <div class="mode-row">
            <button class="mode-btn active" id="btn-normal" onclick="setMode('normal')">NORMAL</button>
            <button class="mode-btn" id="btn-turbo" onclick="setMode('turbo')">TURBO</button>
            <button class="mode-btn" id="btn-auto" onclick="toggleAuto()">AUTO</button>
        </div>
        <button class="btn-main" id="btn-action" onclick="handleAction()">DROP BALL</button>
    </div>

    <div class="nav-bar">
        <a href="deposit.html" class="nav-item"><i class="fas fa-plus-circle"></i>DEPO</a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-wallet"></i>WD</a>
        <a href="game.html" class="nav-item active"><i class="fas fa-play-circle"></i>PLAY</a>
        <a href="reward.html" class="nav-item"><i class="fas fa-gift"></i>REWARD</a>
        <a href="profil.html" class="nav-item"><i class="fas fa-user-circle"></i>PROFIL</a>
    </div>

<script>
    const SUPA_URL = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
    const SUPA_KEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani"; 
    const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

    // SESSION IDENTIFIER
    const username = localStorage.getItem('user_session');
    const mySessionId = localStorage.getItem('local_sid'); 

    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    const engine = Engine.create({ gravity: { y: 1.4 } });
    
    // DAFTAR BET SESUAI PERMINTAAN MASTER
    const BET_LIST = [400, 800, 1000, 1200, 1400, 1600, 1800, 2000, 4000, 6000, 8000, 10000];
    let betIdx = 0, isTurbo = false, isAuto = false, autoTimer = null;
    let balance = 0, winrate = 30, maxWinLimit = 1000000;

    const multis = [10, 5, 2, 0.5, 0.2, 0.2, 0.5, 2, 5, 10];
    const colors = ['#ff0077', '#0055ff', '#00f2ff', '#1a1b3a', '#0a0b1e', '#0a0b1e', '#1a1b3a', '#00f2ff', '#0055ff', '#ff0077'];

    async function checkSession() {
        if(!username) { location.href='index.html'; return false; }
        const { data } = await _supa.from('profiles').select('*').eq('username', username).single();
        if(data) {
            // Force Logout Logic
            if(data.last_session_id && data.last_session_id !== mySessionId) {
                document.getElementById('kick-overlay').style.display = 'flex';
                stopAuto();
                return false;
            }
            balance = data.saldo;
            winrate = data.winrate || 30;
            maxWinLimit = data.max_win_limit || 1000000;
            document.getElementById('saldo-text').innerText = "IDR " + balance.toLocaleString();
            return true;
        }
        return false;
    }

    function setupBoard() {
        const canvas = document.getElementById('canvas');
        const render = Render.create({
            canvas: canvas, engine: engine,
            options: { width: 400, height: 500, wireframes: false, background: 'transparent' }
        });

        for (let r = 0; r < 9; r++) {
            let pins = r + 3;
            for (let c = 0; c < pins; c++) {
                let x = 200 + (c - pins / 2 + 0.5) * 38;
                let y = 70 + r * 42;
                Composite.add(engine.world, Bodies.circle(x, y, 3, { isStatic: true, render: { fillStyle: '#fff' } }));
            }
        }

        const mBar = document.getElementById('m-bar');
        multis.forEach((v, i) => {
            const slot = document.createElement('div');
            slot.className = 'm-slot';
            slot.style.background = colors[i];
            slot.innerText = 'x' + v;
            mBar.appendChild(slot);
            Composite.add(engine.world, Bodies.rectangle(40 + i * 35, 490, 30, 10, { isStatic: true, isSensor: true, label: 'm_'+v, render: { visible: false } }));
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    }

    async function spawnBall() {
        const sessionActive = await checkSession();
        if(!sessionActive) return;

        const currentBet = BET_LIST[betIdx];
        if(balance < currentBet) { stopAuto(); return; }

        balance -= currentBet;
        document.getElementById('saldo-text').innerText = "IDR " + balance.toLocaleString();

        let xPos = 200 + (Math.random() * 4 - 2);
        if((Math.random() * 100) > winrate) { xPos = Math.random() > 0.5 ? 230 : 170; }

        const ball = Bodies.circle(xPos, 20, 7, {
            restitution: 0.5, friction: 0.001,
            render: { fillStyle: 'var(--yellow)' }
        });
        Composite.add(engine.world, ball);

        const check = setInterval(async () => {
            if(ball.position.y > 480) {
                clearInterval(check);
                const sensors = Composite.allBodies(engine.world).filter(b => b.label?.startsWith('m_'));
                let nearest = sensors[0], minD = 1000;
                sensors.forEach(s => { let d = Math.abs(s.position.x - ball.position.x); if(d < minD) { minD = d; nearest = s; } });

                let m = parseFloat(nearest.label.split('_')[1]);
                let win = Math.floor(currentBet * m);

                if(win > maxWinLimit) win = Math.floor(currentBet * 0.2);

                balance += win;
                Composite.remove(engine.world, ball);
                showScore(ball.position.x, win, m);
                
                await _supa.from('profiles').update({ saldo: balance }).eq('username', username);
            }
        }, 100);
    }

    function showScore(x, amt, m) {
        const el = document.createElement('div');
        el.className = 'f-score';
        el.style.left = x + 'px'; el.style.bottom = '100px';
        el.style.color = m >= 1 ? 'var(--yellow)' : 'var(--pink)';
        el.innerText = (m >= 1 ? "+" : "") + amt.toLocaleString();
        document.getElementById('board-wrapper').appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }

    function changeBet(d) {
        betIdx = Math.max(0, Math.min(BET_LIST.length - 1, betIdx + d));
        document.getElementById('bet-display').innerText = BET_LIST[betIdx].toLocaleString();
    }

    function setMode(m) {
        isTurbo = (m === 'turbo');
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+m).classList.add('active');
    }

    function toggleAuto() {
        isAuto = !isAuto;
        const btn = document.getElementById('btn-auto');
        if(isAuto) {
            btn.classList.add('auto-active');
            runAuto();
        } else stopAuto();
    }
    
    function runAuto() {
        if(!isAuto) return;
        spawnBall();
        setTimeout(runAuto, isTurbo ? 450 : 900);
    }

    function stopAuto() { isAuto = false; document.getElementById('btn-auto').classList.remove('auto-active'); }
    function handleAction() { if(isAuto) stopAuto(); else spawnBall(); }

    window.onload = () => { setupBoard(); checkSession(); setInterval(checkSession, 5000); };
</script>
</body>
</html>
