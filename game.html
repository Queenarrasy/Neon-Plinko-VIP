<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --pk:#ff0077;--bl:#0033ff;--yl:#fbff00;--gn:#00ff88;--bg:#02000e;
  --gp:0 0 8px #ff0077,0 0 22px rgba(255,0,119,.35);
  --gb:0 0 8px #0033ff,0 0 22px rgba(0,51,255,.35);
  --gy:0 0 8px #fbff00,0 0 22px rgba(251,255,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:82px}
#ptjs{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 120% 80% at 50% 10%,#060025 0%,#02000e 60%,#000008 100%)}

/* ALERT */
#na{position:fixed;top:-110px;left:50%;transform:translateX(-50%);
  width:90%;max-width:340px;background:rgba(0,0,20,.97);
  border:1.5px solid var(--pk);border-top:2px solid var(--yl);
  color:#fff;padding:12px 18px;border-radius:14px;text-align:center;
  font-weight:900;font-size:13px;z-index:9200;
  transition:.5s cubic-bezier(.175,.885,.32,1.275);
  box-shadow:0 0 20px rgba(255,0,119,.45)}
#na.show{top:12px}
#na.ok{border-color:var(--gn);box-shadow:0 0 20px rgba(0,255,136,.45)}
#na.warn{border-color:var(--yl);box-shadow:0 0 20px rgba(251,255,0,.45)}

/* HEADER */
.hdr{height:56px;padding:0 14px;display:flex;justify-content:space-between;align-items:center;
  background:rgba(0,0,22,.99);border-bottom:1.5px solid rgba(0,51,255,.6);
  position:sticky;top:0;z-index:300;backdrop-filter:blur(24px);
  box-shadow:0 2px 20px rgba(0,51,255,.22)}
.logo{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--pk);text-shadow:var(--gp);letter-spacing:1px}
.logo b{color:var(--yl);text-shadow:var(--gy)}
.chip{background:rgba(0,0,0,.85);border:1.5px solid var(--yl);padding:5px 13px;border-radius:50px;
  font-size:11px;font-weight:900;color:var(--yl);cursor:pointer;white-space:nowrap;
  text-shadow:0 0 8px rgba(251,255,0,.5);box-shadow:0 0 8px rgba(251,255,0,.2)}

/* PANIC */
#pb{display:none;background:rgba(255,0,30,.12);border-bottom:1px solid rgba(255,0,119,.4);
  padding:5px;text-align:center;font-size:9px;font-weight:900;color:var(--pk);
  letter-spacing:2px;position:relative;z-index:299;animation:pf 1.2s infinite}
@keyframes pf{0%,100%{opacity:1}50%{opacity:.25}}

/* WRAP */
.wrap{position:relative;z-index:10;padding:10px 10px 4px;max-width:480px;margin:0 auto}

/* CANVAS */
.cbox{width:100%;border-radius:20px;overflow:hidden;position:relative;
  border:1.5px solid rgba(0,60,255,.5);
  box-shadow:0 0 40px rgba(0,40,255,.2),0 0 80px rgba(0,20,255,.1),
             inset 0 0 50px rgba(0,0,40,.98);
  background:#010010;margin-bottom:12px}
#cv{display:block;width:100%;height:auto}

/* SALDO */
.sline{display:flex;justify-content:space-between;align-items:center;
  background:rgba(0,0,0,.6);border:1px solid rgba(0,51,255,.22);
  border-radius:10px;padding:8px 14px;margin-bottom:9px}
.sl{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px;font-weight:900}
.sv{font-size:16px;font-weight:900;color:var(--yl);text-shadow:var(--gy)}

/* BET */
.brow{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.binp{flex:1;background:#000;border:1.5px solid rgba(0,51,255,.5);border-radius:10px;
  color:var(--yl);font-size:18px;font-weight:900;padding:11px 10px;
  outline:none;font-family:'Outfit',sans-serif;text-align:center;transition:.25s}
.binp:focus{border-color:var(--yl);box-shadow:0 0 10px rgba(251,255,0,.2)}
.bb{background:rgba(0,51,255,.14);border:1px solid rgba(0,51,255,.38);color:#fff;
  padding:11px 12px;border-radius:10px;font-weight:900;font-size:12px;cursor:pointer;
  transition:.2s;font-family:'Outfit',sans-serif;min-width:42px;text-align:center}
.bb:active{background:var(--bl)}

/* QUICK BET */
.qrow{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:9px}
.qb{background:rgba(0,0,45,.85);border:1px solid rgba(0,51,255,.28);border-radius:8px;
  color:rgba(255,255,255,.72);padding:8px 2px;text-align:center;
  font-size:10px;font-weight:900;cursor:pointer;transition:.2s;font-family:'Outfit',sans-serif}
.qb:active{background:var(--bl);border-color:var(--bl);color:#fff}

/* RISK */
.rrow{display:flex;gap:6px;margin-bottom:11px}
.rb{flex:1;padding:9px 4px;border-radius:9px;border:1px solid rgba(0,51,255,.28);
  background:rgba(0,0,45,.85);color:rgba(255,255,255,.42);font-weight:900;
  font-size:10px;cursor:pointer;transition:.3s;text-align:center;
  font-family:'Outfit',sans-serif;text-transform:uppercase;letter-spacing:.5px}
.rb.ar{border-color:var(--yl);color:var(--yl);background:rgba(251,255,0,.08);box-shadow:0 0 8px rgba(251,255,0,.1)}

/* DROP BTN */
.dbtn{width:100%;padding:17px;border-radius:50px;border:none;
  background:linear-gradient(90deg,#cc0055,#ff0077,#0033ff,#0055ee,#ff0077,#cc0055);
  background-size:300%;color:#fff;font-weight:900;font-size:15px;cursor:pointer;
  box-shadow:0 0 18px rgba(255,0,119,.4),0 0 40px rgba(0,51,255,.2);
  transition:.25s;letter-spacing:2px;text-transform:uppercase;
  font-family:'Outfit',sans-serif;animation:bf 4s linear infinite;margin-bottom:14px}
@keyframes bf{0%{background-position:0%}100%{background-position:300%}}
.dbtn:active{transform:scale(.97)}
.dbtn:disabled{opacity:.35;cursor:not-allowed;animation:none;filter:grayscale(1)}

/* WIN POP */
@keyframes wf{0%{opacity:0;transform:translateY(0) scale(.4)}
  25%{opacity:1;transform:translateY(-18px) scale(1.35)}
  100%{opacity:0;transform:translateY(-80px) scale(1)}}
.wpop{position:fixed;pointer-events:none;font-family:'Outfit',sans-serif;
  font-weight:900;font-size:22px;color:var(--yl);
  text-shadow:0 0 18px rgba(251,255,0,.95);z-index:800;animation:wf 1.5s ease forwards}

/* HISTORY */
.hsec{padding:0 1px 14px}
.hlbl{font-size:10px;font-weight:900;color:var(--pk);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.hlbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,0,119,.4),transparent)}
.hbox{background:rgba(0,0,25,.85);border:1px solid rgba(0,51,255,.28);border-radius:14px;overflow:hidden}
.hscr{max-height:185px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bl) #000}
.hscr::-webkit-scrollbar{width:3px}
.hscr::-webkit-scrollbar-track{background:#000}
.hscr::-webkit-scrollbar-thumb{background:var(--bl);border-radius:2px}
table.ht{width:100%;border-collapse:collapse}
table.ht th{padding:9px 10px;font-size:8px;font-weight:900;color:var(--pk);
  text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,0,119,.2);
  background:rgba(0,0,18,.95);text-align:left;position:sticky;top:0;z-index:5}
table.ht td{padding:9px 10px;font-size:11px;font-weight:700;border-bottom:1px solid rgba(0,51,255,.07)}
table.ht tr:last-child td{border-bottom:none}
.rw td{color:var(--gn)}
.rl td{color:rgba(255,255,255,.35)}
.re td{text-align:center;padding:22px!important;opacity:.3;font-size:12px}

/* MAXWIN */
#mwo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);
  z-index:9600;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:28px}
#mwo.on{display:flex}
.mwi{font-size:72px;margin-bottom:18px;animation:ms 2s ease-in-out infinite}
@keyframes ms{0%,100%{transform:rotate(-8deg) scale(1)}50%{transform:rotate(8deg) scale(1.1)}}
.mwt{font-family:'Cinzel Decorative',serif;font-size:20px;color:var(--yl);text-shadow:var(--gy);margin-bottom:10px;line-height:1.3}
.mws{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:24px;line-height:1.65;white-space:pre-line}
.mwb{width:100%;max-width:280px;padding:14px;border-radius:50px;border:none;
  font-weight:900;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;
  text-transform:uppercase;letter-spacing:1px;margin-bottom:9px}
.mwb1{background:linear-gradient(90deg,var(--pk),#b400dc);color:#fff;box-shadow:var(--gp)}
.mwb2{background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.14)}

/* MODAL */
#mdo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);
  z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.mdb{width:88%;max-width:320px;background:rgba(0,0,20,.99);
  border:1.5px solid var(--pk);border-top:2px solid var(--yl);
  border-radius:20px;padding:26px;text-align:center;
  box-shadow:0 0 20px rgba(255,0,119,.2);animation:zi .3s ease}
@keyframes zi{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.mdb h3{font-size:16px;font-weight:900;color:var(--pk);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.mdb p{font-size:13px;color:#ccc;line-height:1.6}
.mbtn{width:100%;padding:13px;border-radius:50px;border:none;
  background:linear-gradient(90deg,var(--bl),var(--pk));color:#fff;
  font-weight:900;font-size:13px;cursor:pointer;margin-top:18px;
  font-family:'Outfit',sans-serif;text-transform:uppercase;letter-spacing:1px}

/* NAV */
.nav{position:fixed;bottom:0;left:0;width:100%;height:70px;background:rgba(0,0,20,.99);
  display:flex;justify-content:space-around;align-items:center;
  border-top:1.5px solid rgba(0,51,255,.55);backdrop-filter:blur(20px);
  z-index:1000;padding-bottom:4px;box-shadow:0 -3px 18px rgba(0,51,255,.18)}
.ni{color:rgba(255,255,255,.28);text-decoration:none;text-align:center;
  font-size:9px;font-weight:900;flex:1;transition:.3s;letter-spacing:.5px;text-transform:uppercase}
.ni.ac{color:var(--pk);text-shadow:var(--gp)}
.ni i{font-size:19px;display:block;margin-bottom:3px}
</style>

<!-- ═══════════════════════════ ENGINE ═══════════════════════════ -->
<script>
/* ──────────────────────────────────────────────────────────────
   STATE
────────────────────────────────────────────────────────────── */
var U=null, P={}, SAL=0, DROP=false, RISK='low', SPNL=0, HIST=[];

/* ──────────────────────────────────────────────────────────────
   MULTS  (13 slot, triangle peg layout 12 rows)
────────────────────────────────────────────────────────────── */
var MUL={
  low:   [8.5, 3,  1.5, 1.2, 1.1, 0.7, 0.5, 0.7, 1.1, 1.2, 1.5, 3,  8.5],
  medium:[25,  8,  3,   1.8, 1.2, 0.7, 0.4, 0.7, 1.2, 1.8, 3,   8,  25 ],
  high:  [88, 24,  9,   4,   2,   0.6, 0.2, 0.6, 2,   4,   9,  24,  88 ]
};

/* ──────────────────────────────────────────────────────────────
   CANVAS
────────────────────────────────────────────────────────────── */
var cv=document.getElementById('cv');
var cx=cv.getContext('2d');

/* Physics constants */
var ROWS=12, SLOTS=13;
var GR=0.38;          /* gravity per physics sub-step */
var BOUNCE_E=0.52;    /* energy kept after bounce */
var FRIC=0.988;       /* horizontal friction */
var SUBSTEPS=4;       /* physics sub-steps per frame */

/* Computed sizes */
var PR,BR,RG,SLOT_H,SLOT_Y,PEG_AREA_TOP;

/* World data */
var PEGS=[], SLOTS_D=[];

/* Ball state */
var B=null;
var RAF=null;

/* Peg pulse animation */
var pegPulse=[];

/* ──────────────────────────────────────────────────────────────
   HELPERS
────────────────────────────────────────────────────────────── */
function snd(id){var a=document.getElementById('au-'+id);if(a){a.currentTime=0;a.play().catch(function(){});}}
function R(n){return'Rp '+(Math.abs(n)||0).toLocaleString('id-ID')}
function G(){return parseInt(document.getElementById('bi').value)||0}
function setBet(v){document.getElementById('bi').value=v}
function halveBet(){setBet(Math.max(1000,Math.floor(G()/2)))}
function doubleBet(){setBet(Math.min(SAL||999999999,G()*2))}
function maxBet(){setBet(SAL||0)}

function alert2(msg,t){
  var a=document.getElementById('na');
  a.textContent=msg;a.className=t?'show '+t:'show';
  clearTimeout(a._t);a._t=setTimeout(function(){a.className=''},3500)
}
function showMd(t,m){
  document.getElementById('mt').textContent=t;
  document.getElementById('mm').textContent=m;
  document.getElementById('mdo').style.display='flex'
}
function closeMd(){document.getElementById('mdo').style.display='none'}

function updSaldo(){
  var s='IDR '+SAL.toLocaleString('id-ID');
  document.getElementById('chip').innerHTML='<i class="fas fa-coins" style="margin-right:5px;font-size:10px"></i>'+s;
  document.getElementById('sv').textContent=s
}

/* ──────────────────────────────────────────────────────────────
   RISK
────────────────────────────────────────────────────────────── */
function setRisk(r){
  RISK=r;
  ['low','medium','high'].forEach(function(x){
    document.getElementById(r==='low'?'rl':r==='medium'?'rm':'rh') // handled below
  });
  document.getElementById('rl').className='rb'+(r==='low'?' ar':'');
  document.getElementById('rm').className='rb'+(r==='medium'?' ar':'');
  document.getElementById('rh').className='rb'+(r==='high'?' ar':'');
  buildWorld();redraw()
}

/* ──────────────────────────────────────────────────────────────
   BUILD WORLD — pegs + slots from canvas size
────────────────────────────────────────────────────────────── */
function buildWorld(){
  var W=cv.width, H=cv.height;
  SLOT_H=Math.max(28,H*0.09);
  SLOT_Y=H-SLOT_H;
  PEG_AREA_TOP=H*0.055;

  /* Row gap = available height / (ROWS-1) */
  var pegH=SLOT_Y-PEG_AREA_TOP-H*0.02;
  RG=pegH/(ROWS-1);

  /* Peg and ball radius proportional */
  PR=Math.max(4, W*0.015);
  BR=Math.max(5.5, W*0.018);

  /* Build pegs */
  PEGS=[];
  for(var r=0;r<ROWS;r++){
    var cols=r+2;
    /* total width of this row */
    var span=(cols-1)*RG;
    var x0=(W-span)/2;
    var y=PEG_AREA_TOP+r*RG;
    for(var c=0;c<cols;c++){
      PEGS.push({x:x0+c*RG, y:y, r:r, c:c, glow:0});
    }
  }

  /* Init peg glow array */
  pegPulse=new Array(PEGS.length).fill(0);

  /* Slots */
  var mults=MUL[RISK];
  var sw=W/mults.length;
  SLOTS_D=[];
  for(var i=0;i<mults.length;i++){
    SLOTS_D.push({x:i*sw, y:SLOT_Y, w:sw, h:SLOT_H, m:mults[i], glow:0});
  }
}

/* ──────────────────────────────────────────────────────────────
   DRAW HELPERS
────────────────────────────────────────────────────────────── */
function slotPalette(m){
  if(m>=20) return {a:'rgba(255,0,80',  b:'#ff1155',c:'#ff4477'};
  if(m>=5)  return {a:'rgba(255,120,0', b:'#ff8800',c:'#ffaa44'};
  if(m>=1)  return {a:'rgba(251,255,0', b:'#fbff00',c:'#ffff88'};
            return {a:'rgba(0,255,136', b:'#00ff88',c:'#66ffbb'};
}

function drawNeonCircle(x,y,r,glow,colorA,colorB){
  /* outer glow ring */
  cx.save();
  cx.beginPath();
  cx.arc(x,y,r+glow*4,0,Math.PI*2);
  var og=cx.createRadialGradient(x,y,r*.5,x,y,r+glow*4+2);
  og.addColorStop(0,'rgba(80,160,255,0)');
  og.addColorStop(0.4,'rgba(60,140,255,'+(glow*.3)+')');
  og.addColorStop(1,'rgba(0,80,255,0)');
  cx.fillStyle=og;
  cx.fill();
  cx.restore();

  /* peg body */
  cx.beginPath();
  cx.arc(x,y,r,0,Math.PI*2);
  var g=cx.createRadialGradient(x-r*.3,y-r*.3,0,x,y,r*1.4);
  g.addColorStop(0,'rgba(220,240,255,1)');
  g.addColorStop(0.35,'rgba(80,160,255,.95)');
  g.addColorStop(0.7,'rgba(20,80,220,.8)');
  g.addColorStop(1,'rgba(0,20,160,.4)');
  cx.fillStyle=g;
  cx.shadowColor='rgba(60,140,255,'+(0.5+glow*.5)+')';
  cx.shadowBlur=r*(2+glow*3);
  cx.fill();
  cx.shadowBlur=0;

  /* specular dot */
  cx.beginPath();
  cx.arc(x-r*.28,y-r*.28,r*.22,0,Math.PI*2);
  cx.fillStyle='rgba(255,255,255,'+(0.55+glow*.3)+')';
  cx.fill();
}

/* ──────────────────────────────────────────────────────────────
   FULL REDRAW (background + pegs + slots)
────────────────────────────────────────────────────────────── */
function redraw(){
  var W=cv.width,H=cv.height;
  if(!W||!H)return;

  /* ── Background: deep space nebula ── */
  var bg=cx.createRadialGradient(W*.5,H*.18,0,W*.5,H*.5,H*.85);
  bg.addColorStop(0,'#060028');
  bg.addColorStop(0.4,'#030018');
  bg.addColorStop(0.75,'#020010');
  bg.addColorStop(1,'#010008');
  cx.fillStyle=bg;
  cx.fillRect(0,0,W,H);

  /* ambient nebula blobs */
  var nb=[
    {x:W*.25,y:H*.2, r:W*.35,c:'rgba(0,40,180,.06)'},
    {x:W*.75,y:H*.4, r:W*.3, c:'rgba(120,0,180,.05)'},
    {x:W*.5, y:H*.7, r:W*.4, c:'rgba(0,100,200,.04)'}
  ];
  nb.forEach(function(n){
    var ng=cx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    ng.addColorStop(0,n.c);
    ng.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=ng;cx.fillRect(0,0,W,H);
  });

  /* faint hexagonal grid */
  cx.save();
  cx.strokeStyle='rgba(0,50,200,0.04)';
  cx.lineWidth=0.7;
  var gs=W/14;
  for(var gx=-gs;gx<W+gs;gx+=gs){
    cx.beginPath();cx.moveTo(gx,0);cx.lineTo(gx+gs*.5,H);cx.stroke();
    cx.beginPath();cx.moveTo(gx,0);cx.lineTo(gx-gs*.5,H);cx.stroke();
  }
  cx.restore();

  /* ── Connector lines between adjacent pegs in same row ── */
  cx.save();
  var ri=0,idx=0;
  while(idx<PEGS.length){
    var cols=ri+2;
    for(var ci=0;ci<cols-1;ci++){
      var pa=PEGS[idx+ci],pb=PEGS[idx+ci+1];
      if(pa&&pb){
        var lg=cx.createLinearGradient(pa.x,pa.y,pb.x,pb.y);
        lg.addColorStop(0,'rgba(0,80,255,0.12)');
        lg.addColorStop(0.5,'rgba(0,120,255,0.18)');
        lg.addColorStop(1,'rgba(0,80,255,0.12)');
        cx.strokeStyle=lg;cx.lineWidth=0.8;
        cx.beginPath();cx.moveTo(pa.x,pa.y);cx.lineTo(pb.x,pb.y);cx.stroke();
      }
    }
    /* diagonal connectors to next row */
    if(ri<ROWS-1){
      var nextStart=idx+cols;
      for(var ci2=0;ci2<cols;ci2++){
        var pc=PEGS[idx+ci2];
        var pd=PEGS[nextStart+ci2];
        var pe=PEGS[nextStart+ci2+1];
        if(pc&&pd){
          cx.strokeStyle='rgba(0,60,200,0.07)';cx.lineWidth=0.5;
          cx.beginPath();cx.moveTo(pc.x,pc.y);cx.lineTo(pd.x,pd.y);cx.stroke();
        }
        if(pc&&pe){
          cx.beginPath();cx.moveTo(pc.x,pc.y);cx.lineTo(pe.x,pe.y);cx.stroke();
        }
      }
    }
    idx+=cols;ri++;
  }
  cx.restore();

  /* ── Pegs ── */
  for(var pi=0;pi<PEGS.length;pi++){
    var p=PEGS[pi];
    var gv=pegPulse[pi]||0;
    drawNeonCircle(p.x,p.y,PR,gv,'rgba(80,160,255','#60a0ff');
  }

  /* ── Slot separator ── */
  if(SLOTS_D.length){
    var sx=cx.createLinearGradient(0,SLOT_Y,W,SLOT_Y);
    sx.addColorStop(0,'rgba(255,0,119,.0)');
    sx.addColorStop(0.2,'rgba(255,0,119,.35)');
    sx.addColorStop(0.8,'rgba(0,51,255,.35)');
    sx.addColorStop(1,'rgba(0,51,255,.0)');
    cx.strokeStyle=sx;cx.lineWidth=1.2;
    cx.beginPath();cx.moveTo(0,SLOT_Y);cx.lineTo(W,SLOT_Y);cx.stroke();
  }

  /* ── Slots ── */
  var fsz=Math.max(8,Math.min(11,W*.024));
  cx.font='900 '+fsz+'px Outfit,sans-serif';
  cx.textAlign='center';cx.textBaseline='middle';

  for(var si=0;si<SLOTS_D.length;si++){
    var s=SLOTS_D[si];
    var pal=slotPalette(s.m);
    var gl=s.glow||0;
    var alpha=0.18+gl*.55;

    /* Slot background gradient */
    var sg=cx.createLinearGradient(s.x,s.y,s.x,s.y+s.h);
    sg.addColorStop(0,pal.a+','+(alpha+.1)+')');
    sg.addColorStop(1,pal.a+','+alpha*0.5+')');
    cx.fillStyle=sg;
    cx.fillRect(s.x+1,s.y,s.w-2,s.h);

    /* Border */
    cx.strokeStyle=pal.a+','+(0.3+gl*.7)+')';
    cx.lineWidth=gl>0?1.5:.7;
    cx.strokeRect(s.x+1,s.y,s.w-2,s.h);

    /* Glow when lit */
    if(gl>0){
      cx.shadowColor=pal.b;
      cx.shadowBlur=12+gl*20;
      cx.strokeRect(s.x+1,s.y,s.w-2,s.h);
      cx.shadowBlur=0;
    }

    /* Label */
    cx.fillStyle=gl>0?'#fff':pal.c;
    cx.shadowColor=gl>0?pal.b:'transparent';
    cx.shadowBlur=gl>0?8:0;
    cx.fillText(s.m+'x',s.x+s.w/2,s.y+s.h*.5);
    cx.shadowBlur=0;
  }
}

/* ──────────────────────────────────────────────────────────────
   DRAW BALL (called every frame on top of redraw)
────────────────────────────────────────────────────────────── */
function drawBall(){
  if(!B)return;

  /* Trail — fading neon streaks */
  for(var ti=0;ti<B.tr.length;ti++){
    var t=B.tr[ti];
    var p=ti/B.tr.length;
    var a=p*p*0.6;
    var r2=BR*(0.3+p*0.55);
    /* Color shifts blue→pink→yellow along trail */
    var hue=ti*6;
    cx.beginPath();
    cx.arc(t.x,t.y,r2,0,Math.PI*2);
    cx.fillStyle='hsla('+(200+hue)+',100%,65%,'+a+')';
    cx.shadowColor='hsla('+(200+hue)+',100%,65%,.5)';
    cx.shadowBlur=r2*2;
    cx.fill();
    cx.shadowBlur=0;
  }

  /* Ball glow ring */
  var gr1=cx.createRadialGradient(B.x,B.y,BR*.6,B.x,B.y,BR*2.8);
  gr1.addColorStop(0,'rgba(255,200,0,.25)');
  gr1.addColorStop(0.5,'rgba(255,80,0,.1)');
  gr1.addColorStop(1,'rgba(255,0,80,0)');
  cx.beginPath();cx.arc(B.x,B.y,BR*2.8,0,Math.PI*2);
  cx.fillStyle=gr1;cx.fill();

  /* Ball body */
  var gr2=cx.createRadialGradient(B.x-BR*.3,B.y-BR*.32,0,B.x,B.y,BR*1.2);
  gr2.addColorStop(0,'rgba(255,255,210,1)');
  gr2.addColorStop(0.3,'rgba(255,210,30,.98)');
  gr2.addColorStop(0.65,'rgba(255,130,0,.9)');
  gr2.addColorStop(1,'rgba(200,40,0,.65)');
  cx.beginPath();cx.arc(B.x,B.y,BR,0,Math.PI*2);
  cx.fillStyle=gr2;
  cx.shadowColor='rgba(255,180,0,.95)';
  cx.shadowBlur=BR*3.5;
  cx.fill();
  cx.shadowBlur=0;

  /* Specular */
  cx.beginPath();cx.arc(B.x-BR*.3,B.y-BR*.3,BR*.2,0,Math.PI*2);
  cx.fillStyle='rgba(255,255,255,.85)';cx.fill();
}

/* ──────────────────────────────────────────────────────────────
   PHYSICS — sub-stepped for smooth collisions
────────────────────────────────────────────────────────────── */
function physStep(){
  if(!B)return false;
  var W=cv.width,H=cv.height;
  var dt=1/SUBSTEPS;

  for(var sub=0;sub<SUBSTEPS;sub++){
    /* gravity */
    B.vy+=GR*dt;
    B.vx*=Math.pow(FRIC,dt);

    /* clamp speed */
    var spd=Math.sqrt(B.vx*B.vx+B.vy*B.vy);
    if(spd>18){B.vx*=18/spd;B.vy*=18/spd;}

    B.x+=B.vx*dt;
    B.y+=B.vy*dt;

    /* Wall */
    if(B.x-BR<0)      {B.x=BR;     B.vx=Math.abs(B.vx)*BOUNCE_E;}
    if(B.x+BR>W)      {B.x=W-BR;   B.vx=-Math.abs(B.vx)*BOUNCE_E;}

    /* Peg collisions */
    for(var pi=0;pi<PEGS.length;pi++){
      var p=PEGS[pi];
      var dx=B.x-p.x, dy=B.y-p.y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      var minD=BR+PR;

      if(dist<minD&&dist>0.001){
        /* separate */
        var nx=dx/dist, ny=dy/dist;
        var sep=(minD-dist)+0.5;
        B.x+=nx*sep;B.y+=ny*sep;

        /* reflect */
        var dot=B.vx*nx+B.vy*ny;
        if(dot<0){
          B.vx=(B.vx-2*dot*nx)*BOUNCE_E;
          B.vy=(B.vy-2*dot*ny)*BOUNCE_E;
          /* small lateral nudge for natural feel */
          B.vx+=(Math.random()-.5)*.8;
          /* light up peg */
          pegPulse[pi]=1.0;
        }
      }
    }

    /* Slot entry */
    if(SLOTS_D.length&&B.y+BR>=SLOT_Y){
      return 'landed';
    }
  }
  return false;
}

/* ──────────────────────────────────────────────────────────────
   ANIMATION LOOP
────────────────────────────────────────────────────────────── */
var onLandCB=null;

function loop(){
  /* Decay peg glows */
  for(var pi=0;pi<pegPulse.length;pi++){
    if(pegPulse[pi]>0) pegPulse[pi]=Math.max(0,pegPulse[pi]-.045);
  }
  /* Decay slot glows */
  for(var si=0;si<SLOTS_D.length;si++){
    if(SLOTS_D[si].glow>0) SLOTS_D[si].glow=Math.max(0,SLOTS_D[si].glow-.03);
  }

  var res=physStep();
  redraw();
  drawBall();

  if(res==='landed'){
    /* Find which slot */
    var lIdx=-1;
    for(var s=0;s<SLOTS_D.length;s++){
      if(B.x>=SLOTS_D[s].x&&B.x<SLOTS_D[s].x+SLOTS_D[s].w){lIdx=s;break;}
    }
    if(lIdx===-1) lIdx=Math.floor(SLOTS_D.length/2);

    B=null;
    cancelAnimationFrame(RAF);RAF=null;

    /* Light up slot */
    SLOTS_D[lIdx].glow=1.0;
    redraw();

    setTimeout(function(){
      if(onLandCB) onLandCB(lIdx);
      onLandCB=null;
    },480);
    return;
  }

  /* Trail update */
  if(B){
    B.tr.push({x:B.x,y:B.y});
    if(B.tr.length>18) B.tr.shift();
  }

  RAF=requestAnimationFrame(loop);
}

/* ──────────────────────────────────────────────────────────────
   OUTCOME LOGIC
────────────────────────────────────────────────────────────── */
function computeOutcome(){
  var mults=MUL[RISK];
  var wr=P.panic_mode?Math.min(P.winrate||30,5):(P.winrate||30);
  var mwl=P.maxwin_limit||0;

  if(mwl>0&&SPNL>=mwl){
    var la=[];for(var i=0;i<mults.length;i++)if(mults[i]<1)la.push(i);
    var li=la.length?la[Math.floor(Math.random()*la.length)]:Math.floor(mults.length/2);
    return{slot:li,mult:mults[li],win:false,forced:true};
  }
  if(Math.random()*100<wr){
    var wa=[];for(var j=0;j<mults.length;j++)if(mults[j]>=1)wa.push(j);
    var wi=wa.length?wa[Math.floor(Math.random()*wa.length)]:Math.floor(mults.length/2);
    return{slot:wi,mult:mults[wi],win:true};
  }else{
    var la2=[];for(var k=0;k<mults.length;k++)if(mults[k]<1)la2.push(k);
    var li2=la2.length?la2[Math.floor(Math.random()*la2.length)]:Math.floor(mults.length/2);
    return{slot:li2,mult:mults[li2],win:false};
  }
}

/* ──────────────────────────────────────────────────────────────
   DROP BALL
────────────────────────────────────────────────────────────── */
function dropBall(){
  if(DROP)return;
  if(!U){showMd('LOGIN DULU','Silakan login untuk bermain.');return;}
  var bet=G();
  if(!bet||bet<1000){alert2('Minimal bet Rp 1.000','warn');return;}
  if(bet>SAL){alert2('Saldo tidak cukup!','');return;}

  DROP=true;
  var btn=document.getElementById('db');
  btn.disabled=true;
  btn.innerHTML='<i class="fas fa-spinner fa-spin"></i>&nbsp;DROPPING...';

  snd('drop');
  SAL-=bet;updSaldo();

  var out=computeOutcome();
  /* Guide spawn X toward target */
  var tgtX=SLOTS_D[out.slot]?SLOTS_D[out.slot].x+SLOTS_D[out.slot].w/2:cv.width/2;
  var spawnX=cv.width/2+(Math.random()-.5)*PR*1.5;
  var bias=(tgtX-spawnX)*0.009;

  /* Reset peg pulses for fresh look */
  for(var i=0;i<pegPulse.length;i++) pegPulse[i]=0;

  B={
    x:spawnX, y:BR+2,
    vx:bias+(Math.random()-.5)*.5,
    vy:1.8,
    tr:[]
  };

  onLandCB=function(landedIdx){
    var actualMult=SLOTS_D[landedIdx]?SLOTS_D[landedIdx].m:out.mult;
    var pay=Math.floor(bet*actualMult);
    var prof=pay-bet;

    SAL+=pay;SPNL+=prof;updSaldo();

    if(prof>0){
      snd('win');
      alert2('WIN! +'+R(prof)+' ('+actualMult+'x)','ok');
      winPop('+'+R(prof));
    }else{
      snd('lose');
      alert2(R(prof)+' ('+actualMult+'x)','');
    }
    addHist(bet,actualMult,pay,prof);

    /* Save to DB */
    try{
      if(typeof _db!=='undefined'){
        _db.from('profiles').update({saldo:SAL,updated_at:new Date().toISOString()})
           .eq('username',U).then(function(){}).catch(function(e){console.warn(e)});
      }
    }catch(e){console.warn(e);}

    /* MaxWin */
    var mwl=P.maxwin_limit||0;
    if(mwl>0&&SPNL>=mwl){
      snd('win');
      document.getElementById('mws').textContent='Kemenangan sesi: '+R(SPNL)+'\nLimit: '+R(mwl);
      document.getElementById('mwo').classList.add('on');
    }

    DROP=false;
    btn.disabled=false;
    btn.innerHTML='<i class="fas fa-circle-dot"></i>&nbsp;&nbsp;DROP BALL';
  };

  if(RAF) cancelAnimationFrame(RAF);
  RAF=requestAnimationFrame(loop);
}

/* ──────────────────────────────────────────────────────────────
   WIN POP
────────────────────────────────────────────────────────────── */
function winPop(txt){
  var el=document.createElement('div');
  el.className='wpop';el.textContent=txt;
  el.style.left=(15+Math.random()*55)+'%';
  el.style.top='40%';
  document.body.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},1600);
}

/* ──────────────────────────────────────────────────────────────
   HISTORY
────────────────────────────────────────────────────────────── */
function addHist(bet,mult,pay,prof){
  var now=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  HIST.unshift({bet:bet,mult:mult,pay:pay,prof:prof,now:now});
  if(HIST.length>30)HIST=HIST.slice(0,30);
  renderHist();
}
function renderHist(){
  var b=document.getElementById('hb');
  if(!HIST.length){b.innerHTML='<tr class="re"><td colspan="4">Belum ada permainan</td></tr>';return;}
  var h='';
  HIST.forEach(function(r){
    var cls=r.prof>0?'rw':'rl';
    var col=r.prof>0?'var(--gn)':'var(--pk)';
    var sgn=r.prof>0?'+':'';
    h+='<tr class="'+cls+'"><td>'+R(r.bet)+'</td><td style="font-weight:900">'+r.mult+'x</td>'
      +'<td style="color:'+col+';font-weight:900">'+sgn+R(r.prof)+'</td>'
      +'<td style="font-size:9px;opacity:.4">'+r.now+'</td></tr>';
  });
  b.innerHTML=h;
}

/* ──────────────────────────────────────────────────────────────
   LOAD PROFILE
────────────────────────────────────────────────────────────── */
function loadProfile(){
  var user=(typeof getUsername==='function')?getUsername():localStorage.getItem('neon_user');
  if(!user){showMd('LOGIN','Sesi tidak ditemukan. Harap login kembali.');return;}
  U=user;
  if(typeof _db==='undefined'){alert2('Mode offline','warn');return;}

  _db.from('profiles').select('*').eq('username',U).single()
    .then(function(res){
      if(res.error||!res.data){showMd('ERROR','Gagal memuat profil.');return;}
      P=res.data;
      SAL=Number(P.saldo)||0;
      updSaldo();
      if(P.panic_mode) document.getElementById('pb').style.display='block';

      _db.from('profiles').update({
        initial_balance_session:SAL,
        session_start:new Date().toISOString()
      }).eq('username',U).then(function(){}).catch(function(){});

      _db.channel('g-'+U)
        .on('postgres_changes',{event:'UPDATE',schema:'public',table:'profiles',filter:'username=eq.'+U},
          function(pl){
            if(!pl.new)return;
            SAL=Number(pl.new.saldo)||0;
            P=Object.assign({},P,pl.new);
            updSaldo();
            document.getElementById('pb').style.display=pl.new.panic_mode?'block':'none';
          })
        .subscribe();
    })
    .catch(function(e){showMd('ERROR','Gagal: '+(e.message||e));});
}

/* ──────────────────────────────────────────────────────────────
   CANVAS RESIZE
────────────────────────────────────────────────────────────── */
function resize(){
  var box=cv.parentElement;
  var W=box&&box.clientWidth>10?box.clientWidth:window.innerWidth-20;
  /* Taller canvas for more satisfying drop */
  var H=Math.round(W*1.05);
  if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
}

/* ──────────────────────────────────────────────────────────────
   PARTICLES
────────────────────────────────────────────────────────────── */
function initPtjs(){
  if(typeof particlesJS==='undefined')return;
  particlesJS('ptjs',{
    particles:{
      number:{value:45},
      color:{value:['#0033ff','#ff0077','#fbff00','#00ff88']},
      shape:{type:'circle'},
      opacity:{value:.4,random:true,anim:{enable:true,speed:.4,opacity_min:.08}},
      size:{value:1.8,random:true},
      line_linked:{enable:true,distance:100,color:'#0033ff',opacity:.15,width:.6},
      move:{enable:true,speed:1.2,random:true,out_mode:'out'}
    },
    interactivity:{events:{onhover:{enable:false},onclick:{enable:false}}}
  });
}

/* ──────────────────────────────────────────────────────────────
   IDLE ANIMATION — pegs pulsing slowly when no ball
────────────────────────────────────────────────────────────── */
var idleRaf=null;
function idleLoop(){
  /* Gentle wave pulse through pegs */
  var t=Date.now()/1200;
  for(var pi=0;pi<PEGS.length;pi++){
    if(!B){
      var wave=Math.sin(t+PEGS[pi].x*0.018+PEGS[pi].y*0.012);
      pegPulse[pi]=Math.max(0,(wave*.18));
    }
  }
  for(var si=0;si<SLOTS_D.length;si++){
    if(!B&&!DROP){
      SLOTS_D[si].glow=Math.max(0,Math.sin(t*.7+si*.5)*.12);
    }
  }
  if(!RAF){redraw();}
  idleRaf=requestAnimationFrame(idleLoop);
}

/* ──────────────────────────────────────────────────────────────
   INIT
────────────────────────────────────────────────────────────── */
function init(){
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      resize();
      buildWorld();
      redraw();
      initPtjs();
      loadProfile();
      idleLoop();
    });
  });
  window.addEventListener('resize',function(){
    resize();buildWorld();redraw();
  });
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
}else{
  init();
}
</script>
