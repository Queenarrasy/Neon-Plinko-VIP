<style>

html,body{

}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.014) 3px,rgba(0,0,0,.014) 4px);}

/* ── MODAL ─────────────────────────────────────────────── */

#neon-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);

  padding:26px 22px;text-align:center;min-width:270px;max-width:310px;width:86%;
  animation:mpop .3s cubic-bezier(.34,1.56,.64,1) both;}
#neon-modal.m-pink  {border:1px solid var(--bp);box-shadow:var(--gp);}
#neon-modal.m-blue  {border:1px solid var(--bb);box-shadow:var(--gb);}
#neon-modal.m-yellow{border:1px solid var(--by);box-shadow:var(--gy);}
@keyframes mpop{from{opacity:0;transform:translate(-50%,-50%) scale(.7)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

<script src="global.js"></script>
<script>
// Canvas & Game Variables
const ROWS   = 10;
const MULTS  = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
const BETS   = [400,800,1000,1200,1600,2000,4000,8000,10000,20000];
const BALL_R = 6.5;
const PEG_R  = 5.0;
const PH = {
  normal:{ grav:0.20, fric:0.992, bounce:0.44, pegF:2.4, randV:0.30, autoMs:800 },
  turbo: { grav:0.36, fric:0.985, bounce:0.38, pegF:3.4, randV:0.38, autoMs:220 }
};

let canvas, ctx, DPR=1, BW=0, BH=0;
let pegs=[], balls=[], slotW=0;
let speedMode='normal', isAuto=false, autoTimer=null;
let betIdx=0, syncTimer=null, raf=null;
let holdActive=false, holdRepeat=null, holdTimeout=null;
let lastGameActivity = 0;
const GAME_LOCK_MS = 25000;

// UTILS
const getU = () => getUsername();
const snd = t => {
  try{ const a=document.getElementById('snd-'+t); a.currentTime=0; a.play().catch(()=>{}); }catch(e){}
};

function showModal(msg, type='pink'){
  document.getElementById('neon-modal').className='m-'+type;
  document.getElementById('modal-title').textContent = type==='yellow'?'✨ SELAMAT!':type==='blue'?'ℹ️ INFO':'⚠️ PERHATIAN';
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal-overlay').style.display='block';
  document.getElementById('neon-modal').style.display='block';
}
function closeModal(){
  document.getElementById('neon-modal').style.display='none';
  document.getElementById('modal-overlay').style.display='none';
}

// 1. PERBAIKAN PERHITUNGAN (Sinkron Apps Script)
// Mengambil saldo awal sebelum bet dikurangi agar rumus (SaldoAwal - Bet) + (Bet * Mult) di server akurat
async function spawnBall(){
  const bet = BETS[betIdx];
  const saldoSnapshot = getSaldo(); // Ambil saldo dari global.js localStorage

  if(saldoSnapshot < bet){
    snd('error');
    if(isAuto) stopAuto();
    else{ holdActive=false; clearTimeout(holdTimeout); clearInterval(holdRepeat); }
    showModal('Saldo tidak cukup!','pink');
    return;
  }

  // Update UI & Local Storage Langsung (Saldo - Taruhan)
  setSaldo(saldoSnapshot - bet);
  lastGameActivity = Date.now();

  const sx = BW/2+(Math.random()-.5)*10;
  const ball = {
    x:sx, y:-BALL_R*1.5,
    vx:(Math.random()-.5)*1.0, vy:0.4,
    bet, spd:speedMode, done:false,
    tx:undefined, serverMult:undefined, resolved:false, refunded:false
  };
  balls.push(ball);

  try {
    const r = await apiCall({
      action:'game_play', 
      username:getU(), 
      bet: bet, 
      saldoAwal: saldoSnapshot // Kirim Snapshot Saldo ke Backend
    });

    if(r && r.result==='SUCCESS'){
      ball.serverMult = r.target_multiplier;
      ball.serverNewSaldo = r.newSaldo; // Ambil Saldo Pasti dari Server
      
      const opts=[];
      MULTS.forEach((m,i)=>{ if(m===r.target_multiplier) opts.push(i); });
      if(opts.length>0){
        opts.sort((a,z)=>Math.abs(a-(Math.floor(ball.x/slotW)))-Math.abs(z-(Math.floor(ball.x/slotW))));
        ball.tx=(opts[0]+0.5)*slotW;
      }
    } else {
      ball.refunded=true;
      setSaldo(getSaldo() + bet);
    }
  } catch(e){
    ball.refunded=true;
    setSaldo(getSaldo() + bet);
  }
}

// 2. PAPAN PAKU PIRAMIDA PUTIH TERANG
function buildPegs(){
  pegs = [];
  const margin = Math.max(BW*0.06,18), usableW = BW-margin*2;
  const spacingX = usableW/ROWS, topPad = BH*0.04, spacingY = (BH*0.90)/ROWS;
  for(let row=0; row<ROWS; row++){
    const count = row+2, totalW = (count-1)*spacingX;
    const sx = BW/2-totalW/2, y = topPad+row*spacingY;
    for(let col=0; col<count; col++) pegs.push({
        x:sx+col*spacingX, y, glow:0, hue:0, 
        originalColor: '#FFFFFF' // Paku Putih Terang
    });
  }
}

function physics(){
  const toRemove = [];
  balls.forEach(b => {
    const ph = PH[b.spd]||PH.normal;
    b.vy += ph.grav; b.vx *= ph.fric; b.x += b.vx; b.y += b.vy;
    if(b.tx !== undefined){
      const prog = Math.max(0,(b.y-BH*0.40)/(BH*0.60));
      if(prog > 0) b.vx += (b.tx-b.x)*prog*0.016;
    }
    const colDist = BALL_R+PEG_R+0.5;
    for(let i=0; i<pegs.length; i++){
      const p=pegs[i], dx=b.x-p.x, dy=b.y-p.y, d2=dx*dx+dy*dy;
      if(d2 < colDist*colDist && d2 > 0.001){
        const d=Math.sqrt(d2), nx=dx/d, ny=dy/d;
        b.x+=nx*(colDist-d); b.y+=ny*(colDist-d);
        const dot=b.vx*nx+b.vy*ny;
        b.vx=(b.vx-2*dot*nx)*ph.bounce+(Math.random()-.5)*ph.randV;
        b.vy=(b.vy-2*dot*ny)*Math.abs(ph.bounce);
        b.vx=Math.max(-ph.pegF,Math.min(ph.pegF,b.vx));
        
        // EFEK PAKU BERUBAH WARNA SAAT TERKENA BOLA
        p.glow=1; 
        p.hue=1; // Penanda sedang aktif
        setTimeout(() => { p.glow = 0; p.hue = 0; }, 150);
        snd('hit');
      }
    }
    if(b.x<BALL_R)    {b.x=BALL_R;    b.vx= Math.abs(b.vx)*0.45;}
    if(b.x>BW-BALL_R) {b.x=BW-BALL_R; b.vx=-Math.abs(b.vx)*0.45;}
    if(b.y>BH+BALL_R*3 && !b.done){ b.done=true; toRemove.push(b); onBallLand(b); }
  });
  balls = balls.filter(b=>!toRemove.includes(b));
}

function draw(){
  ctx.clearRect(0, 0, BW, BH);
  pegs.forEach(p => {
    const r = PEG_R;
    ctx.save();
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    // Warna dasar putih terang, jika kena (glow) jadi kuning neon
    ctx.fillStyle = p.glow > 0 ? '#f5e642' : '#FFFFFF';
    ctx.shadowBlur = p.glow > 0 ? 15 : 5;
    ctx.shadowColor = p.glow > 0 ? '#f5e642' : 'rgba(255,255,255,0.5)';
    ctx.fill();
    ctx.restore();
  });
  balls.forEach(b => {
    ctx.save();
    const gr = ctx.createRadialGradient(b.x-BALL_R*.32,b.y-BALL_R*.35,BALL_R*.04, b.x,b.y,BALL_R);
    gr.addColorStop(0,'#ffaacc'); gr.addColorStop(0.45, b.refunded ? '#666' : '#ff0077'); gr.addColorStop(1,'#220005');
    ctx.beginPath(); ctx.arc(b.x,b.y,BALL_R,0,Math.PI*2);
    ctx.fillStyle=gr; ctx.shadowColor= b.refunded ? '#333' : 'rgba(255,0,119,0.85)'; ctx.shadowBlur=12; ctx.fill();
    ctx.restore();
  });
}

// 3. PAPAN KOTAK MULTIPLIER BERKEDIP SAAT BOLA MASUK
function onBallLand(b){
  if(b.refunded) return;
  const finalMult = (b.serverMult !== undefined) ? b.serverMult : MULTS[Math.min(MULTS.length-1, Math.max(0, Math.floor(b.x/slotW)))];
  
  // Update Saldo dari Nilai Server yang sudah dibawa bola
  if(b.serverNewSaldo) {
      setSaldo(b.serverNewSaldo);
  } else {
      setSaldo(getSaldo() + Math.floor(b.bet * finalMult));
  }

  // Efek Berkedip Slot
  let slotIdx = Math.min(MULTS.length-1, Math.max(0, Math.floor(b.x/slotW)));
  if(b.serverMult !== undefined){
    const opts=[];
    MULTS.forEach((m,i)=>{ if(m===b.serverMult) opts.push(i); });
    if(opts.length>0) slotIdx = opts[0];
  }
  
  const el = document.getElementById('slot-'+slotIdx);
  if(el){
    el.classList.add('active');
    setTimeout(() => el.classList.remove('active'), 600);
  }

  const list=document.getElementById('score-list');
  const e=document.createElement('div'); e.className='score-entry';
  e.innerHTML=`<span style="color:${finalMult>=1.5?'var(--pink)':'#7799ff'}">${finalMult}x</span> · IDR ${Math.floor(b.bet*finalMult).toLocaleString()}`;
  list.prepend(e);
  if(list.children.length>4) list.removeChild(list.lastChild);
  if(finalMult >= 1.5) snd('win');
}

// SETUP CANVAS & SYSTEM
function setupCanvas(){
  const wrap = document.getElementById('board-wrapper');
  canvas = document.getElementById('plinko-canvas');
  ctx    = canvas.getContext('2d');
  DPR    = window.devicePixelRatio || 1;
  BW = wrap.clientWidth; BH = wrap.clientHeight;
  canvas.width = BW*DPR; canvas.height = BH*DPR;
  canvas.style.width = BW+'px'; canvas.style.height = BH+'px';
  ctx.scale(DPR, DPR);
  buildPegs(); buildSlots();
}

function buildSlots(){
  const row = document.getElementById('slot-row'); row.innerHTML = '';
  slotW = BW / MULTS.length;
  MULTS.forEach((m,i) => {
    const s = document.createElement('div');
    s.className = `slot ${m>=3?'s-high':m>=1?'s-mid':'s-low'}`;
    s.id = 'slot-'+i; s.textContent = m+'x'; row.appendChild(s);
  });
}

function loop(){ physics(); draw(); raf = requestAnimationFrame(loop); }

function setSpeedMode(m){
  snd('click'); speedMode=m;
  document.getElementById('m-normal').classList.toggle('active',m==='normal');
  document.getElementById('m-turbo').classList.toggle('active',m==='turbo');
  if(isAuto){ clearInterval(autoTimer); autoTimer=setInterval(spawnBall,PH[speedMode].autoMs); }
}
function toggleAuto(){ snd('click'); if(isAuto) stopAuto(); else startAuto(); }
function startAuto(){
  isAuto=true; document.getElementById('m-auto').textContent='🔄 AUTO: ON'; document.getElementById('m-auto').classList.add('active');
  document.getElementById('main-btn').classList.add('stop-mode');
  document.getElementById('play-icon').className='fa-solid fa-stop';
  document.getElementById('btn-minus').classList.add('locked'); document.getElementById('btn-plus').classList.add('locked');
  document.getElementById('bet-lock-hint').style.display='block';
  spawnBall(); autoTimer=setInterval(spawnBall,PH[speedMode].autoMs);
}
function stopAuto(){
  isAuto=false; clearInterval(autoTimer); autoTimer=null;
  document.getElementById('m-auto').textContent='🔄 AUTO: OFF'; document.getElementById('m-auto').classList.remove('active');
  document.getElementById('main-btn').classList.remove('stop-mode');
  document.getElementById('play-icon').className='fa-solid fa-play';
  document.getElementById('btn-minus').classList.remove('locked'); document.getElementById('btn-plus').classList.remove('locked');
  document.getElementById('bet-lock-hint').style.display='none';
}
function changeBet(d){
  if(isAuto) return; snd('click');
  betIdx=Math.max(0,Math.min(BETS.length-1,betIdx+d));
  document.getElementById('current-bet').textContent=BETS[betIdx].toLocaleString('id-ID');
}
function onPlayDown(e){
  e.preventDefault(); if(isAuto){stopAuto();return;} if(holdActive) return;
  holdActive=true; spawnBall();
  holdTimeout=setTimeout(()=>{ holdRepeat=setInterval(spawnBall,speedMode==='turbo'?250:600); },300);
}
function onPlayUp(e){ holdActive=false; clearTimeout(holdTimeout); clearInterval(holdRepeat); }

window.addEventListener('load', ()=>{
  if(!getU()){ location.href='index.html'; return; }
  setupCanvas(); loop();
});
</script>
</body>
