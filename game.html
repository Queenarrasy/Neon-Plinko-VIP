<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON PLINKO VIP - ULTRA SMOOTH</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --pink: #ff0077; --blue: #0044ff; --yellow: #f5e642; --bg: #02030d; --gb: 0 0 20px rgba(0, 68, 255, 0.8); --header-h: 60px; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; }

/* Header & Saldo */
.header { height: var(--header-h); background: rgba(2, 3, 13, 0.98); border-bottom: 2px solid var(--blue); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; z-index: 100; }
.balance-container { background: rgba(0, 0, 0, 0.8); border: 1px solid var(--pink); border-radius: 12px; padding: 5px 25px; text-align: center; min-width: 160px; }
#display-saldo { font-family: 'Cinzel Decorative', serif; font-size: 19px; color: var(--yellow); text-shadow: 0 0 10px rgba(245, 230, 66, 0.5); font-weight: 900; }

/* Canvas & Physics Area */
#board-wrapper { flex: 1; position: relative; background: #02030d; overflow: hidden; }
#plinko-canvas { display: block; width: 100%; height: 100%; }

/* Score History */
#floating-score { position: absolute; top: 15px; right: 15px; background: rgba(0, 0, 0, 0.7); border: 1px solid var(--blue); border-radius: 8px; width: 100px; z-index: 50; padding: 5px; }
.score-entry { font-size: 11px; text-align: center; padding: 4px 0; border-bottom: 1px solid rgba(0, 68, 255, 0.2); color: var(--pink); animation: fadeIn 0.3s forwards; }

/* Slots */
.multiplier-row { height: 45px; display: flex; gap: 4px; padding: 0 12px; margin-top: -20px; margin-bottom: 15px; z-index: 10; }
.slot { flex: 1; height: 35px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; transition: 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.s-high { background: var(--pink); box-shadow: 0 0 15px var(--pink); }
.s-mid { background: var(--yellow); color: #000; box-shadow: 0 0 15px var(--yellow); }
.s-low { background: var(--blue); box-shadow: 0 0 15px var(--blue); }
.slot.active { transform: scale(1.4) translateY(-8px); filter: brightness(1.8); box-shadow: 0 0 35px #fff; }

/* Big Win Alert */
#jp-overlay { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.5); pointer-events: none; z-index: 200; font-family: 'Cinzel Decorative'; font-size: 55px; color: var(--yellow); text-shadow: 0 0 30px gold; display: none; }
@keyframes jp-anim { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 20% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } 80% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -60%) scale(1.4); opacity: 0; } }

/* Controls */
.controls { padding: 20px 15px 45px; background: #050614; border-top: 2px solid var(--blue); display: flex; flex-direction: column; gap: 15px; }
.mode-row { display: flex; gap: 10px; }
.btn-mode { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--blue); background: rgba(0, 68, 255, 0.05); color: var(--blue); font-weight: bold; cursor: pointer; transition: 0.2s; }
.btn-mode.active { background: var(--blue); color: #fff; box-shadow: var(--gb); }
.btn-play { width: 100%; padding: 18px; border-radius: 15px; border: none; font-family: 'Cinzel Decorative'; font-size: 20px; font-weight: 900; color: #fff; background: linear-gradient(90deg, var(--blue), var(--pink)); box-shadow: 0 0 20px rgba(255, 0, 119, 0.5); cursor: pointer; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div id="jp-overlay">BIG WIN!</div>

<div class="header">
  <div class="profile-btn" onclick="location.href='profil.html'"><i class="fa-solid fa-circle-user"></i></div>
  <div class="balance-container">
    <div id="display-saldo">IDR 0</div>
  </div>
  <div class="profile-btn" style="color:var(--yellow)"><i class="fa-solid fa-bolt"></i></div>
</div>

<div id="board-wrapper">
  <canvas id="plinko-canvas"></canvas>
  <div id="floating-score"><div id="score-list"></div></div>
</div>

<div class="multiplier-row" id="slot-row"></div>

<div class="controls">
  <div class="mode-row">
    <button class="btn-mode active" id="m-normal" onclick="setSpeedMode('normal')">NORMAL</button>
    <button class="btn-mode" id="m-turbo" onclick="setSpeedMode('turbo')">TURBO</button>
    <button class="btn-mode" id="m-auto" onclick="toggleAuto()">AUTO</button>
  </div>
  <button class="btn-play" id="main-btn" onclick="spawnBall()">DROP BALL</button>
</div>

<script src="global.js"></script>
<script>
/**
 * 🛠 REVISI FINAL:
 * 1. Menghilangkan Ghosting dengan Double-Buffer Clear.
 * 2. Mengurangi kecepatan jatuh (Gravitasi disesuaikan).
 * 3. Sinkronisasi saldo presisi tinggi.
 */

const ROWS = 10;
const MULTS = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
const PEG_R = 3.5, BALL_R = 7;

let canvas, ctx, BW, BH, pegs = [], balls = [], slotW;
let speedMode = 'normal', isAuto = false, autoTimer = null, currentBet = 400;
let _saldo = getStoredSaldo();

const PH = {
  normal: { grav: 0.38, fric: 0.98, bounce: 0.45, autoMs: 800 }, // Gravitasi lebih kecil = bola lebih lambat
  turbo:  { grav: 0.8, fric: 0.96, bounce: 0.35, autoMs: 250 }
};

async function init() {
  canvas = document.getElementById('plinko-canvas');
  ctx = canvas.getContext('2d');
  resize();
  _saldo = await syncServerSaldo();
  _renderS();
  loop();
}

function resize() {
  const wrap = document.getElementById('board-wrapper');
  BW = wrap.offsetWidth; BH = wrap.offsetHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = BW * dpr; canvas.height = BH * dpr;
  ctx.scale(dpr, dpr);
  buildBoard();
}

function buildBoard() {
  pegs = [];
  const spaceX = (BW * 0.9) / ROWS;
  const spaceY = (BH * 0.8) / ROWS;
  for (let r = 0; r < ROWS; r++) {
    const count = r + 2;
    const startX = (BW - (count - 1) * spaceX) / 2;
    for (let c = 0; c < count; c++) {
      pegs.push({ x: startX + c * spaceX, y: 70 + r * spaceY, glow: 0 });
    }
  }
  
  const row = document.getElementById('slot-row');
  row.innerHTML = ''; slotW = BW / MULTS.length;
  MULTS.forEach((m, i) => {
    const s = document.createElement('div');
    s.className = `slot ${m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low'}`;
    s.id = 'slot-' + i; s.innerHTML = m + 'x';
    row.appendChild(s);
  });
}

function loop() {
  // Membersihkan sisa bola (ghosting) dengan fillRect gelap
  ctx.fillStyle = '#02030d';
  ctx.fillRect(0, 0, BW, BH);

  const ph = PH[speedMode];

  // Render Paku
  pegs.forEach(p => {
    p.glow *= 0.8;
    ctx.fillStyle = p.glow > 0.1 ? '#fff' : 'rgba(0, 68, 255, 0.3)';
    ctx.beginPath(); ctx.arc(p.x, p.y, PEG_R, 0, Math.PI * 2); ctx.fill();
  });

  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    if (b.status === 'ready') {
      b.vy += ph.grav;
      b.vx *= ph.fric;

      // Smooth Steer ke Target
      const tx = (b.targetIdx * slotW) + (slotW / 2);
      b.vx += (tx - b.x) * 0.015;

      b.x += b.vx;
      b.y += b.vy;

      // Pantulan Paku
      pegs.forEach(p => {
        const dist = Math.hypot(b.x - p.x, b.y - p.y);
        if (dist < BALL_R + PEG_R) {
          p.glow = 1.2;
          const angle = Math.atan2(b.y - p.y, b.x - p.x);
          b.vx += Math.cos(angle) * 1.5;
          b.vy = Math.abs(Math.sin(angle) * 1.5) + ph.grav;
        }
      });

      // Render Bola
      ctx.beginPath();
      ctx.fillStyle = '#ff0077';
      ctx.shadowBlur = 15; ctx.shadowColor = '#ff0077';
      ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;

      // Cek Finish
      if (b.y > BH - 5) {
        onLand(b);
        balls.splice(i, 1);
      }
    } else if (b.status === 'waiting') {
      // Bola nunggu server
      ctx.beginPath(); ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2); ctx.fill();
    }
  }
  requestAnimationFrame(loop);
}

function spawnBall() {
  if (_saldo < currentBet) { stopAuto(); return; }
  
  const saldoAwal = _saldo;
  _saldo -= currentBet;
  _renderS();

  const b = { x: BW/2, y: 30, vx: (Math.random()-0.5)*4, vy: 1, status: 'waiting' };
  balls.push(b);

  apiCall({ action: 'game_play', username: getUsername(), bet: currentBet, saldoAwal: saldoAwal })
  .then(res => {
    if (res.result === 'SUCCESS') {
      const idxs = [];
      MULTS.forEach((m, i) => { if (m === res.target_multiplier) idxs.push(i); });
      b.targetIdx = idxs[Math.floor(Math.random() * idxs.length)];
      b.win = res.win;
      b.newSaldo = res.newSaldo;
      b.mult = res.target_multiplier;
      b.status = 'ready';
    } else { balls.pop(); _saldo += currentBet; _renderS(); }
  });
}

function onLand(b) {
  // Update Saldo Akurat dari Server
  _saldo = b.newSaldo;
  _renderS();

  const slot = document.getElementById('slot-' + b.targetIdx);
  slot.classList.add('active');
  setTimeout(() => slot.classList.remove('active'), 400);

  if (b.mult >= 10) {
    const jp = document.getElementById('jp-overlay');
    jp.style.display = 'block';
    jp.style.animation = 'jp-anim 1.2s forwards';
    setTimeout(() => jp.style.display = 'none', 1300);
  }

  const list = document.getElementById('score-list');
  const div = document.createElement('div');
  div.className = 'score-entry';
  div.innerHTML = `<b>${b.mult}x</b> | +${Math.floor(b.win)}`;
  list.prepend(div);
  if (list.children.length > 5) list.lastChild.remove();
}

function _renderS() {
  document.getElementById('display-saldo').textContent = 'IDR ' + Math.floor(_saldo).toLocaleString('id-ID');
  storeLocalSaldo(_saldo);
}

function setSpeedMode(m) { speedMode = m; document.getElementById('m-normal').classList.toggle('active', m === 'normal'); document.getElementById('m-turbo').classList.toggle('active', m === 'turbo'); }
function toggleAuto() { isAuto = !isAuto; document.getElementById('m-auto').classList.toggle('active', isAuto); if(isAuto) { spawnBall(); autoTimer = setInterval(spawnBall, PH[speedMode].autoMs); } else clearInterval(autoTimer); }
function stopAuto() { isAuto = false; clearInterval(autoTimer); document.getElementById('m-auto').classList.remove('active'); }

window.addEventListener('resize', resize);
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
