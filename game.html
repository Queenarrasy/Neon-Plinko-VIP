<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO VIP - SUPABASE SYNC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        /* CSS Tetap Sama Seperti Desain Neon Anda Sebelumnya */
        :root { --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #02030d; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; }
        .header { height: 65px; background: rgba(2, 3, 13, 0.95); border-bottom: 2px solid var(--blue); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .saldo-box { background: rgba(0, 212, 255, 0.1); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--blue); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }
        #display-saldo { color: var(--yellow); font-weight: 700; font-size: 1.1em; }
        
        #game-container { flex: 1; position: relative; width: 100%; max-width: 500px; margin: auto; overflow: hidden; }
        #canvas-holder { width: 100%; height: 100%; }

        .controls { height: 140px; background: #050614; border-top: 1px solid rgba(255,255,255,0.1); padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bet-row { display: flex; justify-content: space-between; align-items: center; }
        .bet-btn { background: var(--blue); border: none; color: #fff; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .play-btn { background: var(--pink); border: none; color: #fff; padding: 15px; border-radius: 8px; font-weight: 900; font-size: 1.2em; cursor: pointer; box-shadow: 0 0 15px var(--pink); }
        
        /* Modal Style */
        #modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; }
        .neon-modal { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:80%; background:#0a0b1e; border:2px solid var(--blue); padding:30px; text-align:center; border-radius:15px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo" style="font-family:'Cinzel Decorative'; font-weight:900; color:var(--pink);">PLINKO VIP</div>
    <div class="saldo-box">
        <i class="fa-solid fa-wallet" style="color:var(--blue); margin-right:5px;"></i>
        <span id="display-saldo">IDR 0</span>
    </div>
</div>

<div id="game-container">
    <div id="canvas-holder"></div>
</div>

<div class="controls">
    <div class="bet-row">
        <div style="font-size: 0.8em; opacity: 0.6;">BET AMOUNT</div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="bet-btn" onclick="changeBet(-1)">-</button>
            <span id="current-bet" style="font-weight: 700; color: var(--yellow);">5000</span>
            <button class="bet-btn" onclick="changeBet(1)">+</button>
        </div>
    </div>
    <button class="play-btn" id="btn-spawn" onclick="handlePlay()">SPAWN BALL</button>
</div>

<div id="modal-overlay">
    <div class="neon-modal">
        <h3 id="modal-title" style="color:var(--pink); margin-bottom:15px;">INFO</h3>
        <p id="modal-msg"></p>
        <button onclick="document.getElementById('modal-overlay').style.display='none'" style="margin-top:20px; padding:10px 20px; background:var(--blue); border:none; color:#fff; border-radius:5px;">TUTUP</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
// --- CONFIG GAME ---
const BETS = [5000, 10000, 25000, 50000, 100000, 250000, 500000];
let betIdx = 0;
let isProcessing = false;

// --- MATTER JS SETUP ---
const { Engine, Render, Runner, Bodies, Composite } = Matter;
const engine = Engine.create();
const world = engine.world;
const holder = document.getElementById('canvas-holder');
const render = Render.create({
    element: holder,
    engine: engine,
    options: { width: holder.clientWidth, height: holder.clientHeight, wireframes: false, background: 'transparent' }
});
Render.run(render);
Runner.run(Runner.create(), engine);

// --- LOGIKA UTAMA SUPABASE SYNC ---
async function handlePlay() {
    if (isProcessing) return;
    
    // 1. Ambil Data Player Terbaru (Sinkron Server)
    const user = await getPlayerData();
    const currentBet = BETS[betIdx];

    if (!user || user.saldo < currentBet) {
        return showModal("SALDO KURANG", "Silakan deposit terlebih dahulu untuk bermain.");
    }

    isProcessing = true;
    document.getElementById('btn-spawn').disabled = true;

    // 2. Hitung Winrate Dinamis (Session & MaxWin Control)
    const finalWinrate = calculateDynamicWinrate(user);
    
    // 3. Tentukan Hasil (Menang/Kalah) sebelum bola jatuh
    const multipliers = [15, 5, 2, 1.2, 0.5, 0.2, 0.5, 1.2, 2, 5, 15];
    const isWin = (Math.random() * 100) < finalWinrate;
    
    // Pilih target multiplier berdasarkan hasil isWin
    let targetIdx;
    if (isWin) {
        // Mode Gacor/Normal: Target multiplier >= 1
        const winOptions = [0, 1, 2, 3, 7, 8, 9, 10]; 
        targetIdx = winOptions[Math.floor(Math.random() * winOptions.length)];
    } else {
        // Mode Kuras: Target multiplier < 1
        const loseOptions = [4, 5, 6];
        targetIdx = loseOptions[Math.floor(Math.random() * loseOptions.length)];
    }

    const mValue = multipliers[targetIdx];
    const winAmount = currentBet * mValue;
    const newSaldo = (user.saldo - currentBet) + winAmount;

    // 4. Jalankan Animasi Bola
    spawnBallVisual(targetIdx, async () => {
        // 5. Update Saldo ke Supabase setelah bola jatuh
        await updateSaldoServer(newSaldo);
        updateUI(newSaldo);
        isProcessing = false;
        document.getElementById('btn-spawn').disabled = false;
    });
}

function calculateDynamicWinrate(user) {
    const now = new Date();
    const startTime = new Date(user.session_start || user.created_at);
    const diffMinutes = (now - startTime) / 60000;

    let wr = user.winrate; // Default dari admin (misal 80)

    // SESSION CONTROL: Jika main melebihi batas waktu gacor
    if (diffMinutes > user.session_minutes) {
        wr -= 15; // Winrate drop 15% otomatis
    }

    // MAXWIN LIMIT: Jika saldo sudah menyentuh batas kemenangan
    if (user.saldo >= user.max_win_limit) {
        wr = 5; // Mode Kuras Keras (Hanya 5% menang)
    }

    return Math.max(5, wr); // Minimal winrate 5%
}

async function updateSaldoServer(amount) {
    const username = localStorage.getItem('user_session');
    await _supabase.from('profiles')
        .update({ 
            saldo: amount,
            status: 'ONLINE',
            session_start: new Date() // Reset waktu aktivitas
        })
        .eq('username', username);
}

// --- VISUAL & UI ---
function updateUI(saldo) {
    document.getElementById('display-saldo').innerText = "IDR " + saldo.toLocaleString('id-ID');
    document.getElementById('current-bet').innerText = BETS[betIdx].toLocaleString();
}

function changeBet(dir) {
    betIdx = Math.max(0, Math.min(BETS.length - 1, betIdx + dir));
    document.getElementById('current-bet').innerText = BETS[betIdx].toLocaleString();
}

function showModal(title, msg) {
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-msg').innerText = msg;
    document.getElementById('modal-overlay').style.display = 'block';
}

function spawnBallVisual(targetIdx, callback) {
    // Logika animasi bola menggunakan Matter.js
    // Bola akan diarahkan secara halus ke targetIdx (multipliers)
    const ball = Bodies.circle(render.options.width/2 + (Math.random()*10 - 5), 20, 8, {
        restitution: 0.5,
        friction: 0.01,
        render: { fillStyle: 'var(--pink)' }
    });
    
    // Beri sedikit dorongan agar menuju target yang sudah ditentukan di server
    const forceX = (targetIdx - 5) * 0.002; 
    Matter.Body.applyForce(ball, ball.position, { x: forceX, y: 0 });
    
    Composite.add(world, ball);

    // Cek kapan bola sampai bawah
    const checkY = setInterval(() => {
        if (ball.position.y > render.options.height - 50) {
            clearInterval(checkY);
            Composite.remove(world, ball);
            callback();
        }
    }, 100);
}

// Load Saldo saat pertama buka
window.onload = async () => {
    const user = await getPlayerData();
    if (user) updateUI(user.saldo);
};
</script>

</body>
</html>
