<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>NEON PLINKO VIP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --deepblue: #0044ff; --yellow: #f5e642; --bg: #030510; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; }

        /* HEADER NAV (Profil, Depo, WD, Reward) */
        .top-nav {
            display: grid; grid-template-columns: repeat(4, 1fr);
            background: rgba(0, 68, 255, 0.1); border-bottom: 1px solid var(--deepblue);
            backdrop-filter: blur(10px); padding: 10px 5px;
        }
        .nav-item { 
            text-align: center; color: var(--blue); text-decoration: none; 
            font-size: 9px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
        }

        .main-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(5,6,20,0.8);
        }
        #balance-val { color: var(--yellow); font-size: 16px; font-weight: 800; text-shadow: 0 0 10px var(--yellow); }
        .game-logo { font-family: 'Cinzel Decorative'; color: var(--pink); font-size: 14px; }

        /* SCOREBOARD 3 BARIS */
        #win-log { position: absolute; top: 110px; left: 15px; z-index: 10; pointer-events: none; }
        .win-entry { 
            background: rgba(255, 0, 119, 0.15); border-left: 3px solid var(--pink);
            padding: 6px 12px; margin-bottom: 5px; border-radius: 4px;
            font-size: 11px; font-weight: 800; color: var(--pink); animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        /* GAME BOARD */
        #game-area { width: 100%; height: 50vh; position: relative; }
        canvas { display: block; margin: 0 auto; }

        /* CONTROL PANEL (DYNAMIC) */
        .bottom-panel { 
            position: fixed; bottom: 0; width: 100%; padding: 20px; 
            background: linear-gradient(0deg, #030510 85%, transparent);
        }
        .bet-row { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .btn-adj { 
            width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--blue);
            background: transparent; color: var(--blue); font-size: 22px; font-weight: 900;
        }
        #bet-display { font-size: 26px; font-weight: 900; color: var(--yellow); min-width: 80px; text-align: center; }

        .mode-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-m { 
            flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--deepblue);
            background: rgba(0, 68, 255, 0.05); color: #fff; font-size: 10px; font-weight: 700; text-transform: uppercase;
        }
        .btn-m.active { background: var(--pink); border-color: var(--pink); box-shadow: 0 0 15px var(--pink); color: #fff; }

        .btn-drop { 
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, var(--deepblue), var(--pink));
            color: #fff; font-size: 18px; font-weight: 900; letter-spacing: 2px;
            box-shadow: 0 5px 20px rgba(255, 0, 119, 0.4);
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="profil.html" class="nav-item">PROFIL</a>
        <a href="deposit.html" class="nav-item">DEPOSIT</a>
        <a href="withdraw.html" class="nav-item">WITHDRAW</a>
        <a href="reward.html" class="nav-item">REWARD</a>
    </div>

    <div class="main-header">
        <div id="balance-val">IDR 0</div>
        <div class="game-logo">NEON PLINKO</div>
    </div>

    <div id="win-log"></div>
    <div id="game-area"></div>

    <div class="bottom-panel">
        <div class="bet-row">
            <button class="btn-adj" onclick="adj(-100)">-</button>
            <div id="bet-display">200</div>
            <button class="btn-adj" onclick="adj(100)">+</button>
        </div>

        <div class="mode-row">
            <button class="btn-m active" id="btn-normal" onclick="setM('NORMAL')">Normal</button>
            <button class="btn-m" id="btn-turbo" onclick="setM('TURBO')">Turbo</button>
            <button class="btn-m" id="btn-auto" onclick="setM('AUTO')">Auto</button>
        </div>

        <button class="btn-drop" onclick="handleAction()">DROP BALL</button>
    </div>

<script>
    // --- SUPABASE CONFIG ---
    const SUPA_URL = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
    const SUPA_KEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani"; 
    const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    const engine = Engine.create();
    const area = document.getElementById('game-area');
    const w = area.clientWidth, h = area.clientHeight;

    const render = Render.create({
        element: area, engine: engine,
        options: { width: w, height: h, wireframes: false, background: 'transparent' }
    });

    // --- GAME STATE ---
    let balance = 0, bet = 200, mode = 'NORMAL', autoLoop = null;
    let userWinrate = 30, userMaxWin = 1000000;
    const username = "MASTER_ARA"; // Ganti dengan sistem login Master

    // --- BUILD PYRAMID ---
    const rows = 10;
    const pGap = w / 11;
    const multis = [10, 5, 2, 0.5, 0.2, 0.2, 0.5, 2, 5, 10];

    for(let i=2; i<=rows; i++) {
        for(let j=0; j<i; j++) {
            const px = (w/2) - (i-1)*pGap/2 + j*pGap;
            const py = 30 + (i-1)*pGap;
            Composite.add(engine.world, Bodies.circle(px, py, 3, { isStatic: true, render: { fillStyle: '#fff' } }));
        }
    }

    multis.forEach((m, i) => {
        const bw = w / multis.length;
        const bx = (i * bw) + bw/2;
        const by = 30 + rows * pGap + 30;
        Composite.add(engine.world, Bodies.rectangle(bx, by, bw-4, 25, { 
            isStatic: true, isSensor: true, label: 'm_'+m, 
            render: { fillStyle: 'rgba(255, 0, 119, 0.1)' } 
        }));
        
        const lbl = document.createElement('div');
        lbl.innerHTML = `x${m}`;
        lbl.style.cssText = `position:absolute; left:${bx-10}px; top:${by-10}px; font-size:9px; font-weight:900; color:var(--pink);`;
        area.appendChild(lbl);
    });

    // --- CORE LOGIC & SYNC ---
    async function syncData() {
        const { data } = await _supa.from('profiles').select('*').eq('username', username).single();
        if(data) {
            balance = data.saldo;
            userWinrate = data.winrate || 30;
            userMaxWin = data.max_win_limit || 1000000;
            updateUI();
        }
    }

    function adj(v) { if(bet+v >= 100) { bet+=v; document.getElementById('bet-display').innerText = bet; } }
    
    function setM(m) {
        mode = m;
        document.querySelectorAll('.btn-m').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+m.toLowerCase()).classList.add('active');
        if(m !== 'AUTO') { clearInterval(autoLoop); autoLoop = null; }
    }

    function handleAction() {
        if(mode === 'AUTO') {
            if(autoLoop) { clearInterval(autoLoop); autoLoop = null; }
            else { autoLoop = setInterval(drop, 500); }
        } else { drop(); }
    }

    function drop() {
        if(balance < bet) return;
        balance -= bet; updateUI();
        
        // LOGIKA WINRATE: Semakin tinggi Winrate di Admin, semakin ke tengah bola jatuh
        const wrBias = (Math.random() * 100) < userWinrate ? 0 : (Math.random() * 10 - 5);
        
        const b = Bodies.circle(w/2 + wrBias, 10, 6, {
            restitution: 0.5, friction: 0.01, label: 'ball',
            render: { fillStyle: 'var(--yellow)' }
        });
        Composite.add(engine.world, b);
    }

    Events.on(engine, 'collisionStart', async (e) => {
        e.pairs.forEach(async p => {
            if(p.bodyA.label.startsWith('m_') && p.bodyB.label === 'ball') {
                let m = parseFloat(p.bodyA.label.split('_')[1]);
                let win = Math.floor(bet * m);

                // LOGIKA MAX WIN LIMIT: Jika menang melebihi limit, paksa jadi x0.2
                if(win > userMaxWin) { win = Math.floor(bet * 0.2); }

                balance += win;
                updateUI();
                showWin(win);
                Composite.remove(engine.world, p.bodyB);
                
                // Update ke database Master
                await _supa.from('profiles').update({ saldo: balance }).eq('username', username);
            }
        });
    });

    function showWin(v) {
        const log = document.getElementById('win-log');
        const d = document.createElement('div');
        d.className = 'win-entry'; d.innerText = `+IDR ${v.toLocaleString()}`;
        log.prepend(d);
        if(log.children.length > 3) log.lastChild.remove();
    }

    function updateUI() { document.getElementById('balance-val').innerText = `IDR ${balance.toLocaleString()}`; }

    syncData(); Render.run(render); Runner.run(Runner.create(), engine);
</script>
</body>
</html>
