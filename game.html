<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO — EXCLUSIVE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root { 
            --pink: #ff0077; --blue: #0055ff; --cyan: #00f2ff; --yellow: #f5e642; --bg: #02030d; 
            --gp: 0 0 10px rgba(255, 0, 119, 0.5);
            --gb: 0 0 10px rgba(0, 85, 255, 0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
            background-image: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(0,85,255,0.1) 0%, transparent 70%);
        }

        /* Header */
        .header { 
            height: 60px; padding: 0 15px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(5, 6, 20, 0.95); border-bottom: 1px solid rgba(0,85,255,0.3); 
            z-index: 100;
        }
        .logo { font-family: 'Cinzel Decorative'; color: var(--pink); font-size: 13px; letter-spacing: 2px; text-shadow: var(--gp); font-weight: 900; }
        .balance-box { background: rgba(0,0,0,0.5); border: 1px solid var(--blue); padding: 5px 12px; border-radius: 50px; display: flex; align-items: center; gap: 8px; box-shadow: var(--gb); }

        /* Game Area */
        #game-area { flex: 1; position: relative; display: flex; justify-content: center; overflow: hidden; padding-top: 10px; }
        #board-wrapper { position: relative; width: 100%; max-width: 380px; height: 100%; }
        canvas { width: 100%; height: 100%; }

        .m-bar { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 3px; padding: 0 5px; }
        .m-slot { 
            flex: 1; height: 28px; border-radius: 4px; font-size: 9px; font-weight: 900; 
            display: flex; align-items: center; justify-content: center; color: #fff; 
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Controls */
        .controls { background: #050614; padding: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .bet-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .bet-val { font-size: 22px; font-weight: 900; color: var(--yellow); font-family: 'Cinzel Decorative'; }
        
        .mode-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; font-size: 11px; font-weight: 800; }
        .mode-btn.active { background: var(--blue); border-color: var(--cyan); box-shadow: var(--gb); }
        .mode-btn.auto-active { background: var(--pink); border-color: #fff; animation: pulse 1s infinite; }

        .btn-main { 
            width: 100%; padding: 16px; border-radius: 50px; border: none; 
            background: linear-gradient(90deg, var(--pink), #b400dc); 
            color: #fff; font-family: 'Cinzel Decorative'; font-weight: 900; font-size: 18px; 
            box-shadow: var(--gp); cursor: pointer;
        }

        /* Nav Bar Sinkron */
        .nav-bar {
          height: 70px; background: #000; display: flex; justify-content: space-around;
          align-items: center; border-top: 1px solid var(--blue); padding-bottom: 5px;
        }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 10px; flex:1; }
        .nav-item.active { color: var(--blue); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .f-score { position: absolute; font-weight: 900; font-size: 24px; animation: floatUp 0.8s forwards; pointer-events: none; }
        @keyframes floatUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">NEON PLINKO</div>
        <div class="balance-box">
            <i class="fa-solid fa-coins" style="color:var(--yellow)"></i>
            <span id="saldo-text">IDR 0</span>
        </div>
    </div>

    <div id="game-area">
        <div id="board-wrapper">
            <canvas id="canvas"></canvas>
            <div class="m-bar" id="m-bar"></div>
        </div>
    </div>

    <div class="controls">
        <div class="bet-row">
            <i class="fa-solid fa-circle-minus" style="font-size:30px; color:var(--blue)" onclick="changeBet(-1)"></i>
            <div class="bet-val" id="bet-display">400</div>
            <i class="fa-solid fa-circle-plus" style="font-size:30px; color:var(--blue)" onclick="changeBet(1)"></i>
        </div>

        <div class="mode-row">
            <button class="mode-btn active" id="btn-normal" onclick="setMode('normal')">NORMAL</button>
            <button class="mode-btn" id="btn-turbo" onclick="setMode('turbo')">TURBO</button>
            <button class="mode-btn" id="btn-auto" onclick="toggleAuto()">AUTO</button>
        </div>

        <button class="btn-main" id="btn-action" onclick="handleAction()">DROP BALL</button>
    </div>

    <div class="nav-bar">
        <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i>DEPO</a>
        <a href="game.html" class="nav-item active"><i class="fas fa-gamepad"></i>PLAY</a>
        <a href="reward.html" class="nav-item"><i class="fas fa-gift"></i>REWARD</a>
        <a href="profil.html" class="nav-item"><i class="fas fa-user"></i>PROFIL</a>
    </div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    const engine = Engine.create({ gravity: { y: 1.5 } });
    const world = engine.world;
    
    const BETS = [400, 800, 2000, 5000, 10000, 50000, 100000];
    let betIdx = 0;
    let isTurbo = false;
    let isAuto = false;
    let autoTimer = null;
    let currentSaldo = 0;
    let userWinrate = 50;
    const user = getUsername();

    const multiValues = [10, 5, 2, 0.5, 0.2, 0.5, 2, 5, 10];
    const multiColors = ['#ff0077', '#ff0077', '#0055ff', '#1a1b3a', '#0a0b1e', '#1a1b3a', '#0055ff', '#ff0077', '#ff0077'];

    async function init() {
        if(!user) { window.location.href = 'index.html'; return; }
        setupPhysics();
        syncData();
        setInterval(syncData, 5000);
    }

    async function syncData() {
        const { data } = await _supabase.from('profiles').select('saldo, winrate').eq('username', user).single();
        if(data) {
            currentSaldo = data.saldo;
            userWinrate = data.winrate || 50;
            document.getElementById('saldo-text').innerText = "IDR " + currentSaldo.toLocaleString();
            localStorage.setItem('cached_saldo', currentSaldo);
        }
    }

    function setupPhysics() {
        const canvas = document.getElementById('canvas');
        const render = Render.create({
            canvas: canvas, engine: engine,
            options: { width: 400, height: 500, wireframes: false, background: 'transparent' }
        });

        // Pegs (Paku)
        for (let r = 0; r < 9; r++) {
            let pins = r + 3;
            for (let c = 0; c < pins; c++) {
                let x = 200 + (c - pins / 2 + 0.5) * 40;
                let y = 80 + r * 42;
                Composite.add(world, Bodies.circle(x, y, 4, { isStatic: true, render: { fillStyle: '#fff' } }));
            }
        }

        // Multiplier Slots
        const mBar = document.getElementById('m-bar');
        multiValues.forEach((v, i) => {
            const div = document.createElement('div');
            div.className = 'm-slot';
            div.style.background = multiColors[i];
            div.innerText = 'x'+v;
            mBar.appendChild(div);

            let x = 40 + i * 40;
            Composite.add(world, Bodies.rectangle(x, 490, 30, 10, { isStatic: true, isSensor: true, label: 'm_'+v, render: { visible: false } }));
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    }

    async function spawnBall() {
        const bet = BETS[betIdx];
        if(currentSaldo < bet) { stopAuto(); alert("Saldo tidak cukup!"); return; }

        currentSaldo -= bet;
        document.getElementById('saldo-text').innerText = "IDR " + currentSaldo.toLocaleString();

        // Admin Winrate Logic
        let startX = 200 + (Math.random() * 10 - 5);
        if(Math.random() * 100 > userWinrate) {
            startX = Math.random() > 0.5 ? 240 : 160; // Paksa ke samping jika winrate rendah
        }

        const ball = Bodies.circle(startX, 20, 8, {
            restitution: 0.5, friction: 0.01,
            render: { fillStyle: '#f5e642', strokeStyle: '#fff', lineWidth: 2 }
        });
        Composite.add(world, ball);

        const check = setInterval(async () => {
            if(ball.position.y > 480) {
                clearInterval(check);
                const sensors = Composite.allBodies(world).filter(b => b.label?.startsWith('m_'));
                let nearest = sensors[0]; let minD = 1000;
                sensors.forEach(s => { let d = Math.abs(s.position.x - ball.position.x); if(d < minD) { minD = d; nearest = s; } });

                const mult = parseFloat(nearest.label.split('_')[1]);
                const winAmt = Math.floor(bet * mult);
                
                Composite.remove(world, ball);
                showScore(ball.position.x, winAmt, mult);

                // Update Database (Via RPC untuk keamanan)
                const { data, error } = await _supabase.rpc('handle_plinko_win', { 
                    u_name: user, 
                    bet_amount: bet, 
                    win_amount: winAmt 
                });
                syncData();
            }
        }, 100);
    }

    function showScore(x, amt, mult) {
        const el = document.createElement('div');
        el.className = 'f-score';
        el.style.left = x + 'px';
        el.style.bottom = '100px';
        el.style.color = mult >= 1 ? 'var(--cyan)' : '#ff4d4d';
        el.innerText = (mult >= 1 ? "+" : "") + amt.toLocaleString();
        document.getElementById('board-wrapper').appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    function handleAction() { if(isAuto) stopAuto(); else spawnBall(); }

    function toggleAuto() {
        isAuto = !isAuto;
        const btn = document.getElementById('btn-auto');
        if(isAuto) {
            btn.classList.add('auto-active');
            autoTimer = setInterval(spawnBall, isTurbo ? 500 : 1200);
        } else stopAuto();
    }

    function stopAuto() {
        isAuto = false; clearInterval(autoTimer);
        document.getElementById('btn-auto').classList.remove('auto-active');
    }

    function setMode(m) {
        isTurbo = (m === 'turbo');
        document.getElementById('btn-normal').classList.toggle('active', !isTurbo);
        document.getElementById('btn-turbo').classList.toggle('active', isTurbo);
        if(isAuto) { stopAuto(); toggleAuto(); }
    }

    function changeBet(dir) {
        betIdx = Math.max(0, Math.min(BETS.length - 1, betIdx + dir));
        document.getElementById('bet-display').innerText = BETS[betIdx].toLocaleString();
    }

    window.onload = init;
</script>
</body>
</html>
