<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--bg:#02030d;
  --gp:0 0 8px rgba(255,0,119,.65),0 0 24px rgba(255,0,119,.22);
  --gb:0 0 8px rgba(0,85,255,.65),0 0 24px rgba(0,85,255,.22);
  --gy:0 0 8px rgba(245,230,66,.65),0 0 24px rgba(245,230,66,.22);
  --bp:rgba(255,0,119,.35);--bb:rgba(0,85,255,.35);--by:rgba(245,230,66,.35);
  /* New Gradient for Ball */
  --ball-grad: radial-gradient(circle at 30% 30%, #fff, #ff0077 40%, #880033 100%);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;overflow:hidden;
  display:flex;flex-direction:column;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 70% 40% at 15% 0%,rgba(0,55,255,.09) 0%,transparent 65%),
    radial-gradient(ellipse 55% 45% at 85% 100%,rgba(255,0,119,.08) 0%,transparent 65%);
  color:#dde0f0;font-family:'Outfit',sans-serif;
}

/* ── MODAL ── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:9998;}
#neon-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(160deg,#07091d,#0b0d24);border-radius:22px;z-index:9999;
  padding:26px 22px;text-align:center;min-width:270px;max-width:310px;width:86%;
  animation:mpop .3s cubic-bezier(.34,1.56,.64,1) both;}
#neon-modal.m-pink  {border:1px solid var(--bp);box-shadow:var(--gp);}
@keyframes mpop{from{opacity:0;transform:translate(-50%,-50%) scale(.7)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* ── HEADER ── */
.header{
  flex-shrink:0;z-index:10;padding:9px 14px;
  background:rgba(2,3,13,.96);border-bottom:1px solid rgba(0,85,255,.28);
  display:flex;align-items:center;justify-content:space-between;
}
.balance-box{flex:1;margin:0 10px;background:rgba(0,0,0,.55);
  border:1px solid var(--bp);border-radius:20px;padding:5px 16px;text-align:center;box-shadow:var(--gp);}
#display-saldo{font-family:'Cinzel Decorative',serif;font-size:15px;font-weight:900;color:#fff;text-shadow:var(--gp);}

/* ── BOARD ── */
#board-wrapper{flex:0 0 45vh;height:45vh;position:relative;overflow:hidden;background:#02030d;}
#plinko-canvas{display:block;width:100%;height:100%;touch-action:none;}

/* ── SCORE LIST ── */
#floating-score{
  position:absolute;top:6px;right:7px;
  background:rgba(2,3,13,.9);border:1px solid var(--bb);
  border-radius:11px;padding:5px 9px;z-index:50;min-width:88px;
}
.score-entry{font-size:9.5px;font-weight:700;color:var(--yellow);padding:3px 0;text-align:center;}

/* ── SLOT ROW ── */
.multiplier-row{flex-shrink:0;display:flex;justify-content:center;gap:4px;padding:0 12px;margin:5px 0 3px;}
.slot{flex:1;height:30px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;border-radius:8px;transition:.2s;}
.slot.active{transform:translateY(-8px);filter:brightness(2);box-shadow:0 0 20px #fff;}
.s-high{background:linear-gradient(135deg,var(--pink),#cc0044);color:#fff;}
.s-mid {background:linear-gradient(135deg,var(--yellow),#b8a800);color:#000;}
.s-low {background:linear-gradient(135deg,var(--blue),#0022bb);color:#fff;}

/* ── CONTROLS ── */
.controls{flex:1;padding:10px 16px 0;background:rgba(2,3,13,.97);border-top:1px solid rgba(0,85,255,.28);display:flex;flex-direction:column;gap:8px;}
.mode-row{display:flex;gap:8px;}
.btn-mode{flex:1;padding:9px 4px;border-radius:12px;font-size:10px;font-weight:700;cursor:pointer;background:transparent;border:1px solid #333;color:#888;}
.btn-mode.active{border-color:var(--blue);color:#fff;box-shadow:var(--gb);}

.bet-row{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.35);border:1px solid rgba(0,85,255,.2);border-radius:50px;padding:5px 10px;}
.bet-btn{font-size:22px;cursor:pointer;background:transparent;border:none;color:var(--pink);}
#current-bet{font-family:'Cinzel Decorative',serif;font-size:18px;font-weight:900;color:var(--yellow);}

.btn-play{width:100%;padding:15px;border-radius:50px;cursor:pointer;font-family:'Cinzel Decorative',serif;font-size:13px;font-weight:900;background:linear-gradient(90deg,var(--pink),var(--blue));color:#fff;border:1px solid var(--by);}
.btn-play.stop-mode{background:var(--yellow);color:#000;}

.nav-bottom{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:8px;}
.nav-btn{display:flex;flex-direction:column;align-items:center;padding:9px 0;border-radius:14px;text-decoration:none;font-size:10px;font-weight:700;border:1px solid #222;transition: 0.2s;}
.nav-btn i {font-size: 16px; margin-bottom: 4px;}
.nav-btn:active {transform: scale(0.95);}
</style>
</head>
<body>

<audio id="snd-hit"   src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="none"></audio>
<audio id="snd-win"   src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="none"></audio>

<div id="modal-overlay" onclick="closeModal()"></div>
<div id="neon-modal" class="m-pink">
  <div id="modal-title" style="color:var(--pink)">SYSTEM</div>
  <div id="modal-msg" style="font-size:12px;"></div>
  <button class="modal-btn" onclick="closeModal()" style="margin-top:10px;padding:8px 20px;border-radius:20px;border:1px solid var(--pink);color:var(--pink);background:transparent;">OK</button>
</div>

<div class="header">
  <div class="header-item" onclick="location.href='profil.html'"><i class="fa-solid fa-circle-user" style="color:var(--yellow)"></i><span style="font-size:8px;display:block;color:var(--yellow)">PROFIL</span></div>
  <div class="balance-box">
    <div style="font-size:7px;color:#666">SALDO UTAMA</div>
    <div id="display-saldo">IDR 0</div>
  </div>
  <div style="width:50px"></div>
</div>

<div id="board-wrapper">
  <canvas id="plinko-canvas"></canvas>
  <div id="floating-score"><div id="score-list"></div></div>
</div>

<div class="multiplier-row" id="slot-row"></div>

<div class="controls">
  <div class="mode-row">
    <button class="btn-mode active" id="m-normal" onclick="setSpeed('normal')">🎯 NORMAL</button>
    <button class="btn-mode" id="m-turbo" onclick="setSpeed('turbo')">⚡ TURBO</button>
    <button class="btn-mode" id="m-auto" onclick="toggleAuto()">🔄 AUTO: OFF</button>
  </div>
  <div class="bet-row">
    <button class="bet-btn" onclick="changeBet(-1)"><i class="fa-solid fa-circle-minus"></i></button>
    <div style="flex:1;text-align:center;"><div id="current-bet">400</div></div>
    <button class="bet-btn" onclick="changeBet(1)" style="color:var(--blue)"><i class="fa-solid fa-circle-plus"></i></button>
  </div>
  <button class="btn-play" id="main-btn" onclick="handlePlay()">PLAY BALL</button>
  <div class="nav-bottom">
    <a href="withdraw.html" class="nav-btn" style="color:var(--yellow); border-color: var(--by);">
        <i class="fa-solid fa-money-bill-transfer"></i>
        <span>WITHDRAW</span>
    </a>
    <a href="deposit.html" class="nav-btn" style="color:var(--pink); border-color: var(--bp);">
        <i class="fa-solid fa-wallet"></i>
        <span>DEPOSIT</span>
    </a>
    <a href="reward.html" class="nav-btn" style="color:var(--blue); border-color: var(--bb);">
        <i class="fa-solid fa-gift"></i>
        <span>REWARD</span>
    </a>
  </div>
</div>

<script src="global.js"></script>
<script>
// ── CONFIG ──
const ROWS = 9; 
const MULTS = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
const BETS = [400, 800, 1000, 2000, 5000, 10000, 20000];
const BALL_R = 7;
const PEG_R = 4;

let canvas, ctx, BW, BH, slotW;
let pegs = [], balls = [];
let speedMode = 'normal';
let isAuto = false;
let autoTimer = null;
let betIdx = 0;

// ── ENGINE ──
function setupCanvas() {
    canvas = document.getElementById('plinko-canvas');
    ctx = canvas.getContext('2d');
    const wrap = document.getElementById('board-wrapper');
    
    BW = wrap.offsetWidth; 
    BH = wrap.offsetHeight;
    
    const dpr = window.devicePixelRatio || 1;
    canvas.width = BW * dpr; 
    canvas.height = BH * dpr;
    canvas.style.width = BW + 'px'; 
    canvas.style.height = BH + 'px';
    ctx.scale(dpr, dpr);

    pegs = [];
    const spX = BW / (ROWS + 2);
    const spY = (BH - 40) / ROWS;
    
    for (let r = 0; r < ROWS; r++) {
        const count = r + 3; 
        const startX = (BW - (count - 1) * spX) / 2;
        for (let c = 0; c < count; c++) {
            pegs.push({ x: startX + c * spX, y: 30 + r * spY, glow: 0 });
        }
    }

    const row = document.getElementById('slot-row');
    row.innerHTML = '';
    slotW = BW / MULTS.length;
    MULTS.forEach((m, i) => {
        const s = document.createElement('div');
        s.id = 'slot-'+i;
        s.className = `slot ${m>=3?'s-high':m>=1?'s-mid':'s-low'}`;
        s.textContent = m+'x';
        row.appendChild(s);
    });
}

async function spawnBall() {
    const bet = BETS[betIdx];
    if (getSaldo() < bet) {
        showModal("Saldo tidak cukup!");
        stopAuto();
        return;
    }

    try {
        const res = await apiCall({ action: 'game_play', username: getUsername(), bet: bet });
        if (!res || res.result !== 'SUCCESS') {
            showModal("Server Sibuk...");
            return;
        }

        setSaldo(getSaldo() - bet);
        updateSaldoUI();

        const ball = {
            x: BW / 2 + (Math.random() - 0.5) * 10,
            y: -10,
            vx: (Math.random() - 0.5) * 2,
            vy: 2,
            bet: bet,
            targetMult: res.target_multiplier,
            targetSlotIdx: null,
            targetX: 0,
            isDone: false
        };

        const possibleSlots = [];
        MULTS.forEach((m, i) => { if(m === ball.targetMult) possibleSlots.push(i); });
        ball.targetSlotIdx = possibleSlots[Math.floor(Math.random() * possibleSlots.length)];
        ball.targetX = (ball.targetSlotIdx + 0.5) * slotW;

        balls.push(ball);
    } catch(e) {
        console.error("Spawn Error:", e);
    }
}

function updatePhysics() {
    const gravity = speedMode === 'turbo' ? 0.38 : 0.25;
    const bounce = 0.45;

    balls.forEach(b => {
        if (b.isDone) return;

        b.vy += gravity;
        b.x += b.vx;
        b.y += b.vy;

        pegs.forEach(p => {
            const dx = b.x - p.x;
            const dy = b.y - p.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < BALL_R + PEG_R) {
                const angle = Math.atan2(dy, dx);
                const speed = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
                
                b.vx = Math.cos(angle) * speed * bounce + (Math.random()-0.5);
                b.vy = Math.abs(Math.sin(angle) * speed * bounce);
                
                b.x = p.x + Math.cos(angle) * (BALL_R + PEG_R + 1);
                b.y = p.y + Math.sin(angle) * (BALL_R + PEG_R + 1);

                p.glow = 1.5; 
                try {
                  const s = document.getElementById('snd-hit').cloneNode();
                  s.volume = 0.4;
                  s.play();
                } catch(e){}
            }
        });

        if (b.y > BH * 0.4) {
            const pull = (b.targetX - b.x) * 0.05;
            b.vx += pull;
        }

        if (b.x < BALL_R) { b.x = BALL_R; b.vx *= -0.5; }
        if (b.x > BW - BALL_R) { b.x = BW - BALL_R; b.vx *= -0.5; }

        if (b.y > BH - 5) {
            b.isDone = true;
            onBallLand(b);
        }
    });
    balls = balls.filter(b => !b.isDone);
}

function onBallLand(b) {
    const win = Math.floor(b.bet * b.targetMult);
    setSaldo(getSaldo() + win);
    updateSaldoUI();

    const el = document.getElementById('slot-' + b.targetSlotIdx);
    if(el) {
        el.classList.add('active');
        setTimeout(() => el.classList.remove('active'), 400);
    }

    const list = document.getElementById('score-list');
    const entry = document.createElement('div');
    entry.className = 'score-entry';
    entry.innerHTML = `${b.targetMult}x · <span style="color:#fff">IDR ${win.toLocaleString()}</span>`;
    list.prepend(entry);
    if(list.children.length > 4) list.removeChild(list.lastChild);

    if (b.targetMult >= 1) document.getElementById('snd-win').play();
}

function draw() {
    if(!ctx) return;
    ctx.clearRect(0, 0, BW, BH);

    pegs.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, PEG_R, 0, Math.PI*2);
        const intensity = 0.2 + (p.glow * 0.5);
        ctx.fillStyle = p.glow > 0 ? `rgba(245, 230, 66, ${intensity})` : '#444';
        if(p.glow > 0) {
            ctx.shadowBlur = 10 * p.glow;
            ctx.shadowColor = 'var(--yellow)';
        }
        ctx.fill();
        ctx.shadowBlur = 0;
        if(p.glow > 0) p.glow -= 0.1;
    });

    balls.forEach(b => {
        ctx.save();
        // Efek Outer Glow Bola
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ff0077';
        
        // Warna Gradasi Premium pada Bola
        let grad = ctx.createRadialGradient(b.x - 2, b.y - 2, 1, b.x, b.y, BALL_R);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.3, '#ff0077');
        grad.addColorStop(1, '#660022');
        
        ctx.beginPath();
        ctx.arc(b.x, b.y, BALL_R, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.fill();
        
        // Kilauan Putih Kecil di atas bola (Highlighter)
        ctx.beginPath();
        ctx.arc(b.x - 2, b.y - 2, 2, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fill();
        ctx.restore();
    });

    updatePhysics();
    requestAnimationFrame(draw);
}

function changeBet(d) {
    if (isAuto) return;
    betIdx = Math.max(0, Math.min(BETS.length - 1, betIdx + d));
    document.getElementById('current-bet').innerText = BETS[betIdx].toLocaleString();
}

function setSpeed(m) {
    speedMode = m;
    document.getElementById('m-normal').classList.toggle('active', m === 'normal');
    document.getElementById('m-turbo').classList.toggle('active', m === 'turbo');
}

function toggleAuto() {
    isAuto = !isAuto;
    const btn = document.getElementById('m-auto');
    const play = document.getElementById('main-btn');
    if (isAuto) {
        btn.classList.add('active');
        btn.innerText = "🔄 AUTO: ON";
        play.innerText = "STOP AUTO";
        play.classList.add('stop-mode');
        spawnBall();
        autoTimer = setInterval(spawnBall, speedMode === 'turbo' ? 380 : 1000);
    } else {
        stopAuto();
    }
}

function stopAuto() {
    isAuto = false;
    clearInterval(autoTimer);
    document.getElementById('m-auto').classList.remove('active');
    document.getElementById('m-auto').innerText = "🔄 AUTO: OFF";
    document.getElementById('main-btn').innerText = "PLAY BALL";
    document.getElementById('main-btn').classList.remove('stop-mode');
}

function handlePlay() {
    if (isAuto) stopAuto();
    else spawnBall();
}

function updateSaldoUI() {
    document.getElementById('display-saldo').innerText = "IDR " + getSaldo().toLocaleString();
}

function showModal(m) {
    document.getElementById('modal-msg').innerText = m;
    document.getElementById('modal-overlay').style.display = 'block';
    document.getElementById('neon-modal').style.display = 'block';
}

function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('neon-modal').style.display = 'none';
}

window.addEventListener('load', () => {
    setupCanvas();
    updateSaldoUI();
    draw();
});

window.addEventListener('resize', setupCanvas);
</script>
</body>
</html>
