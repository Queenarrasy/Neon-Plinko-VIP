<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>NEON PLINKO VIP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --deepblue: #0044ff; --yellow: #f5e642; --bg: #030510; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; }

        /* NEON GLASS HEADER */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: rgba(0, 68, 255, 0.05);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--deepblue);
        }
        .nav-link { color: var(--blue); text-decoration: none; font-weight: 800; font-size: 12px; letter-spacing: 1px; }
        #balance { color: var(--yellow); font-size: 16px; font-weight: 800; text-shadow: 0 0 10px var(--yellow); }
        .logo { font-family: 'Cinzel Decorative'; color: var(--pink); font-size: 14px; }

        /* FLOATING WIN HISTORY (3 LINES) */
        #win-history { position: absolute; top: 85px; left: 15px; z-index: 5; }
        .win-tag { 
            background: rgba(255, 0, 119, 0.1); border-left: 3px solid var(--pink);
            padding: 6px 12px; margin-bottom: 6px; border-radius: 4px;
            font-size: 11px; font-weight: 700; color: var(--pink);
            animation: glowIn 0.4s ease-out;
        }
        @keyframes glowIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* GAME BOARD */
        #canvas-wrapper { width: 100%; height: 55vh; position: relative; margin-top: 10px; }
        canvas { display: block; margin: 0 auto; }

        /* CONTROL PANEL RE-DESIGNED (NOT RIGID) */
        .controls { 
            position: fixed; bottom: 0; width: 100%; padding: 25px; 
            background: linear-gradient(0deg, #030510 70%, transparent);
        }
        .bet-scroll { 
            display: flex; align-items: center; justify-content: center; gap: 25px; margin-bottom: 20px;
        }
        .btn-round { 
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--blue);
            background: transparent; color: var(--blue); font-size: 24px; cursor: pointer;
            box-shadow: inset 0 0 10px var(--deepblue); transition: 0.2s;
        }
        .btn-round:active { transform: scale(0.9); background: var(--blue); color: #000; }
        #bet-txt { font-size: 28px; font-weight: 900; color: var(--yellow); }

        .mode-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-mode { 
            flex: 1; padding: 12px; border-radius: 15px; border: 1px solid var(--deepblue);
            background: rgba(0, 68, 255, 0.1); color: #fff; font-size: 11px; font-weight: 700;
            text-transform: uppercase; cursor: pointer;
        }
        .btn-mode.active { background: var(--pink); border-color: var(--pink); box-shadow: 0 0 15px var(--pink); }

        .btn-drop { 
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: linear-gradient(45deg, var(--deepblue), var(--pink));
            color: #fff; font-size: 18px; font-weight: 900; letter-spacing: 3px;
            box-shadow: 0 10px 25px rgba(255, 0, 119, 0.3); cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="profil.html" class="nav-link">PROFIL</a>
        <div id="balance">IDR 243.600</div>
        <div class="logo">NEON PLINKO</div>
    </div>

    <div id="win-history"></div>
    <div id="canvas-wrapper"></div>

    <div class="controls">
        <div class="bet-scroll">
            <button class="btn-round" onclick="adj(-100)">-</button>
            <div id="bet-txt">200</div>
            <button class="btn-round" onclick="adj(100)">+</button>
        </div>

        <div class="mode-row">
            <button class="btn-mode active" id="m-norm" onclick="setMode('NORMAL')">Normal</button>
            <button class="btn-mode" id="m-turb" onclick="setMode('TURBO')">Turbo</button>
            <button class="btn-mode" id="m-auto" onclick="setMode('AUTO')">Auto</button>
        </div>

        <button class="btn-drop" onclick="startAction()">DROP BALL</button>
    </div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    const engine = Engine.create();
    const wrapper = document.getElementById('canvas-wrapper');
    const w = wrapper.clientWidth, h = wrapper.clientHeight;

    const render = Render.create({
        element: wrapper, engine: engine,
        options: { width: w, height: h, wireframes: false, background: 'transparent' }
    });

    // CUSTOM PHYSICS CONFIG
    const rows = 9;
    const pinGap = w / 10;
    const multis = [5, 2, 0.5, 0.2, 0.2, 0.5, 2, 5]; // Desain lebih lebar

    for(let i=2; i<=rows; i++) {
        for(let j=0; j<i; j++) {
            const px = (w/2) - (i-1)*pinGap/2 + j*pinGap;
            const py = 40 + (i-1)*pinGap;
            Composite.add(engine.world, Bodies.circle(px, py, 3, { isStatic: true, render: { fillStyle: '#fff' } }));
        }
    }

    multis.forEach((m, i) => {
        const bw = w / multis.length;
        const bx = (i * bw) + bw/2;
        const by = 40 + rows * pinGap + 35;
        Composite.add(engine.world, Bodies.rectangle(bx, by, bw-6, 30, { 
            isStatic: true, isSensor: true, label: 'm_'+m, 
            render: { fillStyle: 'rgba(255, 0, 119, 0.05)' } 
        }));
        
        const label = document.createElement('div');
        label.innerHTML = `x${m}`;
        label.style.cssText = `position:absolute; left:${bx-12}px; top:${by-10}px; font-size:10px; font-weight:900; color:var(--pink);`;
        wrapper.appendChild(label);
    });

    let balance = 243600, bet = 200, mode = 'NORMAL', autoInt = null;

    function adj(v) { if(bet+v >= 100) { bet+=v; document.getElementById('bet-txt').innerText = bet; } }
    
    function setMode(m) {
        mode = m;
        document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
        document.getElementById('m-'+m.toLowerCase().substring(0,4)).classList.add('active');
        if(m !== 'AUTO') { clearInterval(autoInt); autoInt = null; }
    }

    function startAction() {
        if(mode === 'AUTO') {
            if(autoInt) { clearInterval(autoInt); autoInt = null; }
            else { autoInt = setInterval(drop, 400); }
        } else { drop(); }
    }

    function drop() {
        if(balance < bet) return;
        balance -= bet; updateUI();
        const b = Bodies.circle(w/2 + (Math.random()*4-2), 10, 6, {
            restitution: 0.5, friction: 0.01, label: 'ball',
            render: { fillStyle: 'var(--yellow)' }
        });
        Composite.add(engine.world, b);
    }

    Events.on(engine, 'collisionStart', (e) => {
        e.pairs.forEach(p => {
            if(p.bodyA.label.startsWith('m_') && p.bodyB.label === 'ball') {
                const m = parseFloat(p.bodyA.label.split('_')[1]);
                const win = Math.floor(bet * m);
                balance += win; updateUI();
                logWin(win);
                Composite.remove(engine.world, p.bodyB);
            }
        });
    });

    function logWin(v) {
        const hist = document.getElementById('win-history');
        const tag = document.createElement('div');
        tag.className = 'win-tag'; tag.innerText = `+IDR ${v.toLocaleString()}`;
        hist.prepend(tag);
        if(hist.children.length > 3) hist.lastChild.remove();
    }

    function updateUI() { document.getElementById('balance').innerText = `IDR ${balance.toLocaleString()}`; }

    Render.run(render); Runner.run(Runner.create(), engine);
</script>
</body>
</html>
