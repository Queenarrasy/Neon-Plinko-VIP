<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NEON PLINKO VIP - PRO EDITION</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--bg:#02030d;
  --gp:0 0 12px rgba(255,0,119,.7),0 0 30px rgba(255,0,119,.3);
  --gb:0 0 12px rgba(0,85,255,.7),0 0 30px rgba(0,85,255,.3);
  --gy:0 0 12px rgba(245,230,66,.7),0 0 30px rgba(245,230,66,.3);
  --bp:rgba(255,0,119,.35);--bb:rgba(0,85,255,.35);--by:rgba(245,230,66,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;overflow:hidden;
  display:flex;flex-direction:column;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 70% 40% at 15% 0%,rgba(0,55,255,.12) 0%,transparent 65%),
    radial-gradient(ellipse 55% 45% at 85% 100%,rgba(255,0,119,.1) 0%,transparent 65%);
  color:#dde0f0;font-family:'Outfit',sans-serif;
}
/* Modal & Overlay */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:9998;}
#neon-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(160deg,#07091d,#0b0d24);border-radius:22px;z-index:9999;
  padding:26px 22px;text-align:center;min-width:280px;width:86%;
  animation:mpop .3s cubic-bezier(.34,1.56,.64,1) both;}
#neon-modal.m-pink{border:1px solid var(--bp);box-shadow:var(--gp);}
@keyframes mpop{from{opacity:0;transform:translate(-50%,-50%) scale(.7)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

.header{
  flex-shrink:0;z-index:10;padding:12px 14px;
  background:rgba(2,3,13,.98);border-bottom:1px solid rgba(0,85,255,.3);
  display:flex;align-items:center;justify-content:space-between;
}
.balance-box{flex:1;margin:0 15px;background:rgba(0,0,0,0.6);
  border:1px solid var(--bp);border-radius:25px;padding:6px 16px;text-align:center;box-shadow:var(--gp);}
#display-saldo{font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:900;color:#fff;text-shadow:var(--gp);}

#board-wrapper{flex:0 0 45vh;height:45vh;position:relative;overflow:hidden;background:#02030d;}
#plinko-canvas{display:block;width:100%;height:100%;touch-action:none;}

#floating-score{
  position:absolute;top:10px;right:10px;
  background:rgba(2,3,13,.85);border:1px solid var(--bb);
  border-radius:12px;padding:6px 10px;z-index:50;min-width:90px;
}
.score-entry{font-size:10px;font-weight:700;color:var(--yellow);padding:4px 0;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05);}

.multiplier-row{flex-shrink:0;display:flex;justify-content:center;gap:4px;padding:0 10px;margin:8px 0 4px;}
.slot{flex:1;height:32px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;border-radius:8px;transition:0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
.slot.active{transform:scale(1.1) translateY(-5px);filter:brightness(1.5);box-shadow:0 0 25px #fff;}
.s-high{background:linear-gradient(135deg,var(--pink),#cc0044);color:#fff;box-shadow: inset 0 0 5px rgba(0,0,0,0.3);}
.s-mid{background:linear-gradient(135deg,var(--yellow),#b8a800);color:#000;}
.s-low{background:linear-gradient(135deg,var(--blue),#0022bb);color:#fff;}

.controls{flex:1;padding:12px 16px;background:rgba(2,3,13,.98);border-top:1px solid rgba(0,85,255,.3);display:flex;flex-direction:column;gap:10px;}
.mode-row{display:flex;gap:8px;}
.btn-mode{flex:1;padding:10px 4px;border-radius:12px;font-size:10px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.03);border:1px solid #333;color:#888;transition:0.2s;}
.btn-mode.active{border-color:var(--blue);color:#fff;box-shadow:var(--gb);background:rgba(0,85,255,0.1);}

.bet-row{display:flex;align-items:center;gap:15px;background:rgba(0,0,0,.4);border:1px solid rgba(0,85,255,0.25);border-radius:50px;padding:6px 15px;}
.bet-btn{font-size:24px;cursor:pointer;background:transparent;border:none;color:var(--pink);transition: 0.1s;}
.bet-btn:active{transform:scale(0.9);}
#current-bet{font-family:'Cinzel Decorative',serif;font-size:18px;font-weight:900;color:var(--yellow);text-shadow:var(--gy);}

.btn-play{width:100%;padding:16px;border-radius:50px;cursor:pointer;font-family:'Cinzel Decorative',serif;font-size:14px;font-weight:900;background:linear-gradient(90deg,var(--pink),var(--blue));color:#fff;border:none;box-shadow:var(--gp);transition:0.2s;}
.btn-play:active{transform:scale(0.97);filter:brightness(1.2);}
.btn-play.stop-mode{background:var(--yellow);color:#000;box-shadow:var(--gy);}

.nav-bottom{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding-top:10px;}
.nav-btn{display:flex;flex-direction:column;align-items:center;padding:10px 0;border-radius:15px;text-decoration:none;font-size:10px;font-weight:700;border:1px solid #222;background:rgba(255,255,255,0.02);}
.nav-btn i{font-size:18px;margin-bottom:5px;}
</style>
</head>
<body>

<audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
<audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>

<div id="modal-overlay" onclick="closeModal()"></div>
<div id="neon-modal" class="m-pink">
  <div id="modal-title" style="color:var(--pink);font-family:'Cinzel Decorative',serif;font-size:14px;font-weight:700;letter-spacing:1px;">SYSTEM</div>
  <div id="modal-msg" style="font-size:13px;color:rgba(220,220,240,.8);margin-top:10px;line-height:1.6;"></div>
  <button onclick="closeModal()" style="margin-top:18px;padding:10px 30px;border-radius:25px;border:1px solid var(--pink);color:var(--pink);background:transparent;font-weight:700;">OK</button>
</div>

<div class="header">
  <div style="cursor:pointer;text-align:center;" onclick="location.href='profil.html'">
    <i class="fa-solid fa-circle-user" style="color:var(--yellow);font-size:22px;"></i>
    <span style="font-size:8px;display:block;color:var(--yellow);margin-top:2px;">PROFIL</span>
  </div>
  <div class="balance-box">
    <div style="font-size:8px;color:#aaa;letter-spacing:1px;">SALDO UTAMA</div>
    <div id="display-saldo">IDR 0</div>
  </div>
  <div style="width:40px"></div>
</div>

<div id="board-wrapper">
  <canvas id="plinko-canvas"></canvas>
  <div id="floating-score"><div id="score-list"></div></div>
</div>

<div class="multiplier-row" id="slot-row"></div>

<div class="controls">
  <div class="mode-row">
    <button class="btn-mode active" id="m-normal" onclick="setSpeed('normal')"><i class="fa-solid fa-play"></i> NORMAL</button>
    <button class="btn-mode" id="m-turbo" onclick="setSpeed('turbo')"><i class="fa-solid fa-bolt"></i> TURBO</button>
    <button class="btn-mode" id="m-auto" onclick="toggleAuto()"><i class="fa-solid fa-sync"></i> AUTO: OFF</button>
  </div>
  <div class="bet-row">
    <button class="bet-btn" onclick="changeBet(-1)"><i class="fa-solid fa-circle-minus"></i></button>
    <div style="flex:1;text-align:center;"><div id="current-bet">400</div></div>
    <button class="bet-btn" onclick="changeBet(1)" style="color:var(--blue)"><i class="fa-solid fa-circle-plus"></i></button>
  </div>
  <button class="btn-play" id="main-btn" onclick="handlePlay()">PLAY BALL</button>
  <div class="nav-bottom">
    <a href="withdraw.html" class="nav-btn" style="color:var(--yellow);border-color:var(--by);"><i class="fa-solid fa-money-bill-transfer"></i><span>WITHDRAW</span></a>
    <a href="deposit.html" class="nav-btn" style="color:var(--pink);border-color:var(--bp);"><i class="fa-solid fa-wallet"></i><span>DEPOSIT</span></a>
    <a href="reward.html" class="nav-btn" style="color:var(--blue);border-color:var(--bb);"><i class="fa-solid fa-gift"></i><span>REWARD</span></a>
  </div>
</div>

<script src="global.js"></script>
<script>
/**
 * PRO EDITION PHYSICS - NEON PLINKO VIP
 * Menyempurnakan pantulan agar terasa lebih realistik.
 */

var ROWS   = 9;
var MULTS  = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
var BETS   = [400, 800, 1000, 2000, 5000, 10000, 20000];
var BALL_R = 7;
var PEG_R  = 3.5;

var PHYSICS = {
    normal: {
        grav:       0.32,
        friction:   0.99,
        bounce:     0.52,
        initVy:     2.0,
        steerLimit: 0.15, // Lebih halus
        lockY:      0.80
    },
    turbo: {
        grav:       0.65,
        friction:   0.98,
        bounce:     0.48,
        initVy:     4.5,
        steerLimit: 0.25,
        lockY:      0.80
    }
};

var canvas, ctx, BW, BH, slotW;
var pegs = [], balls = [], _pendingLand = [];
var speedMode = 'normal';
var isAuto = false, autoTimer = null;
var betIdx = 0, _displaySaldo = 0;

function setupCanvas() {
    canvas = document.getElementById('plinko-canvas');
    ctx    = canvas.getContext('2d');
    var wrap = document.getElementById('board-wrapper');
    BW = wrap.offsetWidth;
    BH = wrap.offsetHeight;

    var dpr = window.devicePixelRatio || 1;
    canvas.width = BW * dpr; canvas.height = BH * dpr;
    canvas.style.width = BW + 'px'; canvas.style.height = BH + 'px';
    ctx.scale(dpr, dpr);

    pegs = [];
    var spX = BW / (ROWS + 2.5);
    var spY = (BH - 60) / ROWS;
    for (var r = 0; r < ROWS; r++) {
        var cnt = r + 3;
        var startX = (BW - (cnt - 1) * spX) / 2;
        for (var c = 0; c < cnt; c++) {
            pegs.push({ x: startX + c * spX, y: 40 + r * spY, glow: 0 });
        }
    }

    var row = document.getElementById('slot-row');
    row.innerHTML = '';
    slotW = BW / MULTS.length;
    MULTS.forEach((m, i) => {
        var s = document.createElement('div');
        s.id = 'slot-' + i;
        s.className = 'slot ' + (m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low');
        s.textContent = m + 'x';
        row.appendChild(s);
    });
}

function spawnBall() {
    var bet = BETS[betIdx];
    if (_displaySaldo < bet) {
        showModal('Saldo tidak cukup!', 'ERROR');
        stopAuto(); return;
    }
    if (isAuto && balls.length >= 3) return;

    var ph = PHYSICS[speedMode];
    _displaySaldo -= bet; updateSaldoDisplay();

    var ball = {
        x: BW/2 + (Math.random()-0.5)*15, y: -10,
        vx: (Math.random()-0.5)*2, vy: ph.initVy,
        history: [], // Untuk motion trail
        targetSlotIdx: null, targetX: null, status: 'wait', isDone: false, bet: bet
    };
    balls.push(ball);

    // KONEKSI SERVER (global.js)
    GameEngine.processPlay(bet).then(res => {
        if (!res || res.result !== 'SUCCESS') {
            ball.isDone = true; _displaySaldo += bet; updateSaldoDisplay(); return;
        }
        var slots = [];
        MULTS.forEach((m, i) => { if(m === res.multiplier) slots.push(i); });
        var tIdx = slots.length ? slots[Math.floor(Math.random()*slots.length)] : Math.floor(MULTS.length/2);
        
        ball.targetSlotIdx = tIdx;
        ball.targetX = (tIdx + 0.5) * slotW;
        ball.targetMult = res.multiplier;
        ball.winAmount = res.winAmount;
        ball.status = 'ready';

        var pi = _pendingLand.indexOf(ball);
        if (pi >= 0) { _pendingLand.splice(pi, 1); onBallLand(ball); }
    }).catch(() => { ball.isDone = true; _displaySaldo += bet; updateSaldoDisplay(); });
}

function updatePhysics() {
    var ph = PHYSICS[speedMode];
    balls.forEach(b => {
        if (b.isDone) return;

        // Simpan history posisi untuk trail (efek neon mengalir)
        b.history.push({x: b.x, y: b.y});
        if (b.history.length > 6) b.history.shift();

        b.vy += ph.grav;
        b.vx *= ph.friction;
        b.x  += b.vx;
        b.y  += b.vy;

        // Realistic Peg Collision
        pegs.forEach(p => {
            var dx = b.x - p.x, dy = b.y - p.y;
            var dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < BALL_R + PEG_R) {
                var angle = Math.atan2(dy, dx);
                var speed = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
                
                // Pantulan Vektor
                b.vx = Math.cos(angle) * speed * ph.bounce + (Math.random()-0.5)*0.8;
                b.vy = Math.abs(Math.sin(angle) * speed * ph.bounce) + 0.5;
                
                // Prevent sticking
                var overlap = (BALL_R + PEG_R) - dist;
                b.x += Math.cos(angle) * overlap;
                b.y += Math.sin(angle) * overlap;

                p.glow = 1.0;
                playSound('snd-hit', 0.2);
            }
        });

        // "Invisible Hand" Steering - Agar menuju target secara halus
        if (b.status === 'ready' && b.targetX !== null) {
            var progY = b.y / BH;
            var distX = b.targetX - b.x;
            
            if (progY > 0.4) {
                var force = progY > ph.lockY ? 0.35 : ph.steerLimit;
                b.vx += distX * force * 0.1;
            }
        }

        // Wall bounce
        if (b.x < BALL_R) { b.x = BALL_R; b.vx *= -0.5; }
        if (b.x > BW - BALL_R) { b.x = BW - BALL_R; b.vx *= -0.5; }

        if (b.y > BH + BALL_R) {
            b.isDone = true;
            if (b.status === 'ready') onBallLand(b);
            else _pendingLand.push(b);
        }
    });
    balls = balls.filter(b => !b.isDone);
}

function onBallLand(b) {
    _displaySaldo += b.winAmount;
    updateSaldoDisplay();

    var el = document.getElementById('slot-' + b.targetSlotIdx);
    if (el) {
        el.classList.add('active');
        setTimeout(() => el.classList.remove('active'), 500);
    }

    var list = document.getElementById('score-list');
    var entry = document.createElement('div');
    entry.className = 'score-entry';
    var color = b.targetMult >= 3 ? 'var(--pink)' : (b.targetMult >= 1 ? 'var(--yellow)' : '#5588ff');
    entry.innerHTML = `<span style="color:${color}">${b.targetMult}x</span> <span style="color:#fff">IDR ${b.winAmount.toLocaleString()}</span>`;
    list.prepend(entry);
    if (list.children.length > 5) list.removeChild(list.lastChild);
    if (b.targetMult >= 1) playSound('snd-win', 0.5);
}

function draw() {
    ctx.clearRect(0, 0, BW, BH);

    // Draw Pegs
    pegs.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, PEG_R, 0, Math.PI*2);
        if (p.glow > 0) {
            ctx.shadowBlur = 15 * p.glow;
            ctx.shadowColor = '#fff';
            ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + p.glow*0.7})`;
            p.glow -= 0.05;
        } else {
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#333b5c';
        }
        ctx.fill();
    });

    // Draw Balls with Trails
    balls.forEach(b => {
        // Trail
        b.history.forEach((pos, i) => {
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, BALL_R * (i/b.history.length), 0, Math.PI*2);
            ctx.fillStyle = b.status === 'ready' ? `rgba(255,0,119,${i*0.1})` : `rgba(0,85,255,${i*0.1})`;
            ctx.fill();
        });

        // Ball body
        ctx.save();
        ctx.shadowBlur = 20;
        ctx.shadowColor = b.status === 'ready' ? varToHex('--pink') : varToHex('--blue');
        
        var grad = ctx.createRadialGradient(b.x-2, b.y-2, 1, b.x, b.y, BALL_R);
        if (b.status === 'ready') {
            grad.addColorStop(0, '#fff'); grad.addColorStop(0.4, '#ff0077'); grad.addColorStop(1, '#440022');
        } else {
            grad.addColorStop(0, '#fff'); grad.addColorStop(0.4, '#0055ff'); grad.addColorStop(1, '#001144');
        }
        
        ctx.beginPath();
        ctx.arc(b.x, b.y, BALL_R, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.restore();
    });

    updatePhysics();
    requestAnimationFrame(draw);
}

function varToHex(v) { return v === '--pink' ? '#ff0077' : '#0055ff'; }

function playSound(id, vol) {
    try {
        var s = document.getElementById(id).cloneNode();
        s.volume = vol; s.play().catch(()=>{});
    } catch(e){}
}

function changeBet(d) {
    if (isAuto) return;
    betIdx = Math.max(0, Math.min(BETS.length - 1, betIdx + d));
    document.getElementById('current-bet').textContent = BETS[betIdx].toLocaleString();
}

function setSpeed(m) {
    speedMode = m;
    document.getElementById('m-normal').classList.toggle('active', m === 'normal');
    document.getElementById('m-turbo').classList.toggle('active', m === 'turbo');
}

function toggleAuto() {
    isAuto = !isAuto;
    var btn = document.getElementById('m-auto');
    var main = document.getElementById('main-btn');
    if (isAuto) {
        btn.classList.add('active'); btn.innerHTML = '<i class="fa-solid fa-sync fa-spin"></i> AUTO: ON';
        main.textContent = 'STOP AUTO'; main.classList.add('stop-mode');
        spawnBall();
        autoTimer = setInterval(spawnBall, speedMode === 'turbo' ? 500 : 1000);
    } else {
        stopAuto();
    }
}

function stopAuto() {
    isAuto = false; clearInterval(autoTimer);
    document.getElementById('m-auto').classList.remove('active');
    document.getElementById('m-auto').innerHTML = '<i class="fa-solid fa-sync"></i> AUTO: OFF';
    document.getElementById('main-btn').textContent = 'PLAY BALL';
    document.getElementById('main-btn').classList.remove('stop-mode');
}

function handlePlay() { if (isAuto) stopAuto(); else spawnBall(); }

function updateSaldoDisplay() {
    document.getElementById('display-saldo').textContent = 'IDR ' + Math.floor(_displaySaldo).toLocaleString('id-ID');
}

function showModal(msg, title) {
    document.getElementById('modal-title').textContent = title || 'INFO';
    document.getElementById('modal-msg').textContent = msg;
    document.getElementById('modal-overlay').style.display = 'block';
    document.getElementById('neon-modal').style.display = 'block';
}

function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('neon-modal').style.display = 'none';
}

window.addEventListener('DOMContentLoaded', () => {
    setupCanvas();
    // Integrasi session dari global.js
    if (typeof _session !== 'undefined') _displaySaldo = _session.saldo;
    updateSaldoDisplay();
    draw();
});
window.addEventListener('resize', setupCanvas);
</script>
</body>
</html>
