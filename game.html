<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root{--pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--green:#00ff88;--bg:#000008;
              --gp:0 0 10px rgba(255,0,119,.55),0 0 25px rgba(255,0,119,.2);
              --gb:0 0 10px rgba(0,34,255,.55),0 0 25px rgba(0,34,255,.2);
              --gy:0 0 10px rgba(251,255,0,.55),0 0 25px rgba(251,255,0,.2);}
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;
             min-height:100vh;overflow-x:hidden;padding-bottom:80px;}
        #particles-js{position:fixed;top:0;left:0;width:100%;height:100%;
                      z-index:0;pointer-events:none;
                      background:radial-gradient(ellipse at 50% 25%,#00001a 0%,#000008 100%);}

        /* ALERT */
        #neon-alert{position:fixed;top:-110px;left:50%;transform:translateX(-50%);
            width:90%;max-width:340px;background:rgba(0,0,18,.98);
            border:1.5px solid var(--pink);border-top:2px solid var(--yellow);
            color:#fff;padding:12px 18px;border-radius:14px;text-align:center;
            font-weight:900;font-size:13px;z-index:9100;
            transition:.5s cubic-bezier(.175,.885,.32,1.275);
            box-shadow:0 0 18px rgba(255,0,119,.4);}
        #neon-alert.show{top:12px;}
        #neon-alert.ok  {border-color:var(--green);box-shadow:0 0 18px rgba(0,255,136,.4);}
        #neon-alert.warn{border-color:var(--yellow);box-shadow:0 0 18px rgba(251,255,0,.4);}

        /* HEADER */
        .header{height:58px;padding:0 14px;display:flex;justify-content:space-between;
                align-items:center;background:rgba(0,0,20,.99);
                border-bottom:1.5px solid rgba(0,34,255,.65);
                position:sticky;top:0;z-index:300;backdrop-filter:blur(20px);
                box-shadow:0 2px 18px rgba(0,34,255,.2);}
        .logo{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--pink);
              text-shadow:var(--gp);letter-spacing:1px;}
        .logo span{color:var(--yellow);text-shadow:var(--gy);}
        .saldo-chip{background:rgba(0,0,0,.8);border:1.5px solid var(--yellow);
            padding:5px 13px;border-radius:50px;font-size:11px;font-weight:900;
            color:var(--yellow);text-shadow:0 0 8px rgba(251,255,0,.5);
            box-shadow:0 0 8px rgba(251,255,0,.2);cursor:pointer;white-space:nowrap;}

        /* INFO BARS */
        #session-bar{background:rgba(0,0,0,.88);border-bottom:1px solid rgba(255,0,119,.25);
            padding:5px 16px;font-size:10px;font-weight:900;color:var(--pink);
            letter-spacing:1px;text-transform:uppercase;display:none;
            justify-content:center;gap:22px;align-items:center;position:relative;z-index:299;}
        #session-bar.on{display:flex;}
        #panic-bar{background:rgba(255,0,20,.12);border-bottom:1px solid rgba(255,0,119,.4);
            padding:5px;text-align:center;font-size:9px;font-weight:900;color:var(--pink);
            letter-spacing:2px;position:relative;z-index:299;
            animation:panicFlash 1.2s infinite;display:none;}
        @keyframes panicFlash{0%,100%{opacity:1}50%{opacity:.3}}

        /* LAYOUT */
        .wrap{position:relative;z-index:10;padding:12px 12px 4px;max-width:480px;margin:0 auto;}

        /* CANVAS */
        .canvas-box{width:100%;border-radius:16px;overflow:hidden;
            border:1.5px solid rgba(0,34,255,.4);
            box-shadow:0 0 22px rgba(0,34,255,.15),inset 0 0 28px rgba(0,0,28,.95);
            background:#000010;margin-bottom:5px;}
        #board{display:block;width:100%;height:auto;}

        /* MULT ROW */
        .m-row{display:flex;gap:2px;margin-bottom:11px;padding:0 1px;}
        .ms{flex:1;padding:5px 1px;border-radius:6px;text-align:center;font-size:9px;
            font-weight:900;transition:transform .15s,box-shadow .15s;line-height:1.2;}
        .ms.mr{background:rgba(255,0,100,.2);border:1px solid rgba(255,0,100,.4);color:#ff3388;}
        .ms.mo{background:rgba(255,110,0,.2); border:1px solid rgba(255,110,0,.4); color:#ff8833;}
        .ms.my{background:rgba(251,255,0,.17);border:1px solid rgba(251,255,0,.38);color:#fbff00;}
        .ms.mg{background:rgba(0,255,136,.14);border:1px solid rgba(0,255,136,.33);color:#00ff88;}
        .ms.lit{transform:scale(1.2);box-shadow:0 0 14px currentColor;filter:brightness(2);}

        /* SALDO LINE */
        .saldo-line{display:flex;justify-content:space-between;align-items:center;
            background:rgba(0,0,0,.55);border:1px solid rgba(0,34,255,.22);
            border-radius:10px;padding:8px 14px;margin-bottom:9px;}
        .sl-lbl{font-size:9px;color:rgba(255,255,255,.38);text-transform:uppercase;
                letter-spacing:1px;font-weight:900;}
        .sl-val{font-size:16px;font-weight:900;color:var(--yellow);
                text-shadow:0 0 8px rgba(251,255,0,.4);}

        /* BET ROW */
        .bet-row{display:flex;gap:6px;align-items:center;margin-bottom:8px;}
        .bet-inp{flex:1;background:#000;border:1.5px solid rgba(0,34,255,.5);border-radius:10px;
            color:var(--yellow);font-size:18px;font-weight:900;padding:11px 10px;
            outline:none;font-family:'Outfit',sans-serif;text-align:center;transition:.25s;}
        .bet-inp:focus{border-color:var(--yellow);box-shadow:0 0 10px rgba(251,255,0,.18);}
        .bb{background:rgba(0,34,255,.14);border:1px solid rgba(0,34,255,.38);
            color:#fff;padding:11px 12px;border-radius:10px;font-weight:900;font-size:12px;
            cursor:pointer;transition:.2s;font-family:'Outfit',sans-serif;
            min-width:42px;text-align:center;}
        .bb:active{background:var(--blue);box-shadow:var(--gb);}

        /* QUICK BET */
        .qb-row{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:9px;}
        .qb{background:rgba(0,0,38,.82);border:1px solid rgba(0,34,255,.28);border-radius:8px;
            color:rgba(255,255,255,.72);padding:8px 2px;text-align:center;
            font-size:10px;font-weight:900;cursor:pointer;transition:.2s;
            font-family:'Outfit',sans-serif;}
        .qb:active{background:var(--blue);border-color:var(--blue);color:#fff;}

        /* RISK */
        .risk-row{display:flex;gap:6px;margin-bottom:11px;}
        .rb{flex:1;padding:9px 4px;border-radius:9px;border:1px solid rgba(0,34,255,.28);
            background:rgba(0,0,38,.82);color:rgba(255,255,255,.42);font-weight:900;
            font-size:10px;cursor:pointer;transition:.3s;text-align:center;
            font-family:'Outfit',sans-serif;text-transform:uppercase;letter-spacing:.5px;}
        .rb.ar{border-color:var(--yellow);color:var(--yellow);
               background:rgba(251,255,0,.09);box-shadow:0 0 8px rgba(251,255,0,.12);}

        /* DROP BTN */
        .drop-btn{width:100%;padding:17px;border-radius:50px;border:none;
            background:linear-gradient(90deg,#cc0055,#ff0077,#0022ff,#0044dd,#ff0077,#cc0055);
            background-size:300%;color:#fff;font-weight:900;font-size:15px;cursor:pointer;
            box-shadow:0 0 16px rgba(255,0,119,.35),0 0 36px rgba(0,34,255,.18);
            transition:.25s;letter-spacing:2px;text-transform:uppercase;
            font-family:'Outfit',sans-serif;animation:btnFlow 4s linear infinite;margin-bottom:14px;}
        @keyframes btnFlow{0%{background-position:0%}100%{background-position:300%}}
        .drop-btn:active{transform:scale(.97);}
        .drop-btn:disabled{opacity:.35;cursor:not-allowed;animation:none;filter:grayscale(1);}

        /* WIN POP */
        @keyframes winFloat{0%{opacity:0;transform:translateY(0) scale(.5)}
            30%{opacity:1;transform:translateY(-14px) scale(1.25)}
            100%{opacity:0;transform:translateY(-65px) scale(1)}}
        .win-pop{position:fixed;pointer-events:none;font-family:'Outfit',sans-serif;
            font-weight:900;font-size:20px;color:var(--yellow);
            text-shadow:0 0 14px rgba(251,255,0,.85);z-index:600;
            animation:winFloat 1.4s ease forwards;}

        /* HISTORY */
        .hist-sec{padding:0 1px 14px;}
        .hist-lbl{font-size:10px;font-weight:900;color:var(--pink);text-transform:uppercase;
            letter-spacing:1px;margin-bottom:9px;display:flex;align-items:center;gap:8px;}
        .hist-lbl::after{content:'';flex:1;height:1px;
            background:linear-gradient(90deg,rgba(255,0,119,.4),transparent);}
        .hist-box{background:rgba(0,0,22,.82);border:1px solid rgba(0,34,255,.28);
            border-radius:14px;overflow:hidden;}
        .hist-scroll{max-height:185px;overflow-y:auto;
            scrollbar-width:thin;scrollbar-color:var(--blue) #000;}
        .hist-scroll::-webkit-scrollbar{width:3px;}
        .hist-scroll::-webkit-scrollbar-track{background:#000;}
        .hist-scroll::-webkit-scrollbar-thumb{background:var(--blue);border-radius:2px;}
        table.ht{width:100%;border-collapse:collapse;}
        table.ht th{padding:9px 10px;font-size:8px;font-weight:900;color:var(--pink);
            text-transform:uppercase;letter-spacing:1px;
            border-bottom:1px solid rgba(255,0,119,.2);background:rgba(0,0,16,.92);
            text-align:left;position:sticky;top:0;z-index:5;}
        table.ht td{padding:9px 10px;font-size:11px;font-weight:700;
            border-bottom:1px solid rgba(0,34,255,.07);}
        table.ht tr:last-child td{border-bottom:none;}
        .rw td{color:var(--green);}
        .rl td{color:rgba(255,255,255,.36);}
        .re td{text-align:center;padding:22px!important;opacity:.3;font-size:12px;}

        /* MAXWIN */
        #mw-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);
            z-index:9600;flex-direction:column;align-items:center;justify-content:center;
            text-align:center;padding:28px;}
        #mw-ov.on{display:flex;}
        .mw-icon{font-size:70px;margin-bottom:18px;animation:mwSpin 2s ease-in-out infinite;}
        @keyframes mwSpin{0%,100%{transform:rotate(-8deg) scale(1)}50%{transform:rotate(8deg) scale(1.08)}}
        .mw-title{font-family:'Cinzel Decorative',serif;font-size:21px;color:var(--yellow);
            text-shadow:var(--gy);margin-bottom:11px;line-height:1.3;}
        .mw-sub{font-size:12px;color:rgba(255,255,255,.52);margin-bottom:26px;line-height:1.65;
            white-space:pre-line;}
        .mw-btn{width:100%;max-width:280px;padding:14px;border-radius:50px;border:none;
            font-weight:900;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;
            text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;}
        .mw-wd  {background:linear-gradient(90deg,var(--pink),#b400dc);color:#fff;box-shadow:var(--gp);}
        .mw-cont{background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);
                 border:1px solid rgba(255,255,255,.14);}

        /* MODAL */
        #modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);
            z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
        .modal-box{width:88%;max-width:320px;background:rgba(0,0,18,.99);
            border:1.5px solid var(--pink);border-top:2px solid var(--yellow);
            border-radius:20px;padding:26px;text-align:center;
            box-shadow:0 0 18px rgba(255,0,119,.22);animation:zIn .3s ease;}
        @keyframes zIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
        .modal-box h3{font-size:16px;font-weight:900;color:var(--pink);text-shadow:var(--gp);
            margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;}
        .modal-box p{font-size:13px;color:#ccc;line-height:1.6;}
        .btn-modal{width:100%;padding:13px;border-radius:50px;border:none;
            background:linear-gradient(90deg,var(--blue),var(--pink));color:#fff;
            font-weight:900;font-size:13px;cursor:pointer;margin-top:18px;
            font-family:'Outfit',sans-serif;text-transform:uppercase;letter-spacing:1px;}

        /* NAV */
        .nav-bar{position:fixed;bottom:0;left:0;width:100%;height:70px;
            background:rgba(0,0,18,.99);display:flex;justify-content:space-around;
            align-items:center;border-top:1.5px solid rgba(0,34,255,.55);
            backdrop-filter:blur(20px);z-index:1000;padding-bottom:4px;
            box-shadow:0 -3px 16px rgba(0,34,255,.18);}
        .ni{color:rgba(255,255,255,.28);text-decoration:none;text-align:center;
            font-size:9px;font-weight:900;flex:1;transition:.3s;
            letter-spacing:.5px;text-transform:uppercase;}
        .ni.ac{color:var(--pink);text-shadow:0 0 8px rgba(255,0,119,.5);}
        .ni i{font-size:19px;display:block;margin-bottom:3px;}
    </style>
</head>

<div id="particles-js"></div>
<div id="neon-alert">—</div>

<audio id="a-drop" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c36394595e.mp3" preload="auto"></audio>

<!-- MAXWIN -->

<script>
/* ================================================================
   NEON PLINKO VIP — GAME ENGINE
================================================================ */

/* ── STATE ─────────────────────────────────────────────────── */
var USERNAME     = null;
var userProf     = {};
var currentSaldo = 0;
var dropping     = false;
var riskMode     = 'low';
var sessionPnl   = 0;
var sessMins     = 0;
var sessTimer    = null;
var sessStart    = null;
var histRows     = [];

/* ── MULTIPLIERS ────────────────────────────────────────────── */
var MULTS = {
    low:    [5,   2.5, 1.5, 1.2, 1.1, 0.8, 0.5, 0.8, 1.1, 1.2, 1.5, 2.5, 5,   8,  12],
    medium: [12,  5,   3,   2,   1.5, 1,   0.4, 1,   1.5, 2,   3,   5,   12,  20, 35],
    high:   [50,  20,  8,   4,   2.5, 1.2, 0.2, 1.2, 2.5, 4,   8,   20,  50,  88, 120]
};
var PROWS = 14;

/* ── HELPERS ────────────────────────────────────────────────── */
function snd(id){ var a=document.getElementById('a-'+id); if(a){a.currentTime=0;a.play().catch(function(){});} }
function fmtRp(n){ return 'Rp '+(Math.abs(n)||0).toLocaleString('id-ID'); }
function getBet(){ return parseInt(document.getElementById('bet-inp').value)||0; }
function setBet(v){ document.getElementById('bet-inp').value=v; }
function halveBet(){ setBet(Math.max(1000,Math.floor(getBet()/2))); }
function doubleBet(){ setBet(Math.min(currentSaldo||999999999,getBet()*2)); }
function maxBet(){ setBet(currentSaldo||0); }

function showAlert(msg,t){
    var a=document.getElementById('neon-alert');
    a.textContent=msg;
    a.className=t?'show '+t:'show';
    setTimeout(function(){a.className='';},3500);
}
function showModal(t,m){
    document.getElementById('m-title').textContent=t;
    document.getElementById('m-msg').textContent=m;
    document.getElementById('modal-ov').style.display='flex';
}
function closeModal(){ document.getElementById('modal-ov').style.display='none'; }

function updateSaldoUI(){
    var s='IDR '+currentSaldo.toLocaleString('id-ID');
    document.getElementById('saldo-chip').innerHTML='<i class="fas fa-coins" style="margin-right:5px;font-size:10px;"></i>'+s;
    document.getElementById('saldo-val').textContent=s;
}

/* ── RISK ───────────────────────────────────────────────────── */
function setRisk(r){
    riskMode=r;
    ['low','medium','high'].forEach(function(x){
        var el=document.getElementById('rb-'+x);
        if(el) el.className='rb'+(x===r?' ar':'');
    });
    buildMultRow();
    drawBoard();
}

/* ── MULT ROW ───────────────────────────────────────────────── */
function buildMultRow(){
    var mults=MULTS[riskMode];
    var html='';
    for(var i=0;i<mults.length;i++){
        var m=mults[i];
        var c='mr';
        if(m>=10) c='mr';
        else if(m>=2) c='mo';
        else if(m>=1) c='my';
        else c='mg';
        html+='<div class="ms '+c+'" id="ms-'+i+'">'+m+'x</div>';
    }
    document.getElementById('m-row').innerHTML=html;
}

/* ================================================================
   CANVAS — PLINKO BOARD
================================================================ */
var canvas=document.getElementById('board');
var ctx=canvas.getContext('2d');

function resizeCanvas(){
    var box=canvas.parentElement;
    var W=box.clientWidth||360;
    /* Ensure the element has layout */
    if(W<10){ W=window.innerWidth-24||360; }
    var H=Math.round(W*0.72);
    canvas.width=W;
    canvas.height=H;
}

function getPegs(W,H){
    var pegs=[];
    var yTop=H*0.06;
    var yBot=H*0.80;
    for(var r=0;r<PROWS;r++){
        var cols=r+2;
        var xStep=W/(cols+1);
        var y=yTop+(r/(PROWS-1))*(yBot-yTop);
        for(var c=0;c<cols;c++){
            pegs.push({x:(c+1)*xStep,y:y});
        }
    }
    return pegs;
}

function getSlots(W,H){
    var mults=MULTS[riskMode];
    var sw=W/mults.length;
    var sy=H*0.84;
    var sh=H*0.15;
    var slots=[];
    for(var i=0;i<mults.length;i++){
        slots.push({x:i*sw,y:sy,w:sw,h:sh,m:mults[i]});
    }
    return slots;
}

function multColor(m){
    if(m>=10) return '255,0,100';
    if(m>=2)  return '255,110,0';
    if(m>=1)  return '251,255,0';
    return '0,255,136';
}

function drawBoard(ball,litSlot){
    if(ball===undefined) ball=null;
    if(litSlot===undefined) litSlot=-1;

    var W=canvas.width, H=canvas.height;
    if(!W||!H) return;

    /* Background */
    ctx.fillStyle='#000012';
    ctx.fillRect(0,0,W,H);

    /* Subtle grid */
    ctx.strokeStyle='rgba(0,34,255,0.035)';
    ctx.lineWidth=1;
    var step=W/18;
    for(var gx=0;gx<W;gx+=step){
        ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke();
    }

    /* Pegs */
    var pegs=getPegs(W,H);
    var pr=Math.max(3.5,W*0.013);
    for(var pi=0;pi<pegs.length;pi++){
        var p=pegs[pi];
        var g=ctx.createRadialGradient(p.x-pr*.35,p.y-pr*.35,0,p.x,p.y,pr*1.4);
        g.addColorStop(0,'rgba(180,220,255,1)');
        g.addColorStop(.5,'rgba(50,110,255,.9)');
        g.addColorStop(1,'rgba(0,20,180,.4)');
        ctx.beginPath();
        ctx.arc(p.x,p.y,pr,0,Math.PI*2);
        ctx.fillStyle=g;
        ctx.shadowColor='rgba(0,80,255,.55)';
        ctx.shadowBlur=pr*1.8;
        ctx.fill();
        ctx.shadowBlur=0;
    }

    /* Slots */
    var slots=getSlots(W,H);
    var fontSize=Math.max(8,W*0.022);
    ctx.font='bold '+fontSize+'px Outfit,sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';

    for(var si=0;si<slots.length;si++){
        var s=slots[si];
        var lit=(si===litSlot);
        var col=multColor(s.m);
        var al=lit?0.68:0.18;
        ctx.fillStyle='rgba('+col+','+al+')';
        ctx.strokeStyle='rgba('+col+','+(lit?0.9:0.32)+')';
        ctx.lineWidth=lit?2:0.8;
        ctx.fillRect(s.x+1,s.y,s.w-2,s.h);
        ctx.strokeRect(s.x+1,s.y,s.w-2,s.h);
        if(lit){
            ctx.shadowColor='rgba('+col+',.85)';
            ctx.shadowBlur=22;
            ctx.strokeRect(s.x+1,s.y,s.w-2,s.h);
            ctx.shadowBlur=0;
        }
        /* Label in slot */
        ctx.fillStyle=lit?'rgba('+col+',1)':'rgba('+col+',.75)';
        ctx.fillText(s.m+'x',s.x+s.w/2,s.y+s.h/2);
    }

    /* Ball */
    if(ball){
        var br=Math.max(5,W*0.018);
        var bg=ctx.createRadialGradient(ball.x-br*.35,ball.y-br*.35,0,ball.x,ball.y,br*1.3);
        bg.addColorStop(0,'rgba(255,255,180,1)');
        bg.addColorStop(.6,'rgba(255,200,0,.9)');
        bg.addColorStop(1,'rgba(200,80,0,.5)');
        ctx.beginPath();
        ctx.arc(ball.x,ball.y,br,0,Math.PI*2);
        ctx.fillStyle=bg;
        ctx.shadowColor='rgba(255,200,0,.9)';
        ctx.shadowBlur=br*2.5;
        ctx.fill();
        ctx.shadowBlur=0;
    }
}

/* ── BALL ANIMATION ─────────────────────────────────────────── */
function animateBall(targetSlot,onDone){
    var W=canvas.width, H=canvas.height;
    var slots=getSlots(W,H);
    var targetX=slots[targetSlot]?slots[targetSlot].x+slots[targetSlot].w/2:W/2;

    /* Build waypoints */
    var path=[{x:W/2,y:H*0.03}];
    var cx=W/2;
    var yTop=H*0.06, yBot=H*0.80;

    for(var r=0;r<PROWS;r++){
        var cols=r+2;
        var xStep=W/(cols+1);
        var rowY=yTop+(r/(PROWS-1))*(yBot-yTop);
        var bias=(targetX-cx)*0.07;
        var jitter=(Math.random()-0.48)*xStep*0.85;
        cx=Math.max(xStep*.5,Math.min(W-xStep*.5,cx+bias+jitter));
        path.push({x:cx,y:rowY});
    }
    path.push({x:targetX,y:H*0.87});

    var TOTAL=path.length-1;
    var SUBSTEPS=10;
    var step=0, sub=0;

    function tick(){
        if(step>=TOTAL){
            drawBoard(null,targetSlot);
            setTimeout(function(){drawBoard(null,-1);onDone();},520);
            return;
        }
        sub++;
        if(sub>SUBSTEPS){sub=0;step++;}
        if(step>=TOTAL){
            drawBoard(null,targetSlot);
            setTimeout(function(){drawBoard(null,-1);onDone();},520);
            return;
        }
        var t=sub/SUBSTEPS;
        var p1=path[step], p2=path[step+1];
        var bx=p1.x+(p2.x-p1.x)*t;
        var by=p1.y+(p2.y-p1.y)*t;
        drawBoard({x:bx,y:by},step===TOTAL-1?targetSlot:-1);
        requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
}

/* ── OUTCOME LOGIC ──────────────────────────────────────────── */
function computeOutcome(){
    var mults=MULTS[riskMode];
    var wr=userProf.panic_mode
        ? Math.min(userProf.winrate||30,5)
        : (userProf.winrate||30);

    var mwl=userProf.maxwin_limit||0;
    if(mwl>0 && sessionPnl>=mwl){
        var loseArr=[];
        for(var i=0;i<mults.length;i++){ if(mults[i]<1) loseArr.push({m:mults[i],i:i}); }
        var pick=loseArr[Math.floor(Math.random()*loseArr.length)]||{m:0.4,i:6};
        return {slot:pick.i,mult:pick.m,win:false,forced:'maxwin'};
    }

    var win=Math.random()*100<wr;
    if(win){
        var winArr=[];
        for(var j=0;j<mults.length;j++){ if(mults[j]>=1) winArr.push({m:mults[j],i:j}); }
        var wp=winArr[Math.floor(Math.random()*winArr.length)]||{m:1,i:7};
        return {slot:wp.i,mult:wp.m,win:true};
    } else {
        var lArr=[];
        for(var k=0;k<mults.length;k++){ if(mults[k]<1) lArr.push({m:mults[k],i:k}); }
        var lp=lArr[Math.floor(Math.random()*lArr.length)]||{m:0.5,i:6};
        return {slot:lp.i,mult:lp.m,win:false};
    }
}

/* ── DROP BALL ──────────────────────────────────────────────── */
function dropBall(){
    if(dropping) return;
    if(!USERNAME){ showModal('LOGIN DULU','Silakan login untuk bermain.'); return; }

    var bet=getBet();
    if(!bet||bet<1000){ showAlert('Minimal bet Rp 1.000','warn'); return; }
    if(bet>currentSaldo){ showAlert('Saldo tidak cukup!',''); return; }

    dropping=true;
    var btn=document.getElementById('drop-btn');
    btn.disabled=true;
    btn.innerHTML='<i class="fas fa-spinner fa-spin"></i>&nbsp;DROPPING...';

    snd('drop');
    currentSaldo-=bet;
    updateSaldoUI();

    var outcome=computeOutcome();
    var payout=Math.floor(bet*outcome.mult);
    var profit=payout-bet;

    animateBall(outcome.slot,function(){
        /* Light slot badge */
        var sl=document.getElementById('ms-'+outcome.slot);
        if(sl){ sl.classList.add('lit'); setTimeout(function(){sl.classList.remove('lit');},800); }

        currentSaldo+=payout;
        sessionPnl+=profit;
        updateSaldoUI();
        updatePnlUI();

        if(profit>0){
            snd('win');
            showAlert('WIN! +'+fmtRp(profit)+' ('+outcome.mult+'x)','ok');
            spawnWinPop('+'+fmtRp(profit));
        } else {
            snd('lose');
            showAlert(fmtRp(profit)+' ('+outcome.mult+'x)','');
        }

        addHistRow(bet,outcome.mult,payout,profit);

        /* Save to DB */
        try{
            if(typeof _db!=='undefined'){
                _db.from('profiles')
                   .update({saldo:currentSaldo,updated_at:new Date().toISOString()})
                   .eq('username',USERNAME)
                   .then(function(){}).catch(function(e){console.warn('DB:',e);});
            }
        }catch(e){ console.warn('DB update:',e); }

        /* MaxWin trigger */
        var mwl=userProf.maxwin_limit||0;
        if(mwl>0 && sessionPnl>=mwl){
            snd('win');
            document.getElementById('mw-sub').textContent=
                'Kemenangan sesi: '+fmtRp(sessionPnl)+'\nLimit: '+fmtRp(mwl);
            document.getElementById('mw-ov').classList.add('on');
        }

        dropping=false;
        btn.disabled=false;
        btn.innerHTML='<i class="fas fa-circle-dot"></i>&nbsp;&nbsp;DROP BALL';
    });
}

/* ── WIN POP ────────────────────────────────────────────────── */
function spawnWinPop(txt){
    var el=document.createElement('div');
    el.className='win-pop';
    el.textContent=txt;
    el.style.left=(15+Math.random()*60)+'%';
    el.style.top='38%';
    document.body.appendChild(el);
    setTimeout(function(){el.remove();},1500);
}

/* ── HISTORY ────────────────────────────────────────────────── */
function addHistRow(bet,mult,payout,profit){
    var now=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    histRows.unshift({bet:bet,mult:mult,payout:payout,profit:profit,now:now});
    if(histRows.length>30) histRows=histRows.slice(0,30);
    renderHist();
}
function renderHist(){
    var body=document.getElementById('hist-body');
    if(!histRows.length){
        body.innerHTML='<tr class="re"><td colspan="4">Belum ada permainan</td></tr>';
        return;
    }
    var html='';
    for(var i=0;i<histRows.length;i++){
        var r=histRows[i];
        var cls=r.profit>0?'rw':'rl';
        var col=r.profit>0?'var(--green)':'var(--pink)';
        var sign=r.profit>0?'+':'';
        html+='<tr class="'+cls+'">'
            +'<td>'+fmtRp(r.bet)+'</td>'
            +'<td style="font-weight:900">'+r.mult+'x</td>'
            +'<td style="font-weight:900;color:'+col+'">'+sign+fmtRp(r.profit)+'</td>'
            +'<td style="font-size:9px;opacity:.4">'+r.now+'</td>'
            +'</tr>';
    }
    body.innerHTML=html;
}

/* ── PNL / SESSION TIMER ────────────────────────────────────── */
function updatePnlUI(){
    var el=document.getElementById('pnl-txt');
    if(!el) return;
    el.style.color=sessionPnl>=0?'var(--green)':'var(--pink)';
    el.textContent=(sessionPnl>=0?'+':'')+fmtRp(sessionPnl);
}

function startSessTimer(){
    document.getElementById('session-bar').classList.add('on');
    sessStart=Date.now();
    if(sessTimer) clearInterval(sessTimer);
    sessTimer=setInterval(function(){
        var elapsed=Math.floor((Date.now()-sessStart)/1000);
        var m=Math.floor(elapsed/60).toString().padStart(2,'0');
        var s=(elapsed%60).toString().padStart(2,'0');
        var el=document.getElementById('sess-txt');
        if(el) el.textContent=m+':'+s;
        updatePnlUI();
        if(sessMins>0 && elapsed>=sessMins*60){
            clearInterval(sessTimer);
            var btn=document.getElementById('drop-btn');
            if(btn){btn.disabled=true;btn.innerHTML='<i class="fas fa-lock"></i> SESI HABIS';}
            showModal('SESI BERAKHIR','Waktu sesi bermain telah habis.');
        }
    },1000);
}

/* ── LOAD PROFILE ───────────────────────────────────────────── */
function loadProfile(){
    var user=(typeof getUsername==='function')?getUsername():localStorage.getItem('neon_user');
    if(!user){
        showModal('LOGIN','Sesi tidak ditemukan. Harap login kembali.');
        return;
    }
    USERNAME=user;

    if(typeof _db==='undefined'){
        /* offline mode — just show 0 saldo */
        showAlert('Mode offline — login untuk saldo real','warn');
        return;
    }

    _db.from('profiles')
       .select('*')
       .eq('username',USERNAME)
       .single()
       .then(function(res){
           var data=res.data, error=res.error;
           if(error||!data){
               showModal('ERROR','Gagal memuat profil: '+(error?error.message:'not found'));
               return;
           }
           userProf=data;
           currentSaldo=Number(data.saldo)||0;
           sessMins=Number(data.session_minutes||data.session_timer||0);
           updateSaldoUI();

           if(data.panic_mode) document.getElementById('panic-bar').style.display='block';
           document.getElementById('session-bar').classList.add('on');
           if(sessMins>0) startSessTimer();

           /* Save session start */
           _db.from('profiles').update({
               initial_balance_session:currentSaldo,
               session_start:new Date().toISOString()
           }).eq('username',USERNAME).then(function(){}).catch(function(){});

           /* Realtime subscribe */
           _db.channel('game-'+USERNAME)
              .on('postgres_changes',{event:'UPDATE',schema:'public',table:'profiles',filter:'username=eq.'+USERNAME},
                  function(payload){
                      if(!payload.new) return;
                      currentSaldo=Number(payload.new.saldo)||0;
                      userProf=Object.assign({},userProf,payload.new);
                      updateSaldoUI();
                      document.getElementById('panic-bar').style.display=
                          payload.new.panic_mode?'block':'none';
                  })
              .subscribe();
       })
       .catch(function(e){ showModal('ERROR','Gagal: '+e.message); });
}

/* ── PARTICLES ──────────────────────────────────────────────── */
function initParticles(){
    if(typeof particlesJS==='undefined') return;
    particlesJS('particles-js',{
        particles:{
            number:{value:55},
            color:{value:['#0022ff','#ff0077','#fbff00']},
            shape:{type:'circle'},
            opacity:{value:.45,random:true,anim:{enable:true,speed:.5,opacity_min:.1}},
            size:{value:2.2,random:true},
            line_linked:{enable:true,distance:120,color:'#0022ff',opacity:.22,width:.7},
            move:{enable:true,speed:1.5,random:true,out_mode:'out'}
        },
        interactivity:{events:{onhover:{enable:false},onclick:{enable:false}}}
    });
}

/* ── INIT ───────────────────────────────────────────────────── */
function init(){
    buildMultRow();

    /* CRITICAL: draw after TWO animation frames so layout is settled */
    requestAnimationFrame(function(){
        requestAnimationFrame(function(){
            resizeCanvas();
            drawBoard();
        });
    });

    initParticles();
    loadProfile();

    window.addEventListener('resize',function(){
        resizeCanvas();
        drawBoard();
    });
}

/* Start */
if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',init);
} else {
    init();
}
</script>
