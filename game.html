<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #02030d; 
            --pink-neon: 0 0 5px var(--pink), 0 0 10px var(--pink);
            --blue-neon: 0 0 5px var(--blue), 0 0 10px var(--blue);
            --yellow-neon: 0 0 5px var(--yellow), 0 0 10px var(--yellow);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* HEADER */
        .header { display: flex; justify-content: center; align-items: center; padding: 15px 10px; position: relative; z-index: 100; background: var(--bg); border-bottom: 1px solid rgba(0,212,255,0.1); }
        .prof-container, .settings-container { position: absolute; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .prof-container { left: 20px; } .settings-container { right: 20px; }
        .prof-link, .settings-link { font-size: 24px; color: var(--pink); text-shadow: var(--pink-neon); }
        .prof-text, .settings-text { font-size: 8px; font-weight: 900; margin-top: 2px; color: var(--blue); }

        .balance-box { background: rgba(0,0,0,0.6); border: 2px solid var(--blue); border-radius: 20px; padding: 5px 20px; text-align: center; min-width: 160px; box-shadow: var(--blue-neon); }
        #display-saldo { font-size: 18px; font-weight: 900; color: var(--yellow); text-shadow: var(--yellow-neon); }
        #display-username { font-size: 9px; color: var(--blue); display: block; letter-spacing: 1px; text-transform: uppercase; }

        /* GAME AREA */
        #game-container { position: relative; width: 100%; height: 380px; margin-top: 5px; overflow: hidden; }
        .peg { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 8px #fff; z-index: 5; opacity: 0.5; }
        .ball { position: absolute; width: 14px; height: 14px; background: radial-gradient(circle at 30% 30%, var(--pink), #900); border-radius: 50%; box-shadow: 0 0 15px var(--pink); z-index: 10; transform: translate(-50%, -50%); pointer-events: none; }

        /* SLOTS */
        .multipliers { display: flex; justify-content: center; gap: 4px; padding: 0 10px; z-index: 80; }
        .slot { flex: 1; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 10px; font-weight: 900; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; color: #fff; }
        .m-high { background: var(--pink); box-shadow: var(--pink-neon); }
        .m-mid { background: var(--yellow); color: black; box-shadow: var(--yellow-neon); }
        .m-low { background: var(--blue); color: black; box-shadow: var(--blue-neon); }

        /* CONTROLS */
        .play-area { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; gap: 12px; background: rgba(255,255,255,0.02); border-top-left-radius: 30px; border-top-right-radius: 30px; border-top: 1px solid rgba(255,255,255,0.1); }
        .mode-toggles { display: flex; justify-content: center; gap: 10px; }
        .toggle { flex: 1; padding: 12px; border-radius: 15px; font-size: 11px; font-weight: 900; cursor: pointer; border: 1px solid #333; background: #000; color: #666; transition: 0.3s; text-align: center; }
        .toggle.active { border-color: var(--pink); color: var(--pink); box-shadow: var(--pink-neon); }
        
        .bet-selector { display: flex; align-items: center; justify-content: space-between; background: #000; border-radius: 50px; padding: 8px 25px; border: 1px solid var(--blue); box-shadow: inset 0 0 10px rgba(0,212,255,0.1); }
        .btn-main { width: 100%; padding: 16px; border-radius: 50px; border: none; font-weight: 900; font-size: 18px; cursor: pointer; background: linear-gradient(90deg, var(--pink), var(--blue)); color: white; box-shadow: 0 0 20px rgba(255,0,119,0.4); text-transform: uppercase; }
        .btn-main:disabled { opacity: 0.6; cursor: not-allowed; }

        /* NOTIF & MODAL */
        #score-board { position: absolute; left: 10px; top: 110px; width: 110px; display: flex; flex-direction: column; gap: 5px; z-index: 50; }
        .score-item { background: rgba(0,0,0,0.85); border-left: 3px solid var(--pink); font-size: 10px; padding: 6px; border-radius: 4px; color: var(--yellow); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* MODAL NEON (Dari File Sisipan) */
        #modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; backdrop-filter:blur(5px); }
        #neon-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:85%; max-width:320px; background:var(--bg); border:2px solid var(--pink); border-radius:20px; padding:25px; z-index:2001; text-align:center; box-shadow:var(--pink-neon); }
    </style>
</head>
<body>

    <audio id="snd-click" src="https://www.soundjay.com/buttons/button-16.mp3"></audio>
    <audio id="snd-win" src="https://www.soundjay.com/buttons/button-3.mp3"></audio>
    <audio id="snd-ball" src="https://www.soundjay.com/interface/button-21.mp3"></audio>

    <div id="score-board"></div>

    <div class="header">
        <div class="prof-container" onclick="location.href='profil.html'">
            <i class="fa-solid fa-user-astronaut prof-link"></i>
            <span class="prof-text">PROFIL</span>
        </div>
        <div class="balance-box">
            <span id="display-username">LOADING...</span>
            <span id="display-saldo">IDR 0</span>
        </div>
        <div class="settings-container" onclick="location.href='settings.html'">
            <i class="fa-solid fa-sliders settings-link"></i>
            <span class="settings-text">PANEL</span>
        </div>
    </div>

    <div id="game-container"></div>

    <div class="multipliers" id="multi-row">
        <div class="slot m-high">10x</div>
        <div class="slot m-mid">3x</div>
        <div class="slot m-low">1.5x</div>
        <div class="slot m-low" style="background:#444;">0.2x</div>
        <div class="slot m-low">0.5x</div>
        <div class="slot m-mid">3x</div>
        <div class="slot m-high">10x</div>
    </div>

    <div class="play-area">
        <div class="mode-toggles">
            <div id="btn-normal" class="toggle active" onclick="setMode('normal')">MANUAL</div>
            <div id="btn-auto" class="toggle" onclick="setMode('auto')">AUTO PLAY</div>
        </div>
        
        <div class="bet-selector">
            <button style="background:none; border:none; color:var(--pink); font-size: 28px; font-weight:900;" onclick="changeBet(-1)">-</button>
            <div id="current-bet" style="font-size: 22px; font-weight: 900; color:var(--yellow);">1,000</div>
            <button style="background:none; border:none; color:var(--pink); font-size: 28px; font-weight:900;" onclick="changeBet(1)">+</button>
        </div>
        
        <button class="btn-main" id="play-btn" onclick="handlePlay()">TARUHAN</button>
    </div>

    <div id="modal-overlay" onclick="closeModal()"></div>
    <div id="neon-modal">
        <h3 id="modal-title" style="color:var(--pink); margin-top:0;">INFO</h3>
        <p id="modal-msg" style="font-size:14px; color:#ccc;"></p>
        <button class="btn-main" style="padding:10px; font-size:14px;" onclick="closeModal()">OKE</button>
    </div>

    <script src="global.js"></script>
    <script>
        // 1. STATE & KONFIGURASI
        const container = document.getElementById('game-container');
        const BETS = [200, 500, 1000, 2000, 5000, 10000, 25000, 50000, 100000];
        const SLOTS = [10, 3, 1.5, 0.2, 0.5, 3, 10]; 
        let betIdx = 2;
        let isAuto = false;
        let autoInterval = null;
        let pegLocations = [];

        function snd(id) { 
            const a = document.getElementById(id); 
            if(a) { a.currentTime = 0; a.play().catch(()=>{}); } 
        }

        // 2. RENDER PEGS (PAKU)
        function initPegs() {
            container.innerHTML = '';
            pegLocations = [];
            const rows = 10; 
            const centerX = container.offsetWidth / 2;
            for (let r = 2; r <= rows; r++) {
                for (let i = 0; i < r; i++) {
                    const x = centerX + (i - (r - 1) / 2) * 35; 
                    const y = r * 32; 
                    const peg = document.createElement('div');
                    peg.className = 'peg';
                    peg.style.left = x + 'px';
                    peg.style.top = y + 'px';
                    container.appendChild(peg);
                    pegLocations.push({ x, y });
                }
            }
        }

        // 3. LOGIKA BERMAIN (SINKRON KE GLOBAL.JS V5.0)
        async function handlePlay() {
            const username = getUsername();
            if (!username) {
                location.href = 'index.html';
                return;
            }

            const betAmount = BETS[betIdx];
            const session = getSession();

            // Cek saldo lokal dari session global.js
            if (session.saldo < betAmount) {
                showModal("Saldo tidak mencukupi untuk taruhan ini!");
                setMode('normal');
                return;
            }

            const btn = document.getElementById('play-btn');
            if(!isAuto) btn.disabled = true;
            snd('snd-click');

            try {
                // Gunakan callApiSilent sesuai standar global.js Anda
                const res = await callApiSilent("game_play", {
                    username: username,
                    bet: betAmount
                });

                if (res.result === "SUCCESS") {
                    // Update UI saldo secara instan
                    syncSaldoUI(res.newSaldo);
                    // Jatuhkan bola dengan multiplier yang sudah dikunci server
                    dropBall(res.multiplier, res.winAmount);
                } else {
                    showModal(res.message || "Terjadi kesalahan server");
                    setMode('normal');
                }
            } catch (e) {
                console.error("Play Error:", e);
            } finally {
                if(!isAuto) btn.disabled = false;
            }
        }

        function dropBall(targetMult, winAmount) {
            snd('snd-ball');
            const ballEl = document.createElement('div');
            ballEl.className = 'ball';
            container.appendChild(ballEl);

            // Tentukan slot index berdasarkan multiplier server
            const possibleSlots = [];
            SLOTS.forEach((m, i) => { if(m === targetMult) possibleSlots.push(i); });
            const targetIdx = possibleSlots[Math.floor(Math.random() * possibleSlots.length)];
            
            const centerX = container.offsetWidth / 2;
            // Hitung estimasi X tujuan di area multiplier
            const targetX = (container.offsetWidth / 7) * (targetIdx + 0.5);

            let ball = {
                el: ballEl,
                x: centerX + (Math.random() - 0.5) * 15,
                y: 10,
                vx: (targetX - centerX) / 85, // Dorongan halus ke arah slot target
                vy: 1.5
            };

            const gravity = 0.25;
            const friction = 0.98;

            const animate = setInterval(() => {
                ball.vy += gravity;
                ball.vx *= friction;
                ball.x += ball.vx;
                ball.y += ball.vy;

                // Pantulan Paku
                pegLocations.forEach(p => {
                    const dx = ball.x - p.x;
                    const dy = ball.y - p.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 10) {
                        const angle = Math.atan2(dy, dx);
                        const force = 1.3;
                        ball.vx += Math.cos(angle) * force;
                        ball.vy = Math.abs(Math.sin(angle) * force) + 1.2;
                    }
                });

                // Dinding
                if (ball.x < 15 || ball.x > container.offsetWidth - 15) ball.vx *= -0.5;

                ball.el.style.left = ball.x + 'px';
                ball.el.style.top = ball.y + 'px';

                // Hit Bottom
                if (ball.y > 375) {
                    clearInterval(animate);
                    ball.el.remove();
                    
                    // Efek Visual Slot
                    const slotEls = document.querySelectorAll('.slot');
                    const hitIdx = Math.floor(Math.max(0, Math.min(6, (ball.x / container.offsetWidth) * 7)));
                    if(slotEls[hitIdx]) {
                        slotEls[hitIdx].style.transform = "scale(1.2)";
                        setTimeout(() => slotEls[hitIdx].style.transform = "scale(1)", 200);
                    }

                    if (winAmount > 0) {
                        snd('snd-win');
                        addScoreItem(`WIN IDR ${winAmount.toLocaleString()}`);
                    }
                    
                    // Sync ulang profil untuk keamanan data
                    ProfileAPI.sync();
                }
            }, 16);
        }

        // 4. UI HELPERS
        function setMode(m) {
            isAuto = (m === 'auto');
            document.getElementById('btn-normal').classList.toggle('active', !isAuto);
            document.getElementById('btn-auto').classList.toggle('active', isAuto);
            document.getElementById('play-btn').innerText = isAuto ? "STOP AUTO" : "TARUHAN";
            
            if (isAuto) {
                handlePlay(); // Jalankan pertama kali
                autoInterval = setInterval(handlePlay, 1500);
            } else {
                clearInterval(autoInterval);
            }
        }

        function changeBet(d) {
            if(isAuto) return;
            betIdx = Math.max(0, Math.min(BETS.length - 1, betIdx + d));
            document.getElementById('current-bet').innerText = BETS[betIdx].toLocaleString();
            snd('snd-click');
        }

        function addScoreItem(text) {
            const board = document.getElementById('score-board');
            const item = document.createElement('div');
            item.className = 'score-item';
            item.innerText = text;
            board.prepend(item);
            if(board.children.length > 5) board.lastChild.remove();
            setTimeout(() => item.remove(), 4000);
        }

        function showModal(msg) {
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('neon-modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('neon-modal').style.display = 'none';
        }

        window.onload = () => {
            initPegs();
            const u = getUsername();
            if(u) {
                document.getElementById('display-username').innerText = u;
                ProfileAPI.sync(); // Update saldo terbaru saat masuk
            } else {
                location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
