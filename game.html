<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP - GAME</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* TEMA ASLI TETAP DIJAGA */
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff0077;
            --neon-yellow: #f5e642;
            --bg-dark: #0a0b1e;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        .game-header {
            width: 100%; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        .balance-box {
            background: #000; padding: 8px 15px; border-radius: 20px;
            border: 1px solid var(--neon-blue);
            color: var(--neon-yellow); font-weight: bold;
        }

        #game-container {
            position: relative; width: 100%; max-width: 500px; height: 60vh; margin-top: 10px;
        }

        /* MULTIPLIER SLOTS */
        .multiplier-bar {
            display: flex; justify-content: center; gap: 4px;
            width: 100%; max-width: 480px; padding: 0 10px; box-sizing: border-box;
        }

        .m-slot {
            flex: 1; padding: 10px 0; text-align: center; font-size: 11px; font-weight: 900;
            border-radius: 4px; background: #1a1b3a; transition: all 0.1s ease;
            border-bottom: 3px solid rgba(0,0,0,0.5);
        }

        /* CONTROLS */
        .controls {
            width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box;
        }

        .input-group {
            display: flex; background: #000; border-radius: 10px; padding: 5px;
            border: 1px solid #333; margin-bottom: 15px;
        }

        input {
            flex: 1; background: transparent; border: none; color: white;
            padding: 10px; text-align: center; outline: none; font-size: 16px;
        }

        .btn-play {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: linear-gradient(45deg, var(--neon-pink), #ff00cc);
            color: white; font-weight: bold; font-size: 18px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <div id="user-info"><i class="fa-solid fa-circle-user"></i> <span id="username-display">Loading...</span></div>
        <div class="balance-box" id="display-saldo">IDR 0</div>
    </div>

    <div id="game-container"></div>

    <div class="multiplier-bar">
        <div class="m-slot" id="slot-0" style="color:#ff0077; border-color:#ff0077;">10x</div>
        <div class="m-slot" id="slot-1" style="color:#00d2ff; border-color:#00d2ff;">3x</div>
        <div class="m-slot" id="slot-2" style="color:#f5e642; border-color:#f5e642;">1.5x</div>
        <div class="m-slot" id="slot-3" style="color:#aaaaaa; border-color:#555555;">0.5x</div>
        <div class="m-slot" id="slot-4" style="color:#666666; border-color:#333333;">0.2x</div>
        <div class="m-slot" id="slot-5" style="color:#aaaaaa; border-color:#555555;">0.5x</div>
        <div class="m-slot" id="slot-6" style="color:#f5e642; border-color:#f5e642;">1.5x</div>
        <div class="m-slot" id="slot-7" style="color:#00d2ff; border-color:#00d2ff;">3x</div>
        <div class="m-slot" id="slot-8" style="color:#ff0077; border-color:#ff0077;">10x</div>
    </div>

    <div class="controls">
        <div class="input-group">
            <button style="background:none; border:none; color:var(--neon-blue); cursor:pointer;" onclick="adjustBet(-1000)">-</button>
            <input type="number" id="bet-amount" value="800">
            <button style="background:none; border:none; color:var(--neon-blue); cursor:pointer;" onclick="adjustBet(1000)">+</button>
        </div>
        <button class="btn-play" id="btn-drop" onclick="dropBall()">LEPAS BOLA</button>
    </div>

    <script src="global.js"></script>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
        const engine = Engine.create();
        const worldWidth = 500;
        const worldHeight = 600;

        const render = Render.create({
            element: document.getElementById('game-container'),
            engine: engine,
            options: {
                width: worldWidth, height: worldHeight,
                wireframes: false, background: 'transparent'
            }
        });

        // 1. BUAT PAPAN PAKU PUTIH TERANG
        function createGrid() {
            const spacing = 45;
            const startY = 80;
            for (let i = 0; i < 9; i++) {
                const rowCount = i + 3;
                const rowWidth = (rowCount - 1) * spacing;
                const startX = (worldWidth - rowWidth) / 2;
                for (let j = 0; j < rowCount; j++) {
                    const peg = Bodies.circle(startX + j * spacing, startY + i * spacing, 4, {
                        isStatic: true,
                        label: 'peg',
                        render: { fillStyle: '#FFFFFF' }
                    });
                    Composite.add(engine.world, peg);
                }
            }
        }

        // SENSOR MULTIPLIER
        const sensors = [];
        function createSensors() {
            const width = 45;
            const startX = (worldWidth - (9 * width)) / 2;
            for (let i = 0; i < 9; i++) {
                const sensor = Bodies.rectangle(startX + (i * width) + width/2, worldHeight - 20, width - 5, 40, {
                    isStatic: true, isSensor: true, render: { fillStyle: 'transparent' }
                });
                sensor.mIdx = i;
                sensors.push(sensor);
            }
            Composite.add(engine.world, sensors);
        }

        // LOGIKA PERHITUNGAN & DROP BOLA
        async function dropBall() {
            const bet = parseInt(document.getElementById('bet-amount').value);
            const saldoAwal = getSaldo();

            if (saldoAwal < bet) {
                alert("Saldo tidak cukup!");
                return;
            }

            // Langsung kurangi di lokal agar responsif
            setSaldo(saldoAwal - bet);

            const ball = Bodies.circle(worldWidth/2 + (Math.random()*10-5), 20, 8, {
                restitution: 0.5, label: 'ball', render: { fillStyle: '#ff0077' }
            });
            Composite.add(engine.world, ball);

            try {
                const res = await apiCall({
                    action: 'game_play',
                    username: getUsername(),
                    bet: bet,
                    saldoAwal: saldoAwal // Kirim snapshot saldo awal ke backend
                });

                if (res.result === 'SUCCESS') {
                    ball.serverNewSaldo = res.newSaldo;
                }
            } catch (e) { console.error(e); }
