<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON PLINKO VIP - REAL PHYSICS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --pink: #ff0077; --blue: #0044ff; --yellow: #f5e642; --dark-blue: #050614; --bg: #02030d; --gp: 0 0 15px rgba(255, 0, 119, 0.7); --gb: 0 0 20px rgba(0, 68, 255, 0.8); --gy: 0 0 15px rgba(245, 230, 66, 0.7); --header-h: 60px; --slot-h: 40px; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; }

.header { height: var(--header-h); background: rgba(2, 3, 13, 0.98); border-bottom: 2px solid var(--blue); box-shadow: var(--gb); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; z-index: 100; }
.profile-btn { color: var(--blue); font-size: 24px; text-shadow: var(--gb); cursor: pointer; }
.balance-container { background: rgba(0, 0, 0, 0.8); border: 1px solid var(--pink); border-radius: 12px; padding: 5px 25px; text-align: center; min-width: 160px; }
#display-saldo { font-family: 'Cinzel Decorative', serif; font-size: 19px; color: var(--yellow); text-shadow: 0 0 10px rgba(245, 230, 66, 0.5); font-weight: 900; }

#board-wrapper { flex: 1; position: relative; background: #02030d; overflow: hidden; display: flex; flex-direction: column; }
#plinko-canvas { flex: 1; display: block; width: 100%; }
#floating-score { position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--blue); border-radius: 8px; padding: 5px; width: 100px; box-shadow: var(--gb); z-index: 50; }
.score-entry { font-size: 10px; border-bottom: 1px solid rgba(0, 68, 255, 0.3); padding: 3px 0; text-align: center; color: var(--pink); animation: fadeIn 0.3s forwards; }

#jp-overlay { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.5); pointer-events: none; z-index: 200; font-family: 'Cinzel Decorative'; font-size: 55px; color: var(--yellow); text-shadow: 0 0 30px gold; display: none; }
@keyframes jp-anim { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 20% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } 80% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -60%) scale(1.4); opacity: 0; } }

.multiplier-row { height: var(--slot-h); display: flex; gap: 4px; padding: 0 12px; margin-top: -20px; margin-bottom: 15px; z-index: 10; }
.slot { flex: 1; height: 35px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; border: 1px solid rgba(255,255,255,0.1); transition: 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.s-high { background: var(--pink); box-shadow: 0 0 15px var(--pink); }
.s-mid { background: var(--yellow); color: #000; box-shadow: 0 0 15px var(--yellow); }
.s-low { background: var(--blue); box-shadow: 0 0 15px var(--blue); }
.slot.active { transform: scale(1.4) translateY(-8px); filter: brightness(1.8); box-shadow: 0 0 35px #fff; z-index: 15; }

.controls { padding: 15px 15px 40px 15px; background: #050614; border-top: 2px solid var(--blue); display: flex; flex-direction: column; gap: 12px; }
.mode-row { display: flex; gap: 8px; }
.btn-mode { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--blue); background: rgba(0, 68, 255, 0.1); color: var(--blue); font-size: 10px; font-weight: bold; cursor: pointer; }
.btn-mode.active { background: var(--blue); color: #fff; box-shadow: var(--gb); }
.bet-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0, 68, 255, 0.08); border-radius: 12px; padding: 6px 15px; border: 1px solid var(--blue); }
.bet-btn { background: none; border: none; color: var(--pink); font-size: 26px; cursor: pointer; text-shadow: var(--gp); }
#current-bet { font-family: 'Cinzel Decorative'; font-size: 20px; color: var(--yellow); text-shadow: var(--gy); }
.btn-play { width: 100%; padding: 16px; border-radius: 12px; border: none; font-family: 'Cinzel Decorative'; font-weight: 900; font-size: 18px; color: #fff; cursor: pointer; background: linear-gradient(90deg, var(--blue), var(--pink)); box-shadow: var(--gb); transition: 0.3s; }

.nav-bottom { display: flex; gap: 8px; margin-top: 10px; }
.nav-btn { flex: 1; padding: 10px; text-align: center; border-radius: 8px; text-decoration: none; font-size: 10px; font-weight: bold; border: 1px solid var(--blue); color: #fff; background: rgba(0, 68, 255, 0.15); display: flex; flex-direction: column; align-items: center; gap: 4px; }
.nav-btn i { font-size: 14px; color: var(--blue); }

#modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; backdrop-filter: blur(3px); }
#neon-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background: #050614; border: 2px solid var(--blue); border-radius: 15px; padding: 25px; text-align: center; z-index:1001; box-shadow: var(--gb); width: 85%; }
.modal-title { font-family: 'Cinzel Decorative'; color: var(--blue); margin-bottom: 15px; font-size: 20px; text-shadow: var(--gb); }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div id="jp-overlay">BIG WIN!</div>

<audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
<audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>
<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

<div id="modal-overlay"></div>
<div id="neon-modal">
  <div class="modal-title"><i class="fa-solid fa-triangle-exclamation"></i> SYSTEM ALERT</div>
  <p id="modal-msg" style="color:#ddeeff; margin-bottom:20px; font-size:14px;"></p>
  <button class="btn-mode active" onclick="closeModal()" style="width:120px; margin: 0 auto;">OK, UNDERSTOOD</button>
</div>

<div class="header">
  <div class="profile-btn" onclick="location.href='profil.html'"><i class="fa-solid fa-user-shield"></i></div>
  <div class="balance-container">
    <div id="display-saldo">IDR 0</div>
  </div>
  <div class="profile-btn" style="color:var(--yellow)"><i class="fa-solid fa-gem"></i></div>
</div>

<div id="board-wrapper">
  <canvas id="plinko-canvas"></canvas>
  <div id="floating-score"><div id="score-list"></div></div>
</div>

<div class="multiplier-row" id="slot-row"></div>

<div class="controls">
  <div class="mode-row">
    <button class="btn-mode active" id="m-normal" onclick="setSpeedMode('normal')"><i class="fa-solid fa-gauge-high"></i> NORMAL</button>
    <button class="btn-mode" id="m-turbo" onclick="setSpeedMode('turbo')"><i class="fa-solid fa-bolt-lightning"></i> TURBO</button>
    <button class="btn-mode" id="m-auto" onclick="toggleAuto()"><i class="fa-solid fa-rotate"></i> AUTO</button>
  </div>
  <div class="bet-row">
    <button class="bet-btn" onclick="changeBet(-1)"><i class="fa-solid fa-square-minus"></i></button>
    <div style="text-align:center">
      <div style="font-size:9px; color:var(--blue); opacity: 0.8;">BET AMOUNT</div>
      <div id="current-bet">400</div>
    </div>
    <button class="bet-btn" onclick="changeBet(1)"><i class="fa-solid fa-square-plus"></i></button>
  </div>
  <button class="btn-play" id="main-btn" onclick="spawnBall()"><i class="fa-solid fa-meteor"></i> DROP BALL</button>
  <div class="nav-bottom">
    <a href="withdraw.html" class="nav-btn"><i class="fa-solid fa-money-bill-transfer"></i> WITHDRAW</a>
    <a href="deposit.html" class="nav-btn"><i class="fa-solid fa-building-columns"></i> DEPOSIT</a>
    <a href="reward.html" class="nav-btn"><i class="fa-solid fa-trophy"></i> REWARD</a>
  </div>
</div>

<script src="global.js"></script>
<script>
const ROWS   = 10;
const MULTS  = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
const BETS   = [400, 800, 1000, 1200, 1600, 2000, 4000, 8000, 10000, 20000];
const BALL_R = 7, PEG_R = 3.5;

let canvas, ctx, BW, BH, pegs = [], balls = [], slotW;
let speedMode = 'normal', isAuto = false, autoTimer = null, betIdx = 0;
let _saldo = getStoredSaldo();

// ─── PERUBAHAN 1: Gravitasi normal LEBIH LAMBAT (0.18 vs sebelumnya 0.3) ─────
// turbo tetap cepat, autoMs normal diperpanjang agar terasa santai
const PH = {
  normal: { grav: 0.18, fric: 0.992, bounce: 0.42, autoMs: 1200 },
  turbo:  { grav: 0.62, fric: 0.970, bounce: 0.36, autoMs: 300 }
};

// ─── STATUS BOLA ─────────────────────────────────────────────
// WAITING = server belum jawab → bola direm, belum boleh mendarat
// READY   = server sudah jawab → targetIdx aktif, boleh mendarat
// ERROR   = gagal              → bola dihapus, bet kembali
const BALL_WAITING = 'waiting';
const BALL_READY   = 'ready';
const BALL_ERROR   = 'error';

// ─── INIT ────────────────────────────────────────────────────
function init() {
  if (!requireLogin()) return;
  canvas = document.getElementById('plinko-canvas');
  ctx    = canvas.getContext('2d');
  resize();
  _renderS();
  loop();

  // Sync saldo saat kembali ke tab
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && balls.length === 0) {
      apiCall({ action: 'get_saldo', username: getUsername() }).then(res => {
        if (res && res.result === 'SUCCESS') { _saldo = parseFloat(res.saldo) || _saldo; _renderS(); }
      });
    }
  });
}

// ─── RESIZE & BUILD ──────────────────────────────────────────
function resize() {
  const wrap = document.getElementById('board-wrapper');
  BW = wrap.offsetWidth; BH = wrap.offsetHeight;
  const DPR = window.devicePixelRatio || 1;
  canvas.width  = BW * DPR; canvas.height = BH * DPR;
  canvas.style.width = BW + 'px'; canvas.style.height = BH + 'px';
  ctx.scale(DPR, DPR);
  buildBoard();
}

function buildBoard() {
  pegs = [];
  const spaceX = (BW * 0.9) / ROWS;
  const spaceY = (BH * 0.8) / ROWS;
  for (let r = 0; r < ROWS; r++) {
    const count  = r + 2;
    const startX = (BW - (count - 1) * spaceX) / 2;
    for (let c = 0; c < count; c++) {
      pegs.push({ x: startX + c * spaceX, y: 70 + r * spaceY, glow: 0 });
    }
  }
  const row = document.getElementById('slot-row');
  row.innerHTML = ''; slotW = BW / MULTS.length;
  MULTS.forEach((m, i) => {
    const s = document.createElement('div');
    s.className = `slot ${m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low'}`;
    s.id = 'slot-' + i; s.innerHTML = `<span>${m}x</span>`;
    row.appendChild(s);
  });
}

// ─── GAME LOOP ───────────────────────────────────────────────
//
//  ARSITEKTUR 2 ZONA:
//
//  [ZONA PAKU]    y < LAST_PEG_Y
//    → Fisika murni. TIDAK ada magnet/gaya horizontal buatan.
//    → Push-out collision: bola TIDAK tembus paku.
//    → Hanya 1 paku per frame (break) → tidak double-bounce.
//
//  [ZONA LANDING] y >= LAST_PEG_Y
//    → Lerp posisi X 13%/frame ke tengah slot target.
//    → Smooth, tidak teleport, tidak melayang.
//    → vx = 0 agar tidak drift.
//
//  [WAITING]
//    → Bola direm halus di 75% board bawah sampai server jawab.
//
function loop() {
  // ─── PERUBAHAN 2: Hapus shadowBlur canvas (anti-ghosting) ────
  ctx.fillStyle = '#02030d';
  ctx.fillRect(0, 0, BW, BH);

  const ph = PH[speedMode];

  // Batas zona paku terakhir
  const LAST_PEG_Y = 70 + (ROWS - 1) * ((BH * 0.8) / ROWS) + PEG_R + BALL_R + 4;

  // Gambar paku
  pegs.forEach(p => {
    p.glow *= 0.8;
    ctx.fillStyle = p.glow > 0.1 ? '#fff' : 'rgba(0, 68, 255, 0.4)';
    ctx.beginPath(); ctx.arc(p.x, p.y, PEG_R + (p.glow * 1.5), 0, Math.PI * 2); ctx.fill();
  });

  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];

    // Hapus bola error tanpa onLand
    if (b.serverStatus === BALL_ERROR) { balls.splice(i, 1); continue; }

    // Bola WAITING tampil transparan saja (tidak bergerak ke bawah liar)
    if (b.serverStatus === BALL_WAITING) {
      // Tetap jatuh tapi direm keras di 75% board
      const brakeY = BH * 0.75;
      if (b.y > brakeY) {
        const t = Math.min(1, (b.y - brakeY) / (BH * 0.22));
        b.vy *= (1 - t * 0.65);
        if (b.vy < 0.15) b.vy = 0.15;
      }
    }

    if (b.y < LAST_PEG_Y) {
      // ══════════════════════════════════════════
      // [ZONA PAKU] — fisika murni, tanpa magnet
      // ══════════════════════════════════════════
      b.vy += ph.grav;
      if (b.vy > 14) b.vy = 14;
      b.vx *= ph.fric;

      b.x += b.vx;
      b.y += b.vy;

      // Pantul dinding
      if (b.x < BALL_R)         { b.x = BALL_R;      b.vx =  Math.abs(b.vx) * 0.45; }
      else if (b.x > BW-BALL_R) { b.x = BW - BALL_R; b.vx = -Math.abs(b.vx) * 0.45; }

      // ─── PERUBAHAN 3: Push-out collision (bola TIDAK tembus paku) ──
      // Proses 1 paku/frame saja (break setelah hit pertama)
      let hit = false;
      for (let pi = 0; pi < pegs.length; pi++) {
        const p    = pegs[pi];
        const dx   = b.x - p.x;
        const dy   = b.y - p.y;
        const d    = Math.sqrt(dx*dx + dy*dy);
        const minD = BALL_R + PEG_R;
        if (d < minD && d > 0.001) {
          // Push-out: dorong bola keluar dari overlap
          const overlap = minD - d;
          const nx = dx / d, ny = dy / d;
          b.x += nx * overlap;
          b.y += ny * overlap;
          // Refleksi kecepatan pada normal paku
          const dot = b.vx * nx + b.vy * ny;
          if (dot < 0) {
            b.vx = (b.vx - 2 * dot * nx) * ph.bounce + (Math.random() - 0.5) * 0.7;
            b.vy = (b.vy - 2 * dot * ny) * ph.bounce;
            if (b.vy < 1.0) b.vy = 1.0; // selalu turun setelah memantul
            if (b.vy > 14)  b.vy = 14;
          }
          p.glow = 1.2;
          if (!hit) { snd('hit'); hit = true; }
          break; // hanya 1 paku per frame
        }
      }

    } else {
      // ══════════════════════════════════════════
      // [ZONA LANDING] — lerp posisi X ke slot
      // ══════════════════════════════════════════
      b.vy += ph.grav;
      if (b.vy > 14) b.vy = 14;

      if (b.serverStatus === BALL_READY && b.targetIdx !== undefined) {
        // ─── PERUBAHAN 4: Lerp posisi (bukan kecepatan) ─────────────
        // Tidak ada magnet, tidak ada drift, tidak overshoot
        const targetX = (b.targetIdx * slotW) + (slotW / 2);
        b.x += (targetX - b.x) * 0.13;
        b.vx = 0;
      } else {
        b.x  += b.vx;
        b.vx *= 0.92;
      }

      b.y += b.vy;

      if (b.x < BALL_R)         b.x = BALL_R;
      else if (b.x > BW-BALL_R) b.x = BW - BALL_R;
    }

    // ─── PERUBAHAN 2: Render bola TANPA shadowBlur ───────────────
    // Tidak ada blur/bayangan yang mengganggu saat meluncur
    ctx.beginPath();
    ctx.fillStyle = '#ff0077';
    ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2);
    ctx.fill();

    // Mendarat — hanya jika READY
    if (b.y > BH && b.serverStatus === BALL_READY) {
      onLand(b);
      balls.splice(i, 1);
    }
  }
  requestAnimationFrame(loop);
}

// ─── SPAWN BALL ──────────────────────────────────────────────
function spawnBall() {
  const bet  = BETS[betIdx];
  const user = getUsername();
  if (_saldo < bet) { showModal("SALDO TIDAK CUKUP."); stopAuto(); return; }

  const saldoAwal = _saldo;
  _saldo -= bet;
  _renderS();
  snd('click');

  // Bola lahir WAITING — belum boleh mendarat
  const newBall = {
    x: BW/2 + (Math.random()-0.5)*30,
    y: 30, vx: (Math.random()-0.5)*2, vy: 1,
    bet,
    targetIdx:      undefined,
    serverWin:      0,
    serverNewSaldo: undefined,
    serverMult:     undefined,
    serverStatus:   BALL_WAITING
  };
  balls.push(newBall);

  // ─── PERUBAHAN 5: Winrate 100% dari server ───────────────────
  // Server yang menentukan menang/kalah berdasarkan kolom K (Winrate)
  // dan kolom P (MaxWinLimit) di Google Sheet.
  // Client hanya menerima: target_multiplier, win, newSaldo.
  // Tidak ada perhitungan saldo lokal sama sekali.
  apiCall({
    action:    'game_play',
    username:  user,
    bet:       bet,
    saldoAwal: saldoAwal
  }).then(res => {
    if (res && res.result === 'SUCCESS') {
      const tm       = res.target_multiplier;
      const possible = [];
      MULTS.forEach((m, idx) => { if (m === tm) possible.push(idx); });

      // Set data server → status READY → bola boleh mendarat
      newBall.targetIdx      = possible[Math.floor(Math.random() * possible.length)];
      newBall.serverWin      = res.win;
      newBall.serverNewSaldo = res.newSaldo; // saldo murni dari server
      newBall.serverMult     = tm;
      newBall.serverStatus   = BALL_READY;

    } else {
      // Server error → batalkan bola, bet kembali
      newBall.serverStatus = BALL_ERROR;
      _saldo += bet; _renderS();
      showModal(res.message || "SERVER ERROR."); stopAuto();
    }
  }).catch(() => {
    newBall.serverStatus = BALL_ERROR;
    _saldo += bet; _renderS();
    showModal("Koneksi gagal. Cek internet Anda."); stopAuto();
  });
}

// ─── ON LAND ────────────────────────────────────────────────
// ─── PERUBAHAN 6: Saldo & slot 100% dari server ─────────────
// idx = posisi fisik bola (lerp zona landing sudah memastikan
// bola mendarat di dekat targetIdx → slot yang nyala konsisten)
function onLand(b) {
  // ─── PERUBAHAN 6a: Highlight slot sesuai targetIdx server ────
  // Bukan dari posisi fisik b.x — agar 100% konsisten dengan
  // multiplier yang dikirim server (tidak pernah beda kotak)
  const idx = b.targetIdx;

  // ─── PERUBAHAN 6b: Saldo 100% dari server ────────────────────
  _saldo = b.serverNewSaldo;
  _renderS();

  const slotEl = document.getElementById('slot-' + idx);
  if (slotEl) {
    slotEl.classList.add('active');
    setTimeout(() => slotEl.classList.remove('active'), 400);
  }

  // Big Win overlay untuk 10x
  if (b.serverMult >= 10) {
    const jp = document.getElementById('jp-overlay');
    jp.style.display = 'block';
    jp.style.animation = 'none';
    void jp.offsetWidth; // reflow reset animasi
    jp.style.animation = 'jp-anim 1.2s forwards';
    snd('win');
    setTimeout(() => { jp.style.display = 'none'; }, 1300);
  } else if (b.serverMult >= 1) {
    snd('win');
  }

  const list = document.getElementById('score-list');
  const div  = document.createElement('div');
  div.className = 'score-entry';
  div.innerHTML = `<b>${b.serverMult}x</b> | +${Math.floor(b.serverWin).toLocaleString('id-ID')}`;
  list.prepend(div);
  if (list.children.length > 5) list.lastChild.remove();
}

// ─── RENDER SALDO ───────────────────────────────────────────
function _renderS() {
  document.getElementById('display-saldo').textContent = 'IDR ' + Math.floor(_saldo).toLocaleString('id-ID');
  storeLocalSaldo(_saldo);
}

// ─── CONTROLS ───────────────────────────────────────────────
function setSpeedMode(m) { speedMode = m; snd('click'); document.getElementById('m-normal').classList.toggle('active', m === 'normal'); document.getElementById('m-turbo').classList.toggle('active', m === 'turbo'); }
function toggleAuto() { isAuto = !isAuto; document.getElementById('m-auto').classList.toggle('active', isAuto); if (isAuto) { spawnBall(); autoTimer = setInterval(spawnBall, PH[speedMode].autoMs); } else { clearInterval(autoTimer); } }
function stopAuto() { isAuto = false; clearInterval(autoTimer); document.getElementById('m-auto').classList.remove('active'); }
function changeBet(d) { if (isAuto) return; betIdx = Math.max(0, Math.min(BETS.length - 1, betIdx + d)); document.getElementById('current-bet').textContent = BETS[betIdx].toLocaleString('id-ID'); snd('click'); }
function showModal(m) { document.getElementById('modal-msg').textContent = m; document.getElementById('modal-overlay').style.display = 'block'; document.getElementById('neon-modal').style.display = 'block'; }
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; document.getElementById('neon-modal').style.display = 'none'; }
function snd(t) { try { const a = document.getElementById('snd-' + t); a.currentTime = 0; a.play(); } catch(e) {} }

window.addEventListener('resize', resize);
document.addEventListener('DOMContentLoaded', init);

// Set OFFLINE saat tutup tab
window.addEventListener('beforeunload', () => {
  const u = getUsername();
  if (u) navigator.sendBeacon(
    SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify({ action: 'set_status', username: u, status: 'OFFLINE' }))
  );
});
</script>
