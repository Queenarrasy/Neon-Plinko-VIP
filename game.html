<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--bg:#02030d;
  --gp:0 0 8px rgba(255,0,119,.6),0 0 22px rgba(255,0,119,.2);
  --gb:0 0 8px rgba(0,85,255,.6),0 0 22px rgba(0,85,255,.2);
  --gy:0 0 8px rgba(245,230,66,.6),0 0 22px rgba(245,230,66,.2);
  --bp:rgba(255,0,119,.32);--bb:rgba(0,85,255,.32);--by:rgba(245,230,66,.32);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 70% 40% at 10% 0%,rgba(0,55,255,.08) 0%,transparent 65%),
    radial-gradient(ellipse 50% 40% at 90% 100%,rgba(255,0,119,.07) 0%,transparent 65%);
  color:#dde0f0;font-family:'Outfit',sans-serif;
  height:100dvh;overflow:hidden;display:flex;flex-direction:column;
}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.015) 3px,rgba(0,0,0,.015) 4px);}

/* ── MODAL ─────────────────────────────────────────────── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:9998;}
#neon-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(160deg,#07091d,#0b0d24);border-radius:22px;z-index:9999;
  padding:26px 22px;text-align:center;min-width:270px;max-width:310px;width:86%;
  animation:mpop .3s cubic-bezier(.34,1.56,.64,1) both;}
#neon-modal.m-pink{border:1px solid var(--bp);box-shadow:var(--gp);}
#neon-modal.m-blue{border:1px solid var(--bb);box-shadow:var(--gb);}
#neon-modal.m-yellow{border:1px solid var(--by);box-shadow:var(--gy);}
@keyframes mpop{from{opacity:0;transform:translate(-50%,-50%) scale(.7)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
#modal-title{font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;letter-spacing:1.5px;margin-bottom:8px;}
.m-pink #modal-title{color:var(--pink);}
.m-blue #modal-title{color:#7799ff;}
.m-yellow #modal-title{color:var(--yellow);}
#modal-msg{font-size:12px;color:rgba(220,220,240,.65);line-height:1.65;}
.modal-btn{margin-top:15px;padding:9px 24px;border-radius:50px;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;background:transparent;transition:.25s;}
.m-pink .modal-btn{border:1px solid var(--bp);color:var(--pink);}
.m-blue .modal-btn{border:1px solid var(--bb);color:#7799ff;}
.m-yellow .modal-btn{border:1px solid var(--by);color:var(--yellow);}

/* ── HEADER ────────────────────────────────────────────── */
.header{
  position:relative;z-index:10;
  padding:10px 14px;
  background:rgba(2,3,13,.95);
  border-bottom:1px solid var(--bb);
  backdrop-filter:blur(20px);
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 24px rgba(0,85,255,.12);
  flex-shrink:0;
}
.header-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;min-width:52px;transition:.2s;text-decoration:none;
}
.header-item:active{transform:scale(.88);}
.header-item i{font-size:24px;display:block;margin-bottom:2px;}
.header-item span{font-size:9px;font-weight:700;letter-spacing:1px;}

.balance-box{
  background:rgba(0,0,0,.6);
  border:1px solid var(--bp);
  border-radius:20px;
  padding:6px 18px;
  box-shadow:var(--gp);
  text-align:center;
  flex:1;margin:0 10px;
}
.saldo-label{font-size:8px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:2px;}
#display-saldo{
  font-family:'Cinzel Decorative',serif;
  font-size:16px;font-weight:900;color:#fff;
  text-shadow:var(--gp);
}

/* ── BOARD ─────────────────────────────────────────────── */
#game-board{
  position:relative;width:100%;flex:1;min-height:0;overflow:visible;
  margin-top:8px;
}
.peg{
  position:absolute;width:7px;height:7px;background:rgba(255,255,255,.7);
  border-radius:50%;box-shadow:0 0 4px rgba(255,255,255,.3);transform:translate(-50%,-50%);
  transition:background .08s,transform .08s;
}
.peg.hit{background:var(--yellow);box-shadow:var(--gy);transform:translate(-50%,-50%) scale(2);}
.ball{
  position:absolute;width:13px;height:13px;
  background:radial-gradient(circle at 35% 30%,var(--pink),#880022);
  border-radius:50%;box-shadow:var(--gp);transform:translate(-50%,-50%);z-index:10;
  will-change:transform;
}

/* SLOT ROW */
.multiplier-row{
  display:flex;justify-content:center;gap:3px;
  padding:0 8px;margin:6px 0;flex-shrink:0;
}
.slot{
  flex:1;height:32px;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:900;border-radius:8px;color:#000;
  transition:.3s cubic-bezier(.175,.885,.32,1.275);letter-spacing:.5px;
}
.slot.active{transform:translateY(-8px);filter:brightness(1.6);box-shadow:0 0 18px rgba(255,255,255,.4);}
.s-high{background:linear-gradient(135deg,var(--pink),#cc0055);}
.s-mid{background:linear-gradient(135deg,var(--yellow),#c8b800);}
.s-low{background:linear-gradient(135deg,var(--blue),#0033cc);color:rgba(255,255,255,.9)!important;}

/* FLOATING SCORE */
#floating-score{
  position:absolute;top:8px;right:8px;
  background:rgba(2,3,13,.88);
  border:1px solid var(--bb);border-radius:12px;
  padding:6px 8px;z-index:100;
  box-shadow:var(--gb);min-width:88px;
}
.score-entry{
  font-size:9.5px;font-weight:700;color:var(--yellow);
  border-bottom:1px solid rgba(255,255,255,.07);
  padding:3px 0;text-align:center;
}
.score-entry:last-child{border-bottom:none;}

/* ── CONTROLS ─────────────────────────────────────────── */
.controls{
  padding:10px 14px 10px;
  background:rgba(2,3,13,.97);
  border-top:1px solid var(--bb);
  flex-shrink:0;
  position:relative;z-index:10;
}

/* MODE BUTTONS */
.mode-row{display:flex;justify-content:center;gap:8px;margin-bottom:10px;}
.btn-mode{
  background:transparent;padding:8px 16px;border-radius:12px;
  font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;
  cursor:pointer;transition:.25s;letter-spacing:.5px;
}
#m-normal{border:1px solid var(--bp);color:var(--pink);}
#m-normal.active{background:rgba(255,0,119,.2);color:var(--pink);box-shadow:var(--gp);}
#m-turbo{border:1px solid var(--bb);color:#7799ff;}
#m-turbo.active{background:rgba(0,85,255,.2);color:#7799ff;box-shadow:var(--gb);}
#m-auto{border:1px solid var(--by);color:var(--yellow);}
#m-auto.active{background:rgba(245,230,66,.15);color:var(--yellow);box-shadow:var(--gy);}

/* BET ROW */
.bet-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 6px;margin-bottom:10px;
}
.bet-btn{
  width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:26px;cursor:pointer;transition:.2s;background:transparent;border:none;
}
.bet-btn:active{transform:scale(.85);}
.bet-minus{color:var(--pink);border:1px solid var(--bp);}
.bet-minus:hover{background:rgba(255,0,119,.1);box-shadow:var(--gp);}
.bet-plus{color:#7799ff;border:1px solid var(--bb);}
.bet-plus:hover{background:rgba(0,85,255,.1);box-shadow:var(--gb);}
.bet-center{text-align:center;}
.bet-label{font-size:8.5px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,.35);margin-bottom:3px;}
#current-bet{
  font-family:'Cinzel Decorative',serif;
  font-size:22px;font-weight:900;
  color:var(--yellow);text-shadow:var(--gy);
  letter-spacing:1px;
}

/* PLAY BUTTON */
.btn-play{
  width:100%;padding:15px;border-radius:50px;cursor:pointer;
  font-family:'Cinzel Decorative',serif;font-size:13px;font-weight:900;
  letter-spacing:2px;text-transform:uppercase;transition:.2s;
  background:linear-gradient(90deg,rgba(255,0,119,.7),rgba(0,85,255,.7));
  color:#fff;border:1px solid var(--by);
  box-shadow:var(--gp),var(--gb);
}
.btn-play:active{transform:scale(.97);}
.btn-play:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* ── BOTTOM NAV ────────────────────────────────────────── */
.nav-bottom{
  display:grid;grid-template-columns:repeat(3,1fr);
  background:rgba(2,3,13,.97);
  padding:8px 10px 10px;gap:8px;
  border-top:1px solid var(--bb);
  flex-shrink:0;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:9px 0;border-radius:14px;text-decoration:none;
  font-family:'Outfit',sans-serif;font-weight:700;transition:.2s;
}
.nav-btn:active{transform:scale(.93);}
.nav-btn i{font-size:20px;margin-bottom:3px;}
.nav-btn span{font-size:9px;letter-spacing:.5px;}
.btn-withdraw{border:1px solid var(--by);color:var(--yellow);background:rgba(245,230,66,.04);}
.btn-withdraw:hover{background:rgba(245,230,66,.1);box-shadow:var(--gy);}
.btn-deposit{border:1px solid var(--bp);color:var(--pink);background:rgba(255,0,119,.04);}
.btn-deposit:hover{background:rgba(255,0,119,.1);box-shadow:var(--gp);}
.btn-reward{border:1px solid var(--bb);color:#7799ff;background:rgba(0,85,255,.04);}
.btn-reward:hover{background:rgba(0,85,255,.1);box-shadow:var(--gb);}
</style>
</head>

<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="none"></audio>
<audio id="snd-hit"   src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="none"></audio>
<audio id="snd-win"   src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="none"></audio>
<audio id="snd-error" src="https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3" preload="none"></audio>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModal()"></div>
<div id="neon-modal" class="m-pink">
  <div id="modal-title">NOTIFIKASI</div>
  <div id="modal-msg"></div>
  <button class="modal-btn" onclick="closeModal()">OK</button>
</div>

<!-- HEADER -->
<div class="header" style="position:relative;z-index:10;">
  <div class="header-item" onclick="playSound('click');location.href='profil.html'">
    <i class="fa-solid fa-circle-user" style="color:var(--yellow);text-shadow:var(--gy);"></i>
    <span style="color:var(--yellow);">PROFIL</span>
  </div>
  <div class="balance-box">
    <div class="saldo-label">SALDO UTAMA</div>
    <div id="display-saldo">IDR 0</div>
  </div>
  <div class="header-item" style="visibility:hidden;min-width:52px;"></div>
</div>

<!-- BOARD AREA -->
<div style="position:relative;flex:1;min-height:0;">
  <div id="game-board"></div>
  <div id="floating-score">
    <div id="score-list">
      <div class="score-entry" style="opacity:.3;">Ready...</div>
    </div>
  </div>
</div>

<!-- SLOT ROW -->
<div class="multiplier-row" id="slot-row"></div>

<!-- CONTROLS -->
<div class="controls">
  <div class="mode-row">
    <button class="btn-mode active" id="m-normal" onclick="setSpeed('normal')">NORMAL</button>
    <button class="btn-mode"        id="m-turbo"  onclick="setSpeed('turbo')">TURBO</button>
    <button class="btn-mode"        id="m-auto"   onclick="toggleAuto()">AUTO: OFF</button>
  </div>
  <div class="bet-row">
    <div class="bet-btn bet-minus" id="minus-bet" onclick="changeBet(-1)">
      <i class="fa-solid fa-circle-minus"></i>
    </div>
    <div class="bet-center">
      <div class="bet-label">TARUHAN</div>
      <div id="current-bet">400</div>
    </div>
    <div class="bet-btn bet-plus" id="plus-bet" onclick="changeBet(1)">
      <i class="fa-solid fa-circle-plus"></i>
    </div>
  </div>
  <button class="btn-play" id="main-btn-play" onclick="handlePlay()">
    <i class="fa-solid fa-play"></i> &nbsp;PLAY BALL
  </button>
</div>

<!-- BOTTOM NAV -->
<div class="nav-bottom">
  <a href="withdraw.html" class="nav-btn btn-withdraw" onclick="playSound('click')">
    <i class="fa-solid fa-money-bill-transfer"></i><span>WITHDRAW</span>
  </a>
  <a href="deposit.html" class="nav-btn btn-deposit" onclick="playSound('click')">
    <i class="fa-solid fa-wallet"></i><span>DEPOSIT</span>
  </a>
  <a href="reward.html" class="nav-btn btn-reward" onclick="playSound('click')">
    <i class="fa-solid fa-gift"></i><span>REWARD</span>
  </a>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYTC11njbEBtAsdpbaRLJRt13j7iEKCkANV1SgxxguV_zFUyZ6Z7FAj0SKuw4d5ThmKw/exec";

// ── STATE ──────────────────────────────────────────────────
const betList     = [400,800,1000,1200,1600,1800,2000,4000,8000,10000,12000,16000,18000,20000];
const multipliers = [5, 2, 1.2, 0.5, 0.2, 0.5, 1.2, 2, 5];
let betIdx = 0, pegLocs = [], speed = 'normal', isAuto = false, autoInt;
let _syncInterval;

// ── HELPERS ────────────────────────────────────────────────
function getUsername() { return localStorage.getItem('username'); }
function getSaldo()    { return parseFloat(localStorage.getItem('user_saldo') || 0); }
function setSaldo(v)   {
  const val = parseFloat(v) || 0;
  localStorage.setItem('user_saldo', val);
  document.getElementById('display-saldo').textContent = 'IDR ' + Math.floor(val).toLocaleString('id-ID');
}
function fmtIDR(v) { return 'IDR ' + Math.floor(v).toLocaleString('id-ID'); }

function playSound(type) {
  const s = document.getElementById('snd-' + type);
  if (s) { s.currentTime = 0; s.play().catch(()=>{}); }
}

// ── MODAL ──────────────────────────────────────────────────
function showModal(msg, colorType) {
  // colorType: 'pink' | 'blue' | 'yellow'
  const type = colorType || 'pink';
  const m = document.getElementById('neon-modal');
  m.className = 'm-' + type;
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal-title').textContent =
    type === 'yellow' ? '✨ MENANG!' : type === 'blue' ? 'ℹ️ INFO' : '⚠️ PERHATIAN';
  document.getElementById('modal-overlay').style.display = 'block';
  m.style.display = 'block';
}
function closeModal() {
  playSound('click');
  document.getElementById('neon-modal').style.display = 'none';
  document.getElementById('modal-overlay').style.display = 'none';
}

// ── API ────────────────────────────────────────────────────
async function apiCall(payload) {
  try {
    const url = SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify(payload));
    const r = await fetch(url, { redirect:'follow' });
    const j = JSON.parse(await r.text());
    if (j && j.result !== undefined) return j;
  } catch(e) {}
  try {
    const r2 = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify(payload) });
    return JSON.parse(await r2.text());
  } catch(e) { return { result:'ERROR' }; }
}

// ── SYNC SALDO ─────────────────────────────────────────────
function startSync() {
  if (_syncInterval) clearInterval(_syncInterval);
  _syncInterval = setInterval(async () => {
    const u = getUsername();
    if (!u) return;
    try {
      const res = await apiCall({ action:'get_saldo', username:u });
      if (res.result === 'SUCCESS') setSaldo(res.saldo);
    } catch(e) {}
  }, 8000);
}

// ── BOARD INIT ─────────────────────────────────────────────
function init() {
  const board = document.getElementById('game-board');
  board.innerHTML = ''; pegLocs = [];
  const rows = 9;
  const boardW = board.offsetWidth;
  const boardH = board.offsetHeight || 280;
  const centerX = boardW / 2;
  if (centerX === 0) return setTimeout(init, 80);

  const spacingX = Math.min(38, (boardW - 40) / (rows + 1));
  const spacingY = (boardH - 20) / (rows + 1);

  for (let r = 2; r <= rows; r++) {
    for (let i = 0; i < r; i++) {
      const x = centerX + (i - (r - 1) / 2) * spacingX;
      const y = r * spacingY;
      const p = document.createElement('div');
      p.className = 'peg';
      p.style.left = x + 'px';
      p.style.top  = y + 'px';
      board.appendChild(p);
      pegLocs.push({ x, y, el: p });
    }
  }

  const row = document.getElementById('slot-row');
  row.innerHTML = '';
  multipliers.forEach((m, idx) => {
    const s = document.createElement('div');
    s.className = `slot ${m >= 2 ? 's-high' : m >= 1 ? 's-mid' : 's-low'}`;
    s.id = 'slot-' + idx;
    s.textContent = m + 'x';
    row.appendChild(s);
  });
}

// ── MODE & SPEED ───────────────────────────────────────────
function setSpeed(m) {
  playSound('click');
  speed = m;
  document.getElementById('m-normal').classList.toggle('active', m === 'normal');
  document.getElementById('m-turbo').classList.toggle('active',  m === 'turbo');
  if (isAuto) {
    clearInterval(autoInt);
    autoInt = setInterval(handlePlay, speed === 'turbo' ? 250 : 800);
  }
}

function toggleAuto() {
  playSound('click');
  if (isAuto) {
    isAuto = false;
    clearInterval(autoInt);
    document.getElementById('m-auto').textContent = 'AUTO: OFF';
    document.getElementById('m-auto').classList.remove('active');
  } else {
    isAuto = true;
    document.getElementById('m-auto').textContent = 'AUTO: ON';
    document.getElementById('m-auto').classList.add('active');
    autoInt = setInterval(handlePlay, speed === 'turbo' ? 250 : 800);
  }
}

function changeBet(d) {
  if (isAuto) return;
  playSound('click');
  betIdx = Math.max(0, Math.min(betList.length - 1, betIdx + d));
  document.getElementById('current-bet').textContent = betList[betIdx].toLocaleString('id-ID');
}

// ── HANDLE PLAY ────────────────────────────────────────────
function handlePlay() {
  const bet = betList[betIdx];
  let saldo = getSaldo();

  if (saldo < bet) {
    playSound('error');
    if (isAuto) toggleAuto();
    return showModal('Saldo tidak cukup untuk taruhan ini!', 'pink');
  }

  // Potong saldo lokal instan
  saldo -= bet;
  setSaldo(saldo);

  // Kirim ke server di background
  const req = fetch(SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify({
    action: 'game_play',
    username: getUsername(),
    bet: bet
  })), { redirect: 'follow' })
  .then(r => r.json())
  .catch(() => null);

  req.then(result => {
    if (result && result.result === 'SUCCESS') {
      setSaldo(result.newSaldo);
      dropBall(bet, result.target_multiplier);
    } else {
      // Fallback: jalankan bola dengan multiplier acak
      dropBall(bet, multipliers[Math.floor(Math.random() * multipliers.length)]);
    }
  }).catch(() => {
    dropBall(bet, multipliers[Math.floor(Math.random() * multipliers.length)]);
  });
}

// ── DROP BALL ──────────────────────────────────────────────
function dropBall(bet, targetMult) {
  const board = document.getElementById('game-board');
  const ball  = document.createElement('div');
  ball.className = 'ball';
  board.appendChild(ball);

  const boardW = board.offsetWidth;
  const boardH = board.offsetHeight || 280;
  let px = boardW / 2 + (Math.random() * 6 - 3);
  let py = 0;
  let vx = (Math.random() - 0.5) * 1.5;
  let vy = 0;

  // Cari semua slot yang cocok
  const possibleIdx = [];
  multipliers.forEach((m, i) => { if (m === targetMult) possibleIdx.push(i); });
  const targetIdx  = possibleIdx[Math.floor(Math.random() * possibleIdx.length)];
  const slotWidth  = boardW / multipliers.length;
  const targetX    = targetIdx * slotWidth + slotWidth / 2;

  const cfg = speed === 'turbo'
    ? { gravity: 0.38, bounce: 0.36, friction: 0.981 }
    : { gravity: 0.21, bounce: 0.44, friction: 0.986 };

  function animate() {
    vy += cfg.gravity;
    vx *= cfg.friction;
    px += vx;
    py += vy;

    pegLocs.forEach(p => {
      const dx = px - p.x, dy = py - p.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 11) {
        playSound('hit');
        const angle = Math.atan2(dy, dx);
        const force = speed === 'turbo' ? 4.4 : 3.7;
        vx = Math.cos(angle) * force + (Math.random() - 0.5) * 0.6;
        vy = Math.abs(Math.sin(angle) * force * 0.6);
        const pull = (py / boardH) * 0.13;
        vx += (targetX - px) * pull;
        p.el.classList.add('hit');
        setTimeout(() => p.el.classList.remove('hit'), 65);
      }
    });

    if (px < 10)           { vx = Math.abs(vx); px = 10; }
    if (px > boardW - 10)  { vx = -Math.abs(vx); px = boardW - 10; }

    ball.style.transform = `translate(${px}px, ${py}px)`;

    if (py < boardH) {
      requestAnimationFrame(animate);
    } else {
      ball.remove();
      finish(bet, targetMult, targetIdx);
    }
  }
  requestAnimationFrame(animate);
}

// ── FINISH ─────────────────────────────────────────────────
function finish(bet, targetMult, targetIdx) {
  const win = Math.floor(bet * targetMult);
  if (targetMult >= 1.2) playSound('win');

  const slot = document.getElementById('slot-' + targetIdx);
  if (slot) {
    slot.classList.add('active');
    setTimeout(() => slot.classList.remove('active'), 650);
  }

  // Score board (max 3)
  const list  = document.getElementById('score-list');
  const entry = document.createElement('div');
  entry.className = 'score-entry';
  const color = targetMult >= 2 ? 'var(--pink)' : targetMult >= 1.2 ? 'var(--yellow)' : '#7799ff';
  entry.innerHTML = `<span style="color:${color}">${targetMult}x</span> · ${fmtIDR(win)}`;
  list.prepend(entry);
  while (list.children.length > 3) list.removeChild(list.lastChild);
}

// ── INIT ──────────────────────────────────────────────────
window.addEventListener('load', async () => {
  if (!getUsername()) { location.href = 'index.html'; return; }

  init();
  window.addEventListener('resize', init);

  setSaldo(getSaldo()); // render saldo dari cache

  // Fetch config game dari server
  try {
    const res = await apiCall({ action: 'get_game_config', username: getUsername() });
    if (res.result === 'SUCCESS') setSaldo(res.saldo);
  } catch(e) {}

  // Set status online + sync saldo
  try { await fetch(SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify({
    action: 'set_status', username: getUsername(), status: 'ONLINE'
  })), { redirect: 'follow' }); } catch(e) {}

  startSync();
});

window.addEventListener('beforeunload', () => {
  const u = getUsername();
  if (!u) return;
  navigator.sendBeacon(SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify({
    action: 'set_status', username: u, status: 'OFFLINE'
  })));
  if (_syncInterval) clearInterval(_syncInterval);
});
</script>
