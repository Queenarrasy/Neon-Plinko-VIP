<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO — AR PREMIUM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --pink: #ff0077; --blue: #0022ff; --yellow: #fbff00; --bg: #010208; --deep-blue: #050a30;
            --gp: 0 0 20px rgba(255, 0, 119, 0.8);
            --gy: 0 0 15px rgba(251, 255, 0, 0.6);
            --gb: 0 0 15px rgba(0, 34, 255, 0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            background-image: 
                radial-gradient(circle at 50% 50%, var(--deep-blue) 0%, var(--bg) 100%);
            color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
        }

        /* MODERN CYBER BACKGROUND */
        body::before {
            content: ""; position: absolute; inset: 0;
            background-image: 
                linear-gradient(rgba(0, 34, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 34, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            z-index: 0;
        }

        /* HEADER */
        .header { 
            height: 90px; padding: 0 15px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(2, 3, 13, 0.98); border-bottom: 2px solid var(--blue); z-index: 100;
        }
        
        .header-left { flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .header-left i { font-size: 24px; color: var(--pink); filter: drop-shadow(var(--gp)); }
        .header-left span { font-size: 8px; font-weight: 800; color: var(--pink); margin-top: 3px; letter-spacing: 1px; }

        .header-center { flex: 2; display: flex; justify-content: center; }
        .balance-box { 
            background: #000; border: 2px solid var(--yellow); 
            padding: 6px 15px; border-radius: 12px; box-shadow: var(--gy); text-align: center; min-width: 150px;
        }
        .balance-label { display: block; font-size: 7px; font-weight: 800; color: var(--yellow); opacity: 0.9; letter-spacing: 1.5px; margin-bottom: 2px; }
        #saldo-text { color: var(--yellow); font-weight: 900; font-size: 16px; text-shadow: var(--gy); }

        .header-right { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo-main { font-family: 'Cinzel Decorative'; font-weight: 900; line-height: 1; text-align: center; }
        .logo-main .n-text { font-size: 12px; color: var(--pink); text-shadow: var(--gp); display: block; margin-bottom: 2px; }
        .logo-main .p-text { font-size: 16px; color: var(--blue); text-shadow: var(--gb); letter-spacing: 1px; }
        .logo-main .v-tag { color: var(--yellow); font-size: 11px; }

        /* GAME AREA */
        #game-area { flex: 1; position: relative; display: flex; justify-content: center; overflow: hidden; z-index: 1; }
        #board-wrapper { position: relative; width: 100%; max-width: 400px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        canvas { max-height: 65%; width: 100%; z-index: 5; margin-top: 5px; }

        .m-bar { width: 95%; display: flex; justify-content: center; gap: 4px; padding-bottom: 5px; }
        .m-slot { 
            flex: 1; height: 30px; border-radius: 6px; font-size: 9px; font-weight: 900; 
            display: flex; align-items: center; justify-content: center; color: #fff; 
            border: 1px solid rgba(255,255,255,0.2); transition: all 0.2s;
        }
        .m-slot.hit-win { transform: scale(1.4) translateY(-8px); filter: brightness(1.8); box-shadow: 0 0 25px var(--yellow); z-index: 10; }

        /* WIN PANEL - CENTERED BETWEEN SLOTS & CONTROLS */
        #win-panel {
            width: 85%; height: 50px; background: rgba(5, 10, 48, 0.4); 
            border: 1.5px solid var(--blue); border-top: 1.5px solid var(--pink);
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); margin: 15px 0;
        }
        #win-display { font-size: 20px; font-weight: 800; letter-spacing: 1px; transition: all 0.3s; color: rgba(255,255,255,0.1); }
        #win-display.active { transform: scale(1.1); text-shadow: 0 0 15px currentColor; }

        /* CONTROLLERS */
        .controls { 
            background: #050614; padding: 15px 20px 20px; border-top: 2px solid var(--blue); 
            border-radius: 30px 30px 0 0; z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.8); width: 100%;
        }
        .bet-row { display: flex; justify-content: center; align-items: center; margin-bottom: 12px; gap: 20px; }
        .bet-val { font-size: 20px; font-weight: 800; color: var(--yellow); min-width: 80px; text-align: center; text-shadow: var(--gy); }
        .bet-btn-circ { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--blue); display: flex; align-items: center; justify-content: center; color: var(--blue); box-shadow: var(--gb); background: #000; font-size: 16px; cursor: pointer; }

        .mode-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid rgba(0, 34, 255, 0.4); background: transparent; color: #fff; font-size: 10px; font-weight: 800; }
        .mode-btn.active { background: var(--blue); box-shadow: var(--gb); border-color: #fff; }
        .mode-btn.auto-active { background: var(--pink); border-color: #fff; animation: glow-p 1s infinite alternate; }

        .btn-drop { width: 100%; padding: 16px; border-radius: 40px; border: none; background: linear-gradient(90deg, var(--blue), var(--pink)); color: #fff; font-weight: 800; font-size: 18px; box-shadow: var(--gp); cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-drop.stop-mode { background: #ff0000; box-shadow: 0 0 20px #ff0000; }

        /* NAV BAR */
        .nav-bar { height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid rgba(0,34,255,0.4); }
        .nav-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .nav-item i { font-size: 22px; filter: drop-shadow(0 0 5px currentColor); }
        .nav-item span { font-size: 9px; font-weight: 800; letter-spacing: 1px; }
        
        .nav-depo { color: var(--yellow); }
        .nav-wd { color: var(--pink); }
        .nav-reward { color: var(--blue); }

        #custom-alert { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:9999; align-items:center; justify-content:center; backdrop-filter:blur(5px); }
        .alert-box { width:270px; background:#050614; border:2px solid var(--blue); border-bottom: 4px solid var(--pink); border-radius:20px; padding:25px; text-align:center; box-shadow: var(--gb); }
        #a-msg { color:var(--yellow); font-size:14px; font-weight:800; margin-bottom:20px; text-shadow: var(--gy); text-transform: uppercase; }
        .alert-btn { width:100%; background:var(--pink); border:none; color:#fff; padding:12px; border-radius:50px; font-weight:800; box-shadow: var(--gp); cursor:pointer; }

        @keyframes glow-p { from { box-shadow: 0 0 5px var(--pink); } to { box-shadow: 0 0 15px var(--pink); } }
    </style>
</head>
<body>

    <audio id="snd-click" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b417f73c.mp3"></audio>
    <audio id="snd-drop" src="https://cdn.pixabay.com/audio/2022/03/10/audio_5072782f94.mp3"></audio>
    <audio id="snd-win" src="https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3"></audio>

    <div id="custom-alert">
        <div class="alert-box">
            <div id="a-msg">NOTIFICATION</div>
            <button class="alert-btn" onclick="closeAlert()">CLOSE</button>
        </div>
    </div>

    <div class="header">
        <div class="header-left" onclick="location.href='profil.html'">
            <i class="fas fa-user-astronaut"></i>
            <span>PROFIL</span>
        </div>
        <div class="header-center">
            <div class="balance-box">
                <span class="balance-label">SALDO UTAMA</span>
                <span id="saldo-text">IDR 0</span>
            </div>
        </div>
        <div class="header-right">
            <div class="logo-main">
                <span class="n-text">NEON</span>
                <span class="p-text">PLINKO <b class="v-tag">VIP</b></span>
            </div>
        </div>
    </div>

    <div id="game-area">
        <div id="board-wrapper">
            <canvas id="canvas"></canvas>
            
            <div class="m-bar" id="m-bar"></div>
            
            <div id="win-panel">
                <div id="win-display">(x0.0) 0</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="bet-row">
            <div class="bet-btn-circ" onclick="changeBet(-1)"><i class="fas fa-minus"></i></div>
            <div class="bet-val" id="bet-display">400</div>
            <div class="bet-btn-circ" onclick="changeBet(1)"><i class="fas fa-plus"></i></div>
        </div>
        <div class="mode-row">
            <button class="mode-btn active" id="btn-normal" onclick="setMode('normal')">NORMAL</button>
            <button class="mode-btn" id="btn-turbo" onclick="setMode('turbo')">TURBO</button>
            <button class="mode-btn" id="btn-auto" onclick="toggleAuto()">AUTO</button>
        </div>
        <button class="btn-drop" id="btn-action" onclick="handleAction()">DROP BALL</button>
    </div>

    <div class="nav-bar">
        <a href="deposit.html" class="nav-item nav-depo">
            <i class="fas fa-wallet"></i>
            <span>DEPOSIT</span>
        </a>
        <a href="withdraw.html" class="nav-item nav-wd">
            <i class="fas fa-university"></i>
            <span>WITHDRAW</span>
        </a>
        <a href="reward.html" class="nav-item nav-reward">
            <i class="fas fa-gem"></i>
            <span>HADIAH</span>
        </a>
    </div>

<script>
    const SUPA_URL = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
    const SUPA_KEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani"; 
    const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

    const username = localStorage.getItem('user_session');
    const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;
    
    const engine = Engine.create({ gravity: { y: 1.6 } });
    const BET_LIST = [400, 800, 1000, 1200, 1400, 1600, 1800, 2000, 4000, 6000, 8000, 10000];
    let betIdx = 0, balance = 0;
    let isAuto = false, isTurbo = false, autoTimer = null;

    const multis = [10, 5, 2, 0.5, 0.2, 0.2, 0.5, 2, 5, 10];
    const colors = ['#ff0077', '#0022ff', '#0044ff', '#1a1b3a', '#050614', '#050614', '#1a1b3a', '#0044ff', '#0022ff', '#ff0077'];

    function playSound(id) { const s = document.getElementById(id); if(s) { s.currentTime = 0; s.play().catch(()=>{}); } }

    async function checkUser() {
        if(!username) { location.href='index.html'; return; }
        const { data } = await _supa.from('profiles').select('*').eq('username', username).single();
        if(data) { balance = data.saldo; updateBalanceUI(); }
    }

    function updateBalanceUI() { document.getElementById('saldo-text').innerText = "IDR " + Math.floor(balance).toLocaleString(); }

    function setupBoard() {
        const canvas = document.getElementById('canvas');
        const render = Render.create({ canvas: canvas, engine: engine, options: { width: 380, height: 460, wireframes: false, background: 'transparent' } });

        for (let r = 0; r < 9; r++) {
            let pins = r + 3;
            for (let c = 0; c < pins; c++) {
                let x = 190 + (c - pins / 2 + 0.5) * 34;
                let y = 65 + r * 40;
                Composite.add(engine.world, Bodies.circle(x, y, 3.5, { 
                    isStatic: true, restitution: 0.8, label: 'pin',
                    render: { fillStyle: '#fff' } 
                }));
            }
        }

        multis.forEach((v, i) => {
            const slot = document.createElement('div');
            slot.className = 'm-slot'; slot.id = 'slot-' + i; slot.style.background = colors[i]; slot.innerText = 'x' + v;
            document.getElementById('m-bar').appendChild(slot);
            const sensor = Bodies.rectangle(35 + i * 34.5, 435, 30, 40, { isStatic: true, isSensor: true, label: 'm_'+v+'_'+i, render: { visible: false } });
            Composite.add(engine.world, sensor);
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                const bA = pair.bodyA; const bB = pair.bodyB;
                if(bA.label === 'pin' || bB.label === 'pin') {
                    const pin = bA.label === 'pin' ? bA : bB;
                    pin.render.fillStyle = '#fbff00';
                    setTimeout(() => { pin.render.fillStyle = '#fff'; }, 100);
                }
                if (bB.label.startsWith('m_') && bA.label === 'ball') handleWin(bA, bB.label);
                else if (bA.label.startsWith('m_') && bB.label === 'ball') handleWin(bB, bA.label);
            });
        });
    }

    async function spawnBall() {
        const currentBet = BET_LIST[betIdx];
        if(balance < currentBet) { stopAuto(); showAlert("SALDO TIDAK CUKUP!"); return; }
        playSound('snd-drop');
        balance -= currentBet;
        updateBalanceUI();
        await _supa.from('profiles').update({ saldo: balance }).eq('username', username);

        const ball = Bodies.circle(190 + (Math.random() * 4 - 2), 15, 7.5, { 
            label: 'ball', restitution: 0.5, friction: 0.01, frictionAir: 0.02, 
            render: { fillStyle: '#ff0077', strokeStyle: '#fff', lineWidth: 2 } 
        });
        Body.setVelocity(ball, { x: (Math.random() - 0.5) * 1.5, y: 0 });
        Composite.add(engine.world, ball);
        setTimeout(() => { if(Composite.allBodies(engine.world).includes(ball)) Composite.remove(engine.world, ball); }, 7000);
    }

    async function handleWin(ball, labelData) {
        if(ball.processed) return; ball.processed = true;
        const currentBet = BET_LIST[betIdx];
        const parts = labelData.split('_');
        let m = parseFloat(parts[1]);
        let slotIdx = parts[2];
        
        let win = Math.floor(currentBet * m);
        balance += win;
        updateBalanceUI();
        
        const winDisp = document.getElementById('win-display');
        winDisp.classList.remove('active');
        void winDisp.offsetWidth; 
        
        winDisp.innerText = `(x${m}) ${win.toLocaleString()}`;
        winDisp.style.color = m >= 1 ? 'var(--yellow)' : 'var(--pink)';
        winDisp.classList.add('active');

        const slotEl = document.getElementById('slot-' + slotIdx);
        if(slotEl) {
            slotEl.classList.add('hit-win');
            setTimeout(() => slotEl.classList.remove('hit-win'), 350);
        }
        
        if(win > 0) playSound('snd-win');
        Composite.remove(engine.world, ball);
        await _supa.from('profiles').update({ saldo: balance }).eq('username', username);
    }

    function changeBet(d) { if(isAuto) return; playSound('snd-click'); betIdx = Math.max(0, Math.min(BET_LIST.length - 1, betIdx + d)); document.getElementById('bet-display').innerText = BET_LIST[betIdx].toLocaleString(); }
    function setMode(m) { playSound('snd-click'); isTurbo = (m === 'turbo'); document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+m).classList.add('active'); if(isAuto) { clearInterval(autoTimer); autoTimer = setInterval(spawnBall, isTurbo ? 400 : 900); } }
    function toggleAuto() { playSound('snd-click'); isAuto = !isAuto; const btnAuto = document.getElementById('btn-auto'); const btnAction = document.getElementById('btn-action'); if(isAuto) { btnAuto.classList.add('auto-active'); btnAction.innerText = "STOP AUTO"; btnAction.classList.add('stop-mode'); autoTimer = setInterval(spawnBall, isTurbo ? 400 : 900); } else stopAuto(); }
    function stopAuto() { isAuto = false; clearInterval(autoTimer); document.getElementById('btn-auto').classList.remove('auto-active'); document.getElementById('btn-action').innerText = "DROP BALL"; document.getElementById('btn-action').classList.remove('stop-mode'); }
    function handleAction() { if(isAuto) stopAuto(); else spawnBall(); }
    function showAlert(m) { document.getElementById('a-msg').innerText = m; document.getElementById('custom-alert').style.display = 'flex'; }
    function closeAlert() { playSound('snd-click'); document.getElementById('custom-alert').style.display = 'none'; }
    
    window.onload = () => { setupBoard(); checkUser(); };
</script>
</body>
</html>
