<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO — AR PREMIUM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --pink: #ff0077; --blue: #0022ff; --yellow: #fbff00; --bg: #02030d;
            --gp: 0 0 20px rgba(255, 0, 119, 0.8);
            --gy: 0 0 15px rgba(251, 255, 0, 0.6);
            --gb: 0 0 15px rgba(0, 34, 255, 0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            background-image: 
                linear-gradient(rgba(0, 34, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 34, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
        }

        /* HEADER SECTION */
        .header { 
            height: 85px; padding: 0 15px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(5, 6, 20, 0.8); border-bottom: 1px solid rgba(0, 34, 255, 0.3); z-index: 100;
        }
        
        /* 1. Profil Astronot Pink */
        .header-left { flex: 1; display: flex; flex-direction: column; align-items: flex-start; cursor: pointer; }
        .header-left i { font-size: 28px; color: var(--pink); filter: drop-shadow(var(--gp)); }
        .header-left span { font-size: 9px; font-weight: 800; color: var(--pink); margin-top: 4px; text-shadow: var(--gp); letter-spacing: 1px; }

        /* 2. Kotak Saldo Tengah */
        .header-center { flex: 2; display: flex; justify-content: center; align-items: center; }
        .balance-box { 
            background: rgba(0,0,0,0.9); border: 2px solid var(--yellow); 
            padding: 4px 15px; border-radius: 15px; box-shadow: var(--gy);
            text-align: center; min-width: 140px;
        }
        .balance-label { display: block; font-size: 8px; font-weight: 800; color: var(--yellow); opacity: 0.8; letter-spacing: 1px; margin-bottom: -2px; }
        #saldo-text { color: var(--yellow); font-weight: 900; font-size: 14px; text-shadow: var(--gy); }

        /* 3. Logo VIP Aksen 3 Warna */
        .header-right { flex: 1; display: flex; flex-direction: column; align-items: flex-end; }
        .logo-main { font-family: 'Cinzel Decorative'; color: #fff; font-size: 10px; font-weight: 900; line-height: 1.1; text-align: right; }
        .logo-main span { color: var(--blue); text-shadow: var(--gb); font-size: 13px; }
        .vip-tag { font-size: 14px; color: var(--pink); text-shadow: var(--gp); margin-left: 2px; }
        .neon-accents { display: flex; gap: 3px; margin-top: 4px; }
        .acc-line { width: 12px; height: 3px; border-radius: 2px; }
        .acc-p { background: var(--pink); box-shadow: var(--gp); }
        .acc-b { background: var(--blue); box-shadow: var(--gb); }
        .acc-y { background: var(--yellow); box-shadow: var(--gy); }

        #game-area { flex: 1; position: relative; display: flex; justify-content: center; overflow: hidden; }
        #board-wrapper { position: relative; width: 100%; max-width: 400px; height: 100%; display: flex; flex-direction: column; align-items: center; }
        canvas { max-height: 80%; width: 100%; z-index: 5; }

        #side-history { position: absolute; right: 10px; top: 20px; width: 75px; display: flex; flex-direction: column; gap: 8px; z-index: 50; }
        .history-item { background: rgba(5, 6, 20, 0.9); border: 1.5px solid var(--blue); padding: 8px 4px; border-radius: 10px; text-align: center; animation: slideIn 0.3s ease-out; box-shadow: var(--gb); }
        .history-item.win { border-color: var(--yellow); box-shadow: var(--gy); }
        .history-val { display: block; font-size: 10px; font-weight: 800; color: #fff; }
        .history-multi { font-size: 9px; color: var(--pink); font-weight: 900; }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .m-bar { width: 95%; display: flex; justify-content: center; gap: 3px; padding-bottom: 10px; margin-top: -15px; }
        .m-slot { flex: 1; height: 28px; border-radius: 4px; font-size: 8px; font-weight: 900; display: flex; align-items: center; justify-content: center; color: #fff; border: 1px solid rgba(255,255,255,0.2); }

        .controls { background: #050614; padding: 12px 15px; border-top: 1px solid var(--blue); border-radius: 20px 20px 0 0; z-index: 100; }
        .bet-row { display: flex; justify-content: center; align-items: center; margin-bottom: 8px; gap: 15px; }
        .bet-val { font-size: 20px; font-weight: 900; color: var(--yellow); font-family: 'Cinzel Decorative'; min-width: 70px; text-align: center; }
        .bet-btn-circ { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--blue); display: flex; align-items: center; justify-content: center; color: var(--blue); box-shadow: var(--gb); }

        .mode-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .mode-btn { flex: 1; padding: 8px; border-radius: 10px; border: 1px solid rgba(0, 34, 255, 0.4); background: transparent; color: #fff; font-size: 9px; font-weight: 800; }
        .mode-btn.active { background: var(--blue); box-shadow: var(--gb); }
        .mode-btn.auto-active { background: var(--pink); border-color: #fff; animation: glow-p 1s infinite alternate; }

        .btn-drop { width: 100%; padding: 12px; border-radius: 25px; border: none; background: linear-gradient(90deg, var(--blue), var(--pink)); color: #fff; font-family: 'Cinzel Decorative'; font-weight: 900; font-size: 16px; box-shadow: var(--gp); cursor: pointer; }
        .btn-drop.stop-mode { background: #ff0000; box-shadow: 0 0 15px #ff0000; }

        /* 4. Floating Score 1 Baris */
        .f-score { position: absolute; font-weight: 900; font-size: 16px; animation: floatUp 0.8s ease-out forwards; pointer-events: none; z-index: 500; text-shadow: 0 0 10px #000; white-space: nowrap; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 100% { transform: translateY(-100px) scale(1.3); opacity: 0; } }

        .nav-bar { height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { text-decoration: none; text-align: center; font-size: 8px; font-weight: 700; color: rgba(255,255,255,0.4); }
        .nav-item i { font-size: 18px; display: block; margin-bottom: 2px; }
        .nav-item.active { color: #fff; }

        #custom-alert { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .alert-box { width: 280px; background: #050614; border: 2px solid var(--pink); border-radius: 20px; padding: 25px; text-align: center; }
        .alert-btn { width: 100%; background: var(--blue); border: none; color: #fff; padding: 12px; border-radius: 50px; margin-top: 20px; font-weight: 900; }
        @keyframes glow-p { from { box-shadow: 0 0 5px var(--pink); } to { box-shadow: 0 0 20px var(--pink); } }
    </style>
</head>
<body>

    <audio id="snd-click" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b417f73c.mp3"></audio>
    <audio id="snd-drop" src="https://cdn.pixabay.com/audio/2022/03/10/audio_5072782f94.mp3"></audio>
    <audio id="snd-win" src="https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3"></audio>

    <div id="custom-alert"><div class="alert-box"><div id="a-msg" style="color: #fff; font-size: 14px; font-weight: 600;"></div><button class="alert-btn" onclick="closeAlert()">MENGERTI</button></div></div>

    <div class="header">
        <div class="header-left" onclick="location.href='profil.html'">
            <i class="fas fa-user-astronaut"></i>
            <span>PROFIL</span>
        </div>
        
        <div class="header-center">
            <div class="balance-box">
                <span class="balance-label">SALDO UTAMA</span>
                <span id="saldo-text">IDR 0</span>
            </div>
        </div>
        
        <div class="header-right">
            <div class="logo-main">NEON<br><span>PLINKO</span><b class="vip-tag">VIP</b></div>
            <div class="neon-accents">
                <div class="acc-line acc-p"></div>
                <div class="acc-line acc-b"></div>
                <div class="acc-line acc-y"></div>
            </div>
        </div>
    </div>

    <div id="game-area">
        <div id="board-wrapper">
            <div id="side-history"></div>
            <canvas id="canvas"></canvas>
            <div class="m-bar" id="m-bar"></div>
        </div>
    </div>

    <div class="controls">
        <div class="bet-row">
            <div class="bet-btn-circ" onclick="changeBet(-1)"><i class="fas fa-minus"></i></div>
            <div class="bet-val" id="bet-display">400</div>
            <div class="bet-btn-circ" onclick="changeBet(1)"><i class="fas fa-plus"></i></div>
        </div>
        <div class="mode-row">
            <button class="mode-btn active" id="btn-normal" onclick="setMode('normal')">NORMAL</button>
            <button class="mode-btn" id="btn-turbo" onclick="setMode('turbo')">TURBO</button>
            <button class="mode-btn" id="btn-auto" onclick="toggleAuto()">AUTO</button>
        </div>
        <button class="btn-drop" id="btn-action" onclick="handleAction()">DROP BALL</button>
    </div>

    <div class="nav-bar">
        <a href="deposit.html" class="nav-item"><i class="fas fa-wallet" style="color: var(--yellow);"></i>DEPO</a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-university" style="color: var(--pink);"></i>WD</a>
        <a href="game.html" class="nav-item active"><i class="fas fa-play-circle" style="color: var(--blue);"></i>PLAY</a>
        <a href="reward.html" class="nav-item"><i class="fas fa-box-open" style="color: #f5a623;"></i>HADIAH</a>
    </div>

<script>
    const SUPA_URL = "https://bgffnmwrviyqpeevzjsn.supabase.co"; 
    const SUPA_KEY = "sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani"; 
    const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

    const username = localStorage.getItem('user_session');
    const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;
    
    const engine = Engine.create({ gravity: { y: 1.6 } });
    const BET_LIST = [400, 800, 1000, 1200, 1400, 1600, 1800, 2000, 4000, 6000, 8000, 10000];
    let betIdx = 0, balance = 0;
    let isAuto = false, isTurbo = false, autoTimer = null;

    const multis = [10, 5, 2, 0.5, 0.2, 0.2, 0.5, 2, 5, 10];
    const colors = ['#ff0077', '#0022ff', '#0044ff', '#1a1b3a', '#050614', '#050614', '#1a1b3a', '#0044ff', '#0022ff', '#ff0077'];

    function playSound(id) { const s = document.getElementById(id); if(s) { s.currentTime = 0; s.play().catch(()=>{}); } }

    async function checkUser() {
        if(!username) { location.href='index.html'; return; }
        const { data } = await _supa.from('profiles').select('*').eq('username', username).single();
        if(data) { balance = data.saldo; updateBalanceUI(); }
    }

    function updateBalanceUI() { document.getElementById('saldo-text').innerText = "IDR " + Math.floor(balance).toLocaleString(); }

    function setupBoard() {
        const canvas = document.getElementById('canvas');
        const render = Render.create({ canvas: canvas, engine: engine, options: { width: 380, height: 460, wireframes: false, background: 'transparent' } });

        for (let r = 0; r < 9; r++) {
            let pins = r + 3;
            for (let c = 0; c < pins; c++) {
                let x = 190 + (c - pins / 2 + 0.5) * 34;
                let y = 65 + r * 40;
                Composite.add(engine.world, Bodies.circle(x, y, 3.5, { isStatic: true, restitution: 0.8, render: { fillStyle: '#fff' } }));
            }
        }

        multis.forEach((v, i) => {
            const slot = document.createElement('div');
            slot.className = 'm-slot'; slot.style.background = colors[i]; slot.innerText = 'x' + v;
            document.getElementById('m-bar').appendChild(slot);
            const sensor = Bodies.rectangle(35 + i * 34.5, 435, 30, 40, { isStatic: true, isSensor: true, label: 'm_'+v, render: { visible: false } });
            Composite.add(engine.world, sensor);
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                const bA = pair.bodyA; const bB = pair.bodyB;
                if (bB.label.startsWith('m_') && bA.label === 'ball') handleWin(bA, bB.label);
                else if (bA.label.startsWith('m_') && bB.label === 'ball') handleWin(bB, bA.label);
            });
        });
    }

    async function spawnBall() {
        const currentBet = BET_LIST[betIdx];
        if(balance < currentBet) { stopAuto(); showAlert("Saldo Habis!"); return; }
        playSound('snd-drop');
        balance -= currentBet;
        updateBalanceUI();
        await _supa.from('profiles').update({ saldo: balance }).eq('username', username);

        const ball = Bodies.circle(190 + (Math.random() * 4 - 2), 15, 7.5, { label: 'ball', restitution: 0.5, friction: 0.01, frictionAir: 0.02, render: { fillStyle: 'var(--yellow)' } });
        Body.setVelocity(ball, { x: (Math.random() - 0.5) * 1.5, y: 0 });
        Composite.add(engine.world, ball);
        setTimeout(() => { if(Composite.allBodies(engine.world).includes(ball)) Composite.remove(engine.world, ball); }, 7000);
    }

    async function handleWin(ball, label) {
        if(ball.processed) return; ball.processed = true;
        const currentBet = BET_LIST[betIdx];
        let m = parseFloat(label.split('_')[1]);
        
        let win = Math.floor(currentBet * m);
        balance += win;
        updateBalanceUI();
        
        showFloatingScore(ball.position.x, win, m);
        updateSideHistory(win, m);
        
        if(win > 0) playSound('snd-win');
        Composite.remove(engine.world, ball);
        await _supa.from('profiles').update({ saldo: balance }).eq('username', username);
    }

    // 4. Floating Score Format 1 Baris: (x0.5) 200
    function showFloatingScore(x, amt, m) {
        const el = document.createElement('div');
        el.className = 'f-score';
        el.style.left = (x - 40) + 'px'; el.style.bottom = '100px';
        el.style.color = m >= 1 ? 'var(--yellow)' : 'var(--pink)';
        el.innerText = `(x${m}) ${amt.toLocaleString()}`;
        document.getElementById('board-wrapper').appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    function updateSideHistory(amt, m) {
        const container = document.getElementById('side-history');
        const item = document.createElement('div');
        item.className = 'history-item' + (m >= 1 ? ' win' : '');
        item.innerHTML = `<span class="history-multi">x${m}</span><span class="history-val">${amt.toLocaleString()}</span>`;
        container.prepend(item);
        if(container.children.length > 3) container.removeChild(container.lastChild);
    }

    function changeBet(d) { if(isAuto) return; playSound('snd-click'); betIdx = Math.max(0, Math.min(BET_LIST.length - 1, betIdx + d)); document.getElementById('bet-display').innerText = BET_LIST[betIdx].toLocaleString(); }
    function setMode(m) { playSound('snd-click'); isTurbo = (m === 'turbo'); document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+m).classList.add('active'); if(isAuto) { clearInterval(autoTimer); autoTimer = setInterval(spawnBall, isTurbo ? 400 : 900); } }
    function toggleAuto() { playSound('snd-click'); isAuto = !isAuto; const btnAuto = document.getElementById('btn-auto'); const btnAction = document.getElementById('btn-action'); if(isAuto) { btnAuto.classList.add('auto-active'); btnAction.innerText = "STOP AUTO"; btnAction.classList.add('stop-mode'); autoTimer = setInterval(spawnBall, isTurbo ? 400 : 900); } else stopAuto(); }
    function stopAuto() { isAuto = false; clearInterval(autoTimer); document.getElementById('btn-auto').classList.remove('auto-active'); document.getElementById('btn-action').innerText = "DROP BALL"; document.getElementById('btn-action').classList.remove('stop-mode'); }
    function handleAction() { if(isAuto) stopAuto(); else spawnBall(); }
    function showAlert(m) { document.getElementById('a-msg').innerText = m; document.getElementById('custom-alert').style.display = 'flex'; }
    function closeAlert() { playSound('snd-click'); document.getElementById('custom-alert').style.display = 'none'; }
    window.onload = () => { setupBoard(); checkUser(); };
</script>
</body>
</html>
