<html lang="id">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --pink:#ff0077; --blue:#0044ff; --yellow:#f5e642;
  --bg:#02030d; --dark-blue:#050614;
  --gp:0 0 15px rgba(255,0,119,0.7);
  --gb:0 0 20px rgba(0,68,255,0.8);
  --gy:0 0 15px rgba(245,230,66,0.7);
  --header-h:60px; --slot-h:42px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{width:100vw;height:100vh;overflow:hidden;background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;display:flex;flex-direction:column}

/* LOADING */
#loading{display:none;position:fixed;inset:0;background:rgba(2,3,13,0.85);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:12px;backdrop-filter:blur(4px)}
.spin{width:48px;height:48px;border:4px solid rgba(0,68,255,0.3);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
#loading p{font-size:13px;color:var(--blue);letter-spacing:1px}
@keyframes spin{to{transform:rotate(360deg)}}

/* HEADER */
.header{height:var(--header-h);background:rgba(2,3,13,0.95);border-bottom:2px solid var(--blue);box-shadow:var(--gb);display:flex;align-items:center;padding:0 15px;justify-content:space-between;z-index:100;flex-shrink:0}
.profile-btn{color:var(--blue);font-size:24px;text-shadow:var(--gb);cursor:pointer}
.balance-container{background:rgba(0,0,0,0.6);border:1px solid var(--pink);border-radius:12px;padding:5px 20px;text-align:center;box-shadow:inset 0 0 10px rgba(255,0,119,0.3);cursor:pointer}
#display-saldo{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--yellow);text-shadow:var(--gy);font-weight:900}
#tier-badge{font-size:9px;text-align:center;letter-spacing:1px;margin-top:2px;font-weight:700;color:#aaa}

/* BOARD */
#board-wrapper{flex:1;position:relative;background:radial-gradient(circle at center,#070a24 0%,#02030d 100%);overflow:hidden;display:flex;flex-direction:column;min-height:0}
#plinko-canvas{flex:1;display:block;width:100%}
#floating-score{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.8);border:1px solid var(--blue);border-radius:8px;padding:5px;width:110px;box-shadow:var(--gb);z-index:20}
.score-entry{font-size:10px;border-bottom:1px solid rgba(0,68,255,0.3);padding:3px 0;text-align:center;animation:slideIn .3s ease-out}
.score-win{color:var(--yellow)!important}
.score-loss{color:rgba(255,255,255,0.4)!important}

/* WR BAR */
#wr-bar-wrap{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.75);border:1px solid rgba(0,68,255,0.5);border-radius:8px;padding:5px 8px;z-index:20;font-size:9px;color:rgba(255,255,255,0.6);min-width:70px}
#wr-bar-track{height:4px;border-radius:2px;background:rgba(255,255,255,0.1);margin-top:3px}
#wr-bar-fill{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--pink),var(--yellow));width:50%;transition:width .5s}

/* SLOTS */
.multiplier-row{height:var(--slot-h);display:flex;width:100%;padding:0 2px;margin-top:-5px;z-index:10;gap:2px;flex-shrink:0}
.slot{flex:1;height:32px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;transition:all .15s;border-radius:4px;border:1px solid rgba(255,255,255,0.1)}
.s-high{background:var(--pink);color:#fff}
.s-mid{background:var(--yellow);color:#000}
.s-low{background:var(--blue);color:#fff}
.slot.active{transform:translateY(-8px) scale(1.1);filter:brightness(1.8);box-shadow:0 0 25px #fff;border:2px solid #fff}

/* CONTROLS */
.controls{padding:12px 15px 28px 15px;background:linear-gradient(to top,#02030d 20%,#0a0b1e 100%);border-top:2px solid var(--blue);display:flex;flex-direction:column;gap:8px;box-shadow:0 -10px 20px rgba(0,68,255,0.2);flex-shrink:0}
.mode-row{display:flex;gap:8px}
.btn-mode{flex:1;padding:10px;border-radius:8px;border:1px solid var(--blue);background:rgba(0,68,255,0.1);color:var(--blue);font-size:10px;font-weight:bold;cursor:pointer;transition:.2s}
.btn-mode.active{background:var(--blue);color:#fff;box-shadow:var(--gb)}
.btn-mode:active{transform:scale(0.97)}
.bet-row{display:flex;align-items:center;justify-content:space-between;background:rgba(0,68,255,0.08);border-radius:12px;padding:6px 15px;border:1px solid var(--blue)}
.bet-btn{background:none;border:none;color:var(--pink);font-size:26px;cursor:pointer;text-shadow:var(--gp);transition:.15s}
.bet-btn:active{transform:scale(0.88)}
#current-bet{font-family:'Cinzel Decorative';font-size:20px;color:var(--yellow);text-shadow:var(--gy)}
.btn-play{width:100%;padding:16px;border-radius:12px;border:none;font-family:'Cinzel Decorative';font-weight:900;font-size:18px;color:#fff;cursor:pointer;background:linear-gradient(90deg,var(--blue),var(--pink));box-shadow:var(--gb);transition:.2s}
.btn-play:active{transform:scale(0.98);filter:brightness(1.15)}
.btn-play:disabled{opacity:.45;cursor:not-allowed;transform:none}
.nav-bottom{display:flex;gap:8px}
.nav-btn{flex:1;padding:8px;text-align:center;border-radius:8px;text-decoration:none;font-size:9px;font-weight:bold;border:1px solid var(--blue);color:#fff;background:rgba(0,68,255,0.15);display:flex;flex-direction:column;align-items:center;gap:4px;transition:.2s}
.nav-btn:active{background:rgba(0,68,255,0.35)}
.nav-btn i{font-size:12px;color:var(--blue)}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;backdrop-filter:blur(3px)}
#neon-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#050614;border:2px solid var(--blue);border-radius:15px;padding:25px;text-align:center;z-index:1001;box-shadow:var(--gb);width:85%}

@keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>

<!-- global.js HARUS diload SEBELUM script game -->
<script src="global.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  NEON PLINKO VIP — game.html v7.1 FIXED
//  Integrasi penuh dengan global.js v4.1
// ═══════════════════════════════════════════════════════════

const ROWS   = 10;
const MULTS  = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
const BETS   = [400, 800, 1000, 1200, 1600, 2000, 4000, 8000, 10000, 20000];
const BALL_R = 6, PEG_R = 3;

const BALL_WAITING = 'waiting';
const BALL_READY   = 'ready';
const BALL_ERROR   = 'error';

let canvas, ctx, BW, BH;
let pegs = [], balls = [], slotW, particles = [];
let speedMode = 'normal', isAuto = false, autoTimer = null, betIdx = 0;
let _saldo    = 0;
let _username = '';
let _winrate  = 50;
let _syncTimer = null;

const PH = {
  normal: { grav:0.42, fric:0.99, bounce:0.55, autoMs:700 },
  turbo:  { grav:0.95, fric:0.98, bounce:0.40, autoMs:200 }
};

// ─── INIT ─────────────────────────────────────────────────
// KUNCI FIX: init() dipanggil dari DOMContentLoaded di bawah.
// global.js sudah load currentUser secara synchronous saat script dimuat.
// Jadi requireLogin() PASTI bisa baca session dengan benar.
async function init() {
  // [1] Cek login — jika null langsung redirect, tidak lanjut
  const user = requireLogin('index.html');
  if (!user) return; // stop di sini, redirect sudah dipanggil

  // [2] Ambil data dari session yang sudah ada
  _username = user.username  || '';
  _saldo    = parseFloat(user.saldo) || 0;
  _winrate  = parseFloat(user.winrate) || 50;

  // [3] Render UI dari data session (instan, tidak tunggu server)
  _renderS();
  _renderTier(user.tier || 'MEMBER');
  _renderWR(_winrate);

  // [4] Setup canvas & game
  canvas = document.getElementById('plinko-canvas');
  ctx    = canvas.getContext('2d');
  resize();
  buildSlots();
  loop();

  // [5] Non-blocking: beritahu server user ONLINE + catat session
  // (void functions di global.js — tidak perlu .catch())
  apiSetSessionStart(_username);
  apiSetStatus(_username, 'ONLINE');

  // [6] Sync saldo fresh dari server (background, tidak block UI)
  syncSaldoUI();

  // [7] Auto-sync setiap 10 detik saat tidak ada bola
  _syncTimer = setInterval(() => {
    if (balls.length === 0) syncSaldoUI();
  }, 10000);

  // [8] Sync saat tab aktif kembali
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && balls.length === 0) syncSaldoUI();
  });
}

// ─── SYNC SALDO ───────────────────────────────────────────
async function syncSaldoUI() {
  if (!_username) return;
  const res = await apiGetSaldo(_username);
  if (res && res.result === 'SUCCESS') {
    _saldo   = parseFloat(res.saldo)   || _saldo;
    _winrate = parseFloat(res.winrate) || _winrate;
    _renderS();
    _renderTier(res.tier || 'MEMBER');
    _renderWR(_winrate);
  }
}

// ─── RENDER ───────────────────────────────────────────────
function _renderS() {
  const el = document.getElementById('display-saldo');
  if (el) el.textContent = 'IDR ' + Math.floor(_saldo).toLocaleString('id-ID');
}

function _renderTier(tier) {
  const map = {
    MEMBER:   ['#aaa','👤'], SILVER:['#c0c0c0','🥈'],
    GOLD:     ['#ffd700','🥇'], PLATINUM:['#e5e4e2','💎'], DIAMOND:['#b9f2ff','💠']
  };
  const [color, icon] = map[tier] || map.MEMBER;
  const el = document.getElementById('tier-badge');
  if (el) { el.textContent = icon + ' ' + tier; el.style.color = color; }
}

function _renderWR(wr) {
  const lbl = document.getElementById('wr-label');
  const bar = document.getElementById('wr-bar-fill');
  if (lbl) lbl.textContent = 'WR ' + Math.round(wr) + '%';
  if (bar) bar.style.width = Math.min(100, Math.max(0, wr)) + '%';
}

// ─── RESIZE & BUILD ───────────────────────────────────────
function resize() {
  const wrap = document.getElementById('board-wrapper');
  BW = wrap.offsetWidth; BH = wrap.offsetHeight;
  const DPR = window.devicePixelRatio || 1;
  canvas.width  = BW * DPR; canvas.height = BH * DPR;
  canvas.style.width = BW + 'px'; canvas.style.height = BH + 'px';
  ctx.scale(DPR, DPR);
  slotW = BW / MULTS.length;
  buildPegs();
}

function buildPegs() {
  pegs = [];
  const sx = (BW * 0.92) / (ROWS + 1);
  const sy = (BH * 0.82) / ROWS;
  for (let r = 0; r < ROWS; r++) {
    const count = r + 2;
    const startX = (BW - (count-1)*sx) / 2;
    for (let c = 0; c < count; c++) pegs.push({ x: startX+c*sx, y: 50+r*sy, glow:0 });
  }
}

function buildSlots() {
  const row = document.getElementById('slot-row');
  row.innerHTML = '';
  MULTS.forEach((m, i) => {
    const s = document.createElement('div');
    s.className = 'slot ' + (m>=3?'s-high':m>=1?'s-mid':'s-low');
    s.id = 'slot-' + i;
    s.innerHTML = m + 'x';
    row.appendChild(s);
  });
}

// ─── PARTICLES ────────────────────────────────────────────
function createParticles(x, y, color) {
  for (let i = 0; i < 14; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-.5)*7, vy: (Math.random()-1.2)*7,
      size: Math.random()*2.5+1, color, life:1.0
    });
  }
}

// ─── GAME LOOP ────────────────────────────────────────────
function loop() {
  ctx.clearRect(0, 0, BW, BH);
  const ph = PH[speedMode];
  const lastPeg    = pegs.length > 0 ? pegs[pegs.length-1] : { y: BH*.85 };
  const LAST_PEG_Y = lastPeg.y + PEG_R + BALL_R + 2;

  // Paku
  pegs.forEach(p => {
    p.glow *= 0.85;
    ctx.fillStyle = p.glow > 0.1
      ? `rgba(255,255,255,${0.3+p.glow})` : 'rgba(0,68,255,0.3)';
    ctx.beginPath(); ctx.arc(p.x, p.y, PEG_R+(p.glow*2), 0, Math.PI*2); ctx.fill();
  });

  // Bola
  for (let i = balls.length-1; i >= 0; i--) {
    const b = balls[i];
    if (b.serverStatus === BALL_ERROR) { balls.splice(i,1); continue; }

    // Rem saat menunggu server jawab
    if (b.serverStatus === BALL_WAITING && b.y > BH*.80) {
      const t = Math.min(1, (b.y - BH*.80) / (BH*.18));
      b.vy *= (1 - t*.75);
      if (b.vy < 0.08) b.vy = 0.08;
    }

    b.vy += ph.grav;
    if (b.vy > 14) b.vy = 14;

    if (b.y < LAST_PEG_Y) {
      // ZONA PAKU
      b.vx *= ph.fric;
      if (Math.abs(b.vy) < 0.3 && b.y < BH*.8) { b.vx += (Math.random()-.5)*.4; b.vy += 0.4; }

      if (b.serverStatus === BALL_READY && b.targetIdx !== undefined) {
        const tx   = (b.targetIdx * slotW) + slotW/2;
        const prog = Math.max(0, (b.y - BH*.4) / (BH*.6));
        b.vx += (tx - b.x) * 0.006 * prog * prog;
      }

      b.x += b.vx; b.y += b.vy;
      if (b.x < BALL_R)         { b.x = BALL_R;      b.vx =  Math.abs(b.vx)*.4; }
      else if (b.x > BW-BALL_R) { b.x = BW-BALL_R;   b.vx = -Math.abs(b.vx)*.4; }

      for (let pi = 0; pi < pegs.length; pi++) {
        const p = pegs[pi];
        if (Math.abs(p.y-b.y) > BALL_R+PEG_R+2) continue;
        const dx=b.x-p.x, dy=b.y-p.y, dist=Math.sqrt(dx*dx+dy*dy), mD=BALL_R+PEG_R;
        if (dist < mD && dist > 0.001) {
          const ov=mD-dist, nx=dx/dist, ny=dy/dist;
          b.x+=nx*ov; b.y+=ny*ov;
          const dot=b.vx*nx+b.vy*ny;
          if (dot < 0) {
            b.vx = (b.vx-2*dot*nx)*ph.bounce + (Math.random()-.5)*.5;
            b.vy = (b.vy-2*dot*ny)*ph.bounce;
            if (b.vy < 0.8) b.vy = 0.8;
            if (b.vy > 14)  b.vy = 14;
          }
          p.glow = 1.0; snd('hit'); break;
        }
      }
    } else {
      // ZONA LANDING
      b.vx *= 0.78;
      if (b.serverStatus === BALL_READY && b.targetIdx !== undefined) {
        const tx = (b.targetIdx * slotW) + slotW/2;
        b.vx += (tx - b.x) * 0.012;
      }
      b.x += b.vx; b.y += b.vy;
      if (b.x < BALL_R)         { b.x = BALL_R;    b.vx =  Math.abs(b.vx)*.3; }
      else if (b.x > BW-BALL_R) { b.x = BW-BALL_R; b.vx = -Math.abs(b.vx)*.3; }
    }

    // Render bola
    const hx=b.x-b.vx*1.4, hy=b.y-b.vy*.8;
    const gr = ctx.createRadialGradient(hx, hy, .5, b.x, b.y, BALL_R);
    gr.addColorStop(0,'#ffffff'); gr.addColorStop(.35,'#ff4499'); gr.addColorStop(1,'#990033');
    ctx.beginPath(); ctx.fillStyle=gr; ctx.arc(b.x,b.y,BALL_R,0,Math.PI*2); ctx.fill();

    // Landing check
    if (b.y > BH+BALL_R && b.serverStatus === BALL_READY) {
      onLand(b); balls.splice(i,1);
    }
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=.2; p.life-=.04;
    if (p.life<=0) { particles.splice(i,1); continue; }
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1.0;
  requestAnimationFrame(loop);
}

// ─── SPAWN BALL ───────────────────────────────────────────
async function spawnBall() {
  const bet = BETS[betIdx];
  if (_saldo < bet) {
    showModal('SALDO TIDAK CUKUP!<br><small>Silakan deposit terlebih dahulu.</small>');
    stopAuto(); return;
  }

  // Snapshot saldo SEBELUM bet — wajib dikirim ke GAS
  const saldoAwal = _saldo;
  _saldo -= bet;  // kurangi lokal agar terasa responsif
  _renderS();
  snd('click');

  const newBall = {
    x: BW/2+(Math.random()-.5)*15, y:-10,
    vx:(Math.random()-.5)*2, vy:2,
    bet,
    serverStatus:   BALL_WAITING,
    targetIdx:      undefined,
    serverMult:     0,
    serverWin:      0,
    serverNewSaldo: undefined
  };
  balls.push(newBall);

  try {
    // Panggil apiGamePlay dari global.js
    // Rumus GAS: newSaldo = (saldoAwal - bet) + (bet × multiplier)
    const res = await apiGamePlay(_username, bet, saldoAwal);

    if (res && res.result === 'SUCCESS') {
      const tm       = parseFloat(res.target_multiplier);
      const win      = parseFloat(res.win);
      const newSaldo = parseFloat(res.newSaldo);

      if (isNaN(tm) || isNaN(win) || isNaN(newSaldo)) {
        newBall.serverStatus = BALL_ERROR;
        _saldo = saldoAwal; _renderS(); return;
      }

      // Cari slot index yang cocok dengan multiplier dari server
      const possible = [];
      MULTS.forEach((m, idx) => { if (Math.abs(m - tm) < 0.01) possible.push(idx); });
      newBall.targetIdx      = possible.length > 0
        ? possible[Math.floor(Math.random()*possible.length)]
        : Math.floor(MULTS.length/2);
      newBall.serverMult     = tm;
      newBall.serverWin      = win;
      newBall.serverNewSaldo = newSaldo;
      newBall.serverStatus   = BALL_READY;

    } else {
      // Server tolak — refund saldo lokal
      newBall.serverStatus = BALL_ERROR;
      _saldo = saldoAwal; _renderS();
      if (res && res.message) showModal(res.message);
      stopAuto();
    }

  } catch(err) {
    newBall.serverStatus = BALL_ERROR;
    _saldo = saldoAwal; _renderS();
    showModal('Koneksi bermasalah. Coba lagi.');
    stopAuto();
  }
}

// ─── ON LAND ──────────────────────────────────────────────
function onLand(b) {
  if (b.serverStatus !== BALL_READY) return;

  // Saldo MUTLAK dari server — bukan perhitungan lokal
  if (b.serverNewSaldo !== undefined && !isNaN(b.serverNewSaldo)) {
    _saldo = b.serverNewSaldo;
  }
  _renderS();

  // Highlight slot dari targetIdx server (bukan posisi fisik)
  const idx = (b.targetIdx !== undefined)
    ? Math.max(0, Math.min(MULTS.length-1, b.targetIdx))
    : Math.max(0, Math.min(MULTS.length-1, Math.floor(b.x/slotW)));

  const slotEl = document.getElementById('slot-'+idx);
  if (slotEl) {
    slotEl.classList.add('active');
    setTimeout(() => slotEl.classList.remove('active'), 450);
  }

  const mult  = b.serverMult || 0;
  const win   = b.serverWin  || 0;
  const isWin = mult >= 1;

  if (isWin) {
    snd('win');
    createParticles((idx*slotW)+slotW/2, BH-10, mult>=3?'#f5e642':'#ff0077');
  }

  // Score board
  const list = document.getElementById('score-list');
  const div  = document.createElement('div');
  div.className = 'score-entry ' + (isWin ? 'score-win' : 'score-loss');
  div.innerHTML = '<b>' + mult + 'x</b> | ' + (isWin?'+':'') + Math.floor(win).toLocaleString('id-ID');
  list.prepend(div);
  while (list.children.length > 6) list.lastChild.remove();
}

// ─── CONTROLS ─────────────────────────────────────────────
function setSpeedMode(m) {
  speedMode = m; snd('click');
  document.getElementById('m-normal').classList.toggle('active', m==='normal');
  document.getElementById('m-turbo').classList.toggle('active', m==='turbo');
  if (isAuto) { clearInterval(autoTimer); autoTimer = setInterval(spawnBall, PH[speedMode].autoMs); }
}

function toggleAuto() {
  isAuto = !isAuto;
  document.getElementById('m-auto').classList.toggle('active', isAuto);
  if (isAuto) { spawnBall(); autoTimer = setInterval(spawnBall, PH[speedMode].autoMs); }
  else clearInterval(autoTimer);
}

function stopAuto() {
  isAuto = false; clearInterval(autoTimer);
  const btn = document.getElementById('m-auto');
  if (btn) btn.classList.remove('active');
}

function changeBet(d) {
  if (isAuto) return;
  betIdx = Math.max(0, Math.min(BETS.length-1, betIdx+d));
  document.getElementById('current-bet').textContent = BETS[betIdx].toLocaleString('id-ID');
  snd('click');
}

function showModal(msg) {
  document.getElementById('modal-msg').innerHTML = msg;
  document.getElementById('modal-overlay').style.display = 'block';
  document.getElementById('neon-modal').style.display    = 'block';
}
function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.getElementById('neon-modal').style.display    = 'none';
}

function snd(t) {
  try { const a = document.getElementById('snd-'+t); if(a){a.currentTime=0;a.play().catch(()=>{})} } catch(e){}
}

// ─── CLEANUP ──────────────────────────────────────────────
window.addEventListener('beforeunload', () => {
  clearInterval(_syncTimer); clearInterval(autoTimer);
  if (_username) {
    // sendBeacon agar dikirim meski tab ditutup
    navigator.sendBeacon(GAS_URL, JSON.stringify({
      action: 'set_status', username: _username, status: 'OFFLINE'
    }));
  }
});

window.addEventListener('resize', () => { resize(); buildSlots(); });

// ─── ENTRY POINT ──────────────────────────────────────────
// PENTING: init() dipanggil di sini, BUKAN dari DOMContentLoaded global.js
// global.js sudah load currentUser secara sync saat <script src="global.js"> dieksekusi
document.addEventListener('DOMContentLoaded', init);
</script>
