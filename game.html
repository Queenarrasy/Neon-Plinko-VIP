<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON PLINKO VIP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00d4ff;
            --neon-yellow: #fde047;
            --bg-dark: #050b18;
            --panel-bg: rgba(13, 25, 48, 0.9);
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Header & Saldo */
        header {
            width: 100%; padding: 15px;
            background: var(--panel-bg);
            border-bottom: 2px solid var(--neon-blue);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .balance-box {
            background: #000; border: 1px solid var(--neon-yellow);
            padding: 8px 15px; border-radius: 20px;
            color: var(--neon-yellow); font-weight: bold; font-size: 1.1em;
        }

        /* Game Container */
        #game-container {
            position: relative; margin: 20px auto;
            width: 100%; max-width: 500px;
            aspect-ratio: 4/5;
        }

        canvas { width: 100%; height: 100%; filter: drop-shadow(0 0 5px var(--neon-blue)); }

        /* Controls */
        .controls {
            width: 90%; max-width: 400px;
            background: var(--panel-bg);
            padding: 20px; border-radius: 15px;
            border: 1px solid var(--neon-pink);
            margin-bottom: 30px;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--neon-blue); font-size: 0.9em; }
        input {
            width: 100%; background: #000; border: 1px solid var(--neon-blue);
            color: #fff; padding: 10px; border-radius: 5px; outline: none; box-sizing: border-box;
        }

        .btn-play {
            width: 100%; padding: 15px; border: none; border-radius: 8px;
            background: var(--neon-pink); color: #fff; font-weight: bold;
            cursor: pointer; font-size: 1.2em; text-transform: uppercase;
            box-shadow: 0 0 15px var(--neon-pink); transition: 0.3s;
        }
        .btn-play:disabled { background: #444; box-shadow: none; cursor: not-allowed; }

        /* Menu Buttons */
        .menu-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px;
        }
        .menu-btn {
            background: transparent; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 8px; border-radius: 5px;
            font-size: 0.8em; cursor: pointer; text-align: center; transition: 0.3s;
        }
        .menu-btn:hover { background: var(--neon-blue); color: #000; }

        /* Modal / Pop-up Styling */
        .modal {
            display: none; position: fixed; z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--panel-bg); margin: 15% auto;
            padding: 25px; border: 2px solid var(--neon-yellow);
            width: 80%; max-width: 400px; border-radius: 15px;
            box-shadow: 0 0 30px var(--neon-yellow);
            position: relative; text-align: center;
        }
        .close-modal {
            position: absolute; top: 10px; right: 15px;
            color: #fff; font-size: 24px; cursor: pointer;
        }
        .modal-content h2 { color: var(--neon-yellow); margin-top: 0; }
        
        /* Toast & Glow */
        #toast { text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<header>
    <div><i class="fas fa-user-circle"></i> <span id="header-username">Loading...</span></div>
    <div class="balance-box" id="header-saldo">IDR 0</div>
</header>

<div id="game-container"></div>

<div class="controls">
    <div class="input-group">
        <label>BET AMOUNT (IDR)</label>
        <input type="number" id="bet-input" value="10000" min="1000">
    </div>
    <button class="btn-play" id="btn-drop">DROP BALL</button>

    <div class="menu-grid">
        <div class="menu-btn" onclick="openModal('profile')"><i class="fas fa-user"></i><br>Profil</div>
        <div class="menu-btn" onclick="openModal('deposit')"><i class="fas fa-wallet"></i><br>Depo</div>
        <div class="menu-btn" onclick="openModal('withdraw')"><i class="fas fa-money-bill-transfer"></i><br>WD</div>
        <div class="menu-btn" onclick="openModal('reward')"><i class="fas fa-gift"></i><br>Bonus</div>
    </div>
</div>

<div id="gameModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modal-body"></div>
    </div>
</div>

<div id="loading" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center;">
    <div style="color:var(--neon-blue); font-weight:bold;">SYNCHRONIZING...</div>
</div>

<script src="global.js"></script>
<script>
    // Audio Context & Sounds
    const sounds = {
        drop: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
        hit: new Audio('https://assets.mixkit.co/active_storage/sfx/2004/2004-preview.mp3'),
        win: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3')
    };

    function playSound(name) {
        const s = sounds[name].cloneNode();
        s.volume = 0.4;
        s.play().catch(e => {});
    }

    // Matter.js Plinko Logic
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    const engine = Engine.create();
    const world = engine.world;
    const container = document.getElementById('game-container');
    
    const render = Render.create({
        element: container,
        engine: engine,
        options: {
            width: 500, height: 600,
            wireframes: false, background: 'transparent'
        }
    });

    // Create Pegs (Pasak)
    const rows = 8;
    for (let i = 0; i < rows; i++) {
        const rowPegs = i + 3;
        const spacing = 500 / (rowPegs + 1);
        for (let j = 0; j < rowPegs; j++) {
            const x = (j + 1) * spacing;
            const y = 80 + i * 55;
            const peg = Bodies.circle(x, y, 5, { 
                isStatic: true,
                render: { fillStyle: '#00d4ff' }
            });
            Composite.add(world, peg);
        }
    }

    // Create Buckets (Multipliers)
    const multipliers = [10, 3, 1.5, 0.5, 0.2, 0.5, 1.5, 3, 10];
    const bucketWidth = 500 / multipliers.length;
    const buckets = [];

    multipliers.forEach((m, i) => {
        const x = i * bucketWidth + bucketWidth/2;
        const bucket = Bodies.rectangle(x, 580, bucketWidth - 5, 30, {
            isStatic: true,
            isSensor: true,
            label: `bucket_${m}`,
            render: { fillStyle: m >= 1 ? '#ff007f' : '#444' }
        });
        Composite.add(world, bucket);
        buckets.push(bucket);
    });

    Render.run(render);
    Runner.run(Runner.create(), engine);

    // Gameplay Function
    document.getElementById('btn-drop').addEventListener('click', async () => {
        const bet = parseFloat(document.getElementById('bet-input').value);
        if (bet < 1000) return showToast("Minimal Bet IDR 1.000", "warning");
        if (getSaldo() < bet) return showToast("Saldo tidak cukup!", "error");

        setLoading(true);
        document.getElementById('btn-drop').disabled = true;

        // 1. Get Result from Backend (Global.js v5.0)
        const playResult = await GameEngine.processPlay(bet);
        
        if (!playResult || playResult.result !== "SUCCESS") {
            setLoading(false);
            document.getElementById('btn-drop').disabled = false;
            return;
        }

        // 2. Visual Drop
        playSound('drop');
        const startX = 250 + (Math.random() * 10 - 5);
        const ball = Bodies.circle(startX, 20, 10, {
            restitution: 0.5,
            friction: 0.01,
            render: { fillStyle: '#fde047', strokeStyle: '#fff', lineWidth: 2 }
        });
        
        Composite.add(world, ball);
        setLoading(false);

        // 3. Collision Handling
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                if (pair.bodyA === ball || pair.bodyB === ball) {
                    playSound('hit');
                }
                
                const other = pair.bodyA === ball ? pair.bodyB : pair.bodyA;
                if (other.label && other.label.startsWith('bucket_')) {
                    const m = parseFloat(other.label.split('_')[1]);
                    
                    // Logic untuk memastikan bola jatuh ke multiplier yang SESUAI hasil server
                    // Catatan: Dalam prakteknya, kita bisa "menipu" jalur bola atau 
                    // cukup sync saldo. Di sini kita sync saldo akhir.
                    
                    if (!ball.processed) {
                        ball.processed = true;
                        setTimeout(() => {
                            Composite.remove(world, ball);
                            if (playResult.multiplier >= 1) playSound('win');
                            showToast(`RESULT: x${playResult.multiplier} (IDR ${playResult.winAmount})`, 
                                playResult.multiplier >= 1 ? "success" : "warning");
                            document.getElementById('btn-drop').disabled = false;
                        }, 500);
                    }
                }
            });
        });
    });

    // Modal UI Logic
    function openModal(type) {
        const body = document.getElementById('modal-body');
        const user = loadSession();
        
        if (type === 'profile') {
            body.innerHTML = `
                <h2>MY PROFILE</h2>
                <p>Username: ${user.username}</p>
                <p>Tier: <span style="color:var(--neon-pink)">${user.tier}</span></p>
                <p>Winrate: ${user.winrate}%</p>
                <button class="btn-play" onclick="AuthAPI.logout()" style="background:#444">LOGOUT</button>
            `;
        } else if (type === 'deposit') {
            body.innerHTML = `
                <h2>DEPOSIT</h2>
                <input type="number" id="depo-amt" placeholder="Nominal IDR" style="margin-bottom:10px">
                <button class="btn-play" onclick="handleDepoAction()">KONFIRMASI DEPOSIT</button>
            `;
        } else if (type === 'withdraw') {
            body.innerHTML = `
                <h2>WITHDRAW</h2>
                <input type="number" id="wd-amt" placeholder="Nominal (Min 50rb)" style="margin-bottom:10px">
                <button class="btn-play" onclick="handleWdAction()" style="background:var(--neon-blue)">TARIK SALDO</button>
            `;
        } else if (type === 'reward') {
            body.innerHTML = `
                <h2>REWARDS</h2>
                <button class="btn-play" onclick="RewardAPI.claimDaily()">KLAIM HARIAN (1.000)</button>
                <br><br>
                <button class="btn-play" onclick="RewardAPI.claimReferral()" style="background:var(--neon-blue)">BONUS MINGGUAN</button>
            `;
        }
        document.getElementById('gameModal').style.display = 'block';
    }

    async function handleDepoAction() {
        const amt = document.getElementById('depo-amt').value;
        await TransaksiAPI.depositQRIS(amt);
        closeModal();
    }

    async function handleWdAction() {
        const amt = document.getElementById('wd-amt').value;
        await TransaksiAPI.withdraw(amt);
        closeModal();
    }

    function closeModal() {
        document.getElementById('gameModal').style.display = 'none';
    }

    // Auto Login Check
    window.onload = () => {
        requireLogin('index.html');
        initGlobalSync();
    };
</script>
</body>
</html>
