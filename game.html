<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>NEON PLINKO VIP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pink: #ff0077; --blue: #00d4ff; --deepblue: #0044ff;
            --yellow: #f5e642; --bg: #030510; --green: #00ff88;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid rgba(0,212,255,0.2); background: rgba(5,6,20,0.8); }
        .h-item { flex: 1; font-weight: 800; font-size: 11px; letter-spacing: 1px; }
        #user-btn { color: var(--blue); text-transform: uppercase; text-decoration: none; }
        #balance-display { text-align: center; color: var(--yellow); font-size: 13px; }
        #game-logo { text-align: right; font-family: 'Cinzel Decorative'; color: var(--pink); }

        /* FLOATING SCORES */
        #score-board { position: absolute; top: 70px; left: 15px; width: 110px; z-index: 10; }
        .score-row { background: rgba(0,212,255,0.1); border-left: 3px solid var(--blue); padding: 4px 10px; margin-bottom: 5px; border-radius: 4px; font-size: 10px; font-weight: 600; color: var(--green); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }

        /* GAME AREA */
        #game-container { position: relative; width: 100%; height: 58vh; margin-top: 5px; }
        canvas { display: block; margin: 0 auto; }

        /* CONTROLS */
        .controls { position: fixed; bottom: 0; width: 100%; padding: 15px; background: rgba(3,5,16,0.95); border-top: 1px solid rgba(255,255,255,0.05); }
        .bet-selector { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 12px; }
        .btn-qty { width: 35px; height: 35px; border-radius: 50%; border: none; background: var(--blue); color: #000; font-weight: 900; font-size: 18px; box-shadow: 0 0 10px rgba(0,212,255,0.3); }
        #bet-val { font-size: 22px; font-weight: 800; color: var(--yellow); min-width: 70px; text-align: center; }

        .mode-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .btn-mode { padding: 8px; border-radius: 8px; border: 1px solid rgba(0,212,255,0.3); background: rgba(255,255,255,0.03); color: #fff; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        .btn-mode.active { background: var(--blue); color: #000; box-shadow: 0 0 15px rgba(0,212,255,0.4); }

        .btn-drop { width: 100%; padding: 14px; border-radius: 40px; border: none; background: linear-gradient(90deg, var(--pink), #b400dc); color: #fff; font-size: 16px; font-weight: 900; text-transform: uppercase; box-shadow: 0 0 20px rgba(255,0,119,0.5); }

        /* CUSTOM ALERT */
        #custom-alert { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .alert-box { width: 80%; max-width: 300px; background: #0a0b1e; border: 2px solid var(--blue); border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 0 20px var(--blue); }
    </style>
</head>
<body>

    <div class="header">
        <a href="profile.html" class="h-item" id="user-btn">PROFIL</a>
        <div class="h-item" id="balance-display">IDR 243.600</div>
        <div class="h-item" id="game-logo">NEON PLINKO</div>
    </div>

    <div id="score-board"></div>
    <div id="game-container"></div>

    <div class="controls">
        <div class="bet-selector">
            <button class="btn-qty" onclick="adjBet(-100)">-</button>
            <div id="bet-val">200</div>
            <button class="btn-qty" onclick="adjBet(100)">+</button>
        </div>

        <div class="mode-selector">
            <button class="btn-mode active" onclick="setMode('NORMAL', this)">Normal</button>
            <button class="btn-mode" onclick="setMode('TURBO', this)">Turbo</button>
            <button class="btn-mode" onclick="setMode('AUTO', this)">Auto</button>
        </div>

        <button class="btn-drop" onclick="handleDrop()">DROP BALL</button>
    </div>

    <div id="custom-alert">
        <div class="alert-box">
            <p id="a-msg" style="margin-bottom:20px; font-size:14px;"></p>
            <button class="btn-drop" style="font-size:12px; padding:10px;" onclick="document.getElementById('custom-alert').style.display='none'">CONFIRM</button>
        </div>
    </div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    const engine = Engine.create();
    const container = document.getElementById('game-container');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const render = Render.create({
        element: container, engine: engine,
        options: { width: width, height: height, wireframes: false, background: 'transparent' }
    });

    // CONFIG PIN & MULTIPLIER
    const rows = 10;
    const pinGap = width / 11;
    const startX = width / 2;
    const startY = 40;
    const multis = [10, 5, 2, 0.5, 0.2, 0.2, 0.5, 2, 5, 10];
    const bucketWidth = width / multis.length;

    // PIN GENERATION
    for (let i = 2; i <= rows; i++) {
        for (let j = 0; j < i; j++) {
            const x = startX - (i - 1) * pinGap / 2 + j * pinGap;
            const y = startY + (i - 1) * pinGap;
            Composite.add(engine.world, Bodies.circle(x, y, 3, { isStatic: true, render: { fillStyle: '#fff' } }));
        }
    }

    // MULTIPLIER BOXES WITH LABELS
    multis.forEach((m, i) => {
        const x = (i * bucketWidth) + bucketWidth / 2;
        const y = startY + (rows) * pinGap + 30;
        
        // Sensor & Box
        const sensor = Bodies.rectangle(x, y, bucketWidth - 4, 25, {
            isStatic: true, isSensor: true, label: 'm_' + m,
            render: { fillStyle: m >= 1 ? '#00ff8822' : '#ff007722' }
        });
        Composite.add(engine.world, sensor);

        // Visual Label (Fixed "Tenggelam" Issue)
        const label = document.createElement('div');
        label.innerText = 'x' + m;
        label.style.position = 'absolute';
        label.style.left = (x - 15) + 'px';
        label.style.top = (y - 10) + 'px';
        label.style.fontSize = '9px';
        label.style.fontWeight = '900';
        label.style.color = m >= 1 ? 'var(--green)' : 'var(--pink)';
        container.appendChild(label);
    });

    // GAME LOGIC
    let balance = 243600;
    let bet = 200;
    let mode = 'NORMAL';
    let autoInterval = null;
    let recentWins = [];

    function adjBet(v) { if(bet+v >= 100) { bet += v; document.getElementById('bet-val').innerText = bet; } }
    
    function setMode(m, el) {
        mode = m;
        document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        if(m !== 'AUTO') clearInterval(autoInterval);
    }

    function handleDrop() {
        if(mode === 'AUTO') {
            if(autoInterval) { clearInterval(autoInterval); autoInterval = null; }
            else autoInterval = setInterval(dropBall, 500);
        } else { dropBall(); }
    }

    function dropBall() {
        if(balance < bet) return alert("Saldo Kurang!");
        balance -= bet; updateUI();
        const ball = Bodies.circle(width/2 + (Math.random()*4-2), 10, 5, {
            restitution: 0.5, friction: 0.01, label: 'ball',
            render: { fillStyle: '#f5e642', shadowBlur: 10, shadowColor: '#f5e642' }
        });
        Composite.add(engine.world, ball);
    }

    Events.on(engine, 'collisionStart', (e) => {
        e.pairs.forEach(p => {
            if(p.bodyA.label.startsWith('m_') && p.bodyB.label === 'ball') {
                const m = parseFloat(p.bodyA.label.split('_')[1]);
                const win = bet * m;
                balance += win; updateUI();
                showWin(win);
                Composite.remove(engine.world, p.bodyB);
            }
        });
    });

    function showWin(w) {
        recentWins.unshift(`+Rp ${w.toLocaleString()}`);
        if(recentWins.length > 3) recentWins.pop();
        document.getElementById('score-board').innerHTML = recentWins.map(s => `<div class="score-row">${s}</div>`).join('');
    }

    function updateUI() { document.getElementById('balance-display').innerText = `IDR ${balance.toLocaleString().replace(/,/g, '.')}`; }

    Render.run(render);
    Runner.run(Runner.create(), engine);
</script>
</body>
</html>
