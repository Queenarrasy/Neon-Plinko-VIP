<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --pink: #ff0077; --blue: #0044ff; --yellow: #f5e642; --dark-blue: #050614; --bg: #02030d; --gp: 0 0 15px rgba(255, 0, 119, 0.7); --gb: 0 0 20px rgba(0, 68, 255, 0.8); --gy: 0 0 15px rgba(245, 230, 66, 0.7); --header-h: 60px; --slot-h: 40px; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; }
.header { height: var(--header-h); background: rgba(2, 3, 13, 0.95); border-bottom: 2px solid var(--blue); box-shadow: var(--gb); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; z-index: 100; }
.profile-btn { color: var(--blue); font-size: 24px; text-shadow: var(--gb); cursor: pointer; }
.balance-container { background: rgba(0, 0, 0, 0.6); border: 1px solid var(--pink); border-radius: 12px; padding: 5px 20px; text-align: center; box-shadow: inset 0 0 10px rgba(255, 0, 119, 0.3); }
#display-saldo { font-family: 'Cinzel Decorative', serif; font-size: 18px; color: var(--yellow); text-shadow: var(--gy); font-weight: 900; }
#board-wrapper { flex: 1; position: relative; background: radial-gradient(circle at center, #070a24 0%, #02030d 100%); overflow: hidden; display: flex; flex-direction: column; }
#plinko-canvas { flex: 1; display: block; width: 100%; }
#floating-score { position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--blue); border-radius: 8px; padding: 5px; width: 95px; box-shadow: var(--gb); z-index: 20; }
.score-entry { font-size: 10px; border-bottom: 1px solid rgba(0, 68, 255, 0.3); padding: 3px 0; text-align: center; color: var(--pink); animation: slideIn 0.3s ease-out; }
@keyframes slideIn { from { opacity:0; transform:translateX(10px); } to { opacity:1; transform:translateX(0); } }
.multiplier-row { height: var(--slot-h); display: flex; gap: 3px; padding: 0 10px; align-items: center; background: transparent; margin-top: -15px; margin-bottom: 10px; z-index: 10; }
.slot { flex: 1; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
.s-high { background: var(--pink); color: #fff; box-shadow: var(--gp); border-color: #ff6eb4; }
.s-mid { background: var(--yellow); color: #000; box-shadow: var(--gy); border-color: #fffb96; }
.s-low { background: var(--blue); color: #fff; box-shadow: var(--gb); border-color: #5588ff; }
.slot.active { transform: scale(1.25); filter: brightness(1.5); box-shadow: 0 0 25px #fff; z-index: 15; }
.controls { padding: 15px 15px 40px 15px; background: linear-gradient(to top, #02030d 20%, #0a0b1e 100%); border-top: 2px solid var(--blue); display: flex; flex-direction: column; gap: 12px; box-shadow: 0 -10px 20px rgba(0, 68, 255, 0.2); }
.mode-row { display: flex; gap: 8px; }
.btn-mode { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--blue); background: rgba(0, 68, 255, 0.1); color: var(--blue); font-size: 10px; font-weight: bold; }
.btn-mode.active { background: var(--blue); color: #fff; box-shadow: var(--gb); }
.bet-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0, 68, 255, 0.08); border-radius: 12px; padding: 6px 15px; border: 1px solid var(--blue); }
.bet-btn { background: none; border: none; color: var(--pink); font-size: 26px; cursor: pointer; text-shadow: var(--gp); }
#current-bet { font-family: 'Cinzel Decorative'; font-size: 20px; color: var(--yellow); text-shadow: var(--gy); }
.btn-play { width: 100%; padding: 16px; border-radius: 12px; border: none; font-family: 'Cinzel Decorative'; font-weight: 900; font-size: 18px; color: #fff; cursor: pointer; background: linear-gradient(90deg, var(--blue), var(--pink)); box-shadow: var(--gb); transition: 0.3s; }
.nav-bottom { display: flex; gap: 8px; }
.nav-btn { flex: 1; padding: 10px; text-align: center; border-radius: 8px; text-decoration: none; font-size: 10px; font-weight: bold; border: 1px solid var(--blue); color: #fff; background: rgba(0, 68, 255, 0.15); display: flex; flex-direction: column; align-items: center; gap: 4px; }
.nav-btn i { font-size: 14px; color: var(--blue); }
#modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; backdrop-filter: blur(3px); }
#neon-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background: #050614; border: 2px solid var(--blue); border-radius: 15px; padding: 25px; text-align: center; z-index:1001; box-shadow: var(--gb); width: 85%; }
.modal-title { font-family: 'Cinzel Decorative'; color: var(--blue); margin-bottom: 15px; font-size: 20px; text-shadow: var(--gb); }
</style>
</head>
<body>

<audio id="snd-hit" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
<audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>
<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

<div id="modal-overlay"></div>
<div id="neon-modal">
  <div class="modal-title"><i class="fa-solid fa-triangle-exclamation"></i> SYSTEM ALERT</div>
  <p id="modal-msg" style="color:#ddeeff; margin-bottom:20px; font-size:14px;"></p>
  <button class="btn-mode active" onclick="closeModal()" style="width:120px; margin: 0 auto;">OK, UNDERSTOOD</button>
</div>

<div class="header">
  <div class="profile-btn" onclick="location.href='profil.html'"><i class="fa-solid fa-user-shield"></i></div>
  <div class="balance-container">
    <div style="font-size:8px; color:var(--blue); letter-spacing: 1px;">VAULT BALANCE</div>
    <div id="display-saldo">IDR 0</div>
  </div>
  <div class="profile-btn" style="color:var(--yellow)"><i class="fa-solid fa-gem"></i></div>
</div>

<div id="board-wrapper">
  <canvas id="plinko-canvas"></canvas>
  <div id="floating-score"><div id="score-list"></div></div>
</div>

<div class="multiplier-row" id="slot-row"></div>

<div class="controls">
  <div class="mode-row">
    <button class="btn-mode active" id="m-normal" onclick="setSpeedMode('normal')"><i class="fa-solid fa-gauge-high"></i> NORMAL</button>
    <button class="btn-mode" id="m-turbo" onclick="setSpeedMode('turbo')"><i class="fa-solid fa-bolt-lightning"></i> TURBO</button>
    <button class="btn-mode" id="m-auto" onclick="toggleAuto()"><i class="fa-solid fa-rotate"></i> AUTO</button>
  </div>
  <div class="bet-row">
    <button class="bet-btn" onclick="changeBet(-1)"><i class="fa-solid fa-square-minus"></i></button>
    <div style="text-align:center">
      <div style="font-size:9px; color:var(--blue); opacity: 0.8;">BET AMOUNT</div>
      <div id="current-bet">400</div>
    </div>
    <button class="bet-btn" onclick="changeBet(1)"><i class="fa-solid fa-square-plus"></i></button>
  </div>
  <button class="btn-play" id="main-btn" onclick="spawnBall()"><i class="fa-solid fa-meteor"></i> DROP BALL</button>
  <div class="nav-bottom">
    <a href="withdraw.html" class="nav-btn"><i class="fa-solid fa-money-bill-transfer"></i> WITHDRAW</a>
    <a href="deposit.html" class="nav-btn"><i class="fa-solid fa-building-columns"></i> DEPOSIT</a>
    <a href="reward.html" class="nav-btn"><i class="fa-solid fa-trophy"></i> REWARD</a>
  </div>
</div>

<script src="global.js"></script>
<script>
const ROWS   = 10;
const MULTS  = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
const BETS   = [400, 800, 1000, 1200, 1600, 2000, 4000, 8000, 10000, 20000];
const BALL_R = 7, PEG_R = 3.5;

let canvas, ctx, BW, BH, pegs = [], balls = [], slotW, particles = [];
let speedMode = 'normal', isAuto = false, autoTimer = null, betIdx = 0;
let _saldo = getStoredSaldo();

// ── FISIKA OPTIMAL ───────────────────────────────────────────
const PH = {
  normal: { grav: 0.25, fric: 0.992, bounce: 0.5, autoMs: 1200 },
  turbo:  { grav: 0.75, fric: 0.985, bounce: 0.4, autoMs: 300  }
};

const BALL_WAITING = 'waiting';
const BALL_READY   = 'ready';
const BALL_ERROR   = 'error';

function init() {
  if (!requireLogin()) return;
  canvas = document.getElementById('plinko-canvas');
  ctx    = canvas.getContext('2d');
  resize();
  _renderS();
  loop();

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && balls.length === 0) {
      apiCall({ action: 'get_saldo', username: getUsername() }).then(res => {
        if (res && res.result === 'SUCCESS') {
          _saldo = parseFloat(res.saldo) || _saldo;
          _renderS();
        }
      });
    }
  });
}

function resize() {
  const wrap = document.getElementById('board-wrapper');
  BW = wrap.offsetWidth; BH = wrap.offsetHeight;
  const DPR = window.devicePixelRatio || 1;
  canvas.width  = BW * DPR; canvas.height = BH * DPR;
  canvas.style.width = BW + 'px'; canvas.style.height = BH + 'px';
  ctx.scale(DPR, DPR);
  buildPegs(); buildSlots();
}

function buildPegs() {
  pegs = [];
  const spacingX = (BW * 0.88) / ROWS;
  const spacingY = (BH * 0.72) / ROWS;
  for (let r = 0; r < ROWS; r++) {
    const count  = r + 2;
    const startX = (BW - (count - 1) * spacingX) / 2;
    for (let c = 0; c < count; c++) {
      pegs.push({ x: startX + c * spacingX, y: 60 + r * spacingY, glow: 0 });
    }
  }
}

function buildSlots() {
  const row = document.getElementById('slot-row');
  row.innerHTML = ''; slotW = BW / MULTS.length;
  MULTS.forEach((m, i) => {
    const s = document.createElement('div');
    s.className = 'slot ' + (m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low');
    s.id = 'slot-' + i;
    s.innerHTML = '<span>' + m + 'x</span>';
    row.appendChild(s);
  });
}

function createParticles(x, y, color) {
  for (let i = 0; i < 14; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6 - 2,
      life: 1.0, color,
      size: Math.random() * 3 + 1
    });
  }
}

// ══════════════════════════════════════════════════════════════
// LOGIKA LOOP DENGAN FISIKA "SMART COLLISION"
// ══════════════════════════════════════════════════════════════
function loop() {
  ctx.fillStyle = '#02030d';
  ctx.fillRect(0, 0, BW, BH);

  const ph = PH[speedMode];
  const lastPeg = pegs[pegs.length - 1];
  const EXIT_Y = lastPeg.y + 10;

  pegs.forEach(p => {
    p.glow *= 0.85;
    ctx.fillStyle = p.glow > 0.1 ? '#ffffff' : 'rgba(0, 68, 255, 0.3)';
    ctx.beginPath();
    ctx.arc(p.x, p.y, PEG_R + (p.glow * 2), 0, Math.PI * 2);
    ctx.fill();
  });

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.02;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1.0;

  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    if (b.serverStatus === BALL_ERROR) { balls.splice(i, 1); continue; }

    // Efek menunggu server: melambat di udara
    if (b.serverStatus === BALL_WAITING && b.y > BH * 0.7) {
        b.vy *= 0.9;
    } else {
        b.vy += ph.grav;
    }

    b.vx *= ph.fric;
    b.x += b.vx;
    b.y += b.vy;

    // Batas dinding
    if (b.x < BALL_R) { b.x = BALL_R; b.vx *= -0.5; }
    if (b.x > BW - BALL_R) { b.x = BW - BALL_R; b.vx *= -0.5; }

    // Collision dengan Paku
    for (let p of pegs) {
      const dx = b.x - p.x;
      const dy = b.y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = BALL_R + PEG_R;

      if (dist < minDist) {
        // Resolve overlap
        const angle = Math.atan2(dy, dx);
        b.x = p.x + Math.cos(angle) * minDist;
        b.y = p.y + Math.sin(angle) * minDist;

        // Fisika Pantulan Realistis
        const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
        const bounceAngle = angle + (Math.random() - 0.5) * 0.2; // Sedikit noise random
        
        // BIAS HALUS: Jika server sudah jawab, tambahkan gaya dorong sangat kecil ke arah target
        // Ini dilakukan saat benturan agar terlihat seperti pantulan alami
        let bias = 0;
        if (b.serverStatus === BALL_READY) {
            const targetX = (b.targetIdx * slotW) + (slotW / 2);
            bias = (targetX - b.x) * 0.05; // Bias 5% setiap pantulan
        }

        b.vx = Math.cos(bounceAngle) * speed * ph.bounce + bias;
        b.vy = Math.abs(Math.sin(bounceAngle) * speed * ph.bounce);
        
        // Minimal bounce ke atas sedikit biar tidak nempel
        if (b.vy < 1.5) b.vy = 1.5;

        p.glow = 1.0;
        snd('hit');
      }
    }

    // Gambar Bola
    ctx.beginPath();
    const grad = ctx.createRadialGradient(b.x-2, b.y-2, 1, b.x, b.y, BALL_R);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.4, '#ff0077');
    grad.addColorStop(1, '#550022');
    ctx.fillStyle = grad;
    ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2);
    ctx.fill();

    // Landing
    if (b.y > BH + BALL_R) {
      if (b.serverStatus === BALL_READY) {
        onLand(b);
        balls.splice(i, 1);
      } else if (b.y > BH + 100) { 
        // Safety net jika server delay parah
        balls.splice(i, 1);
      }
    }
  }
  requestAnimationFrame(loop);
}

function spawnBall() {
  const bet = BETS[betIdx];
  const user = getUsername();
  if (_saldo < bet) { showModal("SALDO TIDAK CUKUP."); stopAuto(); return; }

  const saldoAwal = _saldo;
  _saldo -= bet;
  _renderS();
  snd('click');

  const newBall = {
    x: BW/2 + (Math.random()-0.5)*30,
    y: -20,
    vx: (Math.random()-0.5)*4,
    vy: 2,
    bet: bet,
    serverStatus: BALL_WAITING,
    targetIdx: 0
  };
  balls.push(newBall);

  apiCall({ action: 'game_play', username: user, bet: bet, saldoAwal: saldoAwal }).then(res => {
    if (res && res.result === 'SUCCESS') {
      const tm = parseFloat(res.target_multiplier);
      let possible = [];
      MULTS.forEach((m, idx) => { if (Math.abs(m - tm) < 0.01) possible.push(idx); });
      
      newBall.targetIdx = possible[Math.floor(Math.random() * possible.length)];
      newBall.serverWin = parseFloat(res.win);
      newBall.serverNewSaldo = parseFloat(res.newSaldo);
      newBall.serverMult = tm;
      newBall.serverStatus = BALL_READY;
    } else {
      newBall.serverStatus = BALL_ERROR;
      _saldo = saldoAwal;
      _renderS();
      stopAuto();
    }
  }).catch(() => {
    newBall.serverStatus = BALL_ERROR;
    _saldo = saldoAwal;
    _renderS();
    stopAuto();
  });
}

function onLand(b) {
  if (b.serverNewSaldo !== undefined) _saldo = b.serverNewSaldo;
  _renderS();

  const idx = b.targetIdx;
  const slotEl = document.getElementById('slot-' + idx);
  if (slotEl) {
    slotEl.classList.add('active');
    setTimeout(() => slotEl.classList.remove('active'), 400);
  }

  if (b.serverMult >= 1) {
    snd('win');
    createParticles((idx * slotW) + slotW/2, BH - 10, b.serverMult >= 3 ? '#f5e642' : '#ff0077');
  }

  const list = document.getElementById('score-list');
  const div  = document.createElement('div');
  div.className = 'score-entry';
  div.innerHTML = `<b>${b.serverMult}x</b> | +${Math.floor(b.serverWin).toLocaleString('id-ID')}`;
  list.prepend(div);
  if (list.children.length > 5) list.lastChild.remove();
}

function _renderS() {
  document.getElementById('display-saldo').textContent = 'IDR ' + Math.floor(_saldo).toLocaleString('id-ID');
  storeLocalSaldo(_saldo);
}

function setSpeedMode(m) {
  speedMode = m; snd('click');
  document.getElementById('m-normal').classList.toggle('active', m === 'normal');
  document.getElementById('m-turbo').classList.toggle('active', m === 'turbo');
}
function toggleAuto() {
  isAuto = !isAuto;
  document.getElementById('m-auto').classList.toggle('active', isAuto);
  if (isAuto) { spawnBall(); autoTimer = setInterval(spawnBall, PH[speedMode].autoMs); }
  else clearInterval(autoTimer);
}
function stopAuto() { isAuto = false; clearInterval(autoTimer); document.getElementById('m-auto').classList.remove('active'); }
function changeBet(d) {
  if (isAuto) return;
  betIdx = Math.max(0, Math.min(BETS.length - 1, betIdx + d));
  document.getElementById('current-bet').textContent = BETS[betIdx].toLocaleString('id-ID');
  snd('click');
}
function showModal(m) {
  document.getElementById('modal-msg').textContent = m;
  document.getElementById('modal-overlay').style.display = 'block';
  document.getElementById('neon-modal').style.display = 'block';
}
function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.getElementById('neon-modal').style.display = 'none';
}
function snd(t) {
  try { const a = document.getElementById('snd-' + t); a.currentTime = 0; a.play(); } catch(e) {}
}

window.addEventListener('resize', resize);
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
