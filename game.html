<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>NEON PLINKO — VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root{--pink:#ff0077;--blue:#0022ff;--yellow:#fbff00;--bg:#000005;
            --gp:0 0 8px rgba(255,0,119,.7),0 0 22px rgba(255,0,119,.25);
            --gb:0 0 8px rgba(0,34,255,.7),0 0 22px rgba(0,34,255,.25);
            --gy:0 0 8px rgba(251,255,0,.7),0 0 22px rgba(251,255,0,.25);}
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
        #particles-js{position:fixed;width:100%;height:100%;z-index:0;background:radial-gradient(circle at center,#000020 0%,#000 100%);pointer-events:none;}

        #neon-alert{position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:88%;max-width:320px;background:rgba(0,0,15,.97);border:1.5px solid var(--pink);border-top:2px solid var(--yellow);color:#fff;padding:13px 18px;border-radius:14px;text-align:center;font-weight:900;z-index:9000;font-family:'Outfit',sans-serif;font-size:12px;transition:.55s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 0 16px rgba(255,0,119,.35);}
        #neon-alert.show{top:82px;}
        #neon-alert.win{border-color:var(--yellow);box-shadow:0 0 16px rgba(251,255,0,.35);}

        .header{height:72px;padding:0 15px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,20,.97);backdrop-filter:blur(20px);border-bottom:1.5px solid var(--blue);z-index:100;box-shadow:0 0 12px rgba(0,34,255,.25);position:relative;}
        .header-left{display:flex;flex-direction:column;align-items:center;cursor:pointer;min-width:55px;}
        .header-left i{font-size:22px;color:var(--blue);text-shadow:var(--gb);}
        .header-left span{font-size:8px;font-weight:900;color:var(--blue);margin-top:3px;letter-spacing:1px;text-shadow:var(--gb);text-transform:uppercase;}
        .balance-box{background:rgba(0,0,0,.85);border:1.5px solid var(--yellow);padding:6px 14px;border-radius:50px;box-shadow:0 0 10px rgba(251,255,0,.2);text-align:center;}
        .balance-label{display:block;font-size:7px;font-weight:900;color:var(--yellow);letter-spacing:1px;text-transform:uppercase;}
        #saldo-text{color:#fff;font-weight:900;font-size:13px;text-shadow:0 0 5px #fff;}
        .logo-area-mini h1{font-family:'Cinzel Decorative',serif;font-size:13px;line-height:1.2;display:flex;flex-direction:column;text-align:right;}
        .n1{color:var(--pink);text-shadow:var(--gp);}
        .n2{color:var(--yellow);text-shadow:var(--gy);font-size:10px;}
        .n3{color:rgba(0,100,255,.7);font-size:7px;letter-spacing:1px;}

        #game-area{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;}
        canvas#plinko-canvas{max-height:52vh;width:100%;filter:drop-shadow(0 0 8px rgba(0,34,255,.3));}
        .multiplier-bar{width:98%;display:flex;gap:2px;margin-top:5px;}
        .m-slot{flex:1;height:34px;border-radius:4px;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;color:#fff;border:1px solid rgba(255,255,255,.1);transition:.2s;}
        .hit-win{transform:scale(1.2) translateY(-5px);filter:brightness(1.7);box-shadow:var(--gy);z-index:10;border:1px solid var(--yellow);}
        .win-notif{margin:8px 0;height:38px;width:88%;background:rgba(0,0,0,.75);border:1.5px solid var(--blue);border-radius:50px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(0,34,255,.2);}
        #win-display{font-size:15px;font-weight:900;color:rgba(255,255,255,.1);transition:.2s;letter-spacing:1px;}
        #win-display.active{color:var(--yellow);text-shadow:var(--gy);transform:scale(1.05);}

        .controls{background:rgba(0,0,20,.98);padding:14px 18px;border-top:1.5px solid var(--blue);border-radius:22px 22px 0 0;z-index:100;width:100%;box-shadow:0 -6px 22px rgba(0,34,255,.18);}
        .bet-control{display:flex;justify-content:center;align-items:center;gap:18px;margin-bottom:12px;}
        .bet-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--blue);background:#000;color:var(--blue);cursor:pointer;box-shadow:0 0 8px rgba(0,34,255,.3);display:flex;align-items:center;justify-content:center;font-size:16px;transition:.2s;}
        .bet-btn:active{background:var(--blue);color:#fff;}
        .bet-display{font-size:18px;font-weight:900;color:var(--yellow);min-width:115px;text-align:center;text-shadow:var(--gy);}
        .mode-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
        .m-btn{padding:10px;border-radius:10px;border:1px solid rgba(0,34,255,.3);background:rgba(0,0,0,.85);color:rgba(255,255,255,.45);font-size:9px;font-weight:900;cursor:pointer;text-transform:uppercase;transition:.2s;letter-spacing:.5px;font-family:'Outfit',sans-serif;}
        .m-btn.active{border-color:var(--blue);color:var(--blue);box-shadow:inset 0 0 10px rgba(0,34,255,.2);}
        .m-btn.auto-on{background:var(--pink);border-color:#fff;color:#fff;box-shadow:0 0 12px rgba(255,0,119,.5);animation:pulse 1s infinite;}
        @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(.97)}100%{transform:scale(1)}}
        .drop-btn{width:100%;padding:16px;border-radius:50px;border:none;background:linear-gradient(90deg,var(--blue),var(--pink));color:#fff;font-weight:900;font-size:14px;cursor:pointer;text-transform:uppercase;letter-spacing:2px;box-shadow:0 0 14px rgba(255,0,119,.35);font-family:'Outfit',sans-serif;transition:.2s;}
        .drop-btn:active{transform:scale(.98);}
        .stop-btn{background:linear-gradient(90deg,var(--pink),#aa0000)!important;}

        .nav-bottom{height:70px;background:rgba(0,0,15,.99);display:flex;border-top:1.5px solid rgba(0,34,255,.4);padding-bottom:env(safe-area-inset-bottom);position:relative;z-index:1000;box-shadow:0 -3px 12px rgba(0,34,255,.18);}
        .nav-link{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;gap:3px;transition:.3s;}
        .nav-link i{font-size:21px;}
        .nav-link span{font-size:9px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;}
        .n-depo{color:var(--yellow);text-shadow:var(--gy);}
        .n-wd{color:var(--pink);text-shadow:var(--gp);}
        .n-reward{color:var(--blue);text-shadow:var(--gb);}

        #alert-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(12px);}
        .alert-box{width:285px;background:rgba(0,0,15,.99);border:1.5px solid var(--yellow);border-top:2px solid var(--pink);border-radius:22px;padding:28px;text-align:center;box-shadow:0 0 18px rgba(251,255,0,.25);animation:zoomIn .3s ease;}
        @keyframes zoomIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
        #alert-msg{font-weight:900;color:var(--yellow);margin-bottom:20px;text-transform:uppercase;font-size:14px;line-height:1.5;text-shadow:var(--gy);}
        .alert-btn{width:100%;padding:13px;background:linear-gradient(90deg,var(--blue),var(--pink));border:none;color:#fff;border-radius:50px;font-weight:900;cursor:pointer;font-family:'Outfit',sans-serif;letter-spacing:1px;text-transform:uppercase;}
    </style>
</head>
<body>
<div id="particles-js"></div>
<div id="neon-alert">SYSTEM NOTIFICATION</div>

<div class="header">
    <div class="header-left" onclick="navTo('profil.html')">
        <i class="fas fa-user-astronaut"></i><span>PROFIL</span>
    </div>
    <div>
        <div class="balance-box">
            <span class="balance-label">SALDO UTAMA</span>
            <span id="saldo-text">IDR 0</span>
        </div>
    </div>
    <div class="logo-area-mini">
        <h1><span class="n1">NEON</span><span class="n2">PLINKO</span><span class="n3">VIP</span></h1>
    </div>
</div>

<div id="game-area">
    <canvas id="plinko-canvas"></canvas>
    <div class="multiplier-bar" id="m-bar"></div>
    <div class="win-notif">
        <span id="win-display">— SIAP BERMAIN —</span>
    </div>
</div>

<div class="controls">
    <div class="bet-control">
        <button class="bet-btn" onclick="adjustBet(-1)"><i class="fas fa-minus"></i></button>
        <div class="bet-display">IDR <span id="bet-amt">400</span></div>
        <button class="bet-btn" onclick="adjustBet(1)"><i class="fas fa-plus"></i></button>
    </div>
    <div class="mode-grid">
        <button class="m-btn active" id="m-norm" onclick="setSpeed('normal')"><i class="fas fa-gauge"></i><br>NORMAL</button>
        <button class="m-btn" id="m-turbo" onclick="setSpeed('turbo')"><i class="fas fa-bolt"></i><br>TURBO</button>
        <button class="m-btn" id="m-auto" onclick="toggleAuto()"><i class="fas fa-robot"></i><br>AUTO</button>
    </div>
    <button class="drop-btn" id="main-action" onclick="handleMainAction()">
        <i class="fas fa-circle-dot"></i> DROP NEON BALL
    </button>
</div>

<div class="nav-bottom">
    <a href="deposit.html" class="nav-link n-depo"><i class="fas fa-wallet"></i><span>DEPO</span></a>
    <a href="withdraw.html" class="nav-link n-wd"><i class="fas fa-money-bill-transfer"></i><span>WD</span></a>
    <a href="reward.html" class="nav-link n-reward"><i class="fas fa-gift"></i><span>REWARD</span></a>
</div>

<div id="alert-modal">
    <div class="alert-box">
        <p id="alert-msg"></p>
        <button class="alert-btn" onclick="closeAlert()">CONFIRM</button>
    </div>
</div>

<script>
const SUPA_URL="https://bgffnmwrviyqpeevzjsn.supabase.co",SUPA_KEY="sb_publishable_jT5khcYa5J22ijGDjl9klA_qWkSuani";
const _supa=supabase.createClient(SUPA_URL,SUPA_KEY);
const user=localStorage.getItem('user_session')||localStorage.getItem('neon_user');
const{Engine,Render,Runner,Bodies,Composite,Body,Events}=Matter;
const engine=Engine.create({gravity:{y:1.5}});
const BETS=[400,800,1000,1200,1600,1800,2000,4000,6000,8000,10000,12000,16000,18000,20000];
let bIdx=0,balance=0,autoMode=false,turboMode=false,timer=null;
const multis=[10,5,2,0.5,0.2,0.2,0.5,2,5,10];
const mColors=['#ff0077','#ff0077','#0022ff','#001a88','#030314','#030314','#001a88','#0022ff','#ff0077','#ff0077'];
const aCtx=new(window.AudioContext||window.webkitAudioContext)();
function beep(f,d,v=0.1){try{const o=aCtx.createOscillator();const g=aCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(v,aCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.00001,aCtx.currentTime+d);o.connect(g);g.connect(aCtx.destination);o.start();o.stop(aCtx.currentTime+d);}catch(e){}}

// Partikel lebih terang
particlesJS("particles-js",{
    "particles":{
        "number":{"value":70},
        "color":{"value":["#0044ff","#ff0077","#ffffff"]},
        "shape":{"type":"circle"},
        "opacity":{"value":0.9,"random":true,"anim":{"enable":true,"speed":1,"opacity_min":0.5}},
        "size":{"value":2.5,"random":true},
        "line_linked":{"enable":true,"distance":120,"color":"#ff0077","opacity":0.3,"width":0.7},
        "move":{"enable":true,"speed":1.8,"random":true,"out_mode":"out"}
    },
    "interactivity":{"events":{"onhover":{"enable":false},"onclick":{"enable":true,"mode":"push"}},"modes":{"push":{"particles_nb":3}}}
});

function showNeonAlert(msg,type=''){const a=document.getElementById('neon-alert');a.innerText=msg;a.className=type==='win'?'show win':'show';setTimeout(()=>a.className='',2500);}

async function init(){
    if(!user)return location.href='index.html';
    const{data}=await _supa.from('profiles').select('saldo').eq('username',user).single();
    if(data){balance=Math.round(data.saldo);refreshUI();}
    setupPlinko();updateMultiplierLabels();
    await _supa.from('profiles').update({initial_balance_session:balance}).eq('username',user);
}

function navTo(url){beep(1000,0.1);setTimeout(()=>location.href=url,150);}
function refreshUI(){const el=document.getElementById('saldo-text');if(el)el.innerText="IDR "+Math.round(balance).toLocaleString();}
function updateMultiplierLabels(){const bar=document.getElementById('m-bar');if(!bar)return;bar.innerHTML="";multis.forEach((v,i)=>{const slot=document.createElement('div');slot.className='m-slot';slot.id='s-'+i;slot.style.background=mColors[i];slot.innerHTML=`X${v}`;bar.appendChild(slot);});}

function setupPlinko(){
    const cvs=document.getElementById('plinko-canvas');if(!cvs)return;
    const render=Render.create({canvas:cvs,engine:engine,options:{width:400,height:500,wireframes:false,background:'transparent'}});
    for(let r=0;r<9;r++){let pCount=r+3;for(let c=0;c<pCount;c++){let x=200+(c-pCount/2+0.5)*36;let y=80+r*42;Composite.add(engine.world,Bodies.circle(x,y,3.5,{isStatic:true,render:{fillStyle:'#ffffff'},label:'pin'}));}}
    multis.forEach((v,i)=>{const sensor=Bodies.rectangle(38+i*36,485,30,40,{isStatic:true,isSensor:true,label:`win_${v}_${i}`,render:{visible:false}});Composite.add(engine.world,sensor);});
    Render.run(render);Runner.run(Runner.create(),engine);
    Events.on(engine,'collisionStart',(e)=>{e.pairs.forEach(p=>{if(p.bodyA.label==='pin'||p.bodyB.label==='pin')beep(600,0.05,0.05);if(p.bodyA.label==='ball'&&p.bodyB.label.startsWith('win_'))calcWin(p.bodyA,p.bodyB.label);else if(p.bodyB.label==='ball'&&p.bodyA.label.startsWith('win_'))calcWin(p.bodyB,p.bodyA.label);});});
}

// PERBAIKAN UTAMA: Selalu fetch profil terbaru dari DB sebelum setiap drop
// Ini memastikan perubahan winrate dari master panel langsung berlaku
async function dropBall(){
    const bet=BETS[bIdx];
    if(balance<bet){stopAuto();beep(200,0.5);return showAlert("SALDO TIDAK CUKUP!");}

    // SELALU fetch data terbaru dari server — bukan cache lokal
    const{data:p, error:err}=await _supa.from('profiles').select('*').eq('username',user).single();
    if(err||!p)return;

    // Ambil winrate & parameter terbaru LANGSUNG dari DB
    let finalWR = parseFloat(p.winrate) || 50;
    let finalLimit = parseFloat(p.maxwin_limit) || 50000;
    let sessionMins = parseFloat(p.session_minutes || p.session_timer || 0);

    // Hitung durasi bermain
    let startTime = new Date(p.session_start || p.created_at || Date.now());
    let playedMins = (new Date() - startTime) / 60000;

    // Penalti sesi
    if(sessionMins > 0 && playedMins > sessionMins){
        let extra = Math.floor(playedMins - sessionMins);
        finalWR -= p.winrate >= 80 ? extra * 5 : extra * 10;
        if(finalWR < 2) finalWR = 2;
    }

    // Winrate rendah = force kalah jika saldo sudah di atas modal
    if(p.winrate <= 40){
        let mk = (parseFloat(p.last_deposit_amount) || 200000) * 1.05;
        if(balance >= mk) finalWR = 1;
    }

    // Winrate sedang = batasi kemenangan
    if(p.winrate >= 50 && p.winrate <= 70){
        let pp = p.winrate === 50 ? 0.10 : (p.winrate === 60 ? 0.15 : 0.20);
        let mn = (parseFloat(p.last_deposit_amount) || 200000) * (1 + pp);
        if(balance >= mn) finalWR = 5;
    }

    // PANIC MODE atau maxwin limit — force kalah
    if(p.panic_mode === true || balance >= finalLimit) finalWR = 1;

    // Kurangi saldo sebelum bola jatuh
    balance = Math.round(balance - bet);
    refreshUI();
    await _supa.from('profiles').update({saldo: balance}).eq('username', user);

    // Tentukan apakah menang berdasarkan finalWR (sudah fresh dari DB)
    const isHoki = (Math.random() * 100) < finalWR;
    let forceX = isHoki ? (Math.random() > 0.5 ? 3.8 : -3.8) : (Math.random() > 0.5 ? 0.5 : -0.5);

    const ball=Bodies.circle(200+(Math.random()*6-3),20,8,{label:'ball',restitution:0.5,friction:0.01,render:{fillStyle:'#ff0077',strokeStyle:'#ffffff',lineWidth:2}});
    Body.setVelocity(ball,{x:forceX,y:0});
    Composite.add(engine.world,ball);
    beep(800,0.1);
    setTimeout(()=>{if(Composite.allBodies(engine.world).includes(ball))Composite.remove(engine.world,ball);},7000);
}

async function calcWin(ball,label){
    if(ball.used)return;ball.used=true;
    const info=label.split('_');const m=parseFloat(info[1]);const idx=info[2];
    const win=Math.floor(BETS[bIdx]*m);balance=Math.round(balance+win);refreshUI();
    const disp=document.getElementById('win-display');
    if(disp){disp.innerText=`(X${m}) +${win.toLocaleString()}`;disp.className='active';}
    const s=document.getElementById('s-'+idx);
    if(s){s.classList.add('hit-win');setTimeout(()=>{s.classList.remove('hit-win');if(disp)disp.className='';},600);}
    if(m>=5){beep(1200,0.3,0.2);showNeonAlert(`X${m} JACKPOT! +${win.toLocaleString()}`,'win');}
    else if(m>=2)beep(1000,0.2,0.15);else if(m>=1)beep(800,0.15,0.1);else beep(400,0.1,0.05);
    Composite.remove(engine.world,ball);
    await _supa.from('profiles').update({saldo:balance}).eq('username',user);
}

function adjustBet(d){if(autoMode)return;beep(500,0.05);bIdx=Math.max(0,Math.min(BETS.length-1,bIdx+d));document.getElementById('bet-amt').innerText=BETS[bIdx].toLocaleString();}
function setSpeed(s){beep(700,0.05);turboMode=(s==='turbo');document.getElementById('m-norm').classList.toggle('active',s==='normal');document.getElementById('m-turbo').classList.toggle('active',s==='turbo');if(autoMode){clearInterval(timer);timer=setInterval(dropBall,turboMode?400:1000);}}
function toggleAuto(){autoMode=!autoMode;beep(autoMode?1000:400,0.1);const btn=document.getElementById('m-auto');const main=document.getElementById('main-action');if(autoMode){btn.classList.add('auto-on');main.innerHTML='<i class="fas fa-stop-circle"></i> STOP AUTO DROP';main.classList.add('stop-btn');timer=setInterval(dropBall,turboMode?400:1000);}else stopAuto();}
function stopAuto(){autoMode=false;clearInterval(timer);document.getElementById('m-auto').classList.remove('auto-on');const main=document.getElementById('main-action');main.innerHTML='<i class="fas fa-circle-dot"></i> DROP NEON BALL';main.classList.remove('stop-btn');}
function handleMainAction(){if(autoMode)stopAuto();else dropBall();}
function showAlert(m){beep(300,0.3);document.getElementById('alert-msg').innerText=m;document.getElementById('alert-modal').style.display='flex';}
function closeAlert(){beep(600,0.1);document.getElementById('alert-modal').style.display='none';}
window.onload=init;
</script>
</body>
</html>
