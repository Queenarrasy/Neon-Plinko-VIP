<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root{
  --pink:#ff0077;--blue:#0055ff;--yellow:#f5e642;--bg:#02030d;
  --gp:0 0 8px rgba(255,0,119,.65),0 0 24px rgba(255,0,119,.22);
  --gb:0 0 8px rgba(0,85,255,.65),0 0 24px rgba(0,85,255,.22);
  --gy:0 0 8px rgba(245,230,66,.65),0 0 24px rgba(245,230,66,.22);
  --bp:rgba(255,0,119,.35);--bb:rgba(0,85,255,.35);--by:rgba(245,230,66,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;overflow:hidden;
  display:flex;flex-direction:column;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 70% 40% at 15% 0%,rgba(0,55,255,.09) 0%,transparent 65%),
    radial-gradient(ellipse 55% 45% at 85% 100%,rgba(255,0,119,.08) 0%,transparent 65%);
  color:#dde0f0;font-family:'Outfit',sans-serif;
}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.014) 3px,rgba(0,0,0,.014) 4px);}

/* ── MODAL ─────────────────────────────────────────────── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:9998;}
#neon-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(160deg,#07091d,#0b0d24);border-radius:22px;z-index:9999;
  padding:26px 22px;text-align:center;min-width:270px;max-width:310px;width:86%;
  animation:mpop .3s cubic-bezier(.34,1.56,.64,1) both;}
#neon-modal.m-pink  {border:1px solid var(--bp);box-shadow:var(--gp);}
#neon-modal.m-blue  {border:1px solid var(--bb);box-shadow:var(--gb);}
#neon-modal.m-yellow{border:1px solid var(--by);box-shadow:var(--gy);}
@keyframes mpop{from{opacity:0;transform:translate(-50%,-50%) scale(.7)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
#modal-title{font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;letter-spacing:1.5px;margin-bottom:8px;}
.m-pink #modal-title{color:var(--pink);}
.m-blue #modal-title{color:#7799ff;}
.m-yellow #modal-title{color:var(--yellow);}
#modal-msg{font-size:12px;color:rgba(220,220,240,.65);line-height:1.65;}
.modal-btn{margin-top:15px;padding:9px 24px;border-radius:50px;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;background:transparent;transition:.25s;}
.m-pink .modal-btn{border:1px solid var(--bp);color:var(--pink);}
.m-blue .modal-btn{border:1px solid var(--bb);color:#7799ff;}
.m-yellow .modal-btn{border:1px solid var(--by);color:var(--yellow);}

/* ── HEADER ─────────────────────────────────────────────── */
.header{
  flex-shrink:0;z-index:10;
  padding:9px 14px;
  background:rgba(2,3,13,.96);
  border-bottom:1px solid rgba(0,85,255,.28);
  backdrop-filter:blur(20px);
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 20px rgba(0,85,255,.1);
}
.header-item{display:flex;flex-direction:column;align-items:center;
  cursor:pointer;min-width:50px;transition:.2s;text-decoration:none;}
.header-item:active{transform:scale(.86);}
.header-item i{font-size:22px;display:block;margin-bottom:2px;}
.header-item span{font-size:8.5px;font-weight:700;letter-spacing:1px;}
.balance-box{flex:1;margin:0 10px;background:rgba(0,0,0,.55);
  border:1px solid var(--bp);border-radius:20px;
  padding:5px 16px;text-align:center;box-shadow:var(--gp);}
.saldo-label{font-size:7.5px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,.38);margin-bottom:1px;}
#display-saldo{font-family:'Cinzel Decorative',serif;font-size:15px;font-weight:900;color:#fff;text-shadow:var(--gp);}

/* ── BOARD ──────────────────────────────────────────────── */
#board-wrapper{
  flex:0 0 auto;
  height:42vh;
  min-height:180px;
  max-height:320px;
  position:relative;
  overflow:hidden;
}
#plinko-canvas{display:block;width:100%;height:100%;}

/* FLOATING SCORE */
#floating-score{
  position:absolute;top:6px;right:7px;
  background:rgba(2,3,13,.9);border:1px solid var(--bb);
  border-radius:11px;padding:5px 9px;z-index:50;
  box-shadow:var(--gb);min-width:88px;
}
.score-entry{font-size:9.5px;font-weight:700;color:var(--yellow);
  border-bottom:1px solid rgba(255,255,255,.07);padding:3px 0;text-align:center;}
.score-entry:last-child{border-bottom:none;}

/* ── SLOT ROW ───────────────────────────────────────────── */
.multiplier-row{
  flex-shrink:0;display:flex;justify-content:center;
  gap:4px;padding:0 12px;margin:5px 0 3px;
}
.slot{
  flex:1;height:30px;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:900;border-radius:8px;
  transition:.28s cubic-bezier(.175,.885,.32,1.275);letter-spacing:.5px;
}
.slot.active{transform:translateY(-8px);filter:brightness(1.8);box-shadow:0 0 22px rgba(255,255,255,.55);}
.s-high{background:linear-gradient(135deg,var(--pink),#cc0044);color:#fff;}
.s-mid {background:linear-gradient(135deg,var(--yellow),#b8a800);color:#000;}
.s-low {background:linear-gradient(135deg,var(--blue),#0022bb);color:rgba(255,255,255,.95);}

/* ── CONTROLS ───────────────────────────────────────────── */
/*
  Layout dari atas ke bawah:
  1. mode-row   — 3 tombol mode
  2. bet-row    — kecil, compact
  3. btn-play   — besar, tegas
  4. nav-bottom — withdraw/deposit/reward (langsung di bawah play)
  Semua dalam satu flex column, space terdistribusi.
*/
.controls{
  flex:1;
  min-height:0;
  z-index:10;
  padding:10px 16px 0;
  background:rgba(2,3,13,.97);
  border-top:1px solid rgba(0,85,255,.28);
  display:flex;
  flex-direction:column;
  gap:8px;           /* jarak seragam antar row */
}

/* MODE BUTTONS */
.mode-row{display:flex;gap:8px;}
.btn-mode{
  flex:1;background:transparent;
  padding:9px 4px;border-radius:12px;
  font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;
  cursor:pointer;transition:.22s;letter-spacing:.4px;
}
#m-normal{border:1px solid var(--bp);color:var(--pink);}
#m-normal.active{background:rgba(255,0,119,.18);box-shadow:var(--gp);}
#m-turbo {border:1px solid var(--bb);color:#7799ff;}
#m-turbo.active {background:rgba(0,85,255,.18);box-shadow:var(--gb);}
#m-auto  {border:1px solid var(--by);color:var(--yellow);}
#m-auto.active  {background:rgba(245,230,66,.15);box-shadow:var(--gy);}

/* BET ROW — compact, kecil */
.bet-row{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,.35);
  border:1px solid rgba(0,85,255,.2);
  border-radius:50px;
  padding:5px 10px;
}
.bet-btn{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;cursor:pointer;transition:.15s;
  background:transparent;border:none;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.bet-btn:active{transform:scale(.80);}
/* Disabled state ketika auto aktif */
.bet-btn.locked{opacity:.25;pointer-events:none;}
.bet-minus{color:var(--pink);}
.bet-plus {color:#7799ff;}
.bet-center{text-align:center;flex:1;}
.bet-label{font-size:7.5px;font-weight:600;letter-spacing:1.5px;color:rgba(255,255,255,.28);}
#current-bet{
  font-family:'Cinzel Decorative',serif;
  font-size:18px;font-weight:900;
  color:var(--yellow);text-shadow:var(--gy);
  line-height:1.1;
}
/* Lock indicator */
#bet-lock-hint{
  font-size:8px;color:rgba(245,230,66,.5);
  text-align:center;display:none;
  letter-spacing:.5px;
}

/* PLAY BUTTON */
.btn-play{
  flex-shrink:0;
  width:100%;padding:15px;border-radius:50px;cursor:pointer;
  font-family:'Cinzel Decorative',serif;font-size:13px;font-weight:900;
  letter-spacing:2px;text-transform:uppercase;transition:.18s;
  background:linear-gradient(90deg,rgba(255,0,119,.72),rgba(0,85,255,.72));
  color:#fff;border:1px solid var(--by);
  box-shadow:var(--gp),var(--gb);
  user-select:none;-webkit-user-select:none;
}
.btn-play:active{transform:scale(.97);}
.btn-play.stop-mode{
  background:linear-gradient(90deg,rgba(245,230,66,.65),rgba(190,140,0,.5));
  border-color:var(--by);box-shadow:var(--gy);color:#000;
}

/* ── NAV BOTTOM ─────────────────────────────────────────── */
/* Nav langsung di dalam .controls agar tidak jauh ke bawah */
.nav-bottom{
  flex-shrink:0;
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:0 0 10px;      /* padding bawah saja */
  border-top:1px solid rgba(0,85,255,.18);
  padding-top:8px;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;
  padding:9px 0;border-radius:14px;text-decoration:none;
  font-family:'Outfit',sans-serif;font-weight:700;transition:.18s;
}
.nav-btn:active{transform:scale(.91);}
.nav-btn i{font-size:19px;margin-bottom:3px;}
.nav-btn span{font-size:8.5px;letter-spacing:.4px;}
.btn-withdraw{border:1px solid var(--by);color:var(--yellow);background:rgba(245,230,66,.04);}
.btn-withdraw:hover{background:rgba(245,230,66,.1);box-shadow:var(--gy);}
.btn-deposit {border:1px solid var(--bp);color:var(--pink);background:rgba(255,0,119,.04);}
.btn-deposit:hover {background:rgba(255,0,119,.1);box-shadow:var(--gp);}
.btn-reward  {border:1px solid var(--bb);color:#7799ff;background:rgba(0,85,255,.04);}
.btn-reward:hover  {background:rgba(0,85,255,.1);box-shadow:var(--gb);}
</style>

<script>

<script>
/* ════════════════════════════════════════════════════════════
   NEON PLINKO VIP — Game Engine v5
   FIXED: Saldo benar, bola natural, slot sinkron dengan hasil
   ════════════════════════════════════════════════════════════ */

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYTC11njbEBtAsdpbaRLJRt13j7iEKCkANV1SgxxguV_zFUyZ6Z7FAj0SKuw4d5ThmKw/exec";

// ── CONFIG ───────────────────────────────────────────────────
const ROWS   = 10;
// Slot kiri ke kanan: 10 slot sesuai urutan di layar
const MULTS  = [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10];
const BETS   = [400,800,1000,1200,1600,2000,4000,8000,10000,20000];
const BALL_R = 6.5;
const PEG_R  = 5.0;

// Physics — lebih natural, tidak melompat-lompat
const PH = {
  normal:{ grav:0.22, fric:0.992, bounce:0.42, pegF:2.2, randV:0.28, autoMs:800  },
  turbo: { grav:0.38, fric:0.985, bounce:0.36, pegF:3.2, randV:0.35, autoMs:220  }
};

// ── STATE ────────────────────────────────────────────────────
let canvas, ctx, DPR=1, BW=0, BH=0;
let pegs=[], balls=[], slotW=0;
let speedMode='normal', isAuto=false, autoTimer=null;
let betIdx=0, syncTimer=null, raf=null;
let holdActive=false, holdRepeat=null, holdTimeout=null;

// ── HELPERS ──────────────────────────────────────────────────
const getU   = () => localStorage.getItem('username');
const getS   = () => parseFloat(localStorage.getItem('user_saldo')||0);
const setS   = v  => {
  const val = Math.max(0, parseFloat(v)||0);
  localStorage.setItem('user_saldo', val);
  document.getElementById('display-saldo').textContent =
    'IDR ' + Math.floor(val).toLocaleString('id-ID');
};
const fmtIDR = v => 'IDR ' + Math.floor(v).toLocaleString('id-ID');
const snd    = t => {
  try{ const a=document.getElementById('snd-'+t); a.currentTime=0; a.play().catch(()=>{}); }catch(e){}
};

// ── MODAL ────────────────────────────────────────────────────
function showModal(msg, type='pink'){
  document.getElementById('neon-modal').className = 'm-'+type;
  document.getElementById('modal-title').textContent =
    type==='yellow'?'✨ SELAMAT!':type==='blue'?'ℹ️ INFO':'⚠️ PERHATIAN';
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal-overlay').style.display = 'block';
  document.getElementById('neon-modal').style.display     = 'block';
}
function closeModal(){
  document.getElementById('neon-modal').style.display    = 'none';
  document.getElementById('modal-overlay').style.display = 'none';
}

// ── API ──────────────────────────────────────────────────────
async function api(payload){
  try{
    const r = await fetch(SCRIPT_URL+'?data='+encodeURIComponent(JSON.stringify(payload)),{redirect:'follow'});
    const j = JSON.parse(await r.text());
    if(j && j.result!==undefined) return j;
  }catch(e){}
  try{
    const r2 = await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(payload)});
    return JSON.parse(await r2.text());
  }catch(e){ return {result:'ERROR'}; }
}

// ══════════════════════════════════════════════════════════
// CANVAS SETUP
// ══════════════════════════════════════════════════════════
function setupCanvas(){
  const wrap = document.getElementById('board-wrapper');
  canvas = document.getElementById('plinko-canvas');
  ctx    = canvas.getContext('2d');
  DPR    = window.devicePixelRatio || 1;
  BW     = wrap.clientWidth;
  BH     = wrap.clientHeight;
  canvas.width        = BW * DPR;
  canvas.height       = BH * DPR;
  canvas.style.width  = BW + 'px';
  canvas.style.height = BH + 'px';
  ctx.scale(DPR, DPR);
  buildPegs();
  buildSlots();
}

function buildPegs(){
  pegs = [];
  const margin   = Math.max(BW * 0.06, 18);
  const usableW  = BW - margin * 2;
  const spacingX = usableW / ROWS;
  const topPad   = BH * 0.05;
  const spacingY = (BH * 0.88) / ROWS;
  for(let row=0; row<ROWS; row++){
    const count = row + 2;
    const totalW = (count-1) * spacingX;
    const sx = BW/2 - totalW/2;
    const y  = topPad + row * spacingY;
    for(let col=0; col<count; col++){
      pegs.push({ x: sx + col*spacingX, y, glow:0, hue:0 });
    }
  }
}

function buildSlots(){
  const row = document.getElementById('slot-row');
  row.innerHTML = '';
  slotW = BW / MULTS.length;
  MULTS.forEach((m, i) => {
    const s = document.createElement('div');
    s.className = `slot ${m>=3?'s-high':m>=1?'s-mid':'s-low'}`;
    s.id = 'slot-'+i;
    s.textContent = m+'x';
    row.appendChild(s);
  });
}

// ══════════════════════════════════════════════════════════
// DRAW + LOOP
// ══════════════════════════════════════════════════════════
function loop(){ physics(); draw(); raf = requestAnimationFrame(loop); }

function draw(){
  ctx.clearRect(0, 0, BW, BH);

  // Pegs
  pegs.forEach(p => {
    if(p.glow > 0) p.glow = Math.max(0, p.glow - 0.04);
    const r = PEG_R + p.glow * 2.5;
    ctx.save();
    if(p.glow > 0.05){
      const col = p.hue===0?`rgba(255,0,119,${p.glow*0.5})`:`rgba(245,230,66,${p.glow*0.55})`;
      const g = ctx.createRadialGradient(p.x,p.y,0, p.x,p.y, r*3.2);
      g.addColorStop(0, col); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(p.x,p.y,r*3.2,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    }
    const pg = ctx.createRadialGradient(p.x-r*.3,p.y-r*.3,r*.05, p.x,p.y,r);
    pg.addColorStop(0,'rgba(255,255,255,0.9)');
    pg.addColorStop(0.35, p.glow>0.05?(p.hue===0?'rgba(255,120,180,1)':'rgba(255,235,80,1)'):'rgba(190,200,255,0.8)');
    pg.addColorStop(1,    p.glow>0.05?(p.hue===0?'rgba(200,0,80,0.9)':'rgba(180,150,0,0.9)'):'rgba(80,90,160,0.7)');
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=pg;
    ctx.shadowColor = p.glow>0.05?(p.hue===0?'#ff0077':'#f5e642'):'rgba(120,140,255,0.4)';
    ctx.shadowBlur  = p.glow>0.05?14:4;
    ctx.fill();
    ctx.restore();
  });

  // Balls
  balls.forEach(b => {
    ctx.save();
    const gr = ctx.createRadialGradient(b.x-BALL_R*.32,b.y-BALL_R*.35,BALL_R*.04, b.x,b.y,BALL_R);
    gr.addColorStop(0,'#ffaacc');
    gr.addColorStop(0.45,'#ff0077');
    gr.addColorStop(1,'#440011');
    ctx.beginPath(); ctx.arc(b.x,b.y,BALL_R,0,Math.PI*2);
    ctx.fillStyle=gr;
    ctx.shadowColor='rgba(255,0,119,0.85)';
    ctx.shadowBlur=16;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(b.x-BALL_R*.28,b.y-BALL_R*.3,BALL_R*.3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.shadowBlur=0;
    ctx.fill();
    ctx.restore();
  });
}

// ══════════════════════════════════════════════════════════
// PHYSICS
// Bola bergerak natural: gravitasi halus, pantulan realistis.
// Bola diarahkan pelan ke slot target (b.tx) mulai dari
// pertengahan board — tidak terasa "ditarik paksa".
// ══════════════════════════════════════════════════════════
function physics(){
  const toRemove = [];

  balls.forEach(b => {
    const ph = PH[b.spd] || PH.normal;

    // Gravitasi + friction
    b.vy += ph.grav;
    b.vx *= ph.fric;
    b.x  += b.vx;
    b.y  += b.vy;

    // Steering halus ke target — hanya aktif di 60% bawah board
    // Kekuatan steering bertambah makin ke bawah (natural funnel effect)
    const prog = Math.max(0, (b.y - BH*0.35) / (BH*0.65));
    if(prog > 0 && b.tx !== undefined){
      const steer = (b.tx - b.x) * prog * 0.018;
      b.vx += steer;
    }

    // Peg collisions
    const colDist = BALL_R + PEG_R + 0.5;
    for(let i=0; i<pegs.length; i++){
      const p  = pegs[i];
      const dx = b.x - p.x, dy = b.y - p.y;
      const d2 = dx*dx + dy*dy;
      if(d2 < colDist*colDist && d2 > 0.001){
        const d  = Math.sqrt(d2);
        const nx = dx/d, ny = dy/d;
        b.x += nx*(colDist-d); b.y += ny*(colDist-d);
        const dot = b.vx*nx + b.vy*ny;
        // Pantulan + noise kecil (lebih natural, tidak random berlebihan)
        b.vx = (b.vx - 2*dot*nx)*ph.bounce + (Math.random()-.5)*ph.randV;
        b.vy = (b.vy - 2*dot*ny)*Math.abs(ph.bounce);
        if(b.vy < 0.2) b.vy = 0.2 + Math.random()*0.15;
        // Batasi kecepatan horizontal agar tidak terlalu liar
        const mx = ph.pegF;
        b.vx = Math.max(-mx, Math.min(mx, b.vx));
        p.glow=1; p.hue=(Math.random()>0.45)?1:0;
        snd('hit');
      }
    }

    // Ball–ball collision
    for(let j=0; j<balls.length; j++){
      const o = balls[j];
      if(o===b) continue;
      const dx=b.x-o.x, dy=b.y-o.y;
      const d2=dx*dx+dy*dy, minD=BALL_R*2+0.5;
      if(d2<minD*minD && d2>0.001){
        const d=Math.sqrt(d2), nx=dx/d, ny=dy/d;
        const sep=(minD-d)*0.5;
        b.x+=nx*sep; b.y+=ny*sep; o.x-=nx*sep; o.y-=ny*sep;
        const dvx=b.vx-o.vx, dvy=b.vy-o.vy, dot=dvx*nx+dvy*ny;
        if(dot<0){
          const imp=dot*0.5;
          b.vx-=imp*nx; b.vy-=imp*ny;
          o.vx+=imp*nx; o.vy+=imp*ny;
          if(b.vy<0.1) b.vy=0.2;
          if(o.vy<0.1) o.vy=0.2;
        }
      }
    }

    // Dinding
    if(b.x < BALL_R)    { b.x=BALL_R;    b.vx= Math.abs(b.vx)*0.4; }
    if(b.x > BW-BALL_R) { b.x=BW-BALL_R; b.vx=-Math.abs(b.vx)*0.4; }
    if(b.x < -20 || b.x > BW+20) b.x = BW/2;

    // Landing — bola menyentuh bawah board
    if(b.y > BH + BALL_R*2 && !b.done){
      b.done = true;
      toRemove.push(b);
      onBallLand(b);
    }
  });

  balls = balls.filter(b => !toRemove.includes(b));
}

// ══════════════════════════════════════════════════════════
// ON BALL LAND
//
// Slot yang berkedip = slot dari serverMult (hasil server).
// Saldo langsung diupdate saat landing.
// Rumus: setS(getS() + bet × mult)
//        (saldo sudah dikurangi bet saat spawn, jadi tinggal
//         tambah winReturn = bet × mult)
// ══════════════════════════════════════════════════════════
function onBallLand(b){
  // Multiplier resmi dari server. Jika server belum balas,
  // pakai posisi bola sebagai fallback sementara.
  const mult = (b.serverMult !== undefined)
    ? b.serverMult
    : MULTS[Math.min(MULTS.length-1, Math.max(0, Math.floor(b.x / slotW)))];

  // ★ UPDATE SALDO — langsung saat landing, tidak tunggu server
  // Spawn sudah potong bet, jadi tambahkan bet×mult kembali
  const winReturn = Math.floor(b.bet * mult);
  setS(getS() + winReturn);
  b.resolved = true;
  b.resolvedMult = mult;

  if(mult >= 1.5) snd('win');

  // ★ SLOT BERKEDIP = slot dari serverMult
  // Cari slot terdekat dengan posisi bola yang punya mult sama
  let slotIdx = Math.floor(b.x / slotW);
  slotIdx = Math.min(MULTS.length-1, Math.max(0, slotIdx));
  // Override ke slot serverMult jika sudah ada
  if(b.serverMult !== undefined){
    const opts = [];
    MULTS.forEach((m,i) => { if(m === b.serverMult) opts.push(i); });
    if(opts.length > 0){
      // Pilih slot yang paling dekat dengan posisi bola landing
      opts.sort((a,z) => Math.abs(a - slotIdx) - Math.abs(z - slotIdx));
      slotIdx = opts[0];
    }
  }
  const el = document.getElementById('slot-'+slotIdx);
  if(el){ el.classList.add('active'); setTimeout(()=>el.classList.remove('active'),700); }

  // Score list
  const list = document.getElementById('score-list');
  const e    = document.createElement('div');
  e.className='score-entry';
  const c2 = mult>=3?'var(--pink)':mult>=1?'var(--yellow)':'#7799ff';
  e.innerHTML = `<span style="color:${c2}">${mult}x</span> · ${fmtIDR(winReturn)}`;
  list.prepend(e);
  while(list.children.length > 4) list.removeChild(list.lastChild);
}

// ══════════════════════════════════════════════════════════
// SPAWN BALL
//
// Alur saldo:
//   1. Spawn → setS(saldo - bet)          kurangi bet
//   2. Landing → setS(getS() + winReturn) tambah hasil
//   Rumus bersih: saldo - bet + (bet×mult) ✅
//
// Server dipanggil async untuk:
//   • Menentukan multiplier (winrate/admin)
//   • Menyimpan ke sheet
//   • Mengarahkan bola ke slot yang benar
//   • Koreksi saldo jika serverMult beda dari fallback
// ══════════════════════════════════════════════════════════
function spawnBall(){
  const bet = BETS[betIdx];
  const s   = getS();

  if(s < bet){
    snd('error');
    if(isAuto) stopAuto();
    else { holdActive=false; clearTimeout(holdTimeout); clearInterval(holdRepeat); }
    showModal('Saldo tidak cukup!\nSilakan deposit terlebih dahulu.','pink');
    return;
  }

  // 1. Kurangi bet dari display segera
  setS(s - bet);

  const sx = BW/2 + (Math.random()-.5)*8;

  // Target awal acak — server akan override setelah balas
  const ti = Math.floor(Math.random() * MULTS.length);
  const tx = (ti + 0.5) * slotW;

  const ball = {
    x: sx, y: -BALL_R*1.5,
    vx: (Math.random()-.5)*0.6, vy: 0.5,
    bet, saldoAwal: s,
    tx, spd: speedMode,
    done: false,
    serverMult:  undefined,  // diisi setelah API balas
    resolved:    false,      // true setelah onBallLand dipanggil
    resolvedMult: undefined
  };
  balls.push(ball);

  // 2. Panggil server — tidak tunggu, bola tetap jalan
  api({ action:'game_play', username:getU(), bet, saldoAwal: s })
  .then(r => {
    if(r && r.result==='SUCCESS'){
      ball.serverMult = r.target_multiplier;

      // Arahkan bola ke slot yang sesuai serverMult
      const opts = [];
      MULTS.forEach((m,i) => { if(m === r.target_multiplier) opts.push(i); });
      if(opts.length > 0){
        // Pilih slot yang paling dekat dengan posisi bola saat ini
        const curCol = Math.floor(ball.x / slotW);
        opts.sort((a,z) => Math.abs(a-curCol) - Math.abs(z-curCol));
        ball.tx = (opts[0] + 0.5) * slotW;
      }

      // Jika bola SUDAH landing sebelum server balas:
      // Koreksi saldo — selisih antara mult fallback vs serverMult
      if(ball.resolved && ball.resolvedMult !== r.target_multiplier){
        const localReturn  = Math.floor(bet * ball.resolvedMult);
        const serverReturn = Math.floor(bet * r.target_multiplier);
        const diff = serverReturn - localReturn;
        if(diff !== 0) setS(getS() + diff);
      }
    } else {
      // Server error → refund bet
      if(!ball.resolved) setS(getS() + bet);
    }
  })
  .catch(() => {
    if(!ball.resolved) setS(getS() + bet);
  });
}

// ══════════════════════════════════════════════════════════
// MODE CONTROLS
// ══════════════════════════════════════════════════════════
function setSpeedMode(m){
  snd('click');
  speedMode = m;
  document.getElementById('m-normal').classList.toggle('active', m==='normal');
  document.getElementById('m-turbo').classList.toggle('active',  m==='turbo');
  if(isAuto){ clearInterval(autoTimer); autoTimer = setInterval(spawnBall, PH[speedMode].autoMs); }
}

function toggleAuto(){ snd('click'); if(isAuto) stopAuto(); else startAuto(); }

function startAuto(){
  isAuto = true;
  document.getElementById('m-auto').textContent = '🔄 AUTO: ON';
  document.getElementById('m-auto').classList.add('active');
  document.getElementById('main-btn').classList.add('stop-mode');
  document.getElementById('play-icon').className = 'fa-solid fa-stop';
  document.getElementById('play-label').textContent = 'STOP AUTO';
  document.getElementById('btn-minus').classList.add('locked');
  document.getElementById('btn-plus').classList.add('locked');
  document.getElementById('bet-lock-hint').style.display = 'block';
  spawnBall();
  autoTimer = setInterval(spawnBall, PH[speedMode].autoMs);
}

function stopAuto(){
  isAuto = false;
  clearInterval(autoTimer); autoTimer = null;
  document.getElementById('m-auto').textContent = '🔄 AUTO: OFF';
  document.getElementById('m-auto').classList.remove('active');
  document.getElementById('main-btn').classList.remove('stop-mode');
  document.getElementById('play-icon').className = 'fa-solid fa-play';
  document.getElementById('play-label').textContent = 'PLAY BALL';
  document.getElementById('btn-minus').classList.remove('locked');
  document.getElementById('btn-plus').classList.remove('locked');
  document.getElementById('bet-lock-hint').style.display = 'none';
}

// ── BET ──────────────────────────────────────────────────────
function changeBet(d){
  if(isAuto){
    const h = document.getElementById('bet-lock-hint');
    h.style.color='#ff0077';
    setTimeout(()=>h.style.color='rgba(245,230,66,.5)',600);
    return;
  }
  snd('click');
  betIdx = Math.max(0, Math.min(BETS.length-1, betIdx+d));
  document.getElementById('current-bet').textContent = BETS[betIdx].toLocaleString('id-ID');
}

// ── PLAY BUTTON ───────────────────────────────────────────────
function onPlayDown(e){
  e.preventDefault();
  if(isAuto){ stopAuto(); return; }
  if(holdActive) return;
  holdActive = true;
  spawnBall();
  const delay = speedMode==='turbo' ? 220 : 530;
  holdTimeout = setTimeout(()=>{ holdRepeat = setInterval(spawnBall, delay); }, 300);
}
function onPlayUp(e){
  if(!holdActive) return;
  holdActive = false;
  clearTimeout(holdTimeout);
  clearInterval(holdRepeat);
  holdTimeout = holdRepeat = null;
}

// ── SALDO SYNC ────────────────────────────────────────────────
// Sync dari server hanya saat tidak ada bola aktif
function startSync(){
  if(syncTimer) clearInterval(syncTimer);
  syncTimer = setInterval(async () => {
    const u = getU(); if(!u) return;
    if(balls.length > 0) return;
    try{
      const r = await api({ action:'get_saldo', username:u });
      if(r && r.result==='SUCCESS' && r.saldo !== undefined) setS(r.saldo);
    }catch(e){}
  }, 6000);
}

// ── RESIZE ────────────────────────────────────────────────────
let _rt;
window.addEventListener('resize', () => {
  clearTimeout(_rt);
  _rt = setTimeout(()=>{ balls=[]; setupCanvas(); }, 200);
});

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  if(!getU()){ location.href='index.html'; return; }
  setupCanvas();
  setS(getS());
  loop();
  try{
    const r = await api({ action:'get_game_config', username:getU() });
    if(r.result==='SUCCESS') setS(r.saldo);
  }catch(e){}
  try{ await api({ action:'set_status', username:getU(), status:'ONLINE' }); }catch(e){}
  try{ await api({ action:'set_session_start', username:getU() }); }catch(e){}
  startSync();
});

window.addEventListener('beforeunload', () => {
  const u = getU();
  if(u) navigator.sendBeacon(
    SCRIPT_URL+'?data='+encodeURIComponent(JSON.stringify({action:'set_status',username:u,status:'OFFLINE'}))
  );
  cancelAnimationFrame(raf);
  if(syncTimer) clearInterval(syncTimer);
});
</script>
