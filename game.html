<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NEON PLINKO VIP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="config.js"></script>
<style>
:root{
  --pk:#ff0077;--bl:#0033ff;--yl:#fbff00;--gn:#00ff88;--bg:#02000e;
  --gp:0 0 10px #ff0077,0 0 24px rgba(255,0,119,.35);
  --gb:0 0 10px #0033ff,0 0 24px rgba(0,51,255,.35);
  --gy:0 0 10px #fbff00,0 0 24px rgba(251,255,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:#fff;font-family:'Outfit',sans-serif;
  min-height:100vh;overflow-x:hidden;padding-bottom:76px}

/* ── PARTICLES BG ── */
#ptjs{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 140% 80% at 50% 5%,#08002e 0%,#03000f 55%,#010008 100%)}

/* ── NEON ALERT ── */
#na{position:fixed;top:-110px;left:50%;transform:translateX(-50%);
  width:90%;max-width:340px;background:rgba(3,0,22,.97);
  border:1.5px solid var(--pk);border-top:2.5px solid var(--yl);
  color:#fff;padding:12px 18px;border-radius:16px;text-align:center;
  font-weight:900;font-size:13px;z-index:9200;letter-spacing:.4px;
  transition:.5s cubic-bezier(.175,.885,.32,1.275);
  box-shadow:0 0 24px rgba(255,0,119,.55),0 0 55px rgba(255,0,119,.18)}
#na.show{top:12px}
#na.ok{border-color:var(--gn);box-shadow:0 0 24px rgba(0,255,136,.55),0 0 55px rgba(0,255,136,.18)}
#na.warn{border-color:var(--yl);box-shadow:0 0 24px rgba(251,255,0,.55)}

/* ── HEADER ── */
.hdr{height:54px;padding:0 14px;display:flex;justify-content:space-between;
  align-items:center;background:rgba(3,0,22,.99);
  border-bottom:1.5px solid rgba(0,51,255,.5);
  position:sticky;top:0;z-index:300;backdrop-filter:blur(24px);
  box-shadow:0 2px 22px rgba(0,51,255,.22)}
.logo{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--pk);
  text-shadow:var(--gp);letter-spacing:1px}
.logo b{color:var(--yl);text-shadow:var(--gy)}
/* header right: only logo + nav label — NO depo chip */

/* ── PANIC ── */
#pb{display:none;background:rgba(255,0,30,.1);border-bottom:1px solid rgba(255,0,119,.32);
  padding:5px;text-align:center;font-size:9px;font-weight:900;color:var(--pk);
  letter-spacing:2px;position:relative;z-index:299;animation:pflash 1.2s infinite}
@keyframes pflash{0%,100%{opacity:1}50%{opacity:.2}}

/* ── MAIN WRAP ── */
.wrap{position:relative;z-index:10;padding:8px 10px 4px;max-width:480px;margin:0 auto}

/* ── CANVAS BOX ── */
.cbox{width:100%;border-radius:18px;overflow:hidden;
  border:1.5px solid rgba(0,55,255,.42);
  box-shadow:0 0 38px rgba(0,40,255,.18),0 0 80px rgba(0,20,255,.08),
             inset 0 0 55px rgba(0,0,50,.98);
  background:#010010;margin-bottom:0}
#cv{display:block;width:100%;height:auto}

/* ── SCORE PANEL (below canvas) ── */
.score-panel{
  display:grid;grid-template-columns:1fr 1.6fr 1fr;
  gap:6px;padding:8px 6px;
  background:rgba(3,0,18,.85);
  border:1.5px solid rgba(0,51,255,.25);
  border-top:none;border-radius:0 0 16px 16px;
  margin-bottom:8px;
}
.sp-box{text-align:center;padding:4px 6px}
.sp-lbl{font-size:8px;color:rgba(255,255,255,.35);text-transform:uppercase;
  letter-spacing:.8px;font-weight:900;display:block;margin-bottom:2px}
.sp-val{font-size:13px;font-weight:900;display:block;line-height:1.2}
.sp-val.yl{color:var(--yl);text-shadow:var(--gy)}
.sp-val.pk{color:var(--pk);text-shadow:var(--gp)}
.sp-val.gn{color:var(--gn);text-shadow:0 0 10px rgba(0,255,136,.5)}
/* center saldo big */
.sp-center{text-align:center;padding:4px 6px;
  border-left:1px solid rgba(0,51,255,.2);border-right:1px solid rgba(0,51,255,.2)}
.sp-saldo-big{font-size:20px;font-weight:900;color:var(--yl);text-shadow:var(--gy);
  letter-spacing:.5px;display:block}

/* ── CONTROLS PANEL ── */
.ctrl{background:rgba(3,0,18,.75);border:1px solid rgba(0,51,255,.22);
  border-radius:16px;padding:10px;margin-bottom:8px;
  box-shadow:inset 0 0 20px rgba(0,0,40,.5)}

/* MODE BUTTONS — 4 modes */
.mode-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;margin-bottom:9px}
.mb{padding:8px 2px;border-radius:9px;border:1.5px solid rgba(0,51,255,.28);
  background:rgba(0,0,45,.85);color:rgba(255,255,255,.38);
  font-weight:900;font-size:9px;cursor:pointer;transition:.25s;
  text-align:center;font-family:'Outfit',sans-serif;
  text-transform:uppercase;letter-spacing:.4px;line-height:1.3}
.mb i{display:block;font-size:13px;margin-bottom:2px;opacity:.6}
/* active states */
.mb.m-manual{border-color:var(--pk);color:var(--pk);background:rgba(255,0,119,.1);
  box-shadow:0 0 10px rgba(255,0,119,.18)}
.mb.m-manual i{opacity:1}
.mb.m-turbo-m{border-color:var(--bl);color:#66aaff;background:rgba(0,51,255,.12);
  box-shadow:0 0 10px rgba(0,51,255,.2)}
.mb.m-turbo-m i{opacity:1}
.mb.m-auto{border-color:var(--gn);color:var(--gn);background:rgba(0,255,136,.08);
  box-shadow:0 0 10px rgba(0,255,136,.18)}
.mb.m-auto i{opacity:1}
.mb.m-turbo-a{border-color:var(--yl);color:var(--yl);background:rgba(251,255,0,.08);
  box-shadow:0 0 10px rgba(251,255,0,.18)}
.mb.m-turbo-a i{opacity:1}

/* BET ROW */
.brow{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.bstep{width:42px;height:42px;border-radius:10px;
  border:1.5px solid rgba(255,0,119,.4);
  background:rgba(255,0,119,.1);color:var(--pk);
  font-size:22px;font-weight:900;cursor:pointer;transition:.2s;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 0 8px rgba(255,0,119,.12)}
.bstep:active{background:rgba(255,0,119,.3);box-shadow:var(--gp)}
.bstep:disabled{opacity:.25;cursor:not-allowed;background:rgba(0,0,0,.3)}
.bet-disp{flex:1;background:rgba(0,0,0,.65);
  border:1.5px solid rgba(251,255,0,.35);border-radius:10px;
  color:var(--yl);font-size:19px;font-weight:900;
  padding:8px 8px;text-align:center;font-family:'Outfit',sans-serif;
  text-shadow:var(--gy);letter-spacing:.5px;cursor:default;user-select:none;
  min-height:42px;display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 0 12px rgba(251,255,0,.06)}

/* RISK ROW */
.rrow{display:flex;gap:5px;margin-bottom:9px}
.rb{flex:1;padding:8px 4px;border-radius:9px;border:1px solid rgba(0,51,255,.25);
  background:rgba(0,0,45,.85);color:rgba(255,255,255,.38);font-weight:900;
  font-size:10px;cursor:pointer;transition:.25s;text-align:center;
  font-family:'Outfit',sans-serif;text-transform:uppercase;letter-spacing:.4px}
.rb.ar{border-color:var(--yl);color:var(--yl);background:rgba(251,255,0,.07);
  box-shadow:0 0 8px rgba(251,255,0,.12)}

/* DROP / STOP BUTTON */
.dbtn{width:100%;padding:15px;border-radius:50px;border:none;
  background:linear-gradient(90deg,#bb0044,#ff0077,#0033ff,#0055ee,#ff0077,#bb0044);
  background-size:300%;color:#fff;font-weight:900;font-size:14px;cursor:pointer;
  box-shadow:0 0 16px rgba(255,0,119,.42),0 0 38px rgba(0,51,255,.2);
  letter-spacing:2px;text-transform:uppercase;font-family:'Outfit',sans-serif;
  animation:btnfl 3.5s linear infinite;transition:.2s}
@keyframes btnfl{0%{background-position:0%}100%{background-position:300%}}
.dbtn:active{transform:scale(.97)}
.dbtn:disabled{opacity:.3;cursor:not-allowed;animation:none;filter:grayscale(1)}
.dbtn.state-stop{
  background:linear-gradient(90deg,#550000,#aa0022,#550000);
  background-size:200%;animation:none;
  box-shadow:0 0 16px rgba(255,0,60,.5)}
.dbtn.state-turbo{
  background:linear-gradient(90deg,#666600,#cccc00,#fbff00,#cccc00,#666600);
  background-size:200%;color:#000;animation:btnfl2 1s linear infinite;
  box-shadow:0 0 20px rgba(251,255,0,.55)}
@keyframes btnfl2{0%{background-position:0%}100%{background-position:200%}}

/* WIN POP */
@keyframes wfl{
  0%  {opacity:0;transform:translateY(0) scale(.35)}
  22% {opacity:1;transform:translateY(-16px) scale(1.3)}
  100%{opacity:0;transform:translateY(-78px) scale(1)}}
.wpop{position:fixed;pointer-events:none;font-family:'Outfit',sans-serif;
  font-weight:900;font-size:22px;color:var(--yl);
  text-shadow:0 0 18px rgba(251,255,0,.95);z-index:800;
  animation:wfl 1.4s ease forwards}

/* ── HISTORY — 3 rows visible, own scroll ── */
.hsec{padding:0 1px 10px}
.hlbl{font-size:10px;font-weight:900;color:var(--pk);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.hlbl::after{content:'';flex:1;height:1px;
  background:linear-gradient(90deg,rgba(255,0,119,.45),transparent)}
.hbox{background:rgba(3,0,22,.85);border:1.5px solid rgba(0,51,255,.22);
  border-radius:14px;overflow:hidden}
.hscr{max-height:112px;overflow-y:auto; /* ~3 rows */
  scrollbar-width:thin;scrollbar-color:var(--pk) rgba(0,0,0,.5)}
.hscr::-webkit-scrollbar{width:3px}
.hscr::-webkit-scrollbar-track{background:rgba(0,0,0,.5)}
.hscr::-webkit-scrollbar-thumb{background:var(--pk);border-radius:2px}
table.ht{width:100%;border-collapse:collapse}
table.ht th{padding:7px 10px;font-size:8px;font-weight:900;color:var(--pk);
  text-transform:uppercase;letter-spacing:1px;
  border-bottom:1px solid rgba(255,0,119,.2);background:rgba(3,0,20,.95);
  text-align:left;position:sticky;top:0;z-index:5}
table.ht td{padding:8px 10px;font-size:11px;font-weight:700;
  border-bottom:1px solid rgba(0,51,255,.07)}
table.ht tr:last-child td{border-bottom:none}
.rw td{color:var(--gn)}
.rl td{color:rgba(255,255,255,.35)}
.re td{text-align:center;padding:18px!important;opacity:.3;font-size:12px}

/* ── MAXWIN ── */
#mwo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);
  z-index:9600;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:28px}
#mwo.on{display:flex}
.mwi{font-size:66px;margin-bottom:16px;animation:mwsp 2s ease-in-out infinite}
@keyframes mwsp{0%,100%{transform:rotate(-7deg) scale(1)}50%{transform:rotate(7deg) scale(1.08)}}
.mwt{font-family:'Cinzel Decorative',serif;font-size:20px;color:var(--yl);
  text-shadow:var(--gy);margin-bottom:10px;line-height:1.3}
.mws{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:24px;
  line-height:1.65;white-space:pre-line}
.mwb{width:100%;max-width:280px;padding:13px;border-radius:50px;border:none;
  font-weight:900;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;
  text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.mwb1{background:linear-gradient(90deg,var(--pk),#b400dc);color:#fff;box-shadow:var(--gp)}
.mwb2{background:rgba(255,255,255,.07);color:rgba(255,255,255,.52);
  border:1px solid rgba(255,255,255,.14)}

/* ── MODAL ── */
#mdo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);
  z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.mdb{width:88%;max-width:320px;background:rgba(3,0,20,.99);
  border:1.5px solid var(--pk);border-top:2.5px solid var(--yl);
  border-radius:20px;padding:24px;text-align:center;
  box-shadow:0 0 22px rgba(255,0,119,.28);animation:zin .3s ease}
@keyframes zin{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.mdb h3{font-size:15px;font-weight:900;color:var(--pk);text-shadow:var(--gp);
  margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.mdb p{font-size:13px;color:#ccc;line-height:1.6}
.mbtn{width:100%;padding:13px;border-radius:50px;border:none;
  background:linear-gradient(90deg,var(--bl),var(--pk));color:#fff;
  font-weight:900;font-size:13px;cursor:pointer;margin-top:16px;
  font-family:'Outfit',sans-serif;text-transform:uppercase;letter-spacing:1px;
  box-shadow:0 0 12px rgba(255,0,119,.3)}

/* ── NAV BAR ── */
.nav{position:fixed;bottom:0;left:0;width:100%;height:68px;
  background:rgba(3,0,20,.99);display:flex;justify-content:space-around;
  align-items:center;border-top:1.5px solid rgba(0,51,255,.45);
  backdrop-filter:blur(20px);z-index:1000;padding-bottom:4px;
  box-shadow:0 -3px 18px rgba(0,51,255,.18)}
.ni{color:rgba(255,255,255,.28);text-decoration:none;text-align:center;
  font-size:9px;font-weight:900;flex:1;transition:.3s;
  letter-spacing:.5px;text-transform:uppercase}
.ni.ac{color:var(--pk);text-shadow:var(--gp)}
.ni i{font-size:18px;display:block;margin-bottom:3px}
</style>
</head>
<body>

<div id="ptjs"></div>
<div id="na">—</div>

<audio id="au-drop" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c36394595e.mp3" preload="auto"></audio>
<audio id="au-win"  src="https://cdn.pixabay.com/audio/2021/08/04/audio_062564a02d.mp3" preload="auto"></audio>
<audio id="au-lose" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b417f73c.mp3" preload="auto"></audio>

<!-- ── HEADER (only logo) ── -->
<div class="hdr">
  <div class="logo">NEON <b>PLINKO</b></div>
  <div style="font-size:9px;color:rgba(255,255,255,.3);font-weight:900;letter-spacing:1px;text-transform:uppercase">
    <i class="fas fa-circle" style="color:var(--gn);font-size:7px;margin-right:4px;text-shadow:0 0 6px var(--gn)"></i>LIVE
  </div>
</div>
<div id="pb"><i class="fas fa-skull" style="margin-right:6px"></i>⚠ PANIC MODE AKTIF — ODDS DIKUNCI</div>

<!-- ── MAIN ── -->
<div class="wrap">

  <!-- CANVAS — board + slots inside -->
  <div class="cbox"><canvas id="cv"></canvas></div>

  <!-- SCORE PANEL directly below canvas -->
  <div class="score-panel">
    <div class="sp-box">
      <span class="sp-lbl"><i class="fas fa-history" style="margin-right:2px"></i>LAST WIN</span>
      <span class="sp-val gn" id="sp-win">—</span>
    </div>
    <div class="sp-center">
      <span class="sp-lbl"><i class="fas fa-coins" style="margin-right:3px;color:var(--yl)"></i>SALDO AKTIF</span>
      <span class="sp-saldo-big" id="sp-sal">IDR 0</span>
    </div>
    <div class="sp-box">
      <span class="sp-lbl"><i class="fas fa-dice" style="margin-right:2px"></i>BET</span>
      <span class="sp-val pk" id="sp-bet">Rp 0</span>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="ctrl">

    <!-- 4 MODE BUTTONS -->
    <div class="mode-row">
      <button class="mb m-manual" id="mb0" onclick="setMode(0)">
        <i class="fas fa-hand-pointer"></i>MANUAL
      </button>
      <button class="mb" id="mb1" onclick="setMode(1)">
        <i class="fas fa-forward-fast"></i>M-TURBO
      </button>
      <button class="mb" id="mb2" onclick="setMode(2)">
        <i class="fas fa-play"></i>AUTO
      </button>
      <button class="mb" id="mb3" onclick="setMode(3)">
        <i class="fas fa-bolt"></i>A-TURBO
      </button>

    <!-- BET −/+ -->
    <div class="brow">
      <button class="bstep" id="btn-m" onclick="stepBet(-1)">−</button>

    </div>

    <!-- RISK -->
    <div class="rrow">
      <button class="rb ar" id="rl" onclick="setRisk('low')">🟢 LOW</button>
      <button class="rb"    id="rm" onclick="setRisk('medium')">🟡 MEDIUM</button>
      <button class="rb"    id="rh" onclick="setRisk('high')">🔴 HIGH</button>
    </div>

    <!-- ACTION BUTTON -->
    <button class="dbtn" id="db" onclick="handleAction()">
      <i class="fas fa-circle-dot"></i>&nbsp;&nbsp;DROP BALL
    </button>

  </div>

  <!-- HISTORY — 3 rows visible -->
  <div class="hsec">
    <div class="hlbl"><i class="fas fa-clock-rotate-left"></i> Riwayat Permainan</div>
    <div class="hbox"><div class="hscr">
      <table class="ht">
        <thead><tr><th>BET</th><th>MULT</th><th>HASIL</th><th>JAM</th></tr></thead>
        <tbody id="hb"><tr class="re"><td colspan="4">Belum ada permainan</td></tr></tbody>
      </table>
    </div></div>
  </div>

</div><!-- /wrap -->

<!-- MAXWIN -->
<div id="mwo">
  <div class="mwi">🏆</div>
  <div class="mwt">MAXWIN TERCAPAI!</div>
  <div class="mws" id="mws">Selamat!</div>
  <button class="mwb mwb1" onclick="location.href='withdraw.html'">
    <i class="fas fa-money-bill-transfer"></i> WITHDRAW SEKARANG
  </button>
  <button class="mwb mwb2" onclick="document.getElementById('mwo').classList.remove('on')">
    LANJUT MAIN
  </button>
</div>

<!-- MODAL -->
<div id="mdo">
  <div class="mdb">
    <h3 id="mt2">INFO</h3><p id="mm"></p>
    <button class="mbtn" onclick="closeMd()">MENGERTI</button>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <a href="game.html"     class="ni ac"><i class="fas fa-gamepad"></i>PLAY</a>
  <a href="deposit.html"  class="ni"><i class="fas fa-wallet"></i>DEPO</a>

</div>

<!-- ═══════════════════════ ENGINE ═══════════════════════ -->
<script>
/* ────────────────────────────────────────────────────────
   GLOBAL STATE
──────────────────────────────────────────────────────── */
var U=null, PROF={}, SAL=0, SPNL=0, HIST=[];
var RISK='low';

/*  MODE: 0=Manual, 1=ManualTurbo, 2=Auto, 3=AutoTurbo  */
var MODE=0;
var AUTO_ON=false;
var AUTO_TID=null;

/* Interval between auto-spawns (ms) */
var AUTO_INT=[0, 0, 700, 200]; /* index = mode */

/* BET STEPS */
var BSTEPS=[400,600,800,1000,1200,1600,1800,2000,4000,6000,8000,
            10000,12000,16000,18000,20000,25000,30000];
var BIDX=3; /* default 1000 */

/* Turbo manual: max balls in flight before next tap spawns */
var TURBO_M_MAX=6;

/* ────────────────────────────────────────────────────────
   MULTIPLIERS
──────────────────────────────────────────────────────── */
var MUL={
  low:   [8.5,3,1.5,1.2,1.1,0.7,0.5,0.7,1.1,1.2,1.5,3,8.5],
  medium:[25, 8,3,  1.8,1.2,0.7,0.4,0.7,1.2,1.8,3,  8, 25 ],
  high:  [88,24,9,  4,  2,  0.6,0.2,0.6,2,  4,  9, 24, 88 ]
};

/* ────────────────────────────────────────────────────────
   CANVAS & PHYSICS
──────────────────────────────────────────────────────── */
var cv=document.getElementById('cv');
var cx=cv.getContext('2d');

var ROWS=12;
var GR=0.34, BOUNCE=0.52, FRIC=0.989, SUBSTEPS=5;
var PR,BR,RG,SLOT_H,SLOT_Y,PAD_TOP;
var PEGS=[],SLOTS_D=[],BALLS=[];
var pegPulse=[];
var RAF=null;

/* ────────────────────────────────────────────────────────
   HELPERS
──────────────────────────────────────────────────────── */
function snd(id){var a=document.getElementById('au-'+id);if(a){a.currentTime=0;a.play().catch(function(){});}}
function rp(n){return'Rp '+(Math.abs(n)||0).toLocaleString('id-ID')}
function curBet(){return BSTEPS[BIDX]||1000}

function updBetUI(){
  var v=curBet();
  document.getElementById('bet-disp').textContent=rp(v);
  var e=document.getElementById('sp-bet');if(e)e.textContent=rp(v);
}
function updSaldo(){
  var s='IDR '+SAL.toLocaleString('id-ID');
  var e=document.getElementById('sp-sal');if(e)e.textContent=s;
}

/* ────────────────────────────────────────────────────────
   MODE  0=Manual  1=ManualTurbo  2=Auto  3=AutoTurbo
──────────────────────────────────────────────────────── */
var MB_ACTIVE=['m-manual','m-turbo-m','m-auto','m-turbo-a'];

function setMode(m){
  if(AUTO_ON) stopAuto();
  MODE=m;
  for(var i=0;i<4;i++){
    var el=document.getElementById('mb'+i);
    if(el) el.className='mb'+(i===m?' '+MB_ACTIVE[m]:'');
  }
  /* Reset drop button label */
  var btn=document.getElementById('db');
  if(m===0||m===1){
    btn.className='dbtn';
    btn.innerHTML='<i class="fas fa-circle-dot"></i>&nbsp;&nbsp;DROP BALL';
  } else {
    btn.className='dbtn';
    btn.innerHTML='<i class="fas fa-play"></i>&nbsp;&nbsp;MULAI '+(m===2?'AUTO':'TURBO');
  }
}

function startAuto(){
  if(!U){showMd('LOGIN','Silakan login.');return;}
  AUTO_ON=true;
  lockBetRisk(true);
  var btn=document.getElementById('db');
  btn.className='dbtn state-stop'+(MODE===3?' state-turbo':'');
  btn.innerHTML='<i class="fas fa-stop"></i>&nbsp;&nbsp;STOP '+(MODE===2?'AUTO':'TURBO');

  var interval=AUTO_INT[MODE]; /* 700ms or 200ms */
  function tick(){
    if(!AUTO_ON)return;
    if(SAL<curBet()){stopAuto();alert2('Saldo tidak cukup!','');return;}
    spawnBall();
    AUTO_TID=setTimeout(tick,interval);
  }
  tick();
}
function stopAuto(){
  AUTO_ON=false;
  clearTimeout(AUTO_TID);AUTO_TID=null;
  lockBetRisk(false);
  var btn=document.getElementById('db');
  btn.className=MODE===3?'dbtn state-turbo':'dbtn';
  btn.innerHTML='<i class="fas fa-play"></i>&nbsp;&nbsp;MULAI '+(MODE===2?'AUTO':'TURBO');
}
function lockBetRisk(lock){
  document.getElementById('btn-m').disabled=lock;
  document.getElementById('btn-p').disabled=lock;
}

/* ────────────────────────────────────────────────────────
   ACTION BUTTON HANDLER
──────────────────────────────────────────────────────── */
function handleAction(){
  if(!U){showMd('LOGIN','Silakan login.');return;}
  if(MODE===0){
    /* Manual: each tap = 1 ball, no wait needed */
    if(SAL<curBet()){alert2('Saldo tidak cukup!','');return;}
    spawnBall();
  } else if(MODE===1){
    /* ManualTurbo: each tap = 1 ball, up to TURBO_M_MAX at once */
    if(BALLS.length>=TURBO_M_MAX){alert2('Max '+TURBO_M_MAX+' bola sekaligus!','warn');return;}
    if(SAL<curBet()){alert2('Saldo tidak cukup!','');return;}
    spawnBall();
  } else {
    /* Auto / AutoTurbo: toggle */
    if(AUTO_ON) stopAuto();
    else startAuto();
  }
}

/* ────────────────────────────────────────────────────────
   BUILD WORLD
──────────────────────────────────────────────────────── */
function buildWorld(){
  var W=cv.width,H=cv.height;
  SLOT_H=Math.max(25,H*0.087);
  SLOT_Y=H-SLOT_H;
  PAD_TOP=H*0.048;
  var pegH=SLOT_Y-PAD_TOP-H*0.015;
  RG=pegH/(ROWS-1);
  PR=Math.max(3.5,W*0.0132);
  BR=Math.max(5,W*0.0168);

  PEGS=[];
  for(var r=0;r<ROWS;r++){
    var cols=r+2,span=(cols-1)*RG,x0=(W-span)/2,y=PAD_TOP+r*RG;
    for(var c=0;c<cols;c++) PEGS.push({x:x0+c*RG,y:y});
  }
  pegPulse=new Array(PEGS.length).fill(0);

  var mults=MUL[RISK],sw=W/mults.length;
  SLOTS_D=[];
  for(var i=0;i<mults.length;i++)
    SLOTS_D.push({x:i*sw,y:SLOT_Y,w:sw,h:SLOT_H,m:mults[i],glow:0});
}

/* ────────────────────────────────────────────────────────
   SLOT COLOR — neon theme
──────────────────────────────────────────────────────── */
function slotPal(m){
  /* HIGH: pink neon | MED: blue neon | LOW≥1: yellow neon | <1: green neon */
  if(m>=20) return{a:'rgba(255,0,100',  b:'#ff0077',c:'#ff55aa'};
  if(m>=5)  return{a:'rgba(0,51,255',   b:'#0055ff',c:'#66aaff'};
  if(m>=1)  return{a:'rgba(251,255,0',  b:'#fbff00',c:'#ffff88'};
            return{a:'rgba(0,255,136',  b:'#00ff88',c:'#66ffbb'};
}

/* ────────────────────────────────────────────────────────
   DRAW PEG
──────────────────────────────────────────────────────── */
function drawPeg(x,y,gv){
  if(gv>0.04){
    var og=cx.createRadialGradient(x,y,PR*.45,x,y,PR+gv*7);
    og.addColorStop(0,'rgba(50,120,255,0)');
    og.addColorStop(.5,'rgba(40,110,255,'+(gv*.25)+')');
    og.addColorStop(1,'rgba(0,60,255,0)');
    cx.beginPath();cx.arc(x,y,PR+gv*7,0,Math.PI*2);
    cx.fillStyle=og;cx.fill();
  }
  cx.beginPath();cx.arc(x,y,PR,0,Math.PI*2);
  var g=cx.createRadialGradient(x-PR*.3,x-PR*.3,0,x,y,PR*1.4);
  /* ---- use y not x for second radial arg (typo fix) ---- */
  g=cx.createRadialGradient(x-PR*.3,y-PR*.3,0,x,y,PR*1.4);
  g.addColorStop(0,'rgba(210,235,255,1)');
  g.addColorStop(.3,'rgba(70,150,255,.95)');
  g.addColorStop(.68,'rgba(15,70,220,.85)');
  g.addColorStop(1,'rgba(0,15,160,.38)');
  cx.fillStyle=g;
  cx.shadowColor='rgba(50,130,255,'+(0.42+gv*.6)+')';
  cx.shadowBlur=PR*(1.7+gv*3.5);
  cx.fill();cx.shadowBlur=0;
  /* specular */
  cx.beginPath();cx.arc(x-PR*.27,y-PR*.28,PR*.19,0,Math.PI*2);
  cx.fillStyle='rgba(255,255,255,'+(0.48+gv*.35)+')';cx.fill();
}

/* ────────────────────────────────────────────────────────
   FULL REDRAW  (background + pegs + slots)
──────────────────────────────────────────────────────── */
function redrawFull(){
  var W=cv.width,H=cv.height;
  if(!W||!H)return;

  /* BG */
  var bg=cx.createRadialGradient(W*.5,H*.12,0,W*.5,H*.5,H*.92);
  bg.addColorStop(0,'#080032');bg.addColorStop(.38,'#04001a');
  bg.addColorStop(.76,'#020010');bg.addColorStop(1,'#010008');
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);

  /* nebula */
  var nb=[{x:W*.2,y:H*.18,r:W*.4,c:'rgba(0,30,200,.07)'},
          {x:W*.8,y:H*.38,r:W*.34,c:'rgba(140,0,200,.055)'},
          {x:W*.5,y:H*.7,r:W*.44,c:'rgba(0,80,220,.045)'},
          {x:W*.05,y:H*.62,r:W*.3,c:'rgba(255,0,100,.028)'}];
  nb.forEach(function(n){
    var ng=cx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    ng.addColorStop(0,n.c);ng.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=ng;cx.fillRect(0,0,W,H);
  });

  /* hex grid */
  cx.save();cx.strokeStyle='rgba(0,40,200,0.035)';cx.lineWidth=0.65;
  var gs=W/16;
  for(var gx2=-gs;gx2<W+gs;gx2+=gs){
    cx.beginPath();cx.moveTo(gx2,0);cx.lineTo(gx2+gs*.5,H);cx.stroke();
    cx.beginPath();cx.moveTo(gx2,0);cx.lineTo(gx2-gs*.5,H);cx.stroke();
  }
  cx.restore();

  /* connectors */
  cx.save();
  var ri=0,idx=0;
  while(idx<PEGS.length){
    var cols2=ri+2;
    for(var ci=0;ci<cols2-1;ci++){
      var pa=PEGS[idx+ci],pb=PEGS[idx+ci+1];
      if(pa&&pb){
        var lg=cx.createLinearGradient(pa.x,pa.y,pb.x,pb.y);
        lg.addColorStop(0,'rgba(0,65,255,0.1)');
        lg.addColorStop(.5,'rgba(0,100,255,0.16)');
        lg.addColorStop(1,'rgba(0,65,255,0.1)');
        cx.strokeStyle=lg;cx.lineWidth=0.7;
        cx.beginPath();cx.moveTo(pa.x,pa.y);cx.lineTo(pb.x,pb.y);cx.stroke();
      }
    }
    if(ri<ROWS-1){
      var nxt=idx+cols2;
      for(var ci2=0;ci2<cols2;ci2++){
        var pc=PEGS[idx+ci2],pd=PEGS[nxt+ci2],pe=PEGS[nxt+ci2+1];
        cx.strokeStyle='rgba(0,50,200,0.062)';cx.lineWidth=0.42;
        if(pc&&pd){cx.beginPath();cx.moveTo(pc.x,pc.y);cx.lineTo(pd.x,pd.y);cx.stroke();}
        if(pc&&pe){cx.beginPath();cx.moveTo(pc.x,pc.y);cx.lineTo(pe.x,pe.y);cx.stroke();}
      }
    }
    idx+=cols2;ri++;
  }
  cx.restore();

  /* pegs */
  for(var pi=0;pi<PEGS.length;pi++) drawPeg(PEGS[pi].x,PEGS[pi].y,pegPulse[pi]||0);

  /* slot separator */
  if(SLOTS_D.length){
    var sx=cx.createLinearGradient(0,SLOT_Y,W,SLOT_Y);
    sx.addColorStop(0,'rgba(255,0,119,0)');sx.addColorStop(.18,'rgba(255,0,119,.3)');
    sx.addColorStop(.82,'rgba(0,51,255,.3)');sx.addColorStop(1,'rgba(0,51,255,0)');
    cx.strokeStyle=sx;cx.lineWidth=1;
    cx.beginPath();cx.moveTo(0,SLOT_Y);cx.lineTo(W,SLOT_Y);cx.stroke();
  }

  /* SLOTS */
  var fsz=Math.max(7,Math.min(10,W*.022));
  cx.font='900 '+fsz+'px Outfit,sans-serif';
  cx.textAlign='center';cx.textBaseline='middle';
  for(var si=0;si<SLOTS_D.length;si++){
    var s=SLOTS_D[si],pal=slotPal(s.m),gl=s.glow||0;
    var al=0.16+gl*.5;
    /* gradient fill */
    var sg=cx.createLinearGradient(s.x,s.y,s.x,s.y+s.h);
    sg.addColorStop(0,pal.a+','+(al+.07)+')');
    sg.addColorStop(1,pal.a+','+(al*.42)+')');
    cx.fillStyle=sg;cx.fillRect(s.x+1,s.y,s.w-2,s.h);
    /* border */
    cx.strokeStyle=pal.a+','+(0.26+gl*.74)+')';
    cx.lineWidth=gl>0?1.5:.65;cx.strokeRect(s.x+1,s.y,s.w-2,s.h);
    if(gl>0){
      cx.shadowColor=pal.b;cx.shadowBlur=10+gl*24;
      cx.strokeRect(s.x+1,s.y,s.w-2,s.h);cx.shadowBlur=0;
    }
    /* label */
    cx.fillStyle=gl>0?'#fff':pal.c;
    cx.shadowColor=gl>0?pal.b:'transparent';cx.shadowBlur=gl>0?8:0;
    cx.fillText(s.m+'x',s.x+s.w/2,s.y+s.h*.52);cx.shadowBlur=0;
  }
}

/* ────────────────────────────────────────────────────────
   DRAW BALL
──────────────────────────────────────────────────────── */
function drawBall(b){
  /* trail */
  for(var ti=0;ti<b.tr.length;ti++){
    var t=b.tr[ti],p=ti/b.tr.length;
    var a=p*p*0.52,r2=BR*(0.25+p*0.5);
    var hue=200+ti*7;
    cx.beginPath();cx.arc(t.x,t.y,r2,0,Math.PI*2);
    cx.fillStyle='hsla('+hue+',100%,65%,'+a+')';
    cx.shadowColor='hsla('+hue+',100%,65%,.4)';
    cx.shadowBlur=r2*2.2;cx.fill();cx.shadowBlur=0;
  }
  /* glow aura */
  var ga=cx.createRadialGradient(b.x,b.y,BR*.5,b.x,b.y,BR*2.8);
  ga.addColorStop(0,'rgba(255,190,0,.22)');
  ga.addColorStop(.5,'rgba(255,70,0,.08)');
  ga.addColorStop(1,'rgba(255,0,80,0)');
  cx.beginPath();cx.arc(b.x,b.y,BR*2.8,0,Math.PI*2);cx.fillStyle=ga;cx.fill();
  /* body */
  var gb=cx.createRadialGradient(b.x-BR*.28,b.y-BR*.3,0,b.x,b.y,BR*1.18);
  gb.addColorStop(0,'rgba(255,255,200,1)');
  gb.addColorStop(.28,'rgba(255,208,22,.98)');
  gb.addColorStop(.62,'rgba(255,120,0,.9)');
  gb.addColorStop(1,'rgba(190,30,0,.62)');
  cx.beginPath();cx.arc(b.x,b.y,BR,0,Math.PI*2);cx.fillStyle=gb;
  cx.shadowColor='rgba(255,172,0,.92)';cx.shadowBlur=BR*3.4;cx.fill();cx.shadowBlur=0;
  /* specular */
  cx.beginPath();cx.arc(b.x-BR*.27,b.y-BR*.28,BR*.18,0,Math.PI*2);
  cx.fillStyle='rgba(255,255,255,.82)';cx.fill();
}

/* ────────────────────────────────────────────────────────
   PHYSICS — 5 sub-steps per frame
──────────────────────────────────────────────────────── */
function physStep(b){
  var W=cv.width,dt=1/SUBSTEPS;
  for(var s=0;s<SUBSTEPS;s++){
    b.vy+=GR*dt;
    b.vx*=Math.pow(FRIC,dt);
    var sp=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    if(sp>22){b.vx*=22/sp;b.vy*=22/sp;}
    b.x+=b.vx*dt;b.y+=b.vy*dt;
    /* walls */
    if(b.x-BR<0){b.x=BR;b.vx=Math.abs(b.vx)*BOUNCE;}
    if(b.x+BR>W){b.x=W-BR;b.vx=-Math.abs(b.vx)*BOUNCE;}
    /* peg collisions */
    for(var pi=0;pi<PEGS.length;pi++){
      var p=PEGS[pi],dx=b.x-p.x,dy=b.y-p.y;
      var d=Math.sqrt(dx*dx+dy*dy),mn=BR+PR;
      if(d<mn&&d>0.001){
        var nx=dx/d,ny=dy/d;
        b.x+=nx*(mn-d+0.5);b.y+=ny*(mn-d+0.5);
        var dot=b.vx*nx+b.vy*ny;
        if(dot<0){
          b.vx=(b.vx-2*dot*nx)*BOUNCE;
          b.vy=(b.vy-2*dot*ny)*BOUNCE;
          b.vx+=(Math.random()-.5)*.7;
          pegPulse[pi]=1.0;
        }
      }
    }
    if(SLOTS_D.length&&b.y+BR>=SLOT_Y) return true;
  }
  return false;
}

/* ────────────────────────────────────────────────────────
   MAIN RENDER LOOP
──────────────────────────────────────────────────────── */
function mainLoop(){
  /* decay glow */
  for(var pi=0;pi<pegPulse.length;pi++) if(pegPulse[pi]>0) pegPulse[pi]=Math.max(0,pegPulse[pi]-.042);
  for(var si=0;si<SLOTS_D.length;si++) if(SLOTS_D[si].glow>0) SLOTS_D[si].glow=Math.max(0,SLOTS_D[si].glow-.028);

  /* idle wave when no balls */
  if(BALLS.length===0){
    var t=Date.now()/1280;
    for(var pi2=0;pi2<PEGS.length;pi2++){
      var w=Math.sin(t+PEGS[pi2].x*.017+PEGS[pi2].y*.011);
      pegPulse[pi2]=Math.max(pegPulse[pi2],Math.max(0,w*.14));
    }
    for(var si2=0;si2<SLOTS_D.length;si2++)
      SLOTS_D[si2].glow=Math.max(SLOTS_D[si2].glow,Math.max(0,Math.sin(t*.6+si2*.46)*.09));
  }

  /* physics all balls */
  var landed=[];
  for(var bi=0;bi<BALLS.length;bi++){
    var b=BALLS[bi];
    var hit=physStep(b);
    b.tr.push({x:b.x,y:b.y});
    if(b.tr.length>15) b.tr.shift();
    if(hit) landed.push(bi);
  }

  /* draw */
  redrawFull();
  for(var bi2=0;bi2<BALLS.length;bi2++) drawBall(BALLS[bi2]);

  /* resolve landed (reverse splice) */
  for(var li=landed.length-1;li>=0;li--){
    var bidx=landed[li],bl=BALLS[bidx];
    BALLS.splice(bidx,1);
    /* slot detection */
    var lIdx=-1;
    for(var ss=0;ss<SLOTS_D.length;ss++){
      if(bl.x>=SLOTS_D[ss].x&&bl.x<SLOTS_D[ss].x+SLOTS_D[ss].w){lIdx=ss;break;}
    }
    if(lIdx===-1) lIdx=Math.floor(SLOTS_D.length/2);
    SLOTS_D[lIdx].glow=1.0;

    var am=SLOTS_D[lIdx].m,bet=bl.bet;
    var pay=Math.floor(bet*am),prof=pay-bet;
    SAL+=pay;SPNL+=prof;updSaldo();setLastWin(prof);

    if(prof>0){snd('win');alert2('WIN! +'+rp(prof)+' ('+am+'x)','ok');winPop('+'+rp(prof));}
    else       {snd('lose');alert2(rp(prof)+' ('+am+'x)','');}
    addHist(bet,am,pay,prof);

    /* DB save */
    try{if(typeof _db!=='undefined'){
      _db.from('profiles').update({saldo:SAL,updated_at:new Date().toISOString()})
         .eq('username',U).then(function(){}).catch(function(){});
    }}catch(e){}

    /* maxwin */
    var mwl=PROF.maxwin_limit||0;
    if(mwl>0&&SPNL>=mwl){
      snd('win');stopAuto();
      document.getElementById('mws').textContent='Kemenangan: '+rp(SPNL)+'\nLimit: '+rp(mwl);
      document.getElementById('mwo').classList.add('on');
    }
  }

  RAF=requestAnimationFrame(mainLoop);
}

/* ────────────────────────────────────────────────────────
   SPAWN BALL
──────────────────────────────────────────────────────── */
function spawnBall(){
  var bet=curBet();
  if(SAL<bet){alert2('Saldo tidak cukup!','');if(AUTO_ON)stopAuto();return;}
  SAL-=bet;updSaldo();snd('drop');

  var out=computeOut();
  var tgtX=SLOTS_D[out.slot]?SLOTS_D[out.slot].x+SLOTS_D[out.slot].w/2:cv.width/2;
  var spX=cv.width/2+(Math.random()-.5)*PR*1.6;
  var bias=(tgtX-spX)*0.0085;

  BALLS.push({
    x:spX,y:BR+3,
    vx:bias+(Math.random()-.5)*.42,
    vy:1.5+Math.random()*.5,
    tr:[],bet:bet,target:out.slot
  });
}

/* ────────────────────────────────────────────────────────
   OUTCOME (winrate from admin, maxwin check)
──────────────────────────────────────────────────────── */
function computeOut(){
  var mults=MUL[RISK];
  var wr=PROF.panic_mode?Math.min(PROF.winrate||30,5):(PROF.winrate||30);
  var mwl=PROF.maxwin_limit||0;

  if(mwl>0&&SPNL>=mwl){
    var la=[];for(var i=0;i<mults.length;i++) if(mults[i]<1) la.push(i);
    var li=la.length?la[Math.floor(Math.random()*la.length)]:6;
    return{slot:li,mult:mults[li],win:false};
  }
  if(Math.random()*100<wr){
    var wa=[];for(var j=0;j<mults.length;j++) if(mults[j]>=1) wa.push(j);
    var wi=wa.length?wa[Math.floor(Math.random()*wa.length)]:6;
    return{slot:wi,mult:mults[wi],win:true};
  } else {
    var la2=[];for(var k=0;k<mults.length;k++) if(mults[k]<1) la2.push(k);
    var li2=la2.length?la2[Math.floor(Math.random()*la2.length)]:6;
    return{slot:li2,mult:mults[li2],win:false};
  }
}

/* ────────────────────────────────────────────────────────
   WIN POP
──────────────────────────────────────────────────────── */
function winPop(txt){
  var el=document.createElement('div');
  el.className='wpop';el.textContent=txt;
  el.style.left=(10+Math.random()*60)+'%';el.style.top='42%';
  document.body.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},1500);
}

/* ────────────────────────────────────────────────────────
   HISTORY — max 3 rows visible, store 40
──────────────────────────────────────────────────────── */
function addHist(bet,mult,pay,prof){
  var now=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  HIST.unshift({bet:bet,mult:mult,pay:pay,prof:prof,now:now});
  if(HIST.length>40) HIST=HIST.slice(0,40);
  renderHist();
}
function renderHist(){
  var b=document.getElementById('hb');
  if(!HIST.length){b.innerHTML='<tr class="re"><td colspan="4">Belum ada permainan</td></tr>';return;}
  var h='';
  HIST.forEach(function(r){
    var cls=r.prof>0?'rw':'rl',col=r.prof>0?'var(--gn)':'var(--pk)',sgn=r.prof>0?'+':'';
    h+='<tr class="'+cls+'">'
      +'<td>'+rp(r.bet)+'</td>'
      +'<td style="font-weight:900">'+r.mult+'x</td>'
      +'<td style="color:'+col+';font-weight:900">'+sgn+rp(r.prof)+'</td>'
      +'<td style="font-size:9px;opacity:.38">'+r.now+'</td>'
      +'</tr>';
  });
  b.innerHTML=h;
}

/* ────────────────────────────────────────────────────────
   LOAD PROFILE
──────────────────────────────────────────────────────── */
function loadProfile(){
  var user=(typeof getUsername==='function')?getUsername():localStorage.getItem('neon_user');
  if(!user){showMd('LOGIN','Sesi tidak ditemukan. Harap login kembali.');return;}
  U=user;
  if(typeof _db==='undefined'){alert2('Mode offline','warn');return;}
  _db.from('profiles').select('*').eq('username',U).single()
    .then(function(res){
      if(res.error||!res.data){showMd('ERROR','Gagal memuat profil.');return;}
      PROF=res.data;SAL=Number(PROF.saldo)||0;
      updSaldo();updBetUI();
      if(PROF.panic_mode) document.getElementById('pb').style.display='block';
      _db.from('profiles').update({
        initial_balance_session:SAL,session_start:new Date().toISOString()
      }).eq('username',U).then(function(){}).catch(function(){});
      /* realtime */
      _db.channel('gm-'+U)
        .on('postgres_changes',{event:'UPDATE',schema:'public',table:'profiles',
          filter:'username=eq.'+U},function(pl){
          if(!pl.new)return;
          SAL=Number(pl.new.saldo)||0;
          PROF=Object.assign({},PROF,pl.new);
          updSaldo();
          document.getElementById('pb').style.display=pl.new.panic_mode?'block':'none';
        }).subscribe();
    })
    .catch(function(e){showMd('ERROR','Gagal: '+(e.message||e));});
}

/* ────────────────────────────────────────────────────────
   RESIZE + PARTICLES + INIT
──────────────────────────────────────────────────────── */
function resize(){
  var box=cv.parentElement;
  var W=box&&box.clientWidth>10?box.clientWidth:window.innerWidth-20;
  var H=Math.round(W*.98);
  if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
}

function initPtjs(){
  if(typeof particlesJS==='undefined')return;
  particlesJS('ptjs',{
    particles:{
      number:{value:40},
      color:{value:['#0033ff','#ff0077','#fbff00','#00ff88']},
      shape:{type:'circle'},
      opacity:{value:.35,random:true,anim:{enable:true,speed:.38,opacity_min:.05}},
      size:{value:1.65,random:true},
      line_linked:{enable:true,distance:90,color:'#0033ff',opacity:.11,width:.5},
      move:{enable:true,speed:1.05,random:true,out_mode:'out'}
    },
    interactivity:{events:{onhover:{enable:false},onclick:{enable:false}}}
  });
}

function init(){
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      resize();buildWorld();
      updBetUI();updSaldo();
      setMode(0);
      initPtjs();loadProfile();
      if(RAF) cancelAnimationFrame(RAF);
      RAF=requestAnimationFrame(mainLoop);
    });
  });
  window.addEventListener('resize',function(){resize();buildWorld();});
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();
</script>
