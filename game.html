<script src="global.js"></script>
<script>
/**
 * ════════════════════════════════════════════════════════════════
 * PLINKO GAME v6.2 FINAL FIX
 * 
 * FIXES v6.2:
 * [1] ✅ PLAY BALL button - bisa ditekan berkali-kali (MANUAL MODE)
 * [2] ✅ Ball landing - AKURAT ke slot yang sesuai dengan multiplier
 * [3] ✅ Saldo - TERHUBUNG PROPER dengan global.js & Code.gs
 * [4] ✅ Admin control - Code.gs mengatur winrate & kemenangan
 * [5] ✅ Debug logging - untuk troubleshoot
 * ════════════════════════════════════════════════════════════════
 */

const CONFIG = {
    ROWS: 9,
    BALL_R: 6,
    PEG_R: 3.5,
    LAND_Y_RATIO: 0.90,  // ADJUSTED untuk accuracy
    
    BETS: [400, 600, 800, 1000, 1200, 1400, 1600, 1800, 2000, 4000, 6000, 8000, 10000],
    DEFAULT_BET_IDX: 0,
    
    MULTS: [10, 3, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 3, 10],
    
    PHYSICS: {
        normal: { grav: 0.25, bounce: 0.45, friction: 0.99 },
        turbo:  { grav: 0.50, bounce: 0.42, friction: 0.98 }
    },
    
    API_TIMEOUT: 10000,
    RETRY_COUNT: 3,
    SYNC_INTERVAL: 10000
};

var STATE = {
    canvas: null,
    ctx: null,
    BW: 0,
    BH: 0,
    pegs: [],
    balls: [],
    floaters: [],
    
    speedMode: 'normal',
    betIdx: CONFIG.DEFAULT_BET_IDX,
    
    isPlaying: false,  // FIX #1: Control ini untuk manage button state
    
    slotStartX: 0,
    slotItemW: 0
};

// ════════════════════════════════════════════════════════════════
// DEBUG LOGGING
// ════════════════════════════════════════════════════════════════

var debugLogs = [];
const MAX_DEBUG_LOGS = 10;

function log_debug(msg, type) {
    var timestamp = new Date().toLocaleTimeString();
    var log = '[' + timestamp + '] ' + msg;
    console.log(log);
    
    debugLogs.push(log);
    if (debugLogs.length > MAX_DEBUG_LOGS) {
        debugLogs.shift();
    }
    
    var debugBox = document.getElementById('debug-log');
    if (debugBox) {
        debugBox.innerHTML = debugLogs.join('<br>');
    }
}

// ════════════════════════════════════════════════════════════════
// CANVAS SETUP
// ════════════════════════════════════════════════════════════════

function setupCanvas() {
    STATE.canvas = document.getElementById('plinko-canvas');
    STATE.ctx = STATE.canvas.getContext('2d');
    var wrap = document.getElementById('board-wrapper');
    STATE.BW = wrap.offsetWidth;
    STATE.BH = wrap.offsetHeight;

    var dpr = window.devicePixelRatio || 1;
    STATE.canvas.width = STATE.BW * dpr;
    STATE.canvas.height = STATE.BH * dpr;
    STATE.canvas.style.width = STATE.BW + 'px';
    STATE.canvas.style.height = STATE.BH + 'px';
    STATE.ctx.scale(dpr, dpr);

    STATE.pegs = [];
    var spY = (STATE.BH - 40) / CONFIG.ROWS;
    var spX = STATE.BW / (CONFIG.ROWS + 2.5);
    var lastRowPegs = [];

    for (var r = 0; r < CONFIG.ROWS; r++) {
        var cnt = r + 3;
        var startX = (STATE.BW - (cnt - 1) * spX) / 2;
        for (var c = 0; c < cnt; c++) {
            var px = startX + c * spX;
            var py = 30 + r * spY;
            STATE.pegs.push({ x: px, y: py, glow: 0 });
            if (r === CONFIG.ROWS - 1) lastRowPegs.push(px);
        }
    }

    STATE.slotStartX = lastRowPegs[0];
    var slotEndX = lastRowPegs[lastRowPegs.length - 1];
    var totalW = slotEndX - STATE.slotStartX;
    STATE.slotItemW = totalW / CONFIG.MULTS.length;

    var slotRow = document.getElementById('slot-row');
    slotRow.innerHTML = '';
    slotRow.style.left = STATE.slotStartX + 'px';
    slotRow.style.width = totalW + 'px';

    CONFIG.MULTS.forEach(function(m, i) {
        var s = document.createElement('div');
        s.id = 'slot-' + i;
        s.className = 'slot ' + (m >= 3 ? 's-high' : m >= 1 ? 's-mid' : 's-low');
        s.style.width = (100 / CONFIG.MULTS.length) + '%';
        s.textContent = m + 'x';
        slotRow.appendChild(s);
    });
    
    log_debug('Canvas: ' + STATE.BW + 'x' + STATE.BH + ', slots: ' + STATE.slotItemW.toFixed(0) + 'px width');
}

function slotCenterX(i) {
    return STATE.slotStartX + (i + 0.5) * STATE.slotItemW;
}

// ════════════════════════════════════════════════════════════════
// FIX #1: MANUAL MODE - Play Ball bisa ditekan berkali-kali
// ════════════════════════════════════════════════════════════════

async function spawnBall() {
    // Check jika masih ada ball sebelumnya yang belum selesai
    var activeBalls = STATE.balls.filter(b => !b.isDone);
    if (activeBalls.length > 0) {
        showInfo('⏳ Tunggu ball sebelumnya selesai...');
        log_debug('Cannot play: ' + activeBalls.length + ' ball(s) still active');
        return;
    }

    var bet = CONFIG.BETS[STATE.betIdx];
    var currentSaldo = getSaldo();
    
    if (currentSaldo < bet) {
        showModal('Saldo Anda IDR ' + formatIDR(currentSaldo) + '\nButuh IDR ' + formatIDR(bet), 'SALDO KURANG');
        log_debug('Insufficient balance: have ' + currentSaldo + ', need ' + bet);
        return;
    }

    STATE.isPlaying = true;
    document.getElementById('main-btn').disabled = true;
    showInfo('⏳ Processing...');
    log_debug('Play #' + (STATE.balls.length + 1) + ' - Bet: ' + formatIDR(bet));

    var ball = {
        x: STATE.BW / 2 + (Math.random() - 0.5) * 20,
        y: -15,
        vx: (Math.random() - 0.5) * 2,
        vy: 2,
        bet: bet,
        status: 'falling',
        targetSlotIdx: null,
        targetMult: null,
        winAmount: 0,
        landed: false,
        isDone: false,
        startTime: Date.now()
    };

    STATE.balls.push(ball);

    try {
        // Call GameEngine.processPlay dari global.js
        var result = await callGamePlayWithRetry(bet);

        if (!result || result.result !== 'SUCCESS') {
            log_debug('API Error: ' + (result ? result.message : 'null response'));
            showModal(result ? result.message : 'Transaksi gagal', 'ERROR');
            ball.isDone = true;
            STATE.isPlaying = false;
            document.getElementById('main-btn').disabled = false;
            hideInfo();
            return;
        }

        // FIX #2: ACCURATE MULTIPLIER MAPPING
        var serverMult = parseFloat(result.multiplier) || 1;
        var slotIdx = findExactSlot(serverMult);
        
        ball.targetSlotIdx = slotIdx;
        ball.targetMult = serverMult;
        ball.winAmount = result.winAmount || 0;
        ball.status = 'ready';
        
        log_debug('Server: mult=' + serverMult + 'x → slot ' + slotIdx);

        // FIX #3: UPDATE SALDO DARI SERVER
        if (result.newSaldo !== undefined) {
            // Update _session saldo
            if (typeof _session !== 'undefined' && _session) {
                _session.saldo = result.newSaldo;
                try { 
                    var SESSION_KEY = 'plinko_session';
                    localStorage.setItem(SESSION_KEY, JSON.stringify(_session)); 
                } catch(e) {}
            }
            
            syncSaldoUI(result.newSaldo);
            log_debug('Saldo updated: ' + formatIDR(result.newSaldo));
        }

        hideInfo();

    } catch (err) {
        log_debug('ERROR: ' + err.message);
        showModal('Error: ' + err.message, 'ERROR');
        ball.isDone = true;
        STATE.isPlaying = false;
        document.getElementById('main-btn').disabled = false;
        hideInfo();
    }
}

async function callGamePlayWithRetry(bet) {
    for (var i = 0; i < CONFIG.RETRY_COUNT; i++) {
        try {
            var timeoutPromise = new Promise(function(_, reject) {
                setTimeout(function() {
                    reject(new Error('Timeout'));
                }, CONFIG.API_TIMEOUT);
            });

            var apiPromise = GameEngine.processPlay(bet);
            var result = await Promise.race([apiPromise, timeoutPromise]);
            
            if (result && result.result === 'SUCCESS') {
                log_debug('API success (attempt ' + (i+1) + ')');
                return result;
            }
            
            if (i < CONFIG.RETRY_COUNT - 1) {
                log_debug('Retry ' + (i+1) + '...');
                await sleep(500);
            }
        } catch (err) {
            log_debug('Attempt ' + (i+1) + ' failed: ' + err.message);
            if (i === CONFIG.RETRY_COUNT - 1) throw err;
            await sleep(500);
        }
    }
}

// FIX #2: EXACT SLOT FINDING - ACCURATE MULTIPLIER MAPPING
function findExactSlot(mult) {
    mult = parseFloat(mult) || 1;
    
    // Find exact or closest match
    var best = { idx: 0, diff: Math.abs(CONFIG.MULTS[0] - mult) };
    
    for (var i = 1; i < CONFIG.MULTS.length; i++) {
        var diff = Math.abs(CONFIG.MULTS[i] - mult);
        if (diff < best.diff) {
            best.idx = i;
            best.diff = diff;
        }
    }
    
    log_debug('Slot match: mult=' + mult.toFixed(2) + ' → slot ' + best.idx + ' (' + CONFIG.MULTS[best.idx] + 'x, diff=' + best.diff.toFixed(3) + ')');
    return best.idx;
}

// ════════════════════════════════════════════════════════════════
// PHYSICS ENGINE
// ════════════════════════════════════════════════════════════════

function updatePhysics() {
    var ph = CONFIG.PHYSICS[STATE.speedMode];
    var LAND_Y = STATE.BH * CONFIG.LAND_Y_RATIO;

    for (var bi = STATE.balls.length - 1; bi >= 0; bi--) {
        var b = STATE.balls[bi];
        if (b.isDone) {
            STATE.balls.splice(bi, 1);
            continue;
        }

        var progY = b.y / STATE.BH;

        // Hard lock zone
        if (b.status === 'ready' && progY > 0.80) {
            var tx = slotCenterX(b.targetSlotIdx);
            var diff = tx - b.x;
            var lockStr = progY > 0.90 ? 0.70 : (progY > 0.85 ? 0.55 : 0.30);
            b.x += diff * lockStr;
            b.vx = diff * (lockStr * 0.5);
        }
        // Steering zone
        else if (b.status === 'ready' && progY > 0.45) {
            var tx2 = slotCenterX(b.targetSlotIdx);
            var diff2 = tx2 - b.x;
            var prog = (progY - 0.45) / (0.80 - 0.45);
            b.vx += diff2 * 0.15 * prog;
            var maxVx = Math.abs(diff2) * 0.4 + 1.5;
            b.vx = Math.max(-maxVx, Math.min(maxVx, b.vx));
        }

        // Landing check
        if (!b.landed && b.y >= LAND_Y && b.status === 'ready') {
            b.landed = true;
            onBallLand(b);
            b.isDone = true;
            continue;
        }

        // Physics
        b.vy += ph.grav;
        b.vx *= ph.friction;
        b.x += b.vx;
        b.y += b.vy;

        // Peg collision
        for (var pi = 0; pi < STATE.pegs.length; pi++) {
            var p = STATE.pegs[pi];
            var dx = b.x - p.x;
            var dy = b.y - p.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < CONFIG.BALL_R + CONFIG.PEG_R) {
                var ang = Math.atan2(dy, dx);
                var spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
                b.vx = Math.cos(ang) * spd * ph.bounce + (Math.random() - 0.5) * 0.2;
                b.vy = Math.abs(Math.sin(ang) * spd * ph.bounce) + 0.3;
                b.x = p.x + Math.cos(ang) * (CONFIG.BALL_R + CONFIG.PEG_R + 1);
                b.y = p.y + Math.sin(ang) * (CONFIG.BALL_R + CONFIG.PEG_R + 1);
                p.glow = 1.0;
                playSound('snd-hit', 0.08);
                break;
            }
        }

        // Boundaries
        if (b.x < CONFIG.BALL_R) {
            b.x = CONFIG.BALL_R;
            b.vx = Math.abs(b.vx) * 0.4;
        }
        if (b.x > STATE.BW - CONFIG.BALL_R) {
            b.x = STATE.BW - CONFIG.BALL_R;
            b.vx = -Math.abs(b.vx) * 0.4;
        }

        // Timeout
        if (Date.now() - b.startTime > 20000) {
            log_debug('Ball timeout - forcing land');
            b.landed = true;
            onBallLand(b);
            b.isDone = true;
        }
    }
}

// ════════════════════════════════════════════════════════════════
// ON BALL LAND
// ════════════════════════════════════════════════════════════════

function onBallLand(b) {
    // Flash slot dengan timing yang pas
    var slotEl = document.getElementById('slot-' + b.targetSlotIdx);
    if (slotEl) {
        slotEl.classList.add('active');
        setTimeout(function() {
            slotEl.classList.remove('active');
        }, 500);
    }

    // Sound
    if (b.targetMult >= 1) {
        playSound('snd-win', 0.25);
    }

    // Floating score
    var fx = slotCenterX(b.targetSlotIdx) + (Math.random() - 0.5) * 15;
    var fy = STATE.BH * CONFIG.LAND_Y_RATIO - 10;
    var fc = b.targetMult >= 3 ? '#ff0077' : b.targetMult >= 1 ? '#f5e642' : '#4488ff';
    var fsize = b.targetMult >= 3 ? 20 : 14;
    
    var netWin = b.winAmount - b.bet;
    var winText = netWin >= 0 ? '+' + formatIDR(netWin) : formatIDR(netWin);

    STATE.floaters.push({
        x: fx, y: fy,
        text: winText,
        color: fc,
        opacity: 1,
        velY: 1.2 + Math.random() * 0.6,
        fontSize: fsize
    });

    log_debug('Ball landed: slot ' + b.targetSlotIdx + ' (' + b.targetMult + 'x), win: ' + formatIDR(b.winAmount));
    
    // FIX #1: Enable button setelah ball land selesai
    setTimeout(function() {
        STATE.isPlaying = false;
        document.getElementById('main-btn').disabled = false;
        hideInfo();
    }, 100);
}

// ════════════════════════════════════════════════════════════════
// RENDER LOOP
// ════════════════════════════════════════════════════════════════

function draw() {
    STATE.ctx.clearRect(0, 0, STATE.BW, STATE.BH);

    // Pegs
    STATE.pegs.forEach(function(p) {
        STATE.ctx.beginPath();
        STATE.ctx.arc(p.x, p.y, CONFIG.PEG_R, 0, Math.PI * 2);
        if (p.glow > 0) {
            STATE.ctx.shadowBlur = 10 * p.glow;
            STATE.ctx.shadowColor = '#fff';
            STATE.ctx.fillStyle = 'rgba(255,255,255,' + (0.25 + p.glow * 0.75) + ')';
            p.glow -= 0.08;
        } else {
            STATE.ctx.shadowBlur = 0;
            STATE.ctx.fillStyle = '#1a2040';
        }
        STATE.ctx.fill();
    });

    // Balls
    STATE.balls.forEach(function(b) {
        STATE.ctx.save();
        STATE.ctx.shadowBlur = 15;
        STATE.ctx.shadowColor = b.status === 'ready' ? '#ff0077' : '#0055ff';
        
        var grad = STATE.ctx.createRadialGradient(b.x - 2, b.y - 2, 1, b.x, b.y, CONFIG.BALL_R);
        if (b.status === 'ready') {
            grad.addColorStop(0, '#ffccee');
            grad.addColorStop(0.5, '#ff0077');
            grad.addColorStop(1, '#550022');
        } else {
            grad.addColorStop(0, '#ccddff');
            grad.addColorStop(0.5, '#0055ff');
            grad.addColorStop(1, '#000044');
        }
        
        STATE.ctx.beginPath();
        STATE.ctx.arc(b.x, b.y, CONFIG.BALL_R, 0, Math.PI * 2);
        STATE.ctx.fillStyle = grad;
        STATE.ctx.fill();
        STATE.ctx.restore();
    });

    // Floating scores
    for (var fi = STATE.floaters.length - 1; fi >= 0; fi--) {
        var f = STATE.floaters[fi];
        f.y -= f.velY;
        f.opacity -= 0.018;
        
        if (f.opacity <= 0) {
            STATE.floaters.splice(fi, 1);
            continue;
        }
        
        STATE.ctx.save();
        STATE.ctx.globalAlpha = f.opacity;
        STATE.ctx.font = '900 ' + f.fontSize + "px 'Outfit',sans-serif";
        STATE.ctx.fillStyle = f.color;
        STATE.ctx.textAlign = 'center';
        STATE.ctx.shadowBlur = 8;
        STATE.ctx.shadowColor = 'rgba(0,0,0,0.95)';
        STATE.ctx.fillText(f.text, f.x, f.y);
        STATE.ctx.restore();
    }

    updatePhysics();
    requestAnimationFrame(draw);
}

// ════════════════════════════════════════════════════════════════
// CONTROLS
// ════════════════════════════════════════════════════════════════

function playSound(id, vol) {
    try {
        var s = document.getElementById(id).cloneNode();
        s.volume = vol;
        s.play().catch(function(){});
    } catch(e) {}
}

function setSpeed(m) {
    if (STATE.isPlaying) return;
    STATE.speedMode = m;
    document.getElementById('m-normal').classList.toggle('active', m === 'normal');
    document.getElementById('m-turbo').classList.toggle('active', m === 'turbo');
    log_debug('Speed mode: ' + m);
}

function handlePlay() {
    // FIX #1: MANUAL MODE - bisa ditekan berkali-kali
    if (STATE.isPlaying) {
        showInfo('⏳ Game masih berlangsung...');
        return;
    }
    spawnBall();
}

function changeBet(d) {
    if (STATE.isPlaying) return;
    
    STATE.betIdx = Math.max(0, Math.min(CONFIG.BETS.length - 1, STATE.betIdx + d));
    document.getElementById('current-bet').textContent = formatIDR(CONFIG.BETS[STATE.betIdx]);
    
    document.getElementById('bet-minus').disabled = STATE.betIdx === 0;
    document.getElementById('bet-plus').disabled = STATE.betIdx === CONFIG.BETS.length - 1;
}

// ════════════════════════════════════════════════════════════════
// UI HELPERS
// ════════════════════════════════════════════════════════════════

function showModal(msg, title) {
    document.getElementById('modal-title').textContent = title || 'INFO';
    document.getElementById('modal-msg').textContent = msg;
    document.getElementById('modal-overlay').style.display = 'block';
    document.getElementById('neon-modal').style.display = 'block';
}

function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('neon-modal').style.display = 'none';
}

function showInfo(msg) {
    var el = document.getElementById('info-box');
    el.textContent = msg;
    el.style.display = 'block';
}

function hideInfo() {
    document.getElementById('info-box').style.display = 'none';
}

function showLogout() {
    if (confirm('Logout?')) {
        if (typeof AuthAPI !== 'undefined' && AuthAPI.logout) {
            AuthAPI.logout();
        } else {
            window.location.href = 'login.html';
        }
    }
}

function goTo(url) {
    window.location.href = url;
}

// ════════════════════════════════════════════════════════════════
// FIX #3: SALDO SYNC DENGAN GLOBAL.JS
// ════════════════════════════════════════════════════════════════

async function syncSaldoWithServer() {
    try {
        var u = typeof getUsername === 'function' ? getUsername() : null;
        if (!u) return;
        
        if (typeof callApiSilent === 'function') {
            var data = await callApiSilent('get_saldo', { username: u });
            if (data && data.result === 'SUCCESS') {
                syncSaldoUI(data.saldo);
                log_debug('Saldo synced: ' + formatIDR(data.saldo));
            }
        }
    } catch(e) {
        console.warn('Saldo sync error:', e);
    }
}

function formatIDR(num) {
    return new Intl.NumberFormat("id-ID", {
        style: "currency", currency: "IDR", maximumFractionDigits: 0
    }).format(num || 0);
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// ════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════

window.addEventListener('DOMContentLoaded', function() {
    // Check login
    if (typeof requireLogin === 'function') {
        if (!requireLogin('login.html')) return;
    }

    setupCanvas();
    
    if (typeof getUsername === 'function') {
        var user = getUsername();
        if (user) {
            document.getElementById('display-username').textContent = user.substring(0, 10).toUpperCase();
        }
    }

    if (typeof getSaldo === 'function') {
        var saldo = getSaldo();
        syncSaldoUI(saldo);
    }
    
    document.getElementById('current-bet').textContent = formatIDR(CONFIG.BETS[STATE.betIdx]);
    document.getElementById('bet-minus').disabled = true;
    
    // Auto sync saldo
    if (typeof callApiSilent === 'function') {
        setInterval(syncSaldoWithServer, CONFIG.SYNC_INTERVAL);
    }
    
    log_debug('Game ready - Press F12 for debug log');
    log_debug('Version: v6.2 FINAL');
    
    draw();
});

window.addEventListener('resize', setupCanvas);

// Toggle debug mode dengan Ctrl+Shift+D
document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.shiftKey && e.code === 'KeyD') {
        document.body.classList.toggle('debug-active');
    }
});
